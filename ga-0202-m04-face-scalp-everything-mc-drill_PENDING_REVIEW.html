e vessels."], "source": "L08 - Sympathetic pathway (head/neck)", "obj": "Sympathetics relay - superior cervical ganglion", "hint": "Then they ride the carotid arteries."}, {"q": "Which salivary enzyme, present in saliva, begins the digestion of carbohydrates in the oral cavity?", "o": ["Pepsin", "Lipase", "Amylase", "Trypsin"], "c": 2, "cat": "Parotid Gland & Secretomotor Pathway", "r": ["Pepsin digests protein in the stomach, not carbohydrate in the mouth.", "Lipase digests fat, not carbohydrate.", "Correct. Salivary amylase breaks down starch, so carbohydrate digestion begins in the mouth (a chewed cracker starts to taste sweet).", "Trypsin is a pancreatic protease, not a salivary carbohydrate enzyme."], "source": "L08 - Saliva - amylase", "obj": "Saliva - amylase begins carb digestion", "hint": "Starch -> sugar in the mouth."}, {"q": "The facial artery, the main arterial supply to the face, is a branch of which artery?", "o": ["The external carotid artery", "The internal carotid artery", "The maxillary artery", "The superficial temporal artery"], "c": 0, "cat": "Facial Vessels — Arteries", "r": ["Correct. The facial artery arises from the external carotid artery.", "The internal carotid gives the ophthalmic artery (supraorbital, supratrochlear, dorsal nasal), not the facial artery.", "The maxillary artery is a separate terminal branch of the external carotid, not the parent of the facial artery.", "The superficial temporal is the other terminal branch of the external carotid, not the parent of the facial artery."], "source": "L08 - Facial arteries", "obj": "Facial artery - branch of ECA", "hint": "External carotid."}, {"q": "Which set lists branches of the FACIAL artery on the face?", "o": ["Mental and infraorbital", "Transverse facial, frontal, and parietal", "Submental, inferior labial, superior labial, lateral nasal, and angular", "Supraorbital, supratrochlear, and dorsal nasal"], "c": 2, "cat": "Facial Vessels — Arteries", "r": ["Mental and infraorbital arteries are branches of the maxillary artery.", "Transverse facial, frontal and parietal are branches of the superficial temporal artery.", "Correct. The facial artery gives the submental, inferior labial, superior labial, lateral nasal, and angular branches.", "Supraorbital, supratrochlear and dorsal nasal are branches of the ophthalmic artery."], "source": "L08 - Facial arteries - branches", "obj": "Facial artery - 5 named branches", "hint": "Ends as the angular artery near the eye."}, {"q": "Maini flagged this as a tricky board-style question: the TRANSVERSE FACIAL artery is actually a branch of which artery?", "o": ["The ophthalmic artery", "The superficial temporal artery", "The facial artery", "The maxillary artery"], "c": 1, "cat": "Facial Vessels — Arteries", "r": ["It is not a branch of the ophthalmic artery.", "Correct. Despite its name, the transverse facial artery is a branch of the superficial temporal artery, not the facial artery.", "It only shares the name 'facial'; it is NOT a branch of the facial artery - the trick.", "It is not a branch of the maxillary artery."], "source": "L08 - Facial arteries - trick question", "quote": "[Maini] 'Transverse facial is not a branch of facial... it's a branch of superficial temporal.'", "obj": "Transverse facial - branch of superficial temporal", "hint": "Named for the face, but comes from the temple.", "profTip": "Classic board trap - the name says 'facial' but it comes off the superficial temporal."}, {"q": "The superficial temporal artery gives which three branches on the side of the head?", "o": ["Mental, infraorbital, and buccal", "Submental, angular, and lateral nasal", "Supraorbital, supratrochlear, and dorsal nasal", "Transverse facial, frontal, and parietal"], "c": 3, "cat": "Facial Vessels — Arteries", "r": ["Mental and infraorbital are maxillary-artery branches; buccal is not a superficial-temporal branch.", "Submental, angular and lateral nasal are facial-artery branches.", "Supraorbital, supratrochlear and dorsal nasal are ophthalmic-artery branches.", "Correct. The superficial temporal artery gives the transverse facial, frontal, and parietal branches."], "source": "L08 - Facial arteries - superficial temporal", "obj": "Superficial temporal - 3 branches", "hint": "You can feel the transverse facial along the zygomatic arch."}, {"q": "The ophthalmic artery, which supplies the supraorbital, supratrochlear, and dorsal nasal arteries, is itself a branch of which artery?", "o": ["The maxillary artery", "The external carotid artery", "The facial artery", "The internal carotid artery"], "c": 3, "cat": "Facial Vessels — Arteries", "r": ["The maxillary artery gives mental and infraorbital branches; it is not the parent of the ophthalmic.", "The external carotid gives the facial, superficial temporal and maxillary arteries, not the ophthalmic.", "The facial artery is an external carotid branch, unrelated to the ophthalmic origin.", "Correct. The ophthalmic artery arises from the internal carotid artery (given off intracranially, then enters the orbit)."], "source": "L08 - Facial arteries - ophthalmic", "obj": "Ophthalmic artery - branch of ICA", "hint": "Internal carotid, into the orbit."}, {"q": "The facial vein ultimately drains into which vein - a point Maini stressed because students are tempted to answer 'external jugular'?", "o": ["The subclavian vein", "The internal jugular vein (via the common facial vein)", "The vertebral vein", "The external jugular vein"], "c": 1, "cat": "Facial Vessels — Veins & Danger Area", "r": ["The subclavian vein receives the external jugular, not the facial vein directly.", "Correct. The facial vein joins the anterior division of the retromandibular vein to form the common facial vein, which drains into the internal jugular vein.", "The vertebral vein drains the suboccipital region, not the face.", "The external jugular vein is the tempting wrong answer - it drains the superficial scalp, not the facial vein."], "source": "L07/L08 - Facial vein drainage", "quote": "[Maini] 'Where does common facial drain? Internal jugular, not external jugular.'", "obj": "Facial vein -> internal jugular", "hint": "Common facial -> deep, not superficial.", "profTip": "Do not be tricked into 'external jugular' just because the artery is external carotid."}, {"q": "The facial vein communicates DIRECTLY with the cavernous sinus through which veins?", "o": ["The deep facial vein and pterygoid plexus", "The retromandibular and external jugular veins", "The occipital and posterior auricular veins", "The superior and inferior ophthalmic veins"], "c": 3, "cat": "Facial Vessels — Veins & Danger Area", "r": ["The deep facial vein -> pterygoid plexus route is the INDIRECT connection, not the direct one.", "The retromandibular/external jugular veins carry blood away superficially; they are not the cavernous-sinus link.", "The occipital and posterior auricular veins drain the scalp, not the cavernous sinus via the face.", "Correct. The facial vein connects directly to the cavernous sinus via the superior and inferior ophthalmic veins."], "source": "L08 - Facial vein - cavernous sinus (direct)", "obj": "Facial vein -> cavernous sinus via ophthalmic veins", "hint": "Veins that run through the orbit."}, {"q": "The facial vein also communicates INDIRECTLY with the cavernous sinus through which route?", "o": ["The external jugular vein", "The retromandibular vein to the internal jugular vein", "The deep facial vein to the pterygoid venous plexus", "The superior ophthalmic vein only"], "c": 2, "cat": "Facial Vessels — Veins & Danger Area", "r": ["The external jugular vein is a superficial drainage pathway, not a cavernous-sinus connection.", "The retromandibular -> internal jugular route is the normal outflow, not a cavernous-sinus communication.", "Correct. The deep facial vein connects the facial vein to the pterygoid venous plexus, which in turn communicates with the cavernous sinus (the indirect route).", "The superior ophthalmic vein is the DIRECT route, not the indirect one."], "source": "L08 - Facial vein - cavernous sinus (indirect)", "obj": "Facial vein -> pterygoid plexus -> cavernous sinus", "hint": "A deep plexus behind the cheek."}, {"q": "The 'danger area (danger triangle) of the face' is located over which region?", "o": ["Around the nose and upper lip", "Around the external ear", "Over the forehead and scalp", "Over the lower lip and chin"], "c": 0, "cat": "Facial Vessels — Veins & Danger Area", "r": ["Correct. The danger area is around the nose and upper lip, where facial-vein connections to the cavernous sinus make infections risky.", "The external ear is not the danger area of the face.", "The forehead/scalp are not the danger triangle Maini described.", "The lower lip and chin are not the classic danger area."], "source": "L08 - Danger area of the face", "obj": "Danger triangle - nose & upper lip", "hint": "Where acne/boils are risky."}, {"q": "Why is infection in the danger area of the face clinically serious?", "o": ["It always causes permanent facial-muscle paralysis", "It compresses the trigeminal ganglion, causing neuralgia", "Infection can spread via facial-vein connections to the cavernous sinus, causing cavernous sinus thrombosis, meningitis, or encephalitis", "It obstructs the parotid duct and causes stones"], "c": 2, "cat": "Facial Vessels — Veins & Danger Area", "r": ["It does not routinely cause facial-muscle paralysis.", "It is a venous spread problem, not compression of the trigeminal ganglion.", "Correct. Because the facial vein communicates (directly and indirectly) with the cavernous sinus, facial infection/thrombophlebitis can spread intracranially, causing cavernous sinus thrombosis, meningitis, or encephalitis.", "It is not primarily a parotid-duct stone problem."], "source": "L08 - Danger area - clinical significance", "quote": "[Maini] 'This infection can spread to the cavernous sinus, leading to intracranial infection... meningitis, encephalitis.'", "obj": "Danger area - spread to cavernous sinus", "hint": "Think intracranial venous spread."}, {"q": "The common facial vein is formed by the union of the facial vein with which structure?", "o": ["The posterior division of the retromandibular vein", "The superficial temporal vein", "The external jugular vein", "The anterior division of the retromandibular vein"], "c": 3, "cat": "Facial Vessels — Veins & Danger Area", "r": ["The POSTERIOR division of the retromandibular vein joins the posterior auricular vein to form the external jugular vein.", "The superficial temporal vein helps FORM the retromandibular vein; it does not directly form the common facial vein.", "The external jugular vein is formed by the posterior division of the retromandibular + posterior auricular, not the common facial.", "Correct. The facial vein joins the anterior division of the retromandibular vein to form the common facial vein."], "source": "L07/L08 - Facial vein - common facial formation", "obj": "Common facial vein formation", "hint": "Anterior division of the retromandibular."}];

let questions=[];let answerMap={};let answerHistory=[];let browseIdx=-1;let navOpen=false;let jumpOpen=false;let instrOpen=false;let reviewList=null;
function shuffle(a){for(let i=a.length-1;i>0;i--){let j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}
function saveState(){try{localStorage.setItem(LS_KEY,JSON.stringify({idx,score,attempts,reaskQueue:reaskQueue.map(function(q){return q._bankId;}),questions:questions.map(function(q){return{_bankId:q._bankId,_isReask:q._isReask||false};}),answerMap,answerHistory,navOpen,jumpOpen}));}catch(e){}}
function loadState(){try{let s=JSON.parse(localStorage.getItem(LS_KEY));if(!s||!s.questions)return false;idx=s.idx||0;score=s.score||0;attempts=s.attempts||0;answerMap=s.answerMap||{};answerHistory=s.answerHistory||[];navOpen=false;jumpOpen=false;questions=s.questions.map(function(ref){let q=Object.assign({},BANK[ref._bankId]);if(ref._isReask)q._isReask=true;return q;});reaskQueue=(s.reaskQueue||[]).map(function(id){return Object.assign({},BANK[id],{_isReask:true});});CAT_NAMES.forEach(function(c){catStats[c]={c:0,t:0};});for(let k in answerMap){let m=answerMap[k];let q=BANK[k];if(!catStats[q.cat])catStats[q.cat]={c:0,t:0};catStats[q.cat].t++;if(m.isCorrect)catStats[q.cat].c++;}return true;}catch(e){return false;}}
function init(){if(!loadState()){questions=shuffle(BANK.slice());idx=0;score=0;attempts=0;reaskQueue=[];answerMap={};answerHistory=[];}render();}
function renderNav(){if(!navOpen)return'';let html='<div class="nav-grid">';for(let i=0;i<BANK.length;i++){let cls='nav-cell';let activeList=reviewList||answerHistory;if(browseIdx>=0&&activeList[browseIdx]===i)cls+=' nc-review';else if(browseIdx===-1&&idx<questions.length&&questions[idx]._bankId===i)cls+=' nc-current';else if(i in answerMap)cls+=answerMap[i].isCorrect?' nc-correct':' nc-wrong';html+='<div class="'+cls+'" onclick="navJump('+i+')">'+(i+1)+'</div>';}return html+'</div>';}
function renderJumpBar(){if(!jumpOpen)return'';let step=BANK.length>=40?10:BANK.length>=20?5:3;let html='<div class="jump-bar">';for(let m=1;m<=BANK.length;m+=step){let bankId=m-1;let cls='jump-btn';if(bankId in answerMap)cls+=answerMap[bankId].isCorrect?' jb-correct':' jb-wrong';html+='<div class="'+cls+'" onclick="navJump('+bankId+')">Q'+m+'</div>';}return html+'</div>';}
function navJump(bankId){if(bankId in answerMap){let activeList=reviewList||answerHistory;let pos=activeList.indexOf(bankId);if(pos!==-1){browseIdx=pos;renderHistoryItem();}else if(!reviewList){let p2=answerHistory.indexOf(bankId);if(p2!==-1){browseIdx=p2;reviewList=null;renderHistoryItem();}}}else{browseIdx=-1;reviewList=null;for(let i=0;i<questions.length;i++){if(questions[i]._bankId===bankId&&!questions[i]._isReask){idx=i;render();return;}}}}
function toggleNav(){navOpen=!navOpen;if(browseIdx>=0)renderHistoryItem();else render();}
function toggleJump(){jumpOpen=!jumpOpen;if(browseIdx>=0)renderHistoryItem();else render();}
function renderHistoryItem(){let activeList=reviewList||answerHistory;let bankId=activeList[browseIdx];let info=answerMap[bankId];let q=BANK[bankId];let uniqueAnswered=Object.keys(answerMap).length;let optHTML='';q.o.forEach(function(opt,i){let cls='opt-btn disabled';if(i===info.correct)cls+=' show-correct';if(i===info.picked&&!info.isCorrect)cls+=' picked-wrong';else if(i===info.picked&&info.isCorrect)cls+=' picked-correct';let letter=String.fromCharCode(65+i);optHTML+='<button class="'+cls+'"><span class="letter">'+letter+'.</span> '+opt+'<div class="rationale" style="display:block">'+q.r[i]+'</div></button>';});let prevDisabled=browseIdx<=0?' disabled':'';let nextDisabled=browseIdx>=activeList.length-1?' disabled':'';document.getElementById('app').innerHTML='<h1>📋 GA 0202 · Face & Scalp · Everything-MC (101 Q)</h1><p class="subtitle">Dr. Maini — Head & Neck: Face & Scalp (L07–L08) — 101 Q with topic filter</p><div class="stats"><div class="stat"><div class="stat-val">'+attempts+'</div><div class="stat-label">Attempts</div></div><div class="stat"><div class="stat-val">'+score+'</div><div class="stat-label">Correct</div></div><div class="stat"><div class="stat-val">'+(attempts?Math.round(score/attempts*100):0)+'%</div><div class="stat-label">Accuracy</div></div><div class="stat"><div class="stat-val">'+reaskQueue.length+'</div><div class="stat-label">Re-ask</div></div><button onclick="confirmRestart()" class="restart-sm">&#8635; Restart</button></div><button class="btn-nav-toggle" onclick="toggleNav()">'+(navOpen?'\u25bc Hide Navigator':'\u25b6 Question Navigator ('+uniqueAnswered+'/'+BANK.length+')')+'</button>'+renderNav()+'<button class="btn-nav-toggle" onclick="toggleJump()">'+(jumpOpen?'\u25bc Hide Jump Bar':'\u25b6 Jump to Question')+'</button>'+renderJumpBar()+'<div class="browse-banner">\ud83d\udcdd Reviewing '+(reviewList?'missed ':'')+'answer '+(browseIdx+1)+' of '+activeList.length+'</div><div class="card"><span class="cat-badge">'+q.cat+'</span><div class="q-text">Q'+(BANK.indexOf(q)+1)+': '+q.q+'</div>'+optHTML+'<div class="source-line" style="display:block"><span>Source:</span> '+q.source+'</div>'+(q.quote?'<div class="quote-line" style="display:block">'+q.quote+'</div>':'')+(q.profTip?'<div class="prof-tip" style="display:block"><span class="tip-label">Professor:</span> '+q.profTip+'</div>':'')+(q.obj?'<div class="obj-tag" style="display:block">'+q.obj+'</div>':'')+'<div class="btn-group"><button class="btn-prev" onclick="prevBrowse()"'+prevDisabled+'>\u2190 Previous</button><button class="btn-next" onclick="returnToQuiz()" style="display:inline-block">Return to Quiz</button><button class="btn-prev" onclick="nextBrowse()"'+nextDisabled+'>Next \u2192</button></div></div>';}
function prevBrowse(){if(browseIdx>0){browseIdx--;renderHistoryItem();}}
function nextBrowse(){let activeList=reviewList||answerHistory;if(browseIdx<activeList.length-1){browseIdx++;renderHistoryItem();}}
function returnToQuiz(){browseIdx=-1;reviewList=null;render();}
function render(){let app=document.getElementById('app');while(idx<questions.length&&!questions[idx]._isReask&&questions[idx]._bankId in answerMap){idx++;}if(idx>=questions.length&&reaskQueue.length===0)return showSummary();if(reaskQueue.length>0&&(idx>=questions.length||(idx>0&&idx%3===0))){questions.splice(idx,0,reaskQueue.shift());}if(idx>=questions.length)return showSummary();let q=questions[idx];let uniqueAnswered=Object.keys(answerMap).length;let pct=Math.min(100,Math.round((uniqueAnswered/BANK.length)*100));let optHTML='';q.o.forEach(function(opt,i){let letter=String.fromCharCode(65+i);optHTML+='<button class="opt-btn" id="ob'+i+'" onclick="pick('+i+')"><span class="letter">'+letter+'.</span> '+opt+'<div class="rationale" id="rat'+i+'">'+q.r[i]+'</div></button>';});app.innerHTML='<h1>GA 0202 · Face & Scalp · Everything-MC — 101 Q</h1><p class="subtitle">Dr. Maini — Head & Neck: Face & Scalp (L07–L08) — 101 Q with topic filter</p><div class="stats"><div class="stat"><div class="stat-val">'+attempts+'</div><div class="stat-label">Attempts</div></div><div class="stat"><div class="stat-val">'+score+'</div><div class="stat-label">Correct</div></div><div class="stat"><div class="stat-val">'+(attempts?Math.round(score/attempts*100):0)+'%</div><div class="stat-label">Accuracy</div></div><div class="stat"><div class="stat-val">'+reaskQueue.length+'</div><div class="stat-label">Re-ask</div></div><button onclick="confirmRestart()" class="restart-sm">&#8635; Restart</button></div><button class="btn-nav-toggle" onclick="toggleNav()">'+(navOpen?'\u25bc Hide Navigator':'\u25b6 Question Navigator ('+uniqueAnswered+'/'+BANK.length+')')+'</button>'+renderNav()+'<button class="btn-nav-toggle" onclick="toggleJump()">'+(jumpOpen?'\u25bc Hide Jump Bar':'\u25b6 Jump to Question')+'</button>'+renderJumpBar()+'<button class="btn-nav-toggle" onclick="toggleInstr()" style="border-color:#334155">'+(instrOpen?'\u25bc Hide Instructions':'\u25b6 How This Drill Works')+'</button>'+(instrOpen?'<div class="instructions" style="display:block"><h3>How This Drill Works</h3><ul><li>Answer each question by clicking A/B/C/D</li><li><span class="key">Re-ask system</span>: Missed questions come back later so you must <strong>get it right twice</strong></li><li><span class="key">Question Navigator</span>: Click any cell to jump to or review that question</li><li><span class="key">Jump to Question</span>: Quick milestone markers</li><li><span class="key">Previous button</span>: Browse back through answered questions</li><li>Every answer reveals: rationale, source, Dr. Maini quote, professor tip, and <strong>study guide item</strong></li><li>Progress is <strong>auto-saved</strong></li><li>At the end: category breakdown + <strong>Review Only Missed</strong></li></ul></div>':'')+'<div class="progress-track"><div class="progress-fill" style="width:'+pct+'%"></div></div><div class="card"><span class="cat-badge">'+q.cat+(q._isReask?' \ud83d\udd01 RE-ASK':'')+'</span><div class="q-text">Q'+(idx+1)+' of '+questions.length+': '+q.q+'</div>'+(q.hint?'<button class="btn-hint" onclick="this.nextElementSibling.style.display=\'block\';this.style.display=\'none\'">\ud83d\udca1 Show Hint</button><div class="hint-text" style="display:none">\ud83d\udca1 '+q.hint+'</div>':'')+optHTML+'<div class="source-line" id="srcLine"><span>Source:</span> '+q.source+'</div>'+(q.quote?'<div class="quote-line" id="quoteLine">'+q.quote+'</div>':'')+(q.profTip?'<div class="prof-tip" id="tipLine"><span class="tip-label">Professor:</span> '+q.profTip+'</div>':'')+(q.obj?'<div class="obj-tag" id="objTag">'+q.obj+'</div>':'')+'<div class="btn-group" id="btnGroup"><button class="btn-prev" onclick="prevAnswer()"'+(answerHistory.length===0?' disabled':'')+'>\u2190 Previous</button><button class="btn-next" id="btnNext" onclick="nextQ()">Next Question \u2192</button></div></div>';}
function pick(i){let q=questions[idx];let opts=document.querySelectorAll('.opt-btn');if(opts[0]&&opts[0].classList.contains('disabled'))return;opts.forEach(function(o){o.classList.add('disabled');o.onclick=null;});let correct=q.c;let isCorrect=i===correct;opts[i].classList.add(isCorrect?'picked-correct':'picked-wrong');if(!isCorrect)opts[correct].classList.add('show-correct');attempts++;if(!catStats[q.cat])catStats[q.cat]={c:0,t:0};catStats[q.cat].t++;if(isCorrect){score++;catStats[q.cat].c++;}else{reaskQueue.push(Object.assign({},q,{_isReask:true}));}if(q._bankId!==undefined){if(!(q._bankId in answerMap)){answerMap[q._bankId]={picked:i,correct:correct,isCorrect:isCorrect,attempts:1,everWrong:!isCorrect};}else{let m=answerMap[q._bankId];m.picked=i;m.isCorrect=isCorrect;m.attempts++;if(!isCorrect)m.everWrong=true;}}if(!answerHistory.includes(q._bankId))answerHistory.push(q._bankId);for(let j=0;j<q.o.length;j++){let r=document.getElementById('rat'+j);if(r)r.style.display='block';}let sl=document.getElementById('srcLine');if(sl)sl.style.display='block';let ql=document.getElementById('quoteLine');if(ql)ql.style.display='block';let tl=document.getElementById('tipLine');if(tl)tl.style.display='block';let ot=document.getElementById('objTag');if(ot)ot.style.display='block';let nb=document.getElementById('btnNext');if(nb)nb.style.display='inline-block';saveState();}
function nextQ(){idx++;render();saveState();}
function prevAnswer(){if(answerHistory.length===0)return;browseIdx=answerHistory.length-1;renderHistoryItem();}
function showSummary(){let app=document.getElementById('app');let uniqueAnswered=Object.keys(answerMap).length;let mastered=0;let everWrongCount=0;for(let k in answerMap){if(answerMap[k].isCorrect)mastered++;if(answerMap[k].everWrong)everWrongCount++;}let pct=uniqueAnswered>0?Math.round(mastered/uniqueAnswered*100):0;let cls=pct>=85?'great':pct>=65?'ok':'rough';let catHTML='<table class="cat-table"><tr><th>Study Guide Item</th><th>Score</th></tr>';for(let cat of CAT_NAMES){if(catStats[cat]&&catStats[cat].t>0)catHTML+='<tr><td>'+cat+'</td><td>'+catStats[cat].c+'/'+catStats[cat].t+'</td></tr>';}catHTML+='</table>';app.innerHTML='<h1>GA 0202 · Face & Scalp · Everything-MC — 101 Q</h1><p class="subtitle">Dr. Maini — Head & Neck: Face & Scalp (L07–L08) — 101 Q with topic filter</p><div class="summary" style="display:block"><h2>Quiz Complete!</h2><div class="pct '+cls+'">'+pct+'%</div><p style="color:#94a3b8">'+mastered+' of '+uniqueAnswered+' mastered on latest attempt</p><p class="detail">Attempts: '+attempts+' | Ever missed: '+everWrongCount+' | Re-asked: '+(attempts-uniqueAnswered)+'</p>'+catHTML+(everWrongCount>0?'<button class="review-btn" onclick="reviewMissed()">Review Only Missed ('+everWrongCount+')</button>':'')+'<br><button class="restart-btn" onclick="restart()">Restart Drill</button></div>';}
function reviewMissed(){let missed=answerHistory.filter(function(id){return answerMap[id]&&answerMap[id].everWrong;});if(missed.length===0)return;reviewList=missed;browseIdx=0;renderHistoryItem();}
function restart(){questions=shuffle(BANK.slice());idx=0;score=0;attempts=0;reaskQueue=[];answerMap={};answerHistory=[];browseIdx=-1;reviewList=null;CAT_NAMES.forEach(function(c){catStats[c]={c:0,t:0};});render();saveState();}
function confirmRestart(){if(confirm('Restart the drill? All progress will be lost.'))restart();}
function toggleInstr(){instrOpen=!instrOpen;if(browseIdx>=0)renderHistoryItem();else render();}
init();
</script>

<script>
const TIMESTAMPS=[];
var audioAutoPlay=true;

// Follow-along mode
var _origShuffle=shuffle;
var followMode=true;
var reaskMode=true;
shuffle=function(a){return followMode?a:_origShuffle(a);};

// ── Persistent audio bar: survives every render() + renderHistoryItem() call ──
var _audioBar=null;
function _buildAudioBar(){
  var ab=document.createElement('div');
  ab.id='audio-bar';
  ab.className='audio-bar';
  ab.innerHTML='<audio id="mk-audio" controls preload="none">Audio not found. Place MP3 in same folder.</audio>'
    +'<div class="audio-info">'
    +'<span class="timestamp-badge" id="ts-badge">⏱ --:--</span>'
    +'<div class="skip-btns">'
    +'<button class="btn-skip" onclick="skipAudio(-30)" title="Back 30s">⏪ 30</button>'
    +'<button class="btn-skip" onclick="skipAudio(-10)" title="Back 10s">⏪ 10</button>'
    +'<button class="btn-play-here" onclick="playFromHere()">▶ Play From Here</button>'
    +'<button class="btn-skip" onclick="skipAudio(10)" title="Forward 10s">10 ⏩</button>'
    +'<button class="btn-skip" onclick="skipAudio(30)" title="Forward 30s">30 ⏩</button>'
    +'</div>'
    +'<div class="audio-modes">'
    +'<label class="audio-auto-label"><input type="radio" name="amode" value="seek" onchange="setAudioMode(\'seek\')"> Seek per Q</label>'
    +'<label class="audio-auto-label"><input type="radio" name="amode" value="continuous" checked onchange="setAudioMode(\'continuous\')"> Continuous play</label>'
    +'<label class="audio-auto-label"><input type="radio" name="amode" value="off" onchange="setAudioMode(\'off\')"> Audio off</label>'
    +'</div>'
      +'<div class=\"speed-block\"><div class=\"speed-top\"><span class=\"speed-label\">Speed</span><button class=\"btn-speed-pm\" onclick=\"fabSetSpeed(fabCurrentSpeed - 0.05)\">&minus;.05</button><span class=\"speed-val\" id=\"speed-display\">1.00x</span><button class=\"btn-speed-pm\" onclick=\"fabSetSpeed(fabCurrentSpeed + 0.05)\">+.05</button></div><div class=\"speed-presets\"><button class=\"btn-speed-preset\" onclick=\"fabSetSpeed(0.5)\">0.5x</button><button class=\"btn-speed-preset\" onclick=\"fabSetSpeed(0.75)\">0.75x</button><button class=\"btn-speed-preset\" onclick=\"fabSetSpeed(0.9)\">0.9x</button><button class=\"btn-speed-preset active\" onclick=\"fabSetSpeed(1.0)\">1x</button><button class=\"btn-speed-preset\" onclick=\"fabSetSpeed(1.1)\">1.1x</button><button class=\"btn-speed-preset\" onclick=\"fabSetSpeed(1.25)\">1.25x</button><button class=\"btn-speed-preset\" onclick=\"fabSetSpeed(1.5)\">1.5x</button><button class=\"btn-speed-preset\" onclick=\"fabSetSpeed(2.0)\">2x</button></div></div><div class=\"transcript-toggle\"><button class=\"btn-transcript\" id=\"btn-transcript\" onclick=\"fabToggleTranscript()\">\ud83d\udcdc Transcript</button></div><div class=\"transcript-box\" id=\"transcript-box\"></div>'
    +'</div>';
  return ab;
}

function _ensureAudioAttached(){
  var app=document.getElementById('app');
  if(!app)return;
  if(!_audioBar)_audioBar=_buildAudioBar();
  var card=app.querySelector('.card');
  if(card&&_audioBar.parentNode!==card.parentNode){
    card.parentNode.insertBefore(_audioBar,card);
  } else if(!card&&_audioBar.parentNode!==app){
    // Summary screen — attach at top so audio keeps playing
    app.insertBefore(_audioBar,app.firstChild);
  }
  updateTimestampBadge();
}

// Override render to preserve audio across wipes
var _origRender=render;
render=function(){
  if(_audioBar&&_audioBar.parentNode){_audioBar.parentNode.removeChild(_audioBar);}
  _origRender();
  _ensureAudioAttached();

  // Toggle bar + re-ask banner (stateful — rebuild if missing)
  var app=document.getElementById('app');
  if(!document.getElementById('mk-toggle-bar')){
    var bar=document.createElement('div');
    bar.id='mk-toggle-bar';
    bar.className='follow-toggle';
    bar.innerHTML='<button class="follow-btn'+(followMode?' active':'')+'" onclick="setFollowMode(true)">🔊 Follow Audio Order</button>'
      +'<button class="follow-btn'+(!followMode?' active':'')+'" onclick="setFollowMode(false)">🔀 Shuffle Mode</button>'
      +'<button class="reask-btn'+(reaskMode?' active':'')+'" onclick="toggleReask()">🚨 Re-Ask Missed</button>';
    var banner=document.createElement('div');
    banner.id='reask-banner';
    banner.className='reask-banner';
    var firstChild=app.firstChild;
    if(firstChild&&firstChild.nextSibling){
      app.insertBefore(banner,firstChild.nextSibling);
      app.insertBefore(bar,firstChild.nextSibling);
    }
  }
  buildReaskBar();

  // Re-ask card glow
  var card=document.querySelector('.card');
  if(card){
    var isReask=idx<questions.length&&questions[idx]&&questions[idx]._isReask;
    if(isReask){
      card.classList.add('reask-glow');
      if(!card.querySelector('.reask-card-badge')){
        var badge=document.createElement('div');
        badge.className='reask-card-badge';
        badge.textContent='🔁 RE-ASK — You missed this one. Get it right!';
        card.insertBefore(badge,card.firstChild);
      }
    } else {
      card.classList.remove('reask-glow');
    }
  }
};

// Override renderHistoryItem so Previous still shows the audio panel
var _origRenderHistory=renderHistoryItem;
renderHistoryItem=function(){
  if(_audioBar&&_audioBar.parentNode){_audioBar.parentNode.removeChild(_audioBar);}
  _origRenderHistory();
  _ensureAudioAttached();
};

// Override showSummary so audio panel survives end-of-drill screen too
var _origShowSummary=showSummary;
showSummary=function(){
  if(_audioBar&&_audioBar.parentNode){_audioBar.parentNode.removeChild(_audioBar);}
  _origShowSummary();
  _ensureAudioAttached();
};

function updateTimestampBadge(){
  var badge=document.getElementById('ts-badge');
  if(!badge)return;
  if(idx<questions.length&&questions[idx]){
    var bankId=questions[idx]._bankId;
    if(bankId!==undefined&&TIMESTAMPS[bankId]!==undefined){
      var ts=TIMESTAMPS[bankId];
      var m=Math.floor(ts/60);
      var s=Math.floor(ts%60);
      badge.textContent='⏱ '+m+':'+(s<10?'0':'')+s;
    } else {
      badge.textContent='⏱ --:--';
    }
  }
}

var audioMode='continuous';

function playFromHere(){
  var audio=document.getElementById('mk-audio');
  if(!audio||idx>=questions.length)return;
  var bankId=questions[idx]._bankId;
  if(bankId===undefined||TIMESTAMPS[bankId]===undefined)return;
  var seekTo;if(TIMESTAMPS[bankId]===undefined||TIMESTAMPS[bankId]<=0){var f=null;for(var di=1;di<TIMESTAMPS.length;di++){var hi=bankId+di,lo=bankId-di;if(TIMESTAMPS[hi]>0){f=TIMESTAMPS[hi];break;}if(TIMESTAMPS[lo]>0){f=TIMESTAMPS[lo];break;}}if(f===null)return;seekTo=Math.max(0,f-2);}else{seekTo=Math.max(0,TIMESTAMPS[bankId]-2);}
  // FAB M01 lectures.mp3 split: L01 (0-4800s, 80min) / L02 (4800-10817s, 100min) / L03 (10817-18943s, 135min).
  // Swap audio source if needed BEFORE seeking, since each lecture file is its own duration.
  var L01='https://dgsc23.github.io/dc-study-audio/fab-201-m02-shoulder-forearm-L04.mp3';
  var L02='https://dgsc23.github.io/dc-study-audio/fab-201-m02-shoulder-forearm-L05.mp3';
  var L03='https://dgsc23.github.io/dc-study-audio/fab-201-m02-shoulder-forearm-L06.mp3';
  var s=audio.querySelector('source');
  var part=seekTo<4800?'L01':(seekTo<10817?'L02':'L03');
  var targetURL=part==='L01'?L01:(part==='L02'?L02:L03);
  var targetSec=part==='L01'?seekTo:(part==='L02'?(seekTo-4800):(seekTo-10817));
  var hasL01=s&&/-L01\.mp3/.test(s.src);
  var hasL02=s&&/-L02\.mp3/.test(s.src);
  var hasL03=s&&/-L03\.mp3/.test(s.src);
  var currentMatches=(part==='L01'&&hasL01)||(part==='L02'&&hasL02)||(part==='L03'&&hasL03);
  if(s&&!currentMatches){
    s.src=targetURL;audio.load();
    audio.addEventListener('loadedmetadata',function once(){
      audio.currentTime=targetSec;audio.play();
      audio.removeEventListener('loadedmetadata',once);
    });
    return;
  }
  audio.currentTime=targetSec;audio.play();
}

function skipAudio(sec){
  var audio=document.getElementById('mk-audio');
  if(!audio)return;
  audio.currentTime=Math.max(0,audio.currentTime+sec);
  if(audio.paused)audio.play();
}

function setAudioMode(mode){
  audioMode=mode;
  audioAutoPlay=(mode==='seek');
}

// Override nextQ to respect audio mode (continuous = don't touch audio)
var _origNextQ=nextQ;
nextQ=function(){
  _origNextQ();
  if(audioMode==='seek'){
    setTimeout(function(){playFromHere();},300);
  }
  // continuous = let audio keep playing
  // off = do nothing
};

function setFollowMode(on){
  followMode=on;
  document.querySelectorAll('.follow-btn').forEach(function(b,i){b.classList.toggle('active',i===0?on:!on);});
  if(Object.keys(answerMap).length===0){
    questions=BANK.slice();idx=0;render();saveState();
  }
}

function toggleReask(){
  reaskMode=!reaskMode;
  document.querySelectorAll('.reask-btn').forEach(function(b){b.classList.toggle('active',reaskMode);});
  buildReaskBar();
}

function buildReaskBar(){
  var bar=document.getElementById('reask-banner');
  if(!bar)return;
  var missed=[];
  if(typeof answerMap!=='undefined'){
    for(var k in answerMap){if(answerMap.hasOwnProperty(k)&&!answerMap[k].isCorrect)missed.push(k);}
  }
  if(reaskMode&&missed.length>0){

<script id="fab-ai-companion-js">
(function(){
  const ENDPOINT = "https://fab-ai.dgync1.workers.dev";
  const CLASS_NAME = "FAB201"; // e.g., "CP1" / "FAB101" / "GA0102" — empty = generic chiropractic tutor
  let panel = null;
  let history = []; // [{role:'user'|'model', content}]
  let currentQKey = null; // to detect Q navigation

  function readCurrentQ() {
    const qText = (document.querySelector('.q-text')?.innerText || '').replace(/^Q\d+(\s+of\s+\d+)?:\s*/, '');
    const optBtns = Array.from(document.querySelectorAll('.opt-btn'));
    const options = optBtns.map(b => {
      const clone = b.cloneNode(true);
      clone.querySelectorAll('.rationale').forEach(r => r.remove());
      clone.querySelectorAll('.letter').forEach(r => r.remove());
      return clone.innerText.trim();
    });
    let picked = null, correct = null;
    optBtns.forEach((b, i) => {
      if (b.classList.contains('picked-correct') || b.classList.contains('picked-wrong')) picked = i;
      if (b.classList.contains('picked-correct') || b.classList.contains('show-correct')) correct = i;
    });
    const profTip = document.querySelector('.prof-tip')?.innerText?.replace(/^Professor:\s*/i, '').trim() || '';
    const source = document.querySelector('.source-line')?.innerText?.replace(/^Source:\s*/i, '').trim() || '';
    const quote = document.querySelector('.quote-line')?.innerText?.trim() || '';
    return { question: qText, options, picked, correct, profTip, source, quote };
  }

  function qKey(ctx){ return (ctx.question || '') + '|' + (ctx.options || []).join('|'); }

  function mdToHtml(md){
    let html = md
      .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
      .replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>')
      .replace(/(^|\n)### (.+)/g, '$1<h3>$2</h3>')
      .replace(/`([^`]+)`/g, '<code>$1</code>')
      .replace(/^\s*[-*]\s+(.+)$/gm, '<li>$1</li>')
      .replace(/(<li>.*?<\/li>(\s*<li>.*?<\/li>)*)/gs, '<ul>$1</ul>');
    html = html.split(/\n{2,}/).map(p => {
      if (p.trim().startsWith('<ul') || p.trim().startsWith('<h3')) return p;
      if (p.trim() === '') return '';
      return '<p>' + p.replace(/\n/g, '<br>') + '</p>';
    }).join('');
    return html;
  }

  function stripForTts(text){
    // Remove markdown markers so TTS doesn't read them aloud
    return text
      .replace(/\*\*/g, '')
      .replace(/`([^`]+)`/g, '$1')
      .replace(/^\s*[-*]\s+/gm, '')
      .replace(/^#+\s+/gm, '')
      .replace(/\n{2,}/g, '. ')
      .replace(/\s+/g, ' ')
      .trim();
  }

  let currentUtter = null;
  function speakToggle(btn, rawText){
    if (!window.speechSynthesis) {
      alert('Your browser does not support text-to-speech.');
      return;
    }
    if (window.speechSynthesis.speaking && currentUtter && btn.classList.contains('playing')) {
      window.speechSynthesis.cancel();
      document.querySelectorAll('.fab-ai-tts-btn.playing').forEach(b => {
        b.classList.remove('playing');
        b.innerHTML = '🔊 Read';
      });
      currentUtter = null;
      return;
    }
    window.speechSynthesis.cancel();
    document.querySelectorAll('.fab-ai-tts-btn.playing').forEach(b => {
      b.classList.remove('playing');
      b.innerHTML = '🔊 Read';
    });
    const u = new SpeechSynthesisUtterance(stripForTts(rawText));
    const rateSel = btn.parentElement.querySelector('.fab-ai-tts-rate');
    u.rate = parseFloat(rateSel && rateSel.value || '1.0');
    /*ava-tts*/try{var _vs=(window.speechSynthesis&&window.speechSynthesis.getVoices())||[];var _av=_vs.find(function(v){return /microsoft.*ava.*natural/i.test(v.name);})||_vs.find(function(v){return /microsoft.*emma.*natural/i.test(v.name);})||_vs.find(function(v){return /google us english female/i.test(v.name);});if(_av){u.voice=_av;u.lang=_av.lang||'en-US';}}catch(e){}
    u.onend = () => {
      btn.classList.remove('playing');
      btn.innerHTML = '🔊 Read';
      currentUtter = null;
    };
    u.onerror = () => {
      btn.classList.remove('playing');
      btn.innerHTML = '🔊 Read';
      currentUtter = null;
    };
    currentUtter = u;
    btn.classList.add('playing');
    btn.innerHTML = '⏹ Stop';
    window.speechSynthesis.speak(u);
  }

  function appendMsg(role, text) {
    const body = document.getElementById('fabAiBody');
    if (!body) return null;
    const wrap = document.createElement('div');
    wrap.className = 'fab-ai-msg ' + role;
    const bub = document.createElement('div');
    bub.className = 'fab-ai-bubble';
    if (role === 'ai') {
      bub.innerHTML = mdToHtml(text);
      // Add TTS row
      const row = document.createElement('div');
      row.className = 'fab-ai-tts-row';
      const btn = document.createElement('button');
      btn.className = 'fab-ai-tts-btn';
      btn.innerHTML = '🔊 Read';
      btn.onclick = function(){ speakToggle(btn, text); };
      const rate = document.createElement('select');
      rate.className = 'fab-ai-tts-rate';
      rate.title = 'Reading speed';
      ['0.8','1.0','1.2','1.5','2.0'].forEach(function(r){
        const o = document.createElement('option');
        o.value = r; o.textContent = r + 'x';
        if (r === '1.0') o.selected = true;
        rate.appendChild(o);
      });
      row.appendChild(btn);
      row.appendChild(rate);
      bub.appendChild(row);
    } else {
      bub.textContent = text;
    }
    wrap.appendChild(bub);
    body.appendChild(wrap);
    body.scrollTop = body.scrollHeight;
    return bub;
  }

  function appendLoading(){
    const body = document.getElementById('fabAiBody');
    if (!body) return null;
    const wrap = document.createElement('div');
    wrap.className = 'fab-ai-msg ai';
    wrap.id = 'fabAiLoading';
    const bub = document.createElement('div');
    bub.className = 'fab-ai-bubble';
    bub.innerHTML = '<div class="fab-ai-loading"><div class="fab-ai-spinner"></div> Thinking...</div>';
    wrap.appendChild(bub);
    body.appendChild(wrap);
    body.scrollTop = body.scrollHeight;
    return wrap;
  }

  function removeLoading(){
    const el = document.getElementById('fabAiLoading');
    if (el) el.remove();
  }

  function appendStatus(text, isErr){
    const body = document.getElementById('fabAiBody');
    if (!body) return;
    const div = document.createElement('div');
    div.className = 'fab-ai-status' + (isErr ? ' err' : '');
    div.innerHTML = text;
    body.appendChild(div);
    body.scrollTop = body.scrollHeight;
  }

  function renderSuggestions(ctx){
    const body = document.getElementById('fabAiBody');
    if (!body) return;
    // Q preview at top
    if (ctx.question) {
      const qp = document.createElement('div');
      qp.className = 'fab-ai-qpreview';
      qp.innerHTML = '<b>Q:</b> ' + ctx.question.substring(0, 240) + (ctx.question.length > 240 ? '...' : '');
      body.appendChild(qp);
    }
    // Suggestion chips
    const sug = document.createElement('div');
    sug.className = 'fab-ai-suggestions';
    const chips = [];
    if (ctx.picked === null || ctx.picked === undefined) {
      chips.push({ label: '💡 Give me a hint', q: 'Give me a hint for this question without revealing the answer.' });
      chips.push({ label: '🧠 Explain the concept', q: 'Explain the core concept this question is testing.' });
    } else if (ctx.picked !== ctx.correct && ctx.picked !== null) {
      chips.push({ label: '❌ Why did I miss this?', q: 'I picked the wrong answer. Walk me through why my pick is wrong and why the correct answer is right.' });
      chips.push({ label: '🧠 Explain the concept', q: 'Explain the concept this question is testing in simpler terms.' });
      chips.push({ label: '🎯 Give me a mnemonic', q: 'Give me a memorable mnemonic for this topic.' });
    } else if (ctx.picked === ctx.correct) {
      chips.push({ label: '✅ Why is this right?', q: 'Confirm why the correct answer is right and flag any trap distractors to watch for.' });
      chips.push({ label: '🎯 Give me a mnemonic', q: 'Give me a memorable mnemonic for this topic.' });
    }
    chips.push({ label: '🌟 Use an analogy', q: 'Explain this with a dumbed-down analogy.' });
    chips.forEach(c => {
      const btn = document.createElement('button');
      btn.className = 'fab-ai-sug';
      btn.textContent = c.label;
      btn.onclick = () => sendMessage(c.q);
      sug.appendChild(btn);
    });
    body.appendChild(sug);
  }

  function clearChat(preserveCtx){
    const body = document.getElementById('fabAiBody');
    if (body) body.innerHTML = '';
    history = [];
    if (preserveCtx) {
      const ctx = readCurrentQ();
      renderSuggestions(ctx);
    }
  }

  function openPanel() {
    if (!panel) panel = buildPanel();
    panel.classList.add('open');
    const ctx = readCurrentQ();
    const key = qKey(ctx);
    if (key !== currentQKey) {
      // Q changed — reset chat and show suggestions for new Q
      currentQKey = key;
      clearChat(true);
    }
  }

  function buildPanel() {
    const el = document.createElement('div');
    el.className = 'fab-ai-panel';
    el.innerHTML = '<div class="fab-ai-header">'
      + '<h3>🩺 Study Tutor</h3>'
      + '<button class="fab-ai-hdr-btn" onclick="fabAiClear()">Clear</button>'
      + '<button class="fab-ai-close" onclick="fabAiClose()">×</button>'
      + '</div>'
      + '<div class="fab-ai-body" id="fabAiBody"></div>'
      + '<div class="fab-ai-followup">'
      + '<button class="fab-ai-mini-close" title="Close panel" onclick="fabAiClose()">×</button>'
      + '<textarea id="fabAiFollowup" placeholder="Ask a question about this Q..." rows="1" onkeydown="if(event.keyCode===13&&!event.shiftKey){event.preventDefault();fabAiFollowupSend();}"></textarea>'
      + '<button onclick="fabAiFollowupSend()">Send</button>'
      + '</div>';
    document.body.appendChild(el);
    return el;
  }

  window.fabAiClose = function(){ if(panel) panel.classList.remove('open'); };
  window.fabAiClear = function(){ clearChat(true); };

  async function callWorker(payload) {
    if (!ENDPOINT) return { clipboardFallback: true };
    try {
      const res = await fetch(ENDPOINT, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload),
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.error || ('HTTP ' + res.status));
      return { reply: data.reply };
    } catch (e) {
      return { error: String(e.message || e) };
    }
  }

  function clipboardFallback(ctx, userQ) {
    const letter = (i) => String.fromCharCode(65 + i);
    let prompt = "I'm studying GA 0202 (Gross Anatomy — Head & Neck) with Dr. Maini at SCUHS. Drill question:\n\n";
    prompt += 'Q: ' + ctx.question + '\n\n';
    if (ctx.options && ctx.options.length) {
      ctx.options.forEach((o, i) => {
        const m = [];
        if (i === ctx.picked) m.push('PICKED');
        if (i === ctx.correct) m.push('CORRECT');
        prompt += letter(i) + '. ' + o + (m.length ? ' ('+m.join(', ')+')' : '') + '\n';
      });
      prompt += '\n';
    }
    if (ctx.profTip) prompt += 'DRILL TIP: ' + ctx.profTip + '\n\n';
    if (userQ) prompt += 'MY QUESTION: ' + userQ + '\n\n';
    prompt += 'Explain using a dumbed-down analogy + mnemonic.';
    navigator.clipboard.writeText(prompt).then(() => {
      appendStatus('✓ Prompt copied to clipboard. Backend not configured yet — paste into your AI chat.');
    }).catch(() => {
      appendStatus('Could not copy. Please select manually.', true);
    });
  }

  async function sendMessage(userText) {
    const ctx = readCurrentQ();
    currentQKey = qKey(ctx);
    appendMsg('user', userText);
    history.push({ role: 'user', content: userText });
    appendLoading();

    const payload = Object.assign({}, ctx, {
      userQuestion: userText,
      history: history.slice(-10), // last 10 turns for context
      className: CLASS_NAME, // worker uses this to load class-specific knowledge
    });
    const result = await callWorker(payload);
    removeLoading();
    if (result.clipboardFallback) {
      clipboardFallback(ctx, userText);
      return;
    }
    if (result.error) {
      appendStatus('Error: ' + result.error, true);
      return;
    }
    appendMsg('ai', result.reply);
    history.push({ role: 'model', content: result.reply });
  }

  window.fabAiFollowupSend = function() {
    const ta = document.getElementById('fabAiFollowup');
    const q = (ta && ta.value || '').trim();
    if (!q) return;
    ta.value = '';
    sendMessage(q);
  };

  // Button install — opens panel, does NOT auto-call AI
  function install() {
    if (document.getElementById('fabAiBtn')) return;
    const btn = document.createElement('button');
    btn.className = 'fab-ai-btn';
    btn.id = 'fabAiBtn';
    btn.textContent = '🩺';
    btn.title = 'Open AI Study Tutor';
    btn.onclick = () => openPanel();
    document.body.appendChild(btn);
  }
  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', install);
  } else {
    install();
  }
})();
</script>

    if (!wm) return;
    if (localStorage.getItem('dcDavidView') === '1') {
      wm.classList.add('dc-hidden');
      return;
    }
    function lumOf(el) {
      var bg = window.getComputedStyle(el).backgroundColor || '';
      var rgb = bg.match(/[\d.]+/g);
      if (!rgb || rgb.length < 3) return null;
      var a = rgb.length >= 4 ? +rgb[3] : 1;
      if (a < 0.3) return null;
      return (0.299 * +rgb[0] + 0.587 * +rgb[1] + 0.114 * +rgb[2]) / 255;
    }
    var lum = lumOf(document.body);
    if (lum === null) lum = lumOf(document.documentElement);
    if (lum !== null && lum < 0.5) {
      wm.style.color = 'rgba(255, 255, 255, 0.30)';
    }
  } catch(e) {}
})();

      + '<div style="display:flex;gap:10px;flex-wrap:wrap;justify-content:center;margin-top:8px">'
      +   '<button class="em-start" id="emStartBtn" onclick="emStart()" style="flex:1;min-width:160px">▶️ Start Drill</button>'
      + '</div>'
      + '</div>';
    var modal = document.createElement('div');
    modal.id = 'everythingModal';
    modal.innerHTML = html;
    document.body.appendChild(modal);
    var btn = document.createElement('button');
    btn.id = 'emReopenBtn';
    btn.textContent = '⚙️ Filter Topics';
    btn.onclick = emReopen;
    document.body.appendChild(btn);
    catCounts = {};
    FULL_BANK.forEach(function(q){ if (q && q.cat) catCounts[q.cat] = (catCounts[q.cat]||0)+1; });
    var cats = Object.keys(catCounts).sort();
    var list = document.getElementById('emCatList');
    list.innerHTML = '';
    cats.forEach(function(cat){
      selectedCats[cat] = true;
      var safe = cat.replace(/'/g, "&apos;").replace(/"/g, "&quot;");
      var id = 'em_cat_' + cat.replace(/[^a-z0-9]/gi, '_');
      var row = document.createElement('div');
      row.className = 'em-cat-row';
      row.innerHTML = '<input type="checkbox" id="' + id + '" checked onchange="emToggleCat(this,\''+cat.replace(/'/g, "\\\'")+'\')">'
                    + '<label for="' + id + '">' + safe + '</label>'
                    + '<span class="em-count">' + catCounts[cat] + '</span>';
      list.appendChild(row);
    });
    emUpdAvail();
  }

  window.emToggleCat = function(box, cat){
    selectedCats[cat] = box.checked;
    emUpdAvail();
  };
  window.emPreset = function(kind){
    var allCats = Object.keys(catCounts);
    allCats.forEach(function(cat){
      var on = false;
      if (kind === 'all') on = true;
      else if (kind === 'clear') on = false;
      else if (TOPIC_GROUPS[kind]) {
        on = TOPIC_GROUPS[kind].some(function(sub){ return cat.toLowerCase().indexOf(sub.toLowerCase()) >= 0; });
      }
      selectedCats[cat] = on;
      var id = 'em_cat_' + cat.replace(/[^a-z0-9]/gi, '_');
      var box = document.getElementById(id);
      if (box) box.checked = on;
    });
    emUpdAvail();
  };
  window.emUpdSize = function(){
    document.getElementById('emSizeVal').textContent = document.getElementById('emSizeSlider').value;
  };
  function emUpdAvail(){
    var n = 0;
    FULL_BANK.forEach(function(q){ if (selectedCats[q.cat]) n++; });
    document.getElementById('emAvail').textContent = n;
    var slider = document.getElementById('emSizeSlider');
    slider.max = Math.max(5, n);
    if (parseInt(slider.value) > n) slider.value = Math.max(5, n);
    emUpdSize();
    document.getElementById('emStartBtn').disabled = (n === 0);
  }
  window.emStart = function(){
    var size = parseInt(document.getElementById('emSizeSlider').value);
    var pool = FULL_BANK.filter(function(q){ return selectedCats[q.cat]; });
    for (var i = pool.length - 1; i > 0; i--){ var j = Math.floor(Math.random()*(i+1)); var t = pool[i]; pool[i]=pool[j]; pool[j]=t; }
    var picked = pool.slice(0, Math.min(size, pool.length));
    BANK.length = 0;
    picked.forEach(function(q){ BANK.push(q); });
    BANK.forEach(function(q,i){ q._bankId = i; });
    if (typeof catStats !== 'undefined') { catStats = {}; }
    try { if (typeof LS_KEY === 'string') localStorage.removeItem(LS_KEY); } catch(e){}
    document.getElementById('everythingModal').style.display = 'none';
    document.getElementById('emReopenBtn').style.display = 'block';
    if (typeof idx !== 'undefined') idx = 0;
    if (typeof score !== 'undefined') score = 0;
    if (typeof attempts !== 'undefined') attempts = 0;
    if (typeof reaskQueue !== 'undefined') reaskQueue.length = 0;
    if (typeof questions !== 'undefined') questions.length = 0;
    if (typeof answerMap !== 'undefined') { for (var k in answerMap) delete answerMap[k]; }
    if (typeof answerHistory !== 'undefined') answerHistory.length = 0;
    if (typeof browseIdx !== 'undefined') browseIdx = -1;
    if (typeof reviewList !== 'undefined') reviewList = null;
    if (typeof init === 'function') init();
  };
  function emReopen(){
    document.getElementById('everythingModal').style.display = 'block';
  }

  function tryInit(){
    if (initialized) return;
    if (!captureBank()) { setTimeout(tryInit, 100); return; }
    initialized = true;
    buildModal();
  }
  if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', tryInit);
  else tryInit();
})();
</script>

<script id="search-and-jump-js">
(function(){
  var _searchBar=null,_searchTimer=null,_searchKbdIdx=-1,_lastResults=[],_lastQuery='';

  function _esc(s){
    return (s==null?'':String(s)).replace(/[<>&"']/g,function(c){
      return {'<':'&lt;','>':'&gt;','&':'&amp;','"':'&quot;',"'":'&#39;'}[c];
    });
  }

  function _buildSearchBar(){
    var wrap=document.createElement('div');
    wrap.id='search-bar';
    wrap.className='search-bar';
    wrap.innerHTML=''
      +'<div class="search-input-wrap" id="search-input-wrap">'
      +  '<span class="search-icon">🔍</span>'
      +  '<input type="text" id="search-input" class="search-input" placeholder="Search questions, topics, sources... (↑/↓ + Enter)" autocomplete="off" spellcheck="false">'
      +  '<button class="search-clear" id="search-clear" type="button" title="Clear (Esc)">✕</button>'
      +'</div>'
      +'<div class="search-results" id="search-results"></div>';
    return wrap;
  }

  function _ensureSearchAttached(){
    var app=document.getElementById('app');
    if(!app)return;
    if(!_searchBar){
      _searchBar=_buildSearchBar();
      _wireSearchHandlers();
    }
    var card=app.querySelector('.card');
    if(card){
      if(_searchBar.parentNode!==card.parentNode){
        card.parentNode.insertBefore(_searchBar,card);
      }
    } else {
      // No card (e.g. summary screen) — detach
      if(_searchBar.parentNode)_searchBar.parentNode.removeChild(_searchBar);
    }
  }

  function _highlight(text,query){
    if(!text)return '';
    if(!query)return _esc(text);
    var qLow=query.toLowerCase();
    var tLow=String(text).toLowerCase();
    var i=tLow.indexOf(qLow);
    if(i===-1)return _esc(text);
    var end=i+query.length;
    return _esc(text.substring(0,i))+'<mark>'+_esc(text.substring(i,end))+'</mark>'+_esc(text.substring(end));
  }

  function _searchBank(query){
    var q=(query||'').toLowerCase().trim();
    if(!q||typeof BANK==='undefined')return [];
    var results=[];
    for(var i=0;i<BANK.length;i++){
      var item=BANK[i];
      var qText=(item.q||'').toLowerCase();
      var cat=(item.cat||'').toLowerCase();
      var src=(item.source||'').toLowerCase();
      var quote=(item.quote||'').toLowerCase();
      var tip=(item.profTip||'').toLowerCase();
      if(qText.indexOf(q)>=0||cat.indexOf(q)>=0||src.indexOf(q)>=0||quote.indexOf(q)>=0||tip.indexOf(q)>=0){
        results.push({_bankId:i,q:item.q,cat:item.cat});
        if(results.length>=10)break;
      }
    }
    return results;
  }

  function _renderSearchResults(query){
    var ul=document.getElementById('search-results');
    if(!ul)return;
    _lastQuery=query;
    if(!query.trim()){
      ul.classList.remove('open');
      ul.innerHTML='';
      _lastResults=[];_searchKbdIdx=-1;
      return;
    }
    var matches=_searchBank(query);
    _lastResults=matches;
    _searchKbdIdx=-1;
    if(matches.length===0){
      ul.innerHTML='<div class="search-empty">No matches for "'+_esc(query)+'"</div>';
      ul.classList.add('open');
      return;
    }
    var html='';
    for(var i=0;i<matches.length;i++){
      var m=matches[i];
      var stem=(m.q||'');
      var truncStem=stem.length>110?stem.substring(0,110)+'…':stem;
      html+='<div class="search-result" data-bank-id="'+m._bankId+'" data-idx="'+i+'">'
        +'<span class="sr-num">Q'+(m._bankId+1)+'</span>'
        +'<span class="sr-cat">'+_esc(m.cat||'')+'</span>'
        +_highlight(truncStem,query)
        +'</div>';
    }
    if(matches.length===10){
      html+='<div class="search-hint">Showing top 10 — refine to narrow</div>';
    }
    ul.innerHTML=html;
    ul.classList.add('open');
    var nodes=ul.querySelectorAll('.search-result');
    nodes.forEach(function(node){
      node.addEventListener('mousedown',function(e){
        // mousedown so it fires before input blur clears state
        e.preventDefault();
        var bankId=parseInt(node.getAttribute('data-bank-id'),10);
        _doJump(bankId);
      });
    });
  }

  function _doJump(bankId){
    if(typeof navJump!=='function')return;
    var inp=document.getElementById('search-input');
    var ul=document.getElementById('search-results');
    if(inp)inp.value='';
    if(ul){ul.classList.remove('open');ul.innerHTML='';}
    _lastResults=[];_searchKbdIdx=-1;_lastQuery='';
    navJump(bankId);
    // Scroll to top of card after jump so user sees the question
    setTimeout(function(){
      var card=document.querySelector('.card');
      if(card&&card.scrollIntoView)card.scrollIntoView({behavior:'smooth',block:'start'});
    },80);
  }

  function _highlightKbd(){
    var ul=document.getElementById('search-results');
    if(!ul)return;
    var nodes=ul.querySelectorAll('.search-result');
    nodes.forEach(function(n,i){n.classList.toggle('kbd',i===_searchKbdIdx);});
    if(_searchKbdIdx>=0&&nodes[_searchKbdIdx]){
      nodes[_searchKbdIdx].scrollIntoView({block:'nearest'});
    }
  }

  function _wireSearchHandlers(){
    var inp=_searchBar.querySelector('#search-input');
    var wrap=_searchBar.querySelector('#search-input-wrap');
    var clr=_searchBar.querySelector('#search-clear');
    inp.addEventListener('focus',function(){
      wrap.classList.add('focused');
      if(_lastQuery&&_lastResults.length>0){
        var ul=document.getElementById('search-results');
        if(ul)ul.classList.add('open');
      }
    });
    inp.addEventListener('blur',function(){
      setTimeout(function(){wrap.classList.remove('focused');},150);
    });
    inp.addEventListener('input',function(){
      if(_searchTimer)clearTimeout(_searchTimer);
      var v=inp.value;
      _searchTimer=setTimeout(function(){_renderSearchResults(v);},200);
    });
    inp.addEventListener('keydown',function(e){
      var ul=document.getElementById('search-results');
      if(e.key==='Escape'){
        if(inp.value){
          inp.value='';
          if(ul){ul.classList.remove('open');ul.innerHTML='';}
          _lastResults=[];_searchKbdIdx=-1;_lastQuery='';
        } else {
          inp.blur();
        }
      } else if(e.key==='ArrowDown'){
        if(_lastResults.length===0)return;
        e.preventDefault();
        _searchKbdIdx=Math.min(_lastResults.length-1,_searchKbdIdx+1);
        _highlightKbd();
      } else if(e.key==='ArrowUp'){
        if(_lastResults.length===0)return;
        e.preventDefault();
        _searchKbdIdx=Math.max(-1,_searchKbdIdx-1);
        _highlightKbd();
      } else if(e.key==='Enter'){
        if(_lastResults.length===0)return;
        e.preventDefault();
        var pick=_searchKbdIdx>=0?_lastResults[_searchKbdIdx]:_lastResults[0];
        if(pick)_doJump(pick._bankId);
      }
    });
    clr.addEventListener('click',function(){
      inp.value='';
      var ul=document.getElementById('search-results');
      if(ul){ul.classList.remove('open');ul.innerHTML='';}
      _lastResults=[];_searchKbdIdx=-1;_lastQuery='';
      inp.focus();
    });
    document.addEventListener('click',function(e){
      if(!_searchBar)return;
      if(!_searchBar.contains(e.target)){
        var ul=document.getElementById('search-results');
        if(ul)ul.classList.remove('open');
      }
    });
    // Global "/" keybind to focus search (matches GitHub-style search UX)
    document.addEventListener('keydown',function(e){
      if(e.key==='/'&&document.activeElement!==inp){
        var tag=(document.activeElement&&document.activeElement.tagName||'').toLowerCase();
        if(tag==='input'||tag==='textarea')return;
        e.preventDefault();
        inp.focus();
      }
    });
  }

  function _wrapRender(){
    if(typeof render!=='function')return;
    var origR=render;
    render=function(){
      if(_searchBar&&_searchBar.parentNode)_searchBar.parentNode.removeChild(_searchBar);
      origR();
      _ensureSearchAttached();
    };
    if(typeof renderHistoryItem==='function'){
      var origH=renderHistoryItem;
      renderHistoryItem=function(){
        if(_searchBar&&_searchBar.parentNode)_searchBar.parentNode.removeChild(_searchBar);
        origH();
        _ensureSearchAttached();
      };
    }
    if(typeof showSummary==='function'){
      var origS=showSummary;
      showSummary=function(){
        if(_searchBar&&_searchBar.parentNode)_searchBar.parentNode.removeChild(_searchBar);
        origS();
        // intentionally no re-attach on summary
      };
    }
  }

  function _bootSearch(){
    _wrapRender();
    _ensureSearchAttached();
  }

  // Wait until other render overrides (audio bar etc.) finish wiring
  if(document.readyState==='complete'||document.readyState==='interactive'){
    setTimeout(_bootSearch,100);
  } else {
    document.addEventListener('DOMContentLoaded',function(){setTimeout(_bootSearch,100);});
  }
})();
</script>

      <button title="Grey" style="background:#9ca3af" onclick="lbFrameSetBgColor('#9ca3af')"></button>
      <button title="Slate Blue" style="background:#1e3a8a" onclick="lbFrameSetBgColor('#1e3a8a')"></button>
      <button title="Forest Green" style="background:#064e3b" onclick="lbFrameSetBgColor('#064e3b')"></button>
    </div>
    <div class="lb-frame-section-label">Actions</div>
    <div style="display:flex;gap:6px">
      <button onclick="lbFrameUndo()" title="Undo (Ctrl+Z)" style="flex:1;text-align:center">↶ Undo</button>
      <button onclick="lbFrameRedo()" title="Redo (Ctrl+Y)" style="flex:1;text-align:center">↷ Redo</button>
    </div>
    <button class="lb-frame-clear" onclick="lbFrameClear()">🗑️ Clear strokes</button>
    <button class="lb-frame-save" onclick="lbFrameSave()">💾 Save PNG</button>
    <button class="lb-frame-close" onclick="lbFrameClose()">✕ Close</button>
  </div>

<script>
(function(){
  var lbFrameDrawing = false, lbFrameLastX = 0, lbFrameLastY = 0;
  var lbFrameColor = '#fbbf24';
  var lbFrameTool = 'pen';
  var lbFrameAlphas = {pen: 0.85, hl: 0.30, er: 1.0};
  var lbFrameSizes = {pen: 5, hl: 26, er: 36};
  var lbFrameBgColor = '';   // '' = default lightbox bg
  var lbFrameUndoStack = []; // snapshots of canvas state
  var lbFrameRedoStack = [];
  var LB_FRAME_HISTORY_MAX = 30;
  var lbFrameSrc = '', lbFrameLabel = '';

  window.lbFrameOpen = function(src, label){
    lbFrameSrc = src; lbFrameLabel = label || '';
    var lb = document.getElementById('lb-frame');
    var img = document.getElementById('lb-frame-img');
    var canvas = document.getElementById('lb-frame-canvas');
    document.getElementById('lb-frame-cap').textContent = label;
    if (canvas) canvas.getContext('2d').clearRect(0,0,canvas.width,canvas.height);
    img.onload = function(){ lbFrameSyncCanvas(true); lbFrameApplyImgFilter(); };
    img.src = src;
    lb.classList.add('open');
    lbFrameApplyImgFilter();
    // Reset history + bg for new frame
    lbFrameUndoStack = [];
    lbFrameRedoStack = [];
    lbFrameBgColor = '';
    lb.style.background = '';  // restore default lightbox bg
    setTimeout(function(){ lbFrameSyncCanvas(true); }, 100);
    setTimeout(function(){ lbFrameSyncCanvas(true); }, 400);
  };
  window.lbFrameClose = function(){
    var lb = document.getElementById('lb-frame');
    lb.classList.remove('open');
    var c = document.getElementById('lb-frame-canvas');
    if (c) { c.classList.remove('draw-active'); c.style.pointerEvents = 'none'; c.style.cursor = ''; }
    var btn = document.getElementById('lb-frame-draw-toggle');
    if (btn) { btn.classList.remove('active'); btn.textContent = '🎨 Draw OFF'; }
  };
  function lbFrameSyncCanvas(forceClear){
    var img = document.getElementById('lb-frame-img');
    var canvas = document.getElementById('lb-frame-canvas');
    if (!img || !canvas) return;
    var w = img.naturalWidth || img.clientWidth || 1280;
    var h = img.naturalHeight || img.clientHeight || 720;
    var sizeChanged = (canvas.width !== w || canvas.height !== h);
    if (sizeChanged) { canvas.width = w; canvas.height = h; }
    if (sizeChanged || forceClear) {
      canvas.getContext('2d').clearRect(0,0,canvas.width,canvas.height);
    }
  }
  window.lbFrameToggleDraw = function(){
    var c = document.getElementById('lb-frame-canvas');
    if (!c) return;
    lbFrameSyncCanvas();
    var active = c.classList.toggle('draw-active');
    c.style.pointerEvents = active ? 'auto' : 'none';
    c.style.cursor = active ? 'crosshair' : '';
    c.style.touchAction = 'none';
    var btn = document.getElementById('lb-frame-draw-toggle');
    btn.classList.toggle('active', active);
    btn.textContent = active ? '✏️ Drawing — tap to stop' : '🎨 Tap to Draw';
  };
  window.lbFrameSetColor = function(c){ lbFrameColor = c; };
  window.lbFrameSetTool = function(t){
    lbFrameTool = t;
    document.querySelectorAll('.lb-frame-toolbar button[id^="lb-frame-tool-"]').forEach(function(b){ b.classList.remove('active'); });
    document.getElementById('lb-frame-tool-' + t).classList.add('active');
    // Update sliders to show current tool's settings
    var sizeSlider = document.getElementById('lb-frame-size-slider');
    var opacSlider = document.getElementById('lb-frame-opacity-slider');
    if (sizeSlider) { sizeSlider.value = lbFrameSizes[t]; document.getElementById('lb-frame-size-val').textContent = lbFrameSizes[t] + 'px'; }
    if (opacSlider) { var op = Math.round(lbFrameAlphas[t]*100); opacSlider.value = op; document.getElementById('lb-frame-opacity-val').textContent = op + '%'; }
  };
  window.lbFrameSetSize = function(v){
    lbFrameSizes[lbFrameTool] = parseInt(v, 10);
    document.getElementById('lb-frame-size-val').textContent = v + 'px';
  };
  window.lbFrameSetOpacity = function(v){
    lbFrameAlphas[lbFrameTool] = parseInt(v, 10) / 100;
    document.getElementById('lb-frame-opacity-val').textContent = v + '%';
  };
  var lbFrameImgOpacity = 1.0;
  var lbFrameBW = false;
  function lbFrameApplyImgFilter(){
    var img = document.getElementById('lb-frame-img');
    if (!img) return;
    var filter = '';
    if (lbFrameBW) filter += 'grayscale(1) ';
    img.style.filter = filter.trim();
    img.style.opacity = lbFrameImgOpacity;
  }
  window.lbFrameSetImgOpacity = function(v){
    lbFrameImgOpacity = parseInt(v, 10) / 100;
    document.getElementById('lb-frame-img-opacity-val').textContent = v + '%';
    lbFrameApplyImgFilter();
  };
  window.lbFrameToggleBW = function(){
    lbFrameBW = !lbFrameBW;
    var btn = document.getElementById('lb-frame-bw-toggle');
    btn.textContent = lbFrameBW ? '◾ Color' : '⬜ B&W';
    btn.classList.toggle('active', lbFrameBW);
    lbFrameApplyImgFilter();
  };
  window.lbFrameSetBgColor = function(c){
    lbFrameBgColor = c;
    var lb = document.getElementById('lb-frame');
    if (lb) lb.style.background = c;
  };
  function lbFrameSnapshot(){
    var canvas = document.getElementById('lb-frame-canvas');
    if (!canvas || !canvas.width) return;
    try {
      lbFrameUndoStack.push(canvas.toDataURL('image/png'));
      if (lbFrameUndoStack.length > LB_FRAME_HISTORY_MAX) lbFrameUndoStack.shift();
      lbFrameRedoStack = []; // new stroke invalidates redo
    } catch(e) {}
  }
  function lbFrameRestore(dataURL){
    var canvas = document.getElementById('lb-frame-canvas');
    if (!canvas) return;
    var ctx = canvas.getContext('2d');
    var img = new Image();
    img.onload = function(){
      ctx.clearRect(0,0,canvas.width,canvas.height);
      ctx.drawImage(img, 0, 0);
    };
    img.src = dataURL;
  }
  window.lbFrameUndo = function(){
    if (lbFrameUndoStack.length === 0) return;
    var canvas = document.getElementById('lb-frame-canvas');
    try { lbFrameRedoStack.push(canvas.toDataURL('image/png')); } catch(e) {}
    var prev = lbFrameUndoStack.pop();
    if (prev) lbFrameRestore(prev);
    else { canvas.getContext('2d').clearRect(0,0,canvas.width,canvas.height); }
  };
  window.lbFrameRedo = function(){
    if (lbFrameRedoStack.length === 0) return;
    var canvas = document.getElementById('lb-frame-canvas');
    try { lbFrameUndoStack.push(canvas.toDataURL('image/png')); } catch(e) {}
    var next = lbFrameRedoStack.pop();
    if (next) lbFrameRestore(next);
  };
  window.lbFrameClear = function(){
    var c = document.getElementById('lb-frame-canvas');
    if (!c) return;
    lbFrameSnapshot();  // allow undo of the clear
    c.getContext('2d').clearRect(0,0,c.width,c.height);
  };
  window.lbFrameSave = function(){
    // Use the existing in-DOM img (already loaded, no CORS re-fetch needed)
    var img = document.getElementById('lb-frame-img');
    var canvas = document.getElementById('lb-frame-canvas');
    if (!img || !img.complete || !img.naturalWidth) {
      alert('Frame image not loaded yet — wait a sec and try again.');
      return;
    }
    var out = document.createElement('canvas');
    out.width = canvas.width; out.height = canvas.height;
    var octx = out.getContext('2d');
    function paintWatermarkAndExport(){
      octx.save();
      octx.fillStyle = 'rgba(60,60,60,0.65)';
      octx.font = '600 13px -apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif';
      octx.textBaseline = 'bottom';
      octx.fillText('DC Study Supply — Dr. David Gramling, PHD', 14, out.height - 10);
      octx.restore();
      var fname = 'fab-201-m01-frame-' + (lbFrameLabel.replace(/[^a-z0-9_-]/gi,'_') || 'annotated') + '.png';
      // Try toBlob first
      var didBlob = false;
      try {
        out.toBlob(function(blob){
          if (!blob) { tryDataURL(); return; }
          didBlob = true;
          var url = URL.createObjectURL(blob);
          var a = document.createElement('a');
          a.href = url; a.download = fname;
          document.body.appendChild(a); a.click(); document.body.removeChild(a);
          URL.revokeObjectURL(url);
        }, 'image/png');
        // toBlob is async; if it threw synchronously we'd be in catch
      } catch(e) {
        tryDataURL();
      }
      function tryDataURL(){
        try {
          var dataURL = out.toDataURL('image/png');
          var a = document.createElement('a');
          a.href = dataURL; a.download = fname;
          document.body.appendChild(a); a.click(); document.body.removeChild(a);
        } catch(e2) {
          alert('Save failed (CORS): the browser blocked exporting the image because it was loaded cross-origin. This works on the live GitHub Pages URL but may fail when opened directly from disk (file://). Try the live URL: dgsc23.github.io/dc-study-tools/');
        }
      }
    }
    try {
      // 1. Paint background color first (if user picked one) — visible when image is transparent
      if (lbFrameBgColor) {
        octx.fillStyle = lbFrameBgColor;
        octx.fillRect(0, 0, out.width, out.height);
      }
      // 2. Draw image with current opacity + B&W filter
      octx.save();
      octx.globalAlpha = lbFrameImgOpacity;
      if (lbFrameBW) octx.filter = 'grayscale(1)';
      octx.drawImage(img, 0, 0, out.width, out.height);
      octx.restore();
      // 3. Draw user's strokes (canvas) at full opacity over the image
      octx.drawImage(canvas, 0, 0, out.width, out.height);
      paintWatermarkAndExport();
    } catch(e) {
      // drawImage tainted the canvas — happens only with CORS-restricted images
      alert('Save blocked by browser CORS rule. This usually means the file was opened from disk (file://) instead of the live URL. Try the live URL: dgsc23.github.io/dc-study-tools/');
    }
  };

  // Mouse + touch handlers (mirrors VSS pattern post-fix)
  var lbFrameCanvas = document.getElementById('lb-frame-canvas');
  if (lbFrameCanvas) {
    function lbFrameGetPos(e){
      var rect = lbFrameCanvas.getBoundingClientRect();
      var t = (e.touches && e.touches.length) ? e.touches[0] : e;
      var rw = rect.width || 1, rh = rect.height || 1;
      var cw = lbFrameCanvas.width || rw, ch = lbFrameCanvas.height || rh;
      var sx = cw / rw, sy = ch / rh;
      return [(t.clientX - rect.left) * sx, (t.clientY - rect.top) * sy];
    }
    function lbFrameDown(e){
      if (!lbFrameCanvas.classList.contains('draw-active')) return;
      e.preventDefault();
      lbFrameSnapshot();  // save state BEFORE this stroke for undo
      lbFrameDrawing = true;
      var p = lbFrameGetPos(e);
      lbFrameLastX = p[0]; lbFrameLastY = p[1];
    }
    function lbFrameMove(e){
      if (!lbFrameDrawing || !lbFrameCanvas.classList.contains('draw-active')) return;
      e.preventDefault();
      var p = lbFrameGetPos(e);
      var ctx = lbFrameCanvas.getContext('2d');
      ctx.strokeStyle = lbFrameColor;
      ctx.lineWidth = lbFrameSizes[lbFrameTool] || 5;
      ctx.globalAlpha = lbFrameAlphas[lbFrameTool] != null ? lbFrameAlphas[lbFrameTool] : (lbFrameTool === 'er' ? 1 : 0.85);
      ctx.globalCompositeOperation = lbFrameTool === 'er' ? 'destination-out' : 'source-over';
      ctx.lineCap = 'round'; ctx.lineJoin = 'round';
      ctx.beginPath(); ctx.moveTo(lbFrameLastX, lbFrameLastY); ctx.lineTo(p[0], p[1]); ctx.stroke();
      lbFrameLastX = p[0]; lbFrameLastY = p[1];
    }
    function lbFrameUp(){ lbFrameDrawing = false; }
    lbFrameCanvas.addEventListener('mousedown', lbFrameDown);
    lbFrameCanvas.addEventListener('mousemove', lbFrameMove);
    lbFrameCanvas.addEventListener('mouseup', lbFrameUp);
    lbFrameCanvas.addEventListener('mouseleave', lbFrameUp);
    window.addEventListener('mouseup', lbFrameUp);
    lbFrameCanvas.addEventListener('touchstart', lbFrameDown, {passive: false});
    lbFrameCanvas.addEventListener('touchmove', lbFrameMove, {passive: false});
    lbFrameCanvas.addEventListener('touchend', lbFrameUp);
  }
})();
</script>

<script id="mc-to-frame-pip-drill-js">
(function(){
  // Lecture routing config — generic across number of lectures so this same code
  // works for GA (2 lectures, 1 boundary) and FAB (3 lectures, 2 boundaries) and
  // any future module. Boundaries are combined-audio split timestamps in seconds.
  // viewers[i] is the URL for lecture i (after boundaries[i-1], up to boundaries[i]).
  var LECTURE_CFG={
  "boundaries": [4800, 10817],
  "viewers": [
    "fab-201-m02-shoulder-forearm-l04-frame-viewer.html",
    "fab-201-m02-shoulder-forearm-l05-frame-viewer.html",
    "fab-201-m02-shoulder-forearm-l06-frame-viewer.html"
  ]
};

  function resolveLecture(combinedTs){
    var boundaries=LECTURE_CFG.boundaries;
    var viewers=LECTURE_CFG.viewers;
    var prev=0;
    for(var i=0;i<boundaries.length;i++){
      if(combinedTs<=boundaries[i]){
        return {idx:i,viewer:viewers[i],relTs:combinedTs-prev};
      }
      prev=boundaries[i];
    }
    var last=boundaries.length;
    return {idx:last,viewer:viewers[last],relTs:combinedTs-prev};
  }

  window.openFrameViewerForCurrentQ=function(){
    if(typeof questions==='undefined'||typeof idx==='undefined'||typeof TIMESTAMPS==='undefined')return;
    var q=questions[idx];
    if(!q)return;
    var bankId=q._bankId;
    if(bankId==null||bankId>=TIMESTAMPS.length)return;
    var ts=TIMESTAMPS[bankId];
    if(!isFinite(ts)||ts<=0)return;
    var routed=resolveLecture(ts);
    if(!routed.viewer)return;
    var url=routed.viewer+'?ts='+routed.relTs.toFixed(1);
    window.open(url,'_blank','noopener,noreferrer');
  };

  // Inject the button into the audio bar's audio-info section AFTER it's built
  function injectButton(){
    var bar=document.getElementById('audio-bar');
    if(!bar)return false;
    if(bar.querySelector('.btn-frame-pip'))return true;
    var info=bar.querySelector('.audio-info');
    if(!info)return false;
    var btn=document.createElement('button');
    btn.className='btn-frame-pip';
    btn.type='button';
    btn.innerHTML='🎞️ Frames + PiP';
    btn.title='Open Frame Viewer at this Q\'s timestamp — draw on the slide while video PiP plays';
    btn.onclick=function(e){e.preventDefault();openFrameViewerForCurrentQ();};
    info.appendChild(btn);
    return true;
  }

  // Audio bar is rebuilt on every render(); inject after each rebuild.
  function watchAndInject(){
    if(injectButton())return;
    // Audio bar not built yet — observe app for changes
    var app=document.getElementById('app');
    if(!app)return;
    var mo=new MutationObserver(function(){
      if(injectButton())mo.disconnect();
    });
    mo.observe(app,{childList:true,subtree:true});
  }

  // Re-inject on every audio-bar attachment (after render() wipes #app)
  setInterval(injectButton,1500);

  if(document.readyState==='complete'||document.readyState==='interactive'){
    setTimeout(watchAndInject,500);
  } else {
    document.addEventListener('DOMContentLoaded',function(){setTimeout(watchAndInject,500);});
  }
})();
</script>

/* Toolbar floats to bottom-right when body has float-toolbar-mode class.
   Conditioned on the toolbar's visibility-trigger class (.show/.active) when
   the surface uses one, so we don't force display:flex on a hidden toolbar.
   NOTE: bottom/right are NOT !important so the JS visualViewport handler can
   override them at zoom > 1.05 (Bug fix 2026-05-10: prior !important blocked

   z-index: 99999 sits above the frame viewer's #lb-frame overlay (z 20000)
   (Bug fix 2026-05-10: prior z 10000 < lightbox 20000 → toolbar invisible). */
body.float-toolbar-mode .lb-frame-toolbar {
    position: fixed !important;
    top: auto !important; left: auto !important;
    bottom: 14px;
    right: 14px;
    z-index: 99999;
    /* max-height leaves room for top-bar UI on each surface so the toolbar's
       top edge doesn't reach into elements like the frame viewer's Exit

    max-height: calc(100vh - 28px - 14px);

    padding: 6px 6px !important;
}

/* When collapsed, the button becomes the pill itself — keep cyan, slightly
   larger square shape so it's still findable when the toolbar shrinks to

body.float-toolbar-mode .lb-frame-toolbar.collapsed #ftExpandBtn {

/* Collapsed state: hide all toolbar children except the expand button.

body.float-toolbar-mode .lb-frame-toolbar.collapsed {
