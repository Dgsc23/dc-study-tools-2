<script id="pill-rebuild-deploy-fab-lightbox-js">
(function() {
    "use strict";
    var TB_SEL    = '.lb-frame-toolbar';
    var TB_TRIG   = null;
    var CANVAS_SEL = '#lb-frame-canvas';
    var BODY_CLASS = 'float-toolbar-mode';
    var LS_KEY    = 'pillFabLightboxCollapsed';
    var TOP_CLEARANCE = 28;

    function tb()     { return document.querySelector(TB_SEL); }
    function fb()     { return document.getElementById('floatingToggle'); }
    function canvas() { return document.querySelector(CANVAS_SEL); }

    function tbVisible() {
        var t = tb(); if (!t) return false;
        // Use getBoundingClientRect rather than offsetParent. Reason: per spec,
        // offsetParent returns null for any element with `position: fixed` —
        // and my pill CSS makes the toolbar position:fixed. So offsetParent
        // would ALWAYS be null on a floating toolbar (whether visible or not),
        // which would break the visibility check and cause updateFloatingPos
        // to return early, breaking zoom-tracking. Bug caught 2026-05-10 after
        // David reported the toolbar didn't follow zoom on the frame viewer.
        // getBoundingClientRect returns a zero rect when the element OR any
        // ancestor has display:none, but a non-zero rect when rendered,
        // regardless of position:fixed/relative/static.
        var rect = t.getBoundingClientRect();
        return rect.width > 0 && rect.height > 0;
    }

    // ---- expand / collapse ----
    function ensureExpandBtn() {
        var t = tb(); if (!t) return;
        if (document.getElementById('ftExpandBtn')) return;
        var btn = document.createElement('button');
        btn.id = 'ftExpandBtn';
        btn.type = 'button';
        btn.title = 'Collapse / expand toolbar';
        btn.setAttribute('aria-label', 'Collapse toolbar');
        var startCollapsed = false;
        try { startCollapsed = localStorage.getItem(LS_KEY) === '1'; } catch (e) {}
        if (startCollapsed) t.classList.add('collapsed');
        btn.innerHTML = startCollapsed ? '&#9998;' : '&#10005;';
        btn.addEventListener('click', function(e) {
            e.preventDefault(); e.stopPropagation();
            var collapsed = t.classList.toggle('collapsed');
            btn.innerHTML = collapsed ? '&#9998;' : '&#10005;';
            btn.setAttribute('aria-label', collapsed ? 'Expand toolbar' : 'Collapse toolbar');
            try { localStorage.setItem(LS_KEY, collapsed ? '1' : '0'); } catch (e2) {}
            requestAnimationFrame(updateFloatingPos);
        });
        if (t.firstChild) t.insertBefore(btn, t.firstChild); else t.appendChild(btn);
    }

    // ---- draw / scroll toggle ----
    var touchDrawMode = true;
    function ensureDrawScrollToggle() {
        if (document.getElementById('floatingToggle')) return;
        var btn = document.createElement('button');
        btn.id = 'floatingToggle';
        btn.type = 'button';
        btn.className = 'draw-mode';
        btn.title = 'Touch = draw — tap to switch to scroll';
        btn.setAttribute('aria-label', 'Toggle draw / scroll mode');
        btn.innerHTML = '&#9998;';
        btn.addEventListener('click', function(e) {
            e.preventDefault(); e.stopPropagation();
            touchDrawMode = !touchDrawMode;
            var c = canvas();
            btn.className = (btn.classList.contains('visible') ? 'visible ' : '') +
                            (touchDrawMode ? 'draw-mode' : 'scroll-mode');
            btn.innerHTML = touchDrawMode ? '&#9998;' : '&#9995;';
            btn.title = touchDrawMode
                ? 'Touch = draw — tap to switch to scroll'
                : 'Touch = scroll — tap to switch to draw';
            if (c) {
                c.style.touchAction = touchDrawMode ? 'none' : 'auto';
                c.style.pointerEvents = touchDrawMode ? '' : 'none';
            }
            requestAnimationFrame(updateFloatingPos);
        });
        document.body.appendChild(btn);
    }

    function syncToggleVisibility() {
        var b = fb(); if (!b) return;
        if (tbVisible()) b.classList.add('visible');
        else b.classList.remove('visible');
    }

    // ---- visual viewport zoom positioning ----
    // Toolbar bottom-right anchored: left = vv.right - margin - w*sc,  top = vv.bottom - margin - h*sc
    // Toggle  bottom-left  anchored: left = vv.left + margin,           top = vv.bottom - margin - h*sc
    // Both use transformOrigin: top left + scale(1/vv.scale).
    function updateFloatingPos() {
        var t = tb();
        var b = fb();
        var tShown = t && tbVisible();
        var bShown = b && b.classList.contains('visible');
        if (!tShown && !bShown) return;
        if (!window.visualViewport) return;
        var vv = window.visualViewport;
        var margin = 14;
        // Snap-back at default zoom — drop inline overrides so CSS rules
        // (max-height + position) take over cleanly.
        if (vv.scale <= 1.05) {
            if (t) {
                t.style.transform = ''; t.style.transformOrigin = '';
                t.style.left = ''; t.style.top = '';
                t.style.right = ''; t.style.bottom = '';
                t.style.maxHeight = '';
            }
            if (b) {
                b.style.transform = ''; b.style.transformOrigin = '';
                b.style.left = ''; b.style.top = '';
                b.style.right = ''; b.style.bottom = '';
            }
            return;
        }
        var sc = 1 / vv.scale;
        if (tShown) {
            // Dynamically clamp toolbar's layout max-height so its VISUAL
            // height fits in the visible viewport with top_clearance + bottom
            // margin. Without this, at heavy zoom (4x+) the toolbar overflows
            // off-screen because CSS `max-height: calc(100vh - Npx)` uses
            // LAYOUT vh, which stays large when zoomed in.
            var maxVisualH = vv.height - TOP_CLEARANCE - margin;
            if (maxVisualH < 60) maxVisualH = 60;  // sanity floor
            var maxLayoutH = maxVisualH / sc;
            t.style.maxHeight = maxLayoutH + 'px';
            // Re-measure AFTER clamping max-height so th reflects the new
            // clamped layout box.
            var tw = t.offsetWidth || 60;
            var th = t.offsetHeight || 200;
            t.style.right = 'auto';
            t.style.bottom = 'auto';
            t.style.left = (vv.offsetLeft + vv.width  - margin - tw * sc) + 'px';
            t.style.top  = (vv.offsetTop  + vv.height - margin - th * sc) + 'px';
            t.style.transform = 'scale(' + sc + ')';
            t.style.transformOrigin = 'top left';
        }
        if (bShown) {
            var bh = b.offsetHeight || 40;
            b.style.right = 'auto';
            b.style.bottom = 'auto';
            b.style.left = (vv.offsetLeft + margin) + 'px';
            b.style.top  = (vv.offsetTop + vv.height - margin - bh * sc) + 'px';
            b.style.transform = 'scale(' + sc + ')';
            b.style.transformOrigin = 'top left';
        }
    }

    function init() {
        document.body.classList.add(BODY_CLASS);
        var t = tb();
        if (!t) { setTimeout(init, 200); return; }
        ensureExpandBtn();
        ensureDrawScrollToggle();
        syncToggleVisibility();
        // Watch class changes that affect toolbar visibility. THREE targets
        // because different surfaces trigger visibility via different
        // elements:
        //   - toolbar itself (.show on slides, .active on VSS/AG)
        //   - toolbar's parent (#lb-frame.open on frame viewers — the
        //     toolbar's own class doesn't change when the lightbox opens)
        //   - document.body (body.annotate-mode on frame viewers — covers
        //     the gap if a future surface scopes visibility on body class)
        // Without the parent + body observers, the frame viewer's toggle
        // stayed hidden because syncToggleVisibility never re-ran after
        // init() — caught 2026-05-10 when David reported the toggle
        // missing on the frame viewer after bugfix #3.
        var mo = new MutationObserver(function(muts) {
            for (var i = 0; i < muts.length; i++) {
                if (muts[i].attributeName === 'class') {
                    syncToggleVisibility();
                    requestAnimationFrame(updateFloatingPos);
                    break;
                }
            }
        });
        mo.observe(t, { attributes: true, attributeFilter: ['class'] });
        if (t.parentElement) {
            mo.observe(t.parentElement, { attributes: true, attributeFilter: ['class'] });
        }
        mo.observe(document.body, { attributes: true, attributeFilter: ['class'] });
        if (window.visualViewport) {
            window.visualViewport.addEventListener('scroll', updateFloatingPos);
            window.visualViewport.addEventListener('resize', updateFloatingPos);
        }
        window.addEventListener('scroll', updateFloatingPos, { passive: true });
        window.addEventListener('resize', updateFloatingPos);
        requestAnimationFrame(updateFloatingPos);
    }

    if (document.readyState === 'complete' || document.readyState === 'interactive') {
        setTimeout(init, 200);
    } else {
        document.addEventListener('DOMContentLoaded', function() { setTimeout(init, 200); });
    }
})();
</script>

<script>
/* DC Drill Telemetry v1
 *
 * Wraps the two globals every DC MC-drill engine exposes — pick(i) and
 * showSummary() — and reports three events through the analytics helper:
 *   drill_started    once, on the first answered question
 *   q_answered       {h, stem, c, t_ms}  first attempt per question per load
 *   drill_completed  {answered, correct, pct, duration_s}
 *
 * Correct/wrong is read back off the option element AFTER the engine marks it,
 * so this never re-implements (or can disagree with) the engine's own scoring.
 * Counters are kept here rather than scraped from the summary markup, which
 * differs between drill families.
 *
 * Families covered:
 *   A  .opt-btn  + picked-correct / picked-wrong  + stem in .q-text
 *   B  .option   + correct        / wrong         + stem in .question
 *
 * No-ops safely if the helper or the engine globals are absent.
 */
(function () {
  'use strict';
  if (window.__dcDrillTelemetry) return;
  window.__dcDrillTelemetry = true;

  var OPT_SEL = '.opt-btn, .option';
  var STEM_SEL = '.q-text, .question';
  var OK_CLASSES = ['picked-correct', 'correct'];
  var BAD_CLASSES = ['picked-wrong', 'wrong'];

  var started = false;
  var completed = false;
  var startTs = Date.now();
  var shownTs = Date.now();
  var seen = {};            // stem-hash -> true; first attempt only
  var answered = 0;
  var correct = 0;
  var totalQ = null;

  function send(type, payload) {
    try {
      if (window.__dcAnalytics && window.__dcAnalytics.send) {
        window.__dcAnalytics.send(type, payload);
      }
    } catch (e) {}
  }

  // djb2. Case/punctuation/whitespace-insensitive so the id survives the
  // engine's shuffling and re-rendering.
  function stemHash(s) {
    var h = 5381;
    var t = (s || '').toLowerCase().replace(/[^a-z0-9]+/g, ' ').trim();
    for (var i = 0; i < t.length; i++) { h = ((h << 5) + h + t.charCodeAt(i)) >>> 0; }
    return ('00000000' + h.toString(16)).slice(-8);
  }

  // Family A prefixes the stem with "Q3 of 217: " — strip it, or the same
  // question hashes differently depending on where the shuffle put it.
  function readStem() {
    var el = document.querySelector(STEM_SEL);
    if (!el) return '';
    var raw = (el.textContent || '').replace(/\s+/g, ' ').trim();
    var m = raw.match(/^Q(\d+)\s+of\s+(\d+)\s*:\s*/i);
    if (m) { totalQ = parseInt(m[2], 10); raw = raw.slice(m[0].length); }
    return raw.trim();
  }

  // djb2 over the exact string (no normalization) — used to fingerprint image
  // bytes, where case and punctuation are significant.
  function rawHash(s) {
    var h = 5381;
    for (var i = 0; i < s.length; i++) { h = ((h << 5) + h + s.charCodeAt(i)) >>> 0; }
    return ('00000000' + h.toString(16)).slice(-8);
  }

  // Visual drills reuse one generic stem ("Identify the indicated structure.")
  // across every plate — the image is what distinguishes them. Fold an image
  // id into the hash so those questions don't collapse into one row.
  //
  // Plates are usually inlined as base64 data: URIs, where a "filename" is
  // meaningless (and its tail is a 1-2 char near-collision). For those,
  // fingerprint the bytes: length + head + tail, since same-encoder JPEGs can
  // share a long common prefix.
  function readImg() {
    var el = document.querySelector(STEM_SEL);
    if (!el) return '';
    var scope = (el.closest && el.closest('.card')) || el.parentElement;
    var img = scope && scope.querySelector ? scope.querySelector('img') : null;
    var src = img ? (img.getAttribute('src') || '') : '';
    if (!src) return '';
    if (/^data:/i.test(src)) {
      return 'd:' + rawHash(src.length + '|' + src.slice(0, 2000) + '|' + src.slice(-2000));
    }
    return src.split('?')[0].split('/').pop().slice(0, 60);
  }

  function hasToken(el, names) {
    for (var i = 0; i < names.length; i++) {
      if (el.classList.contains(names[i])) return true;
    }
    return false;
  }

  // A third engine family exists whose handler is pick(optionIndex, isCorrect)
  // and which has no showSummary(). Its marking semantics differ, so refuse to
  // wrap anything that isn't the single-argument pick(i) contract rather than
  // guess and mis-score it.
  var origPick = window.pick;
  if (typeof origPick === 'function' && origPick.length === 1) {
    window.pick = function (i) {
      var opts = document.querySelectorAll(OPT_SEL);
      // The engine early-returns when the question is already answered
      // (options carry .disabled). Mirror that test so a second click on an
      // answered question doesn't log a phantom attempt.
      var alreadyAnswered = !!(opts[0] && opts[0].classList.contains('disabled'));
      var stem = readStem();
      var img = readImg();

      var ret = origPick.apply(this, arguments);

      try {
        // Do NOT assume the argument is the DOM position. At least one engine
        // shuffles the option buttons and paints by a data-orig attribute, so
        // pick(origIdx) indexes the original bank, not the rendered order.
        // Instead, find whichever option the engine just marked — correct by
        // construction for every single-argument family.
        //
        // The engine also puts 'show-correct' on the right answer when you miss;
        // that's a distinct class token, so it never matches 'correct' here.
        var el = null;
        var after = document.querySelectorAll(OPT_SEL);
        for (var k = 0; k < after.length; k++) {
          if (hasToken(after[k], OK_CLASSES) || hasToken(after[k], BAD_CLASSES)) { el = after[k]; break; }
        }
        if (!alreadyAnswered && el && stem) {
          var isOk = hasToken(el, OK_CLASSES);
          var isBad = hasToken(el, BAD_CLASSES);
          if (isOk || isBad) {
            var h = stemHash(stem + '|' + img);
            if (!seen[h]) {
              seen[h] = true;
              answered++;
              if (isOk) correct++;
              if (!started) {
                started = true;
                send('drill_started', { total_q: totalQ });
              }
              send('q_answered', {
                h: h,
                stem: stem.slice(0, 80),
                img: img || undefined,
                c: isOk ? 1 : 0,
                t_ms: Math.min(Date.now() - shownTs, 600000)
              });
            }
            shownTs = Date.now();
          }
        }
      } catch (e) {}
      return ret;
    };
  }

  var origSummary = window.showSummary;
  if (typeof origSummary === 'function') {
    window.showSummary = function () {
      var ret = origSummary.apply(this, arguments);
      try {
        if (!completed && answered > 0) {
          completed = true;
          send('drill_completed', {
            answered: answered,
            correct: correct,
            pct: Math.round(100 * correct / answered),
            total_q: totalQ,
            duration_s: Math.min(Math.round((Date.now() - startTs) / 1000), 36000)
          });
        }
      } catch (e) {}
      return ret;
    };
  }
})();

</script>
