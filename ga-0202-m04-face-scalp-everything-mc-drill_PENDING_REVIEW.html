<script>
const BANK=[{"q": "A patient sustains a scalp injury and develops a spreading collection of blood beneath the scalp. In which layer of the scalp do such collections of blood or pus most readily accumulate?", "o": ["The epicranial aponeurosis (galea aponeurotica)", "The dense connective tissue (subcutaneous) layer", "The loose areolar connective tissue layer", "The pericranium"], "c": 2, "cat": "Scalp — Layers (SCALP)", "r": ["The aponeurosis is a tough tendinous sheet; it does not provide the loose space where fluid pools.", "The dense subcutaneous connective tissue is tightly packed with fibrous septa and resists fluid spread.", "Correct. The 4th layer, loose areolar connective tissue, is loosely arranged with abundant potential space, so pus (folliculitis/furunculosis) and blood/haematoma readily collect there.", "The pericranium is the periosteum adherent to bone; collections here are limited by suture attachments."], "source": "L07 - SCALP layers", "quote": "[Maini] 'Along this layer you can have collections like pus... and there can be haematoma formation in that layer.'", "obj": "Scalp - 5 layers & the loose areolar layer", "hint": "Which layer has the most free space?"}, {"q": "An infection in which layer of the scalp is most likely to spread easily and be described as the 'danger area of the scalp'?", "o": ["Aponeurosis", "Loose areolar connective tissue", "Connective tissue", "Skin"], "c": 1, "cat": "Scalp — Layers (SCALP)", "r": ["The aponeurosis is the tendon layer; Maini noted this was the common wrong answer and stressed it is NOT where infection spreads.", "Correct. The loose areolar layer has abundant space, so infection spreads easily within it; it is the layer of scalping avulsion and is called the danger area of the scalp.", "The dense connective tissue layer is firmly bound and resists spread.", "Skin is the tough outer layer and does not permit easy spread of infection."], "source": "L08 - in-class review Q - scalp layers", "obj": "Scalp - danger area / loose areolar layer", "hint": "Maini's poll: only ~23 of the class got this right."}, {"q": "In the mnemonic SCALP, what does the letter 'A' stand for?", "o": ["Aponeurosis - the epicranial aponeurosis (galea aponeurotica)", "Arteries of the scalp", "Adipose tissue", "Areolar loose connective tissue"], "c": 0, "cat": "Scalp — Layers (SCALP)", "r": ["Correct. 'A' is the aponeurotic layer, the epicranial aponeurosis (galea aponeurotica), which is dense connective tissue continuous with occipitofrontalis.", "Arteries run in the connective tissue layer but are not a named SCALP layer.", "Adipose (fibro-fatty) tissue is part of the 2nd layer, the subcutaneous connective tissue.", "The loose areolar tissue is the 4th layer ('L'), not 'A'."], "source": "L07 - SCALP layers", "obj": "Scalp - SCALP mnemonic", "hint": "Galea = ___."}, {"q": "The 3rd layer of the scalp (the aponeurotic layer) is chiefly formed by which muscle together with its intervening tendinous sheet?", "o": ["Temporalis", "Corrugator supercilii", "Orbicularis oculi", "Occipitofrontalis"], "c": 3, "cat": "Scalp — Layers (SCALP)", "r": ["Temporalis is a muscle of mastication in the temporal fossa, not part of the scalp aponeurotic layer.", "Corrugator supercilii lies deep to the eyebrow, not in the scalp proper.", "Orbicularis oculi is a facial muscle around the eye, not part of the scalp.", "Correct. The aponeurotic layer is made up of occipitofrontalis (frontal and occipital bellies) connected by the epicranial aponeurosis."], "source": "L07 - SCALP layers / occipitofrontalis", "obj": "Scalp - aponeurotic layer composition", "hint": "Frontal belly + occipital belly + galea."}, {"q": "The deepest layer of the scalp, the pericranium, corresponds to which structure?", "o": ["The dura mater", "The diploe of the skull", "The epicranial aponeurosis", "The periosteum of the skull bones"], "c": 3, "cat": "Scalp — Layers (SCALP)", "r": ["Dura mater lies inside the cranial cavity, deep to the bone, and is not a scalp layer.", "The diploe is the spongy bone between the inner and outer tables of the skull, not the pericranium.", "The epicranial aponeurosis is the 3rd layer, superficial to the loose areolar tissue.", "Correct. Pericranium is the periosteum covering the outer surface of the skull bones and is the 5th (deepest) scalp layer."], "source": "L07 - SCALP layers", "obj": "Scalp - pericranium = periosteum", "hint": "P = periosteum of bone."}, {"q": "During a 'scalping' avulsion the outer three layers of the scalp are torn away from the skull as a single sheet. Along which plane does this separation occur?", "o": ["Through the epicranial aponeurosis itself", "Between the pericranium and the outer table of bone", "The loose areolar connective tissue layer, between the aponeurosis and the pericranium", "Between the skin and the subcutaneous tissue"], "c": 2, "cat": "Scalp — Layers (SCALP)", "r": ["The aponeurosis is a tough continuous sheet that is avulsed intact, not split through.", "Pericranium normally stays attached to bone; the plane of avulsion is superficial to it.", "Correct. The outer three layers (skin, connective tissue, aponeurosis) are bound together and separate from the pericranium along the loose areolar layer.", "Skin and subcutaneous tissue are firmly adherent and do not separate from one another."], "source": "L07 - SCALP clinical", "quote": "[Maini] 'You can actually separate outer three layers from periosteum along this layer.'", "obj": "Scalp - plane of avulsion", "hint": "The 'movable' plane you feel when you wiggle your scalp."}, {"q": "The scalp proper extends between which two bony landmarks?", "o": ["From the superior nuchal lines posteriorly to the supraorbital margins anteriorly", "From the inion to the mental protuberance", "From the external occipital protuberance to the nasion", "From the mastoid processes to the zygomatic arches"], "c": 0, "cat": "Scalp — Layers (SCALP)", "r": ["Correct. Maini defined the scalp as covering from the superior nuchal lines behind to the supraorbital margins in front.", "The mental protuberance is on the chin, far below the scalp.", "The occipital protuberance and nasion are midline points, not the stated boundaries of the whole scalp.", "Mastoid processes and zygomatic arches are lateral landmarks unrelated to the anterior-posterior extent she gave."], "source": "L07 - Scalp extent", "obj": "Scalp - boundaries", "hint": "Nuchal lines behind, brow ridge in front."}, {"q": "Which three layers of the scalp are so firmly bound together that they move as a single unit?", "o": ["Aponeurosis, loose areolar tissue, and pericranium", "Connective tissue, aponeurosis, and loose areolar tissue", "Skin, loose areolar tissue, and pericranium", "Skin, connective (subcutaneous) tissue, and aponeurosis"], "c": 3, "cat": "Scalp — Layers (SCALP)", "r": ["The pericranium stays on the bone; it does not move with the outer sheet.", "The loose areolar layer is the mobile plane; it is not part of the firmly-bound unit.", "The loose areolar tissue and pericranium are the deep layers that stay behind during avulsion.", "Correct. The first three layers (S, C, A) are tightly bound and move together over the loose areolar layer."], "source": "L07 - SCALP layers", "obj": "Scalp - first three layers move as one", "hint": "The letters S-C-A."}, {"q": "The supratrochlear and supraorbital arteries that supply the anterior scalp are ultimately derived from which parent artery?", "o": ["The maxillary artery", "The facial artery", "The external carotid artery (via the superficial temporal artery)", "The internal carotid artery (via the ophthalmic artery)"], "c": 3, "cat": "Scalp — Vessels & Nerves", "r": ["The maxillary artery supplies deep face structures, not the supraorbital/supratrochlear territory.", "The facial artery supplies the face; the supraorbital/supratrochlear vessels come from the ophthalmic.", "The superficial temporal, posterior auricular and occipital arteries are the external carotid contributions to the scalp, not these two.", "Correct. Supratrochlear and supraorbital arteries are branches of the ophthalmic artery, which arises from the internal carotid artery."], "source": "L07 - Scalp arterial supply", "quote": "[Maini] 'Supraorbital and supratrochlear are branches of ophthalmic, which is a branch of internal carotid.'", "obj": "Scalp - arteries from ICA vs ECA", "hint": "They exit the orbit."}, {"q": "Which three scalp arteries are branches of the EXTERNAL carotid artery?", "o": ["Supraorbital, supratrochlear, and dorsal nasal", "Superficial temporal, posterior auricular, and occipital", "Ophthalmic, lacrimal, and infraorbital", "Facial, maxillary, and lingual"], "c": 1, "cat": "Scalp — Vessels & Nerves", "r": ["Supraorbital, supratrochlear and dorsal nasal are ophthalmic (internal carotid) branches.", "Correct. The superficial temporal, posterior auricular and occipital arteries are the three external-carotid branches supplying the scalp.", "Ophthalmic and lacrimal are internal-carotid-derived; infraorbital is from the maxillary artery.", "Facial, maxillary and lingual are external carotid branches but supply the face/deep regions, not named as the scalp trio."], "source": "L07 - Scalp arterial supply", "obj": "Scalp - ECA branches (3)", "hint": "Think of the sides and back of the head."}, {"q": "Sensory innervation to most of the face and scalp - the 'sensory nerve of the head and neck' - is provided by which cranial nerve?", "o": ["The glossopharyngeal nerve (CN IX)", "The vagus nerve (CN X)", "The trigeminal nerve (CN V)", "The facial nerve (CN VII)"], "c": 2, "cat": "Scalp — Vessels & Nerves", "r": ["The glossopharyngeal nerve carries taste/sensation from the posterior tongue and pharynx, not the face skin generally.", "The vagus supplies pharynx, larynx and viscera, not the general sensation of facial skin.", "Correct. Maini stressed that general sensation of most head and neck (term-2) structures is trigeminal (CN V).", "The facial nerve is the MOTOR nerve of the muscles of facial expression, not the general sensory nerve of the face."], "source": "L07 - Scalp/face sensation", "obj": "Trigeminal = sensory nerve of face & scalp", "hint": "Three divisions."}, {"q": "The supratrochlear and supraorbital sensory nerves of the anterior scalp are branches of which division of the trigeminal nerve?", "o": ["The cervical plexus", "V1 (ophthalmic)", "V2 (maxillary)", "V3 (mandibular)"], "c": 1, "cat": "Scalp — Vessels & Nerves", "r": ["The cervical plexus supplies the posterior scalp (lesser occipital), not the supraorbital region.", "Correct. Supratrochlear and supraorbital nerves are branches of V1, the ophthalmic division.", "V2 (maxillary) supplies mid-face; the zygomaticotemporal nerve is its scalp contribution.", "V3 (mandibular) supplies the temporal scalp via the auriculotemporal nerve, not these two."], "source": "L07 - Scalp sensory nerves", "obj": "Scalp - V1 supraorbital/supratrochlear", "hint": "Same division as the eye."}, {"q": "The auriculotemporal nerve, which supplies sensation to part of the temporal scalp, is a branch of which trigeminal division?", "o": ["V3 (mandibular)", "The facial nerve", "V2 (maxillary)", "V1 (ophthalmic)"], "c": 0, "cat": "Scalp — Vessels & Nerves", "r": ["Correct. The auriculotemporal nerve is a branch of V3, the mandibular division.", "The facial nerve is motor to facial muscles; auriculotemporal is sensory and belongs to V3.", "V2 gives the zygomaticotemporal nerve to the scalp, not the auriculotemporal.", "V1 supplies the anterior scalp (supraorbital/supratrochlear), not the auriculotemporal territory."], "source": "L07 - Scalp sensory nerves", "obj": "Scalp - V3 auriculotemporal", "hint": "Mandibular division."}, {"q": "The zygomaticotemporal nerve contributing sensation to the scalp is a branch of which trigeminal division?", "o": ["V2 (maxillary)", "V3 (mandibular)", "V1 (ophthalmic)", "The cervical plexus"], "c": 0, "cat": "Scalp — Vessels & Nerves", "r": ["Correct. The zygomaticotemporal nerve is a branch of V2, the maxillary division.", "V3 gives the auriculotemporal nerve, not the zygomaticotemporal.", "V1 gives supraorbital/supratrochlear, not the zygomaticotemporal.", "The cervical plexus supplies the occipital scalp, not this maxillary branch."], "source": "L07 - Scalp sensory nerves", "obj": "Scalp - V2 zygomaticotemporal", "hint": "Maxillary division."}, {"q": "The lesser occipital nerve, which supplies the posterolateral scalp, has which root value and origin?", "o": ["C2-C3, from the dorsal rami", "T1-T2, from the sympathetic chain", "C2-C3, from the cervical plexus (ventral rami)", "A branch of the trigeminal nerve"], "c": 2, "cat": "Scalp — Vessels & Nerves", "r": ["The greater and third occipital nerves - not the lesser occipital - arise from dorsal rami of C2/C3.", "T1-T2 is the sympathetic outflow to the head, not a cutaneous scalp nerve.", "Correct. The lesser occipital nerve arises from the cervical plexus (ventral rami of C2-C3).", "The trigeminal supplies the anterior scalp; the posterior scalp is supplied by cervical nerves."], "source": "L07 - Scalp sensory nerves (posterior)", "obj": "Scalp - lesser occipital C2-C3", "hint": "Cervical plexus, ventral rami."}, {"q": "The greater occipital and third occipital nerves supplying the midline posterior scalp arise from which source?", "o": ["The ventral rami of C2 and C3 (cervical plexus)", "The mandibular division of the trigeminal", "The dorsal rami of C2 and C3", "The facial nerve"], "c": 2, "cat": "Scalp — Vessels & Nerves", "r": ["The lesser occipital nerve comes from ventral rami (cervical plexus); greater/third occipital come from dorsal rami.", "The trigeminal supplies the anterior scalp, not the posterior midline.", "Correct. The greater occipital and third occipital nerves arise from the dorsal rami of C2 and C3, supplying the middle of the posterior scalp.", "The facial nerve is motor to facial muscles, not sensory to the scalp."], "source": "L07 - Scalp sensory nerves (posterior)", "obj": "Scalp - greater/third occipital = dorsal rami", "hint": "Middle of the back of the scalp."}, {"q": "Venous blood from the anterior scalp (supratrochlear and supraorbital veins) drains into the facial vein and ultimately reaches which large vein?", "o": ["The external jugular vein directly", "The subclavian vein", "The internal jugular vein (via the common facial vein)", "The cavernous sinus only"], "c": 2, "cat": "Scalp — Vessels & Nerves", "r": ["The external jugular vein drains the superficial temporal/posterior auricular territory; the facial vein goes to the internal jugular.", "The subclavian vein receives the external jugular but is not the direct route for the facial vein.", "Correct. Supratrochlear and supraorbital veins drain to the facial vein, which joins the anterior division of the retromandibular vein to form the common facial vein, draining into the internal jugular vein.", "The cavernous sinus is a dangerous connection of the facial vein, but the normal venous drainage is to the internal jugular."], "source": "L07 - Scalp venous drainage", "obj": "Scalp/face - facial vein to IJV", "hint": "Common facial vein is the clue."}, {"q": "The superficial temporal vein joins which vein to help form the retromandibular vein?", "o": ["The internal jugular vein", "The posterior auricular vein", "The facial vein", "The maxillary vein"], "c": 3, "cat": "Scalp — Vessels & Nerves", "r": ["The internal jugular is the deep vein that ultimately receives this drainage, not a former of the retromandibular.", "The posterior auricular vein joins the posterior division of the retromandibular vein to form the external jugular.", "The facial vein joins the anterior division of the retromandibular vein later, but does not form it.", "Correct. The superficial temporal vein unites with the maxillary vein to form the retromandibular vein."], "source": "L07 - Scalp venous drainage", "obj": "Scalp - retromandibular vein formation", "hint": "Superficial temporal + maxillary."}, {"q": "Why do even minor scalp lacerations tend to bleed profusely?", "o": ["The scalp has no arterial supply, only fragile veins", "The scalp arteries anastomose richly, so both cut ends of a vessel bleed", "The scalp arteries lack any connection to the carotid system", "The vessels lie within bone and cannot retract"], "c": 1, "cat": "Scalp — Clinical", "r": ["The scalp is very vascular with a robust arterial supply, not veins alone.", "Correct. The scalp is highly vascular with rich anastomoses, so blood flows from both cut ends of a divided vessel, producing profuse bleeding.", "Scalp vessels are branches of the internal and external carotid systems, which are richly connected.", "Scalp vessels lie in the connective-tissue layer, not within bone."], "source": "L07 - Scalp clinical", "quote": "[Maini] 'On the scalp you have blood flowing from both directions... because there is connection between the arteries.'", "obj": "Scalp - profuse bleeding from anastomoses", "hint": "Cut ends bleed from both sides."}, {"q": "A laceration of the scalp that runs from side to side (transverse) tends to gape widely. What explains this?", "o": ["The pericranium contracts and everts the edges", "The aponeurosis fibers run transversely and close the wound", "The epicranial aponeurosis fibers run longitudinally and pull the wound edges apart", "The skin of the scalp is unusually elastic"], "c": 2, "cat": "Scalp — Clinical", "r": ["The pericranium is deep and does not cause the superficial wound to gape.", "The fibers run longitudinally, not transversely; if they ran transversely a transverse wound would not gape.", "Correct. The aponeurotic (galea) fibers are oriented longitudinally (antero-posteriorly); a transverse cut is pulled open along the fiber direction, so the wound gapes.", "Gaping is due to aponeurosis fiber direction, not skin elasticity."], "source": "L07 - Scalp clinical", "obj": "Scalp - why transverse wounds gape", "hint": "Galea fibers run front-to-back."}, {"q": "Scalp wounds are noted to heal remarkably well. Maini attributed this primarily to which feature of the scalp?", "o": ["Its rich vascularity", "Its thick keratinized skin", "Its lack of nerve supply", "The tightness of the pericranium"], "c": 0, "cat": "Scalp — Clinical", "r": ["Correct. Because the scalp is richly vascular, wounds there heal promptly and well.", "Skin thickness is not the reason Maini gave for good healing.", "The scalp is well innervated; nerve supply is not the reason for good healing.", "Pericranial tightness relates to bone, not to the rapid healing of scalp wounds."], "source": "L07 - Scalp clinical", "obj": "Scalp - good healing from vascularity", "hint": "Same reason it bleeds a lot."}, {"q": "What is the single feature common to ALL muscles of facial expression that Maini said makes them easy to study as a group?", "o": ["They all arise from the mandible", "They are all innervated by the facial nerve (CN VII)", "They are all innervated by the trigeminal nerve (CN V)", "They all insert into bone"], "c": 1, "cat": "Muscles of Facial Expression — General", "r": ["They arise mostly from various skull bones, not all from the mandible.", "Correct. Every muscle of facial expression is innervated by the facial nerve (CN VII) - the common feature.", "The trigeminal is the sensory nerve of the face and motor to the muscles of mastication, not the facial expression muscles.", "They characteristically insert into the SKIN of the face, not into bone."], "source": "L07 - Facial muscles - general", "quote": "[Maini] 'What is one thing common between the muscles of facial expression? Innervation, seventh nerve, facial nerve.'", "obj": "Facial muscles - all CN VII", "hint": "The nerve, not the bone."}, {"q": "From which embryological structure do the muscles of facial expression develop?", "o": ["The third pharyngeal arch", "The second pharyngeal (branchial) arch", "The first pharyngeal arch", "Occipital somites"], "c": 1, "cat": "Muscles of Facial Expression — General", "r": ["The third arch gives stylopharyngeus, supplied by CN IX.", "Correct. All muscles of facial expression originate from the second pharyngeal arch, which is why the facial nerve (nerve of the 2nd arch) supplies them.", "The first arch gives the muscles of mastication, supplied by V3.", "Occipital somites give rise to tongue muscles, supplied by CN XII."], "source": "L07 - Facial muscles - general", "obj": "Facial muscles - 2nd arch derivatives", "hint": "Same arch as CN VII."}, {"q": "Which general statement about the muscles of facial expression is correct?", "o": ["They lie within the superficial fascia and insert into the skin of the face", "They are enclosed in tendon sheaths like the hand muscles", "They lie deep to the deep fascia and insert into bone", "They have no bony attachments at all"], "c": 0, "cat": "Muscles of Facial Expression — General", "r": ["Correct. The facial muscles lie within the superficial fascia; they arise mostly from skull bones and insert into the skin, which is how they move the face.", "They are not enclosed in tendon sheaths.", "They are superficial, not deep to the deep fascia, and they insert into skin, not bone.", "They do have bony origins (mostly from skull bones); it is their insertion that is into skin."], "source": "L07 - Facial muscles - general", "obj": "Facial muscles - superficial fascia, skin insertion", "hint": "They move the skin."}, {"q": "The facial nerve carries which functional fiber type to the muscles of facial expression?", "o": ["GVE (general visceral efferent, parasympathetic)", "SVE (special visceral efferent / branchial motor)", "SSA (special somatic afferent)", "GSA (general somatic afferent)"], "c": 1, "cat": "Muscles of Facial Expression — General", "r": ["GVE (parasympathetic) fibers of CN VII go to glands (lacrimal, submandibular, sublingual), not the facial muscles.", "Correct. The motor branches to the facial muscles carry SVE fibers, because the muscles are branchial-arch (pharyngeal arch) derivatives.", "SSA fibers serve special senses like vision and hearing, not facial muscles.", "GSA fibers carry general sensation; the trigeminal carries these to facial skin."], "source": "L08 - Facial nerve - fiber types", "obj": "Facial muscles - SVE fibers", "hint": "Branchial motor."}, {"q": "Botulinum toxin ('Botox'), produced by Clostridium botulinum, reduces facial wrinkles by which mechanism?", "o": ["It blocks neuromuscular transmission (acetylcholine action), paralyzing the muscle", "It thickens the subcutaneous fat pad", "It stimulates the facial nerve to contract the muscle", "It dissolves collagen fibers in the dermis"], "c": 0, "cat": "Muscles of Facial Expression — General", "r": ["Correct. Botulinum toxin blocks neuromuscular transmission by preventing acetylcholine action at the receptor, paralyzing the muscle so it cannot form expression wrinkles.", "It does not thicken fat; it paralyzes muscle.", "It blocks, rather than stimulates, transmission - the opposite of contraction.", "It does not dissolve collagen; it acts at the neuromuscular junction."], "source": "L07 - Facial muscles - Botox", "quote": "[Maini] 'It blocks neuromuscular transmission... blocks the receptors where acetylcholine should be binding.'", "obj": "Facial muscles - Botox mechanism", "hint": "It acts at the NMJ."}, {"q": "Horizontal (transverse) wrinkling of the forehead and elevation of the eyebrows - the 'surprised' look - is produced by which muscle?", "o": ["Corrugator supercilii", "The frontal belly of occipitofrontalis", "Procerus", "Nasalis"], "c": 1, "cat": "Muscles of Facial Expression — Specific", "r": ["Corrugator supercilii draws the eyebrows medially and produces VERTICAL wrinkling (frowning).", "Correct. The frontal belly of occipitofrontalis elevates the eyebrows and produces transverse (horizontal) wrinkling of the forehead.", "Procerus pulls down the medial eyebrows and wrinkles the skin over the nose.", "Nasalis compresses or dilates the nostrils; it does not wrinkle the forehead."], "source": "L08 - in-class review Q - facial muscles", "obj": "Facial muscles - occipitofrontalis (frontal belly)", "hint": "The 'raise your eyebrows' muscle."}, {"q": "Vertical wrinkling of the forehead (as in frowning), produced by drawing the eyebrows medially, is the action of which muscle?", "o": ["Orbicularis oculi", "Frontal belly of occipitofrontalis", "Procerus", "Corrugator supercilii"], "c": 3, "cat": "Muscles of Facial Expression — Specific", "r": ["Orbicularis oculi is the sphincter that closes the eye.", "The frontal belly of occipitofrontalis produces horizontal wrinkling, not vertical.", "Procerus produces transverse wrinkles at the root of the nose and pulls the medial eyebrow down, not the vertical forehead furrows.", "Correct. Corrugator supercilii draws the eyebrows medially and produces vertical wrinkling of the forehead."], "source": "L07 - Facial muscles - corrugator supercilii", "obj": "Facial muscles - corrugator (vertical wrinkles)", "hint": "The frown-line muscle between the brows."}, {"q": "Which muscle of facial expression is the sphincter of the eye and is responsible for closing the eyelid?", "o": ["Levator palpebrae superioris", "Frontal belly of occipitofrontalis", "Corrugator supercilii", "Orbicularis oculi"], "c": 3, "cat": "Muscles of Facial Expression — Specific", "r": ["Levator palpebrae superioris OPENS the eye and is NOT a muscle of facial expression (CN III).", "The frontal belly elevates the eyebrow, it does not close the eye.", "Corrugator supercilii draws the eyebrows medially; it does not close the eye.", "Correct. Orbicularis oculi is the sphincter of the eye and closes the eyelid; it is a muscle of facial expression (CN VII)."], "source": "L07/L08 - in-class review Q - orbicularis oculi", "obj": "Facial muscles - orbicularis oculi closes eye", "hint": "Orbit = around the eye."}, {"q": "Which muscle OPENS the eye by elevating the upper eyelid - and, importantly, is NOT a muscle of facial expression?", "o": ["Levator palpebrae superioris (CN III)", "Orbicularis oculi (CN VII)", "Corrugator supercilii (CN VII)", "The superior tarsal muscle of orbicularis"], "c": 0, "cat": "Muscles of Facial Expression — Specific", "r": ["Correct. Levator palpebrae superioris elevates the upper eyelid to open the eye and is innervated by CN III (oculomotor); it is not a facial-expression muscle.", "Orbicularis oculi CLOSES the eye and is a CN VII facial muscle.", "Corrugator supercilii is a CN VII facial muscle that moves the eyebrow, not the eye-opener.", "The superior tarsal (Muller) muscle assists lid elevation but is smooth muscle and is not the named eye-opener Maini contrasted with orbicularis oculi."], "source": "L07 - Facial muscles - LPS vs orbicularis", "obj": "LPS opens eye, CN III, not a facial muscle", "hint": "Levator = to lift, and it's CN III."}, {"q": "Which muscle acts as the sphincter of the mouth, allowing you to whistle or pout by closing/compressing the lips?", "o": ["Orbicularis oris", "Buccinator", "Zygomaticus major", "Risorius"], "c": 0, "cat": "Muscles of Facial Expression — Specific", "r": ["Correct. Orbicularis oris encircles the oral orifice and compresses/closes the lips (whistling, pouting).", "Buccinator compresses the cheek against the teeth; it is not the lip sphincter.", "Zygomaticus major pulls the angle of the mouth up and laterally (smiling).", "Risorius is the 'grin' muscle that pulls the angle of the mouth laterally."], "source": "L08 - Facial muscles - orbicularis oris", "obj": "Facial muscles - orbicularis oris", "hint": "The 'selfie pout' muscle."}, {"q": "Which facial muscle is known as the 'trumpeter's muscle' and compresses the cheek against the teeth during chewing and blowing?", "o": ["Risorius", "Buccinator", "Orbicularis oris", "Masseter"], "c": 1, "cat": "Muscles of Facial Expression — Specific", "r": ["Risorius is the grin muscle acting at the angle of the mouth.", "Correct. Buccinator (the trumpeter's muscle) compresses the cheek against the teeth, keeping food between the grinding surfaces; it is pierced by the parotid duct.", "Orbicularis oris is the lip sphincter, not the cheek compressor.", "Masseter is a muscle of mastication (elevates the mandible), not a facial-expression muscle."], "source": "L08 - in-class review Q - buccinator", "quote": "[Maini] 'Also called as trumpeteer's muscle, because you need to do that action to play your trumpet.'", "obj": "Facial muscles - buccinator = trumpeter's muscle", "hint": "Think of blowing a trumpet."}, {"q": "The buccinator muscle takes origin from which structures?", "o": ["The nasal bone and frontal process of the maxilla", "The zygomatic arch and the coronoid process", "The medial palpebral ligament and tarsal plate", "The alveolar margins of the maxilla and mandible (opposite the molars) and the pterygomandibular raphe"], "c": 3, "cat": "Muscles of Facial Expression — Specific", "r": ["The nasal bone and frontal process of the maxilla relate to procerus and nasalis, not buccinator.", "The zygomatic arch/coronoid process are attachments of masseter and temporalis, not buccinator.", "The medial palpebral ligament and tarsal plate relate to orbicularis oculi.", "Correct. Buccinator arises from the alveolar margins of the maxilla and mandible opposite the molar teeth and from the pterygomandibular raphe."], "source": "L08 - Facial muscles - buccinator origin", "obj": "Buccinator origin - alveolar margins + pterygomandibular raphe", "hint": "A white raphe and the tooth-bearing margins."}, {"q": "The parotid duct pierces which muscle to open into the oral cavity?", "o": ["Orbicularis oris", "Buccinator", "Zygomaticus major", "Masseter"], "c": 1, "cat": "Muscles of Facial Expression — Specific", "r": ["The duct does not pierce orbicularis oris.", "Correct. The parotid duct pierces the buccinator, a useful identification feature of that muscle.", "The duct does not pierce zygomaticus major.", "The duct crosses superficial to the masseter but pierces the buccinator, not the masseter."], "source": "L08 - Facial muscles / parotid duct", "obj": "Buccinator pierced by parotid duct", "hint": "How Maini says to identify buccinator."}, {"q": "Paralysis of the buccinator muscle would most likely produce which sign?", "o": ["Food and saliva accumulating in the cheek vestibule, with drooling from the corner of the mouth", "Inability to elevate the upper eyelid", "Loss of horizontal forehead wrinkling", "Inability to close the eye"], "c": 0, "cat": "Muscles of Facial Expression — Specific", "r": ["Correct. Without buccinator the cheek cannot be held against the teeth, so food/saliva pool in the vestibule and drool from the mouth angle.", "Inability to elevate the upper eyelid (ptosis) reflects levator palpebrae superioris / CN III, not buccinator.", "Loss of forehead wrinkling reflects frontalis (occipitofrontalis) paralysis.", "Inability to close the eye is orbicularis oculi paralysis, not buccinator."], "source": "L08 - Facial muscles - buccinator clinical", "obj": "Buccinator paralysis - drooling / food pooling", "hint": "It keeps food off the cheek."}, {"q": "Which small muscle running horizontally from the angle of the mouth toward the side of the face is the 'grinning' muscle?", "o": ["Mentalis", "Risorius", "Depressor anguli oris", "Zygomaticus minor"], "c": 1, "cat": "Muscles of Facial Expression — Specific", "r": ["Mentalis puckers the chin, it does not grin.", "Correct. Risorius runs horizontally from the angle of the mouth and produces a grin.", "Depressor anguli oris pulls the angle of the mouth downward (a frown), not a grin.", "Zygomaticus minor elevates the upper lip, contributing to the smile but is not the horizontal grin muscle."], "source": "L08 - Facial muscles - risorius", "obj": "Facial muscles - risorius (grin)", "hint": "Latin risor = one who laughs."}, {"q": "The nasalis muscle has two parts. Which statement about them is correct?", "o": ["Both parts elevate the upper lip", "The compressor naris opens the nostril and the dilator naris closes it", "Both parts only compress the nostril", "The compressor naris compresses the nostril and the dilator naris flares it open"], "c": 3, "cat": "Muscles of Facial Expression — Specific", "r": ["Elevating the upper lip is levator labii superioris, not nasalis.", "The names match the actions: compressor compresses, dilator dilates - the reverse is wrong.", "The two parts have opposite actions; they do not both compress.", "Correct. Nasalis has a compressor naris (upper part, compresses) and a dilator naris (lower part, flares the nostrils open, e.g. when angry)."], "source": "L07 - Facial muscles - nasalis", "obj": "Nasalis - compressor + dilator naris", "hint": "The names give the actions away."}, {"q": "Procerus, which pulls down the medial end of the eyebrows and wrinkles the skin over the bridge of the nose, arises from which bone and is innervated by which facial nerve branch?", "o": ["Arises from the mandible; innervated by the marginal mandibular branch", "Arises from the nasal bone; innervated by the zygomatic branch", "Arises from the frontal bone; innervated by the temporal branch", "Arises from the maxilla; innervated by the buccal branch"], "c": 1, "cat": "Muscles of Facial Expression — Specific", "r": ["It does not arise from the mandible; marginal mandibular supplies lower-lip muscles.", "Correct. Procerus is continuous with the medial part of occipitofrontalis, arises from the nasal bone, inserts into skin between the eyebrows, and is supplied by the zygomatic branch of the facial nerve.", "It arises from the nasal bone, not the frontal bone; the temporal branch supplies frontalis/corrugator.", "It does not arise from the maxilla; the buccal branch supplies nasalis and buccinator."], "source": "L07 - Facial muscles - procerus", "obj": "Procerus - nasal bone, zygomatic branch", "hint": "The 'bunny-line' muscle at the nose root."}, {"q": "Zygomaticus major acts to move the angle of the mouth in which direction (the main smiling action)?", "o": ["Downward and medially", "Directly downward", "Medially only (puckering)", "Upward and laterally"], "c": 3, "cat": "Muscles of Facial Expression — Specific", "r": ["Downward and medial movement is not its action; depressor anguli oris pulls it down.", "Direct depression of the mouth angle is depressor anguli oris.", "Medial puckering is orbicularis oris, not zygomaticus major.", "Correct. Zygomaticus major pulls the angle of the mouth upward and laterally, the classic smiling action."], "source": "L08 - Facial muscles - zygomaticus major", "obj": "Zygomaticus major - smile", "hint": "Smile muscle to the cheekbone."}, {"q": "Which is the ONLY muscle of facial expression located in the neck?", "o": ["Buccinator", "Platysma", "Risorius", "Sternocleidomastoid"], "c": 1, "cat": "Muscles of Facial Expression — Specific", "r": ["Buccinator is a cheek muscle, not a neck muscle.", "Correct. Platysma is the only muscle of facial expression in the neck; it is supplied by the cervical branch of the facial nerve.", "Risorius lies on the face at the angle of the mouth, not in the neck.", "Sternocleidomastoid is a neck muscle but is supplied by the accessory nerve (CN XI) and is not a facial-expression muscle."], "source": "L08 - Facial muscles - platysma", "obj": "Platysma - only facial muscle in the neck", "hint": "The 'shaving' muscle over the neck."}, {"q": "Which muscle puckers the skin of the chin (the 'thinking'/pouting chin movement)?", "o": ["Mentalis", "Depressor labii inferioris", "Risorius", "Depressor anguli oris"], "c": 0, "cat": "Muscles of Facial Expression — Specific", "r": ["Correct. Mentalis puckers the chin (Maini's 'mentating' movement).", "Depressor labii inferioris pulls the lower lip down, not the chin skin pucker.", "Risorius grins by pulling the mouth angle laterally.", "Depressor anguli oris pulls the angle of the mouth downward."], "source": "L08 - Facial muscles - mentalis", "obj": "Mentalis - chin pucker", "hint": "Mental = chin."}, {"q": "The occipital belly of occipitofrontalis takes origin from which landmark?", "o": ["The external occipital protuberance only", "The whole of the inferior nuchal line", "The lateral two-thirds of the superior nuchal line", "The mastoid process"], "c": 2, "cat": "Muscles of Facial Expression — Specific", "r": ["It is more than just the protuberance; it is the lateral two-thirds of the superior nuchal line.", "It arises from the superior, not the inferior, nuchal line.", "Correct. The occipital belly arises from the lateral two-thirds of the superior nuchal line and inserts into the epicranial aponeurosis.", "The mastoid process gives origin to sternocleidomastoid, not the occipital belly."], "source": "L07 - Facial muscles - occipitofrontalis (occipital belly)", "obj": "Occipital belly origin", "hint": "Lateral 2/3 of a nuchal line."}, {"q": "The levator labii superioris alaeque nasi is named for its TWO actions. What are they?", "o": ["Elevating the upper lip and flaring (dilating) the nostril", "Depressing the lower lip and closing the nostril", "Elevating the eyebrow and closing the eye", "Depressing the angle of the mouth and puckering the chin"], "c": 0, "cat": "Muscles of Facial Expression — Specific", "r": ["Correct. 'Levator labii superioris' elevates the upper lip and 'alaeque nasi' dilates the ala of the nose (flares the nostril).", "It elevates the upper lip and dilates (not closes) the nostril; it does not depress the lower lip.", "Eyebrow elevation and eye closure are frontalis and orbicularis oculi.", "Depressing the mouth angle and puckering the chin are depressor anguli oris and mentalis."], "source": "L08 - Facial muscles - LLSAN", "obj": "Levator labii superioris alaeque nasi - two actions", "hint": "Its long name lists both jobs."}, {"q": "The small anterior, superior, and posterior auricular muscles are described as which of the following in humans?", "o": ["Muscles of mastication supplied by V3", "Rudimentary/vestigial - only some people can move the ear (a genetic trait)", "The sphincters of the external acoustic meatus", "Powerful muscles essential for hearing"], "c": 1, "cat": "Muscles of Facial Expression — Specific", "r": ["They are facial-expression muscles (CN VII), not muscles of mastication.", "Correct. In humans the auricular muscles are rudimentary and largely non-functional; moving the pinna is a genetic trait some people have.", "They are not sphincters of the ear canal.", "They are not powerful and are not essential for hearing in humans."], "source": "L08 - Facial muscles - auricular muscles", "obj": "Auricular muscles - rudimentary in humans", "hint": "Some people can 'wiggle' their ears."}, {"q": "The five terminal motor branches of the facial nerve, remembered by 'To Zanzibar By Motor Car,' are:", "o": ["Temporal, Zygomatic, Buccal, Mandibular, Lingual", "Temporal, Zygomatic, Buccal, Marginal mandibular, Cervical", "Frontal, Nasal, Buccal, Mental, Cervical", "Ophthalmic, Maxillary, Mandibular, Buccal, Cervical"], "c": 1, "cat": "Facial Nerve — Motor Branches", "r": ["The fourth branch is the MARGINAL mandibular; the trunk of V3 (mandibular) and 'lingual' are unrelated.", "Correct. From above downward: Temporal, Zygomatic, Buccal, Marginal mandibular, and Cervical branches.", "Frontal/nasal/mental are not the named terminal branches of the facial nerve.", "Ophthalmic/maxillary/mandibular are trigeminal divisions, not facial-nerve motor branches."], "source": "L08 - Facial nerve - motor branches", "quote": "[Maini] 'To Zambia by motor car... T temporal, zygomatic, buccal, marginal mandibular, and cervical.'", "obj": "Facial nerve - 5 motor branches", "hint": "T-Z-B-M-C."}, {"q": "Maini said this is the most commonly asked (and most commonly missed) facial-nerve question: the cervical branch of the facial nerve supplies which muscle?", "o": ["Buccinator", "Sternocleidomastoid", "Trapezius", "Platysma"], "c": 3, "cat": "Facial Nerve — Motor Branches", "r": ["Buccinator is supplied by the buccal branch, not the cervical branch.", "Sternocleidomastoid is supplied by the accessory nerve (CN XI).", "Trapezius is supplied by the accessory nerve (CN XI).", "Correct. The cervical branch supplies platysma, the only muscle of facial expression in the neck."], "source": "L08 - Facial nerve - cervical branch", "quote": "[Maini] 'There's only one muscle of facial expression in the neck, platysma.'", "obj": "Cervical branch - platysma", "hint": "The only facial muscle in the neck.", "profTip": "Last term only ~50% answered this correctly - do not miss it."}, {"q": "Maini gave this as an example question: which of the following muscles is NOT supplied by the temporal branch of the facial nerve?", "o": ["Orbicularis oculi", "Corrugator supercilii", "Mentalis", "Frontal belly of occipitofrontalis"], "c": 2, "cat": "Facial Nerve — Motor Branches", "r": ["Orbicularis oculi is supplied by the temporal (and zygomatic) branches.", "Corrugator supercilii is in the upper face and is supplied by the temporal branch.", "Correct. Mentalis (on the chin) is far from the temporal branch and is not supplied by it - use the branch's location to reason it out.", "The frontal belly of occipitofrontalis is in the upper face and IS supplied by the temporal branch."], "source": "L08 - Facial nerve - temporal branch", "obj": "Temporal branch territory (exclude mentalis)", "hint": "Which muscle is farthest from the temple?", "profTip": "Reason by location - the branch supplies nearby muscles, not the one farthest away."}, {"q": "The temporal branch of the facial nerve supplies which group of muscles?", "o": ["Buccinator and the muscles of the lower lip", "Platysma only", "Frontal belly of occipitofrontalis, orbicularis oculi, corrugator supercilii, and the anterior/superior auricular muscles", "The occipital belly and posterior auricular muscle"], "c": 2, "cat": "Facial Nerve — Motor Branches", "r": ["Buccinator is supplied by the buccal branch; lower-lip muscles by the marginal mandibular branch.", "Platysma is supplied by the cervical branch.", "Correct. The temporal branch supplies the upper-face muscles: frontal belly, orbicularis oculi, corrugator, and the anterior and superior auricular muscles.", "The occipital belly and posterior auricular muscle are supplied by the posterior auricular branch."], "source": "L08 - Facial nerve - temporal branch", "obj": "Temporal branch - upper face muscles", "hint": "Everything high on the face."}, {"q": "The buccal branch of the facial nerve supplies which muscle (sharing its 'first name')?", "o": ["Occipital belly of occipitofrontalis", "Risorius and lower-lip muscles", "Buccinator (and muscles of the upper lip and nostril)", "Platysma"], "c": 2, "cat": "Facial Nerve — Motor Branches", "r": ["The occipital belly is supplied by the posterior auricular branch.", "Risorius and the lower-lip muscles are supplied by the marginal mandibular branch.", "Correct. The buccal branch supplies buccinator plus muscles of the upper lip and nostril.", "Platysma is supplied by the cervical branch."], "source": "L08 - Facial nerve - buccal branch", "obj": "Buccal branch - buccinator", "hint": "Same first name as the muscle."}, {"q": "The posterior auricular branch of the facial nerve supplies which muscles?", "o": ["Platysma", "The occipital belly of occipitofrontalis and the posterior/superior auricular muscles", "Buccinator and the upper-lip muscles", "The frontal belly and orbicularis oculi"], "c": 1, "cat": "Facial Nerve — Motor Branches", "r": ["Platysma is supplied by the cervical branch.", "Correct. The posterior auricular branch supplies the occipital belly of occipitofrontalis and the posterior (and superior) auricular muscles; the trunk also gives the nerve to posterior belly of digastric and stylohyoid.", "Buccinator/upper-lip muscles are supplied by the buccal branch.", "The frontal belly and orbicularis oculi are supplied by the temporal branch."], "source": "L08 - Facial nerve - posterior auricular branch", "obj": "Posterior auricular branch - occipital belly", "hint": "Think back of the head."}, {"q": "Through which foramen does the facial nerve exit the base of the skull before entering the parotid gland?", "o": ["Foramen ovale", "Jugular foramen", "Stylomastoid foramen", "Internal acoustic meatus"], "c": 2, "cat": "Facial Nerve — Motor Branches", "r": ["The foramen ovale transmits V3 (mandibular nerve), not the facial nerve's exit.", "The jugular foramen transmits CN IX, X, and XI, not the facial nerve's exit.", "Correct. The facial nerve exits the skull through the stylomastoid foramen, then passes into the parotid gland.", "The internal acoustic meatus is where the facial nerve ENTERS the temporal bone, not where it exits the skull base."], "source": "L08 - Facial nerve - exit", "obj": "Facial nerve exit - stylomastoid foramen", "hint": "Between the styloid and mastoid."}, {"q": "After exiting the stylomastoid foramen, the facial nerve passes through which gland, where it forms a plexus and gives off its motor branches?", "o": ["The parotid gland", "The lacrimal gland", "The sublingual gland", "The submandibular gland"], "c": 0, "cat": "Facial Nerve — Motor Branches", "r": ["Correct. The facial nerve traverses the substance of the parotid gland, forming the parotid plexus and branching within it (so parotid tumors/surgery can injure its branches).", "The lacrimal gland is supplied via the greater petrosal/pterygopalatine pathway, not traversed by the facial trunk.", "The sublingual gland is not traversed by the facial nerve trunk.", "The submandibular gland receives secretomotor fibers via the chorda tympani, but the facial trunk does not run through it."], "source": "L08 - Facial nerve - parotid plexus", "obj": "Facial nerve within parotid gland", "hint": "The gland the nerve dives through."}, {"q": "Through which opening does the facial nerve enter the temporal bone / tympanic cavity region on its intracranial course?", "o": ["The foramen spinosum", "The stylomastoid foramen", "The petrotympanic fissure", "The internal acoustic meatus"], "c": 3, "cat": "Facial Nerve — Intracranial Course", "r": ["The foramen spinosum transmits the middle meningeal artery, not the facial nerve.", "The stylomastoid foramen is where it EXITS the skull, not where it enters.", "The petrotympanic fissure is where the chorda tympani exits, not the facial nerve's entry.", "Correct. The facial nerve enters through the internal acoustic meatus, then travels in the facial canal."], "source": "L08 - Facial nerve - intracranial course", "obj": "Facial nerve entry - internal acoustic meatus", "hint": "Same canal as CN VIII."}, {"q": "The sensory ganglion located at the 'genu' (bend) of the facial nerve within the temporal bone is called the:", "o": ["Otic ganglion", "Geniculate ganglion", "Submandibular ganglion", "Pterygopalatine ganglion"], "c": 1, "cat": "Facial Nerve — Intracranial Course", "r": ["The otic ganglion is the parasympathetic relay for the parotid gland (CN IX), not on the facial nerve bend.", "Correct. The geniculate ganglion sits at the genu (bend) of the facial nerve - named for the bend ('genu').", "The submandibular ganglion is the relay for the submandibular/sublingual glands.", "The pterygopalatine ganglion is the relay for lacrimal/nasal/palatine glands."], "source": "L08 - Facial nerve - geniculate ganglion", "quote": "[Maini] 'It is called geniculate because it is at the genu, the bend.'", "obj": "Geniculate ganglion at the genu", "hint": "Genu = knee/bend."}, {"q": "The greater petrosal nerve, a branch of the facial nerve given off at the geniculate ganglion, carries which fibers?", "o": ["Somatic motor (SVE) fibers to facial muscles", "Preganglionic parasympathetic fibers", "Postganglionic sympathetic fibers", "General somatic afferent (sensory) fibers"], "c": 1, "cat": "Facial Nerve — Intracranial Course", "r": ["The SVE motor fibers stay in the main facial trunk to the facial muscles.", "Correct. The greater petrosal nerve carries preganglionic parasympathetic fibers destined to synapse in the pterygopalatine ganglion.", "Postganglionic sympathetic fibers are carried by the DEEP petrosal nerve, which joins the greater petrosal.", "The greater petrosal is secretomotor (parasympathetic), not a general sensory nerve."], "source": "L08 - Facial nerve - greater petrosal", "obj": "Greater petrosal - preganglionic parasympathetic", "hint": "Heads for lacrimal/nasal glands."}, {"q": "The deep petrosal nerve, which joins the greater petrosal nerve, carries which fibers and from where?", "o": ["Taste fibers from the anterior two-thirds of the tongue", "Motor fibers to the stapedius muscle", "Postganglionic sympathetic fibers from the internal carotid plexus", "Preganglionic parasympathetic fibers from the facial nerve"], "c": 2, "cat": "Facial Nerve — Intracranial Course", "r": ["Taste fibers of the anterior tongue travel in the chorda tympani.", "Motor to stapedius is the nerve to stapedius, a separate branch.", "Correct. The deep petrosal nerve carries postganglionic sympathetic fibers derived from the internal carotid plexus.", "Preganglionic parasympathetic fibers are in the greater petrosal nerve, not the deep petrosal."], "source": "L08 - Facial nerve - deep petrosal", "obj": "Deep petrosal - postganglionic sympathetic (ICA plexus)", "hint": "Rides on the internal carotid."}, {"q": "The greater petrosal nerve and the deep petrosal nerve unite to form which structure?", "o": ["The lesser petrosal nerve", "The nerve of the pterygoid canal", "The chorda tympani", "The auriculotemporal nerve"], "c": 1, "cat": "Facial Nerve — Intracranial Course", "r": ["The lesser petrosal nerve carries CN IX parasympathetics to the otic ganglion; it is not formed by these two.", "Correct. Together they form the nerve of the pterygoid canal, which runs to the pterygopalatine ganglion.", "The chorda tympani is a separate branch of the facial nerve carrying taste and parasympathetic fibers.", "The auriculotemporal nerve is a V3 branch, not formed by the petrosal nerves."], "source": "L08 - Facial nerve - nerve of pterygoid canal", "obj": "Nerve of pterygoid canal formation", "hint": "Greater (parasymp) + deep (symp)."}, {"q": "Fibers in the nerve of the pterygoid canal relay in the pterygopalatine ganglion; the postganglionic fibers are then distributed along branches of which nerve to reach the lacrimal, nasal, and palatine glands?", "o": ["V1 (the ophthalmic division)", "V2 (the maxillary division of the trigeminal)", "V3 (the mandibular division)", "The facial nerve trunk"], "c": 1, "cat": "Facial Nerve — Intracranial Course", "r": ["V1 does distribute the lacrimal nerve, but Maini stated the pterygopalatine fibers travel with V2 branches to the three targets.", "Correct. Postganglionic parasympathetic (and sympathetic) fibers from the pterygopalatine ganglion travel with branches of V2 to the lacrimal, nasal mucosal, and palatine glands.", "V3 branches serve the muscles of mastication and lower-face sensation, not this gland distribution.", "The facial trunk itself does not distribute these postganglionic fibers to the glands."], "source": "L08 - Facial nerve - pterygopalatine distribution", "obj": "Pterygopalatine ganglion - fibers ride V2", "hint": "Maxillary branches to 3 glands."}, {"q": "The nerve to stapedius is a branch of the facial nerve within the facial canal. Paralysis of the stapedius muscle produces which symptom?", "o": ["Dry eye", "Loss of taste on the anterior tongue", "Deafness (total hearing loss)", "Hyperacusis (abnormal sensitivity to sound)"], "c": 3, "cat": "Facial Nerve — Intracranial Course", "r": ["Dry eye reflects loss of the greater petrosal/lacrimal pathway, not stapedius.", "Loss of taste on the anterior tongue reflects chorda tympani injury, not stapedius.", "It causes hyperacusis, not total deafness.", "Correct. Stapedius normally dampens loud sound; its paralysis causes hyperacusis (increased sensitivity to sound)."], "source": "L08 - Facial nerve - nerve to stapedius", "obj": "Stapedius palsy - hyperacusis", "hint": "The muscle that muffles loud sound."}, {"q": "The chorda tympani, a branch of the facial nerve, carries which two functional components?", "o": ["General sensation from the whole tongue AND motor fibers to the tongue", "Motor fibers to stapedius AND secretomotor fibers to the parotid gland", "Postganglionic sympathetic fibers AND taste from the posterior tongue", "Taste from the anterior two-thirds of the tongue AND preganglionic parasympathetic fibers to the submandibular ganglion"], "c": 3, "cat": "Facial Nerve — Intracranial Course", "r": ["It carries taste, not general sensation, from the anterior two-thirds only, and no motor to the tongue.", "The nerve to stapedius and parotid secretomotor (via CN IX/otic ganglion) are separate pathways.", "It carries parasympathetic (not sympathetic) fibers, and taste from the anterior (not posterior) tongue.", "Correct. Chorda tympani carries taste (SVA) from the anterior two-thirds of the tongue and preganglionic parasympathetic fibers to the submandibular ganglion (for submandibular/sublingual glands)."], "source": "L08 - Facial nerve - chorda tympani", "obj": "Chorda tympani - taste + submandibular parasympathetics", "hint": "Anterior 2/3 tongue."}, {"q": "Through which opening does the chorda tympani leave the skull to join the lingual nerve?", "o": ["The pterygoid canal", "The foramen ovale", "The stylomastoid foramen", "The petrotympanic fissure"], "c": 3, "cat": "Facial Nerve — Intracranial Course", "r": ["The pterygoid canal transmits the nerve of the pterygoid canal, not the chorda tympani.", "The foramen ovale transmits V3; the chorda tympani later joins the lingual nerve (a V3 branch) outside the skull.", "The stylomastoid foramen is the exit of the main facial trunk, not the chorda tympani.", "Correct. The chorda tympani exits through the petrotympanic fissure (Maini corrected herself to this in lecture)."], "source": "L08 - Facial nerve - chorda tympani exit", "obj": "Chorda tympani exit - petrotympanic fissure", "hint": "A fissure named for petrous + tympanic bone."}, {"q": "Preganglionic parasympathetic fibers in the chorda tympani synapse in which ganglion, whose postganglionic fibers supply the submandibular and sublingual glands?", "o": ["The otic ganglion", "The geniculate ganglion", "The pterygopalatine ganglion", "The submandibular ganglion"], "c": 3, "cat": "Facial Nerve — Intracranial Course", "r": ["The otic ganglion relays CN IX parasympathetics to the parotid gland.", "The geniculate ganglion is the sensory ganglion of the facial nerve, not a parasympathetic relay for these glands.", "The pterygopalatine ganglion relays greater-petrosal fibers to lacrimal/nasal/palatine glands.", "Correct. Chorda tympani parasympathetics relay in the submandibular ganglion, then supply the submandibular and sublingual glands."], "source": "L08 - Facial nerve - submandibular ganglion", "obj": "Submandibular ganglion - submandibular/sublingual glands", "hint": "Named for the gland it serves."}, {"q": "Maini said three parasympathetic ganglia were introduced in this lecture. Which set is correct?", "o": ["Otic, pterygopalatine, and submandibular", "Otic, ciliary, and geniculate", "Ciliary, trigeminal, and superior cervical", "Pterygopalatine, ciliary, and stellate"], "c": 0, "cat": "Facial Nerve — Intracranial Course", "r": ["Correct. The three parasympathetic ganglia covered were the otic, pterygopalatine, and submandibular; the 4th (ciliary) comes later with the eye.", "The ciliary ganglion is covered later with the orbit, and the geniculate is sensory, not parasympathetic.", "The trigeminal ganglion is sensory and the superior cervical ganglion is sympathetic.", "The stellate ganglion is sympathetic, and the ciliary is discussed later."], "source": "L08 - Facial nerve - parasympathetic ganglia", "obj": "Three parasympathetic ganglia this week", "hint": "Parotid, tears/nose, submandibular."}, {"q": "A patient develops sudden unilateral facial droop after cold exposure, with no other identifiable cause. This idiopathic lower-motor-neuron facial paralysis is called:", "o": ["Bell's palsy", "Frey's syndrome", "Ramsay-Hunt syndrome", "Trigeminal neuralgia"], "c": 0, "cat": "Facial Nerve — Lesions & Clinical", "r": ["Correct. Idiopathic facial nerve palsy, often following exposure to cold, is Bell's palsy.", "Frey's syndrome is gustatory sweating after parotid surgery, not facial paralysis.", "Ramsay-Hunt syndrome is herpes-zoster facial palsy with vesicles, not idiopathic.", "Trigeminal neuralgia is severe sensory PAIN in a V2/V3 distribution, not facial-muscle paralysis."], "source": "L08 - Facial nerve - Bell's palsy", "obj": "Bell's palsy - idiopathic CN VII palsy", "hint": "Often follows a cold draft."}, {"q": "Which set of findings is characteristic of a lower-motor-neuron facial nerve palsy on the affected side?", "o": ["Preserved forehead wrinkling with only lower-face weakness", "Loss of forehead wrinkling, inability to close the eye, loss of the nasolabial fold, and a smile deviated to the normal side", "Loss of general sensation over the face with normal movement", "Ptosis (drooping upper eyelid) with a dilated pupil"], "c": 1, "cat": "Facial Nerve — Lesions & Clinical", "r": ["Forehead sparing suggests an UPPER-motor-neuron lesion, not an LMN facial palsy.", "Correct. An LMN facial palsy affects the whole side: loss of horizontal forehead wrinkling, inability to close the eye, loss of the nasolabial fold, and the mouth/smile pulled toward the normal side.", "Loss of general facial sensation reflects trigeminal, not facial, nerve injury.", "Ptosis with a dilated pupil reflects CN III (oculomotor) palsy, not facial nerve palsy."], "source": "L08 - Facial nerve - palsy signs", "obj": "LMN facial palsy - whole-side signs", "hint": "The forehead is involved too."}, {"q": "Ramsay-Hunt syndrome (herpes zoster oticus) is caused by reactivation of the varicella-zoster virus affecting which nerves/ganglion?", "o": ["The oculomotor nerve, causing ptosis", "The trigeminal ganglion only, causing facial numbness", "The 8th nerve and the geniculate ganglion of the 7th nerve, with vesicular eruptions", "The cervical plexus, causing occipital pain"], "c": 2, "cat": "Facial Nerve — Lesions & Clinical", "r": ["The oculomotor nerve is not involved in Ramsay-Hunt syndrome.", "It is not limited to the trigeminal ganglion; that would give a different pattern.", "Correct. Herpes zoster oticus (Ramsay-Hunt) affects the 8th nerve and the geniculate ganglion of the 7th nerve, producing facial palsy plus vesicles.", "The cervical plexus is not the site of Ramsay-Hunt syndrome."], "source": "L08 - Facial nerve - Ramsay-Hunt", "obj": "Ramsay-Hunt - VZV, CN VIII + geniculate ganglion", "hint": "Zoster with ear vesicles."}, {"q": "Inability to completely close the eye, as occurs when orbicularis oculi is paralyzed, is termed:", "o": ["Exophthalmos", "Xerophthalmia", "Lagophthalmos", "Ptosis"], "c": 2, "cat": "Facial Nerve — Lesions & Clinical", "r": ["Exophthalmos is protrusion (bulging) of the eyes, as in Graves disease.", "Xerophthalmia means dry eye - a CONSEQUENCE of lagophthalmos, not the inability to close itself.", "Correct. Lagophthalmos ('lid lag') is the inability to fully close the eyelid, seen with orbicularis oculi paralysis.", "Ptosis is drooping of the upper eyelid, due to levator palpebrae superioris (CN III) weakness."], "source": "L08 - in-class review Q - lagophthalmos", "obj": "Lagophthalmos - cannot close eye", "hint": "Lid 'lag'."}, {"q": "In orbicularis oculi paralysis, the eye can no longer blink or close. What is the correct clinical sequence of consequences Maini described?", "o": ["Hyperacusis -> tinnitus -> vertigo", "Dry mouth -> difficulty swallowing -> aspiration", "Ptosis -> double vision -> headache", "Loss of blinking -> xerophthalmia (dry eye) -> corneal abrasion -> corneal opacity -> blindness"], "c": 3, "cat": "Facial Nerve — Lesions & Clinical", "r": ["Hyperacusis is a stapedius problem, not a corneal cascade.", "Dry mouth and swallowing problems relate to salivary/pharyngeal function, not orbicularis oculi.", "Ptosis is a levator palpebrae (CN III) problem, not the orbicularis-oculi dry-eye cascade.", "Correct. Without blinking the tear film is not spread, the cornea dries (xerophthalmia), leading to abrasion, then opacity, and ultimately blindness - so patients are advised to tape/strap the eye."], "source": "L07 - Orbicularis oculi - clinical cascade", "obj": "Orbicularis oculi palsy -> corneal blindness", "hint": "It starts with losing the blink.", "profTip": "Advise the patient to strap/tape the eye (especially while sleeping) to prevent xerophthalmia."}, {"q": "In a patient with facial nerve palsy, on attempting to close the eyes the eyeball is seen to roll upward and outward. This normal protective movement (visible because the lids do not close) is called:", "o": ["Xerophthalmia", "Ectropion", "Bell's phenomenon", "Bell's palsy"], "c": 2, "cat": "Facial Nerve — Lesions & Clinical", "r": ["Xerophthalmia is dry eye, a consequence of failure to close the lids.", "Ectropion is eversion (out-turning) of the lower eyelid.", "Correct. Bell's phenomenon is the normal upward-and-outward rotation of the eyeball on eye closure, made visible in Bell's palsy because the lids fail to close.", "Bell's palsy is the facial paralysis itself, not the eye movement."], "source": "L08 - Facial nerve - Bell's phenomenon", "obj": "Bell's phenomenon vs Bell's palsy", "hint": "A normal movement, just made visible."}, {"q": "Which term describes eversion (out-turning) of the lower eyelid, a possible finding in facial nerve palsy?", "o": ["Ectropion", "Ptosis", "Lagophthalmos", "Entropion"], "c": 0, "cat": "Facial Nerve — Lesions & Clinical", "r": ["Correct. Ectropion is out-turning (eversion) of the lower eyelid.", "Ptosis is drooping of the UPPER eyelid.", "Lagophthalmos is the inability to close the eye, not eyelid eversion.", "Entropion is IN-turning of the eyelid - the opposite of ectropion."], "source": "L08 - Facial nerve - ectropion", "obj": "Ectropion - everted lower lid", "hint": "Ec- = outward."}, {"q": "After a parotidectomy, a patient sweats over the parotid region whenever they eat or see food. This 'gustatory sweating' condition is called:", "o": ["Frey's syndrome", "Ramsay-Hunt syndrome", "Horner's syndrome", "Bell's palsy"], "c": 0, "cat": "Facial Nerve — Lesions & Clinical", "r": ["Correct. In Frey's syndrome, regenerating postganglionic parasympathetic (secretomotor) fibers reinnervate the sweat glands, so eating triggers sweating instead of salivation - gustatory sweating.", "Ramsay-Hunt syndrome is zoster facial palsy with vesicles.", "Horner's syndrome (ptosis, miosis, anhidrosis) results from sympathetic disruption, not misdirected parasympathetics.", "Bell's palsy is idiopathic facial paralysis, not gustatory sweating."], "source": "L08 - Parotid - Frey's syndrome", "obj": "Frey's syndrome - gustatory sweating", "hint": "Sweat instead of saliva after parotid surgery."}, {"q": "Cutaneous sensation from the skin of the tip and bridge of the nose is carried by which division of the trigeminal nerve?", "o": ["V3 (mandibular)", "V1 (ophthalmic)", "V2 (maxillary)", "The facial nerve"], "c": 1, "cat": "Trigeminal — Sensory Zones (V1/V2/V3)", "r": ["V3 supplies the lower lip and chin, not the nose.", "Correct. The skin of the bridge and tip of the nose is supplied by V1 (via the external nasal nerve).", "V2 supplies the ala/side of the nose and upper lip, not the tip/bridge.", "The facial nerve is motor to facial muscles, not sensory to the nose."], "source": "L08 - Trigeminal dermatomes", "obj": "V1 - tip/bridge of nose", "hint": "Same division as the forehead."}, {"q": "Sensation from the skin of the upper lip and cheek is carried by which trigeminal division?", "o": ["V1 (ophthalmic)", "The cervical plexus", "V2 (maxillary)", "V3 (mandibular)"], "c": 2, "cat": "Trigeminal — Sensory Zones (V1/V2/V3)", "r": ["V1 supplies the forehead, upper eyelid, and nose dorsum, not the upper lip.", "The cervical plexus supplies the neck and posterior scalp, not the upper lip.", "Correct. The upper lip and cheek are supplied by V2 (maxillary), largely via the infraorbital nerve.", "V3 supplies the lower lip and chin, not the upper lip."], "source": "L08 - Trigeminal dermatomes", "obj": "V2 - upper lip & cheek", "hint": "Maxillary = mid-face."}, {"q": "Sensation from the skin of the lower lip and chin is carried by which trigeminal division?", "o": ["The facial nerve", "V1 (ophthalmic)", "V2 (maxillary)", "V3 (mandibular)"], "c": 3, "cat": "Trigeminal — Sensory Zones (V1/V2/V3)", "r": ["The facial nerve is motor to facial muscles, not sensory to the chin.", "V1 supplies the forehead and nose dorsum, not the chin.", "V2 supplies the upper lip and cheek, not the lower lip/chin.", "Correct. The lower lip and chin are supplied by V3 (mandibular), largely via the mental nerve."], "source": "L08 - Trigeminal dermatomes", "obj": "V3 - lower lip & chin", "hint": "Mandibular = lower face."}, {"q": "The forehead and upper eyelid receive their cutaneous sensory supply from which trigeminal division?", "o": ["V2 (maxillary)", "V3 (mandibular)", "The greater occipital nerve", "V1 (ophthalmic)"], "c": 3, "cat": "Trigeminal — Sensory Zones (V1/V2/V3)", "r": ["V2 supplies the mid-face (upper lip, cheek, lower eyelid).", "V3 supplies the lower face (lower lip, chin, part of the temple).", "The greater occipital nerve supplies the posterior scalp, not the forehead.", "Correct. The forehead and upper eyelid are supplied by V1 (ophthalmic), via branches such as the supraorbital and supratrochlear nerves."], "source": "L08 - Trigeminal dermatomes", "obj": "V1 - forehead & upper eyelid", "hint": "Ophthalmic = around/above the eye."}, {"q": "Which of the following is a branch of the ophthalmic division (V1)?", "o": ["Supraorbital nerve", "Mental nerve", "Infraorbital nerve", "Auriculotemporal nerve"], "c": 0, "cat": "Trigeminal — Sensory Zones (V1/V2/V3)", "r": ["Correct. The supraorbital nerve (with lacrimal, supratrochlear, infratrochlear, external nasal) is a V1 branch.", "The mental nerve is a terminal branch of V3 (mandibular).", "The infraorbital nerve is a branch of V2 (maxillary).", "The auriculotemporal nerve is a branch of V3 (mandibular)."], "source": "L08 - Trigeminal branches", "obj": "V1 branches - supraorbital etc.", "hint": "'Supra' = above the orbit."}, {"q": "Maini noted there are TWO 'buccal' nerves. How do they differ?", "o": ["Both are sensory branches of the maxillary nerve", "Both are motor branches of the facial nerve", "The buccal branch of the facial nerve is motor (SVE) to buccinator; the buccal nerve of V3 is sensory (GSA) to the cheek", "The buccal branch of the facial nerve is sensory; the buccal nerve of V3 is motor"], "c": 2, "cat": "Trigeminal — Sensory Zones (V1/V2/V3)", "r": ["Neither is a maxillary (V2) branch - one is facial, one is mandibular (V3).", "Only one is motor (the facial branch); the V3 buccal nerve is sensory.", "Correct. The buccal BRANCH of the facial nerve is motor (SVE) to buccinator; the buccal NERVE of V3 is sensory (GSA) to the cheek skin/mucosa.", "The functions are reversed: the facial one is motor, the V3 one is sensory."], "source": "L08 - Trigeminal vs facial - buccal nerves", "obj": "Two buccal nerves - motor vs sensory", "hint": "One from CN VII, one from V3."}, {"q": "Besides carrying general sensory (GSA) fibers, the auriculotemporal nerve (a branch of V3) also conveys which fibers, and to what target?", "o": ["Preganglionic parasympathetic fibers to the submandibular gland", "Taste fibers from the posterior tongue", "Motor fibers to the muscles of facial expression", "Postganglionic parasympathetic (secretomotor) fibers to the parotid gland"], "c": 3, "cat": "Trigeminal — Sensory Zones (V1/V2/V3)", "r": ["Preganglionic fibers to the submandibular gland travel in the chorda tympani, not the auriculotemporal nerve.", "Posterior-tongue taste is carried by CN IX, not the auriculotemporal nerve.", "Motor to facial muscles is the facial nerve, not the auriculotemporal nerve.", "Correct. The auriculotemporal nerve carries hitchhiking postganglionic parasympathetic fibers (from the otic ganglion) to the parotid gland, in addition to its GSA fibers."], "source": "L08 - Auriculotemporal nerve", "obj": "Auriculotemporal - parotid secretomotor + GSA", "hint": "It carries the otic ganglion's output."}, {"q": "General sensation from the cornea is carried by which nerve - clinically important because corneal lesions can lead to blindness?", "o": ["The facial nerve", "The optic nerve (CN II)", "V1 (ophthalmic division of the trigeminal)", "V2 (maxillary division)"], "c": 2, "cat": "Trigeminal — Sensory Zones (V1/V2/V3)", "r": ["The facial nerve is motor to orbicularis oculi (the blink), not sensory to the cornea.", "The optic nerve carries vision (SSA), not general sensation from the cornea surface.", "Correct. Corneal sensation is carried by V1 (ophthalmic) branches; loss endangers the cornea.", "V2 supplies the mid-face skin, not the cornea."], "source": "L08 - Trigeminal - corneal sensation", "obj": "Corneal sensation - V1", "hint": "Same division as herpes zoster ophthalmicus."}, {"q": "A patient reports episodic, excruciating, lightning-like facial pain triggered by washing the face, shaving, or chewing, along the distribution of V2 or V3. This condition is:", "o": ["Trigeminal neuralgia (tic douloureux)", "Bell's palsy", "Frey's syndrome", "Ramsay-Hunt syndrome"], "c": 0, "cat": "Trigeminal — Clinical", "r": ["Correct. Trigeminal neuralgia (tic douloureux) causes severe paroxysmal pain in a V2/V3 distribution, triggered by light touch such as washing, shaving, or eating.", "Bell's palsy is painless facial-muscle paralysis, not a sensory pain syndrome.", "Frey's syndrome is gustatory sweating, not facial pain.", "Ramsay-Hunt syndrome is zoster facial palsy with vesicles, not trigger-provoked neuralgia."], "source": "L08 - Trigeminal neuralgia", "obj": "Trigeminal neuralgia - V2/V3 trigger pain", "hint": "Also called tic douloureux."}, {"q": "Which medication did Maini name as the drug of choice for trigeminal neuralgia?", "o": ["An oral antibiotic", "A topical corticosteroid", "Carbamazepine (an anti-epileptic)", "A simple analgesic such as paracetamol"], "c": 2, "cat": "Trigeminal — Clinical", "r": ["An antibiotic is inappropriate; trigeminal neuralgia is not an infection.", "A topical corticosteroid is not the treatment for this neuralgia.", "Correct. Carbamazepine, an anti-epileptic, is the drug of choice; the pain is not relieved by simple analgesics.", "Simple analgesics do NOT relieve trigeminal neuralgia - a key clinical point."], "source": "L08 - Trigeminal neuralgia - treatment", "obj": "Trigeminal neuralgia - carbamazepine", "hint": "An anti-seizure drug."}, {"q": "Reactivation of varicella-zoster virus affecting the skin supplied by the ophthalmic division (V1), which can involve the cornea and cause blindness, is called:", "o": ["Herpes zoster ophthalmicus", "Bell's palsy", "Trigeminal neuralgia", "Herpes zoster oticus (Ramsay-Hunt syndrome)"], "c": 0, "cat": "Trigeminal — Clinical", "r": ["Correct. Herpes zoster ophthalmicus is VZV reactivation in the V1 distribution; corneal involvement can lead to opacity and blindness.", "Bell's palsy is motor facial paralysis, not a V1 vesicular eruption.", "Trigeminal neuralgia is a pain syndrome without vesicles.", "Herpes zoster oticus (Ramsay-Hunt) affects the facial nerve/ear region, not the V1 corneal territory."], "source": "L08 - Trigeminal - herpes zoster ophthalmicus", "obj": "Herpes zoster ophthalmicus - V1, cornea risk", "hint": "'Ophthalmic' = V1."}, {"q": "Which cranial nerve carries the preganglionic parasympathetic (secretomotor) fibers destined for the parotid gland?", "o": ["The glossopharyngeal nerve (CN IX)", "The facial nerve (CN VII)", "The vagus nerve (CN X)", "The trigeminal nerve (CN V)"], "c": 0, "cat": "Parotid Gland & Secretomotor Pathway", "r": ["Correct. Preganglionic parasympathetic fibers to the parotid gland travel in CN IX (glossopharyngeal), via its tympanic branch and the lesser petrosal nerve to the otic ganglion.", "CN VII supplies the submandibular, sublingual, lacrimal, nasal and palatine glands - not the parotid.", "CN X supplies thoracic/abdominal viscera, not the parotid gland.", "CN V is sensory to the face and motor to mastication; the auriculotemporal (V3) only carries the fibers after they leave the otic ganglion."], "source": "L08 - in-class review Q - parotid parasympathetics", "quote": "[Maini] 'It's ninth nerve, glossopharyngeal... tympanic plexus, lesser petrosal, otic ganglion, auriculotemporal, parotid gland.'", "obj": "Parotid secretomotor - CN IX", "hint": "Not the seventh - a common trap."}, {"q": "In the parasympathetic pathway to the parotid gland, the preganglionic fibers synapse in which ganglion?", "o": ["The pterygopalatine ganglion", "The otic ganglion", "The geniculate ganglion", "The submandibular ganglion"], "c": 1, "cat": "Parotid Gland & Secretomotor Pathway", "r": ["The pterygopalatine ganglion serves the lacrimal, nasal and palatine glands.", "Correct. Parotid parasympathetic fibers relay in the otic ganglion.", "The geniculate ganglion is the sensory ganglion of the facial nerve, not a parasympathetic relay.", "The submandibular ganglion serves the submandibular and sublingual glands."], "source": "L08 - Parotid - otic ganglion", "obj": "Parotid relay - otic ganglion", "hint": "The ganglion on the lesser petrosal pathway."}, {"q": "After synapsing in the otic ganglion, the postganglionic parasympathetic fibers reach the parotid gland by hitchhiking on which nerve?", "o": ["The chorda tympani", "The auriculotemporal nerve (branch of V3)", "The greater petrosal nerve", "The lingual nerve"], "c": 1, "cat": "Parotid Gland & Secretomotor Pathway", "r": ["The chorda tympani carries parasympathetics to the submandibular ganglion, not the parotid.", "Correct. Postganglionic parasympathetic fibers ride the auriculotemporal nerve (a V3 branch) to the parotid gland.", "The greater petrosal nerve carries parasympathetics toward the pterygopalatine ganglion.", "The lingual nerve carries the chorda tympani fibers to the submandibular ganglion, not the parotid."], "source": "L08 - Parotid - auriculotemporal delivery", "obj": "Parotid postganglionic on auriculotemporal", "hint": "A V3 branch delivers them."}, {"q": "The parotid duct opens into the oral cavity opposite which tooth?", "o": ["The lower (mandibular) second molar", "The upper (maxillary) second molar", "The upper canine", "The lower central incisor"], "c": 1, "cat": "Parotid Gland & Secretomotor Pathway", "r": ["It opens opposite the UPPER, not the lower, second molar.", "Correct. The parotid duct opens into the oral cavity opposite the upper second molar tooth (after piercing buccinator).", "It does not open at the canine level.", "It does not open near the lower incisors."], "source": "L08 - Parotid duct opening", "obj": "Parotid duct - opposite upper 2nd molar", "hint": "Upper arch, second molar."}, {"q": "Which statement about the parotid gland is correct?", "o": ["It is the smallest salivary gland and contributes ~70% of saliva", "It secretes mostly mucous saliva", "It is the largest of the three paired salivary glands and contributes about 30% of total saliva", "It lies deep to the mandible in the floor of the mouth"], "c": 2, "cat": "Parotid Gland & Secretomotor Pathway", "r": ["It is the largest gland; the 30% figure is correct, not 70%.", "Parotid secretion is predominantly serous (enzyme-rich), not mucous.", "Correct. The parotid is the largest of the three paired salivary glands and contributes roughly 30% of total salivary secretion.", "It lies superficially over the ramus of the mandible, not in the floor of the mouth (that is the submandibular/sublingual)."], "source": "L08 - Parotid gland facts", "obj": "Parotid - largest, ~30% of saliva", "hint": "Big gland, modest fraction."}, {"q": "In mumps parotitis, why is the pain so intense over the parotid region?", "o": ["The gland has no capsule, so it herniates through the skin", "The tough fibrous parotid sheath (capsule), rich in pain receptors, is stretched by the swollen gland", "The facial nerve is severed by the swelling", "The parotid duct ruptures into the cheek"], "c": 1, "cat": "Parotid Gland & Secretomotor Pathway", "r": ["The gland does have a capsule - that is exactly why it hurts.", "Correct. The parotid is enclosed by a tough fibrous sheath with many pain receptors; when the gland swells and this unyielding capsule is stretched, pain is intense.", "The facial nerve is not severed in parotitis, though it runs through the gland.", "Duct rupture is not the mechanism of the pain in parotitis."], "source": "L08 - Parotid - parotitis pain", "obj": "Parotitis pain - stretched fibrous sheath", "hint": "A tight capsule under pressure."}, {"q": "Sympathetic fibers destined for head-and-neck glands and vessels synapse in which ganglion before traveling on the arterial plexuses (e.g., the external carotid plexus)?", "o": ["The submandibular ganglion", "The otic ganglion", "The pterygopalatine ganglion", "The superior cervical ganglion"], "c": 3, "cat": "Parotid Gland & Secretomotor Pathway", "r": ["The submandibular ganglion is a parasympathetic relay for the submandibular/sublingual glands.", "The otic ganglion is a parasympathetic relay for the parotid.", "The pterygopalatine ganglion is a parasympathetic relay for lacrimal/nasal/palatine glands.", "Correct. Head-and-neck sympathetics (from T1-T2) ascend and synapse in the superior cervical ganglion, then postganglionic fibers form the carotid (ICA/ECA) plexuses on th
