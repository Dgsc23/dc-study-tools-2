<script>
const BANK=[
{q:"A 62-year-old smoker has a tumor at the apex of the right lung. On the right he shows partial drooping of the upper lid, a constricted pupil, no sweating, and facial flushing. What is the underlying lesion?",o:["A third (oculomotor) nerve palsy on the right", "An optic nerve compression on the right", "Compression of the cervical sympathetic chain on the right", "A facial (seventh) nerve palsy on the right"],c:2,cat:"Horner Syndrome",r:["A CN III palsy gives a COMPLETE ptosis, a DILATED pupil, and a down-and-out eye, not miosis with anhidrosis.", "The optic nerve is purely sensory (vision); damaging it causes blindness, not ptosis, miosis, anhidrosis, and flushing.", "Correct. Dr. Maini calls this Horner syndrome from sympathetic failure on one side; a Pancoast (lung apex) tumor compresses the cervical sympathetic chain, so its ascending fibers never reach the face.", "CN VII controls the muscles of facial expression; it does not carry the sympathetic fibers to the pupil, sweat glands, and vessels."],source:"Dr. Maini - Lecture 19 (The Orbit and Its Contents), ~44:00-45:00",quote:"Horner syndrome is when there is sympathetic failure on one side of the face. A very common cause is a Pancoast tumor of the lung apex compressing the cervical sympathetic chain.",obj:"Horner Syndrome",hint:"The tumor sits on the lung apex and squeezes the sympathetic chain heading up to the head and eye."},
{q:"Dr. Maini lists the features of Horner syndrome. Which of the following is NOT one of them?",o:["Mydriasis (a dilated pupil)", "Partial ptosis", "Anhidrosis (loss of sweating on that side)", "Enophthalmos (a sunken eyeball)"],c:0,cat:"Horner Syndrome",r:["Correct. Horner shows MIOSIS (constriction) because the sympathetic dilator fails; a dilated pupil would require intact sympathetics, so mydriasis is NOT a feature.", "Partial ptosis IS a feature, from loss of the sympathetic superior tarsal (Muller) muscle.", "Anhidrosis IS a feature; the sympathetic supply to the facial sweat glands is lost.", "Enophthalmos IS the fifth (poorly explained) feature Dr. Maini lists, the opposite of exophthalmos."],source:"Dr. Maini - Lecture 19, ~41:00-46:00",quote:"These five belong to Horner syndrome: partial ptosis, miosis, anhidrosis, flushing of the face, and enophthalmos.",obj:"Horner Syndrome",hint:"Sympathetics DILATE the pupil; if they fail, the pupil does the opposite."},
{q:"In Horner syndrome the ptosis is only PARTIAL, not complete. Loss of which muscle produces this partial droop of the upper lid?",o:["Orbicularis oculi", "The skeletal (main) part of levator palpebrae superioris", "Inferior tarsal muscle", "Superior tarsal (Muller) muscle"],c:3,cat:"Horner Syndrome",r:["Orbicularis oculi CLOSES the eye (CN VII); its weakness prevents lid closure, it does not cause drooping.", "The skeletal part of levator palpebrae superioris runs on CN III and stays intact in Horner, which is exactly why the ptosis is only partial.", "The inferior tarsal muscle relates to the lower lid; the drooping upper lid is due to the superior tarsal muscle.", "Correct. The superior tarsal (Muller) muscle is the smooth, sympathetically driven slip of the upper lid; losing its sympathetic supply gives partial ptosis while the CN III part still lifts the lid."],source:"Dr. Maini - Lecture 19, ~38:00-41:00",quote:"Part of levator palpebrae superioris is smooth muscle, the superior tarsal muscle, supplied only by sympathetic fibers. Sympathetic failure gives partial ptosis because the skeletal part on the third nerve is intact.",obj:"Superior Tarsal (Muller) Muscle",hint:"The tiny smooth-muscle slip of the upper-lid elevator rides on the sympathetics."},
{q:"A patient has complete drooping of one upper lid. When the lid is lifted, the eye sits deviated down-and-out with a fixed, dilated pupil. Which nerve is damaged?",o:["Trochlear nerve (CN IV)", "Oculomotor nerve (CN III)", "Abducens nerve (CN VI)", "Ophthalmic nerve (V1)"],c:1,cat:"Oculomotor (CN III) Palsy",r:["CN IV supplies only the superior oblique; its palsy gives vertical diplopia with no ptosis and no pupil change.", "Correct. CN III supplies levator palpebrae (ptosis), the superior, inferior, and medial recti plus inferior oblique (so the spared lateral rectus and superior oblique pull the eye down-and-out), and the parasympathetic to sphincter pupillae (dilated pupil).", "CN VI supplies only lateral rectus; its palsy leaves the eye turned IN, with no ptosis and a normal pupil.", "V1 is purely sensory; it produces no ptosis, no eye deviation, and no pupil change."],source:"Dr. Maini - Lecture 21 (Testing of Eye Muscles, Nerves, Ciliary Ganglion), ~13:00-15:00",quote:"Oculomotor nerve supplies most of the extraocular muscles: levator palpebrae superioris, medial rectus, superior rectus, inferior rectus, and inferior oblique.",obj:"Oculomotor Nerve Functions",hint:"One nerve runs the lid, most eye movements, AND pupil constriction; lose it and the eye drifts down-and-out with a blown pupil."},
{q:"In a complete oculomotor (CN III) palsy the eyeball rests 'down and out.' Which two still-innervated muscles produce that resting position?",o:["Superior rectus and medial rectus", "Inferior rectus and inferior oblique", "Lateral rectus and inferior rectus", "Lateral rectus and superior oblique"],c:3,cat:"Oculomotor (CN III) Palsy",r:["Both superior rectus and medial rectus are CN III muscles, so both are paralyzed in the palsy.", "Both inferior rectus and inferior oblique are CN III muscles and are paralyzed.", "Inferior rectus is CN III (paralyzed); only the lateral rectus is spared here, not both.", "Correct. Lateral rectus (CN VI, abducts) and superior oblique (CN IV, down-and-out) are the only spared muscles, so their unopposed pull sets the eye down and out. Recall SO4, LR6, all others by CN III."],source:"Dr. Maini - Lecture 20 (The Orbit, contd), ~1:21:00 and Lecture 21, ~15:00",quote:"SO4, LR6, all others by third nerve.",obj:"Extraocular Muscle Innervation",hint:"Only the muscles run by CN IV and CN VI survive a CN III palsy."},
{q:"A patient's right eye cannot move laterally past the midline and sits turned inward at rest, with horizontal double vision that worsens looking to the right. Which nerve or muscle is affected?",o:["CN VI (abducens) supplying lateral rectus", "CN III (oculomotor) supplying medial rectus", "CN IV (trochlear) supplying superior oblique", "CN II (optic nerve)"],c:0,cat:"Trochlear and Abducens Palsy",r:["Correct. Lateral rectus (CN VI) abducts the eye; its palsy leaves the eye adducted (turned in) and unable to move out, giving horizontal diplopia worse on gaze toward that side.", "Medial rectus adducts; if it failed the eye would drift OUT, not in.", "Superior oblique (CN IV) moves the eye down-and-out; its palsy gives VERTICAL diplopia, classically going down stairs, not a failure of abduction.", "The optic nerve carries vision (CN II); it does not move the eye."],source:"Dr. Maini - Lecture 21, ~24:00 and Lecture 20, ~1:21:00",quote:"Abducens, lateral rectus, LR6.",obj:"Abducens Nerve / Lateral Rectus",hint:"The muscle that pulls the eye OUTWARD has failed, so the eye sits pulled in."},
{q:"A patient reports vertical double vision and difficulty walking DOWN stairs; the affected eye cannot look down well when it is turned in (adducted). Which muscle and nerve are involved?",o:["Inferior oblique / CN III", "Superior rectus / CN III", "Superior oblique / CN IV", "Lateral rectus / CN VI"],c:2,cat:"Trochlear and Abducens Palsy",r:["Inferior oblique elevates and turns the eye up-and-out; its palsy impairs UPgaze in adduction, not downgaze.", "Superior rectus elevates the eye; its palsy impairs upgaze, not descending stairs.", "Correct. The superior oblique (trochlear, CN IV) turns the eye down and out; when the eye is adducted it acts as a depressor, so its palsy impairs downgaze in adduction (trouble on stairs) with vertical diplopia.", "Lateral rectus produces horizontal abduction, not the vertical downgaze deficit described."],source:"Dr. Maini - Lecture 20, ~1:25:00-1:26:00 and Lecture 21, ~06:00",quote:"Superior oblique passes through the trochlea and rotates the eyeball down and laterally, down and out.",obj:"Superior Oblique / Trochlear Nerve",hint:"The muscle that threads the pulley (trochlea) aims the eye down-and-out."},
{q:"To clinically ISOLATE the right superior rectus on the H-test, which way do you ask the patient to look?",o:["In (adduct) and down", "In (adduct) and up", "Out (abduct) and down", "Out (abduct) and up"],c:3,cat:"Extraocular Muscle Testing",r:["In-and-down is the testing position for the superior oblique, not the superior rectus.", "In-and-up is the muscle's ACTION (up-and-in), but you cannot isolate it that way.", "Out-and-down isolates the inferior rectus.", "Correct. With the eye abducted by lateral rectus, the superior rectus becomes a pure elevator, so you ask the patient to look out and up. Testing the recti starts with abduction."],source:"Dr. Maini - Lecture 21, ~00:30-05:00",quote:"For testing you ask the patient to look laterally, abduct, and look up. That is the testing of superior rectus.",obj:"Clinical Testing of Extraocular Muscles",hint:"Testing the recti = abduct first; elevation/depression stays the same as the action."},
{q:"On the H-test, to isolate the inferior oblique you ask the patient to look which way?",o:["Out and up", "In (adduct) and up", "Out and down", "In (adduct) and down"],c:1,cat:"Extraocular Muscle Testing",r:["Out-and-up isolates the superior rectus.", "Correct. To test the obliques you adduct the eye first; the inferior oblique still elevates, so the patient looks in and up.", "Out-and-down isolates the inferior rectus.", "In-and-down isolates the superior oblique."],source:"Dr. Maini - Lecture 21, ~03:00-06:00",quote:"For inferior oblique testing you ask the patient to look medial and up. To test the obliques you ask the patient to adduct, medially rotate.",obj:"Clinical Testing of Extraocular Muscles",hint:"Obliques = adduct first; the inferior oblique still elevates."},
{q:"Shine light in the RIGHT eye: neither pupil constricts. Shine light in the LEFT eye: both pupils constrict. Which structure is damaged?",o:["Right optic nerve (CN II, the afferent limb)", "Right oculomotor nerve (CN III, the efferent limb)", "Left optic nerve (CN II)", "Left oculomotor nerve (CN III)"],c:0,cat:"Pupillary Light Reflex",r:["Correct. A dead afferent (right optic nerve) means light in the right eye reaches no center, so neither pupil reacts; yet the right pupil still constricts when the left eye is lit, because its CN III is intact.", "A right CN III lesion would abolish the RIGHT pupil's constriction to any light, but the left pupil would still react when the right eye is lit.", "The left optic nerve is intact, since light in the left eye constricts both pupils.", "The left CN III is intact, since the left pupil constricts when the left eye is lit."],source:"Dr. Maini - Lecture 20, ~1:06:00-1:07:00",quote:"If the optic nerve of the right eye is not functioning and you shine light in the right eye, you get constriction in neither eye.",obj:"Light Reflex - Afferent Defect",hint:"A blind (afferent) eye cannot SEND the signal, so its light triggers nothing; the other eye still drives both pupils."},
{q:"Whichever eye you illuminate, the right pupil constricts but the left pupil NEVER constricts (the left eye still sees normally). Which nerve is damaged?",o:["Right optic nerve (CN II)", "Left optic nerve (CN II)", "Pretectal nucleus bilaterally", "Left oculomotor nerve (CN III)"],c:3,cat:"Pupillary Light Reflex",r:["The right optic nerve is intact, since lighting the right eye works.", "If the left optic nerve were out, lighting the left eye would fail to constrict either pupil, but lighting the right eye would still constrict both.", "Bilateral pretectal loss would abolish ALL responses, not just the left pupil.", "Correct. The left CN III (efferent) cannot drive the left sphincter pupillae, so the left pupil never constricts regardless of which eye is lit; the left eye's vision (afferent) is intact."],source:"Dr. Maini - Lecture 20, ~1:07:00-1:08:00",quote:"If the third nerve of the left eye is gone, there will be constriction in the right eye but no constriction in the left eye.",obj:"Light Reflex - Efferent Defect",hint:"A dead motor nerve means that pupil can never move, no matter which eye you light."},
{q:"In the pupillary light reflex, which pathway carries the MOTOR (efferent) response that constricts the pupil?",o:["Optic nerve to the lateral geniculate body", "Sympathetic from T1 to the superior cervical ganglion to dilator pupillae", "Oculomotor (parasympathetic) to the ciliary ganglion, then short ciliary nerves to sphincter pupillae", "Ophthalmic nerve to the trigeminal ganglion to sphincter pupillae"],c:2,cat:"Pupillary Light Reflex",r:["The optic nerve is the afferent (sensory) limb, and the lateral geniculate is for conscious vision, not the reflex motor limb.", "That sympathetic pathway DILATES the pupil, the opposite of the light reflex.", "Correct. From Edinger-Westphal, CN III preganglionic parasympathetics reach the ciliary ganglion, then short ciliary nerves drive the sphincter pupillae to constrict the pupil.", "V1 and the trigeminal ganglion are sensory (the corneal-reflex afferent), not the pupilloconstrictor motor path."],source:"Dr. Maini - Lecture 20, ~1:03:00-1:06:00",quote:"From the Edinger-Westphal nucleus, through oculomotor nerve, ciliary ganglion, short ciliary nerve, pupilloconstrictor muscle, the response is pupillary constriction.",obj:"Light Reflex Pathway",hint:"Constriction is parasympathetic: think CN III and the ciliary ganglion."},
{q:"A patient shifts gaze from a far object to a near one. Which set of changes is the accommodation (near) response?",o:["Divergence, dilation, and lens flattening", "Convergence, constriction, and increased lens convexity", "Convergence, dilation, and lens flattening", "Divergence, constriction, and increased lens convexity"],c:1,cat:"Accommodation and Near Reflex",r:["Divergence, dilation, and a flat lens are the FAR-vision settings, not the near response.", "Correct. The three C's of accommodation are convergence (medial recti), pupillary constriction, and increased convexity of the lens for near focus.", "The eyes converge (not diverge) and the pupil constricts (not dilates) for near vision.", "The eyes converge, not diverge, when focusing on a near target."],source:"Dr. Maini - Lecture 20, ~1:09:00-1:13:00",quote:"There are three changes: convergence of the eyeball, pupillary constriction, and increased convexity of the lens.",obj:"Accommodation Reflex",hint:"Three C's for close-up focusing: converge, constrict, convex."},
{q:"When the ciliary muscle contracts to focus on a near object, what happens to the suspensory ligament and the lens?",o:["The ligament tightens and the lens flattens", "The ligament tightens and the lens thickens", "The ligament relaxes and the lens flattens", "The ligament relaxes and the lens thickens (becomes more convex)"],c:3,cat:"Accommodation and Near Reflex",r:["A tight ligament and flat lens is the RESTING (far-vision) state when the ciliary muscle is relaxed.", "A tight ligament would flatten, not thicken, the lens.", "A relaxed ligament lets the lens thicken, not flatten.", "Correct. Ciliary contraction slackens the suspensory ligament, letting the elastic lens round up (thicken and become more convex) for near focus."],source:"Dr. Maini - Lecture 21, ~26:00-27:00 and Lecture 20, ~1:10:00-1:12:00",quote:"When it contracts it reduces the tension on the suspensory ligament of the lens, and then the lens thickens.",obj:"Ciliary Muscle / Accommodation",hint:"Contracting the ring loosens the guy-wires, so the lens can bulge."},
{q:"A patient's small pupils constrict briskly when focusing on a near target but do NOT constrict to light. What is this, and its classic cause?",o:["Argyll Robertson pupil; syphilis", "Horner syndrome; Pancoast tumor", "Oculomotor palsy; aneurysm", "Adie tonic pupil; a viral cause"],c:0,cat:"Accommodation and Near Reflex",r:["Correct. Argyll Robertson pupil is light-near dissociation: the light reflex is lost but accommodation is preserved, classically from syphilis, as Dr. Maini describes.", "Horner gives miosis with ptosis and anhidrosis, not selective loss of the light reflex with preserved accommodation.", "A CN III palsy gives a dilated, unreactive pupil with ptosis and a down-and-out eye, not a small pupil that accommodates.", "Dr. Maini names Argyll Robertson (syphilis) for this light-near dissociation, not an Adie tonic pupil."],source:"Dr. Maini - Lecture 20, ~1:15:00-1:16:00",quote:"Argyll Robertson pupil is a condition where light reflex is lost but accommodation reflex is preserved. It is seen in syphilis.",obj:"Argyll Robertson Pupil",hint:"Accommodates but does not react to light: a classic syphilis sign."},
{q:"Trace the correct drainage path of tears from the eye surface to the nose.",o:["Nasolacrimal duct, then lacrimal sac, then punctum, then canaliculi", "Canaliculi, then punctum, then lacrimal lake, then nasal cavity", "Lacrimal punctum, then canaliculi, then lacrimal sac, then nasolacrimal duct, then inferior meatus", "Lacrimal gland, then punctum, then nasolacrimal duct, then superior meatus"],c:2,cat:"Lacrimal and Eyelid Adnexa",r:["This reverses the flow; drainage goes toward the nose, not back to the punctum.", "The punctum is the INLET, so it comes before the canaliculi, not after.", "Correct. Tears enter the punctum on each papilla, run through the canaliculi to the lacrimal sac, then the nasolacrimal duct empties into the inferior meatus of the nose.", "The nasolacrimal duct opens into the INFERIOR meatus, not the superior, and the canaliculi and sac are skipped here."],source:"Dr. Maini - Lecture 19, ~27:00-30:00 and Lecture 20, ~06:00",quote:"Through the lacrimal punctum, tears are drained by two lacrimal canals to the sac, and through the nasolacrimal duct into the inferior meatus of the nasal cavity.",obj:"Lacrimal Apparatus / Tear Drainage",hint:"Start at the tiny pore (punctum) and finish under the inferior turbinate."},
{q:"After an untreated conjunctivitis, a patient develops a red, painful swelling at the MEDIAL angle of the eye with watering. Which structure is inflamed?",o:["Lacrimal gland (dacryoadenitis)", "Lacrimal sac (dacryocystitis)", "Meibomian gland (chalazion)", "Ciliary body"],c:1,cat:"Lacrimal and Eyelid Adnexa",r:["Dacryoadenitis inflames the lacrimal GLAND (superolateral, under the frontal bone) and is often autoimmune, not a medial-angle swelling.", "Correct. The lacrimal SAC sits at the medial angle; infection/blockage there is dacryocystitis, with pain and tearing at the inner corner.", "A chalazion is a lump ON the eyelid from a blocked Meibomian gland, not a medial-angle sac swelling.", "The ciliary body is inside the eye and secretes aqueous humor; it is unrelated to a medial-angle swelling."],source:"Dr. Maini - Lecture 20, ~06:00-09:00",quote:"Dacryocystitis is inflammation of the lacrimal sac, with severe pain at the location of the lacrimal sac.",obj:"Dacryocystitis",hint:"'Cyst' means sac; the sac lives at the inner corner of the eye."},
{q:"A patient with no tear secretion develops corneal drying and ulcers. Why is the cornea so vulnerable, and what normally nourishes it?",o:["It is highly vascular; supplied by the central retinal artery", "It is nourished only by the choroid", "It makes its own aqueous humor for nutrition", "It is avascular; nourished by the tear film in front and aqueous humor behind"],c:3,cat:"Lacrimal and Eyelid Adnexa",r:["The cornea is AVASCULAR (transparent); the central retinal artery supplies the retina, not the cornea.", "The choroid nourishes the outer retina, not the cornea.", "Aqueous humor is made by the ciliary processes, not the cornea.", "Correct. Being avascular, the cornea depends on the tear film anteriorly and aqueous humor posteriorly (plus atmospheric oxygen); losing tears (xerophthalmia) causes drying and ulceration."],source:"Dr. Maini - Lecture 19, ~28:00-31:00 and Lecture 20, ~24:00-25:00",quote:"Cornea is avascular; it gets its nutrition from the lacrimal fluid anteriorly and aqueous humor posteriorly.",obj:"Cornea Nutrition / Xerophthalmia",hint:"No blood vessels means it lives off the tears in front and the fluid behind."},
{q:"A firm lump WITHIN the eyelid (not at the lash margin) needs a minor surgical scoop to remove. Which gland is involved and what is the lesion called?",o:["Gland of Zeis; external hordeolum (stye)", "Meibomian (tarsal) gland; chalazion (internal hordeolum)", "Gland of Moll; stye", "Lacrimal gland; dacryoadenitis"],c:1,cat:"Lacrimal and Eyelid Adnexa",r:["The gland of Zeis is a sebaceous gland at the lash margin; its inflammation gives an EXTERNAL hordeolum (stye) at the margin, which drains on its own.", "Correct. A blocked/inflamed Meibomian (tarsal) gland deep in the tarsal plate gives a chalazion (internal hordeolum) ON the lid, which often needs surgical removal because of its narrow outlet.", "The gland of Moll is a sweat gland at the margin; it also gives a marginal stye, not a lump within the lid.", "The lacrimal gland is superolateral in the orbit, not within the eyelid margin."],source:"Dr. Maini - Lecture 19, ~22:00-25:00 and Lecture 20, ~13:00-14:00",quote:"If the tarsal (Meibomian) glands get inflamed you get an internal hordeolum or chalazion on the eyelid, not at the margin.",obj:"Hordeolum vs Chalazion",hint:"Deep in the tarsal plate = Meibomian = chalazion, seen on the lid, not the margin."},
{q:"A patient has raised intraocular pressure with headache and blurred vision. Blockage of which drainage structure produces this glaucoma?",o:["The nasolacrimal duct", "The central retinal vein", "The canal of Schlemm (sinus venosus sclerae) at the iridocorneal angle", "The ciliary processes"],c:2,cat:"Glaucoma and Aqueous Humor",r:["The nasolacrimal duct drains TEARS to the nose; it has nothing to do with intraocular pressure.", "Central retinal vein occlusion causes retinal hemorrhages, not the aqueous-outflow glaucoma described.", "Correct. Aqueous humor drains at the iridocorneal angle into the canal of Schlemm; blocking it backs up aqueous and raises intraocular pressure, causing glaucoma.", "The ciliary processes MAKE aqueous humor; blocking production would lower, not raise, the pressure."],source:"Dr. Maini - Lecture 20, ~49:00-52:00",quote:"If the canal of Schlemm is blocked there will be accumulation of aqueous humor that increases intraocular tension, leading to glaucoma.",obj:"Aqueous Drainage / Glaucoma",hint:"The angle between iris and cornea houses the drain; block it and pressure climbs."},
{q:"Where is aqueous humor produced, and what is its normal flow before it drains?",o:["Ciliary processes, then posterior chamber, then through the pupil to the anterior chamber, then the canal of Schlemm", "Lacrimal gland, then anterior chamber, then vitreous, then the canal of Schlemm", "Ciliary processes, then vitreous chamber, then the retina", "Iris, then posterior chamber, then the optic disc"],c:0,cat:"Glaucoma and Aqueous Humor",r:["Correct. The ciliary processes secrete aqueous into the posterior chamber; it flows through the pupil into the anterior chamber and drains via the canal of Schlemm.", "The lacrimal gland makes TEARS, not aqueous, and aqueous does not enter the vitreous.", "The vitreous chamber holds the gel-like vitreous body, not circulating aqueous humor.", "The iris does not secrete aqueous, and aqueous does not drain at the optic disc."],source:"Dr. Maini - Lecture 20, ~47:00-50:00",quote:"Aqueous humor is formed by the ciliary processes, secreted into the posterior chamber, flows through the pupil into the anterior chamber, and drains into the sinus venosus sclerae.",obj:"Aqueous Humor Circulation",hint:"Made behind the iris, flows through the pupil, drains at the angle."},
{q:"A young patient's eyeball is longer than normal and images focus IN FRONT of the retina. What is the refractive error and how is it corrected?",o:["Hyperopia; corrected with a convex lens", "Myopia; corrected with a concave lens", "Astigmatism; corrected with a cylindrical lens", "Presbyopia; corrected with reading glasses"],c:1,cat:"Sclera, Cornea and Refraction",r:["Hyperopia is a SHORT eyeball with the focus BEHIND the retina, corrected with a convex lens.", "Correct. Myopia (short-sightedness) has a long eyeball with the focus in front of the retina and is corrected with a concave (diverging) lens.", "Astigmatism is an irregular corneal curvature, corrected with a cylindrical lens, not a long eyeball.", "Presbyopia is age-related loss of near focus after about 40, not the long-eyeball error described."],source:"Dr. Maini - Lecture 20, ~1:00:00-1:02:00 and ~1:17:00",quote:"Myopia, light rays are focused in front of the retina. To correct myopia you wear concave glasses.",obj:"Refractive Errors",hint:"Long eye, near-sighted, needs a concave (minus) lens."},
{q:"In the corneal (blink) reflex, which nerves form the sensory (afferent) and motor (efferent) limbs?",o:["Afferent CN II; efferent CN III", "Afferent V1 (trigeminal); efferent CN VII (facial)", "Afferent CN VII; efferent V1", "Afferent V1; efferent CN III"],c:1,cat:"Sclera, Cornea and Refraction",r:["CN II (vision) and CN III are not the blink-reflex limbs.", "Correct. The ophthalmic division of the trigeminal (V1) senses the corneal touch, and the facial nerve (VII) fires orbicularis oculi to close the lids.", "This reverses the limbs; V1 is sensory and VII is motor.", "The motor limb is CN VII (orbicularis oculi), not CN III."],source:"Dr. Maini - Lecture 20, ~1:16:00-1:17:00 and ~26:00-27:00",quote:"Sensory division is the fifth nerve, motor division is the seventh nerve; orbicularis oculi contracts and you close your eyes.",obj:"Corneal Reflex",hint:"Feel it with V, blink with VII."},
{q:"You suspect jaundice in a patient. According to Dr. Maini, which part of the eye shows the yellow discoloration FIRST, and why?",o:["The cornea, because it is transparent", "The iris, because it is pigmented", "The retina, because it is vascular", "The sclera, because it is white and bilirubin is noticed there first"],c:3,cat:"Sclera, Cornea and Refraction",r:["The cornea is transparent and avascular; discoloration is not first noticed there.", "The iris's own pigment masks any yellowing.", "The retina is internal and is not inspected for jaundice on external exam.", "Correct. The white sclera makes deposited bilirubin visible first (scleral icterus) once levels exceed about 2 mg percent, so it is the first place jaundice is noticed."],source:"Dr. Maini - Lecture 20, ~22:00-23:00",quote:"Sclera is the first one to appear yellow; bilirubin is noticed here first because it is very white.",obj:"Sclera / Jaundice",hint:"Look at the white of the eye for the first sign of yellow."},
{q:"Fundoscopy shows swelling of the optic disc (papilledema). What does this most directly indicate?",o:["Glaucoma from raised intraocular pressure", "Raised intracranial pressure", "Age-related macular degeneration", "Retinal detachment"],c:1,cat:"Retina and Optic Disc",r:["Glaucoma is raised INTRAocular pressure; it is not the disc swelling of raised intracranial pressure.", "Correct. Papilledema (optic disc edema) reflects raised INTRAcranial pressure from a space-occupying lesion, hemorrhage, or CSF buildup transmitted along the optic nerve sheath.", "Macular degeneration affects the macula (central vision), not the optic disc.", "Retinal detachment separates the neural retina; it is not disc edema."],source:"Dr. Maini - Lecture 20, ~57:00-1:00:00",quote:"Papilledema is edema of the optic disc; it indicates increased intracranial tension.",obj:"Papilledema",hint:"A swollen disc points to pressure inside the SKULL, not inside the eye."},
{q:"An elderly patient loses the CENTER of faces and print but keeps peripheral vision. Which retinal structure has degenerated?",o:["The optic disc (blind spot)", "The ora serrata", "The macula lutea / fovea centralis", "The lamina cribrosa"],c:2,cat:"Retina and Optic Disc",r:["The optic disc is already the blind spot (no photoreceptors); its problems are papilledema or cupping, not loss of central detail.", "The ora serrata is the serrated anterior margin of the retina; it is not the point of acute central vision.", "Correct. The macula lutea, with its cone-rich fovea centralis, gives acute central vision; its degeneration loses the center while peripheral (rod) vision persists.", "The lamina cribrosa is the sieve-like scleral opening for the optic nerve, not a photoreceptor zone."],source:"Dr. Maini - Lecture 20, ~43:00-45:00",quote:"When there is macular degeneration, central vision is lost and peripheral vision is retained.",obj:"Macula / Fovea Centralis",hint:"The cone-packed central pit is the casualty when the center of the image drops out."},
{q:"A patient can make out shapes in a dim room but cannot tell colors until the lights come on. Which photoreceptors are working in the dark?",o:["Rods, which work in dim light but give no color", "Cones, concentrated at the fovea", "Bipolar cells", "Ganglion cells"],c:0,cat:"Retina and Optic Disc",r:["Correct. Rods are stimulated by minimal light (night vision) but cannot appreciate color, so in the dark you see shapes without color.", "Cones need bright light and provide color vision (concentrated at the fovea centralis), so they underperform in the dark.", "Bipolar cells relay signals between photoreceptors and ganglion cells; they are not light-catching photoreceptors.", "Ganglion cells' axons form the optic nerve; they are not photoreceptors."],source:"Dr. Maini - Lecture 20, ~38:00-39:00 and Lecture 19, ~16:00-17:00",quote:"Rods are stimulated by very minimum light; they help you see in dim surroundings but cannot appreciate colors.",obj:"Rods vs Cones",hint:"Dim-light, no-color receptors are the rod-shaped ones."},
{q:"An infection in the facial 'danger area' spreads to the cavernous sinus. Which venous connection allows this backward spread from the face?",o:["The nasolacrimal duct", "The superior ophthalmic vein, which links the facial vein to the cavernous sinus", "The central retinal artery", "The canal of Schlemm"],c:1,cat:"Orbital Vessels and Cavernous Sinus",r:["The nasolacrimal duct carries tears, not blood, so it cannot spread a venous infection.", "Correct. The superior ophthalmic vein drains directly into the cavernous sinus and connects anteriorly with the facial vein, so a facial infection can track backward into the cavernous sinus.", "The central retinal artery is arterial and supplies the retina; it is not the venous route to the cavernous sinus.", "The canal of Schlemm drains aqueous humor, not facial venous blood."],source:"Dr. Maini - Lecture 21, ~12:00-13:00",quote:"Superior ophthalmic vein drains directly into the cavernous sinus; anteriorly both ophthalmic veins connect with the facial vein.",obj:"Orbital Veins / Cavernous Sinus",hint:"The ophthalmic veins bridge the facial vein to the cavernous sinus."},
{q:"Sudden, painless, total blindness in one eye follows occlusion of a small end-artery running inside the optic nerve. Which artery is it, and what is its parent vessel?",o:["Lacrimal artery, from the external carotid", "Infraorbital artery, from the maxillary", "Anterior ciliary artery, from the facial", "Central retinal artery, from the ophthalmic artery (internal carotid)"],c:3,cat:"Orbital Vessels and Cavernous Sinus",r:["The lacrimal artery is actually a branch of the ophthalmic artery (internal carotid), not the external carotid, and it supplies the lacrimal gland.", "The infraorbital artery (from the maxillary) supplies the face below the orbit, not the retina.", "The anterior ciliary artery arises from the ophthalmic system, not the facial, and enters at the corneoscleral junction.", "Correct. The central retinal artery is a branch of the ophthalmic artery (from the internal carotid); it runs in the optic nerve to the center of the optic disc, and as an end artery its occlusion causes sudden blindness."],source:"Dr. Maini - Lecture 21, ~10:00-11:00",quote:"Ophthalmic artery is a branch of the internal carotid; the central retinal artery runs in the substance of the optic nerve to enter the eye at the center of the optic disc.",obj:"Central Retinal Artery",hint:"The retina's lifeline is an end-branch of the ophthalmic artery off the internal carotid."},
{q:"Which structures pass through the OPTIC CANAL, as opposed to the superior orbital fissure?",o:["The optic nerve (CN II) and the ophthalmic artery", "CN III, IV, VI and the superior ophthalmic vein", "The maxillary nerve (V2) and the infraorbital vessels", "All three branches of V1 (lacrimal, frontal, nasociliary)"],c:0,cat:"Orbital Walls and Fissures",r:["Correct. The optic canal, in the lesser wing of the sphenoid, transmits the optic nerve (CN II) and the ophthalmic artery.", "CN III, IV, VI and the superior ophthalmic vein pass through the SUPERIOR ORBITAL FISSURE, not the optic canal.", "V2 and the infraorbital vessels run through the inferior orbital fissure region, not the optic canal.", "The V1 branches (lacrimal, frontal, nasociliary) pass through the superior orbital fissure."],source:"Dr. Maini - Lecture 19, ~11:00-14:00",quote:"Optic canal is part of the lesser wing of the sphenoid, for the optic nerve and ophthalmic artery.",obj:"Orbital Openings",hint:"Only two things thread the optic canal: the nerve of sight and its companion artery."},
{q:"A blow to the eye fractures the orbital FLOOR and the contents herniate into the sinus below (a blowout fracture). Which bone forms most of the floor, and which sinus is entered?",o:["Ethmoid; the ethmoid air cells", "Maxilla; the maxillary sinus", "Frontal; the frontal sinus", "Sphenoid; the sphenoid sinus"],c:1,cat:"Orbital Walls and Fissures",r:["The ethmoid forms most of the MEDIAL wall (with its air cells), not the floor.", "Correct. The orbital floor is mostly the maxilla, so a blowout fracture drops the contents into the maxillary sinus beneath.", "The frontal bone forms the ROOF, and the frontal sinus lies above the orbit.", "The sphenoid contributes to the posterior wall and apex, not the main floor."],source:"Dr. Maini - Lecture 19, ~05:00-07:00",quote:"In the floor, mostly it is the maxillary bone that forms the floor.",obj:"Orbital Floor",hint:"The floor is the maxilla, so a blowout drops into the maxillary sinus."},
{q:"In the ciliary ganglion, which fibers actually SYNAPSE, and what do their postganglionic fibers innervate?",o:["Sympathetic fibers; dilator pupillae", "Sensory fibers from the nasociliary nerve; the cornea", "Parasympathetic fibers from CN III; sphincter pupillae and ciliary muscle", "All three roots synapse there"],c:2,cat:"Ciliary Ganglion and Autonomics",r:["Sympathetic fibers (from the superior cervical ganglion) only PASS THROUGH the ciliary ganglion without synapsing, en route to dilator pupillae.", "Sensory (nasociliary, V1) fibers merely pass through the ganglion without synapsing.", "Correct. Only the parasympathetic (preganglionic, from CN III) fibers synapse in the ciliary ganglion; their postganglionics run in short ciliary nerves to sphincter pupillae and ciliary muscle.", "Only the parasympathetic root synapses; the sympathetic and sensory roots pass straight through."],source:"Dr. Maini - Lecture 21, ~25:00-30:00",quote:"Oculomotor nerve gives preganglionic parasympathetic fibers that synapse in the ciliary ganglion; postganglionic fibers pass through short ciliary nerves to the sphincter pupillae and ciliary muscle.",obj:"Ciliary Ganglion",hint:"Only the parasympathetic root changes trains here; sympathetic and sensory ride straight through."},
{q:"Which cranial nerve carries the PARASYMPATHETIC secretomotor fibers to the lacrimal gland (relayed in the pterygopalatine ganglion)?",o:["Facial nerve (CN VII), via the greater petrosal nerve", "Oculomotor nerve (CN III)", "Trigeminal V1 (the lacrimal nerve)", "Glossopharyngeal nerve (CN IX)"],c:0,cat:"Ciliary Ganglion and Autonomics",r:["Correct. Facial nerve parasympathetics travel via the greater petrosal nerve to the nerve of the pterygoid canal, synapse in the pterygopalatine ganglion, and reach the lacrimal gland as secretomotor fibers.", "CN III parasympathetics go to the CILIARY ganglion (pupil and lens), not the lacrimal gland.", "The lacrimal nerve (V1) is sensory and only carries hitch-hiking secretomotor fibers to the gland; it is not the parasympathetic source.", "CN IX parasympathetics supply the parotid gland via the otic ganglion, not the lacrimal gland."],source:"Dr. Maini - Lecture 20, ~09:00-12:00",quote:"The lacrimal gland gets its parasympathetic innervation from the seventh nerve, the facial nerve, through the greater petrosal nerve, to the pterygopalatine ganglion.",obj:"Lacrimal Gland Autonomics",hint:"Tears are a facial-nerve (VII) job, routed through the pterygopalatine ganglion."}

const CAT_NAMES=["Horner Syndrome", "Oculomotor (CN III) Palsy", "Trochlear and Abducens Palsy", "Extraocular Muscle Testing", "Pupillary Light Reflex", "Accommodation and Near Reflex", "Lacrimal and Eyelid Adnexa", "Glaucoma and Aqueous Humor", "Sclera, Cornea and Refraction", "Retina and Optic Disc", "Orbital Vessels and Cavernous Sinus", "Orbital Walls and Fissures", "Ciliary Ganglion and Autonomics"];
const LS_KEY="ga0202_m08_eye_clinical_cases";
BANK.forEach(function(q,i){q._bankId=i;});
let idx=0,score=0,attempts=0,reaskQueue=[];
let catStats={};CAT_NAMES.forEach(function(c){catStats[c]={c:0,t:0};});
let questions=[];let answerMap={};let answerHistory=[];let browseIdx=-1;let navOpen=false;let jumpOpen=false;let instrOpen=false;let reviewList=null;
function shuffle(a){for(let i=a.length-1;i>0;i--){let j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}
function saveState(){try{localStorage.setItem(LS_KEY,JSON.stringify({idx,score,attempts,reaskQueue:reaskQueue.map(function(q){return q._bankId;}),questions:questions.map(function(q){return{_bankId:q._bankId,_isReask:q._isReask||false};}),answerMap,answerHistory,navOpen,jumpOpen}));}catch(e){}}
function loadState(){try{let s=JSON.parse(localStorage.getItem(LS_KEY));if(!s||!s.questions)return false;idx=s.idx||0;score=s.score||0;attempts=s.attempts||0;answerMap=s.answerMap||{};answerHistory=s.answerHistory||[];navOpen=false;jumpOpen=false;questions=s.questions.map(function(ref){let q=Object.assign({},BANK[ref._bankId]);if(ref._isReask)q._isReask=true;return q;});reaskQueue=(s.reaskQueue||[]).map(function(id){return Object.assign({},BANK[id],{_isReask:true});});CAT_NAMES.forEach(function(c){catStats[c]={c:0,t:0};});for(let k in answerMap){let m=answerMap[k];let q=BANK[k];if(!catStats[q.cat])catStats[q.cat]={c:0,t:0};catStats[q.cat].t++;if(m.isCorrect)catStats[q.cat].c++;}return true;}catch(e){return false;}}
function init(){if(!loadState()){questions=shuffle(BANK.slice());idx=0;score=0;attempts=0;reaskQueue=[];answerMap={};answerHistory=[];}render();}
function renderNav(){if(!navOpen)return'';let html='<div class="nav-grid">';for(let i=0;i<BANK.length;i++){let cls='nav-cell';let activeList=reviewList||answerHistory;if(browseIdx>=0&&activeList[browseIdx]===i)cls+=' nc-review';else if(browseIdx===-1&&idx<questions.length&&questions[idx]._bankId===i)cls+=' nc-current';else if(i in answerMap)cls+=answerMap[i].isCorrect?' nc-correct':' nc-wrong';html+='<div class="'+cls+'" onclick="navJump('+i+')">'+(i+1)+'</div>';}return html+'</div>';}
function renderJumpBar(){if(!jumpOpen)return'';let step=BANK.length>=40?10:BANK.length>=20?5:3;let html='<div class="jump-bar">';for(let m=1;m<=BANK.length;m+=step){let bankId=m-1;let cls='jump-btn';if(bankId in answerMap)cls+=answerMap[bankId].isCorrect?' jb-correct':' jb-wrong';html+='<div class="'+cls+'" onclick="navJump('+bankId+')">Q'+m+'</div>';}return html+'</div>';}
function navJump(bankId){if(bankId in answerMap){let activeList=reviewList||answerHistory;let pos=activeList.indexOf(bankId);if(pos!==-1){browseIdx=pos;renderHistoryItem();}else if(!reviewList){let p2=answerHistory.indexOf(bankId);if(p2!==-1){browseIdx=p2;reviewList=null;renderHistoryItem();}}}else{browseIdx=-1;reviewList=null;for(let i=0;i<questions.length;i++){if(questions[i]._bankId===bankId&&!questions[i]._isReask){idx=i;render();return;}}}}
function toggleNav(){navOpen=!navOpen;if(browseIdx>=0)renderHistoryItem();else render();}
function toggleJump(){jumpOpen=!jumpOpen;if(browseIdx>=0)renderHistoryItem();else render();}
function renderHistoryItem(){let activeList=reviewList||answerHistory;let bankId=activeList[browseIdx];let info=answerMap[bankId];let q=BANK[bankId];let uniqueAnswered=Object.keys(answerMap).length;let optHTML='';q.o.forEach(function(opt,i){let cls='opt-btn disabled';if(i===info.correct)cls+=' show-correct';if(i===info.picked&&!info.isCorrect)cls+=' picked-wrong';else if(i===info.picked&&info.isCorrect)cls+=' picked-correct';let letter=String.fromCharCode(65+i);optHTML+='<button class="'+cls+'"><span class="letter">'+letter+'.</span> '+opt+'<div class="rationale" style="display:block">'+q.r[i]+'</div></button>';});let prevDisabled=browseIdx<=0?' disabled':'';let nextDisabled=browseIdx>=activeList.length-1?' disabled':'';document.getElementById('app').innerHTML='<h1>👁️ GA 0202 · Module 8 — The Eye & Orbit · Clinical Cases & Must-Knows</h1><p class="subtitle">Dr. Maini — applied eye and orbit vignettes: Horner and CN III/IV/VI palsies, pupillary and accommodation reflexes, lacrimal apparatus, glaucoma and refractive errors</p><div style="text-align:center;font-size:.72rem;color:#93c5fd;background:#0f172a;border:1px solid #334155;border-radius:8px;padding:6px 10px;margin:2px auto 12px;max-width:620px;line-height:1.45">🔊 Best voices in Microsoft Edge (it has the natural Ava / Emma / Andrew voices). Other browsers work but sound more robotic.</div><div class="stats"><div class="stat"><div class="stat-val">'+attempts+'</div><div class="stat-label">Attempts</div></div><div class="stat"><div class="stat-val">'+score+'</div><div class="stat-label">Correct</div></div><div class="stat"><div class="stat-val">'+(attempts?Math.round(score/attempts*100):0)+'%</div><div class="stat-label">Accuracy</div></div><div class="stat"><div class="stat-val">'+reaskQueue.length+'</div><div class="stat-label">Re-ask</div></div><button onclick="confirmRestart()" class="restart-sm">&#8635; Restart</button></div><button class="btn-nav-toggle" onclick="toggleNav()">'+(navOpen?'\u25bc Hide Navigator':'\u25b6 Question Navigator ('+uniqueAnswered+'/'+BANK.length+')')+'</button>'+renderNav()+'<button class="btn-nav-toggle" onclick="toggleJump()">'+(jumpOpen?'\u25bc Hide Jump Bar':'\u25b6 Jump to Question')+'</button>'+renderJumpBar()+'<div class="browse-banner">\ud83d\udcdd Reviewing '+(reviewList?'missed ':'')+'answer '+(browseIdx+1)+' of '+activeList.length+'</div><div class="card"><span class="cat-badge">'+q.cat+'</span><div class="q-text">Q'+(BANK.indexOf(q)+1)+': '+q.q+'</div>'+optHTML+'<div class="source-line" style="display:block"><span>Source:</span> '+q.source+'</div>'+(q.quote?'<div class="quote-line" style="display:block">'+q.quote+'</div>':'')+(q.profTip?'<div class="prof-tip" style="display:block"><span class="tip-label">Professor:</span> '+q.profTip+'</div>':'')+(q.obj?'<div class="obj-tag" style="display:block">'+q.obj+'</div>':'')+'<div class="btn-group"><button class="btn-prev" onclick="prevBrowse()"'+prevDisabled+'>\u2190 Previous</button><button class="btn-next" onclick="returnToQuiz()" style="display:inline-block">Return to Quiz</button><button class="btn-prev" onclick="nextBrowse()"'+nextDisabled+'>Next \u2192</button></div></div>';}
function prevBrowse(){if(browseIdx>0){browseIdx--;renderHistoryItem();}}
function nextBrowse(){let activeList=reviewList||answerHistory;if(browseIdx<activeList.length-1){browseIdx++;renderHistoryItem();}}
function returnToQuiz(){browseIdx=-1;reviewList=null;render();}
function render(){let app=document.getElementById('app');while(idx<questions.length&&!questions[idx]._isReask&&questions[idx]._bankId in answerMap){idx++;}if(idx>=questions.length&&reaskQueue.length===0)return showSummary();if(reaskQueue.length>0&&(idx>=questions.length||(idx>0&&idx%3===0))){questions.splice(idx,0,reaskQueue.shift());}if(idx>=questions.length)return showSummary();let q=questions[idx];let uniqueAnswered=Object.keys(answerMap).length;let pct=Math.min(100,Math.round((uniqueAnswered/BANK.length)*100));let optHTML='';q.o.forEach(function(opt,i){let letter=String.fromCharCode(65+i);optHTML+='<button class="opt-btn" id="ob'+i+'" onclick="pick('+i+')"><span class="letter">'+letter+'.</span> '+opt+'<div class="rationale" id="rat'+i+'">'+q.r[i]+'</div></button>';});app.innerHTML='<h1>👁️ GA 0202 · Module 8 — The Eye & Orbit · Clinical Cases & Must-Knows</h1><p class="subtitle">Dr. Maini — applied eye and orbit vignettes: Horner and CN III/IV/VI palsies, pupillary and accommodation reflexes, lacrimal apparatus, glaucoma and refractive errors</p><div style="text-align:center;font-size:.72rem;color:#93c5fd;background:#0f172a;border:1px solid #334155;border-radius:8px;padding:6px 10px;margin:2px auto 12px;max-width:620px;line-height:1.45">🔊 Best voices in Microsoft Edge (it has the natural Ava / Emma / Andrew voices). Other browsers work but sound more robotic.</div><div class="stats"><div class="stat"><div class="stat-val">'+attempts+'</div><div class="stat-label">Attempts</div></div><div class="stat"><div class="stat-val">'+score+'</div><div class="stat-label">Correct</div></div><div class="stat"><div class="stat-val">'+(attempts?Math.round(score/attempts*100):0)+'%</div><div class="stat-label">Accuracy</div></div><div class="stat"><div class="stat-val">'+reaskQueue.length+'</div><div class="stat-label">Re-ask</div></div><button onclick="confirmRestart()" class="restart-sm">&#8635; Restart</button></div><button class="btn-nav-toggle" onclick="toggleNav()">'+(navOpen?'\u25bc Hide Navigator':'\u25b6 Question Navigator ('+uniqueAnswered+'/'+BANK.length+')')+'</button>'+renderNav()+'<button class="btn-nav-toggle" onclick="toggleJump()">'+(jumpOpen?'\u25bc Hide Jump Bar':'\u25b6 Jump to Question')+'</button>'+renderJumpBar()+'<button class="btn-nav-toggle" onclick="toggleInstr()" style="border-color:#334155">'+(instrOpen?'\u25bc Hide Instructions':'\u25b6 How This Drill Works')+'</button>'+(instrOpen?'<div class="instructions" style="display:block"><h3>How This Drill Works</h3><ul><li>Answer each question by clicking A/B/C/D</li><li><span class="key">Re-ask system</span>: Missed questions come back later so you must <strong>get it right twice</strong></li><li><span class="key">Question Navigator</span>: Click any cell to jump to or review that question</li><li><span class="key">Jump to Question</span>: Quick milestone markers</li><li><span class="key">Previous button</span>: Browse back through answered questions</li><li>Every answer reveals: rationale, source, Dr. Maini quote, professor tip, and <strong>study guide item</strong></li><li>Progress is <strong>auto-saved</strong></li><li>At the end: category breakdown + <strong>Review Only Missed</strong></li></ul></div>':'')+'<div class="progress-track"><div class="progress-fill" style="width:'+pct+'%"></div></div><div class="card"><span class="cat-badge">'+q.cat+(q._isReask?' \ud83d\udd01 RE-ASK':'')+'</span><div class="q-text">Q'+(idx+1)+' of '+questions.length+': '+q.q+'</div>'+(q.hint?'<button class="btn-hint" onclick="this.nextElementSibling.style.display=\'block\';this.style.display=\'none\'">\ud83d\udca1 Show Hint</button><div class="hint-text" style="display:none">\ud83d\udca1 '+q.hint+'</div>':'')+optHTML+'<div class="source-line" id="srcLine"><span>Source:</span> '+q.source+'</div>'+(q.quote?'<div class="quote-line" id="quoteLine">'+q.quote+'</div>':'')+(q.profTip?'<div class="prof-tip" id="tipLine"><span class="tip-label">Professor:</span> '+q.profTip+'</div>':'')+(q.obj?'<div class="obj-tag" id="objTag">'+q.obj+'</div>':'')+'<div class="btn-group" id="btnGroup"><button class="btn-prev" onclick="prevAnswer()"'+(answerHistory.length===0?' disabled':'')+'>\u2190 Previous</button><button class="btn-next" id="btnNext" onclick="nextQ()">Next Question \u2192</button></div></div>';}
function pick(i){let q=questions[idx];let opts=document.querySelectorAll('.opt-btn');if(opts[0]&&opts[0].classList.contains('disabled'))return;opts.forEach(function(o){o.classList.add('disabled');o.onclick=null;});let correct=q.c;let isCorrect=i===correct;opts[i].classList.add(isCorrect?'picked-correct':'picked-wrong');if(!isCorrect)opts[correct].classList.add('show-correct');attempts++;if(!catStats[q.cat])catStats[q.cat]={c:0,t:0};catStats[q.cat].t++;if(isCorrect){score++;catStats[q.cat].c++;}else{reaskQueue.push(Object.assign({},q,{_isReask:true}));}if(q._bankId!==undefined){if(!(q._bankId in answerMap)){answerMap[q._bankId]={picked:i,correct:correct,isCorrect:isCorrect,attempts:1,everWrong:!isCorrect};}else{let m=answerMap[q._bankId];m.picked=i;m.isCorrect=isCorrect;m.attempts++;if(!isCorrect)m.everWrong=true;}}if(!answerHistory.includes(q._bankId))answerHistory.push(q._bankId);for(let j=0;j<q.o.length;j++){let r=document.getElementById('rat'+j);if(r)r.style.display='block';}let sl=document.getElementById('srcLine');if(sl)sl.style.display='block';let ql=document.getElementById('quoteLine');if(ql)ql.style.display='block';let tl=document.getElementById('tipLine');if(tl)tl.style.display='block';let ot=document.getElementById('objTag');if(ot)ot.style.display='block';let nb=document.getElementById('btnNext');if(nb)nb.style.display='inline-block';saveState();}
function nextQ(){idx++;render();saveState();}
function prevAnswer(){if(answerHistory.length===0)return;browseIdx=answerHistory.length-1;renderHistoryItem();}
function showSummary(){let app=document.getElementById('app');let uniqueAnswered=Object.keys(answerMap).length;let mastered=0;let everWrongCount=0;for(let k in answerMap){if(answerMap[k].isCorrect)mastered++;if(answerMap[k].everWrong)everWrongCount++;}let pct=uniqueAnswered>0?Math.round(mastered/uniqueAnswered*100):0;let cls=pct>=85?'great':pct>=65?'ok':'rough';let catHTML='<table class="cat-table"><tr><th>Study Guide Item</th><th>Score</th></tr>';for(let cat of CAT_NAMES){if(catStats[cat]&&catStats[cat].t>0)catHTML+='<tr><td>'+cat+'</td><td>'+catStats[cat].c+'/'+catStats[cat].t+'</td></tr>';}catHTML+='</table>';app.innerHTML='<h1>👁️ GA 0202 · Module 8 — The Eye & Orbit · Clinical Cases & Must-Knows</h1><p class="subtitle">Dr. Maini — applied eye and orbit vignettes: Horner and CN III/IV/VI palsies, pupillary and accommodation reflexes, lacrimal apparatus, glaucoma and refractive errors</p><div style="text-align:center;font-size:.72rem;color:#93c5fd;background:#0f172a;border:1px solid #334155;border-radius:8px;padding:6px 10px;margin:2px auto 12px;max-width:620px;line-height:1.45">🔊 Best voices in Microsoft Edge (it has the natural Ava / Emma / Andrew voices). Other browsers work but sound more robotic.</div><div class="summary" style="display:block"><h2>Quiz Complete!</h2><div class="pct '+cls+'">'+pct+'%</div><p style="color:#94a3b8">'+mastered+' of '+uniqueAnswered+' mastered on latest attempt</p><p class="detail">Attempts: '+attempts+' | Ever missed: '+everWrongCount+' | Re-asked: '+(attempts-uniqueAnswered)+'</p>'+catHTML+(everWrongCount>0?'<button class="review-btn" onclick="reviewMissed()">Review Only Missed ('+everWrongCount+')</button>':'')+'<br><button class="restart-btn" onclick="restart()">Restart Drill</button></div>';}
function reviewMissed(){let missed=answerHistory.filter(function(id){return answerMap[id]&&answerMap[id].everWrong;});if(missed.length===0)return;reviewList=missed;browseIdx=0;renderHistoryItem();}
function restart(){questions=shuffle(BANK.slice());idx=0;score=0;attempts=0;reaskQueue=[];answerMap={};answerHistory=[];browseIdx=-1;reviewList=null;CAT_NAMES.forEach(function(c){catStats[c]={c:0,t:0};});render();saveState();}
function confirmRestart(){if(confirm('Restart the drill? All progress will be lost.'))restart();}
function toggleInstr(){instrOpen=!instrOpen;if(browseIdx>=0)renderHistoryItem();else render();}
init();
</script>

<script>
const TIMESTAMPS=[];
var audioAutoPlay=true;

// Follow-along mode
var _origShuffle=shuffle;
var followMode=true;
var reaskMode=true;
shuffle=function(a){return followMode?a:_origShuffle(a);};

// ── Persistent audio bar: survives every render() + renderHistoryItem() call ──
var _audioBar=null;
function _buildAudioBar(){
  var ab=document.createElement('div');
  ab.id='audio-bar';
  ab.className='audio-bar';
  ab.innerHTML='<audio id="mk-audio" controls preload="none"><source src="https://dgsc23.github.io/dc-study-audio/fab-201-m02-shoulder-forearm-L04.mp3" type="audio/mpeg">Audio not found. Place MP3 in same folder.</audio>'
    +'<div class="audio-info">'
    +'<span class="timestamp-badge" id="ts-badge">⏱ --:--</span>'
    +'<div class="skip-btns">'
    +'<button class="btn-skip" onclick="skipAudio(-30)" title="Back 30s">⏪ 30</button>'
    +'<button class="btn-skip" onclick="skipAudio(-10)" title="Back 10s">⏪ 10</button>'
    +'<button class="btn-play-here" onclick="playFromHere()">▶ Play From Here</button>'
    +'<button class="btn-skip" onclick="skipAudio(10)" title="Forward 10s">10 ⏩</button>'
    +'<button class="btn-skip" onclick="skipAudio(30)" title="Forward 30s">30 ⏩</button>'
    +'</div>'
    +'<div class="audio-modes">'
    +'<label class="audio-auto-label"><input type="radio" name="amode" value="seek" onchange="setAudioMode(\'seek\')"> Seek per Q</label>'
    +'<label class="audio-auto-label"><input type="radio" name="amode" value="continuous" checked onchange="setAudioMode(\'continuous\')"> Continuous play</label>'
    +'<label class="audio-auto-label"><input type="radio" name="amode" value="off" onchange="setAudioMode(\'off\')"> Audio off</label>'
    +'</div>'
      +'<div class=\"speed-block\"><div class=\"speed-top\"><span class=\"speed-label\">Speed</span><button class=\"btn-speed-pm\" onclick=\"fabSetSpeed(fabCurrentSpeed - 0.05)\">&minus;.05</button><span class=\"speed-val\" id=\"speed-display\">1.00x</span><button class=\"btn-speed-pm\" onclick=\"fabSetSpeed(fabCurrentSpeed + 0.05)\">+.05</button></div><div class=\"speed-presets\"><button class=\"btn-speed-preset\" onclick=\"fabSetSpeed(0.5)\">0.5x</button><button class=\"btn-speed-preset\" onclick=\"fabSetSpeed(0.75)\">0.75x</button><button class=\"btn-speed-preset\" onclick=\"fabSetSpeed(0.9)\">0.9x</button><button class=\"btn-speed-preset active\" onclick=\"fabSetSpeed(1.0)\">1x</button><button class=\"btn-speed-preset\" onclick=\"fabSetSpeed(1.1)\">1.1x</button><button class=\"btn-speed-preset\" onclick=\"fabSetSpeed(1.25)\">1.25x</button><button class=\"btn-speed-preset\" onclick=\"fabSetSpeed(1.5)\">1.5x</button><button class=\"btn-speed-preset\" onclick=\"fabSetSpeed(2.0)\">2x</button></div></div><div class=\"transcript-toggle\"><button class=\"btn-transcript\" id=\"btn-transcript\" onclick=\"fabToggleTranscript()\">\ud83d\udcdc Transcript</button></div><div class=\"transcript-box\" id=\"transcript-box\"></div>'
    +'</div>';
  return ab;
}

function _ensureAudioAttached(){
  var app=document.getElementById('app');
  if(!app)return;
  if(!_audioBar)_audioBar=_buildAudioBar();
  var card=app.querySelector('.card');
  if(card&&_audioBar.parentNode!==card.parentNode){
    card.parentNode.insertBefore(_audioBar,card);
  } else if(!card&&_audioBar.parentNode!==app){
    // Summary screen — attach at top so audio keeps playing
    app.insertBefore(_audioBar,app.firstChild);
  }
  updateTimestampBadge();
}

// Override render to preserve audio across wipes
var _origRender=render;
render=function(){
  if(_audioBar&&_audioBar.parentNode){_audioBar.parentNode.removeChild(_audioBar);}
  _origRender();
  _ensureAudioAttached();

  // Toggle bar + re-ask banner (stateful — rebuild if missing)
  var app=document.getElementById('app');
  if(!document.getElementById('mk-toggle-bar')){
    var bar=document.createElement('div');
    bar.id='mk-toggle-bar';
    bar.className='follow-toggle';
    bar.innerHTML='<button class="follow-btn'+(followMode?' active':'')+'" onclick="setFollowMode(true)">🔊 Follow Audio Order</button>'
      +'<button class="follow-btn'+(!followMode?' active':'')+'" onclick="setFollowMode(false)">🔀 Shuffle Mode</button>'
      +'<button class="reask-btn'+(reaskMode?' active':'')+'" onclick="toggleReask()">🚨 Re-Ask Missed</button>';
    var banner=document.createElement('div');
    banner.id='reask-banner';
    banner.className='reask-banner';
    var firstChild=app.firstChild;
    if(firstChild&&firstChild.nextSibling){
      app.insertBefore(banner,firstChild.nextSibling);
      app.insertBefore(bar,firstChild.nextSibling);
    }
  }
  buildReaskBar();

  // Re-ask card glow
  var card=document.querySelector('.card');
  if(card){
    var isReask=idx<questions.length&&questions[idx]&&questions[idx]._isReask;
    if(isReask){
      card.classList.add('reask-glow');
      if(!card.querySelector('.reask-card-badge')){
        var badge=document.createElement('div');
        badge.className='reask-card-badge';
        badge.textContent='🔁 RE-ASK — You missed this one. Get it right!';
        card.insertBefore(badge,card.firstChild);
      }
    } else {
      card.classList.remove('reask-glow');
    }
  }
};

// Override renderHistoryItem so Previous still shows the audio panel
var _origRenderHistory=renderHistoryItem;
renderHistoryItem=function(){
  if(_audioBar&&_audioBar.parentNode){_audioBar.parentNode.removeChild(_audioBar);}
  _origRenderHistory();
  _ensureAudioAttached();
};

// Override showSummary so audio panel survives end-of-drill screen too
var _origShowSummary=showSummary;
showSummary=function(){
  if(_audioBar&&_audioBar.parentNode){_audioBar.parentNode.removeChild(_audioBar);}
  _origShowSummary();
  _ensureAudioAttached();
};

function updateTimestampBadge(){
  var badge=document.getElementById('ts-badge');
  if(!badge)return;
  if(idx<questions.length&&questions[idx]){
    var bankId=questions[idx]._bankId;
    if(bankId!==undefined&&TIMESTAMPS[bankId]!==undefined){
      var ts=TIMESTAMPS[bankId];
      var m=Math.floor(ts/60);
      var s=Math.floor(ts%60);
      badge.textContent='⏱ '+m+':'+(s<10?'0':'')+s;
    } else {
      badge.textContent='⏱ --:--';
    }
  }
}

var audioMode='continuous';

function playFromHere(){
  var audio=document.getElementById('mk-audio');
  if(!audio||idx>=questions.length)return;
  var bankId=questions[idx]._bankId;
  if(bankId===undefined||TIMESTAMPS[bankId]===undefined)return;
  var seekTo;if(TIMESTAMPS[bankId]===undefined||TIMESTAMPS[bankId]<=0){var f=null;for(var di=1;di<TIMESTAMPS.length;di++){var hi=bankId+di,lo=bankId-di;if(TIMESTAMPS[hi]>0){f=TIMESTAMPS[hi];break;}if(TIMESTAMPS[lo]>0){f=TIMESTAMPS[lo];break;}}if(f===null)return;seekTo=Math.max(0,f-2);}else{seekTo=Math.max(0,TIMESTAMPS[bankId]-2);}
  // FAB M01 lectures.mp3 split: L01 (0-4800s, 80min) / L02 (4800-10817s, 100min) / L03 (10817-18943s, 135min).
  // Swap audio source if needed BEFORE seeking, since each lecture file is its own duration.
  var L01='https://dgsc23.github.io/dc-study-audio/fab-201-m02-shoulder-forearm-L04.mp3';
  var L02='https://dgsc23.github.io/dc-study-audio/fab-201-m02-shoulder-forearm-L05.mp3';
  var L03='https://dgsc23.github.io/dc-study-audio/fab-201-m02-shoulder-forearm-L06.mp3';
  var s=audio.querySelector('source');
  var part=seekTo<4800?'L01':(seekTo<10817?'L02':'L03');
  var targetURL=part==='L01'?L01:(part==='L02'?L02:L03);
  var targetSec=part==='L01'?seekTo:(part==='L02'?(seekTo-4800):(seekTo-10817));
  var hasL01=s&&/-L01\.mp3/.test(s.src);
  var hasL02=s&&/-L02\.mp3/.test(s.src);
  var hasL03=s&&/-L03\.mp3/.test(s.src);
  var currentMatches=(part==='L01'&&hasL01)||(part==='L02'&&hasL02)||(part==='L03'&&hasL03);
  if(s&&!currentMatches){
    s.src=targetURL;audio.load();
    audio.addEventListener('loadedmetadata',function once(){
      audio.currentTime=targetSec;audio.play();
      audio.removeEventListener('loadedmetadata',once);
    });
    return;
  }
  audio.currentTime=targetSec;audio.play();
}

function skipAudio(sec){
  var audio=document.getElementById('mk-audio');
  if(!audio)return;
  audio.currentTime=Math.max(0,audio.currentTime+sec);
  if(audio.paused)audio.play();
}

function setAudioMode(mode){
  audioMode=mode;
  audioAutoPlay=(mode==='seek');
}

// Override nextQ to respect audio mode (continuous = don't touch audio)
var _origNextQ=nextQ;
nextQ=function(){
  _origNextQ();
  if(audioMode==='seek'){
    setTimeout(function(){playFromHere();},300);
  }
  // continuous = let audio keep playing
  // off = do nothing
};

function setFollowMode(on){
  followMode=on;
  document.querySelectorAll('.follow-btn').forEach(function(b,i){b.classList.toggle('active',i===0?on:!on);});
  if(Object.keys(answerMap).length===0){
    questions=BANK.slice();idx=0;render();saveState();
  }
}

function toggleReask(){
  reaskMode=!reaskMode;
  document.querySelectorAll('.reask-btn').forEach(function(b){b.classList.toggle('active',reaskMode);});
  buildReaskBar();
}

function buildReaskBar(){
  var bar=document.getElementById('reask-banner');
  if(!bar)return;
  var missed=[];
  if(typeof answerMap!=='undefined'){
    for(var k in answerMap){if(answerMap.hasOwnProperty(k)&&!answerMap[k].isCorrect)missed.push(k);}
  }
  if(reaskMode&&missed.length>0){
    bar.style.display='block';
    bar.innerHTML='⚠️ '+missed.length+' MISSED — <button onclick="drillMissed()">DRILL MISSED NOW</button>';
  } else {
    bar.style.display='none';
  }
}

function drillMissed(){
  var missed=[];
  for(var k in answerMap){if(answerMap.hasOwnProperty(k)&&!answerMap[k].isCorrect)missed.push(parseInt(k));}
  if(missed.length===0)return;
  questions=missed.map(function(id){return BANK[id];});
  for(var i=questions.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1));var t=questions[i];questions[i]=questions[j];questions[j]=t;}
  idx=0;score=0;attempts=0;answerMap={};answerHistory=[];
  render();
}

// Initial boot — run once to attach audio bar
questions=BANK.slice();idx=0;render();

// ── FAB unified speed control ──
var fabCurrentSpeed = 1.0;
function fabSetSpeed(val) {
  val = Math.round(val * 100) / 100;
  if (val < 0.25) val = 0.25;
  if (val > 3.0) val = 3.0;
  fabCurrentSpeed = val;
  document.querySelectorAll('audio').forEach(function(a){ a.playbackRate = val; });
  var d = document.getElementById('speed-display');
  if (d) d.textContent = val.toFixed(2) + 'x';
  document.querySelectorAll('.btn-speed-preset').forEach(function(b){
    var pv = parseFloat(b.textContent);
    b.classList.toggle('active', Math.abs(pv - val) < 0.001);
  });
}
// Re-apply rate whenever any audio element plays
(function(){
  var _origPlay = HTMLMediaElement.prototype.play;
  HTMLMediaElement.prototype.play = function(){
    if (this.tagName === 'AUDIO') this.playbackRate = fabCurrentSpeed;
    return _origPlay.apply(this, arguments);
  };
})();


var fabTranscriptOn = false;
function fabToggleTranscript() {
  fabTranscriptOn = !fabTranscriptOn;
  var box = document.getElementById('transcript-box');
  var btn = document.getElementById('btn-transcript');
  if (box) box.classList.toggle('show', fabTranscriptOn);
  if (btn) btn.classList.toggle('active', fabTranscriptOn);
  if (fabTranscriptOn) fabUpdateTranscript();
}
function fabUpdateTranscript() {
  if (!fabTranscriptOn) return;
  var box = document.getElementById('transcript-box');
  if (!box) return;
  if (typeof idx !== 'number' || typeof questions === 'undefined' || idx >= questions.length) {
    box.innerHTML = '<em>Drill complete.</em>';
    return;
  }
  var q = questions[idx];
  var cat = q.cat || '';
  var lines = fabTranscript[cat] || [];
  if (!lines.length) {
    box.innerHTML = '<em>No transcript lines for ' + cat + '.</em>';
    return;
  }
  var quote = (q.quote || '').toLowerCase().replace(/[^a-z0-9 ]/g, '');
  var quoteWords = quote.split(' ').filter(function(w){ return w.length > 3; });
  var html = '<strong>' + cat + '</strong><br>';
  for (var i = 0; i < lines.length; i++) {
    var lineLow = lines[i].toLowerCase().replace(/[^a-z0-9 ]/g, '');
    var hits = 0;
    for (var w = 0; w < quoteWords.length; w++) {
      if (lineLow.indexOf(quoteWords[w]) !== -1) hits++;
    }
    var match = quoteWords.length > 0 && hits >= Math.ceil(quoteWords.length * 0.4);
    if (match) html += '<span class="t-highlight">\u25b6 ' + lines[i] + '</span><br>';
    else html += lines[i] + '<br>';
  }
  box.innerHTML = html;
}

<script id="ga0202-m01-transcript-loader">
var fabTranscriptLines = ``.split(/\r?\n/).filter(function(l){ return l.trim().length > 0; });
window.fabTranscriptOn = false;
function fabFetchTranscript(cb){ cb(); }
function fabParseTimestamp(line){
    var m = line.match(/^\[(\d+):(\d+)\]/);
    if (!m) return null;
    return parseInt(m[1],10) * 60 + parseInt(m[2],10);
}
function fabUpdateTranscript(){
    if (!window.fabTranscriptOn) return;
    var box = document.getElementById('transcript-box');
    if (!box) return;
    fabFetchTranscript(function(){
        if (!fabTranscriptLines || !fabTranscriptLines.length){

            return;

        var srcMatch = (q.source || '').match(/(\d+):(\d+)/);
        var targetSec = srcMatch ? parseInt(srcMatch[1],10)*60 + parseInt(srcMatch[2],10) : 0;
        // Use TIMESTAMPS array if available (more accurate)
        if (typeof TIMESTAMPS !== 'undefined' && TIMESTAMPS[idx] !== undefined) {

            var ts = fabParseTimestamp(fabTranscriptLines[i]);
            if (ts === null) continue;
            if (ts <= targetSec) bestIdx = i; else break;
        }
        var startIdx = Math.max(0, bestIdx - 2);
        var endIdx = Math.min(fabTranscriptLines.length, bestIdx + 6);
        var srcLabel = (q.source || '').split('@').pop().trim();

        for (var j = startIdx; j < endIdx; j++){

            else html += safe + '<br>';
        }

}

<script id="fab-ai-companion-js">
(function(){
  const ENDPOINT = "https://fab-ai.dgync1.workers.dev";
  const CLASS_NAME = "FAB201"; // e.g., "CP1" / "FAB101" / "GA0102" — empty = generic chiropractic tutor
  let panel = null;
  let history = []; // [{role:'user'|'model', content}]
  let currentQKey = null; // to detect Q navigation

  function readCurrentQ() {
    const qText = (document.querySelector('.q-text')?.innerText || '').replace(/^Q\d+(\s+of\s+\d+)?:\s*/, '');
    const optBtns = Array.from(document.querySelectorAll('.opt-btn'));
    const options = optBtns.map(b => {
      const clone = b.cloneNode(true);
      clone.querySelectorAll('.rationale').forEach(r => r.remove());
      clone.querySelectorAll('.letter').forEach(r => r.remove());
      return clone.innerText.trim();
    });
    let picked = null, correct = null;
    optBtns.forEach((b, i) => {
      if (b.classList.contains('picked-correct') || b.classList.contains('picked-wrong')) picked = i;
      if (b.classList.contains('picked-correct') || b.classList.contains('show-correct')) correct = i;
    });
    const profTip = document.querySelector('.prof-tip')?.innerText?.replace(/^Professor:\s*/i, '').trim() || '';
    const source = document.querySelector('.source-line')?.innerText?.replace(/^Source:\s*/i, '').trim() || '';
    const quote = document.querySelector('.quote-line')?.innerText?.trim() || '';
    return { question: qText, options, picked, correct, profTip, source, quote };
  }

  function qKey(ctx){ return (ctx.question || '') + '|' + (ctx.options || []).join('|'); }

  function mdToHtml(md){
    let html = md
      .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
      .replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>')
      .replace(/(^|\n)### (.+)/g, '$1<h3>$2</h3>')
      .replace(/`([^`]+)`/g, '<code>$1</code>')
      .replace(/^\s*[-*]\s+(.+)$/gm, '<li>$1</li>')
      .replace(/(<li>.*?<\/li>(\s*<li>.*?<\/li>)*)/gs, '<ul>$1</ul>');
    html = html.split(/\n{2,}/).map(p => {
      if (p.trim().startsWith('<ul') || p.trim().startsWith('<h3')) return p;
      if (p.trim() === '') return '';
      return '<p>' + p.replace(/\n/g, '<br>') + '</p>';
    }).join('');
    return html;
  }

  function stripForTts(text){
    // Remove markdown markers so TTS doesn't read them aloud
    return text
      .replace(/\*\*/g, '')
      .replace(/`([^`]+)`/g, '$1')
      .replace(/^\s*[-*]\s+/gm, '')
      .replace(/^#+\s+/gm, '')
      .replace(/\n{2,}/g, '. ')
      .replace(/\s+/g, ' ')
      .trim();
  }

  let currentUtter = null;
  function speakToggle(btn, rawText){
    if (!window.speechSynthesis) {
      alert('Your browser does not support text-to-speech.');
      return;
    }
    if (window.speechSynthesis.speaking && currentUtter && btn.classList.contains('playing')) {
      window.speechSynthesis.cancel();
      document.querySelectorAll('.fab-ai-tts-btn.playing').forEach(b => {
        b.classList.remove('playing');
        b.innerHTML = '🔊 Read';
      });
      currentUtter = null;
      return;
    }
    window.speechSynthesis.cancel();
    document.querySelectorAll('.fab-ai-tts-btn.playing').forEach(b => {
      b.classList.remove('playing');
      b.innerHTML = '🔊 Read';
    });
    const u = new SpeechSynthesisUtterance(stripForTts(rawText));
    const rateSel = btn.parentElement.querySelector('.fab-ai-tts-rate');
    u.rate = parseFloat(rateSel && rateSel.value || '1.0');
    /*ava-tts*/try{var _vs=(window.speechSynthesis&&window.speechSynthesis.getVoices())||[];var _av=_vs.find(function(v){return /microsoft.*ava.*natural/i.test(v.name);})||_vs.find(function(v){return /microsoft.*emma.*natural/i.test(v.name);})||_vs.find(function(v){return /google us english female/i.test(v.name);});if(_av){u.voice=_av;u.lang=_av.lang||'en-US';}}catch(e){}
    u.onend = () => {
      btn.classList.remove('playing');
      btn.innerHTML = '🔊 Read';
      currentUtter = null;
    };
    u.onerror = () => {
      btn.classList.remove('playing');
      btn.innerHTML = '🔊 Read';
      currentUtter = null;
    };
    currentUtter = u;
    btn.classList.add('playing');
    btn.innerHTML = '⏹ Stop';
    window.speechSynthesis.speak(u);
  }

  function appendMsg(role, text) {
    const body = document.getElementById('fabAiBody');
    if (!body) return null;
    const wrap = document.createElement('div');
    wrap.className = 'fab-ai-msg ' + role;

      bub.innerHTML = mdToHtml(text);

      });

    } else {
      bub.textContent = text;

  }

  function appendLoading(){
    const body = document.getElementById('fabAiBody');
    if (!body) return null;
    const wrap = document.createElement('div');
    wrap.className = 'fab-ai-msg ai';
    wrap.id = 'fabAiLoading';

    bub.className = 'fab-ai-bubble';

    body.scrollTop = body.scrollHeight;

  function removeLoading(){
    const el = document.getElementById('fabAiLoading');
    if (el) el.remove();
  }

  function appendStatus(text, isErr){
    const body = document.getElementById('fabAiBody');
    if (!body) return;

    div.className = 'fab-ai-status' + (isErr ? ' err' : '');

    body.scrollTop = body.scrollHeight;

  function renderSuggestions(ctx){
    const body = document.getElementById('fabAiBody');
    if (!body) return;
    // Q preview at top
    if (ctx.question) {
      const qp = document.createElement('div');
      qp.className = 'fab-ai-qpreview';
      qp.innerHTML = '<b>Q:</b> ' + ctx.question.substring(0, 240) + (ctx.question.length > 240 ? '...' : '');
      body.appendChild(qp);
    }
    // Suggestion chips
    const sug = document.createElement('div');
    sug.className = 'fab-ai-suggestions';
    const chips = [];
    if (ctx.picked === null || ctx.picked === undefined) {
      chips.push({ label: '💡 Give me a hint', q: 'Give me a hint for this question without revealing the answer.' });
      chips.push({ label: '🧠 Explain the concept', q: 'Explain the core concept this question is testing.' });
    } else if (ctx.picked !== ctx.correct && ctx.picked !== null) {
      chips.push({ label: '❌ Why did I miss this?', q: 'I picked the wrong answer. Walk me through why my pick is wrong and why the correct answer is right.' });
      chips.push({ label: '🧠 Explain the concept', q: 'Explain the concept this question is testing in simpler terms.' });
      chips.push({ label: '🎯 Give me a mnemonic', q: 'Give me a memorable mnemonic for this topic.' });
    } else if (ctx.picked === ctx.correct) {
      chips.push({ label: '✅ Why is this right?', q: 'Confirm why the correct answer is right and flag any trap distractors to watch for.' });
      chips.push({ label: '🎯 Give me a mnemonic', q: 'Give me a memorable mnemonic for this topic.' });
    }
    chips.push({ label: '🌟 Use an analogy', q: 'Explain this with a dumbed-down analogy.' });

    const body = document.getElementById('fabAiBody');
    if (body) body.innerHTML = '';
    history = [];
    if (preserveCtx) {
      const ctx = readCurrentQ();
      renderSuggestions(ctx);

  }

  function openPanel() {
    if (!panel) panel = buildPanel();
    panel.classList.add('open');
    const ctx = readCurrentQ();
    const key = qKey(ctx);
    if (key !== currentQKey) {
      // Q changed — reset chat and show suggestions for new Q
      currentQKey = key;
      clearChat(true);
    }
  }

  function buildPanel() {
    const el = document.createElement('div');
    el.className = 'fab-ai-panel';
    el.innerHTML = '<div class="fab-ai-header">'
      + '<h3>🩺 Study Tutor</h3>'

      + '<button class="fab-ai-close" onclick="fabAiClose()">×</button>'
      + '</div>'
      + '<div class="fab-ai-body" id="fabAiBody"></div>'
      + '<div class="fab-ai-followup">'
      + '<button class="fab-ai-mini-close" title="Close panel" onclick="fabAiClose()">×</button>'
      + '<textarea id="fabAiFollowup" placeholder="Ask a question about this Q..." rows="1" onkeydown="if(event.keyCode===13&&!event.shiftKey){event.preventDefault();fabAiFollowupSend();}"></textarea>'
      + '<button onclick="fabAiFollowupSend()">Send</button>'
      + '</div>';
    document.body.appendChild(el);
    return el;
  }

  window.fabAiClose = function(){ if(panel) panel.classList.remove('open'); };
  window.fabAiClear = function(){ clearChat(true); };

  async function callWorker(payload) {
    if (!ENDPOINT) return { clipboardFallback: true };
    try {
      const res = await fetch(ENDPOINT, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload),
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.error || ('HTTP ' + res.status));
      return { reply: data.reply };
    } catch (e) {
      return { error: String(e.message || e) };
    }
  }

  function clipboardFallback(ctx, userQ) {
    const letter = (i) => String.fromCharCode(65 + i);
    let prompt = "I'm studying GA 0202 (Gross Anatomy, head and neck) with Dr. Seema Maini at SCUHS. Drill question:\n\n";
    prompt += 'Q: ' + ctx.question + '\n\n';
    if (ctx.options && ctx.options.length) {
      ctx.options.forEach((o, i) => {
        const m = [];
        if (i === ctx.picked) m.push('PICKED');
        if (i === ctx.correct) m.push('CORRECT');
        prompt += letter(i) + '. ' + o + (m.length ? ' ('+m.join(', ')+')' : '') + '\n';
      });
      prompt += '\n';
    }
    if (ctx.profTip) prompt += 'DRILL TIP: ' + ctx.profTip + '\n\n';
    if (userQ) prompt += 'MY QUESTION: ' + userQ + '\n\n';
    prompt += 'Explain using a dumbed-down analogy + mnemonic.';
    navigator.clipboard.writeText(prompt).then(() => {
      appendStatus('✓ Prompt copied to clipboard. Backend not configured yet — paste into your AI chat.');
    }).catch(() => {
      appendStatus('Could not copy. Please select manually.', true);
    });
  }

  async function sendMessage(userText) {
    const ctx = readCurrentQ();
    currentQKey = qKey(ctx);
    appendMsg('user', userText);
    history.push({ role: 'user', content: userText });
    appendLoading();

    const payload = Object.assign({}, ctx, {
      userQuestion: userText,
      history: history.slice(-10), // last 10 turns for context
      className: CLASS_NAME, // worker uses this to load class-specific knowledge
    });
    const result = await callWorker(payload);
    removeLoading();
    if (result.clipboardFallback) {
      clipboardFallback(ctx, userText);
      return;
    }
    if (result.error) {
      appendStatus('Error: ' + result.error, true);
      return;
    }
    appendMsg('ai', result.reply);
    history.push({ role: 'model', content: result.reply });
  }

  window.fabAiFollowupSend = function() {
    const ta = document.getElementById('fabAiFollowup');
    const q = (ta && ta.value || '').trim();
    if (!q) return;
    ta.value = '';
    sendMessage(q);
  };

  // Button install — opens panel, does NOT auto-call AI
  function install() {
    if (document.getElementById('fabAiBtn')) return;
    const btn = document.createElement('button');
    btn.className = 'fab-ai-btn';
    btn.id = 'fabAiBtn';
    btn.textContent = '🩺';
    btn.title = 'Open AI Study Tutor';
    btn.onclick = () => openPanel();
    document.body.appendChild(btn);
  }
  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', install);
  } else {
    install();
  }
})();
</script>
