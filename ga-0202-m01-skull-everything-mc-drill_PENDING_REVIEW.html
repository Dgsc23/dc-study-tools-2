boat-shaped from sagittal fusion.", "Oxycephaly/turricephaly results from coronal closure producing a tower/flat-back head."], "cat": "Developmental Anomalies", "source": "L02 - Plagiocephaly", "obj": "Plagiocephaly = one-sided premature fusion", "c": 0}, {"q": "Oxycephaly (turricephaly) results from premature closure of which suture?", "o": ["The squamous suture", "The coronal suture", "The sagittal suture", "The metopic suture"], "r": ["The squamous suture is not the cause she cites.", "Correct. Maini attributes oxycephaly/turricephaly to premature closure of the coronal suture.", "Sagittal closure causes scaphocephaly.", "The metopic suture is the frontal-suture remnant, not the cause here."], "cat": "Developmental Anomalies", "source": "L02 - Oxycephaly/turricephaly", "obj": "Oxycephaly = coronal suture closes early", "c": 1}, {"q": "Acrania is a condition in which:", "o": ["One suture fuses too early", "The head is abnormally small", "The cranial (skull-cap) bones fail to form, leaving the brain exposed", "Extra wormian bones form within the sutures"], "r": ["Premature fusion of one suture describes craniosynostosis/plagiocephaly.", "An abnormally small head is microcephaly.", "Correct. Maini says acrania means the skull-cap bones are not formed and the brain lies on the outside.", "Extra wormian bones are a benign normal variant, not acrania."], "cat": "Developmental Anomalies", "source": "L02 - Acrania", "obj": "Acrania = skull-cap bones fail to form", "c": 2}, {"q": "Microcephaly (an abnormally small head) results from:", "o": ["Premature fusion of a single suture", "Excess cerebrospinal fluid in the ventricles", "Failure of the frontal bones to fuse", "Abnormal development of the CNS (brain)"], "r": ["Premature single-suture fusion is craniosynostosis, not microcephaly.", "Excess CSF causes hydrocephalus (which enlarges the head), not microcephaly.", "Failure of frontal-bone fusion leaves a metopic suture, not microcephaly.", "Correct. Maini says microcephaly results from abnormal CNS development, and such patients are usually severely intellectually impaired."], "cat": "Developmental Anomalies", "source": "L02 - Microcephaly", "obj": "Microcephaly = abnormal CNS/brain development", "c": 3}, {"q": "Maini divides the mandible into which three main parts?", "o": ["Body, ramus, and angle", "Alveolar, coronoid, and condylar parts", "Head, neck, and shaft", "Base, apex, and border"], "r": ["Correct. Maini divides the mandible into the body, the ramus, and the angle.", "Those are named processes/parts, not the three main divisions.", "Head/neck describe the condylar process only, not the whole mandible.", "Base/apex/border is not how she divides the mandible."], "cat": "The Mandible", "source": "L02 - Mandible divisions", "obj": "Mandible = body + ramus + angle", "c": 0}, {"q": "Which process of the mandible takes part in the temporomandibular joint?", "o": ["The pterygoid process", "The condylar process", "The coronoid process", "The alveolar process"], "r": ["The pterygoid process is a feature of the sphenoid, not the mandible.", "Correct. Maini says the condylar process forms the TMJ; its head is covered by articular cartilage.", "The coronoid process gives attachment to temporalis; it does not form the TMJ.", "The alveolar process holds the teeth."], "cat": "The Mandible", "source": "L02 - Condylar process (TMJ)", "obj": "Condylar process forms the TMJ", "c": 1}, {"q": "The condylar process of the mandible is divided into a head and a:", "o": ["Ramus", "Neck", "Body", "Shaft"], "r": ["The ramus is the vertical part of the mandible, not part of the condyle.", "Correct. Maini says the condylar process has a head and a neck (with the pterygoid fovea on the neck).", "The body is the horizontal tooth-bearing part.", "'Shaft' is not a term for the condylar process."], "cat": "The Mandible", "source": "L02 - Condylar process (head & neck)", "obj": "Condylar process = head + neck", "c": 1}, {"q": "The pterygoid fovea, a small pit on the neck of the condylar process, gives attachment to which muscle?", "o": ["The medial pterygoid muscle", "The masseter", "The lateral pterygoid muscle", "The temporalis"], "r": ["The medial pterygoid attaches to the medial angle of the mandible, not the fovea.", "The masseter attaches to the lateral ramus/angle.", "Correct. Maini says the pterygoid fovea is named for the lateral pterygoid muscle that attaches there.", "The temporalis attaches to the coronoid process."], "cat": "The Mandible", "source": "L02 - Pterygoid fovea", "obj": "Pterygoid fovea = lateral pterygoid muscle", "c": 2}, {"q": "The mandibular foramen transmits which nerve?", "o": ["The inferior alveolar nerve", "The lingual nerve", "The mental nerve", "The facial nerve"], "r": ["Correct. Maini says the inferior alveolar nerve enters the mandibular foramen.", "The lingual nerve runs to the tongue, not through the mandibular foramen.", "The mental nerve is the continuation that EXITS the mental foramen.", "The facial nerve exits the stylomastoid foramen."], "cat": "The Mandible", "source": "L02 - Mandibular foramen (inferior alveolar n.)", "obj": "Mandibular foramen = inferior alveolar nerve", "c": 0}, {"q": "The lingula is a tongue-shaped process flanking the mandibular foramen. It serves as a landmark for:", "o": ["Locating the mental foramen", "A facial nerve block", "Locating the TMJ", "Anesthetizing the inferior alveolar nerve (a dental block)"], "r": ["The mental foramen is located on the external mandible near the premolars, not via the lingula.", "The facial nerve is not blocked at the lingula.", "The TMJ is located at the condyle, not via the lingula.", "Correct. Maini says a dentist palpates the lingula to anesthetize the inferior alveolar nerve for lower-jaw tooth extraction."], "cat": "The Mandible", "source": "L02 - Lingula (nerve-block landmark)", "obj": "Lingula = landmark for inferior alveolar nerve block", "c": 3}, {"q": "The inferior alveolar nerve runs through the mandible and exits the mental foramen, where it is renamed the:", "o": ["Lingual nerve", "Auriculotemporal nerve", "Buccal nerve", "Mental nerve (sensory to the lower lip and chin)"], "r": ["The lingual nerve supplies the tongue, a separate branch.", "The auriculotemporal nerve supplies the temple/TMJ region.", "The buccal nerve supplies the cheek, not this continuation.", "Correct. Maini says the same nerve exits the mental foramen and becomes the mental nerve, sensory to the lower lip and chin."], "cat": "The Mandible", "source": "L02 - Inferior alveolar -> mental nerve", "obj": "Inferior alveolar n. exits mental foramen as the mental nerve", "c": 3}, {"q": "The mylohyoid line, on the internal surface of the mandible, gives attachment to the mylohyoid muscle, which forms:", "o": ["The posterior wall of the pharynx", "The floor of the oral cavity", "The roof of the nasal cavity", "The capsule of the TMJ"], "r": ["The pharyngeal wall involves the constrictors, not the mylohyoid floor.", "Correct. Maini says the mylohyoid muscle attaches to the mylohyoid line and forms the bulk of the floor of the oral cavity.", "The roof of the nasal cavity is the cribriform plate/ethmoid, not the mylohyoid.", "The TMJ capsule is a separate joint structure."], "cat": "The Mandible", "source": "L02 - Mylohyoid line/muscle", "obj": "Mylohyoid muscle = floor of the oral cavity", "c": 1}, {"q": "The sublingual fossa (above the mylohyoid line) lodges which gland?", "o": ["The submandibular salivary gland", "The parotid gland", "The sublingual salivary gland", "The thyroid gland"], "r": ["The submandibular gland sits in the submandibular fossa, below the mylohyoid line.", "The parotid gland lies over the ramus laterally, not in this fossa.", "Correct. Maini says the sublingual fossa is the location of the sublingual salivary gland.", "The thyroid gland is in the neck, unrelated to the mandible."], "cat": "The Mandible", "source": "L02 - Sublingual fossa", "obj": "Sublingual fossa = sublingual gland", "c": 2}, {"q": "The submandibular fossa (below the mylohyoid line) lodges which gland?", "o": ["The submandibular salivary gland", "The sublingual salivary gland", "The lacrimal gland", "The parotid gland"], "r": ["Correct. Maini says the submandibular fossa is the location of the submandibular salivary gland.", "The sublingual gland sits in the sublingual fossa, above the mylohyoid line.", "The lacrimal gland is in the orbit, unrelated to the mandible.", "The parotid gland lies laterally over the ramus."], "cat": "The Mandible", "source": "L02 - Submandibular fossa", "obj": "Submandibular fossa = submandibular gland", "c": 0}, {"q": "The mental spine (genial tubercle) is located where on the mandible?", "o": ["On the external surface at the chin", "On the coronoid process", "On the internal surface, in the midline", "At the angle of the mandible"], "r": ["The external midline elevation is the mental protuberance, not the mental spine.", "The coronoid process gives attachment to temporalis, a separate feature.", "Correct. Maini says the mental spine (genial tubercle) is on the inside of the mandible at the midline.", "The angle of the mandible is gonion."], "cat": "The Mandible", "source": "L02 - Mental spine (genial tubercle)", "obj": "Mental spine = inner midline mandible", "c": 2}, {"q": "The digastric fossa, on each side of the mental spine, gives attachment to which muscle?", "o": ["The genioglossus muscle", "The masseter muscle", "The mylohyoid muscle", "The digastric muscle (anterior belly)"], "r": ["The genioglossus attaches to the mental (genial) spine itself, not the digastric fossa.", "The masseter attaches to the lateral ramus/angle.", "The mylohyoid attaches to the mylohyoid line, not the digastric fossa.", "Correct. Maini says the digastric fossa, beside the genial tubercle, is for the digastric muscle."], "cat": "The Mandible", "source": "L02 - Digastric fossa", "obj": "Digastric fossa = digastric muscle (anterior belly)", "c": 3}, {"q": "Which TWO function _ensureAudioAttached(){

var _origRender=render;

  if(_audioBar&&_audioBar.parentNode){_audioBar.parentNode.removeChild(_audioBar);}

function updateTimestampBadge(){

var audioMode='continuous';

function playFromHere(){
  var audio=document.getElementById('mk-audio');
  if(!audio||idx>=questions.length)return;
  var bankId=questions[idx]._bankId;
  if(bankId===undefined||TIMESTAMPS[bankId]===undefined)return;
  var seekTo;if(TIMESTAMPS[bankId]===undefined||TIMESTAMPS[bankId]<=0){var f=null;for(var di=1;di<TIMESTAMPS.length;di++){var hi=bankId+di,lo=bankId-di;if(TIMESTAMPS[hi]>0){f=TIMESTAMPS[hi];break;}if(TIMESTAMPS[lo]>0){f=TIMESTAMPS[lo];break;}}if(f===null)return;seekTo=Math.max(0,f-2);}else{seekTo=Math.max(0,TIMESTAMPS[bankId]-2);}
  // FAB M01 lectures.mp3 split: L01 (0-4800s, 80min) / L02 (4800-10817s, 100min) / L03 (10817-18943s, 135min).
  // Swap audio source if needed BEFORE seeking, since each lecture file is its own duration.
  var L01='https://dgsc23.github.io/dc-study-audio/fab-201-m02-shoulder-forearm-L04.mp3';
  var L02='https://dgsc23.github.io/dc-study-audio/fab-201-m02-shoulder-forearm-L05.mp3';
  var L03='https://dgsc23.github.io/dc-study-audio/fab-201-m02-shoulder-forearm-L06.mp3';
  var s=audio.querySelector('source');
  var part=seekTo<4800?'L01':(seekTo<10817?'L02':'L03');
  var targetURL=part==='L01'?L01:(part==='L02'?L02:L03);
  var targetSec=part==='L01'?seekTo:(part==='L02'?(seekTo-4800):(seekTo-10817));
  var hasL01=s&&/-L01\.mp3/.test(s.src);
  var hasL02=s&&/-L02\.mp3/.test(s.src);
  var hasL03=s&&/-L03\.mp3/.test(s.src);
  var currentMatches=(part==='L01'&&hasL01)||(part==='L02'&&hasL02)||(part==='L03'&&hasL03);
  if(s&&!currentMatches){
    s.src=targetURL;audio.load();
    audio.addEventListener('loadedmetadata',function once(){
      audio.currentTime=targetSec;audio.play();
      audio.removeEventListener('loadedmetadata',once);
    });
    return;
  }
  audio.currentTime=targetSec;audio.play();
}

function skipAudio(sec){
  var audio=document.getElementById('mk-audio');
  if(!audio)return;
  audio.currentTime=Math.max(0,audio.currentTime+sec);
  if(audio.paused)audio.play();
}

nextQ=function(){

  }
  // continuous = let audio keep playing
  // off = do nothing
};

function setFollowMode(on){
  followMode=on;
  document.querySelectorAll('.follow-btn').forEach(function(b,i){b.classList.toggle('active',i===0?on:!on);});

function buildReaskBar(){
  var bar=document.getElementById('reask-banner');
  if(!bar)return;
  var missed=[];
  if(typeof answerMap!=='undefined'){
    for(var k in answerMap){if(answerMap.hasOwnProperty(k)&&!answerMap[k].isCorrect)missed.push(k);}
  }
  if(reaskMode&&missed.length>0){
    bar.style.display='block';
    bar.innerHTML='⚠️ '+missed.length+' MISSED — <button onclick="drillMissed()">DRILL MISSED NOW</button>';
  } else {
    bar.style.display='none';
  }
}

function drillMissed(){
  var missed=[];
  for(var k in answerMap){if(answerMap.hasOwnProperty(k)&&!answerMap[k].isCorrect)missed.push(parseInt(k));}
  if(missed.length===0)return;
  questions=missed.map(function(id){return BANK[id];});
  for(var i=questions.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1));var t=questions[i];questions[i]=questions[j];questions[j]=t;}
  idx=0;score=0;attempts=0;answerMap={};answerHistory=[];
  render();
}

// Initial boot — run once to attach audio bar
questions=BANK.slice();idx=0;render();

// ── FAB unified speed control ──
var fabCurrentSpeed = 1.0;
function fabSetSpeed(val) {
  val = Math.round(val * 100) / 100;
  if (val < 0.25) val = 0.25;
  if (val > 3.0) val = 3.0;
  fabCurrentSpeed = val;
  document.querySelectorAll('audio').forEach(function(a){ a.playbackRate = val; });
  var d = document.getElementById('speed-display');
  if (d) d.textContent = val.toFixed(2) + 'x';
  document.querySelectorAll('.btn-speed-preset').forEach(function(b){
    var pv = parseFloat(b.textContent);
    b.classList.toggle('active', Math.abs(pv - val) < 0.001);
  });
}
// Re-apply rate whenever any audio element plays
(function(){
  var _origPlay = HTMLMediaElement.prototype.play;
  HTMLMediaElement.prototype.play = function(){
    if (this.tagName === 'AUDIO') this.playbackRate = fabCurrentSpeed;
    return _origPlay.apply(this, arguments);
  };
})();


var fabTranscriptOn = false;
function fabToggleTranscript() {
  fabTranscriptOn = !fabTranscriptOn;
  var box = document.getElementById('transcript-box');
  var btn = document.getElementById('btn-transcript');
  if (box) box.classList.toggle('show', fabTranscriptOn);
  if (btn) btn.classList.toggle('active', fabTranscriptOn);
  if (fabTranscriptOn) fabUpdateTranscript();
}
function fabUpdateTranscript() {
  if (!fabTranscriptOn) return;
  var box = document.getElementById('transcript-box');
  if (!box) return;
  if (typeof idx !== 'number' || typeof questions === 'undefined' || idx >= questions.length) {
    box.innerHTML = '<em>Drill complete.</em>';
    return;
  }
  var q = questions[idx];
  var cat = q.cat || '';
  var lines = fabTranscript[cat] || [];
  if (!lines.length) {
    box.innerHTML = '<em>No transcript lines for ' + cat + '.</em>';
    return;
  }
  var quote = (q.quote || '').toLowerCase().replace(/[^a-z0-9 ]/g, '');
  var quoteWords = quote.split(' ').filter(function(w){ return w.length > 3; });
  var html = '<strong>' + cat + '</strong><br>';
  for (var i = 0; i < lines.length; i++) {
    var lineLow = lines[i].toLowerCase().replace(/[^a-z0-9 ]/g, '');
    var hits = 0;
    for (var w = 0; w < quoteWords.length; w++) {
      if (lineLow.indexOf(quoteWords[w]) !== -1) hits++;
    }
    var match = quoteWords.length > 0 && hits >= Math.ceil(quoteWords.length * 0.4);
    if (match) html += '<span class="t-highlight">\u25b6 ' + lines[i] + '</span><br>';
    else html += lines[i] + '<br>';
  }
  box.innerHTML = html;
}
// Hook transcript update into render + renderHistoryItem
(function(){
  var _r = render;
  render = function(){ var rv = _r.apply(this, arguments); fabUpdateTranscript(); return rv; };
  var _rh = renderHistoryItem;
  renderHistoryItem = function(){ var rv = _rh.apply(this, arguments); fabUpdateTranscript(); return rv; };
})();

</script>


<script id="audio-bar-minimize-js">
(function(){
  var LS_KEY_MIN = 'fab_audio_bar_collapsed';
  function applyState(ab){
    var collapsed = localStorage.getItem(LS_KEY_MIN) === '1';
    if (collapsed) ab.classList.add('collapsed'); else ab.classList.remove('collapsed');
    var btn = ab.querySelector('.btn-minimize-audio');
    if (btn) btn.textContent = collapsed ? '▸' : '▾';
    if (btn) btn.title = collapsed ? 'Expand audio bar' : 'Minimize audio bar';
  }
  function attachButton(ab){
    if (ab.querySelector('.btn-minimize-audio')) return;
    var btn = document.createElement('button');
    btn.className = 'btn-minimize-audio';
    btn.type = 'button';
    btn.onclick = function(){
      var now = ab.classList.toggle('collapsed');
      localStorage.setItem(LS_KEY_MIN, now ? '1' : '0');
      btn.textContent = now ? '▸' : '▾';
      btn.title = now ? 'Expand audio bar' : 'Minimize audio bar';
    };
    ab.appendChild(btn);
    applyState(ab);
  }
  // Poll until audio-bar appears, attach, then keep watching in case it gets re-rendered
  var tries = 0;
  var iv = setInterval(function(){
    var ab = document.getElementById('audio-bar');
    if (ab) {
      attachButton(ab);
      applyState(ab);
    }
    tries++;
    if (tries > 1200) clearInterval(iv); // ~2 min safety cap
  }, 100);
})();
</script>

<script id="ga0202-m01-transcript-loader">
var fabTranscriptLines = `[Skull drill - no audio companion in this build]`.split(/\r?\n/).filter(function(l){ return l.trim().length > 0; });
window.fabTranscriptOn = false;
function fabFetchTranscript(cb){ cb(); }
function fabParseTimestamp(line){
    var m = line.match(/^\[(\d+):(\d+)\]/);
    if (!m) return null;
    return parseInt(m[1],10) * 60 + parseInt(m[2],10);
}
function fabUpdateTranscript(){
    if (!window.fabTranscriptOn) return;
    var box = document.getElementById('transcript-box');
    if (!box) return;
    fabFetchTranscript(function(){
        if (!fabTranscriptLines || !fabTranscriptLines.length){
            box.innerHTML = '<em style="color:#f87171">Transcript file not found.</em>';
            return;
        }
        if (typeof idx !== 'number' || typeof BANK === 'undefined' || idx >= BANK.length){
            box.innerHTML = '<em>Drill complete.</em>';
            return;
        }
        var q = BANK[idx];
        var srcMatch = (q.source || '').match(/(\d+):(\d+)/);
        var targetSec = srcMatch ? parseInt(srcMatch[1],10)*60 + parseInt(srcMatch[2],10) : 0;
        // Use TIMESTAMPS array if available (more accurate)
        if (typeof TIMESTAMPS !== 'undefined' && TIMESTAMPS[idx] !== undefined) {
            targetSec = Math.round(TIMESTAMPS[idx]);
        }
        var bestIdx = 0;
        for (var i = 0; i < fabTranscriptLines.length; i++){
            var ts = fabParseTimestamp(fabTranscriptLines[i]);
            if (ts === null) continue;
            if (ts <= targetSec) bestIdx = i; else break;
        }
        var startIdx = Math.max(0, bestIdx - 2);
        var endIdx = Math.min(fabTranscriptLines.length, bestIdx + 6);
        var srcLabel = (q.source || '').split('@').pop().trim();
        var html = '<strong>Audio @ ' + srcLabel + ' &middot; ' + (q.cat||'') + '</strong><br>';
        for (var j = startIdx; j < endIdx; j++){
            var line = fabTranscriptLines[j];
            var safe = line.replace(/</g,'&lt;').replace(/>/g,'&gt;');
            if (j === bestIdx) html += '<span class="t-highlight">&#9654; ' + safe + '</span><br>';
            else html += safe + '<br>';
        }
        box.innerHTML = html;
    });
}
function fabToggleTranscript(){
    var box = document.getElementById('transcript-box');
    var btn = document.getElementById('btn-transcript');
    if (!box) return;
    window.fabTranscriptOn = !window.fabTranscriptOn;
    if (window.fabTranscriptOn){
        box.classList.add('show');
        if (btn) btn.classList.add('active');
        fabUpdateTranscript();
    } else {
        box.classList.remove('show');
        if (btn) btn.classList.remove('active');
    }
}
</script>

  function readCurrentQ() {
    const qText = (document.querySelector('.q-text')?.innerText || '').replace(/^Q\d+(\s+of\s+\d+)?:\s*/, '');

  function mdToHtml(md){

      .replace(/(^|\n)### (.+)/g, '$1<h3>$2</h3>')
      .replace(/`([^`]+)`/g, '<code>$1</code>')
      .replace(/^\s*[-*]\s+(.+)$/gm, '<li>$1</li>')
      .replace(/(<li>.*?<\/li>(\s*<li>.*?<\/li>)*)/gs, '<ul>$1</ul>');
    html = html.split(/\n{2,}/).map(p => {
      if (p.trim().startsWith('<ul') || p.trim().startsWith('<h3')) return p;
      if (p.trim() === '') return '';
      return '<p>' + p.replace(/\n/g, '<br>') + '</p>';
    }).join('');
    return html;
  }

  function stripForTts(text){
    // Remove markdown markers so TTS doesn't read them aloud
    return text
      .replace(/\*\*/g, '')
      .replace(/`([^`]+)`/g, '$1')
      .replace(/^\s*[-*]\s+/gm, '')
      .replace(/^#+\s+/gm, '')
      .replace(/\n{2,}/g, '. ')
      .replace(/\s+/g, ' ')

  let currentUtter = null;

      window.speechSynthesis.cancel();
      document.querySelectorAll('.fab-ai-tts-btn.playing').forEach(b => {
        b.classList.remove('playing');
        b.innerHTML = '🔊 Read';
      });
      currentUtter = null;
      return;
    }
    window.speechSynthesis.cancel();
    document.querySelectorAll('.fab-ai-tts-btn.playing').forEach(b => {
      b.classList.remove('playing');
      b.innerHTML = '🔊 Read';
    });
    const u = new SpeechSynthesisUtterance(stripForTts(rawText));

    const letter = (i) => String.fromCharCode(65 + i);
    let prompt = "I'm studying GA 0202 (Gross Anatomy) with Dr. Maini at SCUHS. Drill question:\n\n";
    prompt += 'Q: ' + ctx.question + '\n\n';
    if (ctx.options && ctx.options.length) {
      ctx.options.forEach((o, i) => {
        const m = [];
        if (i === ctx.picked) m.push('PICKED');
        if (i === ctx.correct) m.push('CORRECT');
        prompt += letter(i) + '. ' + o + (m.length ? ' ('+m.join(', ')+')' : '') + '\n';
      });
      prompt += '\n';
    }
    if (ctx.profTip) prompt += 'DRILL TIP: ' + ctx.profTip + '\n\n';
    if (userQ) prompt += 'MY QUESTION: ' + userQ + '\n\n';
    prompt += 'Explain using a dumbed-down analogy + mnemonic.';
    navigator.clipboard.writeText(prompt).then(() => {
      appendStatus('✓ Prompt copied to clipboard. Backend not configured yet — paste into your AI chat.');
    }).catch(() => {
      appendStatus('Could not copy. Please select manually.', true);
    });
  }

  async function sendMessage(userText) {
    const ctx = readCurrentQ();
    currentQKey = qKey(ctx);
    appendMsg('user', userText);
    history.push({ role: 'user', content: userText });
    appendLoading();

    const payload = Object.assign({}, ctx, {
      userQuestion: userText,
      history: history.slice(-10), // last 10 turns for context
      className: CLASS_NAME, // worker uses this to load class-specific knowledge
    });
    const result = await callWorker(payload);
    removeLoading();
    if (result.clipboardFallback) {
      clipboardFallback(ctx, userText);
      return;
    }
    if (result.error) {
      appendStatus('Error: ' + result.error, true);
      return;
    }
    appendMsg('ai', result.reply);
    history.push({ role: 'model', content: result.reply });
  }

  window.fabAiFollowupSend = function() {
    const ta = document.getElementById('fabAiFollowup');
    const q = (ta && ta.value || '').trim();
    if (!q) return;
    ta.value = '';
    sendMessage(q);
  };

  // Button install — opens panel, does NOT auto-call AI
  function install() {
    if (document.getElementById('fabAiBtn')) return;
    const btn = document.createElement('button');
    btn.className = 'fab-ai-btn';
    btn.id = 'fabAiBtn';
    btn.textContent = '🩺';
    btn.title = 'Open AI Study Tutor';
    btn.onclick = () => openPanel();
    document.body.appendChild(btn);
  }
  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', install);
  } else {
    install();
  }
})();
</script>

<script id="search-and-jump-js">
(function(){
  var _searchBar=null,_searchTimer=null,_searchKbdIdx=-1,_lastResults=[],_lastQuery='';

  function _esc(s){
    return (s==null?'':String(s)).replace(/[<>&"']/g,function(c){
      return {'<':'&lt;','>':'&gt;','&':'&amp;','"':'&quot;',"'":'&#39;'}[c];
    });
  }

  function _buildSearchBar(){
    var wrap=document.createElement('div');
    wrap.id='search-bar';
    wrap.className='search-bar';
    wrap.innerHTML=''
      +'<div class="search-input-wrap" id="search-input-wrap">'
      +  '<span class="search-icon">🔍</span>'
      +  '<input type="text" id="search-input" class="search-input" placeholder="Search questions, topics, sources... (↑/↓ + Enter)" autocomplete="off" spellcheck="false">'
      +  '<button class="search-clear" id="search-clear" type="button" title="Clear (Esc)">✕</button>'
      +'</div>'
      +'<div class="search-results" id="search-results"></div>';
    return wrap;
  }

  function _ensureSearchAttached(){
    var app=document.getElementById('app');
    if(!app)return;
    if(!_searchBar){
      _searchBar=_buildSearchBar();
      _wireSearchHandlers();
    }
    var card=app.querySelector('.card');
    if(card){
      if(_searchBar.parentNode!==card.parentNode){
        card.parentNode.insertBefore(_searchBar,card);
      }
    } else {
      // No card (e.g. summary screen) — detach
      if(_searchBar.parentNode)_searchBar.parentNode.removeChild(_searchBar);
    }
  }

  function _highlight(text,query){
    if(!text)return '';
    if(!query)return _esc(text);
    var qLow=query.toLowerCase();
    var tLow=String(text).toLowerCase();
    var i=tLow.indexOf(qLow);
    if(i===-1)return _esc(text);
    var end=i+query.length;
    return _esc(text.substring(0,i))+'<mark>'+_esc(text.substring(i,end))+'</mark>'+_esc(text.substring(end));
  }

  function _searchBank(query){
    var q=(query||'').toLowerCase().trim();
    if(!q||typeof BANK==='undefined')return [];
    var results=[];
    for(var i=0;i<BANK.length;i++){
      var item=BANK[i];
      var qText=(item.q||'').toLowerCase();
      var cat=(item.cat||'').toLowerCase();
      var src=(item.source||'').toLowerCase();
      var quote=(item.quote||'').toLowerCase();
      var tip=(item.profTip||'').toLowerCase();
      if(qText.indexOf(q)>=0||cat.indexOf(q)>=0||src.indexOf(q)>=0||quote.indexOf(q)>=0||tip.indexOf(q)>=0){
        results.push({_bankId:i,q:item.q,cat:item.cat});
        if(results.length>=10)break;
      }
    }
    return results;
  }

  function _renderSearchResults(query){
    var ul=document.getElementById('search-results');
    if(!ul)return;
    _lastQuery=query;
    if(!query.trim()){
      ul.classList.remove('open');
      ul.innerHTML='';
      _lastResults=[];_searchKbdIdx=-1;
      return;
    }
    var matches=_searchBank(query);
    _lastResults=matches;
    _searchKbdIdx=-1;
    if(matches.length===0){
      ul.innerHTML='<div class="search-empty">No matches for "'+_esc(query)+'"</div>';
      ul.classList.add('open');
      return;
    }
    var html='';
    for(var i=0;i<matches.length;i++){
      var m=matches[i];
      var stem=(m.q||'');
      var truncStem=stem.length>110?stem.substring(0,110)+'…':stem;
      html+='<div class="search-result" data-bank-id="'+m._bankId+'" data-idx="'+i+'">'
        +'<span class="sr-num">Q'+(m._bankId+1)+'</span>'
        +'<span class="sr-cat">'+_esc(m.cat||'')+'</span>'
        +_highlight(truncStem,query)
        +'</div>';
    }
    if(matches.length===10){
      html+='<div class="search-hint">Showing top 10 — refine to narrow</div>';
    }
    ul.innerHTML=html;
    ul.classList.add('open');
    var nodes=ul.querySelectorAll('.search-result');
    nodes.forEach(function(node){
      node.addEventListener('mousedown',function(e){
        // mousedown so it fires before input blur clears state
        e.preventDefault();
        var bankId=parseInt(node.getAttribute('data-bank-id'),10);
        _doJump(bankId);
      });
    });
  }

  function _doJump(bankId){
    if(typeof navJump!=='function')return;
    var inp=document.getElementById('search-input');
    var ul=document.getElementById('search-results');
    if(inp)inp.value='';
    if(ul){ul.classList.remove('open');ul.innerHTML='';}
    _lastResults=[];_searchKbdIdx=-1;_lastQuery='';
    navJump(bankId);
    // Scroll to top of card after jump so user sees the question
    setTimeout(function(){
      var card=document.querySelector('.card');
      if(card&&card.scrollIntoView)card.scrollIntoView({behavior:'smooth',block:'start'});
    },80);
  }

  function _highlightKbd(){
    var ul=document.getElementById('search-results');
    if(!ul)return;
    var nodes=ul.querySelectorAll('.search-result');
    nodes.forEach(function(n,i){n.classList.toggle('kbd',i===_searchKbdIdx);});
    if(_searchKbdIdx>=0&&nodes[_searchKbdIdx]){
      nodes[_searchKbdIdx].scrollIntoView({block:'nearest'});
    }
  }

  function _wireSearchHandlers(){
    var inp=_searchBar.querySelector('#search-input');
    var wrap=_searchBar.querySelector('#search-input-wrap');
    var clr=_searchBar.querySelector('#search-clear');
    inp.addEventListener('focus',function(){
      wrap.classList.add('focused');
      if(_lastQuery&&_lastResults.length>0){
        var ul=document.getElementById('search-results');
        if(ul)ul.classList.add('open');
      }
    });
    inp.addEventListener('blur',function(){
      setTimeout(function(){wrap.classList.remove('focused');},150);
    });
    inp.addEventListener('input',function(){
      if(_searchTimer)clearTimeout(_searchTimer);
      var v=inp.value;
      _searchTimer=setTimeout(function(){_renderSearchResults(v);},200);
    });
    inp.addEventListener('keydown',function(e){
      var ul=document.getElementById('search-results');
      if(e.key==='Escape'){
        if(inp.value){
          inp.value='';
          if(ul){ul.classList.remove('open');ul.innerHTML='';}
          _lastResults=[];_searchKbdIdx=-1;_lastQuery='';
        } else {
          inp.blur();
        }
      } else if(e.key==='ArrowDown'){
        if(_lastResults.length===0)return;
        e.preventDefault();
        _searchKbdIdx=Math.min(_lastResults.length-1,_searchKbdIdx+1);
        _highlightKbd();
      } else if(e.key==='ArrowUp'){
        if(_lastResults.length===0)return;
        e.preventDefault();
        _searchKbdIdx=Math.max(-1,_searchKbdIdx-1);
        _highlightKbd();
      } else if(e.key==='Enter'){
        if(_lastResults.length===0)return;
        e.preventDefault();
        var pick=_searchKbdIdx>=0?_lastResults[_searchKbdIdx]:_lastResults[0];
        if(pick)_doJump(pick._bankId);
      }
    });
    clr.addEventListener('click',function(){
      inp.value='';
      var ul=document.getElementById('search-results');
      if(ul){ul.classList.remove('open');ul.innerHTML='';}
      _lastResults=[];_searchKbdIdx=-1;_lastQuery='';
      inp.focus();
    });
    document.addEventListener('click',function(e){
      if(!_searchBar)return;
      if(!_searchBar.contains(e.target)){
        var ul=document.getElementById('search-results');
        if(ul)ul.classList.remove('open');
      }
    });
    // Global "/" keybind to focus search (matches GitHub-style search UX)
    document.addEventListener('keydown',function(e){
      if(e.key==='/'&&document.activeElement!==inp){
        var tag=(document.activeElement&&document.activeElement.tagName||'').toLowerCase();
        if(tag==='input'||tag==='textarea')return;
        e.preventDefault();
        inp.focus();
      }
    });
  }

  function _wrapRender(){
    if(typeof render!=='function')return;
    var origR=render;
    render=function(){
      if(_searchBar&&_searchBar.parentNode)_searchBar.parentNode.removeChild(_searchBar);
      origR();
      _ensureSearchAttached();
    };
    if(typeof renderHistoryItem==='function'){
      var origH=renderHistoryItem;
      renderHistoryItem=function(){
        if(_searchBar&&_searchBar.parentNode)_searchBar.parentNode.removeChild(_searchBar);
        origH();
        _ensureSearchAttached();
      };
    }
    if(typeof showSummary==='function'){
      var origS=showSummary;
      showSummary=function(){
        if(_searchBar&&_searchBar.parentNode)_searchBar.parentNode.removeChild(_searchBar);
        origS();
        // intentionally no re-attach on summary
      };
    }
  }

  function _bootSearch(){
    _wrapRender();
    _ensureSearchAttached();
  }

  // Wait until other render overrides (audio bar etc.) finish wiring
  if(document.readyState==='complete'||document.readyState==='interactive'){
    setTimeout(_bootSearch,100);
  } else {
    document.addEventListener('DOMContentLoaded',function(){setTimeout(_bootSearch,100);});
  }
})();
</script>

<script>
(function(){
  var lbFrameDrawing = false, lbFrameLastX = 0, lbFrameLastY = 0;
  var lbFrameColor = '#fbbf24';
  var lbFrameTool = 'pen';
  var lbFrameAlphas = {pen: 0.85, hl: 0.30, er: 1.0};
  var lbFrameSizes = {pen: 5, hl: 26, er: 36};
  var lbFrameBgColor = '';   // '' = default lightbox bg
  var lbFrameUndoStack = []; // snapshots of canvas state
  var lbFrameRedoStack = [];
  var LB_FRAME_HISTORY_MAX = 30;
  var lbFrameSrc = '', lbFrameLabel = '';

  window.lbFrameOpen = function(src, label){
    lbFrameSrc = src; lbFrameLabel = label || '';
    var lb = document.getElementById('lb-frame');
    var img = document.getElementById('lb-frame-img');
    var canvas = document.getElementById('lb-frame-canvas');
    document.getElementById('lb-frame-cap').textContent = label;
    if (canvas) canvas.getContext('2d').clearRect(0,0,canvas.width,canvas.height);
    img.onload = function(){ lbFrameSyncCanvas(true); lbFrameApplyImgFilter(); };
    img.src = src;
    lb.classList.add('open');
    lbFrameApplyImgFilter();
    // Reset history + bg for new frame
    lbFrameUndoStack = [];
    lbFrameRedoStack = [];
    lbFrameBgColor = '';
    lb.style.background = '';  // restore default lightbox bg
    setTimeout(function(){ lbFrameSyncCanvas(true); }, 100);
    setTimeout(function(){ lbFrameSyncCanvas(true); }, 400);
  };
  window.lbFrameClose = function(){
    var lb = document.getElementById('lb-frame');
    lb.classList.remove('open');
    var c = document.getElementById('lb-frame-canvas');
    if (c) { c.classList.remove('draw-active'); c.style.pointerEvents = 'none'; c.style.cursor = ''; }
    var btn = document.getElementById('lb-frame-draw-toggle');
    if (btn) { btn.classList.remove('active'); btn.textContent = '🎨 Draw OFF'; }
  };
  function lbFrameSyncCanvas(forceClear){
    var img = document.getElementById('lb-frame-img');
    var canvas = document.getElementById('lb-frame-canvas');
    if (!img || !canvas) return;
    var w = img.naturalWidth || img.clientWidth || 1280;
    var h = img.naturalHeight || img.clientHeight || 720;
    var sizeChanged = (canvas.width !== w || canvas.height !== h);
    if (sizeChanged) { canvas.width = w; canvas.height = h; }
    if (sizeChanged || forceClear) {
      canvas.getContext('2d').clearRect(0,0,canvas.width,canvas.height);
    }
  }
  window.lbFrameToggleDraw = function(){
    var c = document.getElementById('lb-frame-canvas');
    if (!c) return;
    lbFrameSyncCanvas();
    var active = c.classList.toggle('draw-active');
    c.style.pointerEvents = active ? 'auto' : 'none';
    c.style.cursor = active ? 'crosshair' : '';
    c.style.touchAction = 'none';
    var btn = document.getElementById('lb-frame-draw-toggle');
    btn.classList.toggle('active', active);
    btn.textContent = active ? '✏️ Drawing — tap to stop' : '🎨 Tap to Draw';
  };
  window.lbFrameSetColor = function(c){ lbFrameColor = c; };
  window.lbFrameSetTool = function(t){
    lbFrameTool = t;
    document.querySelectorAll('.lb-frame-toolbar button[id^="lb-frame-tool-"]').forEach(function(b){ b.classList.remove('active'); });
    document.getElementById('lb-frame-tool-' + t).classList.add('active');
    // Update sliders to show current tool's settings
    var sizeSlider = document.getElementById('lb-frame-size-slider');
    var opacSlider = document.getElementById('lb-frame-opacity-slider');
    if (sizeSlider) { sizeSlider.value = lbFrameSizes[t]; document.getElementById('lb-frame-size-val').textContent = lbFrameSizes[t] + 'px'; }
    if (opacSlider) { var op = Math.round(lbFrameAlphas[t]*100); opacSlider.value = op; document.getElementById('lb-frame-opacity-val').textContent = op + '%'; }
  };
  window.lbFrameSetSize = function(v){
    lbFrameSizes[lbFrameTool] = parseInt(v, 10);
    document.getElementById('lb-frame-size-val').textContent = v + 'px';
  };
  window.lbFrameSetOpacity = function(v){
    lbFrameAlphas[lbFrameTool] = parseInt(v, 10) / 100;
    document.getElementById('lb-frame-opacity-val').textContent = v + '%';
  };
  var lbFrameImgOpacity = 1.0;
  var lbFrameBW = false;
  function lbFrameApplyImgFilter(){
    var img = document.getElementById('lb-frame-img');
    if (!img) return;
    var filter = '';
    if (lbFrameBW) filter += 'grayscale(1) ';
    img.style.filter = filter.trim();
    img.style.opacity = lbFrameImgOpacity;
  }
  window.lbFrameSetImgOpacity = function(v){
    lbFrameImgOpacity = parseInt(v, 10) / 100;
    document.getElementById('lb-frame-img-opacity-val').textContent = v + '%';
    lbFrameApplyImgFilter();
  };
  window.lbFrameToggleBW = function(){
    lbFrameBW = !lbFrameBW;
    var btn = document.getElementById('lb-frame-bw-toggle');
    btn.textContent = lbFrameBW ? '◾ Color' : '⬜ B&W';
    btn.classList.toggle('active', lbFrameBW);
    lbFrameApplyImgFilter();
  };
  window.lbFrameSetBgColor = function(c){
    lbFrameBgColor = c;
    var lb = document.getElementById('lb-frame');
    if (lb) lb.style.background = c;
  };
  function lbFrameSnapshot(){
    var canvas = document.getElementById('lb-frame-canvas');
    if (!canvas || !canvas.width) return;
    try {
      lbFrameUndoStack.push(canvas.toDataURL('image/png'));
      if (lbFrameUndoStack.length > LB_FRAME_HISTORY_MAX) lbFrameUndoStack.shift();
      lbFrameRedoStack = []; // new stroke invalidates redo
    } catch(e) {}
  }
  function lbFrameRestore(dataURL){
    var canvas = document.getElementById('lb-frame-canvas');
    if (!canvas) return;
    var ctx = canvas.getContext('2d');
    var img = new Image();
    img.onload = function(){
      ctx.clearRect(0,0,canvas.width,canvas.height);
      ctx.drawImage(img, 0, 0);
    };
    img.src = dataURL;
  }
  window.lbFrameUndo = function(){
    if (lbFrameUndoStack.length === 0) return;
    var canvas = document.getElementById('lb-frame-canvas');
    try { lbFrameRedoStack.push(canvas.toDataURL('image/png')); } catch(e) {}
    var prev = lbFrameUndoStack.pop();
    if (prev) lbFrameRestore(prev);
    else { canvas.getContext('2d').clearRect(0,0,canvas.width,canvas.height); }
  };
  window.lbFrameRedo = function(){
    if (lbFrameRedoStack.length === 0) return;
    var canvas = document.getElementById('lb-frame-canvas');
    try { lbFrameUndoStack.push(canvas.toDataURL('image/png')); } catch(e) {}
    var next = lbFrameRedoStack.pop();
    if (next) lbFrameRestore(next);
  };
  window.lbFrameClear = function(){
    var c = document.getElementById('lb-frame-canvas');
    if (!c) return;
    lbFrameSnapshot();  // allow undo of the clear
    c.getContext('2d').clearRect(0,0,c.width,c.height);
  };
  window.lbFrameSave = function(){
    // Use the existing in-DOM img (already loaded, no CORS re-fetch needed)
    var img = document.getElementById('lb-frame-img');
    var canvas = document.getElementById('lb-frame-canvas');
    if (!img || !img.complete || !img.naturalWidth) {
      alert('Frame image not loaded yet — wait a sec and try again.');
      return;
    }
    var out = document.createElement('canvas');
    out.width = canvas.width; out.height = canvas.height;
    var octx = out.getContext('2d');
    function paintWatermarkAndExport(){
      octx.save();
      octx.fillStyle = 'rgba(60,60,60,0.65)';
      octx.font = '600 13px -apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif';
      octx.textBaseline = 'bottom';
      octx.fillText('DC Study Supply — Dr. David Gramling, PHD', 14, out.height - 10);
      octx.restore();
      var fname = 'fab-201-m01-frame-' + (lbFrameLabel.replace(/[^a-z0-9_-]/gi,'_') || 'annotated') + '.png';
      // Try toBlob first
      var didBlob = false;
      try {
        out.toBlob(function(blob){
          if (!blob) { tryDataURL(); return; }
          didBlob = true;
          var url = URL.createObjectURL(blob);
          var a = document.createElement('a');
          a.href = url; a.download = fname;
          document.body.appendChild(a); a.click(); document.body.removeChild(a);
          URL.revokeObjectURL(url);
        }, 'image/png');
        // toBlob is async; if it threw synchronously we'd be in catch
      } catch(e) {
        tryDataURL();
      }
      function tryDataURL(){
        try {
          var dataURL = out.toDataURL('image/png');
          var a = document.createElement('a');
          a.href = dataURL; a.download = fname;
          document.body.appendChild(a); a.click(); document.body.removeChild(a);
        } catch(e2) {
          alert('Save failed (CORS): the browser blocked exporting the image because it was loaded cross-origin. This works on the live GitHub Pages URL but may fail when opened directly from disk (file://). Try the live URL: dgsc23.github.io/dc-study-tools/');
        }
      }
    }
    try {
      // 1. Paint background color first (if user picked one) — visible when image is transparent
      if (lbFrameBgColor) {
        octx.fillStyle = lbFrameBgColor;
        octx.fillRect(0, 0, out.width, out.height);
      }
      // 2. Draw image with current opacity + B&W filter
      octx.save();
      octx.globalAlpha = lbFrameImgOpacity;
      if (lbFrameBW) octx.filter = 'grayscale(1)';
      octx.drawImage(img, 0, 0, out.width, out.height);
      octx.restore();
      // 3. Draw user's strokes (canvas) at full opacity over the image
      octx.drawImage(canvas, 0, 0, out.width, out.height);
      paintWatermarkAndExport();
    } catch(e) {
      // drawImage tainted the canvas — happens only with CORS-restricted images
      alert('Save blocked by browser CORS rule. This usually means the file was opened from disk (file://) instead of the live URL. Try the live URL: dgsc23.github.io/dc-study-tools/');
    }
  };

  // Mouse + touch handlers (mirrors VSS pattern post-fix)
  var lbFrameCanvas = document.getElementById('lb-frame-canvas');
  if (lbFrameCanvas) {
    function lbFrameGetPos(e){
      var rect = lbFrameCanvas.getBoundingClientRect();
      var t = (e.touches && e.touches.length) ? e.touches[0] : e;
      var rw = rect.width || 1, rh = rect.height || 1;
      var cw = lbFrameCanvas.width || rw, ch = lbFrameCanvas.height || rh;
      var sx = cw / rw, sy = ch / rh;
      return [(t.clientX - rect.left) * sx, (t.clientY - rect.top) * sy];
    }
    function lbFrameDown(e){
      if (!lbFrameCanvas.classList.contains('draw-active')) return;
      e.preventDefault();
      lbFrameSnapshot();  // save state BEFORE this stroke for undo
      lbFrameDrawing = true;
      var p = lbFrameGetPos(e);
      lbFrameLastX = p[0]; lbFrameLastY = p[1];
    }
    function lbFrameMove(e){
      if (!lbFrameDrawing || !lbFrameCanvas.classList.contains('draw-active')) return;
      e.preventDefault();
      var p = lbFrameGetPos(e);
      var ctx = lbFrameCanvas.getContext('2d');
      ctx.strokeStyle = lbFrameColor;
      ctx.lineWidth = lbFrameSizes[lbFrameTool] || 5;
      ctx.globalAlpha = lbFrameAlphas[lbFrameTool] != null ? lbFrameAlphas[lbFrameTool] : (lbFrameTool === 'er' ? 1 : 0.85);
      ctx.globalCompositeOperation = lbFrameTool === 'er' ? 'destination-out' : 'source-over';
      ctx.lineCap = 'round'; ctx.lineJoin = 'round';
      ctx.beginPath(); ctx.moveTo(lbFrameLastX, lbFrameLastY); ctx.lineTo(p[0], p[1]); ctx.stroke();
      lbFrameLastX = p[0]; lbFrameLastY = p[1];
    }
    function lbFrameUp(){ lbFrameDrawing = false; }
    lbFrameCanvas.addEventListener('mousedown', lbFrameDown);
    lbFrameCanvas.addEventListener('mousemove', lbFrameMove);
    lbFrameCanvas.addEventListener('mouseup', lbFrameUp);
    lbFrameCanvas.addEventListener('mouseleave', lbFrameUp);
    window.addEventListener('mouseup', lbFrameUp);
    lbFrameCanvas.addEventListener('touchstart', lbFrameDown, {passive: false});
    lbFrameCanvas.addEventListener('touchmove', lbFrameMove, {passive: false});

<script id="mc-to-frame-pip-drill-js">
(function(){
  // Lecture routing config — generic across number of lectures so this same code
  // works for GA (2 lectures, 1 boundary) and FAB (3 lectures, 2 boundaries) and
  // any future module. Boundaries are combined-audio split timestamps in seconds.
  // viewers[i] is the URL for lecture i (after boundaries[i-1], up to boundaries[i]).
  var LECTURE_CFG={
  "boundaries": [4800, 10817],
  "viewers": [
    "fab-201-m02-shoulder-forearm-l04-frame-viewer.html",
    "fab-201-m02-shoulder-forearm-l05-frame-viewer.html",
    "fab-201-m02-shoulder-forearm-l06-frame-viewer.html"
  ]
};

  function resolveLecture(combinedTs){
    var boundaries=LECTURE_CFG.boundaries;
    var viewers=LECTURE_CFG.viewers;
    var prev=0;
    for(var i=0;i<boundaries.length;i++){
      if(combinedTs<=boundaries[i]){
        return {idx:i,viewer:viewers[i],relTs:combinedTs-prev};
      }
      prev=boundaries[i];
    }
    var last=boundaries.length;
    return {idx:last,viewer:viewers[last],relTs:combinedTs-prev};
  }

  window.openFrameViewerForCurrentQ=function(){
    if(typeof questions==='undefined'||typeof idx==='undefined'||typeof TIMESTAMPS==='undefined')return;
    var q=questions[idx];
    if(!q)return;
    var bankId=q._bankId;
    if(bankId==null||bankId>=TIMESTAMPS.length)return;
    var ts=TIMESTAMPS[bankId];
    if(!isFinite(ts)||ts<=0)return;
    var routed=resolveLecture(ts);
    if(!routed.viewer)return;
    var url=routed.viewer+'?ts='+routed.relTs.toFixed(1);
    window.open(url,'_blank','noopener,noreferrer');
  };

  // Inject the button into the audio bar's audio-info section AFTER it's built
  function injectButton(){
    var bar=document.getElementById('audio-bar');
    if(!bar)return false;
    if(bar.querySelector('.btn-frame-pip'))return true;
    var info=bar.querySelector('.audio-info');
    if(!info)return false;
    var btn=document.createElement('button');
    btn.className='btn-frame-pip';
    btn.type='button';
    btn.innerHTML='🎞️ Frames + PiP';
    btn.title='Open Frame Viewer at this Q\'s timestamp — draw on the slide while video PiP plays';
    btn.onclick=function(e){e.preventDefault();openFrameViewerForCurrentQ();};
    info.appendChild(btn);
    return true;
  }

  // Audio bar is rebuilt on every render(); inject after each rebuild.
  function watchAndInject(){
    if(injectButton())return;
    // Audio bar not built yet — observe app for changes
    var app=document.getElementById('app');
    if(!app)return;
    var mo=new MutationObserver(function(){
      if(injectButton())mo.disconnect();
    });
    mo.observe(app,{childList:true,subtree:true});
  }

  // Re-inject on every audio-bar attachment (after render() wipes #app)
  setInterval(injectButton,1500);

  if(document.readyState==='complete'||document.readyState==='interactive'){
    setTimeout(watchAndInject,500);
  } else {
    document.addEventListener('DOMContentLoaded',function(){setTimeout(watchAndInject,500);});
  }
})();
</script>

<script id="pill-rebuild-deploy-fab-lightbox-js">
(function() {
    "use strict";
    var TB_SEL    = '.lb-frame-toolbar';
    var TB_TRIG   = null;
    var CANVAS_SEL = '#lb-frame-canvas';
    var BODY_CLASS = 'float-toolbar-mode';
    var LS_KEY    = 'pillFabLightboxCollapsed';
    var TOP_CLEARANCE = 28;

    function tb()     { return document.querySelector(TB_SEL); }
    function fb()     { return document.getElementById('floatingToggle'); }
    function canvas() { return document.querySelector(CANVAS_SEL); }

    function tbVisible() {
        var t = tb(); if (!t) return false;
        // Use getBoundingClientRect rather than offsetParent. Reason: per spec,
        // offsetParent returns null for any element with `position: fixed` —
        // and my pill CSS makes the toolbar position:fixed. So offsetParent
        // would ALWAYS be null on a floating toolbar (whether visible or not),
        // which would break the visibility check and cause updateFloatingPos
        // to return early, breaking zoom-tracking. Bug caught 2026-05-10 after
        // David reported the toolbar didn't follow zoom on the frame viewer.
        // getBoundingClientRect returns a zero rect when the element OR any
        // ancestor has display:none, but a non-zero rect when rendered,
        // regardless of position:fixed/relative/static.
        var rect = t.getBoundingClientRect();
        return rect.width > 0 && rect.height > 0;
    }

    // ---- expand / collapse ----
    function ensureExpandBtn() {
        var t = tb(); if (!t) return;
        if (document.getElementById('ftExpandBtn')) return;
        var btn = document.createElement('button');
        btn.id = 'ftExpandBtn';
        btn.type = 'button';
        btn.title = 'Collapse / expand toolbar';
        btn.setAttribute('aria-label', 'Collapse toolbar');
        var startCollapsed = false;
        try { startCollapsed = localStorage.getItem(LS_KEY) === '1'; } catch (e) {}
        if (startCollapsed) t.classList.add('collapsed');
        btn.innerHTML = startCollapsed ? '&#9998;' : '&#10005;';
        btn.addEventListener('click', function(e) {
            e.preventDefault(); e.stopPropagation();
            var collapsed = t.classList.toggle('collapsed');
            btn.innerHTML = collapsed ? '&#9998;' : '&#10005;';
            btn.setAttribute('aria-label', collapsed ? 'Expand toolbar' : 'Collapse toolbar');
            try { localStorage.setItem(LS_KEY, collapsed ? '1' : '0'); } catch (e2) {}
            requestAnimationFrame(updateFloatingPos);
        });
        if (t.firstChild) t.insertBefore(btn, t.firstChild); else t.appendChild(btn);
    }

    // ---- draw / scroll toggle ----
    var touchDrawMode = true;
    function ensureDrawScrollToggle() {
        if (document.getElementById('floatingToggle')) return;
        var btn = document.createElement('button');
        btn.id = 'floatingToggle';
        btn.type = 'button';
        btn.className = 'draw-mode';
        btn.title = 'Touch = draw — tap to switch to scroll';
        btn.setAttribute('aria-label', 'Toggle draw / scroll mode');
        btn.innerHTML = '&#9998;';
        btn.addEventListener('click', function(e) {
            e.preventDefault(); e.stopPropagation();
            touchDrawMode = !touchDrawMode;
            var c = canvas();
            btn.className = (btn.classList.contains('visible') ? 'visible ' : '') +
                            (touchDrawMode ? 'draw-mode' : 'scroll-mode');
            btn.innerHTML = touchDrawMode ? '&#9998;' : '&#9995;';
            btn.title = touchDrawMode
                ? 'Touch = draw — tap to switch to scroll'
                : 'Touch = scroll — tap to switch to draw';
            if (c) {
                c.style.touchAction = touchDrawMode ? 'none' : 'auto';
                c.style.pointerEvents = touchDrawMode ? '' : 'none';
            }
            requestAnimationFrame(updateFloatingPos);
        });
        document.body.appendChild(btn);
    }

    function syncToggleVisibility() {
        var b = fb(); if (!b) return;
        if (tbVisible()) b.classList.add('visible');
        else b.classList.remove('visible');
    }

    // ---- visual viewport zoom positioning ----
    // Toolbar bottom-right anchored: left = vv.right - margin - w*sc,  top = vv.bottom - margin - h*sc
    // Toggle  bottom-left  anchored: left = vv.left + margin,           top = vv.bottom - margin - h*sc
    // Both use transformOrigin: top left + scale(1/vv.scale).
    function updateFloatingPos() {
        var t = tb();
        var b = fb();
        var tShown = t && tbVisible();
        var bShown = b && b.classList.contains('visible');
        if (!tShown && !bShown) return;
        if (!window.visualViewport) return;
        var vv = window.visualViewport;
        var margin = 14;
        // Snap-back at default zoom — drop inline overrides so CSS rules
        // (max-height + position) take over cleanly.
        if (vv.scale <= 1.05) {
            if (t) {
                t.style.transform = ''; t.style.transformOrigin = '';
                t.style.left = ''; t.style.top = '';
                t.style.right = ''; t.style.bottom = '';
                t.style.maxHeight = '';
            }
            if (b) {
                b.style.transform = ''; b.style.transformOrigin = '';
                b.style.left = ''; b.style.top = '';
                b.style.right = ''; b.style.bottom = '';
            }
            return;
        }
        var sc = 1 / vv.scale;
        if (tShown) {
            // Dynamically clamp toolbar's layout max-height so its VISUAL
            // height fits in the visible viewport with top_clearance + bottom
            // margin. Without this, at heavy zoom (4x+) the toolbar overflows
            // off-screen because CSS `max-height: calc(100vh - Npx)` uses
            // LAYOUT vh, which stays large when zoomed in.
            var maxVisualH = vv.height - TOP_CLEARANCE - margin;
            if (maxVisualH < 60) maxVisualH = 60;  // sanity floor
            var maxLayoutH = maxVisualH / sc;
            t.style.maxHeight = maxLayoutH + 'px';
            // Re-measure AFTER clamping max-height so th reflects the new
            // clamped layout box.
            var tw = t.offsetWidth || 60;
            var th = t.offsetHeight || 200;
            t.style.right = 'auto';
            t.style.bottom = 'auto';
            t.style.left = (vv.offsetLeft + vv.width  - margin - tw * sc) + 'px';
            t.style.top  = (vv.offsetTop  + vv.height - margin - th * sc) + 'px';
            t.style.transform = 'scale(' + sc + ')';
            t.style.transformOrigin = 'top left';
        }
        if (bShown) {
            var bh = b.offsetHeight || 40;
            b.style.right = 'auto';
            b.style.bottom = 'auto';
            b.style.left = (vv.offsetLeft + margin) + 'px';
            b.style.top  = (vv.offsetTop + vv.height - margin - bh * sc) + 'px';
            b.style.transform = 'scale(' + sc + ')';
            b.style.transformOrigin = 'top left';
        }
    }

    function init() {
        document.body.classList.add(BODY_CLASS);
        var t = tb();
        if (!t) { setTimeout(init, 200); return; }
        ensureExpandBtn();
        ensureDrawScrollToggle();
        syncToggleVisibility();
        // Watch class changes that affect toolbar visibility. THREE targets
        // because different surfaces trigger visibility via different
        // elements:
        //   - toolbar itself (.show on slides, .active on VSS/AG)
        //   - toolbar's parent (#lb-frame.open on frame viewers — the
        //     toolbar's own class doesn't change when the lightbox opens)
        //   - document.body (body.annotate-mode on frame viewers — covers
        //     the gap if a future surface scopes visibility on body class)
        // Without the parent + body observers, the frame viewer's toggle
        // stayed hidden because syncToggleVisibility never re-ran after
        // init() — caught 2026-05-10 when David reported the toggle
        // missing on the frame viewer after bugfix #3.
        var mo = new MutationObserver(function(muts) {
            for (var i = 0; i < muts.length; i++) {
                if (muts[i].attributeName === 'class') {
                    syncToggleVisibility();
                    requestAnimationFrame(updateFloatingPos);
                    break;
                }
            }
        });
        mo.observe(t, { attributes: true, attributeFilter: ['class'] });
        if (t.parentElement) {
            mo.observe(t.parentElement, { attributes: true, attributeFilter: ['class'] });
        }
        mo.observe(document.body, { attributes: true, attributeFilter: ['class'] });
        if (window.visualViewport) {
            window.visualViewport.addEventListener('scroll', updateFloatingPos);
            window.visualViewport.addEventListener('resize', updateFloatingPos);
        }
        window.addEventListener('scroll', updateFloatingPos, { passive: true });
        window.addEventListener('resize', updateFloatingPos);
        requestAnimationFrame(updateFloatingPos);
    }

    if (document.readyState === 'complete' || document.readyState === 'interactive') {
        setTimeout(init, 200);
    } else {
        document.addEventListener('DOMContentLoaded', function() { setTimeout(init, 200); });
    }
})();
</script>
