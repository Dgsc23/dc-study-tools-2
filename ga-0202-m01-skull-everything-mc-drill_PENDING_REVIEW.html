<script>
const BANK=[{"q": "Dr. Maini divides the skull bones into two groups. The bones that surround and enclose the brain form which group?", "o": ["The neurocranium (cranial bones)", "The appendicular skeleton", "The viscerocranium", "The pharyngeal-arch skeleton"], "r": ["Correct. Maini calls the bones surrounding the brain the neurocranium, or cranial bones.", "The appendicular skeleton is the limbs and girdles, not the skull.", "The viscerocranium is the facial skeleton that supports the visceral organs (nasal and oral cavities), not the brain box.", "The pharyngeal arches give rise developmentally to facial bones, but that is not the term for the adult brain-enclosing group."], "cat": "Skull Divisions & Bones", "source": "L01 - Skull divisions (neurocranium vs viscerocranium)", "obj": "Neurocranium = bones surrounding the brain", "c": 0}, {"q": "The facial bones that provide support to the visceral organs of the head (nasal and oral cavities) are collectively called the:", "o": ["Calvaria", "Viscerocranium (visceral cranium)", "Neurocranium", "Chondrocranium"], "r": ["The calvaria is only the skull-cap (roof of the braincase), not the facial skeleton.", "Correct. Maini names the facial bones the viscerocranium because they support the visceral organs of the head and neck.", "The neurocranium is the group of bones that surround the brain.", "The chondrocranium refers to the cartilaginous base of the skull during development."], "cat": "Skull Divisions & Bones", "source": "L01 - Skull divisions (viscerocranium)", "obj": "Viscerocranium = facial skeleton", "c": 1}, {"q": "Which of the following is NOT one of the cranial (neurocranium) bones Maini lists?", "o": ["The sphenoid", "The occipital bone", "The ethmoid", "The maxilla"], "r": ["The sphenoid is a cranial bone (the bat-shaped bone deep in the base).", "The occipital bone is a cranial bone forming the back of the braincase.", "The ethmoid is a cranial bone, sitting deep inside the skull.", "Correct. The maxilla (upper jaw) is a facial bone of the viscerocranium, not a cranial bone."], "cat": "Skull Divisions & Bones", "source": "L01 - Cranial bone list", "obj": "Cranial bones: frontal, 2 parietal, 2 temporal, occipital, ethmoid, sphenoid", "c": 3}, {"q": "Maini notes that two deep bones still belong to the cranial group even though they sit 'inside.' Which pair is this (one being bat-shaped)?", "o": ["Lacrimal and nasal", "Zygomatic and maxilla", "Ethmoid and sphenoid", "Vomer and palatine"], "r": ["The lacrimal and nasal bones are facial bones.", "The zygomatic and maxilla are facial bones.", "Correct. Maini stresses that the ethmoid and sphenoid, though deep/internal, are cranial bones.", "The vomer and palatine are facial bones."], "cat": "Skull Divisions & Bones", "source": "L01 - Cranial bones (ethmoid & sphenoid)", "obj": "Ethmoid + sphenoid are cranial despite lying deep", "c": 2}, {"q": "Which facial bone forms the prominence of the cheek?", "o": ["The zygomatic bone", "The lacrimal bone", "The maxilla", "The nasal bone"], "r": ["Correct. Maini calls the zygomatic bone the cheekbone.", "The lacrimal is a tiny bone in the medial wall of the orbit.", "The maxilla is the upper jaw, not the cheek prominence.", "The nasal bones form the bridge of the nose."], "cat": "Skull Divisions & Bones", "source": "L01 - Facial bones (zygomatic)", "obj": "Zygomatic = cheekbone", "c": 0}, {"q": "The lower part of the bony nasal septum is formed by which bone?", "o": ["The perpendicular plate of the ethmoid", "The inferior nasal concha", "The vomer", "The palatine bone"], "r": ["The perpendicular plate of the ethmoid forms the UPPER part of the septum, not the lower.", "The inferior nasal concha is a separate bone of the lateral nasal wall, not the septum.", "Correct. Maini says the vomer forms the lower (posteroinferior) part of the nasal septum.", "The palatine bone supports the posterior hard palate; it does not form the septum."], "cat": "Skull Divisions & Bones", "source": "L01/L02 - Nasal septum (vomer)", "obj": "Vomer = lower nasal septum", "c": 2}, {"q": "The upper part of the nasal septum is formed by which part of the ethmoid bone?", "o": ["The crista galli", "The middle nasal concha", "The cribriform plate", "The perpendicular plate"], "r": ["The crista galli is the midline ridge above the cribriform plate.", "The middle nasal concha is part of the lateral wall of the nasal cavity.", "The cribriform plate forms the roof of the nasal cavity and transmits olfactory fibers.", "Correct. Maini says the perpendicular plate of the ethmoid forms the superior part of the nasal septum."], "cat": "Skull Divisions & Bones", "source": "L02 - Nasal septum (perpendicular plate of ethmoid)", "obj": "Perpendicular plate of ethmoid = upper septum", "c": 3}, {"q": "Maini highlights the lacrimal bone because it is:", "o": ["The main bone of the hard palate", "A very small bone in the medial wall of the orbit", "The bone forming the cheek prominence", "The bone forming the bridge of the nose"], "r": ["The hard palate is formed by the maxilla and palatine bones.", "Correct. Maini describes the lacrimal as a tiny bone located in the medial wall of the orbit.", "The cheek prominence is the zygomatic bone.", "The bridge of the nose is formed by the nasal bones."], "cat": "Skull Divisions & Bones", "source": "L01 - Facial bones (lacrimal)", "obj": "Lacrimal = small bone, medial orbital wall", "c": 1}, {"q": "The two nasal bones form which structure?", "o": ["The hard palate", "The bridge of the nose", "The nasal septum", "The roof of the orbit"], "r": ["The hard palate is formed by the maxillae and palatine bones.", "Correct. Maini says the two nasal bones make the bridge of the nose.", "The nasal septum is formed by the ethmoid (perpendicular plate) and the vomer.", "The roof of the orbit is the orbital plate of the frontal bone."], "cat": "Skull Divisions & Bones", "source": "L01 - Facial bones (nasal)", "obj": "Nasal bones = bridge of the nose", "c": 1}, {"q": "Maini describes which bone as 'bat-shaped'?", "o": ["The ethmoid", "The occipital bone", "The sphenoid", "The temporal bone"], "r": ["The ethmoid is described as being 'everywhere,' contributing to nasal roof, walls, and septum.", "The occipital bone forms the back of the skull.", "Correct. Maini says the sphenoid is a bat-shaped bone that 'looks like a bat.'", "The temporal bone lies above the ear and houses the internal ear."], "cat": "Skull Divisions & Bones", "source": "L01 - Sphenoid (shape)", "obj": "Sphenoid = bat-shaped", "c": 2, "quote": "[Maini] 'Sphenoid is a bat-shaped bone - it looks like a bat.'"}, {"q": "The hard palate is supported by the maxilla anteriorly and by which bone posteriorly?", "o": ["The zygomatic bone", "The sphenoid", "The vomer", "The palatine bone (posterior one-third)"], "r": ["The zygomatic bone is the cheekbone.", "The sphenoid lies behind the palate but does not support the hard palate itself.", "The vomer forms the lower nasal septum, not the palate proper.", "Correct. Maini says the anterior two-thirds of the hard palate is maxilla and the posterior one-third is the palatine bone."], "cat": "Skull Divisions & Bones", "source": "L01 - Hard palate (maxilla + palatine)", "obj": "Hard palate: ant 2/3 maxilla, post 1/3 palatine", "c": 3}, {"q": "Maini poses a 'none of the above' trap: the inferior nasal concha is best described as:", "o": ["A separate, independent bone in its own right", "A part of the ethmoid bone", "A part of the sphenoid", "A part of the maxilla"], "r": ["Correct. Maini stresses the inferior nasal concha is a separate bone, not part of any other bone.", "The superior and middle conchae are parts of the ethmoid, but the inferior concha is not.", "It is not part of the sphenoid.", "It is not part of the maxilla, though it articulates with the lateral nasal wall."], "cat": "Skull Divisions & Bones", "source": "L02 - Inferior nasal concha (separate bone)", "obj": "Inferior concha = its own bone", "c": 0, "quote": "[Maini] 'Inferior concha is a separate bone - it is not a part of any other bone.'"}, {"q": "The superior and middle nasal conchae are parts of which bone?", "o": ["The ethmoid", "The maxilla", "Separate independent bones", "The sphenoid"], "r": ["Correct. Maini says both the superior and middle conchae are parts of the ethmoid bone.", "The maxilla forms part of the lateral nasal wall but not these conchae.", "Only the INFERIOR concha is a separate bone; the superior and middle are ethmoid.", "The sphenoid does not form the conchae."], "cat": "Skull Divisions & Bones", "source": "L02 - Superior & middle conchae (ethmoid)", "obj": "Superior & middle conchae = ethmoid", "c": 0}, {"q": "How does Maini characterize the sutures of the skull as joints?", "o": ["Synovial joints that permit gliding", "Ball-and-socket joints", "Cartilaginous joints permitting slight movement", "Fibrous joints that are the most stable and least mobile in the body"], "r": ["Sutures are not synovial; they do not have a joint cavity for gliding.", "Sutures are immobile fibrous joints, not ball-and-socket.", "Sutures are fibrous, not cartilaginous.", "Correct. Maini calls sutures the most stable, least mobile joints, which ossify with age."], "cat": "Sutures & Joints", "source": "L01 - Sutures as joints", "obj": "Sutures = fibrous, most stable/least mobile", "c": 3}, {"q": "According to Maini, how are cranial sutures named?", "o": ["Alphabetically in order of discovery", "After the nearest foramen", "After the two articulating bones they lie between", "After the muscle that attaches there"], "r": ["There is no alphabetical naming convention.", "Sutures are not named after foramina.", "Correct. Maini says sutures are named after the bones they join (e.g., frontonasal, zygomaticomaxillary).", "Sutures are not named after muscles."], "cat": "Sutures & Joints", "source": "L01 - Suture naming", "obj": "Sutures named after the articulating bones", "c": 2}, {"q": "The suture lying between the two parietal bones is the:", "o": ["Coronal suture", "Sagittal suture", "Squamous suture", "Lambdoid suture"], "r": ["The coronal suture is between the frontal and parietal bones.", "Correct. Maini says the sagittal suture connects the right and left parietal bones.", "The squamous suture is between the temporal and parietal bones.", "The lambdoid suture is between the parietal and occipital bones."], "cat": "Sutures & Joints", "source": "L01 - Sagittal suture", "obj": "Sagittal = between the two parietals", "c": 1}, {"q": "The coronal suture lies between which two bones?", "o": ["The parietal and occipital bones", "The two parietal bones", "The temporal and parietal bones", "The frontal and parietal bones"], "r": ["The parietal and occipital bones are joined by the lambdoid suture.", "The two parietal bones are joined by the sagittal suture.", "The temporal and parietal bones are joined by the squamous suture.", "Correct. Maini says the coronal suture connects the frontal bone with the parietal bones."], "cat": "Sutures & Joints", "source": "L01 - Coronal suture", "obj": "Coronal = frontal + parietal", "c": 3}, {"q": "The lambdoid suture, which resembles the Greek letter lambda, connects which bones?", "o": ["The parietal and occipital bones", "The frontal and parietal bones", "The two parietal bones", "The temporal and sphenoid bones"], "r": ["Correct. Maini says the lambdoid suture connects the parietal bone with the occipital bone.", "The frontal and parietal bones are joined by the coronal suture.", "The two parietal bones are joined by the sagittal suture.", "The temporal and sphenoid form the sphenotemporal suture."], "cat": "Sutures & Joints", "source": "L01 - Lambdoid suture", "obj": "Lambdoid = parietal + occipital", "c": 0}, {"q": "The squamous suture connects which two bones?", "o": ["The parietal and occipital bones", "The occipital and temporal bones", "The temporal and parietal bones", "The frontal and parietal bones"], "r": ["The parietal and occipital bones are joined by the lambdoid suture.", "The occipital and temporal bones are joined by the occipitomastoid suture.", "Correct. Maini says the squamous suture connects the temporal bone with the parietal bone.", "The frontal and parietal bones are joined by the coronal suture."], "cat": "Sutures & Joints", "source": "L01 - Squamous suture", "obj": "Squamous = temporal + parietal", "c": 2}, {"q": "The occipitomastoid suture (also called temporo-occipital) lies between which two bones?", "o": ["The frontal and temporal bones", "The occipital and temporal bones", "The occipital and parietal bones", "The parietal and temporal bones"], "r": ["There is no major frontotemporal suture at this location.", "Correct. Maini says it lies between the occipital and temporal bones (the mastoid is part of the temporal bone).", "The occipital and parietal bones are joined by the lambdoid suture.", "The parietal and temporal bones are joined by the squamous suture."], "cat": "Sutures & Joints", "source": "L01 - Occipitomastoid suture", "obj": "Occipitomastoid = occipital + temporal(mastoid)", "c": 1}, {"q": "The cruciform (cross-shaped) suture of the hard palate is formed by the union of which three sutures?", "o": ["Sagittal, coronal, and lambdoid sutures", "Intermaxillary, palatomaxillary, and interpalatine sutures", "Frontonasal, nasomaxillary, and internasal sutures", "Squamous, occipitomastoid, and lambdoid sutures"], "r": ["The sagittal, coronal, and lambdoid are sutures of the cranial vault, not the palate.", "Correct. Maini says the cruciform suture combines the intermaxillary, palatomaxillary, and interpalatine sutures.", "The frontonasal, nasomaxillary, and internasal are sutures of the anterior face.", "The squamous, occipitomastoid, and lambdoid are lateral/posterior vault sutures."], "cat": "Sutures & Joints", "source": "L01/L02 - Cruciform suture of the palate", "obj": "Cruciform = intermaxillary + palatomaxillary + interpalatine", "c": 1}, {"q": "A metopic suture found in an adult skull is a remnant of which structure?", "o": ["The anterior fontanelle", "The cribriform plate", "The sagittal suture", "The frontal (interfrontal) suture between the two developing frontal-bone halves"], "r": ["The anterior fontanelle is a membranous gap, not a suture remnant.", "The cribriform plate is part of the ethmoid, unrelated to the metopic suture.", "The sagittal suture lies between the parietals, not in the frontal bone.", "Correct. Maini says the metopic suture is a remnant of the frontal suture; the two frontal halves normally fuse (usually by about age 8)."], "cat": "Sutures & Joints", "source": "L02 - Metopic suture", "obj": "Metopic = remnant of the frontal suture", "c": 3}, {"q": "The suture between the nasal bone and the frontal bone is called the:", "o": ["Frontomaxillary suture", "Internasal suture", "Frontonasal suture", "Nasomaxillary suture"], "r": ["The frontomaxillary suture is between the frontal and maxillary bones.", "The internasal suture is between the two nasal bones.", "Correct. Maini names the suture between the nasal and frontal bones the frontonasal suture.", "The nasomaxillary suture is between the nasal and maxillary bones."], "cat": "Sutures & Joints", "source": "L01 - Frontonasal suture", "obj": "Frontonasal = nasal + frontal", "c": 2}, {"q": "Nasion is defined as the point where which two sutures meet?", "o": ["The internasal and frontonasal sutures", "The sagittal and coronal sutures", "The coronal and squamous sutures", "The sagittal and lambdoid sutures"], "r": ["Correct. Maini defines nasion as the meeting point of the internasal and frontonasal sutures.", "The sagittal and coronal sutures meet at bregma.", "The coronal and squamous sutures do not define nasion.", "The sagittal and lambdoid sutures meet at lambda."], "cat": "Cranial Points & Landmarks", "source": "L01/L02 - Nasion", "obj": "Nasion = internasal meets frontonasal", "c": 0}, {"q": "Bregma is the meeting point of which two sutures?", "o": ["The lambdoid and occipitomastoid sutures", "The coronal and sagittal sutures", "The coronal and squamous sutures", "The sagittal and lambdoid sutures"], "r": ["The lambdoid and occipitomastoid sutures meet near asterion.", "Correct. Maini says bregma is where the sagittal suture meets the coronal suture.", "The coronal and squamous sutures do not define bregma.", "The sagittal and lambdoid sutures meet at lambda."], "cat": "Cranial Points & Landmarks", "source": "L01 - Bregma", "obj": "Bregma = coronal + sagittal", "c": 1}, {"q": "Lambda is the meeting point of which two sutures?", "o": ["The frontonasal and internasal sutures", "The squamous and lambdoid sutures", "The coronal and sagittal sutures", "The sagittal and lambdoid sutures"], "r": ["The frontonasal and internasal sutures meet at nasion.", "The squamous, lambdoid, and occipitomastoid meet at asterion.", "The coronal and sagittal sutures meet at bregma.", "Correct. Maini says lambda is where the sagittal and lambdoid sutures meet."], "cat": "Cranial Points & Landmarks", "source": "L01 - Lambda", "obj": "Lambda = sagittal + lambdoid", "c": 3}, {"q": "Pterion is an important lateral landmark. How many bones meet there, and which are they?", "o": ["Four: frontal, parietal, temporal, and sphenoid (greater wing)", "Four: frontal, nasal, maxilla, and zygomatic", "Two: frontal and parietal", "Three: parietal, temporal, and occipital"], "r": ["Correct. Maini says four bones meet at pterion: frontal, parietal, temporal, and sphenoid.", "Those anterior facial bones do not meet at pterion.", "Pterion is a four-bone junction, not two.", "Parietal, temporal, and occipital meet near asterion, not pterion."], "cat": "Cranial Points & Landmarks", "source": "L01/L02 - Pterion (bones)", "obj": "Pterion = frontal + parietal + temporal + sphenoid", "c": 0}, {"q": "Which artery lies deep to the pterion, making it a clinically dangerous fracture site?", "o": ["The facial artery", "The internal carotid artery", "The middle meningeal artery", "The superior sagittal sinus"], "r": ["The facial artery is a superficial neck/face vessel, unrelated to pterion.", "The internal carotid artery runs through the carotid canal, not deep to pterion.", "Correct. Maini says the branches of the middle meningeal artery lie deep to pterion; a fracture there can rupture it.", "The superior sagittal sinus is a midline venous structure, not deep to pterion."], "cat": "Cranial Points & Landmarks", "source": "L01/L02 - Pterion (middle meningeal artery)", "obj": "Deep to pterion = middle meningeal artery", "c": 2, "quote": "[Maini] 'Deep to pterion you have the branches of the middle meningeal artery.'"}, {"q": "Asterion marks the meeting of which three sutures?", "o": ["The frontonasal, coronal, and lambdoid sutures", "The sagittal, lambdoid, and internasal sutures", "The squamous, lambdoid, and occipitomastoid sutures", "The coronal, sagittal, and squamous sutures"], "r": ["The frontonasal suture is anterior, unrelated to asterion.", "The internasal suture is on the anterior face, far from asterion.", "Correct. Maini says asterion is the meeting point of the squamous, lambdoid, and occipitomastoid sutures.", "Coronal + sagittal meet at bregma; squamous is elsewhere."], "cat": "Cranial Points & Landmarks", "source": "L01 - Asterion", "obj": "Asterion = squamous + lambdoid + occipitomastoid", "c": 2}, {"q": "Vertex is best described as:", "o": ["The highest point of the skull, slightly posterior to bregma", "The external occipital protuberance", "The lowest point of the occiput", "The meeting of the coronal and sagittal sutures"], "r": ["Correct. Maini says the vertex is the highest point of the skull, lying slightly posterior to bregma.", "The external occipital protuberance (inion) is at the back of the skull.", "The vertex is the highest, not the lowest, point.", "The meeting of coronal and sagittal sutures is bregma, which is anterior to the vertex."], "cat": "Cranial Points & Landmarks", "source": "L01/L02 - Vertex", "obj": "Vertex = highest point, just behind bregma", "c": 0}, {"q": "Inion is another name for which landmark?", "o": ["The angle of the mandible", "The external occipital protuberance", "The highest point of the skull", "The mastoid process"], "r": ["The angle of the mandible is gonion.", "Correct. Maini says inion is the other name for the external occipital protuberance (EOP).", "The highest point of the skull is the vertex.", "The mastoid process is a separate bony prominence of the temporal bone."], "cat": "Cranial Points & Landmarks", "source": "L01/L02 - Inion", "obj": "Inion = external occipital protuberance", "c": 1}, {"q": "Gonion refers to which structure?", "o": ["The chin prominence", "The junction of the nasal and frontal bones", "The external occipital protuberance", "The angle of the mandible"], "r": ["The chin prominence is the mental protuberance.", "The nasal-frontal junction is nasion.", "The external occipital protuberance is inion.", "Correct. Maini says gonion is the angle of the mandible."], "cat": "Cranial Points & Landmarks", "source": "L01 - Gonion", "obj": "Gonion = angle of the mandible", "c": 3}, {"q": "Glabella is a smooth prominence that Maini says (even on boards) is part of which bone?", "o": ["The ethmoid bone", "The sphenoid bone", "The frontal bone", "The nasal bone"], "r": ["The ethmoid is deep to the nasal region, not the glabella.", "The sphenoid is deep in the base, not at the glabella.", "Correct. Maini says glabella lies between the superciliary arches and is part of the frontal bone.", "The nasal bones lie below the glabella."], "cat": "Cranial Points & Landmarks", "source": "L01 - Glabella (frontal bone)", "obj": "Glabella = part of the frontal bone", "c": 2}, {"q": "Why does Maini emphasize landmark points such as nasion, pterion, and asterion?", "o": ["Multiple sutures meet there, making them fragile, fracture-prone points", "They are the only sites of red bone marrow in the skull", "They are where the cranial nerves exit the skull", "They mark the attachment of the tentorium cerebelli"], "r": ["Correct. Maini says these points are fragile because several sutures meet there, so a blow can fracture the bones.", "Bone marrow content is not why she stresses these points.", "Cranial nerves exit through foramina, not at these suture-junction points.", "The tentorium attaches internally, not at these surface points."], "cat": "Cranial Points & Landmarks", "source": "L01 - Clinical importance of suture-junction points", "obj": "Suture-junction points = fragile fracture sites", "c": 0}, {"q": "The supraorbital foramen (or notch) transmits which set of structures?", "o": ["The infraorbital nerve only", "The supraorbital nerve, artery, and vein (of the same name)", "The facial nerve", "The middle meningeal artery"], "r": ["The infraorbital structures pass through the infraorbital foramen, below the orbit.", "Correct. Maini says the supraorbital vein, artery, and nerve of the same name pass through the supraorbital foramen (or notch).", "The facial nerve exits through the stylomastoid foramen.", "The middle meningeal artery runs deep to pterion, not through the supraorbital foramen."], "cat": "Anterior & Lateral View Features", "source": "L01 - Supraorbital foramen contents", "obj": "Supraorbital foramen = supraorbital n./a./v.", "c": 1}, {"q": "The infraorbital foramen is a feature of which bone (a commonly asked exam point)?", "o": ["The frontal bone", "The zygomatic bone", "The sphenoid bone", "The maxilla"], "r": ["The frontal bone carries the supraorbital foramen, above the orbit.", "The zygomatic bone has the zygomaticofacial foramen, not the infraorbital foramen.", "The sphenoid carries the round/oval foramina of the middle cranial fossa.", "Correct. Maini says the infraorbital foramen is part of the maxillary bone."], "cat": "Anterior & Lateral View Features", "source": "L01 - Infraorbital foramen (maxilla)", "obj": "Infraorbital foramen = maxilla", "c": 3}, {"q": "The anterior nasal aperture is also called the ______ aperture because of its shape.", "o": ["Cribriform", "Ovale", "Spinosum", "Piriform (pear-shaped)"], "r": ["Cribriform ('sieve-like') describes the ethmoid plate, not this aperture.", "Ovale ('oval') names a sphenoid foramen of the middle cranial fossa.", "Spinosum names a small sphenoid foramen near the spine of the sphenoid.", "Correct. Maini says it is the piriform aperture because it is pear-shaped."], "cat": "Anterior & Lateral View Features", "source": "L01 - Anterior nasal (piriform) aperture", "obj": "Anterior nasal aperture = piriform (pear-shaped)", "c": 3}, {"q": "The anterior nasal spine is formed at the midline meeting of which bones?", "o": ["The two nasal bones", "The two palatine bones", "The two maxillary bones", "The maxilla and the vomer"], "r": ["The two nasal bones meet at the internasal suture, above the spine.", "The palatine bones lie posteriorly, forming the posterior nasal spine region.", "Correct. Maini says the anterior nasal spine is the meeting point of the two maxillary bones.", "The vomer forms the septum, but the anterior nasal spine is a maxillary midline point."], "cat": "Anterior & Lateral View Features", "source": "L01 - Anterior nasal spine", "obj": "Anterior nasal spine = the two maxillae midline", "c": 2}, {"q": "The frontal eminences are prominent because they mark:", "o": ["The sites of emissary vein foramina", "The primary ossification centers of the frontal bone", "The attachment of the temporalis muscle", "The fusion line of the frontal and parietal bones"], "r": ["Emissary veins pass through parietal foramina, not the frontal eminences.", "Correct. Maini says the frontal eminences are prominent because they are the primary ossification centers of the (membranous) frontal bone.", "The temporalis attaches to the temporal lines on the parietal bone.", "The frontal-parietal fusion is the coronal suture, not the eminences."], "cat": "Anterior & Lateral View Features", "source": "L01/L02 - Frontal eminence (ossification)", "obj": "Frontal eminence = primary ossification center", "c": 1}, {"q": "The zygomatic arch is formed by the union of which two processes?", "o": ["Temporal process of the zygomatic bone + zygomatic process of the temporal bone", "Styloid process + mastoid process of the temporal bone", "Zygomatic process of the frontal bone + frontal process of the zygomatic bone", "Frontal process of the maxilla + maxillary process of the zygomatic bone"], "r": ["Correct. Maini says the zygomatic arch is formed by the temporal process of the zygomatic bone meeting the zygomatic process of the temporal bone (like shaking hands).", "The styloid and mastoid processes are separate temporal features, not the arch.", "The frontozygomatic junction is at the lateral orbital margin, not the arch body.", "Those maxillary/zygomatic processes form the orbital rim area, not the arch."], "cat": "Anterior & Lateral View Features", "source": "L01/L02 - Zygomatic arch formation", "obj": "Zygomatic arch = temporal process of zygomatic + zygomatic process of temporal", "c": 0}, {"q": "Maini warns the superior and inferior temporal lines belong to which bone (a common trap)?", "o": ["The frontal bone", "The sphenoid bone", "The temporal bone", "The parietal bone"], "r": ["They are not on the frontal bone.", "They are not on the sphenoid bone.", "Despite the name, the temporal lines are NOT part of the temporal bone.", "Correct. Maini stresses the temporal lines are part of the PARIETAL bone, giving attachment to temporalis (hence the name)."], "cat": "Anterior & Lateral View Features", "source": "L01 - Temporal lines (parietal bone)", "obj": "Temporal lines = parietal bone (not temporal)", "c": 3, "quote": "[Maini] 'Do not get fooled - these lines are not part of the temporal bone, they are part of the parietal bone.'"}, {"q": "The external acoustic (auditory) meatus is a part of which bone?", "o": ["The temporal bone", "The parietal bone", "The sphenoid bone", "The occipital bone"], "r": ["Correct. Maini says the external auditory meatus is part of the temporal bone.", "The parietal bone forms part of the vault, not the ear canal.", "The sphenoid does not contain the external ear canal.", "The occipital bone forms the back of the skull, not the ear canal."], "cat": "Anterior & Lateral View Features", "source": "L01 - External acoustic meatus (temporal)", "obj": "External acoustic meatus = temporal bone", "c": 0}, {"q": "The styloid process projects from which bone?", "o": ["The occipital bone", "The temporal bone", "The sphenoid bone", "The mandible"], "r": ["The occipital bone has condyles and the jugular process, not the styloid.", "Correct. Maini says the styloid process is part of the temporal bone.", "The sphenoid has the pterygoid process, not the styloid.", "The mandible has the coronoid and condylar processes, not the styloid."], "cat": "Anterior & Lateral View Features", "source": "L01/L02 - Styloid process (temporal)", "obj": "Styloid process = temporal bone", "c": 1}, {"q": "The mental foramen, which transmits the mental nerve, lies on which bone?", "o": ["The temporal bone", "The zygomatic bone", "The mandible", "The maxilla"], "r": ["The temporal bone has the external acoustic meatus and stylomastoid foramen.", "The zygomatic bone carries the zygomaticofacial foramen.", "Correct. Maini says the mental nerve leaves the mandible through the mental foramen.", "The maxilla carries the infraorbital foramen, not the mental foramen."], "cat": "Anterior & Lateral View Features", "source": "L01 - Mental foramen (mandible)", "obj": "Mental foramen = mandible", "c": 2}, {"q": "The mastoid process, felt behind the ear, is part of which bone?", "o": ["The temporal bone", "The parietal bone", "The sphenoid bone", "The occipital bone"], "r": ["Correct. Maini says the mastoid process is part of the temporal bone.", "The parietal bone forms the vault above the mastoid.", "The sphenoid is deep in the base, not the mastoid.", "The occipital bone lies medial to the mastoid, forming the back of the skull."], "cat": "Posterior & Superior View", "source": "L01 - Mastoid process (temporal)", "obj": "Mastoid process = temporal bone", "c": 0}, {"q": "The nuchal lines of the occipital bone serve as attachment sites for:", "o": ["The masseter muscle", "The temporalis muscle", "Muscles of the neck", "The tentorium cerebelli"], "r": ["The masseter attaches to the zygomatic arch and mandibular angle.", "The temporalis attaches to the temporal lines on the parietal bone.", "Correct. Maini says the nuchal lines are attachment sites for the muscles of the neck.", "The tentorium cerebelli is a dural fold attaching internally."], "cat": "Posterior & Superior View", "source": "L01 - Nuchal lines", "obj": "Nuchal lines = neck-muscle attachment", "c": 2}, {"q": "Parietal emissary foramina transmit emissary veins. What is the function of emissary veins?", "o": ["They carry cerebrospinal fluid to the venous system", "They connect extracranial veins with intracranial veins", "They supply arterial blood to the scalp", "They drain the orbit into the cavernous sinus"], "r": ["CSF drainage is via arachnoid granulations, not emissary veins.", "Correct. Maini says emissary veins connect the extracranial veins with the intracranial veins.", "Emissary veins are veins, not arteries; they do not supply arterial blood.", "Orbital drainage to the cavernous sinus is via ophthalmic veins."], "cat": "Posterior & Superior View", "source": "L01/L02 - Emissary veins (parietal foramina)", "obj": "Emissary veins connect extracranial and intracranial veins", "c": 1}, {"q": "Wormian (sutural) bones are:", "o": ["Fracture fragments of the calvaria", "The primary ossification centers of the frontal bone", "Air cells within the mastoid process", "Accessory bones that ossify within the suture lines"], "r": ["They are normal variants, not fracture fragments.", "The frontal eminences are the primary ossification centers, not wormian bones.", "Mastoid air cells are within the temporal bone, not sutures.", "Correct. Maini says wormian (sutural) bones are extra bones formed within the suture lines."], "cat": "Posterior & Superior View", "source": "L01 - Wormian (sutural) bones", "obj": "Wormian bones = extra bones within sutures", "c": 3}, {"q": "On the internal surface of the calvaria, the midline groove (sulcus) houses which structure?", "o": ["The transverse sinus", "The superior sagittal sinus", "The middle meningeal artery", "The straight sinus"], "r": ["The transverse sinus grooves the occipital bone posteriorly, not the vault midline.", "Correct. Maini says the midline sulcus on the inner skull-cap is for the superior sagittal sinus.", "The middle meningeal artery makes branching grooves on the lateral inner surface, not the midline.", "The straight sinus runs within the tentorium, not grooving the calvaria."], "cat": "Posterior & Superior View", "source": "L01/L02 - Sulcus for superior sagittal sinus", "obj": "Midline calvarial sulcus = superior sagittal sinus", "c": 1}, {"q": "The small pits flanking the sagittal sulcus on the inner calvaria are impressions for:", "o": ["Meningeal arteries", "The olfactory bulbs", "Emissary veins", "Arachnoid granulations"], "r": ["Meningeal arteries make branching grooves, not rounded pits.", "The olfactory bulbs sit on the cribriform plate in the anterior cranial fossa.", "Emissary veins pass through the parietal foramina, not these pits.", "Correct. Maini says these depressions are for arachnoid granulations."], "cat": "Posterior & Superior View", "source": "L01 - Arachnoid granulation pits", "obj": "Paramidline calvarial pits = arachnoid granulations", "c": 3}, {"q": "What structure passes through the foramen magnum (Maini's opening question)?", "o": ["The facial nerve", "The internal carotid artery", "The junction of the medulla oblongata and the spinal cord", "The internal jugular vein"], "r": ["The facial nerve exits through the stylomastoid foramen.", "The internal carotid artery passes through the carotid canal.", "Correct. Maini says the medulla oblongata is connected with the spinal cord at the foramen magnum.", "The internal jugular vein passes through the jugular foramen."], "cat": "Base of Skull - Foramina & Contents", "source": "L01 - Foramen magnum contents", "obj": "Foramen magnum = spinal cord / medulla junction", "c": 2, "quote": "[Maini] 'Medulla oblongata is connected with the spinal cord at this foramen.'"}, {"q": "The carotid canal transmits which structure?", "o": ["The internal carotid artery", "The internal jugular vein", "The vertebral artery", "The facial nerve"], "r": ["Correct. Maini says the internal carotid artery passes through the carotid canal.", "The internal jugular vein passes through the jugular foramen.", "The vertebral artery ascends through the foramen magnum, not the carotid canal.", "The facial nerve uses the stylomastoid foramen."], "cat": "Base of Skull - Foramina & Contents", "source": "L01 - Carotid canal contents", "obj": "Carotid canal = internal carotid artery", "c": 0}, {"q": "The jugular foramen, which transmits the internal jugular vein, is formed between which two bones?", "o": ["The sphenoid and temporal bones", "The parietal and occipital bones", "The temporal and occipital bones", "The sphenoid and occipital bones"], "r": ["The sphenoid does not border the jugular foramen.", "The parietal bone is part of the vault, not the jugular foramen.", "Correct. Maini says the jugular foramen is located between the temporal and occipital bones.", "The sphenoid does not contribute to the jugular foramen."], "cat": "Base of Skull - Foramina & Contents", "source": "L01/L02 - Jugular foramen (temporal + occipital)", "obj": "Jugular foramen = temporal + occipital, transmits IJV", "c": 2}, {"q": "Foramen ovale, foramen rotundum, and foramen spinosum are all part of which bone?", "o": ["The temporal bone", "The occipital bone", "The ethmoid bone", "The sphenoid bone"], "r": ["The temporal bone contains the carotid canal and internal acoustic meatus, not these.", "The occipital bone contains the foramen magnum and hypoglossal canal.", "The ethmoid contains the cribriform plate foramina.", "Correct. Maini says all three of these foramina are part of the sphenoid bone."], "cat": "Base of Skull - Foramina & Contents", "source": "L01/L02 - Sphenoid foramina", "obj": "Rotundum/ovale/spinosum = sphenoid", "c": 3}, {"q": "Foramen lacerum is unusual because it is formed by three bones. Which three?", "o": ["Temporal, parietal, and occipital", "Sphenoid, temporal, and occipital", "Maxilla, palatine, and sphenoid", "Frontal, ethmoid, and sphenoid"], "r": ["The parietal bone does not border foramen lacerum.", "Correct. Maini says foramen lacerum is formed by three bones: sphenoid, temporal, and occipital.", "The maxilla and palatine form the palate, not foramen lacerum.", "The frontal and ethmoid do not border foramen lacerum."], "cat": "Base of Skull - Foramina & Contents", "source": "L01/L02 - Foramen lacerum (3 bones)", "obj": "Foramen lacerum = sphenoid + temporal + occipital", "c": 1, "quote": "[Maini] 'Foramen lacerum is formed by three bones - sphenoid, temporal, and occipital.'"}, {"q": "Foramen spinosum takes its name from being adjacent to which structure?", "o": ["The spine of the sphenoid", "The pterygoid hamulus", "The styloid process", "The mastoid process"], "r": ["Correct. Maini says foramen spinosum lies right next to the spine of the sphenoid, which is how it is named.", "The pterygoid hamulus is a hook on the medial pterygoid plate.", "The styloid process is a temporal-bone spike, not the source of this name.", "The mastoid process is a temporal prominence behind the ear."], "cat": "Base of Skull - Foramina & Contents", "source": "L01 - Foramen spinosum naming", "obj": "Foramen spinosum named for the spine of the sphenoid", "c": 0}, {"q": "The facial nerve exits the skull through which foramen?", "o": ["The stylomastoid foramen", "The foramen spinosum", "The jugular foramen", "The foramen ovale"], "r": ["Correct. Maini says the facial nerve leaves through the stylomastoid foramen.", "The foramen spinosum transmits the middle meningeal artery.", "The jugular foramen transmits the internal jugular vein (and CN IX-XI).", "The foramen ovale is a sphenoid foramen of the middle cranial fossa."], "cat": "Base of Skull - Foramina & Contents", "source": "L01 - Stylomastoid foramen (facial nerve)", "obj": "Facial nerve exits via stylomastoid foramen", "c": 0}, {"q": "The stylomastoid foramen is located between which two processes?", "o": ["The mastoid and jugular processes", "The condylar and jugular processes", "The styloid and mastoid processes", "The pterygoid and styloid processes"], "r": ["The jugular process is a separate occipital feature.", "The condylar and jugular processes are occipital, not the boundaries here.", "Correct. Maini says the stylomastoid foramen lies between the styloid process and the mastoid process.", "The pterygoid process is on the sphenoid, far from this foramen."], "cat": "Base of Skull - Foramina & Contents", "source": "L01 - Stylomastoid foramen location", "obj": "Stylomastoid = between styloid & mastoid processes", "c": 2}, {"q": "The occipital condyles articulate with which vertebra?", "o": ["The occiput does not articulate with any vertebra", "The axis (C2)", "The C7 vertebra", "The atlas (C1)"], "r": ["The occipital condyles clearly do articulate with the atlas.", "The axis (C2) articulates with the atlas above it, not directly with the occiput.", "C7 is far below the skull base.", "Correct. Maini says the occipital condyles articulate with C1, the atlas."], "cat": "Base of Skull - Foramina & Contents", "source": "L01 - Occipital condyles (atlas)", "obj": "Occipital condyles articulate with C1 (atlas)", "c": 3}, {"q": "The incisive foramen lies within which structure, just behind the incisor teeth?", "o": ["The mandibular fossa", "The incisive fossa", "The greater palatine fossa", "The pterygoid fossa"], "r": ["The mandibular fossa is where the mandible articulates with the temporal bone.", "Correct. Maini says the incisive foramen is located within the incisive fossa, posterior to the incisors.", "There is no 'greater palatine fossa'; the greater palatine foramen is a separate posterolateral opening.", "The pterygoid fossa lies between the pterygoid plates of the sphenoid."], "cat": "Base of Skull - Foramina & Contents", "source": "L01/L02 - Incisive foramen/fossa", "obj": "Incisive foramen sits within the incisive fossa", "c": 1}, {"q": "The greater and lesser palatine foramina transmit:", "o": ["The mandibular nerve", "The internal carotid artery", "The olfactory nerve fascicles", "The palatine artery, vein, and nerve of the same name"], "r": ["The mandibular nerve exits through the foramen ovale.", "The internal carotid artery uses the carotid canal.", "The olfactory fascicles pass through the cribriform plate.", "Correct. Maini says the artery and vein (and nerve) of the same name pass through the greater and lesser palatine foramina."], "cat": "Base of Skull - Foramina & Contents", "source": "L01 - Palatine foramina contents", "obj": "Greater/lesser palatine foramina = palatine vessels/nerve", "c": 3}, {"q": "The pharyngeal tubercle is located on which structure?", "o": ["The greater wing of the sphenoid", "The palatine bone", "The basilar (basi-occipital) part of the occipital bone", "The petrous part of the temporal bone"], "r": ["The greater wing of the sphenoid carries the foramina ovale/spinosum, not this tubercle.", "The palatine bone forms the posterior hard palate.", "Correct. Maini says the pharyngeal tubercle sits in the middle of the basilar process of the occipital bone.", "The petrous temporal bone houses the internal ear, not this tubercle."], "cat": "Base of Skull - Foramina & Contents", "source": "L01/L02 - Pharyngeal tubercle", "obj": "Pharyngeal tubercle = basilar occipital bone", "c": 2}, {"q": "The pterygoid hamulus is a small hook-like process of which bone?", "o": ["The sphenoid (pterygoid process)", "The palatine bone", "The temporal bone", "The maxilla"], "r": ["Correct. Maini says the pterygoid hamulus is on the (medial plate of the) pterygoid process of the sphenoid.", "The palatine bone lies adjacent but the hamulus is a sphenoid feature.", "The temporal bone carries the styloid and mastoid processes, not the hamulus.", "The maxilla carries the maxillary tuberosity, not the hamulus."], "cat": "Base of Skull - Foramina & Contents", "source": "L01/L02 - Pterygoid hamulus (sphenoid)", "obj": "Pterygoid hamulus = sphenoid", "c": 0}, {"q": "The condyloid (condylar) process of the mandible articulates in which fossa of the temporal bone?", "o": ["The incisive fossa", "The mandibular (articular) fossa", "The digastric fossa", "The pterygoid fossa"], "r": ["The incisive fossa is on the maxilla, behind the incisors.", "Correct. Maini says the condyloid process articulates with the mandibular fossa of the temporal bone (the TMJ).", "The digastric fossa is on the inner mandible for the digastric muscle.", "The pterygoid fossa is on the sphenoid between the pterygoid plates."], "cat": "Base of Skull - Foramina & Contents", "source": "L01/L02 - Mandibular fossa (TMJ)", "obj": "Mandibular fossa (temporal) receives the mandibular condyle", "c": 1}, {"q": "The digastric (mastoid) notch, just medial to the mastoid process, gives attachment to which muscle?", "o": ["The masseter muscle", "The digastric muscle", "The mylohyoid muscle", "The temporalis muscle"], "r": ["The masseter attaches to the zygomatic arch and mandibular angle.", "Correct. Maini says the digastric/mastoid notch is the attachment site for the digastric muscle.", "The mylohyoid attaches to the mylohyoid line of the mandible.", "The temporalis attaches to the temporal lines/coronoid process."], "cat": "Base of Skull - Foramina & Contents", "source": "L01/L02 - Digastric (mastoid) notch", "obj": "Digastric notch = digastric muscle", "c": 1}, {"q": "Maini's key rule: in the INFERIOR view of the skull, the foramen lying right next to the jugular foramen is the:", "o": ["Internal acoustic meatus", "Foramen spinosum", "Carotid canal", "Hypoglossal canal"], "r": ["The internal acoustic meatus is next to the jugular foramen only in the base-of-skull (internal) view.", "The foramen spinosum lies near the spine of the sphenoid, not the jugular foramen.", "Correct. Maini stresses that in the inferior view the opening next to the jugular foramen is the carotid canal.", "The hypoglossal canal lies in the wall of the foramen magnum."], "cat": "Base of Skull - Foramina & Contents", "source": "L01/L02 - Inferior view: carotid canal by jugular foramen", "obj": "Inferior view: carotid canal is next to jugular foramen", "c": 2, "quote": "[Maini] 'In the inferior view, carotid canal is lying right next to jugular foramen.'"}, {"q": "When looking at the INTERNAL base of the skull (not the inferior view), the opening next to the jugular foramen is the:", "o": ["Carotid canal", "Foramen lacerum", "Hypoglossal canal", "Internal acoustic meatus"], "r": ["The carotid canal is next to the jugular foramen in the inferior view, not the internal base view.", "Foramen lacerum lies more anteriorly at the petrous apex.", "The hypoglossal canal is in the wall of the foramen magnum.", "Correct. Maini says in the base-of-skull view the opening beside the jugular foramen is the internal acoustic meatus (students often confuse this with the carotid canal)."], "cat": "Base of Skull - Foramina & Contents", "source": "L01/L02 - Internal base: internal acoustic meatus by jugular foramen", "obj": "Base-of-skull view: internal acoustic meatus is next to jugular foramen", "c": 3}, {"q": "The hypoglossal canal is not seen in the inferior view because it lies:", "o": ["Within the thick wall of the foramen magnum", "Inside the carotid canal", "Underneath the zygomatic arch", "At the apex of the petrous temporal bone"], "r": ["Correct. Maini says the hypoglossal canal is hidden in the wall of the foramen magnum, so it is not visible in the inferior view.", "It is a separate canal, not inside the carotid canal.", "The zygomatic arch hides the infratemporal structures, not the hypoglossal canal.", "The petrous apex is where foramen lacerum sits, not the hypoglossal canal."], "cat": "Base of Skull - Foramina & Contents", "source": "L01/L02 - Hypoglossal canal location", "obj": "Hypoglossal canal = wall of foramen magnum", "c": 0}, {"q": "The interior base of the skull is divided into how many cranial fossae?", "o": ["Two (anterior and posterior)", "Four", "Five", "Three (anterior, middle, and posterior)"], "r": ["There are three, not two.", "There are three, not four.", "There are three, not five.", "Correct. Maini divides the base into anterior, middle, and posterior cranial fossae."], "cat": "Cranial Fossae", "source": "L01 - Cranial fossae (number)", "obj": "Base of skull = 3 cranial fossae", "c": 3}, {"q": "The floor of the anterior cranial fossa is formed by the orbital plate of the frontal bone, the cribriform plate of the ethmoid, and:", "o": ["The lesser wing of the sphenoid", "The greater wing of the sphenoid", "The petrous part of the temporal bone", "The basilar part of the occipital bone"], "r": ["Correct. Maini lists the orbital plate of the frontal bone, cribriform plate of the ethmoid, and the lesser wing of the sphenoid.", "The greater wing of the sphenoid forms part of the MIDDLE cranial fossa floor.", "The petrous temporal bone belongs to the middle/posterior fossa boundary.", "The basilar occipital bone is in the posterior cranial fossa."], "cat": "Cranial Fossae", "source": "L01 - Anterior cranial fossa floor", "obj": "Anterior fossa floor: frontal orbital plate + ethmoid cribriform + sphenoid lesser wing", "c": 0}, {"q": "The cribriform plate of the ethmoid transmits which structures?", "o": ["The optic nerve (CN II)", "Fascicles of the olfactory nerve (CN I)", "The internal carotid artery", "The maxillary nerve (CN V2)"], "r": ["The optic nerve passes through the optic canal, not the cribriform plate.", "Correct. Maini says the olfactory nerve fascicles pass from the nasal cavity to the brain through the cribriform plate perforations.", "The internal carotid artery uses the carotid canal.", "The maxillary nerve exits through foramen rotundum."], "cat": "Cranial Fossae", "source": "L01/L02 - Cribriform plate contents", "obj": "Cribriform plate = olfactory nerve fascicles", "c": 1}, {"q": "The crista galli is a midline ridge belonging to which bone?", "o": ["The occipital bone", "The frontal bone", "The ethmoid", "The sphenoid"], "r": ["The occipital bone has the internal occipital crest, not the crista galli.", "The frontal bone has the frontal crest, but the crista galli is ethmoid.", "Correct. Maini says the crista galli is the ridge in the center of the ethmoid's cribriform plate (compared to a rooster's comb).", "The sphenoid carries the sella turcica and clinoid processes, not the crista galli."], "cat": "Cranial Fossae", "source": "L01/L02 - Crista galli (ethmoid)", "obj": "Crista galli = ethmoid", "c": 2}, {"q": "Maini describes the foramen cecum as a:", "o": ["Blind foramen through which no structure passes", "A foramen transmitting the facial nerve", "The foramen for the optic nerve", "The largest foramen of the skull"], "r": ["Correct. Maini says 'cecum' means blind: the foramen cecum leads nowhere and transmits no structure.", "The facial nerve exits via the stylomastoid foramen.", "The optic nerve passes through the optic canal.", "The largest foramen of the skull is the foramen magnum."], "cat": "Cranial Fossae", "source": "L01 - Foramen cecum", "obj": "Foramen cecum = blind, no structure passes", "c": 0}, {"q": "The sella turcica, which houses the pituitary gland, is part of which bone?", "o": ["The basilar part of the occipital bone", "The ethmoid bone", "The body of the sphenoid", "The petrous part of the temporal bone"], "r": ["The basilar occipital forms the clivus, not the sella.", "The ethmoid contributes to the nasal cavity, not the sella.", "Correct. Maini says the sella turcica sits within the body of the sphenoid.", "The petrous temporal bone houses the internal ear, not the pituitary."], "cat": "Cranial Fossae", "source": "L01/L02 - Sella turcica (sphenoid)", "obj": "Sella turcica = body of the sphenoid, holds the pituitary", "c": 2}, {"q": "The three parts of the sella turcica are the tuberculum sellae (anterior), the hypophyseal fossa (middle), and the ______ (posterior).", "o": ["Clivus", "Dorsum sellae", "Anterior clinoid process", "Crista galli"], "r": ["The clivus is the internal surface of the basilar occiput.", "Correct. Maini lists tuberculum sellae anteriorly, hypophyseal fossa in the middle, and dorsum sellae posteriorly.", "The anterior clinoid process is a projection of the lesser wing, not the posterior sella part.", "The crista galli is an ethmoid ridge, not part of the sella."], "cat": "Cranial Fossae", "source": "L01/L02 - Parts of the sella turcica", "obj": "Sella parts: tuberculum sellae, hypophyseal fossa, dorsum sellae", "c": 1}, {"q": "The chiasmatic (prechiasmatic) sulcus is named for its relationship to which structure?", "o": ["The trigeminal ganglion", "The pituitary gland", "The internal carotid artery", "The optic chiasma"], "r": ["The trigeminal ganglion sits on the petrous apex (trigeminal impression), not this sulcus.", "The pituitary gland lies in the hypophyseal fossa, not the chiasmatic sulcus.", "The internal carotid lies in the carotid sulcus.", "Correct. Maini says the chiasmatic sulcus is where the optic chiasma lies, hence its name."], "cat": "Cranial Fossae", "source": "L01/L02 - Chiasmatic sulcus (optic chiasma)", "obj": "Chiasmatic sulcus = optic chiasma", "c": 3}, {"q": "The carotid sulcus, on the side of the body of the sphenoid, lodges which vessel?", "o": ["The basilar artery", "The middle meningeal artery", "The internal carotid artery", "The superior sagittal sinus"], "r": ["The basilar artery lies on the clivus, not the carotid sulcus.", "The middle meningeal artery grooves the lateral inner vault, not this sulcus.", "Correct. Maini says the internal carotid artery courses along the carotid sulcus.", "The superior sagittal sinus grooves the midline vault."], "cat": "Cranial Fossae", "source": "L01 - Carotid sulcus", "obj": "Carotid sulcus = internal carotid artery", "c": 2}, {"q": "The superior orbital fissure lies between which two parts of the sphenoid?", "o": ["Between the two pterygoid plates", "Between the greater and lesser wings", "Between the body and the pterygoid process", "Between the sphenoid and the ethmoid"], "r": ["The space between the pterygoid plates is the pterygoid fossa.", "Correct. Maini says the superior orbital fissure lies between the greater and lesser wings of the sphenoid.", "The body-to-pterygoid junction is not the superior orbital fissure.", "The sphenoethmoidal region is anterior/medial, not this fissure."], "cat": "Cranial Fossae", "source": "L01/L02 - Superior orbital fissure", "obj": "SOF = between greater and lesser wings of sphenoid", "c": 1}, {"q": "Maini's arch of four middle-cranial-fossa openings runs anterior to posterior as: superior orbital fissure -> foramen rotundum -> foramen ovale -> ______.", "o": ["Foramen spinosum", "The carotid canal", "Foramen lacerum", "Foramen magnum"], "r": ["Correct. Maini's sequence is SOF, rotundum, ovale, then spinosum, forming an arch.", "The carotid canal is a temporal-bone canal, not part of this sphenoid arch.", "Foramen lacerum is at the petrous apex, not the end of this arch.", "Foramen magnum is in the posterior fossa/occipital bone."], "cat": "Cranial Fossae", "source": "L01/L02 - SOF-rotundum-ovale-spinosum arch", "obj": "Arch: SOF -> rotundum -> ovale -> spinosum", "c": 0, "profTip": "Maini's tip: draw the arch SOF -> rotundum -> ovale -> spinosum. It takes 4 seconds to draw and you will remember it forever."}, {"q": "Of that four-opening arch, which one is NOT seen in the inferior view of the skull?", "o": ["Foramen spinosum", "The stylomastoid foramen", "Foramen ovale", "Foramen rotundum"], "r": ["Foramen spinosum IS visible in the inferior view.", "The stylomastoid foramen is not part of the sphenoid arch in question.", "Foramen ovale IS visible in the inferior view.", "Correct. Maini says foramen rotundum is not seen in the inferior view, whereas ovale and spinosum are."], "cat": "Cranial Fossae", "source": "L01/L02 - Rotundum not in inferior view", "obj": "Rotundum: not seen inferiorly (ovale & spinosum are)", "c": 3}, {"q": "The optic canal transmits the optic nerve and is part of which bone?", "o": ["The frontal bone", "The temporal bone", "The ethmoid bone", "The sphenoid bone"], "r": ["The frontal bone forms the roof of the orbit, not the optic canal.", "The temporal bone transmits the internal acoustic contents, not the optic nerve.", "The ethmoid transmits olfactory fibers through the cribriform plate, not the optic nerve.", "Correct. Maini says the optic canal is part of the sphenoid; the optic nerve passes through it toward the chiasma."], "cat": "Cranial Fossae", "source": "L01/L02 - Optic canal (sphenoid)", "obj": "Optic canal = sphenoid, transmits the optic nerve", "c": 3}, {"q": "The posterior boundary of the middle cranial fossa is formed mainly by which structure?", "o": ["The lesser wing of the sphenoid", "The crest of the petrous part of the temporal bone", "The crista galli", "The orbital plate of the frontal bone"], "r": ["The lesser wing of the sphenoid forms the ANTERIOR boundary of the middle fossa.", "Correct. Maini says the posterior boundary of the middle cranial fossa is the crest of the petrous portion of the temporal bone (with the dorsum sellae).", "The crista galli is in the anterior fossa, an ethmoid ridge.", "The orbital plate of the frontal bone is in the anterior cranial fossa."], "cat": "Cranial Fossae", "source": "L01 - Middle cranial fossa posterior boundary", "obj": "Middle fossa posterior boundary = petrous temporal crest", "c": 1}, {"q": "The clivus is the sloping internal surface of which structure?", "o": ["The petrous temporal bone", "The cribriform plate", "The basilar part of the occipital bone", "The greater wing of the sphenoid"], "r": ["The petrous temporal bone houses the internal ear, not the clivus.", "The cribriform plate is the ethmoid roof of the nasal cavity.", "Correct. Maini says the inside of the basilar process of the occipital bone is called the clivus.", "The greater wing of the sphenoid forms part of the middle fossa floor."], "cat": "Cranial Fossae", "source": "L01/L02 - Clivus", "obj": "Clivus = internal surface of basilar occiput", "c": 2}, {"q": "In the posterior cranial fossa, the S-shaped groove is for which venous sinus?", "o": ["The sigmoid sinus", "The superior petrosal sinus", "The superior sagittal sinus", "The transverse sinus"], "r": ["Correct. Maini says the S-shaped groove is for the sigmoid sinus.", "The superior petrosal sinus grooves the top ridge of the petrous temporal bone.", "The superior sagittal sinus grooves the midline vault.", "The transverse sinus grooves the occipital bone transversely at the back."], "cat": "Cranial Fossae", "source": "L01/L02 - Sigmoid sinus groove", "obj": "S-shaped groove = sigmoid sinus", "c": 0}, {"q": "The groove running along the top ridge of the petrous temporal bone is for which sinus?", "o": ["The transverse sinus", "The inferior petrosal sinus", "The sigmoid sinus", "The superior petrosal sinus"], "r": ["The transverse sinus grooves the occipital bone transversely.", "The inferior petrosal sinus grooves the lower petro-occipital junction.", "The sigmoid sinus is the S-shaped groove.", "Correct. Maini says the groove on top of the petrous temporal bone is for the superior (greater) petrosal sinus."], "cat": "Cranial Fossae", "source": "L02 - Superior petrosal sinus groove", "obj": "Petrous top ridge groove = superior petrosal sinus", "c": 3}, {"q": "The internal acoustic meatus leads to which region?", "o": ["The nasal cavity", "The orbit", "The internal ear", "The middle ear cavity"], "r": ["The nasal cavity is reached through the anterior nasal aperture/choanae.", "The orbit is entered via the optic canal and orbital fissures.", "Correct. Maini says the internal acoustic meatus leads to the internal ear.", "The middle ear communicates with the pharynx via the auditory tube, not this meatus."], "cat": "Cranial Fossae", "source": "L01 - Internal acoustic meatus", "obj": "Internal acoustic meatus -> internal ear", "c": 2}, {"q": "The sphenoid bone has a lesser wing, a greater wing, and which large downward-projecting process?", "o": ["The pterygoid process", "The mastoid process", "The styloid process", "The condylar process"], "r": ["Correct. Maini says the sphenoid has a lesser wing, greater wing, and the pterygoid process.", "The mastoid process belongs to the temporal bone.", "The styloid process belongs to the temporal bone.", "The condylar process belongs to the mandible."], "cat": "Sphenoid & Ethmoid Bones", "source": "L01/L02 - Sphenoid parts", "obj": "Sphenoid = lesser wing + greater wing + pterygoid process", "c": 0}, {"q": "The pterygoid process of the sphenoid has two plates. They are the:", "o": ["Orbital and temporal plates", "Medial and lateral pterygoid plates", "Squamous and petrous plates", "Superior and inferior plates"], "r": ["Orbital/temporal describe surfaces of the greater wing, not the pterygoid plates.", "Correct. Maini says the pterygoid process has a medial pterygoid plate and a lateral pterygoid plate.", "Squamous/petrous parts belong to the temporal bone.", "The plates are medial/lateral, not superior/inferior."], "cat": "Sphenoid & Ethmoid Bones", "source": "L02 - Pterygoid plates", "obj": "Pterygoid process = medial + lateral plates", "c": 1}, {"q": "Which pneumatized bone contains the sphenoid sinus, sitting just below the sella turcica (allowing a trans-sphenoidal pituitary approach)?", "o": ["The ethmoid", "The sphenoid", "The frontal bone", "The maxilla"], "r": ["The ethmoid contains ethmoidal air cells, not the sphenoid sinus.", "Correct. Maini says the sphenoid sinus lies within the sphenoid, directly under the sella turcica, which is why surgeons can reach the pituitary through it.", "The frontal sinus is in the frontal bone, above the orbits.", "The maxillary sinus is in the maxilla."], "cat": "Sphenoid & Ethmoid Bones", "source": "L02 - Sphenoid sinus", "obj": "Sphenoid sinus lies under the sella turcica", "c": 1, "quote": "[Maini] 'Sella turcica is lying on top of the sphenoid sinus, so they take a nasal approach through the sphenoid sinus.'"}, {"q": "Maini says the ethmoid 'is everywhere.' Which of the following is NOT a contribution of the ethmoid bone?", "o": ["The superior and middle nasal conchae", "The roof of the nasal cavity (cribriform plate)", "The superior part of the nasal septum (perpendicular plate)", "The lower part of the nasal septum (that is the vomer)"], "r": ["The superior and middle conchae ARE parts of the ethmoid.", "The cribriform plate (ethmoid) does form the roof of the nasal cavity.", "The perpendicular plate (ethmoid) does form the upper part of the nasal septum.", "Correct. The lower part of the nasal septum is the vomer, NOT the ethmoid."], "cat": "Sphenoid & Ethmoid Bones", "source": "L01/L02 - Ethmoid contributions", "obj": "Ethmoid = cribriform roof + perpendicular plate + sup/mid conchae (NOT lower septum)", "c": 3}, {"q": "The temporal bone has a flat squamous part and an irregular, dense part that houses the internal ear. Maini calls that dense part the:", "o": ["Petrous part", "Mastoid part", "Tympanic part", "Zygomatic part"], "r": ["Correct. Maini says the petrous part is the hard, irregular portion (cartilage-ossified) that contains the internal ear.", "The mastoid part contains air cells but is not the term for the internal-ear-housing dense part.", "The tympanic part surrounds the ear canal, not the internal ear.", "The zygomatic part is the arch process of the temporal bone."], "cat": "Sphenoid & Ethmoid Bones", "source": "L01 - Petrous part of temporal bone", "obj": "Petrous temporal = dense part housing the internal ear", "c": 0}, {"q": "Which FOUR bones contain paranasal air sinuses?", "o": ["Sphenoid, ethmoid, temporal, and occipital", "Frontal, parietal, temporal, and occipital", "Frontal, maxillary, ethmoid, and sphenoid", "Maxilla, palatine, vomer, and nasal"], "r": ["The temporal and occipital bones are not paranasal-sinus bones.", "The parietal, temporal, and occipital bones do not contain paranasal sinuses.", "Correct. Maini lists the frontal, maxillary, ethmoid, and sphenoid bones as containing paranasal sinuses.", "The palatine, vomer, and nasal bones are not pneumatized with paranasal sinuses."], "cat": "Paranasal Sinuses & Pneumatization", "source": "L01 - Paranasal sinus bones", "obj": "Paranasal sinuses: frontal, maxillary, ethmoid, sphenoid", "c": 2}, {"q": "According to Maini, besides lightening the skull, the paranasal sinuses:", "o": ["Add resonance to the voice", "Produce cerebrospinal fluid", "Store red bone marrow", "Cushion the brain from impact"], "r": ["Correct. Maini says the sinuses lighten the bones and add resonance to the voice.", "CSF is produced by the choroid plexus, not the sinuses.", "The sinuses hold air, not red bone marrow.", "The meninges and CSF cushion the brain, not the paranasal sinuses."], "cat": "Paranasal Sinuses & Pneumatization", "source": "L01/L02 - Sinus function", "obj": "Sinuses lighten the skull and add vocal resonance", "c": 0}, {"q": "Maini contrasts the mastoid air cells with the paranasal sinuses by noting that the mastoid air cells:", "o": ["Are filled with cerebrospinal fluid", "Contain the auditory receptors", "Communicate with the nasal cavity", "Do not communicate with any other cavity (a closed system)"], "r": ["The mastoid cells contain air, not CSF.", "The auditory receptors are in the internal ear, not the mastoid air cells.", "The paranasal sinuses communicate with the nasal cavity; the mastoid cells do not.", "Correct. Maini says the mastoid air cells are not connected to any other cavity, unlike the paranasal sinuses that open into the nose."], "cat": "Paranasal Sinuses & Pneumatization", "source": "L01 - Mastoid air cells", "obj": "Mastoid air cells = closed, no communication", "c": 3}, {"q": "On an X-ray, an air-filled sinus such as the frontal sinus appears:", "o": ["Grey, the same as muscle", "Black (radiolucent)", "Invisible on X-ray", "White (radiopaque)"], "r": ["Air is more lucent (blacker) than muscle.", "Correct. Maini says air appears black on X-ray, marking the air space (sinus) within the bone.", "Air spaces are readily seen as black shadows on X-ray.", "Dense bone appears white (radiopaque), not air."], "cat": "Paranasal Sinuses & Pneumatization", "source": "L01 - Air on X-ray (frontal sinus)", "obj": "Air = black (radiolucent) on X-ray", "c": 1}, {"q": "Flat bones of the skull (e.g., frontal and parietal) form by which type of ossification?", "o": ["Fibrocartilaginous ossification", "Appositional ossification only", "Intramembranous (membranous) ossification", "Endochondral ossification"], "r": ["There is no 'fibrocartilaginous ossification' pathway for these bones.", "Appositional growth thickens bone but is not how the flat bones first form.", "Correct. Maini says flat bones develop from membranes by intramembranous (membranous) ossification.", "Endochondral ossification forms the irregular bones and the skull base, not the flat vault bones."], "cat": "Skull Ossification & Development", "source": "L01/L02 - Membranous ossification (flat bones)", "obj": "Flat skull bones = intramembranous ossification", "c": 2}, {"q": "Irregular bones and the base of the skull form mainly by which type of ossification?", "o": ["They remain cartilage and never ossify", "Endochondral (cartilaginous) ossification", "Membranous ossification", "Intramembranous ossification"], "r": ["The base does ossify - a cartilage model is replaced by bone.", "Correct. Maini says irregular bones and the base of the skull arise by cartilaginous (endochondral) ossification.", "Membranous ossification is the same as intramembranous, which forms flat bones.", "Intramembranous ossification forms the flat vault bones, not the base."], "cat": "Skull Ossification & Development", "source": "L01/L02 - Endochondral ossification (base)", "obj": "Skull base/irregular bones = endochondral ossification", "c": 1}, {"q": "The neurocranium is derived mainly from the neural crest; the chondrocranium (base) is partly from neural crest and partly from:", "o": ["The first pharyngeal pouch", "Lateral plate mesoderm of the limbs", "Occipital somites", "The notochord"], "r": ["The first pharyngeal pouch gives rise to the tubotympanic recess, not the base bones.", "Lateral plate mesoderm forms the limb skeleton, not the cranial base.", "Correct. Maini says the chondral portion of the neurocranium is partly derived from neural crest and from occipital somites.", "The notochord induces the axial skeleton but is not the source she names."], "cat": "Skull Ossification & Development", "source": "L02 - Neurocranium/chondrocranium origin", "obj": "Chondrocranium = neural crest + occipital somites", "c": 2}, {"q": "The viscerocranium (facial skeleton) is derived mainly from:", "o": ["The occipital somites", "The notochord", "The neural tube", "The first two pharyngeal arches"], "r": ["The occipital somites contribute to the cranial base, not the face.", "The notochord forms the nucleus pulposus, not the face.", "The neural tube forms the CNS, not the facial bones.", "Correct. Maini says the facial skeleton is mainly derived from the first two pharyngeal arches."], "cat": "Skull Ossification & Development", "source": "L02 - Viscerocranium origin", "obj": "Viscerocranium = first two pharyngeal arches", "c": 3}, {"q": "Why is the base of the skull petrous (dense) and tough, per Maini?", "o": ["It must support and protect the delicate brain", "It contains no foramina, so it must be solid", "It is the last region of the skull to ossify", "It stores most of the body's red bone marrow"], "r": ["Correct. Maini says the base is petrous and tough because it has to support a very delicate brain.", "The base actually contains many foramina.", "Ossification timing is not the reason she gives for its density.", "Marrow storage is not the reason she gives."], "cat": "Skull Ossification & Development", "source": "L02 - Why the base is petrous", "obj": "Base is dense to support/protect the brain", "c": 0}, {"q": "The fibrous sutures of the calvaria remain unfused in infancy in order to:", "o": ["Anchor the dura mater to the skull", "Permit paranasal sinus drainage", "Allow growth and expansion of the brain", "Produce cerebrospinal fluid"], "r": ["Although dura attaches at sutures, their being fibrous is to permit brain growth.", "Sinus drainage is unrelated to the cranial sutures.", "Correct. Maini says the fibrous sutures allow the brain to grow during infancy and childhood.", "CSF is made by the choroid plexus, not the sutures."], "cat": "Skull Ossification & Development", "source": "L02 - Sutures allow brain growth", "obj": "Fibrous sutures let the brain expand", "c": 2}, {"q": "The two frontal-bone halves normally fuse into a single bone by about what age?", "o": ["18 months", "Puberty", "16 years", "The end of the 8th year"], "r": ["18 months is when the anterior fontanelle closes, not frontal-bone fusion.", "Puberty is when paranasal sinuses reach maximum size.", "About 16 years is when calvarial capacity stops increasing.", "Correct. Maini says the two frontal bones usually fuse by the end of the 8th year."], "cat": "Skull Ossification & Development", "source": "L02 - Frontal bone fusion", "obj": "Frontal halves fuse by ~8 years", "c": 3}, {"q": "According to Maini, the capacity of the calvaria goes on increasing until about what age (when the brain has grown)?", "o": ["40 years", "About 16 years of age", "18 months", "8 years"], "r": ["By ~35-40 years the sutures ossify, but capacity stops increasing around 16.", "Correct. Maini says the calvaria's capacity keeps increasing until about 16 years, when the brain has grown to size.", "18 months is anterior fontanelle closure.", "8 years is frontal-bone fusion."], "cat": "Skull Ossification & Development", "source": "L02 - Calvarial capacity growth", "obj": "Calvaria grows until ~16 years", "c": 1}, {"q": "The anterior fontanelle is what shape, and is the future site of which landmark?", "o": ["Diamond-shaped; the future site of bregma", "Star-shaped; the future site of pterion", "Triangular; the future site of lambda", "Oval; the future site of asterion"], "r": ["Correct. Maini says the anterior fontanelle is diamond-shaped and is the future site of bregma.", "Pterion corresponds to the anterolateral (sphenoidal) fontanelle.", "Triangular/lambda describes the POSTERIOR fontanelle.", "Asterion corresponds to the posterolateral (mastoid) fontanelle."], "cat": "Fontanelles", "source": "L02 - Anterior fontanelle", "obj": "Anterior fontanelle = diamond, future bregma", "c": 0}, {"q": "By approximately what age should the anterior fontanelle normally close?", "o": ["By puberty", "About 18 months", "The first few months after birth", "By 8 years"], "r": ["Puberty relates to sinus maturation, not the anterior fontanelle.", "Correct. Maini says the anterior fontanelle closes by about 18 months.", "The first few months after birth is when the POSTERIOR fontanelle begins to close.", "8 years is frontal-bone fusion, not fontanelle closure."], "cat": "Fontanelles", "source": "L02 - Anterior fontanelle closure", "obj": "Anterior fontanelle closes by ~18 months", "c": 1}, {"q": "The posterior fontanelle is ______ in shape and is the future site of ______.", "o": ["Round; asterion", "Oval; pterion", "Diamond; bregma", "Triangular; lambda"], "r": ["Asterion corresponds to the posterolateral fontanelle.", "Pterion corresponds to the anterolateral fontanelle.", "Diamond/bregma describes the anterior fontanelle.", "Correct. Maini says the posterior fontanelle is triangular and is the future site of lambda."], "cat": "Fontanelles", "source": "L02 - Posterior fontanelle", "obj": "Posterior fontanelle = triangular, future lambda", "c": 3}, {"q": "The anterolateral fontanelle is the future site of which landmark?", "o": ["Pterion", "Bregma", "Asterion", "Lambda"], "r": ["Correct. Maini says the anterolateral fontanelle is the future site of pterion.", "Bregma is the future site of the anterior fontanelle.", "Asterion is the future site of the POSTEROLATERAL (mastoid) fontanelle.", "Lambda is the future site of the posterior fontanelle."], "cat": "Fontanelles", "source": "L02 - Anterolateral fontanelle", "obj": "Anterolateral fontanelle -> pterion", "c": 0}, {"q": "The posterolateral fontanelle (also called the mastoid fontanelle) is the future site of which landmark?", "o": ["Bregma", "Nasion", "Asterion", "Pterion"], "r": ["Bregma corresponds to the anterior fontanelle.", "Nasion is an anterior facial landmark, not a fontanelle site.", "Correct. Maini says the posterolateral (mastoid) fontanelle is the future site of asterion.", "Pterion corresponds to the anterolateral fontanelle."], "cat": "Fontanelles", "source": "L02 - Posterolateral fontanelle", "obj": "Posterolateral (mastoid) fontanelle -> asterion", "c": 2}, {"q": "A sunken (depressed) anterior fontanelle in an infant most suggests:", "o": ["Vitamin D deficiency", "Raised intracranial pressure", "Dehydration", "A normal finding at birth"], "r": ["Vitamin D deficiency delays fontanelle CLOSURE rather than causing a sunken one.", "Raised intracranial pressure causes a BULGING fontanelle.", "Correct. Maini says a depressed/sunken anterior fontanelle suggests severe dehydration (e.g., from diarrhea or vomiting).", "A markedly sunken fontanelle is not a normal finding."], "cat": "Fontanelles", "source": "L02 - Sunken fontanelle (dehydration)", "obj": "Sunken anterior fontanelle = dehydration", "c": 2}, {"q": "A bulging anterior fontanelle suggests:", "o": ["Normal molding after birth", "Raised intracranial pressure (e.g., hydrocephalus or tumor)", "Rickets", "Severe dehydration"], "r": ["Molding is transient overlap during birth, not a bulging fontanelle.", "Correct. Maini says a bulging fontanelle indicates increased intracranial pressure, as in hydrocephalus or a tumor.", "Rickets delays fontanelle closure; it is not the classic bulging cause.", "Dehydration causes a sunken, not bulging, fontanelle."], "cat": "Fontanelles", "source": "L02 - Bulging fontanelle (raised ICP)", "obj": "Bulging anterior fontanelle = raised ICP", "c": 1}, {"q": "Failure of a fontanelle to close on schedule may indicate which deficiency, per Maini?", "o": ["Rickets - vitamin D or calcium deficiency", "Vitamin C deficiency (scurvy)", "Iron-deficiency anemia", "Vitamin B12 deficiency"], "r": ["Correct. Maini says delayed fontanelle closure can reflect rickets or vitamin D / calcium deficiency, indicating slow bone growth.", "Scurvy (vitamin C) affects collagen/gums, not the classic delayed-closure sign she cites.", "Iron deficiency causes anemia, not delayed fontanelle closure.", "B12 deficiency causes anemia/neuropathy, not this sign."], "cat": "Fontanelles", "source": "L02 - Delayed fontanelle closure", "obj": "Delayed closure = rickets / vitamin D / calcium deficiency", "c": 0}, {"q": "Which fontanelle does the pediatrician most commonly palpate, because it is the last to close?", "o": ["The posterolateral fontanelle", "The anterolateral fontanelle", "The posterior fontanelle", "The anterior fontanelle"], "r": ["The posterolateral fontanelle is not clinically the most significant.", "The anterolateral fontanelle is not the primary one palpated clinically.", "The posterior fontanelle closes early (within the first year).", "Correct. Maini says the anterior fontanelle is palpated most because it is the last to close (~18 months)."], "cat": "Fontanelles", "source": "L02 - Which fontanelle is palpated", "obj": "Anterior fontanelle = last to close, most palpated", "c": 3}, {"q": "Molding of the calvaria during vaginal delivery is possible because:", "o": ["The brain temporarily shrinks during delivery", "The sutures are fully ossified and rigid at birth", "The unfused cranial bones can slightly overlap for passage through the birth canal", "The fontanelles are absent at birth"], "r": ["The brain does not shrink; the bones shift.", "The sutures are fibrous (not ossified) at birth, which is what permits molding.", "Correct. Maini says the not-yet-fused bones overlap slightly to ease the head through the birth canal, then return to position.", "Fontanelles are present at birth and contribute to molding."], "cat": "Developmental Anomalies", "source": "L02 - Molding of the calvaria", "obj": "Molding = unfused bones overlap during birth", "c": 2}, {"q": "Premature fusion of the sagittal suture produces a long, narrow, boat-shaped head called:", "o": ["Microcephaly", "Plagiocephaly", "Acrania", "Scaphocephaly"], "r": ["Microcephaly is an abnormally small head from poor brain growth.", "Plagiocephaly is asymmetric fusion on one side only.", "Acrania is failure of the skull-cap bones to form.", "Correct. Maini says scaphocephaly ('scapha' = boat) is a boat-shaped head from premature suture fusion."], "cat": "Developmental Anomalies", "source": "L02 - Scaphocephaly", "obj": "Scaphocephaly = boat-shaped head", "c": 3}, {"q": "Premature closure of the coronal or lambdoid suture on ONE side only produces an asymmetric head called:", "o": ["Plagiocephaly", "Acrania", "Scaphocephaly", "Oxycephaly"], "r": ["Correct. Maini says plagiocephaly is premature one-sided closure producing an irregular, asymmetric head.", "Acrania is absence of skull-cap bones.", "Scaphocephaly is
