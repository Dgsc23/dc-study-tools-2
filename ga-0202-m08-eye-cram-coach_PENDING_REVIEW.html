  { kind: "Mnemonic", title: "'Both superiors intort; inferior people extort'", text: "The two SUPERIOR muscles (superior rectus + superior oblique) cause INTORSION; the two INFERIOR muscles (inferior rectus + inferior oblique) cause EXTORSION.", helps: "Pins the torsion pairs, which are otherwise easy to swap.", src: "Maini · L21" },
  { kind: "Trick", title: "There's a 'D' in myDriasis", text: "Mydriasis (the longer word) = Dilation, driven by the sympathetic dilator pupillae. Miosis (the shorter word) = constriction, a parasympathetic sphincter-pupillae affair. Longer word, bigger pupil.", helps: "Her way to stop mixing up miosis and mydriasis and which autonomic division does each.", src: "Maini · L20" },
  { kind: "Rule", title: "'Adeno' means gland; 'cyst' means sac", text: "DacryoADENitis is inflammation of the lacrimal GLAND (adeno = gland); dacryoCYSTitis is inflammation of the lacrimal SAC (cyst = sac). 'Dacryo' just means lacrimal.", helps: "Decodes the two lacrimal infections straight from the word roots.", src: "Maini · L20" },
  { kind: "Rule", title: "Recti in abduction, obliques in adduction", text: "To isolate a rectus for testing, ABDUCT the eye; to isolate an oblique, ADDUCT it. That is why, with the eye turned IN, the OBLIQUES produce the up/down movement.", helps: "The single rule that makes the whole H-test make sense.", src: "Maini · L21" },
  { kind: "Trick", title: "'Lutea' = yellow, 'cribrosa' = perforated", text: "Macula LUTEA is the YELLOW spot (like corpus luteum). Lamina CRIBROSA is the PERFORATED plate the optic nerve threads (same root as cribriform plate).", helps: "Two Latin roots that name-and-explain two retina/sclera landmarks at once.", src: "Maini · L20" },
  { kind: "Analogy", title: "Fovea = aim the light for maximum detail", text: "When you look closely at something, you shift your gaze so the light rays land on the FOVEA CENTRALIS, which is saturated with cones — the point of sharpest, most detailed vision.", helps: "Explains why the fovea is the acuity 'sweet spot' and why we move our eyes to inspect detail.", src: "Maini · L20" },
];

/* =============================================================== DRILL ===== */
/* Original-phrasing items built on Maini's eye & orbit lectures (L19-21) and
   the module's audited MC bank. Correct-answer-first authoring, then option
   positions balanced across 58 items (A/B/C/D = 14/15/16/13, no A-skew). */
const questions = [
  { id: 1, topic: "Orbit", src: "Maini · L19", q: "The orbit is a quadrilateral pyramid. Which structure essentially marks its apex?", opts: ["The supraorbital margin at the base", "The optic canal, where the optic nerve leaves for the cranial cavity", "The inferior orbital fissure in the floor", "The lacrimal fossa in the medial wall"], a: 1, h1: "The apex points backward.", h2: "The optic nerve exits there.", exp: "The APEX is essentially the OPTIC CANAL, where the optic nerve leaves the orbit to enter the cranial cavity." },
  { id: 2, topic: "Orbit", src: "Maini · L19", q: "The base (margin) of the orbit is formed by which three bones?", opts: ["Frontal, ethmoid, and lacrimal", "Nasal, frontal, and sphenoid", "Sphenoid, palatine, and maxilla", "Frontal, maxilla, and zygomatic"], a: 3, h1: "Ethmoid and lacrimal are medial-wall bones.", h2: "One frontal, one cheekbone, one upper jaw.", exp: "The margin/base = FRONTAL, MAXILLA, and ZYGOMATIC." },
  { id: 3, topic: "Orbit", src: "Maini · L19", q: "The roof of the orbit is formed by:", opts: ["The orbital plate of the frontal bone and the lesser wing of the sphenoid", "The maxilla and the palatine", "The ethmoid and the lacrimal", "The greater wing of the sphenoid and the zygomatic"], a: 0, h1: "Recall the anterior cranial fossa floor.", h2: "Frontal plate plus a sphenoid wing.", exp: "ROOF = orbital plate of the FRONTAL bone + the LESSER wing of the sphenoid." },
  { id: 4, topic: "Orbit", src: "Maini · L19", q: "On the medial wall, which bone is most prominent, recognised by its air cells?", opts: ["Maxilla", "Sphenoid body", "Ethmoid", "Lacrimal"], a: 2, h1: "It has multiple air sinus compartments.", h2: "Not the papery lacrimal.", exp: "The ETHMOID is the most prominent medial-wall bone, identified by its air cells." },
  { id: 5, topic: "Orbit", src: "Maini · L19", q: "According to Maini, which bone forms most of the floor of the orbit?", opts: ["Palatine", "Maxilla", "Zygomatic", "Ethmoid"], a: 1, h1: "Palatine is only a tiny contributor she said she would not test.", h2: "The upper-jaw bone.", exp: "The FLOOR is mostly MAXILLA (with tiny palatine and zygomatic contributions)." },
  { id: 6, topic: "Orbit", src: "Maini · L19", q: "How are the orbital walls oriented relative to each other?", opts: ["Both medial and lateral walls are parallel", "The lateral walls are parallel; the medial walls meet at 90 degrees", "All four walls are parallel front to back", "The medial walls are parallel; the lateral walls meet at about 90 degrees"], a: 3, h1: "Think about why the temporal field is so wide.", h2: "Medial parallel, lateral angled.", exp: "The MEDIAL walls are PARALLEL; the LATERAL walls meet at roughly a 90-degree angle." },
  { id: 7, topic: "Orbit", src: "Maini · L19", q: "Because of orbital orientation, which field of vision is the widest?", opts: ["The lateral (temporal) field", "The medial (nasal) field", "The superior field", "The inferior field"], a: 0, h1: "Nothing bony blocks it.", h2: "The nasal bone restricts the medial side.", exp: "The LATERAL (temporal) field is widest; the medial field is restricted by the nasal bone." },
  { id: 8, topic: "Fissures", src: "Maini · L19", q: "How many 'doorways' allow structures into or out of the orbit, and what are they?", opts: ["Two: the superior and inferior orbital fissures", "Four: two fissures, the optic canal, and the infraorbital foramen", "Three: superior orbital fissure, inferior orbital fissure, and optic canal", "Three: optic canal, foramen rotundum, and foramen ovale"], a: 2, h1: "Two fissures plus a canal.", h2: "Rotundum and ovale are not orbital doorways.", exp: "THREE doorways: the SUPERIOR orbital fissure, the INFERIOR orbital fissure, and the OPTIC CANAL." },
  { id: 9, topic: "Fissures", src: "Maini · L19", q: "The optic canal is part of which bone and transmits which two structures?", opts: ["Greater wing of sphenoid; CN III and IV", "Lesser wing of the sphenoid; the optic nerve and the ophthalmic artery", "Maxilla; the maxillary nerve and infraorbital artery", "Frontal bone; the supraorbital nerve and vessels"], a: 1, h1: "The same wing that helps form the roof.", h2: "Optic nerve plus its companion artery.", exp: "The OPTIC CANAL (lesser wing of sphenoid) transmits the OPTIC NERVE and the OPHTHALMIC ARTERY." },
  { id: 10, topic: "Fissures", src: "Maini · L19", q: "The superior orbital fissure lies between which parts of the sphenoid?", opts: ["The body and the greater wing", "The two pterygoid plates", "Between its greater and lesser wings", "The lesser wing and the frontal bone"], a: 2, h1: "Between the two wings.", h2: "Greater and lesser.", exp: "The SUPERIOR orbital fissure lies between the GREATER and LESSER wings of the sphenoid." },
  { id: 11, topic: "Fissures", src: "Maini · L19", q: "Compared with the superior orbital fissure, the inferior orbital fissure:", opts: ["Is OUTSIDE the cranial cavity, communicating with the pterygopalatine fossa", "Communicates with the posterior cranial fossa", "Is the doorway for the optic nerve", "Lies entirely within the frontal bone"], a: 0, h1: "It does not open into the cranial cavity.", h2: "It leads toward the pterygopalatine/infratemporal region.", exp: "The INFERIOR orbital fissure is OUTSIDE the cranial cavity, communicating with the PTERYGOPALATINE/infratemporal fossa." },
  { id: 12, topic: "Fissures", src: "Maini · L19", q: "The infraorbital artery (which Maini stressed passes through the inferior orbital fissure) is the terminal branch of which artery, exiting where?", opts: ["Facial artery; through the supraorbital notch", "Internal carotid; through the optic canal", "Maxillary artery; exiting through the infraorbital foramen", "Ophthalmic artery; through the anterior ethmoidal foramen"], a: 2, h1: "It is a branch of a major deep-face artery.", h2: "It exits a maxilla foramen of the same name.", exp: "The INFRAORBITAL artery = the terminal branch of the MAXILLARY artery; it exits through the INFRAORBITAL FORAMEN." },
  { id: 13, topic: "Eyelids", src: "Maini · L19", q: "The sebaceous glands associated with the eyelashes at the lid margin are the:", opts: ["Tarsal (Meibomian) glands", "Glands of Zeis", "Glands of Moll", "Lacrimal glands"], a: 1, h1: "Sebaceous, right at the lashes.", h2: "Not the sweat glands (Moll).", exp: "The sebaceous glands of the eyelashes are the GLANDS OF ZEIS (the sweat glands are the glands of Moll)." },
  { id: 14, topic: "Eyelids", src: "Maini · L19", q: "The sweat glands at the eyelid margin are the glands of:", opts: ["Zeis", "Meibom", "Wolfring", "Moll"], a: 3, h1: "Sweat, not sebaceous.", h2: "It rhymes with 'doll'.", exp: "The sweat glands at the lid margin are the GLANDS OF MOLL." },
  { id: 15, topic: "Eyelids", src: "Maini · L19", q: "A firm lump on the BODY of the eyelid (not the margin), often needing a minor surgical scoop, is caused by inflammation of which gland?", opts: ["The tarsal (Meibomian) gland, producing a chalazion", "A gland of Zeis, producing a stye", "The lacrimal gland, producing dacryoadenitis", "A gland of Moll, producing an external hordeolum"], a: 0, h1: "It sits deep in the tarsal plate.", h2: "Chalazion = internal hordeolum.", exp: "A CHALAZION (internal hordeolum) comes from a TARSAL/MEIBOMIAN gland; the swelling is on the BODY of the lid." },
  { id: 16, topic: "Eyelids", src: "Maini · L19", q: "An external hordeolum (stye) is caused by inflammation of:", opts: ["A tarsal (Meibomian) gland", "The lacrimal sac", "A marginal gland (of Zeis or Moll) at the lid margin", "The plica semilunaris"], a: 2, h1: "The swelling is AT the margin.", h2: "The marginal glands, not the deep tarsal ones.", exp: "A STYE (external hordeolum) is inflammation of a MARGINAL gland (Zeis or Moll) at the lid margin." },
  { id: 17, topic: "Eyelids", src: "Maini · L19", q: "From superficial to deep, the correct eyelid layer sequence is:", opts: ["Tarsal plate, skin, orbicularis oculi, conjunctiva, LPS tendon", "Skin > orbicularis oculi (in superficial fascia) > LPS tendon > tarsal plate > palpebral conjunctiva", "Conjunctiva, tarsal plate, LPS tendon, orbicularis, skin", "Skin, tarsal plate, orbicularis oculi, conjunctiva"], a: 1, h1: "Skin is outermost, conjunctiva innermost.", h2: "Muscle, then levator tendon, then tarsal plate.", exp: "Skin > orbicularis oculi (superficial fascia) > LPS tendon > tarsal plate > palpebral conjunctiva." },
  { id: 18, topic: "Lacrimal", src: "Maini · L19", q: "The lacrimal fossa in the MEDIAL wall of the orbit accommodates which structure?", opts: ["The lacrimal gland", "The inferior oblique origin", "The trochlea", "The lacrimal (nasolacrimal) sac, NOT the gland"], a: 3, h1: "The gland sits laterally, in the frontal bone.", h2: "This medial fossa holds the drainage sac.", exp: "The medial-wall lacrimal fossa holds the LACRIMAL SAC, not the gland." },
  { id: 19, topic: "Lacrimal", src: "Maini · L20", q: "Which sequence correctly traces tear drainage from eye to nose?", opts: ["Puncta > canaliculi > lacrimal sac > nasolacrimal duct > inferior meatus of the nose", "Lacrimal gland > sac > superior meatus", "Puncta > nasolacrimal duct > lacrimal sac > canaliculi", "Caruncle > plica semilunaris > pupil > nose"], a: 0, h1: "Start at the tiny pores.", h2: "Sac, then duct, then the nose.", exp: "PUNCTA > CANALICULI > lacrimal SAC > NASOLACRIMAL DUCT > INFERIOR MEATUS of the nasal cavity." },
  { id: 20, topic: "Lacrimal", src: "Maini · L20", q: "Inflammation of the lacrimal SAC is called:", opts: ["Dacryoadenitis", "Xerophthalmia", "Dacryocystitis", "Chalazion"], a: 2, h1: "'Cyst' means sac.", h2: "Not the 'adeno' (gland) one.", exp: "DACRYOCYSTITIS = inflammation of the lacrimal SAC (dacryoadenitis is the gland)." },
  { id: 21, topic: "Lacrimal", src: "Maini · L20", q: "Parasympathetic (secretomotor) fibers reach the lacrimal gland via which nerve and ganglion?", opts: ["Oculomotor nerve; ciliary ganglion", "Facial nerve (greater petrosal), relaying in the pterygopalatine ganglion", "Trigeminal nerve; trigeminal ganglion", "Glossopharyngeal nerve; otic ganglion"], a: 1, h1: "The tear gland's parasympathetics are CN VII.", h2: "Greater petrosal to the pterygopalatine ganglion.", exp: "The lacrimal gland's parasympathetic supply = CN VII via the GREATER PETROSAL nerve, relaying in the PTERYGOPALATINE ganglion." },
  { id: 22, topic: "LPS / Horner", src: "Maini · L19", q: "The smooth-muscle slip of levator palpebrae superioris (the superior tarsal muscle) is innervated by:", opts: ["The oculomotor nerve (CN III)", "The facial nerve (CN VII)", "Parasympathetic fibers", "Sympathetic fibers only"], a: 3, h1: "Smooth muscle means autonomic control.", h2: "It fails in Horner syndrome.", exp: "The SUPERIOR TARSAL muscle is supplied by SYMPATHETIC fibers only (the rest of LPS is CN III)." },
  { id: 23, topic: "LPS / Horner", src: "Maini · L20", q: "Which finding is NOT part of Horner syndrome?", opts: ["Mydriasis (pupillary dilation)", "Partial ptosis", "Anhidrosis", "Enophthalmos"], a: 0, h1: "Sympathetic FAILURE cannot dilate the pupil.", h2: "You would expect the opposite pupil change.", exp: "MYDRIASIS is NOT in Horner syndrome; sympathetic failure gives MIOSIS. Horner = partial ptosis, miosis, anhidrosis, flushing, enophthalmos." },
  { id: 24, topic: "LPS / Horner", src: "Maini · L20", q: "In Horner syndrome the ptosis is only PARTIAL because:", opts: ["The eyelid has no levator at all", "Only the conjunctiva is affected", "The CN III-supplied skeletal part of LPS is still intact; only the sympathetic superior tarsal muscle fails", "The orbicularis oculi is paralysed"], a: 2, h1: "Two muscle parts, two nerve supplies.", h2: "The skeletal, oculomotor part still works.", exp: "Only the SYMPATHETIC superior tarsal muscle fails; the CN III skeletal LPS is intact, so the ptosis is PARTIAL." },
  { id: 25, topic: "LPS / Horner", src: "Maini · L20", q: "Which lesion did Maini name as a common cause of Horner syndrome?", opts: ["A middle cerebral artery stroke", "A Pancoast (apical lung) tumour compressing the cervical sympathetic chain", "A pituitary adenoma", "An acoustic neuroma"], a: 1, h1: "Think of the lung apex.", h2: "It presses on the sympathetic chain.", exp: "A PANCOAST (apical lung) TUMOUR compressing the cervical sympathetic chain is a common cause." },
  { id: 26, topic: "Coats", src: "Maini · L20", q: "The outer fibrous coat of the eyeball consists of:", opts: ["Sclera (posterior five-sixths) and cornea (anterior one-sixth)", "Choroid and ciliary body", "Retina and optic disc", "Iris and pupil"], a: 0, h1: "White part plus the clear window.", h2: "5/6 opaque, 1/6 transparent.", exp: "The fibrous coat = SCLERA (posterior 5/6) + CORNEA (anterior 1/6)." },
  { id: 27, topic: "Coats", src: "Maini · L20", q: "The middle vascular coat (tunica vasculosa) is composed of:", opts: ["Sclera, cornea, and lamina cribrosa", "Rods, cones, and ganglion cells", "Anterior, posterior, and vitreous chambers", "Choroid, ciliary body, and iris"], a: 3, h1: "The pigmented, blood-rich layer.", h2: "Choroid in back, iris in front.", exp: "The vascular coat = CHOROID + CILIARY BODY + IRIS." },
  { id: 28, topic: "Coats", src: "Maini · L20", q: "The perforated posterior region of the sclera through which the optic nerve pierces is the:", opts: ["Ora serrata", "Canal of Schlemm", "Lamina cribrosa", "Lacrimal fossa"], a: 2, h1: "'Cribrosa' means perforated.", h2: "Same root as the cribriform plate.", exp: "The LAMINA CRIBROSA is the perforated posterior sclera where the optic nerve pierces it." },
  { id: 29, topic: "Coats", src: "Maini · L20", q: "Tenon's capsule (bulbar fascia) is separated from the sclera by which space?", opts: ["The anterior chamber", "The episcleral space", "The vitreous chamber", "The iridocorneal angle"], a: 1, h1: "A thin space just outside the sclera.", h2: "'Epi' = upon the sclera.", exp: "Tenon's capsule is separated from the sclera by the EPISCLERAL SPACE." },
  { id: 30, topic: "Retina", src: "Maini · L20", q: "Why is the optic disc a physiological blind spot?", opts: ["It lacks photoreceptors (no rods or cones)", "It is covered by the iris", "It has only cones and no rods", "It is where the macula lutea sits"], a: 0, h1: "It is where the nerve fibers leave.", h2: "No receptors can sit there.", exp: "The OPTIC DISC has NO photoreceptors (rods/cones), so it is the physiological BLIND SPOT." },
  { id: 31, topic: "Retina", src: "Maini · L20", q: "The point of maximum visual acuity, densely packed with cones, is the:", opts: ["Optic disc", "Ora serrata", "Lamina cribrosa", "Fovea centralis of the macula lutea"], a: 3, h1: "You aim light here to see detail.", h2: "The centre of the yellow spot.", exp: "The FOVEA CENTRALIS (in the macula lutea) is saturated with cones = the point of acute vision." },
  { id: 32, topic: "Retina", src: "Maini · L20", q: "Which photoreceptors provide dim-light (night) vision but cannot detect colour?", opts: ["Cones", "Bipolar cells", "Rods", "Ganglion cells"], a: 2, h1: "Active when the lights are low.", h2: "Not the colour ones.", exp: "RODS give dim-light/night vision and cannot detect colour; CONES handle bright-light colour vision." },
  { id: 33, topic: "Retina", src: "Maini · L20", q: "Macular degeneration classically produces:", opts: ["Total blindness in one eye", "Loss of central vision with preserved peripheral vision", "Loss of peripheral vision with preserved central vision", "Sudden painful red eye"], a: 1, h1: "The macula serves the centre of the image.", h2: "The periphery is spared.", exp: "Macular degeneration = loss of CENTRAL vision with PRESERVED peripheral vision." },
  { id: 34, topic: "Aqueous", src: "Maini · L20", q: "Which sequence correctly describes normal aqueous humor circulation?", opts: ["Posterior chamber > pupil > anterior chamber > canal of Schlemm > venous blood", "Anterior chamber > vitreous > retina > optic nerve", "Ciliary body > vitreous chamber > ora serrata", "Anterior chamber > pupil > posterior chamber > lens"], a: 0, h1: "It is made behind the iris.", h2: "It leaves through the canal at the angle.", exp: "Posterior chamber > PUPIL > anterior chamber > canal of SCHLEMM (sinus venosus sclerae) > venous blood." },
  { id: 35, topic: "Aqueous", src: "Maini · L20", q: "Blockage of the canal of Schlemm at the iridocorneal angle causes:", opts: ["Cataract", "Macular degeneration", "Retinal detachment", "Glaucoma (raised intraocular pressure)"], a: 3, h1: "Aqueous cannot drain, so pressure builds.", h2: "It can lead to blindness if prolonged.", exp: "Blocking the canal of Schlemm raises intraocular pressure = GLAUCOMA." },
  { id: 36, topic: "Refraction", src: "Maini · L20", q: "In myopia, the image focuses ___ the retina and is corrected with a ___ lens.", opts: ["Behind; convex", "In front of; concave", "On; cylindrical", "Behind; concave"], a: 1, h1: "The 'minus' error.", h2: "Focus falls short, so a diverging lens fixes it.", exp: "MYOPIA: image focuses IN FRONT of the retina; corrected with a CONCAVE lens." },
  { id: 37, topic: "Refraction", src: "Maini · L20", q: "In hyperopia (farsightedness), the image focuses ___ the retina and is corrected with a ___ lens.", opts: ["In front of; concave", "On; cylindrical", "Behind; convex", "In front of; convex"], a: 2, h1: "The 'plus' error.", h2: "Focus falls beyond the retina.", exp: "HYPEROPIA: image focuses BEHIND the retina; corrected with a CONVEX lens." },
  { id: 38, topic: "Refraction", src: "Maini · L20", q: "Presbyopia is best defined as:", opts: ["Age-related (after about 40) inability to focus on near objects", "Opacity of the lens due to ageing", "Irregular corneal curvature", "Loss of central vision"], a: 0, h1: "It is about age and near focus.", h2: "Not lens opacity (that is cataract).", exp: "PRESBYOPIA = age-related (about 40+) inability to focus on NEAR objects." },
  { id: 39, topic: "Muscles", src: "Maini · L21", q: "The four recti of the eye share a common origin from:", opts: ["The floor of the orbit", "The trochlea", "The lesser wing of the sphenoid alone", "A common tendinous (fibrous) ring around the optic canal"], a: 3, h1: "A ring at the back of the orbit.", h2: "It surrounds the optic canal.", exp: "The four RECTI arise from a COMMON TENDINOUS RING around the optic canal." },
  { id: 40, topic: "Muscles", src: "Maini · L21", q: "By 'SO4, LR6, AO3', which nerve supplies the superior oblique?", opts: ["Oculomotor (CN III)", "Trochlear nerve (CN IV)", "Abducent (CN VI)", "Ophthalmic (V1)"], a: 1, h1: "The '4' in the mnemonic.", h2: "The nerve named for the pulley.", exp: "SO4: the SUPERIOR OBLIQUE is supplied by the TROCHLEAR nerve (CN IV)." },
  { id: 41, topic: "Muscles", src: "Maini · L21", q: "Which extraocular muscle is the ONLY one arising from the FLOOR of the orbit (a point Maini said appears on boards)?", opts: ["Superior oblique", "Medial rectus", "Inferior oblique", "Lateral rectus"], a: 2, h1: "It is an oblique, not a rectus.", h2: "It elevates and abducts (up and out).", exp: "The INFERIOR OBLIQUE is the only muscle that originates from the FLOOR of the orbit." },
  { id: 42, topic: "Muscles", src: "Maini · L21", q: "The action of the superior oblique is:", opts: ["Depression + abduction (down and out)", "Elevation + adduction (up and in)", "Elevation + abduction (up and out)", "Pure adduction"], a: 0, h1: "Its tendon threads the trochlea.", h2: "It turns the eye down and out.", exp: "The SUPERIOR OBLIQUE depresses and abducts the eye (DOWN and OUT)." },
  { id: 43, topic: "Muscles", src: "Maini · L21", q: "Intorsion of the eyeball ('both superiors') is produced by:", opts: ["Inferior rectus + inferior oblique", "Medial rectus + lateral rectus", "Lateral rectus + superior rectus", "Superior rectus + superior oblique"], a: 3, h1: "The two SUPERIOR muscles.", h2: "Rectus + oblique, both superior.", exp: "INTORSION = SUPERIOR RECTUS + SUPERIOR OBLIQUE (the inferiors extort)." },
  { id: 44, topic: "Testing", src: "Maini · L21", q: "For clinical testing, the recti are isolated in ___ and the obliques in ___.", opts: ["Elevation; depression", "Abduction; adduction", "Adduction; abduction", "Convergence; divergence"], a: 1, h1: "Turn the eye OUT for the recti.", h2: "Turn it IN for the obliques.", exp: "RECTI are tested in ABDUCTION; OBLIQUES in ADDUCTION." },
  { id: 45, topic: "Testing", src: "Maini · L21", q: "To test the superior oblique, ask the patient to:", opts: ["Abduct and look up", "Abduct and look down", "Adduct (look medially) and look down", "Adduct and look up"], a: 2, h1: "Obliques are tested in adduction.", h2: "Superior oblique still depresses.", exp: "Test the SUPERIOR OBLIQUE by ADDUCTING the eye and looking DOWN." },
  { id: 46, topic: "Nerves", src: "Maini · L20", q: "Which statement about the deep petrosal nerve is correct?", opts: ["It carries sympathetic fibers from the internal carotid plexus and is NOT a branch of CN VII", "It is a parasympathetic branch of the facial nerve", "It supplies the lacrimal gland directly with taste fibers", "It is a branch of the optic nerve"], a: 0, h1: "A classic 'not a branch of CN VII' trap.", h2: "It is sympathetic, from the carotid plexus.", exp: "The DEEP PETROSAL nerve carries SYMPATHETIC fibers from the internal carotid plexus and is NOT a branch of CN VII." },
  { id: 47, topic: "Nerves", src: "Maini · L21", q: "By the mnemonic 'NFL', the three branches of the ophthalmic nerve (V1) are:", opts: ["Nasal, facial, lingual", "Nasopalatine, frontal, lacrimal", "Nasociliary, facial, long ciliary", "Nasociliary, frontal, lacrimal"], a: 3, h1: "National Football League.", h2: "Nasociliary, Frontal, Lacrimal.", exp: "V1 branches = NASOCILIARY, FRONTAL, LACRIMAL ('NFL')." },
  { id: 48, topic: "Arteries", src: "Maini · L21", q: "The ophthalmic artery is a branch of which vessel?", opts: ["The external carotid artery", "The internal carotid artery", "The maxillary artery", "The facial artery"], a: 1, h1: "The same artery that feeds the brain anteriorly.", h2: "Internal, not external.", exp: "The OPHTHALMIC ARTERY is a branch of the INTERNAL CAROTID artery." },
  { id: 49, topic: "Ciliary ganglion", src: "Maini · L21", q: "The ciliary ganglion is functionally which type, and where does it lie relative to the optic nerve?", opts: ["A sympathetic ganglion, medial to the optic nerve", "A sensory ganglion, above the optic nerve", "A parasympathetic ganglion, on the lateral side of the optic nerve", "A sympathetic ganglion, within the optic nerve"], a: 2, h1: "It relays fibers for pupil constriction.", h2: "Parasympathetic, lateral to the nerve.", exp: "The CILIARY GANGLION is PARASYMPATHETIC and lies on the LATERAL side of the optic nerve." },
  { id: 50, topic: "Ciliary ganglion", src: "Maini · L21", q: "How do sympathetic fibers behave at the ciliary ganglion?", opts: ["They synapse there before reaching the eye", "They form the parasympathetic root", "They supply the sphincter pupillae", "They pass straight through without synapsing (already synapsed in the superior cervical ganglion)"], a: 3, h1: "They already synapsed elsewhere.", h2: "No second synapse in the orbit.", exp: "SYMPATHETIC fibers PASS THROUGH the ciliary ganglion without synapsing (they synapsed in the superior cervical ganglion)." },
  { id: 51, topic: "Ciliary ganglion", src: "Maini · L21", q: "Postganglionic parasympathetic fibers leave the ciliary ganglion in the short ciliary nerves to supply:", opts: ["The lateral rectus and LPS", "The sphincter pupillae and the ciliary muscle", "The dilator pupillae and superior tarsal muscle", "The lacrimal gland"], a: 1, h1: "Constriction and accommodation.", h2: "The sphincter plus the muscle that shapes the lens.", exp: "Short ciliary nerves carry parasympathetic fibers to the SPHINCTER PUPILLAE and the CILIARY MUSCLE." },

/* --------------------------------------------------------------- Drill ---- */
function Drill({ bank }) {
  const [idx, setIdx] = useState(0);
  const [answers, setAnswers] = useState({});
  const [hintLevel, setHintLevel] = useState({});
  const [mode, setMode] = useState("study");

  const safeIdx = Math.min(idx, Math.max(0, bank.length - 1));
  const q = bank[safeIdx];

  const score = useMemo(
    () => Object.entries(answers).reduce((n, [id, v]) => {
      const qq = bank.find((x) => x.id === Number(id));
      return n + (qq && v === qq.a ? 1 : 0);
    }, 0),
    [answers, bank]
  );

  if (!bank.length) return <section className="section"><div className="banner"><div className="bt">Drill</div></div></section>;

  const keyMode = mode === "key";
  const sel = answers[q.id];
  const answered = sel !== undefined;
  const hl = hintLevel[q.id] || 0;
  const done = Object.keys(answers).length;

  const select = (i) => {
    if (keyMode) return;
    if (answers[q.id] !== undefined) return;
    setAnswers((p) => ({ ...p, [q.id]: i }));
  };
  const bumpHint = () => setHintLevel((p) => ({ ...p, [q.id]: Math.min((p[q.id] || 0) + 1, 2) }));
  const optClass = (i) => {
    if (keyMode) return i === q.a ? "opt opt-correct" : "opt opt-locked";
    if (!answered) return "opt";
    if (i === q.a) return "opt opt-correct";
    if (i === sel) return "opt opt-wrong";
    return "opt opt-locked";
  };

  return (
    <section className="section">
      <div className="banner">
        <div className="bt">🎯 Drill — {bank.length} questions across the eye &amp; orbit</div>
        <p>Four options, two progressive hints, an explanation, and a lecture source per question. Tap to self-test, or flip to the Answer Key to review.</p>
      </div>

      <div className="drillbar">
        <div className="progress">Question <b>{safeIdx + 1}</b> / {bank.length}{!keyMode && <> · answered <b>{done}</b></>}</div>
        <div className="modetog">
          <button className={mode === "study" ? "on" : ""} onClick={() => setMode("study")}>Study (tap)</button>
          <button className={mode === "key" ? "on" : ""} onClick={() => setMode("key")}>Answer key</button>
        </div>
        {!keyMode && <div className="scorepill">Score {score}/{done || 0}</div>}
      </div>

      <div className="navgrid">
        {bank.map((qq, i) => {
          let cls = "";
          if (keyMode) cls = "ok";
          else { const a = answers[qq.id]; cls = a === undefined ? "" : a === qq.a ? "ok" : "no"; }
          return <button key={qq.id} className={`navbtn ${cls} ${i === safeIdx ? "cur" : ""}`} onClick={() => setIdx(i)}>{i + 1}</button>;
        })}
      </div>

      <div className="qcard">
        <div className="badges"><span className="qtopic">{q.topic}</span><span className="qsrc">{q.src}</span></div>
        <div className="qtext">{q.q}</div>

        {q.opts.map((o, i) => (
          <button key={i} className={optClass(i)} onClick={() => select(i)}>
            <span className="key">{String.fromCharCode(65 + i)}</span><span>{o}</span>
          </button>
        ))}

        {!keyMode && !answered && (
          <>
            <div className="hintrow">
              <button className="ghost" onClick={bumpHint} disabled={hl >= 2}>{hl === 0 ? "Need a hint?" : "Bigger hint"}</button>
            </div>
            {hl >= 1 && <div className="hintbox">💡 {q.h1}</div>}
            {hl >= 2 && <div className="hintbox">🔎 {q.h2}</div>}
          </>
        )}

        {keyMode && <div className="exp keyed"><div className="tag">✦ Answer · {q.src}</div><p>{q.exp}</p></div>}
        {!keyMode && answered && (
          <div className={`exp ${sel === q.a ? "correct" : "incorrect"}`}>
            <div className="tag">{sel === q.a ? "✓ Correct" : "✗ Not quite"} · {q.src}</div>
            <p>{q.exp}</p>
          </div>
        )}

        <div className="navfoot">
          <button className="btn btn-ghost" onClick={() => setIdx(Math.max(0, safeIdx - 1))} disabled={safeIdx === 0}>← Prev</button>
          <button className="btn btn-primary" onClick={() => setIdx(Math.min(bank.length - 1, safeIdx + 1))} disabled={safeIdx >= bank.length - 1}>Next →</button>
        </div>
      </div>
    </section>
  );
}

/* --------------------------------------------------------------- Coach ---- */
const COACH_SYSTEM = `You are Dr. Seema Maini, teaching GA 0202 (Gross Anatomy), running a review of THE EYE & ORBIT — from her lectures on The Orbit & Its Contents and the Testing of Eye Muscles, Arteries, Nerves & Ciliary Ganglion. Teach ONLY from this content; do not invent bones, foramina, muscle actions, nerves, or reflex circuits. Warm and direct; you say "right?" and "okay," love clinical stories, quiz students to wake them up, and push them to reason from roots and rules rather than memorise blindly. Keep answers tight (3-6 sentences) and quiz the student back.

BONY ORBIT: quadrilateral pyramid; apex posterior (essentially the optic canal where the optic nerve exits to the cranial cavity), base anterior. Base bones: frontal, maxilla, zygomatic. Roof: orbital plate of frontal + lesser wing of sphenoid. Medial wall: ethmoid (air cells, most prominent), lacrimal (papery 'papyrus' bone), body of sphenoid, frontal. Floor: mostly maxilla. Lateral wall: frontal process of zygomatic + greater wing of sphenoid. Medial walls parallel; lateral walls meet at ~90 degrees, so the lateral (temporal) field of vision is widest; medial field restricted by the nasal bone.

DOORWAYS: three - superior orbital fissure (between greater & lesser wings of sphenoid; superior ophthalmic vein + CN III, IV, VI, V1 branches; communicates with middle cranial fossa), inferior orbital fissure (between maxilla & greater wing; OUTSIDE the cranium, to the pterygopalatine/infratemporal fossa; V2, inferior ophthalmic vein, and the infraorbital artery - terminal branch of the maxillary artery, which exits the infraorbital foramen of the maxilla), and the optic canal (lesser wing; optic nerve + ophthalmic artery; to middle cranial fossa).

EYELIDS: layers superficial to deep - skin, orbicularis oculi (facial expression muscle, CN VII, closes eye), LPS tendon, tarsal plate, palpebral conjunctiva (reflects to bulbar conjunctiva). Marginal glands: Zeis (sebaceous of lashes), Moll (sweat). Tarsal/Meibomian glands (sebaceous, in the plate) keep lids airtight. STYE (external hordeolum) = marginal gland at the MARGIN, easy; CHALAZION (internal hordeolum) = tarsal/Meibomian gland on the BODY of the lid, often needs surgical scooping.

LACRIMAL: gland sits in the frontal bone; the medial-wall lacrimal fossa holds the SAC. Flow: gland > onto globe > lacrimal lake (with caruncle centrally, plica semilunaris laterally) > puncta (on lacrimal papillae) > canaliculi > lacrimal sac > nasolacrimal duct > inferior meatus of nose. Dacryocystitis = sac inflammation; dacryoadenitis = gland inflammation. Cornea is avascular (fed by tears + air anteriorly, aqueous posteriorly). Lacrimal parasympathetic = CN VII (greater petrosal) via the pterygopalatine ganglion.

LPS & HORNER: LPS opens the upper lid (lower lid has no levator), origin undersurface of lesser wing of sphenoid. Mostly skeletal (CN III), plus a smooth slip = superior tarsal muscle (SYMPATHETIC only). HORNER syndrome (board favourite) = unilateral sympathetic failure: partial ptosis (CN III LPS intact so not complete), miosis, anhidrosis, flushing, enophthalmos. Mydriasis is NOT in Horner. Common cause = Pancoast apical lung tumour. Postganglionic bodies = superior cervical ganglion; preganglionic = T1-T2 lateral horn.

EYEBALL COATS: outer fibrous = sclera (opaque, posterior 5/6) + cornea (transparent avascular anterior 1/6); jaundice shows first in sclera above ~2 mg% bilirubin; lamina cribrosa = perforated posterior sclera for the optic nerve. Middle vascular = choroid (largest) > ciliary body (ciliary processes secrete aqueous; ciliary muscle) > iris (sphincter pupillae = circular fibers, PARASYMPATHETIC, constrict/miosis; dilator pupillae = radial fibers, SYMPATHETIC, dilate/mydriasis). Inner nervous = retina. Tenon's capsule (bulbar fascia) is separated from sclera by the episcleral space, left intact for an artificial eye; its wall extensions = medial & lateral check ligaments.

RETINA: outer pigmented layer (melanin absorbs stray light; deficient in albinism) + neural layer. Chain: rods/cones > bipolar cells > ganglion cells; ganglion-cell axons = optic nerve (CN II). Rods = night vision, no colour; cones = colour, bright light. Optic disc = blind spot (no photoreceptors). Fovea centralis (in the macula lutea, 'lutea' = yellow) = max cones = acute vision. Macular degeneration = central vision lost, peripheral preserved. Ora serrata = serrated anterior retinal margin.

AQUEOUS & CHAMBERS: aqueous made by ciliary processes into the POSTERIOR chamber > pupil > ANTERIOR chamber (cornea to iris) > canal of Schlemm (sinus venosus sclerae) at the iridocorneal angle > venous blood. Block it = raised intraocular pressure = GLAUCOMA (open/closed angle). Vitreous body (in the vitreous chamber, between lens and retina) = gel that keeps the globe's shape.

REFRACTION: media in order - cornea > aqueous > lens > vitreous (cornea does most refraction). Myopia = focus in front = concave lens; hyperopia = focus behind = convex lens; astigmatism = irregular cornea = cylindrical lens; presbyopia = age-related loss of near focus (~40+); cataract = ageing lens opacity.

EXTRAOCULAR MUSCLES: four recti from a common tendinous ring around the optic canal; muscles from occipital myotomes (GSE). Nerves by SO4, LR6, AO3: superior oblique = CN IV, lateral rectus = CN VI, all others (SR, IR, MR, IO) + LPS = CN III. Actions: SR up+in, IR down+in, MR adduction, LR abduction, SO down+out (tendon through the trochlea), IO up+out. Inferior oblique is the ONLY muscle from the floor of the orbit (board point). Both superiors intort; inferiors extort. Intrinsic smooth muscles = sphincter pupillae, dilator pupillae, ciliary muscle.

TESTING (H-test): recti isolated in ABDUCTION, obliques in ADDUCTION. SR = abduct + up; IR = abduct + down; SO = adduct + down; IO = adduct + up.

NERVES/VESSELS: optic nerve (CN II) = SSA. CN III enters via SOF, splits into superior + inferior divisions; CN IV supplies only superior oblique. V1 branches = NFL (nasociliary, frontal, lacrimal); frontal > supraorbital + supratrochlear; nasociliary > long ciliary (sympathetic to dilator pupillae), infratrochlear, anterior/posterior ethmoidal, sensory root to ciliary ganglion. TRAP: deep petrosal nerve is NOT a branch of CN VII - it is sympathetic from the ICA plexus. Ophthalmic artery = from internal carotid; central retinal artery runs in the optic nerve to the centre of the disc; anterior ciliary artery enters at the corneoscleral junction. Ophthalmic veins drain to the cavernous sinus (inferior also to the pterygoid plexus).

CILIARY GANGLION: parasympathetic ganglion, lateral to the optic nerve. Motor root = CN III (preganglionic) > synapse > short ciliary nerves > sphincter pupillae + ciliary muscle. Sympathetics pass through without synapsing (already synapsed in the superior cervical ganglion). Sensory root = nasociliary (V1). Short ciliary nerves carry GSA + sympathetic + parasympathetic. Ciliary muscle contracts > relaxes suspensory ligament > lens thickens for NEAR.

REFLEXES: light reflex - afferent CN II > pretectal nucleus > Edinger-Westphal > efferent CN III > ciliary ganglion > short ciliary > sphincter pupillae; light in one eye constricts both (consensual is the other eye). Afferent (optic) lesion = neither pupil constricts; efferent (CN III) lesion = only that pupil fails. Accommodation (near) = 3 C's: convergence (medial recti, somatic CN III), constriction, increased convexity; a parasympathetic CN III reflex. Argyll Robertson pupil (light lost, accommodation kept) = syphilis. Corneal reflex: sensory V1, motor CN VII, centre = spinal trigeminal nucleus. Papilledema = raised intracranial pressure. Abnormal white/asymmetric red reflex in a child = congenital cataract or retinoblastoma.

Open by offering to drill the extraocular muscles (nerves via SO4 LR6 AO3, actions, and the H-test), Horner syndrome, the light/accommodation reflexes, aqueous flow & glaucoma, the coats of the eyeball, or the orbit's bones & doorways. When the student is wrong, name the rule and have them re-derive step by step.`;

function Coach() {
  const [log, setLog] = useState([
    { role: "assistant", content: "Okay, the eye and orbit. Two clusters trip everyone up, right? First, the extraocular muscles - which nerve (SO4, LR6, and everything else is the third nerve), which action (recti pull up/down and IN, obliques up/down and OUT), and the H-test (recti tested in abduction, obliques in adduction). Second, the reflex circuits - the light reflex (afferent optic, efferent third nerve through the ciliary ganglion) and the accommodation reflex (the 3 C's). Want me to drill the eye muscles and their testing, Horner syndrome, the light/accommodation reflexes, the aqueous flow and glaucoma, the three coats of the eyeball, or the bones and doorways of the orbit? Where do you want to start?" },
  ]);
  const [input, setInput] = useState("");
  const [busy, setBusy] = useState(false);
  const [err, setErr] = useState("");
  const logRef = useRef(null);

  useEffect(() => { if (logRef.current) logRef.current.scrollTop = logRef.current.scrollHeight; }, [log, busy]);

  const send = async (text) => {
    const msg = (text ?? input).trim();
    if (!msg || busy) return;
    setErr("");
    const next = [...log, { role: "user", content: msg }];
    setLog(next);
    setInput("");
    setBusy(true);
    try {
      const res = await fetch("https://fab-ai.dgync1.workers.dev/", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          model: "claude-sonnet-4-20250514",
          max_tokens: 1000,
          system: COACH_SYSTEM,
          messages: next.map((m) => ({ role: m.role, content: m.content })),
        }),
      });
      const data = await res.json();
      const reply = (data.reply || (data.content || []).filter((b) => b.type === "text").map((b) => b.text).join("\n") || "").trim();
      setLog((p) => [...p, { role: "assistant", content: reply || "Say that again for me?" }]);
    } catch (e) {
      setErr("Could not reach the tutor. If you're running this outside the wrapped app, the API call needs a valid endpoint/key.");
      setLog((p) => p.slice(0, -1).concat({ role: "user", content: msg }));
    } finally {
      setBusy(false);
    }
  };

  const prompts = [
    "Drill the extraocular muscles - nerves (SO4 LR6 AO3), actions, and the H-test",
    "Quiz me on Horner syndrome",
    "The light reflex - which nerve is out, which pupil constricts?",
    "Aqueous humor flow and glaucoma",
    "The three coats of the eyeball",
    "The bones and doorways of the orbit",
  ];

  return (
    <section className="section">
      <div className="banner">
        <div className="bt">🧑‍⚕️ AI Coach — Dr. Maini&apos;s voice</div>
        <p>Grounded in her eye &amp; orbit lectures. It quizzes you and makes you reason step by step instead of guessing.</p>
      </div>

      <div className="coach-pills">
        {prompts.map((p, i) => <button key={i} className="cpill" onClick={() => send(p)}>{p}</button>)}
      </div>

      <div className="chatlog" ref={logRef}>
        {log.map((m, i) => (
          <div key={i} className={`msg ${m.role === "user" ? "user" : "bot"}`}>
            {m.role === "assistant" && <div className="who">Dr. Maini</div>}
            {m.content}
          </div>
        ))}
        {busy && <div className="typing">Dr. Maini is typing…</div>}
      </div>

      <div className="composer">
        <textarea
          value={input}
          placeholder="Ask Dr. Maini… (Enter to send, Shift+Enter for a new line)"
          onChange={(e) => setInput(e.target.value)}
          onKeyDown={(e) => { if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); send(); } }}
        />
        <button className="btn btn-primary" onClick={() => send()} disabled={busy || !input.trim()}>Send</button>
      </div>
      {err && <div className="tinynote" style={{ color: "var(--bad)" }}>{err}</div>}
      <div className="tinynote">Tutor answers are AI-generated in a teaching persona — trust the lecture/slides first if anything ever conflicts.</div>
    </section>
  );
}
