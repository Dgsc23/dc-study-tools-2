/* ============================================== TTS text normalizer ======= */
function speakClean(t) {
  return String(t)
    .replace(/[→➔➜⮕⇒]/g, " to ")
    .replace(/[–—]/g, ", ")
    .replace(/[★☆⚑🔊⚡💡🎯]/g, " ")
    .replace(/\s+/g, " ")
    .trim();
}

/* --------------------------------------------------------------- Cram ----- */
/* Voiced, hands-free walkthrough. Web Speech reads each card aloud and
   auto-advances through all ten topics. */
function Cram() {
  const supported = typeof window !== "undefined" && "speechSynthesis" in window;
  const [voices, setVoices] = useState([]);
  const [voiceURI, setVoiceURI] = useState("");
  const [rate, setRate] = useState(1);
  const [playing, setPlaying] = useState(false);
  const [active, setActive] = useState(-1);

  const playingRef = useRef(false);
  const idxRef = useRef(0);
  const rateRef = useRef(1);
  const voiceRef = useRef(null);

  const lines = useMemo(() => {
    const L = [];
    cram.forEach((c, ci) => {
      L.push({ ci, text: c.title });
      c.facts.forEach((f) => L.push({ ci, text: f }));
      if (c.flag) L.push({ ci, text: "Maini's flag. " + c.flag });
    });
    return L;
  }, []);
  const linesRef = useRef(lines);
  useEffect(() => { linesRef.current = lines; }, [lines]);

  useEffect(() => {
    if (!supported) return;
    const load = () => {
      const vs = window.speechSynthesis.getVoices();
      setVoices(vs);
      if (vs.length && !voiceRef.current) {
        const pick =
          vs.find((v) => /ava/i.test(v.name)) ||
          vs.find((v) => /emma/i.test(v.name)) ||
          vs.find((v) => /andrew/i.test(v.name)) ||
          vs.find((v) => /natural/i.test(v.name) && /^en/i.test(v.lang)) ||
          vs.find((v) => /^en/i.test(v.lang)) ||
          vs[0];
        if (pick) { voiceRef.current = pick; setVoiceURI(pick.voiceURI); }
      }
    };
    load();
    window.speechSynthesis.onvoiceschanged = load;
    return () => {
      try { window.speechSynthesis.onvoiceschanged = null; window.speechSynthesis.cancel(); } catch (e) {}
    };
  }, [supported]);

  const scrollTo = (ci) => {
    try {
      const el = document.getElementById("cram-card-" + cram[ci].n);
      if (el && el.scrollIntoView) el.scrollIntoView({ behavior: "smooth", block: "center" });
    } catch (e) {}
  };

  const speakFrom = (i) => {
    if (!supported) return;
    const L = linesRef.current;
    if (i >= L.length) { playingRef.current = false; setPlaying(false); setActive(-1); idxRef.current = 0; return; }
    idxRef.current = i;
    setActive(L[i].ci);
    scrollTo(L[i].ci);
    const u = new SpeechSynthesisUtterance(speakClean(L[i].text));
    if (voiceRef.current) u.voice = voiceRef.current;
    u.rate = rateRef.current;
    u.onend = () => { if (playingRef.current) speakFrom(idxRef.current + 1); };
    try { window.speechSynthesis.speak(u); } catch (e) {}
  };

  const play = () => {
    if (!supported) return;
    playingRef.current = true; setPlaying(true);
    try { window.speechSynthesis.cancel(); } catch (e) {}
    speakFrom(idxRef.current || 0);
  };
  const pause = () => {
    playingRef.current = false; setPlaying(false);
    try { window.speechSynthesis.cancel(); } catch (e) {}
  };
  const stop = () => {
    playingRef.current = false; setPlaying(false); idxRef.current = 0; setActive(-1);
    try { window.speechSynthesis.cancel(); } catch (e) {}
  };
  const jump = (dir) => {
    const L = linesRef.current;
    const cur = (L[idxRef.current] && L[idxRef.current].ci) || 0;
    let target = Math.max(0, Math.min(cram.length - 1, cur + dir));
    const first = L.findIndex((x) => x.ci === target);
    idxRef.current = first >= 0 ? first : 0;
    if (playingRef.current) { try { window.speechSynthesis.cancel(); } catch (e) {} speakFrom(idxRef.current); }
    else { setActive(target); scrollTo(target); }
  };
  const onRate = (v) => {
    setRate(v); rateRef.current = v;
    if (playingRef.current) { try { window.speechSynthesis.cancel(); } catch (e) {} speakFrom(idxRef.current); }
  };
  const onVoice = (uri) => {
    setVoiceURI(uri);
    voiceRef.current = voices.find((x) => x.voiceURI === uri) || null;
    if (playingRef.current) { try { window.speechSynthesis.cancel(); } catch (e) {} speakFrom(idxRef.current); }
  };

  const status = playing
    ? `▶ Reading ${active + 1} / ${cram.length}: ${cram[active] ? cram[active].title : ""}`
    : active >= 0
      ? `⏸ Paused at ${active + 1} / ${cram.length}`
      : `Ready — press Play to hear all ${cram.length} topics, hands-free`;

  return (
    <section className="section">
      <div className="banner">
        <div className="bt">⚡ Cram — Maini&apos;s cranial-meninges must-knows, in her order</div>
        <p>Layers &amp; spaces → brain surface → pia → arachnoid &amp; cisterns → CSF &amp; choroid plexus → arachnoid granulations → dura → the four septa → venous sinuses → bleeds. The ⚑ flags are the high-yield hooks. Press Play for a hands-free read-through.</p>
      </div>

      <div className="player">
        <div className="player-row">
          <button className="pbtn main" onClick={playing ? pause : play} disabled={!supported}>{playing ? "⏸ Pause" : "▶ Play"}</button>
          <button className="pbtn" onClick={stop} disabled={!supported}>⏹ Stop</button>
          <button className="pbtn" onClick={() => jump(-1)} disabled={!supported}>⏮ Prev</button>
          <button className="pbtn" onClick={() => jump(1)} disabled={!supported}>⏭ Next</button>
          <span className="pstatus">{status}</span>
        </div>
        {supported && (
          <div className="pset">
            <label>Speed
              <input type="range" min="0.5" max="3" step="0.25" value={rate} onChange={(e) => onRate(parseFloat(e.target.value))} />
              <b>{rate.toFixed(2)}x</b>
            </label>
            <label>Voice
              <select value={voiceURI} onChange={(e) => onVoice(e.target.value)}>
                {voices.length === 0 && <option value="">(loading voices…)</option>}
                {voices.map((v) => <option key={v.voiceURI} value={v.voiceURI}>{v.name} ({v.lang})</option>)}
              </select>
            </label>
          </div>
        )}
        {!supported && <div className="pnote">Read-aloud needs a browser with speech support (Chrome or Edge). The cards below still work as a written cram.</div>}
      </div>

      {cram.map((c) => (
        <div className={`obj${active === c.n - 1 ? " reading" : ""}`} id={"cram-card-" + c.n} key={c.n}>
          <div className="obj-head">
            <span className="obj-num serif">{c.n}</span>
            <span className="obj-title">{c.title}</span>
            <span className="src">{c.src}</span>
          </div>
          <ul className="obj-facts">{c.facts.map((f, j) => <li key={j}>{f}</li>)}</ul>
          {c.flag && <div className="objflag">{c.flag}</div>}
        </div>
      ))}
    </section>
  );
}

/* --------------------------------------------------------------- Drill ---- */
function Drill({ bank }) {
  const [idx, setIdx] = useState(0);
  const [answers, setAnswers] = useState({});
  const [hintLevel, setHintLevel] = useState({});
  const [mode, setMode] = useState("study");

  const safeIdx = Math.min(idx, Math.max(0, bank.length - 1));
  const q = bank[safeIdx];

  const score = useMemo(
    () => Object.entries(answers).reduce((n, [id, v]) => {
      const qq = bank.find((x) => x.id === Number(id));
      return n + (qq && v === qq.a ? 1 : 0);
    }, 0),
    [answers, bank]
  );

  if (!bank.length) return <section className="section"><div className="banner"><div className="bt">Drill</div></div></section>;

  const keyMode = mode === "key";
  const sel = answers[q.id];
  const answered = sel !== undefined;
  const hl = hintLevel[q.id] || 0;
  const done = Object.keys(answers).length;

  const select = (i) => {
    if (keyMode) return;
    if (answers[q.id] !== undefined) return;
    setAnswers((p) => ({ ...p, [q.id]: i }));
  };
  const bumpHint = () => setHintLevel((p) => ({ ...p, [q.id]: Math.min((p[q.id] || 0) + 1, 2) }));
  const optClass = (i) => {
    if (keyMode) return i === q.a ? "opt opt-correct" : "opt opt-locked";
    if (!answered) return "opt";
    if (i === q.a) return "opt opt-correct";
    if (i === sel) return "opt opt-wrong";
    return "opt opt-locked";
  };

  return (
    <section className="section">
      <div className="banner">
        <div className="bt">🎯 Drill — {bank.length} questions across the cranial meninges</div>
        <p>Four options, two progressive hints, an explanation, and a source per question. Tap to self-test, or flip to the Answer Key to review. Every item is grounded in the module&apos;s audited bank.</p>
      </div>

      <div className="drillbar">
        <div className="progress">Question <b>{safeIdx + 1}</b> / {bank.length}{!keyMode && <> · answered <b>{done}</b></>}</div>
        <div className="modetog">
          <button className={mode === "study" ? "on" : ""} onClick={() => setMode("study")}>Study (tap)</button>
          <button className={mode === "key" ? "on" : ""} onClick={() => setMode("key")}>Answer key</button>
        </div>
        {!keyMode && <div className="scorepill">Score {score}/{done || 0}</div>}
      </div>

      <div className="navgrid">
        {bank.map((qq, i) => {
          let cls = "";
          if (keyMode) cls = "ok";
          else { const a = answers[qq.id]; cls = a === undefined ? "" : a === qq.a ? "ok" : "no"; }
          return <button key={qq.id} className={`navbtn ${cls} ${i === safeIdx ? "cur" : ""}`} onClick={() => setIdx(i)}>{i + 1}</button>;
        })}
      </div>

      <div className="qcard">
        <div className="badges"><span className="qtopic">{q.topic}</span><span className="qsrc">{q.src}</span></div>
        <div className="qtext">{q.q}</div>

        {q.opts.map((o, i) => (
          <button key={i} className={optClass(i)} onClick={() => select(i)}>
            <span className="key">{String.fromCharCode(65 + i)}</span><span>{o}</span>
          </button>
        ))}

        {!keyMode && !answered && (
          <>
            <div className="hintrow">
              <button className="ghost" onClick={bumpHint} disabled={hl >= 2}>{hl === 0 ? "Need a hint?" : "Bigger hint"}</button>
            </div>
            {hl >= 1 && <div className="hintbox">💡 {q.h1}</div>}
            {hl >= 2 && <div className="hintbox">🔎 {q.h2}</div>}
          </>
        )}

        {keyMode && <div className="exp keyed"><div className="tag">✦ Answer · {q.src}</div><p>{q.exp}</p></div>}
        {!keyMode && answered && (
          <div className={`exp ${sel === q.a ? "correct" : "incorrect"}`}>
            <div className="tag">{sel === q.a ? "✓ Correct" : "✗ Not quite"} · {q.src}</div>
            <p>{q.exp}</p>
          </div>
        )}

        <div className="navfoot">
          <button className="btn btn-ghost" onClick={() => setIdx(Math.max(0, safeIdx - 1))} disabled={safeIdx === 0}>← Prev</button>
          <button className="btn btn-primary" onClick={() => setIdx(Math.min(bank.length - 1, safeIdx + 1))} disabled={safeIdx >= bank.length - 1}>Next →</button>
        </div>
      </div>
    </section>
  );
}

/* --------------------------------------------------------------- Coach ---- */
const COACH_SYSTEM = `You are Dr. Seema Maini, teaching GA 0202 (Gross Anatomy) Head & Neck, running a review of the CRANIAL MENINGES and brain coverings. Teach ONLY from this content; do not invent structures, spaces, attachments, cell types, or numbers. Warm and lively; you call students "guys," say "right?", "okay," "alright," and "make sense?", you ask lots of quick rhetorical questions, you translate Latin roots, and you push students to reason clinically. Keep answers tight (3-6 sentences) and quiz the student back.

THREE LAYERS (outside in): DURA (tough = 'tough mother'), ARACHNOID (spider, web-like threads), PIA (tender/soft = 'soft mother'). They continue as the spinal meninges but the spaces differ. CRANIAL RULE: the cranial dura is adherent to the periosteum outside and the arachnoid inside, so there is NO natural epidural space and NO natural subdural space in the head; the only true CSF space is the subarachnoid space (between arachnoid and pia). A dura-off-bone separation on an image is abnormal (a hematoma or pus).

BRAIN SURFACE: gyri = ridges, sulci = grooves (a deep groove = fissure). Convolutions let the cortex hold ~10,000x more neurons; loss of convolutions is linked to dementia. Gray matter = outer cortex (cell bodies); white matter = mostly myelinated fibers (anything white in the CNS has myelin).

PIA: thin, highly vascular, loose connective tissue; the 'onion peel' that follows every sulcus and carries small blood vessels in (peel it off a cadaver with sharp forceps). Cerebral VEINS run on the pia in the subarachnoid space, so a subarachnoid hemorrhage is usually VENOUS. The pia (with vessels) forms the tela choroidea and a filtration membrane, helping PRODUCE CSF.

ARACHNOID & CISTERNS: delicate, transparent, web-like; PASSES OVER the sulci ('sheet thrown over a chair') rather than dipping in. The subarachnoid space (arachnoid to pia) holds CSF and widens into CISTERNS where the arachnoid drapes over dips. Largest cistern = cerebellomedullary cistern (cisterna magna), between cerebellum and medulla; others: chiasmatic, interpeduncular, pontine, superior. A subarachnoid bleed can spread through all the cisterns.

CSF & CHOROID PLEXUS: CSF is in the ventricles and, thinly, in the subarachnoid space. Functions: buoyancy (brain floats so it doesn't bruise, especially the base) + nutrition/balanced environment. Neurons are NON-MITOTIC (not replaced), hence heavily protected. Choroid plexus = cauliflower-like villi in the ROOF of each ventricle; lined by EPENDYMAL cells (one of four glial types with astrocytes, oligodendrocytes, microglia) that SECRETE CSF. CSF is made by FILTRATION from blood; ependymal cells + pia keep its composition right.

ARACHNOID GRANULATIONS: tufted prolongations of pia-arachnoid that push THROUGH the meningeal dura; they ABSORB CSF and act as ONE-WAY VALVES (a frequent BOARD question) returning CSF to the venous blood at the SUPERIOR SAGITTAL SINUS. Secretion must equal absorption or intracranial pressure rises (ischemia, infection, stroke). Debris/blood can block them. Their impressions are seen in the calvaria beside the superior sagittal sinus (with the middle meningeal vessels).

DURA: outermost, toughest, DENSE connective tissue, rich in PAIN receptors (stretch = intense headache). Cranial dura = TWO layers (periosteal against bone + meningeal); spinal dura = meningeal only. The meningeal layer forms the septa and the two layers split to hold the venous sinuses.

FOUR DURAL SEPTA: (1) FALX CEREBRI (falx = sickle) in the longitudinal fissure between the cerebral hemispheres; attaches anteriorly to the frontal crest & crista galli, posteriorly to the internal occipital crest/protuberance. (2) TENTORIUM CEREBELLI (tentorium = tent) separating the occipital lobe from the cerebellum; attaches to posterior clinoid processes, superior petrous temporal bone, and the grooves for the transverse sinuses. (3) FALX CEREBELLI, a shallow fold between the cerebellar hemispheres. (4) DIAPHRAGMA SELLAE, roofing the sella turcica (which holds the pituitary), with a central aperture for the pituitary stalk; a pituitary adenoma stretches it, causing intense headache.

DURAL VENOUS SINUSES: 'sinus' means a SPACE; a venous blood-filled space where the two dura layers separate. The superior sagittal sinus runs midline on top, front to back, and receives CSF. Sinuses have NEGATIVE pressure (venous pressure ~0 at heart, ~+95 mmHg at the feet, below zero above the heart = why the external jugular vein is collapsed). A nick sucks air in = AIR EMBOLISM to the heart/arteries (stroke, MI, infarction) that can kill on the table.

BLEEDS: cranially epidural & subdural = potential only (appear with bleeding); subarachnoid = true CSF space. Dura-off-bone = epidural/extradural collection; dura-off-arachnoid = subdural. ARTERIAL bleed is worse (high pressure, fast compression); VENOUS collects slowly (days to weeks). Subarachnoid hemorrhage is usually venous (veins on the pia). In the SPINE there IS a real epidural space filled with fat, nerves, and veins.

Open by offering to drill the three layers and their spaces, the CSF loop (made vs absorbed), the four dural septa, why there's no epidural space in the head, the venous sinuses and air embolism, or arterial vs venous bleeds. When the student is wrong, name the rule and have them reason it out step by step.`;

function Coach() {
  const [log, setLog] = useState([
    { role: "assistant", content: "Okay guys, cranial meninges. Two things I really want you to nail: the CRANIAL RULE, that there is no natural epidural or subdural space in the head because the dura is stuck to bone and to the arachnoid, so any separation on an image means blood or pus, right? And the CSF loop, made by the choroid plexus (ependymal cells) and absorbed by the arachnoid granulations, our one-way valves, into the superior sagittal sinus. Where do you want to start? The three layers and their spaces, the CSF loop, the four dural septa, the venous sinuses and air embolism, or arterial vs venous bleeds?" },
  ]);
  const [input, setInput] = useState("");
  const [busy, setBusy] = useState(false);
  const [err, setErr] = useState("");
  const logRef = useRef(null);

  useEffect(() => { if (logRef.current) logRef.current.scrollTop = logRef.current.scrollHeight; }, [log, busy]);

  const send = async (text) => {
    const msg = (text ?? input).trim();
    if (!msg || busy) return;
    setErr("");
    const next = [...log, { role: "user", content: msg }];
    setLog(next);
    setInput("");
    setBusy(true);
    try {
      const res = await fetch("https://fab-ai.dgync1.workers.dev/", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          model: "claude-sonnet-4-20250514",
          max_tokens: 1000,
          system: COACH_SYSTEM,
          messages: next.map((m) => ({ role: m.role, content: m.content })),
        }),
      });
      const data = await res.json();
      const reply = (data.reply || (data.content || []).filter((b) => b.type === "text").map((b) => b.text).join("\n") || "").trim();
      setLog((p) => [...p, { role: "assistant", content: reply || "Say that again for me?" }]);
    } catch (e) {
      setErr("Could not reach the tutor. If you're running this outside the wrapped app, the API call needs a valid endpoint/key.");
      setLog((p) => p.slice(0, -1).concat({ role: "user", content: msg }));
    } finally {
      setBusy(false);
    }
  };

  const prompts = [
    "Drill me on the three layers and their spaces",
    "Quiz the CSF loop — made where, absorbed where?",
    "The four dural septa and what each separates",
    "Why is there no epidural space in the head?",
    "Venous sinuses, negative pressure, and air embolism",
    "Arterial vs venous bleeds — which is worse and why?",
  ];

  return (
    <section className="section">
      <div className="banner">
        <div className="bt">🧑‍⚕️ AI Coach — Dr. Maini&apos;s voice</div>
        <p>Grounded in her cranial-meninges lecture. It quizzes you and makes you reason step by step instead of guessing.</p>
      </div>

      <div className="coach-pills">
        {prompts.map((p, i) => <button key={i} className="cpill" onClick={() => send(p)}>{p}</button>)}
      </div>

      <div className="chatlog" ref={logRef}>
        {log.map((m, i) => (
          <div key={i} className={`msg ${m.role === "user" ? "user" : "bot"}`}>
            {m.role === "assistant" && <div className="who">Dr. Maini</div>}
            {m.content}
          </div>
        ))}
        {busy && <div className="typing">Dr. Maini is typing…</div>}
      </div>

      <div className="composer">
        <textarea
          value={input}
          placeholder="Ask Dr. Maini… (Enter to send, Shift+Enter for a new line)"
          onChange={(e) => setInput(e.target.value)}
          onKeyDown={(e) => { if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); send(); } }}
        />
        <button className="btn btn-primary" onClick={() => send()} disabled={busy || !input.trim()}>Send</button>
      </div>
      {err && <div className="tinynote" style={{ color: "var(--bad)" }}>{err}</div>}
      <div className="tinynote">Tutor answers are AI-generated in a teaching persona — trust the lecture/slides first if anything ever conflicts.</div>
    </section>
  );
}
