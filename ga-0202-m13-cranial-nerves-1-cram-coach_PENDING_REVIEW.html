function Drill({ bank }) {
  const [idx, setIdx] = useState(0);
  const [answers, setAnswers] = useState({});
  const [hintLevel, setHintLevel] = useState({});
  const [mode, setMode] = useState("study");

  const safeIdx = Math.min(idx, Math.max(0, bank.length - 1));
  const q = bank[safeIdx];

  const score = useMemo(
    () => Object.entries(answers).reduce((n, [id, v]) => {
      const qq = bank.find((x) => x.id === Number(id));
      return n + (qq && v === qq.a ? 1 : 0);
    }, 0),
    [answers, bank]
  );

  if (!bank.length) return <section className="section"><div className="banner"><div className="bt">Drill</div></div></section>;

  const keyMode = mode === "key";
  const sel = answers[q.id];
  const answered = sel !== undefined;
  const hl = hintLevel[q.id] || 0;
  const done = Object.keys(answers).length;

  const select = (i) => {
    if (keyMode) return;
    if (answers[q.id] !== undefined) return;
    setAnswers((p) => ({ ...p, [q.id]: i }));
  };
  const bumpHint = () => setHintLevel((p) => ({ ...p, [q.id]: Math.min((p[q.id] || 0) + 1, 2) }));
  const optClass = (i) => {
    if (keyMode) return i === q.a ? "opt opt-correct" : "opt opt-locked";
    if (!answered) return "opt";
    if (i === q.a) return "opt opt-correct";
    if (i === sel) return "opt opt-wrong";
    return "opt opt-locked";
  };

  return (
    <section className="section">
      <div className="banner">
        <div className="bt">🎯 Drill — {bank.length} questions across Lecture 28</div>
        <p>Four options, two progressive hints, an explanation, and a lecture source per question. Tap to self-test, or flip to the Answer Key to review.</p>
      </div>

      <div className="drillbar">
        <div className="progress">Question <b>{safeIdx + 1}</b> / {bank.length}{!keyMode && <> · answered <b>{done}</b></>}</div>
        <div className="modetog">
          <button className={mode === "study" ? "on" : ""} onClick={() => setMode("study")}>Study (tap)</button>
          <button className={mode === "key" ? "on" : ""} onClick={() => setMode("key")}>Answer key</button>
        </div>
        {!keyMode && <div className="scorepill">Score {score}/{done || 0}</div>}
      </div>

      <div className="navgrid">
        {bank.map((qq, i) => {
          let cls = "";
          if (keyMode) cls = "ok";
          else { const a = answers[qq.id]; cls = a === undefined ? "" : a === qq.a ? "ok" : "no"; }
          return <button key={qq.id} className={`navbtn ${cls} ${i === safeIdx ? "cur" : ""}`} onClick={() => setIdx(i)}>{i + 1}</button>;
        })}
      </div>

      <div className="qcard">
        <div className="badges"><span className="qtopic">{q.topic}</span><span className="qsrc">{q.src}</span></div>
        <div className="qtext">{q.q}</div>

        {q.opts.map((o, i) => (
          <button key={i} className={optClass(i)} onClick={() => select(i)}>
            <span className="key">{String.fromCharCode(65 + i)}</span><span>{o}</span>
          </button>
        ))}

        {!keyMode && !answered && (
          <>
            <div className="hintrow">
              <button className="ghost" onClick={bumpHint} disabled={hl >= 2}>{hl === 0 ? "Need a hint?" : "Bigger hint"}</button>
            </div>
            {hl >= 1 && <div className="hintbox">💡 {q.h1}</div>}
            {hl >= 2 && <div className="hintbox">🔎 {q.h2}</div>}
          </>
        )}

        {keyMode && <div className="exp keyed"><div className="tag">✦ Answer · {q.src}</div><p>{q.exp}</p></div>}
        {!keyMode && answered && (
          <div className={`exp ${sel === q.a ? "correct" : "incorrect"}`}>
            <div className="tag">{sel === q.a ? "✓ Correct" : "✗ Not quite"} · {q.src}</div>
            <p>{q.exp}</p>
          </div>
        )}

        <div className="navfoot">
          <button className="btn btn-ghost" onClick={() => setIdx(Math.max(0, safeIdx - 1))} disabled={safeIdx === 0}>← Prev</button>
          <button className="btn btn-primary" onClick={() => setIdx(Math.min(bank.length - 1, safeIdx + 1))} disabled={safeIdx >= bank.length - 1}>Next →</button>
        </div>
      </div>
    </section>
  );
}

/* --------------------------------------------------------------- Coach ---- */
const COACH_SYSTEM = `You are Dr. Seema Maini, teaching GA 0202 (Gross Anatomy), running a review of Lecture 28 - the pharynx and its nerves, the prevertebral region, the cervical sympathetic trunk, the deep cervical fascia, and cranial nerves I, II, and III. Teach ONLY from this content; do not invent nerves, foramina, attachments, fibre types, or lesion patterns. You are warm, encouraging, and you quiz constantly; you say "right?", "okay?", "make sense?", and "are we clear, everybody?", you call the material "easy" to build confidence, and you remind students that peripheral-nervous-system questions "are just there to scare you." Keep answers tight (3-6 sentences) and push students to reason, then quiz them back.

PHARYNX & ITS NERVES: three parts - nasopharynx, oropharynx, laryngopharynx. Piriform fossa (laryngopharynx): the internal laryngeal nerve (a branch of the vagus via the superior laryngeal nerve; sensory above the vocal cords) runs just under the mucosa, so a sharp swallowed foreign body can injure it. Waldeyer's ring = 1 pharyngeal (adenoids) + 2 tubal + 2 palatine + 1 lingual tonsil; tonsils are secondary lymphatic tissue (primary = bone marrow and thymus). Pharyngeal plexus = CN IX + X. All pharyngeal muscles are vagus-supplied EXCEPT stylopharyngeus (3rd arch, CN IX). The vagus's motor (SVE) fibres to pharyngeal/palatine/laryngeal muscles are really the CRANIAL part of the accessory nerve (XI), which joins the vagus; only the SPINAL fibres of XI leave as the 11th nerve to trapezius and SCM. Sensory map: nasopharynx = maxillary (V2), oropharynx = glossopharyngeal (IX), laryngeal inlet = internal laryngeal (vagus). Cricopharyngeus (part of the inferior constrictor) = upper esophageal sphincter. Swallowing = 3 stages (only the ORAL stage voluntary); deglutition centre in pons and medulla; motor nerves = V, IX, X, XII.

PREVERTEBRAL MUSCLES (4 - know origin/insertion/action/nerve): longus capitis (basilar occiput to anterior tubercles of TP C3-C6; ventral rami C1-C3; flexes head), longus colli (three parts - superior oblique: TP C3-C5 to anterior tubercle of atlas; vertical: bodies C5-T3 to bodies C2-C4; inferior oblique: bodies T1-T3 to TP C5-C7; ventral rami C2-C6; flexes neck, oblique parts add ipsilateral lateral flexion, inferior oblique rotates neck to the opposite side), rectus capitis anterior (basilar occiput anterior to the condyle, from the atlas lateral mass; flexes head), rectus capitis lateralis (JUGULAR process, from the atlas transverse process; lateral flexion). Both recti: ventral rami C1-C2. Memory: anterior = basilar, lateralis = jugular.

CERVICAL SYMPATHETIC TRUNK: upward continuation of the thoracic trunk, from the neck of the first rib to the base of the skull, lying BEHIND the common and internal carotid arteries (an aneurysm can compress it), embedded between the carotid sheath and prevertebral fascia. Postganglionic cell bodies; preganglionics ascend from the lateral horn of T1-T2 (no cervical lateral horn). Three ganglia: superior (longest, opposite C2-C3, behind the internal carotid, anterior to longus capitis; gray rami C1-C4; ~99% of head-and-neck sympathetic supply; internal carotid nerve to the ICA plexus), middle (opposite C6, on the inferior thyroid artery; gray rami C5-C6), inferior (between C7 TP and the first rib; usually fused with T1 as the STELLATE ganglion; gray rami C7-C8; branches to subclavian and vertebral arteries). Gray rami put sympathetic fibres on EVERY spinal nerve to reach three body-wall targets - sweat glands, arrector pili muscles, and blood vessels; parasympathetic is reserved for internal organs. Cardiac branches run from the neck to the heart, and GVA pain fibres follow them back, so cardiac pain refers to the neck and side of the head.

DEEP CERVICAL FASCIA (4 layers): investing (splits around SCM anteriorly and trapezius posteriorly; roof of the anterior and posterior triangles; attaches to ligamentum nuchae; thickens between styloid process and mandibular angle as the stylomandibular ligament), pretracheal (thyroid + infrahyoid muscles; blends inferiorly with the fibrous pericardium), prevertebral (prevertebral muscles; blends inferiorly with the anterior longitudinal ligament), and the carotid sheath (common/internal carotid, internal jugular vein, vagus nerve).

CN I OLFACTORY: SVA (smell); no single nerve - multiple fascicles. Receptors = ciliated chemoreceptor olfactory neurons in the olfactory epithelium near the roof of the nose; basal cells = stem cells that replace worn-out receptors. Pathway: through the cribriform plate of the ethmoid to synapse in the olfactory bulb (mitral cells + association neurons); the olfactory tract ends in the primary olfactory cortex of the TEMPORAL lobe. Clinical: anosmia = loss of smell (aging/trauma/COVID) but the neurons regenerate; phantosmia = smelling something not there; olfactory adaptation = continuous stimulation makes receptors stop responding.

CN II OPTIC: SSA (the eye develops from ectoderm, so somatic). Board pearl: the optic nerve is made of GANGLION-cell axons, NOT rods and cones. Cones = colour, central; rods = little light, peripheral, no colour, vitamin-A-derived pigment; dark adaptation ~20 min to resynthesize rod pigment. Signal: rods/cones to bipolar to ganglion (axons = optic nerve). Leaves the orbit through the optic canal (sphenoid). At the chiasma only NASAL retinal fibres cross. Field mapping is flipped by the lens (temporal field to nasal retina). Lesions: one optic nerve = whole eye blind; chiasma = bitemporal hemianopia (commonest cause pituitary adenoma - they often see an ophthalmologist first); one optic tract = contralateral homonymous loss. After the midbrain the pathway continues as the optic radiation to the occipital lobe.

CN III OCULOMOTOR: somatic motor + PREGANGLIONIC PARASYMPATHETIC. Emerges from the anterior midbrain at the interpeduncular fossa; splits into superior and inferior divisions; enters the orbit through the superior orbital fissure. Extraocular: SR, IR, MR, inferior oblique, and levator palpebrae superioris (NOT lateral rectus = CN VI, NOT superior oblique = CN IV). Intraocular (parasympathetic): ciliary muscle and sphincter (constrictor) pupillae. Accommodation reflex (all CN III): convergence by medial rectus, pupil constriction by sphincter, ciliary contracts so the lens becomes more convex. THIRD NERVE PALSY: eye down and out (surviving SO + LR), ptosis (levator lost), mydriasis (sphincter lost), lost accommodation (ciliary lost); no direct light reflex in that eye, but the consensual reflex in the other eye is intact.

HORNER vs CN III (the pupil rule): the PUPIL is the best distinguisher. Horner = miosis (sympathetic failure denervates the dilator pupillae) + mild ptosis (superior tarsal muscle) + anhidrosis and facial flushing + NO squint (sympathetic fibres innervate no extraocular muscle, so they cannot misalign the eye). Third nerve palsy = mydriasis + ptosis + down-and-out squint. The ONE shared sign is ptosis.

Open by offering to drill the pharynx & its nerves, the prevertebral muscles, the cervical sympathetic trunk, the deep cervical fascia, CN I/II/III, or the Horner-vs-third-nerve pupil rule. When a student is wrong, name the rule and have them reason it out; remind them these questions are usually easier than they look.`;

function Coach() {
  const [log, setLog] = useState([
    { role: "assistant", content: "Okay guys, Lecture 28 - the last stretch. Two things I really want you to nail: cranial nerves I, II, and III, and the pupil rule that separates Horner syndrome (miosis, and NO squint, because sympathetic fibres move no eye muscle) from a third nerve palsy (mydriasis, ptosis, a down-and-out eye). We will also review the pharynx and its nerves, the four prevertebral muscles, the three cervical sympathetic ganglia, and the four layers of deep cervical fascia. Where do you want to start - the cranial nerves, the sympathetic trunk, the prevertebral muscles, the fascia, or the pupil rule? Right? Let us go." },
  ]);
  const [input, setInput] = useState("");
  const [busy, setBusy] = useState(false);
  const [err, setErr] = useState("");
  const logRef = useRef(null);

  useEffect(() => { if (logRef.current) logRef.current.scrollTop = logRef.current.scrollHeight; }, [log, busy]);

  const send = async (text) => {
    const msg = (text ?? input).trim();
    if (!msg || busy) return;
    setErr("");
    const next = [...log, { role: "user", content: msg }];
    setLog(next);
    setInput("");
    setBusy(true);
    try {
      const res = await fetch("https://fab-ai.dgync1.workers.dev/", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          model: "claude-sonnet-4-20250514",
          max_tokens: 1000,
          system: COACH_SYSTEM,
          messages: next.map((m) => ({ role: m.role, content: m.content })),
        }),
      });
      const data = await res.json();
      const reply = (data.reply || (data.content || []).filter((b) => b.type === "text").map((b) => b.text).join("\n") || "").trim();
      setLog((p) => [...p, { role: "assistant", content: reply || "Say that again for me?" }]);
    } catch (e) {
      setErr("Could not reach the tutor. If you're running this outside the wrapped app, the API call needs a valid endpoint/key.");
      setLog((p) => p.slice(0, -1).concat({ role: "user", content: msg }));
    } finally {
      setBusy(false);
    }
  };

  const prompts = [
  "Drill me on CN I - the olfactory pathway and its clinical terms",
  "Quiz CN II - photoreceptors, the chiasma, and the lesions",
  "CN III palsy vs Horner syndrome - the pupil rule",
  "The four prevertebral muscles - attachments, nerves, actions",
  "The cervical sympathetic trunk - the three ganglia and gray rami",
  "The four layers of deep cervical fascia and their contents"
];

  return (
    <section className="section">
      <div className="banner">
        <div className="bt">🧑‍⚕️ AI Coach — Dr. Maini&apos;s voice</div>
        <p>Grounded in her Lecture 28 - the pharynx, prevertebral region, sympathetic trunk, fascia, and cranial nerves I-III. It quizzes you and makes you reason step by step instead of guessing.</p>
      </div>

      <div className="coach-pills">
        {prompts.map((p, i) => <button key={i} className="cpill" onClick={() => send(p)}>{p}</button>)}
      </div>

      <div className="chatlog" ref={logRef}>
        {log.map((m, i) => (
          <div key={i} className={`msg ${m.role === "user" ? "user" : "bot"}`}>
            {m.role === "assistant" && <div className="who">Dr. Maini</div>}
            {m.content}
          </div>
        ))}
        {busy && <div className="typing">Dr. Maini is typing…</div>}
      </div>

      <div className="composer">
        <textarea
          value={input}
          placeholder="Ask Dr. Maini… (Enter to send, Shift+Enter for a new line)"
          onChange={(e) => setInput(e.target.value)}
          onKeyDown={(e) => { if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); send(); } }}
        />
        <button className="btn btn-primary" onClick={() => send()} disabled={busy || !input.trim()}>Send</button>
      </div>
      {err && <div className="tinynote" style={{ color: "var(--bad)" }}>{err}</div>}
      <div className="tinynote">Tutor answers are AI-generated in a teaching persona — trust the lecture/slides first if anything ever conflicts.</div>
    </section>
  );
}
