<script>
const BANK=[{"q": "Reviewing the skeleton of the larynx, how many cartilages does Dr. Maini say it contains in total?", "o": ["Nine", "Six", "Twelve", "Three"], "c": 0, "r": ["Correct. Maini opens the lecture asking the class to recall that the larynx has nine cartilages in total — three large unpaired plus three paired.", "Six would count only the paired cartilages (three pairs); it omits the three unpaired ones.", "Twelve over-counts; the total the class must remember is nine.", "Three counts only the large unpaired cartilages (thyroid, cricoid, epiglottis) and ignores the three pairs."], "cat": "Laryngeal Cartilages — Overview", "source": "L26 · Cartilages overview", "obj": "Laryngeal cartilages — total count", "hint": "Three big singles + three little pairs.", "quote": "[Maini] 'How many cartilages are there in the larynx? In total, nine.'"}, {"q": "Which set correctly lists the three LARGE, UNPAIRED cartilages of the larynx?", "o": ["Thyroid, cricoid, epiglottis", "Thyroid, arytenoid, cricoid", "Cricoid, cuneiform, epiglottis", "Arytenoid, corniculate, cuneiform"], "c": 0, "r": ["Correct. Maini names the three large unpaired cartilages as the epiglottis, thyroid, and cricoid.", "The arytenoid is paired; the unpaired trio is thyroid, cricoid, and epiglottis.", "The cuneiform is a small paired cartilage; it does not belong with the large unpaired group.", "Arytenoid, corniculate and cuneiform are the three PAIRED cartilages, not the unpaired set."], "cat": "Laryngeal Cartilages — Overview", "source": "L26 · Cartilages overview", "obj": "Unpaired laryngeal cartilages", "hint": "The three you can nearly feel in the neck.", "quote": "[Maini] 'Three cartilages are very large, unpaired — epiglottis, the thyroid, and the cricoid.'"}, {"q": "Which set correctly lists the three SMALLER, PAIRED cartilages of the larynx?", "o": ["Thyroid, cricoid, epiglottis", "Arytenoid, thyroid, corniculate", "Corniculate, cuneiform, epiglottis", "Arytenoid, corniculate, cuneiform"], "c": 3, "r": ["Thyroid, cricoid and epiglottis are the large UNPAIRED cartilages, not the paired ones.", "The thyroid is unpaired; the paired trio is arytenoid, corniculate, cuneiform.", "The epiglottis is a large unpaired cartilage, so it cannot be in the paired group.", "Correct. The three paired cartilages are the arytenoid (first pair), corniculate (second pair), and cuneiform (third pair)."], "cat": "Laryngeal Cartilages — Overview", "source": "L26 · Cartilages overview", "obj": "Paired laryngeal cartilages", "hint": "Three pairs, all comparatively tiny.", "quote": "[Maini] 'We have three pairs of cartilages, comparatively smaller than the other three.'"}, {"q": "Which cartilage does Dr. Maini call the largest of all the laryngeal cartilages?", "o": ["Thyroid cartilage", "Arytenoid cartilage", "Epiglottis", "Cricoid cartilage"], "c": 0, "r": ["Correct. The thyroid cartilage, formed by two laminae meeting at the laryngeal prominence, is the largest laryngeal cartilage.", "The arytenoid is one of the small paired cartilages.", "The epiglottis is a leaf-shaped elastic cartilage, not the largest.", "The cricoid is the only complete ring but is not the largest cartilage."], "cat": "Laryngeal Cartilages — Overview", "source": "L25 · Thyroid cartilage", "obj": "Largest laryngeal cartilage", "hint": "Two laminae + Adam's apple.", "quote": "[Maini] 'The largest of all the laryngeal cartilages... paired or unpaired? Unpaired.'"}, {"q": "The thyroid and cricoid cartilages are composed of which type of cartilage?", "o": ["Calcified fibrocartilage", "Hyaline cartilage", "Fibrocartilage", "Elastic cartilage"], "c": 1, "r": ["There is no 'calcified fibrocartilage' category Maini assigns here; the thyroid and cricoid are hyaline.", "Correct. Maini classifies both the thyroid and the cricoid as hyaline cartilages.", "Fibrocartilage is found in structures like intervertebral discs, not these laryngeal cartilages.", "Elastic cartilage describes the epiglottis (and the small corniculate/cuneiform), not the thyroid or cricoid."], "cat": "Laryngeal Cartilages — Overview", "source": "L25 · Cartilage histology", "obj": "Cartilage type — thyroid & cricoid", "hint": "Same type as most articular cartilage.", "quote": "[Maini] 'It's a hyaline cartilage, located under the hyoid bone.'"}, {"q": "The epiglottis is composed of which type of cartilage?", "o": ["Hyaline cartilage", "Bone", "Fibrocartilage", "Elastic cartilage"], "c": 3, "r": ["Hyaline cartilage forms the thyroid and cricoid, not the epiglottis.", "The epiglottis is cartilage, not bone.", "Fibrocartilage is not the tissue of the epiglottis.", "Correct. Maini stresses the epiglottis is a leaf-like ELASTIC cartilage — a notable place where elastic cartilage is found in the body."], "cat": "Laryngeal Cartilages — Overview", "source": "L25 · Epiglottis", "obj": "Cartilage type — epiglottis", "hint": "Flexible so it can bend back over the inlet.", "quote": "[Maini] 'This is a leaf-like elastic cartilage. Where else do you find elastic cartilage in your body?'"}, {"q": "The corniculate and cuneiform cartilages are described by Dr. Maini as which type of cartilage?", "o": ["Hyaline cartilage", "Compact bone", "Yellow elastic cartilage", "Fibrocartilage"], "c": 2, "r": ["Hyaline cartilage forms the thyroid and cricoid, not these tiny cartilages.", "They are cartilage nodules, not bone.", "Correct. Maini calls both the corniculate and cuneiform 'yellow elastic cartilages.'", "Fibrocartilage is not the described tissue of the corniculate/cuneiform."], "cat": "Laryngeal Cartilages — Overview", "source": "L25 · Small cartilages", "obj": "Cartilage type — corniculate/cuneiform", "hint": "Same elastic family as the epiglottis.", "quote": "[Maini] 'These are also yellow elastic cartilages, small rod-like bodies.'"}, {"q": "The laryngeal prominence ('Adam's apple') is formed by the midline fusion of the two laminae of which cartilage?", "o": ["Epiglottis", "Thyroid cartilage", "Cricoid cartilage", "Hyoid bone"], "c": 1, "r": ["The epiglottis is a separate leaf-shaped cartilage.", "Correct. The two laminae of the thyroid cartilage meet in the midline at the laryngeal prominence, most prominent in males.", "The cricoid is a complete ring and does not form the laryngeal prominence.", "The hyoid bone lies superior to the thyroid cartilage and is not the laryngeal prominence."], "cat": "Thyroid Cartilage", "source": "L25 · Thyroid cartilage", "obj": "Laryngeal prominence", "hint": "The 'Adam's apple.'", "quote": "[Maini] 'The two laminae are connected in the middle, where you have this laryngeal prominence... Adam's apple in males.'"}, {"q": "How does Dr. Maini describe the posterior aspect of the thyroid cartilage?", "o": ["Fused to the cricoid posteriorly", "Posteriorly deficient / incomplete (open behind)", "A complete closed ring posteriorly", "Formed by a single median lamina"], "c": 1, "r": ["The thyroid articulates with (but is not fused to) the cricoid via the cricothyroid joint.", "Correct. She likens the thyroid to a necklace missing its back segment — it is posteriorly deficient, open behind.", "It is the cricoid, not the thyroid, that forms a complete ring; the thyroid is open posteriorly.", "The thyroid is formed by two laminae (right and left), not a single median lamina."], "cat": "Thyroid Cartilage", "source": "L25 · Thyroid cartilage", "obj": "Thyroid cartilage — posterior shape", "hint": "Like a necklace with no back.", "quote": "[Maini] 'Thyroid cartilage is posteriorly deficient. It's incomplete... like a necklace which doesn't have a posterior limb.'"}, {"q": "The posterior border of each thyroid lamina projects upward and downward as which two structures?", "o": ["Greater horn and lesser horn", "Anterior arch and posterior lamina", "Vocal process and muscular process", "Superior horn (cornu) and inferior horn (cornu)"], "c": 3, "r": ["Greater and lesser horns are features of the HYOID bone.", "Anterior arch and posterior lamina describe the CRICOID cartilage.", "Vocal and muscular processes are features of the ARYTENOID cartilage, not the thyroid.", "Correct. The posterior border extends up into the superior horn and down into the inferior horn of the thyroid cartilage."], "cat": "Thyroid Cartilage", "source": "L25 · Thyroid cartilage", "obj": "Thyroid horns", "hint": "Up = superior, down = inferior.", "quote": "[Maini] 'The posterior border extends upward to form the superior horn... and a downward extension called the inferior horn.'"}, {"q": "The inferior horn of the thyroid cartilage articulates with the cricoid to form which joint?", "o": ["Cricotracheal joint", "Cricothyroid joint", "Cricoarytenoid joint", "Thyrohyoid joint"], "c": 1, "r": ["The cricotracheal ligament connects the cricoid to the trachea; it is not the thyroid's articulation.", "Correct. The inferior horn of the thyroid articulates with the lateral side of the cricoid at the cricothyroid joint.", "The cricoarytenoid joint is between the cricoid lamina and the arytenoid cartilage.", "There is no true synovial 'thyrohyoid joint'; the thyrohyoid membrane connects them instead."], "cat": "Thyroid Cartilage", "source": "L25 · Thyroid cartilage", "obj": "Cricothyroid joint", "hint": "Inferior horn of thyroid + cricoid.", "quote": "[Maini] 'Between the inferior horn of the thyroid cartilage and the lateral side of cricoid... this is the cricothyroid joint.'"}, {"q": "Which strap muscles does Dr. Maini identify as attaching to the oblique line of the thyroid cartilage?", "o": ["Sternothyroid and thyrohyoid", "Mylohyoid and geniohyoid", "Sternohyoid and omohyoid", "Digastric and stylohyoid"], "c": 0, "r": ["Correct. She recalls that the sternothyroid and thyrohyoid attach to the oblique line (along with the inferior constrictor).", "Mylohyoid and geniohyoid are suprahyoid muscles of the floor of the mouth.", "Sternohyoid and omohyoid are infrahyoid straps but attach to the hyoid, not the thyroid oblique line.", "Digastric and stylohyoid are suprahyoid elevators, not oblique-line muscles."], "cat": "Thyroid Cartilage", "source": "L25 · Thyroid cartilage landmarks", "obj": "Oblique line attachments", "hint": "The two straps with 'thyro' in the name.", "quote": "[Maini] 'Muscles attached to the oblique line... sternothyroid and thyrohyoid.'"}, {"q": "The thyroid cartilage is connected to the hyoid bone above it by which structure?", "o": ["Cricothyroid ligament", "Cricotracheal ligament", "Thyroepiglottic ligament", "Thyrohyoid membrane"], "c": 3, "r": ["The cricothyroid ligament connects the cricoid to the thyroid, not the thyroid to the hyoid.", "The cricotracheal ligament connects the cricoid to the trachea.", "The thyroepiglottic ligament connects the thyroid to the epiglottis.", "Correct. The thyrohyoid membrane spans between the thyroid cartilage and the hyoid bone, so movement of one drags the other."], "cat": "Thyroid Cartilage", "source": "L25 · Thyroid attachments", "obj": "Thyrohyoid membrane", "hint": "Thyroid to hyoid.", "quote": "[Maini] 'This thyrohyoid membrane is an attachment between thyroid cartilage and hyoid bone.'"}, {"q": "The thyroid cartilage is attached to the epiglottis by which ligament?", "o": ["Vocal ligament", "Cricothyroid ligament", "Hyoepiglottic ligament", "Thyroepiglottic ligament"], "c": 3, "r": ["The vocal ligament connects the arytenoid's vocal process to the thyroid, not the epiglottis.", "The cricothyroid ligament connects the cricoid to the thyroid.", "The hyoepiglottic ligament connects the epiglottis to the HYOID bone, and is extrinsic.", "Correct. The thyroepiglottic ligament connects the stalk of the epiglottis to the back of the thyroid cartilage (an intrinsic ligament)."], "cat": "Thyroid Cartilage", "source": "L25 · Thyroid/epiglottis attachment", "obj": "Thyroepiglottic ligament", "hint": "Thyro + epiglottic.", "quote": "[Maini] 'There is an attachment between epiglottis and thyroid cartilage... called the thyroepiglottic ligament.'"}, {"q": "The vocal ligament attaches the thyroid cartilage anteriorly to which specific feature of the arytenoid cartilage?", "o": ["The vocal process of the arytenoid", "The apex of the arytenoid", "The base of the arytenoid", "The muscular process of the arytenoid"], "c": 0, "r": ["Correct. The vocal ligament runs from the thyroid to the vocal process of the arytenoid cartilage.", "The apex of the arytenoid carries the corniculate cartilage, not the vocal ligament.", "The base of the arytenoid sits on the cricoid lamina and forms the cricoarytenoid joint.", "The muscular process is where laryngeal MUSCLES attach, not the vocal ligament."], "cat": "Thyroid Cartilage", "source": "L25 · Vocal ligament", "obj": "Vocal ligament attachment", "hint": "Vocal ligament to vocal process.", "quote": "[Maini] 'To the vocal process of the arytenoid by vocal ligament.'"}, {"q": "Why is the laryngeal prominence more conspicuous in males, according to Dr. Maini?", "o": ["Males lack a thyrohyoid membrane", "The male cricoid fuses with the thyroid", "The thyroid laminae project more sharply, making it prominent (the 'Adam's apple')", "Males have an extra thyroid cartilage"], "c": 2, "r": ["The thyrohyoid membrane is present in both sexes.", "The cricoid does not fuse with the thyroid; they form a mobile cricothyroid joint.", "Correct. She notes the laryngeal prominence is very prominent in males, which is why it is called the Adam's apple.", "There is no extra thyroid cartilage in males; the thyroid is a single unpaired cartilage in everyone."], "cat": "Thyroid Cartilage", "source": "L25 · Thyroid cartilage landmarks", "obj": "Adam's apple — sex difference", "hint": "Prominence = 'Adam's apple.'", "quote": "[Maini] 'Laryngeal prominence, or Adam's apple in males, because it's very prominent in males.'"}, {"q": "Dr. Maini repeatedly emphasizes one cartilage as 'a good exam question' because it is the ONLY laryngeal cartilage that does what?", "o": ["Forms the laryngeal prominence", "Bears the vocal processes", "Is made of elastic cartilage", "Completely encircles the larynx/airway as a full ring"], "c": 3, "r": ["The laryngeal prominence is a feature of the thyroid cartilage.", "The vocal processes belong to the arytenoid cartilages.", "The cricoid is hyaline cartilage, not elastic — and elastic-vs-hyaline is not the point being tested here.", "Correct. The cricoid is the only cartilage that forms a complete ring encircling the airway — Maini flags this as a favorite test item."], "cat": "Cricoid Cartilage", "source": "L25 · Cricoid cartilage", "obj": "Cricoid — complete ring", "hint": "The only complete ring.", "quote": "[Maini] 'This is the only cartilage which completely encircles the larynx... which makes a good question.'"}, {"q": "What everyday object does Dr. Maini use to describe the shape of the cricoid cartilage?", "o": ["A shield or scutum", "A signet ring (narrow in front, broad behind)", "A leaf or spoon", "A three-sided pyramid"], "c": 1, "r": ["A shield describes the thyroid ('thyreos' = shield), not the cricoid.", "Correct. The cricoid is shaped like a signet ring — a narrow anterior arch and a broad posterior lamina.", "A leaf or spoon describes the epiglottis.", "A three-sided pyramid describes the arytenoid cartilage."], "cat": "Cricoid Cartilage", "source": "L25 · Cricoid cartilage", "obj": "Cricoid shape", "hint": "Signet ring: the broad part is at the BACK.", "quote": "[Maini] 'Shaped like a signet ring... narrow anteriorly, broader posteriorly.'"}, {"q": "In the cricoid cartilage, which part is narrow and which is broad?", "o": ["Narrow anterior arch; broad posterior lamina", "Both arch and lamina equally broad", "Broad anterior arch; narrow posterior lamina", "Narrow superior horn; broad inferior horn"], "c": 0, "r": ["Correct. The cricoid's anterior arch is thin/narrow while its posterior (quadrangular) lamina is broad.", "The two parts are markedly unequal; the posterior lamina is distinctly broader.", "This reverses the anatomy — the posterior lamina, not the anterior arch, is the broad part.", "Horns are features of the thyroid cartilage, not the cricoid."], "cat": "Cricoid Cartilage", "source": "L25 · Cricoid cartilage", "obj": "Cricoid arch vs lamina", "hint": "Signet ring: the 'jewel' (lamina) is at the back.", "quote": "[Maini] 'Anterior lamina is thin, posterior lamina is broad... consists of an anterior arch and a posterior quadrangular lamina.'"}, {"q": "The cricoid cartilage articulates with the thyroid at the cricothyroid joint and with which other cartilage at the cricoarytenoid joint?", "o": ["The epiglottis", "The corniculate cartilage", "The arytenoid cartilage", "The cuneiform cartilage"], "c": 2, "r": ["The epiglottis attaches via ligaments/membrane, not a cricoarytenoid joint.", "The corniculate sits on the apex of the arytenoid and does not form the cricoarytenoid joint.", "Correct. The cricoid lamina forms the cricoarytenoid joint with the arytenoid cartilage (and the cricothyroid joint with the thyroid).", "The cuneiform lies within the aryepiglottic fold and forms no joint with the cricoid."], "cat": "Cricoid Cartilage", "source": "L25 · Cricoid articulations", "obj": "Cricoarytenoid joint", "hint": "Crico + arytenoid.", "quote": "[Maini] 'Articulation with the thyroid through cricothyroid, and with arytenoid, that is cricoarytenoid.'"}, {"q": "The cricoid cartilage is joined to the trachea below it by which ligament?", "o": ["Thyrohyoid membrane", "Cricothyroid ligament", "Vocal ligament", "Cricotracheal ligament"], "c": 3, "r": ["The thyrohyoid membrane connects the thyroid to the hyoid bone.", "The cricothyroid ligament connects the cricoid to the thyroid and is intrinsic.", "The vocal ligament connects the arytenoid to the thyroid.", "Correct. The cricotracheal ligament connects the cricoid to the trachea; because the trachea is outside the larynx, this ligament is extrinsic."], "cat": "Cricoid Cartilage", "source": "L25 · Cricoid attachments", "obj": "Cricotracheal ligament", "hint": "Cricoid to trachea.", "quote": "[Maini] 'To the trachea by cricotracheal ligament... cricotracheal is extrinsic.'"}, {"q": "Because the inferior border of the cricoid is the lowermost limit of the larynx, what lies immediately below it?", "o": ["The epiglottis", "The thyroid gland isthmus", "The trachea", "The oropharynx"], "c": 2, "r": ["The epiglottis is the superior-most laryngeal cartilage, not what lies below the cricoid.", "The thyroid gland is an anterior neck gland, not the structure continuous below the cricoid lumen.", "Correct. Maini says the larynx ends at the inferior border of the cricoid; beyond that point is the trachea.", "The oropharynx lies above and behind the larynx, not below the cricoid."], "cat": "Cricoid Cartilage", "source": "L26 · Cavity/limits", "obj": "Inferior limit of larynx", "hint": "Below the last ring comes the windpipe.", "quote": "[Maini] 'This is the inferior border of cricoid. This is where your larynx ends... beyond this we have trachea.'"}, {"q": "What cartilage type is the cricoid, according to Dr. Maini?", "o": ["Yellow elastic cartilage", "Bone", "Hyaline cartilage", "Fibrocartilage"], "c": 2, "r": ["Yellow elastic cartilage describes the corniculate and cuneiform (and the epiglottis is elastic), not the cricoid.", "The cricoid is cartilage, not bone.", "Correct. The cricoid is a hyaline cartilage shaped like a signet ring.", "Fibrocartilage is not the cricoid's tissue."], "cat": "Cricoid Cartilage", "source": "L25 · Cricoid cartilage", "obj": "Cricoid cartilage type", "hint": "Same type as the thyroid.", "quote": "[Maini] 'It's also hyaline cartilage, shaped like a signet ring.'"}, {"q": "What geometric shape does Dr. Maini use for the arytenoid cartilage?", "o": ["A three-sided pyramid", "A flat quadrangular sheet", "A signet ring", "A leaf/spoon"], "c": 0, "r": ["Correct. She corrects herself to describe the arytenoid as a three-sided (pyramidal) cartilage with a base, apex, and two processes.", "A quadrangular sheet describes the quadrangular MEMBRANE, not the arytenoid cartilage.", "A signet ring is the cricoid.", "A leaf or spoon is the epiglottis."], "cat": "Arytenoid & Small Cartilages", "source": "L25 · Arytenoid cartilage", "obj": "Arytenoid shape", "hint": "Pyramid with base, apex, two processes.", "quote": "[Maini] 'They are pyramidal-shaped... a three-sided pyramid.'"}, {"q": "The arytenoid cartilages sit on the lateral part of the superior border of which cartilage?", "o": ["The lamina of the thyroid cartilage", "The stalk of the epiglottis", "The body of the hyoid bone", "The lamina of the cricoid cartilage"], "c": 3, "r": ["The arytenoids sit on the cricoid, not on the thyroid lamina.", "The epiglottis is anterior; the arytenoids do not perch on its stalk.", "The hyoid bone lies well above and is unrelated to the arytenoid seat.", "Correct. The paired arytenoids rest on the lateral aspect of the superior border of the cricoid lamina, in the posterior larynx."], "cat": "Arytenoid & Small Cartilages", "source": "L25 · Arytenoid cartilage", "obj": "Arytenoid location", "hint": "They perch on the broad back of the signet ring.", "quote": "[Maini] 'Arytenoids are a pair of cartilages located on the lateral side of the superior border of cricoid lamina.'"}, {"q": "The arytenoid cartilage has a base, an apex, and which two named processes?", "o": ["An anterior arch and a posterior lamina", "A greater cornu and a lesser cornu", "A superior horn and an inferior horn", "A vocal process and a muscular process"], "c": 3, "r": ["Anterior arch and posterior lamina are parts of the CRICOID.", "Greater and lesser cornua are features of the HYOID bone.", "Superior and inferior horns are features of the THYROID cartilage.", "Correct. Each arytenoid bears a vocal process (for the vocal ligament) and a muscular process (for muscle attachment)."], "cat": "Arytenoid & Small Cartilages", "source": "L25 · Arytenoid cartilage", "obj": "Arytenoid processes", "hint": "One for the cord, one for the muscle.", "quote": "[Maini] 'There is a vocal process, and there is a muscular process.'"}, {"q": "The VOCAL PROCESS of the arytenoid cartilage provides attachment for what?", "o": ["The intrinsic laryngeal muscles", "The thyrohyoid membrane", "The vocal ligament / vocal cord", "The corniculate cartilage"], "c": 2, "r": ["Muscles attach to the MUSCULAR process, not the vocal process.", "The thyrohyoid membrane spans thyroid to hyoid and has no attachment to the vocal process.", "Correct. The vocal ligament attaches to the vocal process — hence its name.", "The corniculate cartilage sits on the APEX of the arytenoid, not on its vocal process."], "cat": "Arytenoid & Small Cartilages", "source": "L25 · Arytenoid processes", "obj": "Vocal process function", "hint": "The name gives it away.", "quote": "[Maini] 'This process, to which vocal cords are attached, is called the vocal process.'"}, {"q": "The MUSCULAR PROCESS of the arytenoid cartilage is specialized for what?", "o": ["Articulation with the epiglottis", "Attachment of the vocal ligament", "Attachment of intrinsic laryngeal muscles", "Anchoring the thyrohyoid membrane"], "c": 2, "r": ["The arytenoid connects to the epiglottis via the quadrangular membrane, not an articulation at the muscular process.", "The vocal ligament attaches to the VOCAL process, not the muscular process.", "Correct. The muscular process is the site of attachment for laryngeal muscles (e.g., posterior and lateral cricoarytenoid).", "The thyrohyoid membrane connects thyroid and hyoid, unrelated to this process."], "cat": "Arytenoid & Small Cartilages", "source": "L25 · Arytenoid processes", "obj": "Muscular process function", "hint": "Muscles grab the muscular process.", "quote": "[Maini] 'And then there is a muscular process, for the attachment of muscles.'"}, {"q": "The corniculate cartilages are best described by Dr. Maini as what?", "o": ["Sesamoid bones within the vocalis muscle", "Wedge-shaped cartilages forming the vocal ligament", "Small conical nodules sitting on the apices of the arytenoids that prolong them backward and medially", "The largest paired cartilages, forming the cricoarytenoid joint"], "c": 2, "r": ["They are cartilage nodules, not sesamoid bones, and are not within the vocalis.", "They do not form the vocal ligament; the vocal ligament runs from the arytenoid vocal process to the thyroid.", "Correct. The corniculate cartilages are tiny conical elastic nodules on the arytenoid apices, functionally just extensions of the arytenoids.", "They are the smallest, not the largest, paired cartilages, and they do not form the cricoarytenoid joint."], "cat": "Arytenoid & Small Cartilages", "source": "L25 · Corniculate cartilages", "obj": "Corniculate cartilages", "hint": "Little caps on the arytenoid tips.", "quote": "[Maini] 'They lie on the apices of arytenoid cartilages and serve to prolong them backward and medially.'"}, {"q": "Within which mucosal fold are the cuneiform cartilages located?", "o": ["The vocal (true) fold", "The glossoepiglottic fold", "The aryepiglottic fold (within the quadrangular membrane)", "The vestibular (false vocal) fold"], "c": 2, "r": ["The vocal fold contains the vocal ligament and vocalis, not the cuneiform cartilage.", "The glossoepiglottic folds connect the epiglottis to the tongue and do not house the cuneiform.", "Correct. The cuneiform cartilages are rod-like elastic cartilages embedded in the aryepiglottic fold / quadrangular membrane, adding slight tension to it.", "The vestibular fold is the inferior border of the quadrangular membrane; the cuneiform sits higher, in the aryepiglottic fold."], "cat": "Arytenoid & Small Cartilages", "source": "L25/L26 · Cuneiform cartilages", "obj": "Cuneiform location", "hint": "Embedded in the aryepiglottic fold's membrane.", "quote": "[Maini] 'Cuneiform is located within the quadrangular membrane... within the aryepiglottic fold.'"}, {"q": "Which small cartilage sits directly ON the APEX of the arytenoid cartilage?", "o": ["Cuneiform cartilage", "Triticeal cartilage", "Corniculate cartilage", "Epiglottic cartilage"], "c": 2, "r": ["The cuneiform lies within the aryepiglottic fold, anterior to the corniculate, not on the arytenoid apex.", "The triticeal cartilage lies in the thyrohyoid membrane and is not even part of the larynx.", "Correct. The corniculate cartilages cap the apices of the arytenoids, prolonging them.", "The epiglottis is a large unpaired cartilage, not a cap on the arytenoid apex."], "cat": "Arytenoid & Small Cartilages", "source": "L25 · Small cartilages", "obj": "Corniculate vs cuneiform position", "hint": "'Corni' = little horn on the tip.", "quote": "[Maini] 'Corniculate cartilages, they add extension to arytenoid cartilages... attached to the apex of arytenoid cartilages.'"}, {"q": "Dr. Maini warns that the TRITICEAL (triticeous) cartilages are a common distractor because of what fact?", "o": ["They are the largest of the paired cartilages", "They are the true vocal-cord cartilages", "They form the cricoarytenoid joint", "They are NOT part of the larynx — they lie in the posterior free border of the thyrohyoid membrane"], "c": 3, "r": ["They are tiny, not the largest paired cartilage; and they are not counted among the nine laryngeal cartilages.", "They have nothing to do with the vocal cords; the vocal ligament runs arytenoid-to-thyroid.", "They form no joint; they are small nodules in the thyrohyoid membrane.", "Correct. Maini explicitly says the triticeal cartilages are not laryngeal cartilages — they sit in the thyrohyoid membrane's free border and appear only to confuse you on a test."], "cat": "Arytenoid & Small Cartilages", "source": "L25 · Triticeal cartilages", "obj": "Triticeal cartilages — trap", "hint": "In the thyrohyoid membrane = NOT laryngeal.", "quote": "[Maini] 'Triticeal cartilages are located along the free border of thyrohyoid membrane, which is also not a part of larynx.'"}, {"q": "The corniculate cartilages are enclosed within the posterior part of which fold?", "o": ["The vestibular fold", "The median glossoepiglottic fold", "The vocal fold", "The aryepiglottic fold"], "c": 3, "r": ["The vestibular fold is the lower border of the quadrangular membrane; the corniculate is not there.", "The median glossoepiglottic fold connects the epiglottis to the tongue and does not enclose the corniculate.", "The vocal fold houses the vocal ligament and vocalis, not the corniculate cartilage.", "Correct. The corniculate cartilages lie enclosed within the posterior part of the aryepiglottic folds."], "cat": "Arytenoid & Small Cartilages", "source": "L25 · Corniculate cartilages", "obj": "Corniculate — enclosing fold", "hint": "Same fold family as the aryepiglottic ligament.", "quote": "[Maini] 'They're enclosed within the posterior part of the aryepiglottic folds.'"}, {"q": "Which shape does Dr. Maini use for the epiglottis?", "o": ["A three-sided pyramid", "A leaf-shaped / spoon-shaped cartilage", "A quadrangular sheet", "A signet ring"], "c": 1, "r": ["A three-sided pyramid describes the arytenoid.", "Correct. The epiglottis is a leaf-like (spoon-shaped) elastic cartilage that projects up behind the tongue.", "A quadrangular sheet describes the quadrangular membrane.", "A signet ring describes the cricoid."], "cat": "Epiglottis", "source": "L25 · Epiglottis", "obj": "Epiglottis shape", "hint": "Leaf behind the tongue.", "quote": "[Maini] 'It's a leaf-shaped or spoon-shaped cartilage.'"}, {"q": "During deglutition (swallowing), what does the epiglottis do?", "o": ["Descends into the trachea", "Vibrates to produce sound", "Bends backward over the laryngeal inlet to help close it", "Elevates to open the rima glottidis"], "c": 2, "r": ["The epiglottis does not descend into the trachea; it folds back over the inlet.", "The vocal folds vibrate for sound; the epiglottis is not the sound generator.", "Correct. During swallowing the epiglottis bends back over the laryngeal inlet so contents do not enter the airway.", "The rima glottidis opening is governed by the vocal cords, not the epiglottis; swallowing closes, not opens, the inlet."], "cat": "Epiglottis", "source": "L25 · Epiglottis function", "obj": "Epiglottis in swallowing", "hint": "Lid folds back to cover the airway.", "quote": "[Maini] 'During deglutition it bends back over the laryngeal inlet so contents do not enter your respiratory passage.'"}, {"q": "What does Dr. Maini say about the functional importance of the epiglottis in humans?", "o": ["It generates the voice", "It is the sole structure preventing aspiration", "It is somewhat degenerate and not essential to swallowing", "It is the only abductor of the vocal cords"], "c": 2, "r": ["Voice is generated by the vocal folds, not the epiglottis.", "It is NOT the sole protector; the vestibular (false) folds close as back-up, so the epiglottis is not indispensable.", "Correct. She notes the human epiglottis is somewhat degenerate and not essential to swallowing — the vestibular folds provide back-up airway protection.", "The sole abductor of the vocal cords is the posterior cricoarytenoid muscle, not the epiglottis."], "cat": "Epiglottis", "source": "L25 · Epiglottis function", "obj": "Epiglottis — degenerate in humans", "hint": "The false cords back it up.", "quote": "[Maini] 'In humans, it is somewhat degenerate in function and is not essential to swallowing.'"}, {"q": "According to Dr. Maini, the name 'epiglottis' comes from its relationship to which structure?", "o": ["The tongue — it is 'upon the tongue'", "The trachea — it is 'above the windpipe'", "The pharynx — it is 'behind the throat'", "The glottis — it is the 'lid' to the glottis"], "c": 3, "r": ["'Epi-' does refer to 'upon', but she ties the name specifically to the glottis, not the tongue.", "The name is built on 'glottis', not the trachea.", "The name is built on 'glottis', not the pharynx.", "Correct. Maini explains epiglottis literally means the lid over the glottis (rima glottidis)."], "cat": "Epiglottis", "source": "L26 · Epiglottis naming", "obj": "Epiglottis etymology", "hint": "'Epi-glottis' = lid on the glottis.", "quote": "[Maini] 'Your epiglottis was named after glottis. Epiglottis is the lid to glottis.'"}, {"q": "The epiglottis is connected to the HYOID bone by which ligament, and what class is it?", "o": ["Hyoepiglottic ligament — an EXTRINSIC ligament", "Vocal ligament — intrinsic", "Thyroepiglottic ligament — intrinsic", "Cricothyroid ligament — extrinsic"], "c": 0, "r": ["Correct. The hyoepiglottic ligament joins the epiglottis to the hyoid bone; because the hyoid is outside the larynx, it is extrinsic.", "The vocal ligament runs arytenoid-to-thyroid, not to the epiglottis.", "The thyroepiglottic ligament connects the epiglottis to the THYROID and is intrinsic.", "The cricothyroid ligament connects cricoid to thyroid and is intrinsic, not extrinsic."], "cat": "Epiglottis", "source": "L25 · Epiglottis attachments", "obj": "Hyoepiglottic ligament", "hint": "Hyoid is outside the larynx = extrinsic.", "quote": "[Maini] 'This is hyoepiglottic — what kind of ligament is this? Extrinsic.'"}, {"q": "The mucosal folds that connect the epiglottis to the tongue are called what?", "o": ["Aryepiglottic folds", "Vestibular folds", "Vocal folds", "Glossoepiglottic folds (one median + two lateral)"], "c": 3, "r": ["Aryepiglottic folds run between the arytenoid and epiglottis — the superior border of the quadrangular membrane.", "Vestibular folds are the false vocal cords (inferior border of quadrangular membrane).", "Vocal folds are the true cords between the arytenoid vocal process and the thyroid.", "Correct. Three glossoepiglottic folds (one median, two lateral) tether the epiglottis to the tongue."], "cat": "Epiglottis", "source": "L25 · Glossoepiglottic folds", "obj": "Glossoepiglottic folds", "hint": "'Glosso' = tongue.", "quote": "[Maini] 'These folds are called glossoepiglottic folds — a median and two lateral glossoepiglottic folds.'"}, {"q": "The shallow depressions between the median and lateral glossoepiglottic folds — where food may lodge — are called what?", "o": ["Piriform recesses", "Saccules", "Laryngeal ventricles", "Valleculae (epiglottic valleculae)"], "c": 3, "r": ["Piriform recesses lie on either side of the laryngeal inlet in the pharynx, not between the glossoepiglottic folds.", "The saccule is the anterior extension of the laryngeal ventricle.", "The laryngeal ventricle is inside the larynx between the vestibular and vocal folds.", "Correct. The spaces between the glossoepiglottic folds are the valleculae, shallow fossae where swallowed material can stick."], "cat": "Epiglottis", "source": "L25 · Valleculae", "obj": "Valleculae", "hint": "Little valleys at the tongue base.", "quote": "[Maini] 'The spaces between these folds are called valleculae... sometimes food sticks to the vallecula.'"}, {"q": "The epiglottis connects to the ARYTENOID cartilage by which structure?", "o": ["The cricothyroid ligament", "The quadrangular membrane", "The vocal ligament", "The hyoepiglottic ligament"], "c": 1, "r": ["The cricothyroid ligament connects the cricoid to the thyroid.", "Correct. The quadrangular membrane spans between the epiglottis and the arytenoid cartilage.", "The vocal ligament connects the arytenoid to the thyroid, not to the epiglottis.", "The hyoepiglottic ligament connects the epiglottis to the hyoid bone, not to the arytenoid."], "cat": "Epiglottis", "source": "L25 · Epiglottis attachments", "obj": "Epiglottis-arytenoid connection", "hint": "Four-sided sheet between the two.", "quote": "[Maini] 'To arytenoid by quadrangular membrane.'"}, {"q": "How does Dr. Maini distinguish EXTRINSIC from INTRINSIC laryngeal ligaments/membranes?", "o": ["Extrinsic connect the larynx to a NON-laryngeal structure; intrinsic connect laryngeal structures to each other", "Extrinsic are elastic; intrinsic are hyaline", "Extrinsic are inside the larynx; intrinsic are outside", "Extrinsic are paired; intrinsic are unpaired"], "c": 0, "r": ["Correct. Extrinsic ligaments tie the larynx to something outside it (e.g., hyoid, trachea); intrinsic ligaments interconnect the laryngeal cartilages themselves.", "The elastic-vs-hyaline distinction is about cartilage tissue, not the extrinsic/intrinsic ligament classification.", "This is reversed — extrinsic reach OUT to non-laryngeal structures, not 'inside the larynx.'", "Paired vs unpaired describes cartilages, not the ligament classification."], "cat": "Membranes & Ligaments", "source": "L25 · Ligament classification", "obj": "Extrinsic vs intrinsic definition", "hint": "Reaches outside = extrinsic.", "quote": "[Maini] 'Anything that connects larynx with an outside, non-laryngeal structure is extrinsic; intrinsic connects the structures of the larynx.'"}, {"q": "Which of the following is an EXTRINSIC laryngeal ligament/membrane?", "o": ["Quadrangular membrane", "Cricothyroid ligament", "Cricotracheal ligament", "Vocal ligament"], "c": 2, "r": ["The quadrangular membrane connects the epiglottis and arytenoid and is intrinsic.", "The cricothyroid ligament connects two laryngeal cartilages, so it is intrinsic.", "Correct. The cricotracheal ligament links the cricoid to the trachea (a non-laryngeal structure), so it is extrinsic.", "The vocal ligament runs between laryngeal cartilages (arytenoid-thyroid) and is intrinsic."], "cat": "Membranes & Ligaments", "source": "L25 · Ligament classification", "obj": "Extrinsic ligament example", "hint": "Trachea is outside the larynx.", "quote": "[Maini] 'Cricotracheal ligament is an extrinsic ligament — trachea is not part of larynx.'"}, {"q": "Dr. Maini lists the three EXTRINSIC ligaments/membranes of the larynx as which set?", "o": ["Quadrangular membrane, vocal ligament, and conus elasticus", "Vestibular ligament, vocal ligament, and aryepiglottic ligament", "Thyrohyoid membrane, cricotracheal ligament, and hyoepiglottic ligament", "Median cricothyroid, lateral cricothyroid, and thyroepiglottic"], "c": 2, "r": ["Quadrangular membrane, vocal ligament and conus elasticus are all INTRINSIC.", "Vestibular, vocal, and aryepiglottic ligaments are all intrinsic components.", "Correct. The three extrinsic connectors are the (median) thyrohyoid membrane, the cricotracheal ligament, and the hyoepiglottic ligament.", "Median/lateral cricothyroid and thyroepiglottic ligaments are all INTRINSIC."], "cat": "Membranes & Ligaments", "source": "L25 · Extrinsic ligaments", "obj": "Three extrinsic ligaments", "hint": "Hyoid + trachea + hyoid-to-epiglottis all reach outside.", "quote": "[Maini] 'These three are extrinsic: median thyrohyoid ligament, cricotracheal, and hyoepiglottic.'"}, {"q": "Between which two structures does the QUADRANGULAR MEMBRANE extend?", "o": ["Between the epiglottis and the arytenoid cartilage", "Between the cricoid and the trachea", "Between the two vocal processes", "Between the thyroid and the hyoid"], "c": 0, "r": ["Correct. The quadrangular membrane is a four-sided sheet stretching from the epiglottis to the arytenoid.", "Cricoid-to-trachea is the cricotracheal ligament.", "The transverse arytenoid muscle bridges the two arytenoids; the quadrangular membrane runs epiglottis-to-arytenoid.", "Thyroid-to-hyoid is the thyrohyoid membrane."], "cat": "Membranes & Ligaments", "source": "L25/L26 · Quadrangular membrane", "obj": "Quadrangular membrane span", "hint": "Four-sided = quadrangular; epiglottis to arytenoid.", "quote": "[Maini] 'Quadrangular membrane extends between the epiglottis and the arytenoid.'"}, {"q": "The SUPERIOR border of the quadrangular membrane is thickened to form which ligament?", "o": ["The vestibular ligament", "The cricotracheal ligament", "The vocal ligament", "The aryepiglottic ligament (aryepiglottic fold when mucosa-covered)"], "c": 3, "r": ["The vestibular ligament is the INFERIOR border of the quadrangular membrane, not the superior.", "The cricotracheal ligament connects cricoid to trachea and is unrelated to this membrane's borders.", "The vocal ligament is the upper border of the conus elasticus, not of the quadrangular membrane.", "Correct. The upper edge of the quadrangular membrane is the aryepiglottic ligament; covered by mucosa it is the aryepiglottic fold."], "cat": "Membranes & Ligaments", "source": "L26 · Quadrangular membrane borders", "obj": "Superior border of quadrangular membrane", "hint": "Top edge = aryepiglottic.", "quote": "[Maini] 'The superior border of quadrangular membrane is called the aryepiglottic ligament.'"}, {"q": "The INFERIOR border of the quadrangular membrane is thickened to form which ligament?", "o": ["The aryepiglottic ligament", "The median cricothyroid ligament", "The vestibular ligament (vestibular fold = false vocal cord)", "The vocal ligament"], "c": 2, "r": ["The aryepiglottic ligament is the SUPERIOR border, not the inferior.", "The median cricothyroid ligament is part of the conus elasticus.", "Correct. The lower edge of the quadrangular membrane is the vestibular ligament; covered by mucosa it becomes the vestibular fold (false vocal cord).", "The vocal ligament belongs to the conus elasticus, not the quadrangular membrane."], "cat": "Membranes & Ligaments", "source": "L26 · Quadrangular membrane borders", "obj": "Inferior border of quadrangular membrane", "hint": "Bottom edge = vestibular = false cord.", "quote": "[Maini] 'The inferior border of quadrangular membrane is called the vestibular ligament.'"}, {"q": "The vocal ligament is essentially another name for which ligament, and what does it span?", "o": ["The thyrohyoid ligament — from thyroid to hyoid", "The cricothyroid ligament — from cricoid to thyroid", "The cricoarytenoid ligament — from cricoid to arytenoid", "The thyroarytenoid ligament — from the arytenoid's vocal process to the thyroid cartilage"], "c": 3, "r": ["Thyroid-to-hyoid is spanned by the thyrohyoid membrane, not the vocal ligament.", "The cricothyroid ligament is a separate midline ligament in the conus elasticus.", "There is a cricoarytenoid joint but the vocal ligament runs arytenoid-to-thyroid, not cricoid-to-arytenoid.", "Correct. The vocal ligament (thyroarytenoid ligament) runs from the vocal process of the arytenoid to the thyroid; mucosa over it makes the vocal fold."], "cat": "Membranes & Ligaments", "source": "L25/L26 · Vocal ligament", "obj": "Vocal ligament = thyroarytenoid ligament", "hint": "Thyro + arytenoid.", "quote": "[Maini] 'This is thyroarytenoid ligament — this is your vocal ligament, vocal fold, vocal cord.'"}, {"q": "The 'conus elasticus' is a cone-shaped complex made up of which three components?", "o": ["The quadrangular membrane, aryepiglottic ligament, and vestibular ligament", "The thyrohyoid, cricotracheal, and hyoepiglottic ligaments", "The median cricothyroid ligament, the vocal ligaments, and the lateral cricothyroid ligaments", "The transverse arytenoid, oblique arytenoid, and vocalis"], "c": 2, "r": ["Those are components of the upper (quadrangular) membrane complex, not the conus elasticus.", "Those three are the EXTRINSIC ligaments, not the conus elasticus.", "Correct. Maini describes the conus elasticus as the median cricothyroid ligament + the vocal cords + the lateral cricothyroid (sheet), forming a cone.", "Those are intrinsic muscles, not ligaments of the conus elasticus."], "cat": "Membranes & Ligaments", "source": "L26 · Conus elasticus", "obj": "Conus elasticus components", "hint": "The lower cone below the vocal cords.", "quote": "[Maini] 'The whole system is called conus elasticus — median cricothyroid ligament, vocal cords, and lateral cricothyroid ligament.'"}, {"q": "Where is the MEDIAN cricothyroid ligament located?", "o": ["Posteriorly, connecting the cricoid to the trachea", "Laterally, connecting the two arytenoids", "In the midline, connecting the thyroid to the hyoid", "In the midline, connecting the cricoid to the thyroid"], "c": 3, "r": ["Cricoid-to-trachea posteriorly is the cricotracheal ligament.", "Muscles/ligaments connecting the two arytenoids sit posteriorly, not this midline ligament.", "Thyroid-to-hyoid in the midline is the median thyrohyoid ligament, not the cricothyroid.", "Correct. The median cricothyroid ligament connects the cricoid and thyroid strictly in the midline."], "cat": "Membranes & Ligaments", "source": "L26 · Conus elasticus", "obj": "Median cricothyroid ligament", "hint": "Right in the middle, cricoid to thyroid.", "quote": "[Maini] 'Median cricothyroid ligament... located only in the median part, right in the middle.'"}, {"q": "Despite its name, the LATERAL cricothyroid ligament actually attaches superiorly to what (not directly to the thyroid)?", "o": ["The vocal ligaments (vocal cords)", "The trachea", "The epiglottis", "The hyoid bone"], "c": 0, "r": ["Correct. Maini clarifies its lower end attaches to the cricoid but its upper end attaches to the vocal ligaments — only indirectly reaching the thyroid via the cords.", "The trachea is joined by the cricotracheal ligament, not the lateral cricothyroid ligament.", "It does not attach to the epiglottis.", "It does not reach the hyoid bone."], "cat": "Membranes & Ligaments", "source": "L26 · Conus elasticus", "obj": "Lateral cricothyroid ligament attachment", "hint": "Bottom = cricoid, top = vocal cords.", "quote": "[Maini] 'Inferior end is attached to the cricoid, but the superior end is attached to the vocal ligaments.'"}, {"q": "Both the quadrangular membrane and the vocal ligament are classified as which type of laryngeal connector?", "o": ["Extracapsular", "Intrinsic", "Non-laryngeal", "Extrinsic"], "c": 1, "r": ["'Extracapsular' is a joint-capsule term Maini does not apply to these laryngeal membranes.", "Correct. Both connect laryngeal cartilages to one another, so both are intrinsic.", "Both are components of the larynx itself, so 'non-laryngeal' is wrong.", "Extrinsic ligaments reach a non-laryngeal structure (hyoid, trachea); these do not."], "cat": "Membranes & Ligaments", "source": "L25 · Ligament classification", "obj": "Quadrangular membrane & vocal ligament — intrinsic", "hint": "Both link cartilage to cartilage.", "quote": "[Maini] 'Vocal ligament and quadrangular membrane, both of them, they are intrinsic.'"}, {"q": "The vestibular folds are also known by which common name?", "o": ["The true vocal cords", "The glossoepiglottic folds", "The FALSE vocal cords", "The aryepiglottic folds"], "c": 2, "r": ["The TRUE vocal cords are the vocal folds, which lie deep/inferior to the vestibular folds.", "Glossoepiglottic folds connect the epiglottis to the tongue.", "Correct. The vestibular folds (inferior border of the quadrangular membrane, mucosa-covered) are the false vocal cords.", "Aryepiglottic folds are the superior border of the quadrangular membrane, not the false cords."], "cat": "Vocal & Vestibular Folds", "source": "L26 · Vestibular folds", "obj": "False vocal cords", "hint": "'Vestibular' = false cords.", "quote": "[Maini] 'Vestibular folds otherwise are called false vocal cords.'"}, {"q": "Which key functional difference does Dr. Maini draw between the vocal folds and the vestibular folds?", "o": ["Neither fold can move", "Vestibular folds are mobile; vocal folds are fixed", "Both are equally mobile during phonation", "Vocal folds are mobile (muscles abduct/adduct them); vestibular folds have no muscle and are not normally mobile"], "c": 3, "r": ["The vocal folds clearly move; saying neither can move is wrong.", "This is reversed — the VOCAL folds are the mobile ones.", "They are not equally mobile; only the vocal folds are routinely moved by muscles.", "Correct. Muscles act on the true vocal folds to abduct/adduct them; the vestibular (false) folds have no muscle and stay put except in strong reflex closure."], "cat": "Vocal & Vestibular Folds", "source": "L26 · Folds — mobility", "obj": "Vocal vs vestibular fold mobility", "hint": "Muscles grab the TRUE cords.", "quote": "[Maini] 'Vocal cords are moved because muscles act on them, they abduct or adduct them. Vestibular folds stay there.'"}, {"q": "What protective function do the vestibular (false vocal) folds serve?", "o": ["They vibrate to produce the voice", "They close by strong spasmodic contraction of surrounding muscles to prevent a foreign body from entering the airway (anti-choking)", "They open the rima glottidis during breathing", "They tense the vocal ligament for pitch"], "c": 1, "r": ["Voice production is the job of the true vocal folds, not the false ones.", "Correct. Maini says if something threatens to enter the larynx, the vestibular folds approximate via strong spasmodic muscle contraction to prevent choking, backing up the epiglottis.", "Opening the rima glottidis is done by the posterior cricoarytenoid, not the vestibular folds.", "Pitch/tension is set by the cricothyroid on the vocal ligament, not by the vestibular folds."], "cat": "Vocal & Vestibular Folds", "source": "L26 · Vestibular fold function", "obj": "Vestibular fold — airway protection", "hint": "Back-up gate against choking.", "quote": "[Maini] 'If a foreign body enters the larynx, these vestibular folds close as a result of strong spasmodic contraction of surrounding muscles to prevent you from choking.'"}, {"q": "When mucous membrane covers the vocal ligament, the resulting structure is called what?", "o": ["The vocal fold / vocal cord", "The conus elasticus", "The vestibular fold", "The aryepiglottic fold"], "c": 0, "r": ["Correct. A vocal ligament covered by mucosa is the vocal fold (vocal cord).", "The conus elasticus is the fibroelastic cone below the vocal folds, not a single mucosal fold.", "A mucosa-covered vestibular LIGAMENT gives the vestibular fold, a different structure.", "The aryepiglottic fold is the mucosa-covered aryepiglottic ligament (superior border of quadrangular membrane)."], "cat": "Vocal & Vestibular Folds", "source": "L25 · Vocal fold", "obj": "Vocal ligament to vocal fold", "hint": "Ligament + mucosa = fold.", "quote": "[Maini] 'If you cover it with mucous membrane, you will call it vocal fold or vocal cord.'"}, {"q": "In a superior view of the larynx, how are the vestibular and vocal folds arranged relative to each other?", "o": ["They lie side by side at the same level", "The vocal folds lie superior; the vestibular folds lie deep", "The vocal folds lie anterior; the vestibular folds lie posterior", "The vestibular folds lie superior; the vocal folds lie deep/inferior to them"], "c": 3, "r": ["They are stacked at different levels, not side by side at the same level.", "This is reversed — the vestibular folds are the upper pair.", "The distinction is superior vs inferior (deep), not anterior vs posterior.", "Correct. The vestibular (false) folds are superior, and the true vocal folds lie deep and inferior to them."], "cat": "Vocal & Vestibular Folds", "source": "L26 · Folds — arrangement", "obj": "Vestibular above, vocal below", "hint": "False cords sit on top of true cords.", "quote": "[Maini] 'Vestibular folds are superior, and then deep to the vestibular folds we have vocal cords.'"}, {"q": "Dr. Maini compares the vocal cord to a guitar string. What changes the tension in this 'string' to alter the voice?", "o": ["Movement of the arytenoid cartilage", "Contraction of the vestibular folds", "Movement of the epiglottis", "Rotation of the hyoid bone"], "c": 0, "r": ["Correct. As the arytenoid moves, it changes the tension in the vocal cord — like tightening a guitar string — which is how we vary the voice.", "The vestibular folds have no muscle to tension the cord.", "The epiglottis is a swallowing lid; it does not tune the cords.", "The hyoid bone elevates the larynx but does not directly tune the vocal cord tension."], "cat": "Vocal & Vestibular Folds", "source": "L26 · Vocal cord mechanics", "obj": "Arytenoid tunes the cord", "hint": "Move the arytenoid = tune the string.", "quote": "[Maini] 'This arytenoid moves from here and there, and changes the tension in the cord, and that is how we speak.'"}, {"q": "Which two small muscles lie WITHIN the vocal folds themselves, and how are they arranged?", "o": ["Posterior and lateral cricoarytenoid", "Thyroarytenoid laterally and vocalis medially", "Transverse and oblique arytenoid", "Cricothyroid and thyrohyoid"], "c": 1, "r": ["Posterior and lateral cricoarytenoid attach to the muscular process, not lying within the fold as a lateral/medial pair.", "Correct. Within the vocal folds, the thyroarytenoid lies laterally and the vocalis lies medially; both shorten/relax the folds.", "Transverse and oblique arytenoids bridge the two arytenoids posteriorly, not within a single vocal fold.", "Cricothyroid is a tensor outside the fold; thyrohyoid is an extrinsic (infrahyoid) muscle."], "cat": "Vocal & Vestibular Folds", "source": "L26 · Vocalis & thyroarytenoid", "obj": "Muscles within the vocal fold", "hint": "Lateral = thyroarytenoid, medial = vocalis.", "quote": "[Maini] 'The lateral one is your thyroarytenoid, and the medial one is vocalis.'"}, {"q": "Which fold forms the boundary of the laryngeal inlet laterally?", "o": ["The aryepiglottic fold (superior border of the quadrangular membrane)", "The vestibular fold", "The vocal fold", "The glossoepiglottic fold"], "c": 0, "r": ["Correct. Laterally, the laryngeal inlet is bounded by the aryepiglottic fold — the superior border of the quadrangular membrane.", "The vestibular fold is the inferior border of the quadrangular membrane, below the inlet.", "The vocal fold lies deeper in the cavity, not at the inlet margin.", "The glossoepiglottic fold links the epiglottis to the tongue, outside the inlet's lateral wall."], "cat": "Vocal & Vestibular Folds", "source": "L26 · Laryngeal inlet", "obj": "Lateral boundary of inlet", "hint": "Same fold that holds the cuneiform.", "quote": "[Maini] 'The lateral boundary is the aryepiglottic fold, which is the superior border of quadrangular membrane.'"}, {"q": "The VESTIBULE of the larynx is the part located between which two landmarks?", "o": ["Between the epiglottis and the hyoid bone", "Between the vestibular folds and the vocal folds", "Between the laryngeal inlet and the vestibular folds", "Between the vocal folds and the inferior border of the cricoid"], "c": 2, "r": ["The epiglottis-to-hyoid region is not one of the three named cavity compartments.", "That space — between vestibular and vocal folds — is the ventricle, not the vestibule.", "Correct. The vestibule is the superior-most compartment, extending from the laryngeal inlet down to the vestibular folds.", "That space — below the vocal folds — is the infraglottic cavity."], "cat": "Rima Glottidis & Cavity Parts", "source": "L26 · Cavity parts", "obj": "Vestibule", "hint": "Top compartment, from the inlet down.", "quote": "[Maini] 'The superior part, between laryngeal inlet and vestibular fold, is called vestibule.'"}, {"q": "The laryngeal VENTRICLE is the narrow space located between which two structures?", "o": ["Between the laryngeal inlet and the vestibular folds", "Between the two arytenoid cartilages", "Between the vestibular folds and the vocal folds", "Between the vocal folds and the cricoid's inferior border"], "c": 2, "r": ["That upper space is the vestibule.", "The space between the arytenoids is part of the inlet/rima region, not the ventricle.", "Correct. The ventricle is the narrow recess between the vestibular (false) folds above and the vocal (true) folds below.", "That lower space is the infraglottic cavity."], "cat": "Rima Glottidis & Cavity Parts", "source": "L26 · Cavity parts", "obj": "Ventricle", "hint": "Middle slot between false and true cords.", "quote": "[Maini] 'The narrow space between vestibular fold and vocal fold is called the ventricle.'"}, {"q": "The laryngeal ventricle has an anterior extension called the SACCULE. What is the saccule's function?", "o": ["It generates the voice", "It houses the cuneiform cartilage", "It tenses the vocal ligament", "Its mucous glands secrete mucus that lubricates the vocal cords"], "c": 3, "r": ["Voice is generated by vibration of the vocal folds, not the saccule.", "The cuneiform cartilage lies in the aryepiglottic fold, not the saccule.", "Tension of the vocal ligament is set by the cricothyroid muscle, not the saccule.", "Correct. The saccule is a mucosa-lined pocket extending anteriorly from the ventricle; its mucous glands keep the vocal cords lubricated."], "cat": "Rima Glottidis & Cavity Parts", "source": "L26 · Saccule", "obj": "Saccule function", "hint": "Mucus dispenser for the cords.", "quote": "[Maini] 'Within this pocket you find a lot of mucous glands... which keeps our vocal cords lubricated. This is called the saccule.'"}, {"q": "The INFRAGLOTTIC cavity (space) extends between which two landmarks?", "o": ["Between the laryngeal inlet and the vestibular folds", "Between the vocal folds and the inferior border of the cricoid cartilage", "Between the vestibular folds and the vocal folds", "Between the epiglottis and the vestibular folds"], "c": 1, "r": ["That upper space is the vestibule.", "Correct. The infraglottic cavity runs from the vocal folds down to the inferior border of the cricoid — the lower limit of the larynx.", "That middle space is the ventricle.", "That region describes part of the vestibule, not the infraglottic cavity."], "cat": "Rima Glottidis & Cavity Parts", "source": "L26 · Cavity parts", "obj": "Infraglottic cavity", "hint": "Below the true cords, down to the last ring.", "quote": "[Maini] 'The space below the vocal folds up to the inferior border of cricoid is called the infraglottic space or cavity.'"}, {"q": "The slit-like space between the two VESTIBULAR folds is called what?", "o": ["The rima vestibuli", "The laryngeal ventricle", "The vallecula", "The rima glottidis"], "c": 0, "r": ["Correct. The gap between the right and left vestibular folds is the rima vestibuli.", "The ventricle is the recess between the vestibular and vocal folds, not the gap between the two vestibular folds.", "The vallecula lies between the glossoepiglottic folds at the tongue base.", "The rima glottidis is the space between the two VOCAL folds."], "cat": "Rima Glottidis & Cavity Parts", "source": "L26 · Rima", "obj": "Rima vestibuli", "hint": "Between the FALSE cords.", "quote": "[Maini] 'The space between the right and left vestibular fold is called the rima vestibuli.'"}, {"q": "The space between the two VOCAL folds — which Dr. Maini calls 'your actual glottis' — is named what?", "o": ["The rima vestibuli", "The rima glottidis", "The saccule", "The infraglottic cavity"], "c": 1, "r": ["The rima vestibuli is the space between the vestibular (false) folds.", "Correct. The rima glottidis is the gap between the true vocal folds and represents the actual glottis.", "The saccule is the anterior pocket of the ventricle.", "The infraglottic cavity is the compartment below the vocal folds, not the slit between them."], "cat": "Rima Glottidis & Cavity Parts", "source": "L26 · Rima", "obj": "Rima glottidis", "hint": "Between the TRUE cords = the glottis.", "quote": "[Maini] 'The space between the two vocal folds is called the rima glottidis. That is your actual glottis.'"}, {"q": "The laryngeal inlet (aditus) is bounded ANTERIORLY by which structure?", "o": ["The arytenoid cartilages", "The epiglottis", "The cricoid lamina", "The aryepiglottic fold"], "c": 1, "r": ["The arytenoid cartilages (with mucosa) form the POSTERIOR boundary of the inlet.", "Correct. Anteriorly, the laryngeal inlet is bounded by the epiglottis (the most anterior structure of the inlet).", "The cricoid lamina is far inferior/posterior and does not bound the inlet.", "The aryepiglottic fold forms the LATERAL boundary."], "cat": "Rima Glottidis & Cavity Parts", "source": "L26 · Laryngeal inlet", "obj": "Anterior boundary of inlet", "hint": "The lid is out front.", "quote": "[Maini] 'In the laryngeal inlet, the anterior-most structure is your epiglottis.'"}, {"q": "The laryngeal inlet is bounded POSTERIORLY by which structures?", "o": ["The vestibular folds", "The epiglottis", "The hyoid bone", "The arytenoid cartilages (covered by mucous membrane between them)"], "c": 3, "r": ["The vestibular folds lie deeper in the vestibule, not at the inlet's posterior rim.", "The epiglottis forms the ANTERIOR boundary.", "The hyoid bone is superior and anterior, not the posterior boundary of the inlet.", "Correct. Posteriorly the inlet is bounded by the arytenoid cartilages and the mucosa covering the interval between them."], "cat": "Rima Glottidis & Cavity Parts", "source": "L26 · Laryngeal inlet", "obj": "Posterior boundary of inlet", "hint": "The back pair of cartilages.", "quote": "[Maini] 'Posteriorly there are arytenoid cartilages and mucous membrane covering the two.'"}, {"q": "Dr. Maini defines the 'glottis' as which combination?", "o": ["The rima glottidis together with the vocal folds", "The ventricle together with the saccule", "The rima vestibuli together with the vestibular folds", "The epiglottis together with the aryepiglottic folds"], "c": 0, "r": ["Correct. The glottis comprises the vocal folds and the rima glottidis (the space between them).", "Ventricle + saccule are recesses, not the glottis.", "That combination (rima vestibuli + vestibular folds) describes the false-cord level, not the glottis.", "Epiglottis + aryepiglottic folds are inlet structures, not the glottis."], "cat": "Rima Glottidis & Cavity Parts", "source": "L26 · Glottis", "obj": "Definition of glottis", "hint": "True cords + the slit between them.", "quote": "[Maini] 'Rima glottidis, or glottis... the actual glottis is between the two vocal cords.'"}, {"q": "During QUIET (normal) respiration, in what position is the rima glottidis?", "o": ["Widely open (maximally abducted)", "Completely closed (fully adducted)", "Partially open (the vocal cords are slightly apart)", "Vibrating in a thin slit"], "c": 2, "r": ["Wide abduction occurs in FORCED respiration, not quiet breathing.", "Complete closure occurs in gag/effort closure, not quiet respiration.", "Correct. In normal respiratory position the rima glottidis is partially open.", "The thin vibrating slit is the phonation position, not quiet respiration."], "cat": "Rima Glottidis & Cavity Parts", "source": "L26 · Respiratory positions", "obj": "Rima glottidis — quiet respiration", "hint": "Just cracked open at rest.", "quote": "[Maini] 'This is normal respiratory position — your rima glottidis is partially open.'"}, {"q": "During PHONATION, how are the vocal cords positioned?", "o": ["Completely fused with no gap at all", "Widely abducted with the rima glottidis fully open", "Retracted into the ventricle", "Approximated with a thin slit-like space, so they vibrate as air is exhaled"], "c": 3, "r": ["The cords are not fused solid; a thin vibrating gap remains.", "Wide abduction is the forced-respiration position, which does not produce voice.", "The cords do not retract into the ventricle during phonation.", "Correct. In phonation the cords are approximated to a thin slit and vibrate with exhaled air to make sound."], "cat": "Rima Glottidis & Cavity Parts", "source": "L26 · Respiratory positions", "obj": "Rima glottidis — phonation", "hint": "Barely apart, buzzing on exhaled air.", "quote": "[Maini] 'During phonation, vocal cords are approximated with a thin slit-like space, so they can vibrate with the air exhaling out.'"}, {"q": "Dr. Maini calls the CRICOTHYROID the chief (or only) TENSOR of the vocal cords. How does it accomplish this?", "o": ["By pulling the arytenoids apart to abduct the cords", "By shortening the cords and reducing tension", "By closing the rima vestibuli", "By pulling the thyroid cartilage down/forward, which lengthens and stretches the vocal cords"], "c": 3, "r": ["Abduction is the job of the posterior cricoarytenoid, not the cricothyroid.", "Shortening/relaxing the cords is done by vocalis and thyroarytenoid, the opposite action.", "Closing the rima vestibuli is not the cricothyroid's action.", "Correct. The cricothyroid tilts/pulls the thyroid, stretching the vocal cords (between arytenoid and thyroid) and increasing their tension — the chief tensor."], "cat": "Intrinsic Muscles & Actions", "source": "L26 · Cricothyroid", "obj": "Cricothyroid — tensor", "hint": "Tilt the shield, stretch the string.", "quote": "[Maini] 'When it contracts it pulls the thyroid cartilage down... your vocal cord lengthens, it is stretched. The chief tensor is cricothyroid.'"}, {"q": "What is the origin and insertion of the cricothyroid muscle?", "o": ["Origin from the cricoid; insertion onto both arytenoids", "Origin from the arch of the cricoid; insertion onto the inferior horn and lower border of the thyroid cartilage", "Origin from the inner thyroid lamina; insertion onto the arytenoid", "Origin from the posterior cricoid lamina; insertion onto the muscular process of the arytenoid"], "c": 1, "r": ["Cricoid to both arytenoids describes muscles that span the arytenoids, not the cricothyroid.", "Correct. The cricothyroid arises from the arch of the cricoid and inserts on the inferior horn and lower border of the thyroid.", "Inner thyroid lamina to arytenoid describes the thyroarytenoid muscle.", "That origin/insertion describes the POSTERIOR cricoarytenoid muscle."], "cat": "Intrinsic Muscles & Actions", "source": "L26 · Cricothyroid", "obj": "Cricothyroid — attachments", "hint": "Cricoid arch to thyroid lower border/inferior horn.", "quote": "[Maini] 'It originates from arch of cricoid and is inserted onto the inferior horn and lower border of thyroid cartilage.'"}, {"q": "Which single intrinsic muscle is the SOLE ABDUCTOR of the vocal cords — the only one that opens the rima glottidis?", "o": ["Posterior cricoarytenoid", "Transverse arytenoid", "Cricothyroid", "Lateral cricoarytenoid"], "c": 0, "r": ["Correct. The posterior cricoarytenoid is the only abductor; it swings the vocal processes apart to open the rima glottidis for breathing.", "The transverse arytenoid is an ADDUCTOR (closes the rima glottidis).", "The cricothyroid is the tensor, not an abductor.", "The lateral cricoarytenoid is an ADDUCTOR (closes the cords)."], "cat": "Intrinsic Muscles & Actions", "source": "L26 · Posterior cricoarytenoid", "obj": "Sole abductor", "hint": "The only 'opener' of the airway.", "quote": "[Maini] 'This is the only, the sole, abductor of vocal cords.'"}, {"q": "What is the origin and insertion of the posterior cricoarytenoid muscle?", "o": ["Origin from the posterior surface of the cricoid lamina; insertion onto the muscular process of the arytenoid", "Origin from the arch of the cricoid; insertion onto the thyroid", "Origin from the vocal process; insertion onto the epiglottis", "Origin from the inner thyroid lamina; insertion onto the arytenoid"], "c": 0, "r": ["Correct. It arises from the posterior cricoid lamina and inserts on the muscular process of the arytenoid; pulling that process rotates the vocal process laterally, abducting the cords.", "Cricoid arch to thyroid describes the cricothyroid muscle.", "There is no muscle running from the vocal process to the epiglottis as described.", "Inner thyroid lamina to arytenoid describes the thyroarytenoid."], "cat": "Intrinsic Muscles & Actions", "source": "L26 · Posterior cricoarytenoid", "obj": "Posterior cricoarytenoid — attachments", "hint": "Behind the cricoid to the muscular process.", "quote": "[Maini] 'Originates from posterior surface of lamina of cricoid, inserted onto the muscular process of arytenoid cartilage.'"}, {"q": "The TRANSVERSE and OBLIQUE arytenoid muscles run between the two arytenoid cartilages. What is their action?", "o": ["They elevate the whole larynx", "They abduct the vocal cords (open the rima glottidis)", "They adduct the vocal cords (close the rima glottidis)", "They tense the vocal cords"], "c": 2, "r": ["Elevating the whole larynx is done by extrinsic (suprahyoid) muscles, not these intrinsic ones.", "Abduction (opening) is done solely by the posterior cricoarytenoid.", "Correct. The transverse and oblique arytenoids draw the arytenoids together, closing the rima glottidis — they are adductors.", "Tensing is the cricothyroid's job."], "cat": "Intrinsic Muscles & Actions", "source": "L26 · Arytenoid muscles", "obj": "Transverse/oblique arytenoid — adductors", "hint": "Pull the arytenoids together = close.", "quote": "[Maini] 'They extend between left and right arytenoid cartilages, and they close rima glottidis — that means adduct the vocal cords.'"}, {"q": "The LATERAL cricoarytenoid muscle produces which action on the vocal cords?", "o": ["Adduction (pulls the cords together / closes the rima glottidis)", "Abduction (opens the rima glottidis)", "Elevation of the larynx", "Relaxation/slackening of the cords"], "c": 0, "r": ["Correct. The lateral cricoarytenoid adducts the vocal cords, pulling them together.", "Abduction is the sole role of the posterior cricoarytenoid.", "Elevation of the larynx is an extrinsic-muscle function.", "Slackening the cords is done by vocalis and thyroarytenoid."], "cat": "Intrinsic Muscles & Actions", "source": "L26 · Lateral cricoarytenoid", "obj": "Lateral cricoarytenoid — adductor", "hint": "'Lateral' one closes; 'posterior' one opens.", "quote": "[Maini] 'When this muscle contracts, it adducts the vocal cords, pulls them together.'"}, {"q": "What action do the THYROARYTENOID and VOCALIS muscles have on the vocal folds?", "o": ["They slacken/relax the folds (reduce tension and shorten them)", "They are the sole abductors", "They abduct the folds", "They tense the folds"], "c": 0, "r": ["Correct. Lying parallel to and within the vocal folds, the thyroarytenoid and vocalis shorten and relax the folds, reducing tension.", "The sole abductor is the posterior cricoarytenoid, not these muscles.", "Abduction is the posterior cricoarytenoid's role.", "Tensing is the cricothyroid's role — the opposite of these two."], "cat": "Intrinsic Muscles & Actions", "source": "L26 · Vocalis & thyroarytenoid", "obj": "Slackeners of the vocal folds", "hint": "Relax = vocalis + thyroarytenoid.", "quote": "[Maini] 'These two, vocalis and thyroarytenoid, they slacken or relax the vocal cords.'"}, {"q": "What is the origin and insertion of the thyroarytenoid muscle?", "o": ["Origin from the inner surface of the thyroid lamina; insertion onto the anterolateral surface of the arytenoid", "Origin from the hyoid; insertion onto the epiglottis", "Origin from the cricoid arch; insertion onto the thyroid", "Origin from the posterior cricoid lamina; insertion onto the muscular process"], "c": 0, "r": ["Correct. The thyroarytenoid runs from the inner thyroid lamina to the anterolateral arytenoid, lying parallel to the vocal cords so it relaxes them on contraction.", "Hyoid to epiglottis describes the hyoepiglottic ligament, not a muscle.", "Cricoid arch to thyroid is the cricothyroid.", "Posterior cricoid lamina to muscular process is the posterior cricoarytenoid."], "cat": "Intrinsic Muscles & Actions", "source": "L26 · Thyroarytenoid", "obj": "Thyroarytenoid — attachments", "hint": "Inner thyroid to arytenoid, parallel to the cord.", "quote": "[Maini] 'Thyroarytenoid originates from inner surface of thyroid lamina, inserted onto the anterolateral surface of arytenoid.'"}, {"q": "The intrinsic laryngeal muscles are defined by Dr. Maini as muscles that do what?", "o": ["Originate from the tongue", "Lie WITHIN the larynx and move the laryngeal parts (e.g., the vocal cords)", "Move the pharynx during swallowing", "Attach the larynx to the hyoid and sternum to elevate/depress it"], "c": 1, "r": ["Tongue-origin muscles are the extrinsic tongue muscles, not laryngeal intrinsics.", "Correct. Intrinsic laryngeal muscles are located within the larynx and act on its own components; extrinsic muscles move the whole larynx up or down.", "Pharyngeal muscles act on the pharynx; the intrinsic laryngeal muscles act within the larynx.", "Muscles that raise/lower the whole larynx via hyoid/sternum are the EXTRINSIC (supra/infrahyoid) muscles."], "cat": "Intrinsic Muscles & Actions", "source": "L26 · Intrinsic muscles", "obj": "Intrinsic muscle definition", "hint": "'Intrinsic' = inside the larynx.", "quote": "[Maini] 'These are intrinsic laryngeal muscles — they are located within the larynx.'"}, {"q": "Which muscle, in particular, adjusts the tension of the vocal LIGAMENT and lies just medial to the thyroarytenoid within the fold?", "o": ["Posterior cricoarytenoid", "Vocalis", "Cricothyroid", "Oblique arytenoid"], "c": 1, "r": ["The posterior cricoarytenoid is the abductor.", "Correct. The vocalis, lying medial within the vocal fold, finely adjusts (chiefly relaxes) the tension of the vocal ligament.", "The cricothyroid is the coarse tensor and lies outside the fold.", "The oblique arytenoid is an adductor spanning the two arytenoids."], "cat": "Intrinsic Muscles & Actions", "source": "L26 · Vocalis", "obj": "Vocalis — fine tension control", "hint": "The innermost fine-tuner of the cord.", "quote": "[Maini] 'Vocalis, lying parallel to the vocal folds... adjusts the tension of the vocal ligament; in particular, it relaxes them.'"}, {"q": "Which muscle group produces the ADDUCTION needed to close the rima glottidis for phonation?", "o": ["Posterior cricoarytenoid", "Cricothyroid", "Lateral cricoarytenoid plus transverse and oblique arytenoids", "Vocalis and thyroarytenoid"], "c": 2, "r": ["The posterior cricoarytenoid is the ABductor (opener), the opposite action.", "The cricothyroid is the tensor, not an adductor.", "Correct. The adductors — lateral cricoarytenoid and the transverse/oblique arytenoids — close the rima glottidis.", "Vocalis and thyroarytenoid relax/slacken the cords rather than adduct them."], "cat": "Intrinsic Muscles & Actions", "source": "L26 · Muscle summary", "obj": "Adductors of the cords", "hint": "'Lateral' + the two arytenoids close it.", "quote": "[Maini] 'Transverse and oblique arytenoid are adductors; lateral cricoarytenoid is also an adductor.'"}, {"q": "From which pharyngeal arches do the laryngeal (and pharyngeal) muscles develop, determining their motor supply?", "o": ["The 1st and 2nd arches", "The 3rd and 5th arches", "The 2nd and 3rd arches", "The 4th and 6th pharyngeal arches"], "c": 3, "r": ["The 1st and 2nd arches supply muscles of mastication and facial expression, respectively.", "The 5th arch is rudimentary; the larynx comes from arches 4 and 6.", "The 3rd arch supplies only stylopharyngeus (CN IX).", "Correct. Laryngeal muscles arise from the 4th and 6th arches, so they are supplied by the vagus (CN X)."], "cat": "Innervation — Laryngeal Nerves", "source": "L26 · Innervation — arches", "obj": "Pharyngeal arch origin", "hint": "Fourth and sixth = vagus territory.", "quote": "[Maini] 'All these muscles originate from 4th and 6th pharyngeal arches, and they are innervated by vagus.'"}, {"q": "All intrinsic laryngeal muscles are ultimately innervated by which cranial nerve?", "o": ["The facial nerve (CN VII)", "The vagus nerve (CN X)", "The hypoglossal nerve (CN XII)", "The glossopharyngeal nerve (CN IX)"], "c": 1, "r": ["CN VII (facial) supplies muscles of facial expression.", "Correct. Every intrinsic laryngeal muscle is supplied by branches of the vagus (CN X) — external laryngeal for cricothyroid, recurrent laryngeal for the rest.", "CN XII (hypoglossal) supplies tongue muscles, which are myotomal, not laryngeal.", "CN IX (glossopharyngeal) supplies stylopharyngeus and sensation to the posterior tongue/pharynx, not laryngeal muscles."], "cat": "Innervation — Laryngeal Nerves", "source": "L26 · Innervation", "obj": "Vagus supplies the larynx", "hint": "The 10th nerve runs the voice box.", "quote": "[Maini] 'It is vagus only... it's the 10th nerve.'"}, {"q": "Which ONE intrinsic laryngeal muscle is the exception, innervated by the EXTERNAL laryngeal nerve rather than the recurrent laryngeal nerve?", "o": ["Lateral cricoarytenoid", "Posterior cricoarytenoid", "Vocalis", "Cricothyroid"], "c": 3, "r": ["The lateral cricoarytenoid is supplied by the recurrent laryngeal nerve.", "The posterior cricoarytenoid is supplied by the recurrent laryngeal nerve.", "The vocalis is supplied by the recurrent laryngeal nerve.", "Correct. The cricothyroid is uniquely supplied by the external laryngeal nerve; all other intrinsic muscles are supplied by the recurrent laryngeal nerve."], "cat": "Innervation — Laryngeal Nerves", "source": "L26 · Innervation", "obj": "Cricothyroid — external laryngeal exception", "hint": "The tensor is the odd one out.", "quote": "[Maini] 'Cricothyroid is innervated by external laryngeal nerve... all the other muscles by recurrent laryngeal nerve.'"}, {"q": "The superior laryngeal nerve (a branch of the vagus) divides into which two branches?", "o": ["The pharyngeal and lingual branches", "The internal laryngeal nerve and the external laryngeal nerve", "The greater and lesser petrosal nerves", "The recurrent and inferior laryngeal nerves"], "c": 1, "r": ["Pharyngeal and lingual branches are not the divisions of the superior laryngeal nerve.", "Correct. The superior laryngeal nerve splits into an internal laryngeal (sensory) branch and an external laryngeal (motor) branch.", "The petrosal nerves belong to CN VII/IX, not the superior laryngeal nerve.", "The recurrent laryngeal is a separate vagal branch; the inferior laryngeal is its terminal continuation — neither is a division of the superior laryngeal."], "cat": "Innervation — Laryngeal Nerves", "source": "L26 · Superior laryngeal nerve", "obj": "Branches of superior laryngeal nerve", "hint": "Internal (feel) + external (one muscle).", "quote": "[Maini] 'Superior laryngeal nerve divides into two branches: internal laryngeal and external laryngeal.'"}, {"q": "The INTERNAL laryngeal nerve is purely sensory. Which membrane does it pierce to enter the larynx, and what does it supply?", "o": ["It pierces the thyrohyoid membrane and supplies the mucosa DOWN TO the level of the
