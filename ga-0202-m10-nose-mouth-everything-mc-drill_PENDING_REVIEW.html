asopharynx, this is called as choana.\"", "obj": "Nasal cavity — choana", "hint": "Posterior nasal aperture into the nasopharynx."}, {"q": "The external nose has a cartilaginous and a bony framework. Which of the following is part of the CARTILAGINOUS framework?", "o": ["Septal cartilage", "Nasal bone", "Frontal process of the maxilla", "Nasal part of the frontal bone"], "c": 0, "cat": "External Nose — Framework", "r": ["Correct. Maini lists the cartilaginous framework as lateral nasal cartilage, septal cartilage, and greater/lesser alar cartilages.", "The nasal bone is part of the bony framework.", "The frontal process of the maxilla is bony framework.", "The nasal part of the frontal bone is bony framework."], "source": "L23 · External nose framework", "obj": "External nose — cartilages", "hint": "The part of the nose that can be 'deviated.'"}, {"q": "The bony framework of the external nose includes the nasal bones, the nasal part of the frontal bone, and which process of the maxilla?", "o": ["Palatine process of the maxilla", "Zygomatic process of the maxilla", "Alveolar process of the maxilla", "Frontal process of the maxilla"], "c": 3, "cat": "External Nose — Framework", "r": ["The palatine process of the maxilla forms the hard palate / nasal floor, not the external nose.", "The zygomatic process articulates with the zygomatic bone laterally.", "The alveolar process holds the upper teeth.", "Correct. Maini names the frontal process of the maxilla as part of the bony framework of the nose."], "source": "L23 · External nose — bony framework", "obj": "External nose — bones", "hint": "The process that reaches up toward the frontal bone."}, {"q": "The greater and lesser alar cartilages help form the framework around which part of the external nose?", "o": ["The bony bridge (root) of the nose", "The alae (around the nostrils)", "The nasal septum only", "The cribriform plate region"], "c": 1, "cat": "External Nose — Framework", "r": ["The bridge/root is supported by t e ANTERIOR part of the nasal septum?", "o": ["Perpendicular plate of the ethmoid", "Vomer", "Septal cartilage", "Lateral nasal cartilage"], "c": 2, "cat": "Nasal Septum — Bones & Clinical", "r": ["The perpendicular plate of ethmoid forms the posterosuperior bony septum.", "The vomer forms the posteroinferior bony septum.", "Correct. Maini: the septal cartilage 'supports the anterior part of nasal septum.'", "The lateral nasal cartilage supports the lateral wall of the external nose, not the septum."], "source": "L23 · Septal cartilage", "obj": "Nasal septum — anterior support", "hint": "Anterior septum = cartilage."}, {"q": "In a patient with a deviated nasal septum, which part of the septum is typically deviated?", "o": ["The cartilaginous part (septal cartilage)", "The perpendicular plate of the ethmoid", "The vomer", "The nasal crest of the maxilla"], "c": 0, "cat": "Nasal Septum — Bones & Clinical", "r": ["Correct. Maini: 'That is the cartilaginous portion, which is deviated, not the bony part.'", "The perpendicular plate is bone — Maini says it is not the deviated part.", "The vomer is bone — not the deviated part.", "The nasal crest of the maxilla is bone — not the deviated part."], "source": "L23 · Deviated nasal septum", "quote": "[Maini] \"That is the cartilaginous portion, which is deviated, not the bony part.\"", "obj": "Nasal septum — clinical", "hint": "Bone doesn't bend; cartilage does."}, {"q": "Maini describes surgery for a symptomatic deviated septum in which the deviated cartilage is removed and a septoplasty is done. What is this procedure called (abbreviated)?", "o": ["Submucous resection (SMR)", "Functional endoscopic sinus surgery (FESS)", "Caldwell-Luc procedure", "Turbinate (concha) reduction"], "c": 0, "cat": "Nasal Septum — Bones & Clinical", "r": ["Correct. Maini: they 'go for submucous resection, SMR... and do septoplasty.'", "FESS is endoscopic surgery to open sinus drainage pathways, not septal cartilage resection.", "The Caldwell-Luc approach is used to access the maxillary sinus.", "Turbinate reduction shrinks the conchae, not the septum."], "source": "L23 · Deviated septum — SMR", "obj": "Nasal septum — SMR", "hint": "'Sub-mucous' removal of the septal cartilage."}, {"q": "Maini says she likes to 'sneak in' the lacrimal bone as a distractor on septum questions. Which statement about the lacrimal bone is correct?", "o": ["It forms the posterior part of the nasal septum", "It is the main bone of the nasal septum", "It is NOT part of the septum; it helps form the medial orbital wall and the lateral wall of the nasal cavity", "It forms the roof of the nasal cavity"], "c": 2, "cat": "Nasal Septum — Bones & Clinical", "r": ["It is not part of the septum at all.", "The septum's main bones are the perpendicular plate of ethmoid and vomer.", "Correct. Maini: the lacrimal bone 'cannot be a part of septum... it's the orbit and the lateral wall.'", "The roof is formed by cribriform plate, sphenoid, frontal, and nasal bones."], "source": "L23 · Lacrimal bone trap", "quote": "[Maini] \"Lacrimal bone, can it be the part of the septum? No... it's the orbit and the lateral wall.\"", "obj": "Nasal septum — distractor bones", "hint": "Tears + orbit + lateral wall, NOT septum."}, {"q": "Besides the perpendicular plate of ethmoid, vomer, and septal cartilage, which of the following makes a SMALL contribution to the nasal septum?", "o": ["Lacrimal bone", "Inferior nasal concha", "Zygomatic bone", "Nasal crest of the palatine bone"], "c": 3, "cat": "Nasal Septum — Bones & Clinical", "r": ["The lacrimal bone belongs to the orbit and lateral nasal wall, not the septum.", "The inferior nasal concha is a separate bone of the lateral wall, not the septum.", "The zygomatic bone forms the cheek prominence, not the septum.", "Correct. Maini lists small contributors: crest of sphenoid, nasal crest of palatine bone, nasal crest of maxilla, nasal bone, and nasal spine of the frontal bone."], "source": "L23 · Nasal septum — minor bones", "obj": "Nasal septum — minor contributors", "hint": "The palatine bone has a nasal crest."}, {"q": "The floor of the nasal cavity is the same as the roof of the oral cavity (hard palate). Which two bones form it?", "o": ["Palatine process of the maxilla and the vomer", "Palatine process of the maxilla and horizontal plate of the palatine bone", "Horizontal plate of the palatine bone and the body of the sphenoid", "Perpendicular plate of the ethmoid and the maxilla"], "c": 1, "cat": "Nasal Cavity Walls — Roof, Floor, Lateral", "r": ["The vomer is part of the septum, not the floor.", "Correct. Maini: 'floor is same as the roof of oral cavity... maxilla and palatine bone' — the palatine process of the maxilla and the horizontal plate of the palatine bone.", "The body of the sphenoid contributes to the roof, not the floor.", "The perpendicular plate of the ethmoid is part of the septum."], "source": "L23 · Nasal cavity floor (hard palate)", "quote": "[Maini] \"floor is same as the roof of oral cavity... maxilla and palatine bone.\"", "obj": "Nasal floor = hard palate", "hint": "Same two bones as the hard palate."}, {"q": "The roof of the nasal cavity is formed by several bones. Which bone's CRIBRIFORM PLATE forms the part of the roof that transmits the olfactory nerves?", "o": ["Frontal bone", "Sphenoid bone", "Ethmoid bone", "Vomer"], "c": 2, "cat": "Nasal Cavity Walls — Roof, Floor, Lateral", "r": ["The frontal bone contributes to the roof but does not form the cribriform plate.", "The body of the sphenoid forms the posterior roof, not the cribriform plate.", "Correct. The cribriform plate of the ethmoid forms the middle roof and transmits the olfactory nerve fibers.", "The vomer is part of the septum, not the roof."], "source": "L23 · Nasal roof", "obj": "Nasal roof — cribriform plate", "hint": "The sieve-like plate that smell fibers pierce."}, {"q": "Which bones form the roof of the nasal cavity?", "o": ["Maxilla and palatine bone only", "Vomer and perpendicular plate of ethmoid", "Inferior concha and medial pterygoid plate", "Cribriform plate of ethmoid, body of sphenoid, frontal bone, and nasal bone"], "c": 3, "cat": "Nasal Cavity Walls — Roof, Floor, Lateral", "r": ["The maxilla and palatine bone form the floor, not the roof.", "The vomer and perpendicular plate of ethmoid form the septum.", "The inferior concha and medial pterygoid plate are part of the lateral wall.", "Correct. Maini: 'Cribriform plate, sphenoid, frontal, and nasal' form the roof."], "source": "L23 · Nasal roof bones", "obj": "Nasal roof — bones", "hint": "Four bones: cribriform + sphenoid + frontal + nasal."}, {"q": "Which of the following bones contributes to the LATERAL WALL of the nasal cavity?", "o": ["Vomer", "Frontal process of the maxilla", "Body of the sphenoid", "Horizontal plate of the palatine bone"], "c": 1, "cat": "Nasal Cavity Walls — Roof, Floor, Lateral", "r": ["The vomer forms the septum.", "Correct. Maini lists the frontal process of the maxilla among the lateral wall bones.", "The body of the sphenoid forms the posterior roof.", "The horizontal plate of the palatine bone forms the floor."], "source": "L23 · Lateral wall of nasal cavity", "obj": "Lateral wall — bones", "hint": "The same process that helps build the bony external nose."}, {"q": "Maini notes the medial pterygoid plate contributes to the lateral wall of the nasal cavity. The medial pterygoid plate is part of which bone?", "o": ["Sphenoid bone", "Palatine bone", "Maxilla", "Ethmoid bone"], "c": 0, "cat": "Nasal Cavity Walls — Roof, Floor, Lateral", "r": ["Correct. The medial (and lateral) pterygoid plates project from the sphenoid bone.", "The palatine bone contributes its perpendicular plate to the lateral wall, but not the pterygoid plate.", "The maxilla contributes its frontal process to the lateral wall, not the pterygoid plate.", "The ethmoid contributes the superior and middle conchae."], "source": "L23 · Lateral wall — pterygoid plate", "obj": "Lateral wall — sphenoid", "hint": "Pterygoid plates hang off this bone."}, {"q": "The superior and middle nasal conchae are projections of which bone?", "o": ["The maxilla", "The ethmoid bone", "The palatine bone", "The sphenoid bone"], "c": 1, "cat": "Conchae & Meatuses", "r": ["The maxilla forms the floor and part of the lateral wall, not these conchae.", "Correct. Maini: 'superior and middle conchae of the ethmoid bone.'", "The palatine bone contributes its perpendicular plate, not the superior/middle conchae.", "The sphenoid gives the medial pterygoid plate to the lateral wall, not the conchae."], "source": "L23 · Conchae", "quote": "[Maini] \"superior and middle conchae of the ethmoid bone.\"", "obj": "Conchae — ethmoid", "hint": "Two of the three conchae come off one bone."}, {"q": "Which nasal concha is a SEPARATE bone (not part of the ethmoid)?", "o": ["Inferior nasal concha", "Superior nasal concha", "Middle nasal concha", "Supreme nasal concha"], "c": 0, "cat": "Conchae & Meatuses", "r": ["Correct. Maini: 'Inferior nasal concha, which is a separate bone, remember.'", "The superior concha is part of the ethmoid.", "The middle concha is part of the ethmoid.", "A supreme concha, when present, is also an ethmoid projection."], "source": "L23 · Inferior concha", "quote": "[Maini] \"Inferior nasal concha, which is a separate bone, remember.\"", "obj": "Conchae — inferior is separate", "hint": "The lowest concha stands alone as its own bone."}, {"q": "What is the main functional purpose of the nasal conchae?", "o": ["They house the olfactory receptors", "They form the bony septum", "They increase the surface area of the lateral wall to warm and humidify inhaled air", "They anchor the nasolacrimal duct"], "c": 2, "cat": "Conchae & Meatuses", "r": ["Olfactory receptors sit in the roof mucosa, not on the conchae.", "The bony septum is formed by the ethmoid plate, vomer, and septal cartilage.", "Correct. Maini: the conchae 'increase the surface area' so more moisture can be added and the air is humidified.", "The nasolacrimal duct simply opens beneath the inferior concha; the concha does not anchor it."], "source": "L23 · Conchae — function", "obj": "Conchae — function", "hint": "More surface area = more warming/moistening."}, {"q": "The recess located ABOVE (superior to) the superior nasal concha is called the:", "o": ["Superior meatus", "Hiatus semilunaris", "Ethmoidal infundibulum", "Sphenoethmoidal recess"], "c": 3, "cat": "Conchae & Meatuses", "r": ["The superior meatus lies UNDER the superior concha, not above it.", "The hiatus semilunaris is a cleft in the middle meatus.", "The ethmoidal infundibulum leads from the hiatus semilunaris up to the frontal sinus.", "Correct. Maini: 'Superior to superior nasal concha, there is a recess called as sphenoethmoidal recess.'"], "source": "L23 · Sphenoethmoidal recess", "obj": "Meatuses — sphenoethmoidal recess", "hint": "Named for two bones; it sits above the top concha."}, {"q": "The space or pocket located UNDERNEATH each concha is called a:", "o": ["Recess", "Bulla", "Sinus", "Meatus"], "c": 3, "cat": "Conchae & Meatuses", "r": ["'Recess' is used for the sphenoethmoidal recess above the superior concha, not the space under each concha.", "The bulla (ethmoidal bulla) is a specific bulge inside the middle meatus.", "A sinus is an air-filled cavity within a bone that drains into these meatuses.", "Correct. Maini calls the pockets underneath the conchae the superior, middle, and inferior meatuses."], "source": "L23 · Meatuses", "obj": "Meatuses — definition", "hint": "Superior, middle, inferior ___."}, {"q": "How many paranasal air sinuses are there, and which bones contain them?", "o": ["Three — frontal, maxillary, and sphenoid", "Four — frontal, maxillary, palatine, and ethmoid", "Four — frontal, ethmoid, sphenoid, and maxillary", "Five — frontal, ethmoid, sphenoid, maxillary, and lacrimal"], "c": 2, "cat": "Paranasal Sinuses & Drainage", "r": ["There are four, not three — the ethmoid is omitted here.", "The palatine bone has no paranasal sinus.", "Correct. Maini: 'There are 4 of them — frontal, ethmoid, sphenoid, and maxilla,' named for the bones that house them.", "The lacrimal bone has no paranasal sinus."], "source": "L23 · Paranasal sinuses", "obj": "Paranasal sinuses — count / bones", "hint": "Named after the bones that house them."}, {"q": "Unlike the other paranasal sinuses (each with a single opening), the ETHMOID sinus is unusual. How is it organized?", "o": ["As multiple ethmoidal air cells (anterior, middle, posterior groups), each with its own separate opening", "As a single large cavity with one opening", "As a paired cavity draining only into the inferior meatus", "As two cells that both drain into the sphenoethmoidal recess"], "c": 0, "cat": "Paranasal Sinuses & Drainage", "r": ["Correct. Maini: the ethmoid sinus is 'not a single cavity' — it is many air cells in anterior, middle, and posterior groups, each with separate openings.", "That describes the frontal, sphenoid, or maxillary sinus — not the ethmoid.", "The ethmoidal cells drain into several sites (superior and middle meatus), not only the inferior meatus.", "Only the sphenoid sinus drains into the sphenoethmoidal recess."], "source": "L23 · Ethmoidal air cells", "obj": "Ethmoid sinus — air cells", "hint": "A honeycomb of cells, not one room."}, {"q": "The SPHENOID sinus drains into which location?", "o": ["The superior meatus", "The sphenoethmoidal recess", "The middle meatus (hiatus semilunaris)", "The inferior meatus"], "c": 1, "cat": "Paranasal Sinuses & Drainage", "r": ["The superior meatus receives the POSTERIOR ethmoidal air cells.", "Correct. Maini: 'sphenoethmoidal recess contains the opening of sphenoidal air sinus.'", "The middle meatus receives the frontal, maxillary, and anterior/middle ethmoidal cells.", "The inferior meatus receives the nasolacrimal duct."], "source": "L23 · Sphenoid sinus drainage", "obj": "Sinus drainage — sphenoid", "hint": "Drains above the superior concha."}, {"q": "The POSTERIOR ethmoidal air cells drain into which meatus?", "o": ["Superior meatus", "Middle meatus", "Inferior meatus", "Sphenoethmoidal recess"], "c": 0, "cat": "Paranasal Sinuses & Drainage", "r": ["Correct. Maini: 'posterior ethmoidal air cells, they open into the superior meatus.'", "The middle meatus receives the anterior and middle ethmoidal cells (plus frontal and maxillary).", "The inferior meatus receives only the nasolacrimal duct.", "The sphenoethmoidal recess receives the sphenoid sinus."], "source": "L23 · Sinus drainage — posterior ethmoid", "obj": "Sinus drainage — posterior ethmoid", "hint": "Posterior cells → the top meatus."}, {"q": "In the middle meatus, the rounded bulge that carries the openings of the MIDDLE ethmoidal air cells is the:", "o": ["Hiatus semilunaris", "Ethmoidal bulla", "Ethmoidal infundibulum", "Sphenoethmoidal recess"], "c": 1, "cat": "Paranasal Sinuses & Drainage", "r": ["The hiatus semilunaris is the curved cleft below/anterior to the bulla.", "Correct. Maini: the ethmoidal bulla is a bulge (projection of ethmoidal air cells) whose openings drain the MIDDLE ethmoidal cells.", "The ethmoidal infundibulum leads up to the frontal sinus.", "The sphenoethmoidal recess lies above the superior concha."], "source": "L23 · Ethmoidal bulla", "obj": "Middle meatus — ethmoidal bulla", "hint": "'Bulla' = bubble/bulge."}, {"q": "The hiatus semilunaris is a curved cleft in the middle meatus. Which sinus opens at its INFERIOR end?", "o": ["Frontal sinus", "Sphenoid sinus", "Posterior ethmoidal air cells", "Maxillary sinus"], "c": 3, "cat": "Paranasal Sinuses & Drainage", "r": ["The frontal sinus opens at the SUPERIOR end (via the infundibulum).", "The sphenoid sinus drains into the sphenoethmoidal recess, not the hiatus.", "The posterior ethmoidal cells drain into the superior meatus.", "Correct. Maini: 'the inferior end, it has the opening of maxillary sinus.'"], "source": "L23 · Hiatus semilunaris — maxillary", "quote": "[Maini] \"the inferior end, it has the opening of maxillary sinus.\"", "obj": "Hiatus semilunaris — maxillary drainage", "hint": "Bottom of the crescent = the big cheek sinus."}, {"q": "The FRONTAL sinus drains into the middle meatus at the superior end of the hiatus semilunaris, by way of which passage?", "o": ["The sphenoethmoidal recess", "The nasolacrimal duct", "The ethmoidal infundibulum / frontonasal duct", "The pharyngotympanic (auditory) tube"], "c": 2, "cat": "Paranasal Sinuses & Drainage", "r": ["The sphenoethmoidal recess drains the sphenoid sinus.", "The nasolacrimal duct carries tears into the inferior meatus.", "Correct. Maini: the hiatus is 'continuous anteriorly with the ethmoidal infundibulum, which leads to frontal sinus... the frontonasal duct.'", "The auditory tube connects the middle ear to the nasopharynx."], "source": "L23 · Frontal sinus drainage", "obj": "Sinus drainage — frontal", "hint": "A 'funnel' (infundibulum) leading up to the frontal sinus."}, {"q": "The ANTERIOR ethmoidal air cells open into the middle meatus at which part of the hiatus semilunaris?", "o": ["The superior end, with the frontal sinus", "The middle part of the hiatus semilunaris", "The inferior end, with the maxillary sinus", "The sphenoethmoidal recess"], "c": 1, "cat": "Paranasal Sinuses & Drainage", "r": ["The superior end is the frontal sinus opening.", "Correct. Maini places the openings of the anterior ethmoidal cells in the MIDDLE of the hiatus semilunaris.", "The inferior end is the maxillary sinus opening.", "The sphenoethmoidal recess is above the superior concha (sphenoid sinus)."], "source": "L23 · Sinus drainage — anterior ethmoid", "obj": "Sinus drainage — anterior ethmoid", "hint": "Anterior cells sit mid-crescent."}, {"q": "Which structure — NOT a paranasal sinus — opens into the INFERIOR meatus?", "o": ["The maxillary sinus", "The frontal sinus", "The posterior ethmoidal air cells", "The nasolacrimal duct"], "c": 3, "cat": "Paranasal Sinuses & Drainage", "r": ["The maxillary sinus drains into the middle meatus (hiatus semilunaris).", "The frontal sinus drains into the middle meatus.", "The posterior ethmoidal cells drain into the superior meatus.", "Correct. Maini: 'inferior meatus contains the opening of nasolacrimal duct.'"], "source": "L23 · Inferior meatus — nasolacrimal duct", "quote": "[Maini] \"inferior meatus contains the opening of nasolacrimal duct.\"", "obj": "Inferior meatus — nasolacrimal duct", "hint": "Where tears drain when you cry."}, {"q": "A CT shows fluid trapped in the maxillary sinus. Into which meatus does the maxillary sinus normally drain?", "o": ["Middle meatus (via the hiatus semilunaris)", "Superior meatus", "Inferior meatus", "Sphenoethmoidal recess"], "c": 0, "cat": "Paranasal Sinuses & Drainage", "r": ["Correct. The maxillary sinus opens at the inferior end of the hiatus semilunaris in the middle meatus.", "The superior meatus receives the posterior ethmoidal cells.", "The inferior meatus receives the nasolacrimal duct.", "The sphenoethmoidal recess receives the sphenoid sinus."], "source": "L23 · Sinus drainage — maxillary", "obj": "Sinus drainage — maxillary", "hint": "Same crescent as the frontal sinus, but the lower end."}, {"q": "Maini explains that sinusitis can be slow to treat with antibiotics. Why?", "o": ["The sinus mucosa rapidly inactivates antibiotics", "The sinuses have no mucosal lining", "The sinuses are poorly vascularized, so antibiotics take a long time (often ~3 weeks) to reach them", "Antibiotics cannot cross the cribriform plate"], "c": 2, "cat": "Paranasal Sinuses & Drainage", "r": ["Poor blood supply, not enzymatic destruction, is the reason Maini gives.", "The sinuses are lined by respiratory mucosa.", "Correct. Maini: sinusitis is hard to treat 'because they are not very vascularized... you'll need a course for at least 3 weeks.'", "The cribriform plate is irrelevant to antibiotic delivery to the sinuses."], "source": "L23 · Sinusitis — clinical", "obj": "Sinuses — clinical (sinusitis)", "hint": "Poor blood supply = slow drug delivery."}, {"q": "The arterial supply to the nasal cavity comes MAINLY from branches of which two arteries?", "o": ["The facial and lingual arteries", "The maxillary and facial arteries", "The maxillary and ophthalmic arteries", "The ophthalmic and superior thyroid arteries"], "c": 2, "cat": "Nasal Vasculature & Nerves", "r": ["The facial and lingual arteries contribute only minor branches (e.g., the septal branch).", "The facial contributes the septal branch, but the main pair is maxillary + ophthalmic.", "Correct. Maini: nasal supply is 'mainly through the branches of maxillary and ophthalmic arteries.'", "The superior thyroid supplies the thyroid gland and larynx, not the nose."], "source": "L23 · Nasal arterial supply", "obj": "Nasal cavity — arteries", "hint": "One ECA branch (maxillary), one ICA branch (ophthalmic)."}, {"q": "Which two branches of the OPHTHALMIC artery supply the nasal cavity, entering through the ethmoidal foramina?", "o": ["Anterior and posterior ethmoidal arteries", "Sphenopalatine and greater palatine arteries", "Septal and superior labial arteries", "Descending and ascending palatine arteries"], "c": 0, "cat": "Nasal Vasculature & Nerves", "r": ["Correct. Maini names the anterior and posterior ethmoidal arteries as the ophthalmic branches to the nose.", "The sphenopalatine and greater palatine arteries are branches of the MAXILLARY artery.", "The septal artery is a branch of the superior labial (facial) artery.", "The palatine arteries mainly supply the palate."], "source": "L23 · Nasal arteries — ophthalmic branches", "obj": "Nasal cavity — ophthalmic branches", "hint": "Named for the bone whose foramina they pass through."}, {"q": "Kiesselbach's area (Little's area) is the common site of anterior epistaxis. It is the anastomosis of the sphenopalatine, ethmoidal, and which additional artery?", "o": ["The greater palatine artery only", "The middle meningeal artery", "The descending palatine artery", "The septal branch (of the superior labial branch of the facial artery)"], "c": 3, "cat": "Nasal Vasculature & Nerves", "r": ["The greater palatine artery does contribute, but the artery Maini emphasizes for this plexus is the septal (facial) branch.", "The middle meningeal supplies the dura, not the nasal septum.", "The descending palatine supplies the palate.", "Correct. Maini: the septal artery, 'a branch of superior labial of the facial artery,' joins the sphenopalatine and ethmoidal arteries in Kiesselbach's plexus."], "source": "L23 · Kiesselbach's plexus / epistaxis", "obj": "Nasal cavity — Kiesselbach's area", "hint": "Includes a branch of the facial artery's superior labial branch."}, {"q": "A patient has profuse anterior nosebleeds from Kiesselbach's area. Where is this anastomotic plexus located, and what is its clinical significance?", "o": ["In the sphenoethmoidal recess; it is the most common site of sinusitis", "In the anterior nasal septum/vestibule; it is the most common site of epistaxis", "In the inferior meatus; it is where the nasolacrimal duct bleeds", "In the roof; it is where CSF leaks after trauma"], "c": 1, "cat": "Nasal Vasculature & Nerves", "r": ["Sinusitis relates to sinus drainage, not this arterial plexus.", "Correct. Maini: Kiesselbach's (Little's) area lies anteriorly in the septum/vestibule and is 'a common site of epistaxis,' treated with anterior nasal packing.", "The nasolacrimal duct carries tears, not this arterial anastomosis.", "CSF rhinorrhea relates to cribriform plate fracture, not Kiesselbach's plexus."], "source": "L23 · Kiesselbach's area — location", "obj": "Nasal cavity — epistaxis site", "hint": "Anterior septum; nosebleed central."}, {"q": "The olfactory nerves reach the olfactory mucosa in the roof of the nasal cavity by passing through which structure?", "o": ["The sphenoethmoidal recess", "The nasolacrimal duct", "The choana", "The cribriform plate of the ethmoid"], "c": 3, "cat": "Nasal Vasculature & Nerves", "r": ["The sphenoethmoidal recess is a sinus-drainage recess, not an olfactory passage.", "The nasolacrimal duct carries tears.", "The choana is the posterior nasal aperture.", "Correct. Maini: 'olfactory nerves pass through cribriform plate... supply the olfactory mucosa.'"], "source": "L23 · Olfactory nerve", "obj": "Nasal cavity — olfactory nerve", "hint": "A sieve-like plate in the roof."}, {"q": "General (touch/pain) sensation of the nasal cavity is carried by which two divisions of the trigeminal nerve?", "o": ["Maxillary (V2) and mandibular (V3) divisions", "Ophthalmic (V1) and maxillary (V2) divisions", "Ophthalmic (V1) and mandibular (V3) divisions", "The facial nerve (VII) alone"], "c": 1, "cat": "Nasal Vasculature & Nerves", "r": ["The mandibular division (V3) supplies the lower face and tongue, not the nasal cavity.", "Correct. Maini: general sensation is via 'the ophthalmic and maxillary divisions, V1 and V2,' with V1 anterior and V2 posterior.", "V3 does not supply the nasal cavity.", "The facial nerve carries taste and facial muscle control, not general nasal sensation."], "source": "L23 · Nasal cavity — general sensation", "obj": "Nasal cavity — trigeminal sensation", "hint": "The two upper divisions of CN V."}, {"q": "Maini lists the four types of lingual papillae. Which set is correct?", "o": ["Filiform, fungiform, palatine, and circumvallate", "Foliate, fungiform, conical, and lingual", "Filiform, fungiform, foliate, and circumvallate (vallate)", "Circumvallate, filiform, tonsillar, and vallate"], "c": 2, "cat": "Tongue — Papillae & Taste", "r": ["'Palatine' papillae is not one of the four types.", "'Conical' and 'lingual' are not among Maini's four types.", "Correct. Maini names filiform, fungiform, foliate, and circumvallate (vallate) papillae.", "'Tonsillar' is not a papilla type, and vallate = circumvallate (a duplicate)."], "source": "L25 · Lingual papillae", "obj": "Tongue — papilla types", "hint": "Fili-, fungi-, foli-, and circumvallate."}, {"q": "Which papillae are arranged in a V-shaped row just anterior to the terminal sulcus and hold taste buds in a surrounding 'well'?", "o": ["Circumvallate (vallate) papillae", "Filiform papillae", "Fungiform papillae", "Foliate papillae"], "c": 0, "cat": "Tongue — Papillae & Taste", "r": ["Correct. Maini: the circumvallate papillae lie 'parallel to the terminal sulcus,' with taste buds located within the well of the papilla.", "Filiform papillae are scattered over the dorsum and are keratinized.", "Fungiform papillae sit near the tip and periphery.", "Foliate papillae are folds along the posterolateral tongue."], "source": "L25 · Circumvallate papillae", "obj": "Tongue — circumvallate papillae", "hint": "'Vallate' = walled; they sit in a moat anterior to the sulcus."}, {"q": "According to Maini, which papillae are located close to the TIP and peripheral part of the tongue?", "o": ["Fungiform papillae", "Circumvallate papillae", "Filiform papillae", "Foliate papillae"], "c": 0, "cat": "Tongue — Papillae & Taste", "r": ["Correct. Maini: 'fungiform papillae... are located close to the tip of the tongue and peripheral part.'", "Circumvallate papillae lie in a V anterior to the terminal sulcus (posteriorly).", "Filiform papillae are scattered over the whole dorsum.", "Foliate papillae are along the posterolateral tongue."], "source": "L25 · Fungiform papillae", "obj": "Tongue — fungiform papillae", "hint": "Mushroom-shaped, near the tip."}, {"q": "Which papillae are scattered throughout the DORSUM of the tongue?", "o": ["Circumvallate papillae", "Fungiform papillae", "Filiform papillae", "Foliate papillae"], "c": 2, "cat": "Tongue — Papillae & Taste", "r": ["Circumvallate papillae form a discrete V-shaped row, not a scatter.", "Fungiform papillae cluster near the tip and periphery.", "Correct. Maini: 'filiform papillae, they are scattered throughout the dorsum of the tongue.'", "Foliate papillae are localized to the posterolateral folds."], "source": "L25 · Filiform papillae", "obj": "Tongue — filiform papillae", "hint": "Thread-like; blanket the whole dorsum."}, {"q": "The V-shaped groove that separates the anterior two-thirds from the posterior one-third of the tongue is the:", "o": ["Median sulcus", "Hiatus semilunaris", "Lingual frenulum", "Terminal sulcus (sulcus terminalis)"], "c": 3, "cat": "Tongue — Papillae & Taste", "r": ["The median sulcus runs front-to-back in the midline, not as a dividing V.", "The hiatus semilunaris is in the nasal cavity, not the tongue.", "The lingual frenulum tethers the tongue to the floor of the mouth.", "Correct. Maini: the terminal sulcus is the V-shaped sulcus separating anterior 2/3 from posterior 1/3."], "source": "L25 · Terminal sulcus", "obj": "Tongue — terminal sulcus", "hint": "A backward-pointing 'V.'"}, {"q": "At the apex of the terminal sulcus lies a small blind pit that is a remnant of the thyroglossal duct. It is called the:", "o": ["Foramen ovale", "Foramen cecum", "Sphenoethmoidal recess", "Lingual frenulum"], "c": 1, "cat": "Tongue — Papillae & Taste", "r": ["The foramen ovale transmits V3 through the skull base.", "Correct. Maini: the foramen cecum marks where the thyroglossal duct/thyroid diverticulum arose; it is a blind pit ('does not lead to another cavity').", "The sphenoethmoidal recess is in the nasal cavity.", "The lingual frenulum is a mucosal fold, not a pit."], "source": "L25 · Foramen cecum", "quote": "[Maini] \"this is the point where thyroglossal duct originally was... the remnant is foramen cecum.\"", "obj": "Tongue — foramen cecum", "hint": "Blind pit; marks the thyroid gland's origin."}, {"q": "Maini teaches that all taste receptors work similarly, so the tongue tells tastes apart by receptor LOCATION. Where are receptors for SWEET taste concentrated?", "o": ["Along the posterior part of the tongue", "In the central part of the tongue", "Near the tip of the tongue", "Along the peripheral sides of the dorsum"], "c": 2, "cat": "Tongue — Papillae & Taste", "r": ["The posterior tongue is where bitter is appreciated.", "The central part is for umami.", "Correct. Maini: 'The receptors for sweet taste... are located close to the tip of the tongue.'", "The peripheral sides of the dorsum are for sour."], "source": "L25 · Taste map — sweet", "obj": "Tongue — taste localization (sweet)", "hint": "The tip."}, {"q": "According to Maini's taste map, BITTER taste is appreciated along which part of the tongue?", "o": ["The tip of the tongue", "The sides of the tip", "The central part of the tongue", "The posterior part of the tongue"], "c": 3, "cat": "Tongue — Papillae & Taste", "r": ["The tip is for sweet.", "The sides of the tip are for salty.", "The central part is for umami.", "Correct. Maini: 'bitter taste, it is tasted along the posterior part of the tongue.'"], "source": "L25 · Taste map — bitter", "obj": "Tongue — taste localization (bitter)", "hint": "The back of the tongue."}, {"q": "Maini links each taste to a chemical class. UMAMI taste (localized centrally) is produced by which chemicals?", "o": ["Monosaccharides such as glucose", "Amino acids (protein-rich foods)", "Hydrogen ions (acids)", "Sodium ions"], "c": 1, "cat": "Tongue — Papillae & Taste", "r": ["Monosaccharides give the SWEET taste.", "Correct. Maini: umami 'comes from the amino acid component' of protein-rich foods.", "Hydrogen ions/acids give the SOUR taste.", "Sodium ions give the SALTY taste."], "source": "L25 · Taste — umami", "obj": "Tongue — umami taste", "hint": "The savory fifth taste, from proteins."}, {"q": "A substance that is acidic (contains hydrogen ions) produces which taste?", "o": ["Sour", "Bitter", "Salty", "Umami"], "c": 0, "cat": "Tongue — Papillae & Taste", "r": ["Correct. Maini: 'anything that is acidic will taste sour' (hydrogen ions).", "Bitter is produced by alkaloids.", "Salty is produced by sodium ions.", "Umami is produced by amino acids."], "source": "L25 · Taste — sour", "obj": "Tongue — sour taste", "hint": "Acids = H+ ions."}, {"q": "By Maini's scheme, which taste is produced by SODIUM ions and localized to the sides of the tip of the tongue?", "o": ["Sweet", "Salty", "Bitter", "Sour"], "c": 1, "cat": "Tongue — Papillae & Taste", "r": ["Sweet is from carbohydrates, at the tip.", "Correct. Maini: 'anything that has sodium ions will taste salty,' toward the sides of the tip.", "Bitter is from alkaloids, at the posterior tongue.", "Sour is from acids/hydrogen ions."], "source": "L25 · Taste — salty", "obj": "Tongue — salty taste", "hint": "Na+ ions, sides of the tip."}, {"q": "The anterior two-thirds of the tongue develops from which pharyngeal arch?", "o": ["The first pharyngeal arch", "The second pharyngeal arch", "The third pharyngeal arch", "The fourth pharyngeal arch"], "c": 0, "cat": "Tongue — Papillae & Taste", "r": ["Correct. Maini: 'most of the anterior two-thirds is first arch' (hence V3/lingual general sensation).", "Taste buds of the anterior tongue trace to the second arch (facial nerve), but the tongue mucosa itself is first-arch.", "The posterior one-third develops from the third arch.", "The fourth arch contributes to the root/epiglottic region, not the anterior tongue."], "source": "L25 · Tongue development", "obj": "Tongue — development (anterior 2/3)", "hint": "Anterior = arch 1 (V3 territory)."}, {"q": "Which EXTRINSIC tongue muscle originates from the mental spine (genial tubercle) of the mandible, is fan-shaped, and forms the main bulk of the tongue?", "o": ["Hyoglossus", "Styloglossus", "Genioglossus", "Palatoglossus"], "c": 2, "cat": "Tongue — Muscles", "r": ["Hyoglossus arises from the hyoid bone.", "Styloglossus arises from the styloid process.", "Correct. Maini: genioglossus 'originates from mental spine of the mandible... main bulk of the tongue is formed by this muscle.'", "Palatoglossus arises from the palatine aponeurosis."], "source": "L25 · Genioglossus", "obj": "Tongue — genioglossus origin", "hint": "'Genio-' = chin (mandible)."}, {"q": "Based on its fiber direction, what are the actions of the genioglossus?", "o": ["Retraction and elevation of the tongue", "Retraction and depression of the tongue", "Elevation and protrusion of the tongue", "Protrusion (posterior fibers) and depression (anterior fibers) of the tongue"], "c": 3, "cat": "Tongue — Muscles", "r": ["Retraction/elevation of the posterior tongue is styloglossus.", "Depression + retraction is hyoglossus.", "Genioglossus does not elevate the tongue.", "Correct. Maini: 'the action of genioglossus is protrusion and depression' (posterior fibers protrude, anterior fibers depress)."], "source": "L25 · Genioglossus action", "obj": "Tongue — genioglossus action", "hint": "Sticks the tongue OUT and pulls it DOWN."}, {"q": "The hyoglossus muscle originates from which bone?", "o": ["The styloid process of the temporal bone", "The mental spine of the mandible", "The palatine aponeurosis", "The body and greater horn of the hyoid bone"], "c": 3, "cat": "Tongue — Muscles", "r": ["The styloid process is the origin of styloglossus.", "The mental spine is the origin of genioglossus.", "The palatine aponeurosis is the origin of palatoglossus.", "Correct. Maini: 'Hyoglossus originates from body and greater horn of the hyoid bone, as the name suggests.'"], "source": "L25 · Hyoglossus origin", "obj": "Tongue — hyoglossus origin", "hint": "'Hyo-' = hyoid bone."}, {"q": "What are the actions of the hyoglossus?", "o": ["Protrusion and depression", "Elevation and protrusion", "Depression and retraction of the tongue", "Elevation and retraction"], "c": 2, "cat": "Tongue — Muscles", "r": ["Protrusion + depression is genioglossus.", "Hyoglossus does not elevate the tongue.", "Correct. Maini: the action of hyoglossus is 'retraction, depression.'", "Retraction with ELEVATION of the posterior tongue is styloglossus."], "source": "L25 · Hyoglossus action", "obj": "Tongue — hyoglossus action", "hint": "Pulls the tongue DOWN and BACK."}, {"q": "Maini calls the hyoglossus the 'fence muscle.' Why?", "o": ["It separates the nerves (hypoglossal and lingual) behind it from the arteries (lingual artery and branches) in front of it", "It fences off the oral cavity from the oropharynx", "It separates the tongue from the soft palate", "It walls off the submandibular gland from the sublingual gland"], "c": 0, "cat": "Tongue — Muscles", "r": ["Correct. Maini: 'Fence muscle because it separates nerves from arteries' — nerves lie posterior, arteries anterior.", "Closing the oropharyngeal isthmus is the job of palatoglossus, not hyoglossus.", "Separating tongue from palate is not the meaning of the 'fence.'", "The hyoglossus does not divide the salivary glands."], "source": "L25 · Hyoglossus — fence muscle", "quote": "[Maini] \"Fence muscle because it separates nerves from arteries.\"", "obj": "Tongue — hyoglossus relations", "hint": "A curtain: nerves behind, arteries in front."}, {"q": "The styloglossus originates from the styloid process (and stylohyoid ligament). What are its actions?", "o": ["Protrusion and depression", "Retraction and elevation of the posterior part of the tongue", "Depression and retraction", "Protrusion and elevation"], "c": 1, "cat": "Tongue — Muscles", "r": ["Protrusion + depression is genioglossus.", "Correct. Maini: styloglossus produces 'retraction and elevation of the posterior part of the tongue.'", "Depression + retraction is hyoglossus.", "Styloglossus retracts and elevates, it does not protrude."], "source": "L25 · Styloglossus action", "obj": "Tongue — styloglossus action", "hint": "Pulls the tongue UP and BACK for swallowing."}, {"q": "The palatoglossus draws the tongue and soft palate together to close the oropharyngeal isthmus during chewing. From what does it originate?", "o": ["The palatine aponeurosis of the soft palate", "The styloid process", "The greater horn of the hyoid", "The mental spine of the mandible"], "c": 0, "cat": "Tongue — Muscles", "r": ["Correct. Maini: palatoglossus 'originates from palatine aponeurosis of the soft palate.'", "The styloid process is the origin of styloglossus.", "The greater horn of the hyoid is the origin of hyoglossus.", "The mental spine is the origin of genioglossus."], "source": "L25 · Palatoglossus origin", "obj": "Tongue/palate — palatoglossus", "hint": "It belongs to the palate (palatine aponeurosis)."}, {"q": "Which four muscles are the INTRINSIC muscles of the tongue (which alter its shape)?", "o": ["Genioglossus, hyoglossus, styloglossus, and palatoglossus", "Superior longitudinal, inferior longitudinal, transverse, and vertical", "Superior and inferior longitudinal, oblique, and circular", "Transverse, vertical, palatoglossus, and genioglossus"], "c": 1, "cat": "Tongue — Muscles", "r": ["Those four are the EXTRINSIC muscles of the tongue.", "Correct. Maini: the intrinsic muscles are superior longitudinal, inferior longitudinal, transverse, and vertical.", "'Oblique' and 'circular' are not tongue muscles.", "Palatoglossus and genioglossus are extrinsic, not intrinsic."], "source": "L25 · Intrinsic tongue muscles", "obj": "Tongue — intrinsic muscles", "hint": "They run in different planes to reshape the tongue."}, {"q": "All tongue muscles are innervated by the hypoglossal nerve (CN XII) EXCEPT one. Which is the exception, and what innervates it?", "o": ["Genioglossus — innervated by the vagus nerve (CN X)", "Styloglossus — innervated by the glossopharyngeal nerve (CN IX)", "Hyoglossus — innervated by the lingual nerve (V3)", "Palatoglossus — innervated by the vagus nerve (CN X)"], "c": 3, "cat": "Tongue — Innervation, Vessels & Lymph", "r": ["Genioglossus is CN XII.", "Styloglossus is CN XII.", "Hyoglossus is CN XII; the lingual nerve is sensory, not motor to it.", "Correct. Maini's 'exception rule': all tongue muscles are CN XII except palatoglossus, which is CN X (it is really a palatine muscle)."], "source": "L25 · Tongue muscle innervation", "quote": "[Maini] \"all the tongue muscles are innervated by 12th nerve, except for palatoglossus... 10th nerve.\"", "obj": "Tongue — motor innervation", "hint": "The 'palato-' one belongs to the palate → CN X."}, {"q": "GENERAL (touch/pain) sensation from the ANTERIOR two-thirds of the tongue is carried by which nerve?", "o": ["The chorda tympani of the facial nerve", "The glossopharyngeal nerve", "The lingual branch of V3 (mandibular division of the trigeminal nerve)", "The hypoglossal nerve"], "c": 2, "cat": "Tongue — Innervation, Vessels & Lymph", "r": ["The chorda tympani carries TASTE (special sensation), not general sensation.", "CN IX carries both general and taste sensation from the POSTERIOR 1/3.", "Correct. Maini: anterior 2/3 GSA fibers are 'carried by lingual branch of V3.'", "CN XII is purely motor to the tongue."], "source": "L25 · Tongue — anterior 2/3 general sensation", "obj": "Tongue — general sensation (ant. 2/3)", "hint": "Trigeminal, lower division (lingual nerve)."}, {"q": "Where are the cell bodies of the general sensory (GSA) fibers from the anterior two-thirds of the tongue located?", "o": ["The geniculate ganglion", "The trigeminal ganglion", "The inferior (petrosal) ganglion of CN IX", "The submandibular ganglion"], "c": 1, "cat": "Tongue — Innervation, Vessels & Lymph", "r": ["The geniculate ganglion holds the taste (SVA) cell bodies for the anterior 2/3 (facial nerve).", "Correct. Maini: GSA fibers travel with V3, so their cell bodies are in the trigeminal ganglion.", "The inferior ganglion of CN IX holds posterior-1/3 cell bodies.", "The submandibular ganglion is a parasympathetic (motor) ganglion, not a sensory one."], "source": "L25 · GSA cell bodies — trigeminal ganglion", "obj": "Tongue — GSA cell bodies", "hint": "Any V branch reports to the three-pronged ganglion."}, {"q": "TASTE (special sensation) from the anterior two-thirds of the tongue is carried by the chorda tympani (a branch of CN VII). Where are its cell bodies?", "o": ["The trigeminal ganglion", "The submandibular ganglion", "The otic ganglion", "The geniculate ganglion"], "c": 3, "cat": "Tongue — Innervation, Vessels & Lymph", "r": ["The trigeminal ganglion holds the GSA (general sensation) cell bodies.", "The submandibular ganglion is parasympathetic (secretomotor), not sensory.", "The otic ganglion is parasympathetic for the parotid gland.", "Correct. Maini: the SVA (taste) fibers of the anterior 2/3 travel via chorda tympani (facial) with cell bodies in the geniculate ganglion."], "source": "L25 · Tongue — taste (ant. 2/3) cell bodies", "obj": "Tongue — taste cell bodies (ant. 2/3)", "hint": "Chorda tympani = facial → geniculate ganglion."}, {"q": "BOTH general sensation and taste from the POSTERIOR one-third of the tongue are carried by which single nerve?", "o": ["The glossopharyngeal nerve (CN IX)", "The vagus nerve (CN X)", "The facial nerve (CN VII)", "The lingual nerve (V3)"], "c": 0, "cat": "Tongue — Innervation, Vessels & Lymph", "r": ["Correct. Maini: posterior 1/3 GSA and SVA fibers 'are carried by glossopharyngeal' (9th nerve).", "The vagus supplies only a tiny region near the epiglottis/root, not the posterior 1/3 proper.", "The facial nerve (chorda tympani) serves taste of the ANTERIOR 2/3.", "The lingual nerve (V3) serves general sensation of the anterior 2/3."], "source": "L25 · Tongue — posterior 1/3", "obj": "Tongue — posterior 1/3 innervation", "hint": "CN IX handles the back third (both modalities)."}, {"q": "The lingual artery, which supplies the tongue, is a branch of which artery?", "o": ["The internal carotid artery", "The facial artery", "The external carotid artery (its second branch)", "The maxillary artery"], "c": 2, "cat": "Tongue — Innervation, Vessels & Lymph", "r": ["The internal carotid gives no branches in the neck.", "The facial artery is a separate (third anterior) branch of the ECA, not the parent of the lingual.", "Correct. Maini: the lingual artery is the 'second branch of external carotid' (order: Superior thyroid, Lingual, Facial).", "The maxillary artery is a terminal branch of the ECA."], "source": "L25 · Lingual artery", "obj": "Tongue — arterial supply", "hint": "S-L-F: Superior thyroid, Lingual, Facial."}, {"q": "Lymph from the TIP of the tongue drains primarily to which nodes?", "o": ["Submandibular lymph nodes", "Superior deep cervical lymph nodes", "Submental lymph nodes", "Parotid lymph nodes"], "c": 2, "cat": "Tongue — Innervation, Vessels & Lymph", "r": ["The submandibular nodes drain the sides of the tongue.", "The superior deep cervical nodes drain the posterior 1/3 (and midline).", "Correct. Maini: 'From the tip of the tongue, lymph goes to submental lymph nodes.'", "The parotid nodes drain the scalp/face region, not the tongue tip."], "source": "L25 · Tongue lymphatics — tip", "obj": "Tongue — lymph drainage (tip)", "hint": "Under the chin (sub-MENTAL)."}, {"q": "Lymph from the POSTERIOR one-third of the tongue drains to which nodes?", "o": ["Superior deep cervical lymph nodes", "Submental lymph nodes", "Submandibular lymph nodes", "Parotid lymph nodes"], "c": 0, "cat": "Tongue — Innervation, Vessels & Lymph", "r": ["Correct. Maini: 'posterior one-third... goes to superior deep cervical lymph nodes.'", "The submental nodes drain the tip.", "The submandibular nodes drain the sides.", "The parotid nodes are not the tongue's drainage."], "source": "L25 · Tongue lymphatics — posterior", "obj": "Tongue — lymph drainage (posterior)", "hint": "Deep cervical chain, high up."}, {"q": "When the palatoglossus contracts, it draws the tongue and soft palate together. Which opening does this close during chewing?", "o": ["The choana", "The laryngeal inlet", "The pharyngeal isthmus", "The oropharyngeal isthmus"], "c": 3, "cat": "Palate & Oral Floor", "r": ["The choana is the posterior nasal aperture.", "The laryngeal inlet is guarded by the epiglottis/aryepiglottic folds.", "The pharyngeal isthmus (between naso- and oropharynx) is closed by the soft palate + superior constrictor, not palatoglossus.", "Correct. Maini: palatoglossus closes the oropharyngeal isthmus so food is not swallowed before being chewed."], "source": "L25 · Oropharyngeal isthmus", "obj": "Palate — oropharyngeal isthmus", "hint": "The gateway from mouth to oropharynx."}, {"q": "The palatoglossus muscle and its overlying mucosa form which arch on each side of the oropharyngeal isthmus?", "o": ["The palatopharyngeal arch", "The palatoglossal arch", "The pharyngoepiglottic fold", "The salpingopharyngeal fold"], "c": 1, "cat": "Palate & Oral Floor", "r": ["The palatopharyngeal arch is formed by the palatopharyngeus, behind the tonsil.", "Correct. Maini: the palatoglossus 'forms this palatoglossal arch on two sides.'", "The pharyngoepiglottic fold is near the epiglottis.", "The salpingopharyngeal fold overlies the auditory tube muscle in the nasopharynx."], "source": "L25 · Palatoglossal arch", "obj": "Palate — palatoglossal arch", "hint": "Named for the two structures it links (palate + tongue)."}, {"q": "The lingual frenulum is a midline mucosal fold that connects:", "o": ["The tongue to the soft palate", "The soft palate to the pharyngeal wall", "The tongue to the epiglottis", "The inferior surface of the tongue to the floor of the mouth"], "c": 3, "cat": "Palate & Oral Floor", "r": ["Tongue-to-soft-palate is bridged by the palatoglossal arch.", "Soft palate to pharyngeal wall involves the palatopharyngeal arch.", "Tongue-to-epiglottis is bridged by the glossoepiglottic folds.", "Correct. Maini: the lingual frenulum connects the (posterior/inferior) surface of the tongue with the floor of the mouth."], "source": "L25 · Lingual frenulum", "obj": "Oral floor — lingual frenulum", "hint": "Tethers the underside of the tongue to the floor."}, {"q": "Of the three pairs of major salivary glands, which is the LARGEST?", "o": ["The submandibular gland", "The parotid gland", "The sublingual gland", "The von Ebner (lingual) gland"], "c": 1, "cat": "Salivary Glands", "r": ["The submandibular gland is smaller than the parotid (though it makes more saliva).", "Correct. Maini: 'Parotid glands are the largest.'", "The sublingual gland is the smallest of the three major pairs.", "Von Ebner glands are tiny serous glands on the tongue, not a major pair."], "source": "L25 · Salivary glands — largest", "obj": "Salivary glands — parotid largest", "hint": "The gland that swells in mumps."}, {"q": "According to Maini, which salivary gland contributes the GREATEST proportion (~60%) of total salivary secretion?", "o": ["The parotid gland", "The sublingual gland", "The submandibular gland", "The accessory palatal glands"], "c": 2, "cat": "Salivary Glands", "r": ["The parotid, though largest, contributes ~30% per Maini.", "The sublingual contributes ~7-8%.", "Correct. Maini: the submandibular glands are 'responsible for 60% of the total salivary secretion.'", "The palatal accessory glands contribute only ~1-2%."], "source": "L25 · Salivary secretion proportions", "obj": "Salivary glands — submandibular %", "hint": "Biggest producer, though not the biggest gland."}, {"q": "The parotid gland receives its PARASYMPATHETIC (secretomotor) supply from which cranial nerve?", "o": ["The glossopharyngeal nerve (CN IX)", "The facial nerve (CN VII)", "The vagus nerve (CN X)", "The trigeminal nerve (CN V)"], "c": 0, "cat": "Salivary Glands", "r": ["Correct. Maini: parotid parasympathetics come from CN IX ('P is parotid, 9 is a mirror image of P').", "CN VII supplies the submandibular and sublingual glands.", "CN X supplies thoracic/abdominal viscera, not the parotid.", "CN V (auriculotemporal) only carries the postganglionic fibers the last stretch; the source is CN IX."], "source": "L25 · Parotid — parasympathetic", "quote": "[Maini] \"P is parotid, 9 is almost a mirror image of P... 9th nerve, glossopharyngeal.\"", "obj": "Salivary glands — parotid PS (CN IX)", "hint": "P ↔ 9."}, {"q": "In the parotid parasympathetic pathway, the fibers synapse in which ganglion before traveling to the gland?" var audioMode='continuous';

function playFromHere(){
  var audio=document.getElementById('mk-audio');
  if(!audio||idx>=questions.length)return;
  var bankId=questions[idx]._bankId;
  if(bankId===undefined||TIMESTAMPS[bankId]===undefined)return;
  var seekTo;if(TIMESTAMPS[bankId]===undefined||TIMESTAMPS[bankId]<=0){var f=null;for(var di=1;di<TIMESTAMPS.length;di++){var hi=bankId+di,lo=bankId-di;if(TIMESTAMPS[hi]>0){f=TIMESTAMPS[hi];break;}if(TIMESTAMPS[lo]>0){f=TIMESTAMPS[lo];break;}}if(f===null)return;seekTo=Math.max(0,f-2);}else{seekTo=Math.max(0,TIMESTAMPS[bankId]-2);}
  // FAB M01 lectures.mp3 split: L01 (0-4800s, 80min) / L02 (4800-10817s, 100min) / L03 (10817-18943s, 135min).
  // Swap audio source if needed BEFORE seeking, since each lecture file is its own duration.
  var L01='https://dgsc23.github.io/dc-study-audio/fab-201-m02-shoulder-forearm-L04.mp3';
  var L02='https://dgsc23.github.io/dc-study-audio/fab-201-m02-shoulder-forearm-L05.mp3';
  var L03='https://dgsc23.github.io/dc-study-audio/fab-201-m02-shoulder-forearm-L06.mp3';
  var s=audio.querySelector('source');
  var part=seekTo<4800?'L01':(seekTo<10817?'L02':'L03');
  var targetURL=part==='L01'?L01:(part==='L02'?L02:L03);
  var targetSec=part==='L01'?seekTo:(part==='L02'?(seekTo-4800):(seekTo-10817));
  var hasL01=s&&/-L01\.mp3/.test(s.src);
  var hasL02=s&&/-L02\.mp3/.test(s.src);
  var hasL03=s&&/-L03\.mp3/.test(s.src);
  var currentMatches=(part==='L01'&&hasL01)||(part==='L02'&&hasL02)||(part==='L03'&&hasL03);
  if(s&&!currentMatches){
    s.src=targetURL;audio.load();
    audio.addEventListener('loadedmetadata',function once(){
      audio.currentTime=targetSec;audio.play();
      audio.removeEventListener('loadedmetadata',once);
    });
    return;
  }
  audio.currentTime=targetSec;audio.play();
}

function skipAudio(sec){

function buildReaskBar(){
  var bar=document.getElementById('reask-banner');
  if(!bar)return;
  var missed=[];
  if(typeof answerMap!=='undefined'){
    for(var k in answerMap){if(answerMap.hasOwnProperty(k)&&!answerMap[k].isCorrect)missed.push(k);}
  }
  if(reaskMode&&missed.length>0){
    bar.style.display='block';
    bar.innerHTML='⚠️ '+missed.length+' MISSED — <button onclick="drillMissed()">DRILL MISSED NOW</button>';
  } else {
    bar.style.display='none';
  }
}

function drillMissed(){
  var missed=[];
  for(var k in answerMap){if(answerMap.hasOwnProperty(k)&&!answerMap[k].isCorrect)missed.push(parseInt(k));}
  if(missed.length===0)return;
  questions=missed.map(function(id){return BANK[id];});
  for(var i=questions.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1));var t=questions[i];questions[i]=questions[j];questions[j]=t;}
  idx=0;score=0;attempts=0;answerMap={};answerHistory=[];
  render();
}

var fabCurrentSpeed = 1.0;
function fabSetSpeed(val) {
  val = Math.round(val * 100) / 100;
  if (val < 0.25) val = 0.25;
  if (val > 3.0) val = 3.0;
  fabCurrentSpeed = val;
  document.querySelectorAll('audio').forEach(function(a){ a.playbackRate = val; });
  var d = document.getElementById('speed-display');
  if (d) d.textContent = val.toFixed(2) + 'x';
  document.querySelectorAll('.btn-speed-preset').forEach(function(b){
    var pv = parseFloat(b.textContent);
    b.classList.toggle('active', Math.abs(pv - val) < 0.001);
  });
}
// Re-apply rate whenever any audio element plays
(function(){
  var _origPlay = HTMLMediaElement.prototype.play;
  HTMLMediaElement.prototype.play = function(){
    if (this.tagName === 'AUDIO') this.playbackRate = fabCurrentSpeed;
    return _origPlay.apply(this, arguments);
  };
})();


var fabTranscriptOn = false;
function fabToggleTranscript() {
  fabTranscriptOn = !fabTranscriptOn;
  var box = document.getElementById('transcript-box');
  var btn = document.getElementById('btn-transcript');
  if (box) box.classList.toggle('show', fabTranscriptOn);
  if (btn) btn.classList.toggle('active', fabTranscriptOn);
  if (fabTranscriptOn) fabUpdateTranscript();
}
function fabUpdateTranscript() {
  if (!fabTranscriptOn) return;
  var box = document.getElementById('transcript-box');
  if (!box) return;
  if (typeof idx !== 'number' || typeof questions === 'undefined' || idx >= questions.length) {
    box.innerHTML = '<em>Drill complete.</em>';
    return;
  }
  var q = questions[idx];
  var cat = q.cat || '';
  var lines = fabTranscript[cat] || [];
  if (!lines.length) {
    box.innerHTML = '<em>No transcript lines for ' + cat + '.</em>';
    return;
  }
  var quote = (q.quote || '').toLowerCase().replace(/[^a-z0-9 ]/g, '');
  var quoteWords = quote.split(' ').filter(function(w){ return w.length > 3; });
  var html = '<strong>' + cat + '</strong><br>';
  for (var i = 0; i < lines.length; i++) {
    var lineLow = lines[i].toLowerCase().replace(/[^a-z0-9 ]/g, '');
    var hits = 0;
    for (var w = 0; w < quoteWords.length; w++) {
      if (lineLow.indexOf(quoteWords[w]) !== -1) hits++;
    }
    var match = quoteWords.length > 0 && hits >= Math.ceil(quoteWords.length * 0.4);
    if (match) html += '<span class="t-highlight">\u25b6 ' + lines[i] + '</span><br>';
    else html += lines[i] + '<br>';
  }
  box.innerHTML = html;
}
// Hook transcript update into render + renderHistoryItem
(function(){
  var _r = render;
  render = function(){ var rv = _r.apply(this, arguments); fabUpdateTranscript(); return rv; };
  var _rh = renderHistoryItem;
  renderHistoryItem = function(){ var rv = _rh.apply(this, arguments); fabUpdateTranscript(); return rv; };
})();

<script id="audio-bar-minimize-js">
(function(){
  var LS_KEY_MIN = 'fab_audio_bar_collapsed';
  function applyState(ab){
    var collapsed = localStorage.getItem(LS_KEY_MIN) === '1';
    if (collapsed) ab.classList.add('collapsed'); else ab.classList.remove('collapsed');
    var btn = ab.querySelector('.btn-minimize-audio');
    if (btn) btn.textContent = collapsed ? '▸' : '▾';
    if (btn) btn.title = collapsed ? 'Expand audio bar' : 'Minimize audio bar';
  }
  function attachButton(ab){
    if (ab.querySelector('.btn-minimize-audio')) return;
    var btn = document.createElement('button');
    btn.className = 'btn-minimize-audio';
    btn.type = 'button';
    btn.onclick = function(){
      var now = ab.classList.toggle('collapsed');
      localStorage.setItem(LS_KEY_MIN, now ? '1' : '0');
      btn.textContent = now ? '▸' : '▾';
      btn.title = now ? 'Expand audio bar' : 'Minimize audio bar';
    };
    ab.appendChild(btn);
    applyState(ab);
  }
  // Poll until audio-bar appears, attach, then keep watching in case it gets re-rendered
  var tries = 0;
  var iv = setInterval(function(){
    var ab = document.getElementById('audio-bar');
    if (ab) {
      attachButton(ab);
      applyState(ab);
    }
    tries++;
    if (tries > 1200) clearInterval(iv); // ~2 min safety cap
  }, 100);
})();
</script>

<script id="ga0202-m01-transcript-loader">
var fabTranscriptLines = [];
window.fabTranscriptOn = false;
function fabFetchTranscript(cb){ cb(); }
function fabParseTimestamp(line){
    var m = line.match(/^\[(\d+):(\d+)\]/);
    if (!m) return null;
    return parseInt(m[1],10) * 60 + parseInt(m[2],10);
}
function fabUpdateTranscript(){
    if (!window.fabTranscriptOn) return;
    var box = document.getElementById('transcript-box');
    if (!box) return;
    fabFetchTranscript(function(){
        if (!fabTranscriptLines || !fabTranscriptLines.length){
            box.innerHTML = '<em style="color:#f87171">Transcript file not found.</em>';
            return;
        }
        if (typeof idx !== 'number' || typeof BANK === 'undefined' || idx >= BANK.length){
            box.innerHTML = '<em>Drill complete.</em>';
            return;
        }
        var q = BANK[idx];
        var srcMatch = (q.source || '').match(/(\d+):(\d+)/);
        var targetSec = srcMatch ? parseInt(srcMatch[1],10)*60 + parseInt(srcMatch[2],10) : 0;
        // Use TIMESTAMPS array if available (more accurate)
        if (typeof TIMESTAMPS !== 'undefined' && TIMESTAMPS[idx] !== undefined) {
            targetSec = Math.round(TIMESTAMPS[idx]);
        }
        var bestIdx = 0;
        for (var i = 0; i < fabTranscriptLines.length; i++){
            var ts = fabParseTimestamp(fabTranscriptLines[i]);
            if (ts === null) continue;
            if (ts <= targetSec) bestIdx = i; else break;
        }
        var startIdx = Math.max(0, bestIdx - 2);
        var endIdx = Math.min(fabTranscriptLines.length, bestIdx + 6);
        var srcLabel = (q.source || '').split('@').pop().trim();
        var html = '<strong>Audio @ ' + srcLabel + ' &middot; ' + (q.cat||'') + '</strong><br>';
        for (var j = startIdx; j < endIdx; j++){
            var line = fabTranscriptLines[j];
            var safe = line.replace(/</g,'&lt;').replace(/>/g,'&gt;');
            if (j === bestIdx) html += '<span class="t-highlight">&#9654; ' + safe + '</span><br>';
            else html += safe + '<br>';
        }
        box.innerHTML = html;
    });
}
function fabToggleTranscript(){
    var box = document.getElementById('transcript-box');
    var btn = document.getElementById('btn-transcript');
    if (!box) return;
    window.fabTranscriptOn = !window.fabTranscriptOn;
    if (window.fabTranscriptOn){
        box.classList.add('show');
        if (btn) btn.classList.add('active');
        fabUpdateTranscript();
    } else {
        box.classList.remove('show');
        if (btn) btn.classList.remove('active');
    }
}
</script>

  function readCurrentQ() {
    const qText = (document.querySelector('.q-text')?.innerText || '').replace(/^Q\d+(\s+of\s+\d+)?:\s*/, '');

  function mdToHtml(md){

      .replace(/(^|\n)### (.+)/g, '$1<h3>$2</h3>')
      .replace(/`([^`]+)`/g, '<code>$1</code>')
      .replace(/^\s*[-*]\s+(.+)$/gm, '<li>$1</li>')
      .replace(/(<li>.*?<\/li>(\s*<li>.*?<\/li>)*)/gs, '<ul>$1</ul>');
    html = html.split(/\n{2,}/).map(p => {
      if (p.trim().startsWith('<ul') || p.trim().startsWith('<h3')) return p;
      if (p.trim() === '') return '';
      return '<p>' + p.replace(/\n/g, '<br>') + '</p>';
    }).join('');
    return html;
  }

  function stripForTts(text){
    // Remove markdown markers so TTS doesn't read them aloud
    return text
      .replace(/\*\*/g, '')
      .replace(/`([^`]+)`/g, '$1')
      .replace(/^\s*[-*]\s+/gm, '')
      .replace(/^#+\s+/gm, '')
      .replace(/\n{2,}/g, '. ')
      .replace(/\s+/g, ' ')

        b.classList.remove('playing');
        b.innerHTML = '🔊 Read';
      });
      currentUtter = null;
      return;
    }
    window.speechSynthesis.cancel();
    document.querySelectorAll('.fab-ai-tts-btn.playing').forEach(b => {
      b.classList.remove('playing');
      b.innerHTML = '🔊 Read';
    });
    const u = new SpeechSynthesisUtterance(stripForTts(rawText));

    const letter = (i) => String.fromCharCode(65 + i);
    let prompt = "I'm studying GA 0202 (Head & Neck Anatomy) with Dr. Maini at SCUHS. Drill question:\n\n";
    prompt += 'Q: ' + ctx.question + '\n\n';
    if (ctx.options && ctx.options.length) {
      ctx.options.forEach((o, i) => {
        const m = [];
        if (i === ctx.picked) m.push('PICKED');
        if (i === ctx.correct) m.push('CORRECT');
        prompt += letter(i) + '. ' + o + (m.length ? ' ('+m.join(', ')+')' : '') + '\n';
      });
      prompt += '\n';
    }
    if (ctx.profTip) prompt += 'DRILL TIP: ' + ctx.profTip + '\n\n';
    if (userQ) prompt += 'MY QUESTION: ' + userQ + '\n\n';
    prompt += 'Explain using a dumbed-down analogy + mnemonic.';
    navigator.clipboard.writeText(prompt).then(() => {
      appendStatus('✓ Prompt copied to clipboard. Backend not configured yet — paste into your AI chat.');
    }).catch(() => {
      appendStatus('Could not copy. Please select manually.', true);
    });
  }

  async function sendMessage(userText) {
    const ctx = readCurrentQ();
    currentQKey = qKey(ctx);
    appendMsg('user', userText);
    history.push({ role: 'user', content: userText });
    appendLoading();

    const payload = Object.assign({}, ctx, {
      userQuestion: userText,
      history: history.slice(-10), // last 10 turns for context
      className: CLASS_NAME, // worker uses this to load class-specific knowledge
    });
    const result = await callWorker(payload);
    removeLoading();
    if (result.clipboardFallback) {
      clipboardFallback(ctx, userText);
      return;
    }
    if (result.error) {
      appendStatus('Error: ' + result.error, true);
      return;
    }
    appendMsg('ai', result.reply);
    history.push({ role: 'model', content: result.reply });
  }

  window.fabAiFollowupSend = function() {
    const ta = document.getElementById('fabAiFollowup');
    const q = (ta && ta.value || '').trim();
    if (!q) return;
    ta.value = '';
    sendMessage(q);
  };

  // Button install — opens panel, does NOT auto-call AI
  function install() {
    if (document.getElementById('fabAiBtn')) return;
    const btn = document.createElement('button');
    btn.className = 'fab-ai-btn';
    btn.id = 'fabAiBtn';
    btn.textContent = '🩺';
    btn.title = 'Open AI Study Tutor';
    btn.onclick = () => openPanel();
    document.body.appendChild(btn);
  }
  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', install);
  } else {
    install();
  }
})();
</script>

<script id="search-and-jump-js">
(function(){
  var _searchBar=null,_searchTimer=null,_searchKbdIdx=-1,_lastResults=[],_lastQuery='';

  function _esc(s){
    return (s==null?'':String(s)).replace(/[<>&"']/g,function(c){
      return {'<':'&lt;','>':'&gt;','&':'&amp;','"':'&quot;',"'":'&#39;'}[c];
    });
  }

  function _buildSearchBar(){
    var wrap=document.createElement('div');
    wrap.id='search-bar';
    wrap.className='search-bar';
    wrap.innerHTML=''
      +'<div class="search-input-wrap" id="search-input-wrap">'
      +  '<span class="search-icon">🔍</span>'
      +  '<input type="text" id="search-input" class="search-input" placeholder="Search questions, topics, sources... (↑/↓ + Enter)" autocomplete="off" spellcheck="false">'
      +  '<button class="search-clear" id="search-clear" type="button" title="Clear (Esc)">✕</button>'
      +'</div>'
      +'<div class="search-results" id="search-results"></div>';
    return wrap;
  }

  function _ensureSearchAttached(){
    var app=document.getElementById('app');
    if(!app)return;
    if(!_searchBar){
      _searchBar=_buildSearchBar();
      _wireSearchHandlers();
    }
    var card=app.querySelector('.card');
    if(card){
      if(_searchBar.parentNode!==card.parentNode){
        card.parentNode.insertBefore(_searchBar,card);
      }
    } else {
      // No card (e.g. summary screen) — detach
      if(_searchBar.parentNode)_searchBar.parentNode.removeChild(_searchBar);
    }
  }

  function _highlight(text,query){
    if(!text)return '';
    if(!query)return _esc(text);
    var qLow=query.toLowerCase();
    var tLow=String(text).toLowerCase();
    var i=tLow.indexOf(qLow);
    if(i===-1)return _esc(text);
    var end=i+query.length;
    return _esc(text.substring(0,i))+'<mark>'+_esc(text.substring(i,end))+'</mark>'+_esc(text.substring(end));
  }

  function _searchBank(query){
    var q=(query||'').toLowerCase().trim();
    if(!q||typeof BANK==='undefined')return [];
    var results=[];
    for(var i=0;i<BANK.length;i++){
      var item=BANK[i];
      var qText=(item.q||'').toLowerCase();
      var cat=(item.cat||'').toLowerCase();
      var src=(item.source||'').toLowerCase();
      var quote=(item.quote||'').toLowerCase();
      var tip=(item.profTip||'').toLowerCase();
      if(qText.indexOf(q)>=0||cat.indexOf(q)>=0||src.indexOf(q)>=0||quote.indexOf(q)>=0||tip.indexOf(q)>=0){
        results.push({_bankId:i,q:item.q,cat:item.cat});
        if(results.length>=10)break;
      }
    }
    return results;
  }

  function _renderSearchResults(query){
    var ul=document.getElementById('search-results');
    if(!ul)return;
    _lastQuery=query;
    if(!query.trim()){
      ul.classList.remove('open');
      ul.innerHTML='';
      _lastResults=[];_searchKbdIdx=-1;
      return;
    }
    var matches=_searchBank(query);
    _lastResults=matches;
    _searchKbdIdx=-1;
    if(matches.length===0){
      ul.innerHTML='<div class="search-empty">No matches for "'+_esc(query)+'"</div>';
      ul.classList.add('open');
      return;
    }
    var html='';
    for(var i=0;i<matches.length;i++){
      var m=matches[i];
      var stem=(m.q||'');
      var truncStem=stem.length>110?stem.substring(0,110)+'…':stem;
      html+='<div class="search-result" data-bank-id="'+m._bankId+'" data-idx="'+i+'">'
        +'<span class="sr-num">Q'+(m._bankId+1)+'</span>'
        +'<span class="sr-cat">'+_esc(m.cat||'')+'</span>'
        +_highlight(truncStem,query)
        +'</div>';
    }
    if(matches.length===10){
      html+='<div class="search-hint">Showing top 10 — refine to narrow</div>';
    }
    ul.innerHTML=html;
    ul.classList.add('open');
    var nodes=ul.querySelectorAll('.search-result');
    nodes.forEach(function(node){
      node.addEventListener('mousedown',function(e){
        // mousedown so it fires before input blur clears state
        e.preventDefault();
        var bankId=parseInt(node.getAttribute('data-bank-id'),10);
        _doJump(bankId);
      });
    });
  }

  function _doJump(bankId){
    if(typeof navJump!=='function')return;
    var inp=document.getElementById('search-input');
    var ul=document.getElementById('search-results');
    if(inp)inp.value='';
    if(ul){ul.classList.remove('open');ul.innerHTML='';}
    _lastResults=[];_searchKbdIdx=-1;_lastQuery='';
    navJump(bankId);
    // Scroll to top of card after jump so user sees the question
    setTimeout(function(){
      var card=document.querySelector('.card');
      if(card&&card.scrollIntoView)card.scrollIntoView({behavior:'smooth',block:'start'});
    },80);
  }

  function _highlightKbd(){
    var ul=document.getElementById('search-results');
    if(!ul)return;
    var nodes=ul.querySelectorAll('.search-result');
    nodes.forEach(function(n,i){n.classList.toggle('kbd',i===_searchKbdIdx);});
    if(_searchKbdIdx>=0&&nodes[_searchKbdIdx]){
      nodes[_searchKbdIdx].scrollIntoView({block:'nearest'});
    }
  }

  function _wireSearchHandlers(){
    var inp=_searchBar.querySelector('#search-input');
    var wrap=_searchBar.querySelector('#search-input-wrap');
    var clr=_searchBar.querySelector('#search-clear');
    inp.addEventListener('focus',function(){
      wrap.classList.add('focused');
      if(_lastQuery&&_lastResults.length>0){
        var ul=document.getElementById('search-results');
        if(ul)ul.classList.add('open');
      }
    });
    inp.addEventListener('blur',function(){
      setTimeout(function(){wrap.classList.remove('focused');},150);
    });
    inp.addEventListener('input',function(){
      if(_searchTimer)clearTimeout(_searchTimer);
      var v=inp.value;
      _searchTimer=setTimeout(function(){_renderSearchResults(v);},200);
    });
    inp.addEventListener('keydown',function(e){
      var ul=document.getElementById('search-results');
      if(e.key==='Escape'){
        if(inp.value){
          inp.value='';
          if(ul){ul.classList.remove('open');ul.innerHTML='';}
          _lastResults=[];_searchKbdIdx=-1;_lastQuery='';
        } else {
          inp.blur();
        }
      } else if(e.key==='ArrowDown'){
        if(_lastResults.length===0)return;
        e.preventDefault();
        _searchKbdIdx=Math.min(_lastResults.length-1,_searchKbdIdx+1);
        _highlightKbd();
      } else if(e.key==='ArrowUp'){
        if(_lastResults.length===0)return;
        e.preventDefault();
        _searchKbdIdx=Math.max(-1,_searchKbdIdx-1);
        _highlightKbd();
      } else if(e.key==='Enter'){
        if(_lastResults.length===0)return;
        e.preventDefault();
        var pick=_searchKbdIdx>=0?_lastResults[_searchKbdIdx]:_lastResults[0];
        if(pick)_doJump(pick._bankId);
      }
    });
    clr.addEventListener('click',function(){
      inp.value='';
      var ul=document.getElementById('search-results');
      if(ul){ul.classList.remove('open');ul.innerHTML='';}
      _lastResults=[];_searchKbdIdx=-1;_lastQuery='';
      inp.focus();
    });
    document.addEventListener('click',function(e){
      if(!_searchBar)return;
      if(!_searchBar.contains(e.target)){
        var ul=document.getElementById('search-results');
        if(ul)ul.classList.remove('open');
      }
    });
    // Global "/" keybind to focus search (matches GitHub-style search UX)
    document.addEventListener('keydown',function(e){
      if(e.key==='/'&&document.activeElement!==inp){
        var tag=(document.activeElement&&document.activeElement.tagName||'').toLowerCase();
        if(tag==='input'||tag==='textarea')return;
        e.preventDefault();
        inp.focus();
      }
    });
  }

  function _wrapRender(){
    if(typeof render!=='function')return;
    var origR=render;
    render=function(){
      if(_searchBar&&_searchBar.parentNode)_searchBar.parentNode.removeChild(_searchBar);
      origR();
      _ensureSearchAttached();
    };
    if(typeof renderHistoryItem==='function'){
      var origH=renderHistoryItem;
      renderHistoryItem=function(){
        if(_searchBar&&_searchBar.parentNode)_searchBar.parentNode.removeChild(_searchBar);
        origH();
        _ensureSearchAttached();
      };
    }
    if(typeof showSummary==='function'){
      var origS=showSummary;
      showSummary=function(){
        if(_searchBar&&_searchBar.parentNode)_searchBar.parentNode.removeChild(_searchBar);
        origS();
        // intentionally no re-attach on summary
      };
    }
  }

  function _bootSearch(){
    _wrapRender();
    _ensureSearchAttached();
  }

  // Wait until other render overrides (audio bar etc.) finish wiring
  if(document.readyState==='complete'||document.readyState==='interactive'){
    setTimeout(_bootSearch,100);
  } else {
    document.addEventListener('DOMContentLoaded',function(){setTimeout(_bootSearch,100);});
  }
})();
</script>
