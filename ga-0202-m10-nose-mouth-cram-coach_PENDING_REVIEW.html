  { id: 8, topic: "Nasal septum", src: "Maini · Nasal Septum", q: "Which two structures form the bony posterior majority of the nasal septum?", opts: ["Septal cartilage and vomer", "Perpendicular plate of the ethmoid and the vomer", "Cribriform plate and sphenoid crest", "Palatine and lacrimal bones"], a: 1, h1: "One is a plate of the ethmoid.", h2: "Ethmoid plate plus the plough-shaped bone.", exp: "The perpendicular plate of the ethmoid and the vomer form the bony posterior majority of the septum." },
  { id: 9, topic: "Nasal septum", src: "Maini · Nasal Septum", q: "The ANTERIOR part of the nasal septum is supported by...", opts: ["The vomer", "The perpendicular plate of the ethmoid", "The septal cartilage", "The palatine bone"], a: 2, h1: "The anterior part is not bone.", h2: "It is cartilage.", exp: "The septal cartilage supports the anterior part of the nasal septum." },
  { id: 10, topic: "Nasal septum", src: "Maini · Nasal Septum", q: "In a deviated nasal septum, which part typically deviates?", opts: ["The cartilaginous part", "The vomer", "The perpendicular plate of the ethmoid", "The nasal crest of the maxilla"], a: 0, h1: "Bone rarely bends; this part does.", h2: "It is the cartilage.", exp: "A deviated nasal septum is usually the cartilaginous part, not the bony part (fixed by SMR plus septoplasty)." },
  { id: 11, topic: "Nasal septum", src: "Maini · Nasal Septum", q: "Maini 'sneaks in' the lacrimal bone as a distractor. Which statement is correct?", opts: ["The lacrimal bone forms most of the septum", "The lacrimal bone is NOT part of the septum; it forms the medial orbital wall and part of the lateral nasal wall", "The lacrimal bone forms the roof of the nasal cavity", "The lacrimal bone forms the nasal floor"], a: 1, h1: "It belongs to the orbit and lateral wall.", h2: "It can never be septum.", exp: "The lacrimal bone forms the medial orbital wall and part of the lateral nasal wall — never the septum." },
  { id: 12, topic: "Nasal walls", src: "Maini · Nasal Cavity", q: "The floor of the nasal cavity (the hard palate) is formed by which two bones?", opts: ["Vomer and ethmoid", "Body of sphenoid and frontal bone", "Palatine process of the maxilla and horizontal plate of the palatine bone", "Cribriform plate and nasal bone"], a: 2, h1: "Same as the roof of the mouth.", h2: "Maxilla plus palatine bone.", exp: "The floor equals the hard palate: the palatine process of the maxilla plus the horizontal plate of the palatine bone." },
  { id: 13, topic: "Nasal walls", src: "Maini · Nasal Cavity", q: "Which bone's CRIBRIFORM PLATE forms part of the roof and transmits the olfactory nerves?", opts: ["Sphenoid", "Frontal", "Vomer", "Ethmoid"], a: 3, h1: "The same bone gives the superior and middle conchae.", h2: "It is the ethmoid.", exp: "The cribriform plate of the ethmoid forms the middle roof and transmits the olfactory nerve fibers." },
  { id: 14, topic: "Nasal walls", src: "Maini · Nasal Cavity", q: "Which four bones form the ROOF of the nasal cavity?", opts: ["Maxilla, palatine, vomer, ethmoid", "Cribriform plate of ethmoid, body of sphenoid, frontal, and nasal", "Nasal, lacrimal, maxilla, palatine", "Vomer, ethmoid plate, sphenoid crest, palatine"], a: 1, h1: "Front to back across the top.", h2: "Cribriform, sphenoid, frontal, nasal.", exp: "The roof is the cribriform plate of the ethmoid, the body of the sphenoid, the frontal bone, and the nasal bone." },
  { id: 15, topic: "Conchae", src: "Maini · Nasal Cavity", q: "The superior and middle conchae belong to which bone, and which concha is a separate bone?", opts: ["Ethmoid; the inferior concha is separate", "Maxilla; the superior concha is separate", "Palatine; the middle concha is separate", "Sphenoid; the inferior concha is separate"], a: 0, h1: "Two are part of one bone; one stands alone.", h2: "Superior and middle are ethmoid.", exp: "The superior and middle conchae are ethmoid; the inferior concha is a separate bone." },
  { id: 16, topic: "Conchae", src: "Maini · Nasal Cavity", q: "The recess located ABOVE the superior concha is the...", opts: ["Superior meatus", "Hiatus semilunaris", "Sphenoethmoidal recess", "Ethmoidal infundibulum"], a: 2, h1: "It receives the sphenoid sinus.", h2: "Its name blends sphenoid and ethmoid.", exp: "The sphenoethmoidal recess lies above the superior concha and receives the sphenoid sinus." },
  { id: 17, topic: "Conchae", src: "Maini · Nasal Cavity", q: "The space UNDERNEATH each concha is called a...", opts: ["Recess", "Meatus", "Bulla", "Sinus"], a: 1, h1: "There is a superior, middle, and inferior one.", h2: "Under a concha sits a meatus.", exp: "The pocket underneath each concha is a meatus (superior, middle, inferior)." },
  { id: 18, topic: "Sinuses", src: "Maini · Paranasal Sinuses", q: "How many paired paranasal sinuses are there, and in which bones?", opts: ["Three: frontal, sphenoid, maxillary", "Four: frontal, ethmoid, sphenoid, maxillary", "Four: frontal, ethmoid, sphenoid, palatine", "Five, including the lacrimal"], a: 1, h1: "Do not forget the ethmoid.", h2: "Four sinuses in four bones.", exp: "There are four paired sinuses: frontal, ethmoid, sphenoid, and maxillary." },
  { id: 19, topic: "Sinuses", src: "Maini · Paranasal Sinuses", q: "The ETHMOID sinus is unusual because it is...", opts: ["A single large cavity", "Multiple air cells (anterior, middle, posterior), each with its own opening", "Absent at birth and never develops", "Drained only by the inferior meatus"], a: 1, h1: "It is not one cavity.", h2: "Many little cells in groups.", exp: "The ethmoid sinus is many ethmoidal air cells in anterior, middle, and posterior groups, each with a separate opening." },
  { id: 20, topic: "Sinuses", src: "Maini · Paranasal Sinuses", q: "The SPHENOID sinus drains into...", opts: ["The inferior meatus", "The middle meatus", "The sphenoethmoidal recess", "The superior meatus"], a: 2, h1: "Its name matches its drainage site.", h2: "The recess above the superior concha.", exp: "The sphenoid sinus drains into the sphenoethmoidal recess." },
  { id: 21, topic: "Sinuses", src: "Maini · Paranasal Sinuses", q: "The POSTERIOR ethmoidal air cells drain into the...", opts: ["Superior meatus", "Middle meatus", "Inferior meatus", "Sphenoethmoidal recess"], a: 0, h1: "Anterior and middle cells go to the middle meatus.", h2: "The posterior group goes one level up.", exp: "The posterior ethmoidal air cells drain into the superior meatus." },
  { id: 22, topic: "Sinuses", src: "Maini · Paranasal Sinuses", q: "Which sinus opens at the INFERIOR end of the hiatus semilunaris?", opts: ["Frontal", "Sphenoid", "Maxillary", "Posterior ethmoid"], a: 2, h1: "The frontal is at the superior end.", h2: "The biggest sinus, at the bottom of the cleft.", exp: "The maxillary sinus opens at the inferior end of the hiatus semilunaris (middle meatus)." },
  { id: 23, topic: "Sinuses", src: "Maini · Paranasal Sinuses", q: "Which structure, which is NOT a sinus, opens into the INFERIOR meatus?", opts: ["Frontal sinus", "Maxillary sinus", "Nasolacrimal duct", "Sphenoid sinus"], a: 2, h1: "It carries tears, not air.", h2: "The tear duct.", exp: "The nasolacrimal duct (tears) opens into the inferior meatus — it is not a paranasal sinus." },
  { id: 24, topic: "Sinuses", src: "Maini · Paranasal Sinuses", q: "The MIDDLE ethmoidal air cells open onto which structure in the middle meatus?", opts: ["The hiatus semilunaris", "The ethmoidal bulla", "The sphenoethmoidal recess", "The ethmoidal infundibulum"], a: 1, h1: "It is a rounded bulge.", h2: "A 'bubble' of ethmoid cells.", exp: "The ethmoidal bulla, a rounded bulge, carries the openings of the middle ethmoidal air cells." },
  { id: 25, topic: "Sinuses", src: "Maini · Paranasal Sinuses", q: "Maini says sinusitis is slow to clear with antibiotics because the sinuses are...", opts: ["Highly vascular", "Poorly vascularized, so drugs take about three weeks to reach them", "Completely sealed off from the nose", "Protected by the cribriform plate"], a: 1, h1: "It is a blood-supply issue.", h2: "Poor vascularity means slow delivery.", exp: "The sinuses are poorly vascularized, so antibiotics take a long time (often about three weeks) to reach them." },
  { id: 26, topic: "Nasal vessels", src: "Maini · Nasal Cavity", q: "Arterial supply to the nasal cavity comes mainly from branches of which two arteries?", opts: ["Facial and lingual", "Maxillary and ophthalmic", "Superior thyroid and facial", "The internal carotid only"], a: 1, h1: "One is a terminal branch of the external carotid; one comes off the internal carotid system.", h2: "Maxillary plus ophthalmic.", exp: "The nasal cavity is supplied mainly by branches of the maxillary and ophthalmic arteries." },
  { id: 27, topic: "Nasal vessels", src: "Maini · Nasal Cavity", q: "Kiesselbach's (Little's) area, the most common site of anterior epistaxis, is located...", opts: ["In the posterior nasopharynx", "On the cribriform plate", "In the anterior nasal septum", "In the maxillary sinus"], a: 2, h1: "It is where fingers reach.", h2: "The front of the septum.", exp: "Kiesselbach's / Little's area lies in the anterior nasal septum and is the number-one epistaxis site." },
  { id: 28, topic: "Nasal nerves", src: "Maini · Nasal Cavity", q: "General (touch and pain) sensation of the nasal cavity is carried by which trigeminal divisions?", opts: ["V2 and V3", "V3 only", "Ophthalmic (V1) and maxillary (V2)", "V1 and V3"], a: 2, h1: "V3 supplies the lower face and tongue, not the nose.", h2: "The upper two divisions.", exp: "General nasal sensation is carried by the ophthalmic (V1, anterior) and maxillary (V2, posterior) divisions." },
  { id: 29, topic: "Papillae", src: "Maini · Tongue", q: "Which lingual papillae are scattered over the dorsum and carry NO taste buds?", opts: ["Filiform", "Fungiform", "Circumvallate", "Foliate"], a: 0, h1: "They are keratinized and mechanical.", h2: "Thread-like, all over the dorsum.", exp: "Filiform papillae are scattered over the dorsum, are keratinized, and hold no taste buds." },
  { id: 30, topic: "Papillae", src: "Maini · Tongue", q: "Which papillae form a V-shaped row just anterior to the terminal sulcus, with taste buds in a surrounding 'well'?", opts: ["Fungiform", "Filiform", "Foliate", "Circumvallate (vallate)"], a: 3, h1: "They are large and few.", h2: "They line up in a V.", exp: "The circumvallate (vallate) papillae form a V-shaped row anterior to the terminal sulcus, with taste buds in the well." },
  { id: 31, topic: "Tongue landmarks", src: "Maini · Tongue", q: "The V-shaped groove dividing the anterior two-thirds from the posterior one-third of the tongue is the...", opts: ["Median sulcus", "Terminal sulcus", "Lingual frenulum", "Hiatus semilunaris"], a: 1, h1: "It runs as a V, not front-to-back.", h2: "'Terminal' names it.", exp: "The terminal sulcus (sulcus terminalis) is the V-shaped divider between the anterior two-thirds and posterior one-third." },
  { id: 32, topic: "Tongue landmarks", src: "Maini · Tongue", q: "At the apex of the terminal sulcus is a blind pit, a remnant of the thyroglossal duct, called the...", opts: ["Foramen cecum", "Foramen ovale", "Lingual frenulum", "Sphenoethmoidal recess"], a: 0, h1: "It is a blind pit, leading nowhere.", h2: "Where the thyroid began.", exp: "The foramen cecum, at the apex of the terminal sulcus, marks the origin of the thyroglossal duct." },
  { id: 33, topic: "Taste map", src: "Maini · Tongue", q: "On Maini's taste map, SWEET is concentrated...", opts: ["At the posterior tongue", "Near the tip", "On the sides", "Centrally"], a: 1, h1: "The friendliest taste sits up front.", h2: "The tip.", exp: "On Maini's location map, sweet is concentrated near the tip of the tongue." },
  { id: 34, topic: "Taste map", src: "Maini · Tongue", q: "On Maini's taste map, BITTER is appreciated...", opts: ["At the tip", "On the sides of the tip", "At the posterior tongue", "Centrally"], a: 2, h1: "It is the last-ditch 'spit it out' taste.", h2: "The back.", exp: "Bitter is appreciated along the posterior part of the tongue." },
  { id: 35, topic: "Taste chemistry", src: "Maini · Tongue", q: "UMAMI taste (central) is produced by which chemical class?", opts: ["Sodium ions", "Amino acids", "Hydrogen ions", "Monosaccharides"], a: 1, h1: "Think savory, protein-rich food.", h2: "The building blocks of protein.", exp: "Umami comes from amino acids in protein-rich foods." },
  { id: 36, topic: "Tongue muscles", src: "Maini · Tongue", q: "Which extrinsic tongue muscle arises from the mental spine of the mandible and forms the main bulk of the tongue?", opts: ["Hyoglossus", "Styloglossus", "Genioglossus", "Palatoglossus"], a: 2, h1: "'Genio-' means chin.", h2: "From the mental spine, fan-shaped.", exp: "The genioglossus arises from the mental spine of the mandible and is the main bulk of the tongue." },
  { id: 37, topic: "Tongue muscles", src: "Maini · Tongue", q: "Based on its fiber direction, the genioglossus chiefly produces...", opts: ["Retraction and elevation", "Protrusion and depression", "Elevation only", "Depression and retraction"], a: 1, h1: "Posterior fibers push it out; anterior fibers pull it down.", h2: "It sticks the tongue out.", exp: "The genioglossus protrudes (posterior fibers) and depresses (anterior fibers) the tongue." },
  { id: 38, topic: "Tongue muscles", src: "Maini · Tongue", q: "Maini calls the hyoglossus the 'fence muscle' because it...", opts: ["Separates the tongue from the palate", "Closes the oropharyngeal isthmus", "Separates the nerves (behind it) from the arteries (in front of it)", "Divides the salivary glands"], a: 2, h1: "A fence stands between two things.", h2: "Nerves on one side, arteries on the other.", exp: "The hyoglossus separates the nerves (hypoglossal and lingual, behind) from the arteries (lingual, in front)." },
  { id: 39, topic: "Tongue muscles", src: "Maini · Tongue", q: "The styloglossus (from the styloid process) produces...", opts: ["Protrusion and depression", "Retraction and elevation of the posterior tongue", "Depression and retraction", "Shape change only"], a: 1, h1: "It pulls up and back from the styloid.", h2: "Retract and elevate.", exp: "The styloglossus retracts and elevates the posterior part of the tongue." },
  { id: 40, topic: "Tongue muscles", src: "Maini · Tongue", q: "Which set are the INTRINSIC muscles of the tongue (they change its shape)?", opts: ["Genioglossus, hyoglossus, styloglossus, palatoglossus", "Superior longitudinal, inferior longitudinal, transverse, vertical", "Superior and inferior constrictors", "Oblique and circular"], a: 1, h1: "Intrinsic = shape, extrinsic = move.", h2: "Named by fiber direction.", exp: "The intrinsic muscles are the superior longitudinal, inferior longitudinal, transverse, and vertical." },
  { id: 41, topic: "Tongue nerves", src: "Maini · Tongue", q: "All tongue muscles are motor-supplied by CN XII EXCEPT one. Which, and by what nerve?", opts: ["Genioglossus — CN VII", "Hyoglossus — CN IX", "Palatoglossus — vagus (CN X)", "Styloglossus — CN V"], a: 2, h1: "The exception is really a palatine muscle.", h2: "Palatoglossus rides the vagus.", exp: "Every tongue muscle is CN XII except the palatoglossus, which is supplied by the vagus (CN X)." },
  { id: 42, topic: "Tongue nerves", src: "Maini · Tongue", q: "GENERAL sensation of the anterior two-thirds of the tongue is carried by...", opts: ["The chorda tympani (CN VII)", "The lingual branch of V3 (cell bodies in the trigeminal ganglion)", "The glossopharyngeal nerve", "The hypoglossal nerve"], a: 1, h1: "General is touch/pain, not taste.", h2: "It rides V3.", exp: "General sensation of the anterior two-thirds is the lingual branch of V3 (trigeminal ganglion)." },
  { id: 43, topic: "Tongue nerves", src: "Maini · Tongue", q: "BOTH general sensation and taste from the posterior one-third of the tongue are carried by...", opts: ["The glossopharyngeal nerve (CN IX)", "The chorda tympani (CN VII)", "The lingual nerve (V3)", "The vagus nerve"], a: 0, h1: "One nerve does both modalities back here.", h2: "The ninth nerve.", exp: "The posterior one-third carries both general sensation and taste on the glossopharyngeal nerve (CN IX)." },
  { id: 44, topic: "Tongue lymph", src: "Maini · Tongue", q: "Lymph from the TIP of the tongue drains primarily to which nodes?", opts: ["Superior deep cervical", "Submandibular", "Submental", "Parotid"], a: 2, h1: "The tip sits just behind the chin.", h2: "Sub-mental = under the chin.", exp: "Lymph from the tip of the tongue drains to the submental nodes (the sides drain to submandibular; the posterior third to superior deep cervical)." },
  { id: 45, topic: "Palate", src: "Maini · Salivary Glands", q: "Contraction of the palatoglossus closes which opening during chewing?", opts: ["The choana", "The laryngeal inlet", "The oropharyngeal isthmus", "The pharyngeal isthmus"], a: 2, h1: "It draws the tongue and soft palate together.", h2: "Between the mouth and oropharynx.", exp: "The palatoglossus closes the oropharyngeal isthmus so food is not swallowed before it is chewed." },
  { id: 46, topic: "Salivary glands", src: "Maini · Salivary Glands", q: "Which salivary gland is the LARGEST, and which contributes the MOST saliva (about 60 percent)?", opts: ["Largest = submandibular; most = parotid", "Largest = parotid; most = submandibular", "Largest = sublingual; most = parotid", "Largest = parotid; most = sublingual"], a: 1, h1: "Biggest by size is not the biggest producer.", h2: "Parotid is largest; submandibular makes the most.", exp: "The parotid is the largest gland, but the submandibular contributes the most saliva (about 60 percent)." },
  { id: 47, topic: "Salivary glands", src: "Maini · Salivary Glands", q: "The PAROTID gland's parasympathetic supply comes from which nerve, synapsing in which ganglion?", opts: ["CN VII; submandibular ganglion", "CN IX; otic ganglion", "CN X; pterygopalatine ganglion", "CN V; geniculate ganglion"], a: 1, h1: "'P is parotid, 9 mirrors P.'", h2: "CN IX, and the ganglion by the ear.", exp: "The parotid is served by CN IX, synapsing in the otic ganglion, then via the auriculotemporal nerve." },
  { id: 48, topic: "Salivary glands", src: "Maini · Salivary Glands", q: "The submandibular and sublingual glands get parasympathetic fibers from CN VII (chorda tympani), synapsing in the...", opts: ["Otic ganglion", "Geniculate ganglion", "Submandibular ganglion", "Superior cervical ganglion"], a: 2, h1: "The fibers ride the lingual nerve to get there.", h2: "It is named for one of the two glands.", exp: "These fibers ride the lingual nerve to the submandibular ganglion, then supply both glands." },
  { id: 49, topic: "Clinical terms", src: "Maini · Tongue", q: "Which term means a disorder of ARTICULATION, with language itself intact?", opts: ["Dysphagia", "Dysarthria", "Dysphonia", "Aphasia"], a: 1, h1: "'-arthria' relates to jointed, articulated speech.", h2: "The words come out poorly.", exp: "Dysarthria is a disorder of articulation (cerebellar or oral/tongue), with language intact." },
  { id: 50, topic: "Clinical terms", src: "Maini · Tongue", q: "Maini stresses that DYSPHONIA reflects pathology of the...", opts: ["Tongue", "Larynx", "Esophagus", "Soft palate"], a: 1, h1: "'-phonia' relates to voice.", h2: "The voice box.", exp: "Dysphonia is a voice disorder from laryngeal pathology, not a tongue problem." },
  { id: 51, topic: "Clinical terms", src: "Maini · Tongue", q: "A hard, sore lesion on the tongue seen in SYPHILIS is a...", opts: ["Chancre", "Aphthous ulcer", "Leukoplakia", "Mucocele"], a: 0, h1: "It is the primary syphilitic sore.", h2: "A 'chancre.'", exp: "The chancre is the hard syphilitic sore on the tongue (the aphthous ulcer / canker sore is unrelated to syphilis)." },
];

/* --- Balance the answer positions deterministically (no 'always B' skew) --- */
questions.forEach((q, k) => {
  const target = k % 4;
  if (target === q.a) return;
  const correct = q.opts[q.a];
  q.opts.splice(q.a, 1);
  q.opts.splice(target, 0, correct);
  q.a = target;
});

/* =============================================================== STYLES ==== */
const css = `
:root{
  --accent:#7c3aed; --accent-deep:#6d28d9; --accent-mid:#8b5cf6; --accent-soft:#c4b5fd;
  --accent-tint:#ede9fe; --accent-wash:#f5f3ff; --ink:#2e1065; --ink-soft:#5b4a8a;
  --paper:#faf9ff; --card:#ffffff; --line:#ddd0f5;
  --good:#0e7a52; --good-bg:#e7f8ef; --good-line:#bfe6d2;
  --bad:#b42318; --bad-bg:#fdeceb; --bad-line:#f3c6c2;
  --gold:#9a6a2b; --gold-bg:#fffaf0; --gold-line:#ecd6a8;
}
*{box-sizing:border-box}
.fb-root{font-family:'Outfit','SF Pro Text',system-ui,-apple-system,Segoe UI,sans-serif;color:var(--ink);
  background:radial-gradient(880px 420px at 100% -8%, var(--accent-tint), transparent 60%),radial-gradient(680px 360px at -10% 110%, #e4ddf8, transparent 55%),var(--paper);
  min-height:100vh;line-height:1.55;padding:0 0 64px}
.fb-wrap{max-width:900px;margin:0 auto;padding:0 18px}
.serif{font-family:'Fraunces','Iowan Old Style',Georgia,serif}
.hero{padding:30px 0 12px}
.kicker{display:inline-flex;gap:8px;align-items:center;font-size:12px;font-weight:600;letter-spacing:.13em;text-transform:uppercase;color:var(--accent-deep);background:var(--accent-wash);border:1px solid var(--line);padding:6px 12px;border-radius:999px}
.dot{width:7px;height:7px;border-radius:50%;background:var(--accent);box-shadow:0 0 0 3px var(--accent-tint)}
h1.title{font-size:clamp(27px,5vw,43px);line-height:1.05;margin:14px 0 6px;font-weight:600;letter-spacing:-.02em}
h1.title em{font-style:italic;color:var(--accent-mid)}
.subtitle{color:var(--ink-soft);max-width:720px;font-size:15.5px}
.voicenote{margin:10px 0 0;font-size:13px;color:var(--accent-deep);background:var(--accent-wash);border:1px solid var(--line);border-radius:10px;padding:9px 13px;max-width:720px}
.pill-row{display:flex;flex-wrap:wrap;gap:8px;align-items:center;margin-top:12px}
.pill-date{display:inline-block;font-size:12.5px;font-weight:600;color:var(--accent-deep);background:var(--accent-wash);border:1px solid var(--line);padding:7px 12px;border-radius:999px}
.pill-review{display:inline-block;font-size:11.5px;font-weight:700;letter-spacing:.04em;color:#8a4b00;background:#fff6e6;border:1px solid #f0d49a;padding:7px 12px;border-radius:999px}
.hublink{display:inline-flex;align-items:center;gap:6px;font-size:12.5px;font-weight:600;color:#fff;background:var(--accent);border:none;text-decoration:none;padding:7px 13px;border-radius:999px;box-shadow:0 6px 16px -8px var(--accent)}
.hublink:hover{background:var(--accent-mid)}
.tabbar{position:sticky;top:0;z-index:20;background:rgba(250,249,255,.92);backdrop-filter:blur(10px);border-bottom:1px solid var(--line);margin-top:16px}
.tabs{display:flex;gap:4px;max-width:900px;margin:0 auto;padding:8px 14px;overflow-x:auto}
.tab{flex:0 0 auto;border:none;background:none;font:inherit;font-weight:600;font-size:14.5px;color:var(--ink-soft);padding:9px 15px;border-radius:10px;cursor:pointer;transition:.15s;white-space:nowrap}
.tab:hover{color:var(--accent-deep);background:var(--accent-wash)}
.tab.active{color:#fff;background:var(--accent);box-shadow:0 4px 14px -4px var(--accent)}
.section{padding:24px 0 8px;animation:fade .35s ease}
@keyframes fade{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
.banner{background:linear-gradient(180deg,var(--accent-deep),var(--accent-mid));color:#fff;border-radius:16px;padding:18px 20px;margin:8px 0 16px;box-shadow:0 18px 40px -24px var(--accent-deep)}
.banner .bt{font-family:'Fraunces',Georgia,serif;font-weight:600;font-size:19px;margin-bottom:6px}
.banner p{font-size:13.5px;opacity:.93;margin:4px 0 0}
.readbar{display:flex;flex-wrap:wrap;gap:10px;align-items:center;background:var(--card);border:1px solid var(--line);border-left:4px solid var(--accent);border-radius:14px;padding:12px 15px;margin:0 0 16px;box-shadow:0 12px 28px -24px rgba(124,58,237,.35)}

/* --------------------------------------------------------------- Cram ----- */
/* Cram carries the hands-free Web-Speech read-aloud walkthrough. */
function Cram() {
  const [voices, setVoices] = useState([]);
  const [voiceURI, setVoiceURI] = useState("");
  const [rate, setRate] = useState(1);
  const [reading, setReading] = useState(false);
  const [paused, setPaused] = useState(false);
  const [curIdx, setCurIdx] = useState(-1);

  const rateRef = useRef(1);
  const voiceRef = useRef("");
  const stopRef = useRef(false);
  const cardsRef = useRef([]);
  const supported = typeof window !== "undefined" && "speechSynthesis" in window;

  useEffect(() => { rateRef.current = rate; }, [rate]);
  useEffect(() => { voiceRef.current = voiceURI; }, [voiceURI]);

  useEffect(() => {
    if (!supported) return;
    const load = () => {
      const v = window.speechSynthesis.getVoices() || [];
      setVoices(v);
      if (v.length && !voiceRef.current) {
        const pref =
          v.find((x) => /Ava/i.test(x.name)) ||
          v.find((x) => /Emma/i.test(x.name)) ||
          v.find((x) => /Andrew/i.test(x.name)) ||
          v.find((x) => /Aria|Jenny|Natural|Microsoft/i.test(x.name)) ||
          v.find((x) => x.lang && x.lang.toLowerCase().indexOf("en") === 0) ||
          v[0];
        if (pref) { voiceRef.current = pref.voiceURI; setVoiceURI(pref.voiceURI); }
      }
    };
    load();
    window.speechSynthesis.onvoiceschanged = load;
    return () => {
      stopRef.current = true;
      try { window.speechSynthesis.cancel(); } catch (e) {}
      try { window.speechSynthesis.onvoiceschanged = null; } catch (e) {}
    };
  }, [supported]);

  const speakable = (t) => t
    .replace(/→/g, " to ")
    .replace(/&/g, " and ")
    .replace(/\bCN\s*IX\b/g, "cranial nerve nine")
    .replace(/\bCN\s*XII\b/g, "cranial nerve twelve")
    .replace(/\bCN\s*VII\b/g, "cranial nerve seven")
    .replace(/\bCN\s*X\b/g, "cranial nerve ten")
    .replace(/\bCN\s*V\b/g, "cranial nerve five")
    .replace(/\bV1\b/g, "V one")
    .replace(/\bV2\b/g, "V two")
    .replace(/\bV3\b/g, "V three")
    .replace(/\btwo-thirds\b/g, "two thirds")
    .replace(/\bone-third\b/g, "one third")
    .replace(/\bSMR\b/g, "S M R")
    .replace(/\bECA\b/g, "external carotid")
    .replace(/~/g, "about ")
    .replace(/\s+/g, " ")
    .trim();

  const buildText = (c) => {
    let s = "Topic " + c.n + ". " + c.title + ". ";
    s += c.facts.join(" ");
    if (c.flag) s += " Maini flag. " + c.flag;
    return speakable(s);
  };

  const stopAll = () => {
    stopRef.current = true;
    try { window.speechSynthesis.cancel(); } catch (e) {}
    setReading(false); setPaused(false); setCurIdx(-1);
  };

  const playFrom = (i) => {
    if (!supported) return;
    if (i < 0 || i >= cram.length) { stopAll(); return; }
    stopRef.current = false;
    try { window.speechSynthesis.cancel(); } catch (e) {}
    setReading(true); setPaused(false); setCurIdx(i);
    const el = cardsRef.current[i];
    if (el && el.scrollIntoView) el.scrollIntoView({ behavior: "smooth", block: "center" });
    const u = new SpeechSynthesisUtterance(buildText(cram[i]));
    u.rate = Math.min(3, Math.max(0.5, rateRef.current));
    const v = (window.speechSynthesis.getVoices() || []).find((x) => x.voiceURI === voiceRef.current);
    if (v) u.voice = v;
    u.onend = () => {
      if (stopRef.current) return;
      if (i + 1 < cram.length) playFrom(i + 1);
      else stopAll();
    };
    // small delay guards against a cancel/speak race in some browsers
    setTimeout(() => { try { window.speechSynthesis.speak(u); } catch (e) {} }, 60);
  };

  const togglePlay = () => {
    if (!supported) { alert("Your browser does not support Web Speech read-aloud. Try Microsoft Edge or Chrome."); return; }
    if (!reading) { playFrom(curIdx >= 0 ? curIdx : 0); return; }
    if (paused) { try { window.speechSynthesis.resume(); } catch (e) {} setPaused(false); }
    else { try { window.speechSynthesis.pause(); } catch (e) {} setPaused(true); }
  };
  const nextTopic = () => { const i = (curIdx < 0 ? -1 : curIdx) + 1; if (i < cram.length) playFrom(i); };
  const prevTopic = () => { const i = (curIdx < 0 ? 0 : curIdx) - 1; if (i >= 0) playFrom(i); };

  return (
    <section className="section">
      <div className="banner">
        <div className="bt">⚡ Cram — Maini&apos;s Nose &amp; Mouth essentials, in her order</div>
        <p>Nasal cavity &amp; vestibule → external nose → septum → walls → conchae &amp; meatuses → the paranasal-sinus drainage map → nasal vessels &amp; nerves → tongue papillae → the taste map → tongue muscles → tongue innervation → palate &amp; salivary glands → clinical terms. The ⚑ flags are the high-yield hooks.</p>
      </div>

      <div className="readbar">
        <span className="rb-title">🔊 Read aloud</span>
        <button className="readbtn" onClick={togglePlay}>{!reading ? "▶ Play" : paused ? "▶ Resume" : "⏸ Pause"}</button>
        <button className="readbtn ghost" onClick={prevTopic} disabled={!reading && curIdx <= 0}>⏮ Prev</button>
        <button className="readbtn ghost" onClick={nextTopic}>Next ⏭</button>
        <button className="readbtn ghost" onClick={stopAll} disabled={!reading}>⏹ Stop</button>
        <label className="rb-speed">Speed
          <input type="range" min="0.5" max="3" step="0.1" value={rate} onChange={(e) => setRate(parseFloat(e.target.value))} />
          <span className="rb-speedval">{rate.toFixed(1)}x</span>
        </label>
        {voices.length > 0 && (
          <select className="rb-voice" value={voiceURI} onChange={(e) => setVoiceURI(e.target.value)} title="Voice">
            {voices.filter((v) => !v.lang || v.lang.toLowerCase().indexOf("en") === 0).map((v) => (
              <option key={v.voiceURI} value={v.voiceURI}>{v.name}</option>
            ))}
          </select>
        )}
        <div className="rb-now">
          {reading
            ? <>Now reading <b>Topic {curIdx + 1}</b> of {cram.length} — {cram[curIdx] ? cram[curIdx].title : ""}. Speed applies to the next section. Hands-free: it auto-advances.</>
            : <>Press <b>Play</b> for a hands-free walkthrough — it reads each topic aloud and moves on by itself. Best in Microsoft Edge (Ava / Emma / Andrew).</>}
        </div>
      </div>

      {cram.map((c, i) => (
        <div className={`obj ${curIdx === i ? "reading" : ""}`} key={c.n} ref={(el) => { cardsRef.current[i] = el; }}>
          <div className="obj-head">
            <span className="obj-num serif">{c.n}</span>
            <span className="obj-title">{c.title}</span>
            <span className="src">{c.src}</span>
          </div>
          <ul className="obj-facts">{c.facts.map((f, j) => <li key={j}>{f}</li>)}</ul>
          {c.flag && <div className="objflag">{c.flag}</div>}
        </div>
      ))}
    </section>
  );
}

function Drill({ bank }) {
  const [idx, setIdx] = useState(0);
  const [answers, setAnswers] = useState({});
  const [hintLevel, setHintLevel] = useState({});
  const [mode, setMode] = useState("study");

  const safeIdx = Math.min(idx, Math.max(0, bank.length - 1));
  const q = bank[safeIdx];

  const score = useMemo(
    () => Object.entries(answers).reduce((n, [id, v]) => {
      const qq = bank.find((x) => x.id === Number(id));
      return n + (qq && v === qq.a ? 1 : 0);
    }, 0),
    [answers, bank]
  );

  if (!bank.length) return <section className="section"><div className="banner"><div className="bt">Drill</div></div></section>;

  const keyMode = mode === "key";
  const sel = answers[q.id];
  const answered = sel !== undefined;
  const hl = hintLevel[q.id] || 0;
  const done = Object.keys(answers).length;

  const select = (i) => {
    if (keyMode) return;
    if (answers[q.id] !== undefined) return;
    setAnswers((p) => ({ ...p, [q.id]: i }));
  };
  const bumpHint = () => setHintLevel((p) => ({ ...p, [q.id]: Math.min((p[q.id] || 0) + 1, 2) }));
  const optClass = (i) => {
    if (keyMode) return i === q.a ? "opt opt-correct" : "opt opt-locked";
    if (!answered) return "opt";
    if (i === q.a) return "opt opt-correct";
    if (i === sel) return "opt opt-wrong";
    return "opt opt-locked";
  };

  return (
    <section className="section">
      <div className="banner">
        <div className="bt">🎯 Drill — {bank.length} questions across Nose &amp; Mouth</div>
        <p>Four options, two progressive hints, an explanation, and a lecture source per question. Tap to self-test, or flip to the Answer Key to review.</p>
      </div>

      <div className="drillbar">
        <div className="progress">Question <b>{safeIdx + 1}</b> / {bank.length}{!keyMode && <> · answered <b>{done}</b></>}</div>
        <div className="modetog">
          <button className={mode === "study" ? "on" : ""} onClick={() => setMode("study")}>Study (tap)</button>
          <button className={mode === "key" ? "on" : ""} onClick={() => setMode("key")}>Answer key</button>
        </div>
        {!keyMode && <div className="scorepill">Score {score}/{done || 0}</div>}
      </div>

      <div className="navgrid">
        {bank.map((qq, i) => {
          let cls = "";
          if (keyMode) cls = "ok";
          else { const a = answers[qq.id]; cls = a === undefined ? "" : a === qq.a ? "ok" : "no"; }
          return <button key={qq.id} className={`navbtn ${cls} ${i === safeIdx ? "cur" : ""}`} onClick={() => setIdx(i)}>{i + 1}</button>;
        })}
      </div>

      <div className="qcard">
        <div className="badges"><span className="qtopic">{q.topic}</span><span className="qsrc">{q.src}</span></div>
        <div className="qtext">{q.q}</div>

        {q.opts.map((o, i) => (
          <button key={i} className={optClass(i)} onClick={() => select(i)}>
            <span className="key">{String.fromCharCode(65 + i)}</span><span>{o}</span>
          </button>
        ))}

        {!keyMode && !answered && (
          <>
            <div className="hintrow">
              <button className="ghost" onClick={bumpHint} disabled={hl >= 2}>{hl === 0 ? "Need a hint?" : "Bigger hint"}</button>
            </div>
            {hl >= 1 && <div className="hintbox">💡 {q.h1}</div>}
            {hl >= 2 && <div className="hintbox">🔎 {q.h2}</div>}
          </>
        )}

        {keyMode && <div className="exp keyed"><div className="tag">✦ Answer · {q.src}</div><p>{q.exp}</p></div>}
        {!keyMode && answered && (
          <div className={`exp ${sel === q.a ? "correct" : "incorrect"}`}>
            <div className="tag">{sel === q.a ? "✓ Correct" : "✗ Not quite"} · {q.src}</div>
            <p>{q.exp}</p>
          </div>
        )}

        <div className="navfoot">
          <button className="btn btn-ghost" onClick={() => setIdx(Math.max(0, safeIdx - 1))} disabled={safeIdx === 0}>← Prev</button>
          <button className="btn btn-primary" onClick={() => setIdx(Math.min(bank.length - 1, safeIdx + 1))} disabled={safeIdx >= bank.length - 1}>Next →</button>
        </div>
      </div>
    </section>
  );
}

/* --------------------------------------------------------------- Coach ---- */
const COACH_SYSTEM = `You are Dr. Seema Maini, teaching GA 0202 (Gross Anatomy, Head & Neck) at SCUHS, running a review of the NOSE & MOUTH module — the nasal cavity, paranasal sinuses, oral cavity, tongue, and salivary glands. Teach ONLY from this content; do not invent bones, openings, nerves, ganglia, or drainage sites. Warm and encouraging; you say "right?", "okay?", "make sense?", "all right?", and call students "guys." You love clinical asides and simple location logic, and you make students reason step by step instead of guessing. Keep answers tight (3-6 sentences) and quiz the student back.

NASAL CAVITY OVERVIEW: part of the upper respiratory tract, split into two cavities by the nasal septum. Functions: olfaction, air conduction, HUMIDIFICATION, WARMING (not cooling - the silly trap people miss), and FILTRATION; it also receives secretions from the paranasal sinuses and the nasolacrimal duct. The nasal vestibule is the skin-lined dilatation just inside the nostril, bearing stiff hairs (vibrissae) that trap dust/soot. Posterior opening into the nasopharynx = the choana.

EXTERNAL NOSE: cartilaginous framework = lateral nasal cartilage, septal cartilage (supports the anterior septum), greater and lesser alar cartilages (around the nostrils). Bony framework = nasal bones, frontal process of maxilla, nasal part of frontal bone. Root landmark = nasion; tip = apex.

NASAL SEPTUM: bony posterior majority = perpendicular plate of ethmoid + vomer; anterior = septal cartilage. Small contributors: sphenoid crest, nasal crest of palatine, nasal crest of maxilla, nasal bone, nasal spine of frontal. Clinical: a deviated septum is the CARTILAGE, not bone; treat with submucous resection (SMR) + septoplasty. TRAP: the lacrimal bone is NOT part of the septum - it is the medial orbital wall and part of the lateral nasal wall (I like to sneak it in).

NASAL WALLS: ROOF = cribriform plate of ethmoid (transmits olfactory nerves) + body of sphenoid + frontal + nasal. FLOOR = hard palate = palatine process of maxilla + horizontal plate of palatine. LATERAL WALL = nasal, frontal process of maxilla, lacrimal, superior + middle conchae (ethmoid), inferior concha (separate bone), perpendicular plate of palatine, medial pterygoid plate (sphenoid).

CONCHAE & MEATUSES: superior + middle conchae = ethmoid; inferior concha = separate bone. Conchae increase surface area to warm/humidify air. Under a concha = a meatus (superior/middle/inferior). Above the superior concha = the sphenoethmoidal recess.

PARANASAL SINUSES: four paired - frontal, ethmoid, sphenoid, maxillary. The ethmoid is many air cells (anterior/middle/posterior groups), each with its own opening. DRAINAGE: sphenoethmoidal recess = sphenoid sinus; superior meatus = posterior ethmoidal cells; middle meatus (hiatus semilunaris) = frontal (superior end, via ethmoidal infundibulum/frontonasal duct), anterior ethmoidal cells (middle), maxillary (inferior end), with the middle ethmoidal cells on the ethmoidal bulla; inferior meatus = nasolacrimal duct (NOT a sinus - tears). Sinusitis is slow to treat because the sinuses are poorly vascularized (~3-week course).

NASAL VESSELS/NERVES: arteries mainly from the maxillary + ophthalmic (anterior + posterior ethmoidal branches). Kiesselbach's/Little's area in the anterior septum is the #1 epistaxis site - an anastomosis of sphenopalatine, ethmoidal, and the septal branch (superior labial branch of the facial). Olfactory nerves pass through the cribriform plate. General sensation = ophthalmic (V1, anterior) + maxillary (V2, posterior); NOT V3.

TONGUE - PAPILLAE: filiform (scattered over the dorsum, keratinized, NO taste), fungiform (tip and periphery), foliate (posterolateral folds), circumvallate/vallate (V-row anterior to the terminal sulcus, taste buds in a well). The terminal sulcus divides the anterior 2/3 from the posterior 1/3; its apex is the foramen cecum (thyroglossal duct remnant). Anterior 2/3 develops from the first pharyngeal arch.

TASTE MAP (my scheme - receptors are the same, so location tells them apart): sweet at the tip, salty at the sides of the tip, sour along the sides, bitter at the posterior tongue, umami central. Chemicals: sweet = carbohydrates/monosaccharides, salty = sodium ions, sour = acid/hydrogen ions, bitter = alkaloids, umami = amino acids.

TONGUE MUSCLES (extrinsic, move the tongue): genioglossus (mental spine of mandible; fan-shaped, main bulk; protrudes + depresses), hyoglossus (body + greater horn of hyoid; depresses + retracts; the "fence muscle" - nerves behind it, arteries in front), styloglossus (styloid process; retracts + elevates the posterior tongue), palatoglossus (palatine aponeurosis; closes the oropharyngeal isthmus). Intrinsic (change shape): superior longitudinal, inferior longitudinal, transverse, vertical.

TONGUE INNERVATION/VESSELS/LYMPH: MOTOR = hypoglossal (CN XII) to ALL except palatoglossus (vagus, CN X). SENSATION - anterior 2/3: general = lingual branch of V3 (trigeminal ganglion), taste = chorda tympani/CN VII (geniculate ganglion); posterior 1/3: BOTH general + taste = glossopharyngeal (CN IX). Artery = lingual artery, second branch of the external carotid (Superior thyroid, Lingual, Facial). Lymph: tip = submental, sides = submandibular, posterior 1/3 = superior deep cervical.

PALATE/ORAL FLOOR + SALIVARY GLANDS: palatoglossus + mucosa = palatoglossal arch, closing the oropharyngeal isthmus during chewing; lingual frenulum ties the undersurface of the tongue to the floor of the mouth. Salivary glands: parotid = largest (~30% of saliva); submandibular = most (~60%); sublingual = smallest (~7-8%); von Ebner glands (serous, on the tongue) make lingual lipase. AUTONOMICS: parotid parasympathetic = CN IX ("P is parotid, 9 is a mirror image of P"), inferior salivatory nucleus (medulla) -> tympanic/lesser petrosal -> otic ganglion -> auriculotemporal nerve. Submandibular + sublingual = CN VII (chorda tympani), superior salivatory nucleus (pons) -> ride the lingual nerve -> submandibular ganglion. Sympathetics: superior cervical ganglion -> plexus on the external carotid artery -> all glands.

CLINICAL TERMS: dysarthria = a disorder of articulation (cerebellar/oral, language intact); dysphagia = difficulty swallowing; dysphonia = a VOICE disorder from the LARYNX (not the tongue). Chancre = the hard syphilitic sore on the tongue; aphthous ulcer (canker sore) forms with low immunity and heals faster with vitamin C. Tongue/oral cancer risk = tobacco chewing.

Open by offering to drill the paranasal-sinus drainage map, the tongue's nerve supply (anterior 2/3 vs posterior 1/3, general vs taste, and the ganglia), the salivary-gland autonomics, the tongue muscles, or the taste map. When a student is wrong, name the rule and have them re-derive it step by step. Never claim a mnemonic is mine unless it is in this content (the two that are mine: "P is parotid, 9 mirrors P" for the parotid, and the hyoglossus as the "fence muscle").`;

function Coach() {
  const [log, setLog] = useState([
    { role: "assistant", content: "Okay guys — Nose and Mouth. Two clusters trip people up the most: the paranasal-sinus DRAINAGE map (which meatus each sinus empties into, and remember the nasolacrimal duct in the inferior meatus is NOT a sinus), and the tongue's nerve supply (anterior two-thirds versus posterior one-third, general versus taste, and the matching ganglion). Want me to drill the sinus drainage, the tongue innervation, the salivary-gland autonomics, the tongue muscles, or my taste map? Where do you want to start?" },
  ]);
  const [input, setInput] = useState("");
  const [busy, setBusy] = useState(false);
  const [err, setErr] = useState("");
  const logRef = useRef(null);

  useEffect(() => { if (logRef.current) logRef.current.scrollTop = logRef.current.scrollHeight; }, [log, busy]);

  const send = async (text) => {
    const msg = (text ?? input).trim();
    if (!msg || busy) return;
    setErr("");
    const next = [...log, { role: "user", content: msg }];
    setLog(next);
    setInput("");
    setBusy(true);
    try {
      const res = await fetch("https://fab-ai.dgync1.workers.dev/", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          model: "claude-sonnet-4-20250514",
          max_tokens: 1000,
          system: COACH_SYSTEM,
          messages: next.map((m) => ({ role: m.role, content: m.content })),
        }),
      });
      const data = await res.json();
      const reply = (data.reply || (data.content || []).filter((b) => b.type === "text").map((b) => b.text).join("\n") || "").trim();
      setLog((p) => [...p, { role: "assistant", content: reply || "Say that again for me?" }]);
    } catch (e) {
      setErr("Could not reach the tutor. If you're running this outside the wrapped app, the API call needs a valid endpoint/key.");
      setLog((p) => p.slice(0, -1).concat({ role: "user", content: msg }));
    } finally {
      setBusy(false);
    }
  };

  const prompts = [
    "Drill me on the paranasal-sinus drainage map",
    "Quiz the tongue's nerve supply (anterior 2/3 vs posterior 1/3)",
    "Salivary-gland autonomics — parotid vs submandibular/sublingual",
    "The tongue muscles — origins, actions, and the fence muscle",
    "Walk me through your taste map",
    "The nasal septum bones and the lacrimal-bone trap",
  ];

  return (
    <section className="section">
      <div className="banner">
        <div className="bt">🧑‍⚕️ AI Coach — Dr. Maini&apos;s voice</div>
        <p>Grounded in her Nose &amp; Mouth lectures. It quizzes you and makes you reason step by step instead of guessing.</p>
      </div>

      <div className="coach-pills">
        {prompts.map((p, i) => <button key={i} className="cpill" onClick={() => send(p)}>{p}</button>)}
      </div>

      <div className="chatlog" ref={logRef}>
        {log.map((m, i) => (
          <div key={i} className={`msg ${m.role === "user" ? "user" : "bot"}`}>
            {m.role === "assistant" && <div className="who">Dr. Maini</div>}
            {m.content}
          </div>
        ))}
        {busy && <div className="typing">Dr. Maini is typing…</div>}
      </div>

      <div className="composer">
        <textarea
          value={input}
          placeholder="Ask Dr. Maini… (Enter to send, Shift+Enter for a new line)"
          onChange={(e) => setInput(e.target.value)}
          onKeyDown={(e) => { if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); send(); } }}
        />
        <button className="btn btn-primary" onClick={() => send()} disabled={busy || !input.trim()}>Send</button>
      </div>
      {err && <div className="tinynote" style={{ color: "var(--bad)" }}>{err}</div>}
      <div className="tinynote">Tutor answers are AI-generated in a teaching persona — trust the lecture/slides first if anything ever conflicts.</div>
    </section>
  );
}
