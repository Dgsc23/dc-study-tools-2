<script>
const BANK=[{"q":"A 66-year-old man is brought in after a stroke. He follows every command correctly and clearly understands what is said, but his own speech is halting, effortful, and he is visibly 'short of words.' Which cortical area is most likely lesioned?","o":["Broca's area (inferior frontal gyrus of the frontal lobe)","Wernicke's area (posterior temporal lobe)","Primary auditory cortex (temporal lobe)","Angular gyrus of the parietal lobe"],"c":0,"cat":"Aphasia & Speech","r":["Correct. Broca's area is the motor (expressive) speech area in the frontal lobe. A lesion gives Broca's (motor) aphasia: comprehension is intact but the patient is short of words with non-fluent, effortful speech.","A Wernicke's lesion would leave the patient fluent but unable to comprehend, producing meaningless 'word salad' - the opposite picture.","The primary auditory cortex processes hearing; its loss impairs hearing, not word-finding with intact comprehension.","The angular gyrus is a language association area, but the classic 'understands but cannot find words' picture localizes to Broca's area."],"source":"L16 - Broca's area / Broca's aphasia - ~36:49 and ~40:00","quote":"[Maini] 'Broca's aphasia, they're short of words. They understand everything you're saying to them.'","obj":"Broca's (motor) aphasia: expressive, comprehension intact","hint":"Motor speech area = making the words come out; it lives in the frontal lobe."},{"q":"A patient after a stroke speaks rapidly and fluently, but the sentences are meaningless 'word salad,' and she cannot understand questions asked of her. Which lesion does Maini describe, and where is it?","o":["Broca's aphasia, from a frontal-lobe lesion","Wernicke's aphasia, from a posterior temporal-lobe lesion","Cerebellar dysarthria, from a cerebellar lesion","Conduction aphasia, from an occipital-lobe lesion"],"c":1,"cat":"Aphasia & Speech","r":["Broca's aphasia is non-fluent with intact comprehension - the patient would be short of words, not fluent with word salad.","Correct. Wernicke's area is the sensory speech area in the posterior temporal lobe; a lesion gives fluent but senseless 'word salad' with lost comprehension.","Cerebellar dysarthria is slurred articulation from incoordination, not fluent nonsensical language with lost comprehension.","The occipital lobe handles vision, not speech comprehension; this picture is Wernicke's aphasia."],"source":"L16 - Wernicke's area / Wernicke's aphasia - ~37:09 and ~39:34","quote":"[Maini] 'They will speak too much, there will be word salad. Nothing makes sense.'","obj":"Wernicke's (sensory) aphasia: fluent word salad, no comprehension","hint":"Sensory speech area = understanding the words; it sits in the posterior temporal lobe."},{"q":"A 70-year-old shows slowness and sluggishness of movement plus a tremor of the hand that is present at rest and eases with purposeful movement. Maini gives this as the classic disorder of which structures?","o":["The cerebellum","The primary motor cortex (precentral gyrus)","The basal nuclei","The thalamus"],"c":2,"cat":"Movement Disorders","r":["Cerebellar disease produces an intention tremor (worse as the hand nears a target) and incoordination, not a resting tremor.","A motor-cortex lesion causes paralysis, not a resting tremor.","Correct. Maini names Parkinsonism as the disorder of the basal nuclei, marked by slowness, sluggish movement, and a resting tremor; the basal nuclei normally make movement fine, timed, and coordinated.","Thalamic damage causes sensory loss, not the resting-tremor pattern."],"source":"L16 - Basal nuclei / Parkinsonism - ~09:39 and ~01:34:46","quote":"[Maini] 'Parkinsonism is a disorder that affects basal nuclei... there is slowness, sluggishness of the movements, there are resting tremors.'","obj":"Parkinsonism = basal-nuclear disorder; resting tremor","hint":"Resting tremor is the basal-nuclear signature; contrast it with the cerebellar intention tremor."},{"q":"On exam a patient overshoots when reaching for the target on finger-to-nose testing, has slurred (dysarthric) speech, and reduced muscle tone. Which structure is dysfunctional?","o":["The basal nuclei","The primary sensory cortex (postcentral gyrus)","The internal capsule","The cerebellum"],"c":3,"cat":"Movement Disorders","r":["Basal-nuclear disease gives a resting tremor and rigidity, not finger-nose overshoot with low tone.","A postcentral-gyrus lesion causes loss of general sensation, not overshoot and dysarthria.","An internal-capsule lesion causes contralateral paralysis, not incoordination with low tone.","Correct. Overshoot on finger-to-nose testing, an intention tremor, dysarthria, and hypotonia are the classic cerebellar signs - the cerebellum cannot judge where to stop a movement."],"source":"L16 - Cerebellar dysfunction - ~01:33:32 and ~01:34:36","obj":"Finger-nose overshoot, dysarthria, hypotonia, intention tremor = cerebellar","hint":"The coordinator cannot judge where to stop the movement."},{"q":"Two patients each have a hand tremor. In patient A the tremor is worst at rest and fades with movement; in patient B it appears only as the hand approaches a target. Which localizations fit A and B?","o":["A = basal nuclei; B = cerebellum","A = cerebellum; B = basal nuclei","A = motor cortex; B = thalamus","A = thalamus; B = motor cortex"],"c":0,"cat":"Movement Disorders","r":["Correct. A resting tremor is the hallmark of basal-nuclear dysfunction, while an intention tremor (worse as the hand nears the target) is the hallmark of cerebellar dysfunction.","This reverses the pattern: the resting tremor is basal-nuclear and the intention tremor is cerebellar.","Neither a motor-cortex nor a thalamic lesion produces these two tremor patterns; the resting/intention split is basal-nuclei vs cerebellum.","A thalamic lesion causes sensory loss and a motor-cortex lesion causes paralysis; neither matches this resting-vs-intention split."],"source":"L16 - Tremor types - ~01:34:36 and ~01:34:46","obj":"Resting tremor = basal nuclei; intention tremor = cerebellum","hint":"At rest vs on approach to the target."},{"q":"An embolus lodges in the artery Maini calls the one most often obstructed in atherosclerotic stroke, which supplies the lateral cortex and the posterior limb of the internal capsule. What is the artery, and what is the expected deficit?","o":["Anterior cerebral artery; bilateral leg weakness only","Middle cerebral artery; contralateral paralysis","Posterior cerebral artery; cortical blindness only","Basilar artery; intention tremor only"],"c":1,"cat":"Stroke & Vascular","r":["The anterior cerebral artery supplies the medial surface of the frontal and parietal lobes, not the lateral cortex plus the posterior limb of the internal capsule.","Correct. The middle cerebral artery supplies the insula and lateral cortex plus the posterior limb of the internal capsule; Maini calls it the most frequently obstructed stroke artery, and because the corticospinal fibers there have not yet crossed low in the medulla, occlusion causes paralysis on the opposite side.","The posterior cerebral artery supplies the occipital lobe; it is not the artery Maini flags as the commonest stroke vessel.","The basilar artery serves the brainstem and cerebellum; its blockage does not give an isolated intention tremor."],"source":"L17 - MCA territory - ~01:04:39 and L16 internal capsule ~01:24:04","obj":"MCA = commonest stroke artery; contralateral paralysis","hint":"Lateral surface plus the posterior limb of the internal capsule."},{"q":"A hypertensive patient has a small deep infarct in the internal capsule. Maini stresses this is 'clinically very important.' Which tract runs through it, and what is the result of the lesion?","o":["The spinothalamic tract; deafness","The optic tract; bitemporal hemianopsia","The corticospinal (motor) tract; contralateral paralysis","The olfactory tract; loss of smell"],"c":2,"cat":"Stroke & Vascular","r":["The spinothalamic tract does carry sensation, but the internal capsule's clinical tract is the corticospinal, and its lesion causes paralysis, not deafness.","The optic tract is not in the internal capsule; a bitemporal hemianopsia comes from optic-chiasma compression.","Correct. The corticospinal (motor) tract funnels through the internal capsule; ischemia there is a common stroke and causes paralysis on the opposite side, because the fibers cross lower down in the medulla.","The olfactory tract sits at the base of the frontal lobe, not in the internal capsule."],"source":"L16 - Internal capsule - ~01:24:04","quote":"[Maini] 'The corticospinal tract funnels through the internal capsule; ischemia there causes paralysis on the opposite side.'","obj":"Corticospinal tract through internal capsule; lesion = contralateral paralysis","hint":"A very common cause of stroke paralysis; motor fibers funnel through here."},{"q":"A patient has a lesion of the corticospinal fibers just above the pyramidal decussation in the lower medulla, on the LEFT side. On which side is the paralysis, and why?","o":["Left side, because motor fibers stay on their own side","Neither side, because the decussation is purely sensory","Both sides equally, because the medulla is a midline structure","Right side, because the corticospinal fibers cross to the opposite side at the decussation"],"c":3,"cat":"Stroke & Vascular","r":["Motor fibers do not stay ipsilateral through the cord; they cross at the pyramidal decussation, so a left lesion above it affects the right body.","The decussation is the crossing of the corticospinal (motor) tract, not a sensory relay, and its interruption does cause paralysis.","The paralysis is contralateral, not bilateral; the crossing sends control to the opposite half of the body.","Correct. At the pyramidal decussation the corticospinal tract switches sides, so a left-sided lesion causes right-sided paralysis - 'left brain, right body.'"],"source":"L17 - Pyramidal decussation - ~19:04","obj":"Pyramidal decussation: left lesion causes right-sided paralysis","hint":"Left brain, right body."},{"q":"A ruptured aneurysm in the Circle of Willis blocks one internal carotid artery, yet the patient's deficit is milder than expected. Which functional property of the circle explains this?","o":["It is an anastomotic ring that provides an alternate route of blood when one feeding artery is blocked","It speeds venous drainage away from the ischemic area","It filters the blood before it reaches the cortex","It secretes cerebrospinal fluid to cushion the brain"],"c":0,"cat":"Stroke & Vascular","r":["Correct. The Circle of Willis is an anastomosis at the base of the brain; if one feeding artery is occluded, the ring provides collateral flow to partly perfuse the threatened area and limit damage.","The circle is arterial and provides collateral inflow; it does not accelerate venous drainage.","The circle distributes arterial blood; it is not a filter.","CSF secretion is the choroid plexus's job; the Circle of Willis is an arterial ring, not a CSF source."],"source":"L17 - Circle of Willis purpose - ~01:13:18","obj":"Circle of Willis = collateral supply if one artery is blocked","hint":"A safety detour for blood flow."},{"q":"A trauma patient develops a pulsating, protruding eye (pulsatile exophthalmos). Maini attributes this striking sign to rupture of which vessel, and where?","o":["The middle meningeal artery at the pterion","The internal carotid artery within the cavernous sinus","A bridging vein in the subdural space","The labyrinthine artery in the internal acoustic meatus"],"c":1,"cat":"Stroke & Vascular","r":["A middle-meningeal tear at the pterion causes an epidural hematoma, not a pulsating eye.","Correct. The cavernous part of the internal carotid artery can rupture within the cavernous sinus, transmitting arterial pulsation to the orbit and causing pulsatile exophthalmos.","A torn bridging vein produces a slow subdural hematoma, not pulsatile exophthalmos.","The labyrinthine artery supplies the inner ear; its problems affect hearing and balance, not the eye."],"source":"L17 - Cavernous ICA rupture - ~01:20:07","obj":"Cavernous ICA rupture = pulsatile exophthalmos","hint":"A pulsing, protruding eye points to the artery running through the cavernous sinus."},{"q":"A young man is struck at the temple (pterion), briefly recovers, then rapidly deteriorates. Imaging shows an arterial bleed. Which hemorrhage is this, and what vessel is torn?","o":["Subdural hematoma; torn bridging veins","Subarachnoid hemorrhage; a ruptured berry aneurysm","Epidural (extradural) hematoma; the middle meningeal artery","Intraventricular bleed; the choroid plexus"],"c":2,"cat":"Hemorrhages & Trauma","r":["A subdural hematoma is a slow venous bleed from bridging veins, not a fast arterial bleed after a pterion blow.","A subarachnoid hemorrhage is usually an aneurysm rupture into the CSF space, not the pterion/middle-meningeal picture.","Correct. An epidural hematoma is an arterial bleed, classically from the middle meningeal artery after a blow to the thin pterion, and it develops rapidly.","The choroid plexus secretes CSF and is not the source of this classic pterion arterial bleed."],"source":"L17 - Epidural hematoma - ~01:17:31","obj":"Epidural = arterial, middle meningeal artery, pterion, fast","hint":"Pterion plus middle meningeal artery equals a fast arterial bleed."},{"q":"An elderly patient with brain atrophy has a minor head knock, then over the following weeks becomes progressively confused. Which hemorrhage does Maini describe, and what is its mechanism?","o":["Cavernous sinus thrombosis; a clotted venous sinus","Epidural hematoma; a fast arterial bleed from the middle meningeal artery","Subarachnoid hemorrhage; a ruptured aneurysm","Subdural hematoma; a slow venous bleed from stretched bridging veins"],"c":3,"cat":"Hemorrhages & Trauma","r":["Cavernous sinus thrombosis is a different entity; the slow venous bridging-vein bleed in the elderly is a subdural hematoma.","An epidural hematoma is a fast arterial bleed after a pterion blow, not a slow venous bleed in an atrophic brain.","A subarachnoid hemorrhage is a sudden arterial aneurysm rupture, not a slow venous bridging-vein bleed.","Correct. A subdural hematoma is a venous bleed from bridging veins stretched by an atrophied brain; it is common in the elderly and develops slowly over days to weeks."],"source":"L17 - Subdural hematoma - ~01:18:07","obj":"Subdural = venous bridging veins, elderly, slow","hint":"Slow venous bleed in an atrophied brain."},{"q":"A patient collapses with a sudden severe headache; CT shows blood in the space around the brain. Maini says this is usually arterial from a ruptured aneurysm and can raise intracranial pressure. Which hemorrhage is it, and why does pressure rise?","o":["Subarachnoid hemorrhage; because blood can block the arachnoid granulations and impair CSF absorption","Epidural hematoma; because the dura strips off the skull","Subdural hematoma; because bridging veins keep oozing","Intracerebral hematoma; because the ventricles collapse"],"c":0,"cat":"Hemorrhages & Trauma","r":["Correct. A subarachnoid hemorrhage is usually arterial from a ruptured aneurysm; blood in the subarachnoid space can obstruct the arachnoid granulations, so CSF is not absorbed and intracranial pressure climbs.","An epidural hematoma is a middle-meningeal arterial bleed at the pterion, not the diffuse blood-in-the-CSF picture.","A subdural bleed is venous and slow; it is not the classic sudden aneurysmal subarachnoid picture.","The pressure rise here is from blocked CSF absorption at the granulations, not from collapsing ventricles."],"source":"L17 - Subarachnoid hemorrhage - ~01:19:40 and hydrocephalus ~51:57","obj":"Subarachnoid = arterial aneurysm rupture; blocked granulations raise ICP","hint":"Aneurysm bleeding around the brain; the granulations get clogged."},{"q":"During a procedure a surgeon accidentally nicks a cerebral vein with the patient sitting upright, and air is drawn in. Maini explains this risk by noting cerebral veins lack valves. Why are they valveless?","o":["Because they carry oxygenated blood under high pressure","Because venous pressure in the head is very low, even negative above the heart, so valves are unnecessary","Because arterial pulsation pushes blood through them","Because they are held open by cerebrospinal fluid"],"c":1,"cat":"Hemorrhages & Trauma","r":["Cerebral veins carry deoxygenated blood at low pressure, not oxygenated blood at high pressure.","Correct. Because pressure in the brain's veins is low and even negative above heart level, the veins are thin-walled and valveless - which also allows air to be sucked in (air embolism) if one is nicked.","Arterial pulsation is not what moves cerebral venous blood; the veins are valveless because their pressure is low.","Surrounding CSF is not why they lack valves; the reason is the low venous pressure."],"source":"L17 - Cerebral veins valveless - ~01:15:08","obj":"Cerebral veins valveless due to low/negative pressure; air-embolism risk","hint":"Above the heart, venous pressure goes negative."},{"q":"A stroke destroys the postcentral gyrus of one hemisphere. Which deficit results, and on which side?","o":["Complete blindness in both eyes","Flaccid paralysis on the same side of the body","Loss of general sensation (pain, touch, temperature) on the opposite side of the body","Fluent aphasia with preserved comprehension"],"c":2,"cat":"Lesion Localization","r":["Vision is processed in the occipital lobe, not the postcentral gyrus.","Paralysis is a motor deficit of the precentral gyrus or its tract, not the postcentral (sensory) gyrus, and it would be contralateral.","Correct. The postcentral gyrus is the primary somatosensory (somesthetic) cortex for general sensations - pain, touch, and temperature - so its loss produces contralateral general-sensory loss.","Aphasia localizes to the speech areas, not to the primary somatosensory strip."],"source":"L16 - Postcentral gyrus / somesthetic area - ~24:04 and ~24:36","obj":"Postcentral gyrus = primary sensory cortex for general sensations","hint":"'Post' the central sulcus is sensory; 'somesthetic' means bodily sensation."},{"q":"A lesion damages one thalamus. Based on Maini's 'relay center' teaching, what is the expected consequence, and which sensation is spared?","o":["Loss of coordination, with vision spared","Loss of melatonin secretion, with taste spared","Paralysis of the opposite limbs, with pain spared","Loss of general and special sensation on the opposite side, with smell (olfaction) spared"],"c":3,"cat":"Lesion Localization","r":["Coordination loss is cerebellar; the thalamus is the sensory relay, not the coordinator.","Melatonin is a pineal function; the thalamus is a sensory relay, and smell (not taste) is the modality that bypasses it.","Paralysis is a motor problem; the thalamus is a sensory relay, and its loss causes sensory, not motor, deficits.","Correct. The thalamus relays essentially all ascending sensation to the cortex, so damage causes contralateral sensory loss; the one modality that bypasses the thalamus is smell, so olfaction is spared."],"source":"L16 - Thalamus relay and exception - ~50:03 and ~51:08","quote":"[Maini] 'If thalamus is damaged, there is loss of sensation.'","obj":"Thalamic lesion = contralateral sensory loss; smell is spared","hint":"The great sensory layover; only the nose skips it."},{"q":"A patient after a frontal head injury shows poor judgment, impaired reasoning, and a change in personality, though strength and sensation are intact. Which region does Maini tie to reasoning and judgment?","o":["The prefrontal cortex of the frontal lobe","The occipital lobe","The cerebellum","The postcentral gyrus"],"c":0,"cat":"Lesion Localization","r":["Correct. Maini identifies the prefrontal cortex (anterior frontal lobe) as the area for reasoning and judgment, and notes it also underlies personality and conduct; damage there changes judgment and personality with strength and sensation intact.","The occipital lobe is visual; its damage impairs vision, not judgment and personality.","The cerebellum coordinates movement; its damage causes incoordination, not a judgment/personality change.","The postcentral gyrus is sensory; its damage causes sensory loss, not impaired reasoning."],"source":"L16 - Prefrontal cortex - ~15:57 and frontal higher functions ~16:41","obj":"Prefrontal cortex = reasoning, judgment, personality","hint":"The late-maturing area that gives teenagers a pass on judgment."},{"q":"A patient in a coma is found to have damage to the network of gray and white matter that Maini says keeps the brain awake and alert. Where is this reticular formation (reticular activating system) located?","o":["In the cerebral cortex","In the medulla and pons of the brainstem","In the cerebellum","In the occipital lobe"],"c":1,"cat":"Lesion Localization","r":["The cortex processes higher functions and sensation; arousal is driven by the brainstem reticular formation, not the cortex.","Correct. Maini places the reticular formation (reticular activating system) in the medulla and pons; sensory input through it keeps the brain awake and alert, so damage can cause coma.","The cerebellum coordinates movement; it does not govern the wake/alert state.","The occipital lobe is visual; it is not the arousal network."],"source":"L17 - Reticular formation - ~37:45","obj":"Reticular formation (medulla + pons) = arousal/wakefulness","hint":"It wakes you when the alarm rings; it lives in the brainstem."},{"q":"A patient with an enlarging pituitary adenoma first has headaches and then develops visual field loss. Maini stresses the gland's close relationship to which structure, and what is the mechanism?","o":["The cerebral aqueduct; the tumor blocks CSF, causing an intention tremor","The internal acoustic meatus; the tumor compresses the auditory nerve, causing deafness","The optic chiasma; the tumor compresses the crossing optic fibers, causing bitemporal visual loss","The pineal gland; the tumor stops melatonin, causing paralysis"],"c":2,"cat":"Diencephalon & Endocrine","r":["The cerebral aqueduct is in the midbrain, not adjacent to the pituitary, and the deficit here is visual, not a tremor.","The internal acoustic meatus and auditory nerve are remote from the pituitary; chiasmal compression causes visual, not hearing, loss.","Correct. The pituitary sits just below the optic chiasma (the crossing of the optic nerves); an enlarging adenoma compresses the chiasma, so visual disturbance (bitemporal hemianopsia) is often an early sign after the initial headache.","The pineal gland (melatonin) is separate; pituitary compression affects the optic chiasma and vision, not motor power."],"source":"L16 - Optic chiasma and pituitary - ~54:37","quote":"[Maini] 'If there is pituitary enlargement... it is going to compress optic chiasma.'","obj":"Pituitary adenoma compresses the optic chiasma; bitemporal visual loss","hint":"A tumor from below squeezes the crossing fibers."},{"q":"A patient has disordered body-temperature control, abnormal thirst and hunger, and a disturbed sleep-wake cycle. Which diencephalic structure does Maini identify as the seat of these autonomic and endocrine functions?","o":["The thalamus","The corpus callosum","The pineal gland","The hypothalamus"],"c":3,"cat":"Diencephalon & Endocrine","r":["The thalamus is the sensory relay; it is not the thermostat or the thirst/hunger center.","The corpus callosum is a fiber band connecting the hemispheres, not an autonomic/endocrine center.","The pineal gland secretes melatonin; it does not run temperature, thirst, and hunger.","Correct. Maini calls the hypothalamus the body's thermostat and the seat of thirst, hunger, endocrine control, the sleep-wake cycle, and autonomic control."],"source":"L17 - Hypothalamus functions - ~11:00 and L16 ~55:53","obj":"Hypothalamus = temperature, thirst, hunger, endocrine, sleep-wake, autonomic","hint":"The body's thermostat and homeostasis hub, below the thalamus."},{"q":"On a skull film of a healthy 55-year-old, a small calcified opacity is seen in the midline near the pineal gland. Maini says this is normal after about age 40. What is it?","o":["Corpora arenacea - normal calcium (calcareous) accumulation in the pineal gland","A pocket of cerebrospinal fluid","A malignant pineal tumor","A ruptured berry aneurysm"],"c":0,"cat":"Diencephalon & Endocrine","r":["Correct. Corpora arenacea is a normal calcium (calcareous) accumulation in the pineal gland appearing after about age 40, which can show as an opacity on imaging.","It is a calcification, not a fluid collection.","Maini describes this as a benign, normal finding, not a malignant tumor.","An aneurysm is a vascular lesion; this midline pineal calcification is corpora arenacea."],"source":"L17 - Corpora arenacea - ~13:08","obj":"Corpora arenacea = normal pineal calcification after ~40","hint":"A benign imaging opacity in older adults, in the pineal."},{"q":"A brainstem lesion involves the depression between the two cerebral peduncles of the midbrain. Which cranial nerve emerges there and would be affected?","o":["The trochlear nerve (CN IV), from the dorsal midbrain","The oculomotor nerve (CN III), from the interpeduncular fossa","The abducens nerve (CN VI), from the pontomedullary sulcus","The hypoglossal nerve (CN XII), from the pre-olivary sulcus"],"c":1,"cat":"Cranial Nerve Localization","r":["CN IV emerges from the dorsal midbrain below the inferior colliculus, not from the interpeduncular fossa.","Correct. The oculomotor nerve (CN III) emerges from the interpeduncular fossa, the midline depression between the cerebral peduncles.","CN VI emerges from the pontomedullary sulcus, not between the peduncles.","CN XII emerges from the pre-olivary sulcus of the medulla, not the interpeduncular fossa."],"source":"L17 - CN III / interpeduncular fossa - ~24:53 and ~15:02","obj":"CN III emerges from the interpeduncular fossa","hint":"Oculomotor from between the two midbrain stalks."},{"q":"A cranial nerve is injured as it emerges from the DORSAL (posterior) surface of the brainstem, just below the inferior colliculus - the only cranial nerve to do so. Which nerve is it?","o":["The oculomotor nerve (CN III)","The trigeminal nerve (CN V)","The trochlear nerve (CN IV)","The vagus nerve (CN X)"],"c":2,"cat":"Cranial Nerve Localization","r":["CN III emerges ventrally from the interpeduncular fossa, not from the dorsal brainstem.","CN V emerges from the lateral (side) of the pons, not the dorsal surface.","Correct. The trochlear nerve (CN IV) is the only cranial nerve that emerges from the dorsal (posterior) aspect of the brainstem, below the inferior colliculus, then curves forward.","CN X emerges from the post-olivary sulcus of the medulla, not the dorsal midbrain."],"source":"L17 - CN IV - ~25:27","obj":"CN IV = the only cranial nerve emerging dorsally","hint":"Trochlear sneaks around from the back."},{"q":"A patient cannot abduct (turn outward) the right eye. Maini ties this muscle's nerve to the pontomedullary sulcus. Which nerve and muscle are involved?","o":["Oculomotor nerve (CN III) to the medial rectus","Trochlear nerve (CN IV) to the superior oblique","Facial nerve (CN VII) to orbicularis oculi","Abducens nerve (CN VI) to the lateral rectus"],"c":3,"cat":"Cranial Nerve Localization","r":["CN III to the medial rectus adducts the eye; a palsy would impair inward, not outward, movement.","CN IV to the superior oblique moves the eye down-and-in; it does not abduct the eye.","CN VII to orbicularis oculi closes the eyelid; it does not move the globe.","Correct. The abducens nerve (CN VI) emerges from the middle of the pontomedullary sulcus and supplies the lateral rectus, which abducts the eye - hence 'abducens'; its palsy prevents outward gaze."],"source":"L17 - CN VI / lateral rectus - ~29:03","obj":"CN VI (pontomedullary sulcus) supplies the lateral rectus - abduction","hint":"Abducens abducts the eye."},{"q":"After a skull-base injury a patient's tongue is weak and the nerve that emerges from the pre-olivary sulcus of the medulla is implicated. Which nerve is it, and what is its function?","o":["Hypoglossal nerve (CN XII); motor to the tongue muscles","Glossopharyngeal nerve (CN IX); taste to the pharynx","Vagus nerve (CN X); parasympathetic to the gut","Trigeminal nerve (CN V); sensation to the face"],"c":0,"cat":"Cranial Nerve Localization","r":["Correct. The hypoglossal nerve (CN XII) emerges from the pre-olivary sulcus and is motor to the tongue muscles; injury weakens the tongue.","CN IX emerges from the post-olivary sulcus, not the pre-olivary sulcus, and it is not the tongue's motor nerve.","CN X also emerges from the post-olivary sulcus; the tongue's motor supply is CN XII.","CN V emerges from the side of the pons and carries facial sensation, not tongue motor control."],"source":"L17 - CN XII / pre-olivary sulcus - ~31:57","obj":"CN XII (pre-olivary sulcus) = motor to the tongue","hint":"Hypoglossal means 'under the tongue.'"},{"q":"A skull-base tumor at the jugular foramen threatens the three nerves Maini calls 'three close friends' that emerge together from the post-olivary sulcus. Which set is it?","o":["CN III, CN IV, and CN VI","CN IX (glossopharyngeal), CN X (vagus), and CN XI (accessory)","CN VII, CN VIII, and the labyrinthine nerve","CN I, CN II, and CN V"],"c":1,"cat":"Cranial Nerve Localization","r":["CN III, IV, and VI are the eye-movement nerves and do not exit through the jugular foramen.","Correct. The glossopharyngeal (IX), vagus (X), and accessory (XI) nerves emerge from the post-olivary sulcus and leave the skull together through the jugular foramen.","CN VII and VIII pass through the internal acoustic meatus with the labyrinthine artery, not the jugular foramen.","CN I, II, and V exit by the cribriform plate, optic canal, and pons-related routes respectively, not the jugular foramen."],"source":"L17 - CN IX, X, XI - ~31:10","obj":"CN IX/X/XI: post-olivary sulcus, jugular foramen","hint":"Three friends leaving by the same door."},{"q":"A patient develops progressive hearing loss and imbalance from a mass in the internal acoustic meatus. Which three structures does Maini say pass through this canal?","o":["The optic nerve, ophthalmic artery, and CN III","CN IX, CN X, and the internal jugular vein","The facial nerve (VII), the vestibulocochlear nerve (VIII), and the labyrinthine artery","CN V, CN VI, and the middle meningeal artery"],"c":2,"cat":"Cranial Nerve Localization","r":["The optic nerve and ophthalmic artery run through the optic canal, not the internal acoustic meatus.","CN IX, X and the internal jugular vein relate to the jugular foramen, not the internal acoustic meatus.","Correct. The internal acoustic meatus transmits the facial nerve (VII), the vestibulocochlear nerve (VIII), and the labyrinthine artery; a mass here impairs hearing and balance.","CN V, VI, and the middle meningeal artery do not travel through the internal acoustic meatus."],"source":"L17 - Internal acoustic meatus - ~01:09:07 and labyrinthine artery ~01:09:00","obj":"IAM: CN VII, CN VIII, and the labyrinthine artery","hint":"Two nerves and one small artery headed to the ear."},{"q":"After bacterial meningitis a patient develops raised intracranial pressure (communicating hydrocephalus). Maini explains this happens when infection blocks which structures, and why?","o":["The choroid plexus, so CSF is no longer secreted","The optic chiasma, so vision is lost","The pyramidal decussation, so the limbs are paralyzed","The arachnoid granulations, so CSF is still secreted but not absorbed"],"c":3,"cat":"Ventricles, CSF & Pressure","r":["Blocking secretion would lower CSF volume, not raise pressure; the problem is at absorption.","The optic chiasma is unrelated to CSF absorption and hydrocephalus.","The pyramidal decussation is a motor crossing; it has nothing to do with CSF absorption.","Correct. If infection blocks the arachnoid granulations, the choroid plexus keeps secreting CSF but it cannot be absorbed into the superior sagittal sinus, so intracranial pressure rises."],"source":"L17 - Hydrocephalus / arachnoid granulations - ~51:57 and ~50:00","obj":"Blocked arachnoid granulations raise ICP (secretion continues, absorption stops)","hint":"Secretion keeps going but the drain is clogged."},{"q":"A tumor obstructs the cerebral aqueduct. Knowing what this channel connects, where will cerebrospinal fluid back up and dilate?","o":["The lateral and third ventricles above the block","The subarachnoid space only","The central canal of the spinal cord only","The superior sagittal sinus"],"c":0,"cat":"Ventricles, CSF & Pressure","r":["Correct. The cerebral aqueduct runs through the midbrain connecting the third and fourth ventricles; a block there dams CSF upstream, dilating the third and both lateral ventricles.","With the aqueduct blocked, CSF cannot reach the subarachnoid space in normal amounts; the backup is upstream in the ventricles.","The central canal is downstream and tiny; the dilation from an aqueduct block is in the lateral and third ventricles.","The superior sagittal sinus is where CSF is finally absorbed; it does not dilate from an aqueduct block."],"source":"L17 - Cerebral aqueduct / CSF pathway - ~44:54 and ~55:37","obj":"Aqueduct connects 3rd and 4th ventricles; block dilates 3rd + lateral ventricles","hint":"It tunnels through the midbrain between the 3rd and 4th ventricles."},{"q":"A patient loses vision in part of the visual field after an infarct of the occipital lobe. The occipital cortex is directly supplied by the posterior cerebral artery, but Maini stresses the blood originally comes from which arteries?","o":["The external carotid arteries","The vertebral arteries (via the basilar and posterior cerebral arteries)","The middle cerebral arteries","The internal carotid arteries directly"],"c":1,"cat":"Stroke & Vascular","r":["The external carotid supplies the face and scalp, not the occipital cortex.","Correct. The occipital lobe (visual cortex) is fed by the posterior cerebral artery, but Maini traces that blood back to the vertebral arteries, which unite to form the basilar artery that gives the posterior cerebrals.","The middle cerebral artery supplies the lateral cortex, not the occipital pole.","The internal carotids feed the anterior circulation; the occipital lobe is posterior (vertebro-basilar) territory."],"source":"L17 - Occipital supply / vertebro-basilar - ~01:11:05 and ~01:06:46","obj":"Occipital lobe blood originates from the vertebral arteries","hint":"Trace the posterior cerebral artery all the way back to the vertebrals."}];

<script>
/* DC Drill Telemetry v1
 *
 * Wraps the two globals every DC MC-drill engine exposes — pick(i) and
 * showSummary() — and reports three events through the analytics helper:
 *   drill_started    once, on the first answered question
 *   q_answered       {h, stem, c, t_ms}  first attempt per question per load
 *   drill_completed  {answered, correct, pct, duration_s}
 *
 * Correct/wrong is read back off the option element AFTER the engine marks it,
 * so this never re-implements (or can disagree with) the engine's own scoring.
 * Counters are kept here rather than scraped from the summary markup, which
 * differs between drill families.
 *
 * Families covered:
 *   A  .opt-btn  + picked-correct / picked-wrong  + stem in .q-text
 *   B  .option   + correct        / wrong         + stem in .question
 *
 * No-ops safely if the helper or the engine globals are absent.
 */
(function () {
  'use strict';
  if (window.__dcDrillTelemetry) return;
  window.__dcDrillTelemetry = true;

  var OPT_SEL = '.opt-btn, .option';
  var STEM_SEL = '.q-text, .question';
  var OK_CLASSES = ['picked-correct', 'correct'];
  var BAD_CLASSES = ['picked-wrong', 'wrong'];

  var started = false;
  var completed = false;
  var startTs = Date.now();
  var shownTs = Date.now();
  var seen = {};            // stem-hash -> true; first attempt only
  var answered = 0;
  var correct = 0;
  var totalQ = null;

  function send(type, payload) {
    try {
      if (window.__dcAnalytics && window.__dcAnalytics.send) {
        window.__dcAnalytics.send(type, payload);
      }
    } catch (e) {}
  }

  // djb2. Case/punctuation/whitespace-insensitive so the id survives the
  // engine's shuffling and re-rendering.
  function stemHash(s) {
    var h = 5381;
    var t = (s || '').toLowerCase().replace(/[^a-z0-9]+/g, ' ').trim();
    for (var i = 0; i < t.length; i++) { h = ((h << 5) + h + t.charCodeAt(i)) >>> 0; }
    return ('00000000' + h.toString(16)).slice(-8);
  }

  // Family A prefixes the stem with "Q3 of 217: " — strip it, or the same
  // question hashes differently depending on where the shuffle put it.
  function readStem() {
    var el = document.querySelector(STEM_SEL);
    if (!el) return '';
    var raw = (el.textContent || '').replace(/\s+/g, ' ').trim();
    var m = raw.match(/^Q(\d+)\s+of\s+(\d+)\s*:\s*/i);
    if (m) { totalQ = parseInt(m[2], 10); raw = raw.slice(m[0].length); }
    return raw.trim();
  }

  // djb2 over the exact string (no normalization) — used to fingerprint image
  // bytes, where case and punctuation are significant.
  function rawHash(s) {
    var h = 5381;
    for (var i = 0; i < s.length; i++) { h = ((h << 5) + h + s.charCodeAt(i)) >>> 0; }
    return ('00000000' + h.toString(16)).slice(-8);
  }

  // Visual drills reuse one generic stem ("Identify the indicated structure.")
  // across every plate — the image is what distinguishes them. Fold an image
  // id into the hash so those questions don't collapse into one row.
  //
  // Plates are usually inlined as base64 data: URIs, where a "filename" is
  // meaningless (and its tail is a 1-2 char near-collision). For those,
  // fingerprint the bytes: length + head + tail, since same-encoder JPEGs can
  // share a long common prefix.
  function readImg() {
    var el = document.querySelector(STEM_SEL);
    if (!el) return '';
    var scope = (el.closest && el.closest('.card')) || el.parentElement;
    var img = scope && scope.querySelector ? scope.querySelector('img') : null;
    var src = img ? (img.getAttribute('src') || '') : '';
    if (!src) return '';
    if (/^data:/i.test(src)) {
      return 'd:' + rawHash(src.length + '|' + src.slice(0, 2000) + '|' + src.slice(-2000));
    }
    return src.split('?')[0].split('/').pop().slice(0, 60);
  }

  function hasToken(el, names) {
    for (var i = 0; i < names.length; i++) {
      if (el.classList.contains(names[i])) return true;
    }
    return false;
  }

  // A third engine family exists whose handler is pick(optionIndex, isCorrect)
  // and which has no showSummary(). Its marking semantics differ, so refuse to
  // wrap anything that isn't the single-argument pick(i) contract rather than
  // guess and mis-score it.
  var origPick = window.pick;
  if (typeof origPick === 'function' && origPick.length === 1) {
    window.pick = function (i) {
      var opts = document.querySelectorAll(OPT_SEL);
      // The engine early-returns when the question is already answered
      // (options carry .disabled). Mirror that test so a second click on an
      // answered question doesn't log a phantom attempt.
      var alreadyAnswered = !!(opts[0] && opts[0].classList.contains('disabled'));
      var stem = readStem();
      var img = readImg();

      var ret = origPick.apply(this, arguments);

      try {
        // Do NOT assume the argument is the DOM position. At least one engine
        // shuffles the option buttons and paints by a data-orig attribute, so
        // pick(origIdx) indexes the original bank, not the rendered order.
        // Instead, find whichever option the engine just marked — correct by
        // construction for every single-argument family.
        //
        // The engine also puts 'show-correct' on the right answer when you miss;
        // that's a distinct class token, so it never matches 'correct' here.
        var el = null;
        var after = document.querySelectorAll(OPT_SEL);
        for (var k = 0; k < after.length; k++) {
          if (hasToken(after[k], OK_CLASSES) || hasToken(after[k], BAD_CLASSES)) { el = after[k]; break; }
        }
        if (!alreadyAnswered && el && stem) {
          var isOk = hasToken(el, OK_CLASSES);
          var isBad = hasToken(el, BAD_CLASSES);
          if (isOk || isBad) {
            var h = stemHash(stem + '|' + img);
            if (!seen[h]) {
              seen[h] = true;
              answered++;
              if (isOk) correct++;
              if (!started) {
                started = true;
                send('drill_started', { total_q: totalQ });
              }
              send('q_answered', {
                h: h,
                stem: stem.slice(0, 80),
                img: img || undefined,
                c: isOk ? 1 : 0,
                t_ms: Math.min(Date.now() - shownTs, 600000)
              });
            }
            shownTs = Date.now();
          }
        }
      } catch (e) {}
      return ret;
    };
  }

  var origSummary = window.showSummary;
  if (typeof origSummary === 'function') {
    window.showSummary = function () {
      var ret = origSummary.apply(this, arguments);
      try {
        if (!completed && answered > 0) {
          completed = true;
          send('drill_completed', {
            answered: answered,
            correct: correct,
            pct: Math.round(100 * correct / answered),
            total_q: totalQ,
            duration_s: Math.min(Math.round((Date.now() - startTs) / 1000), 36000)
          });
        }
      } catch (e) {}
      return ret;
    };
  }
})();

</script>
