<script>
const BANK=[{"q":"A 5-year-old with chronic middle-ear effusion is scheduled for a myringotomy and tube. Into which quadrant of the tympanic membrane should the incision be made, and why?","o":["Posteroinferior quadrant, because no important structure lies behind it","Posterosuperior quadrant, because it is the thinnest part of the membrane","Anterosuperior quadrant, because it overlies the pars flaccida","Anteroinferior quadrant, because the cone of light marks a safe entry"],"c":0,"cat":"Tympanic Membrane & Myringotomy","r":["Correct. Maini names the posteroinferior quadrant as the preferred myringotomy site precisely because there is no important structure lying posterior to it.","The posterosuperior quadrant is dangerous, not preferred: the chorda tympani lies just behind it.","The anterosuperior quadrant is associated with the anterior malleolar fold and pars flaccida, not myringotomy.","The cone of light is a landmark in the anteroinferior quadrant but is not the reason a site is chosen; drainage is done posteroinferiorly."],"source":"Dr. Maini - The Ear (L22), ~12:18-14:28","quote":"Posterior inferior, because you do not have any important structure posterior to that.","obj":"Myringotomy - preferred site is the posteroinferior quadrant","hint":"Pick the quadrant with nothing dangerous lying behind it."},{"q":"During an ear procedure a scalpel accidentally punctures the POSTEROSUPERIOR quadrant of the tympanic membrane. Which structure lying just deep to that quadrant is most at risk?","o":["The stapedius muscle","The chorda tympani","The auditory tube opening","The tensor tympani tendon"],"c":1,"cat":"Tympanic Membrane & Myringotomy","r":["The stapedius sits on the pyramid of the posterior wall, not immediately behind this quadrant.","Correct. Maini warns the chorda tympani lies right behind the posterosuperior quadrant, so cutting there can damage it.","The auditory tube opens on the anterior wall, not behind the posterosuperior quadrant.","The tensor tympani runs to the malleus from the anterior wall region, not behind this quadrant."],"source":"Dr. Maini - The Ear (L22), ~11:40-12:13","quote":"There are chances that you may damage chorda tympani now, because chorda tympani is lying right posterior to posterior superior quadrant.","obj":"Chorda tympani is at risk behind the posterosuperior quadrant","hint":"It is the small nerve Maini says sits right behind that upper-back quadrant."},{"q":"You perform otoscopy on a patient's RIGHT ear. The tympanic membrane is healthy and you look for the light reflex (cone of light). At what clock position should it normally appear?","o":["At 12 o'clock, over the umbo","At 3 o'clock, over the anterior malleolar fold","At 5 o'clock, radiating anteroinferiorly","At 7 o'clock, radiating posteroinferiorly"],"c":2,"cat":"Otoscopy & TM Landmarks","r":["The umbo is the central depression, not the location of the cone of light.","The cone of light is an inferior reflex, not at the 3 o'clock position.","Correct. In the right ear the cone of light sits at 5 o'clock; in the left ear it sits at 7 o'clock. Maini flags this as a likely exam point.","7 o'clock is the LEFT-ear position; this patient's right ear should show 5 o'clock."],"source":"Dr. Maini - The Ear (L22), ~10:14-10:37","quote":"In the right ear, 5 o'clock. In the left ear, 7 o'clock. This can appear as a question in your exam.","obj":"Cone of light: right ear 5 o'clock, left ear 7 o'clock","hint":"Right ear is the smaller clock number of the two."},{"q":"Maini explains why a middle-ear collection should be drained early rather than being allowed to burst the eardrum on its own. Compared with a surgical myringotomy, a SPONTANEOUS tympanic membrane rupture is worse because it:","o":["Always destroys the ossicular chain","Converts the pars tensa into pars flaccida","Cannot be visualized on otoscopy","Has serrated, irregular margins that may not heal properly"],"c":3,"cat":"Tympanic Membrane & Myringotomy","r":["Maini does not say a spontaneous rupture always destroys the ossicles.","A rupture does not reclassify parts of the membrane; that is not the concern.","A perforation is in fact visible on otoscopy; that is not the reason it heals poorly.","Correct. Maini says a spontaneous rupture has serrated, irregular margins and will not heal properly, whereas a controlled myringotomy heals cleanly without a scar."],"source":"Dr. Maini - The Ear (L22), ~13:06-13:46","quote":"If tympanic membrane rupture spontaneously, it is going to have serrated margins, and it will not heal properly.","obj":"Spontaneous TM rupture - serrated margins, poor healing","hint":"Think about the shape of the torn edges compared to a clean surgical cut."},{"q":"A child with untreated otitis media now has redness, swelling, and tenderness over the bone just behind the ear. By what route did the infection most likely spread from the middle ear to reach this area?","o":["Forward through the auditory tube into the nasopharynx","Posteriorly through the aditus into the mastoid air cells","Medially through the oval window into the inner ear","Laterally through the external acoustic meatus"],"c":1,"cat":"Middle Ear Infection & Spread","r":["The auditory tube runs forward to the nasopharynx; it does not explain swelling behind the ear.","Correct. The middle ear communicates posteriorly with the mastoid antrum and its air cells through the aditus, so infection can spread there and cause mastoiditis.","The oval window leads inward to the inner ear, not to the bone behind the ear.","The external acoustic meatus is the outward canal, not a route to the mastoid."],"source":"Dr. Maini - The Ear (L22), ~16:38-17:16","quote":"If there is middle ear infection, it can also spread to mastoid process, causing mastoiditis.","obj":"Mastoiditis - spread via aditus to mastoid air cells","hint":"The mastoid is directly posterior; the doorway to it is the aditus."},{"q":"A child develops a middle-ear infection a few days after a severe sore throat. Which anatomical connection best explains how the infection traveled from the pharynx to the middle ear?","o":["The auditory (pharyngotympanic) tube from the nasopharynx","The internal acoustic meatus","The external acoustic meatus","The aqueduct of the vestibule"],"c":0,"cat":"Middle Ear Infection & Spread","r":["Correct. The middle ear connects to the nasopharynx by the auditory tube, so a pharyngeal infection can travel up it into the middle ear.","The internal acoustic meatus transmits nerves and the labyrinthine vessels; it is not a route from the pharynx.","The external acoustic meatus opens to the outside, not to the pharynx.","The aqueduct of the vestibule carries the endolymphatic duct toward the cranial cavity, not from the pharynx."],"source":"Dr. Maini - The Ear (L22), ~12:33-12:46","quote":"Because your middle ear is connected to nasopharynx, auditory tube. If there is severe pharyngeal infection, it may travel to middle ear.","obj":"Otitis media - spread from pharynx via auditory tube","hint":"Which tube physically links the throat to the middle ear?"},{"q":"A patient with a facial-nerve palsy complains that ordinary everyday sounds now seem uncomfortably loud. Loss of which muscle, and its nerve, explains this?","o":["Tensor tympani, supplied by V3","Stapedius, supplied by the facial nerve (VII)","Tensor veli palatini, supplied by V3","Stapedius, supplied by the glossopharyngeal nerve (IX)"],"c":1,"cat":"Facial Nerve & Stapedius Reflex","r":["Tensor tympani is supplied by V3, and its loss is not what Maini links to this symptom.","Correct. The stapedius is supplied by the facial nerve; when it stops working the protective damping is lost and the patient gets hyperacusis (sounds seem too loud).","Tensor veli palatini acts on the soft palate and auditory tube, not on ossicle damping.","The stapedius is supplied by the facial nerve, not the glossopharyngeal nerve."],"source":"Dr. Maini - The Ear (L22), ~36:51-37:02","quote":"What happens if stapedius muscle is not functioning? Hyperacusis.","obj":"Stapedius palsy (VII) causes hyperacusis","hint":"The tiny muscle on the stapes normally protects you from loud sound; its nerve is CN VII."},{"q":"At a loud concert, two small middle-ear muscles reflexly contract to protect the sensitive receptors. Which pairing correctly matches each muscle to its action in this auditory reflex?","o":["Tensor tympani pulls the stapes posteriorly; stapedius draws the eardrum medially","Both muscles open the auditory tube to vent the pressure","Tensor tympani draws the tympanic membrane medially; stapedius pulls the head of the stapes posteriorly","Tensor tympani vibrates the oval window; stapedius closes the round window"],"c":2,"cat":"Facial Nerve & Stapedius Reflex","r":["The actions are swapped: tensor tympani works on the eardrum and stapedius works on the stapes.","Neither muscle opens the auditory tube; they stiffen the conducting chain.","Correct. Tensor tympani draws the tympanic membrane medially to tense it, and stapedius pulls the head of the stapes posteriorly, damping vibration. Together this is the protective auditory reflex.","Neither muscle acts on the windows in this way; that is not their described action."],"source":"Dr. Maini - The Ear (L22), ~35:08-36:51","quote":"These two muscles, they contract when you're surrounded by very loud noises. This is called as auditory reflex.","obj":"Auditory reflex - tensor tympani tenses eardrum, stapedius damps stapes","hint":"Tensor works on the drum; stapedius works on the stirrup."},{"q":"A muscle inside the middle ear tenses the eardrum and develops from the first pharyngeal arch. It shares its motor nerve with the muscles of mastication. Which muscle is it, and which nerve supplies it?","o":["Stapedius, supplied by the facial nerve","Salpingopharyngeus, supplied by the vagus","Tensor veli palatini, supplied by the facial nerve","Tensor tympani, supplied by V3 (nerve to medial pterygoid)"],"c":3,"cat":"Facial Nerve & Stapedius Reflex","r":["The stapedius is a second-arch, facial-nerve muscle, and it acts on the stapes, not primarily the eardrum.","Salpingopharyngeus is a pharyngeal muscle supplied by the vagus, not a tensor of the eardrum.","Tensor veli palatini is supplied by V3, but it acts on the soft palate, not the tympanic membrane.","Correct. Tensor tympani is a first-arch muscle innervated by V3 (via the nerve to medial pterygoid) and it tenses the tympanic membrane."],"source":"Dr. Maini - The Ear (L22), ~32:06-32:19","quote":"It gets innervated by V3, that is nerve to medial pterygoid.","obj":"Tensor tympani - first arch, V3 (nerve to medial pterygoid)","hint":"First arch means trigeminal; the eardrum-tenser shares a nerve with the pterygoids."},{"q":"On an airplane descent a passenger's ears feel blocked and hearing is muffled. She yawns and performs a Valsalva maneuver and the fullness clears. What did this maneuver accomplish?","o":["It opened the auditory tube so air could pass and equalize pressure across the tympanic membrane","It contracted the stapedius to stiffen the eardrum against the pressure","It drained endolymph through the round window","It increased cerumen secretion to cushion the eardrum"],"c":0,"cat":"Auditory Tube & Pressure","r":["Correct. Yawning or a Valsalva forces air through the auditory tube into the middle ear, equalizing the pressure on the two sides of the tympanic membrane.","The stapedius damps loud sound; it does not equalize barometric pressure.","Endolymph is not drained by this maneuver, and the round window does not vent it.","Cerumen is made in the external canal and has nothing to do with pressure equalization."],"source":"Dr. Maini - The Ear (L22), ~32:37-34:05","quote":"You just yawn, and the air pressure is equalized, and when you yawn, air is pushed through this auditory tube into the middle ear cavity.","obj":"Auditory tube equalizes pressure across the tympanic membrane","hint":"Which tube lets outside air reach the middle ear to balance the drum?"},{"q":"After a prolonged bout of flu a patient notices a nasal twang to her voice, which Maini attributes to blockage of a particular tube by secretions. Which structure is blocked?","o":["The external acoustic meatus","The auditory (pharyngotympanic / eustachian) tube","The nasolacrimal duct","The aqueduct of the vestibule"],"c":1,"cat":"Auditory Tube & Pressure","r":["The external acoustic meatus is the outer sound canal; blocking it does not cause a nasal twang.","Correct. Prolonged flu can drive secretions into the auditory tube and block it, producing the nasal twang Maini describes.","The nasolacrimal duct drains tears; it is unrelated to this voice change.","The aqueduct of the vestibule is an inner-ear channel, not the blocked tube."],"source":"Dr. Maini - The Ear (L22), ~37:06-37:33","quote":"Sometimes there is blockage of this tube when you have flu for too long. Secretions, they enter this tube, and they block this tube, and we have that nasal twang in the voice.","obj":"Auditory tube blockage - nasal twang after flu","hint":"It is the same tube you pop on an airplane, connecting middle ear to nasopharynx."},{"q":"Maini repeatedly cautions students not to confuse two S-shaped passages of the ear. Which one is for PRESSURE EQUALIZATION (not sound conduction), and what does the other one do?","o":["The external acoustic meatus equalizes pressure; the auditory tube conducts sound","Both tubes conduct sound equally","The auditory tube equalizes pressure; the external acoustic meatus conducts sound waves to the eardrum","The auditory tube conducts sound; the external acoustic meatus equalizes pressure"],"c":2,"cat":"Auditory Tube & Pressure","r":["This reverses the two: the external meatus conducts sound, and the auditory tube handles pressure.","They do not have the same job; that is exactly the confusion Maini warns against.","Correct. Despite its name, the auditory tube is for pressure equalization, while the external acoustic meatus is the canal that conducts sound waves to the tympanic membrane.","This reverses the roles; the auditory tube does not conduct sound."],"source":"Dr. Maini - The Ear (L22), ~34:37-35:04","quote":"Auditory tube has got nothing to do with hearing. It's for pressure equalization.","obj":"Auditory tube = pressure; external acoustic meatus = sound conduction","hint":"The one with the misleading name actually handles air pressure."},{"q":"A patient's eardrum vibrates when sound enters the ear canal. Trace the correct order in which those vibrations are transmitted onward to the inner-ear fluid.","o":["Tympanic membrane, stapes, incus, malleus, round window","Oval window, stapes, incus, malleus, tympanic membrane","Tympanic membrane, incus, malleus, stapes, round window","Tympanic membrane, malleus, incus, stapes, footplate at the oval window, perilymph"],"c":3,"cat":"Sound Conduction Chain","r":["The ossicle order is reversed, and the chain ends at the oval window, not the round window.","This runs the chain backward, starting at the oval window.","Malleus and incus are out of order, and vibrations enter at the oval window, not the round window.","Correct. Vibration passes tympanic membrane to malleus to incus to stapes, then the stapes footplate rocks in the oval window and sets the perilymph in motion."],"source":"Dr. Maini - The Ear (L22), ~30:44-31:00","quote":"Those vibrations are transmitted to malleus, incus, stapes, footplate of stapes, inner ear.","obj":"Sound conduction chain - malleus, incus, stapes, oval window, perilymph","hint":"Largest ossicle first (attached to the drum), then in toward the oval window."},{"q":"Which single ossicle serves as the direct mechanical gateway from the air-filled middle ear into the fluid-filled inner ear, and by what feature?","o":["The stapes, whose footplate sits in the oval window (fenestra vestibuli)","The malleus, whose handle sits in the round window","The incus, whose long process sits in the oval window","The malleus, whose head sits in the aditus"],"c":0,"cat":"Ossicles & Windows","r":["Correct. The footplate of the stapes occupies the oval window, so the stapes is the ossicle that transmits vibration into the inner-ear perilymph.","The malleus attaches to the tympanic membrane, not the round window.","The incus articulates with the stapes but does not itself sit in the oval window.","The malleus head articulates with the incus in the cavity; it is not in the aditus."],"source":"Dr. Maini - The Ear (L22), ~30:35-30:44","quote":"The footplate of stapes, it is located within the oval window. Oval window is the window to internal ear.","obj":"Stapes footplate in the oval window - gateway to the inner ear","hint":"The stirrup-shaped bone plugs the oval window."},{"q":"As the stapes footplate pushes perilymph in at the oval window, the fluid wave must have somewhere to give way at the other end. Which structure serves as this pressure-release point?","o":["The oval window, sealed again by the stapes","The round window (fenestra cochlea), closed by the secondary tympanic membrane","The tegmen tympani","The helicotrema opening into the middle ear"],"c":1,"cat":"Ossicles & Windows","r":["The oval window is the entry point being pushed in; it cannot simultaneously be the release.","Correct. The round window is closed by the secondary tympanic membrane and bulges to relieve the perilymph wave that the stapes drives in at the oval window.","The tegmen tympani is the bony roof of the cavity, not a fluid-release window.","The helicotrema connects the two perilymph scalae at the apex; it does not open into the middle ear."],"source":"GA 0202 - The Ear (audited module bank): windows of the medial wall; round window / secondary tympanic membrane","quote":"","obj":"Round window (secondary tympanic membrane) - pressure release for perilymph","hint":"The two windows work as a push-pull pair; one goes in, the membrane over the other bulges out."},{"q":"After years of chronic ear infections a patient has a thickened, fibrosed tympanic membrane. Maini says this leads to a specific functional problem. What is it, and why?","o":["Vertigo, because the semicircular canals stiffen","Loss of taste, because the chorda tympani is stretched","Hearing impairment, because a stiff drum cannot vibrate and pass sound to the ossicles","Facial paralysis, because the facial canal is compressed"],"c":2,"cat":"Sound Conduction Chain","r":["The tympanic membrane is not a balance organ; a stiff drum does not cause vertigo.","A fibrosed drum does not primarily produce taste loss.","Correct. Maini says a ruptured, thickened, or fibrosed tympanic membrane leads to hearing impairment because the drum can no longer vibrate properly to drive the ossicles.","The facial canal is a separate bony structure; drum fibrosis does not paralyze the face."],"source":"Dr. Maini - The Ear (L22), ~13:46-14:07","quote":"If your tympanic membrane is ruptured, or is thickened, or fibrosed, there is hearing impairment. Patient is not able to hear properly.","obj":"Thickened/fibrosed tympanic membrane causes hearing impairment","hint":"A drum that cannot vibrate cannot pass the sound inward."},{"q":"While cleaning his ear canal with a cotton swab, a patient suddenly feels a tickle in his throat and coughs. Stimulation of which nerve supplying the external acoustic meatus explains this reflex?","o":["The great auricular nerve","The auriculotemporal nerve (V3)","The glossopharyngeal nerve alone","The auricular branch of the vagus nerve"],"c":3,"cat":"Nerve Supply & Referred Sensation","r":["The great auricular nerve supplies the auricle skin, not the throat reflex from canal stimulation.","The auriculotemporal nerve also supplies the canal, but Maini attributes the throat/cough sensation specifically to the vagus.","The glossopharyngeal contributes to the tympanic membrane region, but the throat sensation here is a vagal reflex.","Correct. The auricular branch of the vagus carries GSA fibers from the external acoustic meatus, so stimulating the canal triggers a vagal throat/cough sensation."],"source":"Dr. Maini - The Ear (L22), ~8:07-8:42","quote":"Auricular branch of vagus nerve carries GSA fibers from your external acoustic meatus. That is why sometimes you're cleaning your external tube, you get this irritating sensation in your throat.","obj":"Auricular branch of vagus (Arnold) - ear-canal to throat reflex","hint":"The wandering nerve links the ear canal to the throat."},{"q":"A patient has numbness over the lower part of the auricle after a superficial neck injury. Which nerve, and from which plexus, most likely accounts for sensation lost over the auricle?","o":["The great auricular nerve, from the cervical plexus","The facial nerve, from the pons","The auricular branch of the vagus, from the jugular foramen","The lesser petrosal nerve, from the tympanic plexus"],"c":0,"cat":"Nerve Supply & Referred Sensation","r":["Correct. The great auricular nerve, a branch of the cervical plexus, provides sensory supply to the auricle and travels up the neck with the external jugular vein.","The facial nerve is mainly motor to the auricular muscles, not the main sensory supply to the auricle.","The auricular branch of the vagus supplies the external acoustic meatus, not the general skin of the auricle.","The lesser petrosal nerve is a secretomotor pathway to the parotid, not auricular skin sensation."],"source":"Dr. Maini - The Ear (L22), ~3:34-3:56","quote":"The sensory nerve supply is provided by great auricular nerve. Remember the nerve that passes along with external jugular vein.","obj":"Great auricular nerve (cervical plexus) - sensory to the auricle","hint":"It runs up the neck alongside the external jugular vein."},{"q":"Sensory innervation of the ear is shared among several nerves. Which nerve supplies the EXTERNAL surface of the tympanic membrane and much of the external acoustic meatus?","o":["The glossopharyngeal nerve (IX)","The auriculotemporal branch of V3","The facial nerve (VII)","The great auricular nerve"],"c":1,"cat":"Nerve Supply & Referred Sensation","r":["The glossopharyngeal nerve supplies the INTERNAL (medial) surface of the tympanic membrane, not the external surface.","Correct. The auriculotemporal branch of V3 supplies the external surface of the tympanic membrane and the external acoustic meatus (with the auricular branch of the vagus).","The facial nerve gives only a tiny, debated skin patch near the meatus, not the main external supply.","The great auricular nerve supplies auricular skin, not the external surface of the eardrum."],"source":"Dr. Maini - The Ear (L22), ~7:56-8:07 and ~15:00","quote":"Externally, by auriculotemporal branch of V3, and auricular branch of vagus, internally by the 9th nerve.","obj":"Auriculotemporal (V3) - external surface of tympanic membrane and meatus","hint":"Same V3 branch that supplies the temple region also reaches the ear canal."},{"q":"During middle-ear surgery the surgeon is warned that a cranial nerve runs in a bony canal forming part of the medial and posterior walls of the tympanic cavity. Which nerve is this?","o":["The glossopharyngeal nerve in the tympanic canaliculus","The trigeminal nerve in the foramen ovale","The facial nerve in the facial canal","The vagus nerve in the jugular foramen"],"c":2,"cat":"Passages, Nerves & Vessels","r":["The glossopharyngeal tympanic branch forms a plexus on the promontory, but the bony canal along these walls houses the facial nerve.","The trigeminal at the foramen ovale is far from the tympanic-cavity walls.","Correct. The facial canal, which carries the facial nerve, forms part of the medial and posterior walls of the tympanic cavity, so the nerve is vulnerable in middle-ear disease and surgery.","The vagus passes through the jugular foramen below, not in the wall of the middle ear."],"source":"Dr. Maini - The Ear (L22), ~22:01-22:38","quote":"Facial canal is a part of medial as well as posterior wall of the tympanic cavity.","obj":"Facial nerve in the facial canal - medial and posterior walls of middle ear","hint":"It is the nerve that later exits the skull at the stylomastoid foramen."},{"q":"A branch of a cranial nerve enters the middle ear, spreads as a plexus over the promontory, then leaves to reach the otic ganglion and ultimately the parotid gland. Trace this pathway correctly.","o":["Greater petrosal nerve to the tympanic plexus to the pterygopalatine ganglion","Chorda tympani to the tympanic plexus to the submandibular ganglion","Great auricular nerve to the tympanic plexus to the parotid","Tympanic branch of IX to the tympanic plexus to the lesser petrosal nerve to the otic ganglion to the parotid"],"c":3,"cat":"Passages, Nerves & Vessels","r":["The greater petrosal nerve is a facial-nerve branch heading to the pterygopalatine ganglion, not this glossopharyngeal pathway.","The chorda tympani carries taste and heads to the submandibular ganglion, not the otic ganglion for the parotid.","The great auricular nerve is a cutaneous cervical-plexus nerve; it does not form the tympanic plexus.","Correct. The tympanic branch of the glossopharyngeal nerve forms the tympanic plexus on the promontory, then continues as the lesser petrosal nerve to the otic ganglion and on to the parotid gland."],"source":"Dr. Maini - The Ear (L22), ~26:33-27:54","quote":"Tympanic branch enters the middle ear, forms tympanic plexus, and then it forms lesser petrosal, that goes to otic ganglion, auriculotemporal, and parotid gland.","obj":"Tympanic branch of IX - tympanic plexus - lesser petrosal - otic ganglion - parotid","hint":"Glossopharyngeal in, lesser petrosal out, otic ganglion, then the parotid."},{"q":"Imaging shows a small mass at the internal acoustic meatus. Which set of structures normally passes through this meatus and could be affected?","o":["Cranial nerves VII and VIII plus the labyrinthine artery and vein","Cranial nerves IX, X, and XI","The chorda tympani and the tympanic nerve","The maxillary artery and the middle meningeal artery"],"c":0,"cat":"Passages, Nerves & Vessels","r":["Correct. The internal acoustic meatus transmits the facial nerve (VII) and vestibulocochlear nerve (VIII) together with the labyrinthine vessels.","Cranial nerves IX, X, and XI pass through the jugular foramen, not the internal acoustic meatus.","The chorda tympani and tympanic nerve travel in the middle ear region, not through the internal acoustic meatus.","The maxillary and middle meningeal arteries belong to the infratemporal fossa and middle cranial fossa."],"source":"GA 0202 - The Ear (audited module bank): internal acoustic meatus contents","quote":"","obj":"Internal acoustic meatus transmits CN VII, CN VIII, and labyrinthine vessels","hint":"Two cranial nerves - one for the face, one for hearing and balance - plus their artery."},{"q":"A patient reports spinning vertigo brought on by rapidly turning the head. Which inner-ear sensory apparatus detects this angular (rotational) motion?","o":["The maculae of the utricle and saccule","The cristae ampullares of the semicircular ducts","The organ of Corti in the cochlear duct","The spiral ganglion in the modiolus"],"c":1,"cat":"Vestibular Function & Balance","r":["The maculae of the utricle and saccule sense static position and linear acceleration, not rotation.","Correct. The cristae ampullares in the ampullae of the semicircular ducts detect angular/rotational acceleration (dynamic equilibrium), which is what head turning stimulates.","The organ of Corti is for hearing, not for balance.","The spiral ganglion houses hearing neurons, not motion receptors."],"source":"GA 0202 - The Ear (audited module bank): semicircular ducts / crista ampullaris - dynamic equilibrium","quote":"","obj":"Semicircular ducts (crista ampullaris) sense rotational acceleration","hint":"Three loops set at right angles handle spinning; the receptor sits in the ampulla."},{"q":"As an elevator accelerates straight upward, the rider senses the vertical linear motion. Which vestibular receptor, oriented to detect vertical linear acceleration, is chiefly responsible?","o":["The crista ampullaris of the lateral semicircular duct","The organ of Corti","The macula of the saccule (oriented vertically)","The tectorial membrane of the cochlea"],"c":2,"cat":"Vestibular Function & Balance","r":["The crista ampullaris detects rotation, not straight-line vertical acceleration.","The organ of Corti is a hearing receptor, not a motion detector.","Correct. Maini describes the macula sacculi as vertically oriented, so it best detects vertical linear acceleration and deceleration, such as riding an elevator.","The tectorial membrane belongs to the hearing apparatus, not to balance."],"source":"GA 0202 - The Ear (audited module bank): macula sacculi vertical, macula utriculi horizontal","quote":"","obj":"Macula sacculi (vertical) - vertical linear acceleration","hint":"Vertical macula for a vertical elevator ride."},{"q":"A clinician wants to test the vestibular labyrinth (not hearing) in a dizzy patient by irrigating the ear canal with warm and cold water. Which test is this, and which tests instead assess hearing?","o":["It is Rinne's test; Weber's and caloric test hearing","It is Weber's test; caloric and Rinne test balance","It is the tuning-fork test; the caloric test assesses taste","It is the caloric test (vestibular); Weber's and Rinne's tests assess hearing"],"c":3,"cat":"Clinical Tests","r":["Rinne's test uses a tuning fork for hearing, not water irrigation for balance.","Weber's test is a tuning-fork hearing test, not a caloric balance test.","The caloric test assesses vestibular function, not taste.","Correct. The caloric (warm/cold irrigation) test assesses vestibular function, whereas Weber's and Rinne's tests are the hearing tests Maini groups together."],"source":"GA 0202 - The Ear (audited module bank): Weber/Rinne test hearing; caloric tests vestibular function","quote":"","obj":"Caloric test = vestibular; Weber and Rinne = hearing","hint":"Water in the canal spins the balance organ; tuning forks test hearing."},{"q":"An audiologist explains that the cochlea maps sound frequency along its length. Where along the basilar membrane are LOW-frequency sounds detected?","o":["Near the apex, close to the helicotrema","Near the base, close to the oval window","Uniformly along the entire membrane at once","Only at the round window"],"c":0,"cat":"Cochlea & Pitch","r":["Correct. Maini describes low-frequency sounds stimulating the basilar membrane near the apex, close to the helicotrema.","The base, near the oval window, responds to high-frequency sound, not low.","Pitch is mapped by location; it is not detected everywhere simultaneously.","The round window is a pressure-release point, not a pitch-detection site."],"source":"GA 0202 - The Ear (audited module bank): cochlear tonotopy - low frequency near the apex/helicotrema","quote":"","obj":"Cochlear tonotopy - low frequencies near the apex (helicotrema)","hint":"Low notes travel farthest, out to the tip of the cochlear spiral."},{"q":"At the cellular level in the organ of Corti, what mechanical event immediately triggers an action potential in the cochlear hair cells?","o":["Contraction of the stapedius pulling the stapes","Bending of the hair-cell cilia against the tectorial membrane as the basilar membrane vibrates","Movement of otoliths within the otolithic membrane","Opening of the auditory tube to vent pressure"],"c":1,"cat":"Cochlea & Pitch","r":["Stapedius contraction damps sound in the middle ear; it does not generate the cochlear receptor potential.","Correct. As the basilar membrane vibrates, the hair-cell cilia are bent against the overlying tectorial membrane, and this distortion triggers the action potential.","Otoliths move in the maculae of the vestibule (balance), not in the cochlear hearing receptors.","The auditory tube handles pressure, not hair-cell stimulation."],"source":"GA 0202 - The Ear (audited module bank): hair-cell cilia bend against the tectorial membrane","quote":"","obj":"Hair-cell cilia bend against the tectorial membrane to trigger the impulse","hint":"The moving floor (basilar membrane) drags the cilia against the fixed roof (tectorial membrane)."}];

ion')+'</button>'+renderJumpBar()+'<button class="btn-nav-toggle" onclick="toggleInstr()" style="border-color:#334155">'+(instrOpen?'\u25bc Hide Instructions':'\u25b6 How This Drill Works')+'</button>'+(instrOpen?'<div class="instructions" style="display:block"><h3>How This Drill Works</h3><ul><li>Answer each question by clicking A/B/C/D</li><li><span class="key">Re-ask system</span>: Missed questions come back later so you must <strong>get it right twice</strong></li><li><span class="key">Question Navigator</span>: Click any cell to jump to or review that question</li><li><span class="key">Jump to Question</span>: Quick milestone markers</li><li><span class="key">Previous button</span>: Browse back through answered questions</li><li>Every answer reveals: rationale, source, Dr. Maini quote, professor tip, and <strong>study guide item</strong></li><li>Progress is <strong>auto-saved</strong></li><li>At the end: category breakdown + <strong>Review Only Missed</strong></li></ul></div>':'')+'<div class="progress-track"><div class="progress-fill" style="width:'+pct+'%"></div></div><div class="card"><span class="cat-badge">'+q.cat+(q._isReask?' \ud83d\udd01 RE-ASK':'')+'</span><div class="q-text">Q'+(idx+1)+' of '+questions.length+': '+q.q+'</div>'+(q.hint?'<button class="btn-hint" onclick="this.nextElementSibling.style.display=\'block\';this.style.display=\'none\'">\ud83d\udca1 Show Hint</button><div class="hint-text" style="display:none">\ud83d\udca1 '+q.hint+'</div>':'')+optHTML+'<div class="source-line" id="srcLine"><span>Source:</span> '+q.source+'</div>'+(q.quote?'<div class="quote-line" id="quoteLine">'+q.quote+'</div>':'')+(q.profTip?'<div class="prof-tip" id="tipLine"><span class="tip-label">Professor:</span> '+q.profTip+'</div>':'')+(q.obj?'<div class="obj-tag" id="objTag">'+q.obj+'</div>':'')+'<div class="btn-group" id="btnGroup"><button class="btn-prev" onclick="prevAnswer()"'+(answerHistory.length===0?' disabled':'')+'>\u2190 Previous</button><button class="btn-next" id="btnNext" onclick="nextQ()">Next Question \u2192</button></div></div>';}
function pick(i){let q=questions[idx];let opts=document.querySelectorAll('.opt-btn');if(opts[0]&&opts[0].classList.contains('disabled'))return;opts.forEach(function(o){o.classList.add('disabled');o.onclick=null;});let correct=q.c;let isCorrect=i===correct;opts[i].classList.add(isCorrect?'picked-correct':'picked-wrong');if(!isCorrect)opts[correct].classList.add('show-correct');attempts++;if(!catStats[q.cat])catStats[q.cat]={c:0,t:0};catStats[q.cat].t++;if(isCorrect){score++;catStats[q.cat].c++;}else{reaskQueue.push(Object.assign({},q,{_isReask:true}));}if(q._bankId!==undefined){if(!(q._bankId in answerMap)){answerMap[q._bankId]={picked:i,correct:correct,isCorrect:isCorrect,attempts:1,everWrong:!isCorrect};}else{let m=answerMap[q._bankId];m.picked=i;m.isCorrect=isCorrect;m.attempts++;if(!isCorrect)m.everWrong=true;}}if(!answerHistory.includes(q._bankId))answerHistory.push(q._bankId);for(let j=0;j<q.o.length;j++){let r=document.getElementById('rat'+j);if(r)r.style.display='block';}let sl=document.getElementById('srcLine');if(sl)sl.style.display='block';let ql=document.getElementById('quoteLine');if(ql)ql.style.display='block';let tl=document.getElementById('tipLine');if(tl)tl.style.display='block';let ot=document.getElementById('objTag');if(ot)ot.style.display='block';let nb=document.getElementById('btnNext');if(nb)nb.style.display='inline-block';saveState();}
function nextQ(){idx++;render();saveState();}
function prevAnswer(){if(answerHistory.length===0)return;browseIdx=answerHistory.length-1;renderHistoryItem();}
function showSummary(){let app=document.getElementById('app');let uniqueAnswered=Object.keys(answerMap).length;let mastered=0;let everWrongCount=0;for(let k in answerMap){if(answerMap[k].isCorrect)mastered++;if(answerMap[k].everWrong)everWrongCount++;}let pct=uniqueAnswered>0?Math.round(mastered/uniqueAnswered*100):0;let cls=pct>=85?'great':pct>=65?'ok':'rough';let catHTML='<table class="cat-table"><tr><th>Study Guide Item</th><th>Score</th></tr>';for(let cat of CAT_NAMES){if(catStats[cat]&&catStats[cat].t>0)catHTML+='<tr><td>'+cat+'</td><td>'+catStats[cat].c+'/'+catStats[cat].t+'</td></tr>';}catHTML+='</table>';app.innerHTML='<h1>📋 GA 0202 · The Ear · Clinical Cases & Must-Knows</h1><p class="subtitle">Dr. Maini · applied board-style ear vignettes: lesions, otoscopy, middle-ear spread, nerve palsies, pressure &amp; balance</p><div class="edge-voice-note">🔊 Best voices in Microsoft Edge (it has the natural Ava / Emma / Andrew voices). Other browsers work but sound more robotic.</div><div class="summary" style="display:block"><h2>Quiz Complete!</h2><div class="pct '+cls+'">'+pct+'%</div><p style="color:#94a3b8">'+mastered+' of '+uniqueAnswered+' mastered on latest attempt</p><p class="detail">Attempts: '+attempts+' | Ever missed: '+everWrongCount+' | Re-asked: '+(attempts-uniqueAnswered)+'</p>'+catHTML+(everWrongCount>0?'<button class="review-btn" onclick="reviewMissed()">Review Only Missed ('+everWrongCount+')</button>':'')+'<br><button class="restart-btn" onclick="restart()">Restart Drill</button></div>';}
function reviewMissed(){let missed=answerHistory.filter(function(id){return answerMap[id]&&answerMap[id].everWrong;});if(missed.length===0)return;reviewList=missed;browseIdx=0;renderHistoryItem();}
function restart(){questions=shuffle(BANK.slice());idx=0;score=0;attempts=0;reaskQueue=[];answerMap={};answerHistory=[];browseIdx=-1;reviewList=null;CAT_NAMES.forEach(function(c){catStats[c]={c:0,t:0};});render();saveState();}
function confirmRestart(){if(confirm('Restart the drill? All progress will be lost.'))restart();}
function toggleInstr(){instrOpen=!instrOpen;if(browseIdx>=0)renderHistoryItem();else render();}
init();
</script>

<script>
const TIMESTAMPS=[];
var audioAutoPlay=true;

// Follow-along mode
var _origShuffle=shuffle;
var followMode=true;
var reaskMode=true;
shuffle=function(a){return followMode?a:_origShuffle(a);};

// ── Persistent audio bar: survives every render() + renderHistoryItem() call ──
var _audioBar=null;
function _buildAudioBar(){
  var ab=document.createElement('div');
  ab.id='audio-bar';
  ab.className='audio-bar';
  ab.innerHTML='<audio id="mk-audio" controls preload="none"><source src="https://dgsc23.github.io/dc-study-audio/fab-201-m02-shoulder-forearm-L04.mp3" type="audio/mpeg">Audio not found. Place MP3 in same folder.</audio>'
    +'<div class="audio-info">'
    +'<span class="timestamp-badge" id="ts-badge">⏱ --:--</span>'
    +'<div class="skip-btns">'
    +'<button class="btn-skip" onclick="skipAudio(-30)" title="Back 30s">⏪ 30</button>'
    +'<button class="btn-skip" onclick="skipAudio(-10)" title="Back 10s">⏪ 10</button>'
    +'<button class="btn-play-here" onclick="playFromHere()">▶ Play From Here</button>'
    +'<button class="btn-skip" onclick="skipAudio(10)" title="Forward 10s">10 ⏩</button>'
    +'<button class="btn-skip" onclick="skipAudio(30)" title="Forward 30s">30 ⏩</button>'
    +'</div>'
    +'<div class="audio-modes">'
    +'<label class="audio-auto-label"><input type="radio" name="amode" value="seek" onchange="setAudioMode(\'seek\')"> Seek per Q</label>'
    +'<label class="audio-auto-label"><input type="radio" name="amode" value="continuous" checked onchange="setAudioMode(\'continuous\')"> Continuous play</label>'
    +'<label class="audio-auto-label"><input type="radio" name="amode" value="off" onchange="setAudioMode(\'off\')"> Audio off</label>'
    +'</div>'
      +'<div class=\"speed-block\"><div class=\"speed-top\"><span class=\"speed-label\">Speed</span><button class=\"btn-speed-pm\" onclick=\"fabSetSpeed(fabCurrentSpeed - 0.05)\">&minus;.05</button><span class=\"speed-val\" id=\"speed-display\">1.00x</span><button class=\"btn-speed-pm\" onclick=\"fabSetSpeed(fabCurrentSpeed + 0.05)\">+.05</button></div><div class=\"speed-presets\"><button class=\"btn-speed-preset\" onclick=\"fabSetSpeed(0.5)\">0.5x</button><button class=\"btn-speed-preset\" onclick=\"fabSetSpeed(0.75)\">0.75x</button><button class=\"btn-speed-preset\" onclick=\"fabSetSpeed(0.9)\">0.9x</button><button class=\"btn-speed-preset active\" onclick=\"fabSetSpeed(1.0)\">1x</button><button class=\"btn-speed-preset\" onclick=\"fabSetSpeed(1.1)\">1.1x</button><button class=\"btn-speed-preset\" onclick=\"fabSetSpeed(1.25)\">1.25x</button><button class=\"btn-speed-preset\" onclick=\"fabSetSpeed(1.5)\">1.5x</button><button class=\"btn-speed-preset\" onclick=\"fabSetSpeed(2.0)\">2x</button></div></div><div class=\"transcript-toggle\"><button class=\"btn-transcript\" id=\"btn-transcript\" onclick=\"fabToggleTranscript()\">\ud83d\udcdc Transcript</button></div><div class=\"transcript-box\" id=\"transcript-box\"></div>'
    +'</div>';
  return ab;
}

function _ensureAudioAttached(){
  var app=document.getElementById('app');
  if(!app)return;
  if(!_audioBar)_audioBar=_buildAudioBar();
  var card=app.querySelector('.card');
  if(card&&_audioBar.parentNode!==card.parentNode){
    card.parentNode.insertBefore(_audioBar,card);
  } else if(!card&&_audioBar.parentNode!==app){
    // Summary screen — attach at top so audio keeps playing
    app.insertBefore(_audioBar,app.firstChild);
  }
  updateTimestampBadge();
}

// Override render to preserve audio across wipes
var _origRender=render;
render=function(){
  if(_audioBar&&_audioBar.parentNode){_audioBar.parentNode.removeChild(_audioBar);}
  _origRender();
  _ensureAudioAttached();

  // Toggle bar + re-ask banner (stateful — rebuild if missing)
  var app=document.getElementById('app');
  if(!document.getElementById('mk-toggle-bar')){
    var bar=document.createElement('div');
    bar.id='mk-toggle-bar';
    bar.className='follow-toggle';
    bar.innerHTML='<button class="follow-btn'+(followMode?' active':'')+'" onclick="setFollowMode(true)">📋 Original Order</button>'
      +'<button class="follow-btn'+(!followMode?' active':'')+'" onclick="setFollowMode(false)">🔀 Shuffle Mode</button>'
      +'<button class="reask-btn'+(reaskMode?' active':'')+'" onclick="toggleReask()">🚨 Re-Ask Missed</button>';
    var banner=document.createElement('div');
    banner.id='reask-banner';
    banner.className='reask-banner';
    var firstChild=app.firstChild;
    if(firstChild&&firstChild.nextSibling){
      app.insertBefore(banner,firstChild.nextSibling);
      app.insertBefore(bar,firstChild.nextSibling);
    }
  }
  buildReaskBar();

  // Re-ask card glow
  var card=document.querySelector('.card');
  if(card){
    var isReask=idx<questions.length&&questions[idx]&&questions[idx]._isReask;
    if(isReask){
      card.classList.add('reask-glow');
      if(!card.querySelector('.reask-card-badge')){
        var badge=document.createElement('div');
        badge.className='reask-card-badge';
        badge.textContent='🔁 RE-ASK — You missed this one. Get it right!';
        card.insertBefore(badge,card.firstChild);
      }
    } else {
      card.classList.remove('reask-glow');
    }
  }
};

// Override renderHistoryItem so Previous still shows the audio panel
var _origRenderHistory=renderHistoryItem;
renderHistoryItem=function(){
  if(_audioBar&&_audioBar.parentNode){_audioBar.parentNode.removeChild(_audioBar);}
  _origRenderHistory();
  _ensureAudioAttached();
};

// Override showSummary so audio panel survives end-of-drill screen too
var _origShowSummary=showSummary;
showSummary=function(){
  if(_audioBar&&_audioBar.parentNode){_audioBar.parentNode.removeChild(_audioBar);}
  _origShowSummary();
  _ensureAudioAttached();
};

function updateTimestampBadge(){
  var badge=document.getElementById('ts-badge');
  if(!badge)return;
  if(idx<questions.length&&questions[idx]){
    var bankId=questions[idx]._bankId;
    if(bankId!==undefined&&TIMESTAMPS[bankId]!==undefined){
      var ts=TIMESTAMPS[bankId];
      var m=Math.floor(ts/60);
      var s=Math.floor(ts%60);
      badge.textContent='⏱ '+m+':'+(s<10?'0':'')+s;
    } else {
      badge.textContent='⏱ --:--';
    }
  }
}

var audioMode='continuous';

function playFromHere(){
  var audio=document.getElementById('mk-audio');
  if(!audio||idx>=questions.length)return;
  var bankId=questions[idx]._bankId;
  if(bankId===undefined||TIMESTAMPS[bankId]===undefined)return;
  var seekTo;if(TIMESTAMPS[bankId]===undefined||TIMESTAMPS[bankId]<=0){var f=null;for(var di=1;di<TIMESTAMPS.length;di++){var hi=bankId+di,lo=bankId-di;if(TIMESTAMPS[hi]>0){f=TIMESTAMPS[hi];break;}if(TIMESTAMPS[lo]>0){f=TIMESTAMPS[lo];break;}}if(f===null)return;seekTo=Math.max(0,f-2);}else{seekTo=Math.max(0,TIMESTAMPS[bankId]-2);}
  // FAB M01 lectures.mp3 split: L01 (0-4800s, 80min) / L02 (4800-10817s, 100min) / L03 (10817-18943s, 135min).
  // Swap audio source if needed BEFORE seeking, since each lecture file is its own duration.
  var L01='https://dgsc23.github.io/dc-study-audio/fab-201-m02-shoulder-forearm-L04.mp3';
  var L02='https://dgsc23.github.io/dc-study-audio/fab-201-m02-shoulder-forearm-L05.mp3';
  var L03='https://dgsc23.github.io/dc-study-audio/fab-201-m02-shoulder-forearm-L06.mp3';
  var s=audio.querySelector('source');
  var part=seekTo<4800?'L01':(seekTo<10817?'L02':'L03');
  var targetURL=part==='L01'?L01:(part==='L02'?L02:L03);
  var targetSec=part==='L01'?seekTo:(part==='L02'?(seekTo-4800):(seekTo-10817));
  var hasL01=s&&/-L01\.mp3/.test(s.src);
  var hasL02=s&&/-L02\.mp3/.test(s.src);
  var hasL03=s&&/-L03\.mp3/.test(s.src);
  var currentMatches=(part==='L01'&&hasL01)||(part==='L02'&&hasL02)||(part==='L03'&&hasL03);
  if(s&&!currentMatches){
    s.src=targetURL;audio.load();
    audio.addEventListener('loadedmetadata',function once(){
      audio.currentTime=targetSec;audio.play();
      audio.removeEventListener('loadedmetadata',once);
    });
    return;
  }
  audio.currentTime=targetSec;audio.play();
}

function skipAudio(sec){
  var audio=document.getElementById('mk-audio');
  if(!audio)return;
  audio.currentTime=Math.max(0,audio.currentTime+sec);
  if(audio.paused)audio.play();
}

function setAudioMode(mode){
  audioMode=mode;
  audioAutoPlay=(mode==='seek');
}

// Override nextQ to respect audio mode (continuous = don't touch audio)
var _origNextQ=nextQ;
nextQ=function(){
  _origNextQ();
  if(audioMode==='seek'){
    setTimeout(function(){playFromHere();},300);
  }
  // continuous = let audio keep playing
  // off = do nothing
};

function setFollowMode(on){
  followMode=on;
  document.querySelectorAll('.follow-btn').forEach(function(b,i){b.classList.toggle('active',i===0?on:!on);});
  if(Object.keys(answerMap).length===0){
    questions=BANK.slice();idx=0;render();saveState();
  }
}

function toggleReask(){
  reaskMode=!reaskMode;
  document.querySelectorAll('.reask-btn').forEach(function(b){b.classList.toggle('active',reaskMode);});
  buildReaskBar();
}

function buildReaskBar(){
  var bar=document.getElementById('reask-banner');
  if(!bar)return;
  var missed=[];
  if(typeof answerMap!=='undefined'){
    for(var k in answerMap){if(answerMap.hasOwnProperty(k)&&!answerMap[k].isCorrect)missed.push(k);}
  }
  if(reaskMode&&missed.length>0){
    bar.style.display='block';
    bar.innerHTML='⚠️ '+missed.length+' MISSED — <button onclick="drillMissed()">DRILL MISSED NOW</button>';
  } else {
    bar.style.display='none';
  }
}

function drillMissed(){
  var missed=[];
  for(var k in answerMap){if(answerMap.hasOwnProperty(k)&&!answerMap[k].isCorrect)missed.push(parseInt(k));}
  if(missed.length===0)return;
  questions=missed.map(function(id){return BANK[id];});
  for(var i=questions.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1));var t=questions[i];questions[i]=questions[j];questions[j]=t;}
  idx=0;score=0;attempts=0;answerMap={};answerHistory=[];
  render();
}

// Initial boot — run once to attach audio bar
questions=BANK.slice();idx=0;render();

// ── FAB unified speed control ──
var fabCurrentSpeed = 1.0;
function fabSetSpeed(val) {
  val = Math.round(val * 100) / 100;
  if (val < 0.25) val = 0.25;
  if (val > 3.0) val = 3.0;
  fabCurrentSpeed = val;
  document.querySelectorAll('audio').forEach(function(a){ a.playbackRate = val; });
  var d = document.getElementById('speed-display');
  if (d) d.textContent = val.toFixed(2) + 'x';
  document.querySelectorAll('.btn-speed-preset').forEach(function(b){
    var pv = parseFloat(b.textContent);
    b.classList.toggle('active', Math.abs(pv - val) < 0.001);
  });
}
// Re-apply rate whenever any audio element plays
(function(){
  var _origPlay = HTMLMediaElement.prototype.play;
  HTMLMediaElement.prototype.play = function(){
    if (this.tagName === 'AUDIO') this.playbackRate = fabCurrentSpeed;
    return _origPlay.apply(this, arguments);
  };
})();


var fabTranscriptOn = false;
function fabToggleTranscript() {
  fabTranscriptOn = !fabTranscriptOn;
  var box = document.getElementById('transcript-box');
  var btn = document.getElementById('btn-transcript');
  if (box) box.classList.toggle('show', fabTranscriptOn);
  if (btn) btn.classList.toggle('active', fabTranscriptOn);
  if (fabTranscriptOn) fabUpdateTranscript();
}
function fabUpdateTranscript() {
  if (!fabTranscriptOn) return;
  var box = document.getElementById('transcript-box');
  if (!box) return;
  if (typeof idx !== 'number' || typeof questions === 'undefined' || idx >= questions.length) {
    box.innerHTML = '<em>Drill complete.</em>';
    return;
  }
  var q = questions[idx];
  var cat = q.cat || '';
  var lines = fabTranscript[cat] || [];
  if (!lines.length) {
    box.innerHTML = '<em>No transcript lines for ' + cat + '.</em>';
    return;
  }
  var quote = (q.quote || '').toLowerCase().replace(/[^a-z0-9 ]/g, '');
  var quoteWords = quote.split(' ').filter(function(w){ return w.length > 3; });
  var html = '<strong>' + cat + '</strong><br>';
  for (var i = 0; i < lines.length; i++) {
    var lineLow = lines[i].toLowerCase().replace(/[^a-z0-9 ]/g, '');
    var hits = 0;
    for (var w = 0; w < quoteWords.length; w++) {
      if (lineLow.indexOf(quoteWords[w]) !== -1) hits++;
    }
    var match = quoteWords.length > 0 && hits >= Math.ceil(quoteWords.length * 0.4);
    if (match) html += '<span class="t-highlight">\u25b6 ' + lines[i] + '</span><br>';
    else html += lines[i] + '<br>';
  }
  box.innerHTML = html;
}
// Hook transcript update into render + renderHistoryItem
(function(){
  var _r = render;
  render = function(){ var rv = _r.apply(this, arguments); fabUpdateTranscript(); return rv; };
  var _rh = renderHistoryItem;
  renderHistoryItem = function(){ var rv = _rh.apply(this, arguments); fabUpdateTranscript(); return rv; };
})();

</script>


<script id="audio-bar-minimize-js">
(function(){
  var LS_KEY_MIN = 'fab_audio_bar_collapsed';
  function applyState(ab){
    var collapsed = localStorage.getItem(LS_KEY_MIN) === '1';
    if (collapsed) ab.classList.add('collapsed'); else ab.classList.remove('collapsed');
    var btn = ab.querySelector('.btn-minimize-audio');
    if (btn) btn.textContent = collapsed ? '▸' : '▾';
    if (btn) btn.title = collapsed ? 'Expand audio bar' : 'Minimize audio bar';
  }
  function attachButton(ab){
    if (ab.querySelector('.btn-minimize-audio')) return;
    var btn = document.createElement('button');
    btn.className = 'btn-minimize-audio';
    btn.type = 'button';
    btn.onclick = function(){
      var now = ab.classList.toggle('collapsed');
      localStorage.setItem(LS_KEY_MIN, now ? '1' : '0');
      btn.textContent = now ? '▸' : '▾';
      btn.title = now ? 'Expand audio bar' : 'Minimize audio bar';
    };
    ab.appendChild(btn);
    applyState(ab);
  }
  // Poll until audio-bar appears, attach, then keep watching in case it gets re-rendered
  var tries = 0;
  var iv = setInterval(function(){
    var ab = document.getElementById('audio-bar');
    if (ab) {
      attachButton(ab);
      applyState(ab);
    }
    tries++;
    if (tries > 1200) clearInterval(iv); // ~2 min safety cap
  }, 100);
})();
</script>

<script id="ga0202-m01-transcript-loader">
var fabTranscriptLines = ``.split(/\r?\n/).filter(function(l){ return l.trim().length > 0; });
window.fabTranscriptOn = false;
function fabFetchTranscript(cb){ cb(); }
function fabParseTimestamp(line){
    var m = line.match(/^\[(\d+):(\d+)\]/);
    if (!m) return null;
    return parseInt(m[1],10) * 60 + parseInt(m[2],10);
}
function fabUpdateTranscript(){
    if (!window.fabTranscriptOn) return;
    var box = document.getElementById('transcript-box');
    if (!box) return;
    fabFetchTranscript(function(){
        if (!fabTranscriptLines || !fabTranscriptLines.length){
            box.innerHTML = '<em style="color:#f87171">Transcript file not found.</em>';
            return;
        }
        if (typeof idx !== 'number' || typeof BANK === 'undefined' || idx >= BANK.length){
            box.innerHTML = '<em>Drill complete.</em>';
            return;
        }
        var q = BANK[idx];
        var srcMatch = (q.source || '').match(/(\d+):(\d+)/);
        var targetSec = srcMatch ? parseInt(srcMatch[1],10)*60 + parseInt(srcMatch[2],10) : 0;
        // Use TIMESTAMPS array if available (more accurate)
        if (typeof TIMESTAMPS !== 'undefined' && TIMESTAMPS[idx] !== undefined) {
            targetSec = Math.round(TIMESTAMPS[idx]);
        }
        var bestIdx = 0;
        for (var i = 0; i < fabTranscriptLines.length; i++){
            var ts = fabParseTimestamp(fabTranscriptLines[i]);
            if (ts === null) continue;
            if (ts <= targetSec) bestIdx = i; else break;
        }
        var startIdx = Math.max(0, bestIdx - 2);
        var endIdx = Math.min(fabTranscriptLines.length, bestIdx + 6);
        var srcLabel = (q.source || '').split('@').pop().trim();
        var html = '<strong>Audio @ ' + srcLabel + ' &middot; ' + (q.cat||'') + '</strong><br>';
        for (var j = startIdx; j < endIdx; j++){
            var line = fabTranscriptLines[j];
            var safe = line.replace(/</g,'&lt;').replace(/>/g,'&gt;');
            if (j === bestIdx) html += '<span class="t-highlight">&#9654; ' + safe + '</span><br>';
            else html += safe + '<br>';
        }
        box.innerHTML = html;
    });
}
function fabToggleTranscript(){
    var box = document.getElementById('transcript-box');
    var btn = document.getElementById('btn-transcript');
    if (!box) return;
    window.fabTranscriptOn = !window.fabTranscriptOn;
    if (window.fabTranscriptOn){
        box.classList.add('show');
        if (btn) btn.classList.add('active');
        fabUpdateTranscript();
    } else {
        box.classList.remove('show');
        if (btn) btn.classList.remove('active');
    }
}
</script>

<script id="fab-ai-companion-js">
(function(){
  const ENDPOINT = "https://fab-ai.dgync1.workers.dev";
  const CLASS_NAME = "GA0202"; // e.g., "CP1" / "FAB101" / "GA0102" — empty = generic chiropractic tutor
  let panel = null;
  let history = []; // [{role:'user'|'model', content}]
  let currentQKey = null; // to detect Q navigation

  function readCurrentQ() {
    const qText = (document.querySelector('.q-text')?.innerText || '').replace(/^Q\d+(\s+of\s+\d+)?:\s*/, '');
    const optBtns = Array.from(document.querySelectorAll('.opt-btn'));
    const options = optBtns.map(b => {
      const clone = b.cloneNode(true);
      clone.querySelectorAll('.rationale').forEach(r => r.remove());
      clone.querySelectorAll('.letter').forEach(r => r.remove());
      return clone.innerText.trim();
    });
    let picked = null, correct = null;
    optBtns.forEach((b, i) => {
      if (b.classList.contains('picked-correct') || b.classList.contains('picked-wrong')) picked = i;
      if (b.classList.contains('picked-correct') || b.classList.contains('show-correct')) correct = i;
    });
    const profTip = document.querySelector('.prof-tip')?.innerText?.replace(/^Professor:\s*/i, '').trim() || '';
    const source = document.querySelector('.source-line')?.innerText?.replace(/^Source:\s*/i, '').trim() || '';
    const quote = document.querySelector('.quote-line')?.innerText?.trim() || '';
    return { question: qText, options, picked, correct, profTip, source, quote };
  }

  function qKey(ctx){ return (ctx.question || '') + '|' + (ctx.options || []).join('|'); }

  function mdToHtml(md){
    let html = md
      .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
      .replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>')
      .replace(/(^|\n)### (.+)/g, '$1<h3>$2</h3>')
      .replace(/`([^`]+)`/g, '<code>$1</code>')
      .replace(/^\s*[-*]\s+(.+)$/gm, '<li>$1</li>')
      .replace(/(<li>.*?<\/li>(\s*<li>.*?<\/li>)*)/gs, '<ul>$1</ul>');
    html = html.split(/\n{2,}/).map(p => {
      if (p.trim().startsWith('<ul') || p.trim().startsWith('<h3')) return p;
      if (p.trim() === '') return '';
      return '<p>' + p.replace(/\n/g, '<br>') + '</p>';
    }).join('');
    return html;
  }

  function stripForTts(text){
    // Remove markdown markers so TTS doesn't read them aloud
    return text
      .replace(/\*\*/g, '')
      .replace(/`([^`]+)`/g, '$1')
      .replace(/^\s*[-*]\s+/gm, '')
      .replace(/^#+\s+/gm, '')
      .replace(/\n{2,}/g, '. ')
      .replace(/\s+/g, ' ')
      .trim();
  }

  let currentUtter = null;
  function speakToggle(btn, rawText){
    if (!window.speechSynthesis) {
      alert('Your browser does not support text-to-speech.');
      return;
    }
    if (window.speechSynthesis.speaking && currentUtter && btn.classList.contains('playing')) {
      window.speechSynthesis.cancel();
      document.querySelectorAll('.fab-ai-tts-btn.playing').forEach(b => {
        b.classList.remove('playing');
        b.innerHTML = '🔊 Read';
      });
      currentUtter = null;
      return;
    }
    window.speechSynthesis.cancel();
    document.querySelectorAll('.fab-ai-tts-btn.playing').forEach(b => {
      b.classList.remove('playing');
      b.innerHTML = '🔊 Read';
    });
    const u = new SpeechSynthesisUtterance(stripForTts(rawText));
    const rateSel = btn.parentElement.querySelector('.fab-ai-tts-rate');
    u.rate = parseFloat(rateSel && rateSel.value || '1.0');
    /*ava-tts*/try{var _vs=(window.speechSynthesis&&window.speechSynthesis.getVoices())||[];var _av=_vs.find(function(v){return /microsoft.*ava.*natural/i.test(v.name);})||_vs.find(function(v){return /microsoft.*emma.*natural/i.test(v.name);})||_vs.find(function(v){return /google us english female/i.test(v.name);});if(_av){u.voice=_av;u.lang=_av.lang||'en-US';}}catch(e){}
    u.onend = () => {
      btn.classList.remove('playing');
      btn.innerHTML = '🔊 Read';
      currentUtter = null;
    };
    u.onerror = () => {
      btn.classList.remove('playing');
      btn.innerHTML = '🔊 Read';
      currentUtter = null;
    };
    currentUtter = u;
    btn.classList.add('playing');
    btn.innerHTML = '⏹ Stop';
    window.speechSynthesis.speak(u);
  }

  function appendMsg(role, text) {
    const body = document.getElementById('fabAiBody');
    if (!body) return null;
    const wrap = document.createElement('div');
    wrap.className = 'fab-ai-msg ' + role;
    const bub = document.createElement('div');
    bub.className = 'fab-ai-bubble';
    if (role === 'ai') {
      bub.innerHTML = mdToHtml(text);
      // Add TTS row
      const row = document.createElement('div');
      row.className = 'fab-ai-tts-row';
      const btn = document.createElement('button');
      btn.className = 'fab-ai-tts-btn';
      btn.innerHTML = '🔊 Read';
      btn.onclick = function(){ speakToggle(btn, text); };
      const rate = document.createElement('select');
      rate.className = 'fab-ai-tts-rate';
      rate.title = 'Reading speed';
      ['0.8','1.0','1.2','1.5','2.0','2.5','3.0'].forEach(function(r){
        const o = document.createElement('option');
        o.value = r; o.textContent = r + 'x';
        if (r === '1.0') o.selected = true;
        rate.appendChild(o);
      });
      row.appendChild(btn);
      row.appendChild(rate);
      bub.appendChild(row);
    } else {
      bub.textContent = text;
    }
    wrap.appendChild(bub);
    body.appendChild(wrap);
    body.scrollTop = body.scrollHeight;
    return bub;
  }

  function appendLoading(){
    const body = document.getElementById('fabAiBody');
    if (!body) return null;
    const wrap = document.createElement('div');
    wrap.className = 'fab-ai-msg ai';
    wrap.id = 'fabAiLoading';
    const bub = document.createElement('div');
    bub.className = 'fab-ai-bubble';
    bub.innerHTML = '<div class="fab-ai-loading"><div class="fab-ai-spinner"></div> Thinking...</div>';
    wrap.appendChild(bub);
    body.appendChild(wrap);
    body.scrollTop = body.scrollHeight;
    return wrap;
  }

  function removeLoading(){
    const el = document.getElementById('fabAiLoading');
    if (el) el.remove();
  }

  function appendStatus(text, isErr){
    const body = document.getElementById('fabAiBody');
    if (!body) return;
    const div = document.createElement('div');
    div.className = 'fab-ai-status' + (isErr ? ' err' : '');
    div.innerHTML = text;
    body.appendChild(div);
    body.scrollTop = body.scrollHeight;
  }

  function renderSuggestions(ctx){
    const body = document.getElementById('fabAiBody');
    if (!body) return;
    // Q preview at top
    if (ctx.question) {
      const qp = document.createElement('div');
      qp.className = 'fab-ai-qpreview';
      qp.innerHTML = '<b>Q:</b> ' + ctx.question.substring(0, 240) + (ctx.question.length > 240 ? '...' : '');
      body.appendChild(qp);
    }
    // Suggestion chips
    const sug = document.createElement('div');
    sug.className = 'fab-ai-suggestions';
    const chips = [];
    if (ctx.picked === null || ctx.picked === undefined) {
      chips.push({ label: '💡 Give me a hint', q: 'Give me a hint for this question without revealing the answer.' });
      chips.push({ label: '🧠 Explain the concept', q: 'Explain the core concept this question is testing.' });
    } else if (ctx.picked !== ctx.correct && ctx.picked !== null) {
      chips.push({ label: '❌ Why did I miss this?', q: 'I picked the wrong answer. Walk me through why my pick is wrong and why the correct answer is right.' });
      chips.push({ label: '🧠 Explain the concept', q: 'Explain the concept this question is testing in simpler terms.' });
      chips.push({ label: '🎯 Give me a mnemonic', q: 'Give me a memorable mnemonic for this topic.' });
    } else if (ctx.picked === ctx.correct) {
      chips.push({ label: '✅ Why is this right?', q: 'Confirm why the correct answer is right and flag any trap distractors to watch for.' });
      chips.push({ label: '🎯 Give me a mnemonic', q: 'Give me a memorable mnemonic for this topic.' });
    }
    chips.push({ label: '🌟 Use an analogy', q: 'Explain this with a dumbed-down analogy.' });
    chips.forEach(c => {
      const btn = document.createElement('button');
      btn.className = 'fab-ai-sug';
      btn.textContent = c.label;
      btn.onclick = () => sendMessage(c.q);
      sug.appendChild(btn);
    });
    body.appendChild(sug);
  }

  function clearChat(preserveCtx){
    const body = document.getElementById('fabAiBody');
    if (body) body.innerHTML = '';
    history = [];
    if (preserveCtx) {
      const ctx = readCurrentQ();
      renderSuggestions(ctx);
    }
  }

  function openPanel() {
    if (!panel) panel = buildPanel();
    panel.classList.add('open');
    const ctx = readCurrentQ();
    const key = qKey(ctx);
    if (key !== currentQKey) {
      // Q changed — reset chat and show suggestions for new Q
      currentQKey = key;
      clearChat(true);
    }
  }

  function buildPanel() {
    const el = document.createElement('div');
    el.className = 'fab-ai-panel';
    el.innerHTML = '<div class="fab-ai-header">'
      + '<h3>🩺 Study Tutor</h3>'
      + '<button class="fab-ai-hdr-btn" onclick="fabAiClear()">Clear</button>'
      + '<button class="fab-ai-close" onclick="fabAiClose()">×</button>'
      + '</div>'
      + '<div class="fab-ai-body" id="fabAiBody"></div>'
      + '<div class="fab-ai-followup">'
      + '<button class="fab-ai-mini-close" title="Close panel" onclick="fabAiClose()">×</button>'
      + '<textarea id="fabAiFollowup" placeholder="Ask a question about this Q..." rows="1" onkeydown="if(event.keyCode===13&&!event.shiftKey){event.preventDefault();fabAiFollowupSend();}"></textarea>'
      + '<button onclick="fabAiFollowupSend()">Send</button>'
      + '</div>';
    document.body.appendChild(el);
    return el;
  }

  window.fabAiClose = function(){ if(panel) panel.classList.remove('open'); };
  window.fabAiClear = function(){ clearChat(true); };

  async function callWorker(payload) {
    if (!ENDPOINT) return { clipboardFallback: true };
    try {
      const res = await fetch(ENDPOINT, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload),
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.error || ('HTTP ' + res.status));
      return { reply: data.reply };
    } catch (e) {
      return { error: String(e.message || e) };
    }
  }

  function clipboardFallback(ctx, userQ) {
    const letter = (i) => String.fromCharCode(65 + i);
    let prompt = "I'm studying GA 0202 (Gross Anatomy, head & neck - The Ear) with Dr. Maini at SCUHS. Drill question:\n\n";
    prompt += 'Q: ' + ctx.question + '\n\n';
    if (ctx.options && ctx.options.length) {
      ctx.options.forEach((o, i) => {
        const m = [];
        if (i === ctx.picked) m.push('PICKED');
        if (i === ctx.correct) m.push('CORRECT');
        prompt += letter(i) + '. ' + o + (m.length ? ' ('+m.join(', ')+')' : '') + '\n';
      });
      prompt += '\n';
    }
    if (ctx.profTip) prompt += 'DRILL TIP: ' + ctx.profTip + '\n\n';
    if (userQ) prompt += 'MY QUESTION: ' + userQ + '\n\n';
    prompt += 'Explain using a dumbed-down analogy + mnemonic.';
    navigator.clipboard.writeText(prompt).then(() => {
      appendStatus('✓ Prompt copied to clipboard. Backend not configured yet — paste into your AI chat.');
    }).catch(() => {
      appendStatus('Could not copy. Please select manually.', true);
    });
  }

  async function sendMessage(userText) {
    const ctx = readCurrentQ();
    currentQKey = qKey(ctx);
    appendMsg('user', userText);
    history.push({ role: 'user', content: userText });
    appendLoading();

    const payload = Object.assign({}, ctx, {
      userQuestion: userText,
      history: history.slice(-10), // last 10 turns for context
      className: CLASS_NAME, // worker uses this to load class-specific knowledge
    });
    const result = await callWorker(payload);
    removeLoading();
    if (result.clipboardFallback) {
      clipboardFallback(ctx, userText);
      return;
    }
    if (result.error) {
      appendStatus('Error: ' + result.error, true);
      return;
    }
    appendMsg('ai', result.reply);
    history.push({ role: 'model', content: result.reply });
  }

  window.fabAiFollowupSend = function() {
    const ta = document.getElementById('fabAiFollowup');
    const q = (ta && ta.value || '').trim();
    if (!q) return;
    ta.value = '';
    sendMessage(q);
  };

  // Button install — opens panel, does NOT auto-call AI
  function install() {
    if (document.getElementById('fabAiBtn')) return;
    const btn = document.createElement('button');
    btn.className = 'fab-ai-btn';
    btn.id = 'fabAiBtn';
    btn.textContent = '🩺';
    btn.title = 'Open AI Study Tutor';
    btn.onclick = () => openPanel();
    document.body.appendChild(btn);
  }
  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', install);
  } else {
    install();
  }
})();
</script>

      wm.classList.add('dc-hidden');

    function lumOf(el) {
      var bg = window.getComputedStyle(el).backgroundColor || '';
      var rgb = bg.match(/[\d.]+/g);
      if (!rgb || rgb.length < 3) return null;
      var a = rgb.length >= 4 ? +rgb[3] : 1;
      if (a < 0.3) return null;
      return (0.299 * +rgb[0] + 0.587 * +rgb[1] + 0.114 * +rgb[2]) / 255;
    }
    var lum = lumOf(document.body);
    if (lum === null) lum = lumOf(document.documentElement);
    if (lum !== null && lum < 0.5) {
      wm.style.color = 'rgba(255, 255, 255, 0.30)';
    }
  } catch(e) {}
})();

<script id="static-audio-bar-repositioner">
(function(){
  function moveBarIntoApp(){
    var bar = document.getElementById('static-audio-bar');
    var app = document.getElementById('app');
    if(!bar || !app) return;
    var card = app.querySelector('.card');
    if(card){
      if(card.previousElementSibling !== bar){
        app.insertBefore(bar, card);
      }
    }
    // Remove the dynamic GA-style audio bar (#audio-bar) if it sneaks in —
    // it's a duplicate of our static panel from the legacy _ensureAudioAttached
    // mechanism that we replaced with the static-panel pattern in Phase 0f.3.
    var dynBar = document.getElementById('audio-bar');
    if(dynBar && dynBar !== bar){
      dynBar.remove();
    }
  }
  if(typeof render === 'function'){
    var _origRender = render;
    render = function(){
      var rv = _origRender.apply(this, arguments);
      moveBarIntoApp();
      return rv;
    };
  }
  if(typeof renderHistoryItem === 'function'){

      moveBarIntoApp();

    };
  }
  if(document.readyState === 'loading'){

})();

<script id="everything-modal-injector">
(function(){
  var TOPIC_GROUPS = {"eardrum":["Tympanic","Otoscopy","Myringotomy"],"middle":["Middle Ear","Ossicles","Sound Conduction"],"nerves":["Nerve","Facial","Passages"],"tube":["Auditory Tube"],"inner":["Vestibular","Cochlea"],"clinical":["Clinical","Infection"]};
  var FULL_BANK = null;
  var selectedCats = {};
  var catCounts = {};
  var initialized = false;

  function captureBank(){

    if (FULL_BANK) return true;
    FULL_BANK = BANK.slice();
    return true;
  }

  function buildModal(){

      + '<h2>📋 Ear Clinical Cases · GA 0202 · The Ear (Dr. Maini)</h2>'

      + '<div style="display:flex;gap:10px;flex-wrap:wrap;justify-content:center;margin-top:8px">'
      +   '<button class="em-start" id="emStartBtn" onclick="emStart()" style="flex:1;min-width:160px">▶️ Start Drill</button>'

    var modal = document.createElement('div');
    modal.id = 'everythingModal';
    modal.innerHTML = html;
    document.body.appendChild(modal);
    var btn = document.createElement('button');
    btn.id = 'emReopenBtn';
    btn.textContent = '⚙️ Filter Topics';
    btn.onclick = emReopen;
    document.body.appendChild(btn);
    catCounts = {};
    FULL_BANK.forEach(function(q){ if (q && q.cat) catCounts[q.cat] = (catCounts[q.cat]||0)+1; });

    var list = document.getElementById('emCatList');

      list.appendChild(row);

  window.emToggleCat = function(box, cat){
    selectedCats[cat] = box.checked;
    emUpdAvail();

  window.emPreset = function(kind){
    var allCats = Object.keys(catCounts);
    allCats.forEach(function(cat){
      var on = false;
      if (kind === 'all') on = true;
      else if (kind === 'clear') on = false;
      else if (TOPIC_GROUPS[kind]) {
        on = TOPIC_GROUPS[kind].some(function(sub){ return cat.toLowerCase().indexOf(sub.toLowerCase()) >= 0; });

      selectedCats[cat] = on;
      var id = 'em_cat_' + cat.replace(/[^a-z0-9]/gi, '_');

    document.getElementById('emStartBtn').disabled = (n === 0);

    for (var i = pool.length - 1; i > 0; i--){ var j = Math.floor(Math.random()*(i+1)); var t = pool[i]; pool[i]=pool[j]; pool[j]=t; }

    document.getElementById('everythingModal').style.display = 'none';
    document.getElementById('emReopenBtn').style.display = 'block';
    if (typeof idx !== 'undefined') idx = 0;
    if (typeof score !== 'undefined') score = 0;
    if (typeof attempts !== 'undefined') attempts = 0;
    if (typeof reaskQueue !== 'undefined') reaskQueue.length = 0;
    if (typeof questions !== 'undefined') questions.length = 0;
    if (typeof answerMap !== 'undefined') { for (var k in answerMap) delete answerMap[k]; }
    if (typeof answerHistory !== 'undefined') answerHistory.length = 0;
    if (typeof browseIdx !== 'undefined') browseIdx = -1;
    if (typeof reviewList !== 'undefined') reviewList = null;
    if (typeof init === 'function') init();
  };
  function emReopen(){
    document.getElementById('everythingModal').style.display = 'block';
  }

  function tryInit(){
    if (initialized) return;
    if (!captureBank()) { setTimeout(tryInit, 100); return; }
    initialized = true;
    buildModal();
  }
  if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', tryInit);
  else tryInit();
})();
