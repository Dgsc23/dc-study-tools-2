  { id: 19, topic: "Nasopharynx", src: "Maini · Pharynx", q: "All of the following are features of the LATERAL wall of the nasopharynx EXCEPT the:", opts: ["Opening of the auditory tube", "Salpingopharyngeal fold", "Pharyngeal tubercle", "Pharyngeal recess"], a: 2, h1: "Three belong; one is a muscle insertion.", h2: "The tubercle is where the superior constrictor inserts.", exp: "The PHARYNGEAL TUBERCLE is a superior-constrictor insertion on the occiput, not a lateral-wall feature. The others are all lateral-wall features." },
  { id: 20, topic: "Oropharynx", src: "Maini · Pharynx", q: "The oropharynx represents which entrance of the pharyngeal chamber?", opts: ["Respiratory entrance", "Digestive entrance", "Auditory entrance", "Nasal entrance"], a: 1, h1: "Food enters here.", h2: "It is behind the mouth.", exp: "The oropharynx is the DIGESTIVE ENTRANCE of the chamber." },
  { id: 21, topic: "Oropharynx", src: "Maini · Pharynx", q: "The oropharynx extends from the soft palate down to the:", opts: ["Lower border of the cricoid", "Upper (superior) border of the epiglottis", "Hyoid bone", "Vocal folds"], a: 1, h1: "The top of the epiglottis.", h2: "Superior border of the epiglottis.", exp: "The oropharynx runs from the soft palate to the UPPER BORDER OF THE EPIGLOTTIS." },
  { id: 22, topic: "Oropharynx", src: "Maini · Pharynx", q: "The floor of the oropharynx is formed by the:", opts: ["Anterior two-thirds of the tongue", "Hard palate", "Posterior one-third of the tongue", "Soft palate"], a: 2, h1: "The back of the tongue.", h2: "Posterior third.", exp: "The floor is the POSTERIOR ONE-THIRD OF THE TONGUE and the interval between tongue and epiglottis." },
  { id: 23, topic: "Oropharynx", src: "Maini · Pharynx", q: "The single lingual tonsil is attached to the:", opts: ["Undersurface of the soft palate", "Root (posterior part) of the tongue", "Epiglottis", "Palatoglossal fold"], a: 1, h1: "On the tongue.", h2: "Its root, posteriorly.", exp: "The single LINGUAL TONSIL is attached to the ROOT of the tongue." },
  { id: 24, topic: "Oropharynx", src: "Maini · Pharynx", q: "The valleculae are the:", opts: ["Spaces between the glossoepiglottic folds", "Tonsillar crypts", "Openings of the auditory tubes", "Folds over the arytenoids"], a: 0, h1: "Between tongue and epiglottis.", h2: "Pockets between the folds.", exp: "The VALLECULAE are the right and left spaces between the glossoepiglottic folds." },
  { id: 25, topic: "Oropharynx", src: "Maini · Pharynx", q: "How many glossoepiglottic folds connect the tongue to the epiglottis?", opts: ["One", "Two", "Three (one median, two lateral)", "Four"], a: 2, h1: "A midline one plus a pair.", h2: "One median, two lateral.", exp: "There are THREE glossoepiglottic folds: one median and two lateral." },
  { id: 26, topic: "Oropharynx", src: "Maini · Pharynx", q: "The palatine tonsil sits in the tonsillar fossa, between the:", opts: ["Palatoglossal and palatopharyngeal folds", "Two glossoepiglottic folds", "Torus tubarius and pharyngeal recess", "Epiglottis and tongue"], a: 0, h1: "Two lateral-wall folds.", h2: "Palatoglossal in front, palatopharyngeal behind.", exp: "The PALATINE TONSIL lies in the tonsillar fossa between the PALATOGLOSSAL and PALATOPHARYNGEAL folds." },
  { id: 27, topic: "Oropharynx", src: "Maini · Pharynx", q: "The posterior wall of the oropharynx is supported by which vertebral levels?", opts: ["Anterior arch of the atlas", "Body of C2, upper body of C3, and the disc between", "Bodies of C3 to C6", "Basilar occipital bone"], a: 1, h1: "Second and third cervical.", h2: "C2 and upper C3.", exp: "The posterior wall of the oropharynx is supported by the body of C2, the upper body of C3, and the C2 to C3 disc." },
  { id: 28, topic: "Laryngopharynx", src: "Maini · Pharynx", q: "The laryngopharynx lies:", opts: ["Anterior to the nasal cavity", "Behind the laryngeal inlet and posterior wall of the larynx", "Above the soft palate", "Inside the larynx"], a: 1, h1: "It is behind the larynx.", h2: "A slit behind the laryngeal inlet.", exp: "The laryngopharynx lies BEHIND the laryngeal inlet and the posterior wall of the larynx." },
  { id: 29, topic: "Laryngopharynx", src: "Maini · Pharynx", q: "The laryngopharynx communicates superiorly with the oropharynx and inferiorly with the:", opts: ["Trachea", "Nasal cavity", "Esophagus", "Middle ear"], a: 2, h1: "The digestive tube below.", h2: "Food passage.", exp: "It communicates with the lumen of the OROPHARYNX above and the lumen of the ESOPHAGUS below." },
  { id: 30, topic: "Laryngopharynx", src: "Maini · Pharynx", q: "The piriform fossa is best described as a:", opts: ["Deep bony canal", "Pear-shaped, shallow fossa on each side of the laryngeal inlet", "Single midline pouch", "Muscular sphincter"], a: 1, h1: "Its name means pear-shaped.", h2: "A shallow depression, one each side.", exp: "The piriform fossa is a PEAR-SHAPED, SHALLOW fossa on each side of the laryngeal inlet." },
  { id: 31, topic: "Laryngopharynx", src: "Maini · Pharynx", q: "The piriform fossa is clinically important because:", opts: ["It secretes saliva", "A sharp foreign body such as a fishbone can lodge there", "It is where tonsils form", "It houses the vocal folds"], a: 1, h1: "It is shallow.", h2: "Sharp objects get stuck.", exp: "Because it is shallow, sharp foreign bodies such as a FISHBONE can lodge in the piriform fossa." },
  { id: 32, topic: "Laryngopharynx", src: "Maini · Pharynx", q: "Which nerve lies just deep to the mucosa of the piriform fossa?", opts: ["Recurrent laryngeal nerve", "Glossopharyngeal nerve", "Internal laryngeal nerve", "Hypoglossal nerve"], a: 2, h1: "Sensory to the upper larynx.", h2: "The internal branch of the superior laryngeal.", exp: "The INTERNAL LARYNGEAL NERVE lies just deep to the mucosa of the piriform fossa." },
  { id: 33, topic: "Laryngopharynx", src: "Maini · Pharynx", q: "Injury to the internal laryngeal nerve in the piriform fossa causes:", opts: ["Loss of the gag reflex, with risk of aspiration", "Loss of tongue movement", "Complete voice loss", "Deafness"], a: 0, h1: "It is sensory above the vocal folds.", h2: "The gag reflex depends on it.", exp: "Injury loses the GAG REFLEX (sensation above the vocal folds), risking ASPIRATION and aspiration pneumonitis." },
  { id: 34, topic: "Laryngopharynx", src: "Maini · Pharynx", q: "The lateral wall of the laryngopharynx, which Maini likens to 'armor,' is supported by the:", opts: ["Thyroid cartilage and thyrohyoid membrane", "Hyoid bone", "Cricoid cartilage only", "Sphenoid bone"], a: 0, h1: "The shield of the larynx.", h2: "Thyroid cartilage plus its membrane.", exp: "The lateral wall is supported by the THYROID CARTILAGE and THYROHYOID MEMBRANE, which Maini calls armor." },
  { id: 35, topic: "Wall layers", src: "Maini · Pharynx", q: "The pharynx is lined by which epithelium?", opts: ["Simple columnar", "Stratified squamous, non-keratinized", "Keratinized stratified squamous", "Pseudostratified ciliated columnar"], a: 1, h1: "Multi-layered, no keratin.", h2: "Handles the bolus without keratin.", exp: "The pharynx is lined by STRATIFIED SQUAMOUS, NON-KERATINIZED epithelium." },
  { id: 36, topic: "Wall layers", src: "Maini · Pharynx", q: "Why is the pharyngeal lining NON-keratinized?", opts: ["Keratin is found only in skin", "It never touches food", "It is a single cell layer", "It is constantly frozen"], a: 0, h1: "Where do you find keratin?", h2: "Only in skin.", exp: "Keratin is found only in SKIN; mucous membranes lack it, so the pharyngeal lining is non-keratinized." },
  { id: 37, topic: "Wall layers", src: "Maini · Pharynx", q: "The strong fibrous submucosal sheet of the pharynx is the:", opts: ["Buccopharyngeal fascia", "Pharyngobasilar fascia", "Pretracheal fascia", "Palatine aponeurosis"], a: 1, h1: "It blends with the skull-base periosteum.", h2: "Basilar, from the skull base.", exp: "The submucosa is the PHARYNGOBASILAR FASCIA, which blends with the periosteum of the skull base." },
  { id: 38, topic: "Wall layers", src: "Maini · Pharynx", q: "From internal to external, the pharyngeal wall layers are:", opts: ["Mucosa, pharyngobasilar fascia, muscular layer, buccopharyngeal fascia", "Muscular layer, mucosa, buccopharyngeal fascia, pharyngobasilar fascia", "Buccopharyngeal fascia, muscle, mucosa, pharyngobasilar fascia", "Mucosa, muscle, pharyngobasilar fascia, buccopharyngeal fascia"], a: 0, h1: "Mucosa is innermost.", h2: "Bucco is the outer coat.", exp: "Inside-out: MUCOSA, PHARYNGOBASILAR FASCIA, MUSCULAR layer, BUCCOPHARYNGEAL FASCIA." },
  { id: 39, topic: "Wall layers", src: "Maini · Pharynx", q: "The main functional role of the retropharyngeal space is to:", opts: ["Store lymph", "Let the pharynx glide up and down during swallowing", "Anchor the tongue", "Produce mucus"], a: 1, h1: "It is loose areolar tissue.", h2: "It allows movement on the spine.", exp: "The retropharyngeal space lets the pharynx GLIDE up and down during swallowing." },
  { id: 40, topic: "Wall layers", src: "Maini · Pharynx", q: "Obliteration of the retropharyngeal space by fibrosis or tumor leads to:", opts: ["Deafness", "Aerophagia", "Dysphagia, as the pharynx becomes fixed to the spine", "Loss of smell"], a: 2, h1: "The pharynx can no longer glide.", h2: "Difficult swallowing.", exp: "Obliteration fixes the pharynx to the spine, causing DYSPHAGIA (difficult swallowing)." },
  { id: 41, topic: "Constrictors", src: "Maini · Pharynx", q: "The three constrictor muscles form which layer of the pharyngeal wall?", opts: ["The inner longitudinal layer", "The outer circular layer", "The submucosa", "The mucosa"], a: 1, h1: "Their fibers run circularly.", h2: "Outer and circular.", exp: "The three constrictors form the OUTER CIRCULAR layer of the pharyngeal musculature." },
  { id: 42, topic: "Constrictors", src: "Maini · Pharynx", q: "The superior constrictor inserts onto the:", opts: ["Pharyngeal raphe", "Pharyngeal tubercle", "Hyoid bone", "Thyroid cartilage"], a: 1, h1: "On the occipital bone.", h2: "A midline tubercle at the skull base.", exp: "The superior constrictor inserts onto the PHARYNGEAL TUBERCLE." },
  { id: 43, topic: "Constrictors", src: "Maini · Pharynx", q: "The pharyngeal tubercle is located on the:", opts: ["Basilar part of the occipital bone, just anterior to the foramen magnum", "Body of the sphenoid", "Anterior arch of the atlas", "Greater horn of the hyoid"], a: 0, h1: "Near the foramen magnum.", h2: "Center of the basilar occipital.", exp: "The pharyngeal tubercle sits in the center of the BASILAR OCCIPITAL bone, just anterior to the foramen magnum." },
  { id: 44, topic: "Constrictors", src: "Maini · Pharynx", q: "On the pterygomandibular raphe, which muscle lies anterior to the superior constrictor?", opts: ["Masseter", "Buccinator", "Mylohyoid", "Temporalis"], a: 1, h1: "A muscle of facial expression.", h2: "The cheek muscle.", exp: "The BUCCINATOR lies anterior to the superior constrictor on the pterygomandibular raphe." },
  { id: 45, topic: "Constrictors", src: "Maini · Pharynx", q: "The middle constrictor originates from the:", opts: ["Oblique line of the thyroid cartilage", "Styloid process", "Stylohyoid ligament and horns of the hyoid bone", "Cricoid cartilage"], a: 2, h1: "From the hyoid region.", h2: "Stylohyoid ligament plus hyoid horns.", exp: "The middle constrictor arises from the STYLOHYOID LIGAMENT and the greater and lesser horns of the hyoid bone." },
  { id: 46, topic: "Constrictors", src: "Maini · Pharynx", q: "The two named parts of the inferior constrictor are:", opts: ["Thyropharyngeus and cricopharyngeus", "Salpingopharyngeus and stylopharyngeus", "Superior and middle", "Thyrohyoid and sternothyroid"], a: 0, h1: "Named for the cartilages they arise from.", h2: "Thyro- (upper) and crico- (lower).", exp: "The inferior constrictor has an upper THYROPHARYNGEUS and a lower CRICOPHARYNGEUS." },
  { id: 47, topic: "Constrictors", src: "Maini · Pharynx", q: "The cricopharyngeus encircles the pharyngoesophageal junction and acts as the:", opts: ["Lower esophageal sphincter", "Upper esophageal sphincter", "Palatopharyngeal sphincter", "Laryngeal inlet"], a: 1, h1: "It keeps the esophagus closed at rest.", h2: "Upper end of the esophagus.", exp: "Cricopharyngeus is the UPPER ESOPHAGEAL SPHINCTER, keeping the esophagus closed except during swallowing." },
  { id: 48, topic: "Constrictors", src: "Maini · Pharynx", q: "Which muscle is NOT attached to the oblique line of the thyroid cartilage?", opts: ["Inferior constrictor", "Sternothyroid", "Thyrohyoid", "Sternohyoid"], a: 3, h1: "Three are attached, one is not.", h2: "The sterno-to-hyoid one.", exp: "The inferior constrictor, sternothyroid, and thyrohyoid attach to the oblique line; STERNOHYOID does NOT. Maini flags this as a good exam question." },
  { id: 49, topic: "Constrictors", src: "Maini · Pharynx", q: "Loss of cricopharyngeus (UES) tone in old age produces aerophagia, meaning the patient:", opts: ["Swallows air and belches frequently", "Cannot swallow solids", "Loses their voice", "Aspirates every meal"], a: 0, h1: "The sphincter no longer stays shut.", h2: "Air enters the esophagus.", exp: "A lax UES lets the patient SWALLOW AIR, producing frequent belching (aerophagia)." },
  { id: 50, topic: "Longitudinal", src: "Maini · Pharynx", q: "The three longitudinal (inner) muscles of the pharynx are:", opts: ["The three constrictors", "Palatopharyngeus, salpingopharyngeus, stylopharyngeus", "Buccinator, mylohyoid, styloglossus", "Thyrohyoid, sternothyroid, sternohyoid"], a: 1, h1: "They end in -pharyngeus.", h2: "Palato-, salpingo-, stylo-.", exp: "The inner longitudinal muscles are PALATOPHARYNGEUS, SALPINGOPHARYNGEUS, and STYLOPHARYNGEUS." },
  { id: 51, topic: "Longitudinal", src: "Maini · Pharynx", q: "Compared with the constrictors, the longitudinal muscles mainly:", opts: ["Close the auditory tube", "Elevate and shorten the pharynx and larynx", "Rotate the head", "Produce the voice"], a: 1, h1: "Their fibers run lengthwise.", h2: "They lift the pharynx.", exp: "The longitudinal muscles ELEVATE and SHORTEN the pharynx and larynx during swallowing." },
  { id: 52, topic: "Longitudinal", src: "Maini · Pharynx", q: "Salpingopharyngeus originates from the:", opts: ["Cartilaginous part of the auditory tube", "Styloid process", "Hard palate", "Hyoid bone"], a: 0, h1: "Salpingo means tube.", h2: "From the auditory tube.", exp: "Salpingopharyngeus arises from the CARTILAGINOUS PART OF THE AUDITORY TUBE." },
  { id: 53, topic: "Innervation", src: "Maini · Pharynx", q: "Most pharyngeal muscles develop from which pharyngeal arches?", opts: ["1st and 2nd", "2nd and 3rd", "4th and 6th", "5th and 7th"], a: 2, h1: "The vagus arches.", h2: "Four and six.", exp: "Most pharyngeal muscles develop from the 4th and 6th pharyngeal arches." },
  { id: 54, topic: "Innervation", src: "Maini · Pharynx", q: "Because they arise from the 4th and 6th arches, most pharyngeal muscles are supplied by the:", opts: ["Glossopharyngeal nerve", "Vagus nerve (CN X)", "Hypoglossal nerve", "Facial nerve"], a: 1, h1: "Cranial nerve ten.", h2: "Its pharyngeal branch.", exp: "They are supplied by the VAGUS NERVE (CN X), through its pharyngeal branch." },
  { id: 55, topic: "Innervation", src: "Maini · Pharynx", q: "Which single pharyngeal muscle is the exception, supplied by the glossopharyngeal nerve (CN IX)?", opts: ["Superior constrictor", "Palatopharyngeus", "Stylopharyngeus", "Salpingopharyngeus"], a: 2, h1: "So stylish it has its own nerve.", h2: "From the 3rd arch.", exp: "STYLOPHARYNGEUS is the exception, supplied by the GLOSSOPHARYNGEAL nerve (CN IX) from the 3rd arch." },
  { id: 56, topic: "Tonsils", src: "Maini · Pharynx", q: "Which four named tonsils guard the openings into the pharynx?", opts: ["Pharyngeal, tubal, palatine, lingual", "Palatine, lingual, sublingual, submandibular", "Pharyngeal, palatine, laryngeal, nasal", "Tubal, palatine, thyroid, cricoid"], a: 0, h1: "Waldeyer's ring.", h2: "Pharyngeal, tubal, palatine, lingual.", exp: "The lymphoid ring is the PHARYNGEAL, TUBAL, PALATINE, and LINGUAL tonsils." },
  { id: 57, topic: "Tonsils", src: "Maini · Pharynx", q: "Which two tonsils are single (unpaired)?", opts: ["The palatine and tubal tonsils", "The pharyngeal and lingual tonsils", "The two palatine tonsils", "The tubal tonsils"], a: 1, h1: "One in the roof, one on the tongue.", h2: "Pharyngeal and lingual.", exp: "The PHARYNGEAL and LINGUAL tonsils are single (unpaired); the palatine and tubal are paired." },
  { id: 58, topic: "Clinical", src: "Maini · Pharynx", q: "A young child who is a chronic mouth-breather with a flat face and recessed jaw most likely has:", opts: ["Enlarged adenoids (pharyngeal tonsil)", "A deviated septum only", "A cleft palate", "Tonsillitis of the lingual tonsil"], a: 0, h1: "Adenoid facies.", h2: "The roof tonsil is enlarged.", exp: "This is adenoid facies from ENLARGED ADENOIDS (the pharyngeal tonsil)." },
];

/* =============================================================== STYLES ==== */
const css = `
:root{
  --accent:#7c3aed; --accent-deep:#6d28d9; --accent-mid:#8b5cf6; --accent-soft:#c4b5fd;
  --accent-tint:#ede9fe; --accent-wash:#f5f3ff; --ink:#2e1065; --ink-soft:#5b4a8a;
  --paper:#faf9ff; --card:#ffffff; --line:#ddd0f5;
  --good:#0e7a52; --good-bg:#e7f8ef; --good-line:#bfe6d2;
  --bad:#b42318; --bad-bg:#fdeceb; --bad-line:#f3c6c2;
  --gold:#9a6a2b; --gold-bg:#fffaf0; --gold-line:#ecd6a8;
}
*{box-sizing:border-box}
.fb-root{font-family:'Outfit','SF Pro Text',system-ui,-apple-system,Segoe UI,sans-serif;color:var(--ink);
  background:radial-gradient(880px 420px at 100% -8%, var(--accent-tint), transparent 60%),radial-gradient(680px 360px at -10% 110%, #e4ddf8, transparent 55%),var(--paper);
  min-height:100vh;line-height:1.55;padding:0 0 64px}
.fb-wrap{max-width:900px;margin:0 auto;padding:0 18px}
.serif{font-family:'Fraunces','Iowan Old Style',Georgia,serif}
.hero{padding:30px 0 12px}
.kicker{display:inline-flex;gap:8px;align-items:center;font-size:12px;font-weight:600;letter-spacing:.13em;text-transform:uppercase;color:var(--accent-deep);background:var(--accent-wash);border:1px solid var(--line);padding:6px 12px;border-radius:999px}
.dot{width:7px;height:7px;border-radius:50%;background:var(--accent);box-shadow:0 0 0 3px var(--accent-tint)}
h1.title{font-size:clamp(27px,5vw,43px);line-height:1.05;margin:14px 0 6px;font-weight:600;letter-spacing:-.02em}
h1.title em{font-style:italic;color:var(--accent-mid)}
.subtitle{color:var(--ink-soft);max-width:720px;font-size:15.5px}
.voicenote{font-size:12.5px;color:var(--ink-soft);background:var(--accent-wash);border:1px solid var(--line);border-radius:10px;padding:9px 13px;margin-top:12px;max-width:720px}
.voicenote b{color:var(--accent-deep)}
.pill-row{display:flex;flex-wrap:wrap;gap:8px;align-items:center;margin-top:12px}
.pill-date{display:inline-block;font-size:12.5px;font-weight:600;color:var(--accent-deep);background:var(--accent-wash);border:1px solid var(--line);padding:7px 12px;border-radius:999px}
.pill-review{display:inline-block;font-size:11.5px;font-weight:700;letter-spacing:.04em;color:#8a4b00;background:#fff6e6;border:1px solid #f0d49a;padding:7px 12px;border-radius:999px}
.hublink{display:inline-flex;align-items:center;gap:6px;font-size:12.5px;font-weight:600;color:#fff;background:var(--accent);border:none;text-decoration:none;padding:7px 13px;border-radius:999px;box-shadow:0 6px 16px -8px var(--accent)}
.hublink:hover{background:var(--accent-mid)}
.tabbar{position:sticky;top:0;z-index:20;background:rgba(250,249,255,.92);backdrop-filter:blur(10px);border-bottom:1px solid var(--line);margin-top:16px}
.tabs{display:flex;gap:4px;max-width:900px;margin:0 auto;padding:8px 14px;overflow-x:auto}
.tab{flex:0 0 auto;border:none;background:none;font:inherit;font-weight:600;font-size:14.5px;color:var(--ink-soft);padding:9px 15px;border-radius:10px;cursor:pointer;transition:.15s;white-space:nowrap}
.tab:hover{color:var(--accent-deep);background:var(--accent-wash)}
.tab.active{color:#fff;background:var(--accent);box-shadow:0 4px 14px -4px var(--accent)}
.section{padding:24px 0 8px;animation:fade .35s ease}
@keyframes fade{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
.banner{background:linear-gradient(180deg,var(--accent-deep),var(--accent-mid));color:#fff;border-radius:16px;padding:18px 20px;margin:8px 0 16px;box-shadow:0 18px 40px -24px var(--accent-deep)}
.banner .bt{font-family:'Fraunces',Georgia,serif;font-weight:600;font-size:19px;margin-bottom:6px}
.banner p{font-size:13.5px;opacity:.93;margin:4px 0 0}
.coachbar{position:sticky;top:49px;z-index:15;display:flex;flex-wrap:wrap;gap:10px;align-items:center;background:rgba(255,255,255,.96);backdrop-filter:blur(8px);border:1px solid var(--line);border-radius:14px;padding:12px 14px;margin:0 0 16px;box-shadow:0 12px 28px -22px rgba(124,58,237,.45)}
.coachbar .cbtn{border:none;font:inherit;font-weight:700;font-size:13.5px;padding:9px 16px;border-radius:10px;cursor:pointer;transition:.15s}
.cbtn.play{background:var(--accent);color:#fff;box-shadow:0 8px 18px -8px var(--accent)}
.cbtn.play:hover{background:var(--accent-mid)}
.cbtn.ghost2{background:#fff;color:var(--ink-soft);border:1px solid var(--line)}
.cbtn.ghost2:hover{border-color:var(--accent-soft);color:var(--accent-deep)}
.cbtn:disabled{opacity:.4;cursor:default;box-shadow:none}
.cbctl{display:flex;align-items:center;gap:7px;font-size:12.5px;font-weight:600;color:var(--ink-soft)}
.cbctl input[type=range]{accent-color:var(--accent);width:104px}
.cbctl select{font:inherit;font-size:12.5px;border:1px solid var(--line);border-radius:8px;padding:5px 8px;color:var(--ink);background:#fff;max-width:172px}
.cbstate{font-size:12px;font-weight:700;color:var(--accent-deep);background:var(--accent-wash);border:1px solid var(--line);padding:5px 11px;border-radius:999px;margin-left:auto}
.obj{background:var(--card);border:1px solid var(--line);border-left:4px solid var(--accent);border-radius:14px;padding:16px 18px;margin:14px 0;box-shadow:0 12px 28px -24px rgba(124,58,237,.3);transition:box-shadow .2s,outline .2s}
.obj.speaking{outline:2px solid var(--accent);outline-offset:2px;box-shadow:0 0 0 5px var(--accent-tint),0 12px 28px -20px rgba(124,58,237,.5)}
.obj-head{display:flex;align-items:baseline;gap:10px;margin-bottom:4px;flex-wrap:wrap}
.obj-num{font-family:'Fraunces',Georgia,serif;font-weight:600;font-size:20px;color:var(--accent-soft)}
.obj-title{font-weight:700;font-size:15.5px;color:var(--ink);flex:1;min-width:180px}
.obj-play{flex:0 0 auto;border:1px solid var(--accent-soft);background:#fff;color:var(--accent-deep);font:inherit;font-size:11px;font-weight:700;padding:4px 10px;border-radius:7px;cursor:pointer;transition:.14s}
.obj-play:hover{background:var(--accent-wash)}
.src{font-size:10.5px;font-weight:700;color:var(--accent-deep);background:var(--accent-wash);border:1px solid var(--line);padding:2px 8px;border-radius:6px;white-space:nowrap}
.obj-facts{margin:8px 0 0;padding-left:18px}
.obj-facts li{margin:5px 0;font-size:13.5px;color:var(--ink-soft)}

/* --------------------------------------------------------------- Cram ----- */
function Cram() {
  const [rate, setRate] = useState(1);
  const [voiceName, setVoiceName] = useState("");
  const [voices, setVoices] = useState([]);
  const [curLine, setCurLine] = useState(-1);
  const [status, setStatus] = useState("idle"); // idle | playing | paused
  const idxRef = useRef(-1);
  const rateRef = useRef(1);
  const voiceRef = useRef(null);
  const cardRefs = useRef([]);
  const stoppedRef = useRef(true);

  useEffect(() => { rateRef.current = rate; }, [rate]);

  const lines = useMemo(() => {
    const out = [];
    cram.forEach((c, ci) => {
      out.push({ card: ci, text: `Section ${c.n}. ${c.title}.` });
      c.facts.forEach((f) => out.push({ card: ci, text: f }));
      out.push({ card: ci, text: `Maini flag. ${c.flag}` });
    });
    return out;
  }, []);

  useEffect(() => {
    const synth = window.speechSynthesis;
    if (!synth) return;
    const load = () => {
      const vs = synth.getVoices().filter((v) => /en/i.test(v.lang));
      if (!vs.length) return;
      setVoices(vs);
      setVoiceName((prev) => {
        if (prev) return prev;
        const pref = ["Ava", "Emma", "Andrew", "Natural", "Aria", "Jenny", "Google US English", "Samantha"];
        for (const p of pref) { const hit = vs.find((v) => v.name.includes(p)); if (hit) return hit.name; }
        return vs[0].name;
      });
    };
    load();
    synth.addEventListener("voiceschanged", load);
    return () => { synth.removeEventListener("voiceschanged", load); };
  }, []);

  useEffect(() => { voiceRef.current = voices.find((v) => v.name === voiceName) || null; }, [voiceName, voices]);

  useEffect(() => () => { stoppedRef.current = true; try { window.speechSynthesis.cancel(); } catch (e) {} }, []);

  const speakFrom = (i) => {
    const synth = window.speechSynthesis;
    if (!synth) return;
    if (i >= lines.length) { stoppedRef.current = true; setStatus("idle"); setCurLine(-1); idxRef.current = -1; return; }
    idxRef.current = i;
    setCurLine(i);
    const card = lines[i].card;
    const el = cardRefs.current[card];
    if (el) el.scrollIntoView({ behavior: "smooth", block: "center" });
    const u = new SpeechSynthesisUtterance(lines[i].text);
    u.rate = rateRef.current;
    if (voiceRef.current) { u.voice = voiceRef.current; u.lang = voiceRef.current.lang; }
    u.onend = () => { if (!stoppedRef.current) speakFrom(i + 1); };
    synth.speak(u);
  };

  const play = (from) => {
    const synth = window.speechSynthesis;
    if (!synth) { alert("Your browser does not support speech. Try Microsoft Edge or Chrome."); return; }
    synth.cancel();
    stoppedRef.current = false;
    setStatus("playing");
    const start = from != null ? from : (idxRef.current >= 0 ? idxRef.current : 0);
    speakFrom(start);
  };
  const pause = () => { try { window.speechSynthesis.pause(); setStatus("paused"); } catch (e) {} };
  const resume = () => { try { window.speechSynthesis.resume(); setStatus("playing"); } catch (e) {} };
  const stop = () => { stoppedRef.current = true; try { window.speechSynthesis.cancel(); } catch (e) {} setStatus("idle"); setCurLine(-1); idxRef.current = -1; };
  const playCard = (ci) => { const s = lines.findIndex((l) => l.card === ci); if (s >= 0) play(s); };

  return (
    <section className="section">
      <div className="banner">
        <div className="bt">⚡ Cram — Maini&apos;s pharynx essentials, in her order</div>
        <p>Overview and extent, then the nasopharynx and adenoids, the oropharynx, the laryngopharynx and piriform fossa, the wall layers, the constrictor and longitudinal muscles with their innervation, and the tonsil ring. Press ▶ Play and it reads the whole thing to you, hands-free. The ⚑ Maini flags are the high-yield hooks.</p>
      </div>

      <div className="coachbar">
        {status === "playing" ? (
          <>
            <button className="cbtn ghost2" onClick={pause}>⏸ Pause</button>
            <button className="cbtn ghost2" onClick={stop}>⏹ Stop</button>
          </>
        ) : status === "paused" ? (
          <>
            <button className="cbtn play" onClick={resume}>▶ Resume</button>
            <button className="cbtn ghost2" onClick={stop}>⏹ Stop</button>
          </>
        ) : (
          <button className="cbtn play" onClick={() => play(0)}>▶ Play all</button>
        )}
        <label className="cbctl">Speed
          <input type="range" min="0.5" max="3" step="0.1" value={rate} onChange={(e) => setRate(parseFloat(e.target.value))} />
          <span>{rate.toFixed(1)}x</span>
        </label>
        <label className="cbctl">Voice
          <select value={voiceName} onChange={(e) => setVoiceName(e.target.value)}>
            {voices.length === 0 && <option value="">Default</option>}
            {voices.map((v) => <option key={v.name} value={v.name}>{v.name}</option>)}
          </select>
        </label>
        {status !== "idle" && <span className="cbstate">{status === "playing" ? "🔊 Reading" : "⏸ Paused"}{curLine >= 0 ? ` · ${curLine + 1}/${lines.length}` : ""}</span>}
      </div>

      {cram.map((c, ci) => (
        <div className={`obj ${curLine >= 0 && lines[curLine] && lines[curLine].card === ci ? "speaking" : ""}`} key={c.n} ref={(el) => (cardRefs.current[ci] = el)}>
          <div className="obj-head">
            <span className="obj-num serif">{c.n}</span>
            <span className="obj-title">{c.title}</span>
            <button className="obj-play" onClick={() => playCard(ci)}>▶ Read</button>
            <span className="src">{c.src}</span>
          </div>
          <ul className="obj-facts">{c.facts.map((f, j) => <li key={j}>{f}</li>)}</ul>
          {c.flag && <div className="objflag">{c.flag}</div>}
        </div>
      ))}
    </section>
  );
}

/* --------------------------------------------------------------- Drill ---- */
function shuffleQ(q) {
  const correct = q.opts[q.a];
  const opts = q.opts.slice();
  for (let i = opts.length - 1; i > 0; i--) { const j = Math.floor(Math.random() * (i + 1)); const t = opts[i]; opts[i] = opts[j]; opts[j] = t; }
  return { ...q, opts, a: opts.indexOf(correct) };
}

function Drill({ bank }) {
  const deck = useMemo(() => bank.map(shuffleQ), [bank]);
  const [idx, setIdx] = useState(0);
  const [answers, setAnswers] = useState({});
  const [hintLevel, setHintLevel] = useState({});
  const [mode, setMode] = useState("study");

  const safeIdx = Math.min(idx, Math.max(0, deck.length - 1));
  const q = deck[safeIdx];

  const score = useMemo(
    () => Object.entries(answers).reduce((n, [id, v]) => {
      const qq = deck.find((x) => x.id === Number(id));
      return n + (qq && v === qq.a ? 1 : 0);
    }, 0),
    [answers, deck]
  );

  if (!deck.length) return <section className="section"><div className="banner"><div className="bt">Drill</div></div></section>;

  const keyMode = mode === "key";
  const sel = answers[q.id];
  const answered = sel !== undefined;
  const hl = hintLevel[q.id] || 0;
  const done = Object.keys(answers).length;

  const select = (i) => {
    if (keyMode) return;
    if (answers[q.id] !== undefined) return;
    setAnswers((p) => ({ ...p, [q.id]: i }));
  };
  const bumpHint = () => setHintLevel((p) => ({ ...p, [q.id]: Math.min((p[q.id] || 0) + 1, 2) }));
  const optClass = (i) => {
    if (keyMode) return i === q.a ? "opt opt-correct" : "opt opt-locked";
    if (!answered) return "opt";
    if (i === q.a) return "opt opt-correct";
    if (i === sel) return "opt opt-wrong";
    return "opt opt-locked";
  };

  return (
    <section className="section">
      <div className="banner">
        <div className="bt">🎯 Drill — {deck.length} questions across the pharynx</div>
        <p>Four options, two progressive hints, an explanation, and a lecture source per question. Tap to self-test, or flip to the Answer Key to review.</p>
      </div>

      <div className="drillbar">
        <div className="progress">Question <b>{safeIdx + 1}</b> / {deck.length}{!keyMode && <> · answered <b>{done}</b></>}</div>
        <div className="modetog">
          <button className={mode === "study" ? "on" : ""} onClick={() => setMode("study")}>Study (tap)</button>
          <button className={mode === "key" ? "on" : ""} onClick={() => setMode("key")}>Answer key</button>
        </div>
        {!keyMode && <div className="scorepill">Score {score}/{done || 0}</div>}
      </div>

      <div className="navgrid">
        {deck.map((qq, i) => {
          let cls = "";
          if (keyMode) cls = "ok";
          else { const a = answers[qq.id]; cls = a === undefined ? "" : a === qq.a ? "ok" : "no"; }
          return <button key={qq.id} className={`navbtn ${cls} ${i === safeIdx ? "cur" : ""}`} onClick={() => setIdx(i)}>{i + 1}</button>;
        })}
      </div>

      <div className="qcard">
        <div className="badges"><span className="qtopic">{q.topic}</span><span className="qsrc">{q.src}</span></div>
        <div className="qtext">{q.q}</div>

        {q.opts.map((o, i) => (
          <button key={i} className={optClass(i)} onClick={() => select(i)}>
            <span className="key">{String.fromCharCode(65 + i)}</span><span>{o}</span>
          </button>
        ))}

        {!keyMode && !answered && (
          <>
            <div className="hintrow">
              <button className="ghost" onClick={bumpHint} disabled={hl >= 2}>{hl === 0 ? "Need a hint?" : "Bigger hint"}</button>
            </div>
            {hl >= 1 && <div className="hintbox">💡 {q.h1}</div>}
            {hl >= 2 && <div className="hintbox">🔎 {q.h2}</div>}
          </>
        )}

        {keyMode && <div className="exp keyed"><div className="tag">✦ Answer · {q.src}</div><p>{q.exp}</p></div>}
        {!keyMode && answered && (
          <div className={`exp ${sel === q.a ? "correct" : "incorrect"}`}>
            <div className="tag">{sel === q.a ? "✓ Correct" : "✗ Not quite"} · {q.src}</div>
            <p>{q.exp}</p>
          </div>
        )}

        <div className="navfoot">
          <button className="btn btn-ghost" onClick={() => setIdx(Math.max(0, safeIdx - 1))} disabled={safeIdx === 0}>← Prev</button>
          <button className="btn btn-primary" onClick={() => setIdx(Math.min(deck.length - 1, safeIdx + 1))} disabled={safeIdx >= deck.length - 1}>Next →</button>
        </div>
      </div>
    </section>
  );
}

/* --------------------------------------------------------------- Coach ---- */
const COACH_SYSTEM = `You are Dr. Seema Maini, teaching GA 0202 Gross Anatomy, running a review of THE PHARYNX (Lecture 27). Teach ONLY from this content; do not invent structures, attachments, nerves, or vertebral levels. Warm and direct; you call students "guys," say "right?", "okay?", and "make sense?", love a quick analogy, and push students to reason it out. Keep answers tight (3-6 sentences) and quiz the student back.

BIG PICTURE: the pharynx is a common chamber for the respiratory AND digestive tracts. Funnel-shaped, about 12 cm, from the base of the skull to the lower border of the cricoid cartilage (C6), then continuous with the esophagus. It is C-shaped, not a complete tube - essentially no anterior wall, because it opens into the nasal cavity, oral cavity, and larynx (your "three rooms, one corridor" analogy). Three parts top to bottom: nasopharynx, oropharynx, laryngopharynx.

NASOPHARYNX (entirely respiratory, rigid because bone supports it): base of skull to the soft palate. Roof = body of sphenoid + basilar occipital; floor = sloping upper surface of the soft palate; posterior wall = anterior arch of the atlas (C1). Pharyngeal isthmus = opening between soft palate and posterior wall. Lateral wall features: opening of the auditory (pharyngotympanic) tube, torus tubarius, salpingopharyngeal fold, and pharyngeal recess (the pharyngeal tubercle is NOT here - it is a superior-constrictor insertion). Auditory tube goes to the anterior wall of the middle ear. Salpingo means tube. Pharyngeal tonsil (single) sits in the roof; inflamed it is called adenoids -> mouth-breather -> adenoid facies (flat face, small recessed jaw, open mouth); early adenoidectomy works because facial bones grow until puberty.

OROPHARYNX (the digestive entrance): soft palate to the upper border of the epiglottis. Roof = undersurface of soft palate + pharyngeal isthmus; floor = posterior one-third of the tongue + interval to epiglottis; posterior wall = body of C2, upper C3, and the disc between. Three glossoepiglottic folds (one median, two lateral) with the valleculae between them; single lingual tonsil on the tongue root. Lateral wall folds: palatoglossal and palatopharyngeal, with the palatine tonsil in the tonsillar fossa between them.

LARYNGOPHARYNX: behind the laryngeal inlet and posterior wall of the larynx, from upper border of epiglottis to lower border of cricoid (C6); communicates with oropharynx above and esophagus below. Anterior wall = laryngeal inlet + mucosa over the back of the larynx; posterior wall support = C3-C6; lateral wall = thyroid cartilage + thyrohyoid membrane (the "armor"). PIRIFORM FOSSA = pear-shaped shallow depression each side of the laryngeal inlet where a fishbone lodges; the internal laryngeal nerve runs just deep to its mucosa (sensory above the vocal folds), so injury loses the gag reflex and risks aspiration / aspiration pneumonitis.

WALL LAYERS: lining is stratified squamous, NON-keratinized (stratified to resist bolus abrasion; non-keratinized because keratin is only in skin). Inside-out: mucosa, pharyngobasilar fascia (submucosa, blends with skull-base periosteum), muscular layer (outer circular constrictors + inner longitudinal), buccopharyngeal fascia. Retropharyngeal space (loose areolar tissue) lets the pharynx glide during swallowing; obliteration causes dysphagia.

CONSTRICTORS (outer circular, 3): superior (from pterygoid hamulus, pterygomandibular raphe, mylohyoid line, side of tongue) inserts on the pharyngeal tubercle - buccinator lies anterior on the pterygomandibular raphe. Middle (from stylohyoid ligament + horns of hyoid) inserts on the midline pharyngeal raphe. Inferior (from oblique line of thyroid + cricoid) has two parts: thyropharyngeus (forms a raphe) and cricopharyngeus (no raphe = the upper esophageal sphincter, keeps the esophagus closed except when swallowing; lax with age -> aerophagia, belching). Three muscles on the oblique line of thyroid: inferior constrictor, sternothyroid, thyrohyoid (NOT sternohyoid) - your favorite "which is NOT attached" question.

LONGITUDINAL (inner, 3): palatopharyngeus (hard palate + palatine aponeurosis, forms the palatopharyngeal arch), salpingopharyngeus (cartilage of the auditory tube), stylopharyngeus (styloid process). They elevate/shorten the pharynx and larynx. Palatopharyngeus and stylopharyngeus insert on the thyroid cartilage.

INNERVATION: most pharyngeal muscles come from the 4th and 6th arches, so they are vagus (CN X) via the pharyngeal branch. The ONE exception is stylopharyngeus - glossopharyngeal (CN IX), 3rd arch. Your mnemonic: stylopharyngeus is "so stylish it has its own nerve."

TONSIL RING (Waldeyer): pharyngeal, tubal, palatine, lingual tonsils; pharyngeal and lingual are single. CLINICAL: adenoids/adenoid facies, aerophagia (lax UES), aspiration pneumonitis (lost gag reflex), dysphagia (obliterated retropharyngeal space).

Open by offering to drill the three parts and their boundaries, the nasopharynx lateral-wall features, the piriform fossa and internal laryngeal nerve, the constrictor and longitudinal muscles, or the innervation exception. When the student is wrong, name the structure and walk them back through it.`;

function Coach() {
  const [log, setLog] = useState([
    { role: "assistant", content: "Okay guys, the pharynx. Two things to lock in first: the pharynx is a common chamber for BOTH air and food, running from the base of the skull to the lower border of the cricoid at C6, right? And it is C-shaped, not a complete tube, because it opens into three rooms - the nasal cavity, the oral cavity, and the larynx. Where do you want to start: the three parts and their boundaries, the nasopharynx lateral wall, the piriform fossa and internal laryngeal nerve, the constrictor and longitudinal muscles, or the innervation exception?" },
  ]);
  const [input, setInput] = useState("");
  const [busy, setBusy] = useState(false);
  const [err, setErr] = useState("");
  const logRef = useRef(null);

  useEffect(() => { if (logRef.current) logRef.current.scrollTop = logRef.current.scrollHeight; }, [log, busy]);

  const send = async (text) => {
    const msg = (text ?? input).trim();
    if (!msg || busy) return;
    setErr("");
    const next = [...log, { role: "user", content: msg }];
    setLog(next);
    setInput("");
    setBusy(true);
    try {
      const res = await fetch("https://fab-ai.dgync1.workers.dev/", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          model: "claude-sonnet-4-20250514",
          max_tokens: 1000,
          system: COACH_SYSTEM,
          messages: next.map((m) => ({ role: m.role, content: m.content })),
        }),
      });
      const data = await res.json();
      const reply = (data.reply || (data.content || []).filter((b) => b.type === "text").map((b) => b.text).join("\n") || "").trim();
      setLog((p) => [...p, { role: "assistant", content: reply || "Say that again for me?" }]);
    } catch (e) {
      setErr("Could not reach the tutor. If you're running this outside the wrapped app, the API call needs a valid endpoint/key.");
      setLog((p) => p.slice(0, -1).concat({ role: "user", content: msg }));
    } finally {
      setBusy(false);
    }
  };

  const prompts = [
    "Drill me on the three parts and their boundaries",
    "Nasopharynx lateral-wall features (and the tubercle trap)",
    "Piriform fossa and the internal laryngeal nerve",
    "The constrictor muscles and the inferior constrictor's two parts",
    "Which muscle is the innervation exception, and why?",
    "The wall layers, inside to outside",
  ];

  return (
    <section className="section">
      <div className="banner">
        <div className="bt">🧑‍⚕️ AI Coach — Dr. Maini&apos;s voice</div>
        <p>Grounded in her pharynx lecture. It quizzes you and makes you reason step by step instead of guessing.</p>
      </div>

      <div className="coach-pills">
        {prompts.map((p, i) => <button key={i} className="cpill" onClick={() => send(p)}>{p}</button>)}
      </div>

      <div className="chatlog" ref={logRef}>
        {log.map((m, i) => (
          <div key={i} className={`msg ${m.role === "user" ? "user" : "bot"}`}>
            {m.role === "assistant" && <div className="who">Dr. Maini</div>}
            {m.content}
          </div>
        ))}
        {busy && <div className="typing">Dr. Maini is typing…</div>}
      </div>

      <div className="composer">
        <textarea
          value={input}
          placeholder="Ask Dr. Maini… (Enter to send, Shift+Enter for a new line)"
          onChange={(e) => setInput(e.target.value)}
          onKeyDown={(e) => { if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); send(); } }}
        />
        <button className="btn btn-primary" onClick={() => send()} disabled={busy || !input.trim()}>Send</button>
      </div>
      {err && <div className="tinynote" style={{ color: "var(--bad)" }}>{err}</div>}
      <div className="tinynote">Tutor answers are AI-generated in a teaching persona — trust the lecture/slides first if anything ever conflicts.</div>
    </section>
  );
}


ReactDOM.createRoot(document.getElementById("root")).render(<App />);
