  { id: 1, topic: "Scalp layers", src: "Maini · L07 Scalp", q: "A scalp injury produces a spreading collection of blood beneath the scalp. In which layer does blood or pus most readily accumulate?", opts: ["The epicranial aponeurosis (galea)", "The dense subcutaneous connective tissue", "The loose areolar connective tissue layer", "The pericranium"], a: 2, h1: "Think of the layer with the most free space.", h2: "It is also the 'scalping' plane.", exp: "The 4th layer, LOOSE AREOLAR connective tissue, is loosely arranged with abundant potential space, so blood and pus collect and spread there." },
  { id: 2, topic: "Scalp layers", src: "Maini · L07 Scalp", q: "In the mnemonic SCALP, the letter 'A' stands for:", opts: ["Areolar tissue", "Adipose", "The aponeurosis (epicranial aponeurosis / galea aponeurotica)", "Artery layer"], a: 2, h1: "It is the tough tendinous sheet.", h2: "It is formed with occipitofrontalis.", exp: "A = APONEUROSIS, the epicranial aponeurosis (galea aponeurotica) — the 3rd layer, the tendon of occipitofrontalis." },
  { id: 3, topic: "Scalp layers", src: "Maini · L07 Scalp", q: "Which three scalp layers are bound together so tightly they move as one unit (and tear off together in a scalping avulsion)?", opts: ["Aponeurosis, loose areolar, pericranium", "Skin, loose areolar, pericranium", "Skin, connective tissue, and aponeurosis", "Connective tissue, loose areolar, pericranium"], a: 2, h1: "The outermost three.", h2: "S, C, and A of SCALP.", exp: "Skin, Connective tissue, and Aponeurosis are firmly bound and move as a single unit — the sheet avulsed in scalping." },
  { id: 4, topic: "Scalp layers", src: "Maini · L07 Scalp", q: "The scalp proper extends between which two bony landmarks?", opts: ["Mastoid processes to the zygomatic arches", "Superior nuchal lines posteriorly to the supraorbital margins anteriorly", "External occipital protuberance to the nasion", "Inion to the mental protuberance"], a: 1, h1: "Back of the skull to the eyebrows.", h2: "Nuchal lines to the orbital margins.", exp: "The scalp runs from the SUPERIOR NUCHAL LINES posteriorly to the SUPRAORBITAL MARGINS anteriorly." },
  { id: 5, topic: "Scalp layers", src: "Maini · L07 Scalp", q: "The aponeurotic (3rd) layer of the scalp is chiefly formed by which muscle?", opts: ["Temporalis", "Occipitofrontalis", "Corrugator supercilii", "Buccinator"], a: 1, h1: "It has a frontal and an occipital belly.", h2: "The galea joins its two bellies.", exp: "OCCIPITOFRONTALIS and its intervening galea form the aponeurotic layer." },
  { id: 6, topic: "Scalp vessels", src: "Maini · L07 Scalp", q: "The supratrochlear and supraorbital arteries of the anterior scalp are ultimately derived from which parent artery?", opts: ["The internal carotid artery (via the ophthalmic artery)", "The external carotid artery", "The maxillary artery", "The facial artery"], a: 0, h1: "They exit from the orbit.", h2: "Ophthalmic comes off which carotid?", exp: "They are branches of the OPHTHALMIC artery, a branch of the INTERNAL carotid artery." },
  { id: 7, topic: "Scalp vessels", src: "Maini · L07 Scalp", q: "Which three scalp arteries are branches of the EXTERNAL carotid artery?", opts: ["Superficial temporal, posterior auricular, occipital", "Supratrochlear, supraorbital, dorsal nasal", "Facial, maxillary, ophthalmic", "Angular, submental, superior labial"], a: 0, h1: "The posterior and lateral scalp supply.", h2: "One temporal, one auricular, one occipital.", exp: "The superficial temporal, posterior auricular, and occipital arteries are branches of the EXTERNAL carotid." },
  { id: 8, topic: "Scalp clinical", src: "Maini · L07 Scalp", q: "Why do even minor scalp lacerations bleed so profusely?", opts: ["The scalp arteries anastomose richly, so both cut ends bleed", "The skin is unusually thin", "Arterial pressure is highest in the scalp", "Scalp veins lack valves"], a: 0, h1: "Compare a scalp cut to a forearm cut.", h2: "Blood arrives from both directions.", exp: "Rich ANASTOMOSIS means a divided scalp vessel bleeds from BOTH cut ends." },
  { id: 9, topic: "Scalp clinical", src: "Maini · L07 Scalp", q: "A scalp laceration running side-to-side (transverse) tends to gape widely because:", opts: ["The pericranium retracts", "The skin loses its blood supply", "Arterial pull opens the wound", "The galea aponeurotica fibres run longitudinally and pull the edges apart"], a: 3, h1: "Think about the direction of the galea's fibres.", h2: "Fibres run front-to-back along the sagittal suture.", exp: "The galea's fibres run LONGITUDINALLY, so a transverse cut is pulled open across them." },
  { id: 10, topic: "Scalp nerves", src: "Maini · L07 Scalp", q: "Sensation for most of the face and scalp — the 'sensory nerve of the head and neck' — is provided by:", opts: ["The facial nerve (CN VII)", "The trigeminal nerve (CN V)", "The cervical plexus", "The glossopharyngeal nerve (CN IX)"], a: 1, h1: "It has three divisions.", h2: "V1, V2, V3.", exp: "The TRIGEMINAL nerve (CN V) is the sensory nerve of the face and most of the scalp." },
  { id: 11, topic: "Scalp nerves", src: "Maini · L07 Scalp", q: "The lesser occipital nerve, supplying the posterolateral scalp, has which root value and origin?", opts: ["Dorsal rami of C2-C3", "C2-C3, from the cervical plexus (ventral rami)", "V3 (mandibular)", "C1 only"], a: 1, h1: "It is a named cutaneous branch of a plexus.", h2: "Ventral rami, C2-C3.", exp: "The lesser occipital nerve is C2-C3 from the CERVICAL PLEXUS (ventral rami)." },
  { id: 12, topic: "Scalp nerves", src: "Maini · L07 Scalp", q: "The greater occipital and third occipital nerves, supplying the midline posterior scalp, arise from:", opts: ["The dorsal rami of C2 and C3", "The ventral rami of C2-C3", "The cervical plexus", "V2 (maxillary)"], a: 0, h1: "Midline back = a different ramus.", h2: "Dorsal, not ventral.", exp: "The greater and third occipital nerves arise from the DORSAL rami of C2 and C3." },
  { id: 13, topic: "Scalp nerves", src: "Maini · L07 Scalp", q: "The auriculotemporal nerve, giving sensation to part of the temporal scalp, is a branch of which trigeminal division?", opts: ["V3 (mandibular)", "V1 (ophthalmic)", "V2 (maxillary)", "The facial nerve"], a: 0, h1: "It also carries parasympathetics to the parotid.", h2: "The mandibular division.", exp: "The auriculotemporal nerve is a branch of V3 (mandibular)." },
  { id: 14, topic: "Scalp veins", src: "Maini · L07 Scalp", q: "The superficial temporal vein joins which vein to help form the retromandibular vein?", opts: ["The facial vein", "The occipital vein", "The angular vein", "The maxillary vein"], a: 3, h1: "Its partner runs deep to the ramus.", h2: "Superficial temporal + this = retromandibular.", exp: "The superficial temporal vein joins the MAXILLARY vein to form the retromandibular vein." },
  { id: 15, topic: "Facial muscles", src: "Maini · L07 Face", q: "What single feature is common to ALL muscles of facial expression?", opts: ["They all arise from the mandible", "They are all innervated by the facial nerve (CN VII)", "They all close an orifice", "They all develop from the first pharyngeal arch"], a: 1, h1: "Maini said this makes them easy to study.", h2: "One nerve for the whole group.", exp: "ALL muscles of facial expression are innervated by the FACIAL nerve (CN VII)." },
  { id: 16, topic: "Facial muscles", src: "Maini · L07 Face", q: "The muscles of facial expression develop from which embryological structure?", opts: ["The first pharyngeal arch", "The second pharyngeal arch", "The third pharyngeal arch", "The neural crest of the fourth arch"], a: 1, h1: "The same arch as the facial nerve.", h2: "Arch number two.", exp: "They develop from the SECOND pharyngeal (branchial) arch." },
  { id: 17, topic: "Facial muscles", src: "Maini · L07 Face", q: "Which general statement about the muscles of facial expression is correct?", opts: ["They insert into bone", "They are innervated by CN V", "They lie in the superficial fascia and insert into the skin of the face", "They produce synovial fluid"], a: 2, h1: "That is why they move the skin.", h2: "Superficial fascia, skin insertion.", exp: "They lie in the SUPERFICIAL FASCIA and insert into the SKIN of the face." },
  { id: 18, topic: "Facial muscles", src: "Maini · L07 Face", q: "Botulinum toxin ('Botox') reduces wrinkles by which mechanism?", opts: ["It cuts the facial nerve", "It dissolves collagen fibres", "It blocks pain receptors in the skin", "It blocks neuromuscular transmission (acetylcholine action), paralyzing the muscle"], a: 3, h1: "It is a poison from Clostridium botulinum.", h2: "Think of the neuromuscular junction.", exp: "Botox BLOCKS neuromuscular transmission where acetylcholine binds, paralyzing the muscle." },
  { id: 19, topic: "Specific muscles", src: "Maini · L07/L08 Face", q: "Horizontal wrinkling of the forehead and eyebrow elevation (the 'surprised' look) is produced by:", opts: ["The frontal belly of occipitofrontalis", "Corrugator supercilii", "Procerus", "Orbicularis oculi"], a: 0, h1: "The forehead belly of a two-bellied muscle.", h2: "Frontal belly.", exp: "The FRONTAL BELLY of occipitofrontalis elevates the eyebrows and makes horizontal forehead wrinkles." },
  { id: 20, topic: "Specific muscles", src: "Maini · L07 Face", q: "Vertical wrinkling of the forehead in frowning (drawing the eyebrows medially) is the action of:", opts: ["Corrugator supercilii", "Frontalis", "Nasalis", "Risorius"], a: 0, h1: "It 'corrugates' between the brows.", h2: "Vertical, not horizontal.", exp: "CORRUGATOR SUPERCILII draws the eyebrows medially, giving vertical frown lines." },
  { id: 21, topic: "Specific muscles", src: "Maini · L07/L08 Face", q: "Which muscle is the sphincter of the eye and closes the eyelid?", opts: ["Levator palpebrae superioris", "Corrugator supercilii", "Procerus", "Orbicularis oculi"], a: 3, h1: "It orbits the orbit.", h2: "It closes, it does not open.", exp: "ORBICULARIS OCULI is the sphincter of the eye that closes the eyelid." },
  { id: 22, topic: "Specific muscles", src: "Maini · L07 Face", q: "Which muscle OPENS the eye by elevating the upper eyelid — and is NOT a muscle of facial expression?", opts: ["Orbicularis oculi", "Frontalis", "Levator palpebrae superioris (CN III)", "Nasalis"], a: 2, h1: "Its nerve is not CN VII.", h2: "'Levator' of the eyelid, CN III.", exp: "LEVATOR PALPEBRAE SUPERIORIS opens the eye; it is CN III and NOT a facial-expression muscle." },
  { id: 23, topic: "Specific muscles", src: "Maini · L08 Face", q: "Which facial muscle is the 'trumpeter's muscle,' compressing the cheek against the teeth and pierced by the parotid duct?", opts: ["Risorius", "Buccinator", "Masseter", "Zygomaticus major"], a: 1, h1: "You use it to blow a trumpet.", h2: "The parotid duct pierces it.", exp: "BUCCINATOR is the trumpeter's muscle; the parotid duct pierces it." },
  { id: 24, topic: "Specific muscles", src: "Maini · L08 Face", q: "The buccinator muscle takes origin from:", opts: ["The alveolar margins of the maxilla & mandible and the pterygomandibular raphe", "The zygomatic arch", "The mastoid process", "The nasal bone"], a: 0, h1: "Two bony margins plus a raphe.", h2: "The white pterygomandibular line.", exp: "Buccinator arises from the alveolar margins of the maxilla & mandible (opposite the molars) and the pterygomandibular raphe." },
  { id: 25, topic: "Specific muscles", src: "Maini · L08 Face", q: "Which is the ONLY muscle of facial expression located in the neck?", opts: ["Sternocleidomastoid", "Digastric", "Platysma", "Risorius"], a: 2, h1: "It is a broad, thin sheet in the neck.", h2: "Supplied by the cervical branch of CN VII.", exp: "PLATYSMA is the only muscle of facial expression in the neck." },
  { id: 26, topic: "Specific muscles", src: "Maini · L08 Face", q: "Zygomaticus major moves the angle of the mouth in which direction (the main smiling action)?", opts: ["Downward and medial", "Purely horizontal", "Upward and laterally", "It closes the lips"], a: 2, h1: "It runs from the cheekbone to the mouth angle.", h2: "Up and out.", exp: "ZYGOMATICUS MAJOR pulls the angle of the mouth UPWARD and LATERALLY — the smile." },
  { id: 27, topic: "Facial N. branches", src: "Maini · L08 Facial N.", q: "Through which foramen does the facial nerve exit the skull before entering the parotid gland?", opts: ["Foramen ovale", "Jugular foramen", "Stylomastoid foramen", "Internal acoustic meatus"], a: 2, h1: "Between the styloid and mastoid processes.", h2: "Stylo- + -mastoid.", exp: "The facial nerve exits at the STYLOMASTOID foramen, then enters the parotid gland." },
  { id: 28, topic: "Facial N. branches", src: "Maini · L08 Facial N.", q: "The mnemonic 'To Zanzibar By Motor Car' gives which five facial-nerve branches?", opts: ["Temporal, Zygomatic, Buccal, Mandibular, Cranial", "Temporal, Zygomatic, Bucchal, Marginal, Cutaneous", "Trochlear, Zygomatic, Buccal, Mental, Cervical", "Temporal, Zygomatic, Buccal, Marginal mandibular, Cervical"], a: 3, h1: "T, Z, B, M, C.", h2: "Marginal MANDIBULAR, then Cervical.", exp: "Temporal, Zygomatic, Buccal, Marginal mandibular, Cervical." },
  { id: 29, topic: "Facial N. branches", src: "Maini · L08 Facial N.", q: "Maini's most-commonly-missed facial-nerve question: the cervical branch supplies which muscle?", opts: ["Buccinator", "Risorius", "Platysma", "Sternocleidomastoid"], a: 2, h1: "The one facial muscle in the neck.", h2: "It is the only neck muscle of facial expression.", exp: "The CERVICAL branch supplies PLATYSMA — the only muscle of facial expression in the neck." },
  { id: 30, topic: "Facial N. branches", src: "Maini · L08 Facial N.", q: "Maini's trap: which muscle is NOT supplied by the temporal branch of the facial nerve?", opts: ["Frontal belly of occipitofrontalis", "Orbicularis oculi", "Mentalis", "Corrugator supercilii"], a: 2, h1: "Which one is farthest from the temple?", h2: "Down at the chin.", exp: "MENTALIS (at the chin) is not supplied by the temporal branch — it is too far away." },
  { id: 31, topic: "Facial N. course", src: "Maini · L08 Facial N.", q: "The facial nerve enters the temporal bone / tympanic-cavity region through which opening?", opts: ["The stylomastoid foramen", "The internal acoustic meatus", "The petrotympanic fissure", "The foramen spinosum"], a: 1, h1: "It enters near the inner ear.", h2: "The 'internal acoustic' opening.", exp: "The facial nerve enters via the INTERNAL ACOUSTIC MEATUS." },
  { id: 32, topic: "Facial N. course", src: "Maini · L08 Facial N.", q: "The sensory ganglion at the bend ('genu') of the facial nerve is the:", opts: ["Otic ganglion", "Pterygopalatine ganglion", "Geniculate ganglion", "Submandibular ganglion"], a: 2, h1: "Named for the genu / bend.", h2: "Geniculate.", exp: "The GENICULATE ganglion sits at the genu (bend) of the facial nerve." },
  { id: 33, topic: "Facial N. course", src: "Maini · L08 Facial N.", q: "The greater petrosal nerve, given off at the geniculate ganglion, carries which fibres?", opts: ["Preganglionic parasympathetic", "Postganglionic sympathetic", "Taste only", "Motor to stapedius"], a: 0, h1: "It heads for the pterygopalatine ganglion.", h2: "Pre-ganglionic, parasympathetic.", exp: "The greater petrosal nerve carries PREganglionic PARASYMPATHETIC fibres." },
  { id: 34, topic: "Facial N. course", src: "Maini · L08 Facial N.", q: "The greater petrosal nerve and the deep petrosal nerve unite to form:", opts: ["The chorda tympani", "The nerve of the pterygoid canal", "The lesser petrosal nerve", "The auriculotemporal nerve"], a: 1, h1: "It travels to the pterygopalatine ganglion.", h2: "Named for a canal.", exp: "Together they form the NERVE OF THE PTERYGOID CANAL." },
  { id: 35, topic: "Facial N. course", src: "Maini · L08 Facial N.", q: "Paralysis of the stapedius muscle (nerve to stapedius, a facial-nerve branch) produces:", opts: ["Complete deafness", "Vertigo", "Hyperacusis (abnormal sensitivity to sound)", "Tinnitus only"], a: 2, h1: "Stapedius normally dampens loud sound.", h2: "Sounds become too loud.", exp: "Stapedius paralysis causes HYPERACUSIS — abnormal sensitivity to sound." },
  { id: 36, topic: "Facial N. course", src: "Maini · L08 Facial N.", q: "The chorda tympani carries which two functional components?", opts: ["Taste from the posterior 1/3 of the tongue and motor to the tongue", "Sympathetic fibres to the parotid and taste to the palate", "General sensation to the cheek and motor to buccinator", "Taste from the anterior 2/3 of the tongue AND preganglionic parasympathetics to the submandibular ganglion"], a: 3, h1: "One sensory, one autonomic.", h2: "Front of tongue + submandibular ganglion.", exp: "Chorda tympani = TASTE from the anterior 2/3 of the tongue + preganglionic parasympathetics to the SUBMANDIBULAR ganglion." },
  { id: 37, topic: "Facial N. lesions", src: "Maini · L08 Facial N.", q: "A patient develops sudden unilateral facial droop after cold exposure with no other cause. This is:", opts: ["An upper-motor-neuron stroke", "Bell's palsy (idiopathic LMN facial paralysis)", "Trigeminal neuralgia", "Ramsay-Hunt syndrome"], a: 1, h1: "Idiopathic and lower-motor-neuron.", h2: "Named after Bell.", exp: "This is BELL'S PALSY — idiopathic lower-motor-neuron facial paralysis." },
  { id: 38, topic: "Facial N. lesions", src: "Maini · L08 Facial N.", q: "In a lower-motor-neuron facial palsy, the smile deviates toward which side?", opts: ["Toward the affected side", "Toward the normal side", "It stays perfectly straight", "It droops equally on both sides"], a: 1, h1: "The working muscles win the tug-of-war.", h2: "Pulled to the unaffected side.", exp: "The smile deviates to the NORMAL side (the paralyzed side cannot pull the mouth angle up)." },
  { id: 39, topic: "Facial N. lesions", src: "Maini · L08 Facial N.", q: "Inability to close the eye completely (orbicularis oculi paralysis) is termed:", opts: ["Ptosis", "Exophthalmos", "Ectropion", "Lagophthalmos"], a: 3, h1: "Literally 'lid lag.'", h2: "Lag-ophthalmos.", exp: "LAGOPHTHALMOS is the inability to close the eye — literally 'lid lag.'" },
  { id: 40, topic: "Facial N. lesions", src: "Maini · L07 Face", q: "If orbicularis oculi paralysis is untreated, Maini's clinical cascade ends in:", opts: ["Blindness (via dry eye, corneal abrasion, then opacity)", "Cataract", "Glaucoma", "Retinal detachment"], a: 0, h1: "It starts with loss of blinking.", h2: "Dry cornea scars, then goes opaque.", exp: "Loss of blinking gives xerophthalmia, corneal abrasion, corneal opacity, and finally BLINDNESS — so strap the eye." },
  { id: 41, topic: "Parotid", src: "Maini · L08 Parotid", q: "Which cranial nerve carries the preganglionic parasympathetic (secretomotor) fibres for the parotid gland?", opts: ["CN IX (glossopharyngeal)", "CN VII (facial)", "CN X (vagus)", "CN V (trigeminal)"], a: 0, h1: "Maini's trap — students pick 7.", h2: "The ninth nerve.", exp: "The GLOSSOPHARYNGEAL nerve (CN IX) carries the parotid's preganglionic parasympathetics — NOT the 7th." },
  { id: 42, topic: "Parotid", src: "Maini · L08 Parotid", q: "In the parasympathetic pathway to the parotid, the preganglionic fibres synapse in which ganglion?", opts: ["The submandibular ganglion", "The otic ganglion", "The pterygopalatine ganglion", "The geniculate ganglion"], a: 1, h1: "Reached via the lesser petrosal nerve.", h2: "The 'ear' ganglion.", exp: "They synapse in the OTIC ganglion (via CN IX, tympanic plexus, lesser petrosal nerve)." },
  { id: 43, topic: "Parotid", src: "Maini · L08 Parotid", q: "Postganglionic parasympathetic fibres reach the parotid by hitch-hiking on which nerve?", opts: ["The facial nerve", "The lingual nerve", "The greater petrosal nerve", "The auriculotemporal nerve (V3)"], a: 3, h1: "A branch of the mandibular division.", h2: "Auriculo- + temporal.", exp: "They ride the AURICULOTEMPORAL nerve (a branch of V3) to the parotid gland." },
  { id: 44, topic: "Parotid", src: "Maini · L08 Parotid", q: "The parotid duct opens into the oral cavity opposite which tooth?", opts: ["The upper (maxillary) second molar", "The lower first molar", "The upper canine", "The lower second premolar"], a: 0, h1: "An upper molar.", h2: "The second one.", exp: "The parotid duct opens opposite the UPPER SECOND MOLAR (and it pierces buccinator)." },
  { id: 45, topic: "Parotid", src: "Maini · L08 Parotid", q: "Why is the pain of mumps parotitis so intense?", opts: ["The gland erodes the mandible", "The facial nerve is compressed at a foramen", "The saliva becomes acidic", "The tough fibrous parotid sheath, rich in pain receptors, is stretched by the swollen gland"], a: 3, h1: "Think about the capsule around the gland.", h2: "A tight sheath being stretched.", exp: "The tough PAROTID SHEATH (rich in pain receptors) is stretched by the swollen gland, causing severe pain." },
  { id: 46, topic: "Trigeminal", src: "Maini · L08 Trigeminal", q: "Cutaneous sensation from the tip and bridge of the nose is carried by:", opts: ["V2 (maxillary)", "V3 (mandibular)", "C2 (cervical)", "V1 (ophthalmic)"], a: 3, h1: "The same division as the forehead.", h2: "The ophthalmic division.", exp: "The nose tip and bridge are V1 (OPHTHALMIC)." },
  { id: 47, topic: "Trigeminal", src: "Maini · L08 Trigeminal", q: "Sensation from the skin of the upper lip and cheek is carried by:", opts: ["V1 (ophthalmic)", "V2 (maxillary)", "V3 (mandibular)", "The facial nerve"], a: 1, h1: "The middle division.", h2: "Maxillary.", exp: "The upper lip and cheek are V2 (MAXILLARY)." },
  { id: 48, topic: "Trigeminal", src: "Maini · L08 Trigeminal", q: "Sensation from the skin of the lower lip and chin is carried by:", opts: ["V1 (ophthalmic)", "V2 (maxillary)", "V3 (mandibular)", "The cervical plexus"], a: 2, h1: "The lowest division.", h2: "Mandibular.", exp: "The lower lip and chin are V3 (MANDIBULAR)." },
  { id: 49, topic: "Trigeminal", src: "Maini · L08 Trigeminal", q: "Which medication did Maini name as the drug of choice for trigeminal neuralgia?", opts: ["Carbamazepine", "Ibuprofen", "Prednisone", "Amoxicillin"], a: 0, h1: "It is an anti-epileptic.", h2: "Carba-.", exp: "CARBAMAZEPINE (an anti-epileptic) is the drug of choice for trigeminal neuralgia." },
  { id: 50, topic: "Facial vessels", src: "Maini · L08 Vessels", q: "The facial artery, the main arterial supply to the face, is a branch of:", opts: ["The internal carotid artery", "The maxillary artery", "The superficial temporal artery", "The external carotid artery"], a: 3, h1: "The 'outer' carotid.", h2: "External carotid.", exp: "The facial artery is a branch of the EXTERNAL carotid artery." },
  { id: 51, topic: "Facial vessels", src: "Maini · L08 Vessels", q: "Maini's trick question: the transverse facial artery is actually a branch of:", opts: ["The facial artery", "The maxillary artery", "The superficial temporal artery", "The ophthalmic artery"], a: 2, h1: "It only shares the word 'facial.'", h2: "Runs with superficial temporal.", exp: "The TRANSVERSE FACIAL artery is a branch of the SUPERFICIAL TEMPORAL artery — not the facial artery." },
  { id: 52, topic: "Facial veins", src: "Maini · L08 Vessels", q: "The facial vein ultimately drains into which vein (the point Maini stressed as a trap)?", opts: ["The external jugular vein", "The subclavian vein", "The retromandibular vein only", "The internal jugular vein (via the common facial vein)"], a: 3, h1: "Don't be fooled by 'external carotid.'", h2: "Internal, via the common facial.", exp: "The facial vein drains into the INTERNAL jugular vein via the common facial vein — not the external jugular." },
  { id: 53, topic: "Danger area", src: "Maini · L08 Vessels", q: "The 'danger area (danger triangle) of the face' is located over which region?", opts: ["Over the mandible and angle of the jaw", "Around the nose and upper lip", "At the temple", "Over the parotid gland"], a: 1, h1: "Where acne can be dangerous.", h2: "Nose and upper lip.", exp: "The danger area is around the NOSE and UPPER LIP." },
  { id: 54, topic: "Danger area", src: "Maini · L08 Vessels", q: "Why is an infection in the danger area of the face clinically serious?", opts: ["It scars the skin badly", "It obstructs the airway", "It always causes Bell's palsy", "It can spread via facial-vein connections to the cavernous sinus (thrombosis, meningitis, encephalitis)"], a: 3, h1: "Follow the venous connections inward.", h2: "To the cavernous sinus.", exp: "Infection can spread through the facial vein to the CAVERNOUS SINUS, causing cavernous-sinus thrombosis, meningitis, or encephalitis." },
  { id: 55, topic: "Facial N. lesions", src: "Maini · L08 Facial N.", q: "On attempted eye closure in facial palsy, the eyeball rolls up and out. This normal (but now visible) protective movement is:", opts: ["Bell's phenomenon", "Ectropion", "Lagophthalmos", "Ramsay-Hunt syndrome"], a: 0, h1: "It is normal — you just can't usually see it.", h2: "Named after Bell.", exp: "This is BELL'S PHENOMENON — a normal up-and-out eyeball roll, seen because the lids don't close." },
];

/* =============================================================== STYLES ==== */
const css = `

  --paper:#faf9ff; --card:#ffffff; --line:#ddd0f5;
  --good:#0e7a52; --good-bg:#e7f8ef; --good-line:#bfe6d2;
  --bad:#b42318; --bad-bg:#fdeceb; --bad-line:#f3c6c2;
  --gold:#9a6a2b; --gold-bg:#fffaf0; --gold-line:#ecd6a8;
}

  min-height:100vh;line-height:1.55;padding:0 0 64px}

/* ============================================= SPEECH (Web Speech API) ===== */
function speechClean(t){
  return String(t)
    .replace(/CN VIII/g,"cranial nerve eight")
    .replace(/CN VII/g,"cranial nerve seven")
    .replace(/CN VI/g,"cranial nerve six")
    .replace(/CN IX/g,"cranial nerve nine")
    .replace(/CN IV/g,"cranial nerve four")
    .replace(/CN III/g,"cranial nerve three")
    .replace(/CN II/g,"cranial nerve two")
    .replace(/CN X/g,"cranial nerve ten")
    .replace(/CN V/g,"cranial nerve five")
    .replace(/→/g," to ")
    .replace(/[—–]/g,", ")
    .replace(/•/g," ")
    .replace(/&/g," and ")
    .replace(/~/g,"about ")
    .replace(/%/g," percent")
    .replace(/\btwo-thirds\b/g,"two thirds")
    .replace(/2\/3/g,"two thirds")
    .replace(/1\/3/g,"one third")
    .replace(/\b2nd\b/g,"second")
    .replace(/\b3rd\b/g,"third")
    .replace(/\b1st\b/g,"first")
    .replace(/\s{2,}/g," ")
    .trim();
}
function topicSpeech(c){
  return speechClean(c.title + ". " + c.facts.join(" ") + " Maini flag. " + c.flag);
}

/* --------------------------------------------------------------- Cram ----- */
function Cram() {
  const [rate, setRate] = useState(1.1);
  const [voiceURI, setVoiceURI] = useState("");
  const [voices, setVoices] = useState([]);
  const [reading, setReading] = useState(-1);
  const [active, setActive] = useState(false);
  const [paused, setPaused] = useState(false);
  const seqRef = useRef({ playing: false, idx: 0, all: false });
  const supported = typeof window !== "undefined" && "speechSynthesis" in window;

  useEffect(() => {
    if (!supported) return;
    const load = () => {
      const v = window.speechSynthesis.getVoices() || [];
      if (v.length) setVoices(v);
    };
    load();
    window.speechSynthesis.onvoiceschanged = load;
    return () => {
      try { window.speechSynthesis.cancel(); } catch (e) {}
      seqRef.current.playing = false;
    };
  }, [supported]);

  const enVoices = voices.filter((v) => /^en/i.test(v.lang));
  const pickVoice = () => {
    if (voiceURI) return voices.find((v) => v.voiceURI === voiceURI) || null;
    const pref = enVoices.find((v) => /Ava|Emma|Andrew/i.test(v.name) && /Online|Natural/i.test(v.name))
      || enVoices.find((v) => /Ava|Emma|Andrew/i.test(v.name))
      || enVoices.find((v) => /en-US/i.test(v.lang))
      || enVoices[0] || null;
    return pref;
  };

  const speakText = (text, onend) => {
    const u = new SpeechSynthesisUtterance(text);
    const vo = pickVoice();
    if (vo) u.voice = vo;
    u.rate = rate;
    u.onend = onend;
    u.onerror = onend;
    window.speechSynthesis.speak(u);
  };

  const playAll = (start) => {
    if (!supported) return;
    window.speechSynthesis.cancel();
    seqRef.current = { playing: true, idx: start || 0, all: true };
    setActive(true); setPaused(false);
    const step = () => {
      const s = seqRef.current;
      if (!s.playing || s.idx >= cram.length) { stopAll(); return; }
      setReading(s.idx);
      speakText(topicSpeech(cram[s.idx]), () => {
        if (!seqRef.current.playing) return;
        seqRef.current.idx += 1;
        step();
      });
    };
    step();
  };

  const playOne = (i) => {
    if (!supported) return;
    window.speechSynthesis.cancel();
    seqRef.current = { playing: true, idx: i, all: false };
    setActive(true); setPaused(false); setReading(i);
    speakText(topicSpeech(cram[i]), () => {
      if (!seqRef.current.all) stopAll();
    });
  };

  const pauseResume = () => {
    if (!supported) return;
    if (paused) { window.speechSynthesis.resume(); setPaused(false); }
    else { window.speechSynthesis.pause(); setPaused(true); }
  };

  const stopAll = () => {
    seqRef.current.playing = false;
    if (supported) { try { window.speechSynthesis.cancel(); } catch (e) {} }
    setActive(false); setPaused(false); setReading(-1);
  };

  return (
    <section className="section">
      <div className="banner">
        <div className="bt">⚡ Cram — Maini&apos;s Face &amp; Scalp essentials, in her order</div>
        <p>Scalp layers → scalp vessels &amp; nerves → the muscles of facial expression → the facial nerve (branches, intracranial course, lesions) → parotid &amp; secretomotor pathway → trigeminal zones → facial vessels &amp; the danger area. Press play and let it read hands-free; the ⚑ flags are the high-yield hooks.</p>
      </div>

      <div className="speakbar">
        {!active
          ? <button className="speakbtn" onClick={() => playAll(0)} disabled={!supported}>▶ Read the whole cram aloud</button>
          : <>
              <button className="speakbtn" onClick={pauseResume}>{paused ? "▶ Resume" : "⏸ Pause"}</button>
              <button className="speakbtn ghost2" onClick={stopAll}>⏹ Stop</button>
            </>}
        <div className="rate-row">
          <span>Speed</span>
          <input type="range" min="0.5" max="3" step="0.1" value={rate} onChange={(e) => setRate(parseFloat(e.target.value))} />
          <span>{rate.toFixed(1)}x</span>
        </div>
        <select className="voicesel" value={voiceURI} onChange={(e) => setVoiceURI(e.target.value)}>
          <option value="">Auto (best available)</option>
          {enVoices.map((v) => <option key={v.voiceURI} value={v.voiceURI}>{v.name}</option>)}
        </select>
        {!supported && <div className="speaknote">This browser does not support Web Speech; the text still reads normally on-screen.</div>}
      </div>

      {cram.map((c, i) => (
        <div className={`obj ${reading === i ? "reading" : ""}`} key={c.n}>
          <div className="obj-head">
            <span className="obj-num serif">{c.n}</span>
            <span className="obj-title">{c.title}</span>
            <button className={`readbtn ${reading === i ? "on" : ""}`} onClick={() => (reading === i ? stopAll() : playOne(i))} disabled={!supported}>
              {reading === i ? "◼ Reading" : "▶ Read"}
            </button>
            <span className="src">{c.src}</span>
          </div>
          <ul className="obj-facts">{c.facts.map((f, j) => <li key={j}>{f}</li>)}</ul>
          {c.flag && <div className="objflag">{c.flag}</div>}
        </div>
      ))}
    </section>
  );
}

        <p>Maini&apos;s own mnemonics, analogies, and traps pulled straight from the Face &amp; Scalp lectures — the retention hooks to lean on when a detail won&apos;t stick.</p>
      </div>
      {tips.map((t, i) => (
        <div className="flagcard" key={i}>
          <span className="flagtag">{t.kind}</span>
          <div className="flagbody">
            <div className="ft">{t.title}</div>
            <div className="fw">{t.text}</div>
            <div className="fw" style={{ marginTop: "5px", fontStyle: "italic", opacity: 0.85 }}>Why it helps: {t.helps}</div>
            <div className="fs">{t.src}</div>
          </div>
        </div>
      ))}
    </section>
  );
}

/* --------------------------------------------------------------- Drill ---- */
function Drill({ bank }) {
  const [idx, setIdx] = useState(0);
  const [answers, setAnswers] = useState({});
  const [hintLevel, setHintLevel] = useState({});
  const [mode, setMode] = useState("study");

  const safeIdx = Math.min(idx, Math.max(0, bank.length - 1));
  const q = bank[safeIdx];

  const score = useMemo(
    () => Object.entries(answers).reduce((n, [id, v]) => {
      const qq = bank.find((x) => x.id === Number(id));
      return n + (qq && v === qq.a ? 1 : 0);
    }, 0),
    [answers, bank]
  );

  if (!bank.length) return <section className="section"><div className="banner"><div className="bt">Drill</div></div></section>;

  const keyMode = mode === "key";
  const sel = answers[q.id];
  const answered = sel !== undefined;
  const hl = hintLevel[q.id] || 0;
  const done = Object.keys(answers).length;

  const select = (i) => {
    if (keyMode) return;
    if (answers[q.id] !== undefined) return;
    setAnswers((p) => ({ ...p, [q.id]: i }));
  };
  const bumpHint = () => setHintLevel((p) => ({ ...p, [q.id]: Math.min((p[q.id] || 0) + 1, 2) }));
  const optClass = (i) => {
    if (keyMode) return i === q.a ? "opt opt-correct" : "opt opt-locked";
    if (!answered) return "opt";
    if (i === q.a) return "opt opt-correct";
    if (i === sel) return "opt opt-wrong";
    return "opt opt-locked";
  };

  return (
    <section className="section">
      <div className="banner">
        <div className="bt">🎯 Drill — {bank.length} questions across the Face &amp; Scalp</div>
        <p>Four options, two progressive hints, an explanation, and a lecture source per question — all grounded in this module&apos;s audited bank. Tap to self-test, or flip to the Answer Key to review.</p>
      </div>

      <div className="drillbar">
        <div className="progress">Question <b>{safeIdx + 1}</b> / {bank.length}{!keyMode && <> · answered <b>{done}</b></>}</div>
        <div className="modetog">
          <button className={mode === "study" ? "on" : ""} onClick={() => setMode("study")}>Study (tap)</button>
          <button className={mode === "key" ? "on" : ""} onClick={() => setMode("key")}>Answer key</button>
        </div>
        {!keyMode && <div className="scorepill">Score {score}/{done || 0}</div>}
      </div>

      <div className="navgrid">
        {bank.map((qq, i) => {
          let cls = "";
          if (keyMode) cls = "ok";
          else { const a = answers[qq.id]; cls = a === undefined ? "" : a === qq.a ? "ok" : "no"; }
          return <button key={qq.id} className={`navbtn ${cls} ${i === safeIdx ? "cur" : ""}`} onClick={() => setIdx(i)}>{i + 1}</button>;
        })}
      </div>

      <div className="qcard">
        <div className="badges"><span className="qtopic">{q.topic}</span><span className="qsrc">{q.src}</span></div>
        <div className="qtext">{q.q}</div>

        {q.opts.map((o, i) => (
          <button key={i} className={optClass(i)} onClick={() => select(i)}>
            <span className="key">{String.fromCharCode(65 + i)}</span><span>{o}</span>
          </button>
        ))}

        {!keyMode && !answered && (
          <>
            <div className="hintrow">
              <button className="ghost" onClick={bumpHint} disabled={hl >= 2}>{hl === 0 ? "Need a hint?" : "Bigger hint"}</button>
            </div>
            {hl >= 1 && <div className="hintbox">💡 {q.h1}</div>}
            {hl >= 2 && <div className="hintbox">🔎 {q.h2}</div>}
          </>
        )}

        {keyMode && <div className="exp keyed"><div className="tag">✦ Answer · {q.src}</div><p>{q.exp}</p></div>}
        {!keyMode && answered && (
          <div className={`exp ${sel === q.a ? "correct" : "incorrect"}`}>
            <div className="tag">{sel === q.a ? "✓ Correct" : "✗ Not quite"} · {q.src}</div>
            <p>{q.exp}</p>
          </div>
        )}

        <div className="navfoot">
          <button className="btn btn-ghost" onClick={() => setIdx(Math.max(0, safeIdx - 1))} disabled={safeIdx === 0}>← Prev</button>
          <button className="btn btn-primary" onClick={() => setIdx(Math.min(bank.length - 1, safeIdx + 1))} disabled={safeIdx >= bank.length - 1}>Next →</button>
        </div>
      </div>
    </section>
  );
}

/* --------------------------------------------------------------- Coach ---- */
const COACH_SYSTEM = `You are Dr. Seema Maini, teaching GA 0202 (Gross Anatomy of the Head & Neck) at SCUHS, running a review of the FACE & SCALP (Lectures 7 & 8). Teach ONLY from this content; do not invent muscles, nerves, branches, ganglia, foramina, or pathways. Warm, encouraging and direct: you call students "guys," say "right?" and "okay," love clinical stories and simple day-to-day examples, tell students to DRAW it out, and group structures together to make studying easier. Keep answers tight (3-6 sentences) and quiz the student back.

SCALP (5 layers, mnemonic SCALP): Skin, Connective tissue (dense subcutaneous, holds vessels/nerves), Aponeurosis (epicranial aponeurosis / galea, formed with occipitofrontalis), Loose areolar connective tissue, Pericranium (periosteum of skull). Outer 3 (skin, connective, aponeurosis) move as one unit and are avulsed together in scalping. The LOOSE AREOLAR layer is the danger area - pus/blood/infection spread there and it is the scalping plane; the aponeurosis is the tendon layer and is the common WRONG answer for the spread layer. Scalp extent: superior nuchal lines (back) to supraorbital margins (front). Highly vascular: anterior = supratrochlear + supraorbital (from ophthalmic, a branch of the INTERNAL carotid); posterior/lateral = superficial temporal, posterior auricular, occipital (from EXTERNAL carotid). Bleeds from BOTH cut ends (rich anastomosis) and heals well. A transverse (side-to-side) wound gapes because the galea's fibres run longitudinally. Venous: supratrochlear/supraorbital -> facial vein; superficial temporal + maxillary -> retromandibular; all reach the internal jugular. Sensory: trigeminal (V1 supratrochlear/supraorbital, V2 zygomaticotemporal, V3 auriculotemporal); posterior = lesser occipital (C2-C3, cervical plexus/ventral rami) and greater + third occipital (DORSAL rami C2-C3).

MUSCLES OF FACIAL EXPRESSION: ALL innervated by the facial nerve (CN VII); develop from the 2nd pharyngeal arch; lie in superficial fascia and insert into the SKIN; carry SVE fibres. Botox = blocks the ACh neuromuscular junction. Occipitofrontalis: frontal belly = horizontal forehead wrinkle (surprise); occipital belly from lateral 2/3 of superior nuchal line. Corrugator supercilii = vertical frown wrinkle. Orbicularis oculi = sphincter, CLOSES the eye (LPS opens it - CN III, NOT a facial muscle). Procerus (from nasal bone, zygomatic branch). Nasalis (compressor + dilator naris). Levator labii superioris alaeque nasi = elevate upper lip + flare nostril. Orbicularis oris = sphincter of the mouth (whistle/pout), the only closer; the rest dilate. Buccinator = trumpeter's muscle, origin from alveolar margins of maxilla/mandible + pterygomandibular raphe, PIERCED by the parotid duct, paralysis -> food pools/drooling. Zygomaticus major = smile (up + lateral). Risorius = grin. Mentalis = chin pucker. Platysma = the ONLY facial-expression muscle in the neck.

FACIAL NERVE MOTOR BRANCHES: exits the STYLOMASTOID foramen -> parotid plexus. Mnemonic "To Zanzibar/Zambia By Motor Car": Temporal, Zygomatic, Buccal, Marginal mandibular, Cervical. Cervical -> platysma (most-missed). Temporal -> frontal belly, orbicularis oculi, corrugator, anterior/superior auricular (NOT mentalis - too far away). Buccal -> buccinator. Posterior auricular -> occipital belly + auricular muscles; plus branch to posterior belly of digastric & stylohyoid.

FACIAL NERVE INTRACRANIAL COURSE: enters internal acoustic meatus -> geniculate ganglion (at the genu/bend) -> greater petrosal nerve (preganglionic parasympathetic) joins deep petrosal (postganglionic sympathetic, ICA plexus) = nerve of pterygoid canal -> pterygopalatine ganglion -> on V2 to lacrimal, nasal, palatine glands. In facial canal: nerve to stapedius (paralysis = hyperacusis) and chorda tympani (taste anterior 2/3 tongue + preganglionic parasympathetic to submandibular ganglion, exits petrotympanic fissure -> submandibular & sublingual glands). Three parasympathetic ganglia here: otic, pterygopalatine, submandibular.

FACIAL NERVE LESIONS: Bell's palsy = idiopathic LMN facial paralysis (often after cold; Maini had it herself). LMN signs on affected side: loss of forehead wrinkling, cannot close the eye, loss of nasolabial fold, smile deviates to the NORMAL side. Orbicularis oculi paralysis -> loss of blinking -> xerophthalmia -> corneal abrasion -> corneal opacity -> blindness (strap the eye). Lagophthalmos = can't close the eye (lid lag). Ectropion = everted lower lid. Bell's phenomenon = eyeball rolls up & out on attempted closure (normal, just visible). Ramsay-Hunt (herpes zoster oticus) = zoster on CN VIII + geniculate ganglion of CN VII, vesicles. Frey's syndrome = gustatory sweating after parotidectomy.

PAROTID GLAND: largest of the 3 paired salivary glands, ~30% of saliva; tough parotid sheath -> painful in mumps parotitis; facial nerve runs THROUGH it (parotidectomy -> facial palsy). Duct opens opposite the upper 2nd molar, pierces buccinator. Secretomotor parasympathetic path: CN IX (glossopharyngeal) -> tympanic branch -> tympanic plexus -> lesser petrosal -> OTIC ganglion -> auriculotemporal nerve (V3) -> parotid. (Trap: it is the 9th nerve, NOT the 7th.) Sympathetic: superior cervical ganglion -> external carotid plexus. Amylase begins carbohydrate digestion.

TRIGEMINAL SENSORY ZONES: V1 = forehead, upper eyelid, nose tip & bridge, cornea; V2 = upper lip & cheek; V3 = lower lip & chin. Two "buccal" nerves: buccal branch of facial = motor (SVE) to buccinator; buccal nerve of V3 = sensory (GSA) to cheek. Auriculotemporal (V3) also carries postganglionic parasympathetic to the parotid. Trigeminal neuralgia (tic douloureux) = severe episodic V2/V3 pain, triggered by washing/shaving/chewing, drug of choice carbamazepine. Herpes zoster ophthalmicus = zoster in V1, can involve cornea -> blindness.

FACIAL VESSELS & DANGER AREA: facial artery (branch of external carotid): submental, inferior labial, superior labial, lateral nasal, angular. Superficial temporal: transverse facial, frontal, parietal (TRICK: transverse facial is NOT a branch of the facial artery). Ophthalmic (from ICA): supraorbital, supratrochlear, dorsal nasal. Facial vein -> common facial (facial vein + anterior division of retromandibular) -> INTERNAL jugular (trap: not external). Danger area (nose + upper lip): facial vein connects to the cavernous sinus directly (superior & inferior ophthalmic veins) and indirectly (deep facial vein -> pterygoid venous plexus); infection can cause cavernous sinus thrombosis, meningitis, encephalitis.

Open by offering to drill the scalp layers, the facial nerve (branches / course / lesions), the parotid secretomotor pathway (the 9th-nerve path), the trigeminal V1/V2/V3 map, or the danger area. When the student is wrong, name the rule and have them reason it out step by step, and remind them to draw it.`;

function Coach() {
  const [log, setLog] = useState([
    { role: "assistant", content: "Okay guys - the face and scalp. Two big blocks to nail: the scalp (SCALP layers, and the loose areolar 'danger' layer), and the facial nerve - its five branches ('To Zanzibar By Motor Car'), its intracranial course (geniculate ganglion, greater petrosal, chorda tympani), and what a lesion looks like (Bell's palsy). Want me to drill the scalp layers, the facial-nerve branches and lesions, the parotid secretomotor pathway (remember, it's the 9th nerve, not the 7th), the trigeminal V1/V2/V3 map, or the danger area of the face? Where do you want to start?" },
  ]);
  const [input, setInput] = useState("");
  const [busy, setBusy] = useState(false);
  const [err, setErr] = useState("");
  const logRef = useRef(null);

  useEffect(() => { if (logRef.current) logRef.current.scrollTop = logRef.current.scrollHeight; }, [log, busy]);

  const send = async (text) => {
    const msg = (text ?? input).trim();
    if (!msg || busy) return;
    setErr("");
    const next = [...log, { role: "user", content: msg }];
    setLog(next);
    setInput("");
    setBusy(true);
    try {
      const res = await fetch("https://fab-ai.dgync1.workers.dev/", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          model: "claude-sonnet-4-20250514",
          max_tokens: 1000,
          system: COACH_SYSTEM,
          messages: next.map((m) => ({ role: m.role, content: m.content })),
        }),
      });
      const data = await res.json();
      const reply = (data.reply || (data.content || []).filter((b) => b.type === "text").map((b) => b.text).join("\n") || "").trim();
      setLog((p) => [...p, { role: "assistant", content: reply || "Say that again for me?" }]);
    } catch (e) {
      setErr("Could not reach the tutor. If you're running this outside the wrapped app, the API call needs a valid endpoint/key.");
      setLog((p) => p.slice(0, -1).concat({ role: "user", content: msg }));
    } finally {
      setBusy(false);
    }
  };

  const prompts = [
    "Drill me on the scalp layers and the danger layer",
    "The facial nerve branches - what does each supply?",
    "Walk the facial nerve's intracranial course and branches",
    "Quiz the parotid secretomotor pathway (9th nerve)",
    "The trigeminal V1/V2/V3 sensory map",
    "The danger area of the face and cavernous sinus",
  ];

  return (
    <section className="section">
      <div className="banner">
        <div className="bt">🧑‍⚕️ AI Coach — Dr. Maini&apos;s voice</div>
        <p>Grounded in her Face &amp; Scalp lectures. It quizzes you and makes you analyze step by step (and draw it out) instead of guessing.</p>
      </div>

      <div className="coach-pills">
        {prompts.map((p, i) => <button key={i} className="cpill" onClick={() => send(p)}>{p}</button>)}
      </div>

      <div className="chatlog" ref={logRef}>
        {log.map((m, i) => (
          <div key={i} className={`msg ${m.role === "user" ? "user" : "bot"}`}>
            {m.role === "assistant" && <div className="who">Dr. Maini</div>}
            {m.content}
          </div>
        ))}
        {busy && <div className="typing">Dr. Maini is typing…</div>}
      </div>

      <div className="composer">
        <textarea
          value={input}
          placeholder="Ask Dr. Maini… (Enter to send, Shift+Enter for a new line)"
          onChange={(e) => setInput(e.target.value)}
          onKeyDown={(e) => { if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); send(); } }}
        />
        <button className="btn btn-primary" onClick={() => send()} disabled={busy || !input.trim()}>Send</button>
      </div>
      {err && <div className="tinynote" style={{ color: "var(--bad)" }}>{err}</div>}
      <div className="tinynote">Tutor answers are AI-generated in a teaching persona — trust the lecture/slides first if anything ever conflicts.</div>
    </section>
  );
}
