ck of the head, not the auricle.", "Wrong. The supraclavicular nerves descend toward the clavicle.", "Wrong. The transverse cervical runs horizontally across the neck.", "Correct. Maini: it goes toward the auricle - the ear."], "source": "L03 - Cutaneous branches", "quote": "[Maini] 'Great auricular, going towards the auricle means your ear.'", "obj": "Cervical plexus - greater auricular", "hint": "'Auricular' = auricle = ear."}, {"q": "The four superficial cervical plexus branches all emerge from a common point at the middle of the posterior border of the sternocleidomastoid. What is this point called?", "o": ["Lesser supraclavicular fossa", "Nerve point of the neck (Erb's point)", "Carotid triangle apex", "Jugular foramen"], "c": 1, "cat": "Cervical Plexus", "r": ["Wrong. That fossa sits between the two heads of SCM, not where the four nerves emerge.", "Correct. Maini calls it the nerve point of the neck, at the midpoint of the posterior border of the SCM.", "Wrong. That is a triangle landmark, not where the cutaneous nerves emerge.", "Wrong. The jugular foramen is a skull opening for the IJV/CN IX-XI."], "source": "L03 - Nerve point of the neck", "quote": "[Maini] 'The midpoint of the posterior part of sternocleidomastoid... nerve point of the neck.'", "obj": "Cervical plexus - nerve point", "hint": "One point at the mid-posterior border of SCM launches all four cutaneous nerves."}, {"q": "The supraclavicular nerve divides into how many named groups?", "o": ["Three - medial, intermediate, and lateral", "Four - one for each cervical root", "Two - medial and lateral", "Two - anterior and posterior"], "c": 0, "cat": "Cervical Plexus", "r": ["Correct. Maini: it branches into medial, intermediate, and lateral supraclavicular groups.", "Wrong. It splits into three, not four.", "Wrong. There are three groups; the intermediate one is easy to forget.", "Wrong. The groups are medial, intermediate, lateral, not anterior/posterior."], "source": "L03 - Supraclavicular nerve", ylohyoid origin", "quote": "[Maini] 'Stylohyoid... originates from styloid process of temporal bone.'", "obj": "Suprahyoid - stylohyoid origin", "hint": "STYLO-hyoid from the STYLOID process."}, {"q": "The stylohyoid muscle is pierced by which structure?", "o": ["The hypoglossal nerve", "The superior belly of omohyoid", "The facial artery", "The intermediate tendon of the digastric"], "c": 3, "cat": "Suprahyoid Muscles", "r": ["Wrong. CN XII is not what pierces stylohyoid.", "Wrong. Omohyoid is a strap muscle, not what pierces stylohyoid.", "Wrong. The facial artery does not pierce stylohyoid.", "Correct. The digastric's intermediate tendon passes through a 'buttonhole' in the stylohyoid."], "source": "L03 - Stylohyoid relations", "quote": "[Maini] 'This muscle is pierced by the intermediate tendon of digastric muscle.'", "obj": "Suprahyoid - stylohyoid buttonhole", "hint": "Digastric's tendon threads through split stylohyoid."}, {"q": "Which nerve innervates the stylohyoid muscle?", "o": ["Trigeminal nerve (V3)", "Glossopharyngeal nerve (CN IX)", "Facial nerve (CN VII)", "Hypoglossal nerve (CN XII)"], "c": 2, "cat": "Suprahyoid Muscles", "r": ["Wrong. V3 supplies mylohyoid and the anterior belly of digastric.", "Wrong. CN IX supplies stylopharyngeus, not stylohyoid.", "Correct. Stylohyoid, like the posterior belly of digastric, is supplied by the facial nerve.", "Wrong. CN XII carries C1 fibers to geniohyoid/thyrohyoid."], "source": "L03 - Stylohyoid innervation", "quote": "[Maini] 'Stylohyoid is also innervated by facial nerve... posterior belly of digastric and stylohyoid, an F for facial.'", "obj": "Suprahyoid - stylohyoid nerve", "hint": "Two neighbors on the Facial nerve: posterior belly of digastric + stylohyoid."}, {"q": "The mylohyoid muscle originates from which line, and what structure does it help form?", "o": ["Digastric fossa; it forms the palate", "Oblique line of the thyroid cartilage; it forms the larynx", "Genial tubercle; it forms the tongue", "Mylohyoid line of the mandible; it forms the floor of the oral cavity"], "c": 3, "cat": "Suprahyoid Muscles", "r": ["Wrong. The digastric fossa is the anterior digastric insertion, not the mylohyoid origin.", "Wrong. That is thyrohyoid's origin; mylohyoid is a floor-of-mouth muscle.", "Wrong. That is geniohyoid's origin, and it does not form the tongue.", "Correct. Mylohyoid arises from the mylohyoid line and forms the muscular floor of the mouth."], "source": "L03 - Mylohyoid origin", "quote": "[Maini] 'Mylohyoid... a very large fan-shaped muscle... forms the bulk of the floor of the oral cavity.'", "obj": "Suprahyoid - mylohyoid origin", "hint": "MYLOhyoid from the MYLOhyoid LINE, forming the mouth's floor."}, {"q": "The anterior fibers of the mylohyoid insert onto which midline structure?", "o": ["The oblique line of the thyroid cartilage", "The intermediate tendon of digastric", "The fibrous (median) raphe running from the symphysis menti to the hyoid", "The genial tubercle"], "c": 2, "cat": "Suprahyoid Muscles", "r": ["Wrong. That is a thyrohyoid/sternothyroid attachment, not the mylohyoid raphe.", "Wrong. The mylohyoid inserts on its own median raphe, not the digastric tendon.", "Correct. The anterior fibers meet in a midline fibrous raphe; posterior fibers reach the hyoid body.", "Wrong. That is the geniohyoid origin."], "source": "L03 - Mylohyoid insertion", "quote": "[Maini] 'Anterior fibers insert onto a fibrous raphe which extends from symphysis menti to the body of the hyoid bone.'", "obj": "Suprahyoid - mylohyoid raphe", "hint": "The two mylohyoids meet at a midline seam (raphe)."}, {"q": "The geniohyoid muscle originates from which landmark of the mandible?", "o": ["Angle of the mandible", "Mylohyoid line", "Digastric fossa", "Genial tubercle (inferior mental spine)"], "c": 3, "cat": "Suprahyoid Muscles", "r": ["Wrong. Geniohyoid arises from the genial tubercle, not the angle.", "Wrong. That is the mylohyoid origin.", "Wrong. That is the anterior digastric insertion.", "Correct. Geniohyoid arises from the genial tubercle / inferior mental spine of the mandible."], "source": "L03 - Geniohyoid origin", "quote": "[Maini] 'Geniohyoid originates from genial tubercle of the mandible.'", "obj": "Suprahyoid - geniohyoid origin", "hint": "GENIO-hyoid from the GENIAL tubercle."}, {"q": "What is the positional relationship of the geniohyoid to the mylohyoid?", "o": ["Geniohyoid lies superior to (on top of) the mylohyoid", "Geniohyoid is embedded within the tongue", "Geniohyoid lies lateral to the mylohyoid line", "Geniohyoid lies inferior to the mylohyoid"], "c": 0, "cat": "Suprahyoid Muscles", "r": ["Correct. Maini: geniohyoid sits on top of mylohyoid - you must cut through mylohyoid to reach it from below.", "Wrong. It runs from the mandible to the hyoid, not within the tongue.", "Wrong. Geniohyoid is a paired midline muscle sitting above mylohyoid.", "Wrong. It lies ABOVE (superior to) mylohyoid; the anterior belly of digastric is the one below."], "source": "L03 - Geniohyoid relations", "quote": "[Maini] 'It's lying on top of mylohyoid. You cannot see it from below unless you dissect mylohyoid.'", "obj": "Suprahyoid - geniohyoid position", "hint": "Geniohyoid rides ON TOP of the mylohyoid floor."}, {"q": "Which nerve supplies the geniohyoid muscle?", "o": ["Facial nerve (CN VII)", "C1 fibers carried by the hypoglossal nerve (CN XII)", "Ansa cervicalis", "Nerve to mylohyoid (V3)"], "c": 1, "cat": "Suprahyoid Muscles", "r": ["Wrong. CN VII supplies the posterior belly of digastric and stylohyoid.", "Correct. Geniohyoid is supplied by C1 fibers travelling with the hypoglossal nerve.", "Wrong. The ansa supplies the strap muscles (except thyrohyoid); geniohyoid uses C1 via XII.", "Wrong. That supplies mylohyoid and the anterior belly of digastric, not geniohyoid."], "source": "L03 - Geniohyoid innervation", "quote": "[Maini] 'Geniohyoid: a branch from the anterior ramus of C1 carried along with the hypoglossal nerve.'", "obj": oid attaches to the manubrium and medial clavicle.", "Correct. Omohyoid is the only infrahyoid attaching to the scapula ('omo' = shoulder).", "Wrong. Thyrohyoid runs from thyroid cartilage to hyoid, not the scapula.", "Wrong. Sternothyroid attaches to the manubrium and reaches only the thyroid cartilage."], "source": "L03 - Omohyoid attachments", "quote": "[Maini] 'This is the only muscle in the infrahyoid group that originates from scapula.'", "obj": "Infrahyoid - omohyoid scapular attachment", "hint": "OMO = shoulder; omohyoid reaches the scapula."}, {"q": "The intermediate tendon of the omohyoid is held in position by a fascial sling attached to which bones?", "o": ["The clavicle and first rib", "The scapula and acromion", "The hyoid body and thyroid cartilage", "The manubrium and second rib"], "c": 0, "cat": "Infrahyoid Muscles", "r": ["Correct. A loop of deep fascia slings the omohyoid tendon to the clavicle and first rib.", "Wrong. The muscle originates near the scapula, but the tendon sling is to the clavicle/first rib.", "Wrong. The sling anchors to the clavicle/first rib, not those cartilages.", "Wrong. The sling is to the clavicle and first rib."], "source": "L03 - Omohyoid intermediate tendon", "quote": "[Maini] 'A loop of deep fascia slings the tendon to the clavicle and first rib.'", "obj": "Infrahyoid - omohyoid tendon sling", "hint": "Fascial loop ties the tendon down to clavicle + first rib."}, {"q": "The sternothyroid muscle inserts onto which structure (and therefore does not reach the hyoid)?", "o": ["The manubrium of the sternum", "The body of the hyoid bone", "The cricoid cartilage", "The oblique line of the thyroid cartilage"], "c": 3, "cat": "Infrahyoid Muscles", "r": ["Wrong. That is its origin, not insertion.", "Wrong. It stops at the thyroid cartilage; sternohyoid reaches the hyoid.", "Wrong. It attaches to the oblique line of the thyroid cartilage.", "Correct. Sternothyroid inserts on the oblique line of the thyroid cartilage, stopping sho  {"q": "The carotid body contains chemoreceptors that primarily sense which changes in the blood?", "o": ["Increased O2 and decreased CO2", "Changes in blood glucose only", "Increased CO2, increased H+, and decreased O2", "Changes in blood pressure"], "c": 2, "cat": "Carotid Sinus & Body", "r": ["Wrong. That is the opposite of what triggers the chemoreceptors.", "Wrong. The carotid body monitors respiratory gases and pH, not glucose.", "Correct. The carotid body chemoreceptors detect a rise in CO2/H+ and a fall in O2.", "Wrong. Pressure is monitored by the baroreceptors of the carotid SINUS."], "source": "L03 - Carotid body function", "quote": "[Maini] 'Chemoreceptors sense increase in CO2, hydrogen ion concentration, and decrease in oxygen.'", "obj": "Carotid body - chemoreceptors", "hint": "Body = chemistry: CO2 up, H+ up, O2 down."}, {"q": "How many branches does the external carotid artery have, and how are they grouped?", "o": ["Ten total: 4 anterior, 4 posterior, 2 terminal", "Six total: 3 anterior and 3 posterior", "Four total: 2 anterior and 2 terminal", "Eight total: 3 anterior, 3 posterior, and 2 terminal"], "c": 3, "cat": "External Carotid Branches", "r": ["Wrong. It is 3 + 3 + 2 = 8, not 10.", "Wrong. There are 8; the two terminal branches are missing here.", "Wrong. The ECA has 8 branches in three groups.", "Correct. The ECA has 8 branches - three anterior, three posterior, two terminal."], "source": "L03 - ECA branches overview", "quote": "[Maini] '3 anterior, 3 posterior, and 2 terminal branches - 8 branches in total.'", "obj": "ECA - branch count", "hint": "3 + 3 + 2 = 8."}, {"q": "Which of the following are the three ANTERIOR branches of the external carotid artery?", "o": ["Ascending pharyngeal, occipital, and posterior auricular", "Superficial temporal and maxillary", "Vertebral, internal thoracic, and thyrocervical", "Superior thyroid, lingual, and facial"], "c": 3, "cat": "External Carotid Branches", "r": ["Wrong. Those are the three POSTERIOR branches.", "Wrong. Those are the two TERMINAL branches.", "Wrong. Those are branches of the subclavian artery, not the ECA.", "Correct. The anterior branches are superior thyroid, lingual, and facial."], "source": "L03 - ECA anterior branches", "quote": "[Maini] 'The first anterior branch is superior thyroid, second is lingual, third is facial.'", "obj": "ECA - anterior branches", "hint": "Front three: Superior thyroid, Lingual, Facial."}, {"q": "Which of the following are the three POSTERIOR branches of the external carotid artery?", "o": ["Costocervical, deep cervical, and superior intercostal", "Ascending pharyngeal, occipital, and posterior auricular", "Superficial temporal and maxillary", "Superior thyroid, lingual, and facial"], "c": 1, "cat": "External Carotid Branches", "r": ["Wrong. Those relate to the subclavian's costocervical trunk.", "Correct. The posterior branches are ascending pharyngeal, occipital, and posterior auricular.", "Wrong. Those are the TERMINAL branches.", "Wrong. Those are the ANTERIOR branches."], "source": "L03 - ECA posterior branches", "quote": "[Maini] 'Ascending pharyngeal, occipital, and posterior auricular.'", "obj": "ECA - posterior branches", "hint": "Back three: Ascending pharyngeal, Occipital, Posterior auricular."}, {"q": "What are the two TERMINAL branches of the external carotid artery?", "o": ["Superficial temporal and maxillary", "Occipital and posterior auricular", "Superior thyroid and ascending pharyngeal", "Facial and lingual"], "c": 0, "cat": "External Carotid Branches", "r": ["Correct. The ECA ends by dividing into the superficial temporal and maxillary arteries.", "Wrong. Those are posterior branches.", "Wrong. Those are anterior/posterior branches, not terminal.", "Wrong. Those are anterior branches, not terminal."], "source": "L03 - ECA terminal branches", "quote": "[Maini] 'It ends by dividing into two terminal branches: superficial temporal and maxillary.'", "obj": "ECA - terminal branches", "hint": "The ECA ends as superficial temporal + maxillary."}, {"q": "Which anterior branch of the external carotid descends to supply the upper pole of the thyroid gland?", "o": ["Superior thyroid artery", "Inferior thyroid artery", "Ascending pharyngeal artery", "Lingual artery"], "c": 0, "cat": "External Carotid Branches", "r": ["Correct. The superior thyroid artery is the first anterior ECA branch and reaches the upper pole of the thyroid.", "Wrong. The inferior thyroid is a branch of the thyrocervical trunk (subclavian), supplying the lower pole.", "Wrong. The ascending pharyngeal is a posterior branch to the pharynx.", "Wrong. The lingual supplies the tongue."], "source": "L03 - Superior thyroid artery", "quote": "[Maini] 'Superior thyroid descends and ends at the upper pole of thyroid gland... a branch of external carotid.'", "obj": "ECA - superior thyroid to upper pole", "hint": "SUPERIOR thyroid artery -> UPPER pole (from the ECA)."}, {"q": "The lingual artery arises from the external carotid at the level of which landmark?", "o": ["The mastoid process", "The superior border of the thyroid cartilage", "The tip of the greater horn of the hyoid bone", "The angle of the mandible"], "c": 2, "cat": "External Carotid Branches", "r": ["Wrong. That is unrelated to the lingual origin.", "Wrong. That is the carotid bifurcation level, not the lingual origin she cites.", "Correct. Maini locates the lingual artery's origin at the tip of the greater horn of the hyoid.", "Wrong. The lingual arises at the greater horn of the hyoid."], "source": "L03 - Lingual artery", "quote": "[Maini] 'Lingual arises from external carotid at the tip of the greater horn of the hyoid bone.'", "obj": "ECA - lingual artery origin", "hint": "Lingual springs off near the greater horn of the hyoid."}, {"q": "The superficial temporal artery can be palpated where, and which nerve accompanies it?", "o": ["In front of the tragus/auricle, accompanied by the auriculotemporal nerve", "Behind the mastoid, accompanied by the great auricular nerve", "Over the thyroid cartilage, accompanied by the vagus nerve", "At the angle of the mandible, accompanied by the facial nerve"], "c": 0, "cat": "External Carotid Branches", "r": ["Correct. It is palpable just anterior to the tragus and runs with the auriculotemporal nerve.", "Wrong. It is palpated in front of the tragus and runs with the auriculotemporal nerve.", "Wrong. That location/nerve pairing is incorrect.", "Wrong. The superficial temporal is palpated anterior to the ear, not at the jaw angle."], "source": "L03 - Superficial temporal artery", "quote": "[Maini] 'Superficial temporal arises in front of the auricle... accompanied by auriculotemporal nerve.'", "obj": "ECA - superficial temporal palpation", "hint": "Feel it in front of the tragus; auriculotemporal nerve rides along."}, {"q": "The transverse facial artery is a branch of which artery (a classic point of confusion)?", "o": ["Superficial temporal artery", "Lingual artery", "Maxillary artery", "Facial artery"], "c": 0, "cat": "External Carotid Branches", "r": ["Correct. Maini flags the trap: transverse facial is a branch of the superficial temporal, NOT the facial artery.", "Wrong. The lingual supplies the tongue and is unrelated.", "Wrong. The transverse facial comes off the superficial temporal.", "Wrong. This is the exact trap - despite its name, it branches from the superficial temporal."], "source": "L03 - Transverse facial (trap)", "quote": "[Maini] 'Everybody confuses it as a branch of facial. No, it's a branch of superficial temporal.'", "obj": "ECA - transverse facial trap", "hint": "Name says 'facial,' but it's a superficial TEMPORAL branch."}, {"q": "The maxillary artery passes deep to the neck of the mandible to enter which region?", "o": ["The infratemporal fossa", "The submandibular triangle", "The carotid canal", "The posterior triangle"], "c": 0, "cat": "External Carotid Branches", "r": ["Correct. The maxillary artery runs medial/deep to the mandibular neck int nd it."], "source": "L03/L05 - Subclavian scalene relation", "quote": "[Maini] 'Subclavian artery, the main one, is located posterior to anterior scalene.'", "obj": "Subclavian - scalene relation", "hint": "Artery = behind; vein = in front of the anterior scalene."}, {"q": "The anterior scalene muscle divides the subclavian artery into how many parts, and how are they positioned?", "o": ["Two parts: proximal and distal to the muscle", "Three parts, all lateral to the muscle", "Three parts: part 1 medial, part 2 posterior/deep, part 3 lateral to the muscle", "Four parts, one for each branch"], "c": 2, "cat": "Subclavian Artery", "r": ["Wrong. It is divided into THREE parts by the anterior scalene.", "Wrong. The three parts are medial, deep, and lateral - not all lateral.", "Correct. Part 1 is medial, part 2 lies behind (deep to) the muscle, part 3 is lateral.", "Wrong. There are three parts, defined by the anterior scalene."], "source": "L03 - Subclavian parts", "quote": "[Maini] 'Part 1 medial, part 2 deep, part 3 lateral to anterior scalene.'", "obj": "Subclavian - three parts", "hint": "Medial (1), deep/behind (2), lateral (3) to the anterior scalene."}, {"q": "Which three branches arise from the FIRST part of the subclavian artery?", "o": ["Costocervical trunk, deep cervical, and superior intercostal", "Superior thyroid, lingual, and facial", "Dorsal scapular and suprascapular only", "Vertebral artery, internal thoracic artery, and thyrocervical trunk"], "c": 3, "cat": "Subclavian Artery", "r": ["Wrong. The costocervical trunk (and its branches) arise from PART 2.", "Wrong. Those are external carotid branches.", "Wrong. Part 3 usually gives no branch (occasionally dorsal scapular).", "Correct. Part 1 gives the vertebral, internal thoracic, and thyrocervical trunk."], "source": "L03 - Subclavian part 1 branches", "quote": "[Maini] 'Part 1 gives off vertebral, internal thoracic, and thyrocervical trunk.'", "obj": "Subclavian - part 1 branches", "hint": "VIT: Vertebral, Internal thoracic, Thyrocervical trunk."}, {"q": "The vertebral artery ascends through which structures to reach the brain?", "o": ["The intervertebral foramina", "The transverse foramina of the cervical vertebrae, then the foramen magnum", "The jugular foramen", "The carotid canal of the temporal bone"], "c": 1, "cat": "Subclavian Artery", "r": ["Wrong. It uses the TRANSVERSE foramina, not the intervertebral foramina.", "Correct. It passes up the transverse foramina and enters the skull via the foramen magnum.", "Wrong. The jugular foramen transmits the IJV and CN IX-XI, not the vertebral artery.", "Wrong. That is the internal carotid's route."], "source": "L03 - Vertebral artery course", "quote": "[Maini] 'Vertebral artery passes through transverse foramina of all seven cervical vertebrae and enters through foramen magnum.'", "obj": "Subclavian - vertebral artery course", "hint": "Up the transverse foramina -> foramen magnum -> posterior brain."}, {"q": "The thyrocervical trunk gives rise to which three branches?", "o": ["Deep cervical and superior intercostal", "Vertebral, internal thoracic, and costocervical", "Superior thyroid and superior laryngeal", "Inferior thyroid, transverse cervical, and suprascapular arteries"], "c": 3, "cat": "Subclavian Artery", "r": ["Wrong. Those come from the costocervical trunk.", "Wrong. Those are other subclavian branches, not thyrocervical branches.", "Wrong. Those relate to the superior thyroid artery (from the ECA).", "Correct. Thyrocervical trunk = inferior thyroid + transverse cervical + suprascapular."], "source": "L03 - Thyrocervical trunk", "quote": "[Maini] 'Thyrocervical trunk: inferior thyroid, transverse cervical, and suprascapular.'", "obj": "Subclavian - thyrocervical branches", "hint": "Thyro (inferior thyroid) + cervical (transverse cervical) + suprascapular."}, {"q": "The inferior thyroid artery is a branch of which vessel?", "o": ["The common carotid artery", "The thyrocervical trunk (from the subclavian artery)", "The internal carotid artery", "The external carotid artery"], "c": 1, "cat": "Subclavian Artery", "r": ["Wrong. The inferior thyroid comes from the thyrocervical trunk (subclavian).", "Correct. The inferior thyroid arises from the thyrocervical trunk, a branch of the subclavian.", "Wrong. The ICA gives no branches in the neck.", "Wrong. That is the source of the SUPERIOR thyroid artery."], "source": "L05 - Inferior thyroid artery", "quote": "[Maini] 'Inferior thyroid artery is a branch of the thyrocervical trunk, which is a branch of subclavian.'", "obj": "Subclavian - inferior thyroid source", "hint": "Inferior thyroid = thyrocervical trunk = subclavian."}, {"q": "Which branch arises from the SECOND part of the subclavian artery?", "o": ["The costocervical trunk", "The vertebral artery", "The thyrocervical trunk", "The dorsal scapular artery"], "c": 0, "cat": "Subclavian Artery", "r": ["Correct. Part 2 gives off the costocervical trunk.", "Wrong. The vertebral arises from part 1.", "Wrong. The thyrocervical trunk arises from part 1.", "Wrong. If present, the dorsal scapular tends to arise from part 3."], "source": "L03 - Subclavian part 2", "quote": "[Maini] 'Second part gives off costocervical trunk.'", "obj": "Subclavian - part 2 branch", "hint": "Part 2 = the single costocervical trunk."}, {"q": "The costocervical trunk divides into which two branches?", "o": ["Vertebral and internal thoracic arteries", "Deep cervical and superior intercostal arteries", "Inferior thyroid and suprascapular arteries", "Ascending cervical and transverse cervical arteries"], "c": 1, "cat": "Subclavian Artery", "r": ["Wrong. Those are separate part-1 branches.", "Correct. The costocervical trunk splits into the deep cervical and superior intercostal arteries.", "Wrong. Those come from the thyrocervical trunk.", "Wrong. Those are not the costocervical's two branches."], "source": "L03 - Costocervical trunk", "quote": "[Maini] 'Costocervical divides into deep cervical and superior intercostal.'", "obj": "Subclavian - costocervical branches", "hint": "Costo (superior intercostal) + cervical (deep cervical)."}, {"q": "The THIRD part of the subclavian artery usually gives which branch?", "o": ["The vertebral artery", "The costocervical trunk", "The internal thoracic artery", "Usually no branch (occasionally a dorsal scapular artery)"], "c": 3, "cat": "Subclavian Artery", "r": ["Wrong. The vertebral is a part-1 branch.", "Wrong. The costocervical trunk is a part-2 branch.", "Wrong. The internal thoracic is a part-1 branch.", "Correct. Part 3 typically gives no branch, though it may occasionally give the dorsal scapular."], "source": "L03 - Subclavian part 3", "quote": "[Maini] 'Part 3 usually does not give any branch, but occasionally may give a dorsal scapular.'", "obj": "Subclavian - part 3 branch", "hint": "Part 3 is usually branch-free."}, {"q": "While the subclavian artery lies posterior to the anterior scalene, which two arteries lie ANTERIOR to that muscle?", "o": ["Inferior thyroid and ascending pharyngeal arteries", "Vertebral and internal thoracic arteries", "Transverse cervical and suprascapular arteries", "Deep cervical and superior intercostal arteries"], "c": 2, "cat": "Subclavian Artery", "r": ["Wrong. That pairing is not what she describes.", "Wrong. Those are not the ones Maini calls anterior to the anterior scalene.", "Correct. These two thyrocervical branches cross anterior to the anterior scalene.", "Wrong. Those are costocervical branches, not the anterior-crossing pair."], "source": "L03 - Scalene relations of arteries", "quote": "[Maini] 'Transverse cervical and suprascapular are lying anterior to the anterior scalene muscle.'", "obj": "Subclavian - arteries anterior to scalene", "hint": "Transverse cervical + suprascapular skate in FRONT of the anterior scalene."}, {"q": "In thoracic outlet (scalene) syndrome, which structures may be compressed together?", "o": ["The common carotid artery and the recurrent laryngeal ck veins - IJV origin sinus", "hint": "Sigmoid sinus exits the jugular foramen as the IJV."}, {"q": "The internal jugular vein descends within the carotid sheath alongside which two structures?", "o": ["The vertebral artery and the sympathetic trunk", "The subclavian artery and the phrenic nerve", "The external carotid artery and the hypoglossal nerve", "The common carotid artery and the vagus nerve"], "c": 3, "cat": "Neck Veins & Drainage", "r": ["Wrong. Those lie outside the carotid sheath.", "Wrong. Those are not the carotid-sheath trio.", "Wrong. The sheath companions are the common carotid and vagus.", "Correct. In the carotid sheath the IJV runs with the common carotid artery and vagus nerve."], "source": "L05 - IJV course", "quote": "[Maini] 'It descends in the neck within the carotid sheath along with common carotid and vagus.'", "obj": "Neck veins - IJV sheath companions", "hint": "IJV + common carotid + vagus = three musketeers."}, {"q": "The internal jugular vein receives blood primarily from which regions?", "o": ["The brain, face, and neck", "The thorax and abdomen", "The scalp only", "The upper limb only"], "c": 0, "cat": "Neck Veins & Drainage", "r": ["Correct. The IJV is the main vein draining the brain, face, and neck.", "Wrong. Those drain via the caval system, not the IJV.", "Wrong. The IJV drains the brain, face, AND neck, not just the scalp.", "Wrong. The upper limb drains via the axillary/subclavian veins."], "source": "L05 - IJV drainage", "quote": "[Maini] 'Internal jugular vein receives blood from brain, face, and neck.'", "obj": "Neck veins - IJV drainage territory", "hint": "The big drain for brain + face + neck."}, {"q": "The external jugular vein is superficial and has essentially a single tributary. Which is it?", "o": ["The anterior jugular vein", "The facial vein", "The inferior petrosal sinus", "The sigmoid sinus"], "c": 0, "cat": "Neck Veins & Drainage", "r": ["Correct. Being superficial, the EJV's one tributary Maini names is the a   for (var i = 0; i < lines.length; i++) {

<script id="audio-bar-minimize-js">
(function(){
  var LS_KEY_MIN = 'fab_audio_bar_collapsed';
  function applyState(ab){
    var collapsed = localStorage.getItem(LS_KEY_MIN) === '1';
    if (collapsed) ab.classList.add('collapsed'); else ab.classList.remove('collapsed');
    var btn = ab.querySelector('.btn-minimize-audio');
    if (btn) btn.textContent = collapsed ? '▸' : '▾';
    if (btn) btn.title = collapsed ? 'Expand audio bar' : 'Minimize audio bar';
  }
  function attachButton(ab){
    if (ab.querySelector('.btn-minimize-audio')) return;
    var btn = document.createElement('button');
    btn.className = 'btn-minimize-audio';
    btn.type = 'button';
    btn.onclick = function(){
      var now = ab.classList.toggle('collapsed');
      localStorage.setItem(LS_KEY_MIN, now ? '1' : '0');
      btn.textContent = now ? '▸' : '▾';
      btn.title = now ? 'Expand audio bar' : 'Minimize audio bar';
    };
    ab.appendChild(btn);
    applyState(ab);
  }
  // Poll until audio-bar appears, attach, then keep watching in case it gets re-rendered
  var tries = 0;
  var iv = setInterval(function(){
    var ab = document.getElementById('audio-bar');
    if (ab) {
      attachButton(ab);
      applyState(ab);
    }
    tries++;
    if (tries > 1200) clearInterval(iv); // ~2 min safety cap
  }, 100);
})();
</script>

    wrap.appendChild(bub);
    body.appendChild(wrap);
    body.scrollTop = body.scrollHeight;
    return bub;
  }

  function appendLoading(){
    const body = document.getElementById('fabAiBody');
    if (!body) return null;
    const wrap = document.createElement('div');
    wrap.className = 'fab-ai-msg ai';
    wrap.id = 'fabAiLoading';
    const bub = document.createElement('div');
    bub.className = 'fab-ai-bubble';
    bub.innerHTML = '<div class="fab-ai-loading"><div class="fab-ai-spinner"></div> Thinking...</div>';
    wrap.appendChild(bub);
    body.appendChild(wrap);
    body.scrollTop = body.scrollHeight;
    return wrap;
  }

  function removeLoading(){
    const el = document.getElementById('fabAiLoading');
    if (el) el.remove();
  }

  function appendStatus(text, isErr){
    const body = document.getElementById('fabAiBody');
    if (!body) return;
    const div = document.createElement('div');
    div.className = 'fab-ai-status' + (isErr ? ' err' : '');
    div.innerHTML = text;
    body.appendChild(div);
    body.scrollTop = body.scrollHeight;
  }

  function renderSuggestions(ctx){
    const body = document.getElementById('fabAiBody');
    if (!body) return;
    // Q preview at top
    if (ctx.question) {
      const qp = document.createElement('div');
      qp.className = 'fab-ai-qpreview';
      qp.innerHTML = '<b>Q:</b> ' + ctx.question.substring(0, 240) + (ctx.question.length > 240 ? '...' : '');
      body.appendChild(qp);
    }
    // Suggestion chips
    const sug = document.createElement('div');
    sug.className = 'fab-ai-suggestions';
    const chips = [];
    if (ctx.picked === null || ctx.picked === undefined) {
      chips.push({ label: '💡 Give me a hint', q: 'Give me a hint for this question without revealing the answer.' });
      chips.push({ label: '🧠 Explain the concept', q: 'Explain the core concept this question is testing.' });
    } else if (ctx.picked !== ctx.correct && ctx.picked !== null) {
      chips.push({ label: '❌ Why did I miss this?', q: 'I picked the wrong answer. Walk me through why my pick is wrong and why the correct answer is right.' });
      chips.push({ label: '🧠 Explain the concept', q: 'Explain the concept this question is testing in simpler terms.' });
      chips.push({ label: '🎯 Give me a mnemonic', q: 'Give me a memorable mnemonic for this topic.' });
    } else if (ctx.picked === ctx.correct) {
      chips.push({ label: '✅ Why is this right?', q: 'Confirm why the correct answer is right and flag any trap distractors to watch for.' });
      chips.push({ label: '🎯 Give me a mnemonic', q: 'Give me a memorable mnemonic for this topic.' });
    }
    chips.push({ label: '🌟 Use an analogy', q: 'Explain this with a dumbed-down analogy.' });
    chips.forEach(c => {
      const btn = document.createElement('button');
      btn.className = 'fab-ai-sug';
      btn.textContent = c.label;
      btn.onclick = () => sendMessage(c.q);
      sug.appendChild(btn);
    });
    body.appendChild(sug);
  }

  function clearChat(preserveCtx){
    const body = document.getElementById('fabAiBody');
    if (body) body.innerHTML = '';
    history = [];
    if (preserveCtx) {
      const ctx = readCurrentQ();
      renderSuggestions(ctx);
    }
  }

  function openPanel() {
    if (!panel) panel = buildPanel();
    panel.classList.add('open');
    const ctx = readCurrentQ();
    const key = qKey(ctx);
    if (key !== currentQKey) {
      // Q changed — reset chat and show suggestions for new Q
      currentQKey = key;
      clearChat(true);
    }
  }

  function buildPanel() {
    const el = document.createElement('div');
    el.className = 'fab-ai-panel';
    el.innerHTML = '<div class="fab-ai-header">'
      + '<h3>🩺 Study Tutor</h3>'
      + '<button class="fab-ai-hdr-btn" onclick="fabAiClear()">Clear</button>'
      + '<button class="fab-ai-close" onclick="fabAiClose()">×</button>'
      + '</div>'
      + '<div class="fab-ai-body" id="fabAiBody"></div>'
      + '<div class="fab-ai-followup">'
      + '<button class="fab-ai-mini-close" title="Close panel" onclick="fabAiClose()">×</button>'
      + '<textarea id="fabAiFollowup" placeholder="Ask a question about this Q..." rows="1" onkeydown="if(event.keyCode===13&&!event.shiftKey){event.preventDefault();fabAiFollowupSend();}"></textarea>'
      + '<button onclick="fabAiFollowupSend()">Send</button>'
      + '</div>';
    document.body.appendChild(el);
    return el;
  }

  window.fabAiClose = function(){ if(panel) panel.classList.remove('open'); };
  window.fabAiClear = function(){ clearChat(true); };

  async function callWorker(payload) {
    if (!ENDPOINT) return { clipboardFallback: true };
    try {
      const res = await fetch(ENDPOINT, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload),
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.error || ('HTTP ' + res.status));
      return { reply: data.reply };
    } catch (e) {
      return { error: String(e.message || e) };
    }
  }

  function clipboardFallback(ctx, userQ) {
    const letter = (i) => String.fromCharCode(65 + i);
    let prompt = "I'm studying GA 0202 (Gross Anatomy – Head & Neck) with Dr. Maini at SCUHS. Drill question:\n\n";
    prompt += 'Q: ' + ctx.question + '\n\n';
    if (ctx.options && ctx.options.length) {
      ctx.options.forEach((o, i) => {
        const m = [];
        if (i === ctx.picked) m.push('PICKED');
        if (i === ctx.correct) m.push('CORRECT');
        prompt += letter(i) + '. ' + o + (m.length ? ' ('+m.join(', ')+')' : '') + '\n';
      });
      prompt += '\n';
    }
    if (ctx.profTip) prompt += 'DRILL TIP: ' + ctx.profTip + '\n\n';
    if (userQ) prompt += 'MY QUESTION: ' + userQ + '\n\n';
    prompt += 'Explain using a dumbed-down analogy + mnemonic.';
    navigator.clipboard.writeText(prompt).then(() => {
      appendStatus('✓ Prompt copied to clipboard. Backend not configured yet — paste into your AI chat.');
    }).catch(() => {
      appendStatus('Could not copy. Please select manually.', true);
    });
  }

  async function sendMessage(userText) {
    const ctx = readCurrentQ();
    currentQKey = qKey(ctx);
    appendMsg('user', userText);
    history.push({ role: 'user', content: userText });
    appendLoading();

    const payload = Object.assign({}, ctx, {
      userQuestion: userText,
      history: history.slice(-10), // last 10 turns for context
      className: CLASS_NAME, // worker uses this to load class-specific knowledge
    });
    const result = await callWorker(payload);
    removeLoading();
    if (result.clipboardFallback) {
      clipboardFallback(ctx, userText);
      return;
    }
    if (result.error) {
      appendStatus('Error: ' + result.error, true);
      return;
    }
    appendMsg('ai', result.reply);
    history.push({ role: 'model', content: result.reply });
  }

  window.fabAiFollowupSend = function() {
    const ta = document.getElementById('fabAiFollowup');
    const q = (ta && ta.value || '').trim();
    if (!q) return;
    ta.value = '';
    sendMessage(q);
  };

  // Button install — opens panel, does NOT auto-call AI
  function install() {
    if (document.getElementById('fabAiBtn')) return;
    const btn = document.createElement('button');
    btn.className = 'fab-ai-btn';
    btn.id = 'fabAiBtn';
    btn.textContent = '🩺';
    btn.title = 'Open AI Study Tutor';
    btn.onclick = () => openPanel();
    document.body.appendChild(btn);
  }
  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', install);
  } else {
    install();
  }
})();
</script>

<script>
(function() {
  try {
    var wm = document.getElementById('dcStudyWatermark');
    if (!wm) return;
    if (localStorage.getItem('dcDavidView') === '1') {
      wm.classList.add('dc-hidden');
      return;
    }
    function lumOf(el) {
      var bg = window.getComputedStyle(el).backgroundColor || '';
      var rgb = bg.match(/[\d.]+/g);
      if (!rgb || rgb.length < 3) return null;
      var a = rgb.length >= 4 ? +rgb[3] : 1;
      if (a < 0.3) return null;
      return (0.299 * +rgb[0] + 0.587 * +rgb[1] + 0.114 * +rgb[2]) / 255;
    }
    var lum = lumOf(document.body);
    if (lum === null) lum = lumOf(document.documentElement);
    if (lum !== null && lum < 0.5) {
      wm.style.color = 'rgba(255, 255, 255, 0.30)';
    }
  } catch(e) {}
})();
</script>

<script id="static-audio-bar-repositioner">
(function(){
  function moveBarIntoApp(){
    var bar = document.getElementById('static-audio-bar');
    var app = document.getElementById('app');
    if(!bar || !app) return;
    var card = app.querySelector('.card');
    if(card){
      if(card.previousElementSibling !== bar){
        app.insertBefore(bar, card);
      }
    }
    // Remove the dynamic GA-style audio bar (#audio-bar) if it sneaks in —
    // it's a duplicate of our static panel from the legacy _ensureAudioAttached
    // mechanism that we replaced with the static-panel pattern in Phase 0f.3.
    var dynBar = document.getElementById('audio-bar');
    if(dynBar && dynBar !== bar){
      dynBar.remove();
    }
  }
  if(typeof render === 'function'){
    var _origRender = render;
    render = function(){
      var rv = _origRender.apply(this, arguments);
      moveBarIntoApp();
      return rv;
    };
  }
  if(typeof renderHistoryItem === 'function'){
    var _origRenderHistory = renderHistoryItem;
    renderHistoryItem = function(){
      var rv = _origRenderHistory.apply(this, arguments);
      moveBarIntoApp();
      return rv;
    };
  }
  if(typeof showSummary === 'function'){
    var _origShowSummary = showSummary;
    showSummary = function(){
      var rv = _origShowSummary.apply(this, arguments);
      moveBarIntoApp();
      return rv;
    };
  }
  if(document.readyState === 'loading'){
    document.addEventListener('DOMContentLoaded', moveBarIntoApp);
  } else {
    moveBarIntoApp();
  }
})();
</script>

<script id="everything-modal-injector">
(function(){
  var TOPIC_GROUPS = {"triangles":["Triangle","Posterior","Anterior","Boundaries"],"muscles":["Suprahyoid","Infrahyoid"],"carotid":["Carotid"],"subclavian":["Subclavian"],"veins":["Veins","Drainage"],"plexus":["Plexus","Ansa"],"vessels":["Carotid","Subclavian","Veins","Drainage"],"lymph":["Lymphatics","Landmarks"]};
  var FULL_BANK = null;
  var selectedCats = {};
  var catCounts = {};
  var initialized = false;

  function captureBank(){
    if (typeof BANK === 'undefined' || !BANK || !BANK.length) return false;
    if (FULL_BANK) return true;
    FULL_BANK = BANK.slice();
    return true;
  }

  function buildModal(){
    if (!captureBank()) return;
    var html = '<div class="em-card">'
      + '<h2>📋 Everything MC Drill — GA 0202 · The Neck (part 1)</h2>'
      + '<div class="em-sub">Pick which topics to drill, set a size, go. Reopen filter any time.</div>'
      + '<div class="em-briefing" style="background:rgba(34,211,238,0.08);border-left:3px solid #22d3ee;padding:10px 14px;margin:10px 0 14px;border-radius:0 6px 6px 0;color:#a5f3fc;font-size:13px;line-height:1.55">'
      +   '<b style="color:#67e8f9">📖 What this is:</b> Custom-mix MC drill from the full 106-Q Neck (part 1) bank (Dr. Maini, Cervical Triangles &amp; Blood Vessels of the Neck). Pick presets (Triangles, Carotid, Subclavian, Neck Veins, Plexus + Ansa, etc.) or toggle individual topics. Set how many Qs you want. Hit start. <b>Tip:</b> 25 Qs = quick warm-up · 60 Qs = exam sim · 106 = full sweep.'
      + '</div>'
      + '<h3>⚡ Presets</h3>'
      + '<div class="em-presets">'
      +   '<button onclick="emPreset(\'all\')">✅ All</button>'
      +   '<button onclick="emPreset(\'triangles\')">🔺 Triangles + Boundaries</button>'
      +   '<button onclick="emPreset(\'muscles\')">💪 Suprahyoid + Infrahyoid</button>'
      +   '<button onclick="emPreset(\'carotid\')">🩸 Carotid (all)</button>'
      +   '<button onclick="emPreset(\'subclavian\')">🔽 Subclavian Artery</button>'
      +   '<button onclick="emPreset(\'veins\')">🩹 Neck Veins + Drainage</button>'
      +   '<button onclick="emPreset(\'plexus\')">🕸️ Cervical Plexus + Ansa</button>'
      +   '<button onclick="emPreset(\'vessels\')">🫀 All Vessels</button>'
      +   '<button onclick="emPreset(\'lymph\')">🔬 Lymphatics + Landmarks</button>'
      +   '<button onclick="emPreset(\'clear\')">✖️ Clear</button>'
      + '</div>'
      + '<h3>📚 Topics (toggle individually)</h3>'
      + '<div class="em-cats" id="emCatList"></div>'
      + '<h3>📊 Number of Questions</h3>'
      + '<div class="em-size-row">'
      +   '<input type="range" id="emSizeSlider" min="5" max="106" value="25" oninput="emUpdSize()">'
      +   '<div class="em-val" id="emSizeVal">25</div>'
      + '</div>'
      + '<div class="em-info"><b>Available:</b> <span id="emAvail">106</span> Qs match your selection</div>'
      + '<div style="display:flex;gap:10px;flex-wrap:wrap;justify-content:center;margin-top:8px">'
      +   '<button class="em-start" id="emStartBtn" onclick="emStart()" style="flex:1;min-width:160px">▶️ Start Drill</button>'
      + '</div>'
      + '</div>';
    var modal = document.createElement('div');
    modal.id = 'everythingModal';
    modal.innerHTML = html;
    document.body.appendChild(modal);
    var btn = document.createElement('button');
    btn.id = 'emReopenBtn';
    btn.textContent = '⚙️ Filter Topics';
    btn.onclick = emReopen;
    document.body.appendChild(btn);
    catCounts = {};
    FULL_BANK.forEach(function(q){ if (q && q.cat) catCounts[q.cat] = (catCounts[q.cat]||0)+1; });
    var cats = Object.keys(catCounts).sort();
    var list = document.getElementById('emCatList');
    list.innerHTML = '';
    cats.forEach(function(cat){
      selectedCats[cat] = true;
      var safe = cat.replace(/'/g, "&apos;").replace(/"/g, "&quot;");
      var id = 'em_cat_' + cat.replace(/[^a-z0-9]/gi, '_');
      var row = document.createElement('div');
      row.className = 'em-cat-row';
      row.innerHTML = '<input type="checkbox" id="' + id + '" checked onchange="emToggleCat(this,\''+cat.replace(/'/g, "\\\'")+'\')">'
                    + '<label for="' + id + '">' + safe + '</label>'
                    + '<span class="em-count">' + catCounts[cat] + '</span>';
      list.appendChild(row);

    emUpdAvail();

  window.emToggleCat = function(box, cat){
    selectedCats[cat] = box.checked;
    emUpdAvail();
  };
  window.emPreset = function(kind){
    var allCats = Object.keys(catCounts);
    allCats.forEach(function(cat){
      var on = false;
      if (kind === 'all') on = true;
      else if (kind === 'clear') on = false;
      else if (TOPIC_GROUPS[kind]) {
        on = TOPIC_GROUPS[kind].some(function(sub){ return cat.toLowerCase().indexOf(sub.toLowerCase()) >= 0; });
      }
      selectedCats[cat] = on;
      var id = 'em_cat_' + cat.replace(/[^a-z0-9]/gi, '_');
      var box = document.getElementById(id);
      if (box) box.checked = on;
    });
    emUpdAvail();
  };
  window.emUpdSize = function(){
    document.getElementById('emSizeVal').textContent = document.getElementById('emSizeSlider').value;
  };
  function emUpdAvail(){
    var n = 0;
    FULL_BANK.forEach(function(q){ if (selectedCats[q.cat]) n++; });
    document.getElementById('emAvail').textContent = n;
    var slider = document.getElementById('emSizeSlider');
    slider.max = Math.max(5, n);
    if (parseInt(slider.value) > n) slider.value = Math.max(5, n);
    emUpdSize();
    document.getElementById('emStartBtn').disabled = (n === 0);
  }
  window.emStart = function(){
    var size = parseInt(document.getElementById('emSizeSlider').value);
    var pool = FULL_BANK.filter(function(q){ return selectedCats[q.cat]; });
    for (var i = pool.length - 1; i > 0; i--){ var j = Math.floor(Math.random()*(i+1)); var t = pool[i]; pool[i]=pool[j]; pool[j]=t; }
    var picked = pool.slice(0, Math.min(size, pool.length));
    BANK.length = 0;
    picked.forEach(function(q){ BANK.push(q); });
    BANK.forEach(function(q,i){ q._bankId = i; });
    if (typeof catStats !== 'undefined') { catStats = {}; }
    try { if (typeof LS_KEY === 'string') localStorage.removeItem(LS_KEY); } catch(e){}
    document.getElementById('everythingModal').style.display = 'none';
    document.getElementById('emReopenBtn').style.display = 'block';
    if (typeof idx !== 'undefined') idx = 0;
    if (typeof score !== 'undefined') score = 0;
    if (typeof attempts !== 'undefined') attempts = 0;
    if (typeof reaskQueue !== 'undefined') reaskQueue.length = 0;
    if (typeof questions !== 'undefined') questions.length = 0;
    if (typeof answerMap !== 'undefined') { for (var k in answerMap) delete answerMap[k]; }
    if (typeof answerHistory !== 'undefined') answerHistory.length = 0;
    if (typeof browseIdx !== 'undefined') browseIdx = -1;
    if (typeof reviewList !== 'undefined') reviewList = null;
    if (typeof init === 'function') init();
  };
  function emReopen(){
    document.getElementById('everythingModal').style.display = 'block';
  }

  function tryInit(){
    if (initialized) return;
    if (!captureBank()) { setTimeout(tryInit, 100); return; }
    initialized = true;
    buildModal();
  }
  if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', tryInit);
  else tryInit();
})();
</script>

<script id="search-and-jump-js">
(function(){
  var _searchBar=null,_searchTimer=null,_searchKbdIdx=-1,_lastResults=[],_lastQuery='';

  function _esc(s){
    return (s==null?'':String(s)).replace(/[<>&"']/g,function(c){
      return {'<':'&lt;','>':'&gt;','&':'&amp;','"':'&quot;',"'":'&#39;'}[c];
    });
  }

  function _buildSearchBar(){
    var wrap=document.createElement('div');
    wrap.id='search-bar';
    wrap.className='search-bar';
    wrap.innerHTML=''
      +'<div class="search-input-wrap" id="search-input-wrap">'
      +  '<span class="search-icon">🔍</span>'
      +  '<input type="text" id="search-input" class="search-input" placeholder="Search questions, topics, sources... (↑/↓ + Enter)" autocomplete="off" spellcheck="false">'
      +  '<button class="search-clear" id="search-clear" type="button" title="Clear (Esc)">✕</button>'
      +'</div>'
      +'<div class="search-results" id="search-results"></div>';
    return wrap;
  }

  function _ensureSearchAttached(){
    var app=document.getElementById('app');
    if(!app)return;
    if(!_searchBar){
      _searchBar=_buildSearchBar();
      _wireSearchHandlers();
    }
    var card=app.querySelector('.card');
    if(card){
      if(_searchBar.parentNode!==card.parentNode){
        card.parentNode.insertBefore(_searchBar,card);
      }
    } else {
      // No card (e.g. summary screen) — detach
      if(_searchBar.parentNode)_searchBar.parentNode.removeChild(_searchBar);
    }
  }

  function _highlight(text,query){
    if(!text)return '';
    if(!query)return _esc(text);
    var qLow=query.toLowerCase();
    var tLow=String(text).toLowerCase();
    var i=tLow.indexOf(qLow);
    if(i===-1)return _esc(text);
    var end=i+query.length;
    return _esc(text.substring(0,i))+'<mark>'+_esc(text.substring(i,end))+'</mark>'+_esc(text.substring(end));
  }

  function _searchBank(query){
    var q=(query||'').toLowerCase().trim();
    if(!q||typeof BANK==='undefined')return [];
    var results=[];
    for(var i=0;i<BANK.length;i++){
      var item=BANK[i];
      var qText=(item.q||'').toLowerCase();
      var cat=(item.cat||'').toLowerCase();
      var src=(item.source||'').toLowerCase();
      var quote=(item.quote||'').toLowerCase();
      var tip=(item.profTip||'').toLowerCase();
      if(qText.indexOf(q)>=0||cat.indexOf(q)>=0||src.indexOf(q)>=0||quote.indexOf(q)>=0||tip.indexOf(q)>=0){
        results.push({_bankId:i,q:item.q,cat:item.cat});
        if(results.length>=10)break;
      }
    }
    return results;
  }

  function _renderSearchResults(query){
    var ul=document.getElementById('search-results');
    if(!ul)return;
    _lastQuery=query;
    if(!query.trim()){
      ul.classList.remove('open');
      ul.innerHTML='';
      _lastResults=[];_searchKbdIdx=-1;
      return;
    }
    var matches=_searchBank(query);
    _lastResults=matches;
    _searchKbdIdx=-1;
    if(matches.length===0){
      ul.innerHTML='<div class="search-empty">No matches for "'+_esc(query)+'"</div>';
      ul.classList.add('open');
      return;
    }
    var html='';
    for(var i=0;i<matches.length;i++){
      var m=matches[i];
      var stem=(m.q||'');
      var truncStem=stem.length>110?stem.substring(0,110)+'…':stem;
      html+='<div class="search-result" data-bank-id="'+m._bankId+'" data-idx="'+i+'">'
        +'<span class="sr-num">Q'+(m._bankId+1)+'</span>'
        +'<span class="sr-cat">'+_esc(m.cat||'')+'</span>'
        +_highlight(truncStem,query)
        +'</div>';
    }
    if(matches.length===10){
      html+='<div class="search-hint">Showing top 10 — refine to narrow</div>';
    }
    ul.innerHTML=html;
    ul.classList.add('open');
    var nodes=ul.querySelectorAll('.search-result');
    nodes.forEach(function(node){
      node.addEventListener('mousedown',function(e){
        // mousedown so it fires before input blur clears state
        e.preventDefault();
        var bankId=parseInt(node.getAttribute('data-bank-id'),10);
        _doJump(bankId);
      });
    });
  }

  function _doJump(bankId){
    if(typeof navJump!=='function')return;
    var inp=document.getElementById('search-input');
    var ul=document.getElementById('search-results');
    if(inp)inp.value='';
    if(ul){ul.classList.remove('open');ul.innerHTML='';}
    _lastResults=[];_searchKbdIdx=-1;_lastQuery='';
    navJump(bankId);
    // Scroll to top of card after jump so user sees the question
    setTimeout(function(){
      var card=document.querySelector('.card');
      if(card&&card.scrollIntoView)card.scrollIntoView({behavior:'smooth',block:'start'});
    },80);
  }

  function _highlightKbd(){
    var ul=document.getElementById('search-results');
    if(!ul)return;
    var nodes=ul.querySelectorAll('.search-result');
    nodes.forEach(function(n,i){n.classList.toggle('kbd',i===_searchKbdIdx);});
    if(_searchKbdIdx>=0&&nodes[_searchKbdIdx]){
      nodes[_searchKbdIdx].scrollIntoView({block:'nearest'});
    }
  }

  function _wireSearchHandlers(){
    var inp=_searchBar.querySelector('#search-input');
    var wrap=_searchBar.querySelector('#search-input-wrap');
    var clr=_searchBar.querySelector('#search-clear');
    inp.addEventListener('focus',function(){
      wrap.classList.add('focused');
      if(_lastQuery&&_lastResults.length>0){
        var ul=document.getElementById('search-results');
        if(ul)ul.classList.add('open');
      }
    });
    inp.addEventListener('blur',function(){
      setTimeout(function(){wrap.classList.remove('focused');},150);
    });
    inp.addEventListener('input',function(){
      if(_searchTimer)clearTimeout(_searchTimer);
      var v=inp.value;
      _searchTimer=setTimeout(function(){_renderSearchResults(v);},200);
    });
    inp.addEventListener('keydown',function(e){
      var ul=document.getElementById('search-results');
      if(e.key==='Escape'){
        if(inp.value){
          inp.value='';
          if(ul){ul.classList.remove('open');ul.innerHTML='';}
          _lastResults=[];_searchKbdIdx=-1;_lastQuery='';
        } else {
          inp.blur();
        }
      } else if(e.key==='ArrowDown'){
        if(_lastResults.length===0)return;
        e.preventDefault();
        _searchKbdIdx=Math.min(_lastResults.length-1,_searchKbdIdx+1);
        _highlightKbd();
      } else if(e.key==='ArrowUp'){
        if(_lastResults.length===0)return;
        e.preventDefault();
        _searchKbdIdx=Math.max(-1,_searchKbdIdx-1);
        _highlightKbd();
      } else if(e.key==='Enter'){
        if(_lastResults.length===0)return;
        e.preventDefault();
        var pick=_searchKbdIdx>=0?_lastResults[_searchKbdIdx]:_lastResults[0];
        if(pick)_doJump(pick._bankId);
      }
    });
    clr.addEventListener('click',function(){
      inp.value='';
      var ul=document.getElementById('search-results');
      if(ul){ul.classList.remove('open');ul.innerHTML='';}
      _lastResults=[];_searchKbdIdx=-1;_lastQuery='';
      inp.focus();
    });
    document.addEventListener('click',function(e){
      if(!_searchBar)return;
      if(!_searchBar.contains(e.target)){
        var ul=document.getElementById('search-results');
        if(ul)ul.classList.remove('open');
      }
    });
    // Global "/" keybind to focus search (matches GitHub-style search UX)
    document.addEventListener('keydown',function(e){
      if(e.key==='/'&&document.activeElement!==inp){
        var tag=(document.activeElement&&document.activeElement.tagName||'').toLowerCase();
        if(tag==='input'||tag==='textarea')return;
        e.preventDefault();
        inp.focus();
      }
    });
  }

  function _wrapRender(){
    if(typeof render!=='function')return;
    var origR=render;
    render=function(){
      if(_searchBar&&_searchBar.parentNode)_searchBar.parentNode.removeChild(_searchBar);
      origR();
      _ensureSearchAttached();
    };
    if(typeof renderHistoryItem==='function'){
      var origH=renderHistoryItem;
      renderHistoryItem=function(){
        if(_searchBar&&_searchBar.parentNode)_searchBar.parentNode.removeChild(_searchBar);
        origH();
        _ensureSearchAttached();
      };
    }
    if(typeof showSummary==='function'){
      var origS=showSummary;
      showSummary=function(){
        if(_searchBar&&_searchBar.parentNode)_searchBar.parentNode.removeChild(_searchBar);
        origS();
        // intentionally no re-attach on summary
      };
    }
  }

  function _bootSearch(){
    _wrapRender();
    _ensureSearchAttached();
  }

  // Wait until other render overrides (audio bar etc.) finish wiring
  if(document.readyState==='complete'||document.readyState==='interactive'){
    setTimeout(_bootSearch,100);
  } else {
    document.addEventListener('DOMContentLoaded',function(){setTimeout(_bootSearch,100);});
  }
})();
</script>

<script>
(function(){
  var lbFrameDrawing = false, lbFrameLastX = 0, lbFrameLastY = 0;
  var lbFrameColor = '#fbbf24';
  var lbFrameTool = 'pen';
  var lbFrameAlphas = {pen: 0.85, hl: 0.30, er: 1.0};
  var lbFrameSizes = {pen: 5, hl: 26, er: 36};
  var lbFrameBgColor = '';   // '' = default lightbox bg
  var lbFrameUndoStack = []; // snapshots of canvas state
  var lbFrameRedoStack = [];
  var LB_FRAME_HISTORY_MAX = 30;
  var lbFrameSrc = '', lbFrameLabel = '';

  window.lbFrameOpen = function(src, label){
    lbFrameSrc = src; lbFrameLabel = label || '';
    var lb = document.getElementById('lb-frame');
    var img = document.getElementById('lb-frame-img');
    var canvas = document.getElementById('lb-frame-canvas');
    document.getElementById('lb-frame-cap').textContent = label;
    if (canvas) canvas.getContext('2d').clearRect(0,0,canvas.width,canvas.height);
    img.onload = function(){ lbFrameSyncCanvas(true); lbFrameApplyImgFilter(); };
    img.src = src;
    lb.classList.add('open');
    lbFrameApplyImgFilter();
    // Reset history + bg for new frame
    lbFrameUndoStack = [];
    lbFrameRedoStack = [];
    lbFrameBgColor = '';
    lb.style.background = '';  // restore default lightbox bg
    setTimeout(function(){ lbFrameSyncCanvas(true); }, 100);
    setTimeout(function(){ lbFrameSyncCanvas(true); }, 400);
  };
  window.lbFrameClose = function(){
    var lb = document.getElementById('lb-frame');
    lb.classList.remove('open');
    var c = document.getElementById('lb-frame-canvas');
    if (c) { c.classList.remove('draw-active'); c.style.pointerEvents = 'none'; c.style.cursor = ''; }
    var btn = document.getElementById('lb-frame-draw-toggle');
    if (btn) { btn.classList.remove('active'); btn.textContent = '🎨 Draw OFF'; }
  };
  function lbFrameSyncCanvas(forceClear){
    var img = document.getElementById('lb-frame-img');
    var canvas = document.getElementById('lb-frame-canvas');
    if (!img || !canvas) return;
    var w = img.naturalWidth || img.clientWidth || 1280;
    var h = img.naturalHeight || img.clientHeight || 720;
    var sizeChanged = (canvas.width !== w || canvas.height !== h);
    if (sizeChanged) { canvas.width = w; canvas.height = h; }
    if (sizeChanged || forceClear) {
      canvas.getContext('2d').clearRect(0,0,canvas.width,canvas.height);
    }
  }
  window.lbFrameToggleDraw = function(){
    var c = document.getElementById('lb-frame-canvas');
    if (!c) return;
    lbFrameSyncCanvas();
    var active = c.classList.toggle('draw-active');
    c.style.pointerEvents = active ? 'auto' : 'none';
    c.style.cursor = active ? 'crosshair' : '';
    c.style.touchAction = 'none';
    var btn = document.getElementById('lb-frame-draw-toggle');
    btn.classList.toggle('active', active);
    btn.textContent = active ? '✏️ Drawing — tap to stop' : '🎨 Tap to Draw';
  };
  window.lbFrameSetColor = function(c){ lbFrameColor = c; };
  window.lbFrameSetTool = function(t){
    lbFrameTool = t;
    document.querySelectorAll('.lb-frame-toolbar button[id^="lb-frame-tool-"]').forEach(function(b){ b.classList.remove('active'); });
    document.getElementById('lb-frame-tool-' + t).classList.add('active');
    // Update sliders to show current tool's settings
    var sizeSlider = document.getElementById('lb-frame-size-slider');
    var opacSlider = document.getElementById('lb-frame-opacity-slider');
    if (sizeSlider) { sizeSlider.value = lbFrameSizes[t]; document.getElementById('lb-frame-size-val').textContent = lbFrameSizes[t] + 'px'; }
    if (opacSlider) { var op = Math.round(lbFrameAlphas[t]*100); opacSlider.value = op; document.getElementById('lb-frame-opacity-val').textContent = op + '%'; }
  };
  window.lbFrameSetSize = function(v){
    lbFrameSizes[lbFrameTool] = parseInt(v, 10);
    document.getElementById('lb-frame-size-val').textContent = v + 'px';
  };
  window.lbFrameSetOpacity = function(v){
    lbFrameAlphas[lbFrameTool] = parseInt(v, 10) / 100;
    document.getElementById('lb-frame-opacity-val').textContent = v + '%';
  };
  var lbFrameImgOpacity = 1.0;
  var lbFrameBW = false;
  function lbFrameApplyImgFilter(){
    var img = document.getElementById('lb-frame-img');
    if (!img) return;
    var filter = '';
    if (lbFrameBW) filter += 'grayscale(1) ';
    img.style.filter = filter.trim();
    img.style.opacity = lbFrameImgOpacity;
  }
  window.lbFrameSetImgOpacity = function(v){
    lbFrameImgOpacity = parseInt(v, 10) / 100;
    document.getElementById('lb-frame-img-opacity-val').textContent = v + '%';
    lbFrameApplyImgFilter();
  };
  window.lbFrameToggleBW = function(){
    lbFrameBW = !lbFrameBW;
    var btn = document.getElementById('lb-frame-bw-toggle');
    btn.textContent = lbFrameBW ? '◾ Color' : '⬜ B&W';
    btn.classList.toggle('active', lbFrameBW);
    lbFrameApplyImgFilter();
  };
  window.lbFrameSetBgColor = function(c){
    lbFrameBgColor = c;
    var lb = document.getElementById('lb-frame');
    if (lb) lb.style.background = c;
  };
  function lbFrameSnapshot(){
    var canvas = document.getElementById('lb-frame-canvas');
    if (!canvas || !canvas.width) return;
    try {
      lbFrameUndoStack.push(canvas.toDataURL('image/png'));
      if (lbFrameUndoStack.length > LB_FRAME_HISTORY_MAX) lbFrameUndoStack.shift();
      lbFrameRedoStack = []; // new stroke invalidates redo
    } catch(e) {}
  }
  function lbFrameRestore(dataURL){
    var canvas = document.getElementById('lb-frame-canvas');
    if (!canvas) return;
    var ctx = canvas.getContext('2d');
    var img = new Image();
    img.onload = function(){
      ctx.clearRect(0,0,canvas.width,canvas.height);
      ctx.drawImage(img, 0, 0);
    };
    img.src = dataURL;
  }
  window.lbFrameUndo = function(){
    if (lbFrameUndoStack.length === 0) return;
    var canvas = document.getElementById('lb-frame-canvas');
    try { lbFrameRedoStack.push(canvas.toDataURL('image/png')); } catch(e) {}
    var prev = lbFrameUndoStack.pop();
    if (prev) lbFrameRestore(prev);
    else { canvas.getContext('2d').clearRect(0,0,canvas.width,canvas.height); }
  };
  window.lbFrameRedo = function(){
    if (lbFrameRedoStack.length === 0) return;
    var canvas = document.getElementById('lb-frame-canvas');
    try { lbFrameUndoStack.push(canvas.toDataURL('image/png')); } catch(e) {}
    var next = lbFrameRedoStack.pop();
    if (next) lbFrameRestore(next);
  };
  window.lbFrameClear = function(){
    var c = document.getElementById('lb-frame-canvas');
    if (!c) return;
    lbFrameSnapshot();  // allow undo of the clear
    c.getContext('2d').clearRect(0,0,c.width,c.height);
  };
  window.lbFrameSave = function(){
    // Use the existing in-DOM img (already loaded, no CORS re-fetch needed)
    var img = document.getElementById('lb-frame-img');
    var canvas = document.getElementById('lb-frame-canvas');
    if (!img || !img.complete || !img.naturalWidth) {
      alert('Frame image not loaded yet — wait a sec and try again.');
      return;
    }
    var out = document.createElement('canvas');
    out.width = canvas.width; out.height = canvas.height;
    var octx = out.getContext('2d');
    function paintWatermarkAndExport(){
      octx.save();
      octx.fillStyle = 'rgba(60,60,60,0.65)';
      octx.font = '600 13px -apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif';
      octx.textBaseline = 'bottom';
      octx.fillText('DC Study Supply — Dr. David Gramling, PHD', 14, out.height - 10);
      octx.restore();
      var fname = 'fab-201-m01-frame-' + (lbFrameLabel.replace(/[^a-z0-9_-]/gi,'_') || 'annotated') + '.png';
      // Try toBlob first
      var didBlob = false;
      try {
        out.toBlob(function(blob){
          if (!blob) { tryDataURL(); return; }
          didBlob = true;
          var url = URL.createObjectURL(blob);
          var a = document.createElement('a');
          a.href = url; a.download = fname;
          document.body.appendChild(a); a.click(); document.body.removeChild(a);
          URL.revokeObjectURL(url);
        }, 'image/png');
        // toBlob is async; if it threw synchronously we'd be in catch
      } catch(e) {
        tryDataURL();
      }
      function tryDataURL(){
        try {
          var dataURL = out.toDataURL('image/png');
          var a = document.createElement('a');
          a.href = dataURL; a.download = fname;
          document.body.appendChild(a); a.click(); document.body.removeChild(a);
        } catch(e2) {
          alert('Save failed (CORS): the browser blocked exporting the image because it was loaded cross-origin. This works on the live GitHub Pages URL but may fail when opened directly from disk (file://). Try the live URL: dgsc23.github.io/dc-study-tools/');
        }
      }
    }
    try {
      // 1. Paint background color first (if user picked one) — visible when image is transparent
      if (lbFrameBgColor) {
        octx.fillStyle = lbFrameBgColor;
        octx.fillRect(0, 0, out.width, out.height);
      }
      // 2. Draw image with current opacity + B&W filter
      octx.save();
      octx.globalAlpha = lbFrameImgOpacity;
      if (lbFrameBW) octx.filter = 'grayscale(1)';
      octx.drawImage(img, 0, 0, out.width, out.height);
      octx.restore();
      // 3. Draw user's strokes (canvas) at full opacity over the image
      octx.drawImage(canvas, 0, 0, out.width, out.height);
      paintWatermarkAndExport();
    } catch(e) {
      // drawImage tainted the canvas — happens only with CORS-restricted images
      alert('Save blocked by browser CORS rule. This usually means the file was opened from disk (file://) instead of the live URL. Try the live URL: dgsc23.github.io/dc-study-tools/');
    }
  };

  // Mouse + touch handlers (mirrors VSS pattern post-fix)
  var lbFrameCanvas = document.getElementById('lb-frame-canvas');
  if (lbFrameCanvas) {
    function lbFrameGetPos(e){
      var rect = lbFrameCanvas.getBoundingClientRect();
      var t = (e.touches && e.touches.length) ? e.touches[0] : e;
      var rw = rect.width || 1, rh = rect.height || 1;
      var cw = lbFrameCanvas.width || rw, ch = lbFrameCanvas.height || rh;
      var sx = cw / rw, sy = ch / rh;
      return [(t.clientX - rect.left) * sx, (t.clientY - rect.top) * sy];
    }
    function lbFrameDown(e){
      if (!lbFrameCanvas.classList.contains('draw-active')) return;
      e.preventDefault();
      lbFrameSnapshot();  // save state BEFORE this stroke for undo
      lbFrameDrawing = true;
      var p = lbFrameGetPos(e);
      lbFrameLastX = p[0]; lbFrameLastY = p[1];
    }
    function lbFrameMove(e){
      if (!lbFrameDrawing || !lbFrameCanvas.classList.contains('draw-active')) return;
      e.preventDefault();
      var p = lbFrameGetPos(e);
      var ctx = lbFrameCanvas.getContext('2d');
      ctx.strokeStyle = lbFrameColor;
      ctx.lineWidth = lbFrameSizes[lbFrameTool] || 5;
      ctx.globalAlpha = lbFrameAlphas[lbFrameTool] != null ? lbFrameAlphas[lbFrameTool] : (lbFrameTool === 'er' ? 1 : 0.85);
      ctx.globalCompositeOperation = lbFrameTool === 'er' ? 'destination-out' : 'source-over';
      ctx.lineCap = 'round'; ctx.lineJoin = 'round';
      ctx.beginPath(); ctx.moveTo(lbFrameLastX, lbFrameLastY); ctx.lineTo(p[0], p[1]); ctx.stroke();
      lbFrameLastX = p[0]; lbFrameLastY = p[1];
    }
    function lbFrameUp(){ lbFrameDrawing = false; }
    lbFrameCanvas.addEventListener('mousedown', lbFrameDown);
    lbFrameCanvas.addEventListener('mousemove', lbFrameMove);
    lbFrameCanvas.addEventListener('mouseup', lbFrameUp);
    lbFrameCanvas.addEventListener('mouseleave', lbFrameUp);
    window.addEventListener('mouseup', lbFrameUp);
    lbFrameCanvas.addEventListener('touchstart', lbFrameDown, {passive: false});
    lbFrameCanvas.addEventListener('touchmove', lbFrameMove, {passive: false});
    lbFrameCanvas.addEventListener('touchend', lbFrameUp);
  }
})();
</script>

<script id="mc-to-frame-pip-drill-js">
(function(){
  // Lecture routing config — generic across number of lectures so this same code
  // works for GA (2 lectures, 1 boundary) and FAB (3 lectures, 2 boundaries) and
  // any future module. Boundaries are combined-audio split timestamps in seconds.
  // viewers[i] is the URL for lecture i (after boundaries[i-1], up to boundaries[i]).
  var LECTURE_CFG={
  "boundaries": [4800, 10817],
  "viewers": [
    "fab-201-m02-shoulder-forearm-l04-frame-viewer.html",
    "fab-201-m02-shoulder-forearm-l05-frame-viewer.html",
    "fab-201-m02-shoulder-forearm-l06-frame-viewer.html"
  ]
};

  function resolveLecture(combinedTs){
    var boundaries=LECTURE_CFG.boundaries;
    var viewers=LECTURE_CFG.viewers;
    var prev=0;
    for(var i=0;i<boundaries.length;i++){
      if(combinedTs<=boundaries[i]){
        return {idx:i,viewer:viewers[i],relTs:combinedTs-prev};
      }
      prev=boundaries[i];
    }
    var last=boundaries.length;
    return {idx:last,viewer:viewers[last],relTs:combinedTs-prev};
  }

  window.openFrameViewerForCurrentQ=function(){
    if(typeof questions==='undefined'||typeof idx==='undefined'||typeof TIMESTAMPS==='undefined')return;
    var q=questions[idx];
    if(!q)return;
    var bankId=q._bankId;
    if(bankId==null||bankId>=TIMESTAMPS.length)return;
    var ts=TIMESTAMPS[bankId];
    if(!isFinite(ts)||ts<=0)return;
    var routed=resolveLecture(ts);
    if(!routed.viewer)return;
    var url=routed.viewer+'?ts='+routed.relTs.toFixed(1);
    window.open(url,'_blank','noopener,noreferrer');
  };

  // Inject the button into the audio bar's audio-info section AFTER it's built
  function injectButton(){
    var bar=document.getElementById('audio-bar');
    if(!bar)return false;
    if(bar.querySelector('.btn-frame-pip'))return true;
    var info=bar.querySelector('.audio-info');
    if(!info)return false;
    var btn=document.createElement('button');
    btn.className='btn-frame-pip';
    btn.type='button';
    btn.innerHTML='🎞️ Frames + PiP';
    btn.title='Open Frame Viewer at this Q\'s timestamp — draw on the slide while video PiP plays';
    btn.onclick=function(e){e.preventDefault();openFrameViewerForCurrentQ();};
    info.appendChild(btn);
    return true;
  }

  // Audio bar is rebuilt on every render(); inject after each rebuild.
  function watchAndInject(){
    if(injectButton())return;
    // Audio bar not built yet — observe app for changes
    var app=document.getElementById('app');
    if(!app)return;
    var mo=new MutationObserver(function(){
      if(injectButton())mo.disconnect();
    });
    mo.observe(app,{childList:true,subtree:true});
  }

  // Re-inject on every audio-bar attachment (after render() wipes #app)
  setInterval(injectButton,1500);

  if(document.readyState==='complete'||document.readyState==='interactive'){
    setTimeout(watchAndInject,500);
  } else {
    document.addEventListener('DOMContentLoaded',function(){setTimeout(watchAndInject,500);});
  }
})();
</script>

<script id="pill-rebuild-deploy-fab-lightbox-js">
(function() {
    "use strict";
    var TB_SEL    = '.lb-frame-toolbar';
    var TB_TRIG   = null;
    var CANVAS_SEL = '#lb-frame-canvas';
    var BODY_CLASS = 'float-toolbar-mode';
    var LS_KEY    = 'pillFabLightboxCollapsed';
    var TOP_CLEARANCE = 28;

    function tb()     { return document.querySelector(TB_SEL); }
    function fb()     { return document.getElementById('floatingToggle'); }
    function canvas() { return document.querySelector(CANVAS_SEL); }

    function tbVisible() {
        var t = tb(); if (!t) return false;
        // Use getBoundingClientRect rather than offsetParent. Reason: per spec,
        // offsetParent returns null for any element with `position: fixed` —
        // and my pill CSS makes the toolbar position:fixed. So offsetParent
        // would ALWAYS be null on a floating toolbar (whether visible or not),
        // which would break the visibility check and cause updateFloatingPos
        // to return early, breaking zoom-tracking. Bug caught 2026-05-10 after
        // David reported the toolbar didn't follow zoom on the frame viewer.
        // getBoundingClientRect returns a zero rect when the element OR any
        // ancestor has display:none, but a non-zero rect when rendered,
        // regardless of position:fixed/relative/static.
        var rect = t.getBoundingClientRect();
        return rect.width > 0 && rect.height > 0;
    }

    // ---- expand / collapse ----
    function ensureExpandBtn() {
        var t = tb(); if (!t) return;
        if (document.getElementById('ftExpandBtn')) return;
        var btn = document.createElement('button');
        btn.id = 'ftExpandBtn';
        btn.type = 'button';
        btn.title = 'Collapse / expand toolbar';
        btn.setAttribute('aria-label', 'Collapse toolbar');
        var startCollapsed = false;
        try { startCollapsed = localStorage.getItem(LS_KEY) === '1'; } catch (e) {}
        if (startCollapsed) t.classList.add('collapsed');
        btn.innerHTML = startCollapsed ? '&#9998;' : '&#10005;';
        btn.addEventListener('click', function(e) {
            e.preventDefault(); e.stopPropagation();
            var collapsed = t.classList.toggle('collapsed');
            btn.innerHTML = collapsed ? '&#9998;' : '&#10005;';
            btn.setAttribute('aria-label', collapsed ? 'Expand toolbar' : 'Collapse toolbar');
            try { localStorage.setItem(LS_KEY, collapsed ? '1' : '0'); } catch (e2) {}
            requestAnimationFrame(updateFloatingPos);
        });
        if (t.firstChild) t.insertBefore(btn, t.firstChild); else t.appendChild(btn);
    }

    // ---- draw / scroll toggle ----
    var touchDrawMode = true;
    function ensureDrawScrollToggle() {
        if (document.getElementById('floatingToggle')) return;
        var btn = document.createElement('button');
        btn.id = 'floatingToggle';
        btn.type = 'button';
        btn.className = 'draw-mode';
        btn.title = 'Touch = draw — tap to switch to scroll';
        btn.setAttribute('aria-label', 'Toggle draw / scroll mode');
        btn.innerHTML = '&#9998;';
        btn.addEventListener('click', function(e) {
            e.preventDefault(); e.stopPropagation();
            touchDrawMode = !touchDrawMode;
            var c = canvas();
            btn.className = (btn.classList.contains('visible') ? 'visible ' : '') +
                            (touchDrawMode ? 'draw-mode' : 'scroll-mode');
            btn.innerHTML = touchDrawMode ? '&#9998;' : '&#9995;';
            btn.title = touchDrawMode
                ? 'Touch = draw — tap to switch to scroll'
                : 'Touch = scroll — tap to switch to draw';
            if (c) {
                c.style.touchAction = touchDrawMode ? 'none' : 'auto';
                c.style.pointerEvents = touchDrawMode ? '' : 'none';
            }
            requestAnimationFrame(updateFloatingPos);
        });
        document.body.appendChild(btn);
    }

    function syncToggleVisibility() {
        var b = fb(); if (!b) return;
        if (tbVisible()) b.classList.add('visible');
        else b.classList.remove('visible');
    }

    // ---- visual viewport zoom positioning ----
    // Toolbar bottom-right anchored: left = vv.right - margin - w*sc,  top = vv.bottom - margin - h*sc
    // Toggle  bottom-left  anchored: left = vv.left + margin,           top = vv.bottom - margin - h*sc
    // Both use transformOrigin: top left + scale(1/vv.scale).
    function updateFloatingPos() {
        var t = tb();
        var b = fb();
        var tShown = t && tbVisible();
        var bShown = b && b.classList.contains('visible');
        if (!tShown && !bShown) return;
        if (!window.visualViewport) return;
        var vv = window.visualViewport;
        var margin = 14;
        // Snap-back at default zoom — drop inline overrides so CSS rules
        // (max-height + position) take over cleanly.
        if (vv.scale <= 1.05) {
            if (t) {
                t.style.transform = ''; t.style.transformOrigin = '';
                t.style.left = ''; t.style.top = '';
                t.style.right = ''; t.style.bottom = '';
                t.style.maxHeight = '';
            }
            if (b) {
                b.style.transform = ''; b.style.transformOrigin = '';
                b.style.left = ''; b.style.top = '';
                b.style.right = ''; b.style.bottom = '';
            }
            return;
        }
        var sc = 1 / vv.scale;
        if (tShown) {
            // Dynamically clamp toolbar's layout max-height so its VISUAL
            // height fits in the visible viewport with top_clearance + bottom
            // margin. Without this, at heavy zoom (4x+) the toolbar overflows
            // off-screen because CSS `max-height: calc(100vh - Npx)` uses
            // LAYOUT vh, which stays large when zoomed in.
            var maxVisualH = vv.height - TOP_CLEARANCE - margin;
            if (maxVisualH < 60) maxVisualH = 60;  // sanity floor
            var maxLayoutH = maxVisualH / sc;
            t.style.maxHeight = maxLayoutH + 'px';
            // Re-measure AFTER clamping max-height so th reflects the new
            // clamped layout box.
            var tw = t.offsetWidth || 60;
            var th = t.offsetHeight || 200;
            t.style.right = 'auto';
            t.style.bottom = 'auto';
            t.style.left = (vv.offsetLeft + vv.width  - margin - tw * sc) + 'px';
            t.style.top  = (vv.offsetTop  + vv.height - margin - th * sc) + 'px';
            t.style.transform = 'scale(' + sc + ')';
            t.style.transformOrigin = 'top left';
        }
        if (bShown) {
            var bh = b.offsetHeight || 40;
            b.style.right = 'auto';
            b.style.bottom = 'auto';
            b.style.left = (vv.offsetLeft + margin) + 'px';
            b.style.top  = (vv.offsetTop + vv.height - margin - bh * sc) + 'px';
            b.style.transform = 'scale(' + sc + ')';
            b.style.transformOrigin = 'top left';
        }
    }

    function init() {
        document.body.classList.add(BODY_CLASS);
        var t = tb();
        if (!t) { setTimeout(init, 200); return; }
        ensureExpandBtn();
        ensureDrawScrollToggle();
        syncToggleVisibility();
        // Watch class changes that affect toolbar visibility. THREE targets
        // because different surfaces trigger visibility via different
        // elements:
        //   - toolbar itself (.show on slides, .active on VSS/AG)
        //   - toolbar's parent (#lb-frame.open on frame viewers — the
        //     toolbar's own class doesn't change when the lightbox opens)
        //   - document.body (body.annotate-mode on frame viewers — covers
        //     the gap if a future surface scopes visibility on body class)
        // Without the parent + body observers, the frame viewer's toggle
        // stayed hidden because syncToggleVisibility never re-ran after
        // init() — caught 2026-05-10 when David reported the toggle
        // missing on the frame viewer after bugfix #3.
        var mo = new MutationObserver(function(muts) {
            for (var i = 0; i < muts.length; i++) {
                if (muts[i].attributeName === 'class') {
                    syncToggleVisibility();
                    requestAnimationFrame(updateFloatingPos);
                    break;
                }
            }
        });
        mo.observe(t, { attributes: true, attributeFilter: ['class'] });
        if (t.parentElement) {
            mo.observe(t.parentElement, { attributes: true, attributeFilter: ['class'] });
        }
        mo.observe(document.body, { attributes: true, attributeFilter: ['class'] });
        if (window.visualViewport) {
            window.visualViewport.addEventListener('scroll', updateFloatingPos);
            window.visualViewport.addEventListener('resize', updateFloatingPos);
        }
        window.addEventListener('scroll', updateFloatingPos, { passive: true });
        window.addEventListener('resize', updateFloatingPos);
        requestAnimationFrame(updateFloatingPos);
    }

    if (document.readyState === 'complete' || document.readyState === 'interactive') {
        setTimeout(init, 200);
    } else {
        document.addEventListener('DOMContentLoaded', function() { setTimeout(init, 200); });
    }
})();
</script>

    obs.observe(lb, {attributes: true, attributeFilter: ['class']});

    setTimeout(attach, 200);
  } else {
    document.addEventListener('DOMContentLoaded', function(){ setTimeout(attach, 200); });
