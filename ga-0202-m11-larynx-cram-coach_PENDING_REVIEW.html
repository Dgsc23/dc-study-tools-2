  { kind: "Flag", title: "The cricoid 'makes a good question'", text: "Maini flags it herself: the cricoid is 'the only cartilage which completely encircles the larynx... which makes a good question.' When a professor tells you a fact is a good question, believe her.", helps: "Points you straight at the single highest-probability cartilage item.", src: "Maini · Larynx L25" },
];

/* =============================================================== DRILL ===== */
/* Original-phrasing items grounded in the audited Everything-MC bank (L25-26).
   Answer positions balanced: 12 each A/B/C/D across 48 items. */
const questions = [
  { id: 1, topic: "Cartilages", src: "Maini · Larynx", q: "How many cartilages does the larynx contain in total?", opts: ["Nine (three unpaired + three paired)", "Six", "Twelve", "Three"], a: 0, h1: "Three big singles plus three little pairs.", h2: "An odd number.", exp: "Nine total: three large unpaired (thyroid, cricoid, epiglottis) and three smaller paired (arytenoid, corniculate, cuneiform)." },
  { id: 2, topic: "Cartilages", src: "Maini · Larynx", q: "Which set lists the three LARGE, UNPAIRED cartilages?", opts: ["Arytenoid, corniculate, cuneiform", "Thyroid, cricoid, epiglottis", "Thyroid, arytenoid, cricoid", "Cricoid, cuneiform, epiglottis"], a: 1, h1: "The three you can nearly feel in the neck.", h2: "The big ones.", exp: "The large unpaired cartilages are the thyroid, cricoid, and epiglottis." },
  { id: 3, topic: "Cartilages", src: "Maini · Larynx", q: "Which laryngeal cartilage is ELASTIC (not hyaline)?", opts: ["Thyroid", "Cricoid", "Epiglottis", "The cricoid lamina"], a: 2, h1: "The one that flops over the airway.", h2: "Same tissue as the ear.", exp: "The epiglottis is elastic cartilage; the thyroid and cricoid are hyaline." },
  { id: 4, topic: "Cartilages", src: "Maini · Larynx", q: "The triticeal cartilage is a classic distractor because it is:", opts: ["The largest laryngeal cartilage", "A paired vocal-cord cartilage", "Another name for the corniculate", "NOT part of the larynx (it lies in the thyrohyoid membrane's border)"], a: 3, h1: "Location: in a membrane's free edge.", h2: "Maini: it is not laryngeal.", exp: "The triticeal cartilage sits in the free posterior border of the thyrohyoid membrane and is NOT a laryngeal cartilage." },
  { id: 5, topic: "Thyroid", src: "Maini · Larynx", q: "The largest laryngeal cartilage is the:", opts: ["Thyroid cartilage", "Cricoid cartilage", "Epiglottis", "Arytenoid"], a: 0, h1: "Its laminae form the Adam's apple.", h2: "Unpaired and hyaline.", exp: "The thyroid is the largest laryngeal cartilage (unpaired, hyaline)." },
  { id: 6, topic: "Thyroid", src: "Maini · Larynx", q: "The laryngeal prominence (Adam's apple) is formed by:", opts: ["The cricoid arch", "Midline fusion of the two thyroid laminae", "The hyoid body", "The superior horn"], a: 1, h1: "Two plates meeting in front.", h2: "Sharper in males.", exp: "The two thyroid laminae fuse anteriorly in the midline to form the laryngeal prominence." },
  { id: 7, topic: "Thyroid", src: "Maini · Larynx", q: "Maini describes the thyroid cartilage posteriorly as:", opts: ["A complete ring", "Fused with the cricoid", "Deficient / incomplete (open behind)", "Continuous with the epiglottis"], a: 2, h1: "Like a necklace with no back.", h2: "The cricoid is the complete one, not this.", exp: "The thyroid cartilage is posteriorly deficient; only the cricoid forms a complete ring." },
  { id: 8, topic: "Thyroid", src: "Maini · Larynx", q: "The inferior horn of the thyroid cartilage articulates with the cricoid at the:", opts: ["Cricoarytenoid joint", "Cricotracheal junction", "Thyrohyoid joint", "Cricothyroid joint"], a: 3, h1: "Thyroid plus cricoid.", h2: "Not the arytenoid.", exp: "The inferior horn meets the cricoid at the cricothyroid joint." },
  { id: 9, topic: "Cricoid", src: "Maini · Larynx", q: "Which laryngeal cartilage is the ONLY one that forms a complete ring?", opts: ["Cricoid cartilage", "Thyroid cartilage", "Epiglottis", "Arytenoid"], a: 0, h1: "Maini calls it a good exam question.", h2: "It fully encircles the airway.", exp: "The cricoid is the only laryngeal cartilage that completely encircles the airway." },
  { id: 10, topic: "Cricoid", src: "Maini · Larynx", q: "Maini compares the cricoid's shape to a:", opts: ["Leaf", "Signet ring (narrow front, broad back)", "Pyramid", "Shield"], a: 1, h1: "A ring with a wide plate on one side.", h2: "Broad posterior lamina.", exp: "The cricoid is shaped like a signet ring: a narrow anterior arch and a broad posterior lamina." },
  { id: 11, topic: "Cricoid", src: "Maini · Larynx", q: "The cricoid is joined to the trachea below by the:", opts: ["Cricothyroid ligament", "Thyrohyoid membrane", "Cricotracheal ligament", "Conus elasticus"], a: 2, h1: "Its name states both structures it links.", h2: "It is an extrinsic ligament.", exp: "The cricotracheal ligament joins the cricoid to the trachea (an extrinsic ligament)." },
  { id: 12, topic: "Cricoid", src: "Maini · Larynx", q: "The inferior border of the cricoid marks:", opts: ["The laryngeal inlet", "The vocal folds", "The top of the vestibule", "The lowermost limit of the larynx (trachea begins below)"], a: 3, h1: "Where does the larynx end?", h2: "The trachea is next.", exp: "The inferior border of the cricoid is the lowest limit of the larynx; the trachea lies below it." },
  { id: 13, topic: "Arytenoid", src: "Maini · Larynx", q: "The arytenoid cartilage is shaped like a:", opts: ["Three-sided pyramid", "Signet ring", "Leaf", "Horseshoe"], a: 0, h1: "It has an apex, a base, and processes.", h2: "Three sides.", exp: "The arytenoid is a three-sided pyramid sitting on the cricoid lamina." },
  { id: 14, topic: "Arytenoid", src: "Maini · Larynx", q: "The vocal ligament attaches to which arytenoid feature?", opts: ["Muscular process", "Vocal process", "Apex", "Base"], a: 1, h1: "Named for what it holds.", h2: "Not where the muscles attach.", exp: "The vocal ligament attaches to the vocal process of the arytenoid." },
  { id: 15, topic: "Arytenoid", src: "Maini · Larynx", q: "Intrinsic laryngeal muscles attach mainly to the arytenoid's:", opts: ["Vocal process", "Apex", "Muscular process", "Corniculate tip"], a: 2, h1: "Named for what it holds.", h2: "Not the cord process.", exp: "Intrinsic muscles attach to the muscular process of the arytenoid." },
  { id: 16, topic: "Arytenoid", src: "Maini · Larynx", q: "The corniculate cartilages sit:", opts: ["Within the vocal fold", "In the median cricothyroid ligament", "On the cricoid arch", "On the apex of the arytenoids (in the aryepiglottic fold)"], a: 3, h1: "They prolong the arytenoid.", h2: "On top of the pyramid's tip.", exp: "The corniculate cartilages sit on the apices of the arytenoids, enclosed in the aryepiglottic fold." },
  { id: 17, topic: "Epiglottis", src: "Maini · Larynx", q: "The epiglottis is composed of:", opts: ["Elastic cartilage", "Hyaline cartilage", "Fibrocartilage", "Bone"], a: 0, h1: "It must bend and spring back.", h2: "Same tissue as the ear.", exp: "The epiglottis is elastic cartilage." },
  { id: 18, topic: "Epiglottis", src: "Maini · Larynx", q: "During swallowing the epiglottis:", opts: ["Elevates the whole larynx", "Bends back over the laryngeal inlet to help close it", "Opens the rima glottidis", "Tenses the vocal cords"], a: 1, h1: "It guards the airway.", h2: "It folds backward.", exp: "During deglutition the epiglottis bends back over the laryngeal inlet to help keep food out of the airway." },
  { id: 19, topic: "Epiglottis", src: "Maini · Larynx", q: "The name 'epiglottis' reflects that it is:", opts: ["The largest cartilage", "A paired cartilage", "The lid to the glottis", "Part of the trachea"], a: 2, h1: "Glottis plus a lid.", h2: "Maini's naming hook.", exp: "The epiglottis is the lid over the glottis." },
  { id: 20, topic: "Epiglottis", src: "Maini · Larynx", q: "The shallow depressions between the glossoepiglottic folds, where food can lodge, are the:", opts: ["Piriform recesses", "Ventricles", "Saccules", "Valleculae"], a: 3, h1: "Between the epiglottis-to-tongue folds.", h2: "The word starts with a V.", exp: "The valleculae lie between the median and lateral glossoepiglottic folds." },
  { id: 21, topic: "Membranes", src: "Maini · Larynx", q: "Maini's rule: an EXTRINSIC laryngeal ligament connects the larynx to:", opts: ["A non-laryngeal structure", "Two laryngeal cartilages", "The vocal process", "The conus elasticus"], a: 0, h1: "Extrinsic reaches outside.", h2: "For example, to the trachea or hyoid.", exp: "Extrinsic ligaments connect the larynx to a NON-laryngeal structure; intrinsic ones link laryngeal parts." },
  { id: 22, topic: "Membranes", src: "Maini · Larynx", q: "The SUPERIOR border of the quadrangular membrane forms the:", opts: ["Vestibular ligament", "Aryepiglottic ligament (fold)", "Vocal ligament", "Cricotracheal ligament"], a: 1, h1: "It runs arytenoid to epiglottis along the top.", h2: "Same name as the fold at the inlet's side.", exp: "The superior border of the quadrangular membrane is the aryepiglottic ligament / fold." },
  { id: 23, topic: "Membranes", src: "Maini · Larynx", q: "The INFERIOR border of the quadrangular membrane forms the:", opts: ["Aryepiglottic ligament", "Vocal ligament", "Vestibular ligament (false cord)", "Median cricothyroid ligament"], a: 2, h1: "The false cord.", h2: "It lies above the true cord.", exp: "The inferior border of the quadrangular membrane is the vestibular ligament (the false vocal cord)." },
  { id: 24, topic: "Membranes", src: "Maini · Larynx", q: "The conus elasticus is made of the vocal ligaments plus the:", opts: ["Thyrohyoid and hyoepiglottic ligaments", "Aryepiglottic and quadrangular membranes", "Cricotracheal and thyroepiglottic ligaments", "Median and lateral cricothyroid ligaments"], a: 3, h1: "Two cricothyroid ligaments.", h2: "A cone from the cricoid up to the cords.", exp: "The conus elasticus = the median cricothyroid ligament + the vocal ligaments + the lateral cricothyroid ligaments." },
  { id: 25, topic: "Folds", src: "Maini · Larynx", q: "The vestibular folds are also called the:", opts: ["False vocal cords", "True vocal cords", "Aryepiglottic folds", "Glossoepiglottic folds"], a: 0, h1: "Not the ones that phonate.", h2: "They sit above the true cords.", exp: "The vestibular folds are the false vocal cords." },
  { id: 26, topic: "Folds", src: "Maini · Larynx", q: "A key difference: the vocal folds are mobile, whereas the vestibular folds:", opts: ["Are lined by cartilage", "Have no muscle and are not normally mobile", "Produce the voice", "Open the airway"], a: 1, h1: "Muscles act on the true cords.", h2: "The false cords just sit there.", exp: "Vocal folds are moved by muscles (abduct/adduct); vestibular folds have no muscle and are not normally mobile." },
  { id: 27, topic: "Folds", src: "Maini · Larynx", q: "In Maini's guitar-string analogy, what changes the tension in the vocal 'string'?", opts: ["The epiglottis tilting", "The hyoid rising", "Movement of the arytenoid cartilage", "The cricoid ring closing"], a: 2, h1: "The cord runs to this cartilage.", h2: "It slides to tune the string.", exp: "Movement of the arytenoid changes the tension in the vocal cord, altering the voice." },
  { id: 28, topic: "Folds", src: "Maini · Larynx", q: "Within each vocal fold, the two muscles are arranged as:", opts: ["Vocalis lateral, thyroarytenoid medial", "Cricothyroid lateral, vocalis medial", "Posterior cricoarytenoid lateral, vocalis medial", "Thyroarytenoid lateral, vocalis medial"], a: 3, h1: "Vocalis is the innermost.", h2: "Thyroarytenoid is more lateral.", exp: "Thyroarytenoid lies laterally and vocalis medially within the vocal fold." },
  { id: 29, topic: "Cavity", src: "Maini · Larynx", q: "The vestibule of the larynx lies between:", opts: ["The laryngeal inlet and the vestibular folds", "The vestibular and vocal folds", "The vocal folds and the cricoid", "The two arytenoids"], a: 0, h1: "The topmost part.", h2: "Down to the false cords.", exp: "The vestibule runs from the laryngeal inlet to the vestibular folds." },
  { id: 30, topic: "Cavity", src: "Maini · Larynx", q: "The laryngeal ventricle is the space between:", opts: ["The inlet and the vestibular folds", "The vestibular folds and the vocal folds", "The vocal folds and the trachea", "The epiglottis and the tongue"], a: 1, h1: "The narrow middle recess.", h2: "Between the false and true cords.", exp: "The ventricle is the narrow space between the vestibular and vocal folds." },
  { id: 31, topic: "Cavity", src: "Maini · Larynx", q: "The saccule (anterior extension of the ventricle) functions to:", opts: ["Open the airway", "Tense the vocal cords", "Secrete mucus that lubricates the vocal cords", "Sense pitch"], a: 2, h1: "It is full of glands.", h2: "It keeps the cords from drying.", exp: "The saccule's mucous glands secrete mucus that lubricates the vocal cords." },
  { id: 32, topic: "Cavity", src: "Maini · Larynx", q: "The rima glottidis is the space between the:", opts: ["Two vestibular folds", "Epiglottis and arytenoids", "Aryepiglottic folds", "Two vocal folds (the actual glottis)"], a: 3, h1: "Between the true cords.", h2: "Maini's 'actual glottis.'", exp: "The rima glottidis is the gap between the two vocal folds, the actual glottis (the rima vestibuli is between the vestibular folds)." },
  { id: 33, topic: "Muscles", src: "Maini · Larynx", q: "The chief (or only) TENSOR of the vocal cords is the:", opts: ["Cricothyroid", "Posterior cricoarytenoid", "Thyroarytenoid", "Vocalis"], a: 0, h1: "It pulls the thyroid down and forward.", h2: "External laryngeal nerve.", exp: "The cricothyroid is the chief tensor; it lengthens and stretches the cords to change pitch." },
  { id: 34, topic: "Muscles", src: "Maini · Larynx", q: "The SOLE ABDUCTOR of the vocal cords (the only opener of the rima glottidis) is the:", opts: ["Lateral cricoarytenoid", "Posterior cricoarytenoid", "Transverse arytenoid", "Cricothyroid"], a: 1, h1: "If both are paralyzed the airway shuts.", h2: "The posterior one.", exp: "The posterior cricoarytenoid is the only abductor; it opens the rima glottidis." },
  { id: 35, topic: "Muscles", src: "Maini · Larynx", q: "The transverse and oblique arytenoid muscles:", opts: ["Tense the cords", "Abduct the cords", "Adduct the cords (close the rima glottidis)", "Elevate the larynx"], a: 2, h1: "They run between the two arytenoids.", h2: "They close the gap.", exp: "The transverse and oblique arytenoids adduct the vocal cords, closing the rima glottidis." },
  { id: 36, topic: "Muscles", src: "Maini · Larynx", q: "The thyroarytenoid and vocalis muscles act to:", opts: ["Abduct the cords", "Tense the cords", "Elevate the larynx", "Slacken / relax the vocal folds"], a: 3, h1: "Opposite of the cricothyroid.", h2: "They shorten the cords.", exp: "The thyroarytenoid and vocalis slacken (relax) the vocal folds." },
  { id: 37, topic: "Innervation", src: "Maini · Larynx", q: "All intrinsic laryngeal muscles are ultimately innervated by the:", opts: ["Vagus nerve (CN X)", "Glossopharyngeal nerve", "Hypoglossal nerve", "Facial nerve"], a: 0, h1: "Arches 4 and 6.", h2: "The tenth cranial nerve.", exp: "All intrinsic laryngeal muscles are supplied by the vagus (CN X)." },
  { id: 38, topic: "Innervation", src: "Maini · Larynx", q: "The one intrinsic muscle NOT supplied by the recurrent laryngeal nerve is the:", opts: ["Posterior cricoarytenoid", "Cricothyroid (external laryngeal nerve)", "Vocalis", "Lateral cricoarytenoid"], a: 1, h1: "The tensor is the exception.", h2: "External laryngeal nerve.", exp: "The cricothyroid is the exception, supplied by the external laryngeal nerve; all others are recurrent laryngeal." },
  { id: 39, topic: "Innervation", src: "Maini · Larynx", q: "The internal laryngeal nerve is:", opts: ["Motor to all adductors", "Motor to the cricothyroid", "Purely sensory, supplying mucosa down to the vocal folds", "Sensory only below the cords"], a: 2, h1: "It pierces the thyrohyoid membrane.", h2: "Sensory, above the cords.", exp: "The internal laryngeal nerve is purely sensory (GSA), supplying mucosa down to the level of the vocal folds." },
  { id: 40, topic: "Innervation", src: "Maini · Larynx", q: "Sensation BELOW the vocal folds is carried by the:", opts: ["Internal laryngeal nerve", "External laryngeal nerve", "Superior laryngeal nerve", "Recurrent laryngeal nerve"], a: 3, h1: "The same nerve that supplies most muscles.", h2: "Below the cords.", exp: "The recurrent laryngeal nerve supplies sensation below the vocal folds (internal laryngeal is above)." },
  { id: 41, topic: "Blood", src: "Maini · Larynx", q: "The superior laryngeal artery is a branch of the:", opts: ["Superior thyroid artery", "Inferior thyroid artery", "Thyrocervical trunk", "Internal carotid artery"], a: 0, h1: "It follows the superior thyroid.", h2: "It supplies the upper half.", exp: "The superior laryngeal artery branches from the superior thyroid artery." },
  { id: 42, topic: "Blood", src: "Maini · Larynx", q: "The superior thyroid artery itself arises from the:", opts: ["Subclavian artery", "External carotid artery", "Internal carotid artery", "Thyrocervical trunk"], a: 1, h1: "The internal carotid gives no neck branches.", h2: "The external one.", exp: "The superior thyroid artery is a branch of the external carotid artery." },
  { id: 43, topic: "Blood", src: "Maini · Larynx", q: "The inferior laryngeal artery is a branch of the:", opts: ["Superior thyroid artery", "External carotid artery", "Inferior thyroid artery", "Superior laryngeal artery"], a: 2, h1: "It mirrors the superior pair.", h2: "It supplies the lower half.", exp: "The inferior laryngeal artery branches from the inferior thyroid artery." },
  { id: 44, topic: "Blood", src: "Maini · Larynx", q: "The inferior thyroid artery arises from the:", opts: ["External carotid artery", "Aortic arch", "Superior thyroid artery", "Thyrocervical trunk (of the subclavian)"], a: 3, h1: "A trunk off the subclavian.", h2: "The thyrocervical trunk.", exp: "The inferior thyroid artery arises from the thyrocervical trunk of the subclavian artery." },
  { id: 45, topic: "Clinical", src: "Maini · Larynx", q: "A patient can speak but cannot vary pitch (monotonous voice). The lesion is the:", opts: ["Cricothyroid / external laryngeal nerve", "Posterior cricoarytenoid", "Recurrent laryngeal nerve", "Internal laryngeal nerve"], a: 0, h1: "The pitch / tensor muscle.", h2: "External laryngeal nerve.", exp: "A monotonous voice follows cricothyroid (external laryngeal nerve) palsy, the pitch-changing tensor." },
  { id: 46, topic: "Clinical", src: "Maini · Larynx", q: "Damage to the internal laryngeal nerve most directly causes:", opts: ["A monotonous voice", "Loss of the gag reflex above the cords, with aspiration risk", "Complete airway closure", "Inability to adduct the cords"], a: 1, h1: "It is sensory above the cords.", h2: "No sensation means no reflex.", exp: "Internal laryngeal nerve damage abolishes the gag / cough reflex above the cords, raising the risk of aspiration." },
  { id: 47, topic: "Clinical", src: "Maini · Larynx", q: "Bilateral paralysis of the posterior cricoarytenoid muscles causes:", opts: ["A hoarse but safe voice", "Monotone speech only", "Cords stuck adducted, the airway cannot open (asphyxia)", "Loss of taste"], a: 2, h1: "The only abductor, times two.", h2: "The airway can't open.", exp: "With both abductors gone, the cords stay adducted, the rima cannot open, and the patient can asphyxiate." },
  { id: 48, topic: "Clinical", src: "Maini · Larynx", q: "In thyroidectomy, the RECURRENT laryngeal nerve is most at risk near the:", opts: ["Superior thyroid artery", "External carotid artery", "Thyrohyoid membrane", "Inferior thyroid artery"], a: 3, h1: "It pairs with the inferior artery.", h2: "The external laryngeal pairs with the superior artery.", exp: "The recurrent laryngeal nerve runs close to the inferior thyroid artery (the external laryngeal nerve pairs with the superior thyroid artery)." },
];

/* =============================================================== STYLES ==== */
const css = `
:root{
  --accent:#7c3aed; --accent-deep:#6d28d9; --accent-mid:#8b5cf6; --accent-soft:#c4b5fd;

  --paper:#faf9ff; --card:#ffffff; --line:#ddd0f5;
  --good:#0e7a52; --good-bg:#e7f8ef; --good-line:#bfe6d2;
  --bad:#b42318; --bad-bg:#fdeceb; --bad-line:#f3c6c2;
  --gold:#9a6a2b; --gold-bg:#fffaf0; --gold-line:#ecd6a8;
}
*{box-sizing:border-box}
.fb-root{font-family:'Outfit','SF Pro Text',system-ui,-apple-system,Segoe UI,sans-serif;color:var(--ink);
  background:radial-gradient(880px 420px at 100% -8%, var(--accent-tint), transparent 60%),radial-gradient(680px 360px at -10% 110%, #e4ddf8, transparent 55%),var(--paper);
  min-height:100vh;line-height:1.55;padding:0 0 64px}
.fb-wrap{max-width:900px;margin:0 auto;padding:0 18px}
.serif{font-family:'Fraunces','Iowan Old Style',Georgia,serif}
.hero{padding:30px 0 12px}
.kicker{display:inline-flex;gap:8px;align-items:center;font-size:12px;font-weight:600;letter-spacing:.13em;text-transform:uppercase;color:var(--accent-deep);background:var(--accent-wash);border:1px solid var(--line);padding:6px 12px;border-radius:999px}
.dot{width:7px;height:7px;border-radius:50%;background:var(--accent);box-shadow:0 0 0 3px var(--accent-tint)}
h1.title{font-size:clamp(27px,5vw,43px);line-height:1.05;margin:14px 0 6px;font-weight:600;letter-spacing:-.02em}
h1.title em{font-style:italic;color:var(--accent-mid)}
.subtitle{color:var(--ink-soft);max-width:720px;font-size:15.5px}
.voicenote{color:var(--accent-deep);background:var(--accent-wash);border:1px solid var(--line);border-radius:10px;padding:9px 13px;margin:12px 0 0;font-size:13px;font-weight:500;max-width:720px}
.pill-row{display:flex;flex-wrap:wrap;gap:8px;align-items:center;margin-top:12px}
.pill-date{display:inline-block;font-size:12.5px;font-weight:600;color:var(--accent-deep);background:var(--accent-wash);border:1px solid var(--line);padding:7px 12px;border-radius:999px}
.pill-review{display:inline-block;font-size:11.5px;font-weight:700;letter-spacing:.04em;color:#8a4b00;background:#fff6e6;border:1px solid #f0d49a;padding:7px 12px;border-radius:999px}
.hublink{display:inline-flex;align-items:center;gap:6px;font-size:12.5px;font-weight:600;color:#fff;background:var(--accent);border:none;text-decoration:none;padding:7px 13px;border-radius:999px;box-shadow:0 6px 16px -8px var(--accent)}
.hublink:hover{background:var(--accent-mid)}
.tabbar{position:sticky;top:0;z-index:20;background:rgba(250,249,255,.92);backdrop-filter:blur(10px);border-bottom:1px solid var(--line);margin-top:16px}
.tabs{display:flex;gap:4px;max-width:900px;margin:0 auto;padding:8px 14px;overflow-x:auto}
.tab{flex:0 0 auto;border:none;background:none;font:inherit;font-weight:600;font-size:14.5px;color:var(--ink-soft);padding:9px 15px;border-radius:10px;cursor:pointer;transition:.15s;white-space:nowrap}
.tab:hover{color:var(--accent-deep);background:var(--accent-wash)}
.tab.active{color:#fff;background:var(--accent);box-shadow:0 4px 14px -4px var(--accent)}
.section{padding:24px 0 8px;animation:fade .35s ease}
@keyframes fade{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
.banner{background:linear-gradient(180deg,var(--accent-deep),var(--accent-mid));color:#fff;border-radius:16px;padding:18px 20px;margin:8px 0 16px;box-shadow:0 18px 40px -24px var(--accent-deep)}
.banner .bt{font-family:'Fraunces',Georgia,serif;font-weight:600;font-size:19px;margin-bottom:6px}
.banner p{font-size:13.5px;opacity:.93;margin:4px 0 0}
.coachbar{position:sticky;top:53px;z-index:15;background:linear-gradient(180deg,var(--accent-deep),var(--accent-mid));color:#fff;border-radius:16px;padding:14px 16px;margin:8px 0 16px;box-shadow:0 18px 40px -24px var(--accent-deep)}
.cb-row{display:flex;flex-wrap:wrap;gap:9px;align-items:center}
.cb-btn{border:none;background:rgba(255,255,255,.18);color:#fff;font:inherit;font-weight:700;font-size:13.5px;padding:9px 13px;border-radius:10px;cursor:pointer;transition:.14s;display:inline-flex;align-items:center;gap:6px}
.cb-btn:hover{background:rgba(255,255,255,.30)}

/* ------------------------------------------------- Cram (voiced coach) ---- */
function Cram() {
  const segments = useMemo(() => {
    const segs = [];
    cram.forEach((c, ti) => { c.say.forEach((line) => segs.push({ t: ti, text: line })); });
    return segs;
  }, []);

  const supported = typeof window !== "undefined" && "speechSynthesis" in window;

  const [voices, setVoices] = useState([]);
  const [voiceURI, setVoiceURI] = useState("");
  const [rate, setRate] = useState(1);
  const [cur, setCur] = useState(0);
  const [playing, setPlaying] = useState(false);
  const [paused, setPaused] = useState(false);

  const rateRef = useRef(1);
  const voiceRef = useRef("");
  const playingRef = useRef(false);
  const pausedRef = useRef(false);
  const segRef = useRef(0);
  const tokenRef = useRef(0);
  const cardRefs = useRef([]);

  useEffect(() => { rateRef.current = rate; }, [rate]);
  useEffect(() => { voiceRef.current = voiceURI; }, [voiceURI]);

  useEffect(() => {
    if (!supported) return;
    const load = () => {
      const vs = window.speechSynthesis.getVoices();
      if (vs && vs.length) {
        setVoices(vs);
        setVoiceURI((prev) => {
          if (prev) return prev;
          const pick = (n) => vs.find((v) => (v.name || "").toLowerCase().includes(n));
          const v = pick("ava") || pick("emma") || pick("andrew") || pick("aria") || pick("natural") || pick("google us") || vs.find((x) => /^en/i.test(x.lang)) || vs[0];
          return v ? v.voiceURI : "";
        });
      }
    };
    load();
    window.speechSynthesis.onvoiceschanged = load;
    return () => {
      try { window.speechSynthesis.onvoiceschanged = null; } catch (e) {}
      playingRef.current = false; pausedRef.current = false;
      try { window.speechSynthesis.cancel(); } catch (e) {}
    };
  }, [supported]);

  // keep-alive nudge (Chrome cuts long sessions)
  useEffect(() => {
    if (!supported) return;
    const iv = setInterval(() => {
      if (playingRef.current && !pausedRef.current) { try { window.speechSynthesis.resume(); } catch (e) {} }
    }, 9000);
    return () => clearInterval(iv);
  }, [supported]);

  // auto-scroll the active card into view while playing
  useEffect(() => {
    if (playingRef.current) {
      const el = cardRefs.current[cur];
      if (el && el.scrollIntoView) el.scrollIntoView({ behavior: "smooth", block: "center" });
    }
  }, [cur]);

  const firstSeg = (t) => { for (let i = 0; i < segments.length; i++) if (segments[i].t === t) return i; return 0; };

  const speakFrom = (si) => {
    if (!supported) return;
    const myToken = ++tokenRef.current;
    try { window.speechSynthesis.cancel(); } catch (e) {}
    if (si >= segments.length) {
      playingRef.current = false; pausedRef.current = false;
      setPlaying(false); setPaused(false);
      return;
    }
    segRef.current = si;
    const seg = segments[si];
    setCur(seg.t);
    const u = new SpeechSynthesisUtterance(seg.text);
    u.rate = rateRef.current;
    const v = voices.find((x) => x.voiceURI === voiceRef.current);
    if (v) u.voice = v;
    u.onend = () => {
      if (myToken !== tokenRef.current) return;
      if (playingRef.current && !pausedRef.current) speakFrom(segRef.current + 1);
    };
    try { window.speechSynthesis.speak(u); } catch (e) {}
  };

  const onPlay = () => {
    if (!supported) return;
    if (playingRef.current && !pausedRef.current) {
      try { window.speechSynthesis.pause(); } catch (e) {}
      pausedRef.current = true; setPaused(true); return;
    }
    if (playingRef.current && pausedRef.current) {
      try { window.speechSynthesis.resume(); } catch (e) {}
      pausedRef.current = false; setPaused(false); return;
    }
    playingRef.current = true; pausedRef.current = false;
    setPlaying(true); setPaused(false);
    speakFrom(firstSeg(cur));
  };

  const onStop = () => {
    playingRef.current = false; pausedRef.current = false;
    setPlaying(false); setPaused(false);
    tokenRef.current++;
    try { window.speechSynthesis.cancel(); } catch (e) {}
  };

  const jump = (t) => {
    const nt = Math.max(0, Math.min(cram.length - 1, t));
    setCur(nt);
    if (playingRef.current) { pausedRef.current = false; setPaused(false); speakFrom(firstSeg(nt)); }
    const el = cardRefs.current[nt];
    if (el && el.scrollIntoView) el.scrollIntoView({ behavior: "smooth", block: "center" });
  };

  const onRate = (r) => { setRate(r); rateRef.current = r; if (playingRef.current && !pausedRef.current) speakFrom(segRef.current); };
  const onVoice = (uri) => { setVoiceURI(uri); voiceRef.current = uri; if (playingRef.current && !pausedRef.current) speakFrom(segRef.current); };

  const playLabel = playing && !paused ? "⏸ Pause" : (playing && paused ? "▶ Resume" : "▶ Play walkthrough");

  return (
    <section className="section">
      <div className="banner">
        <div className="bt">⚡ Cram — Maini&apos;s larynx must-knows, in her order</div>
        <p>Cartilages · thyroid · cricoid · arytenoid &amp; small cartilages · epiglottis · membranes &amp; ligaments · folds · cavity &amp; rima · intrinsic muscles · innervation · blood supply · clinical. Hit ▶ Play walkthrough to have it read aloud, hands-free — it highlights and scrolls each topic as it goes. The ⚑ flags are the high-yield hooks.</p>
      </div>

      <div className="coachbar">
        <div className="cb-row">
          <button className="cb-btn play" onClick={onPlay} disabled={!supported}>{playLabel}</button>
          <button className="cb-btn" onClick={() => jump(cur - 1)} disabled={cur === 0}>⏮ Prev</button>
          <button className="cb-btn" onClick={() => jump(cur + 1)} disabled={cur >= cram.length - 1}>Next ⏭</button>
          <button className="cb-btn" onClick={onStop} disabled={!playing}>■ Stop</button>
          <div className="cb-slider">Speed
            <input type="range" min="0.5" max="3" step="0.1" value={rate} onChange={(e) => onRate(parseFloat(e.target.value))} />
            <span>{rate.toFixed(1)}x</span>
          </div>
          {supported && voices.length > 0 && (
            <select className="cb-select" value={voiceURI} onChange={(e) => onVoice(e.target.value)}>
              {voices.map((v) => <option key={v.voiceURI} value={v.voiceURI}>{v.name}</option>)}
            </select>
          )}
        </div>
        <div className="cb-now">
          {supported
            ? <>Now reading: <b>Topic {cur + 1} of {cram.length}</b> — {cram[cur].title}</>
            : "Your browser does not support read-aloud, but every topic below still works as a written cram sheet."}
        </div>
      </div>

      {cram.map((c, i) => (
        <div className={`obj ${playing && cur === i ? "speaking" : ""}`} key={c.n} ref={(el) => { cardRefs.current[i] = el; }}>
          <div className="obj-head">
            <span className="obj-num serif">{c.n}</span>
            <span className="obj-title">{c.title}</span>
            {playing && cur === i && <span className="spk-badge">🔊 reading</span>}
            <span className="src">{c.src}</span>
          </div>
          <ul className="obj-facts">{c.facts.map((f, j) => <li key={j}>{f}</li>)}</ul>
          {c.flag && <div className="objflag">{c.flag}</div>}
        </div>
      ))}
    </section>
  );
}

/* --------------------------------------------------------------- Drill ---- */
function Drill({ bank }) {
  const [idx, setIdx] = useState(0);
  const [answers, setAnswers] = useState({});
  const [hintLevel, setHintLevel] = useState({});
  const [mode, setMode] = useState("study");

  const safeIdx = Math.min(idx, Math.max(0, bank.length - 1));
  const q = bank[safeIdx];

  const score = useMemo(
    () => Object.entries(answers).reduce((n, [id, v]) => {
      const qq = bank.find((x) => x.id === Number(id));
      return n + (qq && v === qq.a ? 1 : 0);
    }, 0),
    [answers, bank]
  );

  if (!bank.length) return <section className="section"><div className="banner"><div className="bt">Drill</div></div></section>;

  const keyMode = mode === "key";
  const sel = answers[q.id];
  const answered = sel !== undefined;
  const hl = hintLevel[q.id] || 0;
  const done = Object.keys(answers).length;

  const select = (i) => {
    if (keyMode) return;
    if (answers[q.id] !== undefined) return;
    setAnswers((p) => ({ ...p, [q.id]: i }));
  };
  const bumpHint = () => setHintLevel((p) => ({ ...p, [q.id]: Math.min((p[q.id] || 0) + 1, 2) }));
  const optClass = (i) => {
    if (keyMode) return i === q.a ? "opt opt-correct" : "opt opt-locked";
    if (!answered) return "opt";
    if (i === q.a) return "opt opt-correct";
    if (i === sel) return "opt opt-wrong";
    return "opt opt-locked";
  };

  return (
    <section className="section">
      <div className="banner">
        <div className="bt">🎯 Drill — {bank.length} questions across the larynx</div>
        <p>Four options, two progressive hints, an explanation, and a lecture source per question. Tap to self-test, or flip to the Answer Key to review.</p>
      </div>

      <div className="drillbar">
        <div className="progress">Question <b>{safeIdx + 1}</b> / {bank.length}{!keyMode && <> · answered <b>{done}</b></>}</div>
        <div className="modetog">
          <button className={mode === "study" ? "on" : ""} onClick={() => setMode("study")}>Study (tap)</button>
          <button className={mode === "key" ? "on" : ""} onClick={() => setMode("key")}>Answer key</button>
        </div>
        {!keyMode && <div className="scorepill">Score {score}/{done || 0}</div>}
      </div>

      <div className="navgrid">
        {bank.map((qq, i) => {
          let cls = "";
          if (keyMode) cls = "ok";
          else { const a = answers[qq.id]; cls = a === undefined ? "" : a === qq.a ? "ok" : "no"; }
          return <button key={qq.id} className={`navbtn ${cls} ${i === safeIdx ? "cur" : ""}`} onClick={() => setIdx(i)}>{i + 1}</button>;
        })}
      </div>

      <div className="qcard">
        <div className="badges"><span className="qtopic">{q.topic}</span><span className="qsrc">{q.src}</span></div>
        <div className="qtext">{q.q}</div>

        {q.opts.map((o, i) => (
          <button key={i} className={optClass(i)} onClick={() => select(i)}>
            <span className="key">{String.fromCharCode(65 + i)}</span><span>{o}</span>
          </button>
        ))}

        {!keyMode && !answered && (
          <>
            <div className="hintrow">
              <button className="ghost" onClick={bumpHint} disabled={hl >= 2}>{hl === 0 ? "Need a hint?" : "Bigger hint"}</button>
            </div>
            {hl >= 1 && <div className="hintbox">💡 {q.h1}</div>}
            {hl >= 2 && <div className="hintbox">🔎 {q.h2}</div>}
          </>
        )}

        {keyMode && <div className="exp keyed"><div className="tag">✦ Answer · {q.src}</div><p>{q.exp}</p></div>}
        {!keyMode && answered && (
          <div className={`exp ${sel === q.a ? "correct" : "incorrect"}`}>
            <div className="tag">{sel === q.a ? "✓ Correct" : "✗ Not quite"} · {q.src}</div>
            <p>{q.exp}</p>
          </div>
        )}

        <div className="navfoot">
          <button className="btn btn-ghost" onClick={() => setIdx(Math.max(0, safeIdx - 1))} disabled={safeIdx === 0}>← Prev</button>
          <button className="btn btn-primary" onClick={() => setIdx(Math.min(bank.length - 1, safeIdx + 1))} disabled={safeIdx >= bank.length - 1}>Next →</button>
        </div>
      </div>
    </section>
  );
}

/* --------------------------------------------------------------- Coach ---- */
const COACH_SYSTEM = `You are Dr. Seema Maini, teaching GA 0202 (Gross Anatomy), running a review of THE LARYNX from your two lectures (The Oral Cavity contd./The Larynx, and The Larynx). Teach ONLY from this content; do not invent cartilages, ligaments, membranes, muscle actions, nerves, arteries, or attachments. Warm and direct; you address students as "guys," constantly check "right?", "does that make sense?", "are we clear?", and you like to ask the student a question back and have them reason it out. Keep answers tight (3-6 sentences) and quiz the student.

CARTILAGES: 9 total = 3 large UNPAIRED (thyroid, cricoid, epiglottis) + 3 smaller PAIRED (arytenoid, corniculate, cuneiform). Hyaline: thyroid, cricoid. Elastic: epiglottis, corniculate, cuneiform. The TRITICEAL cartilage is a trap - it is NOT part of the larynx (it sits in the free border of the thyrohyoid membrane).

THYROID: largest, unpaired, hyaline; two laminae fuse in front = laryngeal prominence (Adam's apple, sharper in males); posteriorly DEFICIENT/incomplete ("necklace with no back"); posterior border = superior horn (up) + inferior horn (down); inferior horn + cricoid = cricothyroid joint; oblique line = sternothyroid + thyrohyoid; linked to hyoid by thyrohyoid membrane, to epiglottis by thyroepiglottic ligament, to arytenoid's vocal process by the vocal ligament.

CRICOID: the ONLY complete ring (you call this "a good exam question"); signet-ring shape - narrow anterior ARCH, broad posterior LAMINA; hyaline; articulates with thyroid (cricothyroid joint) and arytenoid (cricoarytenoid joint); joined to trachea by cricotracheal ligament; its inferior border = lowest limit of the larynx (trachea below).

ARYTENOID: paired, three-sided PYRAMID on the cricoid lamina; base, apex, VOCAL process (holds the vocal ligament) and MUSCULAR process (holds the intrinsic muscles). CORNICULATE = on the APEX of each arytenoid, in the aryepiglottic fold. CUNEIFORM = rod-like, within the aryepiglottic fold/quadrangular membrane.

EPIGLOTTIS: leaf/spoon-shaped ELASTIC cartilage; bends back over the inlet during swallowing; somewhat degenerate in humans (vestibular folds back it up); "the lid to the glottis"; hyoepiglottic ligament to hyoid (extrinsic); glossoepiglottic folds (median + 2 lateral) to tongue; valleculae between them (food lodges there).

MEMBRANES/LIGAMENTS: EXTRINSIC connect larynx to a non-laryngeal structure (thyrohyoid membrane, cricotracheal ligament, hyoepiglottic ligament); INTRINSIC connect laryngeal parts (quadrangular membrane, vocal ligament, conus elasticus). QUADRANGULAR MEMBRANE: epiglottis to arytenoid; SUPERIOR border = aryepiglottic ligament/fold, INFERIOR border = vestibular ligament (false cord). VOCAL ligament = thyroarytenoid ligament. CONUS ELASTICUS = median cricothyroid ligament + vocal ligaments + lateral cricothyroid ligaments; the "lateral cricothyroid ligament" is a misleading name - it attaches to the cricoid below but to the vocal cords above, not to the thyroid.

FOLDS: VESTIBULAR folds = FALSE cords (inferior border of quadrangular membrane) - no muscle, not mobile, but clamp shut by strong spasmodic contraction to block foreign bodies (back-up for the degenerate epiglottis). VOCAL folds = TRUE cords (vocal ligament + mucosa) - mobile, muscles abduct/adduct; lie DEEP to the vestibular folds. Guitar-string analogy: the arytenoid moves to change cord tension. Inside each vocal fold: thyroarytenoid laterally, vocalis medially.

CAVITY: VESTIBULE (inlet to vestibular folds); VENTRICLE (between vestibular and vocal folds; anterior SACCULE has mucous glands that lubricate the cords); INFRAGLOTTIC (vocal folds to inferior border of cricoid). RIMA VESTIBULI (between vestibular folds) vs RIMA GLOTTIDIS (between vocal folds = "your actual glottis"). Inlet: anterior epiglottis, posterior arytenoids + mucosa, lateral aryepiglottic fold. Positions: quiet breathing = rima partly open; forced = wide; phonation = cords approximated to a thin slit that vibrates.

MUSCLES: CRICOTHYROID = chief/only TENSOR (pulls thyroid down/forward, lengthens & stretches cords, changes pitch; origin cricoid arch to inferior horn + lower border of thyroid). POSTERIOR CRICOARYTENOID = SOLE ABDUCTOR (only opener of the rima glottidis; origin posterior cricoid lamina to muscular process). ADDUCTORS = lateral cricoarytenoid + transverse & oblique arytenoids. SLACKENERS = thyroarytenoid + vocalis (within the fold).

INNERVATION: all intrinsic muscles from arches 4 & 6, all motor = VAGUS (CN X), SVE fibers. Superior laryngeal nerve splits: INTERNAL (purely sensory, GSA; pierces thyrohyoid membrane; mucosa DOWN TO the vocal folds) and EXTERNAL (motor SVE to CRICOTHYROID only). RECURRENT laryngeal = motor to ALL other intrinsics + sensory BELOW the cords; terminal part = inferior laryngeal nerve; runs in the tracheoesophageal groove. Exam tip you give: for head & neck muscles don't default to GSE - a pharyngeal-arch muscle is SVE.

BLOOD: superior laryngeal artery = superior thyroid artery = external carotid (upper half); inferior laryngeal artery = inferior thyroid artery = thyrocervical trunk/subclavian (lower half).

CLINICAL: monotonous voice = cricothyroid/external laryngeal palsy (can speak, can't change pitch). Internal laryngeal damage = lost gag reflex + aspiration. Bilateral posterior cricoarytenoid palsy = cords stay adducted, airway can't open, asphyxia ("the muscle important for your patient to live"). Thyroidectomy: external laryngeal nerve runs with the superior thyroid artery; recurrent laryngeal nerve runs with the inferior thyroid artery. Voice change from laryngeal disease = dysphonia.

Open by offering to drill the cartilages (9 = 3+3, and the cricoid "good exam question"), the membranes and conus elasticus, the folds and cavity parts, the intrinsic muscles and their actions, or the nerve supply (external vs recurrent laryngeal). When the student is wrong, name the rule and have them reason it out step by step.`;

function Coach() {
  const [log, setLog] = useState([
    { role: "assistant", content: "Okay guys — the larynx. Two things I always test hard: the cartilage roster (nine total — three unpaired: thyroid, cricoid, epiglottis, and three paired: arytenoid, corniculate, cuneiform), and the intrinsic muscles, especially the posterior cricoarytenoid — the SOLE abductor, the one muscle keeping the airway open, right? Where do you want to start: the cartilages (and why the cricoid 'makes a good question'), the membranes and conus elasticus, the folds and cavity parts, the intrinsic muscle actions, or the nerve supply — external versus recurrent laryngeal?" },
  ]);
  const [input, setInput] = useState("");
  const [busy, setBusy] = useState(false);
  const [err, setErr] = useState("");
  const logRef = useRef(null);

  useEffect(() => { if (logRef.current) logRef.current.scrollTop = logRef.current.scrollHeight; }, [log, busy]);

  const send = async (text) => {
    const msg = (text ?? input).trim();
    if (!msg || busy) return;
    setErr("");
    const next = [...log, { role: "user", content: msg }];
    setLog(next);
    setInput("");
    setBusy(true);
    try {
      const res = await fetch("https://fab-ai.dgync1.workers.dev/", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          model: "claude-sonnet-4-20250514",
          max_tokens: 1000,
          system: COACH_SYSTEM,
          messages: next.map((m) => ({ role: m.role, content: m.content })),
        }),
      });
      const data = await res.json();
      const reply = (data.reply || (data.content || []).filter((b) => b.type === "text").map((b) => b.text).join("\n") || "").trim();
      setLog((p) => [...p, { role: "assistant", content: reply || "Say that again for me?" }]);
    } catch (e) {
      setErr("Could not reach the tutor. If you're running this outside the wrapped app, the API call needs a valid endpoint/key.");
      setLog((p) => p.slice(0, -1).concat({ role: "user", content: msg }));
    } finally {
      setBusy(false);
    }
  };

  const prompts = [
    "Drill me on the 9 cartilages — unpaired, paired, and types",
    "Why does the cricoid 'make a good question'?",
    "Membranes: quadrangular membrane borders and the conus elasticus",
    "The intrinsic muscles — which abducts, which adduct, which tense?",
    "Nerve supply: external vs recurrent laryngeal (and the SVE tip)",
    "Cavity parts and rima vestibuli vs rima glottidis",
  ];

  return (
    <section className="section">
      <div className="banner">
        <div className="bt">🧑‍⚕️ AI Coach — Dr. Maini&apos;s voice</div>
        <p>Grounded in her larynx lectures. It quizzes you and makes you reason step by step instead of guessing.</p>
      </div>

      <div className="coach-pills">
        {prompts.map((p, i) => <button key={i} className="cpill" onClick={() => send(p)}>{p}</button>)}
      </div>

      <div className="chatlog" ref={logRef}>
        {log.map((m, i) => (
          <div key={i} className={`msg ${m.role === "user" ? "user" : "bot"}`}>
            {m.role === "assistant" && <div className="who">Dr. Maini</div>}
            {m.content}
          </div>
        ))}
        {busy && <div className="typing">Dr. Maini is typing…</div>}
      </div>

      <div className="composer">
        <textarea
          value={input}
          placeholder="Ask Dr. Maini… (Enter to send, Shift+Enter for a new line)"
          onChange={(e) => setInput(e.target.value)}
          onKeyDown={(e) => { if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); send(); } }}
        />
        <button className="btn btn-primary" onClick={() => send()} disabled={busy || !input.trim()}>Send</button>
      </div>
      {err && <div className="tinynote" style={{ color: "var(--bad)" }}>{err}</div>}
      <div className="tinynote">Tutor answers are AI-generated in a teaching persona — trust the lecture/slides first if anything ever conflicts.</div>
    </section>
  );
}
