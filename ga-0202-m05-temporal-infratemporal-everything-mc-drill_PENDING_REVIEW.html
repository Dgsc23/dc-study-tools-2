teral boundary."], "source": "L10 · Temporal fossa boundaries", "obj": "Temporal fossa — inferior boundary"}, {"q": "The floor of the temporal fossa is formed by the same four bones that meet at which landmark?", "o": ["Bregma", "Pterion", "Lambda", "Asterion"], "c": 1, "cat": "Temporal Region & Fossa", "r": ["Bregma is the junction of the coronal and sagittal sutures.", "Correct. The parietal, frontal, sphenoid, and temporal bones form the floor — the four bones that meet at pterion.", "Lambda is the parietal–occipital (lambdoid/sagittal) junction.", "Asterion is the parietal–temporal–occipital junction."], "source": "L10 · Temporal fossa floor", "obj": "Temporal fossa — floor / pterion", "hint": "The clinically weak spot overlying the middle meningeal artery."}, {"q": "The temporal fossa is almost entirely occupied by which muscle?", "o": ["Masseter", "Temporalis", "Lateral pterygoid", "Medial pterygoid"], "c": 1, "cat": "Temporal Region & Fossa", "r": ["The masseter lies superficial to the ramus, outside the temporal fossa.", "Correct. Maini: almost all of the fossa is occupied by temporalis, covered by temporal fascia.", "The lateral pterygoid lies in the infratemporal fossa, not the temporal fossa.", "The medial pterygoid occupies the infratemporal fossa (forms its floor)."], "source": "L10 · Temporal fossa contents", "obj": "Temporal fossa — contents"}, {"q": "The superficial temporal artery is best described as which of the following?", "o": ["One of the two terminal branches of the external carotid artery", "A branch of the internal carotid artery", "The terminal branch of the facial artery", "A branch of the maxillary artery"], "c": 0, "cat": "Temporal Region & Fossa", "r": ["Correct. Maini: the superficial temporal is one of the two terminal branches of the external carotid artery.", "It arises from the external carotid, not the internal carotid.", "The facial artery is a separate branch of the external carotid.", "The maxillary artery is the OTHER terminal branch of the external carotid, not its parent."], "source": "L10 · Superficial temporal vessels", "obj": "Superficial temporal artery — origin"}, {"q": "The superficial temporal vein unites with the maxillary vein to form which vein?", "o": ["Pterygoid venous plexus", "Internal jugular vein", "Retromandibular vein", "Facial vein"], "c": 2, "cat": "Temporal Region & Fossa", "r": ["The pterygoid plexus drains INTO the maxillary vein; it is not formed by this union.", "The internal jugular vein is farther downstream.", "Correct. Superficial temporal + maxillary veins form the retromandibular vein.", "The facial vein is later joined by the anterior division of the retromandibular vein."], "source": "L10 · Venous drainage of temporal region", "obj": "Retromandibular vein — formation"}, {"q": "Which structure forms the roof of the infratemporal fossa?", "o": ["Medial pterygoid muscle", "Greater wing of the sphenoid", "Lateral pterygoid plate", "Zygomatic arch"], "c": 1, "cat": "Infratemporal Fossa — Boundaries", "r": ["The medial pterygoid muscle forms the floor.", "Correct. The roof is the inferior surface of the greater wing of the sphenoid — Maini's quiz answer.", "The lateral pterygoid plate is the medial boundary.", "Maini explicitly rejects the zygomatic arch: it cannot be the roof."], "source": "L11 · Maini quiz — roof of infratemporal fossa", "quote": "[Maini] 'Greater wing of the sphenoid is the right answer. Zygomatic arch cannot be the roof.'", "obj": "ITF — roof", "hint": "She rejected the zygomatic arch out loud."}, {"q": "The lateral boundary of the infratemporal fossa is formed by which structure?", "o": ["Posterior surface of the maxilla", "Styloid process", "Ramus of the mandible", "Lateral pterygoid plate"], "c": 2, "cat": "Infratemporal Fossa — Boundaries", "r": ["The posterior surface of the maxilla is the anterior boundary.", "The styloid process is part of the posterior boundary.", "Correct. Laterally the infratemporal fossa is bounded by the ramus of the mandible.", "The lateral pterygoid plate is the medial boundary."], "source": "L10 · ITF boundaries", "obj": "ITF — lateral boundary"}, {"q": "The medial boundary of the infratemporal fossa is formed by which structure?", "o": ["Medial pterygoid muscle", "Ramus of the mandible", "Lateral pterygoid plate of the sphenoid", "Greater wing of the sphenoid"], "c": 2, "cat": "Infratemporal Fossa — Boundaries", "r": ["The medial pterygoid muscle is the floor.", "The ramus of the mandible is the lateral boundary.", "Correct. Medially the fossa is bounded by the lateral pterygoid plate of the sphenoid.", "The greater wing of the sphenoid is the roof."], "source": "L10 · ITF boundaries", "obj": "ITF — medial boundary"}, {"q": "The anterior boundary of the infratemporal fossa is formed by which structure?", "o": ["Tympanic plate", "Lateral pterygoid plate", "Ramus of the mandible", "Posterior surface of the maxilla"], "c": 3, "cat": "Infratemporal Fossa — Boundaries", "r": ["The tympanic plate is part of the posterior boundary.", "The lateral pterygoid plate is the medial boundary.", "The ramus of the mandible is the lateral boundary.", "Correct. The posterior surface of the maxilla forms the anterior boundary."], "source": "L10 · ITF boundaries", "obj": "ITF — anterior boundary"}, {"q": "The posterior boundary of the infratemporal fossa is formed by the tympanic plate, the mastoid process, and which other process?", "o": ["Pterygoid hamulus", "Styloid process", "Coronoid process", "Articular tubercle"], "c": 1, "cat": "Infratemporal Fossa — Boundaries", "r": ["The pterygoid hamulus is the pulley for tensor veli palatini.", "Correct. The styloid process joins the tympanic plate and mastoid process posteriorly.", "The coronoid process is the temporalis insertion on the mandible.", "The articular tubercle is a TMJ feature anterior to the mandibular fossa."], "source": "L10 · ITF boundaries", "obj": "ITF — posterior boundary"}, {"q": "Which muscle forms the floor of the infratemporal fossa?", "o": ["Temporalis", "Medial pterygoid", "Lateral pterygoid", "Masseter"], "c": 1, "cat": "Infratemporal Fossa — Boundaries", "r": ["The temporalis fills the temporal fossa above.", "Correct. Maini's quiz: the medial pterygoid, attached near the angle of the mandible, forms the floor.", "The lateral pterygoid is a content of the fossa, not its floor.", "The masseter lies superficial to the ramus, outside the fossa."], "source": "L11 · Maini quiz — floor of infratemporal fossa", "quote": "[Maini] 'Medial pterygoid ... so medial pterygoid also forms a floor of infratemporal fossa.'", "obj": "ITF — floor", "hint": "The muscle that runs internally to the angle of the mandible."}, {"q": "Which of the following is NOT listed among the contents of the infratemporal fossa?", "o": ["Maxillary artery", "Parotid gland", "Otic ganglion", "Pterygoid venous plexus"], "c": 1, "cat": "Infratemporal Fossa — Contents", "r": ["The maxillary artery and its branches are contents of the fossa.", "Correct. The parotid gland is not an infratemporal fossa content; the maxillary artery merely arises within it more posteriorly.", "The otic ganglion is a content of the infratemporal fossa.", "The pterygoid venous plexus is a content, surrounding the maxillary artery."], "source": "L10 · ITF contents", "obj": "ITF — contents overview"}, {"q": "Chorda tympani is found among the contents of the infratemporal fossa. It is a branch of which nerve?", "o": ["Glossopharyngeal nerve (CN IX)", "Lingual nerve", "Facial nerve (CN VII)", "Mandibular nerve (V3)"], "c": 2, "cat": "Infratemporal Fossa — Contents", "r": ["CN IX supplies the otic ganglion, not the chorda tympani.", "Chorda tympani JOINS the lingual nerve; the lingual nerve is the V3 branch it rides on.", "Correct. Maini stresses that chorda tympani is a branch of the facial nerve, not V3.", "It travels with V3's lingual branch but does not arise from V3."], "source": "L10 · ITF contents / chorda tympani", "quote": "[Maini] 'Is chorda tympani a branch of V3 or not? ... No, it's a branch of facial, good.'", "obj": "Chorda tympani — parent nerve", "hint": "A CN VII fiber hiding in a fossa full of V3 branches."}, {"q": "The inferior alveolar nerve enters the mandible through which opening?", "o": ["Mandibular foramen", "Mental foramen", "Petrotympanic fissure", "Foramen ovale"], "c": 0, "cat": "Infratemporal Fossa — Contents", "r": ["Correct. It enters the ramus through the mandibular foramen, guarded by the lingula.", "The mental foramen is where it EXITS as the mental nerve.", "The petrotympanic fissure transmits the chorda tympani.", "Foramen ovale transmits the whole mandibular nerve (V3)."], "source": "L10/L11 · Inferior alveolar nerve", "obj": "Inferior alveolar nerve — entry", "hint": "The lingula sits right beside the entrance."}, {"q": "Just before entering the mandibular foramen, the inferior alveolar nerve gives off which branch?", "o": ["Buccal nerve", "Nerve to mylohyoid", "Lingual nerve", "Auriculotemporal nerve"], "c": 1, "cat": "Infratemporal Fossa — Contents", "r": ["The buccal nerve is an anterior-division branch of V3.", "Correct. It gives the nerve to mylohyoid (which also supplies the anterior belly of digastric).", "The lingual nerve is a separate branch of the posterior division of V3.", "The auriculotemporal nerve is a separate posterior-division branch."], "source": "L10/L11 · Inferior alveolar nerve", "obj": "Nerve to mylohyoid", "hint": "Same muscle whose artery branches off the inferior alveolar artery."}, {"q": "The four muscles of mastication all develop from which pharyngeal arch and are innervated by which nerve?", "o": ["Second pharyngeal arch; facial nerve (CN VII)", "Second pharyngeal arch; mandibular nerve (V3)", "First pharyngeal arch; mandibular nerve (V3)", "First pharyngeal arch; facial nerve (CN VII)"], "c": 2, "cat": "Muscles of Mastication", "r": ["Second arch and CN VII belong to the muscles of facial expression.", "Wrong arch and wrong nerve for the muscles of mastication.", "Correct. Maini: muscles of mastication are first-arch muscles innervated by V3.", "First arch is right, but the nerve is V3, not the facial nerve."], "source": "L10 · Muscles of mastication overview", "obj": "Muscles of mastication — arch & nerve"}, {"q": "Which single muscle is the prime (sole) retractor of the mandible at the TMJ?", "o": ["Medial pterygoid", "Lateral pterygoid", "Temporalis", "Masseter"], "c": 2, "cat": "Muscles of Mastication", "r": ["The medial pterygoid elevates and protracts.", "The lateral pterygoid protracts and depresses.", "Correct. Maini's rule: temporalis is the only retractor (via its horizontal posterior fibers).", "The masseter elevates and protracts."], "source": "L10/L11 · Maini quiz — prime retractor of TMJ", "quote": "[Maini] 'Temporalis is the retractor. Only retractor.'", "obj": "Temporalis — retraction rule", "hint": "One of her two must-memorize exceptions."}, {"q": "Which single muscle is the prime (sole) depressor of the mandible at the TMJ?", "o": ["Temporalis", "Lateral pterygoid", "Medial pterygoid", "Masseter"], "c": 1, "cat": "Muscles of Mastication", "r": ["The temporalis is the retractor and an elevator.", "Correct. Maini's rule: the lateral pterygoid is the sole depressor (aided by supra-/infrahyoids and gravity).", "The medial pterygoid elevates and protracts.", "The masseter elevates and protracts."], "source": "L10/L11 · Maini quiz — prime depressor of TMJ", "quote": "[Maini] 'Lateral pterygoid is the sole depressor.'", "obj": "Lateral pterygoid — depression rule", "hint": "Her second must-memorize exception."}, {"q": "Elevation of the mandible is produced by the temporalis, masseter, and medial pterygoid — but NOT by which muscle?", "o": ["Medial pterygoid", "Masseter", "Temporalis", "Lateral pterygoid"], "c": 3, "cat": "Muscles of Mastication", "r": ["The medial pterygoid is an elevator.", "The masseter is a powerful elevator.", "The temporalis is a primary elevator (and retractor).", "Correct. The lateral pterygoid is the depressor, so it does not elevate."], "source": "L10 · Muscle actions — elevation", "obj": "Elevation — muscle set"}, {"q": "Protrusion (protraction) of the mandible is produced by the lateral pterygoid, medial pterygoid, and masseter — but NOT by which muscle?", "o": ["Masseter", "Lateral pterygoid", "Medial pterygoid", "Temporalis"], "c": 3, "cat": "Muscles of Mastication", "r": ["The masseter contributes to protraction.", "The lateral pterygoid is a main protractor.", "The medial pterygoid contributes to protraction.", "Correct. The temporalis is a retractor, so it does not protrude the mandible."], "source": "L10 · Muscle actions — protrusion", "quote": "[Maini] 'Temporalis is not a protruder, because it is what? It is a retractor.'", "obj": "Protrusion — muscle set"}, {"q": "The temporalis has two fiber groups: its vertical anterior fibers elevate the mandible, while its horizontal posterior fibers produce which action?", "o": ["Lateral deviation", "Retraction", "Protrusion", "Depression"], "c": 1, "cat": "Muscles of Mastication", "r": ["Lateral deviation is produced by alternating pterygoid action.", "Correct. The horizontally oriented posterior fibers pull the mandible backward (retraction).", "Protrusion is the opposite movement (lateral/medial pterygoid, masseter).", "Depression is produced by the lateral pterygoid."], "source": "L10 · Temporalis fiber orientation", "obj": "Temporalis — fiber directions"}, {"q": "The temporalis muscle inserts onto which part of the mandible?", "o": ["Angle and lateral surface of the ramus", "Medial surface of the ramus below the mandibular foramen", "Pterygoid fovea of the condylar process", "Coronoid process and anterior border of the ramus"], "c": 3, "cat": "Muscles of Mastication", "r": ["The angle and lateral surface of the ramus is the masseter's insertion.", "The medial surface of the ramus is the medial pterygoid's insertion.", "The pterygoid fovea is the lateral pterygoid's insertion.", "Correct. Temporalis inserts on the tip/medial surface of the coronoid process and the anterior border of the ramus."], "source": "L10 · Temporalis insertion", "obj": "Temporalis — insertion"}, {"q": "The masseter originates from the zygomatic arch and the maxillary process of the zygomatic bone and inserts on which part of the mandible?", "o": ["Pterygoid fovea of the condyle", "Medial surface of the ramus", "Coronoid process", "Angle and lateral surface of the ramus"], "c": 3, "cat": "Muscles of Mastication", "r": ["The pterygoid fovea is the lateral pterygoid insertion.", "The medial surface of the ramus is the medial pterygoid insertion.", "The coronoid process is the temporalis insertion.", "Correct. The masseter inserts on the angle and lateral surface of the ramus."], "source": "L10 · Masseter", "obj": "Masseter — attachments"}, {"q": "According to Maini, the masseter and medial pterygoid share the same pair of actions because their fibers run parallel. Those actions are:", "o": ["Depression and retraction", "Elevation and retraction", "Elevation and protraction", "Depression and protraction"], "c": 2, "cat": "Muscles of Mastication", "r": ["Depression is the lateral pterygoid; retraction is the temporalis.", "Retraction is the temporalis, not these two muscles.", "Correct. Maini: the masseter and medial pterygoid only elevate and protract.", "Neither muscle is a depressor."], "source": "L11 · Masseter & medial pterygoid actions", "quote": "[Maini] 'Masseter and medial pterygoid, they only elevate and protract.'", "obj": "Masseter/medial pterygoid — actions"}, {"q": "Besides the pterygoid fovea of the condylar process, the lateral pterygoid inserts onto which two structures?", "o": ["Lingula and mandibular foramen", "Coronoid process and temporal fascia", "Joint capsule and articular disc of the TMJ", "Styloid process and stylomandibular ligament"], "c": 2, "cat": "Muscles of Mastication", "r": ["The lingula region relates to the inferior alveolar nerve and sphenomandibular ligament.", "The coronoid process and temporal fascia relate to the temporalis.", "Correct. The lateral pterygoid attaches to the TMJ joint capsule and articular disc.", "The styloid process and stylomandibular ligament are unrelated to this insertion."], "source": "L10/L11 · Lateral pterygoid insertion", "obj": "Lateral pterygoid — capsule/disc attachment"}, {"q": "The lateral pterygoid originates from the infratemporal surface and greater wing of the sphenoid and from the LATERAL surface of which plate?", "o": ["Pyramidal process of the palatine bone", "Medial pterygoid plate", "Tuberosity of the maxilla", "Lateral pterygoid plate"], "c": 3, "cat": "Muscles of Mastication", "r": ["The pyramidal process of the palatine bone is a medial pterygoid origin.", "The MEDIAL surface of the lateral plate is a medial pterygoid origin.", "The maxillary tuberosity is a medial pterygoid origin.", "Correct. It arises from the lateral surface of the lateral pterygoid plate."], "source": "L10 · Lateral pterygoid origin", "obj": "Lateral pterygoid — origin"}, {"q": "The medial pterygoid originates from the medial surface of the lateral pterygoid plate, the pyramidal process of the palatine bone, and which other structure?", "o": ["Coronoid process", "Zygomatic arch", "Spine of the sphenoid", "Tuberosity of the maxilla"], "c": 3, "cat": "Muscles of Mastication", "r": ["The coronoid process is the temporalis insertion.", "The zygomatic arch is a masseter origin.", "The spine of the sphenoid is the sphenomandibular ligament attachment.", "Correct. The medial pterygoid also arises from the tuberosity of the maxilla."], "source": "L10 · Medial pterygoid origin", "obj": "Medial pterygoid — origin"}, {"q": "Using Maini's 'chair' analogy, the lateral pterygoid pulls the head of the mandible forward while the body drops. This produces which combined result?", "o": ["Elevation only", "Pure lateral deviation", "Retraction with elevation", "Protraction with depression of the mandible"], "c": 3, "cat": "Muscles of Mastication", "r": ["The lateral pterygoid is not an elevator.", "Lateral deviation is the accessory rotation, not the point of the chair analogy.", "That is the opposite of what the lateral pterygoid does.", "Correct. Pulling the head forward (like pulling a chair by its back) drops the body — depression plus protraction."], "source": "L10 · Lateral pterygoid — chair analogy", "obj": "Lateral pterygoid — depression mechanism"}, {"q": "When the mandible is deviated to the RIGHT, what happens at the LEFT temporomandibular joint?", "o": ["The head rotates in place", "The head glides forward (protraction)", "The joint dislocates anteriorly", "The head is retracted"], "c": 1, "cat": "TMJ — Movements & Actions", "r": ["Rotation occurs on the SAME (right) side, not the left.", "Correct. Moving the jaw to the right causes protraction on the left (and rotation on the right) — 'like a door.'", "No dislocation occurs in normal lateral deviation.", "Retraction is not the mechanism of lateral deviation."], "source": "L10 · Lateral (side-to-side) jaw movement", "obj": "TMJ — lateral deviation mechanics", "hint": "Think of opening a door: the far side swings forward."}, {"q": "In the TMJ terminology Maini uses, 'flexion' and 'extension' correspond to which movements?", "o": ["Flexion = retraction; extension = protrusion", "Flexion = depression; extension = elevation", "Flexion = elevation; extension = depression", "Flexion = protrusion; extension = retraction"], "c": 2, "cat": "TMJ — Movements & Actions", "r": ["This mislabels retraction and protrusion as flexion/extension.", "This reverses the correct pairing.", "Correct. Elevation = flexion (joint angle decreases); depression = extension (joint angle increases).", "Protrusion/retraction are gliding movements, not flexion/extension."], "source": "L10/L11 · TMJ movement terminology", "obj": "TMJ — flexion/extension pairing"}, {"q": "Which movements are possible at the temporomandibular joint?", "o": ["Only rotation", "Gliding (protrusion/retraction), rotation, and elevation/depression", "Circumduction and opposition", "Only elevation and depression"], "c": 1, "cat": "TMJ — Movements & Actions", "r": ["The TMJ does more than rotate.", "Correct. Maini lists gliding (forward/back), rotation (side-to-side), and elevation/depression.", "Opposition is a movement of the thumb, not the TMJ.", "This omits the gliding and rotatory components."], "source": "L10 · TMJ movements", "obj": "TMJ — movement repertoire"}, {"q": "What type of joint is the temporomandibular joint?", "o": ["Fibrous (syndesmosis) joint", "Primary cartilaginous joint", "Secondary cartilaginous (symphysis) joint", "Synovial joint"], "c": 3, "cat": "TMJ — Structure & Ligaments", "r": ["A fibrous joint (e.g., a suture) lacks a synovial cavity.", "A primary cartilaginous joint is a synchondrosis (e.g., an epiphyseal plate).", "A secondary cartilaginous joint is a symphysis (e.g., the pubic symphysis).", "Correct. It is synovial, with hyaline articular surfaces, synovial fluid/cavity/membrane, and a fibrous capsule."], "source": "L10 · TMJ classification", "obj": "TMJ — joint type"}, {"q": "Maini describes the TMJ as one of the most mobile and least stable joints — second only to which joint?", "o": ["Atlanto-occipital joint", "Shoulder (glenohumeral) joint", "Elbow joint", "Hip joint"], "c": 1, "cat": "TMJ — Structure & Ligaments", "r": ["The atlanto-occipital joint is quite restricted.", "Correct. The shoulder is THE most mobile/least stable joint; the TMJ is next.", "The elbow is a stable hinge joint.", "The hip is a very stable, weight-bearing joint."], "source": "L10 · TMJ mobility/stability", "obj": "TMJ — stability ranking"}, {"q": "The TMJ is formed between the mandibular fossa of the temporal bone and which part of the mandible?", "o": ["Head of the condylar process", "Lingula", "Angle of the mandible", "Coronoid process"], "c": 0, "cat": "TMJ — Structure & Ligaments", "r": ["Correct. The head of the condylar process articulates with the mandibular fossa.", "The lingula guards the mandibular foramen.", "The angle is the site of masseter/medial pterygoid/stylomandibular attachments.", "The coronoid process is the temporalis insertion."], "source": "L10 · TMJ articulation", "obj": "TMJ — articulating surfaces"}, {"q": "The articular disc of the TMJ divides the joint cavity into which compartments?", "o": ["A superior and an inferior compartment", "No compartments; it is a single cavity", "An anterior and a posterior compartment", "A medial and a lateral compartment"], "c": 0, "cat": "TMJ — Structure & Ligaments", "r": ["Correct. The disc lies in the middle of the cavity, dividing it into superior and inferior compartments.", "The disc does divide the cavity into two compartments.", "The division is superior/inferior, not anterior/posterior.", "The division is superior/inferior, not medial/lateral."], "source": "L10 · TMJ articular disc", "obj": "TMJ — articular disc"}, {"q": "Which bony prominence lies just anterior to the mandibular fossa and helps limit anterior dislocation of the mandibular head?", "o": ["Mastoid process", "Articular tubercle", "Pterygoid hamulus", "Coronoid process"], "c": 1, "cat": "TMJ — Structure & Ligaments", "r": ["The mastoid process lies posteriorly.", "Correct. Maini: the articular tubercle prevents forward dislocation of the mandibular head, to some extent.", "The pterygoid hamulus is a process of the medial pterygoid plate.", "The coronoid process is on the mandible (temporalis insertion)."], "source": "L10 · TMJ — articular tubercle", "obj": "TMJ — articular tubercle"}, {"q": "The sphenomandibular ligament, an extrinsic ligament of the TMJ, attaches from the spine of the sphenoid to which mandibular landmark?", "o": ["Mandibular notch", "Coronoid process", "Angle of the mandible", "Lingula"], "c": 3, "cat": "TMJ — Structure & Ligaments", "r": ["The mandibular notch is one of Maini's listed distractors, not the attachment.", "The coronoid process is the temporalis insertion.", "The angle of the mandible is the stylomandibular ligament's attachment.", "Correct. Maini's frequently-asked item: the sphenomandibular ligament attaches to the lingula."], "source": "L11 · Maini quiz — sphenomandibular ligament", "quote": "[Maini] 'Sphenomandibular ligament ... it is lingula. Because lingula is more internal.'", "obj": "Sphenomandibular ligament", "hint": "A deep/internal attachment — pairs with the deep spine of the sphenoid."}, {"q": "The stylomandibular ligament runs from the styloid process to which part of the mandible?", "o": ["Mental protuberance", "Lingula", "Angle of the mandible", "Head of the condyle"], "c": 2, "cat": "TMJ — Structure & Ligaments", "r": ["The mental protuberance is near the mental nerve, unrelated to this ligament.", "The lingula is the sphenomandibular ligament's attachment.", "Correct. The stylomandibular ligament attaches to the angle of the mandible.", "The head of the condyle relates to the lateral pterygoid and the joint."], "source": "L11 · Stylomandibular ligament", "obj": "Stylomandibular ligament", "hint": "Styloid is external, so it goes to the external angle."}, {"q": "The two extrinsic ligaments that reinforce the TMJ are the stylomandibular ligament and which other ligament?", "o": ["Sphenomandibular ligament", "Pterygospinous ligament", "Pterygomandibular raphe", "Stylohyoid ligament"], "c": 0, "cat": "TMJ — Structure & Ligaments", "r": ["Correct. Maini names two extrinsic ligaments: the sphenomandibular and the stylomandibular.", "The pterygospinous ligament is not one of the TMJ's extrinsic ligaments here.", "The pterygomandibular raphe joins the buccinator and superior constrictor.", "The stylohyoid ligament connects the styloid process to the hyoid bone."], "source": "L10/L11 · TMJ extrinsic ligaments", "obj": "TMJ — two extrinsic ligaments"}, {"q": "The synovial fluid of the TMJ provides lubrication and also serves which other function?", "o": ["Anchoring the articular disc", "Producing red blood cells", "Nourishing the avascular hyaline articular cartilage", "Transmitting motor impulses"], "c": 2, "cat": "TMJ — Structure & Ligaments", "r": ["The disc is anchored by the capsule, ligaments, and lateral pterygoid, not by the fluid.", "Red blood cells are produced in bone marrow, not by synovial fluid.", "Correct. Maini: the hyaline cartilage receives its nutrition from synovial fluid; loss of movement/fluid leads to its destruction.", "Nerves, not synovial fluid, transmit impulses."], "source": "L10 · TMJ — synovial fluid function", "obj": "TMJ — synovial fluid nutrition"}, {"q": "Which nerve is the single best answer for the innervation of the TMJ (Maini's distractors: buccal, lingual, chorda tympani)?", "o": ["Chorda tympani", "Lingual nerve", "Buccal nerve", "Auriculotemporal nerve"], "c": 3, "cat": "TMJ — Structure & Ligaments", "r": ["The chorda tympani carries taste and parasympathetic fibers, not TMJ sensation.", "The lingual nerve supplies the tongue.", "The buccal nerve supplies the cheek.", "Correct. Maini: the auriculotemporal nerve is the best choice for TMJ innervation."], "source": "L11 · Maini quiz — nerve to TMJ", "quote": "[Maini] 'Auriculotemporal ... is the best choice, good.'", "obj": "TMJ — auriculotemporal"}, {"q": "The sensory supply of the TMJ capsule is carried mainly by the auriculotemporal nerve together with which other branches of V3?", "o": ["Lingual and inferior alveolar nerves", "Masseteric and deep temporal nerves", "Chorda tympani and greater petrosal nerves", "Buccal and mental nerves"], "c": 1, "cat": "TMJ — Structure & Ligaments", "r": ["The lingual and inferior alveolar nerves are not the joint's main sensory supply.", "Correct. Maini: auriculotemporal, masseteric, and deep temporal nerves supply the joint.", "The chorda tympani and greater petrosal are facial (CN VII) branches.", "The buccal and mental nerves supply the cheek and chin skin."], "source": "L10 · TMJ innervation", "obj": "TMJ — sensory nerves"}, {"q": "The arterial supply of the TMJ comes from branches of the maxillary artery and which other nearby artery?", "o": ["Superficial temporal artery", "Facial artery", "Lingual artery", "Occipital artery"], "c": 0, "cat": "TMJ — Structure & Ligaments", "r": ["Correct. Maini: the superficial temporal and maxillary arteries, lying in the vicinity, supply the joint.", "The facial artery supplies the face, not the TMJ here.", "The lingual artery supplies the tongue.", "The occipital artery supplies the posterior scalp."], "source": "L10 · TMJ blood supply", "obj": "TMJ — arterial supply"}, {"q": "The maxillary artery is described by Maini as which of the following?", "o": ["The larger of the two terminal branches of the external carotid artery", "A branch of the internal carotid artery", "The smaller terminal branch of the external carotid artery", "The terminal branch of the superficial temporal artery"], "c": 0, "cat": "Maxillary Artery", "r": ["Correct. It is the larger of the two terminal branches of the external carotid artery.", "It arises from the external carotid, not the internal carotid.", "It is the LARGER, not the smaller, terminal branch.", "The superficial temporal is a sibling terminal branch, not its parent."], "source": "L11 · Maxillary artery origin", "obj": "Maxillary artery — origin"}, {"q": "The maxillary artery arises within which gland, behind the neck of the mandible?", "o": ["Submandibular gland", "Sublingual gland", "Thyroid gland", "Parotid gland"], "c": 3, "cat": "Maxillary Artery", "r": ["The submandibular gland lies below the mandible, not at this origin.", "The sublingual gland lies in the floor of the mouth.", "The thyroid gland is in the neck, unrelated to this origin.", "Correct. Like the facial nerve, it is related to the parotid gland at the neck of the mandible."], "source": "L11 · Maxillary artery course", "obj": "Maxillary artery — parotid relation"}, {"q": "The maxillary artery leaves the infratemporal fossa to enter the pterygopalatine fossa through which opening?", "o": ["Pterygomaxillary fissure", "Inferior orbital fissure", "Sphenopalatine foramen", "Foramen rotundum"], "c": 0, "cat": "Maxillary Artery", "r": ["Correct. It passes through the pterygomaxillary fissure into the pterygopalatine fossa.", "The inferior orbital fissure leads into the orbit.", "The sphenopalatine foramen leads into the nasal cavity.", "The foramen rotundum transmits V2 to the middle cranial fossa."], "source": "L11 · Maxillary artery course", "obj": "Maxillary artery — pterygomaxillary fissure"}, {"q": "The maxillary artery terminates as which artery?", "o": ["Sphenopalatine artery", "Middle meningeal artery", "Inferior alveolar artery", "Infraorbital artery"], "c": 3, "cat": "Maxillary Artery", "r": ["The sphenopalatine artery passes to the nasal cavity.", "The middle meningeal artery supplies the dura mater.", "The inferior alveolar artery supplies the mandible and lower teeth.", "Correct. Maini's frequently-asked item: the terminal branch is the infraorbital artery."], "source": "L11 · Maini quiz — terminal branch of maxillary artery", "quote": "[Maini] 'Which one of the following is terminal branch of maxillary artery? That is infraorbital.'", "obj": "Maxillary artery — termination"}, {"q": "Which branch of the maxillary artery enters the cranium through the foramen spinosum to supply the dura mater?", "o": ["Buccal artery", "Middle meningeal artery", "Deep auricular artery", "Inferior alveolar artery"], "c": 1, "cat": "Maxillary Artery", "r": ["The buccal artery supplies the cheek.", "Correct. The middle meningeal artery enters via foramen spinosum and supplies the dura.", "The deep auricular artery supplies structures of the ear.", "The inferior alveolar artery supplies the mandible and teeth."], "source": "L11 · Middle meningeal artery", "obj": "Middle meningeal artery — foramen spinosum"}, {"q": "Rupture of the middle meningeal artery, classically from a fracture at the pterion, produces which type of hemorrhage?", "o": ["Intracerebral hemorrhage", "Subdural hemorrhage", "Extradural (epidural) hemorrhage", "Subarachnoid hemorrhage"], "c": 2, "cat": "Maxillary Artery", "r": ["An intracerebral hemorrhage is bleeding within the brain parenchyma.", "A subdural hemorrhage typically results from torn bridging veins.", "Correct. Maini: middle meningeal rupture causes a temporal-fossa extradural hemorrhage from a pterion fracture.", "A subarachnoid hemorrhage typically results from a ruptured aneurysm."], "source": "L11 · Middle meningeal artery — clinical", "obj": "Middle meningeal — extradural hemorrhage", "hint": "The bone is thinnest at the pterion."}, {"q": "Like the inferior alveolar nerve, the inferior alveolar artery gives off which small branch before entering the mandibular foramen?", "o": ["Lingual branch", "Mylohyoid branch (to mylohyoid)", "Mental branch", "Buccal branch"], "c": 1, "cat": "Maxillary Artery", "r": ["It does not give a lingual branch here.", "Correct. It gives a mylohyoid artery, just as the nerve gives the nerve to mylohyoid.", "The mental branch is its terminal continuation, not a branch given before the foramen.", "It does not give a buccal branch before entering the foramen."], "source": "L11 · Inferior alveolar artery", "obj": "Inferior alveolar artery — mylohyoid branch"}, {"q": "Which pair of maxillary-artery branches, given off in the infratemporal fossa, supply structures of the ear?", "o": ["Deep temporal and pterygoid arteries", "Buccal and masseteric arteries", "Deep auricular and anterior tympanic arteries", "Sphenopalatine and descending palatine arteries"], "c": 2, "cat": "Maxillary Artery", "r": ["The deep temporal and pterygoid arteries supply the temporalis and pterygoid muscles.", "The buccal and masseteric arteries supply the cheek and masseter.", "Correct. The deep auricular and anterior tympanic arteries supply the ear.", "The sphenopalatine and descending palatine are terminal (pterygopalatine-fossa) branches to nose and palate."], "source": "L11 · Maxillary artery branches (ITF)", "obj": "Maxillary artery — auricular/tympanic branches"}, {"q": "Within the pterygopalatine fossa, which branch of the maxillary artery passes medially into the nasal cavity?", "o": ["Sphenopalatine artery", "Posterior superior alveolar artery", "Descending palatine artery", "Infraorbital artery"], "c": 0, "cat": "Maxillary Artery", "r": ["Correct. Maini's frequently-asked item: the sphenopalatine artery passes to the nasal cavity via the sphenopalatine foramen.", "The posterior superior alveolar artery supplies the upper molar teeth.", "The descending palatine artery supplies the palate.", "The infraorbital artery passes into the orbit and onto the face."], "source": "L11 · Maini quiz — artery to nasal cavity", "quote": "[Maini] 'Which artery passes from pterygopalatine fossa to the nasal cavity is sphenopalatine.'", "obj": "Sphenopalatine artery", "hint": "The classic 'artery of epistaxis.'"}, {"q": "The pterygoid venous plexus is a venous network located between which structures, surrounding the maxillary artery?", "o": ["The tensor and levator veli palatini", "The masseter and buccinator", "The temporalis and pterygoid muscles", "The parotid and submandibular glands"], "c": 2, "cat": "Pterygoid Venous Plexus", "r": ["These palatine muscles are not the location of the plexus.", "The masseter and buccinator are not where the plexus is located.", "Correct. Maini: the plexus lies between the temporal and pterygoid muscles.", "The plexus is between muscles, not between these glands."], "source": "L11 · Pterygoid venous plexus", "obj": "Pterygoid plexus — location"}, {"q": "Posteriorly, the pterygoid venous plexus drains primarily into which vein?", "o": ["Internal jugular vein", "Facial vein", "Maxillary vein", "Superficial temporal vein"], "c": 2, "cat": "Pterygoid Venous Plexus", "r": ["The internal jugular vein is farther downstream.", "It also communicates with the facial vein, but its primary posterior drainage is the maxillary vein.", "Correct. Posteriorly the plexus drains into the maxillary vein (which then helps form the retromandibular vein).", "The superficial temporal vein joins the maxillary vein; it is not the plexus's direct drainage."], "source": "L10/L11 · Pterygoid plexus drainage", "obj": "Pterygoid plexus — drainage"}, {"q": "Why is the pterygoid venous plexus clinically important as a route for the spread of infection?", "o": ["It communicates with the cavernous sinus and with the facial vein", "It drains directly into the carotid artery", "It connects the middle ear to the mastoid air cells", "It has valves that trap emboli in the orbit"], "c": 0, "cat": "Pterygoid Venous Plexus", "r": ["Correct. Maini: the plexus communicates with the cavernous sinus and the facial (deep facial) vein, so facial infection can spread to the cavernous sinus.", "Veins do not drain into arteries.", "That describes a different (aditus/antrum) pathway, not the pterygoid plexus.", "These veins are valveless, which is precisely why infection can spread."], "source": "L11 · Pterygoid plexus — clinical", "obj": "Pterygoid plexus — cavernous sinus link", "hint": "Ties into the 'danger area' of the face."}, {"q": "The mandibular nerve (V3) exits the skull through which foramen?", "o": ["Foramen rotundum", "Foramen spinosum", "Superior orbital fissure", "Foramen ovale"], "c": 3, "cat": "Mandibular Nerve (V3)", "r": ["The foramen rotundum transmits the maxillary nerve (V2).", "The foramen spinosum transmits the middle meningeal artery.", "The superior orbital fissure transmits V1 and CNs III, IV, and VI.", "Correct. V3 passes through foramen ovale ('ovale' = oval, matching the more oval V3)."], "source": "L11 · Mandibular nerve — foramen", "quote": "[Maini] 'V3 passes through foramen ovale ... V2 passes through foramen rotundum. Rotundum means round.'", "obj": "V3 — foramen ovale"}, {"q": "Functionally, the mandibular nerve (V3) is which of the following?", "o": ["Purely motor", "A mixed nerve carrying both sensory and motor fibers", "Purely sensory", "Purely parasympathetic"], "c": 1, "cat": "Mandibular Nerve (V3)", "r": ["V3 carries sensory fibers too, so it is not purely motor.", "Correct. V3 is a mixed nerve; unlike V1 and V2, it carries motor fibers as well as sensory.", "V1 and V2 are purely sensory, but V3 is not.", "V3 is not a parasympathetic nerve, though parasympathetic fibers hitch-hike on its branches."], "source": "L11 · V3 — fiber types", "obj": "V3 — mixed nerve"}, {"q": "After exiting foramen ovale, V3 descends between which two structures before dividing?", "o": ["Temporalis and temporal fascia", "Medial and lateral pterygoid muscles", "Tensor veli palatini (medially) and lateral pterygoid (laterally)", "Masseter and ramus of the mandible"], "c": 2, "cat": "Mandibular Nerve (V3)", "r": ["It does not run between the temporalis and its fascia.", "It lies deep to the lateral pterygoid, not sandwiched between the two pterygoids.", "Correct. Maini: V3 descends between tensor veli palatini medially and lateral pterygoid laterally, so it lies deep to the lateral pterygoid.", "It does not run between the masseter and the ramus."], "source": "L11 · V3 — relations", "obj": "V3 — relation to lateral pterygoid"}, {"q": "Which branch arises from the MAIN TRUNK of V3 (before the anterior/posterior split), along with the meningeal branch?", "o": ["Nerve to medial pterygoid", "Auriculotemporal nerve", "Buccal nerve", "Nerve to masseter"], "c": 0, "cat": "Mandibular Nerve (V3)", "r": ["Correct. Maini: the trunk gives the meningeal branch and the nerve to medial pterygoid.", "The auriculotemporal nerve is from the posterior division.", "The buccal nerve is from the anterior division.", "The nerve to masseter (masseteric) is from the anterior division."], "source": "L11 · V3 — trunk branches", "obj": "V3 — trunk branches"}, {"q": "The anterior division of V3 is largely motor. Which of its branches is the one SENSORY branch?", "o": ["Buccal nerve", "Nerve to masseter", "Deep temporal nerves", "Nerve to lateral pterygoid"], "c": 0, "cat": "Mandibular Nerve (V3)", "r": ["Correct. The (long) buccal nerve of V3 is sensory to the cheek; the rest of the anterior division is motor.", "The nerve to masseter is motor.", "The deep temporal nerves are motor (to temporalis).", "The nerve to lateral pterygoid is motor."], "source": "L11 · V3 anterior division", "obj": "V3 anterior division — sensory buccal", "hint": "Don't confuse this sensory buccal with the motor buccal branch of the facial nerve."}, {"q": "The three named branches of the POSTERIOR division of V3 are the inferior alveolar, the lingual, and which nerve?", "o": ["Auriculotemporal nerve", "Buccal nerve", "Deep temporal nerve", "Masseteric nerve"], "c": 0, "cat": "Mandibular Nerve (V3)", "r": ["Correct. The posterior division gives the auriculotemporal, lingual, and inferior alveolar nerves.", "The buccal nerve is from the anterior division.", "The deep temporal nerves are from the anterior division.", "The masseteric nerve is from the anterior division."], "source": "L11 · V3 posterior division", "obj": "V3 posterior division — branches"}, {"q": "Which nerve is identified by the fact that the middle meningeal artery pierces (passes between its two roots) it?", "o": ["Lingual nerve", "Inferior alveolar nerve", "Auriculotemporal nerve", "Buccal nerve"], "c": 2, "cat": "Mandibular Nerve (V3)", "r": ["The lingual nerve is not pierced by the middle meningeal artery.", "The inferior alveolar nerve is not pierced by the artery.", "Correct. Maini: the auriculotemporal nerve forms a 'buttonhole' through which the middle meningeal artery passes — a reliable identifier.", "The buccal nerve is not pierced by the artery."], "source": "L11 · Auriculotemporal nerve — identifying feature", "quote": "[Maini] 'Anytime you look at a nerve which has a passage ... it's auriculotemporal, because it is pierced by middle meningeal artery.'", "obj": "Auriculotemporal — two roots"}, {"q": "The inferior alveolar nerve continues within the mandible and exits the mental foramen as which nerve, supplying the chin and lower lip?", "o": ["Nerve to mylohyoid", "Lingual nerve", "Buccal nerve", "Mental nerve"], "c": 3, "cat": "Mandibular Nerve (V3)", "r": ["The nerve to mylohyoid is a motor branch given off earlier.", "The lingual nerve supplies the tongue.", "The buccal nerve supplies the cheek.", "Correct. The mental nerve is the terminal continuation of the inferior alveolar nerve."], "source": "L11 · Inferior alveolar to mental nerve", "obj": "Mental nerve"}, {"q": "In addition to general sensation from the ear and temple, the auriculotemporal nerve carries which fibers to the parotid gland?", "o": ["Postganglionic parasympathetic fibers (relayed in the otic ganglion)", "Special sensory (taste) fibers", "Preganglionic parasympathetic fibers", "Only sympathetic fibers to sweat glands"], "c": 0, "cat": "Mandibular Nerve (V3)", "r": ["Correct. It delivers postganglionic parasympathetic (secretomotor) fibers, which synapsed in the otic ganglion, to the parotid.", "The auriculotemporal nerve does not carry taste fibers.", "The preganglionic fibers synapse in the otic ganglion first; the auriculotemporal carries the postganglionic ones.", "The emphasized fibers are the parasympathetic secretomotor supply, not sympathetic sweat fibers."], "source": "L10/L11 · Auriculotemporal — parotid secretomotor", "obj": "Auriculotemporal — parotid parasympathetics"}, {"q": "The auriculotemporal nerve, which carries sensation from the external ear and temporal region, is a branch of which nerve?", "o": ["Mandibular nerve (V3)", "Maxillary nerve (V2)", "Glossopharyngeal nerve (CN IX)", "Facial nerve (CN VII)"], "c": 0, "cat": "Mandibular Nerve (V3)", "r": ["Correct. Maini: the auriculotemporal nerve is a branch of V3.", "V2 is the maxillary (sensory) division, not the parent of the auriculotemporal nerve.", "CN IX supplies the otic ganglion's preganglionic fibers, not the auriculotemporal nerve.", "The facial nerve supplies the muscles of facial expression, not this sensory branch."], "source": "L10 · Auriculotemporal nerve — parent", "obj": "Auriculotemporal — V3 branch"}, {"q": "Before it is joined by the chorda tympani, the lingual nerve carries which fibers?", "o": ["Parasympathetic fibers to the parotid", "Taste (SVA) fibers from the anterior two-thirds", "Motor fibers to the tongue muscles", "General sensory (GSA) fibers from the anterior two-thirds of the tongue"], "c": 3, "cat": "Lingual Nerve & Chorda Tympani", "r": ["Parotid parasympathetics travel with CN IX and the auriculotemporal nerve.", "Taste (SVA) is added only after the chorda tympani joins it.", "Motor supply to the tongue muscles is from CN XII.", "Correct. On its own the lingual nerve carries GSA (general sensation) from the anterior two-thirds of the tongue."], "source": "L11 · Lingual nerve — fibers", "obj": "Lingual nerve — GSA"}, {"q": "The chorda tympani, a branch of the facial nerve, exits the skull to reach the lingual nerve through which opening?", "o": ["Foramen ovale", "Sphenopalatine foramen", "Petrotympanic fissure", "Stylomastoid foramen"], "c": 2, "cat": "Lingual Nerve & Chorda Tympani", "r": ["The foramen ovale transmits V3.", "The sphenopalatine foramen leads to the nasal cavity.", "Correct. The chorda tympani exits through the petrotympanic fissure and joins the lingual nerve.", "The stylomastoid foramen transmits the main trunk of the facial nerve."], "source": "L11 · Chorda tympani — course", "obj": "Chorda tympani — petrotympanic fissure"}, {"q": "The chorda tympani carries which two functional fiber types?", "o": ["General sensation from the tongue and motor fibers to it", "Taste (SVA) from the anterior two-thirds of the tongue and preganglionic parasympathetic fibers", "Preganglionic sympathetic and postganglionic parasympathetic fibers", "Taste from the posterior third and postganglionic sympathetic fibers"], "c": 1, "cat": "Lingual Nerve & Chorda Tympani", "r": ["General sensation is the lingual nerve's own role; the tongue's motor supply is CN XII.", "Correct. Maini: (1) SVA taste from the anterior two-thirds and (2) preganglionic parasympathetic fibers to the submandibular ganglion.", "The chorda tympani carries parasympathetic (preganglionic), not sympathetic, autonomic fibers.", "The posterior third is supplied by CN IX, and these are not sympathetic fibers."], "source": "L11 · Chorda tympani — functions", "obj": "Chorda tympani — SVA + preganglionic parasympathetic"}, {"q": "The preganglionic parasympathetic fibers of the chorda tympani synapse in which ganglion?", "o": ["Submandibular ganglion", "Pterygopalatine ganglion", "Otic ganglion", "Ciliary ganglion"], "c": 0, "cat": "Lingual Nerve & Chorda Tympani", "r": ["Correct. The chorda tympani's parasympathetic fibers synapse in the submandibular ganglion.", "The pterygopalatine ganglion is supplied by the greater petrosal nerve (CN VII).", "The otic ganglion is supplied by CN IX and serves the parotid.", "The ciliary ganglion is supplied by CN III and serves the eye."], "source": "L11 · Submandibular ganglion", "obj": "Submandibular ganglion — chorda tympani"}, {"q": "After the chorda tympani joins it, the lingual nerve delivers postganglionic parasympathetic fibers (via the submandibular ganglion) to which glands?", "o": ["Submandibular and sublingual salivary glands", "Parotid gland only", "Palatine glands", "Lacrimal and nasal glands"], "c": 0, "cat": "Lingual Nerve & Chorda Tympani", "r": ["Correct. Via the submandibular ganglion, the fibers reach the submandibular and sublingual glands.", "The parotid gland is served by the otic ganglion (CN IX).", "The palatine glands are served by the pterygopalatine ganglion.", "The lacrimal and nasal glands are served by the pterygopalatine ganglion (CN VII, greater petrosal)."], "source": "L11 · Submandibular ganglion targets", "obj": "Submandibular ganglion — targets"}, {"q": "The otic ganglion, a parasympathetic ganglion of the infratemporal fossa, provides secretomotor fibers to which gland?", "o": ["Parotid gland", "Submandibular gland", "Lacrimal gland", "Sublingual gland"], "c": 0, "cat": "Otic Ganglion", "r": ["Correct. Maini's mnemonic: otic ganglion goes with the parotid ('it rhymes').", "The submandibular gland is served by the submandibular ganglion.", "The lacrimal gland is served by the pterygopalatine ganglion.", "The sublingual gland is served by the submandibular ganglion."], "source": "L10/L11 · Otic ganglion", "obj": "Otic ganglion — parotid", "hint": "Otic = near the ear, like the parotid in front of the ear."}, {"q": "Preganglionic parasympathetic fibers reaching the otic ganglion are carried by which cranial nerve?", "o": ["Facial nerve (CN VII)", "Oculomotor nerve (CN III)", "Glossopharyngeal nerve (CN IX)", "Vagus nerve (CN X)"], "c": 2, "cat": "Otic Ganglion", "r": ["CN VII supplies the pterygopalatine and submandibular ganglia.", "CN III supplies the ciliary ganglion.", "Correct. CN IX carries the preganglionic parasympathetic fibers to the otic ganglion.", "CN X supplies thoracic and abdominal viscera, not the otic ganglion."], "source": "L11 · Otic ganglion — CN IX", "obj": "Otic ganglion — glossopharyngeal input"}, {"q": "The preganglionic parasympathetic cell bodies for the otic ganglion (via CN IX) are located in which nucleus?", "o": ["Dorsal motor nucleus of the vagus", "Superior salivatory nucleus of the medulla", "Edinger-Westphal nucleus of the midbrain", "Inferior salivatory nucleus of the medulla"], "c": 3, "cat": "Otic Ganglion", "r": ["The dorsal motor nucleus of the vagus belongs to CN X.", "The superior salivatory nucleus belongs to CN VII.", "The Edinger-Westphal nucleus belongs to CN III.", "Correct. Maini: the inferior salivatory nucleus houses these CN IX preganglionic neurons."], "source": "L11 · Otic ganglion — inferior salivatory nucleus", "obj": "Otic ganglion — preganglionic origin"}, {"q": "After the otic ganglion, the postganglionic parasympathetic fibers hitch-hike on which nerve to reach the parotid gland?", "o": ["Lingual nerve", "Auriculotemporal nerve", "Greater petrosal nerve", "Chorda tympani"], "c": 1, "cat": "Otic Ganglion", "r": ["The lingual nerve serves the submandibular and sublingual glands.", "Correct. Postganglionic fibers from the otic ganglion travel on the auriculotemporal nerve (a V3 branch) to the parotid.", "The greater petrosal nerve leads to the pterygopalatine ganglion.", "The chorda tympani carries preganglionic fibers to the submandibular ganglion."], "source": "L11 · Otic ganglion pathway", "obj": "Otic ganglion to auriculotemporal to parotid"}, {"q": "The tympanic nerve (a branch of CN IX) forms the tympanic plexus, which continues as which nerve to reach the otic ganglion?", "o": ["Greater petrosal nerve", "Deep petrosal nerve", "Nerve of the pterygoid canal", "Lesser petrosal nerve"], "c": 3, "cat": "Otic Ganglion", "r": ["The greater petrosal nerve (CN VII) leads to the pterygopalatine ganglion.", "The deep petrosal nerve carries sympathetic fibers from the internal carotid plexus.", "The nerve of the pterygoid canal is formed by the greater plus deep petrosal nerves.", "Correct. Maini: tympanic nerve then tympanic plexus then lesser petrosal nerve then otic ganglion."], "source": "L11 · Otic ganglion — lesser petrosal nerve", "obj": "Lesser petrosal nerve"}, {"q": "Within the infratemporal fossa, the otic ganglion lies in which position relative to the mandibular nerve (V3)?", "o": ["Inside the parotid gland", "Superficial (lateral) to V3", "Within the TMJ capsule", "Deep (medial) to V3, just below foramen ovale"], "c": 3, "cat": "Otic Ganglion", "r": ["It is associated with, but not inside, the parotid gland.", "It lies deep to V3, not superficial to it.", "It is not located within the TMJ capsule.", "Correct. Maini: the otic ganglion lies deep to the mandibular nerve, so it is hidden by V3."], "source": "L11 · Otic ganglion — position", "obj": "Otic ganglion — location vs V3"}, {"q": "Maini's mnemonic 'COPS' names the four parasympathetic ganglia of the head. What do the letters stand for?", "o": ["Ciliary, Otic, Pterygopalatine, Submandibular", "Ciliary, Otic, Parotid, Sublingual", "Cochlear, Optic, Palatine, Sphenoidal", "Ciliary, Otic, Pterygoid, Stellate"], "c": 0, "cat": "Parasympathetic Ganglia (COPS)", "r": ["Correct. C-O-P-S = Ciliary, Otic, Pterygopalatine, Submandibular.", "Parotid and sublingual are glands, not ganglia.", "These are not the names of parasympathetic ganglia.", "The stellate ganglion is a sympathetic ganglion, not one of the COPS ganglia."], "source": "L11 · Four parasympathetic ganglia (COPS)", "obj": "COPS mnemonic", "hint": "C-O-P-S."}, {"q": "Which cranial nerves carry the preganglionic parasympathetic outflow of the head, neck, and body (as summarized by Maini)?", "o": ["CN III, IV, V, and VI", "CN III, VII, IX, and X", "CN V, VII, IX, and XII", "CN VII, IX, X, and XI"], "c": 1, "cat": "Parasympathetic Ganglia (COPS)", "r": ["CN IV, V, and VI carry no parasympathetic fibers.", "Correct. Maini: the 3rd, 7th, 9th, and 10th cranial nerves carry the cranial parasympathetic outflow.", "CN V and XII carry no parasympathetic fibers.", "CN XI (accessory) carries no parasympathetic fibers."], "source": "L11 · Cranial parasympathetic outflow", "obj": "Parasympathetic cranial nerves 3-7-9-10"}, {"q": "The ciliary ganglion (the 'C' of COPS) receives its preganglionic parasympathetic fibers from which cranial nerve?", "o": ["Facial nerve (CN VII)", "Trigeminal nerve (CN V)", "Glossopharyngeal nerve (CN IX)", "Oculomotor nerve (CN III)"], "c": 3, "cat": "Parasympathetic Ganglia (COPS)", "r": ["CN VII supplies the pterygopalatine and submandibular ganglia.", "CN V carries no parasympathetic fibers of its own.", "CN IX supplies the otic ganglion.", "Correct. The ciliary ganglion is supplied by CN III and controls intraocular muscles."], "source": "L11 · Ciliary ganglion", "obj": "Ciliary ganglion — CN III"}, {"q": "The pterygopalatine and submandibular ganglia both receive their preganglionic parasympathetic fibers from which cranial nerve?", "o": ["Facial nerve (CN VII)", "Vagus nerve (CN X)", "Oculomotor nerve (CN III)", "Glossopharyngeal nerve (CN IX)"], "c": 0, "cat": "Parasympathetic Ganglia (COPS)", "r": ["Correct. CN VII supplies the pterygopalatine ganglion (via the greater petrosal nerve) and the submandibular ganglion (via the chorda tympani).", "CN X supplies thoracic and abdominal viscera.", "CN III supplies the ciliary ganglion.", "CN IX supplies the otic ganglion."], "source": "L11 · CN VII parasympathetic ganglia", "obj": "CN VII — two ganglia"}, {"q": "The trigeminal (semilunar) ganglion differs from the four COPS ganglia because it is which type of ganglion?", "o": ["A sensory ganglion (housing sensory neuron cell bodies)", "A motor ganglion", "A sympathetic ganglion", "A parasympathetic ganglion"], "c": 0, "cat": "Parasympathetic Ganglia (COPS)", "r": ["Correct. Maini: a ganglion on a nerve like the trigeminal is a sensory ganglion, analogous to a dorsal root ganglion.", "There is no 'motor ganglion'; motor neuron cell bodies sit in CNS nuclei.", "It is not a sympathetic ganglion.", "It is not a parasympathetic ganglion."], "source": "L11 · Trigeminal ganglion", "obj": "Trigeminal ganglion — sensory", "hint": "Analogous to a dorsal root ganglion."}, {"q": "Maini's trick question: which of the following is NOT a branch of the facial nerve (CN VII)?", "o": ["Nerve to the stapedius", "Greater petrosal nerve", "Deep petrosal nerve", "Chorda tympani"], "c": 2, "cat": "Parasympathetic Ganglia (COPS)", "r": ["The nerve to the stapedius is a branch of CN VII.", "The greater petrosal nerve is a branch of CN VII.", "Correct. The deep petrosal nerve arises from the internal carotid (sympathetic) plexus, not from CN VII.", "The chorda tympani is a branch of CN VII."], "source": "L11 · Maini quiz — not a branch of CN VII", "quote": "[Maini] 'Which one of the following is not a branch of 7th nerve? ... deep petrosal ... coming from ICA plexus, carrying postganglionic sympathetic fibers.'", "obj": "Deep petrosal — sympathetic, not VII"}, {"q": "The nerve of the pterygoid canal is formed by the greater petrosal nerve joined by the deep petrosal nerve. What does the deep petrosal nerve contribute?", "o": ["Motor fibers to the palate", "Preganglionic parasympathetic fibers", "Postganglionic sympathetic fibers from the internal carotid plexus", "Taste fibers from the palate"], "c": 2, "cat": "Parasympathetic Ganglia (COPS)", "r": ["The deep petrosal nerve does not carry motor fibers.", "The preganglionic parasympathetic fibers are carried by the greater petrosal nerve.", "Correct. The deep petrosal nerve carries postganglionic sympathetic fibers from the internal carotid plexus.", "The deep petrosal nerve does not carry taste fibers."], "source": "L11 · Nerve of pterygoid canal", "obj": "Nerve of pterygoid canal — components"}, {"q": "Postganglionic parasympathetic fibers from the pterygopalatine ganglion supply the lacrimal gland, the nasal mucosal glands, and which other glands?", "o": ["Submandibular gland", "Palatine glands", "Sublingual gland", "Parotid gland"], "c": 1, "cat": "Parasympathetic Ganglia (COPS)", "r": ["The submandibular gland is served by the submandibular ganglion.", "Correct. The pterygopalatine ganglion also supplies the palatine glands.", "The sublingual gland is served by the submandibular ganglion.", "The parotid gland is served by the otic ganglion (CN IX)."], "source": "L11 · Pterygopalatine ganglion targets", "obj": "Pterygopalatine ganglion — targets"}, {"q": "The pterygopalatine fossa lies between the pterygoid process of the sphenoid posteriorly and which structure anteriorly?", "o": ["Posterior surface of the maxilla", "Zygomatic bone", "Pyramidal process of the palatine bone", "Squamous part of the temporal bone"], "c": 0, "cat": "Pterygopalatine Fossa", "r": ["Correct. The anterior wall is the posterior surface of the maxilla.", "The zygomatic bone is part of the lateral facial skeleton.", "The pyramidal process of the palatine bone forms the floor.", "The temporal bone lies posterior to the infratemporal fossa."], "source": "L11 · Pterygopalatine fossa — boundaries", "obj": "PPF — anterior boundary"}, {"q": "The roof of the pterygopalatine fossa is the greater wing of the sphenoid; its floor is formed by which structure?", "o": ["Pyramidal process of the palatine bone", "Medial pterygoid muscle", "Tuberosity of the maxilla", "Lateral pterygoid plate"], "c": 0, "cat": "Pterygopalatine Fossa", "r": ["Correct. The pyramidal process of the palatine bone forms the floor of the pterygopalatine fossa.", "The medial pterygoid muscle forms the floor of the infratemporal fossa, not the pterygopalatine fossa.", "The maxillary tuberosity lies nearby but does not form the floor.", "The lateral pterygoid plate is part of the posterior wall region."], "source": "L11 · PPF — floor", "obj": "PPF — floor"}, {"q": "The pterygopalatine fossa communicates MEDIALLY with the nasal cavity through which opening?", "o": ["Foramen rotundum", "Pterygomaxillary fissure", "Sphenopalatine foramen", "Inferior orbital fissure"], "c": 2, "cat": "Pterygopalatine Fossa", "r": ["The foramen rotundum connects it posteriorly to the middle cranial fossa.", "The pterygomaxillary fissure connects it laterally to the infratemporal fossa.", "Correct. The sphenopalatine foramen connects the pterygopalatine fossa to the nasal cavity medially.", "The inferior orbital fissure connects it superiorly to the orbit."], "source": "L11 · PPF communications", "obj": "PPF — medial communication"}, {"q": "The pterygopalatine fossa communicates POSTERIORLY with the middle cranial fossa through which opening (which also transmits V2)?", "o": ["Inferior orbital fissure", "Foramen ovale", "Sphenopalatine foramen", "Fora   // FAB M01 lectures.mp3 split: L01 (0-4800s, 80min) / L02 (4800-10817s, 100min) / L03 (10817-18943s, 135min).

    audio.addEventListener('loadedmetadata',function once(){

    return { question: qText, options, picked, correct, profTip, source, quote };
  }

  function qKey(ctx){ return (ctx.question || '') + '|' + (ctx.options || []).join('|'); }

  function mdToHtml(md){
    let html = md
      .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
      .replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>')
      .replace(/(^|\n)### (.+)/g, '$1<h3>$2</h3>')
      .replace(/`([^`]+)`/g, '<code>$1</code>')
      .replace(/^\s*[-*]\s+(.+)$/gm, '<li>$1</li>')
      .replace(/(<li>.*?<\/li>(\s*<li>.*?<\/li>)*)/gs, '<ul>$1</ul>');
    html = html.split(/\n{2,}/).map(p => {
      if (p.trim().startsWith('<ul') || p.trim().startsWith('<h3')) return p;
      if (p.trim() === '') return '';
      return '<p>' + p.replace(/\n/g, '<br>') + '</p>';
    }).join('');
    return html;
  }

  function stripForTts(text){
    // Remove markdown markers so TTS doesn't read them aloud
    return text
      .replace(/\*\*/g, '')
      .replace(/`([^`]+)`/g, '$1')
      .replace(/^\s*[-*]\s+/gm, '')
      .replace(/^#+\s+/gm, '')
      .replace(/\n{2,}/g, '. ')
      .replace(/\s+/g, ' ')
      .trim();
  }

  let currentUtter = null;
  function speakToggle(btn, rawText){
    if (!window.speechSynthesis) {
      alert('Your browser does not support text-to-speech.');
      return;
    }
    if (window.speechSynthesis.speaking && currentUtter && btn.classList.contains('playing')) {
      window.speechSynthesis.cancel();
      document.querySelectorAll('.fab-ai-tts-btn.playing').forEach(b => {
        b.classList.remove('playing');
        b.innerHTML = '🔊 Read';
      });
      currentUtter = null;
      return;
    }
    window.speechSynthesis.cancel();
    document.querySelectorAll('.fab-ai-tts-btn.playing').forEach(b => {
      b.classList.remove('playing');
      b.innerHTML = '🔊 Read';
    });
    const u = new SpeechSynthesisUtterance(stripForTts(rawText));
    const rateSel = btn.parentElement.querySelector('.fab-ai-tts-rate');
    u.rate = parseFloat(rateSel && rateSel.value || '1.0');
    /*ava-tts*/try{var _vs=(window.speechSynthesis&&window.speechSynthesis.getVoices())||[];var _av=_vs.find(function(v){return /microsoft.*ava.*natural/i.test(v.name);})||_vs.find(function(v){return /microsoft.*emma.*natural/i.test(v.name);})||_vs.find(function(v){return /google us english female/i.test(v.name);});if(_av){u.voice=_av;u.lang=_av.lang||'en-US';}}catch(e){}
    u.onend = () => {
      btn.classList.remove('playing');
      btn.innerHTML = '🔊 Read';
      currentUtter = null;
    };
    u.onerror = () => {
      btn.classList.remove('playing');
      btn.innerHTML = '🔊 Read';
      currentUtter = null;
    };
    currentUtter = u;
    btn.classList.add('playing');
    btn.innerHTML = '⏹ Stop';
    window.speechSynthesis.speak(u);
  }

  function appendMsg(role, text) {
    const body = document.getElementById('fabAiBody');
    if (!body) return null;
    const wrap = document.createElement('div');
    wrap.className = 'fab-ai-msg ' + role;
    const bub = document.createElement('div');
    bub.className = 'fab-ai-bubble';
    if (role === 'ai') {
      bub.innerHTML = mdToHtml(text);
      // Add TTS row
      const row = document.createElement('div');
      row.className = 'fab-ai-tts-row';
      const btn = document.createElement('button');
      btn.className = 'fab-ai-tts-btn';
      btn.innerHTML = '🔊 Read';
      btn.onclick = function(){ speakToggle(btn, text); };
      const rate = document.createElement('select');
      rate.className = 'fab-ai-tts-rate';
      rate.title = 'Reading speed';
      ['0.8','1.0','1.2','1.5','2.0'].forEach(function(r){
        const o = document.createElement('option');
        o.value = r; o.textContent = r + 'x';
        if (r === '1.0') o.selected = true;
        rate.appendChild(o);
      });
      row.appendChild(btn);
      row.appendChild(rate);
      bub.appendChild(row);
    } else {
      bub.textContent = text;
    }
    wrap.appendChild(bub);
    body.appendChild(wrap);
    body.scrollTop = body.scrollHeight;
    return bub;
  }

  function appendLoading(){
    const body = document.getElementById('fabAiBody');
    if (!body) return null;
    const wrap = document.createElement('div');
    wrap.className = 'fab-ai-msg ai';
    wrap.id = 'fabAiLoading';
    const bub = document.createElement('div');
    bub.className = 'fab-ai-bubble';
    bub.innerHTML = '<div class="fab-ai-loading"><div class="fab-ai-spinner"></div> Thinking...</div>';
    wrap.appendChild(bub);
    body.appendChild(wrap);
    body.scrollTop = body.scrollHeight;
    return wrap;
  }

  function removeLoading(){
    const el = document.getElementById('fabAiLoading');
    if (el) el.remove();
  }

  function appendStatus(text, isErr){
    const body = document.getElementById('fabAiBody');
    if (!body) return;
    const div = document.createElement('div');
    div.className = 'fab-ai-status' + (isErr ? ' err' : '');
    div.innerHTML = text;
    body.appendChild(div);
    body.scrollTop = body.scrollHeight;
  }

  function renderSuggestions(ctx){
    const body = document.getElementById('fabAiBody');
    if (!body) return;
    // Q preview at top
    if (ctx.question) {
      const qp = document.createElement('div');
      qp.className = 'fab-ai-qpreview';
      qp.innerHTML = '<b>Q:</b> ' + ctx.question.substring(0, 240) + (ctx.question.length > 240 ? '...' : '');
      body.appendChild(qp);
    }
    // Suggestion chips
    const sug = document.createElement('div');
    sug.className = 'fab-ai-suggestions';
    const chips = [];
    if (ctx.picked === null || ctx.picked === undefined) {
      chips.push({ label: '💡 Give me a hint', q: 'Give me a hint for this question without revealing the answer.' });
      chips.push({ label: '🧠 Explain the concept', q: 'Explain the core concept this question is testing.' });
    } else if (ctx.picked !== ctx.correct && ctx.picked !== null) {
      chips.push({ label: '❌ Why did I miss this?', q: 'I picked the wrong answer. Walk me through why my pick is wrong and why the correct answer is right.' });
      chips.push({ label: '🧠 Explain the concept', q: 'Explain the concept this question is testing in simpler terms.' });
      chips.push({ label: '🎯 Give me a mnemonic', q: 'Give me a memorable mnemonic for this topic.' });
    } else if (ctx.picked === ctx.correct) {
      chips.push({ label: '✅ Why is this right?', q: 'Confirm why the correct answer is right and flag any trap distractors to watch for.' });
      chips.push({ label: '🎯 Give me a mnemonic', q: 'Give me a memorable mnemonic for this topic.' });
    }
    chips.push({ label: '🌟 Use an analogy', q: 'Explain this with a dumbed-down analogy.' });
    chips.forEach(c => {
      const btn = document.createElement('button');
      btn.className = 'fab-ai-sug';
      btn.textContent = c.label;
      btn.onclick = () => sendMessage(c.q);
      sug.appendChild(btn);
    });
    body.appendChild(sug);
  }

  function clearChat(preserveCtx){
    const body = document.getElementById('fabAiBody');
    if (body) body.innerHTML = '';
    history = [];
    if (preserveCtx) {
      const ctx = readCurrentQ();
      renderSuggestions(ctx);
    }
  }

  function openPanel() {
    if (!panel) panel = buildPanel();
    panel.classList.add('open');
    const ctx = readCurrentQ();
    const key = qKey(ctx);
    if (key !== currentQKey) {
      // Q changed — reset chat and show suggestions for new Q
      currentQKey = key;
      clearChat(true);
    }
  }

  function buildPanel() {
    const el = document.createElement('div');
    el.className = 'fab-ai-panel';
    el.innerHTML = '<div class="fab-ai-header">'
      + '<h3>🩺 Study Tutor</h3>'
      + '<button class="fab-ai-hdr-btn" onclick="fabAiClear()">Clear</button>'
      + '<button class="fab-ai-close" onclick="fabAiClose()">×</button>'
      + '</div>'
      + '<div class="fab-ai-body" id="fabAiBody"></div>'
      + '<div class="fab-ai-followup">'
      + '<button class="fab-ai-mini-close" title="Close panel" onclick="fabAiClose()">×</button>'
      + '<textarea id="fabAiFollowup" placeholder="Ask a question about this Q..." rows="1" onkeydown="if(event.keyCode===13&&!event.shiftKey){event.preventDefault();fabAiFollowupSend();}"></textarea>'
      + '<button onclick="fabAiFollowupSend()">Send</button>'
      + '</div>';
    document.body.appendChild(el);
    return el;
  }

  window.fabAiClose = function(){ if(panel) panel.classList.remove('open'); };
  window.fabAiClear = function(){ clearChat(true); };

  async function callWorker(payload) {
    if (!ENDPOINT) return { clipboardFallback: true };
    try {
      const res = await fetch(ENDPOINT, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload),
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.error || ('HTTP ' + res.status));
      return { reply: data.reply };
    } catch (e) {
      return { error: String(e.message || e) };
    }
  }

  function clipboardFallback(ctx, userQ) {
    const letter = (i) => String.fromCharCode(65 + i);
    let prompt = "I'm studying GA 0202 (Gross Anatomy — Head & Neck) with Dr. Seema Maini at SCUHS. Drill question:\n\n";
    prompt += 'Q: ' + ctx.question + '\n\n';
    if (ctx.options && ctx.options.length) {
      ctx.options.forEach((o, i) => {
        const m = [];
        if (i === ctx.picked) m.push('PICKED');
        if (i === ctx.correct) m.push('CORRECT');
        prompt += letter(i) + '. ' + o + (m.length ? ' ('+m.join(', ')+')' : '') + '\n';
      });
      prompt += '\n';
    }
    if (ctx.profTip) prompt += 'DRILL TIP: ' + ctx.profTip + '\n\n';
    if (userQ) prompt += 'MY QUESTION: ' + userQ + '\n\n';
    prompt += 'Explain using a dumbed-down analogy + mnemonic.';
    navigator.clipboard.writeText(prompt).then(() => {
      appendStatus('✓ Prompt copied to clipboard. Backend not configured yet — paste into your AI chat.');
    }).catch(() => {
      appendStatus('Could not copy. Please select manually.', true);
    });
  }

  async function sendMessage(userText) {
    const ctx = readCurrentQ();
    currentQKey = qKey(ctx);
    appendMsg('user', userText);
    history.push({ role: 'user', content: userText });
    appendLoading();

    const payload = Object.assign({}, ctx, {
      userQuestion: userText,
      history: history.slice(-10), // last 10 turns for context
      className: CLASS_NAME, // worker uses this to load class-specific knowledge
    });
    const result = await callWorker(payload);
    removeLoading();
    if (result.clipboardFallback) {
      clipboardFallback(ctx, userText);
      return;
    }
    if (result.error) {
      appendStatus('Error: ' + result.error, true);
      return;
    }
    appendMsg('ai', result.reply);
    history.push({ role: 'model', content: result.reply });
  }

  window.fabAiFollowupSend = function() {
    const ta = document.getElementById('fabAiFollowup');
    const q = (ta && ta.value || '').trim();
    if (!q) return;
    ta.value = '';
    sendMessage(q);
  };

  // Button install — opens panel, does NOT auto-call AI
  function install() {
    if (document.getElementById('fabAiBtn')) return;
    const btn = document.createElement('button');
    btn.className = 'fab-ai-btn';
    btn.id = 'fabAiBtn';
    btn.textContent = '🩺';
    btn.title = 'Open AI Study Tutor';
    btn.onclick = () => openPanel();
    document.body.appendChild(btn);
  }
  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', install);
  } else {
    install();
  }
})();
</script>

<script>
(function() {
  try {
    var wm = document.getElementById('dcStudyWatermark');
    if (!wm) return;
    if (localStorage.getItem('dcDavidView') === '1') {
      wm.classList.add('dc-hidden');
      return;
    }
    function lumOf(el) {
      var bg = window.getComputedStyle(el).backgroundColor || '';
      var rgb = bg.match(/[\d.]+/g);
      if (!rgb || rgb.length < 3) return null;
      var a = rgb.length >= 4 ? +rgb[3] : 1;
      if (a < 0.3) return null;
      return (0.299 * +rgb[0] + 0.587 * +rgb[1] + 0.114 * +rgb[2]) / 255;
    }
    var lum = lumOf(document.body);
    if (lum === null) lum = lumOf(document.documentElement);
    if (lum !== null && lum < 0.5) {
      wm.style.color = 'rgba(255, 255, 255, 0.30)';
    }
  } catch(e) {}
})();

<script id="static-audio-bar-repositioner">
(function(){
  function moveBarIntoApp(){
    var bar = document.getElementById('static-audio-bar');
    var app = document.getElementById('app');
    if(!bar || !app) return;
    var card = app.querySelector('.card');
    if(card){
      if(card.previousElementSibling !== bar){
        app.insertBefore(bar, card);
      }
    }
    // Remove the dynamic GA-style audio bar (#audio-bar) if it sneaks in —
    // it's a duplicate of our static panel from the legacy _ensureAudioAttached
    // mechanism that we replaced with the static-panel pattern in Phase 0f.3.
    var dynBar = document.getElementById('audio-bar');
    if(dynBar && dynBar !== bar){
      dynBar.remove();
    }
  }
  if(typeof render === 'function'){
    var _origRender = render;
    render = function(){
      var rv = _origRender.apply(this, arguments);
      moveBarIntoApp();
      return rv;
    };
  }
  if(typeof renderHistoryItem === 'function'){
    var _origRenderHistory = renderHistoryItem;
    renderHistoryItem = function(){
      var rv = _origRenderHistory.apply(this, arguments);
      moveBarIntoApp();
      return rv;

  if(typeof showSummary === 'function'){
    var _origShowSummary = showSummary;
    showSummary = function(){
      var rv = _origShowSummary.apply(this, arguments);
      moveBarIntoApp();
      return rv;
    };
  }
  if(document.readyState === 'loading'){

  } else {
    moveBarIntoApp();
  }
})();
</script>

  };
  window.emUpdSize = function(){
    document.getElementById('emSizeVal').textContent = document.getElementById('emSizeSlider').value;
  };
  function emUpdAvail(){
    var n = 0;
    FULL_BANK.forEach(function(q){ if (selectedCats[q.cat]) n++; });
    document.getElementById('emAvail').textContent = n;
    var slider = document.getElementById('emSizeSlider');
    slider.max = Math.max(5, n);
    if (parseInt(slider.value) > n) slider.value = Math.max(5, n);
    emUpdSize();
    document.getElementById('emStartBtn').disabled = (n === 0);
  }
  window.emStart = function(){
    var size = parseInt(document.getElementById('emSizeSlider').value);
    var pool = FULL_BANK.filter(function(q){ return selectedCats[q.cat]; });
    for (var i = pool.length - 1; i > 0; i--){ var j = Math.floor(Math.random()*(i+1)); var t = pool[i]; pool[i]=pool[j]; pool[j]=t; }
    var picked = pool.slice(0, Math.min(size, pool.length));
    BANK.length = 0;
    picked.forEach(function(q){ BANK.push(q); });
    BANK.forEach(function(q,i){ q._bankId = i; });
    if (typeof catStats !== 'undefined') { catStats = {}; }
    try { if (typeof LS_KEY === 'string') localStorage.removeItem(LS_KEY); } catch(e){}
    document.getElementById('everythingModal').style.display = 'none';
    document.getElementById('emReopenBtn').style.display = 'block';
    if (typeof idx !== 'undefined') idx = 0;
    if (typeof score !== 'undefined') score = 0;
    if (typeof attempts !== 'undefined') attempts = 0;
    if (typeof reaskQueue !== 'undefined') reaskQueue.length = 0;
    if (typeof questions !== 'undefined') questions.length = 0;
    if (typeof answerMap !== 'undefined') { for (var k in answerMap) delete answerMap[k]; }
    if (typeof answerHistory !== 'undefined') answerHistory.length = 0;
    if (typeof browseIdx !== 'undefined') browseIdx = -1;
    if (typeof reviewList !== 'undefined') reviewList = null;
    if (typeof init === 'function') init();
  };
  function emReopen(){
    document.getElementById('everythingModal').style.display = 'block';
  }

  function tryInit(){
    if (initialized) return;
    if (!captureBank()) { setTimeout(tryInit, 100); return; }
    initialized = true;
    buildModal();
  }
  if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', tryInit);
  else tryInit();
})();
</script>
