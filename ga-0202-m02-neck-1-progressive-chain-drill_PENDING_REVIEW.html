<script>
const BANK=[{"q": "FOUNDATION — Start the chain with the container. The posterior triangle of the neck is bounded by which three structures?", "o": ["Superior belly of omohyoid, SCM, and the midline", "Midline, anterior border of SCM, and lower border of the mandible", "Sternocleidomastoid anteriorly, trapezius posteriorly, clavicle as the base", "Anterior belly of digastric, posterior belly of digastric, and the mandible"], "c": 2, "cat": "Posterior Triangle", "r": ["Wrong. That describes borders of the muscular/carotid region, not the posterior triangle.", "Wrong. Those are the boundaries of the ANTERIOR triangle.", "Correct. These are the three borders Maini lists for the posterior triangle.", "Wrong. That describes the digastric (submandibular) triangle."], "source": "L03 - Posterior triangle boundaries", "quote": "[Maini] 'Sternocleidomastoid, trapezius, clavicle... that is your posterior triangle.'", "obj": "Posterior triangle - boundaries", "hint": "SCM in front, trapezius behind, clavicle underneath."}, {"q": "BUILD — The inferior belly of the omohyoid crosses that triangle. It divides the posterior triangle into which two smaller triangles?", "o": ["Submental and digastric triangles", "Occipital and carotid triangles", "Carotid and muscular triangles", "Occipital triangle and supraclavicular (subclavian) triangle"], "c": 3, "cat": "Posterior Triangle", "r": ["Wrong. Those are also anterior-triangle subdivisions.", "Wrong. The carotid triangle belongs to the anterior triangle, not the omohyoid split of the posterior triangle.", "Wrong. Those are subdivisions of the ANTERIOR triangle.", "Correct. The inferior belly of omohyoid splits it into the larger occipital and the smaller supraclavicular/subclavian triangle."], "source": "L03 - Posterior triangle subdivisions", "quote": "[Maini] 'Inferior belly of omohyoid divides posterior triangle into occipital and supraclavicular, or subclavian.'", "obj": "Posterior triangle - subdivisions", "hint": "Omohyoid's lower belly is the divider; occipital is the big one on top."}, {"q": "BUILD — Deep in the floor of that triangle sit the scalenes. The trunks of the brachial plexus emerge between which two muscles?", "o": ["Middle and posterior scalene", "Anterior and middle scalene", "Anterior scalene and longus colli", "Sternocleidomastoid and trapezius"], "c": 1, "cat": "Posterior Triangle", "r": ["Wrong. The trunks pass between anterior and middle scalene, not middle and posterior.", "Correct. The trunks leave the interscalene interval, between the anterior and middle scalene.", "Wrong. Longus colli is a prevertebral muscle and is not the exit interval for the trunks.", "Wrong. Those two (plus the clavicle) are the borders of the posterior triangle, not where the trunks emerge."], "source": "L03 - Brachial plexus in posterior triangle", "quote": "[Maini] 'Brachial plexus, the trunks, they leave between anterior and middle scalene.'", "obj": "Posterior triangle - brachial plexus", "hint": "The 'interscalene' gate is between the front and middle scalene."}, {"q": "LINK — That interscalene gate opens BEHIND the anterior scalene. Which of these structures therefore lies POSTERIOR to the anterior scalene?", "o": ["Suprascapular artery", "Subclavian vein", "Brachial plexus", "Transverse cervical artery"], "c": 2, "cat": "Posterior Triangle", "r": ["Wrong. The suprascapular artery lies anterior to the anterior scalene.", "Wrong. The subclavian vein passes ANTERIOR to the anterior scalene.", "Correct. Maini flags this as a quiz item: the brachial plexus (its trunks) lies posterior to the anterior scalene.", "Wrong. The transverse cervical artery lies anterior to the anterior scalene."], "source": "L03 - Posterior triangle / scalene relations", "quote": "[Maini] 'In your quiz I'm going to ask which structure is anterior or posterior to anterior scalene. Brachial plexus is posterior.'", "obj": "Posterior triangle - scalene relations", "hint": "Plexus and the main subclavian artery hide behind it; the vein and its two little arteries sit in front."}, {"q": "BUILD — The plexus has a travel companion behind that same muscle. What is the relationship of the SUBCLAVIAN ARTERY to the anterior scalene?", "o": ["The subclavian artery pierces the anterior scalene", "The subclavian artery passes POSTERIOR to the anterior scalene", "The subclavian artery passes ANTERIOR to the anterior scalene", "The subclavian artery passes posterior to the middle scalene"], "c": 1, "cat": "Subclavian Artery", "r": ["Wrong. It passes behind it, it does not pierce it.", "Correct. Maini stresses the subclavian artery lies behind the anterior scalene.", "Wrong. The subclavian VEIN is anterior; the artery is posterior.", "Wrong. It relates to the ANTERIOR scalene, passing behind it."], "source": "L03/L05 - Subclavian scalene relation", "quote": "[Maini] 'Subclavian artery, the main one, is located posterior to anterior scalene.'", "obj": "Subclavian - scalene relation", "hint": "Artery = behind; vein = in front of the anterior scalene."}, {"q": "CLINICAL — Because the subclavian artery and the brachial plexus share the plane behind the anterior scalene, which structures may be compressed together in thoracic outlet (scalene) syndrome?", "o": ["The internal jugular vein and the vagus nerve", "The subclavian artery and the brachial plexus", "The common carotid artery and the recurrent laryngeal nerve", "The subclavian vein and the phrenic nerve"], "c": 1, "cat": "Subclavian Artery", "r": ["Wrong. Those are carotid-sheath structures, not the scalene-syndrome pair.", "Correct. Because both lie posterior to the anterior scalene, they can be compressed together.", "Wrong. Those are not the compressed structures in this syndrome.", "Wrong. Maini pairs the artery (posterior to the muscle) with the brachial plexus."], "source": "L03 - Scalene syndrome", "quote": "[Maini] 'In scalene syndrome, this artery may get compressed along with brachial plexus.'", "obj": "Subclavian - thoracic outlet syndrome", "hint": "Both hide behind the anterior scalene, so both get squeezed."}, {"q": "FOUNDATION — A different plexus lives higher in the neck. The cervical plexus is formed from the ventral rami of which spinal nerves?", "o": ["C5 through T1", "C3 through C5", "C1 through C5", "C1 through C4"], "c": 3, "cat": "Cervical Plexus", "r": ["Wrong. C5-T1 forms the brachial plexus.", "Wrong. C3-C5 is the phrenic root value only.", "Wrong. The plexus is C1-C4; C5 belongs to the brachial plexus.", "Correct. The cervical plexus is formed from the ventral rami of C1-C4."], "source": "L03 - Cervical plexus formation", "quote": "[Maini] 'It's formed from the ventral rami, C1 to C4 spinal nerve.'", "obj": "Cervical plexus - roots", "hint": "Upper four cervical rami."}, {"q": "BUILD — Those upper cervical rami form a plexus related to which vein within the carotid sheath?", "o": ["External jugular vein", "Subclavian vein", "Anterior jugular vein", "Internal jugular vein"], "c": 3, "cat": "Cervical Plexus", "r": ["Wrong. The EJV is superficial and outside the carotid sheath.", "Wrong. The subclavian vein is at the root of the neck, not the sheath companion of the plexus.", "Wrong. The anterior jugular is a superficial midline vein, not in the sheath.", "Correct. Maini: the plexus is related to the internal jugular vein within the carotid sheath."], "source": "L03 - Cervical plexus relations", "quote": "[Maini] 'The plexus is related to internal jugular vein within the carotid sheath.'", "obj": "Cervical plexus - relations", "hint": "Same vein that rides in the carotid sheath."}, {"q": "BUILD — Four of its cutaneous branches all surface at one spot on the posterior border of the sternocleidomastoid. What is this point called?", "o": ["Nerve point of the neck (Erb's point)", "Carotid triangle apex", "Lesser supraclavicular fossa", "Jugular foramen"], "c": 0, "cat": "Cervical Plexus", "r": ["Correct. Maini calls it the nerve point of the neck, at the midpoint of the posterior border of the SCM.", "Wrong. That is a triangle landmark, not where the cutaneous nerves emerge.", "Wrong. That fossa sits between the two heads of SCM, not where the four nerves emerge.", "Wrong. The jugular foramen is a skull opening for the IJV/CN IX-XI."], "source": "L03 - Nerve point of the neck", "quote": "[Maini] 'The midpoint of the posterior part of sternocleidomastoid... nerve point of the neck.'", "obj": "Cervical plexus - nerve point", "hint": "One point at the mid-posterior border of SCM launches all four cutaneous nerves."}, {"q": "LINK — Not every cervical plexus branch is cutaneous. All of the following are superficial (cutaneous) branches EXCEPT which one?", "o": ["Greater auricular nerve", "Lesser occipital nerve", "Transverse cervical nerve", "Phrenic nerve"], "c": 3, "cat": "Cervical Plexus", "r": ["Wrong (it IS cutaneous). The greater auricular is a superficial branch.", "Wrong (it IS cutaneous). The lesser occipital is one of the four superficial branches.", "Wrong (it IS cutaneous). The transverse cervical is a superficial branch.", "Correct - it is the EXCEPTION. The phrenic is a MUSCULAR branch of the cervical plexus, not a cutaneous one."], "source": "L03 - Cervical plexus cutaneous branches", "quote": "[Maini] 'Superficial branches: lesser occipital, greater auricular, transverse cervical, supraclavicular.'", "obj": "Cervical plexus - cutaneous branches", "hint": "Four cutaneous ones emerge at the nerve point; phrenic is motor (to the diaphragm)."}, {"q": "CLINICAL — That exception is the phrenic nerve, the sole motor supply to the diaphragm. What is its root value (the one that 'keeps you alive')?", "o": ["C1, C2, C3", "C2, C3, C4", "C5, C6, C7", "C3, C4, C5"], "c": 3, "cat": "Cervical Plexus", "r": ["Wrong. That range feeds the ansa cervicalis roots, not the phrenic.", "Wrong. C2-C4 supply SCM/trapezius and levator scapulae fibers; the phrenic is C3-C5.", "Wrong. The phrenic is C3-C5, not C5-C7.", "Correct. Maini's mnemonic: 'C3, 4, 5 keep you alive.'"], "source": "L03 - Phrenic nerve", "quote": "[Maini] 'Phrenic nerve... root value? 3, 4, 5, to keep you alive. It's a branch of cervical plexus.'", "obj": "Cervical plexus - phrenic", "hint": "'3, 4, 5 keep the diaphragm alive.'"}, {"q": "FOUNDATION — The ansa cervicalis is a nerve loop in the neck. It supplies motor branches to which muscle group?", "o": ["Most of the infrahyoid muscles", "The muscles of the tongue", "The scalene muscles", "All of the suprahyoid muscles"], "c": 0, "cat": "Ansa Cervicalis", "r": ["Correct. Maini: the ansa cervicalis gives branches to most of the infrahyoid muscles.", "Wrong. The tongue muscles are supplied by the hypoglossal nerve itself.", "Wrong. The ansa does not supply the scalenes.", "Wrong. The suprahyoids have varied supply (V3, CN VII, C1 via XII), not the ansa."], "source": "L03 - Ansa cervicalis function", "quote": "[Maini] 'Ansa cervicalis gives off branches to most of the infrahyoid muscles.'", "obj": "Ansa cervicalis - function", "hint": "'Ansa' = loop that runs the strap (infrahyoid) muscles."}, {"q": "BUILD — Trace the loop. Its SUPERIOR root carries fibers from which spinal nerve, hitching a ride on which cranial nerve?", "o": ["C2 fibers, carried by the vagus nerve (CN X)", "C3 fibers, carried by the accessory nerve (CN XI)", "C1 fibers, carried by the hypoglossal nerve (CN XII)", "C1 fibers, carried by the vagus nerve (CN X)"], "c": 2, "cat": "Ansa Cervicalis", "r": ["Wrong. The superior root is C1 via CN XII; C2-C3 form the inferior root.", "Wrong. That is not how the superior root is formed.", "Correct. C1 fibers join the hypoglossal, then leave it to form the superior root.", "Wrong. The C1 fibers travel with the hypoglossal (XII), not the vagus."], "source": "L03 - Ansa cervicalis superior root", "quote": "[Maini] 'Superior root is a branch from C1 that joins the hypoglossal nerve and then separates from it.'", "obj": "Ansa cervicalis - superior root", "hint": "C1 hitchhikes on CN XII, then jumps off as the superior root."}, {"q": "BUILD — Which spinal nerves mainly form the INFERIOR root that completes the loop?", "o": ["C3, C4, C5", "C4 and C5", "C1 and C2", "C2 and C3"], "c": 3, "cat": "Ansa Cervicalis", "r": ["Wrong. That is the phrenic root value, not the inferior root.", "Wrong. The inferior root is mostly C2-C3, not C4-C5.", "Wrong. C1 forms the superior root; the inferior root is mainly C2-C3.", "Correct. Maini: the inferior root is descending fibers mostly from C2 and C3 (some C4)."], "source": "L03 - Ansa cervicalis inferior root", "quote": "[Maini] 'Inferior root is descending cervical fibers from C2 and C3. Some C4 also join, but mostly C2 and C3.'", "obj": "Ansa cervicalis - inferior root", "hint": "Superior root = C1; inferior root = C2 + C3."}, {"q": "LINK — The loop drives the straps, but one infrahyoid muscle opts out. Which infrahyoid muscle does NOT receive its innervation from the ansa cervicalis?", "o": ["Sternohyoid", "Omohyoid", "Sternothyroid", "Thyrohyoid"], "c": 3, "cat": "Ansa Cervicalis", "r": ["Wrong. Sternohyoid is supplied by the ansa cervicalis.", "Wrong. Omohyoid is supplied by the ansa cervicalis.", "Wrong. Sternothyroid is supplied by the ansa cervicalis.", "Correct. Thyrohyoid is the exception - it is supplied by C1 fibers carried by the hypoglossal nerve."], "source": "L03 - Infrahyoid innervation exception", "quote": "[Maini] 'Thyrohyoid is THE muscle with a different nerve supply - C1 fibers through the 12th nerve.'", "obj": "Ansa cervicalis - infrahyoid exception", "hint": "Three straps ride the ansa; thyroHyoid ('TH') is the odd one on C1/XII."}, {"q": "BUILD — That exception has a unique nerve supply. Which infrahyoid muscle is it, and how is it supplied?", "o": ["Omohyoid - supplied by CN VII", "Sternohyoid - supplied by V3", "Sternothyroid - supplied by CN X", "Thyrohyoid - supplied by C1 fibers carried by the hypoglossal nerve (CN XII)"], "c": 3, "cat": "Infrahyoid Muscles", "r": ["Wrong. Omohyoid is supplied by the ansa cervicalis.", "Wrong. Sternohyoid is supplied by the ansa cervicalis.", "Wrong. Sternothyroid is supplied by the ansa cervicalis.", "Correct. Thyrohyoid ('TH') is the exception, supplied by C1 via CN XII like geniohyoid."], "source": "L03 - Infrahyoid innervation exception", "quote": "[Maini] 'Thyrohyoid is THE muscle with a different nerve supply - C1 fibers through the 12th nerve.'", "obj": "Infrahyoid - thyrohyoid unique nerve", "hint": "Remember 'TH' = thyrohyoid = the exception (C1/XII)."}, {"q": "CLINICAL — Those C1 fibers reach thyrohyoid and geniohyoid by riding the hypoglossal nerve. Through which skull opening does the hypoglossal nerve exit?", "o": ["Foramen ovale", "Foramen magnum", "Jugular foramen", "Hypoglossal canal"], "c": 3, "cat": "Ansa Cervicalis", "r": ["Wrong. Foramen ovale transmits V3, not the hypoglossal nerve.", "Wrong. The vertebral arteries and spinal cord pass here; CN XII uses the hypoglossal canal.", "Wrong. The jugular foramen transmits the IJV and CN IX-XI, not CN XII.", "Correct. Maini: the hypoglossal nerve emerges from the hypoglossal canal."], "source": "L03 - Hypoglossal nerve course", "quote": "[Maini] 'Hypoglossal nerve emerges from the hypoglossal canal.'", "obj": "Ansa cervicalis - hypoglossal exit", "hint": "Hypoglossal nerve -> hypoglossal canal (name matches)."}, {"q": "FOUNDATION — Switch to the front of the neck. What are the boundaries of the anterior triangle?", "o": ["Anterior and posterior bellies of digastric and the mandible", "Midline of the neck, anterior border of SCM, and lower margin of the mandible", "Both bellies of omohyoid and the hyoid bone", "SCM, trapezius, and the clavicle"], "c": 1, "cat": "Anterior Triangle & Subdivisions", "r": ["Wrong. That is the digastric (submandibular) subdivision, not the whole anterior triangle.", "Correct. Anterior = midline, posterior = anterior border of SCM, superior = lower margin of mandible.", "Wrong. Omohyoid subdivides triangles; it does not form the outer border of the anterior triangle.", "Wrong. Those bound the POSTERIOR triangle."], "source": "L03 - Anterior triangle boundaries", "quote": "[Maini] 'Anterior triangle bounded by mandible, midline, and SCM.'", "obj": "Anterior triangle - boundaries", "hint": "Midline in front, SCM behind, mandible on top."}, {"q": "BUILD — The anterior triangle is carved into four smaller triangles using the bellies of which two muscles?", "o": ["Sternohyoid and sternothyroid", "Mylohyoid and geniohyoid", "Digastric and omohyoid", "Stylohyoid and thyrohyoid"], "c": 2, "cat": "Anterior Triangle & Subdivisions", "r": ["Wrong. Those are strap muscles, not the dividers of the anterior triangle.", "Wrong. Those form the floor of the mouth; they do not subdivide the triangle.", "Correct. The two bellies of digastric plus the superior belly of omohyoid carve the anterior triangle into four.", "Wrong. These are not the subdividing muscles."], "source": "L03 - Anterior triangle subdivisions", "quote": "[Maini] 'We are going to use both the bellies of digastric... and omohyoid to divide anterior triangle into four.'", "obj": "Anterior triangle - subdividing muscles", "hint": "Digastric (2 bellies) + omohyoid do the carving."}, {"q": "BUILD — Which of the following is one of those four subdivisions?", "o": ["Suboccipital triangle", "Carotid triangle", "Supraclavicular triangle", "Occipital triangle"], "c": 1, "cat": "Anterior Triangle & Subdivisions", "r": ["Wrong. The suboccipital triangle is at the back of the neck, not in the anterior triangle.", "Correct. The four subdivisions are submental, digastric (submandibular), carotid, and muscular.", "Wrong. That is a subdivision of the posterior triangle.", "Wrong. The occipital triangle is a subdivision of the POSTERIOR triangle."], "source": "L03 - Anterior triangle subdivisions", "quote": "[Maini] 'Divide it into submental, digastric, carotid, and muscular.'", "obj": "Anterior triangle - the four subdivisions", "hint": "Submental, digastric, carotid, muscular."}, {"q": "LINK — Zoom into the carotid triangle. It is named for the presence of which structure?", "o": ["The carotid canal", "The external jugular vein", "The common carotid artery and its bifurcation", "The internal jugular vein only"], "c": 2, "cat": "Anterior Triangle & Subdivisions", "r": ["Wrong. The carotid canal is a skull opening, not a content of this triangle.", "Wrong. The EJV is superficial and not the naming structure.", "Correct. Maini: it is named for the common carotid artery and its bifurcation lying within it.", "Wrong. The IJV is present, but the triangle is named for the carotid artery/bifurcation."], "source": "L03 - Carotid triangle", "quote": "[Maini] 'This is carotid triangle because of the common carotid artery with its bifurcation located within this triangle.'", "obj": "Anterior triangle - carotid triangle", "hint": "Named for the carotid that forks inside it."}, {"q": "BUILD — Besides the carotid bifurcation, which set of cranial nerves is found among its contents?", "o": ["CN IX, CN X, and CN XII", "CN V, CN VII, and CN VIII", "CN XI only", "CN III, CN IV, and CN VI"], "c": 0, "cat": "Anterior Triangle & Subdivisions", "r": ["Correct. Maini lists the 9th, 10th and 12th cranial nerves in the carotid triangle.", "Wrong. Those are not the carotid-triangle nerves she lists.", "Wrong. The spinal accessory (XI) is in the POSTERIOR triangle.", "Wrong. Those are the extra-ocular nerves, not neck-triangle contents."], "source": "L03 - Carotid triangle contents", "quote": "[Maini] '9, 10, 12 cranial nerves, deep cervical lymph nodes... located within the carotid triangle.'", "obj": "Anterior triangle - carotid contents", "hint": "9, 10, 12 live in the carotid triangle."}, {"q": "SYNTHESIS — Which muscle forms the common boundary between the carotid and muscular triangles?", "o": ["Superior belly of omohyoid", "Sternohyoid", "Anterior belly of digastric", "Posterior belly of digastric"], "c": 0, "cat": "Triangle Common Boundaries", "r": ["Correct. The superior belly of omohyoid is the shared border between the muscular and carotid triangles.", "Wrong. Sternohyoid is a content of the muscular triangle, not a dividing boundary.", "Wrong. That is shared between the submental and digastric triangles.", "Wrong. That is shared between the carotid and digastric triangles."], "source": "L03 - Common boundaries (Maini quiz item)", "quote": "[Maini] 'Which muscle forms a common boundary between muscular triangle and carotid triangle? Superior belly of omohyoid.'", "obj": "Triangles - common boundary (muscular/carotid)", "hint": "Superior belly of omohyoid = wall between muscular and carotid."}, {"q": "FOUNDATION — The digastric has two bellies. Its POSTERIOR belly originates from which bony landmark?", "o": ["Digastric fossa of the mandible", "Mylohyoid line of the mandible", "Mastoid notch (medial surface of the mastoid process) of the temporal bone", "Styloid process of the temporal bone"], "c": 2, "cat": "Suprahyoid Muscles", "r": ["Wrong. That is where the ANTERIOR belly inserts.", "Wrong. That is the origin of mylohyoid.", "Correct. Maini: the posterior belly arises from the mastoid/digastric notch on the temporal bone.", "Wrong. That is the origin of stylohyoid."], "source": "L03 - Digastric origin", "quote": "[Maini] 'Originates by posterior belly from the medial surface of the mastoid process... the digastric notch.'", "obj": "Suprahyoid - digastric posterior belly origin", "hint": "Posterior belly grabs the mastoid (temporal bone)."}, {"q": "BUILD — Follow it forward across the intermediate tendon: the ANTERIOR belly inserts onto which structure?", "o": ["Oblique line of the thyroid cartilage", "Body of the hyoid bone", "Digastric fossa of the mandible", "Mastoid process"], "c": 2, "cat": "Suprahyoid Muscles", "r": ["Wrong. That is where sternothyroid and thyrohyoid attach.", "Wrong. The intermediate tendon is anchored to the hyoid, but the anterior belly inserts on the mandible.", "Correct. The anterior belly inserts into the digastric fossa on the inside of the mandible.", "Wrong. The mastoid is the ORIGIN of the posterior belly."], "source": "L03 - Digastric insertion", "quote": "[Maini] 'Insertion by the anterior belly, it is inserted onto the digastric fossa of the mandible.'", "obj": "Suprahyoid - digastric anterior belly insertion", "hint": "Anterior belly -> digastric fossa of the jaw."}, {"q": "LINK — The two bellies arise from different pharyngeal arches, so they carry different nerves. Which nerve supplies the POSTERIOR belly?", "o": ["Facial nerve (CN VII)", "Hypoglossal nerve (CN XII)", "Nerve to mylohyoid (from V3)", "Glossopharyngeal nerve (CN IX)"], "c": 0, "cat": "Suprahyoid Muscles", "r": ["Correct. The posterior belly of digastric is supplied by the facial nerve.", "Wrong. CN XII carries C1 fibers to geniohyoid/thyrohyoid, not the posterior belly.", "Wrong. That supplies the ANTERIOR belly.", "Wrong. CN IX supplies stylopharyngeus, not the digastric."], "source": "L03 - Digastric innervation", "quote": "[Maini] 'Posterior belly by facial nerve, the 7th nerve.'", "obj": "Suprahyoid - digastric posterior belly nerve", "hint": "Posterior belly + stylohyoid share the Facial nerve ('F')."}, {"q": "BUILD — And which nerve supplies the ANTERIOR belly?", "o": ["Hypoglossal nerve (CN XII)", "Nerve to mylohyoid (a branch of the inferior alveolar, from V3)", "Vagus nerve (CN X)", "Facial nerve (CN VII)"], "c": 1, "cat": "Suprahyoid Muscles", "r": ["Wrong. CN XII does not supply the digastric.", "Correct. The anterior belly is supplied by the nerve to mylohyoid, from the inferior alveolar branch of V3.", "Wrong. The vagus does not supply the anterior belly.", "Wrong. CN VII supplies the POSTERIOR belly."], "source": "L03 - Digastric innervation", "quote": "[Maini] 'Anterior belly by nerve to mylohyoid.'", "obj": "Suprahyoid - digastric anterior belly nerve", "hint": "Anterior belly rides the trigeminal (V3 -> inferior alveolar -> nerve to mylohyoid)."}, {"q": "SYNTHESIS — That nerve to mylohyoid is a branch of the inferior alveolar nerve, which itself arises from which cranial-nerve division?", "o": ["Mandibular division of the trigeminal (V3)", "Facial nerve (CN VII)", "Maxillary division of the trigeminal (V2)", "Ophthalmic division of the trigeminal (V1)"], "c": 0, "cat": "Suprahyoid Muscles", "r": ["Correct. Inferior alveolar -> V3 (mandibular) -> trigeminal (CN V).", "Wrong. The nerve to mylohyoid is trigeminal (V3), not facial.", "Wrong. The inferior alveolar arises from V3, not V2.", "Wrong. V1 is around the eye; the inferior alveolar is from V3."], "source": "L03 - Trigeminal family tree", "quote": "[Maini] 'Nerve to mylohyoid, branch of inferior alveolar, which is a branch of mandibular - V3.'", "obj": "Suprahyoid - trigeminal family tree", "hint": "Trigeminal -> V3 -> inferior alveolar -> nerve to mylohyoid."}, {"q": "FOUNDATION — As a group, what is the shared action of the suprahyoid muscles?", "o": ["They tense the vocal cords", "They depress the hyoid bone", "They rotate the head", "They elevate the hyoid bone (important in swallowing)"], "c": 3, "cat": "Suprahyoid Muscles", "r": ["Wrong. That is intrinsic laryngeal muscle action, not the suprahyoids.", "Wrong. Depressing the hyoid is the action of the INFRAhyoid muscles.", "Wrong. That is the SCM, not the suprahyoids.", "Correct. The suprahyoids elevate the hyoid, which lifts and closes the larynx during swallowing."], "source": "L03 - Suprahyoid action", "quote": "[Maini] 'All the muscles which elevate the hyoid bone, they are suprahyoid muscles.'", "obj": "Suprahyoid muscles - action", "hint": "supra = above; they pull the hyoid UP."}, {"q": "BUILD — The broadest suprahyoid forms the floor of the mouth. The mylohyoid originates from which line, and what does it help form?", "o": ["Mylohyoid line of the mandible; it forms the floor of the oral cavity", "Genial tubercle; it forms the tongue", "Digastric fossa; it forms the palate", "Oblique line of the thyroid cartilage; it forms the larynx"], "c": 0, "cat": "Suprahyoid Muscles", "r": ["Correct. Mylohyoid arises from the mylohyoid line and forms the muscular floor of the mouth.", "Wrong. That is geniohyoid's origin, and it does not form the tongue.", "Wrong. The digastric fossa is the anterior digastric insertion, not the mylohyoid origin.", "Wrong. That is thyrohyoid's origin; mylohyoid is a floor-of-mouth muscle."], "source": "L03 - Mylohyoid origin", "quote": "[Maini] 'Mylohyoid... a very large fan-shaped muscle... forms the bulk of the floor of the oral cavity.'", "obj": "Suprahyoid - mylohyoid origin", "hint": "MYLOhyoid from the MYLOhyoid LINE, forming the mouth's floor."}, {"q": "BUILD — Where do the anterior fibers of the mylohyoid meet in the midline?", "o": ["The intermediate tendon of digastric", "The genial tubercle", "The fibrous (median) raphe running from the symphysis menti to the hyoid", "The oblique line of the thyroid cartilage"], "c": 2, "cat": "Suprahyoid Muscles", "r": ["Wrong. The mylohyoid inserts on its own median raphe, not the digastric tendon.", "Wrong. That is the geniohyoid origin.", "Correct. The anterior fibers meet in a midline fibrous raphe; posterior fibers reach the hyoid body.", "Wrong. That is a thyrohyoid/sternothyroid attachment, not the mylohyoid raphe."], "source": "L03 - Mylohyoid insertion", "quote": "[Maini] 'Anterior fibers insert onto a fibrous raphe which extends from symphysis menti to the body of the hyoid bone.'", "obj": "Suprahyoid - mylohyoid raphe", "hint": "The two mylohyoids meet at a midline seam (raphe)."}, {"q": "BUILD — Riding on top of the mylohyoid is the geniohyoid. It originates from which landmark of the mandible?", "o": ["Genial tubercle (inferior mental spine)", "Angle of the mandible", "Digastric fossa", "Mylohyoid line"], "c": 0, "cat": "Suprahyoid Muscles", "r": ["Correct. Geniohyoid arises from the genial tubercle / inferior mental spine of the mandible.", "Wrong. Geniohyoid arises from the genial tubercle, not the angle.", "Wrong. That is the anterior digastric insertion.", "Wrong. That is the mylohyoid origin."], "source": "L03 - Geniohyoid origin", "quote": "[Maini] 'Geniohyoid originates from genial tubercle of the mandible.'", "obj": "Suprahyoid - geniohyoid origin", "hint": "GENIO-hyoid from the GENIAL tubercle."}, {"q": "LINK — What is the positional relationship of the geniohyoid to the mylohyoid?", "o": ["Geniohyoid lies lateral to the mylohyoid line", "Geniohyoid lies superior to (on top of) the mylohyoid", "Geniohyoid is embedded within the tongue", "Geniohyoid lies inferior to the mylohyoid"], "c": 1, "cat": "Suprahyoid Muscles", "r": ["Wrong. Geniohyoid is a paired midline muscle sitting above mylohyoid.", "Correct. Maini: geniohyoid sits on top of mylohyoid - you must cut through mylohyoid to reach it from below.", "Wrong. It runs from the mandible to the hyoid, not within the tongue.", "Wrong. It lies ABOVE (superior to) mylohyoid; the anterior belly of digastric is the one below."], "source": "L03 - Geniohyoid relations", "quote": "[Maini] 'It's lying on top of mylohyoid. You cannot see it from below unless you dissect mylohyoid.'", "obj": "Suprahyoid - geniohyoid position", "hint": "Geniohyoid rides ON TOP of the mylohyoid floor."}, {"q": "CLINICAL — Like thyrohyoid, the geniohyoid breaks the ansa pattern. Which nerve supplies the geniohyoid?", "o": ["C1 fibers carried by the hypoglossal nerve (CN XII)", "Facial nerve (CN VII)", "Ansa cervicalis", "Nerve to mylohyoid (V3)"], "c": 0, "cat": "Suprahyoid Muscles", "r": ["Correct. Geniohyoid is supplied by C1 fibers travelling with the hypoglossal nerve.", "Wrong. CN VII supplies the posterior belly of digastric and stylohyoid.", "Wrong. The ansa supplies the strap muscles (except thyrohyoid); geniohyoid uses C1 via XII.", "Wrong. That supplies mylohyoid and the anterior belly of digastric, not geniohyoid."], "source": "L03 - Geniohyoid innervation", "quote": "[Maini] 'Geniohyoid: a branch from the anterior ramus of C1 carried along with the hypoglossal nerve.'", "obj": "Suprahyoid - geniohyoid nerve", "hint": "Geniohyoid (and thyrohyoid) = C1 hitchhiking on CN XII."}, {"q": "FOUNDATION — As a group, what is the shared action of the infrahyoid (strap) muscles?", "o": ["They open the jaw against resistance", "They elevate the hyoid bone", "They depress the hyoid bone", "They protrude the tongue"], "c": 2, "cat": "Infrahyoid Muscles", "r": ["Wrong. Jaw depression is a suprahyoid/digastric action.", "Wrong. Elevating the hyoid is the SUPRAhyoid action.", "Correct. The infrahyoid muscles depress the hyoid (and larynx).", "Wrong. That is genioglossus (a tongue muscle)."], "source": "L03 - Infrahyoid action", "quote": "[Maini] 'Because it is infrahyoid, it depresses the hyoid bone.'", "obj": "Infrahyoid muscles - action", "hint": "infra = below; they pull the hyoid DOWN."}, {"q": "BUILD — One strap muscle is unusual in its bony reach. Which infrahyoid uniquely attaches to the scapula?", "o": ["Omohyoid (inferior belly, from the superior border of the scapula)", "Thyrohyoid", "Sternothyroid", "Sternohyoid"], "c": 0, "cat": "Infrahyoid Muscles", "r": ["Correct. Omohyoid is the only infrahyoid attaching to the scapula ('omo' = shoulder).", "Wrong. Thyrohyoid runs from thyroid cartilage to hyoid, not the scapula.", "Wrong. Sternothyroid attaches to the manubrium and reaches only the thyroid cartilage.", "Wrong. Sternohyoid attaches to the manubrium and medial clavicle."], "source": "L03 - Omohyoid attachments", "quote": "[Maini] 'This is the only muscle in the infrahyoid group that originates from scapula.'", "obj": "Infrahyoid - omohyoid scapular attachment", "hint": "OMO = shoulder; omohyoid reaches the scapula."}, {"q": "BUILD — The omohyoid's intermediate tendon is held in place by a fascial sling attached to which bones?", "o": ["The scapula and acromion", "The manubrium and second rib", "The hyoid body and thyroid cartilage", "The clavicle and first rib"], "c": 3, "cat": "Infrahyoid Muscles", "r": ["Wrong. The muscle originates near the scapula, but the tendon sling is to the clavicle/first rib.", "Wrong. The sling is to the clavicle and first rib.", "Wrong. The sling anchors to the clavicle/first rib, not those cartilages.", "Correct. A loop of deep fascia slings the omohyoid tendon to the clavicle and first rib."], "source": "L03 - Omohyoid intermediate tendon", "quote": "[Maini] 'A loop of deep fascia slings the tendon to the clavicle and first rib.'", "obj": "Infrahyoid - omohyoid tendon sling", "hint": "Fascial loop ties the tendon down to clavicle + first rib."}, {"q": "BUILD — The sternothyroid stops short of the hyoid. It inserts onto which structure?", "o": ["The cricoid cartilage", "The body of the hyoid bone", "The manubrium of the sternum", "The oblique line of the thyroid cartilage"], "c": 3, "cat": "Infrahyoid Muscles", "r": ["Wrong. It attaches to the oblique line of the thyroid cartilage.", "Wrong. It stops at the thyroid cartilage; sternohyoid reaches the hyoid.", "Wrong. That is its origin, not insertion.", "Correct. Sternothyroid inserts on the oblique line of the thyroid cartilage, stopping short of the hyoid."], "source": "L03 - Sternothyroid insertion", "quote": "[Maini] 'Sternothyroid is inserted onto the oblique line of thyroid cartilage... only up to the thyroid cartilage.'", "obj": "Infrahyoid - sternothyroid insertion", "hint": "sterno-THYROID stops at the thyroid cartilage's oblique line."}, {"q": "CLINICAL — Because it attaches only as high as the thyroid cartilage, what is the action of the sternothyroid?", "o": ["It elevates the hyoid", "It depresses the larynx", "It tenses the vocal folds", "It elevates the larynx"], "c": 1, "cat": "Infrahyoid Muscles", "r": ["Wrong. Elevation of the hyoid is a suprahyoid action.", "Correct. Because it attaches to the thyroid cartilage, sternothyroid depresses the larynx.", "Wrong. That is cricothyroid (an intrinsic laryngeal muscle).", "Wrong. It depresses the larynx (an infrahyoid function)."], "source": "L03 - Sternothyroid action", "quote": "[Maini] 'This muscle depresses the larynx, because it is attached only till the thyroid cartilage.'", "obj": "Infrahyoid - sternothyroid action", "hint": "Anchored to the thyroid cartilage -> pulls the larynx down."}, {"q": "FOUNDATION — Begin at the source. The RIGHT common carotid artery arises from which vessel?", "o": ["The aortic arch directly", "The right subclavian artery", "The brachiocephalic trunk", "The external carotid artery"], "c": 2, "cat": "Common & Internal Carotid", "r": ["Wrong. Only the LEFT common carotid arises directly from the aortic arch.", "Wrong. The right common carotid and right subclavian are the two branches OF the brachiocephalic, not one from the other.", "Correct. The right common carotid is a branch of the brachiocephalic trunk.", "Wrong. The external carotid is a branch of the common carotid, not its source."], "source": "L03 - Carotid origins", "quote": "[Maini] 'Right common carotid artery, it's a branch of brachiocephalic.'", "obj": "Carotid - right common carotid origin", "hint": "Right = off the brachiocephalic trunk."}, {"q": "BUILD — And the LEFT common carotid arises directly from which structure?", "o": ["The aortic arch", "The left subclavian artery", "The pulmonary trunk", "The brachiocephalic trunk"], "c": 0, "cat": "Common & Internal Carotid", "r": ["Correct. The left common carotid arises directly from the aortic arch.", "Wrong. The left subclavian is a separate arch branch.", "Wrong. The pulmonary trunk carries deoxygenated blood to the lungs, unrelated.", "Wrong. That is the source of the RIGHT common carotid."], "source": "L03 - Carotid origins", "quote": "[Maini] 'Left common carotid artery originates directly from the aortic arch.'", "obj": "Carotid - left common carotid origin", "hint": "Left = straight off the arch."}, {"q": "BUILD — At what level does the common carotid bifurcate into external and internal carotid arteries?", "o": ["At the superior border of the thyroid cartilage", "At the cricoid cartilage", "At the jugular foramen", "At the level of the hyoid bone"], "c": 0, "cat": "Common & Internal Carotid", "r": ["Correct. Both common carotids divide at the superior border of the thyroid cartilage.", "Wrong. The bifurcation is higher, at the thyroid cartilage's upper border.", "Wrong. That is a skull opening, well above the bifurcation.", "Wrong. The bifurcation is at the superior border of the thyroid cartilage."], "source": "L03 - Carotid bifurcation", "quote": "[Maini] 'They divide into external and internal carotid at the superior border of the thyroid cartilage.'", "obj": "Carotid - bifurcation level", "hint": "Fork at the top edge of the thyroid CARTILAGE."}, {"q": "LINK — Just below that fork, the common carotid runs in the carotid sheath. Which three structures - the 'three musketeers' - share that sheath?", "o": ["Common carotid artery, internal jugular vein, and vagus nerve", "Common carotid artery, external jugular vein, and phrenic nerve", "Common carotid artery, internal jugular vein, and spinal accessory nerve", "Internal carotid artery, subclavian vein, and hypoglossal nerve"], "c": 0, "cat": "Carotid Sheath Contents", "r": ["Correct. Maini's 'three musketeers': the carotid artery, IJV, and vagus nerve wrapped in the carotid sheath.", "Wrong. The EJV is superficial and the phrenic is not in the sheath.", "Wrong. The nerve in the sheath is the vagus (X), not the accessory (XI).", "Wrong. The subclavian vein and CN XII are not the sheath trio."], "source": "L03/L05 - Carotid sheath", "quote": "[Maini] 'Common carotid artery, internal jugular vein, and vagus... wrapped in a common sheath, the three musketeers.'", "obj": "Carotid sheath - the three musketeers", "hint": "Artery + vein + vagus = the sheath trio."}, {"q": "BUILD — After the bifurcation, which of those vessels LEAVES the carotid sheath?", "o": ["External carotid artery", "Vagus nerve", "Internal carotid artery", "Internal jugular vein"], "c": 0, "cat": "Carotid Sheath Contents", "r": ["Correct. The external carotid leaves the sheath; the internal carotid, IJV and vagus remain.", "Wrong. The vagus remains in the sheath.", "Wrong. The internal carotid stays within the sheath with the IJV and vagus.", "Wrong. The IJV remains in the sheath."], "source": "L03 - Carotid sheath after bifurcation", "quote": "[Maini] 'External carotid leaves the sheath; internal carotid, internal jugular vein and vagus stay.'", "obj": "Carotid sheath - external carotid exits", "hint": "The branch-giving external carotid heads out of the bundle."}, {"q": "BUILD — How can you tell the internal from the external carotid apart in the neck?", "o": ["The ICA is always medial; the ECA is always deep to the mandible", "The ECA gives off branches in the neck; the ICA gives no branches in the neck", "The ICA gives many neck branches; the ECA gives none", "Both give equal branches, so they cannot be told apart"], "c": 1, "cat": "Common & Internal Carotid", "r": ["Wrong. Maini's rule is about branches, not a fixed medial/deep position.", "Correct. The branch-giver is the ECA; the branchless one is the ICA.", "Wrong. It is the reverse - the ECA branches, the ICA does not.", "Wrong. They are readily distinguished by the ECA's branches."], "source": "L03 - ICA vs ECA", "quote": "[Maini] 'ECA is the only artery that gives off branches in the neck; internal carotid gives no branches.'", "obj": "Carotid - ICA vs ECA", "hint": "Branches in the neck = external; no branches = internal."}, {"q": "CLINICAL — The branchless internal carotid heads for the brain. Through which opening does it enter the skull?", "o": ["The foramen magnum", "The carotid canal in the petrous part of the temporal bone", "The jugular foramen", "The superior orbital fissure"], "c": 1, "cat": "Common & Internal Carotid", "r": ["Wrong. That transmits the vertebral arteries and spinal cord.", "Correct. The ICA enters via the carotid canal of the petrous temporal bone to supply the brain.", "Wrong. The jugular foramen transmits the IJV and CN IX-XI.", "Wrong. That transmits CN III, IV, V1, VI - not the ICA."], "source": "L03 - ICA course", "quote": "[Maini] 'It enters the skull through carotid canal in the petrous portion of temporal bone.'", "obj": "Carotid - ICA entry", "hint": "Internal CAROTID -> CAROTID canal."}, {"q": "FOUNDATION — At the base of the internal carotid sits a dilatation. Where is the carotid sinus located?", "o": ["At the beginning of the internal carotid artery (at the bifurcation)", "At the origin of the external carotid artery", "Within the carotid canal", "At the arch of the aorta"], "c": 0, "cat": "Carotid Sinus & Body", "r": ["Correct. The carotid sinus is a slight dilatation at the origin of the ICA.", "Wrong. The sinus is at the beginning of the INTERNAL carotid.", "Wrong. The sinus is at the neck bifurcation, not in the skull canal.", "Wrong. The aortic arch has its own baroreceptors, but the carotid sinus is at the ICA origin."], "source": "L03 - Carotid sinus", "quote": "[Maini] 'A localized dilatation, the carotid sinus, right at the beginning of the internal carotid artery.'", "obj": "Carotid sinus - location", "hint": "A bulge at the START of the internal carotid."}, {"q": "BUILD — The carotid sinus contains which type of receptor?", "o": ["Chemoreceptors", "Baroreceptors (pressure/stretch receptors)", "Thermoreceptors", "Photoreceptors"], "c": 1, "cat": "Carotid Sinus & Body", "r": ["Wrong. Chemoreceptors are in the carotid BODY, not the sinus.", "Correct. The carotid sinus houses baroreceptors that sense blood pressure via arterial stretch.", "Wrong. The sinus senses pressure, not temperature.", "Wrong. Those are in the retina, unrelated."], "source": "L03 - Carotid sinus function", "quote": "[Maini] 'This sinus contains baroreceptors. Baro means pressure.'", "obj": "Carotid sinus - receptors", "hint": "BARO = pressure; the sinus is the pressure sensor."}, {"q": "BUILD — Its neighbor, the carotid body, holds chemoreceptors that sense which blood changes?", "o": ["Changes in blood pressure", "Increased O2 and decreased CO2", "Increased CO2, increased H+, and decreased O2", "Changes in blood glucose only"], "c": 2, "cat": "Carotid Sinus & Body", "r": ["Wrong. Pressure is monitored by the baroreceptors of the carotid SINUS.", "Wrong. That is the opposite of what triggers the chemoreceptors.", "Correct. The carotid body chemoreceptors detect a rise in CO2/H+ and a fall in O2.", "Wrong. The carotid body monitors respiratory gases and pH, not glucose."], "source": "L03 - Carotid body function", "quote": "[Maini] 'Chemoreceptors sense increase in CO2, hydrogen ion concentration, and decrease in oxygen.'", "obj": "Carotid body - chemoreceptors", "hint": "Body = chemistry: CO2 up, H+ up, O2 down."}, {"q": "CLINICAL — Both the carotid sinus and the carotid body send their impulses along which cranial nerve?", "o": ["Facial nerve (CN VII)", "Glossopharyngeal nerve (CN IX)", "Vagus nerve (CN X)", "Hypoglossal nerve (CN XII)"], "c": 1, "cat": "Carotid Sinus & Body", "r": ["Wrong. CN VII does not innervate the carotid receptors.", "Correct. Both the carotid sinus and carotid body are innervated by the glossopharyngeal (9th) nerve.", "Wrong. Maini attributes the carotid sinus/body to CN IX (the aortic bodies use CN X).", "Wrong. CN XII is motor to the tongue, not the carotid receptors."], "source": "L03 - Carotid sinus/body innervation", "quote": "[Maini] 'Which nerve is carrying impulses from baroreceptors? 9th nerve, glossopharyngeal.'", "obj": "Carotid sinus/body - nerve", "hint": "Carotid sinus + body = the 9th nerve's job."}, {"q": "FOUNDATION — The external carotid is the branch-giver of the neck. How many branches does it have, and how are they grouped?", "o": ["Six total: 3 anterior and 3 posterior", "Ten total: 4 anterior, 4 posterior, 2 terminal", "Four total: 2 anterior and 2 terminal", "Eight total: 3 anterior, 3 posterior, and 2 terminal"], "c": 3, "cat": "External Carotid Branches", "r": ["Wrong. There are 8; the two terminal branches are missing here.", "Wrong. It is 3 + 3 + 2 = 8, not 10.", "Wrong. The ECA has 8 branches in three groups.", "Correct. The ECA has 8 branches - three anterior, three posterior, two terminal."], "source": "L03 - ECA branches overview", "quote": "[Maini] '3 anterior, 3 posterior, and 2 terminal branches - 8 branches in total.'", "obj": "ECA - branch count", "hint": "3 + 3 + 2 = 8."}, {"q": "BUILD — Which three are its ANTERIOR branches?", "o": ["Superficial temporal and maxillary", "Ascending pharyngeal, occipital, and posterior auricular", "Superior thyroid, lingual, and facial", "Vertebral, internal thoracic, and thyrocervical"], "c": 2, "cat": "External Carotid Branches", "r": ["Wrong. Those are the two TERMINAL branches.", "Wrong. Those are the three POSTERIOR branches.", "Correct. The anterior branches are superior thyroid, lingual, and facial.", "Wrong. Those are branches of the subclavian artery, not the ECA."], "source": "L03 - ECA anterior branches", "quote": "[Maini] 'The first anterior branch is superior thyroid, second is lingual, third is facial.'", "obj": "ECA - anterior branches", "hint": "Front three: Superior thyroid, Lingual, Facial."}, {"q": "BUILD — Which of those anterior branches descends to supply the UPPER pole of the thyroid gland?", "o": ["Lingual artery", "Superior thyroid artery", "Ascending pharyngeal artery", "Inferior thyroid artery"], "c": 1, "cat": "External Carotid Branches", "r": ["Wrong. The lingual supplies the tongue.", "Correct. The superior thyroid artery is the first anterior ECA branch and reaches the upper pole of the thyroid.", "Wrong. The ascending pharyngeal is a posterior branch to the pharynx.", "Wrong. The inferior thyroid is a branch of the thyrocervical trunk (subclavian), supplying the lower pole."], "source": "L03 - Superior thyroid artery", "quote": "[Maini] 'Superior thyroid descends and ends at the upper pole of thyroid gland... a branch of external carotid.'", "obj": "ECA - superior thyroid to upper pole", "hint": "SUPERIOR thyroid artery -> UPPER pole (from the ECA)."}, {"q": "BUILD — The external carotid ends by splitting into which two TERMINAL branches?", "o": ["Facial and lingual", "Occipital and posterior auricular", "Superficial temporal and maxillary", "Superior thyroid and ascending pharyngeal"], "c": 2, "cat": "External Carotid Branches", "r": ["Wrong. Those are anterior branches, not terminal.", "Wrong. Those are posterior branches.", "Correct. The ECA ends by dividing into the superficial temporal and maxillary arteries.", "Wrong. Those are anterior/posterior branches, not terminal."], "source": "L03 - ECA terminal branches", "quote": "[Maini] 'It ends by dividing into two terminal branches: superficial temporal and maxillary.'", "obj": "ECA - terminal branches", "hint": "The ECA ends as superficial temporal + maxillary."}, {"q": "CLINICAL — A classic exam trap: despite its name, the transverse facial artery is actually a branch of which artery?", "o": ["Maxillary artery", "Superficial temporal artery", "Facial artery", "Lingual artery"], "c": 1, "cat": "External Carotid Branches", "r": ["Wrong. The transverse facial comes off the superficial temporal.", "Correct. Maini flags the trap: transverse facial is a branch of the superficial temporal, NOT the facial artery.", "Wrong. This is the exact trap - despite its name, it branches from the superficial temporal.", "Wrong. The lingual supplies the tongue and is unrelated."], "source": "L03 - Transverse facial (trap)", "quote": "[Maini] 'Everybody confuses it as a branch of facial. No, it's a branch of superficial temporal.'", "obj": "ECA - transverse facial trap", "hint": "Name says 'facial,' but it's a superficial TEMPORAL branch."}, {"q": "FOUNDATION — Back to the root of the neck. The RIGHT subclavian artery arises from which vessel?", "o": ["The axillary artery", "The brachiocephalic trunk", "The right common carotid artery", "The aortic arch directly"], "c": 1, "cat": "Subclavian Artery", "r": ["Wrong. The axillary is the CONTINUATION of the subclavian, not its origin.", "Correct. The right subclavian arises from the brachiocephalic trunk (the left arises from the aortic arch).", "Wrong. Both are branches of the brachiocephalic, not one from the other.", "Wrong. Only the LEFT subclavian arises directly from the aortic arch."], "source": "L03 - Subclavian origin", "quote": "[Maini] 'Right subclavian arises from the brachiocephalic; left one from aortic arch.'", "obj": "Subclavian - right origin", "hint": "Right subclavian = off the brachiocephalic trunk."}, {"q": "BUILD — The anterior scalene crosses the subclavian, dividing it into how many parts, positioned how?", "o": ["Three parts, all lateral to the muscle", "Four parts, one for each branch", "Two parts: proximal and distal to the muscle", "Three parts: part 1 medial, part 2 posterior/deep, part 3 lateral to the muscle"], "c": 3, "cat": "Subclavian Artery", "r": ["Wrong. The three parts are medial, deep, and lateral - not all lateral.", "Wrong. There are three parts, defined by the anterior scalene.", "Wrong. It is divided into THREE parts by the anterior scalene.", "Correct. Part 1 is medial, part 2 lies behind (deep to) the muscle, part 3 is lateral."], "source": "L03 - Subclavian parts", "quote": "[Maini] 'Part 1 medial, part 2 deep, part 3 lateral to anterior scalene.'", "obj": "Subclavian - three parts", "hint": "Medial (1), deep/behind (2), lateral (3) to the anterior scalene."}, {"q": "BUILD — Which three branches arise from the FIRST part of the subclavian artery?", "o": ["Superior thyroid, lingual, and facial", "Costocervical trunk, deep cervical, and superior intercostal", "Vertebral artery, internal thoracic artery, and thyrocervical trunk", "Dorsal scapular and suprascapular only"], "c": 2, "cat": "Subclavian Artery", "r": ["Wrong. Those are external carotid branches.", "Wrong. The var _origShuffle = shuffle;
var followMode = true;      // chain order (foundation -> clinical) by default
var reaskMode = true;
shuffle = function(a){ return followMode ? a : _origShuffle(a); };

// ---- coach (Web Speech) ----
var coachOn = false, coachRate = 1.0, _coachLastKey = null, _coachVoice = null;
try { coachOn = localStorage.getItem('ga0202_chain_coach') === '1'; } catch(e){}
try { var _r = parseFloat(localStorage.getItem('ga0202_chain_rate')); if(_r>=0.5 && _r<=3) coachRate=_r; } catch(e){}

function _pickCoachVoice(){
  try {
    var vs = (window.speechSynthesis && window.speechSynthesis.getVoices()) || [];
    _coachVoice = vs.find(function(v){return /microsoft.*ava.*natural/i.test(v.name);})
      || vs.find(function(v){return /microsoft.*emma.*natural/i.test(v.name);})
      || vs.find(function(v){return /microsoft.*andrew.*natural/i.test(v.name);})
      || vs.find(function(v){return /google us english/i.test(v.name);})
      || vs.find(function(v){return /female/i.test(v.name);}) || null;
  } catch(e){ _coachVoice = null; }
}
if (window.speechSynthesis){
  _pickCoachVoice();
  window.speechSynthesis.onvoiceschanged = _pickCoachVoice;
}
function _stripTts(t){
  return (t||'').replace(/[→]/g,' to ').replace(/[—–]/g,', ')
    .replace(/\s+/g,' ').trim();
}
function coachSpeak(text){
  if(!window.speechSynthesis){ return; }
  window.speechSynthesis.cancel();
  var u = new SpeechSynthesisUtterance(_stripTts(text));
  u.rate = coachRate;
  if(!_coachVoice) _pickCoachVoice();
  if(_coachVoice){ u.voice = _coachVoice; u.lang = _coachVoice.lang || 'en-US'; }
  window.speechSynthesis.speak(u);
}
function coachReadCurrent(){
  var card = document.querySelector('.card'); if(!card) return;
  var qt = card.querySelector('.q-text');
  var opts = card.querySelectorAll('.opt-btn');
  var parts = [];
  if(qt){ parts.push(qt.textContent.replace(/^Q\d+(\s+of\s+\d+)?:\s*/i,'')); }
  opts.forEach(function(o,i){
    var clone = o.cloneNode(true);
    var rat = clone.querySelector('.rationale'); if(rat) rat.remove();
    var txt = clone.textContent.replace(/^\s*[A-D]\.\s*/,'').trim();
    parts.push('Option ' + String.fromCharCode(65+i) + '. ' + txt);
  });
  coachSpeak(parts.join('. '));
}
function coachStop(){ if(window.speechSynthesis) window.speechSynthesis.cancel(); }
function coachToggleMode(){
  coachOn = !coachOn;
  try{ localStorage.setItem('ga0202_chain_coach', coachOn?'1':'0'); }catch(e){}
  _syncCoachBar();
  if(coachOn){ _coachLastKey=null; coachReadCurrent(); } else { coachStop(); }
}
function coachSetRate(v){
  coachRate = Math.max(0.5, Math.min(3, parseFloat(v)||1));
  try{ localStorage.setItem('ga0202_chain_rate', String(coachRate)); }catch(e){}
  var d = document.getElementById('coachRateVal'); if(d) d.textContent = coachRate.toFixed(1)+'x';
}
function _syncCoachBar(){
  var b = document.getElementById('coachToggle');
  if(b){ b.classList.toggle('on', coachOn); b.textContent = '🔊 Coach Mode: ' + (coachOn?'ON':'OFF'); }
  var d = document.getElementById('coachRateVal'); if(d) d.textContent = coachRate.toFixed(1)+'x';
  var r = document.getElementById('coachRate'); if(r) r.value = coachRate;
}

// ---- chrome injection (banner + coach bar + follow-toggle + reask banner) ----
function _injectChrome(){
  var app = document.getElementById('app'); if(!app) return;
  if(document.getElementById('chain-chrome')) return;
  var sub = app.querySelector('.subtitle');
  var anchor = app.querySelector('.stats') || app.querySelector('.card');
  var wrap = document.createElement('div');
  wrap.id = 'chain-chrome';
  wrap.innerHTML =
    '<div class="edge-banner">🔊 Best voices in Microsoft Edge (it has the natural Ava / Emma / Andrew voices). Other browsers work but sound more robotic.</div>'
    + '<div class="coach-bar">'
    + '<button id="coachToggle" class="coach-btn' + (coachOn?' on':'') + '" onclick="coachToggleMode()">🔊 Coach Mode: ' + (coachOn?'ON':'OFF') + '</button>'
    + '<button class="coach-btn coach-read" onclick="coachReadCurrent()">▶ Read question</button>'
    + '<button class="coach-btn coach-stop" onclick="coachStop()">⏹ Stop</button>'
    + '<span class="coach-rate-label">Speed</span>'
    + '<input id="coachRate" type="range" min="0.5" max="3" step="0.1" value="' + coachRate + '" oninput="coachSetRate(this.value)">'
    + '<span id="coachRateVal" class="coach-rate-val">' + coachRate.toFixed(1) + 'x</span>'
    + '</div>'
    + '<div class="follow-toggle">'
    + '<button class="follow-btn' + (followMode?' active':'') + '" onclick="setFollowMode(true)">🔗 Chain Order (foundation → clinical)</button>'
    + '<button class="follow-btn' + (!followMode?' active':'') + '" onclick="setFollowMode(false)">🔀 Shuffle Mode</button>'
    + '<button class="reask-btn' + (reaskMode?' active':'') + '" onclick="toggleReask()">🚨 Re-Ask Missed</button>'
    + '</div>'
    + '<div id="reask-banner" class="reask-banner"></div>';
  if(sub && sub.parentNode===app){ app.insertBefore(wrap, sub.nextSibling); }
  else if(anchor){ app.insertBefore(wrap, anchor); }
  else { app.insertBefore(wrap, app.firstChild); }
  buildReaskBar();
}

function setFollowMode(on){
  followMode = on;
  if(Object.keys(answerMap).length === 0){
    questions = on ? BANK.slice() : _origShuffle(BANK.slice());
    idx = 0;
  }
  saveState(); render();
}
function toggleReask(){
  reaskMode = !reaskMode;
  var btns = document.querySelectorAll('.reask-btn');
  btns.forEach(function(b){ b.classList.toggle('active', reaskMode); });
  buildReaskBar();
}
function buildReaskBar(){
  var bar = document.getElementById('reask-banner'); if(!bar) return;
  var missed = [];
  if(typeof answerMap !== 'undefined'){
    for(var k in answerMap){ if(answerMap.hasOwnProperty(k) && !answerMap[k].isCorrect) missed.push(k); }
  }
  if(reaskMode && missed.length>0){
    bar.style.display='block';
    bar.innerHTML='⚠️ ' + missed.length + ' MISSED — <button onclick="drillMissed()">DRILL MISSED NOW</button>';
  } else { bar.style.display='none'; }
}
function drillMissed(){
  var missed=[];
  for(var k in answerMap){ if(answerMap.hasOwnProperty(k) && !answerMap[k].isCorrect) missed.push(parseInt(k)); }
  if(missed.length===0) return;
  questions = missed.map(function(id){ return BANK[id]; });
  for(var i=questions.length-1;i>0;i--){ var j=Math.floor(Math.random()*(i+1)); var t=questions[i]; questions[i]=questions[j]; questions[j]=t; }
  idx=0; score=0; attempts=0; answerMap={}; answerHistory=[];
  render();
}

// re-ask card glow + chrome, then coach auto-read on new question
function _postRender(){
  _injectChrome();
  var card = document.querySelector('.card');
  if(card){
    var isReask = (typeof idx!=='undefined') && idx<questions.length && questions[idx] && questions[idx]._isReask;
    if(isReask){
      card.classList.add('reask-glow');
      if(!card.querySelector('.reask-card-badge')){
        var badge=document.createElement('div');
        badge.className='reask-card-badge';
        badge.textContent='🔁 RE-ASK — You missed this one. Get it right!';
        card.insertBefore(badge, card.firstChild);
      }
    } else { card.classList.remove('reask-glow'); }
  }
  // coach auto-read when the visible question changes
  if(coachOn){
    var qt = card ? card.querySelector('.q-text') : null;
    var key = qt ? qt.textContent.slice(0,60) : null;
    if(key && key !== _coachLastKey){ _coachLastKey = key; setTimeout(coachReadCurrent, 120); }
  }
}

var _origRender2 = render;
render = function(){ _origRender2.apply(this, arguments); _postRender(); };
var _origHist2 = renderHistoryItem;
renderHistoryItem = function(){ _origHist2.apply(this, arguments); _postRender(); };

// boot with wrappers + chain order active
init();

</script>
<script id="section-badge-js">
(function(){
  var SECTION_MARKS = [[0, "CHAIN 1 → Posterior Triangle to Thoracic Outlet"], [6, "CHAIN 2 → Cervical Plexus to Phrenic Nerve"], [11, "CHAIN 3 → Ansa Cervicalis to the Strap Muscles"], [17, "CHAIN 4 → Anterior Triangle to the Carotid Triangle"], [23, "CHAIN 5 → The Digastric and Its Two Nerves"], [28, "CHAIN 6 → Suprahyoids and the Floor of the Mouth"], [34, "CHAIN 7 → Infrahyoids and Laryngeal Depression"], [39, "CHAIN 8 → Common Carotid, Sheath, and the Two Carotids"], [46, "CHAIN 9 → Carotid Sinus, Carotid Body, and CN IX"], [50, "CHAIN 10 → External Carotid Branches"], [55, "CHAIN 11 → Subclavian Artery and Its Branches"], [60, "CHAIN 12 → Neck Veins and Their Confluence"], [66, "CHAIN 13 → Lymphatics and Surface Landmarks"]];
  function currentSectionForIdx(qIdx){
    var current = SECTION_MARKS[0] ? SECTION_MARKS[0][1] : "";
    for (var i=0;i<SECTION_MARKS.length;i++){ if(SECTION_MARKS[i][0] <= qIdx) current=SECTION_MARKS[i][1]; else break; }
    return current;
  }
  function attachSectionBadge(){

    if(card.querySelector(".section-badge")) return;
    var qIdx=(typeof idx!=="undefined" && typeof questions!=="undefined" && questions[idx]) ? questions[idx]._bankId : 0;
    var sec=currentSectionForIdx(qIdx); if(!sec) return;
    var badge=document.createElement("div"); badge.className="section-badge"; badge.textContent=sec;
    card.insertBefore(badge, card.firstChild);
  }
  function wrapRender(){
    if(typeof render!=="function") return;
    var origR=render; render=function(){ origR.apply(this,arguments); attachSectionBadge(); };
    if(typeof renderHistoryItem==="function"){ var origH=renderHistoryItem; renderHistoryItem=function(){ origH.apply(this,arguments); attachSectionBadge(); }; }
  }
  if(document.readyState==="complete"||document.readyState==="interactive"){ setTimeout(function(){ wrapRender(); attachSectionBadge(); },150); }
  else { document.addEventListener("DOMContentLoaded", function(){ setTimeout(function(){ wrapRender(); attachSectionBadge(); },150); }); }
})();
</script>

<script>
/* DC Drill Telemetry v1
 *
 * Wraps the two globals every DC MC-drill engine exposes — pick(i) and
 * showSummary() — and reports three events through the analytics helper:
 *   drill_started    once, on the first answered question
 *   q_answered       {h, stem, c, t_ms}  first attempt per question per load
 *   drill_completed  {answered, correct, pct, duration_s}
 *
 * Correct/wrong is read back off the option element AFTER the engine marks it,
 * so this never re-implements (or can disagree with) the engine's own scoring.
 * Counters are kept here rather than scraped from the summary markup, which
 * differs between drill families.
 *
 * Families covered:
 *   A  .opt-btn  + picked-correct / picked-wrong  + stem in .q-text
 *   B  .option   + correct        / wrong         + stem in .question
 *
 * No-ops safely if the helper or the engine globals are absent.
 */
(function () {
  'use strict';
  if (window.__dcDrillTelemetry) return;
  window.__dcDrillTelemetry = true;

  var OPT_SEL = '.opt-btn, .option';
  var STEM_SEL = '.q-text, .question';
  var OK_CLASSES = ['picked-correct', 'correct'];
  var BAD_CLASSES = ['picked-wrong', 'wrong'];

  var started = false;
  var completed = false;
  var startTs = Date.now();
  var shownTs = Date.now();
  var seen = {};            // stem-hash -> true; first attempt only
  var answered = 0;
  var correct = 0;
  var totalQ = null;

  function send(type, payload) {
    try {
      if (window.__dcAnalytics && window.__dcAnalytics.send) {
        window.__dcAnalytics.send(type, payload);
      }
    } catch (e) {}
  }

  // djb2. Case/punctuation/whitespace-insensitive so the id survives the
  // engine's shuffling and re-rendering.
  function stemHash(s) {
    var h = 5381;
    var t = (s || '').toLowerCase().replace(/[^a-z0-9]+/g, ' ').trim();
    for (var i = 0; i < t.length; i++) { h = ((h << 5) + h + t.charCodeAt(i)) >>> 0; }
    return ('00000000' + h.toString(16)).slice(-8);
  }

  // Family A prefixes the stem with "Q3 of 217: " — strip it, or the same
  // question hashes differently depending on where the shuffle put it.
  function readStem() {
    var el = document.querySelector(STEM_SEL);
    if (!el) return '';
    var raw = (el.textContent || '').replace(/\s+/g, ' ').trim();
    var m = raw.match(/^Q(\d+)\s+of\s+(\d+)\s*:\s*/i);
    if (m) { totalQ = parseInt(m[2], 10); raw = raw.slice(m[0].length); }
    return raw.trim();
  }

  // djb2 over the exact string (no normalization) — used to fingerprint image
  // bytes, where case and punctuation are significant.
  function rawHash(s) {
    var h = 5381;
    for (var i = 0; i < s.length; i++) { h = ((h << 5) + h + s.charCodeAt(i)) >>> 0; }
    return ('00000000' + h.toString(16)).slice(-8);
  }

  // Visual drills reuse one generic stem ("Identify the indicated structure.")
  // across every plate — the image is what distinguishes them. Fold an image
  // id into the hash so those questions don't collapse into one row.
  //
  // Plates are usually inlined as base64 data: URIs, where a "filename" is
  // meaningless (and its tail is a 1-2 char near-collision). For those,
  // fingerprint the bytes: length + head + tail, since same-encoder JPEGs can
  // share a long common prefix.
  function readImg() {
    var el = document.querySelector(STEM_SEL);
    if (!el) return '';
    var scope = (el.closest && el.closest('.card')) || el.parentElement;
    var img = scope && scope.querySelector ? scope.querySelector('img') : null;
    var src = img ? (img.getAttribute('src') || '') : '';
    if (!src) return '';
    if (/^data:/i.test(src)) {
      return 'd:' + rawHash(src.length + '|' + src.slice(0, 2000) + '|' + src.slice(-2000));
    }
    return src.split('?')[0].split('/').pop().slice(0, 60);
  }

  function hasToken(el, names) {
    for (var i = 0; i < names.length; i++) {
      if (el.classList.contains(names[i])) return true;
    }
    return false;
  }

  // A third engine family exists whose handler is pick(optionIndex, isCorrect)
  // and which has no showSummary(). Its marking semantics differ, so refuse to
  // wrap anything that isn't the single-argument pick(i) contract rather than
  // guess and mis-score it.
  var origPick = window.pick;
  if (typeof origPick === 'function' && origPick.length === 1) {
    window.pick = function (i) {
      var opts = document.querySelectorAll(OPT_SEL);
      // The engine early-returns when the question is already answered
      // (options carry .disabled). Mirror that test so a second click on an
      // answered question doesn't log a phantom attempt.
      var alreadyAnswered = !!(opts[0] && opts[0].classList.contains('disabled'));
      var stem = readStem();
      var img = readImg();

      var ret = origPick.apply(this, arguments);

      try {
        // Do NOT assume the argument is the DOM position. At least one engine
        // shuffles the option buttons and paints by a data-orig attribute, so
        // pick(origIdx) indexes the original bank, not the rendered order.
        // Instead, find whichever option the engine just marked — correct by
        // construction for every single-argument family.
        //
        // The engine also puts 'show-correct' on the right answer when you miss;
        // that's a distinct class token, so it never matches 'correct' here.
        var el = null;
        var after = document.querySelectorAll(OPT_SEL);
        for (var k = 0; k < after.length; k++) {
          if (hasToken(after[k], OK_CLASSES) || hasToken(after[k], BAD_CLASSES)) { el = after[k]; break; }
        }
        if (!alreadyAnswered && el && stem) {
          var isOk = hasToken(el, OK_CLASSES);
          var isBad = hasToken(el, BAD_CLASSES);
          if (isOk || isBad) {
            var h = stemHash(stem + '|' + img);
            if (!seen[h]) {
              seen[h] = true;
              answered++;
              if (isOk) correct++;
              if (!started) {
                started = true;
                send('drill_started', { total_q: totalQ });
              }
              send('q_answered', {
                h: h,
                stem: stem.slice(0, 80),
                img: img || undefined,
                c: isOk ? 1 : 0,
                t_ms: Math.min(Date.now() - shownTs, 600000)
              });
            }
            shownTs = Date.now();
          }
        }
      } catch (e) {}
      return ret;
    };
  }

  var origSummary = window.showSummary;
  if (typeof origSummary === 'function') {
    window.showSummary = function () {
      var ret = origSummary.apply(this, arguments);
      try {
        if (!completed && answered > 0) {
          completed = true;
          send('drill_completed', {
            answered: answered,
            correct: correct,
            pct: Math.round(100 * correct / answered),
            total_q: totalQ,
            duration_s: Math.min(Math.round((Date.now() - startTs) / 1000), 36000)
          });
        }
      } catch (e) {}
      return ret;
    };
  }
})();

</script>
<!--/dc-drill-telemetry-v1-->
</body>
