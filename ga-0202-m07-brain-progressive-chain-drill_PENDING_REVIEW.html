<script>
const BANK=[{"q": "FOUNDATION — Lift the brain intact from the skull. One single part is so large it covers and masks all the underlying structures except the brainstem. Which part is it?", "o": ["Cerebellum", "Diencephalon", "Brainstem", "Cerebrum"], "c": 3, "cat": "Basal Nuclei (Parkinsonism)", "r": ["The cerebellum ('small brain') tucks under the occipital lobe; it does not mask the whole brain.", "The diencephalon is the deep connecting part, itself hidden by the cerebrum, not the masking structure.", "The brainstem is precisely the one part the cerebrum does NOT cover.", "Correct. Maini stresses the cerebrum is so large it covers almost all parts of the brain except the brainstem."], "source": "L16 - Parts of the brain - ~01:43", "obj": "Cerebrum is the largest, masking part", "hint": "Largest part; seat of the higher functions.", "quote": "[Maini] 'Cerebrum is so large that it covers almost all the parts of the brain except for brain stem.'"}, {"q": "BUILD — Inside that cerebrum the cortex is gray matter, but islands of gray sit buried in the white matter. Maini insists on the CORRECT term for them. Which is it?", "o": ["Basal ganglia", "Basal cortex", "Basal commissures", "Basal nuclei"], "c": 3, "cat": "Basal Nuclei (Parkinsonism)", "r": ["Maini explicitly rejects this: a ganglion is a group of cell bodies OUTSIDE the CNS, so 'ganglia' is the wrong term here.", "'Cortex' is the surface gray matter; these are deep masses, not cortex.", "Commissures are white-matter fiber crossings, not gray-matter masses.", "Correct. Maini: 'Nuclei is the best terminology, basal ganglia is not the right terminology.'"], "source": "L16 - Basal nuclei - ~08:50", "obj": "Basal nuclei (not ganglia) is the correct term", "hint": "A nucleus = cell bodies INSIDE the CNS.", "quote": "[Maini] 'Nuclei is the best terminology, basal ganglia is not the right terminology.'"}, {"q": "BUILD — Name the three structures Maini lists as the basal nuclei of the cerebrum.", "o": ["Thalamus, hypothalamus, and pineal gland", "Caudate nucleus, thalamus, and claustrum", "Caudate nucleus, putamen, and globus pallidus", "Putamen, red nucleus, and substantia nigra"], "c": 2, "cat": "Basal Nuclei (Parkinsonism)", "r": ["These belong to the diencephalon, not the basal nuclei.", "The thalamus is diencephalon; the trio is caudate, putamen, and globus pallidus.", "Correct. These three deep gray masses are Maini's basal nuclei.", "The red nucleus and substantia nigra are midbrain structures, not basal nuclei."], "source": "L16 - Basal nuclei list - ~10:04", "obj": "Basal nuclei = caudate + putamen + globus pallidus", "hint": "Caudate, putamen, globus pallidus."}, {"q": "CLINICAL — A patient shows slowness, sluggish movement, and a resting tremor, pointing to dysfunction of these basal nuclei. What is the classic disorder Maini names?", "o": ["A cerebellar disorder (which would instead give an intention tremor)", "Parkinsonism", "Wernicke's aphasia", "A thalamic relay failure"], "c": 1, "cat": "Basal Nuclei (Parkinsonism)", "r": ["A cerebellar lesion gives an intention tremor during movement, not the resting tremor of the basal nuclei.", "Correct. Maini gives Parkinsonism as the classic basal-nuclear disorder: slowness, sluggish movement, and a resting tremor.", "That is a posterior-temporal speech (comprehension) lesion, unrelated to movement or tremor.", "The thalamus is the sensory relay; its failure is not the slowness-plus-resting-tremor picture."], "source": "L16 - Basal nuclei function - ~09:39", "obj": "Parkinsonism = basal-nuclear disorder (resting tremor)", "hint": "Resting tremor + bradykinesia = basal nuclei."}, {"q": "FOUNDATION — On the lateral surface of the hemisphere, which sulcus separates the frontal lobe from the parietal lobe?", "o": ["Lateral sulcus", "Central sulcus", "Longitudinal fissure", "Parieto-occipital sulcus"], "c": 1, "cat": "Motor Pathway (Stroke)", "r": ["The lateral sulcus separates the temporal lobe (below) from the frontal and parietal lobes (above).", "Correct. Per Maini's Mentimeter, the central sulcus is the frontal/parietal boundary.", "The longitudinal fissure divides the two hemispheres, not the frontal from the parietal lobe.", "That sulcus helps demarcate the occipital lobe, not the frontal/parietal border."], "source": "L17 - Menti - ~01:26:00", "obj": "Central sulcus = frontal/parietal border", "hint": "The Rolandic sulcus, between pre- and post-central gyri."}, {"q": "BUILD — The gyrus immediately ANTERIOR to that central sulcus (the precentral gyrus) is which functional cortex?", "o": ["Primary motor cortex", "Primary sensory (somesthetic) cortex", "Broca's motor speech area", "Primary visual cortex"], "c": 0, "cat": "Motor Pathway (Stroke)", "r": ["Correct. The precentral gyrus, just anterior to the central sulcus, is the primary motor cortex.", "That is the POSTcentral gyrus, immediately behind the central sulcus.", "Broca's area is only the inferior frontal gyrus, not the whole precentral gyrus.", "The primary visual cortex is in the occipital lobe."], "source": "L16 - Precentral gyrus - ~19:14", "obj": "Precentral gyrus = primary motor cortex", "hint": "PRE-central = motor; POST-central = sensory."}, {"q": "BUILD — The upper motor neuron in that precentral cortex sends the corticospinal (motor) tract down through a deep white-matter band lying between the caudate/globus pallidus and the thalamus. Name this clinically vital band.", "o": ["External capsule", "Internal capsule", "Extreme capsule", "Corpus callosum"], "c": 1, "cat": "Motor Pathway (Stroke)", "r": ["The external capsule lies more laterally, between the putamen and the claustrum.", "Correct. The corticospinal tract runs through the internal capsule, medial to the lentiform nucleus and beside the thalamus.", "The extreme capsule is the most lateral band, between the claustrum and the insular gray matter.", "The corpus callosum connects the two hemispheres; it does not carry the descending corticospinal tract."], "source": "L16 - Internal capsule - ~01:24:04", "obj": "Corticospinal tract runs through the internal capsule", "hint": "The L-shaped capsule beside the thalamus."}, {"q": "CLINICAL — Because the corticospinal tract is packed tightly into the internal capsule, a lesion there (for example a lacunar stroke) produces what deficit?", "o": ["Bilateral deafness", "Loss of smell only", "Contralateral paralysis", "Bitemporal hemianopsia"], "c": 2, "cat": "Motor Pathway (Stroke)", "r": ["Hearing is the temporal-lobe/auditory pathway, not the corticospinal tract.", "Smell is CN I; it is unrelated to the corticospinal motor tract.", "Correct. Maini: the corticospinal tract passes through the internal capsule, so a lesion causes paralysis of the opposite side of the body.", "That defect comes from compression of the optic chiasma, not an internal-capsule motor lesion."], "source": "L16 - Internal capsule - ~01:24:04", "obj": "Internal-capsule lesion = contralateral paralysis", "hint": "One tightly-packed tract: a small lesion, a big deficit."}, {"q": "SYNTHESIS — Those same corticospinal fibers continue into the medulla, where most cross to the opposite side. What is this crossover called, and why is the paralysis contralateral?", "o": ["The pyramidal decussation - the fibers cross, so each side controls the opposite half of the body", "The optic chiasma - the fibers of smell cross here", "The interthalamic adhesion - the two thalami fuse here", "The corpus callosum - the hemispheres exchange fibers here"], "c": 0, "cat": "Motor Pathway (Stroke)", "r": ["Correct. In the lower medulla the corticospinal (pyramidal) fibers decussate, so a lesion above the crossover weakens the OPPOSITE side.", "The optic chiasma carries vision (not smell), and it is not where corticospinal fibers cross.", "That is a gray connection between the thalami, not a motor decussation.", "The corpus callosum links the hemispheres; it is not the corticospinal crossover."], "source": "L17 - Pyramidal decussation - ~19:04", "obj": "Pyramidal decussation explains crossed motor control", "hint": "Pyramids cross in the medulla, so control is crossed."}, {"q": "FOUNDATION — Using her 'London Heathrow' analogy, Maini calls which diencephalic structure the relay center for essentially ALL ascending sensations on their way to the cortex?", "o": ["Hypothalamus", "Pineal gland", "Thalamus", "Cerebellum"], "c": 2, "cat": "Thalamus & Sensation", "r": ["The hypothalamus is the autonomic/endocrine control and the body's thermostat, not the sensory relay.", "The pineal gland secretes melatonin; it is not a sensory relay.", "Correct. Maini: the thalamus is the relay center for all ascending sensations.", "The cerebellum coordinates movement; it does not relay ascending sensation."], "source": "L16 - Thalamus - ~50:03", "obj": "Thalamus = sensory relay center", "hint": "Every sensory 'flight' connects through this hub.", "quote": "[Maini] 'Thalamus is a relay center for all your sensations, which are ascending.'"}, {"q": "BUILD — Maini stresses one special sensation is the exception that bypasses the thalamus entirely. Which one?", "o": ["Vision", "Hearing", "Taste", "Smell (olfaction)"], "c": 3, "cat": "Thalamus & Sensation", "r": ["Vision relays in the thalamus (lateral geniculate) before the cortex.", "Hearing relays in the thalamus (medial geniculate); it does not bypass it.", "Taste is relayed through the thalamus; only smell is the exception.", "Correct. Smell is the single sensation Maini says bypasses the thalamus."], "source": "L16 - Thalamus exception - ~51:08", "obj": "Only smell bypasses the thalamus", "hint": "The one sense wired straight to the cortex."}, {"q": "BUILD — On the base of the brain, that smell pathway is carried by the olfactory tract and bulb, which represent which cranial nerve?", "o": ["Cranial nerve II (optic)", "Cranial nerve I (olfactory)", "Cranial nerve V (trigeminal)", "Cranial nerve VII (facial)"], "c": 1, "cat": "Thalamus & Sensation", "r": ["CN II is vision; it crosses at the optic chiasma, not the olfactory tract.", "Correct. There is no discrete olfactory nerve trunk; the tract and bulb represent CN I.", "CN V is facial sensation and mastication, not smell.", "CN VII is facial expression and taste (anterior tongue), not the olfactory pathway."], "source": "L17 - CN I - ~22:11", "obj": "Olfactory tract/bulb = CN I", "hint": "The first cranial nerve, for the first sense tested."}, {"q": "CLINICAL — For the OTHER general sensations (pain, touch, temperature), Maini teaches a four-neuron pathway (ganglion, then medulla, then thalamus, then cortex) that ends in which gyrus?", "o": ["The precentral gyrus", "The lingual gyrus", "The postcentral gyrus (primary somesthetic cortex)", "The cingulate gyrus"], "c": 2, "cat": "Thalamus & Sensation", "r": ["That is the primary MOTOR cortex, not the sensory endpoint.", "The lingual gyrus is a medial occipital gyrus named for its shape, not the somatosensory cortex.", "Correct. The 4-neuron sensory pathway relays in the thalamus (neuron 3) and ends in the postcentral gyrus, which perceives pain, touch, and temperature.", "The cingulate gyrus is part of the limbic system, not the primary sensory endpoint."], "source": "L17 - Sensory pathway - ~09:39", "obj": "General-sensory pathway ends in the postcentral gyrus", "hint": "Thalamus is the 3rd neuron; the cortical end is POST-central."}, {"q": "FOUNDATION — Where is Broca's area located, and what is its function?", "o": ["Posterior temporal lobe - the sensory speech area", "Occipital lobe - a visual word area", "Frontal lobe - the motor (expressive) speech area", "Parietal lobe - a general sensory area"], "c": 2, "cat": "Speech (Aphasia)", "r": ["That describes Wernicke's area, not Broca's.", "The occipital lobe is visual cortex; it is not Broca's speech area.", "Correct. Broca's area is in the frontal lobe and drives motor (expressive) speech.", "The parietal lobe holds somatosensory cortex, not the motor speech area."], "source": "L16 - Broca's area - ~36:49", "obj": "Broca's = frontal, motor (expressive) speech", "hint": "Broca = Broken speech output; frontal/motor."}, {"q": "CLINICAL — A patient understands everything said to them but is short of words and cannot produce fluent speech. Which lesion is this?", "o": ["Wernicke's aphasia (sensory aphasia)", "Cerebellar dysarthria", "A thalamic sensory lesion", "Broca's aphasia (motor / expressive aphasia)"], "c": 3, "cat": "Speech (Aphasia)", "r": ["In Wernicke's the patient is fluent but cannot comprehend, the opposite picture.", "Dysarthria is slurred articulation from cerebellar dysfunction, not a loss of word production with intact comprehension.", "A thalamic lesion disturbs sensory relay, not fluent word production.", "Correct. With Broca's aphasia the patient comprehends but is non-fluent and short of words."], "source": "L16 - Broca's aphasia - ~40:00", "obj": "Broca's aphasia: non-fluent, comprehension intact", "hint": "Comprehension intact but can't get words out = Broca."}, {"q": "BUILD — Now the comprehension area. Where is Wernicke's area located, and what is its function?", "o": ["Frontal lobe - the motor speech area", "Posterior temporal lobe - the sensory speech area for comprehension", "Insula - a gustatory speech area", "Occipital lobe - visual speech output"], "c": 1, "cat": "Speech (Aphasia)", "r": ["That is Broca's area, not Wernicke's.", "Correct. Wernicke's area sits in the posterior temporal lobe and handles comprehension of speech.", "The insula houses taste cortex; it is not the comprehension speech area.", "The occipital lobe is visual cortex, unrelated to speech comprehension."], "source": "L16 - Wernicke's area - ~37:09", "obj": "Wernicke's = posterior temporal, comprehension", "hint": "Wernicke = Word comprehension; posterior temporal."}, {"q": "CLINICAL — A patient speaks fluently but in meaningless 'word salad' and cannot comprehend what is said to them. Which lesion is this?", "o": ["Wernicke's aphasia (sensory / receptive aphasia)", "Broca's aphasia (motor aphasia)", "Cerebellar dysarthria", "Conduction aphasia"], "c": 0, "cat": "Speech (Aphasia)", "r": ["Correct. Wernicke's aphasia gives fluent but meaningless speech with lost comprehension.", "Broca's is non-fluent with intact comprehension, the opposite of this.", "Dysarthria is a motor-articulation problem, not fluent word-salad with lost comprehension.", "This case matches Maini's description of Wernicke's aphasia, not a conduction lesion."], "source": "L16 - Wernicke's aphasia - ~39:34", "obj": "Wernicke's aphasia: fluent word salad, no comprehension", "hint": "Fluent nonsense + no comprehension = Wernicke."}, {"q": "FOUNDATION — Maini calls the cerebellum the 'small brain.' What is its remarkable chief function?", "o": ["Relay of ascending sensation", "Coordination of movements", "Seat of judgment and personality", "Secretion of cerebrospinal fluid"], "c": 1, "cat": "Cerebellum (Tremor)", "r": ["That is the thalamus, not the cerebellum.", "Correct. Maini: the cerebellum is the seat of coordination of your movements.", "Judgment and personality belong to the prefrontal cortex.", "CSF is secreted by the choroid plexus, not the cerebellum."], "source": "L16 - Cerebellum - ~03:41", "obj": "Cerebellum coordinates movement", "hint": "It fine-tunes and smooths movement.", "quote": "[Maini] 'Cerebellum ... is the seat of coordination of your movements.'"}, {"q": "BUILD — How does the cerebellum refine a movement over time?", "o": ["It issues the only motor command directly to the muscles", "It compares the planned movement (a copy from the motor cortex) with the performed movement (feedback via the spinocerebellar tract) and corrects it", "It relays all sensation to the cortex", "It secretes hormones that raise muscle tone"], "c": 1, "cat": "Cerebellum (Tremor)", "r": ["The primary motor cortex and lower motor neurons issue commands; the cerebellum refines, not initiates.", "Correct. The cerebellum is a comparator: planned vs performed, using spinocerebellar feedback.", "Sensory relay is the thalamus's job.", "The cerebellum is not an endocrine gland; it coordinates via neural feedback."], "source": "L16 - Cerebellar function - ~01:32:03", "obj": "Cerebellum compares planned vs performed (spinocerebellar feedback)", "hint": "A plan-vs-performance comparator."}, {"q": "BUILD — When the cerebellum fails, the hallmark tremor is which type, and how does it differ from the basal-nuclear resting tremor?", "o": ["Resting tremor - present at rest", "No tremor at all", "A tremor only during sleep", "Intention tremor - it appears DURING voluntary movement, unlike the basal-nuclear resting tremor"], "c": 3, "cat": "Cerebellum (Tremor)", "r": ["A resting tremor is the basal-nuclear (Parkinsonian) sign, not the cerebellar one.", "Cerebellar dysfunction does cause a tremor, specifically an intention tremor.", "Cerebellar tremor appears on purposeful movement, not in sleep.", "Correct. The cerebellar hallmark is an intention tremor that worsens on movement, opposite to the resting tremor of the basal nuclei."], "source": "L16 - Cerebellar signs - ~01:34:36", "obj": "Intention tremor = cerebellar hallmark", "hint": "Cerebellum = INTENTION tremor; basal nuclei = RESTING tremor."}, {"q": "CLINICAL — A patient overshoots on the finger-to-nose test, has slurred (dysarthric) speech, and reduced muscle tone. Which structure is dysfunctional?", "o": ["The cerebellum", "The basal nuclei", "The thalamus", "The primary motor cortex"], "c": 0, "cat": "Cerebellum (Tremor)", "r": ["Correct. Overshoot (dysmetria), dysarthria, and hypotonia are Maini's cerebellar signs.", "Basal-nuclear disease gives slowness and a resting tremor, not overshoot with hypotonia.", "The thalamus relays sensation; its failure does not give this coordination picture.", "A motor-cortex lesion causes weakness/paralysis, not overshoot with low tone."], "source": "L16 - Cerebellar dysfunction - ~01:33:32", "obj": "Finger-nose overshoot + dysarthria + hypotonia = cerebellar", "hint": "Overshoot + slurred speech + low tone = cerebellum."}, {"q": "FOUNDATION — On the base of the diencephalon, the two optic (CN II) nerves meet and partially cross at which structure?", "o": ["The optic chiasma", "The interthalamic adhesion", "The interpeduncular fossa", "The pineal gland"], "c": 0, "cat": "Optic Chiasma & Pituitary", "r": ["Correct. The optic chiasma is the crossing point of the two optic nerves.", "That connects the two thalami across the third ventricle; it is not the optic crossing.", "That midbrain depression is where CN III emerges, not where the optic nerves cross.", "The pineal gland secretes melatonin; it is not the optic crossing."], "source": "L16 - Optic chiasma/pituitary - ~54:37", "obj": "Optic chiasma = crossing of the optic nerves", "hint": "The X-shaped crossing of the visual nerves."}, {"q": "BUILD — Maini stresses the optic chiasma's close relationship to which endocrine gland lying just below it?", "o": ["The pituitary gland", "The pineal gland", "The thyroid gland", "The thalamus"], "c": 0, "cat": "Optic Chiasma & Pituitary", "r": ["Correct. Maini stresses the chiasma lies immediately above the pituitary gland.", "The pineal gland sits posteriorly in the diencephalon, not beneath the chiasma.", "The thyroid is in the neck, far from the optic chiasma.", "The thalamus is the sensory relay above, not the endocrine gland below the chiasma."], "source": "L16 - Optic chiasma/pituitary - ~54:37", "obj": "Optic chiasma sits just above the pituitary", "hint": "The 'master gland' in the sella, right under the chiasma."}, {"q": "CLINICAL — Because the chiasma sits right above the pituitary, an enlarging pituitary tumor (adenoma) compresses it. What visual defect results?", "o": ["Contralateral paralysis", "Complete blindness in one eye only", "Bitemporal hemianopsia (loss of the outer / temporal visual fields)", "Pulsatile exophthalmos"], "c": 2, "cat": "Optic Chiasma & Pituitary", "r": ["That is an internal-capsule motor lesion, not chiasmal compression.", "A single optic-nerve lesion (before the chiasma) blinds one eye; chiasmal compression gives the bitemporal pattern.", "Correct. A pituitary adenoma pushes up on the crossing fibers, producing bitemporal hemianopsia.", "That follows internal-carotid rupture in the cavernous sinus, not chiasmal compression."], "source": "L16 - Optic chiasma/pituitary - ~54:37", "obj": "Pituitary tumor compresses chiasma -> bitemporal hemianopsia", "hint": "Pressure on the crossing fibers knocks out the outer fields."}, {"q": "SYNTHESIS — That same optic chiasma is also encircled, at the base of the brain, by an important arterial ring (along with the infundibulum and mammillary bodies). Name it.", "o": ["The cavernous sinus", "The Circle of Willis", "The superior sagittal sinus", "The internal acoustic meatus"], "c": 1, "cat": "Optic Chiasma & Pituitary", "r": ["The cavernous sinus is a paired venous sinus beside the sella, not the arterial ring around the chiasma.", "Correct. The Circle of Willis surrounds the optic chiasma, infundibulum, and mammillary bodies at the brain's base.", "That is a midline venous sinus at the vertex, not a basal arterial ring.", "That is a canal for CN VII/VIII and the labyrinthine artery, not the arterial ring."], "source": "L17 - Circle location - ~01:12:31", "obj": "Circle of Willis surrounds the optic chiasma / infundibulum / mammillary bodies", "hint": "The arterial anastomotic ring at the base of the brain."}, {"q": "FOUNDATION — Maini says the brain has a DUAL arterial supply. Which two arterial systems feed it?", "o": ["The internal carotid arteries and the vertebral arteries", "The external carotid and facial arteries", "The middle meningeal and ophthalmic arteries", "The superior and inferior sagittal sinuses"], "c": 0, "cat": "Anterior Circulation (MCA)", "r": ["Correct. The internal carotid and vertebral arteries are the brain's two supplying systems.", "The external carotid supplies the face and scalp, not the brain substance.", "These are branches supplying dura and orbit, not the two main brain systems.", "Those are venous sinuses that drain the brain, not arteries that supply it."], "source": "L17 - Dual blood supply - ~58:06", "obj": "Brain supply = internal carotid + vertebral arteries", "hint": "One set in front (carotid), one behind (vertebral)."}, {"q": "BUILD — Follow the internal carotid. After giving off the ophthalmic artery, it ends by dividing into which two terminal branches?", "o": ["The anterior cerebral and middle cerebral arteries", "The anterior and posterior cerebral arteries", "The basilar and vertebral arteries", "The superior and inferior cerebellar arteries"], "c": 0, "cat": "Anterior Circulation (MCA)", "r": ["Correct. The internal carotid terminates as the anterior and middle cerebral arteries.", "The posterior cerebral arteries arise from the basilar (posterior circulation), not the carotid termination.", "Those belong to the posterior (vertebrobasilar) system, not the carotid termination.", "Cerebellar arteries come off the vertebrobasilar system, not the internal carotid."], "source": "L17 - ICA terminal branches - ~01:01:55", "obj": "ICA ends as anterior + middle cerebral arteries", "hint": "ACA and MCA are the carotid's terminal branches."}, {"q": "CLINICAL — Of those two, which supplies the insula and the lateral surface of the frontal, parietal, and temporal lobes, and is the artery MOST often obstructed in atherosclerotic stroke?", "o": ["The anterior cerebral artery", "The middle cerebral artery (MCA)", "The posterior cerebral artery", "The labyrinthine artery"], "c": 1, "cat": "Anterior Circulation (MCA)", "r": ["The ACA supplies the MEDIAL surface of the frontal and parietal lobes, not the lateral surface.", "Correct. The MCA supplies the lateral cortex and insula and is the commonest artery obstructed in stroke.", "The PCA supplies the occipital lobe from the posterior circulation, not the lateral convexity.", "The labyrinthine artery supplies the inner ear, not the cerebral cortex."], "source": "L17 - MCA territory - ~01:04:39", "obj": "MCA = lateral cortex + insula; commonest stroke artery", "hint": "The big lateral-surface artery = the commonest stroke."}, {"q": "SYNTHESIS — If that MCA is blocked, what anastomotic structure can still deliver blood to the ischemic region by an alternate (collateral) route?", "o": ["The superior sagittal sinus", "The choroid plexus", "The arachnoid granulations", "The Circle of Willis"], "c": 3, "cat": "Anterior Circulation (MCA)", "r": ["That is a venous drainage channel, not an arterial collateral supply.", "The choroid plexus makes CSF; it does not reroute arterial blood.", "Those absorb CSF into a venous sinus; they are not an arterial collateral.", "Correct. The Circle of Willis provides collateral flow when one feeding artery is blocked."], "source": "L17 - Circle purpose - ~01:13:18", "obj": "Circle of Willis = collateral supply if one artery blocks", "hint": "The base-of-brain ring reroutes blood around a block."}, {"q": "FOUNDATION — Turn to the posterior supply. The two vertebral arteries unite to form which single midline artery?", "o": ["The basilar artery", "The internal carotid artery", "The anterior cerebral artery", "The middle meningeal artery"], "c": 0, "cat": "Posterior Circulation (Vision)", "r": ["Correct. The two vertebral arteries unite to form the basilar artery.", "The internal carotid is a separate anterior system; it is not formed by the vertebrals.", "The ACA is a carotid terminal branch, not the union of the vertebrals.", "That supplies the dura and arises from the maxillary artery, unrelated to the vertebrals."], "source": "L17 - Basilar artery - ~01:06:46", "obj": "Two vertebrals unite to form the basilar artery", "hint": "Two vertebrals join into one basilar."}, {"q": "BUILD — At the top of the pons, the basilar artery ends by dividing into which two arteries?", "o": ["The two anterior cerebral arteries", "The two middle cerebral arteries", "The two vertebral arteries", "The two posterior cerebral arteries"], "c": 3, "cat": "Posterior Circulation (Vision)", "r": ["The anterior cerebral arteries come from the internal carotids, not the basilar.", "The middle cerebral arteries are carotid branches, not basilar terminals.", "The vertebrals FORM the basilar; they are not its terminal branches.", "Correct. The basilar terminates as the two posterior cerebral arteries."], "source": "L17 - Basilar termination - ~01:07:59", "obj": "Basilar ends as the two posterior cerebral arteries", "hint": "Basilar terminates as the PCAs."}, {"q": "BUILD — Those posterior cerebral arteries supply the occipital lobe. Which primary cortex lives in the occipital lobe?", "o": ["The primary visual cortex", "The primary auditory cortex", "The primary motor cortex", "The primary gustatory cortex"], "c": 0, "cat": "Posterior Circulation (Vision)", "r": ["Correct. The occipital lobe houses the primary visual cortex.", "Auditory cortex is in the temporal lobe, not the occipital lobe.", "Motor cortex is the precentral gyrus of the frontal lobe.", "Taste cortex is in the insula, not the occipital lobe."], "source": "L17 - Menti - ~01:29:29", "obj": "Occipital lobe = primary visual cortex", "hint": "Occipital = Optics / vision."}, {"q": "CLINICAL — Because of this, a posterior-circulation (vertebrobasilar) stroke threatens vision. Where does the occipital lobe's blood ULTIMATELY originate?", "o": ["The vertebral arteries (via the basilar and posterior cerebral arteries)", "The internal carotid arteries", "The external carotid arteries", "The middle cerebral arteries"], "c": 0, "cat": "Posterior Circulation (Vision)", "r": ["Correct. Trace it back: PCA to basilar to the vertebral arteries, so occipital blood originates from the vertebrals.", "The internal carotids feed the anterior circulation, not the occipital lobe's ultimate supply.", "The external carotid supplies the face and scalp, not the occipital cortex.", "The MCA supplies the lateral convexity, not the occipital pole."], "source": "L17 - Occipital supply - ~01:11:05", "obj": "Occipital-lobe blood originates from the vertebral arteries", "hint": "Trace it back: PCA -> basilar -> vertebrals."}, {"q": "FOUNDATION — What structure, found in each ventricle, secretes the cerebrospinal fluid?", "o": ["The arachnoid granulations", "The pineal gland", "The choroid plexus", "The pituitary gland"], "c": 2, "cat": "CSF & Hydrocephalus", "r": ["Those ABSORB CSF into a venous sinus; they do not secrete it.", "The pineal gland secretes melatonin, not CSF.", "Correct. The choroid plexus in each ventricle secretes CSF.", "The pituitary is an endocrine gland; it does not make CSF."], "source": "L17 - Choroid plexus - ~02:48", "obj": "Choroid plexus secretes CSF", "hint": "The 'CSF factory' inside the ventricles."}, {"q": "BUILD — After circulating through the ventricles, CSF escapes the fourth ventricle into the subarachnoid space through which foramina?", "o": ["Two lateral foramina of Luschka and one median foramen of Magendie", "A single interventricular foramen", "The cerebral aqueduct only", "Two foramina of Magendie and one of Luschka"], "c": 0, "cat": "CSF & Hydrocephalus", "r": ["Correct. The fourth ventricle drains via two lateral (Luschka) and one median (Magendie) aperture.", "The interventricular foramen connects the lateral to the third ventricle, not the fourth to the subarachnoid space.", "The aqueduct links the third and fourth ventricles; it is not the fourth-ventricle outflow to the subarachnoid space.", "The numbers are reversed: there are two Luschka (lateral) and one Magendie (median)."], "source": "L17 - CSF apertures - ~46:08", "obj": "4th-ventricle exits = 2 Luschka (lateral) + 1 Magendie (median)", "hint": "Two Luschka (lateral), one Magendie (median)."}, {"q": "BUILD — From the subarachnoid space, CSF is finally absorbed by which structures, into which venous sinus?", "o": ["The choroid plexus, into the straight sinus", "The pineal gland, into the cavernous sinus", "The pituitary, into the sigmoid sinus", "Arachnoid granulations, into the superior sagittal sinus"], "c": 3, "cat": "CSF & Hydrocephalus", "r": ["The choroid plexus secretes CSF; it does not absorb it.", "The pineal gland secretes melatonin and is unrelated to CSF absorption.", "The pituitary is endocrine and does not absorb CSF.", "Correct. Arachnoid granulations absorb CSF into the superior sagittal sinus."], "source": "L17 - Arachnoid granulations - ~50:00", "obj": "Arachnoid granulations absorb CSF into the superior sagittal sinus", "hint": "Granulations drain CSF into the big midline sinus."}, {"q": "CLINICAL — If meningitis blocks those arachnoid granulations, CSF is still secreted but not absorbed. What results?", "o": ["A subdural hematoma", "Bitemporal hemianopsia", "Hydrocephalus / raised intracranial pressure", "Loss of the sense of smell"], "c": 2, "cat": "CSF & Hydrocephalus", "r": ["That is a venous bleed from bridging veins, not a CSF-absorption failure.", "That is chiasmal compression by a pituitary tumor, not blocked CSF absorption.", "Correct. Blocked granulations mean CSF is made but not drained, raising intracranial pressure (hydrocephalus).", "Anosmia is a CN I problem, unrelated to CSF drainage."], "source": "L17 - Hydrocephalus - ~51:57", "obj": "Blocked arachnoid granulations -> hydrocephalus / raised ICP", "hint": "Make it but can't drain it -> pressure builds."}, {"q": "FOUNDATION — A blow to the pterion in the temporal region tears which artery?", "o": ["The middle cerebral artery", "The middle meningeal artery", "The basilar artery", "The labyrinthine artery"], "c": 1, "cat": "Intracranial Hemorrhages", "r": ["The middle cerebral artery is deep within the lateral sulcus; the pterion overlies the middle MENINGEAL artery.", "Correct. The pterion overlies the middle meningeal artery, which a blow there can tear.", "The basilar sits anterior to the brainst function showSummary(){let app=document.getElementById('app');let uniqueAnswered=Object.keys(answerMap).length;let mastered=0;let everWrongCount=0;for(let k in answerMap){if(answerMap[k].isCorrect)mastered++;if(answerMap[k].everWrong)everWrongCount++;}let pct=uniqueAnswered>0?Math.round(mastered/uniqueAnswered*100):0;let cls=pct>=85?'great':pct>=65?'ok':'rough';let catHTML='<table class="cat-table"><tr><th>Study Guide Item</th><th>Score</th></tr>';for(let cat of CAT_NAMES){if(catStats[cat]&&catStats[cat].t>0)catHTML+='<tr><td>'+cat+'</td><td>'+catStats[cat].c+'/'+catStats[cat].t+'</td></tr>';}catHTML+='</table>';app.innerHTML='<h1>🔗 GA 0202 · The Brain · Progressive Chain Drill</h1><p class="subtitle">Dr. Maini — foundation → clinical chains · each answer feeds the next step · 12 chains, 49 links</p><div class="summary" style="display:block"><h2>Quiz Complete!</h2><div class="pct '+cls+'">'+pct+'%</div><p style="color:#94a3b8">'+mastered+' of '+uniqueAnswered+' mastered on latest attempt</p><p class="detail">Attempts: '+attempts+' | Ever missed: '+everWrongCount+' | Re-asked: '+(attempts-uniqueAnswered)+'</p>'+catHTML+(everWrongCount>0?'<button class="review-btn" onclick="reviewMissed()">Review Only Missed ('+everWrongCount+')</button>':'')+'<br><button class="restart-btn" onclick="restart()">Restart Drill</button></div>';}
function reviewMissed(){let missed=answerHistory.filter(function(id){return answerMap[id]&&answerMap[id].everWrong;});if(missed.length===0)return;reviewList=missed;browseIdx=0;renderHistoryItem();}
function restart(){questions=shuffle(BANK.slice());idx=0;score=0;attempts=0;reaskQueue=[];answerMap={};answerHistory=[];browseIdx=-1;reviewList=null;CAT_NAMES.forEach(function(c){catStats[c]={c:0,t:0};});render();saveState();}
function confirmRestart(){if(confirm('Restart the drill? All progress will be lost.'))restart();}
function toggleInstr(){instrOpen=!instrOpen;if(browseIdx>=0)renderHistoryItem();else render();}

<script>

// ===== Progressive Chain controller: follow-order, re-ask, coach read-aloud =====
var _origShuffle = shuffle;
var followMode = true;      // chain order (foundation -> clinical) by default
var reaskMode = true;
shuffle = function(a){ return followMode ? a : _origShuffle(a); };

// ---- coach (Web Speech) ----
var coachOn = false, coachRate = 1.0, _coachLastKey = null, _coachVoice = null;
try { coachOn = localStorage.getItem('ga0202_m07brain_chain_coach') === '1'; } catch(e){}
try { var _r = parseFloat(localStorage.getItem('ga0202_m07brain_chain_rate')); if(_r>=0.5 && _r<=3) coachRate=_r; } catch(e){}

function _pickCoachVoice(){
  try {
    var vs = (window.speechSynthesis && window.speechSynthesis.getVoices()) || [];
    _coachVoice = vs.find(function(v){return /microsoft.*ava.*natural/i.test(v.name);})
      || vs.find(function(v){return /microsoft.*emma.*natural/i.test(v.name);})
      || vs.find(function(v){return /microsoft.*andrew.*natural/i.test(v.name);})
      || vs.find(function(v){return /google us english/i.test(v.name);})
      || vs.find(function(v){return /female/i.test(v.name);}) || null;
  } catch(e){ _coachVoice = null; }
}
if (window.speechSynthesis){
  _pickCoachVoice();
  window.speechSynthesis.onvoiceschanged = _pickCoachVoice;
}
function _stripTts(t){
  return (t||'').replace(/[→]/g,' to ').replace(/[—–]/g,', ')
    .replace(/\s+/g,' ').trim();
}
function coachSpeak(text){
  if(!window.speechSynthesis){ return; }
  window.speechSynthesis.cancel();
  var u = new SpeechSynthesisUtterance(_stripTts(text));
  u.rate = coachRate;
  if(!_coachVoice) _pickCoachVoice();
  if(_coachVoice){ u.voice = _coachVoice; u.lang = _coachVoice.lang || 'en-US'; }
  window.speechSynthesis.speak(u);
}
function coachReadCurrent(){
  var card = document.querySelector('.card'); if(!card) return;
  var qt = card.querySelector('.q-text');
  var opts = card.querySelectorAll('.opt-btn');
  var parts = [];
  if(qt){ parts.push(qt.textContent.replace(/^Q\d+(\s+of\s+\d+)?:\s*/i,'')); }
  opts.forEach(function(o,i){
    var clone = o.cloneNode(true);
    var rat = clone.querySelector('.rationale'); if(rat) rat.remove();
    var txt = clone.textContent.replace(/^\s*[A-D]\.\s*/,'').trim();
    parts.push('Option ' + String.fromCharCode(65+i) + '. ' + txt);
  });
  coachSpeak(parts.join('. '));
}
function coachStop(){ if(window.speechSynthesis) window.speechSynthesis.cancel(); }
function coachToggleMode(){
  coachOn = !coachOn;
  try{ localStorage.setItem('ga0202_m07brain_chain_coach', coachOn?'1':'0'); }catch(e){}
  _syncCoachBar();
  if(coachOn){ _coachLastKey=null; coachReadCurrent(); } else { coachStop(); }
}
function coachSetRate(v){
  coachRate = Math.max(0.5, Math.min(3, parseFloat(v)||1));
  try{ localStorage.setItem('ga0202_m07brain_chain_rate', String(coachRate)); }catch(e){}
  var d = document.getElementById('coachRateVal'); if(d) d.textContent = coachRate.toFixed(1)+'x';
}
function _syncCoachBar(){
  var b = document.getElementById('coachToggle');
  if(b){ b.classList.toggle('on', coachOn); b.textContent = '🔊 Coach Mode: ' + (coachOn?'ON':'OFF'); }
  var d = document.getElementById('coachRateVal'); if(d) d.textContent = coachRate.toFixed(1)+'x';
  var r = document.getElementById('coachRate'); if(r) r.value = coachRate;
}

// ---- chrome injection (banner + coach bar + follow-toggle + reask banner) ----
function _injectChrome(){
  var app = document.getElementById('app'); if(!app) return;
  if(document.getElementById('chain-chrome')) return;
  var sub = app.querySelector('.subtitle');
  var anchor = app.querySelector('.stats') || app.querySelector('.card');
  var wrap = document.createElement('div');
  wrap.id = 'chain-chrome';
  wrap.innerHTML =
    '<div class="edge-banner">🔊 Best voices in Microsoft Edge (it has the natural Ava / Emma / Andrew voices). Other browsers work but sound more robotic.</div>'
    + '<div class="coach-bar">'
    + '<button id="coachToggle" class="coach-btn' + (coachOn?' on':'') + '" onclick="coachToggleMode()">🔊 Coach Mode: ' + (coachOn?'ON':'OFF') + '</button>'
    + '<button class="coach-btn coach-read" onclick="coachReadCurrent()">▶ Read question</button>'
    + '<button class="coach-btn coach-stop" onclick="coachStop()">⏹ Stop</button>'
    + '<span class="coach-rate-label">Speed</span>'
    + '<input id="coachRate" type="range" min="0.5" max="3" step="0.1" value="' + coachRate + '" oninput="coachSetRate(this.value)">'
    + '<span id="coachRateVal" class="coach-rate-val">' + coachRate.toFixed(1) + 'x</span>'
    + '</div>'
    + '<div class="follow-toggle">'
    + '<button class="follow-btn' + (followMode?' active':'') + '" onclick="setFollowMode(true)">🔗 Chain Order (foundation → clinical)</button>'
    + '<button class="follow-btn' + (!followMode?' active':'') + '" onclick="setFollowMode(false)">🔀 Shuffle Mode</button>'
    + '<button class="reask-btn' + (reaskMode?' active':'') + '" onclick="toggleReask()">🚨 Re-Ask Missed</button>'
    + '</div>'
    + '<div id="reask-banner" class="reask-banner"></div>';
  if(sub && sub.parentNode===app){ app.insertBefore(wrap, sub.nextSibling); }
  else if(anchor){ app.insertBefore(wrap, anchor); }
  else { app.insertBefore(wrap, app.firstChild); }
  buildReaskBar();
}

function setFollowMode(on){
  followMode = on;
  if(Object.keys(answerMap).length === 0){
    questions = on ? BANK.slice() : _origShuffle(BANK.slice());
    idx = 0;
  }
  saveState(); render();
}
function toggleReask(){
  reaskMode = !reaskMode;
  var btns = document.querySelectorAll('.reask-btn');
  btns.forEach(function(b){ b.classList.toggle('active', reaskMode); });
  buildReaskBar();
}
function buildReaskBar(){
  var bar = document.getElementById('reask-banner'); if(!bar) return;
  var missed = [];
  if(typeof answerMap !== 'undefined'){
    for(var k in answerMap){ if(answerMap.hasOwnProperty(k) && !answerMap[k].isCorrect) missed.push(k); }
  }
  if(reaskMode && missed.length>0){
    bar.style.display='block';
    bar.innerHTML='⚠️ ' + missed.length + ' MISSED — <button onclick="drillMissed()">DRILL MISSED NOW</button>';
  } else { bar.style.display='none'; }
}
function drillMissed(){
  var missed=[];
  for(var k in answerMap){ if(answerMap.hasOwnProperty(k) && !answerMap[k].isCorrect) missed.push(parseInt(k)); }
  if(missed.length===0) return;
  questions = missed.map(function(id){ return BANK[id]; });
  for(var i=questions.length-1;i>0;i--){ var j=Math.floor(Math.random()*(i+1)); var t=questions[i]; questions[i]=questions[j]; questions[j]=t; }
  idx=0; score=0; attempts=0; answerMap={}; answerHistory=[];
  render();
}

// re-ask card glow + chrome, then coach auto-read on new question
function _postRender(){
  _injectChrome();
  var card = document.querySelector('.card');
  if(card){
    var isReask = (typeof idx!=='undefined') && idx<questions.length && questions[idx] && questions[idx]._isReask;
    if(isReask){
      card.classList.add('reask-glow');
      if(!card.querySelector('.reask-card-badge')){
        var badge=document.createElement('div');
        badge.className='reask-card-badge';
        badge.textContent='🔁 RE-ASK — You missed this one. Get it right!';
        card.insertBefore(badge, card.firstChild);
      }
    } else { card.classList.remove('reask-glow'); }
  }
  // coach auto-read when the visible question changes
  if(coachOn){
    var qt = card ? card.querySelector('.q-text') : null;
    var key = qt ? qt.textContent.slice(0,60) : null;
    if(key && key !== _coachLastKey){ _coachLastKey = key; setTimeout(coachReadCurrent, 120); }
  }
}

var _origRender2 = render;
render = function(){ _origRender2.apply(this, arguments); _postRender(); };
var _origHist2 = renderHistoryItem;
renderHistoryItem = function(){ _origHist2.apply(this, arguments); _postRender(); };

// boot with wrappers + chain order active
init();

</script>

<script>
/* DC Drill Telemetry v1
 *
 * Wraps the two globals every DC MC-drill engine exposes — pick(i) and
 * showSummary() — and reports three events through the analytics helper:
 *   drill_started    once, on the first answered question
 *   q_answered       {h, stem, c, t_ms}  first attempt per question per load
 *   drill_completed  {answered, correct, pct, duration_s}
 *
 * Correct/wrong is read back off the option element AFTER the engine marks it,
 * so this never re-implements (or can disagree with) the engine's own scoring.
 * Counters are kept here rather than scraped from the summary markup, which
 * differs between drill families.
 *
 * Families covered:
 *   A  .opt-btn  + picked-correct / picked-wrong  + stem in .q-text
 *   B  .option   + correct        / wrong         + stem in .question
 *
 * No-ops safely if the helper or the engine globals are absent.
 */
(function () {
  'use strict';
  if (window.__dcDrillTelemetry) return;
  window.__dcDrillTelemetry = true;

  var OPT_SEL = '.opt-btn, .option';
  var STEM_SEL = '.q-text, .question';
  var OK_CLASSES = ['picked-correct', 'correct'];
  var BAD_CLASSES = ['picked-wrong', 'wrong'];

  var started = false;
  var completed = false;
  var startTs = Date.now();
  var shownTs = Date.now();
  var seen = {};            // stem-hash -> true; first attempt only
  var answered = 0;
  var correct = 0;
  var totalQ = null;

  function send(type, payload) {
    try {
      if (window.__dcAnalytics && window.__dcAnalytics.send) {
        window.__dcAnalytics.send(type, payload);
      }
    } catch (e) {}
  }

  // djb2. Case/punctuation/whitespace-insensitive so the id survives the
  // engine's shuffling and re-rendering.
  function stemHash(s) {
    var h = 5381;
    var t = (s || '').toLowerCase().replace(/[^a-z0-9]+/g, ' ').trim();
    for (var i = 0; i < t.length; i++) { h = ((h << 5) + h + t.charCodeAt(i)) >>> 0; }
    return ('00000000' + h.toString(16)).slice(-8);
  }

  // Family A prefixes the stem with "Q3 of 217: " — strip it, or the same
  // question hashes differently depending on where the shuffle put it.
  function readStem() {
    var el = document.querySelector(STEM_SEL);
    if (!el) return '';
    var raw = (el.textContent || '').replace(/\s+/g, ' ').trim();
    var m = raw.match(/^Q(\d+)\s+of\s+(\d+)\s*:\s*/i);
    if (m) { totalQ = parseInt(m[2], 10); raw = raw.slice(m[0].length); }
    return raw.trim();
  }

  // djb2 over the exact string (no normalization) — used to fingerprint image
  // bytes, where case and punctuation are significant.
  function rawHash(s) {
    var h = 5381;
    for (var i = 0; i < s.length; i++) { h = ((h << 5) + h + s.charCodeAt(i)) >>> 0; }
    return ('00000000' + h.toString(16)).slice(-8);
  }

  // Visual drills reuse one generic stem ("Identify the indicated structure.")
  // across every plate — the image is what distinguishes them. Fold an image
  // id into the hash so those questions don't collapse into one row.
  //
  // Plates are usually inlined as base64 data: URIs, where a "filename" is
  // meaningless (and its tail is a 1-2 char near-collision). For those,
  // fingerprint the bytes: length + head + tail, since same-encoder JPEGs can
  // share a long common prefix.
  function readImg() {
    var el = document.querySelector(STEM_SEL);
    if (!el) return '';
    var scope = (el.closest && el.closest('.card')) || el.parentElement;
    var img = scope && scope.querySelector ? scope.querySelector('img') : null;
    var src = img ? (img.getAttribute('src') || '') : '';
    if (!src) return '';
    if (/^data:/i.test(src)) {
      return 'd:' + rawHash(src.length + '|' + src.slice(0, 2000) + '|' + src.slice(-2000));
    }
    return src.split('?')[0].split('/').pop().slice(0, 60);
  }

  function hasToken(el, names) {
    for (var i = 0; i < names.length; i++) {
      if (el.classList.contains(names[i])) return true;
    }
    return false;
  }

  // A third engine family exists whose handler is pick(optionIndex, isCorrect)
  // and which has no showSummary(). Its marking semantics differ, so refuse to
  // wrap anything that isn't the single-argument pick(i) contract rather than
  // guess and mis-score it.
  var origPick = window.pick;
  if (typeof origPick === 'function' && origPick.length === 1) {
    window.pick = function (i) {
      var opts = document.querySelectorAll(OPT_SEL);
      // The engine early-returns when the question is already answered
      // (options carry .disabled). Mirror that test so a second click on an
      // answered question doesn't log a phantom attempt.
      var alreadyAnswered = !!(opts[0] && opts[0].classList.contains('disabled'));
      var stem = readStem();
      var img = readImg();

      var ret = origPick.apply(this, arguments);

      try {
        var el = opts[i];
        if (!alreadyAnswered && el && stem) {
          var isOk = hasToken(el, OK_CLASSES);
          var isBad = hasToken(el, BAD_CLASSES);
          if (isOk || isBad) {
            var h = stemHash(stem + '|' + img);
            if (!seen[h]) {
              seen[h] = true;
              answered++;
              if (isOk) correct++;
              if (!started) {
                started = true;
                send('drill_started', { total_q: totalQ });
              }
              send('q_answered', {
                h: h,
                stem: stem.slice(0, 80),
                img: img || undefined,
                c: isOk ? 1 : 0,
                t_ms: Math.min(Date.now() - shownTs, 600000)
              });
            }
            shownTs = Date.now();
          }
        }
      } catch (e) {}
      return ret;
    };
  }

  var origSummary = window.showSummary;
  if (typeof origSummary === 'function') {
    window.showSummary = function () {
      var ret = origSummary.apply(this, arguments);
      try {
        if (!completed && answered > 0) {
          completed = true;
          send('drill_completed', {
            answered: answered,
            correct: correct,
            pct: Math.round(100 * correct / answered),
            total_q: totalQ,
            duration_s: Math.min(Math.round((Date.now() - startTs) / 1000), 36000)
          });
        }
      } catch (e) {}
      return ret;
    };
  }
})();

</script>
<!--/dc-drill-telemetry-v1-->
