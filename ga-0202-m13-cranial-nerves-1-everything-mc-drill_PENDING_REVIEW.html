hetic Trunk", "r": ["Opposite C6 on the inferior thyroid artery is the MIDDLE cervical ganglion.", "Between C7 and the first rib is the INFERIOR (stellate) ganglion.", "Correct. The superior cervical ganglion (the longest) lies opposite the C2-C3 vertebrae, behind the internal carotid artery and anterior to the longus capitis muscle.", "It lies anterior to longus capitis, behind the internal carotid - not within the carotid sheath at the atlas."], "source": "L28 · Superior cervical ganglion", "quote": "[Maini] 'Superior cervical ganglion is located opposite second and third cervical vertebrae... behind the internal carotid artery and anterior to longus capitis muscle.'", "obj": "SCG location", "hint": "Longest ganglion, C2-C3, behind ICA."}, {"q": "Which is a named branch of the SUPERIOR cervical ganglion, per Maini?", "o": ["The gray rami to C7-C8", "Arterial branches to the subclavian artery", "The internal carotid nerve (to the internal carotid plexus)", "Gray rami to C5-C6"], "c": 2, "cat": "Cervical Sympathetic Trunk", "r": ["Gray rami to C7-C8 come from the inferior ganglion.", "Subclavian arterial branches come from the inferior ganglion.", "Correct. The superior cervical ganglion gives the internal carotid nerve, which forms the internal carotid (ICA) plexus.", "Gray rami to C5-C6 come from the middle ganglion."], "source": "L28 · Superior cervical ganglion branches", "quote": "[Maini] 'Internal carotid nerve for ICA plexus.'", "obj": "SCG branches", "hint": "Internal carotid nerve -> ICA plexus."}, {"q": "Maini explains that cardiac pain is referred to the neck and side of the head. Why?", "o": ["Because the vagus carries pain from the heart to the scalp", "Because visceral afferent (GVA) fibres follow the cardiac (sympathetic) nerves back from the heart, which reach the neck ganglia", "Because the phrenic nerve refers heart pain to the neck", "Because the cardiac plexus lies in the neck"], "c": 1, "cat": "Cervical Sympathetic Trunk", "r": ["The referral she describes follows the sympathetic cardiac nerves' afferents, not a vagal scalp pathway.", "Correct. Cardiac sympathetic branches run from the cervical ganglia to the heart, and GVA (pain) fibres follow them in reverse, so heart pain refers to the neck and side of the head.", "The phrenic nerve refers diaphragm/pericardium pain to the shoulder, not this neck-and-head cardiac referral.", "The cardiac plexus is in the thorax; the cervical ganglia merely send branches to it."], "source": "L28 · Cardiac referred pain", "quote": "[Maini] 'Cardiac pain is referred to neck and side of the head, because GVA fibers also follow these cardiac nerves.'", "obj": "Referred cardiac pain", "hint": "Pain afferents hitch a ride on cardiac sympathetics."}, {"q": "Where does Maini locate the MIDDLE cervical ganglion?", "o": ["Opposite C2-C3, behind the internal carotid artery", "Between the C7 transverse process and the first rib", "Opposite the thyroid cartilage, within the carotid sheath", "Opposite the C6 vertebra, resting on top of the inferior thyroid artery"], "c": 3, "cat": "Cervical Sympathetic Trunk", "r": ["Opposite C2-C3 behind the internal carotid is the SUPERIOR ganglion.", "Between C7 and the first rib is the INFERIOR ganglion.", "It is on the inferior thyroid artery at C6, not within the carotid sheath at the thyroid cartilage.", "Correct. The middle cervical ganglion lies opposite C6, superior to (on top of) the inferior thyroid artery."], "source": "L28 · Middle cervical ganglion", "quote": "[Maini] 'Middle cervical ganglion is located opposite 6th cervical vertebra... it lies just superior to inferior thyroid artery.'", "obj": "MCG location", "hint": "C6, riding the inferior thyroid artery."}, {"q": "The INFERIOR cervical ganglion is most often fused with which ganglion, forming what named structure?", "o": ["Fused with the middle cervical ganglion to form the vertebral ganglion", "Fused with the superior cervical ganglion to form the carotid ganglion", "Fused with the C7 dorsal root ganglion", "Fused with the first thoracic ganglion to form the stellate ganglion"], "c": 3, "cat": "Cervical Sympathetic Trunk", "r": ["It does not fuse with the middle cervical ganglion, and vertebral ganglion is not the fusion product she names.", "It does not fuse with the superior cervical ganglion.", "It fuses with the T1 sympathetic ganglion, not a dorsal root ganglion.", "Correct. The inferior cervical ganglion usually fuses with the first thoracic (T1) ganglion to form the stellate ganglion."], "source": "L28 · Inferior cervical ganglion", "quote": "[Maini] 'Inferior cervical ganglion and your first thoracic ganglion are fused together to form stellate ganglion.'", "obj": "Stellate ganglion", "hint": "Inferior cervical + T1 = stellate."}, {"q": "Where is the inferior cervical ganglion located, and which arteries receive its arterial branches, per Maini?", "o": ["Opposite C6, on the inferior thyroid artery; branches to the inferior thyroid artery", "Opposite C2-C3; branches to the external carotid artery", "In the interval between the C7 transverse process and the neck of the first rib; branches to the subclavian and vertebral arteries", "At the base of the skull; branches to the internal carotid artery"], "c": 2, "cat": "Cervical Sympathetic Trunk", "r": ["C6 on the inferior thyroid artery describes the MIDDLE ganglion.", "C2-C3 with external carotid branches describes the SUPERIOR ganglion.", "Correct. It lies between the C7 transverse process and the neck of the first rib and sends arterial branches to the subclavian and vertebral arteries.", "The skull-base/internal-carotid description fits the SUPERIOR ganglion, not the inferior."], "source": "L28 · Inferior cervical ganglion", "quote": "[Maini] 'It lies in the interval between transverse process of C7 and neck of the first rib... arterial branches to subclavian and vertebral arteries.'", "obj": "ICG location & branches", "hint": "C7-first rib; subclavian + vertebral arteries."}, {"q": "Maini lists four layers of the deep cervical fascia. Which set is correct?", "o": ["Superficial, investing, buccopharyngeal, and pretracheal", "Investing, pretracheal, alar, and prevertebral only", "Platysma, investing, prevertebral, and pericardial", "Investing, pretracheal, prevertebral, and the carotid sheath"], "c": 3, "cat": "Deep Cervical Fascia", "r": ["Superficial and buccopharyngeal are not in her four-layer list.", "She counts the carotid sheath as the fourth layer, not a separate alar layer.", "The platysma is a superficial muscle of facial expression, not a deep fascial layer.", "Correct. The four layers are the investing layer, the pretracheal layer, the prevertebral layer, and the carotid sheath."], "source": "L28 · Deep cervical fascia", "quote": "[Maini] 'There are 4 layers. There is investing layer... pretracheal... prevertebral... and then there is carotid sheath.'", "obj": "Four fascial layers", "hint": "Investing, pretracheal, prevertebral, carotid sheath."}, {"q": "Which two muscles does the INVESTING layer of deep cervical fascia enclose, per Maini?", "o": ["The infrahyoid muscles and the thyroid", "Sternocleidomastoid (anteriorly) and trapezius (posteriorly)", "The prevertebral muscles", "The omohyoid and the platysma"], "c": 1, "cat": "Deep Cervical Fascia", "r": ["The infrahyoid muscles and thyroid are enclosed by the PRETRACHEAL layer.", "Correct. The investing layer splits to enclose sternocleidomastoid anteriorly and trapezius posteriorly.", "The prevertebral muscles are enclosed by the PREVERTEBRAL layer.", "The investing layer encloses SCM and trapezius, not the omohyoid/platysma pair."], "source": "L28 · Investing layer", "quote": "[Maini] 'It encloses sternocleidomastoid anteriorly and trapezius posteriorly. That is investing.'", "obj": "Investing layer contents", "hint": "Wraps SCM + trapezius all around."}, {"q": "Maini says the investing layer thickens between the styloid process and the angle of the mandible to form which ligament?", "o": ["The sphenomandibular ligament", "The stylomandibular ligament", "The stylohyoid ligament", "The pterygomandibular raphe"], "c": 1, "cat": "Deep Cervical Fascia", "r": ["The sphenomandibular ligament runs from the spine of the sphenoid to the lingula - it is more internal and is not this fascial thickening.", "Correct. The investing layer thickens between the styloid process and the angle of the mandible to form the stylomandibular ligament.", "The stylohyoid ligament connects the styloid process to the hyoid, not the mandibular angle.", "The pterygomandibular raphe is a separate fibrous band, not this fascial thickening."], "source": "L28 · Investing layer", "quote": "[Maini] 'It thickens between the styloid process and mandible to form stylomandibular ligament.'", "obj": "Stylomandibular ligament", "hint": "Styloid -> angle of mandible (external)."}, {"q": "The investing layer also forms the roof of which structures, and attaches posteriorly to what?", "o": ["The floor of the digastric triangle; attached to the hyoid only", "The roof of the mediastinum; attached to the sternum only", "The capsule of the parotid gland only; attached to the clavicle only", "The roof of the anterior and posterior triangles of the neck; attached to the ligamentum nuchae"], "c": 3, "cat": "Deep Cervical Fascia", "r": ["It forms a roof, not the floor of the digastric triangle, and has broad attachments (hyoid included but not only).", "It is a neck fascia forming triangle roofs, not the mediastinal roof.", "Although it does invest the parotid region, its described role here is the triangle roof with ligamentum nuchae attachment.", "Correct. The investing layer forms the roof of both the anterior and posterior triangles and attaches to the ligamentum nuchae posteriorly."], "source": "L28 · Investing layer", "quote": "[Maini] 'Forms a roof of anterior and posterior triangles of the neck... attached to ligamentum nuchae.'", "obj": "Investing layer roof", "hint": "Roof of both neck triangles."}, {"q": "The PRETRACHEAL fascia encloses which structures, per Maini?", "o": ["The sternocleidomastoid and trapezius", "The thyroid gland and the infrahyoid muscles", "The prevertebral muscles", "The internal jugular vein and vagus nerve"], "c": 1, "cat": "Deep Cervical Fascia", "r": ["SCM and trapezius are enclosed by the investing layer.", "Correct. The pretracheal fascia encloses the thyroid gland and the infrahyoid muscles.", "The prevertebral muscles are enclosed by the prevertebral layer.", "The IJV and vagus are enclosed by the carotid sheath, not the pretracheal fascia."], "source": "L28 · Pretracheal fascia", "quote": "[Maini] 'Pretracheal also invests thyroid and infrahyoid muscles.'", "obj": "Pretracheal contents", "hint": "In front of the trachea -> thyroid + strap muscles."}, {"q": "Inferiorly, the pretracheal fascia spreads into the thorax and merges with which structure?", "o": ["The anterior longitudinal ligament", "The ligamentum nuchae", "The parietal pleura", "The fibrous pericardium"], "c": 3, "cat": "Deep Cervical Fascia", "r": ["The anterior longitudinal ligament is where the PREVERTEBRAL fascia blends inferiorly.", "The ligamentum nuchae is a posterior attachment of the investing and prevertebral layers.", "It merges with the fibrous pericardium, not the parietal pleura.", "Correct. The pretracheal fascia spreads into the thorax and merges with the fibrous pericardium."], "source": "L28 · Pretracheal fascia", "quote": "[Maini] 'Inferiorly it spreads to the thorax and merges with fibrous pericardium.'", "obj": "Pretracheal inferior blend", "hint": "Down into chest -> fibrous pericardium."}, {"q": "The PREVERTEBRAL fascia encloses the prevertebral muscles and, inferiorly, blends with which ligament?", "o": ["The anterior longitudinal ligament (ALL)", "The fibrous pericardium", "The stylomandibular ligament", "The nuchal ligament at the hyoid"], "c": 0, "cat": "Deep Cervical Fascia", "r": ["Correct. Inferiorly the prevertebral fascia enters the thorax and blends with the anterior longitudinal ligament (ALL).", "The fibrous pericardium is where the PRETRACHEAL fascia blends.", "The stylomandibular ligament is a thickening of the INVESTING layer.", "It attaches to the ligamentum nuchae posteriorly (not at the hyoid) and blends inferiorly with the ALL."], "source": "L28 · Prevertebral fascia", "quote": "[Maini] 'Inferiorly it enters the thorax and blends with ALL, anterior longitudinal ligament.'", "obj": "Prevertebral fascia blend", "hint": "Down the front of the spine -> ALL."}, {"q": "Which three structures are enclosed by the CAROTID SHEATH, per Maini?", "o": ["The external carotid artery, the facial vein, and the hypoglossal nerve", "The common/internal carotid artery, the internal jugular vein, and the vagus nerve", "The internal carotid artery, the external jugular vein, and the phrenic nerve", "The subclavian artery, the subclavian vein, and the vagus nerve"], "c": 1, "cat": "Deep Cervical Fascia", "r": ["The external carotid, facial vein, and hypoglossal nerve are not the sheath's three contents.", "Correct. The carotid sheath encloses the common and internal carotid artery, the internal jugular vein, and the vagus nerve.", "It contains the INTERNAL jugular vein (not external) and the vagus (not phrenic).", "The sheath holds the carotid, IJV, and vagus - not the subclavian vessels."], "source": "L28 · Carotid sheath", "quote": "[Maini] 'Carotid sheath around the common and internal carotid artery, internal jugular vein, and vagus nerve.'", "obj": "Carotid sheath contents", "hint": "Carotid + IJV + vagus."}, {"q": "What are the three parts of the pharynx, per Maini's review?", "o": ["Nasopharynx, oropharynx, and esophagus", "Vestibule, oropharynx, and glottis", "Nasopharynx, laryngopharynx, and larynx", "Nasopharynx, oropharynx, and laryngopharynx"], "c": 3, "cat": "Pharynx (Review)", "r": ["The esophagus is beyond the pharynx, not one of its three parts.", "Vestibule and glottis are not function restart(){questions=shuffle(BANK.slice());idx=0;score=0;attempts=0;reaskQueue=[];answerMap={};answerHistory=[];browseIdx=-1;reviewList=null;CAT_NAMES.forEach(function(c){catStats[c]={c:0,t:0};});render();saveState();}
function confirmRestart(){if(confirm('Restart the drill? All progress will be lost.'))restart();}

<script>
const TIMESTAMPS=[];
var audioAutoPlay=true;

// Follow-along mode
var _origShuffle=shuffle;
var followMode=true;
var reaskMode=true;
shuffle=function(a){return followMode?a:_origShuffle(a);};

// ── Persistent audio bar: survives every render() + renderHistoryItem() call ──
var _audioBar=null;
function _buildAudioBar(){
  var ab=document.createElement('div');
  ab.id='audio-bar';
  ab.className='audio-bar';
  ab.innerHTML='<audio id="mk-audio" controls preload="none">Audio not found. Place MP3 in same folder.</audio>'
    +'<div class="audio-info">'
    +'<span class="timestamp-badge" id="ts-badge">⏱ --:--</span>'
    +'<div class="skip-btns">'
    +'<button class="btn-skip" onclick="skipAudio(-30)" title="Back 30s">⏪ 30</button>'
    +'<button class="btn-skip" onclick="skipAudio(-10)" title="Back 10s">⏪ 10</button>'
    +'<button class="btn-play-here" onclick="playFromHere()">▶ Play From Here</button>'
    +'<button class="btn-skip" onclick="skipAudio(10)" title="Forward 10s">10 ⏩</button>'
    +'<button class="btn-skip" onclick="skipAudio(30)" title="Forward 30s">30 ⏩</button>'
    +'</div>'
    +'<div class="audio-modes">'
    +'<label class="audio-auto-label"><input type="radio" name="amode" value="seek" onchange="setAudioMode(\'seek\')"> Seek per Q</label>'
    +'<label class="audio-auto-label"><input type="radio" name="amode" value="continuous" checked onchange="setAudioMode(\'continuous\')"> Continuous play</label>'
    +'<label class="audio-auto-label"><input type="radio" name="amode" value="off" onchange="setAudioMode(\'off\')"> Audio off</label>'
    +'</div>'
      +'<div class=\"speed-block\"><div class=\"speed-top\"><span class=\"speed-label\">Speed</span><button class=\"btn-speed-pm\" onclick=\"fabSetSpeed(fabCurrentSpeed - 0.05)\">&minus;.05</button><span class=\"speed-val\" id=\"speed-display\">1.00x</span><button class=\"btn-speed-pm\" onclick=\"fabSetSpeed(fabCurrentSpeed + 0.05)\">+.05</button></div><div class=\"speed-presets\"><button class=\"btn-speed-preset\" onclick=\"fabSetSpeed(0.5)\">0.5x</button><button class=\"btn-speed-preset\" onclick=\"fabSetSpeed(0.75)\">0.75x</button><button class=\"btn-speed-preset\" onclick=\"fabSetSpeed(0.9)\">0.9x</button><button class=\"btn-speed-preset active\" onclick=\"fabSetSpeed(1.0)\">1x</button><button class=\"btn-speed-preset\" onclick=\"fabSetSpeed(1.1)\">1.1x</button><button class=\"btn-speed-preset\" onclick=\"fabSetSpeed(1.25)\">1.25x</button><button class=\"btn-speed-preset\" onclick=\"fabSetSpeed(1.5)\">1.5x</button><button class=\"btn-speed-preset\" onclick=\"fabSetSpeed(2.0)\">2x</button></div></div><div class=\"transcript-toggle\"><button class=\"btn-transcript\" id=\"btn-transcript\" onclick=\"fabToggleTranscript()\">\ud83d\udcdc Transcript</button></div><div class=\"transcript-box\" id=\"transcript-box\"></div>'
    +'</div>';
  return ab;
}

function _ensureAudioAttached(){
  var app=document.getElementById('app');
  if(!app)return;
  if(!_audioBar)_audioBar=_buildAudioBar();
  var card=app.querySelector('.card');
  if(card&&_audioBar.parentNode!==card.parentNode){
    card.parentNode.insertBefore(_audioBar,card);
  } else if(!card&&_audioBar.parentNode!==app){
    // Summary screen — attach at top so audio keeps playing
    app.insertBefore(_audioBar,app.firstChild);
  }
  updateTimestampBadge();
}

// Override render to preserve audio across wipes
var _origRender=render;
render=function(){
  if(_audioBar&&_audioBar.parentNode){_audioBar.parentNode.removeChild(_audioBar);}
  _origRender();
  _ensureAudioAttached();

  // Toggle bar + re-ask banner (stateful — rebuild if missing)
  var app=document.getElementById('app');
  if(!document.getElementById('mk-toggle-bar')){
    var bar=document.createElement('div');
    bar.id='mk-toggle-bar';
    bar.className='follow-toggle';
    bar.innerHTML='<button class="follow-btn'+(followMode?' active':'')+'" onclick="setFollowMode(true)">🔊 Follow Audio Order</button>'
      +'<button class="follow-btn'+(!followMode?' active':'')+'" onclick="setFollowMode(false)">🔀 Shuffle Mode</button>'
      +'<button class="reask-btn'+(reaskMode?' active':'')+'" onclick="toggleReask()">🚨 Re-Ask Missed</button>';
    var banner=document.createElement('div');
    banner.id='reask-banner';
    banner.className='reask-banner';
    var firstChild=app.firstChild;
    if(firstChild&&firstChild.nextSibling){
      app.insertBefore(banner,firstChild.nextSibling);
      app.insertBefore(bar,firstChild.nextSibling);
    }
  }
  buildReaskBar();

  // Re-ask card glow
  var card=document.querySelector('.card');
  if(card){
    var isReask=idx<questions.length&&questions[idx]&&questions[idx]._isReask;
    if(isReask){
      card.classList.add('reask-glow');
      if(!card.querySelector('.reask-card-badge')){
        var badge=document.createElement('div');
        badge.className='reask-card-badge';
        badge.textContent='🔁 RE-ASK — You missed this one. Get it right!';
        card.insertBefore(badge,card.firstChild);
      }
    } else {
      card.classList.remove('reask-glow');
    }
  }
};

// Override renderHistoryItem so Previous still shows the audio panel
var _origRenderHistory=renderHistoryItem;
renderHistoryItem=function(){
  if(_audioBar&&_audioBar.parentNode){_audioBar.parentNode.removeChild(_audioBar);}
  _origRenderHistory();
  _ensureAudioAttached();
};

// Override showSummary so audio panel survives end-of-drill screen too
var _origShowSummary=showSummary;
showSummary=function(){
  if(_audioBar&&_audioBar.parentNode){_audioBar.parentNode.removeChild(_audioBar);}
  _origShowSummary();
  _ensureAudioAttached();
};

function updateTimestampBadge(){
  var badge=document.getElementById('ts-badge');
  if(!badge)return;
  if(idx<questions.length&&questions[idx]){
    var bankId=questions[idx]._bankId;
    if(bankId!==undefined&&TIMESTAMPS[bankId]!==undefined){
      var ts=TIMESTAMPS[bankId];
      var m=Math.floor(ts/60);
      var s=Math.floor(ts%60);
      badge.textContent='⏱ '+m+':'+(s<10?'0':'')+s;
    } else {
      badge.textContent='⏱ --:--';
    }
  }
}

var audioMode='continuous';

function playFromHere(){
  var audio=document.getElementById('mk-audio');
  if(!audio||idx>=questions.length)return;
  var bankId=questions[idx]._bankId;
  if(bankId===undefined||TIMESTAMPS[bankId]===undefined)return;
  var seekTo;if(TIMESTAMPS[bankId]===undefined||TIMESTAMPS[bankId]<=0){var f=null;for(var di=1;di<TIMESTAMPS.length;di++){var hi=bankId+di,lo=bankId-di;if(TIMESTAMPS[hi]>0){f=TIMESTAMPS[hi];break;}if(TIMESTAMPS[lo]>0){f=TIMESTAMPS[lo];break;}}if(f===null)return;seekTo=Math.max(0,f-2);}else{seekTo=Math.max(0,TIMESTAMPS[bankId]-2);}
  // FAB M01 lectures.mp3 split: L01 (0-4800s, 80min) / L02 (4800-10817s, 100min) / L03 (10817-18943s, 135min).
  // Swap audio source if needed BEFORE seeking, since each lecture file is its own duration.
  var L01='https://dgsc23.github.io/dc-study-audio/fab-201-m02-shoulder-forearm-L04.mp3';
  var L02='https://dgsc23.github.io/dc-study-audio/fab-201-m02-shoulder-forearm-L05.mp3';
  var L03='https://dgsc23.github.io/dc-study-audio/fab-201-m02-shoulder-forearm-L06.mp3';
  var s=audio.querySelector('source');
  var part=seekTo<4800?'L01':(seekTo<10817?'L02':'L03');
  var targetURL=part==='L01'?L01:(part==='L02'?L02:L03);
  var targetSec=part==='L01'?seekTo:(part==='L02'?(seekTo-4800):(seekTo-10817));
  var hasL01=s&&/-L01\.mp3/.test(s.src);
  var hasL02=s&&/-L02\.mp3/.test(s.src);
  var hasL03=s&&/-L03\.mp3/.test(s.src);
  var currentMatches=(part==='L01'&&hasL01)||(part==='L02'&&hasL02)||(part==='L03'&&hasL03);
  if(s&&!currentMatches){
    s.src=targetURL;audio.load();
    audio.addEventListener('loadedmetadata',function once(){
      audio.currentTime=targetSec;audio.play();
      audio.removeEventListener('loadedmetadata',once);
    });
    return;
  }
  audio.currentTime=targetSec;audio.play();
}

function skipAudio(sec){
  var audio=document.getElementById('mk-audio');
  if(!audio)return;
  audio.currentTime=Math.max(0,audio.currentTime+sec);
  if(audio.paused)audio.play();
}

function setAudioMode(mode){
  audioMode=mode;
  audioAutoPlay=(mode==='seek');
}

// Override nextQ to respect audio mode (continuous = don't touch audio)
var _origNextQ=nextQ;
nextQ=function(){
  _origNextQ();
  if(audioMode==='seek'){
    setTimeout(function(){playFromHere();},300);
  }
  // continuous = let audio keep playing
  // off = do nothing
};

function setFollowMode(on){
  followMode=on;
  document.querySelectorAll('.follow-btn').forEach(function(b,i){b.classList.toggle('active',i===0?on:!on);});
  if(Object.keys(answerMap).length===0){
    questions=BANK.slice();idx=0;render();saveState();
  }
}

function toggleReask(){
  reaskMode=!reaskMode;
  document.querySelectorAll('.reask-btn').forEach(function(b){b.classList.toggle('active',reaskMode);});
  buildReaskBar();
}

function buildReaskBar(){
  var bar=document.getElementById('reask-banner');
  if(!bar)return;
  var missed=[];
  if(typeof answerMap!=='undefined'){
    for(var k in answerMap){if(answerMap.hasOwnProperty(k)&&!answerMap[k].isCorrect)missed.push(k);}
  }
  if(reaskMode&&missed.length>0){
    bar.style.display='block';
    bar.innerHTML='⚠️ '+missed.length+' MISSED — <button onclick="drillMissed()">DRILL MISSED NOW</button>';
  } else {
    bar.style.display='none';
  }
}

function drillMissed(){
  var missed=[];
  for(var k in answerMap){if(answerMap.hasOwnProperty(k)&&!answerMap[k].isCorrect)missed.push(parseInt(k));}
  if(missed.length===0)return;
  questions=missed.map(function(id){return BANK[id];});
  for(var i=questions.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1));var t=questions[i];questions[i]=questions[j];questions[j]=t;}
  idx=0;score=0;attempts=0;answerMap={};answerHistory=[];
  render();
}

// Initial boot — run once to attach audio bar
questions=BANK.slice();idx=0;render();

// ── FAB unified speed control ──
var fabCurrentSpeed = 1.0;
function fabSetSpeed(val) {
  val = Math.round(val * 100) / 100;
  if (val < 0.25) val = 0.25;
  if (val > 3.0) val = 3.0;
  fabCurrentSpeed = val;
  document.querySelectorAll('audio').forEach(function(a){ a.playbackRate = val; });
  var d = document.getElementById('speed-display');
  if (d) d.textContent = val.toFixed(2) + 'x';
  document.querySelectorAll('.btn-speed-preset').forEach(function(b){
    var pv = parseFloat(b.textContent);
    b.classList.toggle('active', Math.abs(pv - val) < 0.001);
  });
}
// Re-apply rate whenever any audio element plays
(function(){
  var _origPlay = HTMLMediaElement.prototype.play;
  HTMLMediaElement.prototype.play = function(){
    if (this.tagName === 'AUDIO') this.playbackRate = fabCurrentSpeed;
    return _origPlay.apply(this, arguments);
  };
})();


var fabTranscriptOn = false;
function fabToggleTranscript() {
  fabTranscriptOn = !fabTranscriptOn;
  var box = document.getElementById('transcript-box');
  var btn = document.getElementById('btn-transcript');
  if (box) box.classList.toggle('show', fabTranscriptOn);
  if (btn) btn.classList.toggle('active', fabTranscriptOn);
  if (fabTranscriptOn) fabUpdateTranscript();
}
function fabUpdateTranscript() {
  if (!fabTranscriptOn) return;
  var box = document.getElementById('transcript-box');
  if (!box) return;
  if (typeof idx !== 'number' || typeof questions === 'undefined' || idx >= questions.length) {
    box.innerHTML = '<em>Drill complete.</em>';
    return;
  }
  var q = questions[idx];
  var cat = q.cat || '';
  var lines = fabTranscript[cat] || [];
  if (!lines.length) {
    box.innerHTML = '<em>No transcript lines for ' + cat + '.</em>';
    return;
  }
  var quote = (q.quote || '').toLowerCase().replace(/[^a-z0-9 ]/g, '');
  var quoteWords = quote.split(' ').filter(function(w){ return w.length > 3; });
  var html = '<strong>' + cat + '</strong><br>';
  for (var i = 0; i < lines.length; i++) {
    var lineLow = lines[i].toLowerCase().replace(/[^a-z0-9 ]/g, '');
    var hits = 0;
    for (var w = 0; w < quoteWords.length; w++) {
      if (lineLow.indexOf(quoteWords[w]) !== -1) hits++;
    }
    var match = quoteWords.length > 0 && hits >= Math.ceil(quoteWords.length * 0.4);
    if (match) html += '<span class="t-highlight">\u25b6 ' + lines[i] + '</span><br>';
    else html += lines[i] + '<br>';
  }
  box.innerHTML = html;
}
// Hook transcript update into render + renderHistoryItem
(function(){
  var _r = render;
  render = function(){ var rv = _r.apply(this, arguments); fabUpdateTranscript(); return rv; };
  var _rh = renderHistoryItem;
  renderHistoryItem = function(){ var rv = _rh.apply(this, arguments); fabUpdateTranscript(); return rv; };
})();

</script>


<script id="audio-bar-minimize-js">
(function(){
  var LS_KEY_MIN = 'fab_audio_bar_collapsed';
  function applyState(ab){
    var collapsed = localStorage.getItem(LS_KEY_MIN) === '1';
    if (collapsed) ab.classList.add('collapsed'); else ab.classList.remove('collapsed');
    var btn = ab.querySelector('.btn-minimize-audio');
    if (btn) btn.textContent = collapsed ? '▸' : '▾';
    if (btn) btn.title = collapsed ? 'Expand audio bar' : 'Minimize audio bar';
  }
  function attachButton(ab){
    if (ab.querySelector('.btn-minimize-audio')) return;
    var btn = document.createElement('button');
    btn.className = 'btn-minimize-audio';
    btn.type = 'button';
    btn.onclick = function(){
      var now = ab.classList.toggle('collapsed');
      localStorage.setItem(LS_KEY_MIN, now ? '1' : '0');
      btn.textContent = now ? '▸' : '▾';
      btn.title = now ? 'Expand audio bar' : 'Minimize audio bar';
    };
    ab.appendChild(btn);
    applyState(ab);
  }
  // Poll until audio-bar appears, attach, then keep watching in case it gets re-rendered
  var tries = 0;
  var iv = setInterval(function(){
    var ab = document.getElementById('audio-bar');
    if (ab) {
      attachButton(ab);
      applyState(ab);
    }
    tries++;
    if (tries > 1200) clearInterval(iv); // ~2 min safety cap
  }, 100);
})();
</script>

<script id="ga0202-m01-transcript-loader">
var fabTranscriptLines = `[GA 0202 · Lecture 28 — The Pharynx, Prevertebral Region, Cranial Nerves 1-3 (Dr. Seema Maini). Audio/transcript panel is disabled in this MC-only Everything drill; questions are drawn from this lecture.]`.split(/\r?\n/).filter(function(l){ return l.trim().length > 0; });
window.fabTranscriptOn = false;
function fabFetchTranscript(cb){ cb(); }
function fabParseTimestamp(line){
    var m = line.match(/^\[(\d+):(\d+)\]/);
    if (!m) return null;
    return parseInt(m[1],10) * 60 + parseInt(m[2],10);
}
function fabUpdateTranscript(){
    if (!window.fabTranscriptOn) return;
    var box = document.getElementById('transcript-box');
    if (!box) return;
    fabFetchTranscript(function(){
        if (!fabTranscriptLines || !fabTranscriptLines.length){
            box.innerHTML = '<em style="color:#f87171">Transcript file not found.</em>';
            return;
        }
        if (typeof idx !== 'number' || typeof BANK === 'undefined' || idx >= BANK.length){
            box.innerHTML = '<em>Drill complete.</em>';
            return;
        }
        var q = BANK[idx];
        var srcMatch = (q.source || '').match(/(\d+):(\d+)/);
        var targetSec = srcMatch ? parseInt(srcMatch[1],10)*60 + parseInt(srcMatch[2],10) : 0;
        // Use TIMESTAMPS array if available (more accurate)
        if (typeof TIMESTAMPS !== 'undefined' && TIMESTAMPS[idx] !== undefined) {
            targetSec = Math.round(TIMESTAMPS[idx]);
        }
        var bestIdx = 0;
        for (var i = 0; i < fabTranscriptLines.length; i++){
            var ts = fabParseTimestamp(fabTranscriptLines[i]);
            if (ts === null) continue;
            if (ts <= targetSec) bestIdx = i; else break;
        }
        var startIdx = Math.max(0, bestIdx - 2);
        var endIdx = Math.min(fabTranscriptLines.length, bestIdx + 6);
        var srcLabel = (q.source || '').split('@').pop().trim();
        var html = '<strong>Audio @ ' + srcLabel + ' &middot; ' + (q.cat||'') + '</strong><br>';
        for (var j = startIdx; j < endIdx; j++){
            var line = fabTranscriptLines[j];
            var safe = line.replace(/</g,'&lt;').replace(/>/g,'&gt;');
            if (j === bestIdx) html += '<span class="t-highlight">&#9654; ' + safe + '</span><br>';
            else html += safe + '<br>';
        }
        box.innerHTML = html;
    });
}
function fabToggleTranscript(){
    var box = document.getElementById('transcript-box');
    var btn = document.getElementById('btn-transcript');
    if (!box) return;
    window.fabTranscriptOn = !window.fabTranscriptOn;
    if (window.fabTranscriptOn){
        box.classList.add('show');
        if (btn) btn.classList.add('active');
        fabUpdateTranscript();
    } else {
        box.classList.remove('show');
        if (btn) btn.classList.remove('active');
    }
}
</script>

<script id="fab-ai-companion-js">
(function(){
  const ENDPOINT = "https://fab-ai.dgync1.workers.dev";
  const CLASS_NAME = "GA0202"; // e.g., "CP1" / "FAB101" / "GA0102" — empty = generic chiropractic tutor
  let panel = null;
  let history = []; // [{role:'user'|'model', content}]
  let currentQKey = null; // to detect Q navigation

  function readCurrentQ() {
    const qText = (document.querySelector('.q-text')?.innerText || '').replace(/^Q\d+(\s+of\s+\d+)?:\s*/, '');
    const optBtns = Array.from(document.querySelectorAll('.opt-btn'));
    const options = optBtns.map(b => {
      const clone = b.cloneNode(true);
      clone.querySelectorAll('.rationale').forEach(r => r.remove());
      clone.querySelectorAll('.letter').forEach(r => r.remove());
      return clone.innerText.trim();
    });
    let picked = null, correct = null;
    optBtns.forEach((b, i) => {
      if (b.classList.contains('picked-correct') || b.classList.contains('picked-wrong')) picked = i;
      if (b.classList.contains('picked-correct') || b.classList.contains('show-correct')) correct = i;
    });
    const profTip = document.querySelector('.prof-tip')?.innerText?.replace(/^Professor:\s*/i, '').trim() || '';
    const source = document.querySelector('.source-line')?.innerText?.replace(/^Source:\s*/i, '').trim() || '';
    const quote = document.querySelector('.quote-line')?.innerText?.trim() || '';
    return { question: qText, options, picked, correct, profTip, source, quote };
  }

  function qKey(ctx){ return (ctx.question || '') + '|' + (ctx.options || []).join('|'); }

  function mdToHtml(md){
    let html = md
      .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
      .replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>')
      .replace(/(^|\n)### (.+)/g, '$1<h3>$2</h3>')
      .replace(/`([^`]+)`/g, '<code>$1</code>')
      .replace(/^\s*[-*]\s+(.+)$/gm, '<li>$1</li>')
      .replace(/(<li>.*?<\/li>(\s*<li>.*?<\/li>)*)/gs, '<ul>$1</ul>');
    html = html.split(/\n{2,}/).map(p => {
      if (p.trim().startsWith('<ul') || p.trim().startsWith('<h3')) return p;
      if (p.trim() === '') return '';
      return '<p>' + p.replace(/\n/g, '<br>') + '</p>';
    }).join('');
    return html;
  }

  function stripForTts(text){
    // Remove markdown markers so TTS doesn't read them aloud
    return text
      .replace(/\*\*/g, '')
      .replace(/`([^`]+)`/g, '$1')
      .replace(/^\s*[-*]\s+/gm, '')
      .replace(/^#+\s+/gm, '')
      .replace(/\n{2,}/g, '. ')
      .replace(/\s+/g, ' ')
      .trim();
  }

  let currentUtter = null;
  function speakToggle(btn, rawText){
    if (!window.speechSynthesis) {
      alert('Your browser does not support text-to-speech.');
      return;
    }
    if (window.speechSynthesis.speaking && currentUtter && btn.classList.contains('playing')) {
      window.speechSynthesis.cancel();
      document.querySelectorAll('.fab-ai-tts-btn.playing').forEach(b => {
        b.classList.remove('playing');
        b.innerHTML = '🔊 Read';
      });
      currentUtter = null;
      return;
    }
    window.speechSynthesis.cancel();
    document.querySelectorAll('.fab-ai-tts-btn.playing').forEach(b => {
      b.classList.remove('playing');
      b.innerHTML = '🔊 Read';
    });
    const u = new SpeechSynthesisUtterance(stripForTts(rawText));
    const rateSel = btn.parentElement.querySelector('.fab-ai-tts-rate');
    u.rate = parseFloat(rateSel && rateSel.value || '1.0');
    /*ava-tts*/try{var _vs=(window.speechSynthesis&&window.speechSynthesis.getVoices())||[];var _av=_vs.find(function(v){return /microsoft.*ava.*natural/i.test(v.name);})||_vs.find(function(v){return /microsoft.*emma.*natural/i.test(v.name);})||_vs.find(function(v){return /google us english female/i.test(v.name);});if(_av){u.voice=_av;u.lang=_av.lang||'en-US';}}catch(e){}
    u.onend = () => {
      btn.classList.remove('playing');
      btn.innerHTML = '🔊 Read';
      currentUtter = null;
    };
    u.onerror = () => {
      btn.classList.remove('playing');
      btn.innerHTML = '🔊 Read';
      currentUtter = null;
    };
    currentUtter = u;
    btn.classList.add('playing');
    btn.innerHTML = '⏹ Stop';
    window.speechSynthesis.speak(u);
  }

  function appendMsg(role, text) {
    const body = document.getElementById('fabAiBody');
    if (!body) return null;
    const wrap = document.createElement('div');
    wrap.className = 'fab-ai-msg ' + role;
    const bub = document.createElement('div');
    bub.className = 'fab-ai-bubble';
    if (role === 'ai') {
      bub.innerHTML = mdToHtml(text);
      // Add TTS row
      const row = document.createElement('div');
      row.className = 'fab-ai-tts-row';
      const btn = document.createElement('button');
      btn.className = 'fab-ai-tts-btn';
      btn.innerHTML = '🔊 Read';
      btn.onclick = function(){ speakToggle(btn, text); };
      const rate = document.createElement('select');
      rate.className = 'fab-ai-tts-rate';
      rate.title = 'Reading speed';
      ['0.8','1.0','1.2','1.5','2.0'].forEach(function(r){
        const o = document.createElement('option');
        o.value = r; o.textContent = r + 'x';
        if (r === '1.0') o.selected = true;
        rate.appendChild(o);
      });
      row.appendChild(btn);
      row.appendChild(rate);
      bub.appendChild(row);
    } else {
      bub.textContent = text;
    }
    wrap.appendChild(bub);
    body.appendChild(wrap);
    body.scrollTop = body.scrollHeight;
    return bub;
  }

  function appendLoading(){
    const body = document.getElementById('fabAiBody');
    if (!body) return null;
    const wrap = document.createElement('div');
    wrap.className = 'fab-ai-msg ai';
    wrap.id = 'fabAiLoading';
    const bub = document.createElement('div');
    bub.className = 'fab-ai-bubble';
    bub.innerHTML = '<div class="fab-ai-loading"><div class="fab-ai-spinner"></div> Thinking...</div>';
    wrap.appendChild(bub);
    body.appendChild(wrap);
    body.scrollTop = body.scrollHeight;
    return wrap;
  }

  function removeLoading(){
    const el = document.getElementById('fabAiLoading');
    if (el) el.remove();
  }

  function appendStatus(text, isErr){
    const body = document.getElementById('fabAiBody');
    if (!body) return;
    const div = document.createElement('div');
    div.className = 'fab-ai-status' + (isErr ? ' err' : '');
    div.innerHTML = text;
    body.appendChild(div);
    body.scrollTop = body.scrollHeight;
  }

  function renderSuggestions(ctx){
    const body = document.getElementById('fabAiBody');
    if (!body) return;
    // Q preview at top
    if (ctx.question) {
      const qp = document.createElement('div');
      qp.className = 'fab-ai-qpreview';
      qp.innerHTML = '<b>Q:</b> ' + ctx.question.substring(0, 240) + (ctx.question.length > 240 ? '...' : '');
      body.appendChild(qp);
    }
    // Suggestion chips
    const sug = document.createElement('div');
    sug.className = 'fab-ai-suggestions';
    const chips = [];
    if (ctx.picked === null || ctx.picked === undefined) {
      chips.push({ label: '💡 Give me a hint', q: 'Give me a hint for this question without revealing the answer.' });
      chips.push({ label: '🧠 Explain the concept', q: 'Explain the core concept this question is testing.' });
    } else if (ctx.picked !== ctx.correct && ctx.picked !== null) {
      chips.push({ label: '❌ Why did I miss this?', q: 'I picked the wrong answer. Walk me through why my pick is wrong and why the correct answer is right.' });
      chips.push({ label: '🧠 Explain the concept', q: 'Explain the concept this question is testing in simpler terms.' });
      chips.push({ label: '🎯 Give me a mnemonic', q: 'Give me a memorable mnemonic for this topic.' });
    } else if (ctx.picked === ctx.correct) {
      chips.push({ label: '✅ Why is this right?', q: 'Confirm why the correct answer is right and flag any trap distractors to watch for.' });
      chips.push({ label: '🎯 Give me a mnemonic', q: 'Give me a memorable mnemonic for this topic.' });
    }
    chips.push({ label: '🌟 Use an analogy', q: 'Explain this with a dumbed-down analogy.' });
    chips.forEach(c => {
      const btn = document.createElement('button');
      btn.className = 'fab-ai-sug';
      btn.textContent = c.label;
      btn.onclick = () => sendMessage(c.q);
      sug.appendChild(btn);
    });
    body.appendChild(sug);
  }

  function clearChat(preserveCtx){
    const body = document.getElementById('fabAiBody');
    if (body) body.innerHTML = '';

      const ctx = readCurrentQ();
      renderSuggestions(ctx);

  function openPanel() {

    panel.classList.add('open');
    const ctx = readCurrentQ();

      // Q changed — reset chat and show suggestions for new Q

  function buildPanel() {
    const el = document.createElement('div');

      + '<button onclick="fabAiFollowupSend()">Send</button>'
      + '</div>';
    document.body.appendChild(el);
    return el;
  }

  window.fabAiClose = function(){ if(panel) panel.classList.remove('open'); };
  window.fabAiClear = function(){ clearChat(true); };

  async function callWorker(payload) {
    if (!ENDPOINT) return { clipboardFallback: true };
    try {
      const res = await fetch(ENDPOINT, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload),
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.error || ('HTTP ' + res.status));
      return { reply: data.reply };
    } catch (e) {
      return { error: String(e.message || e) };
    }
  }

  function clipboardFallback(ctx, userQ) {
    const letter = (i) => String.fromCharCode(65 + i);
    let prompt = "I'm studying GA 0202 (General Anatomy II, head & neck) with Dr. Maini at SCUHS. Drill question:\n\n";
    prompt += 'Q: ' + ctx.question + '\n\n';
    if (ctx.options && ctx.options.length) {
      ctx.options.forEach((o, i) => {
        const m = [];
        if (i === ctx.picked) m.push('PICKED');
        if (i === ctx.correct) m.push('CORRECT');
        prompt += letter(i) + '. ' + o + (m.length ? ' ('+m.join(', ')+')' : '') + '\n';
      });
      prompt += '\n';
    }
    if (ctx.profTip) prompt += 'DRILL TIP: ' + ctx.profTip + '\n\n';
    if (userQ) prompt += 'MY QUESTION: ' + userQ + '\n\n';
    prompt += 'Explain using a dumbed-down analogy + mnemonic.';
    navigator.clipboard.writeText(prompt).then(() => {
      appendStatus('✓ Prompt copied to clipboard. Backend not configured yet — paste into your AI chat.');
    }).catch(() => {
      appendStatus('Could not copy. Please select manually.', true);
    });
  }

  async function sendMessage(userText) {
    const ctx = readCurrentQ();
    currentQKey = qKey(ctx);
    appendMsg('user', userText);
    history.push({ role: 'user', content: userText });
    appendLoading();

    const payload = Object.assign({}, ctx, {
      userQuestion: userText,
      history: history.slice(-10), // last 10 turns for context
      className: CLASS_NAME, // worker uses this to load class-specific knowledge
    });
    const result = await callWorker(payload);
    removeLoading();
    if (result.clipboardFallback) {
      clipboardFallback(ctx, userText);
      return;
    }
    if (result.error) {
      appendStatus('Error: ' + result.error, true);
      return;
    }
    appendMsg('ai', result.reply);
    history.push({ role: 'model', content: result.reply });
  }

  window.fabAiFollowupSend = function() {
    const ta = document.getElementById('fabAiFollowup');
    const q = (ta && ta.value || '').trim();
    if (!q) return;
    ta.value = '';
    sendMessage(q);
  };

  // Button install — opens panel, does NOT auto-call AI
  function install() {
    if (document.getElementById('fabAiBtn')) return;
    const btn = document.createElement('button');
    btn.className = 'fab-ai-btn';
    btn.id = 'fabAiBtn';
    btn.textContent = '🩺';
    btn.title = 'Open AI Study Tutor';
    btn.onclick = () => openPanel();
    document.body.appendChild(btn);
  }
  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', install);
  } else {
    install();
  }
})();
</script>

<script id="search-and-jump-js">
(function(){
  var _searchBar=null,_searchTimer=null,_searchKbdIdx=-1,_lastResults=[],_lastQuery='';

  function _esc(s){
    return (s==null?'':String(s)).replace(/[<>&"']/g,function(c){
      return {'<':'&lt;','>':'&gt;','&':'&amp;','"':'&quot;',"'":'&#39;'}[c];
    });
  }

  function _buildSearchBar(){
    var wrap=document.createElement('div');
    wrap.id='search-bar';
    wrap.className='search-bar';
    wrap.innerHTML=''
      +'<div class="search-input-wrap" id="search-input-wrap">'
      +  '<span class="search-icon">🔍</span>'
      +  '<input type="text" id="search-input" class="search-input" placeholder="Search questions, topics, sources... (↑/↓ + Enter)" autocomplete="off" spellcheck="false">'
      +  '<button class="search-clear" id="search-clear" type="button" title="Clear (Esc)">✕</button>'
      +'</div>'
      +'<div class="search-results" id="search-results"></div>';
    return wrap;
  }

  function _ensureSearchAttached(){
    var app=document.getElementById('app');
    if(!app)return;
    if(!_searchBar){
      _searchBar=_buildSearchBar();
      _wireSearchHandlers();
    }
    var card=app.querySelector('.card');
    if(card){
      if(_searchBar.parentNode!==card.parentNode){
        card.parentNode.insertBefore(_searchBar,card);
      }
    } else {
      // No card (e.g. summary screen) — detach
      if(_searchBar.parentNode)_searchBar.parentNode.removeChild(_searchBar);
    }
  }

  function _highlight(text,query){
    if(!text)return '';
    if(!query)return _esc(text);
    var qLow=query.toLowerCase();
    var tLow=String(text).toLowerCase();
    var i=tLow.indexOf(qLow);
    if(i===-1)return _esc(text);
    var end=i+query.length;
    return _esc(text.substring(0,i))+'<mark>'+_esc(text.substring(i,end))+'</mark>'+_esc(text.substring(end));
  }

  function _searchBank(query){
    var q=(query||'').toLowerCase().trim();
    if(!q||typeof BANK==='undefined')return [];
    var results=[];
    for(var i=0;i<BANK.length;i++){
      var item=BANK[i];
      var qText=(item.q||'').toLowerCase();
      var cat=(item.cat||'').toLowerCase();
      var src=(item.source||'').toLowerCase();
      var quote=(item.quote||'').toLowerCase();
      var tip=(item.profTip||'').toLowerCase();
      if(qText.indexOf(q)>=0||cat.indexOf(q)>=0||src.indexOf(q)>=0||quote.indexOf(q)>=0||tip.indexOf(q)>=0){
        results.push({_bankId:i,q:item.q,cat:item.cat});
        if(results.length>=10)break;
      }
    }
    return results;
  }

  function _renderSearchResults(query){
    var ul=document.getElementById('search-results');
    if(!ul)return;
    _lastQuery=query;
    if(!query.trim()){
      ul.classList.remove('open');
      ul.innerHTML='';
      _lastResults=[];_searchKbdIdx=-1;
      return;
    }
    var matches=_searchBank(query);
    _lastResults=matches;
    _searchKbdIdx=-1;
    if(matches.length===0){
      ul.innerHTML='<div class="search-empty">No matches for "'+_esc(query)+'"</div>';
      ul.classList.add('open');
      return;
    }
    var html='';
    for(var i=0;i<matches.length;i++){
      var m=matches[i];
      var stem=(m.q||'');
      var truncStem=stem.length>110?stem.substring(0,110)+'…':stem;
      html+='<div class="search-result" data-bank-id="'+m._bankId+'" data-idx="'+i+'">'
        +'<span class="sr-num">Q'+(m._bankId+1)+'</span>'
        +'<span class="sr-cat">'+_esc(m.cat||'')+'</span>'
        +_highlight(truncStem,query)
        +'</div>';
    }
    if(matches.length===10){
      html+='<div class="search-hint">Showing top 10 — refine to narrow</div>';
    }
    ul.innerHTML=html;
    ul.classList.add('open');
    var nodes=ul.querySelectorAll('.search-result');
    nodes.forEach(function(node){
      node.addEventListener('mousedown',function(e){
        // mousedown so it fires before input blur clears state
        e.preventDefault();
        var bankId=parseInt(node.getAttribute('data-bank-id'),10);
        _doJump(bankId);
      });
    });
  }

  function _doJump(bankId){
    if(typeof navJump!=='function')return;
    var inp=document.getElementById('search-input');
    var ul=document.getElementById('search-results');
    if(inp)inp.value='';
    if(ul){ul.classList.remove('open');ul.innerHTML='';}
    _lastResults=[];_searchKbdIdx=-1;_lastQuery='';
    navJump(bankId);
    // Scroll to top of card after jump so user sees the question
    setTimeout(function(){
      var card=document.querySelector('.card');
      if(card&&card.scrollIntoView)card.scrollIntoView({behavior:'smooth',block:'start'});
    },80);
  }

  function _highlightKbd(){
    var ul=document.getElementById('search-results');
    if(!ul)return;
    var nodes=ul.querySelectorAll('.search-result');
    nodes.forEach(function(n,i){n.classList.toggle('kbd',i===_searchKbdIdx);});
    if(_searchKbdIdx>=0&&nodes[_searchKbdIdx]){
      nodes[_searchKbdIdx].scrollIntoView({block:'nearest'});
    }
  }

  function _wireSearchHandlers(){
    var inp=_searchBar.querySelector('#search-input');
    var wrap=_searchBar.querySelector('#search-input-wrap');
    var clr=_searchBar.querySelector('#search-clear');
    inp.addEventListener('focus',function(){
      wrap.classList.add('focused');
      if(_lastQuery&&_lastResults.length>0){
        var ul=document.getElementById('search-results');
        if(ul)ul.classList.add('open');
      }
    });
    inp.addEventListener('blur',function(){
      setTimeout(function(){wrap.classList.remove('focused');},150);
    });
    inp.addEventListener('input',function(){
      if(_searchTimer)clearTimeout(_searchTimer);
      var v=inp.value;
      _searchTimer=setTimeout(function(){_renderSearchResults(v);},200);
    });
    inp.addEventListener('keydown',function(e){
      var ul=document.getElementById('search-results');
      if(e.key==='Escape'){
        if(inp.value){
          inp.value='';
          if(ul){ul.classList.remove('open');ul.innerHTML='';}
          _lastResults=[];_searchKbdIdx=-1;_lastQuery='';
        } else {
          inp.blur();
        }
      } else if(e.key==='ArrowDown'){
        if(_lastResults.length===0)return;
        e.preventDefault();
        _searchKbdIdx=Math.min(_lastResults.length-1,_searchKbdIdx+1);
        _highlightKbd();
      } else if(e.key==='ArrowUp'){
        if(_lastResults.length===0)return;
        e.preventDefault();
        _searchKbdIdx=Math.max(-1,_searchKbdIdx-1);
        _highlightKbd();
      } else if(e.key==='Enter'){
        if(_lastResults.length===0)return;
        e.preventDefault();
        var pick=_searchKbdIdx>=0?_lastResults[_searchKbdIdx]:_lastResults[0];
        if(pick)_doJump(pick._bankId);
      }
    });
    clr.addEventListener('click',function(){
      inp.value='';
      var ul=document.getElementById('search-results');
      if(ul){ul.classList.remove('open');ul.innerHTML='';}
      _lastResults=[];_searchKbdIdx=-1;_lastQuery='';
      inp.focus();
    });
    document.addEventListener('click',function(e){
      if(!_searchBar)return;
      if(!_searchBar.contains(e.target)){
        var ul=document.getElementById('search-results');
        if(ul)ul.classList.remove('open');
      }
    });
    // Global "/" keybind to focus search (matches GitHub-style search UX)
    document.addEventListener('keydown',function(e){
      if(e.key==='/'&&document.activeElement!==inp){
        var tag=(document.activeElement&&document.activeElement.tagName||'').toLowerCase();
        if(tag==='input'||tag==='textarea')return;
        e.preventDefault();
        inp.focus();
      }
    });
  }

  function _wrapRender(){
    if(typeof render!=='function')return;
    var origR=render;
    render=function(){
      if(_searchBar&&_searchBar.parentNode)_searchBar.parentNode.removeChild(_searchBar);
      origR();
      _ensureSearchAttached();
    };
    if(typeof renderHistoryItem==='function'){
      var origH=renderHistoryItem;
      renderHistoryItem=function(){
        if(_searchBar&&_searchBar.parentNode)_searchBar.parentNode.removeChild(_searchBar);
        origH();
        _ensureSearchAttached();
      };
    }
    if(typeof showSummary==='function'){
      var origS=showSummary;
      showSummary=function(){
        if(_searchBar&&_searchBar.parentNode)_searchBar.parentNode.removeChild(_searchBar);
        origS();
        // intentionally no re-attach on summary
      };
    }
  }

  function _bootSearch(){
    _wrapRender();
    _ensureSearchAttached();
  }

  // Wait until other render overrides (audio bar etc.) finish wiring
  if(document.readyState==='complete'||document.readyState==='interactive'){
    setTimeout(_bootSearch,100);
  } else {
    document.addEventListener('DOMContentLoaded',function(){setTimeout(_bootSearch,100);});
  }
})();
</script>

<script>
(function(){
  var lbFrameDrawing = false, lbFrameLastX = 0, lbFrameLastY = 0;
  var lbFrameColor = '#fbbf24';
  var lbFrameTool = 'pen';
  var lbFrameAlphas = {pen: 0.85, hl: 0.30, er: 1.0};
  var lbFrameSizes = {pen: 5, hl: 26, er: 36};
  var lbFrameBgColor = '';   // '' = default lightbox bg
  var lbFrameUndoStack = []; // snapshots of canvas state
  var lbFrameRedoStack = [];
  var LB_FRAME_HISTORY_MAX = 30;
  var lbFrameSrc = '', lbFrameLabel = '';

  window.lbFrameOpen = function(src, label){
    lbFrameSrc = src; lbFrameLabel = label || '';
    var lb = document.getElementById('lb-frame');
    var img = document.getElementById('lb-frame-img');
    var canvas = document.getElementById('lb-frame-canvas');
    document.getElementById('lb-frame-cap').textContent = label;
    if (canvas) canvas.getContext('2d').clearRect(0,0,canvas.width,canvas.height);
    img.onload = function(){ lbFrameSyncCanvas(true); lbFrameApplyImgFilter(); };
    img.src = src;
    lb.classList.add('open');
    lbFrameApplyImgFilter();
    // Reset history + bg for new frame
    lbFrameUndoStack = [];
    lbFrameRedoStack = [];
    lbFrameBgColor = '';
    lb.style.background = '';  // restore default lightbox bg
    setTimeout(function(){ lbFrameSyncCanvas(true); }, 100);
    setTimeout(function(){ lbFrameSyncCanvas(true); }, 400);
  };
  window.lbFrameClose = function(){
    var lb = document.getElementById('lb-frame');
    lb.classList.remove('open');
    var c = document.getElementById('lb-frame-canvas');
    if (c) { c.classList.remove('draw-active'); c.style.pointerEvents = 'none'; c.style.cursor = ''; }
    var btn = document.getElementById('lb-frame-draw-toggle');
    if (btn) { btn.classList.remove('active'); btn.textContent = '🎨 Draw OFF'; }
  };
  function lbFrameSyncCanvas(forceClear){
    var img = document.getElementById('lb-frame-img');
    var canvas = document.getElementById('lb-frame-canvas');
    if (!img || !canvas) return;
    var w = img.naturalWidth || img.clientWidth || 1280;
    var h = img.naturalHeight || img.clientHeight || 720;
    var sizeChanged = (canvas.width !== w || canvas.height !== h);
    if (sizeChanged) { canvas.width = w; canvas.height = h; }
    if (sizeChanged || forceClear) {
      canvas.getContext('2d').clearRect(0,0,canvas.width,canvas.height);
    }
  }
  window.lbFrameToggleDraw = function(){
    var c = document.getElementById('lb-frame-canvas');
    if (!c) return;
    lbFrameSyncCanvas();
    var active = c.classList.toggle('draw-active');
    c.style.pointerEvents = active ? 'auto' : 'none';
    c.style.cursor = active ? 'crosshair' : '';
    c.style.touchAction = 'none';
    var btn = document.getElementById('lb-frame-draw-toggle');
    btn.classList.toggle('active', active);
    btn.textContent = active ? '✏️ Drawing — tap to stop' : '🎨 Tap to Draw';
  };
  window.lbFrameSetColor = function(c){ lbFrameColor = c; };
  window.lbFrameSetTool = function(t){
    lbFrameTool = t;
    document.querySelectorAll('.lb-frame-toolbar button[id^="lb-frame-tool-"]').forEach(function(b){ b.classList.remove('active'); });
    document.getElementById('lb-frame-tool-' + t).classList.add('active');
    // Update sliders to show current tool's settings
    var sizeSlider = document.getElementById('lb-frame-size-slider');
    var opacSlider = document.getElementById('lb-frame-opacity-slider');
    if (sizeSlider) { sizeSlider.value = lbFrameSizes[t]; document.getElementById('lb-frame-size-val').textContent = lbFrameSizes[t] + 'px'; }
    if (opacSlider) { var op = Math.round(lbFrameAlphas[t]*100); opacSlider.value = op; document.getElementById('lb-frame-opacity-val').textContent = op + '%'; }
  };
  window.lbFrameSetSize = function(v){
    lbFrameSizes[lbFrameTool] = parseInt(v, 10);
    document.getElementById('lb-frame-size-val').textContent = v + 'px';
  };
  window.lbFrameSetOpacity = function(v){
    lbFrameAlphas[lbFrameTool] = parseInt(v, 10) / 100;
    document.getElementById('lb-frame-opacity-val').textContent = v + '%';
  };
  var lbFrameImgOpacity = 1.0;
  var lbFrameBW = false;
  function lbFrameApplyImgFilter(){
    var img = document.getElementById('lb-frame-img');
    if (!img) return;
    var filter = '';
    if (lbFrameBW) filter += 'grayscale(1) ';
    img.style.filter = filter.trim();
    img.style.opacity = lbFrameImgOpacity;
  }
  window.lbFrameSetImgOpacity = function(v){
    lbFrameImgOpacity = parseInt(v, 10) / 100;
    document.getElementById('lb-frame-img-opacity-val').textContent = v + '%';
    lbFrameApplyImgFilter();
  };
  window.lbFrameToggleBW = function(){
    lbFrameBW = !lbFrameBW;
    var btn = document.getElementById('lb-frame-bw-toggle');
    btn.textContent = lbFrameBW ? '◾ Color' : '⬜ B&W';
    btn.classList.toggle('active', lbFrameBW);
    lbFrameApplyImgFilter();
  };
  window.lbFrameSetBgColor = function(c){
    lbFrameBgColor = c;
    var lb = document.getElementById('lb-frame');
    if (lb) lb.style.background = c;
  };
  function lbFrameSnapshot(){
    var canvas = document.getElementById('lb-frame-canvas');
    if (!canvas || !canvas.width) return;
    try {
      lbFrameUndoStack.push(canvas.toDataURL('image/png'));
      if (lbFrameUndoStack.length > LB_FRAME_HISTORY_MAX) lbFrameUndoStack.shift();
      lbFrameRedoStack = []; // new stroke invalidates redo
    } catch(e) {}
  }
  function lbFrameRestore(dataURL){
    var canvas = document.getElementById('lb-frame-canvas');
    if (!canvas) return;
    var ctx = canvas.getContext('2d');
    var img = new Image();
    img.onload = function(){
      ctx.clearRect(0,0,canvas.width,canvas.height);
      ctx.drawImage(img, 0, 0);
    };
    img.src = dataURL;
  }
  window.lbFrameUndo = function(){
    if (lbFrameUndoStack.length === 0) return;
    var canvas = document.getElementById('lb-frame-canvas');
    try { lbFrameRedoStack.push(canvas.toDataURL('image/png')); } catch(e) {}
    var prev = lbFrameUndoStack.pop();
    if (prev) lbFrameRestore(prev);
    else { canvas.getContext('2d').clearRect(0,0,canvas.width,canvas.height); }
  };
  window.lbFrameRedo = function(){
    if (lbFrameRedoStack.length === 0) return;
    var canvas = document.getElementById('lb-frame-canvas');
    try { lbFrameUndoStack.push(canvas.toDataURL('image/png')); } catch(e) {}
    var next = lbFrameRedoStack.pop();
    if (next) lbFrameRestore(next);
  };
  window.lbFrameClear = function(){
    var c = document.getElementById('lb-frame-canvas');
    if (!c) return;
    lbFrameSnapshot();  // allow undo of the clear
    c.getContext('2d').clearRect(0,0,c.width,c.height);
  };
  window.lbFrameSave = function(){
    // Use the existing in-DOM img (already loaded, no CORS re-fetch needed)
    var img = document.getElementById('lb-frame-img');
    var canvas = document.getElementById('lb-frame-canvas');
    if (!img || !img.complete || !img.naturalWidth) {
      alert('Frame image not loaded yet — wait a sec and try again.');
      return;
    }
    var out = document.createElement('canvas');
    out.width = canvas.width; out.height = canvas.height;
    var octx = out.getContext('2d');
    function paintWatermarkAndExport(){
      octx.save();
      octx.fillStyle = 'rgba(60,60,60,0.65)';
      octx.font = '600 13px -apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif';
      octx.textBaseline = 'bottom';
      octx.fillText('DC Study Supply — Dr. David Gramling, PHD', 14, out.height - 10);
      octx.restore();
      var fname = 'fab-201-m01-frame-' + (lbFrameLabel.replace(/[^a-z0-9_-]/gi,'_') || 'annotated') + '.png';
      // Try toBlob first
      var didBlob = false;
      try {
        out.toBlob(function(blob){
          if (!blob) { tryDataURL(); return; }
          didBlob = true;
          var url = URL.createObjectURL(blob);
          var a = document.createElement('a');
          a.href = url; a.download = fname;
          document.body.appendChild(a); a.click(); document.body.removeChild(a);
          URL.revokeObjectURL(url);
        }, 'image/png');
        // toBlob is async; if it threw synchronously we'd be in catch
      } catch(e) {
        tryDataURL();
      }
      function tryDataURL(){
        try {
          var dataURL = out.toDataURL('image/png');
          var a = document.createElement('a');
          a.href = dataURL; a.download = fname;
          document.body.appendChild(a); a.click(); document.body.removeChild(a);
        } catch(e2) {
          alert('Save failed (CORS): the browser blocked exporting the image because it was loaded cross-origin. This works on the live GitHub Pages URL but may fail when opened directly from disk (file://). Try the live URL: dgsc23.github.io/dc-study-tools/');
        }
      }
    }
    try {
      // 1. Paint background color first (if user picked one) — visible when image is transparent
      if (lbFrameBgColor) {
        octx.fillStyle = lbFrameBgColor;
        octx.fillRect(0, 0, out.width, out.height);
      }
      // 2. Draw image with current opacity + B&W filter
      octx.save();
      octx.globalAlpha = lbFrameImgOpacity;
      if (lbFrameBW) octx.filter = 'grayscale(1)';
      octx.drawImage(img, 0, 0, out.width, out.height);
      octx.restore();
      // 3. Draw user's strokes (canvas) at full opacity over the image
      octx.drawImage(canvas, 0, 0, out.width, out.height);
      paintWatermarkAndExport();
    } catch(e) {
      // drawImage tainted the canvas — happens only with CORS-restricted images
      alert('Save blocked by browser CORS rule. This usually means the file was opened from disk (file://) instead of the live URL. Try the live URL: dgsc23.github.io/dc-study-tools/');
    }
  };

  // Mouse + touch handlers (mirrors VSS pattern post-fix)
  var lbFrameCanvas = document.getElementById('lb-frame-canvas');
  if (lbFrameCanvas) {
    function lbFrameGetPos(e){
      var rect = lbFrameCanvas.getBoundingClientRect();
      var t = (e.touches && e.touches.length) ? e.touches[0] : e;
      var rw = rect.width || 1, rh = rect.height || 1;
      var cw = lbFrameCanvas.width || rw, ch = lbFrameCanvas.height || rh;
      var sx = cw / rw, sy = ch / rh;
      return [(t.clientX - rect.left) * sx, (t.clientY - rect.top) * sy];
    }
    function lbFrameDown(e){
      if (!lbFrameCanvas.classList.contains('draw-active')) return;
      e.preventDefault();
      lbFrameSnapshot();  // save state BEFORE this stroke for undo
      lbFrameDrawing = true;
      var p = lbFrameGetPos(e);
      lbFrameLastX = p[0]; lbFrameLastY = p[1];
    }
    function lbFrameMove(e){
      if (!lbFrameDrawing || !lbFrameCanvas.classList.contains('draw-active')) return;
      e.preventDefault();
      var p = lbFrameGetPos(e);
      var ctx = lbFrameCanvas.getContext('2d');
      ctx.strokeStyle = lbFrameColor;

      ctx.lineCap = 'round'; ctx.lineJoin = 'round';
      ctx.beginPath(); ctx.moveTo(lbFrameLastX, lbFrameLastY); ctx.lineTo(p[0], p[1]); ctx.stroke();

<script id="mc-to-frame-pip-drill-js">
(function(){
  // Lecture routing config — generic across number of lectures so this same code
  // works for GA (2 lectures, 1 boundary) and FAB (3 lectures, 2 boundaries) and
  // any future module. Boundaries are combined-audio split timestamps in seconds.
  // viewers[i] is the URL for lecture i (after boundaries[i-1], up to boundaries[i]).
  var LECTURE_CFG={
  "boundaries": [4800, 10817],
  "viewers": [
    "fab-201-m02-shoulder-forearm-l04-frame-viewer.html",
    "fab-201-m02-shoulder-forearm-l05-frame-viewer.html",
    "fab-201-m02-shoulder-forearm-l06-frame-viewer.html"
  ]
};

  function resolveLecture(combinedTs){
    var boundaries=LECTURE_CFG.boundaries;
    var viewers=LECTURE_CFG.viewers;
    var prev=0;
    for(var i=0;i<boundaries.length;i++){
      if(combinedTs<=boundaries[i]){
        return {idx:i,viewer:viewers[i],relTs:combinedTs-prev};
      }
      prev=boundaries[i];
    }
    var last=boundaries.length;
    return {idx:last,viewer:viewers[last],relTs:combinedTs-prev};
  }

  window.openFrameViewerForCurrentQ=function(){
    if(typeof questions==='undefined'||typeof idx==='undefined'||typeof TIMESTAMPS==='undefined')return;
    var q=questions[idx];
    if(!q)return;
    var bankId=q._bankId;
    if(bankId==null||bankId>=TIMESTAMPS.length)return;
    var ts=TIMESTAMPS[bankId];
    if(!isFinite(ts)||ts<=0)return;
    var routed=resolveLecture(ts);
    if(!routed.viewer)return;
    var url=routed.viewer+'?ts='+routed.relTs.toFixed(1);
    window.open(url,'_blank','noopener,noreferrer');
  };

  // Inject the button into the audio bar's audio-info section AFTER it's built
  function injectButton(){
    var bar=document.getElementById('audio-bar');
    if(!bar)return false;
    if(bar.querySelector('.btn-frame-pip'))return true;
    var info=bar.querySelector('.audio-info');
    if(!info)return false;
    var btn=document.createElement('button');
    btn.className='btn-frame-pip';
    btn.type='button';
    btn.innerHTML='🎞️ Frames + PiP';
    btn.title='Open Frame Viewer at this Q\'s timestamp — draw on the slide while video PiP plays';
    btn.onclick=function(e){e.preventDefault();openFrameViewerForCurrentQ();};
    info.appendChild(btn);
    return true;
  }

  // Audio bar is rebuilt on every render(); inject after each rebuild.
  function watchAndInject(){
    if(injectButton())return;
    // Audio bar not built yet — observe app for changes
    var app=document.getElementById('app');
    if(!app)return;
    var mo=new MutationObserver(function(){
      if(injectButton())mo.disconnect();
    });
    mo.observe(app,{childList:true,subtree:true});
  }

  // Re-inject on every audio-bar attachment (after render() wipes #app)
  setInterval(injectButton,1500);

  if(document.readyState==='complete'||document.readyState==='interactive'){
    setTimeout(watchAndInject,500);
  } else {
    document.addEventListener('DOMContentLoaded',function(){setTimeout(watchAndInject,500);});
  }
})();
</script>

<script id="pill-rebuild-deploy-fab-lightbox-js">
(function() {
    "use strict";
    var TB_SEL    = '.lb-frame-toolbar';
    var TB_TRIG   = null;
    var CANVAS_SEL = '#lb-frame-canvas';
    var BODY_CLASS = 'float-toolbar-mode';
    var LS_KEY    = 'pillFabLightboxCollapsed';
    var TOP_CLEARANCE = 28;

    function tb()     { return document.querySelector(TB_SEL); }
    function fb()     { return document.getElementById('floatingToggle'); }
    function canvas() { return document.querySelector(CANVAS_SEL); }

    function tbVisible() {
        var t = tb(); if (!t) return false;
        // Use getBoundingClientRect rather than offsetParent. Reason: per spec,
        // offsetParent returns null for any element with `position: fixed` —
        // and my pill CSS makes the toolbar position:fixed. So offsetParent
        // would ALWAYS be null on a floating toolbar (whether visible or not),
        // which would break the visibility check and cause updateFloatingPos
        // to return early, breaking zoom-tracking. Bug caught 2026-05-10 after
        // David reported the toolbar didn't follow zoom on the frame viewer.
        // getBoundingClientRect returns a zero rect when the element OR any
        // ancestor has display:none, but a non-zero rect when rendered,
        // regardless of position:fixed/relative/static.
        var rect = t.getBoundingClientRect();
        return rect.width > 0 && rect.height > 0;
    }

    // ---- expand / collapse ----
    function ensureExpandBtn() {
        var t = tb(); if (!t) return;
        if (document.getElementById('ftExpandBtn')) return;
        var btn = document.createElement('button');
        btn.id = 'ftExpandBtn';
        btn.type = 'button';
        btn.title = 'Collapse / expand toolbar';
        btn.setAttribute('aria-label', 'Collapse toolbar');
        var startCollapsed = false;
        try { startCollapsed = localStorage.getItem(LS_KEY) === '1'; } catch (e) {}
        if (startCollapsed) t.classList.add('collapsed');
        btn.innerHTML = startCollapsed ? '&#9998;' : '&#10005;';
        btn.addEventListener('click', function(e) {
            e.preventDefault(); e.stopPropagation();
            var collapsed = t.classList.toggle('collapsed');
            btn.innerHTML = collapsed ? '&#9998;' : '&#10005;';
            btn.setAttribute('aria-label', collapsed ? 'Expand toolbar' : 'Collapse toolbar');
            try { localStorage.setItem(LS_KEY, collapsed ? '1' : '0'); } catch (e2) {}
            requestAnimationFrame(updateFloatingPos);
        });
        if (t.firstChild) t.insertBefore(btn, t.firstChild); else t.appendChild(btn);
    }

    // ---- draw / scroll toggle ----
    var touchDrawMode = true;
    function ensureDrawScrollToggle() {
        if (document.getElementById('floatingToggle')) return;
        var btn = document.createElement('button');
        btn.id = 'floatingToggle';
        btn.type = 'button';
        btn.className = 'draw-mode';
        btn.title = 'Touch = draw — tap to switch to scroll';
        btn.setAttribute('aria-label', 'Toggle draw / scroll mode');
        btn.innerHTML = '&#9998;';
        btn.addEventListener('click', function(e) {
            e.preventDefault(); e.stopPropagation();
            touchDrawMode = !touchDrawMode;
            var c = canvas();
            btn.className = (btn.classList.contains('visible') ? 'visible ' : '') +
                            (touchDrawMode ? 'draw-mode' : 'scroll-mode');
            btn.innerHTML = touchDrawMode ? '&#9998;' : '&#9995;';
            btn.title = touchDrawMode
                ? 'Touch = draw — tap to switch to scroll'
                : 'Touch = scroll — tap to switch to draw';
            if (c) {
                c.style.touchAction = touchDrawMode ? 'none' : 'auto';
                c.style.pointerEvents = touchDrawMode ? '' : 'none';
            }
            requestAnimationFrame(updateFloatingPos);
        });
        document.body.appendChild(btn);
    }

    function syncToggleVisibility() {
        var b = fb(); if (!b) return;
        if (tbVisible()) b.classList.add('visible');
        else b.classList.remove('visible');
    }

    // ---- visual viewport zoom positioning ----
    // Toolbar bottom-right anchored: left = vv.right - margin - w*sc,  top = vv.bottom - margin - h*sc
    // Toggle  bottom-left  anchored: left = vv.left + margin,           top = vv.bottom - margin - h*sc
    // Both use transformOrigin: top left + scale(1/vv.scale).
    function updateFloatingPos() {
        var t = tb();
        var b = fb();
        var tShown = t && tbVisible();
        var bShown = b && b.classList.contains('visible');
        if (!tShown && !bShown) return;
        if (!window.visualViewport) return;
        var vv = window.visualViewport;
        var margin = 14;
        // Snap-back at default zoom — drop inline overrides so CSS rules
        // (max-height + position) take over cleanly.
        if (vv.scale <= 1.05) {
            if (t) {
                t.style.transform = ''; t.style.transformOrigin = '';
                t.style.left = ''; t.style.top = '';
                t.style.right = ''; t.style.bottom = '';
                t.style.maxHeight = '';
            }
            if (b) {
                b.style.transform = ''; b.style.transformOrigin = '';
                b.style.left = ''; b.style.top = '';
                b.style.right = ''; b.style.bottom = '';
            }
            return;
        }
        var sc = 1 / vv.scale;
        if (tShown) {
            // Dynamically clamp toolbar's layout max-height so its VISUAL
            // height fits in the visible viewport with top_clearance + bottom
            // margin. Without this, at heavy zoom (4x+) the toolbar overflows
            // off-screen because CSS `max-height: calc(100vh - Npx)` uses
            // LAYOUT vh, which stays large when zoomed in.
            var maxVisualH = vv.height - TOP_CLEARANCE - margin;
            if (maxVisualH < 60) maxVisualH = 60;  // sanity floor
            var maxLayoutH = maxVisualH / sc;
            t.style.maxHeight = maxLayoutH + 'px';
            // Re-measure AFTER clamping max-height so th reflects the new
            // clamped layout box.
            var tw = t.offsetWidth || 60;
            var th = t.offsetHeight || 200;
            t.style.right = 'auto';
            t.style.bottom = 'auto';
            t.style.left = (vv.offsetLeft + vv.width  - margin - tw * sc) + 'px';
            t.style.top  = (vv.offsetTop  + vv.height - margin - th * sc) + 'px';
            t.style.transform = 'scale(' + sc + ')';
            t.style.transformOrigin = 'top left';
        }
        if (bShown) {
            var bh = b.offsetHeight || 40;
            b.style.right = 'auto';
            b.style.bottom = 'auto';
            b.style.left = (vv.offsetLeft + margin) + 'px';
            b.style.top  = (vv.offsetTop + vv.height - margin - bh * sc) + 'px';
            b.style.transform = 'scale(' + sc + ')';
            b.style.transformOrigin = 'top left';
        }
    }

    function init() {
        document.body.classList.add(BODY_CLASS);
        var t = tb();
        if (!t) { setTimeout(init, 200); return; }
        ensureExpandBtn();
        ensureDrawScrollToggle();
        syncToggleVisibility();
        // Watch class changes that affect toolbar visibility. THREE targets
        // because different surfaces trigger visibility via different
        // elements:
        //   - toolbar itself (.show on slides, .active on VSS/AG)
        //   - toolbar's parent (#lb-frame.open on frame viewers — the
        //     toolbar's own class doesn't change when the lightbox opens)
        //   - document.body (body.annotate-mode on frame viewers — covers
        //     the gap if a future surface scopes visibility on body class)
        // Without the parent + body observers, the frame viewer's toggle
        // stayed hidden because syncToggleVisibility never re-ran after
        // init() — caught 2026-05-10 when David reported the toggle
        // missing on the frame viewer after bugfix #3.
        var mo = new MutationObserver(function(muts) {
            for (var i = 0; i < muts.length; i++) {
                if (muts[i].attributeName === 'class') {
                    syncToggleVisibility();
                    requestAnimationFrame(updateFloatingPos);
                    break;
                }
            }
        });
        mo.observe(t, { attributes: true, attributeFilter: ['class'] });
        if (t.parentElement) {
            mo.observe(t.parentElement, { attributes: true, attributeFilter: ['class'] });
        }
        mo.observe(document.body, { attributes: true, attributeFilter: ['class'] });
        if (window.visualViewport) {
            window.visualViewport.addEventListener('scroll', updateFloatingPos);
            window.visualViewport.addEventListener('resize', updateFloatingPos);
        }
        window.addEventListener('scroll', updateFloatingPos, { passive: true });
        window.addEventListener('resize', updateFloatingPos);
        requestAnimationFrame(updateFloatingPos);
    }

    if (document.readyState === 'complete' || document.readyState === 'interactive') {
        setTimeout(init, 200);
    } else {
        document.addEventListener('DOMContentLoaded', function() { setTimeout(init, 200); });
    }
})();
</script>
