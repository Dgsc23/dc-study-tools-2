<script>
const BANK=[{"q": "Dr. Maini stresses that the pharyngeal plexus - the network on the side and back of the pharynx - is formed by which two cranial nerves?", "o": ["Glossopharyngeal (IX) and vagus (X)", "Vagus (X) and hypoglossal (XII)", "Trigeminal (V) and facial (VII)", "Glossopharyngeal (IX) and accessory (XI) only"], "c": 0, "cat": "CN Components & Overview", "r": ["Correct. Maini says the pharyngeal plexus is formed by the 9th and 10th nerves - glossopharyngeal and vagus.", "XII (hypoglossal) is a pure motor nerve to the tongue; it does not form the pharyngeal plexus.", "V and VII are not the pharyngeal plexus nerves in her account.", "The cranial part of XI contributes motor fibres, but it runs with the vagus; the plexus itself is IX and X."], "source": "L28 · Pharyngeal plexus", "quote": "[Maini] 'It is a plexus of nerves on the side and back of the pharynx. It is formed by 9th and 10th nerves.'", "obj": "Pharyngeal plexus formation", "hint": "Glossopharyngeal + vagus."}, {"q": "According to Maini, every pharyngeal muscle is supplied by the vagus (X) EXCEPT one - which muscle, and by which nerve?", "o": ["Salpingopharyngeus, by the glossopharyngeal nerve (IX)", "Stylopharyngeus, by the glossopharyngeal nerve (IX)", "Palatopharyngeus, by the hypoglossal nerve (XII)", "Cricopharyngeus, by the facial nerve (VII)"], "c": 1, "cat": "CN Components & Overview", "r": ["Salpingopharyngeus is a vagus-supplied muscle; the lone IX exception is stylopharyngeus.", "Correct. All pharyngeal muscles are innervated by the 10th nerve except stylopharyngeus, which is supplied by the 9th (glossopharyngeal).", "Palatopharyngeus is supplied by the vagus, not the hypoglossal.", "Cricopharyngeus is vagus-supplied; VII does not supply pharyngeal muscles."], "source": "L28 · Pharyngeal muscle innervation", "quote": "[Maini] 'All the pharyngeal muscles are innervated by the 10th nerve, except for stylopharyngeus. The nerve for stylopharyngeus is glossopharyngeal, 9th nerve.'", "obj": "Motor supply of pharyngeal muscles", "hint": "One muscle breaks the vagus rule - the one from the 3rd arch."}, {"q": "Maini describes the cranial part of the accessory nerve (XI) as doing what with its motor fibres, so that we practically only test XI on trapezius and sternocleidomastoid?", "o": ["They join the vagus and are distributed as its motor (SVE) fibres to pharyngeal/laryngeal muscles", "They descend as spinal fibres to supply trapezius and sternocleidomastoid", "They join the glossopharyngeal nerve to reach the tongue", "They pass through the foramen magnum to supply the diaphragm"], "c": 0, "cat": "CN Components & Overview", "r": ["Correct. Maini says the cranial fibres of XI join the vagus and become its motor fibres to the pharyngeal, palatine, and laryngeal muscles; only the spinal fibres leave as the 11th nerve to trapezius and SCM.", "The spinal fibres (not the cranial ones) supply trapezius and SCM; the cranial fibres change over to the vagus.", "The cranial accessory fibres join the vagus, not the glossopharyngeal.", "XI does not supply the diaphragm (that is the phrenic nerve, C3-C5)."], "source": "L28 · Cranial accessory / vagus", "quote": "[Maini] 'The motor fibers of 11th nerve travel along with the vagus... they become part of 10th nerve.'", "obj": "Cranial accessory contribution to vagus", "hint": "The cranial fibres change their party and ride the vagus."}, {"q": "For the reflex (pharyngeal) stage of swallowing, Maini lists the cranial nerves that carry the motor impulses. Which set is correct?", "o": ["CN V, IX, X, and XII", "CN III, IV, VI, and XII", "CN V, VII, IX, and XI", "CN VII, X, XI, and XII"], "c": 0, "cat": "CN Components & Overview", "r": ["Correct. Maini states the motor impulses for the pharyngeal stage are transmitted by the 5th, 9th, 10th, and 12th nerves.", "III, IV, VI are the extraocular motor nerves - not involved in swallowing.", "VII and XI are not the set she names for the swallowing motor output.", "VII and XI are not part of her stated swallowing motor set."], "source": "L28 · Deglutition motor nerves", "quote": "[Maini] 'Motor impulses are transmitted by 5th, 9th, 10th, and 12th nerve.'", "obj": "Cranial nerves of swallowing", "hint": "5, 9, 10, 12."}, {"q": "Maini locates the reflex centre for the pharyngeal (involuntary) stage of swallowing in which structure?", "o": ["The red nucleus, in the midbrain", "The dentate nucleus, in the cerebellum", "The trigeminal motor nucleus, in the pons", "The nucleus of the tractus solitarius, in the medulla"], "c": 3, "cat": "CN Components & Overview", "r": ["The red nucleus is a midbrain motor-coordination centre, not the swallowing reflex centre.", "The dentate nucleus is a cerebellar nucleus, unrelated to the swallowing reflex she describes.", "She names the nucleus of the tractus solitarius in the medulla, not the trigeminal motor nucleus.", "Correct. She says the nucleus of tractus solitarius, located in the medulla, is responsible for the reflex pharyngeal stage."], "source": "L28 · Deglutition center", "quote": "[Maini] 'Nucleus of tractus solitarius, located in medulla, is responsible for this.'", "obj": "Swallowing reflex centre", "hint": "Tractus solitarius - in the medulla."}, {"q": "Maini reviews sensory innervation of the pharynx. The mucosa of the NASOPHARYNX is supplied mainly by which nerve?", "o": ["The glossopharyngeal nerve (IX)", "The internal laryngeal branch of the vagus", "The mandibular nerve (V3)", "The maxillary nerve (V2)"], "c": 3, "cat": "CN Components & Overview", "r": ["IX supplies the oropharynx, not the nasopharynx.", "The internal laryngeal nerve supplies the area around the laryngeal inlet, not the nasopharynx.", "V3 (mandibular) is not the nasopharyngeal sensory nerve she names; it is V2.", "Correct. She says the nasopharynx is supplied by the maxillary nerve, a branch of the trigeminal (V2), continuing the posterior nasal-cavity pattern."], "source": "L28 · Pharyngeal sensory innervation", "quote": "[Maini] 'Nasopharynx by maxillary nerve... it is a branch of trigeminal. So this is your V2.'", "obj": "Sensory map of the pharynx", "hint": "Same V2 that does the posterior nasal cavity continues into the nasopharynx."}, {"q": "In Maini's sensory map of the pharynx, the OROPHARYNX mucosa is supplied by which cranial nerve?", "o": ["The maxillary nerve (V2)", "The facial nerve (VII)", "The glossopharyngeal nerve (IX)", "The hypoglossal nerve (XII)"], "c": 2, "cat": "CN Components & Overview", "r": ["V2 supplies the nasopharynx, not the oropharynx.", "VII carries taste to the anterior tongue but is not the oropharyngeal sensory nerve here.", "Correct. The oropharynx (like the posterior third of the tongue) is supplied by the 9th nerve, glossopharyngeal.", "XII is purely motor to the tongue and carries no general sensation."], "source": "L28 · Pharyngeal sensory innervation", "quote": "[Maini] 'The posterior part of oral cavity, posterior one-third of the tongue, is 9th nerve, so 9th nerve also extends to oropharynx.'", "obj": "Sensory map of the pharynx", "hint": "Oropharynx tracks with the posterior tongue - CN IX."}, {"q": "Maini says the mucosa around the entrance into the larynx (laryngopharynx) receives its sensory supply from which nerve?", "o": ["The internal laryngeal branch of the vagus", "The recurrent laryngeal branch of the vagus", "The glossopharyngeal nerve (IX)", "The external laryngeal branch of the vagus"], "c": 0, "cat": "CN Components & Overview", "r": ["Correct. She assigns the area around the laryngeal inlet to the internal laryngeal branch of the vagus.", "The recurrent laryngeal nerve supplies larynx below the vocal cords / most intrinsic muscles, not this sensory field.", "IX supplies the oropharynx, not the laryngeal inlet.", "The external laryngeal nerve is motor to cricothyroid, not the sensory nerve of this region."], "source": "L28 · Pharyngeal sensory innervation", "quote": "[Maini] 'Area around the entrance into larynx by internal laryngeal branch of the vagus.'", "obj": "Sensory map of the pharynx", "hint": "Internal laryngeal = sensory above the cords."}, {"q": "Maini notes that superior cervical ganglion fibres join the cranial nerves. She specifically lists cranial (sympathetic) branches going to which nerves?", "o": ["CN IX, X, and XII", "CN III, IV, and VI", "CN V, VII, and VIII", "CN I, II, and III"], "c": 0, "cat": "CN Components & Overview", "r": ["Correct. The superior cervical ganglion gives cranial branches to the 9th, 10th, and 12th nerves.", "III, IV, VI are the extraocular motor nerves; the ganglion's cranial branches she lists are IX, X, XII.", "V, VII, VIII are not the set she names for the ganglion's cranial branches.", "I, II, III are not the ganglion's cranial-nerve targets she lists."], "source": "L28 · Superior cervical ganglion branches", "quote": "[Maini] 'Cranial branches to 9, 10, and 12 nerves.'", "obj": "SCG cranial branches", "hint": "9, 10, 12 - same neighbours at the jugular foramen region."}, {"q": "What functional fibre type does Dr. Maini assign to the olfactory nerve (CN I)?", "o": ["SSA - special somatic afferent", "SVA - special visceral afferent (smell)", "GSA - general somatic afferent", "GVE - general visceral efferent"], "c": 1, "cat": "CN I — Olfactory", "r": ["SSA is the fibre type she gives to the optic nerve, not olfactory.", "Correct. Maini classifies the olfactory nerve as SVA, carrying the special sense of smell.", "GSA is general sensation (touch, pain), not the special sense of smell.", "GVE is autonomic motor - the olfactory nerve is purely sensory."], "source": "L28 · CN I fiber type", "quote": "[Maini] 'SVA - they carry the sensation of smell.'", "obj": "Olfactory functional component", "hint": "Smell = special sense of a chemical input -> SVA."}, {"q": "The receptor cells for smell (olfactory neurons) are located where, according to Maini?", "o": ["In the olfactory bulb on the cribriform plate", "In the primary olfactory cortex of the temporal lobe", "In the vomeronasal organ of the nasal septum", "In the olfactory epithelium near the roof of the nasal cavity"], "c": 3, "cat": "CN I — Olfactory", "r": ["The olfactory bulb is where their axons synapse (with mitral cells), not where the receptor cell bodies sit.", "The temporal-lobe cortex is the destination of the olfactory tract, not the receptor location.", "Maini does not place the smell receptors in a vomeronasal organ; they are in the roof-of-nose olfactory epithelium.", "Correct. The olfactory neurons sit in the olfactory epithelium close to the roof of the nasal cavity."], "source": "L28 · CN I receptors", "quote": "[Maini] 'Olfactory nerve cells are located close to the roof of the nasal cavity... we have olfactory epithelium.'", "obj": "Olfactory receptor location", "hint": "High in the nose - the roof."}, {"q": "Maini describes the olfactory neuron as bearing what on its apical border, and calls the neuron what kind of receptor?", "o": ["Multiple cilia; a chemoreceptor", "A single flagellum; a mechanoreceptor", "Microvilli only; a thermoreceptor", "Stereocilia; a photoreceptor"], "c": 0, "cat": "CN I — Olfactory", "r": ["Correct. Each olfactory neuron has multiple cilia on its apical border and acts as a chemoreceptor (stimulated by dissolved chemicals).", "It has multiple cilia, not one flagellum, and it senses chemicals, not mechanical force.", "Olfactory neurons are chemoreceptors with cilia, not thermoreceptors with microvilli.", "Stereocilia/photoreceptors belong to hearing and vision, not smell."], "source": "L28 · CN I receptor structure", "quote": "[Maini] 'Each neuron has cilia on its apical border... What kind of receptors are these? Chemoreceptors.'", "obj": "Olfactory receptor structure", "hint": "Chemicals dissolve in mucus -> stimulate ciliated chemoreceptors."}, {"q": "In the olfactory epithelium, what is the function of the basal cells, per Maini?", "o": ["They act as stem cells that divide to replace worn-out olfactory receptors", "They secrete the mucus that dissolves odorants", "They form the myelin sheath of the olfactory axons", "They are the supporting cells that insulate each neuron"], "c": 0, "cat": "CN I — Olfactory", "r": ["Correct. Maini says basal cells act as stem cells; because olfactory mucosa is prone to damage, they divide and replace worn-out receptors.", "Mucus is produced by glands/supporting elements, not the basal (stem) cells.", "Olfactory nerve fibres are unmyelinated fascicles; basal cells do not myelinate them.", "Supporting cells are a separate population; basal cells are specifically the regenerative stem cells."], "source": "L28 · CN I basal cells", "quote": "[Maini] 'Basal cells act as stem cells... they divide and replace the worn-out olfactory receptors.'", "obj": "Olfactory epithelium cell types", "hint": "Basal = the regeneration reservoir."}, {"q": "Through which bony opening do the olfactory nerve fascicles pass to reach the olfactory bulb?", "o": ["The optic canal of the sphenoid bone", "The superior orbital fissure", "The jugular foramen", "The foramina of the cribriform plate of the ethmoid bone"], "c": 3, "cat": "CN I — Olfactory", "r": ["The optic canal transmits CN II, not the olfactory fascicles.", "The superior orbital fissure transmits III, IV, V1, and VI - not CN I.", "The jugular foramen transmits IX, X, and XI - not the olfactory nerve.", "Correct. The axons penetrate the cribriform plate of the ethmoid to enter the olfactory bulb."], "source": "L28 · CN I foramen", "quote": "[Maini] 'They penetrate cribriform plate of the ethmoid to enter the olfactory bulb, where they synapse.'", "obj": "Olfactory foramen", "hint": "Sieve-like plate of the ethmoid = cribriform plate."}, {"q": "In the olfactory bulb, the olfactory receptor axons synapse with which cells, according to Maini?", "o": ["Ganglion cells and bipolar cells", "Purkinje cells and granule cells", "Pyramidal cells of the cortex", "Mitral cells and association neurons"], "c": 3, "cat": "CN I — Olfactory", "r": ["Ganglion and bipolar cells belong to the retina/optic pathway, not the olfactory bulb.", "Purkinje and granule cells are cerebellar, not olfactory-bulb cells.", "Pyramidal cortical cells are downstream in the cortex, not the bulb synapse she describes.", "Correct. She says the axons synapse with mitral cells and association neurons of the olfactory bulb."], "source": "L28 · CN I olfactory bulb", "quote": "[Maini] 'These axons synapse with the mitral cells, and then with the association neurons of the olfactory bulb.'", "obj": "Olfactory bulb synapse", "hint": "Second-order cells of smell = mitral cells."}, {"q": "The olfactory tract, formed by axons of mitral and association neurons, ends in which region, per Maini?", "o": ["The primary visual cortex in the occipital lobe", "The postcentral gyrus of the parietal lobe", "The thalamus, before any cortical relay", "The primary olfactory cortex in the temporal lobe"], "c": 3, "cat": "CN I — Olfactory", "r": ["The occipital lobe is the visual cortex, not the olfactory destination.", "The postcentral gyrus is the somatosensory cortex, unrelated to smell.", "She routes the tract to the temporal-lobe olfactory cortex; smell is famously the sense that is not obligately thalamic-relayed.", "Correct. Maini says the olfactory tract ends in the temporal lobe, where the primary olfactory cortex is."], "source": "L28 · CN I central pathway", "quote": "[Maini] 'Olfactory tract ends in the temporal lobe, where you have your primary olfactory cortex.'", "obj": "Olfactory central pathway", "hint": "Smell -> temporal lobe."}, {"q": "Maini emphasizes there is no single olfactory nerve trunk. How does she describe the nerve instead?", "o": ["As multiple fascicles (bundles of axonal processes) that penetrate the cribriform plate", "As one thick nerve that runs through the optic canal", "As a nerve that first synapses in the trigeminal ganglion", "As a purely motor nerve to the nasal glands"], "c": 0, "cat": "CN I — Olfactory", "r": ["Correct. She says the axonal processes form multiple fascicles - there is no definite single olfactory nerve.", "There is no single trunk and it does not use the optic canal.", "The olfactory pathway does not relay in the trigeminal ganglion.", "The olfactory nerve is sensory (SVA), not motor."], "source": "L28 · CN I structure", "quote": "[Maini] 'There is no definite single olfactory nerve. There are multiple fascicles.'", "obj": "Olfactory nerve is multiple fascicles", "hint": "Many little bundles, not one trunk."}, {"q": "Maini defines anosmia as which of the following, and adds an encouraging point about recovery?", "o": ["Loss of taste; the receptors never regenerate", "A false perception of smell; it is permanent", "Loss of smell; olfactory neurons can regenerate", "Reduced smell only in old age; it cannot recover"], "c": 2, "cat": "CN I — Olfactory", "r": ["Anosmia is loss of smell, not taste, and the neurons do regenerate.", "A false perception of smell is phantosmia, not anosmia, and it is not framed as permanent.", "Correct. Anosmia is loss of smell (from loss of olfactory fibres, aging, trauma, or inflammation such as COVID), and she notes the neurons can regenerate.", "Anosmia is not limited to aging, and recovery is possible because the receptors regenerate."], "source": "L28 · CN I clinical", "quote": "[Maini] 'Anosmia, or loss of smell... although they are neurons, they get regenerated.'", "obj": "Anosmia", "hint": "An- (without) + osmia (smell)."}, {"q": "A patient reports smelling something that is not actually present - an olfactory hallucination. Maini calls this:", "o": ["Anosmia", "Olfactory adaptation", "Phantosmia", "Hyposmia"], "c": 2, "cat": "CN I — Olfactory", "r": ["Anosmia is the absence/loss of smell, the opposite complaint.", "Olfactory adaptation is the fading of a real, continuous smell over time.", "Correct. Phantosmia is smelling something that is not there - an olfactory hallucination.", "Hyposmia (reduced smell) is not the term she uses for perceiving a non-existent smell."], "source": "L28 · CN I clinical", "quote": "[Maini] 'Phantosmia... some people can smell something which is not even there. It is like olfactory hallucination.'", "obj": "Phantosmia vs anosmia", "hint": "Phantom smell = phantosmia."}, {"q": "Maini explains that after entering a smelly room you soon stop noticing the odour because the continuously stimulated receptors stop responding. She names this:", "o": ["Phantosmia", "Olfactory adaptation", "Anosmia", "Accommodation"], "c": 1, "cat": "CN I — Olfactory", "r": ["Phantosmia is perceiving an absent smell, not habituating to a present one.", "Correct. Olfactory adaptation - continuous stimulation makes the receptors stop responding, as with most sensory receptors.", "Anosmia is loss of smell from damage/aging, not habituation.", "Accommodation is the eye's near-focus reflex, an unrelated term."], "source": "L28 · CN I physiology", "quote": "[Maini] 'Olfactory adaptation... if they are continuously stimulated, they stop responding.'", "obj": "Olfactory adaptation", "hint": "Same smell, ignored over time."}, {"q": "What functional fibre type does Maini assign to the optic nerve, and what is her reasoning?", "o": ["SVA (special visceral afferent), because the eye is a visceral organ", "SSA (special somatic afferent), because the eye develops from ectoderm", "GSA (general somatic afferent), because it carries touch", "GVE (general visceral efferent), because it is autonomic"], "c": 1, "cat": "CN II — Optic", "r": ["She explicitly calls it somatic (SSA), not visceral, because of the ectodermal origin.", "Correct. Maini classifies the optic nerve as SSA and reasons that the eye (and ear) arise from ectoderm, making the input somatic rather than visceral.", "Vision is a special sense, not general somatic sensation.", "The optic nerve is sensory, not an autonomic efferent."], "source": "L28 · CN II fiber type", "quote": "[Maini] 'Special somatic afferents. Why are these not visceral efferents? Because your eye and your ear originate from ectoderm.'", "obj": "Optic functional component", "hint": "Eye from ectoderm -> somatic -> SSA."}, {"q": "Maini calls this a frequently asked board question: the optic nerve is composed of the axonal processes of which cells?", "o": ["Rods and cones", "Ganglion cells of the retina", "Bipolar cells", "Amacrine cells"], "c": 1, "cat": "CN II — Optic", "r": ["Rods and cones are the photoreceptors; their axons do NOT form the optic nerve (this is the trap she flags).", "Correct. The optic nerve is made of the axons of the ganglion cells - not of the rods and cones.", "Bipolar cells are the interneurons between photoreceptors and ganglion cells, not the source of optic nerve axons.", "Amacrine cells are retinal interneurons, not the origin of the optic nerve."], "source": "L28 · CN II composition", "quote": "[Maini] 'It is not the axons of rods and cones that make optic nerves. It is the axons of ganglion cells.'", "obj": "Optic nerve = ganglion cell axons", "hint": "Rods/cones -> bipolar -> ganglion -> optic nerve."}, {"q": "Maini contrasts the two photoreceptors. Which statement matches her account of CONES?", "o": ["Cones work best in dim light and lie in the peripheral retina", "Cones cannot sense colour but detect motion", "Cones sense colour and are concentrated in the central retina", "Cones make up the optic nerve directly"], "c": 2, "cat": "CN II — Optic", "r": ["Dim-light, peripheral function describes rods, not cones.", "Colour vision IS the cone specialty; that description fits rods.", "Correct. Cones are for colour vision and are concentrated centrally in the retina.", "Cones are photoreceptors; the optic nerve is made of ganglion-cell axons, not cones."], "source": "L28 · CN II photoreceptors", "quote": "[Maini] 'Cones are specialized for color vision... concentrated in the central part of the retina.'", "obj": "Rods vs cones", "hint": "Cones = colour, central."}, {"q": "Which of Maini's points about RODS is correct?", "o": ["Rods are the colour receptors of the fovea", "Rods form the optic disc", "Rods respond to small amounts of light, are more peripheral, and use a vitamin-A-derived photopigment", "Rods project directly onto the ganglion cells without bipolar cells"], "c": 2, "cat": "CN II — Optic", "r": ["Colour and foveal concentration describe cones, not rods.", "Rods do not form the optic disc; the disc is where axons exit.", "Correct. Rods are stimulated by very little light, are more numerous peripherally, cannot sense colour, and their photopigment derives from vitamin A.", "Photoreceptors project onto bipolar cells, which project onto ganglion cells - not directly."], "source": "L28 · CN II photoreceptors", "quote": "[Maini] 'Rods get stimulated by a very small amount of light... photopigment, which is derived from vitamin A.'", "obj": "Rods properties", "hint": "Rods = dim light, peripheral, vitamin A."}, {"q": "Maini explains dark adaptation: after coming from bright sunlight into a dark room, why does it take about 20 minutes to see?", "o": ["The cones must migrate to the peripheral retina", "The pupil takes 20 minutes to dilate fully", "The rods must resynthesize their photopigment, which was exhausted by the bright light", "The optic nerve must remyelinate"], "c": 2, "cat": "CN II — Optic", "r": ["Photoreceptors do not migrate; the delay is photopigment resynthesis in rods.", "Pupillary dilation is fast (seconds), not the 20-minute cause she describes.", "Correct. Bright light exhausts the rod photopigment; about 20 minutes are needed to resynthesize it before dark vision returns.", "Nerve remyelination is not the mechanism of dark adaptation."], "source": "L28 · CN II physiology", "quote": "[Maini] 'It takes 20 minutes... the time taken by the rods to resynthesize their photopigment.'", "obj": "Dark adaptation", "hint": "Rebuild the bleached rod pigment about 20 min."}, {"q": "Which sequence of retinal cells does Maini give as the pathway to the optic nerve?", "o": ["Ganglion cells -> bipolar cells -> rods/cones -> optic nerve", "Rods/cones -> ganglion cells -> bipolar cells -> optic nerve", "Rods/cones -> bipolar cells -> ganglion cells -> (ganglion axons) optic nerve", "Bipolar cells -> rods/cones -> ganglion cells -> optic nerve"], "c": 2, "cat": "CN II — Optic", "r": ["This reverses the direction; light-driven signal flows from photoreceptors outward to ganglion cells.", "Bipolar cells sit between photoreceptors and ganglion cells, not after ganglion cells.", "Correct. Rods and cones project onto bipolar cells, which project onto ganglion cells, whose axons form the optic nerve.", "Photoreceptors come first, then bipolar cells - not bipolar cells first."], "source": "L28 · CN II retinal circuit", "quote": "[Maini] 'Rods and cones project on the bipolar cells, and bipolar cells project onto ganglion cells... the axons of the ganglion cells make up the optic nerve.'", "obj": "Retinal signal pathway", "hint": "Photoreceptor -> bipolar -> ganglion."}, {"q": "After leaving the eyeball, the optic nerve exits the orbit through which opening - and in which bone does Maini place it?", "o": ["The superior orbital fissure, in the frontal bone", "The inferior orbital fissure, in the maxilla", "The optic canal, in the sphenoid bone", "The cribriform plate, in the ethmoid bone"], "c": 2, "cat": "CN II — Optic", "r": ["The superior orbital fissure transmits III, IV, V1, VI - not the optic nerve.", "The inferior orbital fissure is not the optic nerve's exit.", "Correct. The optic nerve leaves the orbit through the optic canal, which is part of the sphenoid bone.", "The cribriform plate transmits olfactory fascicles, not the optic nerve."], "source": "L28 · CN II foramen", "quote": "[Maini] 'The optic nerve leaves the orbital cavity through optic canal... Optic canal is a part of the sphenoid.'", "obj": "Optic foramen", "hint": "Optic canal = sphenoid."}, {"q": "At the optic chiasma, which fibres cross to the opposite side, per Maini?", "o": ["Only the fibres from the NASAL part of each retina cross; temporal fibres do not", "All optic nerve fibres cross completely", "Only the temporal retinal fibres cross", "Only the fibres carrying colour information cross"], "c": 0, "cat": "CN II — Optic", "r": ["Correct. Only nasal retinal fibres decussate at the chiasma; temporal retinal fibres stay uncrossed.", "The chiasma is a partial, not complete, crossing.", "It is the nasal fibres that cross, not the temporal ones.", "Crossing is by retinal location (nasal vs temporal), not by colour content."], "source": "L28 · CN II chiasma", "quote": "[Maini] 'Only the fibers coming from nasal part of the retina cross over. Temporal retinal fibers do not cross.'", "obj": "Optic chiasma decussation", "hint": "Nasal crosses; temporal stays."}, {"q": "Maini reminds students how visual fields map onto the retina. Which mapping is correct?", "o": ["The temporal visual field projects onto the temporal retina", "The temporal (lateral) visual field projects onto the NASAL retina", "The nasal visual field projects onto the nasal retina", "Both fields project onto the fovea only"], "c": 1, "cat": "CN II — Optic", "r": ["The temporal field does NOT land on the temporal retina; images are inverted/reversed by the lens.", "Correct. Light from the temporal field crosses the lens obliquely and lands on the nasal half of the retina (and the nasal field lands on the temporal retina).", "The nasal field projects onto the temporal retina, not the nasal retina.", "The whole field is not restricted to the fovea; peripheral field falls on peripheral retina."], "source": "L28 · CN II field mapping", "quote": "[Maini] 'From the temporal field, they project on the nasal half of the retina; from the nasal part, on the temporal part of the retina.'", "obj": "Visual field to retina mapping", "hint": "Optics flip it: temporal field -> nasal retina."}, {"q": "What visual loss does Maini describe for a complete lesion of ONE optic nerve?", "o": ["Loss of the temporal field of both eyes", "Loss of vision in the opposite (contralateral) half-field of both eyes", "Loss of the nasal field of the same eye only", "Total loss of vision in that one eye"], "c": 3, "cat": "CN II — Optic", "r": ["Bilateral temporal-field loss is the chiasma (bitemporal) pattern, not a single optic nerve.", "Contralateral homonymous loss is an optic-tract lesion, not an optic-nerve lesion.", "A single optic-nerve lesion abolishes the whole eye, not just its nasal field.", "Correct. Cutting one optic nerve removes all input from that eye - total monocular blindness."], "source": "L28 · CN II lesions", "quote": "[Maini] 'If there is a lesion of one optic nerve... total loss of vision in one of the eyes.'", "obj": "Optic nerve lesion", "hint": "One nerve out = that whole eye is blind."}, {"q": "A lesion AT the optic chiasma damages the crossing nasal fibres. Maini says this produces which field defect - and what is the commonest cause?", "o": ["Total blindness of one eye; caused by optic neuritis", "Homonymous hemianopia; caused by an optic tract stroke", "Central scotoma; caused by macular degeneration", "Bitemporal hemianopia; caused most commonly by a pituitary adenoma"], "c": 3, "cat": "CN II — Optic", "r": ["One-eye blindness is an optic-nerve lesion, not a chiasmal lesion.", "Homonymous hemianopia is an optic-tract lesion, not a chiasmal one.", "A central scotoma from macular disease is not the chiasmal pattern she describes.", "Correct. Loss of both nasal retinas removes both temporal fields = bitemporal hemianopia, classically from a pituitary adenoma pressing on the chiasma."], "source": "L28 · CN II lesions", "quote": "[Maini] 'Bitemporal hemianopia... the commonest condition causing this is pituitary adenoma.'", "obj": "Chiasmal lesion", "hint": "Cross fibres gone -> both temporal fields lost."}, {"q": "Why does a pituitary adenoma classically cause the chiasmal (bitemporal) visual defect, per Maini?", "o": ["The adenoma secretes a toxin that destroys the retina", "The pituitary gland lies right next to the optic chiasma and the tumour compresses the crossing fibres", "The tumour blocks the optic canal on both sides", "The adenoma compresses both optic tracts behind the chiasma"], "c": 1, "cat": "CN II — Optic", "r": ["She attributes the defect to mechanical compression, not a secreted retinal toxin.", "Correct. The pituitary gland sits immediately beneath/near the chiasma, so an expanding adenoma compresses the crossing nasal fibres.", "The defect is chiasmal compression, not bilateral optic-canal blockage.", "Compression is at the chiasma (crossing fibres), not the tracts (which would give homonymous loss)."], "source": "L28 · CN II lesions", "quote": "[Maini] 'Pituitary gland is lying right there... very close to optic chiasma.'", "obj": "Pituitary adenoma and vision", "hint": "Gland sits under the chiasma."}, {"q": "Maini adds a clinical pearl: patients with pituitary adenoma often present first to which specialist, and why?", "o": ["A cardiologist, because of referred chest pain", "An ENT surgeon, because of nasal obstruction", "A neurologist, because of seizures", "An ophthalmologist, because they notice a change in their field of vision"], "c": 3, "cat": "CN II — Optic", "r": ["Referred cardiac pain is unrelated to this presentation.", "Nasal obstruction is not the classic first complaint she describes.", "She specifically says they present to an ophthalmologist for the field change, not a neurologist for seizures.", "Correct. Because the earliest complaint is a change in the visual field, patients often see an ophthalmologist first."], "source": "L28 · CN II clinical", "quote": "[Maini] 'They actually see an ophthalmologist first, because there are changes in their field of vision.'", "obj": "Pituitary adenoma presentation", "hint": "Eye-field change is the first red flag."}, {"q": "A lesion of the LEFT optic tract (behind the chiasma) produces what pattern, per Maini's worked example?", "o": ["Loss of the right (opposite) field of vision in both eyes (a homonymous defect)", "Loss of vision in the left eye only", "Loss of both temporal fields (bitemporal)", "Loss of the left field of vision in both eyes"], "c": 0, "cat": "CN II — Optic", "r": ["Correct. The left optic tract carries right-field information from both eyes, so its lesion loses the opposite (right) field of both eyes - the patient turns to compensate.", "Monocular blindness is an optic-nerve lesion, not a tract lesion.", "Bitemporal loss is the chiasmal pattern, not a tract lesion.", "A left tract lesion loses the RIGHT field, not the left, because the tract carries the contralateral field."], "source": "L28 · CN II lesions", "quote": "[Maini] 'There is loss of vision in the opposite field of vision... if there is a lesion of optic tract.'", "obj": "Optic tract lesion", "hint": "Tract lesion -> contralateral homonymous loss."}, {"q": "Beyond the level she stops at, Maini mentions the pathway continues after the midbrain as what, before reaching the occipital lobe?", "o": ["The optic radiation", "A second optic chiasma", "The olfactory tract", "The medial lemniscus"], "c": 0, "cat": "CN II — Optic", "r": ["Correct. She notes the optic radiation carries the pathway on to the occipital lobe (details left to neurosciences).", "There is only one optic chiasma; there is no second one.", "The olfactory tract belongs to smell, not vision.", "The medial lemniscus is a somatosensory pathway, not the visual continuation."], "source": "L28 · CN II central pathway", "quote": "[Maini] 'After midbrain, there is optic radiation, goes all the way through the occipital lobe.'", "obj": "Optic radiation", "hint": "Radiation -> occipital lobe."}, {"q": "Maini says the oculomotor nerve carries motor fibres to muscles PLUS an autonomic component. What is that autonomic component?", "o": ["Postganglionic sympathetic fibres", "Preganglionic sympathetic fibres", "Preganglionic parasympathetic (GVE) fibres", "Special visceral afferent fibres"], "c": 2, "cat": "CN III — Oculomotor", "r": ["The autonomic component of CN III is parasympathetic, not sympathetic.", "It is parasympathetic (and preganglionic), not sympathetic.", "Correct. In addition to somatic motor fibres, CN III carries preganglionic parasympathetic (GVE) fibres.", "SVA is a sensory (smell/taste) component, not part of the oculomotor nerve."], "source": "L28 · CN III fiber type", "quote": "[Maini] 'GVE... parasympathetic. Preganglionic parasympathetic.'", "obj": "Oculomotor functional components", "hint": "Motor to muscles + preganglionic parasympathetic."}, {"q": "From which surface/region of the brainstem does the oculomotor nerve emerge, per Maini?", "o": ["The posterior surface of the midbrain, below the inferior colliculus", "The anterior surface of the midbrain, at the interpeduncular fossa", "The post-olivary sulcus of the medulla", "The pontomedullary junction"], "c": 1, "cat": "CN III — Oculomotor", "r": ["CN IV (trochlear) is the nerve that emerges dorsally, below the inferior colliculus - not CN III.", "Correct. CN III emerges from the anterior surface of the midbrain at the interpeduncular fossa.", "The post-olivary sulcus gives IX, X, and XI, not III.", "The pontomedullary junction gives VI, VII, VIII - not III."], "source": "L28 · CN III origin", "quote": "[Maini] 'Oculomotor emerges from anterior surface of the midbrain... in the interpeduncular fossa.'", "obj": "Oculomotor emergence", "hint": "Between the cerebral peduncles = interpeduncular fossa."}, {"q": "The oculomotor nerve splits into superior and inferior divisions and enters the orbit through which opening?", "o": ["The optic canal", "The inferior orbital fissure", "The foramen rotundum", "The superior orbital fissure"], "c": 3, "cat": "CN III — Oculomotor", "r": ["The optic canal transmits CN II, not CN III.", "The inferior orbital fissure is not the oculomotor route.", "Foramen rotundum transmits V2 (maxillary), not CN III.", "Correct. CN III divides into superior and inferior divisions and enters the orbit via the superior orbital fissure."], "source": "L28 · CN III foramen", "quote": "[Maini] 'Oculomotor divides into superior and inferior divisions... enters the orbit through superior orbital fissure.'", "obj": "Oculomotor foramen", "hint": "Superior orbital fissure - with IV, V1, VI."}, {"q": "Which set of EXTRINSIC (extraocular) eye muscles does Maini say the oculomotor nerve supplies?", "o": ["All four recti and both obliques", "Lateral rectus and superior oblique", "Superior rectus, inferior rectus, medial rectus, inferior oblique, and levator palpebrae superioris", "Only the two obliques"], "c": 2, "cat": "CN III — Oculomotor", "r": ["It does NOT supply lateral rectus (CN VI) or superior oblique (CN IV), so all recti and both obliques is wrong.", "Lateral rectus (VI) and superior oblique (IV) are precisely the ones CN III does NOT supply.", "Correct. CN III supplies SR, IR, MR, inferior oblique, and levator palpebrae superioris - the five muscles Maini names.", "CN III supplies inferior oblique but NOT superior oblique, so only the obliques is wrong."], "source": "L28 · CN III muscles", "quote": "[Maini] 'Superior rectus, inferior rectus, inferior oblique... and levator palpebrae superioris. Do not forget this muscle.'", "obj": "Oculomotor extraocular muscles", "hint": "All eye muscles except LR (VI) and SO (IV) - plus LPS."}, {"q": "Which two eye muscles does Maini explicitly exclude from oculomotor innervation?", "o": ["Medial rectus and inferior oblique", "Superior rectus and levator palpebrae superioris", "Inferior rectus and medial rectus", "Lateral rectus and superior oblique"], "c": 3, "cat": "CN III — Oculomotor", "r": ["Medial rectus and inferior oblique ARE supplied by CN III.", "Superior rectus and levator palpebrae superioris ARE supplied by CN III.", "Inferior rectus and medial rectus ARE supplied by CN III.", "Correct. Lateral rectus (CN VI) and superior oblique (CN IV) are the two muscles NOT supplied by CN III."], "source": "L28 · CN III muscles", "quote": "[Maini] 'Not lateral rectus... your superior oblique is still functioning.'", "obj": "Muscles NOT supplied by CN III", "hint": "LR6 SO4 - the classic exceptions."}, {"q": "Which INTRINSIC (intraocular) muscles does the oculomotor nerve supply via its parasympathetic component?", "o": ["The dilator pupillae and the ciliary muscle", "The ciliary muscle and the sphincter (constrictor) pupillae", "The sphincter pupillae and the dilator pupillae", "The superior tarsal (Muller's) muscle and the ciliary muscle"], "c": 1, "cat": "CN III — Oculomotor", "r": ["The dilator pupillae is sympathetic, not oculomotor.", "Correct. CN III's parasympathetic fibres supply the ciliary muscle and the sphincter/constrictor pupillae.", "The dilator pupillae is sympathetic; only the sphincter is oculomotor.", "The superior tarsal muscle is sympathetic (its loss causes Horner ptosis), not oculomotor."], "source": "L28 · CN III intrinsic muscles", "quote": "[Maini] 'Ciliary and constrictor pupillae.'", "obj": "Oculomotor intraocular muscles", "hint": "Parasympathetic = constrict pupil + focus lens."}, {"q": "In a complete oculomotor (third nerve) palsy, in which direction is the eyeball deviated, and why?", "o": ["Up and in, because the superior rectus overacts", "Down and out, because superior oblique (CN IV) and lateral rectus (CN VI) remain intact", "Straight but fixed, because all muscles are paralysed", "Medially, because medial rectus is spared"], "c": 1, "cat": "CN III — Oculomotor", "r": ["There is no up-and-in deviation; the unopposed muscles pull down and out.", "Correct. With CN III muscles paralysed, the surviving superior oblique (down/out) and lateral rectus (out) pull the eye down and out.", "Not all muscles are paralysed - SO and LR survive and produce the deviation.", "Medial rectus is supplied by CN III and is paralysed, so the eye is NOT pulled medially."], "source": "L28 · CN III palsy", "quote": "[Maini] 'Eyeball will be deviated inferiorly and laterally... your lateral rectus is still intact, your superior oblique is still functioning.'", "obj": "Third nerve palsy - gaze", "hint": "Survivors SO+LR -> down and out."}, {"q": "Besides the down-and-out eye, which lid sign appears in third nerve palsy, and which muscle causes it?", "o": ["Ptosis, from paralysis of levator palpebrae superioris", "Lid retraction, from overaction of levator palpebrae superioris", "Ptosis, from paralysis of orbicularis oculi", "Lid lag, from paralysis of superior oblique"], "c": 0, "cat": "CN III — Oculomotor", "r": ["Correct. Loss of the levator palpebrae superioris (CN III) causes ptosis (drooping upper lid).", "CN III palsy causes drooping (ptosis), not retraction; the levator is paralysed, not overacting.", "Orbicularis oculi (CN VII) closes the eye; its loss does not cause the ptosis of CN III palsy.", "Superior oblique is CN IV and moves the globe, not the lid."], "source": "L28 · CN III palsy", "quote": "[Maini] 'Levator palpebrae superioris is not functioning, so ptosis.'", "obj": "Third nerve palsy - ptosis", "hint": "Levator down -> lid drops."}, {"q": "What happens to the pupil in third nerve palsy, and what is the correct term for that change?", "o": ["The pupil dilates - mydriasis", "The pupil constricts - miosis", "The pupil is unreactive but normal size", "The pupil becomes irregular - anisocoria only"], "c": 0, "cat": "CN III — Oculomotor", "r": ["Correct. Losing the parasympathetic sphincter pupillae leaves the pupil dilated - mydriasis.", "Constriction (miosis) is the Horner-syndrome finding, the opposite of CN III palsy.", "The pupil is not merely unreactive at normal size; it is dilated.", "Anisocoria only does not capture the specific dilation (mydriasis) she names."], "source": "L28 · CN III palsy", "quote": "[Maini] 'Pupillary dilation. What do you call pupillary dilation? Mydriasis.'", "obj": "Third nerve palsy - pupil", "hint": "Sphincter gone -> dilated -> mydriasis."}, {"q": "Why is the accommodation reflex lost in third nerve palsy, per Maini?", "o": ["The lateral rectus is paralysed, preventing convergence", "The optic nerve is damaged, so no light reaches the retina", "The ciliary muscle is paralysed, so the lens cannot become more convex", "The superior oblique cannot depress the eye"], "c": 2, "cat": "CN III — Oculomotor", "r": ["Convergence uses the medial rectus (CN III), not the lateral rectus; and the block is the ciliary muscle for the lens.", "Accommodation loss here is efferent (ciliary muscle), not from an optic-nerve/afferent problem.", "Correct. Paralysis of the ciliary muscle abolishes the lens-thickening needed for near focus, so accommodation is lost.", "Superior oblique is CN IV and is spared; it is not the reason accommodation fails."], "source": "L28 · CN III palsy", "quote": "[Maini] 'Loss of accommodation reflex due to paralysis of ciliary muscle.'", "obj": "Third nerve palsy - accommodation", "hint": "No ciliary pull -> lens stays flat."}, {"q": "If the right oculomotor nerve is lost, what does Maini predict for the light reflexes?", "o": ["Loss of both direct and consensual reflexes in both eyes", "Loss of the consensual reflex only, direct preserved", "No DIRECT reflex in the right eye, but the CONSENSUAL reflex in the left eye is intact", "The reflexes are entirely unaffected"], "c": 2, "cat": "CN III — Oculomotor", "r": ["The consensual reflex in the other eye is intact because its CN III is normal, so both lost in both eyes is wrong.", "The direct reflex on the affected side is lost, and the consensual on the healthy side is preserved - not the reverse.", "Correct. The right eye cannot constrict (no direct response), but the left eye's CN III still works, so shining light in the right eye still constricts the left (consensual/indirect) pupil.", "The reflexes are affected: the direct reflex of the damaged eye is lost."], "source": "L28 · CN III palsy", "quote": "[Maini] 'No direct light reflex, but there will be indirect light reflex, because third nerve of the left eye is still functioning.'", "obj": "Third nerve palsy - light reflex", "hint": "Efferent limb (III) of the bad eye fails; the good eye's III still fires."}, {"q": "During the accommodation (near) reflex, which of these does Maini list as the convergence component, and by which muscle/nerve?", "o": ["Convergence by the medial rectus (oculomotor, CN III)", "Convergence by the lateral rectus (abducens, CN VI)", "Convergence by the superior oblique (trochlear, CN IV)", "Convergence by the ciliary muscle"], "c": 0, "cat": "CN III — Oculomotor", "r": ["Correct. Convergence is produced by the medial rectus, an oculomotor (CN III) muscle.", "The lateral rectus (CN VI) abducts the eye - the opposite of convergence.", "Superior oblique (CN IV) does not produce convergence.", "The ciliary muscle handles lens thickening, not convergence of the eyes."], "source": "L28 · CN III accommodation", "quote": "[Maini] 'There is convergence. Convergence is medial rectus, third nerve.'", "obj": "Accommodation reflex components", "hint": "Eyes cross in = medial recti = CN III."}, {"q": "In accommodation, what happens to the lens and by which muscle, per Maini?", "o": ["The ciliary muscle contracts and the lens becomes more convex", "The dilator pupillae contracts and the lens flattens", "The ciliary muscle relaxes and the lens flattens", "The sphincter pupillae contracts and the lens thins"], "c": 0, "cat": "CN III — Oculomotor", "r": ["Correct. Ciliary muscle contraction lets the lens become more convex (rounder) for near focus.", "The dilator pupillae is sympathetic and unrelated to lens shape; the lens rounds, not flattens.", "Ciliary contraction (not relaxation) rounds the lens for near vision.", "The sphincter constricts the pupil; it does not thin the lens - the lens becomes more convex."], "source": "L28 · CN III accommodation", "quote": "[Maini] 'Ciliary muscle contracts, lens becomes more convex.'", "obj": "Accommodation - lens", "hint": "Ciliary contracts -> zonules slacken -> lens fattens."}, {"q": "Which statement about the strabismus (squint) of third nerve palsy is correct per Maini?", "o": ["There is no squint, because CN III does not move the globe", "There is squint, because the extraocular muscles are affected; the deviated eye points down and out", "There is squint upward and inward", "Squint occurs but the eye points straight ahead"], "c": 1, "cat": "CN III — Oculomotor", "r": ["CN III does move the globe (SR, IR, MR, IO), so its palsy does cause squint.", "Correct. CN III palsy produces strabismus with the affected eye deviated down and out (surviving SO and LR).", "The deviation is down and out, not up and in.", "A squint by definition means the eye is deviated, not straight ahead."], "source": "L28 · CN III palsy", "quote": "[Maini] 'Of course there will be deviation, there is strabismus... squint means squint.'", "obj": "Third nerve palsy - strabismus", "hint": "Squint = down-and-out eye."}, {"q": "Maini calls the pupil the best thing to look at to separate Horner syndrome from third nerve palsy. What pupil finding indicates HORNER syndrome?", "o": ["Miosis (pupillary constriction)", "Mydriasis (pupillary dilation)", "A fixed, mid-position pupil", "An irregular, keyhole pupil"], "c": 0, "cat": "Horner vs CN III (No-Sympathetic Trap)", "r": ["Correct. Horner syndrome shows miosis - sympathetic failure leaves the dilator pupillae unopposed, so the pupil is constricted.", "Mydriasis (dilation) is the third-nerve-palsy finding, the opposite of Horner.", "Horner gives a specifically constricted (miotic) pupil, not merely a fixed mid-position one.", "A keyhole/irregular pupil is not the Horner sign she describes; it is miosis."], "source": "L28 · Horner vs CN III", "quote": "[Maini] 'If it is miosis, Horner syndrome. If it is mydriasis, third nerve palsy.'", "obj": "Horner pupil", "hint": "Sympathetic out -> dilator fails -> small pupil."}, {"q": "Which pupil finding points to THIRD NERVE PALSY rather than Horner syndrome?", "o": ["Miosis (pupillary constriction)", "Anhidrosis of the pupil", "Mydriasis (pupillary dilation)", "A normally reactive pupil"], "c": 2, "cat": "Horner vs CN III (No-Sympathetic Trap)", "r": ["Miosis is the Horner finding, not third nerve palsy.", "Anhidrosis of the pupil is not a thing; anhidrosis is a sweat sign of Horner, and the pupil is not sweat tissue.", "Correct. Third nerve palsy gives mydriasis - loss of the parasympathetic sphincter leaves the pupil dilated.", "The pupil is not normally reactive in a third nerve palsy; it is dilated and poorly reactive."], "source": "L28 · Horner vs CN III", "quote": "[Maini] 'Third nerve palsy? There is going to be pupillary dilation.'", "obj": "Third nerve palsy pupil", "hint": "Parasympathetic out -> sphincter fails -> big pupil."}, {"q": "Maini notes that ONE sign is shared by both Horner syndrome and third nerve palsy. Which is it?", "o": ["Mydriasis", "Strabismus", "Anhidrosis", "Ptosis (drooping upper eyelid)"], "c": 3, "cat": "Horner vs CN III (No-Sympathetic Trap)", "r": ["Mydriasis is specific to third nerve palsy, not shared.", "Strabismus occurs in third nerve palsy but not in Horner, so it is not shared.", "Anhidrosis is a Horner feature, not shared with third nerve palsy.", "Correct. Both conditions show ptosis - mild in Horner (superior tarsal muscle) and more marked in third nerve palsy (levator palpebrae superioris)."], "source": "L28 · Horner vs CN III", "quote": "[Maini] 'Only one symptom is same, that is ptosis.'", "obj": "Shared sign", "hint": "Both droop the lid - for different muscle reasons."}, {"q": "THE KEY TRAP: why is there NO squint (strabismus) in Horner syndrome, per Maini?", "o": ["Because the optic nerve is intact in Horner syndrome", "Because Horner spares the levator palpebrae superioris", "Because sympathetic fibres do not innervate any of the extraocular muscles", "Because the medial rectus compensates"], "c": 2, "cat": "Horner vs CN III (No-Sympathetic Trap)", "r": ["An intact optic nerve is about vision input, not eye alignment; the reason is the sympathetic supply pattern.", "Horner actually causes mild ptosis via the superior tarsal muscle; that does not explain the absence of squint.", "Correct. Sympathetic fibres supply no extraocular muscle, so a sympathetic lesion (Horner) cannot misalign the globe - hence no squint.", "There is no misalignment to compensate - the real reason is sympathetic fibres never move the eye muscles."], "source": "L28 · Horner vs CN III (no-sympathetic trap)", "quote": "[Maini] 'Squint is not found in Horner syndrome... because sympathetic fibers do not innervate any of the extraocular muscles.'", "obj": "No-sympathetic trap", "hint": "Sympathetic is not an eye-mover -> no squint in Horner."}, {"q": "Maini explains the Horner miosis mechanistically: which muscle loses its innervation, and from which system?", "o": ["The sphincter pupillae, which is parasympathetic", "The dilator pupillae, which is sympathetic", "The ciliary muscle, which is parasympathetic", "The medial rectus, which is somatic"], "c": 1, "cat": "Horner vs CN III (No-Sympathetic Trap)", "r": ["The sphincter pupillae (parasympathetic) is the muscle lost in third nerve palsy, not Horner.", "Correct. Horner is a sympathetic failure, so the dilator pupillae is denervated and the pupil constricts (miosis).", "The ciliary muscle is parasympathetic and relates to accommodation, not the Horner miosis.", "The medial rectus is a somatic CN III muscle, unrelated to pupil size in Horner."], "source": "L28 · Horner mechanism", "quote": "[Maini] 'There is miosis in Horner syndrome, because that is sympathetic failure, and sympathetic supplies dilator pupillae.'", "obj": "Horner mechanism", "hint": "Sympathetic dilator fails -> miosis."}, {"q": "Which additional features does Maini attribute to Horner syndrome (beyond miosis and mild ptosis)?", "o": ["Mydriasis and squint", "A down-and-out eye and loss of accommodation", "Anhidrosis and flushing of the face", "Total blindness in the affected eye"], "c": 2, "cat": "Horner vs CN III (No-Sympathetic Trap)", "r": ["Mydriasis and squint are third-nerve-palsy features, not Horner.", "The down-and-out eye and lost accommodation are CN III palsy findings, not Horner.", "Correct. Horner includes anhidrosis (loss of sweating) and flushing of the face on the affected side.", "Horner does not cause blindness; vision input (CN II) is unaffected."], "source": "L28 · Horner features", "quote": "[Maini] 'There is anhidrosis, there is flushing of the face...'", "obj": "Horner extra features", "hint": "Sympathetic loss to face -> dry, flushed skin."}, {"q": "A patient has ptosis and a small (constricted) pupil, no squint, with facial anhidrosis. Which diagnosis fits Maini's framework?", "o": ["Third nerve palsy", "Bitemporal hemianopia", "Bell's palsy", "Horner syndrome"], "c": 3, "cat": "Horner vs CN III (No-Sympathetic Trap)", "r": ["Third nerve palsy would show a DILATED pupil, squint, and a down-and-out eye - not this picture.", "Bitemporal hemianopia is a chiasmal visual-field defect, not a pupil/lid/sweat syndrome.", "Bell's palsy is a facial (VII) motor palsy, not a pupil-and-sweat syndrome.", "Correct. Miosis + mild ptosis + no squint + anhidrosis is the classic sympathetic-failure picture of Horner syndrome."], "source": "L28 · Horner vs CN III", "quote": "[Maini] 'If it is miosis, Horner syndrome.'", "obj": "Applying the pupil rule", "hint": "Small pupil + dry face + no squint = Horner."}, {"q": "A patient has ptosis, a dilated pupil, a down-and-out eye, and squint. Which diagnosis fits, and what is the single best distinguishing sign?", "o": ["Horner syndrome; the constricted pupil is the best sign", "Third nerve palsy; the anhidrosis is the best sign", "Horner syndrome; the squint is the best sign", "Third nerve palsy; the dilated pupil (mydriasis) is the best distinguishing sign"], "c": 3, "cat": "Horner vs CN III (No-Sympathetic Trap)", "r": ["This picture (dilated pupil, squint) is third nerve palsy, not Horner.", "Anhidrosis is a Horner feature; the best distinguisher here is the dilated pupil.", "Squint does not occur in Horner; this is third nerve palsy, distinguished best by the dilated pupil.", "Correct. Mydriasis + ptosis + down-and-out eye + squint is third nerve palsy, and Maini says the pupil (dilated) is the best single distinguisher."], "source": "L28 · Horner vs CN III", "quote": "[Maini] 'Pupil is the best thing to look at.'", "obj": "Applying the pupil rule", "hint": "Big pupil + squint + down-and-out = CN III palsy."}, {"q": "How many prevertebral muscles does Maini say to know for origin, insertion, action, and nerve supply?", "o": ["Three", "Four", "Five", "Six"], "c": 1, "cat": "Prevertebral Muscles", "r": ["There are four, not three (three would omit one of the recti or longus muscles).", "Correct. She lists four prevertebral muscles: longus capitis, longus colli, rectus capitis anterior, and rectus capitis lateralis.", "Five is too many for her prevertebral list.", "Six is too many; the prevertebral group she teaches is four."], "source": "L28 · Prevertebral muscles", "quote": "[Maini] 'There are 4 muscles we are going to talk about. Longus capitis...'", "obj": "Prevertebral muscle count", "hint": "Two longus + two rectus capitis = four."}, {"q": "Longus capitis attaches SUPERIORLY to which structure, per Maini?", "o": ["The inferior surface of the basilar part of the occipital bone", "The jugular process of the occipital bone", "The anterior tubercle of the atlas", "The body of the axis"], "c": 0, "cat": "Prevertebral Muscles", "r": ["Correct. Longus capitis attaches superiorly to the inferior surface of the basilar part of the occipital bone.", "The jugular process is the superior attachment of rectus capitis lateralis, not longus capitis.", "The anterior tubercle of the atlas is a longus colli (superior oblique) insertion, not longus capitis.", "Longus capitis does not attach to the body of the axis."], "source": "L28 · Longus capitis", "quote": "[Maini] 'Superiorly, longus capitis is attached to the inferior surface of basilar portion of occipital bone.'", "obj": "Longus capitis attachments", "hint": "Capitis -> reaches the head (basilar occiput)."}, {"q": "Longus capitis attaches INFERIORLY to the anterior tubercles of the transverse processes of which vertebrae?", "o": ["C1, C2, C3", "C5, C6, C7", "C3, C4, C5, C6", "T1, T2, T3"], "c": 2, "cat": "Prevertebral Muscles", "r": ["C1-C3 is not the longus capitis inferior attachment.", "C5-C7 relates to the longus colli inferior oblique insertion, not longus capitis.", "Correct. Its inferior attachment is the anterior tubercles of the transverse processes of C3-C6.", "T1-T3 bodies relate to the longus colli, not longus capitis."], "source": "L28 · Longus capitis", "quote": "[Maini] 'Inferiorly, the muscle is attached to the anterior tubercles of the transverse processes of 3,4,5,6 cervical vertebrae.'", "obj": "Longus capitis attachments", "hint": "Anterior tubercles C3-C6."}, {"q": "What is the nerve supply of longus capitis, per Maini?", "o": ["Branches of the ventral rami of C1, C2", "Branches of the ventral rami of C2-C6", "The cervical sympathetic trunk", "Branches of the ventral rami of C1, C2, C3"], "c": 3, "cat": "Prevertebral Muscles", "r": ["C1-C2 supplies the two recti (anterior and lateralis), not longus capitis.", "C2-C6 supplies longus colli, not longus capitis.", "The prevertebral muscles are supplied by ventral rami (somatic), not by the sympathetic trunk.", "Correct. Longus capitis is innervated by branches of the ventral rami of C1-C3."], "source": "L28 · Longus capitis", "quote": "[Maini] 'Innervated by the branches of the ventral rami of C1, C2, C3.'", "obj": "Longus capitis innervation", "hint": "C1-C3 ventral rami."}, {"q": "Longus colli has three parts. Which set does Maini name?", "o": ["Anterior, middle, and posterior", "Ascending, transverse, and descending", "Deep, superficial, and intermediate", "Superior oblique, vertical (intermediate), and inferior oblique"], "c": 3, "cat": "Prevertebral Muscles", "r": ["Anterior/middle/posterior is not how she divides longus colli.", "Ascending/transverse/descending is not her terminology for this muscle.", "Deep/superficial/intermediate is not the three-part scheme she gives.", "Correct. The three parts are the superior oblique, the vertical (intermediate), and the inferior oblique."], "source": "L28 · Longus colli", "quote": "[Maini] 'There is a superior oblique part, inferior oblique, and then there is a vertical part.'", "obj": "Longus colli parts", "hint": "Two obliques + one vertical."}, {"q": "The INFERIOR OBLIQUE part of longus colli runs between which attachments, per Maini?", "o": ["From the bodies of T1-T3 to the anterior tubercles of the transverse processes of C5-C7", "From the anterior tubercles of C3-C5 to the anterior tubercle of the atlas", "From the bodies of C5-T3 to the bodies of C2-C4", "From the atlas to the occipital bone"], "c": 0, "cat": "Prevertebral Muscles", "r": ["Correct. The inferior oblique arises from the bodies of T1-T3 and inserts onto the anterior tubercles of the transverse processes of C5-C7 (body to transverse process).", "That body-to-anterior-tubercle-of-atlas course is the SUPERIOR oblique, not the inferior oblique.", "Body-to-body (C5-T3 to C2-C4) is the VERTICAL part, not the inferior oblique.", "Atlas-to-occiput describes rectus capitis anterior, not longus colli."], "source": "L28 · Longus colli", "quote": "[Maini] 'Inferior oblique arises from anterior aspect of bodies of T1, T2, T3... inserts into the anterior tubercles of transverse processes of C5, C6, C7.'", "obj": "Longus colli inferior oblique", "hint": "Bodies (T1-T3) -> transverse processes (C5-C7)."}, {"q": "The SUPERIOR OBLIQUE part of longus colli runs between which attachments?", "o": ["From the bodies of T1-T3 to the transverse processes of C5-C7", "From the bodies of C5-T3 to the bodies of C2-C4", "From the anterior tubercles of the transverse processes of C3-C5 to the anterior tubercle of the atlas", "From the basilar occiput to the transverse processes of C3-C6"], "c": 2, "cat": "Prevertebral Muscles", "r": ["Body (T1-T3) to transverse process (C5-C7) is the INFERIOR oblique.", "Body-to-body is the VERTICAL part.", "Correct. The superior oblique arises from the anterior tubercles of the transverse processes of C3-C5 and inserts onto the anterior tubercle of the atlas (transverse process to body-equivalent).", "Basilar occiput to C3-C6 is longus capitis, not longus colli superior oblique."], "source": "L28 · Longus colli", "quote": "[Maini] 'Superior oblique arises from the anterior tubercles of transverse processes of C3, C4, C5... inserted onto the anterior tubercle of the atlas.'", "obj": "Longus colli superior oblique", "hint": "Transverse processes (C3-C5) -> atlas (body-equivalent)."}, {"q": "The VERTICAL (intermediate) part of longus colli connects which attachments - the bodies-to-bodies part?", "o": ["From the bodies of C5-C7 and T1-T3 to the bodies of C2-C4", "From the transverse processes of C3-C5 to the atlas", "From the T1-T3 bodies to the C5-C7 transverse processes", "From the atlas to the jugular process"], "c": 0, "cat": "Prevertebral Muscles", "r": ["Correct. The vertical part runs body-to-body: from the bodies of C5-C7 and T1-T3 up to the bodies of C2-C4.", "Transverse-process-to-atlas is the superior oblique course, not the vertical part.", "T1-T3 bodies to C5-C7 transverse processes is the inferior oblique.", "Atlas-to-jugular-process describes rectus capitis lateralis, not longus colli."], "source": "L28 · Longus colli", "quote": "[Maini] 'The vertical part... bodies to bodies. It arises from bodies of C5,6,7, T1,2,3, and inserts into the bodies of 2,3,4.'", "obj": "Longus colli vertical part", "hint": "Bodies (C5-T3) -> bodies (C2-C4)."}, {"q": "What are the actions of longus colli, per Maini?", "o": ["Extends the neck and rotates the head to the same side", "Elevates the first rib and flexes the head", "Flexes the neck; the oblique parts add ipsilateral lateral flexion, and the inferior oblique rotates the neck to the opposite side", "Purely rotates the head, with no flexion"], "c": 2, "cat": "Prevertebral Muscles", "r": ["Longus colli flexes (not extends) the neck; the rotation is to the opposite side.", "It flexes the neck, not elevates a rib; rib elevation is a scalene action.", "Correct. Longus colli flexes the neck; the oblique portions cause ipsilateral lateral flexion, and the inferior oblique rotates the neck contralaterally.", "It does flex the neck, so purely rotates, no flexion is wrong."], "source": "L28 · Longus colli", "quote": "[Maini] 'Flexes the neck. Oblique portion causes lateral flexion ipsilaterally, and inferior oblique rotates the neck to the opposite side.'", "obj": "Longus colli actions", "hint": "Flex + ipsilateral side-bend + contralateral rotate."}, {"q": "Rectus capitis ANTERIOR attaches SUPERIORLY to which part of the occipital bone?", "o": ["The jugular process of the occipital bone", "The basilar part of the occipital bone, anterior to the occipital condyle", "The external occipital protuberance", "The superior nuchal line"], "c": 1, "cat": "Prevertebral Muscles", "r": ["The jugular process is the superior attachment of rectus capitis LATERALIS, not anterior.", "Correct. Rectus capitis anterior attaches to the basilar part of the occipital bone, just anterior to the occipital condyle.", "The external occipital protuberance is an investing-fascia/nuchal attachment, not this muscle.", "The superior nuchal line is not the rectus capitis anterior attachment."], "source": "L28 · Rectus capitis anterior", "quote": "[Maini] 'Rectus capitis anterior... superiorly attached to basilar portion of the occipital bone, anterior to occipital condyle.'", "obj": "Rectus capitis anterior", "hint": "Anterior -> basilar part."}, {"q": "Rectus capitis anterior attaches INFERIORLY to which structure?", "o": ["The anterior tubercle of the atlas only", "The anterior aspect of the lateral mass of the atlas and the root of its transverse process", "The body of the axis", "The transverse process of C6"], "c": 1, "cat": "Prevertebral Muscles", "r": ["It attaches to the lateral mass/root of transverse process, described more fully than anterior tubercle only.", "Correct. Its inferior attachment is the anterior aspect of the lateral mass of the atlas and the root of its transverse process.", "It does not attach to the body of the axis.", "The C6 transverse process is not the rectus capitis anterior attachment."], "source": "L28 · Rectus capitis anterior", "quote": "[Maini] 'Inferiorly attached to anterior aspect of lateral mass of atlas, and root of its transverse process.'", "obj": "Rectus capitis anterior", "hint": "Atlas lateral mass -> basilar occiput."}, {"q": "Rectus capitis LATERALIS attaches SUPERIORLY to which part of the occipital bone - the key contrast with rectus capitis anterior?", "o": ["The basilar part of the occipital bone", "The jugular process of the occipital bone", "The occipital condyle", "The foramen magnum rim"], "c": 1, "cat": "Prevertebral Muscles", "r": ["The basilar part is the attachment of rectus capitis ANTERIOR, not lateralis.", "Correct. Rectus capitis lateralis attaches to the JUGULAR process (whereas the anterior one attaches to the basilar part).", "The occipital condyle is a reference landmark, not the lateralis attachment.", "The foramen magnum rim is not the lateralis attachment she gives."], "source": "L28 · Rectus capitis lateralis", "quote": "[Maini] 'Anterior is attached to basilar process. Lateralis is attached to jugular process.'", "obj": "Anterior vs lateralis", "hint": "Lateralis -> Jugular process."}, {"q": "Rectus capitis lateralis attaches INFERIORLY to which structure, and what is its action?", "o": ["The body of the atlas; it flexes the head", "The transverse process of C7; it rotates the head", "The basilar occiput; it extends the head", "The upper surface of the transverse process of the atlas; it produces lateral flexion (bends the head to the same side)"], "c": 3, "cat": "Prevertebral Muscles", "r": ["Its inferior attachment is the transverse process (not body) of the atlas, and its action is lateral flexion, not pure flexion.", "It attaches at the atlas, not C7, and its action is lateral flexion, not rotation.", "Its lower attachment is the atlas transverse process and it laterally flexes, not extends.", "Correct. It attaches to the upper surface of the atlas transverse process and produces ipsilateral lateral flexion of the head."], "source": "L28 · Rectus capitis lateralis", "quote": "[Maini] 'Attached to upper surface of transverse process of atlas... bends the head to the same side, so ipsilateral. Lateral flexion.'", "obj": "Rectus capitis lateralis", "hint": "Atlas TP -> jugular process; side-bends the head."}, {"q": "How many ganglia make up the cervical portion of the sympathetic trunk, per Maini?", "o": ["Two - superior and inferior only", "Four - including a separate stellate ganglion", "Three - superior, middle, and inferior cervical ganglia", "One continuous ganglion"], "c": 2, "cat": "Cervical Sympathetic Trunk", "r": ["There are three, not two; the middle ganglion is included.", "There are three named cervical ganglia; the stellate is the inferior fused with T1, not a separate fourth cervical ganglion.", "Correct. There are three cervical ganglia: superior, middle, and inferior.", "The cervical trunk has three discrete ganglia, not one continuous mass."], "source": "L28 · Cervical ganglia", "quote": "[Maini] 'Superior cervical ganglion, middle cervical ganglion, and inferior cervical ganglion. Three of them.'", "obj": "Cervical ganglia count", "hint": "Superior, middle, inferior = three."}, {"q": "What type of neuron cell bodies do the cervical sympathetic ganglia contain, per Maini?", "o": ["Postganglionic sympathetic neurons", "Preganglionic sympathetic neurons", "Postganglionic parasympathetic neurons", "Sensory (pseudounipolar) neurons"], "c": 0, "cat": "Cervical Sympathetic Trunk", "r": ["Correct. The ganglia hold postganglionic sympathetic neuron cell bodies (the preganglionic fibres ascend to synapse there).", "The preganglionic cell bodies lie in the spinal cord lateral horn (T1-T2), not in these ganglia.", "These are sympathetic, not parasympathetic, ganglia.", "They are autonomic motor ganglia, not sensory ganglia."], "source": "L28 · Cervical ganglia", "quote": "[Maini] 'Postganglionic sympathetic neurons... these are the simple questions on your board exam.'", "obj": "Ganglion cell type", "hint": "Chain ganglia = postganglionic sympathetic bodies."}, {"q": "The preganglionic fibres that ascend to end in the cervical ganglia originate from which spinal cord levels, per Maini?", "o": ["The lateral horn of T1-T2", "The lateral horn of C1-C4", "The sacral segments S2-S4", "The lumbar segments L1-L2"], "c": 0, "cat": "Cervical Sympathetic Trunk", "r": ["Correct. She says the fibres come from the lateral horn of T1-T2 and ascend within the sympathetic chain.", "C1-C4 are where gray rami are DISTRIBUTED (from the superior ganglion), not the origin of the preganglionic fibres.", "S2-S4 is the parasympathetic sacral outflow, not the sympathetic origin.", "The cervical sympathetic preganglionics arise at T1-T2, not L1-L2."], "source": "L28 · Cervical sympathetic origin", "quote": "[Maini] 'From T1, T2, lateral horn of T1, T2 spinal segments, fibers ascend within the sympathetic chain.'", "obj": "Preganglionic origin", "hint": "No cervical lateral horn - climb up from T1-T2."}, {"q": "Maini describes the extent of the cervical sympathetic trunk as running between which two points?", "o": ["From the first rib to the diaphragm", "From the atlas to the hyoid bone", "From the jugular foramen to the carotid canal", "From the neck of the first rib to the base of the skull"], "c": 3, "cat": "Cervical Sympathetic Trunk", "r": ["It does not run down to the diaphragm; that is the thoracic/abdominal extent.", "Atlas-to-hyoid is not the extent she gives.", "Jugular-foramen-to-carotid-canal is not her description of the trunk's extent.", "Correct. The cervical sympathetic trunk extends from the neck of the first rib up to the base of the skull."], "source": "L28 · Cervical sympathetic extent", "quote": "[Maini] 'It extends from the neck of the first rib to the base of the skull.'", "obj": "Trunk extent", "hint": "First rib -> skull base."}, {"q": "What is the relationship of the cervical sympathetic chain to the carotid arteries, and its clinical consequence per Maini?", "o": ["It lies posterior to the common and internal carotid arteries, so a carotid aneurysm can compress the ganglia", "It lies anterior to the carotids, so it is easily palpated", "It runs inside the carotid sheath with the vagus", "It lies medial to the trachea"], "c": 0, "cat": "Cervical Sympathetic Trunk", "r": ["Correct. The chain lies behind (posterior to) the common and internal carotid arteries; an aneurysmal dilatation of these arteries can compress it.", "It lies posterior, not anterior, to the carotids.", "It is embedded in fascia between the carotid sheath and prevertebral fascia - not inside the sheath.", "It is not medial to the trachea; it is behind the carotids."], "source": "L28 · Cervical sympathetic relations", "quote": "[Maini] 'It lies behind the internal and common carotid arteries... if there is an aneurysmal dilatation, these ganglia may get compressed.'", "obj": "Sympathetic chain relations", "hint": "Behind the carotids - vulnerable to aneurysm."}, {"q": "Between which two fascial layers is the cervical sympathetic chain embedded, per Maini - with the vagus as its medial relation?", "o": ["Between the investing and pretracheal fascia", "Between the carotid sheath and the prevertebral fascia", "Between the pretracheal fascia and the trachea", "Within the pretracheal fascia around the thyroid"], "c": 1, "cat": "Cervical Sympathetic Trunk", "r": ["It is not between the investing and pretracheal layers.", "Correct. It is embedded in deep fascia between the carotid sheath and the prevertebral fascia, with the vagus nerve medial.", "It is not between the pretracheal fascia and the trachea.", "It is not within the pretracheal fascia (which encloses the thyroid)."], "source": "L28 · Cervical sympathetic relations", "quote": "[Maini] 'It is embedded in the deep fascia between carotid sheath and prevertebral fascia.'", "obj": "Sympathetic chain fascial bed", "hint": "Sandwiched: carotid sheath and prevertebral fascia."}, {"q": "Maini emphasizes a high-yield fact: about 99% of head and neck structures receive their postganglionic sympathetic fibres from which ganglion?", "o": ["The middle cervical ganglion", "The superior cervical ganglion", "The inferior (stellate) ganglion", "The T1 thoracic ganglion"], "c": 1, "cat": "Cervical Sympathetic Trunk", "r": ["The middle cervical ganglion supplies a limited territory, not about 99% of the head and neck.", "Correct. Nearly all head and neck structures get their postganglionic sympathetic supply from the superior cervical ganglion.", "The stellate/inferior ganglion mainly supplies the upper limb and thoracic territory, not most of the head and neck.", "The T1 ganglion is not the source of most head and neck sympathetic supply."], "source": "L28 · Superior cervical ganglion", "quote": "[Maini] 'Most, 99% of the structures of head and neck region get their postganglionic sympathetic fibers from superior cervical ganglion only.'", "obj": "SCG dominance", "hint": "Head/neck sympathetic is the superior cervical ganglion."}, {"q": "The superior cervical ganglion supplies gray rami communicantes to which spinal nerves, per Maini?", "o": ["C5 and C6", "C7 and C8", "C1 to C4", "T1 to T4"], "c": 2, "cat": "Cervical Sympathetic Trunk", "r": ["C5-C6 gray rami come from the MIDDLE cervical ganglion.", "C7-C8 gray rami come from the INFERIOR cervical ganglion.", "Correct. The superior cervical ganglion gives gray rami to C1-C4.", "T1-T4 relate to thoracic sympathetic contributions, not the superior cervical ganglion's gray rami."], "source": "L28 · Gray rami distribution", "quote": "[Maini] 'Gray rami communicantes to C1 to C4 spinal nerves are contributed by superior cervical ganglion.'", "obj": "Gray rami - superior ganglion", "hint": "Superior -> C1-C4."}, {"q": "Which ganglia supply gray rami to C5-C6 and to C7-C8, respectively?", "o": ["Superior (C5-C6) and middle (C7-C8)", "Inferior (C5-C6) and superior (C7-C8)", "Middle (C5-C6) and superior (C7-C8)", "Middle cervical ganglion (C5-C6) and inferior cervical ganglion (C7-C8)"], "c": 3, "cat": "Cervical Sympathetic Trunk", "r": ["The superior ganglion supplies C1-C4, not C5-C6.", "This reverses the correct assignment.", "The superior ganglion does not supply C7-C8; that is the inferior ganglion.", "Correct. Middle cervical ganglion -> C5-C6; inferior cervical ganglion -> C7-C8."], "source": "L28 · Gray rami distribution", "quote": "[Maini] 'C5, C6, middle; C7, C8, inferior cervical ganglion.'", "obj": "Gray rami - middle & inferior", "hint": "Middle=5,6; inferior=7,8."}, {"q": "Maini reviews WHY every spinal nerve carries gray rami: to deliver sympathetic fibres to which three body-wall structures?", "o": ["Skeletal muscles, tendons, and periosteum", "Salivary glands, lacrimal glands, and mucous glands", "Sweat glands, arrector pili muscles, and blood vessels", "Cardiac muscle, smooth muscle of gut, and airway glands"], "c": 2, "cat": "Cervical Sympathetic Trunk", "r": ["Skeletal muscle, tendons, and periosteum are not the three autonomic targets she lists.", "Salivary/lacrimal/mucous glands receive parasympathetic secretomotor supply, not this sympathetic-to-body-wall route.", "Correct. Sympathetic fibres ride the spinal nerves via gray rami to reach sweat glands, arrector pili muscles, and blood vessels throughout the body wall.", "Cardiac/gut/airway targets are visceral organs, not the three somatic body-wall structures she names."], "source": "L28 · Gray rami purpose", "quote": "[Maini] 'Three structures. Your sweat glands, arrector pili muscle, and your blood vessels.'", "obj": "Purpose of gray rami", "hint": "The 3 body-wall sympathetic targets."}, {"q": "Maini contrasts the two autonomic divisions in the body wall. Which statement matches her teaching?", "o": ["Every spinal nerve carries parasympathetic fibres to the skin", "Every spinal nerve carries sympathetic (GVE) fibres, but no parasympathetic - parasympathetic is dedicated to internal organs", "Neither division reaches the spinal nerves", "Parasympathetic fibres supply the arrector pili muscles"], "c": 1, "cat": "Cervical Sympathetic Trunk", "r": ["Parasympathetic does not travel to the skin on spinal nerves; that is the sympathetic role.", "Correct. All spinal nerves (C1 to coccygeal) carry sympathetic fibres via gray rami; parasympathetic is reserved for internal organs.", "Sympathetic fibres DO reach every spinal nerve via gray rami, so neither is wrong.", "Arrector pili muscles are sympathetic targets, not parasympathetic."], "source": "L28 · Autonomic distribution", "quote": "[Maini] 'All those nerves have some amount of sympathetic fibers only, no parasympathetics. Parasympathetic is dedicated only to internal organs.'", "obj": "Sympathetic vs parasympathetic in body wall", "hint": "Skin/vessels/sweat = sympathetic only."}, {"q": "Where does Maini locate the SUPERIOR cervical ganglion, and what are its immediate relations?", "o": ["Opposite C6, on top of the inferior thyroid artery", "Between the C7 transverse process and the neck of the first rib", "Opposite C2-C3, behind the internal carotid artery and anterior to longus capitis", "Opposite the atlas, within the carotid sheath"], "c": 2, "cat": "Cervical Sympat
