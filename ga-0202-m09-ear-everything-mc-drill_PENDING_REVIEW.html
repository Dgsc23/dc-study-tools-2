<script>
const BANK=[{"q": "Dr. Maini divides the ear into external, middle, and internal parts. Where are the auditory receptors that convert sound-wave vibrations into action potentials located?", "o": ["In the middle ear, on the ossicles", "In the internal ear", "On the tympanic membrane of the external ear", "Within the external acoustic meatus"], "r": ["The middle ear only conducts vibrations via the ossicles; it holds no auditory receptors.", "Correct. Maini stresses the receptors sit deeply protected in the internal ear, where vibrations are converted into action potentials carried to the temporal lobe.", "The tympanic membrane vibrates and passes energy on, but it is not where receptors are.", "The external acoustic meatus is merely a conducting passage; no receptors are there."], "cat": "External Ear - Auricle & Meatus", "source": "L22 - The Ear (external/middle vs internal function)", "quote": "[Maini] 'Internal ear is the place where your receptors are located... those vibrations reach there and are converted into action potentials.'", "obj": "Ear regions - function of external/middle vs internal ear", "c": 1}, {"q": "According to Maini, what is the primary role of the external and middle ear?", "o": ["To generate action potentials from sound waves", "To house the auditory receptors", "To act as a conduit that conducts sound-wave vibrations to the internal ear", "To equalize air pressure across the skull"], "r": ["Action potentials are generated only at the receptors in the internal ear.", "The receptors are housed in the internal ear, not the external/middle ear.", "Correct. Maini calls the external and middle ear a 'conduit passage' that transmits vibrations structure-to-structure until the receptors are stimulated.", "Pressure equalization is the job of the auditory tube specifically, not the whole conducting apparatus."], "cat": "External Ear - Auricle & Meatus", "source": "L22 - The Ear (conduit function)", "obj": "External + middle ear = conducting apparatus", "c": 2}, {"q": "The external ear is composed of which three parts?", "o": ["Auricle, ossicles, and auditory tube", "Auricle, external acoustic meatus, and tympanic membrane", "Cochlea, vestibule, and semicircular canals", "External acoustic meatus, promontory, and oval window"], "r": ["Ossicles and the auditory tube belong to the middle ear.", "Correct. Maini lists the auricle, external acoustic meatus, and tympanic membrane as the external ear.", "Cochlea, vestibule, and semicircular canals are the internal (bony labyrinth) ear.", "The promontory and oval window are features of the middle ear's medial wall."], "cat": "External Ear - Auricle & Meatus", "source": "L22 - The Ear (parts of external ear)", "obj": "Parts of the external ear", "c": 1}, {"q": "The auricle (pinna) is supported by what type of cartilage?", "o": ["A single piece of elastic cartilage", "Hyaline cartilage", "Fibrocartilage", "Calcified cartilage"], "r": ["Correct. Maini says removing the skin reveals a single piece of elastic cartilage, which springs back to shape.", "Hyaline cartilage forms costal cartilages and articular surfaces, not the auricle.", "Fibrocartilage forms intervertebral discs and menisci, not the auricle.", "The auricular cartilage is elastic, not calcified."], "cat": "External Ear - Auricle & Meatus", "source": "L22 - The Ear (auricle cartilage)", "quote": "[Maini] 'If you remove the skin and connective tissue, you will find a single piece of elastic cartilage.'", "obj": "Auricle - elastic cartilage", "hint": "It distorts and springs back - elastin fibers.", "c": 0}, {"q": "Besides the auricle, which other structure did Maini give as an example of elastic cartilage?", "o": ["The nasal septum", "The thyroid cartilage", "The epiglottis", "The costal cartilage"], "r": ["The nasal septum (septal cartilage) is hyaline cartilage.", "The thyroid cartilage is hyaline cartilage.", "Correct. Maini names the epiglottis as another elastic-cartilage example, noting she would revisit it in a later week.", "Costal cartilages are hyaline cartilage."], "cat": "External Ear - Auricle & Meatus", "source": "L22 - The Ear (elastic cartilage examples)", "obj": "Elastic cartilage - auricle and epiglottis", "c": 2}, {"q": "Which part of the auricle contains skin and soft tissue but NO cartilage, and is very vascular?", "o": ["The helix", "The tragus", "The earlobe (lobule)", "The concha"], "r": ["The helix is the cartilaginous outer ridge of the auricle.", "The tragus is a cartilaginous projection anterior to the meatus.", "Correct. Maini notes the earlobe has little or no fat and no cartilage - just skin and soft tissue - and is very vascular.", "The concha is part of the cartilaginous auricle."], "cat": "External Ear - Auricle & Meatus", "source": "L22 - The Ear (earlobe)", "obj": "Lobule - no cartilage, vascular", "c": 2}, {"q": "The arteries supplying the auricle - superficial temporal, posterior auricular, and occipital - are all branches of which vessel?", "o": ["The internal carotid artery", "The maxillary artery", "The external carotid artery", "The facial artery"], "r": ["The internal carotid supplies the orbit and brain, not the auricle surface.", "The maxillary artery is itself a terminal branch of the ECA but does not give off these three named vessels to the auricle.", "Correct. Maini confirms all three are branches of the external carotid artery (ECA).", "The facial artery is a separate ECA branch and is not the parent of these three."], "cat": "External Ear - Auricle & Meatus", "source": "L22 - The Ear (auricle blood supply)", "obj": "Auricle arteries - all from ECA", "c": 2}, {"q": "The great auricular nerve, a sensory nerve to the auricle, is a branch of which plexus?", "o": ["The brachial plexus", "The pharyngeal plexus", "The cervical plexus", "The tympanic plexus"], "r": ["The brachial plexus supplies the upper limb.", "The pharyngeal plexus supplies the pharynx and soft palate.", "Correct. Maini identifies the great auricular nerve (which runs with the external jugular vein) as a branch of the cervical plexus, as is the lesser occipital nerve.", "The tympanic plexus is a nerve network in the middle ear, not a source of the great auricular nerve."], "cat": "External Ear - Auricle & Meatus", "source": "L22 - The Ear (auricle sensory supply)", "obj": "Great auricular nerve - cervical plexus", "c": 2}, {"q": "The auriculotemporal nerve, which helps supply the auricle and external acoustic meatus, is a branch of which nerve?", "o": ["The facial nerve (VII)", "The mandibular division of the trigeminal (V3)", "The glossopharyngeal nerve (IX)", "The maxillary division of the trigeminal (V2)"], "r": ["The facial nerve supplies the auricular muscles (motor) and a tiny bit of meatal skin, but the auriculotemporal is not its branch.", "Correct. Maini reminds students the auriculotemporal nerve is a branch of V3, is pierced by the middle meningeal artery, and was discussed in the infratemporal fossa.", "The glossopharyngeal supplies the tympanic membrane internally, not via the auriculotemporal.", "The auriculotemporal arises from V3, not V2."], "cat": "External Ear - Auricle & Meatus", "source": "L22 - The Ear (auriculotemporal nerve)", "obj": "Auriculotemporal nerve - branch of V3", "hint": "Pierced by the middle meningeal artery.", "c": 1}, {"q": "Which nerve provides MOTOR supply to the (rudimentary) auricular muscles?", "o": ["The facial nerve (VII)", "The auriculotemporal nerve (V3)", "The great auricular nerve", "The vagus nerve (X)"], "r": ["Correct. Maini states the facial nerve supplies the superior, anterior, and posterior auricular muscles, which are rudimentary in humans.", "The auriculotemporal is sensory to the auricle, not motor to these muscles.", "The great auricular nerve is sensory.", "The vagus gives sensory (GSA) supply to the meatus, not motor to auricular muscles."], "cat": "External Ear - Auricle & Meatus", "source": "L22 - The Ear (auricular muscles)", "obj": "Auricular muscles - motor from facial nerve", "c": 0}, {"q": "Maini describes the external acoustic meatus as a 'sinuous' (S-shaped) tube. Approximately how long is it?", "o": ["About 1 cm", "About 5 cm", "About 7 cm", "About 2.5 cm"], "r": ["1 cm is too short for the described tube.", "5 mm is the overall height Maini gives for the cochlea, not the meatus length.", "7 cm is far too long; the auditory tube is only ~3.5-4 cm.", "Correct. Maini gives the external acoustic meatus a length of 2.5 cm."], "cat": "External Ear - Auricle & Meatus", "source": "L22 - The Ear (external acoustic meatus)", "obj": "External acoustic meatus - 2.5 cm, S-shaped", "c": 3}, {"q": "How is the external acoustic meatus supported along its length?", "o": ["Entirely by cartilage", "Lateral two-thirds by bone, medial one-third by cartilage", "Lateral one-third by elastic cartilage, medial two-thirds by the temporal bone", "Entirely by the petrous temporal bone"], "r": ["Only the lateral one-third is cartilaginous.", "The proportions are reversed - the cartilage is lateral, not the bone.", "Correct. Maini says the lateral one-third is supported by cartilage and the medial two-thirds by the temporal bone.", "The lateral third is cartilaginous, so it is not entirely bone."], "cat": "External Ear - Auricle & Meatus", "source": "L22 - The Ear (meatus support)", "obj": "Meatus - lateral 1/3 cartilage, medial 2/3 bone", "c": 2}, {"q": "The ceruminous glands lining the external acoustic meatus secrete cerumen. What is its function, per Maini?", "o": ["It lubricates the ossicular chain", "It equalizes middle-ear pressure", "With hair, it forms a mat that traps dust, soot, and small insects", "It amplifies sound vibrations"], "r": ["The ossicles are in the air-filled middle ear and are not lubricated by cerumen.", "Pressure equalization is the auditory tube's role.", "Correct. Maini explains the waxy cerumen plus hair creates a mat that traps dust, soot particles, and even tiny insects.", "Cerumen does not amplify sound."], "cat": "External Ear - Auricle & Meatus", "source": "L22 - The Ear (cerumen)", "obj": "Cerumen - trapping/protective function", "c": 2}, {"q": "Which nerve carries GSA fibers from the external acoustic meatus, explaining why cleaning the ear can trigger a throat/cough sensation?", "o": ["The auricular branch of the vagus nerve", "The auriculotemporal branch of V3", "The glossopharyngeal nerve", "The chorda tympani"], "r": ["Correct. Maini attributes the throat sensation on cleaning the ear to stimulation of the auricular branch of the vagus, which carries GSA from the meatus.", "The auriculotemporal (V3) also supplies the meatus but is not the vagal reflex pathway Maini describes.", "The glossopharyngeal supplies the middle ear/tympanic plexus, not the reflex she describes.", "The chorda tympani carries taste and secretomotor fibers, not meatal GSA."], "cat": "External Ear - Auricle & Meatus", "source": "L22 - The Ear (vagal supply of meatus)", "obj": "Auricular branch of vagus - ear-throat reflex", "c": 0}, {"q": "On the auricle, what is the name of the outer, curved ridge?", "o": ["The antihelix", "The tragus", "The scapha", "The helix"], "r": ["The antihelix is the ridge that runs almost parallel and internal to the helix.", "The tragus is the projection anterior to the external meatus.", "The scapha is the boat-shaped fossa between helix and antihelix.", "Correct. Maini identifies the outer ridge as the helix."], "cat": "External Ear - Auricle & Meatus", "source": "L22 - The Ear (parts of auricle)", "profTip": "Maini: 'I have seen board questions on parts of the auricle.'", "obj": "Auricle - helix", "c": 3}, {"q": "The boat-shaped fossa lying between the helix and the antihelix is called the:", "o": ["Concha", "Triangular fossa", "Scapha", "Cymba"], "r": ["The concha is the deep hollow leading to the meatus.", "The triangular fossa is a separate depression within the antihelix limbs.", "Correct. Maini says the fossa between helix and antihelix is the scapha, whose literal meaning is 'boat.'", "The cymba is the upper part of the concha, not the helix-antihelix fossa."], "cat": "External Ear - Auricle & Meatus", "source": "L22 - The Ear (scapha)", "obj": "Scapha - boat-shaped fossa", "hint": "Scapha = boat (as in the 'scaphoid' boat-shaped bone).", "c": 2}, {"q": "Which auricular projection lies immediately ANTERIOR to the external acoustic meatus?", "o": ["The tragus", "The antitragus", "The helix", "The lobule"], "r": ["Correct. Maini says the triangular ridge you can feel anterior to your external meatus is the tragus.", "The antitragus lies opposite the tragus.", "The helix is the outer curved ridge.", "The lobule is the fleshy earlobe below."], "cat": "External Ear - Auricle & Meatus", "source": "L22 - The Ear (tragus)", "obj": "Tragus - anterior to meatus", "c": 0}, {"q": "The intertragic notch lies between which two structures?", "o": ["The helix and the antihelix", "The tragus and the lobule", "The crura of the antihelix", "The tragus and the antitragus"], "r": ["The scapha, not the intertragic notch, lies between helix and antihelix.", "The intertragic notch is above the lobule but is defined by the tragus and antitragus.", "The triangular fossa lies between the crura of the antihelix.", "Correct. Maini places the intertragic notch between the tragus and the antitragus (jokingly, 'to hold your AirPods')."], "cat": "External Ear - Auricle & Meatus", "source": "L22 - The Ear (intertragic notch)", "obj": "Intertragic notch - between tragus and antitragus", "c": 3}, {"q": "Maini describes the tympanic membrane as which of the following?", "o": ["An opaque, circular, muscular membrane", "A thin, semi-transparent, oval, pearly-gray fibrous membrane", "A thick, bony, white plate", "A cartilaginous, triangular flap"], "r": ["It is fibrous, not muscular, and semi-transparent rather than opaque.", "Correct. Maini describes it as thin, semi-transparent, oval, fibrous, and pearly-gray - the eardrum.", "It is a membrane, not a bony plate.", "It is fibrous and oval, not cartilaginous and triangular."], "cat": "Tympanic Membrane", "source": "L22 - The Ear (tympanic membrane description)", "obj": "Tympanic membrane - gross description", "c": 1}, {"q": "The tympanic membrane is covered externally and internally by which linings?", "o": ["Externally by mucous membrane, internally by skin", "Skin on both surfaces", "Externally by thin skin, internally by mucous membrane, with a core of dense fibrous tissue", "Mucous membrane on both surfaces"], "r": ["The coverings are reversed - skin is external, mucosa internal.", "The internal surface is mucosa, not skin.", "Correct. Maini says the TM is covered externally by thin skin and internally by mucous membrane, with a dense fibrous core.", "The external surface is skin, not mucosa."], "cat": "Tympanic Membrane", "source": "L22 - The Ear (TM layers)", "obj": "Tympanic membrane - three layers", "c": 2}, {"q": "The central depression of the tympanic membrane, where the malleus handle attaches, is called the:", "o": ["Cone of light", "Pars flaccida", "Annulus", "Umbo"], "r": ["The cone of light is the reflected light triangle radiating from the umbo, not the depression itself.", "The pars flaccida is the small superior lax region of the membrane.", "The annulus is the fibrocartilaginous rim of the membrane.", "Correct. Maini calls the central depression the umbo ('ambo' = umbrella), a slight depression in the middle."], "cat": "Tympanic Membrane", "source": "L22 - The Ear (umbo)", "obj": "Umbo - central depression of TM", "c": 3}, {"q": "In the RIGHT ear, at what clock position does the cone of light appear on otoscopy?", "o": ["7 o'clock", "5 o'clock", "3 o'clock", "12 o'clock"], "r": ["7 o'clock is the LEFT ear's cone of light.", "Correct. Maini says the cone of light is at 5 o'clock in the right ear (and 7 o'clock in the left) and flags this as a likely exam question.", "3 o'clock is not the position Maini gives.", "12 o'clock is the pars flaccida region, not the cone of light."], "cat": "Tympanic Membrane", "source": "L22 - The Ear (cone of light)", "quote": "[Maini] 'In the right ear, 5 o'clock. In the left ear, 7 o'clock. This can appear as a question in your exam.'", "profTip": "Maini explicitly said this can appear on the exam.", "obj": "Cone of light - right 5, left 7", "c": 1}, {"q": "For clinical examination, the tympanic membrane is divided into how many quadrants?", "o": ["Four", "Two", "Three", "Six"], "r": ["Correct. Maini divides the membrane into four quadrants: anterosuperior, posterosuperior, anteroinferior, and posteroinferior.", "Two would be an oversimplification of the described scheme.", "Three does not match the anterior/posterior x superior/inferior grid.", "Six is not the scheme Maini uses."], "cat": "Tympanic Membrane", "source": "L22 - The Ear (TM quadrants)", "obj": "Tympanic membrane - four quadrants", "c": 0}, {"q": "The small, lax superior portion of the tympanic membrane is called the:", "o": ["Pars tensa", "Umbo", "Pars flaccida", "Chorda tympani"], "r": ["The pars tensa is the tense inferior portion.", "The umbo is the central depression.", "Correct. Maini names the superior portion the pars flaccida, contrasting it with the tensed inferior pars tensa.", "The chorda tympani is a nerve crossing behind the membrane, not a region of it."], "cat": "Tympanic Membrane", "source": "L22 - The Ear (pars flaccida)", "obj": "Pars flaccida - superior lax part", "c": 2}, {"q": "Puncturing the POSTEROSUPERIOR quadrant of the tympanic membrane risks damaging which structure lying just behind it?", "o": ["The facial nerve trunk", "The chorda tympani", "The stapedius muscle", "The auditory tube"], "r": ["The facial nerve runs in its bony canal in the posterior/medial wall, not directly behind this quadrant.", "Correct. Maini warns that the chorda tympani lies just posterior to the posterosuperior quadrant, so cutting there can damage it.", "The stapedius is enclosed in the pyramid on the posterior wall.", "The auditory tube opens on the anterior wall."], "cat": "Tympanic Membrane", "source": "L22 - The Ear (posterosuperior quadrant)", "obj": "Chorda tympani - risk in posterosuperior quadrant", "c": 1}, {"q": "Which quadrant of the tympanic membrane is the PREFERRED site for a myringotomy, because no important structure lies behind it?", "o": ["Posterosuperior", "Anterosuperior", "Anteroinferior", "Posteroinferior"], "r": ["The posterosuperior quadrant risks the chorda tympani.", "The anterosuperior quadrant contains the anterior malleolar fold.", "The anteroinferior quadrant is where the cone of light lies.", "Correct. Maini says the posteroinferior quadrant is preferred for myringotomy because there is no important structure posterior to it."], "cat": "Tympanic Membrane", "source": "L22 - The Ear (myringotomy site)", "profTip": "Maini pairs the myringotomy site with the danger of the posterosuperior quadrant (chorda tympani).", "obj": "Myringotomy - posteroinferior quadrant", "c": 3}, {"q": "What is a myringotomy performed to treat, as Maini describes it?", "o": ["Draining a fluid/pus collection in the middle ear to prevent tympanic membrane rupture", "Removing wax from the external meatus", "Repairing a deviated nasal septum", "Replacing the ossicles"], "r": ["Correct. Maini describes middle-ear fluid/pus (often from pharyngeal infection via the auditory tube) drained through a small posteroinferior opening with a tiny tube, so the eardrum does not rupture spontaneously.", "Wax removal is not a myringotomy.", "Septoplasty/submucous resection addresses a deviated septum, not the eardrum.", "Ossicular replacement is a different (ossiculoplasty) procedure."], "cat": "Ear - Clinical", "source": "L22 - The Ear (myringotomy indication)", "obj": "Myringotomy - drains middle-ear effusion", "c": 0}, {"q": "The EXTERNAL surface of the tympanic membrane receives its blood supply mainly from which artery?", "o": ["The labyrinthine artery", "The stylomastoid branch of the posterior auricular artery", "The anterior tympanic branch of the facial artery", "The deep auricular branch of the maxillary artery"], "r": ["The labyrinthine artery supplies the internal ear, not the eardrum surface.", "The stylomastoid branch of the posterior auricular supplies the INTERNAL surface, per Maini.", "The facial artery is not the source Maini names for the tympanic membrane.", "Correct. Maini says the deep auricular branch of the maxillary artery supplies the external surface of the TM."], "cat": "Tympanic Membrane", "source": "L22 - The Ear (TM blood supply)", "obj": "TM external surface - deep auricular branch of maxillary", "c": 3}, {"q": "The sensory supply of the tympanic membrane differs by surface. The INTERNAL (medial) surface is supplied by which nerve?", "o": ["The auriculotemporal nerve (V3)", "The auricular branch of the vagus (X)", "The facial nerve (VII)", "The glossopharyngeal nerve (IX)"], "r": ["The auriculotemporal supplies the EXTERNAL surface.", "The auricular branch of vagus supplies the EXTERNAL surface.", "The facial nerve is not the sensory supply Maini names for the TM.", "Correct. Maini says the internal surface is supplied by the 9th nerve (glossopharyngeal), while the external surface is supplied by auriculotemporal (V3) and the auricular branch of vagus."], "cat": "Tympanic Membrane", "source": "L22 - The Ear (TM nerve supply)", "obj": "TM internal surface - glossopharyngeal (IX)", "c": 3}, {"q": "From which embryonic structure does the tympanic membrane develop?", "o": ["The first pharyngeal membrane", "The first pharyngeal pouch", "The first pharyngeal cleft/groove", "The second pharyngeal arch"], "r": ["Correct. Maini says the first pharyngeal membrane gives rise to the tympanic membrane, where the cleft and pouch meet.", "The first pharyngeal pouch gives rise to the middle ear (tympanic cavity).", "The first pharyngeal cleft/groove gives rise to the external acoustic meatus.", "The second arch contributes the stapedius/stapes but not the TM."], "cat": "Ear - Embryology", "source": "L22 - The Ear (TM development)", "obj": "Tympanic membrane - first pharyngeal membrane", "c": 0}, {"q": "The middle ear (tympanic cavity) develops from which embryonic structure?", "o": ["The first pharyngeal membrane", "The first pharyngeal cleft", "The first pharyngeal pouch", "The otic vesicle"], "r": ["The first pharyngeal membrane forms the tympanic membrane.", "The first pharyngeal cleft forms the external acoustic meatus.", "Correct. Maini states the middle ear develops from the first pharyngeal pouch.", "The otic vesicle forms the membranous labyrinth (internal ear), not the middle ear cavity."], "cat": "Ear - Embryology", "source": "L22 - The Ear (middle ear development)", "obj": "Middle ear - first pharyngeal pouch", "c": 2}, {"q": "The external acoustic meatus develops from which embryonic structure?", "o": ["The first pharyngeal cleft (groove)", "The first pharyngeal pouch", "The first pharyngeal membrane", "The third pharyngeal arch"], "r": ["Correct. Maini says the external acoustic meatus develops from the first pharyngeal cleft/groove, which invaginates to meet the pouch at the tympanic membrane.", "The first pharyngeal pouch forms the middle ear.", "The first pharyngeal membrane forms the tympanic membrane itself.", "The third arch is unrelated to the meatus."], "cat": "Ear - Embryology", "source": "L22 - The Ear (meatus development)", "obj": "External acoustic meatus - first pharyngeal cleft", "c": 0}, {"q": "The tympanic cavity (middle ear) lies within which part of the temporal bone?", "o": ["The petrous portion", "The squamous portion", "The mastoid process only", "The zygomatic process"], "r": ["Correct. Maini locates the middle ear cavity in the petrous portion of the temporal bone.", "The squamous portion is the flat lateral part of the temporal bone.", "The mastoid process communicates with the cavity (via the aditus) but does not contain it.", "The zygomatic process is an anterior projection unrelated to the cavity."], "cat": "Middle Ear - Walls & Cavity", "source": "L22 - The Ear (tympanic cavity location)", "obj": "Middle ear - petrous temporal bone", "c": 0}, {"q": "Posteriorly, the middle ear cavity communicates with the mastoid antrum through which opening?", "o": ["The oval window", "The aditus (ad antrum)", "The auditory tube", "The internal acoustic meatus"], "r": ["The oval window opens into the internal ear, not the mastoid.", "Correct. Maini names the aditus as the passage from the middle ear cavity to the mastoid antrum.", "The auditory tube connects the cavity to the nasopharynx anteriorly.", "The internal acoustic meatus transmits CN VII/VIII, not middle-ear-to-mastoid airflow."], "cat": "Middle Ear - Walls & Cavity", "source": "L22 - The Ear (aditus)", "obj": "Aditus - middle ear to mastoid antrum", "c": 1}, {"q": "Maini notes the mastoid process is not solid but contains air cells. Why is this clinically relevant?", "o": ["It amplifies high-frequency sound", "It stores endolymph", "Middle-ear infection can spread to the mastoid, causing mastoiditis", "It equalizes intracranial pressure"], "r": ["The mastoid air cells do not amplify sound.", "Endolymph is in the membranous labyrinth, not the mastoid.", "Correct. Maini explains that because the mastoid has air cells communicating with the middle ear, infection can spread to cause mastoiditis (treated by mastoidectomy).", "The mastoid air cells do not regulate intracranial pressure."], "cat": "Ear - Clinical", "source": "L22 - The Ear (mastoiditis)", "obj": "Mastoid air cells - mastoiditis risk", "c": 2}, {"q": "What forms the ROOF of the tympanic cavity?", "o": ["The roof of the jugular fossa", "The tegmen tympani (a plate of temporal bone)", "The promontory", "The pyramid"], "r": ["The roof of the jugular fossa forms the FLOOR of the cavity.", "Correct. Maini says the roof is the tegmen tympani, a part of the temporal bone.", "The promontory is a bulge on the medial wall.", "The pyramid is a projection on the posterior wall."], "cat": "Middle Ear - Walls & Cavity", "source": "L22 - The Ear (roof of tympanic cavity)", "obj": "Roof - tegmen tympani", "c": 1}, {"q": "What forms the FLOOR of the tympanic cavity?", "o": ["The tegmen tympani", "The carotid canal wall", "The pyramidal eminence", "The roof of the jugular fossa"], "r": ["The tegmen tympani is the roof, not the floor.", "The carotid canal relates to the anterior wall, not the floor Maini names.", "The pyramidal eminence is on the posterior wall.", "Correct. Maini identifies the floor as the roof of the jugular fossa."], "cat": "Middle Ear - Walls & Cavity", "source": "L22 - The Ear (floor of tympanic cavity)", "obj": "Floor - roof of jugular fossa", "c": 3}, {"q": "The ANTERIOR wall of the tympanic cavity is incomplete and contains which two openings?", "o": ["The oval window and the round window", "The aditus and the facial canal", "The opening of the pharyngotympanic tube and the opening for tensor tympani", "The fenestra vestibuli and the promontory"], "r": ["The oval and round windows are on the medial wall.", "The aditus and facial canal are posterior/medial features.", "Correct. Maini says the anterior wall carries the pharyngotympanic (auditory) tube opening and the opening for the tensor tympani muscle.", "The fenestra vestibuli (oval window) and promontory are on the medial wall."], "cat": "Middle Ear - Walls & Cavity", "source": "L22 - The Ear (anterior wall)", "obj": "Anterior wall - auditory tube + tensor tympani openings", "c": 2}, {"q": "The MEDIAL wall of the middle ear bulges as the promontory. What forms this promontory?", "o": ["The head of the malleus", "The footplate of the stapes", "The base (basal turn) of the cochlea", "The mastoid antrum"], "r": ["The malleus head is a lateral ossicular feature, not the promontory.", "The stapes footplate sits in the oval window on this wall but does not form the promontory.", "Correct. Maini says the promontory is the raised projection formed by the base of the cochlea pressing on the medial wall.", "The mastoid antrum is posterior, not the promontory."], "cat": "Middle Ear - Walls & Cavity", "source": "L22/L23 - The Ear (promontory)", "obj": "Promontory - base of cochlea", "c": 2}, {"q": "On the MEDIAL wall of the middle ear, the fenestra vestibuli (oval window) and fenestra cochlea (round window) are found. Which structure occupies the oval window?", "o": ["The footplate (base) of the stapes", "The manubrium of the malleus", "The long process of the incus", "The secondary tympanic membrane"], "r": ["Correct. Maini says the footplate of the stapes sits in the oval window (fenestra vestibuli).", "The manubrium of the malleus attaches to the tympanic membrane laterally.", "The incus long process articulates with the stapes, not the oval window.", "The secondary tympanic membrane closes the ROUND window, not the oval window."], "cat": "Middle Ear - Walls & Cavity", "source": "L22/L23 - The Ear (oval window)", "obj": "Oval window - footplate of stapes", "c": 0}, {"q": "The bony facial canal, which houses the facial nerve, forms part of which walls of the tympanic cavity?", "o": ["The roof and floor", "The medial and posterior walls", "The anterior and lateral walls", "The lateral wall only"], "r": ["The roof (tegmen) and floor (jugular fossa) are not where Maini places the facial canal.", "Correct. Maini states the facial canal is part of the medial as well as the posterior wall of the tympanic cavity.", "The anterior wall has the tube and tensor tympani; the lateral wall is the eardrum.", "The lateral wall is the tympanic membrane, not the facial canal."], "cat": "Middle Ear - Walls & Cavity", "source": "L22 - The Ear (facial canal)", "obj": "Facial canal - medial and posterior walls", "c": 1}, {"q": "The pyramid (pyramidal eminence) on the posterior wall of the middle ear serves as the attachment for which muscle?", "o": ["The tensor tympani", "The tensor veli palatini", "The salpingopharyngeus", "The stapedius"], "r": ["The tensor tympani arises from the cartilage of the auditory tube (anterior wall).", "The tensor veli palatini is a palatal muscle, not a middle-ear ossicular muscle.", "The salpingopharyngeus relates to the auditory tube opening in the pharynx, not the pyramid.", "Correct. Maini says the stapedius muscle originates from the pyramid in the posterior wall."], "cat": "Middle Ear - Walls & Cavity", "source": "L22 - The Ear (pyramid)", "obj": "Pyramid - origin of stapedius", "c": 3}, {"q": "Maini calls the three auditory ossicles the tiniest bones in the body. What are they, in order from the tympanic membrane inward?", "o": ["Stapes, incus, malleus", "Malleus, incus, stapes", "Incus, malleus, stapes", "Malleus, stapes, incus"], "r": ["This reverses the correct order.", "Correct. Maini lists malleus, incus, stapes (M-I-S) from the eardrum toward the oval window.", "The malleus, not the incus, contacts the tympanic membrane first.", "The incus lies between the malleus and stapes, so the stapes cannot be second."], "cat": "Auditory Ossicles", "source": "L22 - The Ear (ossicles order)", "obj": "Ossicles - malleus, incus, stapes", "c": 1}, {"q": "Which ossicle is the LARGEST and resembles a hammer?", "o": ["The incus", "The stapes", "The malleus", "The lenticular ossicle"], "r": ["The incus resembles an anvil.", "The stapes resembles a stirrup and is the smallest ossicle.", "Correct. Maini says the malleus is the largest ossicle and resembles a hammer, with a head, neck, and handle (manubrium).", "There is no separate 'lenticular ossicle'; the lenticular process is part of the incus."], "cat": "Auditory Ossicles", "source": "L22 - The Ear (malleus)", "obj": "Malleus - largest, hammer-shaped", "c": 2}, {"q": "The handle of the malleus (manubrium) is attached to which structure?", "o": ["The oval window", "The promontory", "The tympanic membrane", "The pyramid"], "r": ["The oval window is occupied by the stapes footplate.", "The promontory is a medial-wall bulge, not an ossicular attachment.", "Correct. Maini states the malleus (via its manubrium) is attached to the tympanic membrane, so eardrum vibrations pass to it.", "The pyramid anchors the stapedius, not the malleus."], "cat": "Auditory Ossicles", "source": "L22 - The Ear (malleus attachment)", "obj": "Malleus manubrium - attached to TM", "c": 2}, {"q": "Which ossicle resembles an anvil and has a body with long and short processes?", "o": ["The malleus", "The stapes", "The vomer", "The incus"], "r": ["The malleus resembles a hammer.", "The stapes resembles a stirrup.", "The vomer is a nasal septal bone, not an ossicle.", "Correct. Maini says the incus resembles an anvil, with a body, long process, and short process; the lower end of the long process (lenticular process) articulates with the stapes head."], "cat": "Auditory Ossicles", "source": "L22 - The Ear (incus)", "obj": "Incus - anvil-shaped", "c": 3}, {"q": "Which ossicle resembles a stirrup and has a head, neck, two crura, and a footplate?", "o": ["The incus", "The malleus", "The stapes", "The modiolus"], "r": ["The incus resembles an anvil.", "The malleus resembles a hammer.", "Correct. Maini says the stapes resembles a stirrup, with a head, neck, two crura (arms), and a footplate that sits in the oval window.", "The modiolus is the central bony core of the cochlea, not an ossicle."], "cat": "Auditory Ossicles", "source": "L22 - The Ear (stapes)", "obj": "Stapes - stirrup-shaped, footplate in oval window", "c": 2}, {"q": "According to Maini, the incudomalleolar joint (between malleus and incus) is what type of joint?", "o": ["A ball-and-socket joint", "A saddle joint", "A hinge joint", "A pivot joint"], "r": ["Maini calls the incudostapedial joint the ball-and-socket joint, not this one.", "Correct. Maini states the incudomalleolar (incus-malleus) joint is a saddle joint.", "Neither ossicular joint is described as a hinge.", "Neither ossicular joint is described as a pivot."], "cat": "Auditory Ossicles", "source": "L22 - The Ear (ossicle joints)", "obj": "Incudomalleolar joint - saddle type", "c": 1}, {"q": "According to Maini, the incudostapedial joint (between incus and stapes) is what type of joint?", "o": ["A saddle joint", "A ball-and-socket joint", "A plane (gliding) joint", "A syndesmosis"], "r": ["Maini calls the incudomalleolar joint the saddle joint.", "Correct. Maini states the incudostapedial (incus-stapes) joint is a ball-and-socket joint.", "Neither ossicular joint is described as plane.", "A syndesmosis is a fibrous joint, not what Maini describes here."], "cat": "Auditory Ossicles", "source": "L22 - The Ear (ossicle joints)", "obj": "Incudostapedial joint - ball-and-socket type", "c": 1}, {"q": "The tensor tympani muscle develops from which pharyngeal arch and is innervated by which nerve?", "o": ["Second arch; the facial nerve", "Third arch; the glossopharyngeal nerve", "First arch; the facial nerve", "First arch; the mandibular nerve (V3, nerve to medial pterygoid)"], "r": ["The stapedius is the second-arch muscle supplied by the facial nerve.", "No third-arch muscle supplies the middle ear ossicles here.", "Tensor tympani is first-arch but is V3, not facial.", "Correct. Maini confirms tensor tympani is a first-arch muscle innervated by V3 (the nerve to medial pterygoid)."], "cat": "Middle Ear Muscles & Reflex", "source": "L22 - The Ear (tensor tympani)", "obj": "Tensor tympani - 1st arch, V3", "c": 3}, {"q": "Where does the tensor tympani muscle originate, per Maini?", "o": ["From the pyramid of the posterior wall", "From the promontory", "From the cartilaginous portion of the auditory (pharyngotympanic) tube", "From the tegmen tympani"], "r": ["The pyramid is the origin of the stapedius, not tensor tympani.", "The promontory is a medial-wall bulge, not a muscle origin.", "Correct. Maini says tensor tympani originates from the cartilaginous portion of the auditory tube.", "The tegmen tympani is the roof, not a muscle origin."], "cat": "Middle Ear Muscles & Reflex", "source": "L22 - The Ear (tensor tympani origin)", "obj": "Tensor tympani - origin from auditory tube cartilage", "c": 2}, {"q": "What is the ACTION of the tensor tympani muscle?", "o": ["It pulls the stapes posteriorly", "It opens the auditory tube", "It vibrates the oval window", "It draws the tympanic membrane medially, tensing it to lessen sound transmission"], "r": ["Pulling the stapes posteriorly is the action of the stapedius.", "The tensor tympani does not open the auditory tube.", "It does not vibrate the oval window.", "Correct. Maini says tensor tympani draws the tympanic membrane medially, increasing tension and reducing sound transmission - protective in loud surroundings."], "cat": "Middle Ear Muscles & Reflex", "source": "L22 - The Ear (tensor tympani action)", "obj": "Tensor tympani - tenses TM, dampens sound", "c": 3}, {"q": "The stapedius muscle inserts onto which structure, and which nerve supplies it?", "o": ["The manubrium of the malleus; V3", "The long process of the incus; IX", "The neck of the stapes; the facial nerve (VII)", "The footplate of the stapes; the vagus"], "r": ["The manubrium of the malleus receives the tensor tympani, which is V3.", "The stapedius attaches to the stapes, not the incus, and is facial, not IX.", "Correct. Maini says the stapedius inserts onto the neck of the stapes and is supplied by the 7th (facial) nerve.", "It attaches to the neck (not footplate) and is facial, not vagus."], "cat": "Middle Ear Muscles & Reflex", "source": "L22 - The Ear (stapedius)", "obj": "Stapedius - inserts on stapes neck, CN VII", "c": 2}, {"q": "What is the ACTION of the stapedius muscle?", "o": ["It tenses the tympanic membrane medially", "It equalizes middle-ear pressure", "It rotates the malleus", "It dampens vibrations by pulling the head of the stapes posteriorly"], "r": ["Tensing the tympanic membrane medially is the tensor tympani's action.", "Pressure equalization is the auditory tube's role.", "The stapedius acts on the stapes, not by rotating the malleus.", "Correct. Maini says the stapedius damps down violent vibrations by pulling the stapes head posteriorly, protecting the receptors from loud noise."], "cat": "Middle Ear Muscles & Reflex", "source": "L22 - The Ear (stapedius action)", "obj": "Stapedius - dampens stapes vibration", "c": 3}, {"q": "Maini calls the reflex contraction of tensor tympani and stapedius in loud surroundings the:", "o": ["Vestibulo-ocular reflex", "Corneal reflex", "Gag reflex", "Auditory (acoustic) reflex"], "r": ["The vestibulo-ocular reflex stabilizes gaze with head movement, unrelated here.", "The corneal reflex is a blink reflex of the eye.", "The gag reflex involves IX and X in the pharynx.", "Correct. Maini names the protective co-contraction of both muscles in loud environments the auditory reflex."], "cat": "Middle Ear Muscles & Reflex", "source": "L22 - The Ear (auditory reflex)", "obj": "Auditory reflex - protective muscle contraction", "c": 3}, {"q": "Loss of stapedius function (e.g., facial nerve injury proximal to its branch) produces which symptom Maini describes?", "o": ["Complete deafness", "Hyperacusis - abnormal sensitivity to ordinary sounds", "Vertigo on head turning", "Loss of the cone of light"], "r": ["It causes sound intolerance, not complete deafness.", "Correct. Maini says a non-functioning stapedius causes hyperacusis, where even mild sounds seem too loud - a sign of facial nerve damage.", "Vertigo relates to vestibular (semicircular canal) dysfunction, not stapedius.", "The cone of light is an otoscopic landmark unrelated to stapedius function."], "cat": "Ear - Clinical", "source": "L22 - The Ear (hyperacusis)", "obj": "Hyperacusis - stapedius/facial nerve lesion", "c": 1}, {"q": "The auditory tube is also known by which other names Maini emphasizes?", "o": ["Cochlear duct and scala media", "Aditus and antrum", "Fenestra vestibuli and cochlea", "Pharyngotympanic tube and eustachian tube"], "r": ["The cochlear duct/scala media is an internal-ear structure.", "The aditus and antrum are the middle-ear-to-mastoid passage and cavity.", "The fenestra vestibuli and cochlea are internal-ear structures.", "Correct. Maini stresses the three names: auditory tube = pharyngotympanic tube = eustachian tube."], "cat": "Auditory Tube (Pharyngotympanic)", "source": "L22 - The Ear (auditory tube names)", "obj": "Auditory = pharyngotympanic = eustachian tube", "c": 3}, {"q": "The auditory tube connects the middle ear to which region?", "o": ["The nasopharynx", "The oropharynx", "The mastoid antrum", "The internal acoustic meatus"], "r": ["Correct. Maini says the auditory (pharyngotympanic) tube connects the middle ear with the nasopharynx.", "It opens into the nasopharynx, not the oropharynx.", "The aditus (not the auditory tube) connects to the mastoid antrum.", "The internal acoustic meatus transmits nerves, not the tube."], "cat": "Auditory Tube (Pharyngotympanic)", "source": "L22 - The Ear (auditory tube connection)", "obj": "Auditory tube - middle ear to nasopharynx", "c": 0}, {"q": "What is the MAIN function of the auditory tube, per Maini?", "o": ["To conduct sound waves to the receptors", "To equalize air pressure on the two sides of the tympanic membrane", "To drain endolymph", "To transmit the facial nerve"], "r": ["Sound conduction is done by the ossicles, not the tube.", "Correct. Maini stresses the tube equalizes pressure across the tympanic membrane (as when yawning during a flight); despite the name, it has 'nothing to do with hearing.'", "Endolymph is contained in the membranous labyrinth and is not drained by the tube.", "The facial nerve runs in the facial canal, not the auditory tube."], "cat": "Auditory Tube (Pharyngotympanic)", "source": "L22 - The Ear (auditory tube function)", "quote": "[Maini] 'Auditory tube has got nothing to do with hearing... it's for pressure equalization.'", "obj": "Auditory tube - pressure equalization", "c": 1}, {"q": "The auditory tube is about 3.5-4 cm long. How is it supported along its length?", "o": ["Posterior one-third bony, anterior two-thirds cartilaginous", "Entirely bony", "Entirely cartilaginous", "Anterior one-third bony, posterior two-thirds cartilaginous"], "r": ["Correct. Maini describes the tube as funnel-shaped with a bony one-third and an anterior two-thirds supported by cartilage lined by mucous membrane.", "Only the (posterior) one-third is bony.", "The bony one-third means it is not entirely cartilaginous.", "The proportions are reversed - the bony part is not the anterior third here."], "cat": "Auditory Tube (Pharyngotympanic)", "source": "L22 - The Ear (auditory tube structure)", "obj": "Auditory tube - 1/3 bony, 2/3 cartilaginous", "c": 0}, {"q": "At the pharyngeal (nasopharyngeal) opening of the auditory tube lies a collection of lymphoid tissue called the:", "o": ["Tubal tonsil", "Palatine tonsil", "Lingual tonsil", "Adenoid (nasopharyngeal tonsil)"], "r": ["Correct. Maini places the tubal tonsil at the tube's entrance in the nasopharynx, part of the protective lymphoid ring.", "The palatine tonsils lie between the palatoglossal and palatopharyngeal arches.", "The lingual tonsil is on the posterior tongue.", "The adenoid is on the nasopharyngeal roof, not specifically at the tube opening."], "cat": "Auditory Tube (Pharyngotympanic)", "source": "L22 - The Ear (tubal tonsil)", "obj": "Tubal tonsil - at auditory tube opening", "c": 0}, {"q": "Maini calls the internal (inner) ear the labyrinth. It is composed of which two parts?", "o": ["A tympanic and a mastoid part", "A bony labyrinth and a membranous labyrinth", "A cochlear and a tubal part", "A superior and an inferior part"], "r": ["Tympanic/mastoid describes middle-ear regions, not the labyrinth.", "Correct. Maini says the internal ear has an outer bony labyrinth (a thin bony shell) and an inner membranous labyrinth that follows the same contour.", "Cochlear/tubal is not the labyrinth's two-part division.", "Superior/inferior is not how Maini divides the labyrinth."], "cat": "Internal Ear - Labyrinth & Fluids", "source": "L23 - The Ear (labyrinth)", "obj": "Labyrinth - bony + membranous", "c": 1}, {"q": "Which fluid lies BETWEEN the bony labyrinth and the membranous labyrinth (outside the membranous labyrinth)?", "o": ["Perilymph", "Endolymph", "Cerebrospinal fluid", "Aqueous humor"], "r": ["Correct. Maini says if you crack the bony shell, perilymph oozes out - it lies outside the membranous labyrinth.", "Endolymph is INSIDE the membranous labyrinth.", "CSF surrounds the brain and spinal cord, not the labyrinth spaces here.", "Aqueous humor is in the eye."], "cat": "Internal Ear - Labyrinth & Fluids", "source": "L23 - The Ear (perilymph)", "obj": "Perilymph - outside membranous labyrinth", "c": 0}, {"q": "Which fluid FILLS the membranous labyrinth (inside it)?", "o": ["Perilymph", "Plasma", "Synovial fluid", "Endolymph"], "r": ["Perilymph is outside the membranous labyrinth, between it and the bone.", "Plasma is a blood component, not a labyrinthine fluid.", "Synovial fluid is found in joints.", "Correct. Maini says the membranous labyrinth is filled with endolymph."], "cat": "Internal Ear - Labyrinth & Fluids", "source": "L23 - The Ear (endolymph)", "obj": "Endolymph - inside membranous labyrinth", "c": 3}, {"q": "The BONY labyrinth is composed of which three parts?", "o": ["Utricle, saccule, and cochlear duct", "Cochlea, vestibule, and three semicircular canals", "Malleus, incus, and stapes", "Scala vestibuli, scala media, and scala tympani"], "r": ["Utricle, saccule, and cochlear duct are parts of the MEMBRANOUS labyrinth.", "Correct. Maini lists the bony labyrinth as the coiled cochlea, the vestibule, and three semicircular canals.", "The malleus, incus, and stapes are middle-ear ossicles.", "The three scalae are subdivisions within the cochlea, not the whole bony labyrinth."], "cat": "Internal Ear - Labyrinth & Fluids", "source": "L23 - The Ear (bony labyrinth parts)", "obj": "Bony labyrinth - cochlea, vestibule, SCC", "c": 1}, {"q": "Which membranous structures lie WITHIN the bony vestibule?", "o": ["The cochlear duct and helicotrema", "The three semicircular ducts", "The organ of Corti and modiolus", "The utricle and saccule"], "r": ["The cochlear duct is in the cochlea; the helicotrema is at the cochlear apex.", "The semicircular ducts lie within the semicircular canals, not the vestibule.", "The organ of Corti is in the cochlear duct; the modiolus is the cochlea's bony core.", "Correct. Maini says the utricle and saccule are the membranous structures inside the vestibule."], "cat": "Internal Ear - Labyrinth & Fluids", "source": "L23 - The Ear (membranous labyrinth in vestibule)", "obj": "Vestibule contains utricle + saccule", "c": 3}, {"q": "The cochlea coils about two and a half turns around a central bony core called the:", "o": ["Helicotrema", "Modiolus", "Promontory", "Umbo"], "r": ["The helicotrema is the apical communication between scala vestibuli and scala tympani.", "Correct. Maini says the cochlea makes 2.5 turns around the bony modiolus, which also houses the spiral ganglion.", "The promontory is the base-of-cochlea bulge on the middle-ear medial wall.", "The umbo is the central depression of the tympanic membrane."], "cat": "Cochlea & Organ of Corti", "source": "L23 - The Ear (modiolus)", "profTip": "Maini reviewed 'Modiolus is the bony center' in the final exam review.", "obj": "Modiolus - central bony core of cochlea", "c": 1}, {"q": "The spiral ganglion (housing the first-order sensory neurons for hearing) is located within which structure?", "o": ["The tectorial membrane", "The vestibule", "The modiolus", "The helicotrema"], "r": ["The tectorial membrane is the gelatinous membrane over the organ of Corti.", "The vestibule houses the utricle and saccule, not the spiral (cochlear) ganglion.", "Correct. Maini places the spiral ganglion inside the bony modiolus.", "The helicotrema is the apical fluid communication, not a ganglion site."], "cat": "Cochlea & Organ of Corti", "source": "L23 - The Ear (spiral ganglion)", "obj": "Spiral ganglion - within the modiolus", "c": 2}, {"q": "The cochlear canal is divided into three compartments by two membranes. Which two membranes are these?", "o": ["The tectorial membrane and the otolithic membrane", "The Reissner membrane and the tympanic membrane", "The vestibular membrane and the basilar membrane", "The basilar membrane and the tympanic membrane"], "r": ["The tectorial and otolithic membranes are gelatinous sensory membranes, not the dividers of the scalae.", "Reissner's membrane is another name for the vestibular membrane, but the tympanic membrane is not one of the cochlear dividers.", "Correct. Maini says the vestibular membrane and the basilar membrane divide the cochlear tube into three compartments.", "The tympanic membrane is the eardrum, not an internal cochlear divider."], "cat": "Cochlea & Organ of Corti", "source": "L23 - The Ear (cochlear membranes)", "obj": "Vestibular + basilar membranes divide cochlea", "c": 2}, {"q": "Which cochlear compartment is the MIDDLE one, is filled with endolymph, and is also called the scala media?", "o": ["The scala vestibuli", "The scala tympani", "The cochlear duct", "The helicotrema"], "r": ["The scala vestibuli is the upper compartment, filled with perilymph.", "The scala tympani is the lower compartment, filled with perilymph.", "Correct. Maini says the middle compartment is the cochlear duct (scala media), filled with endolymph and carrying the organ of Corti on the basilar membrane.", "The helicotrema is the apical connection, not a compartment."], "cat": "Cochlea & Organ of Corti", "source": "L23 - The Ear (cochlear duct)", "obj": "Cochlear duct = scala media, endolymph", "c": 2}, {"q": "The scala vestibuli and scala tympani are both filled with which fluid?", "o": ["Endolymph", "Cerebrospinal fluid", "Aqueous humor", "Perilymph"], "r": ["Endolymph fills the cochlear duct (scala media), not these two.", "CSF is not the cochlear scalae fluid.", "Aqueous humor is in the eye.", "Correct. Maini confirms both the scala vestibuli (upper) and scala tympani (lower) contain perilymph, while the cochlear duct holds endolymph."], "cat": "Cochlea & Organ of Corti", "source": "L23 - The Ear (scala fluids)", "obj": "Scala vestibuli + tympani = perilymph", "c": 3}, {"q": "The organ of Corti (spiral organ), which contains the hearing receptors, is mounted on which membrane?", "o": ["The vestibular membrane", "The tectorial membrane", "The otolithic membrane", "The basilar membrane"], "r": ["The vestibular membrane forms the roof of the cochlear duct, not the base for the organ of Corti.", "The tectorial membrane overlies the hair cells but is not what they are mounted on.", "The otolithic membrane belongs to the maculae, not the cochlea.", "Correct. Maini says the organ of Corti sits on the basilar membrane; its hair cells are the receptors for hearing."], "cat": "Cochlea & Organ of Corti", "source": "L23 - The Ear (organ of Corti)", "obj": "Organ of Corti - on basilar membrane", "c": 3}, {"q": "The auditory receptor cells in the organ of Corti are called:", "o": ["Hair cells", "Rod cells", "Chief cells", "Purkinje cells"], "r": ["Correct. Maini says the receptors are hair cells, named for the cilia on their apical surfaces.", "Rod cells are photoreceptors in the retina.", "Chief cells are found in the stomach and parathyroid.", "Purkinje cells are cerebellar neurons."], "cat": "Cochlea & Organ of Corti", "source": "L23 - The Ear (hair cells)", "obj": "Hair cells - auditory receptors", "c": 0}, {"q": "The gelatinous membrane in which the cilia of the cochlear hair cells are embedded is the:", "o": ["Basilar membrane", "Vestibular membrane", "Otolithic membrane", "Tectorial membrane"], "r": ["The basilar membrane supports the organ of Corti but is not where the cilia embed.", "The vestibular membrane forms the roof of the cochlear duct.", "The otolithic membrane belongs to the maculae of the utricle and saccule.", "Correct. Maini describes the tectorial membrane as the fixed gelatinous membrane; when the basilar membrane vibrates, the embedded cilia are distorted against it, generating action potentials."], "cat": "Cochlea & Organ of Corti", "source": "L23 - The Ear (tectorial membrane)", "obj": "Tectorial membrane - gelatinous, over hair cells", "hint": "It is fixed and does not move, so the cilia get bent against it.", "c": 3}, {"q": "The apical communication where the scala vestibuli and scala tympani are continuous is called the:", "o": ["Aditus", "Helicotrema", "Aqueduct of the vestibule", "Round window"], "r": ["The aditus connects the middle ear to the mastoid antrum.", "Correct. Maini names the apical communication the helicotrema ('heliko' = helix, 'trema' = top).", "The aqueduct of the vestibule connects the vestibule to the posterior cranial fossa.", "The round window is the basal end of the scala tympani, not the apical link."], "cat": "Cochlea & Organ of Corti", "source": "L23 - The Ear (helicotrema)", "obj": "Helicotrema - apical scala vestibuli/tympani link", "c": 1}, {"q": "The round window (fenestra cochlea), which marks the end of the scala tympani, is closed by the:", "o": ["Footplate of the stapes", "Secondary tympanic membrane", "Tectorial membrane", "Basilar membrane"], "r": ["The stapes footplate closes the OVAL window, not the round window.", "Correct. Maini says the round window is closed by the secondary tympanic membrane, against which pressure waves finally cease.", "The tectorial membrane is a gelatinous membrane over the organ of Corti.", "The basilar membrane divides the cochlear compartments; it does not close the round window."], "cat": "Cochlea & Organ of Corti", "source": "L23 - The Ear (round window)", "obj": "Round window - closed by secondary tympanic membrane", "c": 1}, {"q": "In the spiral ganglion lie bipolar nerve cells. Their axonal processes form which nerve?", "o": ["The vestibular branch of CN VIII", "The facial nerve (VII)", "The tympanic branch of CN IX", "The cochlear branch of the vestibulocochlear nerve (VIII)"], "r": ["The vestibular branch carries balance information from the maculae/cristae, not hearing from the organ of Corti.", "The facial nerve is motor/secretomotor/taste, not the cochlear afferent.", "The tympanic branch of IX forms the tympanic plexus, unrelated to the spiral ganglion.", "Correct. Maini says the bipolar cells' dendrites end around the hair cells and their axons form the cochlear branch of the 8th nerve."], "cat": "Cochlea & Organ of Corti", "source": "L23 - The Ear (spiral ganglion neurons)", "obj": "Spiral ganglion axons - cochlear nerve (VIII)", "c": 3}, {"q": "The vestibulocochlear nerve (CN VIII) has two divisions. Which division is concerned with HEARING?", "o": ["The vestibular division", "The cochlear division", "The tympanic division", "The chorda tympani division"], "r": ["The vestibular division serves balance, not hearing.", "Correct. Maini says the cochlear division is concerned with hearing, while the vestibular division serves equilibrium/balance.", "There is no 'tympanic division' of CN VIII.", "The chorda tympani is a branch of the facial nerve, not CN VIII."], "cat": "Cochlea & Organ of Corti", "source": "L23 - The Ear (CN VIII divisions)", "obj": "Cochlear division - hearing; vestibular - balance", "c": 1}, {"q": "Maini describes how the cochlea codes pitch. Low-frequency sounds stimulate the basilar membrane in which region?", "o": ["Near the apex, close to the helicotrema", "Near the base, close to the oval window", "Uniformly along its entire length", "Only at the round window"], "r": ["Correct. Maini says low-frequency sounds strike the basilar membrane close to the helicotrema (apex), whereas high-frequency sounds act near the base.", "High-frequency (not low-frequency) sounds act near the base.", "The response is tonotopic (position-dependent), not uniform.", "The round window is where pressure waves dissipate, not a pitch-coding site."], "cat": "Cochlea & Organ of Corti", "source": "L23 - The Ear (frequency coding)", "obj": "Tonotopy - low freq near apex/helicotrema, high near base", "c": 0}, {"q": "Trace the correct route of vibration once sound reaches the tympanic membrane.", "o": ["Tympanic membrane -> stapes -> incus -> malleus -> round window", "Oval window -> stapes -> incus -> malleus -> tympanic membrane", "Tympanic membrane -> malleus -> incus -> stapes -> footplate at oval window -> perilymph", "Tympanic membrane -> incus -> malleus -> stapes -> round window"], "r": ["This reverses the ossicular order and ends at the wrong window.", "This is backwards - vibration travels from the eardrum inward, not from the oval window out.", "Correct. Maini says TM vibration passes to malleus, incus, stapes, then the stapes footplate at the oval window sets the inner-ear perilymph into motion.", "The incus does not precede the malleus, and the pathway enters the oval (not round) window."], "cat": "Sound Conduction Pathway", "source": "L22/L23 - The Ear (conduction pathway)", "obj": "Conduction chain - TM to oval window", "c": 2}, {"q": "After the stapes footplate vibrates at the oval window, the pressure waves travel through the perilymph of the scala vestibuli, over the helicotrema, and into the scala tympani. Where do they finally dissipate?", "o": ["At the round window, against the secondary tympanic membrane", "At the oval window, against the stapes", "At the tectorial membrane", "At the modiolus"], "r": ["Correct. Maini says the waves travel scala vestibuli -> helicotrema -> scala tympani, then strike and cease against the secondary tympanic membrane of the round window.", "The oval window is the entry point, not where waves dissipate.", "The tectorial membrane is a fixed gelatinous membrane, not the dissipation point.", "The modiolus is the bony core, not where pressure waves end."], "cat": "Sound Conduction Pathway", "source": "L23 - The Ear (pressure wave path)", "obj": "Pressure waves dissipate at round window", "c": 0}, {"q": "According to Maini, what is the immediate mechanical event that triggers an action potential in the cochlear hair cells?", "o": ["Bending/distortion of the hair-cell cilia against the fixed tectorial membrane as the basilar membrane vibrates", "Contraction of the stapedius pulling the stapes", "Movement of otoliths in the otolithic membrane", "Opening of the auditory tube"], "r": ["Correct. Maini explains the vibrating basilar membrane moves the hair cells, but the cilia embedded in the fixed tectorial membrane get distorted - bending them triggers the action potential.", "Stapedius contraction dampens sound; it does not trigger receptor potentials.", "Otolith movement stimulates the maculae (balance), not the cochlear hair cells.", "The auditory tube handles pressure equalization, not receptor activation."], "cat": "Sound Conduction Pathway", "source": "L23 - The Ear (hair-cell transduction)", "obj": "Cilia distortion vs tectorial membrane -> action potential", "c": 0}, {"q": "The bony vestibule (about 5 mm) contains which two membranous sacs?", "o": ["The utricle and the saccule", "The cochlear duct and the endolymphatic sac", "The ampulla and the cupula", "The scala media and the helicotrema"], "r": ["Correct. Maini says the vestibule contains the utricle (larger) and saccule (smaller).", "The cochlear duct is in the cochlea; the endolymphatic sac lies at the end of the endolymphatic duct.", "The ampulla and cupula belong to the semicircular ducts.", "The scala media and helicotrema are cochlear features."], "cat": "Vestibule - Utricle & Saccule", "source": "L23 - The Ear (vestibule contents)", "obj": "Vestibule - utricle + saccule", "c": 0}, {"q": "The utricle and saccule (and their maculae) are chiefly concerned with which type of sensation?", "o": ["Angular (rotational) acceleration", "Hearing (pitch discrimination)", "Pressure equalization", "Static equilibrium and linear acceleration/deceleration"], "r": ["Angular/rotational acceleration is sensed by the semicircular ducts (crista ampullaris).", "Hearing is the cochlear duct's role.", "Pressure equalization is the auditory tube's role.", "Correct. Maini says the utricle and saccule sense static equilibrium and linear acceleration/deceleration (e.g., a car starting, or an elevator)."], "cat": "Vestibule - Utricle & Saccule", "source": "L23 - The Ear (utricle/saccule function)", "obj": "Utricle/saccule - static equilibrium + linear motion", "c": 3}, {"q": "The vestibule connects with the posterior cranial fossa through which channel, which contains the endolymphatic duct?", "o": ["The aqueduct of the vestibule", "The internal acoustic meatus", "The helicotrema", "The aditus ad antrum"], "r": ["Correct. Maini says the aqueduct of the vestibule connects the vestibule with the posterior cranial fossa and contains the endolymphatic duct.", "The internal acoustic meatus transmits CN VII, VIII and labyrinthine vessels, not the endolymphatic duct as described.", "The helicotrema is the apical cochlear connection.", "The aditus ad antrum connects the middle ear to the mastoid antrum."], "cat": "Vestibule - Utricle & Saccule", "source": "L23 - The Ear (aqueduct of vestibule)", "obj": "Aqueduct of vestibule - contains endolymphatic duct", "c": 0}, {"q": "The sensory spot on the utricle or saccule is called the macula. What is the gelatinous membrane covering the maculae?", "o": ["The otolithic membrane (with otoliths)", "The tectorial membrane", "The cupula", "The basilar membrane"], "r": ["Correct. Maini says the macular hair-cell cilia are embedded in a gelatinous otolithic membrane containing tiny stones (otoliths).", "The tectorial membrane belongs to the organ of Corti (cochlea).", "The cupula belongs to the crista ampullaris of the semicircular ducts.", "The basilar membrane supports the organ of Corti."], "cat": "Vestibule - Utricle & Saccule", "source": "L23 - The Ear (otolithic membrane)", "obj": "Macula - otolithic membrane with otoliths", "c": 0}, {"q": "Maini describes macula UTRICULI as oriented horizontally and macula SACCULI as oriented vertically. What does macula sacculi therefore best detect?", "o": ["Horizontal forward movement in a car", "Rotation of the head to the side", "High-frequency sound", "Vertical linear acceleration/deceleration, e.g., in an elevator"], "r": ["Horizontal forward movement is best sensed by the horizontally oriented macula utriculi.", "Head rotation is sensed by the semicircular ducts, not the maculae.", "Sound is the cochlea's domain.", "Correct. Maini says the vertically oriented macula sacculi detects vertical linear acceleration/deceleration (like going up or down in an elevator)."], "cat": "Vestibule - Utricle & Saccule", "source": "L23 - The Ear (macular orientation)", "obj": "Macula sacculi (vertical) - vertical linear motion", "c": 3}, {"q": "The utricle and saccule communicate with each other through a small duct that connects to the endolymphatic duct and sac. What is this connecting duct?", "o": ["The cochlear duct", "The semicircular duct", "The utriculosaccular duct", "The perilymphatic duct"], "r": ["The cochlear duct is the membranous part of the cochlea.", "The semicircular ducts occupy the semicircular canals.", "Correct. Maini names the utriculosaccular duct, which links to the endolymphatic duct and endolymphatic sac.", "Maini does not describe a 'perilymphatic duct' connecting the utricle and saccule."], "cat": "Vestibule - Utricle & Saccule", "source": "L23 - The Ear (utriculosaccular duct)", "obj": "Utriculosaccular duct - links to endolymphatic sac", "c": 2}, {"q": "How many semicircular canals are there in each ear, and how are they oriented relative to one another?", "o": ["Two, oriented parallel to each other", "Three, oriented at right angles (90 degrees) to each other", "Three, all oriented horizontally", "Four, oriented at 45 degrees"], "r": ["There are three, not two, and they are not parallel.", "Correct. Maini says there are three semicircular canals per ear, set at right angles to each other so they detect head rotation in different planes.", "They lie in three different planes, not all horizontal.", "There are three, not four, at 90 degrees."], "cat": "Semicircular Canals & Ducts", "source": "L23 - The Ear (semicircular canals)", "obj": "Three SCC at right angles", "c": 1}, {"q": "The semicircular ducts (and their cristae) sense which type of motion?", "o": ["Angular / rotational acceleration (dynamic equilibrium)", "Static head position", "Linear acceleration in a straight line", "Sound frequency"], "r": ["Correct. Maini says the semicircular ducts inform the brain about direction changes during head rotation - angular motion and dynamic equilibrium.", "Static head position is sensed by the maculae of the utricle/saccule.", "Linear acceleration is sensed by the maculae, not the semicircular ducts.", "Sound frequency is coded in the cochlea."], "cat": "Semicircular Canals & Ducts", "source": "L23 - The Ear (semicircular duct function)", "obj": "Semicircular ducts - angular motion, dynamic equilibrium", "c": 0}, {"q": "Maini flags this as a board-style question: to name the semicircular canals you orient them to which reference surface?", "o": ["The posterior surface of the petrous portion of the temporal bone", "The floor of the middle cranial fossa", "The lateral wall of the orbit", "The anterior surface of the sphenoid body"], "r": ["Correct. Maini repeatedly says you determine anterior/posterior/lateral canals relative to the posterior surface of the petrous portion of the temporal bone.", "The middle cranial fossa floor is not the reference she gives.", "The orbital wall is unrelated to the semicircular canals.", "The sphenoid body is not the reference surface for the canals."], "cat": "Semicircular Canals & Ducts", "source": "L23/L30 - The Ear (SCC orientation)", "profTip": "Maini: 'I have seen these questions in your board exams... make sure that you know the orientation.'", "obj": "SCC named relative to posterior petrous surface", "c": 0}, {"q": "Relative to the posterior surface of the petrous temporal bone, how is the ANTERIOR semicircular canal oriented?", "o": ["At a right angle to that surface", "Along (in the long axis of) that surface", "Horizontally", "Parallel to the tympanic membrane"], "r": ["Correct. Maini says the anterior semicircular canal lies at a right angle to the posterior surface of the petrous temporal bone.", "The POSTERIOR canal lies along the long axis of that surface.", "The LATERAL canal is oriented horizontally.", "None of the canals is defined relative to the tympanic membrane."], "cat": "Semicircular Canals & Ducts", "source": "L23 - The Ear (anterior SCC)", "obj": "Anterior SCC - right angle to petrous surface", "c": 0}, {"q": "Relative to the same petrous surface, how is the POSTERIOR semicircular canal oriented?", "o": ["At a right angle to that surface", "Horizontally", "Vertically toward the orbit", "Along the long axis of (in line with) that surface"], "r": ["Being at a right angle describes the ANTERIOR canal.", "Being horizontal describes the LATERAL canal.", "No canal is oriented toward the orbit.", "Correct. Maini says the posterior canal lies along the surface (in its long axis), while the anterior is at a right angle and the lateral is horizontal."], "cat": "Semicircular Canals & Ducts", "source": "L23 - The Ear (posterior SCC)", "obj": "Posterior SCC - along the petrous surface", "c": 3}, {"q": "How is the LATERAL semicircular canal oriented?", "o": ["At a right angle to the petrous surface", "Horizontally", "Vertically along the petrous surface", "In the sagittal plane"], "r": ["Being at a right angle to the surface describes the anterior canal.", "Correct. Maini says the lateral semicircular canal is oriented horizontally.", "Being along/vertical to the surface describes the posterior canal.", "The lateral canal is horizontal, not strictly sagittal."], "cat": "Semicircular Canals & Ducts", "source": "L23 - The Ear (lateral SCC)", "obj": "Lateral SCC - horizontal", "c": 1}, {"q": "Each semicircular duct has a dilated end. What is this dilation called?", "o": ["The utricle", "The ampulla", "The helicotrema", "The vestibule"], "r": ["The utricle is a separate membranous sac in the vestibule.", "Correct. Maini says the dilated end of each semicircular duct is the ampulla, which houses the crista ampullaris.", "The helicotrema is the apical cochlear connection.", "The vestibule is the central bony chamber, not the duct's dilation."], "cat": "Semicircular Canals & Ducts", "source": "L23 - The Ear (ampulla)", "obj": "Ampulla - dilated end of semicircular duct", "c": 1}, {"q": "Inside each ampulla is the sensory organ for dynamic (rotational) equilibrium. What is it called?", "o": ["The macula", "The crista ampullaris", "The organ of Corti", "The spiral ganglion"], "r": ["The maculae are the sensory organs of the utricle and saccule.", "Correct. Maini names the crista ampullaris as the sensory organ inside each ampulla for angular/rotational motion.", "The organ of Corti is the hearing receptor in the cochlea.", "The spiral ganglion holds cochlear neuron cell bodies."], "cat": "Semicircular Canals & Ducts", "source": "L23 - The Ear (crista ampullaris)", "obj": "Crista ampullaris - sensory organ for rotation", "c": 1}, {"q": "The hair cells of the crista ampullaris are embedded in which gelatinous structure?", "o": ["The otolithic membrane", "The tectorial membrane", "The basilar membrane", "The cupula"], "r": ["The otolithic membrane covers the maculae, not the crista.", "The tectorial membrane belongs to the organ of Corti.", "The basilar membrane supports the organ of Corti.", "Correct. Maini says the crista's hair cells are embedded in a gelatinous cupula; when the head rotates, the cupula moves and distorts the cilia."], "cat": "Semicircular Canals & Ducts", "source": "L23 - The Ear (cupula)", "obj": "Crista ampullaris - cupula", "c": 3}, {"q": "Maini summarizes the three inner-ear sensory organs and their gelatinous membranes. Which pairing is CORRECT?", "o": ["Organ of Corti -> tectorial membrane; macula -> otolithic membrane; crista ampullaris -> cupula", "Organ of Corti -> cupula; macula -> tectorial membrane; crista -> otolithic", "Organ of Corti -> otolithic; macula -> cupula; crista -> tectorial", "All three use the same tectorial membrane"], "r": ["Correct. Maini's summary: organ of Corti = tectorial membrane; macula (utriculi/sacculi) = otolithic membrane; crista ampullaris = cupula.", "These pairings are scrambled.", "These pairings are scrambled.", "Each sensory organ has its own distinct gelatinous membrane."], "cat": "Semicircular Canals & Ducts", "source": "L23/L30 - The Ear (sensory organ summary)", "profTip": "Maini reviewed all three organ-membrane pairs in the final exam review.", "obj": "Gelatinous membranes - Corti/macula/crista", "c": 0}, {"q": "The internal acoustic meatus opens on which surface of the temporal bone?", "o": ["The squamous portion", "The mastoid process", "The tympanic plate", "The posteromedial part of the petrous portion"], "r": ["The squamous portion is the flat lateral part.", "The mastoid process is posterior and inferior, not the IAM opening.", "The tympanic plate forms part of the external meatus, not the IAM.", "Correct. Maini says the internal acoustic meatus opens in the posteromedial part of the petrous portion of the temporal bone."], "cat": "Nerves & Vessels of the Ear", "source": "L23 - The Ear (internal acoustic meatus)", "obj": "IAM - posteromedial petrous temporal", "c": 3}, {"q": "Which structures pass through the internal acoustic meatus?", "o": ["Cranial nerves IX, X, and XI", "Cranial nerves VII and VIII plus the labyrinthine artery and vein", "The chorda tympani and the tympanic nerve", "The maxillary artery and the middle meningeal artery"], "r": ["CN IX-XI exit through the jugular foramen, not the IAM.", "Correct. Maini lists CN VII (facial), CN VIII (vestibulocochlear), and the labyrinthine artery and vein passing through the IAM.", "The chorda tympani and tympanic nerve travel within the middle ear region, not the IAM.", "These arteries do not pass through the internal acoustic meatus."], "cat": "Nerves & Vessels of the Ear", "source": "L23 - The Ear (IAM contents)", "obj": "IAM transmits CN VII, VIII + labyrinthine vessels", "c": 1}, {"q": "Cranial nerves VI, VII, and VIII share a common entry/exit landmark on the brainstem. What is it?", "o": ["The pontomedullary sulcus (junction)", "The cerebral peduncle", "The interpeduncular fossa", "The pineal recess"], "r": ["Correct. Maini says CN VI, VII, and VIII enter/exit the brainstem at the pontomedullary sulcus.", "The cerebral peduncles are midbrain structures (associated with CN III nearby).", "The interpeduncular fossa is where CN III emerges.", "The pineal recess is unrelated to these nerves."], "cat": "Nerves & Vessels of the Ear", "source": "L23 - The Ear (brainstem landmark)", "obj": "CN VI-VII-VIII at pontomedullary sulcus", "c": 0}, {"q": "The tympanic branch of the glossopharyngeal nerve (IX) enters the middle ear and forms a plexus over the promontory. What is this plexus, and what nerve leaves it?", "o": ["The tympanic plexus; the greater petrosal nerve exits toward the pterygopalatine ganglion", "The tympanic plexus; the lesser petrosal nerve exits toward the otic ganglion", "The pharyngeal plexus; the chorda tympani exits", "The cervical plexus; the great auricular nerve exits"], "r": ["The greater petrosal is a facial-nerve branch to the pterygopalatine ganglion, not from the tympanic plexus of IX.", "Correct. Maini says the tympanic branch of IX forms the tympanic plexus over the promontory, then re-condenses as the lesser petrosal nerve heading to the otic ganglion (then parotid via auriculotemporal).", "The chorda tympani is a facial branch and is not what exits the tympanic plexus.", "The great auricular nerve is a cervical-plexus branch, unrelated to the tympanic plexus."], "cat": "Nerves & Vessels of the Ear", "source": "L22 - The Ear (tympanic plexus)", "obj": "Tympanic plexus (IX) -> lesser petrosal -> otic ganglion", "c": 1}, {"q": "Maini notes that the facial nerve reaches the middle ear region by entering which passage?", "o": ["The stylomastoid foramen (entering the cavity)", "The internal acoustic meatus (then running in the facial canal)", "The jugular foramen", "The foramen ovale"], "r": ["The facial nerve EXITS the skull at the stylomastoid foramen; it does not enter the cavity there.", "Correct. Maini says the facial nerve enters through the internal acoustic meatus and then runs within the bony facial canal of the tympanic cavity.", "The jugular foramen transmits CN IX, X, XI.", "The foramen ovale transmits V3, not the facial nerve."], "cat": "Nerves & Vessels of the Ear", "source": "L23 - The Ear (facial nerve entry)", "obj": "Facial nerve - enters via IAM, runs in facial canal", "c": 1}, {"q": "Maini groups Weber's test and Rinne's test as tests of what function?", "o": ["Vestibular (balance) function", "Hearing", "Facial motor function", "Taste"], "r": ["The caloric test - not Weber/Rinne - assesses vestibular function.", "Correct. Maini states Weber's and Rinne's are the tests for hearing, whereas the caloric test assesses vestibular function.", "Facial motor function is tested separately, not by Weber/Rinne.", "Taste testing is unrelated to Weber/Rinne."], "cat": "Hearing & Vestibular Tests", "source": "L30 - The Ear (hearing tests)", "profTip": "Maini: 'Make sure that you know about these tests.'", "obj": "Weber + Rinne - hearing tests", "c": 1}, {"q": "In the caloric test, described by Maini, the ear is irrigated with warm and cold water alternately. What function does this test assess?", "o": ["Cochlear hearing thresholds", "Middle-ear pressure", "Facial nerve conduction", "Vestibular (labyrinth/semicircular canal) function"], "r": ["Hearing thresholds are assessed by Weber/Rinne and audiometry, not caloric testing.", "Middle-ear pressure is assessed by tympanometry, not caloric testing.", "Facial nerve conduction is not what the caloric test evaluates.", "Correct. Maini says the caloric test irrigates the ear with warm and cold water and is a test of vestibular function (the vestibular apparatus)."], "cat": "Hearing & Vestibular Tests", "source": "L30 - The Ear (caloric test)", "quote": "[Maini] 'In caloric test, you irrigate your ear with warm and cold water... caloric test is for the test of vestibular function.'", "profTip": "Maini said she would ask WHY the test is done (its purpose), not the specific response.", "obj": "Caloric test - vestibular function", "c": 3}, {"q": "Why does Maini say a SPONTANEOUS tympanic membrane rupture (from untreated middle-ear collection) heals poorly compared with a surgical myringotomy?", "o": ["A spontaneous rupture has serrated (irregular) margins and may not heal properly", "It always destroys the ossicles", "It cannot be seen on otoscopy", "It converts the pars tensa into pars flaccida"], "r": ["Correct. Maini says a spontaneous rupture leaves less-clean, serrated margins that heal poorly, whereas a controlled myringotomy incision heals without a scar.", "Spontaneous rupture does not necessarily destroy the ossicles.", "A rupture is visible on otoscopy.", "Rupture does not convert one region of the membrane into another."], "cat": "Ear - Clinical", "source": "L22 - The Ear (TM rupture vs myringotomy)", "obj": "Spontaneous TM rupture - serrated margins, poor healing", "c": 0}, {"q": "Maini notes that a ruptured, thickened, or fibrosed tympanic membrane leads to what functional problem?", "o": ["Vertigo", "Loss of taste", "Hearing impairment", "Facial paralysis"], "r": ["Vertigo arises from vestibular dysfunction, not a scarred eardrum.", "Loss of taste relates to chorda tympani/facial nerve, not the eardrum itself.", "Correct. Maini says if the eard
