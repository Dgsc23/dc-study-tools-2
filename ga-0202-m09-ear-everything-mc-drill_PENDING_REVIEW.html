rum loses its proper membranous structure (ruptured, thickened, or fibrosed) the patient has hearing impairment.", "Facial paralysis relates to the facial nerve, not TM fibrosis."], "cat": "Ear - Clinical", "source": "L22 - The Ear (TM pathology)", "obj": "TM damage -> conductive hearing impairment", "c": 2}, {"q": "Maini explains ear symptoms during airplane takeoff/landing. When cabin pressure changes, how is the pressure across the tympanic membrane restored?", "o": ["By yawning or a Valsalva maneuver, forcing air through the auditory tube to equalize pressure", "By contracting the stapedius to stiffen the eardrum", "By secreting more cerumen", "By draining endolymph through the round window"], "r": ["Correct. Maini says yawning or a Valsalva maneuver pushes air through the auditory tube to equalize the pressure on the two sides of the tympanic membrane, restoring hearing.", "Stapedius contraction dampens loud sound; it does not equalize pressure.", "Cerumen has no role in pressure equalization.", "Endolymph is not drained through the round window to equalize pressure."], "cat": "Auditory Tube (Pharyngotympanic)", "source": "L22 - The Ear (pressure equalization)", "obj": "Auditory tube - Valsalva/yawn equalizes pressure", "c": 0}, {"q": "Maini mentions that prolonged flu can block the auditory tube. What voice change results?", "o": ["Complete aphonia (loss of voice)", "A hoarse, breathy voice", "A nasal twang in the voice", "Hypernasal speech from a cleft palate"], "r": ["Aphonia (total voice loss) is a laryngeal problem, not tube blockage.", "Hoarseness relates to the vocal folds/larynx.", "Correct. Maini says secretions blocking the tube during a long bout of flu produce a nasal twang in the voice.", "Cleft-palate hypernasality is a structural palatal defect, unrelated to tube blockage from flu."], "cat": "Ear - Clinical", "source": "L22 - The Ear (auditory tube blockage)", "obj": "Auditory tube block -> nasal twang", "c": 2}, {"q": "Maini says the base of the cochlea presses on the medial wall of the middle ear. Which two openings (windows) also lie on that medial wall?", "o": ["The aditus and the auditory tube opening", "The two openings of the anterior wall", "The oval window (fenestra vestibuli) and the round window (fenestra cochlea)", "The helicotrema and the aqueduct of vestibule"], "r": ["The aditus is on the posterior wall; the auditory tube opening is on the anterior wall.", "The anterior wall carries the tube and tensor tympani openings, not these windows.", "Correct. Maini identifies the fenestra vestibuli (oval window) and fenestra cochlea (round window) on the medial wall, along with the promontory.", "The helicotrema and aqueduct of vestibule are internal-ear features, not medial-wall windows."], "cat": "Middle Ear - Walls & Cavity", "source": "L22/L23 - The Ear (medial wall windows)", "obj": "Medial wall - oval and round windows", "c": 2}, {"q": "The osseous spiral lamina is best described as:", "o": ["The gelatinous membrane over the hair cells", "The membrane closing the round window", "A thread/shelf of bone spiraling around the modiolus", "The bony core of the cochlea itself"], "r": ["The gelatinous membrane over the hair cells is the tectorial membrane.", "The round window is closed by the secondary tympanic membrane.", "Correct. Maini likens the osseous spiral lamina to the thread of a screw - a spiral shelf of bone projecting from the modiolus.", "The bony core itself is the modiolus; the spiral lamina projects from it."], "cat": "Cochlea & Organ of Corti", "source": "L23 - The Ear (osseous spiral lamina)", "obj": "Osseous spiral lamina - bony thread around modiolus", "c": 2}, {"q": "Maini says structures such as the spiral ganglion and spiral lamina are named 'spiral' because of what?", "o": ["Their spinning motion during sound", "The spiral (coiled) arrangement of the cochlear duct", "Their location in the semicircular canals", "Their helical blood supply"], "r": ["They do not spin during sound transmission.", "Correct. Maini explains the 'spiral' names derive from the spiral arrangement of the coiled cochlear duct.", "They are cochlear, not semicircular-canal, structures.", "The naming reflects the coiled cochlea, not a helical blood supply."], "cat": "Cochlea & Organ of Corti", "source": "L23 - The Ear (spiral nomenclature)", "obj": "'Spiral' names - from coiled cochlea", "c": 1}, {"q": "Which membrane forms the ROOF of the cochlear duct (separating it from the scala vestibuli)?", "o": ["The vestibular membrane", "The basilar membrane", "The tectorial membrane", "The secondary tympanic membrane"], "r": ["Correct. Maini says the cochlear duct's roof is the vestibular membrane and its floor is the basilar membrane.", "The basilar membrane forms the FLOOR of the cochlear duct.", "The tectorial membrane lies over the organ of Corti within the duct, not as its roof.", "The secondary tympanic membrane closes the round window."], "cat": "Cochlea & Organ of Corti", "source": "L23 - The Ear (cochlear duct boundaries)", "obj": "Cochlear duct roof - vestibular membrane", "c": 0}, {"q": "Which statement about the utricle and saccule is correct, per Maini?", "o": ["The utricle is the larger sac; the saccule is the smaller sac", "The saccule is larger and lies in the cochlea", "Both lie within the semicircular canals", "The utricle lies in the cochlear duct"], "r": ["Correct. Maini says the utricle is the larger of the two sacs and the saccule is the smaller, both within the vestibule.", "The saccule is the smaller sac and lies in the vestibule, not the cochlea.", "Both lie in the vestibule, not the semicircular canals.", "The utricle lies in the vestibule, not the cochlear duct."], "cat": "Vestibule - Utricle & Saccule", "source": "L23 - The Ear (utricle vs saccule)", "obj": "Utricle larger, saccule smaller (in vestibule)", "c": 0}, {"q": "The tiny calcium-carbonate stones embedded in the otolithic membrane of the maculae are called:", "o": ["Cerumen", "Cupulae", "Otoliths", "Ossicles"], "r": ["Cerumen is earwax in the external meatus.", "The cupula is the gelatinous mass of the crista, without stones.", "Correct. Maini says the otolithic membrane bears tiny stones (otoliths); their weight shifts the membrane and distorts the hair-cell cilia.", "Ossicles are the middle-ear bones."], "cat": "Vestibule - Utricle & Saccule", "source": "L23 - The Ear (otoliths)", "obj": "Otoliths - stones of the otolithic membrane", "hint": "'oto' = ear, 'lith' = stone.", "c": 2}, {"q": "Maini describes the membranous labyrinth's relationship to the bony labyrinth using a walnut/snail analogy. Which statement captures it?", "o": ["The membranous labyrinth is much larger and encloses the bone", "They are unrelated in shape", "The bony labyrinth floats freely inside the membranous labyrinth", "The membranous labyrinth follows the same shape/contour as the surrounding bony shell"], "r": ["The membranous labyrinth is the inner, smaller structure, not the enclosing one.", "They share the same contour, so they are closely related in shape.", "The membranous labyrinth sits inside the bony labyrinth, not vice versa.", "Correct. Maini compares it to a walnut: crack the hard bony shell and the softer membranous structure inside follows the same shape."], "cat": "Internal Ear - Labyrinth & Fluids", "source": "L23 - The Ear (labyrinth relationship)", "obj": "Membranous labyrinth follows bony contour", "c": 3}, {"q": "Which membranous structures lie within the semicircular canals?", "o": ["The utricle and saccule", "The semicircular ducts", "The cochlear duct", "The endolymphatic sac"], "r": ["The utricle and saccule lie in the vestibule.", "Correct. Maini says the semicircular ducts lie within the semicircular canals (as the utricle/saccule lie in the vestibule and the cochlear duct in the cochlea).", "The cochlear duct lies in the cochlea.", "The endolymphatic sac lies at the end of the endolymphatic duct, not within the canals."], "cat": "Semicircular Canals & Ducts", "source": "L23 - The Ear (membranous parts of SCC)", "obj": "Semicircular ducts - within semicircular canals", "c": 1}, {"q": "Maini contrasts the two windows of the medial wall. The stapes footplate vibrating at the oval window sets which fluid into motion FIRST?", "o": ["The endolymph of the cochlear duct", "The perilymph of the scala tympani directly", "The perilymph of the scala vestibuli", "The cerebrospinal fluid"], "r": ["The endolymph of the cochlear duct is moved secondarily as the membranes deform.", "The scala tympani perilymph is reached only after the helicotrema, not first.", "Correct. Maini says the vibrating footplate first sets up waves in the perilymph of the scala vestibuli, which then travel over the helicotrema.", "CSF is not the fluid set in motion by the stapes."], "cat": "Sound Conduction Pathway", "source": "L23 - The Ear (fluid set in motion)", "obj": "Stapes -> perilymph of scala vestibuli first", "c": 2}, {"q": "Maini repeatedly reminds students NOT to confuse the auditory tube with which other structure, since one is for pressure and the other conducts sound?", "o": ["The cochlear duct", "The facial canal", "The mastoid antrum", "The external acoustic meatus"], "r": ["The cochlear duct is an internal-ear structure not commonly confused with the tube here.", "The facial canal houses the facial nerve, not commonly confused with the tube.", "The mastoid antrum is the air space Maini links via the aditus, not the confusion she flags.", "Correct. Maini warns that students confuse the auditory tube (pressure equalization, opens to nasopharynx) with the external acoustic meatus (sound conduction, opens to the exterior)."], "cat": "Auditory Tube (Pharyngotympanic)", "source": "L22 - The Ear (common confusion)", "obj": "Auditory tube vs external acoustic meatus", "c": 3}, {"q": "Which of the following correctly matches an inner-ear sensory organ to the equilibrium it primarily serves?", "o": ["Crista ampullaris -> hearing; macula -> rot (function(){

    btn.onclick = function(){
      var now = ab.classList.toggle('collapsed');

      btn.textContent = now ? '▸' : '▾';
      btn.title = now ? 'Expand audio bar' : 'Minimize audio bar';

<script id="fab-ai-companion-js">
(function(){
  const ENDPOINT = "https://fab-ai.dgync1.workers.dev";
  const CLASS_NAME = "GA0202"; // e.g., "CP1" / "FAB101" / "GA0102" — empty = generic chiropractic tutor
  let panel = null;
  let history = []; // [{role:'user'|'model', content}]
  let currentQKey = null; // to detect Q navigation

  function readCurrentQ() {
    const qText = (document.querySelector('.q-text')?.innerText || '').replace(/^Q\d+(\s+of\s+\d+)?:\s*/, '');
    const optBtns = Array.from(document.querySelectorAll('.opt-btn'));
    const options = optBtns.map(b => {
      const clone = b.cloneNode(true);
      clone.querySelectorAll('.rationale').forEach(r => r.remove());
      clone.querySelectorAll('.letter').forEach(r => r.remove());
      return clone.innerText.trim();
    });
    let picked = null, correct = null;
    optBtns.forEach((b, i) => {
      if (b.classList.contains('picked-correct') || b.classList.contains('picked-wrong')) picked = i;
      if (b.classList.contains('picked-correct') || b.classList.contains('show-correct')) correct = i;
    });
    const profTip = document.querySelector('.prof-tip')?.innerText?.replace(/^Professor:\s*/i, '').trim() || '';
    const source = document.querySelector('.source-line')?.innerText?.replace(/^Source:\s*/i, '').trim() || '';
    const quote = document.querySelector('.quote-line')?.innerText?.trim() || '';
    return { question: qText, options, picked, correct, profTip, source, quote };
  }

  function qKey(ctx){ return (ctx.question || '') + '|' + (ctx.options || []).join('|'); }

  function mdToHtml(md){
    let html = md
      .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
      .replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>')
      .replace(/(^|\n)### (.+)/g, '$1<h3>$2</h3>')
      .replace(/`([^`]+)`/g, '<code>$1</code>')
      .replace(/^\s*[-*]\s+(.+)$/gm, '<li>$1</li>')
      .replace(/(<li>.*?<\/li>(\s*<li>.*?<\/li>)*)/gs, '<ul>$1</ul>');
    html = html.split(/\n{2,}/).map(p => {
      if (p.trim().startsWith('<ul') || p.trim().startsWith('<h3')) return p;
      if (p.trim() === '') return '';
      return '<p>' + p.replace(/\n/g, '<br>') + '</p>';
    }).join('');
    return html;
  }

  function stripForTts(text){
    // Remove markdown markers so TTS doesn't read them aloud
    return text
      .replace(/\*\*/g, '')
      .replace(/`([^`]+)`/g, '$1')
      .replace(/^\s*[-*]\s+/gm, '')
      .replace(/^#+\s+/gm, '')
      .replace(/\n{2,}/g, '. ')
      .replace(/\s+/g, ' ')
      .trim();
  }

  let currentUtter = null;
  function speakToggle(btn, rawText){
    if (!window.speechSynthesis) {
      alert('Your browser does not support text-to-speech.');
      return;
    }
    if (window.speechSynthesis.speaking && currentUtter && btn.classList.contains('playing')) {
      window.speechSynthesis.cancel();
      document.querySelectorAll('.fab-ai-tts-btn.playing').forEach(b => {
        b.classList.remove('playing');
        b.innerHTML = '🔊 Read';
      });
      currentUtter = null;
      return;
    }
    window.speechSynthesis.cancel();
    document.querySelectorAll('.fab-ai-tts-btn.playing').forEach(b => {
      b.classList.remove('playing');
      b.innerHTML = '🔊 Read';
    });
    const u = new SpeechSynthesisUtterance(stripForTts(rawText));
    const rateSel = btn.parentElement.querySelector('.fab-ai-tts-rate');
    u.rate = parseFloat(rateSel && rateSel.value || '1.0');
    /*ava-tts*/try{var _vs=(window.speechSynthesis&&window.speechSynthesis.getVoices())||[];var _av=_vs.find(function(v){return /microsoft.*ava.*natural/i.test(v.name);})||_vs.find(function(v){return /microsoft.*emma.*natural/i.test(v.name);})||_vs.find(function(v){return /google us english female/i.test(v.name);});if(_av){u.voice=_av;u.lang=_av.lang||'en-US';}}catch(e){}
    u.onend = () => {
      btn.classList.remove('playing');
      btn.innerHTML = '🔊 Read';
      currentUtter = null;
    };
    u.onerror = () => {
      btn.classList.remove('playing');
      btn.innerHTML = '🔊 Read';
      currentUtter = null;
    };
    currentUtter = u;
    btn.classList.add('playing');
    btn.innerHTML = '⏹ Stop';
    window.speechSynthesis.speak(u);
  }

  function appendMsg(role, text) {
    const body = document.getElementById('fabAiBody');
    if (!body) return null;
    const wrap = document.createElement('div');
    wrap.className = 'fab-ai-msg ' + role;
    const bub = document.createElement('div');
    bub.className = 'fab-ai-bubble';
    if (role === 'ai') {
      bub.innerHTML = mdToHtml(text);
      // Add TTS row
      const row = document.createElement('div');
      row.className = 'fab-ai-tts-row';
      const btn = document.createElement('button');
      btn.className = 'fab-ai-tts-btn';
      btn.innerHTML = '🔊 Read';
      btn.onclick = function(){ speakToggle(btn, text); };
      const rate = document.createElement('select');
      rate.className = 'fab-ai-tts-rate';
      rate.title = 'Reading speed';
      ['0.8','1.0','1.2','1.5','2.0'].forEach(function(r){
        const o = document.createElement('option');
        o.value = r; o.textContent = r + 'x';
        if (r === '1.0') o.selected = true;
        rate.appendChild(o);
      });
      row.appendChild(btn);
      row.appendChild(rate);
      bub.appendChild(row);
    } else {
      bub.textContent = text;
    }
    wrap.appendChild(bub);
    body.appendChild(wrap);
    body.scrollTop = body.scrollHeight;
    return bub;
  }

  function appendLoading(){
    const body = document.getElementById('fabAiBody');
    if (!body) return null;
    const wrap = document.createElement('div');
    wrap.className = 'fab-ai-msg ai';
    wrap.id = 'fabAiLoading';
    const bub = document.createElement('div');
    bub.className = 'fab-ai-bubble';
    bub.innerHTML = '<div class="fab-ai-loading"><div class="fab-ai-spinner"></div> Thinking...</div>';
    wrap.appendChild(bub);
    body.appendChild(wrap);
    body.scrollTop = body.scrollHeight;
    return wrap;
  }

  function removeLoading(){
    const el = document.getElementById('fabAiLoading');
    if (el) el.remove();
  }

  function appendStatus(text, isErr){
    const body = document.getElementById('fabAiBody');
    if (!body) return;
    const div = document.createElement('div');
    div.className = 'fab-ai-status' + (isErr ? ' err' : '');
    div.innerHTML = text;
    body.appendChild(div);
    body.scrollTop = body.scrollHeight;
  }

  function renderSuggestions(ctx){
    const body = document.getElementById('fabAiBody');
    if (!body) return;
    // Q preview at top
    if (ctx.question) {
      const qp = document.createElement('div');
      qp.className = 'fab-ai-qpreview';
      qp.innerHTML = '<b>Q:</b> ' + ctx.question.substring(0, 240) + (ctx.question.length > 240 ? '...' : '');
      body.appendChild(qp);
    }
    // Suggestion chips
    const sug = document.createElement('div');
    sug.className = 'fab-ai-suggestions';
    const chips = [];
    if (ctx.picked === null || ctx.picked === undefined) {
      chips.push({ label: '💡 Give me a hint', q: 'Give me a hint for this question without revealing the answer.' });
      chips.push({ label: '🧠 Explain the concept', q: 'Explain the core concept this question is testing.' });
    } else if (ctx.picked !== ctx.correct && ctx.picked !== null) {
      chips.push({ label: '❌ Why did I miss this?', q: 'I picked the wrong answer. Walk me through why my pick is wrong and why the correct answer is right.' });
      chips.push({ label: '🧠 Explain the concept', q: 'Explain the concept this question is testing in simpler terms.' });
      chips.push({ label: '🎯 Give me a mnemonic', q: 'Give me a memorable mnemonic for this topic.' });
    } else if (ctx.picked === ctx.correct) {
      chips.push({ label: '✅ Why is this right?', q: 'Confirm why the correct answer is right and flag any trap distractors to watch for.' });
      chips.push({ label: '🎯 Give me a mnemonic', q: 'Give me a memorable mnemonic for this topic.' });
    }
    chips.push({ label: '🌟 Use an analogy', q: 'Explain this with a dumbed-down analogy.' });
    chips.forEach(c => {
      const btn = document.createElement('button');
      btn.className = 'fab-ai-sug';
      btn.textContent = c.label;
      btn.onclick = () => sendMessage(c.q);
      sug.appendChild(btn);
    });
    body.appendChild(sug);
  }

  function clearChat(preserveCtx){
    const body = document.getElementById('fabAiBody');
    if (body) body.innerHTML = '';
    history = [];
    if (preserveCtx) {
      const ctx = readCurrentQ();
      renderSuggestions(ctx);
    }
  }

  function openPanel() {
    if (!panel) panel = buildPanel();
    panel.classList.add('open');
    const ctx = readCurrentQ();
    const key = qKey(ctx);
    if (key !== currentQKey) {
      // Q changed — reset chat and show suggestions for new Q
      currentQKey = key;
      clearChat(true);
    }
  }

  function buildPanel() {
    const el = document.createElement('div');
    el.className = 'fab-ai-panel';
    el.innerHTML = '<div class="fab-ai-header">'
      + '<h3>🩺 Study Tutor</h3>'
      + '<button class="fab-ai-hdr-btn" onclick="fabAiClear()">Clear</button>'
      + '<button class="fab-ai-close" onclick="fabAiClose()">×</button>'
      + '</div>'
      + '<div class="fab-ai-body" id="fabAiBody"></div>'
      + '<div class="fab-ai-followup">'
      + '<button class="fab-ai-mini-close" title="Close panel" onclick="fabAiClose()">×</button>'
      + '<textarea id="fabAiFollowup" placeholder="Ask a question about this Q..." rows="1" onkeydown="if(event.keyCode===13&&!event.shiftKey){event.preventDefault();fabAiFollowupSend();}"></textarea>'
      + '<button onclick="fabAiFollowupSend()">Send</button>'
      + '</div>';
    document.body.appendChild(el);
    return el;
  }

  window.fabAiClose = function(){ if(panel) panel.classList.remove('open'); };
  window.fabAiClear = function(){ clearChat(true); };

  async function callWorker(payload) {
    if (!ENDPOINT) return { clipboardFallback: true };
    try {
      const res = await fetch(ENDPOINT, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload),
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.error || ('HTTP ' + res.status));
      return { reply: data.reply };
    } catch (e) {
      return { error: String(e.message || e) };
    }
  }

  function clipboardFallback(ctx, userQ) {
    const letter = (i) => String.fromCharCode(65 + i);
    let prompt = "I'm studying GA 0202 (Gross Anatomy) with Dr. Maini at SCUHS. Drill question:\n\n";
    prompt += 'Q: ' + ctx.question + '\n\n';
    if (ctx.options && ctx.options.length) {
      ctx.options.forEach((o, i) => {
        const m = [];
        if (i === ctx.picked) m.push('PICKED');
        if (i === ctx.correct) m.push('CORRECT');
        prompt += letter(i) + '. ' + o + (m.length ? ' ('+m.join(', ')+')' : '') + '\n';
      });
      prompt += '\n';
    }
    if (ctx.profTip) prompt += 'DRILL TIP: ' + ctx.profTip + '\n\n';
    if (userQ) prompt += 'MY QUESTION: ' + userQ + '\n\n';
    prompt += 'Explain using a dumbed-down analogy + mnemonic.';
    navigator.clipboard.writeText(prompt).then(() => {
      appendStatus('✓ Prompt copied to clipboard. Backend not configured yet — paste into your AI chat.');
    }).catch(() => {
      appendStatus('Could not copy. Please select manually.', true);
    });
  }

  async function sendMessage(userText) {
    const ctx = readCurrentQ();
    currentQKey = qKey(ctx);
    appendMsg('user', userText);
    history.push({ role: 'user', content: userText });
    appendLoading();

    const payload = Object.assign({}, ctx, {
      userQuestion: userText,
      history: history.slice(-10), // last 10 turns for context
      className: CLASS_NAME, // worker uses this to load class-specific knowledge
    });
    const result = await callWorker(payload);
    removeLoading();
    if (result.clipboardFallback) {
      clipboardFallback(ctx, userText);
      return;
    }
    if (result.error) {
      appendStatus('Error: ' + result.error, true);
      return;
    }
    appendMsg('ai', result.reply);
    history.push({ role: 'model', content: result.reply });
  }

  window.fabAiFollowupSend = function() {
    const ta = document.getElementById('fabAiFollowup');
    const q = (ta && ta.value || '').trim();
    if (!q) return;
    ta.value = '';
    sendMessage(q);
  };

  // Button install — opens panel, does NOT auto-call AI
  function install() {
    if (document.getElementById('fabAiBtn')) return;
    const btn = document.createElement('button');
    btn.className = 'fab-ai-btn';
    btn.id = 'fabAiBtn';
    btn.textContent = '🩺';
    btn.title = 'Open AI Study Tutor';
    btn.onclick = () => openPanel();
    document.body.appendChild(btn);
  }
  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', install);
  } else {
    install();
  }
})();
</script>

    function lumOf(el) {
      var bg = window.getComputedStyle(el).backgroundColor || '';
      var rgb = bg.match(/[\d.]+/g);
      if (!rgb || rgb.length < 3) return null;
      var a = rgb.length >= 4 ? +rgb[3] : 1;

      return (0.299 * +rgb[0] + 0.587 * +rgb[1] + 0.114 * +rgb[2]) / 255;

<script id="everything-modal-injector">
(function(){
  var TOPIC_GROUPS = {"external":["External Ear","Tympanic Membrane"],"middle":["Middle Ear","Ossicles","Auditory Tube"],"internal":["Internal Ear","Cochlea","Vestibule","Semicircular"],"hearing":["Cochlea","Sound Conduction","Organ of Corti"],"vestibular":["Vestibule","Semicircular"],"nerves":["Nerves & Vessels"],"tests":["Hearing & Vestibular Tests"],"clinical":["Clinical"],"embryology":["Embryology"]};
  var FULL_BANK = null;
  var selectedCats = {};
  var catCounts = {};
  var initialized = false;

  function captureBank(){
    if (typeof BANK === 'undefined' || !BANK || !BANK.length) return false;
    if (FULL_BANK) return true;
    FULL_BANK = BANK.slice();
    return true;
  }

  function buildModal(){
    if (!captureBank()) return;
    var html = '<div class="em-card">'
      + '<h2>📋 Everything MC Drill — GA 0202 &middot; The Ear</h2>'
      + '<div class="em-sub">Pick which topics to drill, set a size, go. Reopen filter any time.</div>'
      + '<div class="em-briefing" style="background:rgba(34,211,238,0.08);border-left:3px solid #22d3ee;padding:10px 14px;margin:10px 0 14px;border-radius:0 6px 6px 0;color:#a5f3fc;font-size:13px;line-height:1.55">'
      +   '<b style="color:#67e8f9">📖 What this is:</b> Custom-mix MC drill from the full 120-Q Ear bank (Dr. Maini, The Ear, L22&ndash;L23). Pick presets (External, Middle, Internal, Hearing, Balance, Nerves, etc.) or toggle individual topics. Set how many Qs you want. Hit start. <b>Tip:</b> 25 Qs = quick warm-up · 120 = full sweep.'
      + '</div>'
      + '<h3>⚡ Presets</h3>'
      + '<div class="em-presets">'
      +   '<button onclick="emPreset(\'all\')">✅ All</button>'
      +   '<button onclick="emPreset(\'external\')">&#128066; External Ear + TM</button>'
      +   '<button onclick="emPreset(\'middle\')">&#128296; Middle Ear + Ossicles</button>'
      +   '<button onclick="emPreset(\'internal\')">&#128027; Internal Ear (Labyrinth)</button>'
      +   '<button onclick="emPreset(\'hearing\')">&#128266; Hearing / Cochlea</button>'
      +   '<button onclick="emPreset(\'vestibular\')">&#127744; Balance / Vestibular</button>'
      +   '<button onclick="emPreset(\'nerves\')">&#129504; Nerves &amp; Vessels</button>'
      +   '<button onclick="emPreset(\'tests\')">&#129658; Hearing/Balance Tests</button>'
      +   '<button onclick="emPreset(\'embryology\')">&#129370; Embryology</button>'
      +   '<button onclick="emPreset(\'clinical\')">🔬 Clinical</button>'
      +   '<button onclick="emPreset(\'clear\')">✖️ Clear</button>'
      + '</div>'
      + '<h3>📚 Topics (toggle individually)</h3>'
      + '<div class="em-cats" id="emCatList"></div>'
      + '<h3>📊 Number of Questions</h3>'
      + '<div class="em-size-row">'
      +   '<input type="range" id="emSizeSlider" min="5" max="103" value="25" oninput="emUpdSize()">'
      +   '<div class="em-val" id="emSizeVal">25</div>'
      + '</div>'
      + '<div class="em-info"><b>Available:</b> <span id="emAvail">103</span> Qs match your selection</div>'
      + '<div style="display:flex;gap:10px;flex-wrap:wrap;justify-content:center;margin-top:8px">'
      +   '<button class="em-start" id="emStartBtn" onclick="emStart()" style="flex:1;min-width:160px">▶️ Start Drill</button>'
      + '</div>'
      + '</div>';
    var modal = document.createElement('div');
    modal.id = 'everythingModal';
    modal.innerHTML = html;
    document.body.appendChild(modal);
    var btn = document.createElement('button');
    btn.id = 'emReopenBtn';
    btn.textContent = '⚙️ Filter Topics';
    btn.onclick = emReopen;
    document.body.appendChild(btn);
    catCounts = {};
    FULL_BANK.forEach(function(q){ if (q && q.cat) catCounts[q.cat] = (catCounts[q.cat]||0)+1; });
    var cats = Object.keys(catCounts).sort();
    var list = document.getElementById('emCatList');
    list.innerHTML = '';
    cats.forEach(function(cat){
      selectedCats[cat] = true;
      var safe = cat.replace(/'/g, "&apos;").replace(/"/g, "&quot;");
      var id = 'em_cat_' + cat.replace(/[^a-z0-9]/gi, '_');
      var row = document.createElement('div');
      row.className = 'em-cat-row';
      row.innerHTML = '<input type="checkbox" id="' + id + '" checked onchange="emToggleCat(this,\''+cat.replace(/'/g, "\\\'")+'\')">'
                    + '<label for="' + id + '">' + safe + '</label>'
                    + '<span class="em-count">' + catCounts[cat] + '</span>';
      list.appendChild(row);
    });
    emUpdAvail();
  }

  window.emToggleCat = function(box, cat){
    selectedCats[cat] = box.checked;
    emUpdAvail();
  };
  window.emPreset = function(kind){
    var allCats = Object.keys(catCounts);
    allCats.forEach(function(cat){
      var on = false;
      if (kind === 'all') on = true;
      else if (kind === 'clear') on = false;
      else if (TOPIC_GROUPS[kind]) {
        on = TOPIC_GROUPS[kind].some(function(sub){ return cat.toLowerCase().indexOf(sub.toLowerCase()) >= 0; });
      }
      selectedCats[cat] = on;
      var id = 'em_cat_' + cat.replace(/[^a-z0-9]/gi, '_');
      var box = document.getElementById(id);
      if (box) box.checked = on;
    });
    emUpdAvail();
  };
  window.emUpdSize = function(){
    document.getElementById('emSizeVal').textContent = document.getElementById('emSizeSlider').value;
  };
  function emUpdAvail(){
    var n = 0;
    FULL_BANK.forEach(function(q){ if (selectedCats[q.cat]) n++; });
    document.getElementById('emAvail').textContent = n;
    var slider = document.getElementById('emSizeSlider');
    slider.max = Math.max(5, n);
    if (parseInt(slider.value) > n) slider.value = Math.max(5, n);
    emUpdSize();
    document.getElementById('emStartBtn').disabled = (n === 0);
  }
  window.emStart = function(){
    var size = parseInt(document.getElementById('emSizeSlider').value);
    var pool = FULL_BANK.filter(function(q){ return selectedCats[q.cat]; });
    for (var i = pool.length - 1; i > 0; i--){ var j = Math.floor(Math.random()*(i+1)); var t = pool[i]; pool[i]=pool[j]; pool[j]=t; }
    var picked = pool.slice(0, Math.min(size, pool.length));
    BANK.length = 0;
    picked.forEach(function(q){ BANK.push(q); });
    BANK.forEach(function(q,i){ q._bankId = i; });
    if (typeof catStats !== 'undefined') { catStats = {}; }
    try { if (typeof LS_KEY === 'string') localStorage.removeItem(LS_KEY); } catch(e){}
    document.getElementById('everythingModal').style.display = 'none';
    document.getElementById('emReopenBtn').style.display = 'block';
    if (typeof idx !== 'undefined') idx = 0;
    if (typeof score !== 'undefined') score = 0;
    if (typeof attempts !== 'undefined') attempts = 0;
    if (typeof reaskQueue !== 'undefined') reaskQueue.length = 0;
    if (typeof questions !== 'undefined') questions.length = 0;
    if (typeof answerMap !== 'undefined') { for (var k in answerMap) delete answerMap[k]; }
    if (typeof answerHistory !== 'undefined') answerHistory.length = 0;
    if (typeof browseIdx !== 'undefined') browseIdx = -1;
    if (typeof reviewList !== 'undefined') reviewList = null;
    if (typeof init === 'function') init();
  };
  function emReopen(){
    document.getElementById('everythingModal').style.display = 'block';
  }

  function tryInit(){
    if (initialized) return;
    if (!captureBank()) { setTimeout(tryInit, 100); return; }
    initialized = true;
    buildModal();
  }
  if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', tryInit);
  else tryInit();
})();
</script>

<script id="search-and-jump-js">
(function(){
  var _searchBar=null,_searchTimer=null,_searchKbdIdx=-1,_lastResults=[],_lastQuery='';

  function _esc(s){
    return (s==null?'':String(s)).replace(/[<>&"']/g,function(c){
      return {'<':'&lt;','>':'&gt;','&':'&amp;','"':'&quot;',"'":'&#39;'}[c];
    });
  }

  function _buildSearchBar(){
    var wrap=document.createElement('div');
    wrap.id='search-bar';
    wrap.className='search-bar';
    wrap.innerHTML=''
      +'<div class="search-input-wrap" id="search-input-wrap">'
      +  '<span class="search-icon">🔍</span>'
      +  '<input type="text" id="search-input" class="search-input" placeholder="Search questions, topics, sources... (↑/↓ + Enter)" autocomplete="off" spellcheck="false">'
      +  '<button class="search-clear" id="search-clear" type="button" title="Clear (Esc)">✕</button>'
      +'</div>'
      +'<div class="search-results" id="search-results"></div>';
    return wrap;
  }

  function _ensureSearchAttached(){
    var app=document.getElementById('app');
    if(!app)return;
    if(!_searchBar){
      _searchBar=_buildSearchBar();
      _wireSearchHandlers();
    }
    var card=app.querySelector('.card');
    if(card){
      if(_searchBar.parentNode!==card.parentNode){
        card.parentNode.insertBefore(_searchBar,card);
      }
    } else {
      // No card (e.g. summary screen) — detach
      if(_searchBar.parentNode)_searchBar.parentNode.removeChild(_searchBar);
    }
  }

  function _highlight(text,query){
    if(!text)return '';
    if(!query)return _esc(text);
    var qLow=query.toLowerCase();
    var tLow=String(text).toLowerCase();
    var i=tLow.indexOf(qLow);
    if(i===-1)return _esc(text);
    var end=i+query.length;
    return _esc(text.substring(0,i))+'<mark>'+_esc(text.substring(i,end))+'</mark>'+_esc(text.substring(end));
  }

  function _searchBank(query){
    var q=(query||'').toLowerCase().trim();
    if(!q||typeof BANK==='undefined')return [];
    var results=[];
    for(var i=0;i<BANK.length;i++){
      var item=BANK[i];
      var qText=(item.q||'').toLowerCase();
      var cat=(item.cat||'').toLowerCase();
      var src=(item.source||'').toLowerCase();
      var quote=(item.quote||'').toLowerCase();
      var tip=(item.profTip||'').toLowerCase();
      if(qText.indexOf(q)>=0||cat.indexOf(q)>=0||src.indexOf(q)>=0||quote.indexOf(q)>=0||tip.indexOf(q)>=0){
        results.push({_bankId:i,q:item.q,cat:item.cat});
        if(results.length>=10)break;
      }
    }
    return results;
  }

  function _renderSearchResults(query){
    var ul=document.getElementById('search-results');
    if(!ul)return;
    _lastQuery=query;
    if(!query.trim()){
      ul.classList.remove('open');
      ul.innerHTML='';
      _lastResults=[];_searchKbdIdx=-1;
      return;
    }
    var matches=_searchBank(query);
    _lastResults=matches;
    _searchKbdIdx=-1;
    if(matches.length===0){
      ul.innerHTML='<div class="search-empty">No matches for "'+_esc(query)+'"</div>';
      ul.classList.add('open');
      return;
    }
    var html='';
    for(var i=0;i<matches.length;i++){
      var m=matches[i];
      var stem=(m.q||'');
      var truncStem=stem.length>110?stem.substring(0,110)+'…':stem;
      html+='<div class="search-result" data-bank-id="'+m._bankId+'" data-idx="'+i+'">'
        +'<span class="sr-num">Q'+(m._bankId+1)+'</span>'
        +'<span class="sr-cat">'+_esc(m.cat||'')+'</span>'
        +_highlight(truncStem,query)
        +'</div>';
    }
    if(matches.length===10){
      html+='<div class="search-hint">Showing top 10 — refine to narrow</div>';
    }
    ul.innerHTML=html;
    ul.classList.add('open');
    var nodes=ul.querySelectorAll('.search-result');
    nodes.forEach(function(node){
      node.addEventListener('mousedown',function(e){
        // mousedown so it fires before input blur clears state
        e.preventDefault();
        var bankId=parseInt(node.getAttribute('data-bank-id'),10);
        _doJump(bankId);
      });
    });
  }

  function _doJump(bankId){
    if(typeof navJump!=='function')return;
    var inp=document.getElementById('search-input');
    var ul=document.getElementById('search-results');
    if(inp)inp.value='';
    if(ul){ul.classList.remove('open');ul.innerHTML='';}
    _lastResults=[];_searchKbdIdx=-1;_lastQuery='';
    navJump(bankId);
    // Scroll to top of card after jump so user sees the question
    setTimeout(function(){
      var card=document.querySelector('.card');
      if(card&&card.scrollIntoView)card.scrollIntoView({behavior:'smooth',block:'start'});
    },80);
  }

  function _highlightKbd(){
    var ul=document.getElementById('search-results');
    if(!ul)return;
    var nodes=ul.querySelectorAll('.search-result');
    nodes.forEach(function(n,i){n.classList.toggle('kbd',i===_searchKbdIdx);});
    if(_searchKbdIdx>=0&&nodes[_searchKbdIdx]){
      nodes[_searchKbdIdx].scrollIntoView({block:'nearest'});
    }
  }

  function _wireSearchHandlers(){
    var inp=_searchBar.querySelector('#search-input');
    var wrap=_searchBar.querySelector('#search-input-wrap');
    var clr=_searchBar.querySelector('#search-clear');
    inp.addEventListener('focus',function(){
      wrap.classList.add('focused');
      if(_lastQuery&&_lastResults.length>0){
        var ul=document.getElementById('search-results');
        if(ul)ul.classList.add('open');
      }
    });
    inp.addEventListener('blur',function(){
      setTimeout(function(){wrap.classList.remove('focused');},150);
    });
    inp.addEventListener('input',function(){
      if(_searchTimer)clearTimeout(_searchTimer);
      var v=inp.value;
      _searchTimer=setTimeout(function(){_renderSearchResults(v);},200);
    });
    inp.addEventListener('keydown',function(e){
      var ul=document.getElementById('search-results');
      if(e.key==='Escape'){
        if(inp.value){
          inp.value='';
          if(ul){ul.classList.remove('open');ul.innerHTML='';}
          _lastResults=[];_searchKbdIdx=-1;_lastQuery='';
        } else {
          inp.blur();
        }
      } else if(e.key==='ArrowDown'){
        if(_lastResults.length===0)return;
        e.preventDefault();
        _searchKbdIdx=Math.min(_lastResults.length-1,_searchKbdIdx+1);
        _highlightKbd();
      } else if(e.key==='ArrowUp'){
        if(_lastResults.length===0)return;
        e.preventDefault();
        _searchKbdIdx=Math.max(-1,_searchKbdIdx-1);
        _highlightKbd();
      } else if(e.key==='Enter'){
        if(_lastResults.length===0)return;
        e.preventDefault();
        var pick=_searchKbdIdx>=0?_lastResults[_searchKbdIdx]:_lastResults[0];
        if(pick)_doJump(pick._bankId);
      }
    });
    clr.addEventListener('click',function(){
      inp.value='';
      var ul=document.getElementById('search-results');
      if(ul){ul.classList.remove('open');ul.innerHTML='';}
      _lastResults=[];_searchKbdIdx=-1;_lastQuery='';
      inp.focus();
    });
    document.addEventListener('click',function(e){
      if(!_searchBar)return;
      if(!_searchBar.contains(e.target)){
        var ul=document.getElementById('search-results');
        if(ul)ul.classList.remove('open');
      }
    });
    // Global "/" keybind to focus search (matches GitHub-style search UX)
    document.addEventListener('keydown',function(e){
      if(e.key==='/'&&document.activeElement!==inp){
        var tag=(document.activeElement&&document.activeElement.tagName||'').toLowerCase();
        if(tag==='input'||tag==='textarea')return;
        e.preventDefault();
        inp.focus();
      }
    });
  }

  function _wrapRender(){
    if(typeof render!=='function')return;
    var origR=render;
    render=function(){
      if(_searchBar&&_searchBar.parentNode)_searchBar.parentNode.removeChild(_searchBar);
      origR();
      _ensureSearchAttached();
    };
    if(typeof renderHistoryItem==='function'){
      var origH=renderHistoryItem;
      renderHistoryItem=function(){
        if(_searchBar&&_searchBar.parentNode)_searchBar.parentNode.removeChild(_searchBar);
        origH();
        _ensureSearchAttached();
      };
    }
    if(typeof showSummary==='function'){
      var origS=showSummary;
      showSummary=function(){
        if(_searchBar&&_searchBar.parentNode)_searchBar.parentNode.removeChild(_searchBar);
        origS();
        // intentionally no re-attach on summary
      };
    }
  }

  function _bootSearch(){
    _wrapRender();
    _ensureSearchAttached();
  }

  // Wait until other render overrides (audio bar etc.) finish wiring
  if(document.readyState==='complete'||document.readyState==='interactive'){
    setTimeout(_bootSearch,100);
  } else {
    document.addEventListener('DOMContentLoaded',function(){setTimeout(_bootSearch,100);});
  }
})();
</script>

<script>
(function(){
  var lbFrameDrawing = false, lbFrameLastX = 0, lbFrameLastY = 0;
  var lbFrameColor = '#fbbf24';
  var lbFrameTool = 'pen';
  var lbFrameAlphas = {pen: 0.85, hl: 0.30, er: 1.0};
  var lbFrameSizes = {pen: 5, hl: 26, er: 36};
  var lbFrameBgColor = '';   // '' = default lightbox bg
  var lbFrameUndoStack = []; // snapshots of canvas state
  var lbFrameRedoStack = [];
  var LB_FRAME_HISTORY_MAX = 30;
  var lbFrameSrc = '', lbFrameLabel = '';

  window.lbFrameOpen = function(src, label){
    lbFrameSrc = src; lbFrameLabel = label || '';
    var lb = document.getElementById('lb-frame');
    var img = document.getElementById('lb-frame-img');
    var canvas = document.getElementById('lb-frame-canvas');
    document.getElementById('lb-frame-cap').textContent = label;
    if (canvas) canvas.getContext('2d').clearRect(0,0,canvas.width,canvas.height);
    img.onload = function(){ lbFrameSyncCanvas(true); lbFrameApplyImgFilter(); };
    img.src = src;
    lb.classList.add('open');
    lbFrameApplyImgFilter();
    // Reset history + bg for new frame
    lbFrameUndoStack = [];
    lbFrameRedoStack = [];
    lbFrameBgColor = '';
    lb.style.background = '';  // restore default lightbox bg
    setTimeout(function(){ lbFrameSyncCanvas(true); }, 100);
    setTimeout(function(){ lbFrameSyncCanvas(true); }, 400);
  };
  window.lbFrameClose = function(){
    var lb = document.getElementById('lb-frame');
    lb.classList.remove('open');
    var c = document.getElementById('lb-frame-canvas');
    if (c) { c.classList.remove('draw-active'); c.style.pointerEvents = 'none'; c.style.cursor = ''; }
    var btn = document.getElementById('lb-frame-draw-toggle');
    if (btn) { btn.classList.remove('active'); btn.textContent = '🎨 Draw OFF'; }
  };
  function lbFrameSyncCanvas(forceClear){
    var img = document.getElementById('lb-frame-img');
    var canvas = document.getElementById('lb-frame-canvas');
    if (!img || !canvas) return;
    var w = img.naturalWidth || img.clientWidth || 1280;
    var h = img.naturalHeight || img.clientHeight || 720;
    var sizeChanged = (canvas.width !== w || canvas.height !== h);
    if (sizeChanged) { canvas.width = w; canvas.height = h; }
    if (sizeChanged || forceClear) {
      canvas.getContext('2d').clearRect(0,0,canvas.width,canvas.height);
    }
  }
  window.lbFrameToggleDraw = function(){
    var c = document.getElementById('lb-frame-canvas');
    if (!c) return;
    lbFrameSyncCanvas();
    var active = c.classList.toggle('draw-active');
    c.style.pointerEvents = active ? 'auto' : 'none';
    c.style.cursor = active ? 'crosshair' : '';
    c.style.touchAction = 'none';
    var btn = document.getElementById('lb-frame-draw-toggle');
    btn.classList.toggle('active', active);
    btn.textContent = active ? '✏️ Drawing — tap to stop' : '🎨 Tap to Draw';
  };
  window.lbFrameSetColor = function(c){ lbFrameColor = c; };
  window.lbFrameSetTool = function(t){
    lbFrameTool = t;
    document.querySelectorAll('.lb-frame-toolbar button[id^="lb-frame-tool-"]').forEach(function(b){ b.classList.remove('active'); });
    document.getElementById('lb-frame-tool-' + t).classList.add('active');
    // Update sliders to show current tool's settings
    var sizeSlider = document.getElementById('lb-frame-size-slider');
    var opacSlider = document.getElementById('lb-frame-opacity-slider');
    if (sizeSlider) { sizeSlider.value = lbFrameSizes[t]; document.getElementById('lb-frame-size-val').textContent = lbFrameSizes[t] + 'px'; }
    if (opacSlider) { var op = Math.round(lbFrameAlphas[t]*100); opacSlider.value = op; document.getElementById('lb-frame-opacity-val').textContent = op + '%'; }
  };
  window.lbFrameSetSize = function(v){
    lbFrameSizes[lbFrameTool] = parseInt(v, 10);
    document.getElementById('lb-frame-size-val').textContent = v + 'px';
  };
  window.lbFrameSetOpacity = function(v){
    lbFrameAlphas[lbFrameTool] = parseInt(v, 10) / 100;
    document.getElementById('lb-frame-opacity-val').textContent = v + '%';
  };
  var lbFrameImgOpacity = 1.0;
  var lbFrameBW = false;
  function lbFrameApplyImgFilter(){
    var img = document.getElementById('lb-frame-img');
    if (!img) return;
    var filter = '';
    if (lbFrameBW) filter += 'grayscale(1) ';
    img.style.filter = filter.trim();
    img.style.opacity = lbFrameImgOpacity;
  }
  window.lbFrameSetImgOpacity = function(v){
    lbFrameImgOpacity = parseInt(v, 10) / 100;
    document.getElementById('lb-frame-img-opacity-val').textContent = v + '%';
    lbFrameApplyImgFilter();
  };
  window.lbFrameToggleBW = function(){
    lbFrameBW = !lbFrameBW;
    var btn = document.getElementById('lb-frame-bw-toggle');
    btn.textContent = lbFrameBW ? '◾ Color' : '⬜ B&W';
    btn.classList.toggle('active', lbFrameBW);
    lbFrameApplyImgFilter();
  };
  window.lbFrameSetBgColor = function(c){
    lbFrameBgColor = c;
    var lb = document.getElementById('lb-frame');
    if (lb) lb.style.background = c;
  };
  function lbFrameSnapshot(){
    var canvas = document.getElementById('lb-frame-canvas');
    if (!canvas || !canvas.width) return;
    try {
      lbFrameUndoStack.push(canvas.toDataURL('image/png'));
      if (lbFrameUndoStack.length > LB_FRAME_HISTORY_MAX) lbFrameUndoStack.shift();
      lbFrameRedoStack = []; // new stroke invalidates redo
    } catch(e) {}
  }
  function lbFrameRestore(dataURL){
    var canvas = document.getElementById('lb-frame-canvas');
    if (!canvas) return;
    var ctx = canvas.getContext('2d');
    var img = new Image();
    img.onload = function(){
      ctx.clearRect(0,0,canvas.width,canvas.height);
      ctx.drawImage(img, 0, 0);
    };
    img.src = dataURL;
  }
  window.lbFrameUndo = function(){
    if (lbFrameUndoStack.length === 0) return;
    var canvas = document.getElementById('lb-frame-canvas');
    try { lbFrameRedoStack.push(canvas.toDataURL('image/png')); } catch(e) {}
    var prev = lbFrameUndoStack.pop();
    if (prev) lbFrameRestore(prev);
    else { canvas.getContext('2d').clearRect(0,0,canvas.width,canvas.height); }
  };
  window.lbFrameRedo = function(){
    if (lbFrameRedoStack.length === 0) return;
    var canvas = document.getElementById('lb-frame-canvas');
    try { lbFrameUndoStack.push(canvas.toDataURL('image/png')); } catch(e) {}
    var next = lbFrameRedoStack.pop();
    if (next) lbFrameRestore(next);
  };
  window.lbFrameClear = function(){
    var c = document.getElementById('lb-frame-canvas');
    if (!c) return;
    lbFrameSnapshot();  // allow undo of the clear
    c.getContext('2d').clearRect(0,0,c.width,c.height);
  };
  window.lbFrameSave = function(){
    // Use the existing in-DOM img (already loaded, no CORS re-fetch needed)
    var img = document.getElementById('lb-frame-img');
    var canvas = document.getElementById('lb-frame-canvas');
    if (!img || !img.complete || !img.naturalWidth) {
      alert('Frame image not loaded yet — wait a sec and try again.');
      return;
    }
    var out = document.createElement('canvas');
    out.width = canvas.width; out.height = canvas.height;
    var octx = out.getContext('2d');
    function paintWatermarkAndExport(){
      octx.save();
      octx.fillStyle = 'rgba(60,60,60,0.65)';
      octx.font = '600 13px -apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif';
      octx.textBaseline = 'bottom';
      octx.fillText('DC Study Supply — Dr. David Gramling, PHD', 14, out.height - 10);
      octx.restore();
      var fname = 'fab-201-m01-frame-' + (lbFrameLabel.replace(/[^a-z0-9_-]/gi,'_') || 'annotated') + '.png';
      // Try toBlob first
      var didBlob = false;
      try {
        out.toBlob(function(blob){
          if (!blob) { tryDataURL(); return; }
          didBlob = true;
          var url = URL.createObjectURL(blob);
          var a = document.createElement('a');
          a.href = url; a.download = fname;
          document.body.appendChild(a); a.click(); document.body.removeChild(a);
          URL.revokeObjectURL(url);
        }, 'image/png');
        // toBlob is async; if it threw synchronously we'd be in catch
      } catch(e) {
        tryDataURL();
      }
      function tryDataURL(){
        try {
          var dataURL = out.toDataURL('image/png');
          var a = document.createElement('a');
          a.href = dataURL; a.download = fname;
          document.body.appendChild(a); a.click(); document.body.removeChild(a);
        } catch(e2) {
          alert('Save failed (CORS): the browser blocked exporting the image because it was loaded cross-origin. This works on the live GitHub Pages URL but may fail when opened directly from disk (file://). Try the live URL: dgsc23.github.io/dc-study-tools/');
        }
      }
    }
    try {
      // 1. Paint background color first (if user picked one) — visible when image is transparent
      if (lbFrameBgColor) {
        octx.fillStyle = lbFrameBgColor;
        octx.fillRect(0, 0, out.width, out.height);
      }
      // 2. Draw image with current opacity + B&W filter
      octx.save();
      octx.globalAlpha = lbFrameImgOpacity;
      if (lbFrameBW) octx.filter = 'grayscale(1)';
      octx.drawImage(img, 0, 0, out.width, out.height);
      octx.restore();
      // 3. Draw user's strokes (canvas) at full opacity over the image
      octx.drawImage(canvas, 0, 0, out.width, out.height);
      paintWatermarkAndExport();
    } catch(e) {
      // drawImage tainted the canvas — happens only with CORS-restricted images
      alert('Save blocked by browser CORS rule. This usually means the file was opened from disk (file://) instead of the live URL. Try the live URL: dgsc23.github.io/dc-study-tools/');
    }
  };

  // Mouse + touch handlers (mirrors VSS pattern post-fix)
  var lbFrameCanvas = document.getElementById('lb-frame-canvas');
  if (lbFrameCanvas) {
    function lbFrameGetPos(e){
      var rect = lbFrameCanvas.getBoundingClientRect();
      var t = (e.touches && e.touches.length) ? e.touches[0] : e;
      var rw = rect.width || 1, rh = rect.height || 1;
      var cw = lbFrameCanvas.width || rw, ch = lbFrameCanvas.height || rh;
      var sx = cw / rw, sy = ch / rh;
      return [(t.clientX - rect.left) * sx, (t.clientY - rect.top) * sy];
    }
    function lbFrameDown(e){
      if (!lbFrameCanvas.classList.contains('draw-active')) return;
      e.preventDefault();
      lbFrameSnapshot();  // save state BEFORE this stroke for undo
      lbFrameDrawing = true;
      var p = lbFrameGetPos(e);
      lbFrameLastX = p[0]; lbFrameLastY = p[1];
    }
    function lbFrameMove(e){
      if (!lbFrameDrawing || !lbFrameCanvas.classList.contains('draw-active')) return;
      e.preventDefault();
      var p = lbFrameGetPos(e);
      var ctx = lbFrameCanvas.getContext('2d');
      ctx.strokeStyle = lbFrameColor;
      ctx.lineWidth = lbFrameSizes[lbFrameTool] || 5;
      ctx.globalAlpha = lbFrameAlphas[lbFrameTool] != null ? lbFrameAlphas[lbFrameTool] : (lbFrameTool === 'er' ? 1 : 0.85);
      ctx.globalCompositeOperation = lbFrameTool === 'er' ? 'destination-out' : 'source-over';
      ctx.lineCap = 'round'; ctx.lineJoin = 'round';
      ctx.beginPath(); ctx.moveTo(lbFrameLastX, lbFrameLastY); ctx.lineTo(p[0], p[1]); ctx.stroke();
      lbFrameLastX = p[0]; lbFrameLastY = p[1];
    }
    function lbFrameUp(){ lbFrameDrawing = false; }
    lbFrameCanvas.addEventListener('mousedown', lbFrameDown);
    lbFrameCanvas.addEventListener('mousemove', lbFrameMove);
    lbFrameCanvas.addEventListener('mouseup', lbFrameUp);
    lbFrameCanvas.addEventListener('mouseleave', lbFrameUp);
    window.addEventListener('mouseup', lbFrameUp);
    lbFrameCanvas.addEventListener('touchstart', lbFrameDown, {passive: false});
    lbFrameCanvas.addEventListener('touchmove', lbFrameMove, {passive: false});
    lbFrameCanvas.addEventListener('touchend', lbFrameUp);
  }
})();
</script>

<script id="mc-to-frame-pip-drill-js">
(function(){
  // Lecture routing config — generic across number of lectures so this same code
  // works for GA (2 lectures, 1 boundary) and FAB (3 lectures, 2 boundaries) and
  // any future module. Boundaries are combined-audio split timestamps in seconds.
  // viewers[i] is the URL for lecture i (after boundaries[i-1], up to boundaries[i]).
  var LECTURE_CFG={
  "boundaries": [4800, 10817],
  "viewers": [
    "fab-201-m02-shoulder-forearm-l04-frame-viewer.html",
    "fab-201-m02-shoulder-forearm-l05-frame-viewer.html",
    "fab-201-m02-shoulder-forearm-l06-frame-viewer.html"
  ]
};

  function resolveLecture(combinedTs){
    var boundaries=LECTURE_CFG.boundaries;
    var viewers=LECTURE_CFG.viewers;
    var prev=0;
    for(var i=0;i<boundaries.length;i++){
      if(combinedTs<=boundaries[i]){
        return {idx:i,viewer:viewers[i],relTs:combinedTs-prev};
      }
      prev=boundaries[i];
    }
    var last=boundaries.length;
    return {idx:last,viewer:viewers[last],relTs:combinedTs-prev};
  }

  window.openFrameViewerForCurrentQ=function(){
    if(typeof questions==='undefined'||typeof idx==='undefined'||typeof TIMESTAMPS==='undefined')return;
    var q=questions[idx];
    if(!q)return;
    var bankId=q._bankId;
    if(bankId==null||bankId>=TIMESTAMPS.length)return;
    var ts=TIMESTAMPS[bankId];
    if(!isFinite(ts)||ts<=0)return;
    var routed=resolveLecture(ts);
    if(!routed.viewer)return;
    var url=routed.viewer+'?ts='+routed.relTs.toFixed(1);
    window.open(url,'_blank','noopener,noreferrer');
  };

  // Inject the button into the audio bar's audio-info section AFTER it's built
  function injectButton(){
    var bar=document.getElementById('audio-bar');
    if(!bar)return false;
    if(bar.querySelector('.btn-frame-pip'))return true;
    var info=bar.querySelector('.audio-info');
    if(!info)return false;
    var btn=document.createElement('button');
    btn.className='btn-frame-pip';
    btn.type='button';
    btn.innerHTML='🎞️ Frames + PiP';
    btn.title='Open Frame Viewer at this Q\'s timestamp — draw on the slide while video PiP plays';
    btn.onclick=function(e){e.preventDefault();openFrameViewerForCurrentQ();};
    info.appendChild(btn);
    return true;
  }

  // Audio bar is rebuilt on every render(); inject after each rebuild.
  function watchAndInject(){
    if(injectButton())return;
    // Audio bar not built yet — observe app for changes
    var app=document.getElementById('app');
    if(!app)return;
    var mo=new MutationObserver(function(){
      if(injectButton())mo.disconnect();
    });
    mo.observe(app,{childList:true,subtree:true});
  }

  // Re-inject on every audio-bar attachment (after render() wipes #app)
  setInterval(injectButton,1500);

  if(document.readyState==='complete'||document.readyState==='interactive'){
    setTimeout(watchAndInject,500);
  } else {
    document.addEventListener('DOMContentLoaded',function(){setTimeout(watchAndInject,500);});
  }
})();
</script>

/* Toolbar floats to bottom-right when body has float-toolbar-mode class.
   Conditioned on the toolbar's visibility-trigger class (.show/.active) when
   the surface uses one, so we don't force display:flex on a hidden toolbar.
   NOTE: bottom/right are NOT !important so the JS visualViewport handler can
   override them at zoom > 1.05 (Bug fix 2026-05-10: prior !important blocked
   JS overrides → toolbar drifted off-screen when zoomed in).
   z-index: 99999 sits above the frame viewer's #lb-frame overlay (z 20000)
   (Bug fix 2026-05-10: prior z 10000 < lightbox 20000 → toolbar invisible). */
body.float-toolbar-mode .lb-frame-toolbar {
    position: fixed !important;
    top: auto !important; left: auto !important;
    bottom: 14px;
    right: 14px;
    z-index: 99999;
    /* max-height leaves room for top-bar UI on each surface so the toolbar's
       top edge doesn't reach into elements like the frame viewer's Exit
       Annotate Mode banner (z 21000 at top:14, ~40px tall). Per-surface
       top_clearance lives in the SURFACES config. */
    max-height: calc(100vh - 28px - 14px);

    padding: 6px 6px !important;
}

<script id="pill-rebuild-deploy-fab-lightbox-js">
(function() {
    "use strict";
    var TB_SEL    = '.lb-frame-toolbar';
    var TB_TRIG   = null;
    var CANVAS_SEL = '#lb-frame-canvas';
    var BODY_CLASS = 'float-toolbar-mode';
    var LS_KEY    = 'pillFabLightboxCollapsed';
    var TOP_CLEARANCE = 28;

    function tb()     { return document.querySelector(TB_SEL); }
    function fb()     { return document.getElementById('floatingToggle'); }
    function canvas() { return document.querySelector(CANVAS_SEL); }

    function tbVisible() {
        var t = tb(); if (!t) return false;
        // Use getBoundingClientRect rather than offsetParent. Reason: per spec,
        // offsetParent returns null for any element with `position: fixed` —
        // and my pill CSS makes the toolbar position:fixed. So offsetParent
        // would ALWAYS be null on a floating toolbar (whether visible or not),
        // which would break the visibility check and cause updateFloatingPos
        // to return early, breaking zoom-tracking. Bug caught 2026-05-10 after
        // David reported the toolbar didn't follow zoom on the frame viewer.
        // getBoundingClientRect returns a zero rect when the element OR any
        // ancestor has display:none, but a non-zero rect when rendered,
        // regardless of position:fixed/relative/static.
        var rect = t.getBoundingClientRect();
        return rect.width > 0 && rect.height > 0;
    }

    // ---- expand / collapse ----
    function ensureExpandBtn() {
        var t = tb(); if (!t) return;
        if (document.getElementById('ftExpandBtn')) return;
        var btn = document.createElement('button');
        btn.id = 'ftExpandBtn';
        btn.type = 'button';
        btn.title = 'Collapse / expand toolbar';
        btn.setAttribute('aria-label', 'Collapse toolbar');
        var startCollapsed = false;
        try { startCollapsed = localStorage.getItem(LS_KEY) === '1'; } catch (e) {}
        if (startCollapsed) t.classList.add('collapsed');
        btn.innerHTML = startCollapsed ? '&#9998;' : '&#10005;';
        btn.addEventListener('click', function(e) {
            e.preventDefault(); e.stopPropagation();
            var collapsed = t.classList.toggle('collapsed');
            btn.innerHTML = collapsed ? '&#9998;' : '&#10005;';
            btn.setAttribute('aria-label', collapsed ? 'Expand toolbar' : 'Collapse toolbar');
            try { localStorage.setItem(LS_KEY, collapsed ? '1' : '0'); } catch (e2) {}
            requestAnimationFrame(updateFloatingPos);
        });
        if (t.firstChild) t.insertBefore(btn, t.firstChild); else t.appendChild(btn);
    }

    // ---- draw / scroll toggle ----
    var touchDrawMode = true;
    function ensureDrawScrollToggle() {
        if (document.getElementById('floatingToggle')) return;
        var btn = document.createElement('button');
        btn.id = 'floatingToggle';
        btn.type = 'button';
        btn.className = 'draw-mode';
        btn.title = 'Touch = draw — tap to switch to scroll';
        btn.setAttribute('aria-label', 'Toggle draw / scroll mode');
        btn.innerHTML = '&#9998;';
        btn.addEventListener('click', function(e) {
            e.preventDefault(); e.stopPropagation();
            touchDrawMode = !touchDrawMode;
            var c = canvas();
            btn.className = (btn.classList.contains('visible') ? 'visible ' : '') +
                            (touchDrawMode ? 'draw-mode' : 'scroll-mode');
            btn.innerHTML = touchDrawMode ? '&#9998;' : '&#9995;';
            btn.title = touchDrawMode
                ? 'Touch = draw — tap to switch to scroll'
                : 'Touch = scroll — tap to switch to draw';
            if (c) {
                c.style.touchAction = touchDrawMode ? 'none' : 'auto';
                c.style.pointerEvents = touchDrawMode ? '' : 'none';
            }
            requestAnimationFrame(updateFloatingPos);
        });
        document.body.appendChild(btn);
    }

    function syncToggleVisibility() {
        var b = fb(); if (!b) return;
        if (tbVisible()) b.classList.add('visible');
        else b.classList.remove('visible');
    }

    // ---- visual viewport zoom positioning ----
    // Toolbar bottom-right anchored: left = vv.right - margin - w*sc,  top = vv.bottom - margin - h*sc
    // Toggle  bottom-left  anchored: left = vv.left + margin,           top = vv.bottom - margin - h*sc
    // Both use transformOrigin: top left + scale(1/vv.scale).
    function updateFloatingPos() {
        var t = tb();
        var b = fb();
        var tShown = t && tbVisible();
        var bShown = b && b.classList.contains('visible');
        if (!tShown && !bShown) return;
        if (!window.visualViewport) return;
        var vv = window.visualViewport;
        var margin = 14;
        // Snap-back at default zoom — drop inline overrides so CSS rules
        // (max-height + position) take over cleanly.
        if (vv.scale <= 1.05) {
            if (t) {
                t.style.transform = ''; t.style.transformOrigin = '';
                t.style.left = ''; t.style.top = '';
                t.style.right = ''; t.style.bottom = '';
                t.style.maxHeight = '';
            }
            if (b) {
                b.style.transform = ''; b.style.transformOrigin = '';
                b.style.left = ''; b.style.top = '';
                b.style.right = ''; b.style.bottom = '';
            }
            return;
        }
        var sc = 1 / vv.scale;
        if (tShown) {
            // Dynamically clamp toolbar's layout max-height so its VISUAL
            // height fits in the visible viewport with top_clearance + bottom
            // margin. Without this, at heavy zoom (4x+) the toolbar overflows
            // off-screen because CSS `max-height: calc(100vh - Npx)` uses
            // LAYOUT vh, which stays large when zoomed in.
            var maxVisualH = vv.height - TOP_CLEARANCE - margin;
            if (maxVisualH < 60) maxVisualH = 60;  // sanity floor
            var maxLayoutH = maxVisualH / sc;
            t.style.maxHeight = maxLayoutH + 'px';
            // Re-measure AFTER clamping max-height so th reflects the new
            // clamped layout box.
            var tw = t.offsetWidth || 60;
            var th = t.offsetHeight || 200;
            t.style.right = 'auto';
            t.style.bottom = 'auto';
            t.style.left = (vv.offsetLeft + vv.width  - margin - tw * sc) + 'px';
            t.style.top  = (vv.offsetTop  + vv.height - margin - th * sc) + 'px';
            t.style.transform = 'scale(' + sc + ')';
            t.style.transformOrigin = 'top left';
        }
        if (bShown) {
            var bh = b.offsetHeight || 40;
            b.style.right = 'auto';
            b.style.bottom = 'auto';
            b.style.left = (vv.offsetLeft + margin) + 'px';
            b.style.top  = (vv.offsetTop + vv.height - margin - bh * sc) + 'px';
            b.style.transform = 'scale(' + sc + ')';
            b.style.transformOrigin = 'top left';
        }
    }

    function init() {
        document.body.classList.add(BODY_CLASS);
        var t = tb();
        if (!t) { setTimeout(init, 200); return; }
        ensureExpandBtn();
        ensureDrawScrollToggle();
        syncToggleVisibility();
        // Watch class changes that affect toolbar visibility. THREE targets
        // because different surfaces trigger visibility via different
        // elements:
        //   - toolbar itself (.show on slides, .active on VSS/AG)
        //   - toolbar's parent (#lb-frame.open on frame viewers — the
        //     toolbar's own class doesn't change when the lightbox opens)
        //   - document.body (body.annotate-mode on frame viewers — covers
        //     the gap if a future surface scopes visibility on body class)
        // Without the parent + body observers, the frame viewer's toggle
        // stayed hidden because syncToggleVisibility never re-ran after
        // init() — caught 2026-05-10 when David reported the toggle
        // missing on the frame viewer after bugfix #3.
        var mo = new MutationObserver(function(muts) {
            for (var i = 0; i < muts.length; i++) {
                if (muts[i].attributeName === 'class') {
                    syncToggleVisibility();
                    requestAnimationFrame(updateFloatingPos);
                    break;
                }
            }
        });
        mo.observe(t, { attributes: true, attributeFilter: ['class'] });
        if (t.parentElement) {
            mo.observe(t.parentElement, { attributes: true, attributeFilter: ['class'] });
        }
        mo.observe(document.body, { attributes: true, attributeFilter: ['class'] });
        if (window.visualViewport) {
            window.visualViewport.addEventListener('scroll', updateFloatingPos);
            window.visualViewport.addEventListener('resize', updateFloatingPos);
        }
        window.addEventListener('scroll', updateFloatingPos, { passive: true });
        window.addEventListener('resize', updateFloatingPos);
        requestAnimationFrame(updateFloatingPos);
    }

    if (document.readyState === 'complete' || document.readyState === 'interactive') {
        setTimeout(init, 200);
    } else {
        document.addEventListener('DOMContentLoaded', function() { setTimeout(init, 200); });
    }
})();
</script>

<script>
/* DC Drill Telemetry v1
 *
 * Wraps the two globals every DC MC-drill engine exposes — pick(i) and
 * showSummary() — and reports three events through the analytics helper:
 *   drill_started    once, on the first answered question
 *   q_answered       {h, stem, c, t_ms}  first attempt per question per load
 *   drill_completed  {answered, correct, pct, duration_s}
 *
 * Correct/wrong is read back off the option element AFTER the engine marks it,
 * so this never re-implements (or can disagree with) the engine's own scoring.
 * Counters are kept here rather than scraped from the summary markup, which
 * differs between drill families.
 *
 * Families covered:
 *   A  .opt-btn  + picked-correct / picked-wrong  + stem in .q-text
 *   B  .option   + correct        / wrong         + stem in .question
 *
 * No-ops safely if the helper or the engine globals are absent.
 */
(function () {
  'use strict';
  if (window.__dcDrillTelemetry) return;
  window.__dcDrillTelemetry = true;

  var OPT_SEL = '.opt-btn, .option';
  var STEM_SEL = '.q-text, .question';
  var OK_CLASSES = ['picked-correct', 'correct'];
  var BAD_CLASSES = ['picked-wrong', 'wrong'];

  var started = false;
  var completed = false;
  var startTs = Date.now();
  var shownTs = Date.now();
  var seen = {};            // stem-hash -> true; first attempt only
  var answered = 0;
  var correct = 0;
  var totalQ = null;

  function send(type, payload) {
    try {
      if (window.__dcAnalytics && window.__dcAnalytics.send) {
        window.__dcAnalytics.send(type, payload);
      }
    } catch (e) {}
  }

  // djb2. Case/punctuation/whitespace-insensitive so the id survives the
  // engine's shuffling and re-rendering.
  function stemHash(s) {
    var h = 5381;
    var t = (s || '').toLowerCase().replace(/[^a-z0-9]+/g, ' ').trim();
    for (var i = 0; i < t.length; i++) { h = ((h << 5) + h + t.charCodeAt(i)) >>> 0; }
    return ('00000000' + h.toString(16)).slice(-8);
  }

  // Family A prefixes the stem with "Q3 of 217: " — strip it, or the same
  // question hashes differently depending on where the shuffle put it.
  function readStem() {
    var el = document.querySelector(STEM_SEL);
    if (!el) return '';
    var raw = (el.textContent || '').replace(/\s+/g, ' ').trim();
    var m = raw.match(/^Q(\d+)\s+of\s+(\d+)\s*:\s*/i);
    if (m) { totalQ = parseInt(m[2], 10); raw = raw.slice(m[0].length); }
    return raw.trim();
  }

  // djb2 over the exact string (no normalization) — used to fingerprint image
  // bytes, where case and punctuation are significant.
  function rawHash(s) {
    var h = 5381;
    for (var i = 0; i < s.length; i++) { h = ((h << 5) + h + s.charCodeAt(i)) >>> 0; }
    return ('00000000' + h.toString(16)).slice(-8);
  }

  // Visual drills reuse one generic stem ("Identify the indicated structure.")
  // across every plate — the image is what distinguishes them. Fold an image
  // id into the hash so those questions don't collapse into one row.
  //
  // Plates are usually inlined as base64 data: URIs, where a "filename" is
  // meaningless (and its tail is a 1-2 char near-collision). For those,
  // fingerprint the bytes: length + head + tail, since same-encoder JPEGs can
  // share a long common prefix.
  function readImg() {
    var el = document.querySelector(STEM_SEL);
    if (!el) return '';
    var scope = (el.closest && el.closest('.card')) || el.parentElement;
    var img = scope && scope.querySelector ? scope.querySelector('img') : null;
    var src = img ? (img.getAttribute('src') || '') : '';
    if (!src) return '';
    if (/^data:/i.test(src)) {
      return 'd:' + rawHash(src.length + '|' + src.slice(0, 2000) + '|' + src.slice(-2000));
    }
    return src.split('?')[0].split('/').pop().slice(0, 60);
  }

  function hasToken(el, names) {
    for (var i = 0; i < names.length; i++) {
      if (el.classList.contains(names[i])) return true;
    }
    return false;
  }

  // A third engine family exists whose handler is pick(optionIndex, isCorrect)
  // and which has no showSummary(). Its marking semantics differ, so refuse to
  // wrap anything that isn't the single-argument pick(i) contract rather than
  // guess and mis-score it.
  var origPick = window.pick;
  if (typeof origPick === 'function' && origPick.length === 1) {
    window.pick = function (i) {
      var opts = document.querySelectorAll(OPT_SEL);
      // The engine early-returns when the question is already answered
      // (options carry .disabled). Mirror that test so a second click on an
      // answered question doesn't log a phantom attempt.
      var alreadyAnswered = !!(opts[0] && opts[0].classList.contains('disabled'));
      var stem = readStem();
      var img = readImg();

      var ret = origPick.apply(this, arguments);

      try {
        // Do NOT assume the argument is the DOM position. At least one engine
        // shuffles the option buttons and paints by a data-orig attribute, so
        // pick(origIdx) indexes the original bank, not the rendered order.
        // Instead, find whichever option the engine just marked — correct by
        // construction for every single-argument family.
        //
        // The engine also puts 'show-correct' on the right answer when you miss;
        // that's a distinct class token, so it never matches 'correct' here.
        var el = null;
        var after = document.querySelectorAll(OPT_SEL);
        for (var k = 0; k < after.length; k++) {
          if (hasToken(after[k], OK_CLASSES) || hasToken(after[k], BAD_CLASSES)) { el = after[k]; break; }
        }
        if (!alreadyAnswered && el && stem) {
          var isOk = hasToken(el, OK_CLASSES);
          var isBad = hasToken(el, BAD_CLASSES);
          if (isOk || isBad) {
            var h = stemHash(stem + '|' + img);
            if (!seen[h]) {
              seen[h] = true;
              answered++;
              if (isOk) correct++;
              if (!started) {
                started = true;
                send('drill_started', { total_q: totalQ });
              }
              send('q_answered', {
                h: h,
                stem: stem.slice(0, 80),
                img: img || undefined,
                c: isOk ? 1 : 0,
                t_ms: Math.min(Date.now() - shownTs, 600000)
              });
            }
            shownTs = Date.now();
          }
        }
      } catch (e) {}
      return ret;
    };
  }

  var origSummary = window.showSummary;
  if (typeof origSummary === 'function') {
    window.showSummary = function () {
      var ret = origSummary.apply(this, arguments);
      try {
        if (!completed && answered > 0) {
          completed = true;
          send('drill_completed', {
            answered: answered,
            correct: correct,
            pct: Math.round(100 * correct / answered),
            total_q: totalQ,
            duration_s: Math.min(Math.round((Date.now() - startTs) / 1000), 36000)
          });
        }
      } catch (e) {}
      return ret;
    };
  }
})();

</script>
