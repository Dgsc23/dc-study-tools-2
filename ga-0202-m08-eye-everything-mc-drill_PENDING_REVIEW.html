<script>
const BANK=[{"q":"A skull shows the orbit as a four-walled cavity narrowing to a point posteriorly. Which structure marks the apex of this pyramidal cavity?","o":["The inferior orbital fissure in the floor","The supraorbital margin at the anterior opening","The optic canal, through which the optic nerve leaves to enter the cranial cavity","The lacrimal fossa in the medial wall"],"c":2,"cat":"Orbit — Bones & Walls","r":["The inferior orbital fissure is a doorway in the region of the floor, not the posterior apex.","The supraorbital margin is part of the anterior base of the pyramid, not the apex.","Correct. Maini describes the orbit as a quadrilateral pyramid whose apex lies posteriorly, essentially formed by the optic canal where the optic nerve exits into the cranial cavity.","The lacrimal fossa is an anteromedial landmark, unrelated to the apex."],"source":"L19 · Osteology of the orbit","quote":"[Maini] 'Optic nerve leaves through optic canal and enters the cranial cavity — that is the apex of the orbit.'","obj":"Orbit — pyramidal shape & apex","hint":"Apex is posterior; the optic canal sits there."},{"q":"The base (margin) of the orbit is made up of three bones. Which set is correct?","o":["Frontal, ethmoid, and lacrimal","Nasal, frontal, and sphenoid","Sphenoid, palatine, and maxilla","Frontal, maxilla, and zygomatic"],"c":3,"cat":"Orbit — Bones & Walls","r":["Ethmoid and lacrimal are medial-wall bones, not margin bones.","The nasal bone borders the nose, not the orbital margin proper.","Palatine and sphenoid contribute to deeper walls, not the anterior margin.","Correct. Maini lists frontal, zygomatic, and maxilla as the three bones forming the margin of the base of the orbit."],"source":"L19 · Margins of the orbit","quote":"[Maini] 'Three bones make up the margin of the base of the orbit — frontal, zygomatic, and maxilla.'","obj":"Orbital margin bones","hint":"Three: frontal, zygomatic, maxilla."},{"q":"The roof of the orbital cavity is formed by which two components?","o":["Orbital plate of the frontal bone and the greater wing of the sphenoid","Orbital surface of the maxilla and the zygomatic bone","Ethmoid air cells and the lacrimal bone","Orbital plate of the frontal bone and the lesser wing of the sphenoid"],"c":3,"cat":"Orbit — Bones & Walls","r":["The greater wing helps form the lateral wall, not the roof.","Maxilla and zygomatic form the floor and lateral wall respectively.","Ethmoid and lacrimal form the medial wall.","Correct. Maini names the orbital plate of the frontal bone plus the lesser wing of the sphenoid as the two roof components."],"source":"L19 · Roof of the orbit","quote":"[Maini] 'Orbital plate of frontal bone... lesser wing of sphenoid also forms part of the roof.'","obj":"Roof of the orbit","hint":"Frontal plate + lesser wing of sphenoid."},{"q":"On the medial wall of the orbit, which bone is the most prominent and is recognised by its multiple air cells?","o":["Lacrimal","Ethmoid","Frontal","Maxilla"],"c":1,"cat":"Orbit — Bones & Walls","r":["The lacrimal is present but thin and small, not the most prominent.","Correct. Maini says the ethmoid is the most prominent medial-wall bone, identified by its air cells (sinuses arranged as multiple compartments).","The frontal contributes but is not identified by air cells here.","The maxilla contributes only a small part of the medial wall."],"source":"L19 · Medial wall","quote":"[Maini] 'In the medial wall, the most prominent one is ethmoid... it has these air cells.'","obj":"Medial wall — ethmoid","hint":"Air cells = ethmoid."},{"q":"Which paper-thin medial-wall bone did Maini note was formerly called the 'papyrus' bone?","o":["Ethmoid bone","Lacrimal bone","Nasal bone","Palatine bone"],"c":1,"cat":"Orbit — Bones & Walls","r":["The ethmoid is thin-walled but is identified by air cells, not the papyrus name.","Correct. Maini calls the lacrimal bone the 'papyrus' bone because it is papery thin.","The nasal bone is not part of the medial orbital wall in her list.","The palatine makes only a tiny floor contribution."],"source":"L19 · Medial wall","quote":"[Maini] 'This blue bone, that is lacrimal... it used to be called papyrus bone because it is papery thin.'","obj":"Lacrimal bone","hint":"Papyrus = papery thin = lacrimal."},{"q":"According to Maini, which bone forms most of the floor of the orbit?","o":["Sphenoid","Zygomatic","Palatine","Maxilla"],"c":3,"cat":"Orbit — Bones & Walls","r":["The sphenoid forms parts of the roof, lateral wall, and apex, not the floor.","The zygomatic makes only a small contribution to the floor.","The palatine contributes only a very tiny amount — she said she would not test it as the floor bone.","Correct. Maini stresses the floor is mostly the maxillary bone (orbital surface of maxilla)."],"source":"L19 · Floor of the orbit","quote":"[Maini] 'Mostly it is maxillary bone that forms the floor.'","obj":"Floor of the orbit","hint":"Floor = mostly maxilla."},{"q":"The lateral wall of the orbit is formed by which two bones?","o":["Maxilla and the ethmoid","Frontal process of the zygomatic and the greater wing of the sphenoid","Zygomatic and the lesser wing of the sphenoid","Frontal and the lacrimal"],"c":1,"cat":"Orbit — Bones & Walls","r":["Maxilla and ethmoid belong to the floor and medial wall.","Correct. Maini names the frontal process of the zygomatic plus the greater wing of the sphenoid as the lateral-wall bones.","It is the greater wing, not the lesser wing, that forms the lateral wall.","Frontal and lacrimal belong to the roof and medial wall."],"source":"L19 · Lateral wall","quote":"[Maini] 'Lateral is formed by the frontal process of zygomatic and greater wing of sphenoid.'","obj":"Lateral wall","hint":"Zygomatic + greater wing of sphenoid."},{"q":"Because of orbital orientation, how are the walls arranged relative to each other?","o":["All four walls are parallel to one another","The two lateral walls are parallel, while the medial walls meet at 90 degrees","The two medial walls are parallel, while the lateral walls meet at roughly a 90-degree angle","The medial and lateral walls of the same orbit are parallel"],"c":2,"cat":"Orbit — Bones & Walls","r":["The walls are not all parallel; the lateral walls diverge.","This reverses the arrangement — it is the medial walls that are parallel.","Correct. Maini says the medial walls run parallel to each other and the lateral walls, if extended, make a 90-degree angle.","Within one orbit the walls converge toward the apex, so they are not parallel."],"source":"L19 · Orientation of the orbits","quote":"[Maini] 'Their medial walls are parallel to each other, and their lateral walls make an angle of 90 degrees with each other.'","obj":"Orbital orientation","hint":"Medial parallel; lateral 90°."},{"q":"This orbital orientation makes which field of vision the widest?","o":["The medial (nasal) field","The lateral (temporal) field","The inferior field","The superior field"],"c":1,"cat":"Orbit — Bones & Walls","r":["The medial field is restricted by the nasal bone.","Correct. Maini explains the lateral, or temporal, field of vision is widest because nothing restricts it.","The inferior field is limited by the zygomatic bone.","The superior field is limited by the superciliary arch."],"source":"L19 · Fields of vision","quote":"[Maini] 'Your lateral field of vision, which is also called temporal field of vision, it is the widest.'","obj":"Fields of vision","hint":"Temporal = lateral = widest."},{"q":"When looking straight ahead, the medial field of vision is restricted by which structure?","o":["The superciliary arch","The greater wing of the sphenoid","The nasal bone","The zygomatic bone"],"c":2,"cat":"Orbit — Bones & Walls","r":["The superciliary arch restricts the superior field.","The greater wing forms the lateral wall and does not restrict the medial field.","Correct. Maini attributes restriction of the medial field to the nasal bone.","The zygomatic bone restricts the inferior field."],"source":"L19 · Fields of vision","quote":"[Maini] 'Your medial field of vision is restricted by nasal bone.'","obj":"Field restriction","hint":"Medial = nose bone."},{"q":"Loss of conjugate vision, so that the two optic axes no longer stay parallel, is characteristic of which condition?","o":["Astigmatism","Strabismus (squint) from paralysis of an extraocular muscle","Presbyopia","Cataract"],"c":1,"cat":"Orbit — Bones & Walls","r":["Astigmatism is an irregular corneal curvature.","Correct. Maini says dissociation of the optic axes occurs in squint/strabismus, from loss of conjugate vision due to paralysis of an extraocular muscle.","Presbyopia is an age-related near-focusing problem, not an axis-alignment problem.","Cataract is lens opacity, not a conjugate-gaze defect."],"source":"L19 · Conjugate vision","quote":"[Maini] 'Only time there is dissociation of the axis is when there is squint, when there is strabismus... paralysis of one or another extraocular muscle.'","obj":"Conjugate vision & strabismus","hint":"Axes drift apart = squint."},{"q":"How many 'doorways' allow structures to enter or leave the orbit, and what are they?","o":["Three: the superior orbital fissure, inferior orbital fissure, and optic canal","Two: the superior and inferior orbital fissures only","Four: the two fissures, the optic canal, and the supraorbital foramen","Three: the optic canal, foramen rotundum, and inferior orbital fissure"],"c":0,"cat":"Fissures, Canals & Foramina","r":["Correct. Maini names three doorways: superior orbital fissure, inferior orbital fissure, and optic canal.","There are three, not two — the optic canal is the third.","The supraorbital foramen transmits its named vessels/nerve but is not counted among the three main doorways.","Foramen rotundum is a skull-base foramen, not an orbital doorway in her list of three."],"source":"L19 · Doorways of the orbit","quote":"[Maini] 'There are three doorways to the orbit — superior orbital fissure, inferior orbital fissure, and optic canal.'","obj":"Orbital doorways","hint":"SOF, IOF, optic canal."},{"q":"The superior orbital fissure lies between which parts of the sphenoid bone?","o":["Between the greater and lesser wings of the sphenoid","Within the body of the sphenoid","Between the lesser wing and the frontal bone","Between the sphenoid body and the maxilla"],"c":0,"cat":"Fissures, Canals & Foramina","r":["Correct. Maini places the superior orbital fissure between the greater and lesser wings of the sphenoid.","The fissure is between the wings, not within the body.","The lesser wing–frontal relationship forms part of the roof, not this fissure.","The maxilla-sphenoid junction is the inferior orbital fissure."],"source":"L19 · Superior orbital fissure","quote":"[Maini] 'This fissure is located between the greater and lesser wing of the sphenoid.'","obj":"SOF location","hint":"Between the two sphenoid wings."},{"q":"Which vein passes through the superior orbital fissure, and with which cavity does the fissure communicate?","o":["Inferior ophthalmic vein; pterygopalatine fossa","Facial vein; anterior cranial fossa","Superior ophthalmic vein; pterygoid venous plexus","Superior ophthalmic vein; middle cranial fossa"],"c":3,"cat":"Fissures, Canals & Foramina","r":["The inferior ophthalmic vein and the pterygopalatine fossa relate to the inferior orbital fissure.","The facial vein connects anteriorly, not through the SOF into the anterior fossa.","The pterygoid plexus is reached via the inferior orbital fissure, not the SOF.","Correct. Maini says the superior ophthalmic vein passes through the SOF, which communicates with the middle cranial fossa."],"source":"L19 · Superior orbital fissure","quote":"[Maini] 'Superior ophthalmic vein — it communicates with middle cranial fossa.'","obj":"SOF contents","hint":"Superior ophthalmic vein → middle cranial fossa."},{"q":"The optic canal is part of which bony structure, and which two structures pass through it?","o":["Lesser wing of the sphenoid; oculomotor nerve and superior ophthalmic vein","Greater wing of the sphenoid; optic nerve and central retinal vein","Lesser wing of the sphenoid; optic nerve and ophthalmic artery","Body of the sphenoid; maxillary nerve and ophthalmic artery"],"c":2,"cat":"Fissures, Canals & Foramina","r":["The oculomotor nerve enters through the superior orbital fissure, not the optic canal.","It is the lesser wing, and the ophthalmic artery (not the central retinal vein) accompanies the optic nerve here.","Correct. Maini states the optic canal is part of the lesser wing of the sphenoid and transmits the optic nerve and ophthalmic artery.","The body of the sphenoid does not form the optic canal; the maxillary nerve runs elsewhere."],"source":"L19 · Optic canal","quote":"[Maini] 'Optic canal is a part of lesser wing of sphenoid — for the optic nerve and ophthalmic artery.'","obj":"Optic canal","hint":"Lesser wing; CN II + ophthalmic artery."},{"q":"The inferior orbital fissure lies between which bones and communicates chiefly with which region?","o":["Between the maxilla and the palatine; the anterior cranial fossa","Between the greater and lesser wings of the sphenoid; the middle cranial fossa","Between the ethmoid and the lacrimal bone; the nasal cavity","Between the maxilla and the greater wing of the sphenoid; the pterygopalatine/infratemporal fossa"],"c":3,"cat":"Fissures, Canals & Foramina","r":["The palatine and anterior fossa do not define the inferior orbital fissure.","That greater/lesser wing relationship and middle cranial fossa describe the superior orbital fissure.","The ethmoid-lacrimal region is the medial wall, not this fissure.","Correct. Maini locates the inferior orbital fissure between the maxilla and greater wing of sphenoid, communicating with the pterygopalatine and infratemporal fossae (outside the cranial cavity)."],"source":"L19 · Inferior orbital fissure","quote":"[Maini] 'It is between the pterygopalatine fossa... it is outside the cranial cavity.'","obj":"IOF location","hint":"Maxilla + greater wing; opens to pterygopalatine fossa."},{"q":"Besides the maxillary nerve and inferior ophthalmic vein, which artery did Maini emphasise also passes through the inferior orbital fissure (even though it was not on her slide)?","o":["Central retinal artery","Lacrimal artery","Infraorbital artery","Ophthalmic artery"],"c":2,"cat":"Fissures, Canals & Foramina","r":["The central retinal artery runs inside the optic nerve.","The lacrimal artery reaches the lacrimal gland but is not the vessel she highlights for this fissure.","Correct. Maini repeatedly points out that the infraorbital artery also enters through the inferior orbital fissure.","The ophthalmic artery travels through the optic canal."],"source":"L19 · Inferior orbital fissure","quote":"[Maini] 'Infraorbital artery also passes through inferior orbital fissure.'","obj":"IOF — infraorbital artery","hint":"Infraorbital artery enters via IOF."},{"q":"The infraorbital artery is the terminal branch of which artery, and it finally exits the face through which foramen?","o":["Terminal branch of the ophthalmic artery; exits through the supraorbital foramen","Terminal branch of the maxillary artery; exits through the infraorbital foramen","Terminal branch of the superficial temporal artery; exits through the optic canal","Terminal branch of the facial artery; exits through the infraorbital foramen"],"c":1,"cat":"Fissures, Canals & Foramina","r":["It is not from the ophthalmic artery, and the supraorbital foramen transmits different vessels.","Correct. Maini says the infraorbital artery is the terminal branch of the maxillary artery; it runs in the infraorbital groove/canal and exits at the infraorbital foramen.","It has no relationship to the optic canal or superficial temporal artery.","It is a maxillary, not facial, artery branch."],"source":"L19 · Infraorbital artery","quote":"[Maini] 'The terminal branch of maxillary artery is called infraorbital artery... exits through infraorbital foramen.'","obj":"Infraorbital artery course","hint":"Maxillary artery → infraorbital foramen."},{"q":"The infraorbital foramen is part of which bone?","o":["Palatine","Maxilla","Zygomatic","Frontal"],"c":1,"cat":"Fissures, Canals & Foramina","r":["The palatine has only a tiny orbital contribution and does not bear this foramen.","Correct. Maini confirms the infraorbital foramen belongs to the maxilla.","The zygomatic carries the zygomaticofacial/temporal foramina, not the infraorbital foramen.","The frontal carries the supraorbital notch/foramen."],"source":"L19 · Infraorbital foramen","quote":"[Maini] 'Infraorbital foramen is a part of which bone? It was maxilla.'","obj":"Infraorbital foramen — bone","hint":"Maxilla."},{"q":"The lacrimal fossa in the medial wall of the orbit accommodates which structure?","o":["The lacrimal sac (nasolacrimal sac) — not the lacrimal gland","The lacrimal caruncle","The trochlea of the superior oblique","The lacrimal gland"],"c":0,"cat":"Eyelids & Lacrimal Apparatus","r":["Correct. Maini explicitly corrects a common error: the medial-wall lacrimal fossa holds the lacrimal (nasolacrimal) sac, not the gland.","The lacrimal caruncle is the elevation within the lacrimal lake, not a fossa occupant.","The trochlea is a pulley for the superior oblique, unrelated to this fossa.","The lacrimal gland sits in a shallow fossa on the frontal bone superolaterally, not this medial fossa."],"source":"L19 · Lacrimal fossa","quote":"[Maini] 'This is not the location of lacrimal gland... this is the location of nasolacrimal sac.'","obj":"Lacrimal fossa contents","hint":"Medial-wall fossa = SAC, not gland."},{"q":"The zygomaticotemporal and zygomaticofacial foramina are located in which wall of the orbit?","o":["Lateral wall","Roof","Floor","Medial wall"],"c":0,"cat":"Fissures, Canals & Foramina","r":["Correct. Maini places these two foramina in the lateral wall, transmitting the nerves of the same name.","The roof has no such named foramina in her account.","The floor carries the infraorbital groove/canal, not these foramina.","The medial wall carries the ethmoidal foramina."],"source":"L19 · Foramina of the orbit","quote":"[Maini] 'Zygomaticotemporal and zygomaticofacial foramina... located in the lateral wall of the orbit.'","obj":"Lateral-wall foramina","hint":"Zygomatico- = lateral wall."},{"q":"At the eyelid margins, the sebaceous glands associated with the eyelashes are called what?","o":["Glands of Zeis","Meibomian (tarsal) glands","Lacrimal glands","Glands of Moll"],"c":0,"cat":"Eyelids & Lacrimal Apparatus","r":["Correct. Maini identifies the sebaceous glands of the eyelashes at the margin as the glands of Zeis.","Meibomian (tarsal) glands lie within the tarsal plate, not at the lash line as sebaceous lash glands.","Lacrimal glands secrete tears and are not eyelid-margin glands.","The glands of Moll are the sweat glands at the margin."],"source":"L19 · Eyelid glands","quote":"[Maini] 'Sebaceous glands of the eyelashes, which are called glands of Zeis.'","obj":"Marginal glands — Zeis","hint":"Sebaceous of lashes = Zeis."},{"q":"The sweat glands at the margin of the eyelids are named the glands of what?","o":["Moll","Zeis","Meibomian","Krause"],"c":0,"cat":"Eyelids & Lacrimal Apparatus","r":["Correct. Maini names the marginal sweat glands the glands of Moll.","The glands of Zeis are the sebaceous glands of the lashes.","Meibomian glands are the tarsal (sebaceous) glands inside the plate.","Krause glands are accessory lacrimal glands, not part of her marginal pair."],"source":"L19 · Eyelid glands","quote":"[Maini] 'There are sweat glands also, which are called sweat glands of Moll.'","obj":"Marginal glands — Moll","hint":"Sweat of margin = Moll."},{"q":"The tarsal glands embedded within the tarsal plate are also called Meibomian glands. What is their secretion's function?","o":["To produce the aqueous tear film","To dilate the pupil","To lubricate the nasolacrimal duct","To keep the closed eyelids airtight and slow drying of the tear film"],"c":3,"cat":"Eyelids & Lacrimal Apparatus","r":["The aqueous tears come from the lacrimal gland, not the Meibomian glands.","Pupil dilation is a function of the dilator pupillae muscle, not a gland.","They do not lubricate the nasolacrimal duct.","Correct. Maini says Meibomian (tarsal) sebaceous secretions keep closed eyelids airtight so the eyes do not dry out."],"source":"L19 · Tarsal (Meibomian) glands","quote":"[Maini] 'Their secretions help to make closed eyelids airtight.'","obj":"Meibomian gland function","hint":"Meibomian = airtight lids."},{"q":"Inflammation of the marginal glands (of Zeis or Moll) produces which clinical lesion?","o":["Chalazion on the body of the eyelid","Papilledema","External hordeolum (stye) — a swelling at the lid margin","Dacryocystitis"],"c":2,"cat":"Eyelids & Lacrimal Apparatus","r":["A chalazion arises from tarsal (Meibomian) gland inflammation and sits on the lid body, not the margin.","Papilledema is optic-disc swelling, unrelated to eyelid glands.","Correct. Maini links inflamed marginal glands to an external hordeolum (stye) at the lid margin, which usually drains and responds to antibiotics.","Dacryocystitis is inflammation of the lacrimal sac."],"source":"L19 · Eyelid gland pathology","quote":"[Maini] 'Inflammation of the marginal glands... external hordeolum, or stye.'","obj":"External hordeolum","hint":"Margin gland → stye (external)."},{"q":"A firm lump on the body of the eyelid (not at the margin) that often needs minor surgical scooping is caused by inflammation of which gland?","o":["Tarsal (Meibomian) gland — producing a chalazion / internal hordeolum","Gland of Moll — producing a stye","Lacrimal gland — producing dacryoadenitis","Gland of Zeis — producing a stye"],"c":0,"cat":"Eyelids & Lacrimal Apparatus","r":["Correct. Maini says inflamed Meibomian glands cause an internal hordeolum / chalazion on the eyelid body, often needing surgical scooping because of their narrow outlets.","The gland of Moll likewise causes a marginal stye.","Dacryoadenitis is lacrimal-gland inflammation, not an eyelid lump.","The gland of Zeis produces an external stye at the margin, not on the lid body."],"source":"L19 · Chalazion","quote":"[Maini] 'If the tarsal gland gets inflamed, you get internal hordeolum or chalazion... on the eyelid, not at the margin.'","obj":"Chalazion","hint":"Meibomian → chalazion on lid body."},{"q":"Within the lacrimal lake at the medial angle, the small central elevation that directs tears medially is the:","o":["Lacrimal papilla","Plica semilunaris","Lacrimal punctum","Lacrimal caruncle"],"c":3,"cat":"Eyelids & Lacrimal Apparatus","r":["The lacrimal papilla is the elevation at each lid margin bearing the punctum.","The plica semilunaris is the curved conjunctival fold forming the lateral boundary of the lake.","The lacrimal punctum is the tiny pore, not an elevation.","Correct. Maini names the central elevation in the lacrimal lake the lacrimal caruncle, which directs fluid medially."],"source":"L19 · Lacrimal lake","quote":"[Maini] 'In the center of the lacrimal lake there is an elevation called lacrimal caruncle.'","obj":"Lacrimal caruncle","hint":"Central mound in the lake = caruncle."},{"q":"The curved conjunctival fold forming the lateral boundary of the lacrimal lake is the:","o":["Lacrimal caruncle","Plica semilunaris (semilunar fold)","Tarsal plate","Bulbar conjunctiva fornix"],"c":1,"cat":"Eyelids & Lacrimal Apparatus","r":["The caruncle is the central elevation, not the boundary fold.","Correct. Maini describes the plica semilunaris as a curved conjunctival fold forming the lateral boundary of the lacrimal lake.","The tarsal plate is the fibrous eyelid framework, not a conjunctival fold.","The fornix is where palpebral meets bulbar conjunctiva, not this boundary."],"source":"L19 · Lacrimal lake","quote":"[Maini] 'Plica semilunaris... forms the lateral boundary of the lacrimal lake.'","obj":"Plica semilunaris","hint":"Lateral edge of the lake = plica semilunaris."},{"q":"The tiny pore at the summit of each lacrimal papilla, which begins tear drainage, is the:","o":["Lacrimal sac","Lacrimal canaliculus","Nasolacrimal duct","Lacrimal punctum"],"c":3,"cat":"Eyelids & Lacrimal Apparatus","r":["The lacrimal sac is further downstream in the medial wall.","The canaliculus is the small canal after the punctum, not the pore itself.","The nasolacrimal duct carries tears from the sac to the nose.","Correct. Maini says each papilla bears a tiny pore, the lacrimal punctum, that leads into a lacrimal canal."],"source":"L19 · Lacrimal apparatus","quote":"[Maini] 'At the center of each lacrimal papilla is a tiny pore called lacrimal punctum.'","obj":"Lacrimal punctum","hint":"Pore on the papilla = punctum."},{"q":"Which sequence correctly traces tear drainage from the eye to the nose?","o":["Lacrimal sac → puncta → canaliculi → nasolacrimal duct → nasal cavity","Puncta → lacrimal canaliculi → lacrimal sac → nasolacrimal duct → nasal cavity","Canaliculi → puncta → nasolacrimal duct → lacrimal sac → nasal cavity","Nasolacrimal duct → lacrimal sac → puncta → canaliculi → nasal cavity"],"c":1,"cat":"Eyelids & Lacrimal Apparatus","r":["The sac cannot precede the puncta; tears enter at the puncta first.","Correct. Maini's drainage path is puncta → canaliculi (lacrimal canals) → lacrimal sac → nasolacrimal duct → nasal cavity.","The puncta precede the canaliculi, and the sac precedes the duct.","The nasolacrimal duct is the last step before the nose, not the first."],"source":"L19/L20 · Tear drainage","quote":"[Maini] 'Through lacrimal punctum... two lacrimal canals to the sac, and through the nasolacrimal duct into the nasal cavity.'","obj":"Tear drainage pathway","hint":"Puncta → canaliculi → sac → duct → nose."},{"q":"Ultimately, the nasolacrimal duct delivers tears into which part of the nasal cavity?","o":["Middle meatus","Superior meatus","Inferior meatus","Sphenoethmoidal recess"],"c":2,"cat":"Eyelids & Lacrimal Apparatus","r":["The middle meatus receives frontal, maxillary, and anterior ethmoidal sinus drainage.","The superior meatus receives posterior ethmoidal drainage, not the nasolacrimal duct.","Correct. Maini states the secretions drain into the inferior meatus of the nasal cavity.","The sphenoethmoidal recess drains the sphenoid sinus."],"source":"L20 · Nasolacrimal duct","quote":"[Maini] 'Your lacrimal fluids reach the inferior meatus of nasal cavity.'","obj":"Nasolacrimal duct outlet","hint":"Tears → inferior meatus."},{"q":"Inflammation of the lacrimal sac is termed:","o":["Chalazion","Dacryoadenitis","Conjunctivitis","Dacryocystitis"],"c":3,"cat":"Eyelids & Lacrimal Apparatus","r":["A chalazion is a Meibomian-gland lesion.","Dacryoadenitis is inflammation of the lacrimal gland (adeno = gland).","Conjunctivitis is inflammation of the conjunctiva.","Correct. Maini defines dacryocystitis as inflammation of the lacrimal sac (cyst = sac)."],"source":"L20 · Lacrimal pathology","quote":"[Maini] 'Dacryocystitis is inflammation of lacrimal sac.'","obj":"Dacryocystitis","hint":"Cyst = sac → dacryocystitis."},{"q":"Inflammation of the lacrimal gland is termed:","o":["Blepharitis","Dacryoadenitis","Xerophthalmia","Dacryocystitis"],"c":1,"cat":"Eyelids & Lacrimal Apparatus","r":["Blepharitis is eyelid-margin inflammation.","Correct. Maini defines dacryoadenitis as inflammation of the lacrimal gland (adeno = gland); she notes an autoimmune form.","Xerophthalmia is dry eye from absent secretions, not gland inflammation itself.","Dacryocystitis is inflammation of the sac, not the gland."],"source":"L20 · Lacrimal pathology","quote":"[Maini] 'Anything with adeno... dacryoadenitis is an inflammation of lacrimal gland.'","obj":"Dacryoadenitis","hint":"Adeno = gland → dacryoadenitis."},{"q":"Total loss of lacrimal secretion (xerophthalmia) is dangerous chiefly because it can cause:","o":["Papilledema","Corneal ulceration, corneal aberrations, and blindness","Cataract","Glaucoma"],"c":1,"cat":"Eyelids & Lacrimal Apparatus","r":["Papilledema reflects raised intracranial pressure.","Correct. Maini warns that absent lacrimal secretion dries the cornea, causing corneal aberrations, ulcers, and even corneal blindness.","Cataract is age-related lens opacity.","Glaucoma is due to raised intraocular pressure, not dryness."],"source":"L19 · Xerophthalmia","quote":"[Maini] 'Absolute loss of lacrimal secretions... is going to cause corneal aberrations, corneal ulcers, corneal blindness.'","obj":"Xerophthalmia consequences","hint":"Dry cornea → ulcer/blindness."},{"q":"The avascular cornea receives its anterior nutrition and oxygen from which source?","o":["Aqueous humor from the anterior chamber","Vitreous humor","Lacrimal fluid (tears) and atmospheric oxygen","The central retinal artery"],"c":2,"cat":"Eyelids & Lacrimal Apparatus","r":["Aqueous humor nourishes the cornea from its posterior surface, not anteriorly.","Vitreous humor lies behind the lens and does not nourish the cornea.","Correct. Maini says the cornea, being avascular, is nourished anteriorly by lacrimal fluid and takes oxygen from atmospheric air.","The central retinal artery supplies the inner retina, not the cornea."],"source":"L20 · Corneal nutrition","quote":"[Maini] 'Cornea is avascular... it gets its nutrition from lacrimal fluid anteriorly.'","obj":"Corneal nutrition (anterior)","hint":"Front of cornea: tears + air."},{"q":"Dissecting the eyelid from superficial to deep, which layer sequence is correct?","o":["Skin → orbicularis oculi (in superficial fascia) → levator palpebrae superioris tendon → tarsal plate → palpebral conjunctiva","Palpebral conjunctiva → tarsal plate → skin → orbicularis oculi → LPS tendon","Skin → LPS tendon → conjunctiva → orbicularis oculi → tarsal plate","Skin → tarsal plate → orbicularis oculi → conjunctiva → LPS tendon"],"c":0,"cat":"Eyelids & Lacrimal Apparatus","r":["Correct. Maini dissects the lid as skin, then orbicularis oculi in superficial fascia, then the LPS tendon of insertion, then the tarsal plate with Meibomian glands, then palpebral conjunctiva innermost.","Skin is the outermost layer, so conjunctiva cannot be first.","The LPS tendon lies deep to orbicularis, not directly under skin before conjunctiva.","The tarsal plate is deep, not immediately under the skin."],"source":"L19 · Layers of the eyelid","quote":"[Maini] 'Outermost is skin, then superficial fascia containing orbicularis oculi... then LPS tendon... then tarsal plate... innermost is palpebral conjunctiva.'","obj":"Eyelid layers","hint":"Skin, orbicularis, LPS tendon, tarsus, conjunctiva."},{"q":"Which eyelid muscle lies in the superficial fascia, belongs to the muscles of facial expression, and closes the eye?","o":["Levator palpebrae superioris","Superior tarsal muscle","Orbicularis oculi","Ciliary muscle"],"c":2,"cat":"Eyelids & Lacrimal Apparatus","r":["Levator palpebrae superioris opens (elevates) the upper lid, not closes the eye.","The superior tarsal muscle is smooth muscle that assists lid elevation, not eye closure.","Correct. Maini identifies orbicularis oculi as a muscle of facial expression, within the superficial fascia, that closes the eye.","The ciliary muscle is an intrinsic muscle for accommodation."],"source":"L19 · Orbicularis oculi","quote":"[Maini] 'Orbicularis oculi... muscles of facial expression... helps you close the eye.'","obj":"Orbicularis oculi","hint":"Closes the eye; facial-expression muscle."},{"q":"The palpebral conjunctiva lining the inner eyelid reflects onto the anterior eyeball, where it becomes the:","o":["Bulbar conjunctiva","Corneal epithelium","Palpebral conjunctiva again","Tarsal conjunctiva"],"c":0,"cat":"Eyelids & Lacrimal Apparatus","r":["Correct. Maini says the palpebral conjunctiva reflects onto the eyeball's anterior surface as the bulbar conjunctiva.","The corneal epithelium is distinct from the reflected conjunctiva.","It changes name at the reflection, so it is not still 'palpebral' on the globe.","'Tarsal conjunctiva' is another term for the palpebral part on the lid, not on the globe."],"source":"L19 · Conjunctiva","quote":"[Maini] 'It is reflected on the anterior surface of the eyeball... called bulbar conjunctiva.'","obj":"Conjunctiva — palpebral vs bulbar","hint":"On the globe = bulbar."},{"q":"Levator palpebrae superioris originates from the undersurface of which structure, just above the optic canal?","o":["Body of the sphenoid","Lesser wing of the sphenoid","Orbital plate of the frontal bone","Greater wing of the sphenoid"],"c":1,"cat":"Levator Palpebrae & Horner Syndrome","r":["The body of the sphenoid gives origin to the superior oblique, not LPS.","Correct. Maini states LPS arises from the undersurface of the lesser wing of the sphenoid above the optic canal.","The frontal orbital plate is the roof but not the LPS origin.","The greater wing forms the lateral wall and is not the LPS origin."],"source":"L19 · LPS origin","quote":"[Maini] 'Originates from undersurface of lesser wing of sphenoid bone above the optic canal.'","obj":"LPS origin","hint":"Lesser wing of sphenoid, above optic canal."},{"q":"The smooth-muscle part of levator palpebrae superioris is a distinct muscle called the superior tarsal muscle. What innervates it?","o":["Parasympathetic fibers only","The facial nerve","The oculomotor nerve (GSE)","Sympathetic fibers only"],"c":3,"cat":"Levator Palpebrae & Horner Syndrome","r":["It is sympathetic, not parasympathetic.","The facial nerve supplies orbicularis oculi, not the superior tarsal muscle.","The oculomotor nerve (GSE) supplies the skeletal part of LPS, not the smooth superior tarsal muscle.","Correct. Maini stresses the superior tarsal (smooth) muscle is supplied by sympathetic fibers only."],"source":"L19 · Superior tarsal muscle","quote":"[Maini] 'The superior tarsal muscle is supplied by sympathetic fibers only.'","obj":"Superior tarsal muscle innervation","hint":"Superior tarsal = sympathetic."},{"q":"The main skeletal-muscle portion of levator palpebrae superioris is innervated by which nerve?","o":["Facial nerve (CN VII)","Sympathetic fibers","Trochlear nerve (CN IV)","Oculomotor nerve (CN III)"],"c":3,"cat":"Levator Palpebrae & Horner Syndrome","r":["The facial nerve supplies orbicularis oculi, which closes the eye.","Sympathetic fibers supply the smooth superior tarsal part, not the skeletal LPS.","The trochlear nerve supplies only the superior oblique.","Correct. Maini says the skeletal part of LPS (GSE fibers) is supplied by the oculomotor nerve."],"source":"L19 · LPS innervation","quote":"[Maini] 'Levator palpebrae superioris — third nerve, GSE fibers.'","obj":"LPS innervation","hint":"Skeletal LPS = CN III."},{"q":"A patient with unilateral sympathetic failure shows only partial (not complete) ptosis. Why is the ptosis partial?","o":["The orbicularis oculi overrides the lid closure","The facial nerve compensates for LPS","The oculomotor-supplied skeletal part of LPS is still intact; only the sympathetic superior tarsal muscle fails","The entire LPS is paralysed but gravity holds the lid up"],"c":2,"cat":"Levator Palpebrae & Horner Syndrome","r":["Orbicularis oculi closes the lid; it does not prevent ptosis.","The facial nerve does not elevate the lid.","Correct. Maini explains that only the superior tarsal (sympathetic) muscle fails, while the CN III-supplied skeletal LPS remains active, giving partial ptosis.","The whole LPS is not paralysed in sympathetic failure — only its smooth-muscle part."],"source":"L19 · Partial ptosis","quote":"[Maini] 'Partial ptosis — superior tarsal muscle is not functioning, but third nerve is intact.'","obj":"Partial ptosis mechanism","hint":"CN III intact → only partial droop."},{"q":"Which finding is NOT part of Horner syndrome as Maini described it?","o":["Partial ptosis","Mydriasis (pupillary dilation)","Enophthalmos","Anhidrosis (loss of facial sweating)"],"c":1,"cat":"Levator Palpebrae & Horner Syndrome","r":["Partial ptosis is a classic Horner feature.","Correct. Horner syndrome features miosis (constriction), so mydriasis is NOT part of it.","Enophthalmos (sunken eye) is Maini's fifth, less-explained Horner feature.","Anhidrosis on the affected side is a Horner feature."],"source":"L19 · Horner syndrome","quote":"[Maini] 'Partial ptosis, miosis, anhidrosis, flushing of the face, and enophthalmos.'","obj":"Horner syndrome features","hint":"Horner = miosis, not mydriasis."},{"q":"In Horner syndrome, the pupillary finding is miosis. What does 'miosis' mean?","o":["Drooping of the eyelid","Cell division","Pupillary constriction","Pupillary dilation"],"c":2,"cat":"Levator Palpebrae & Horner Syndrome","r":["Drooping of the lid is ptosis, not miosis.","Meiosis (spelled differently) is cell division; miosis is the pupil term.","Correct. Maini defines miosis as pupillary constriction (distinct from meiosis, the cell-division term).","Dilation is mydriasis, not miosis."],"source":"L19 · Miosis vs mydriasis","quote":"[Maini] 'Miosis is pupillary constriction.'","obj":"Miosis definition","hint":"Miosis = small pupil."},{"q":"Which lesion did Maini name as a common cause of Horner syndrome?","o":["Middle cerebral artery stroke","Bell palsy of the facial nerve","Pancoast (apical lung) tumor compressing the cervical sympathetic chain","Acute angle-closure glaucoma"],"c":2,"cat":"Levator Palpebrae & Horner Syndrome","r":["A middle cerebral artery stroke does not typically produce isolated Horner syndrome.","Bell palsy affects CN VII (facial weakness), not the sympathetic chain.","Correct. Maini cites a Pancoast tumor at the lung apex compressing the cervical sympathetic chain as a common cause.","Angle-closure glaucoma raises intraocular pressure and is unrelated to Horner syndrome."],"source":"L19 · Horner syndrome causes","quote":"[Maini] 'Very common one is Pancoast tumor of lung... it compresses the cervical sympathetic chain.'","obj":"Horner — Pancoast tumor","hint":"Lung apex tumor squeezes the sympathetic chain."},{"q":"Where are the postganglionic sympathetic cell bodies that supply the face and eye (as in Horner syndrome) located?","o":["Superior cervical ganglion","Ciliary ganglion","Pterygopalatine ganglion","Middle cervical ganglion"],"c":0,"cat":"Levator Palpebrae & Horner Syndrome","r":["Correct. Maini says most head and face sympathetic postganglionic neurons are in the superior cervical ganglion.","The ciliary ganglion is parasympathetic, not sympathetic.","The pterygopalatine ganglion is parasympathetic (lacrimal/nasal/palatine).","The middle cervical ganglion mainly serves the neck."],"source":"L20 · Sympathetic pathway","quote":"[Maini] 'For most of the head and face region, it is superior cervical ganglion.'","obj":"Sympathetic postganglionic cell bodies","hint":"Face sympathetics: superior cervical ganglion."},{"q":"The preganglionic sympathetic neurons for the head are located where?","o":["Lateral horn of the spinal cord gray matter at T1–T2","Superior cervical ganglion","Ciliospinal center only, with no spinal cord involvement","Edinger-Westphal nucleus"],"c":0,"cat":"Levator Palpebrae & Horner Syndrome","r":["Correct. Maini traces preganglionic sympathetics to the T1–T2 lateral horn of the spinal cord gray matter.","The superior cervical ganglion holds postganglionic, not preganglionic, cell bodies.","The ciliospinal center at T1 is the reflex center but the preganglionic cell bodies are in the lateral horn at T1–T2.","The Edinger-Westphal nucleus is parasympathetic, for pupil constriction/accommodation."],"source":"L20 · Sympathetic pathway","quote":"[Maini] 'T1, T2 lateral horn of spinal cord gray matter — preganglionic sympathetic fibers.'","obj":"Preganglionic sympathetic location","hint":"Lateral horn T1–T2."},{"q":"The outer fibrous coat (tunica fibrosa) of the eyeball consists of which two parts?","o":["Retina and optic disc","Sclera (posterior five-sixths) and cornea (anterior one-sixth)","Choroid and ciliary body","Iris and pupil"],"c":1,"cat":"Eyeball — Coats & Fascia","r":["Retina and optic disc are in the inner nervous coat.","Correct. Maini's fibrous coat is the opaque white sclera (posterior 5/6) plus the transparent cornea (anterior 1/6).","Choroid and ciliary body belong to the middle vascular coat.","Iris and pupil are part of the vascular coat, not the fibrous coat."],"source":"L20 · Coats of the eyeball","quote":"[Maini] 'Outer fibrous coat — sclera... anterior one-sixth is cornea.'","obj":"Fibrous coat","hint":"Sclera + cornea = fibrous."},{"q":"In a jaundiced patient, the sclera becomes visibly yellow once serum bilirubin rises above roughly which value, and it is noticed there first because of its white color?","o":["About 8 mg%","About 2 mg%","About 0.2 mg%","About 20 mg%"],"c":1,"cat":"Eyeball — Coats & Fascia","r":["8 mg% is far above the threshold she gives.","Correct. Maini says once bilirubin exceeds about 2 mg% the sclera turns yellow, and it is noticed there first because the sclera is white.","0.2 mg% is well within normal and would not discolor the sclera.","20 mg% is extreme and not the stated threshold."],"source":"L20 · Sclera & jaundice","quote":"[Maini] 'Once bilirubin levels are higher than 2 milligram per cent, sclera becomes yellowish.'","obj":"Scleral icterus threshold","hint":"Sclera yellows > ~2 mg%."},{"q":"The perforated posterior region of the sclera through which the optic nerve pierces is the:","o":["Optic disc","Canal of Schlemm","Lamina cribrosa","Ora serrata"],"c":2,"cat":"Eyeball — Coats & Fascia","r":["The optic disc is on the retina, where the nerve exits the retina — not the scleral perforation itself.","The canal of Schlemm is the aqueous drainage channel at the iridocorneal angle.","Correct. Maini names the perforated posterior sclera the lamina cribrosa, the site where the optic nerve pierces.","The ora serrata is the serrated anterior margin of the retina, not scleral perforations."],"source":"L20 · Lamina cribrosa","quote":"[Maini] 'This is called lamina cribrosa... the site where sclera is pierced posteriorly by optic nerve.'","obj":"Lamina cribrosa","hint":"Cribrosa = sieve-like perforations of sclera."},{"q":"The middle vascular coat (tunica vasculosa) of the eyeball is composed of which three structures?","o":["Lens, vitreous body, and aqueous humor","Sclera, cornea, and conjunctiva","Choroid, ciliary body, and iris","Retina, optic disc, and macula"],"c":2,"cat":"Eyeball — Coats & Fascia","r":["Lens, vitreous, and aqueous are refractive media, not the vascular coat.","Sclera and cornea are the outer fibrous coat.","Correct. Maini lists choroid (posterior, largest), ciliary body, and iris as the vascular middle coat.","Retina, optic disc, and macula are in the nervous coat."],"source":"L20 · Vascular coat","quote":"[Maini] 'Choroid... ciliary body, and iris — all this is middle vascular coat.'","obj":"Vascular coat components","hint":"Choroid + ciliary body + iris."},{"q":"The ciliary processes of the ciliary body have which primary function?","o":["To secrete vitreous humor","To directly focus light on the retina","To secrete aqueous humor","To absorb stray light"],"c":2,"cat":"Eyeball — Coats & Fascia","r":["Vitreous body is a gel present from development, not secreted by ciliary processes.","Focusing is done by the lens and refractive media, not by the processes secreting fluid.","Correct. Maini says the ciliary processes secrete aqueous humor.","Stray light is absorbed by the retinal pigmented layer, not the ciliary processes."],"source":"L20 · Ciliary body","quote":"[Maini] 'Ciliary processes... secrete aqueous humor.'","obj":"Ciliary processes function","hint":"Processes make aqueous humor."},{"q":"The circular fibers of the iris form which muscle, and which division of the autonomic system controls it?","o":["Sphincter pupillae; parasympathetic (causing constriction)","Dilator pupillae; sympathetic (causing constriction)","Ciliary muscle; parasympathetic (causing dilation)","Sphincter pupillae; sympathetic (causing dilation)"],"c":0,"cat":"Eyeball — Coats & Fascia","r":["Correct. Maini says the circular iris fibers form the sphincter pupillae, innervated by parasympathetic fibers, producing pupillary constriction (miosis).","The dilator pupillae is formed by radial fibers and is sympathetic, causing dilation, not constriction.","The ciliary muscle is for accommodation, not for iris aperture control.","The sphincter is parasympathetic, not sympathetic, and it constricts."],"source":"L20 · Iris muscles","quote":"[Maini] 'Circular fibers form sphincter pupillae, innervated by parasympathetic fibers.'","obj":"Sphincter pupillae","hint":"Circular fibers = parasympathetic constrictor."},{"q":"The radial fibers of the iris form the dilator pupillae. Which autonomic division controls it, and what is the effect?","o":["Sympathetic; pupillary constriction","Parasympathetic; pupillary dilation","Parasympathetic; pupillary constriction","Sympathetic; pupillary dilation (mydriasis)"],"c":3,"cat":"Eyeball — Coats & Fascia","r":["The sympathetic dilator dilates, it does not constrict.","The dilator is sympathetic, not parasympathetic.","Parasympathetic activity causes constriction via the sphincter, not the dilator.","Correct. Maini says radial fibers form the dilator pupillae, sympathetically innervated, causing mydriasis (dilation)."],"source":"L20 · Iris muscles","quote":"[Maini] 'Dilator pupillae is innervated by sympathetic fibers... causes mydriasis.'","obj":"Dilator pupillae","hint":"Radial fibers = sympathetic dilator."},{"q":"Bulbar fascia (Tenon's capsule) is separated from the sclera by which space?","o":["Episcleral space","Anterior chamber","Suprachoroidal space","Subarachnoid space"],"c":0,"cat":"Eyeball — Coats & Fascia","r":["Correct. Maini describes the episcleral space between Tenon's capsule and the sclera.","The anterior chamber is between cornea and iris, not around the globe posteriorly.","The suprachoroidal space lies between choroid and sclera, not between capsule and sclera.","The subarachnoid space surrounds the optic nerve, not between capsule and sclera here."],"source":"L20 · Tenon's capsule","quote":"[Maini] 'Bulbar fascia is separated from sclera by a space called episcleral space.'","obj":"Episcleral space","hint":"Capsule ↔ sclera gap = episcleral space."},{"q":"Why did Maini say Tenon's capsule (bulbar fascia) is deliberately left intact when an eyeball must be enucleated?","o":["Because it secretes replacement tears","Because it carries the central retinal artery","Because it drains aqueous humor","So an artificial eye can be seated and fixed within the retained capsule"],"c":3,"cat":"Eyeball — Coats & Fascia","r":["The capsule does not secrete tears; that is the lacrimal gland.","The central retinal artery runs in the optic nerve, not in Tenon's capsule.","Aqueous drainage occurs at the iridocorneal angle, not via the capsule.","Correct. Maini explains the capsule is left behind so an artificial eye can be placed and fixed within it."],"source":"L20 · Tenon's capsule clinical","quote":"[Maini] 'You leave this capsule behind so you can fix an artificial eye inside this capsule.'","obj":"Tenon's capsule — enucleation","hint":"Capsule holds the prosthetic eye."},{"q":"Extensions of Tenon's capsule to the medial and lateral orbital walls are called the:","o":["Medial and lateral check ligaments","Medial and lateral palpebral ligaments","Superior and inferior orbital septa","Suspensory ligaments of the lens"],"c":0,"cat":"Eyeball — Coats & Fascia","r":["Correct. Maini names the wall extensions of the capsule the medial and lateral check ligaments.","The palpebral ligaments anchor the eyelids to bone, not the globe capsule to walls.","The orbital septa are part of the eyelid fibrous framework, not capsule extensions.","The suspensory ligament of the lens (zonule) attaches the lens to the ciliary body."],"source":"L20 · Check ligaments","quote":"[Maini] 'Fascia sends an extension to the medial and lateral walls... medial and lateral check ligament.'","obj":"Check ligaments","hint":"Capsule → walls = check ligaments."},{"q":"The retina's outer pigmented layer contains melanin. What is its main function, and who lacks it?","o":["It absorbs stray light; it is deficient in people with albinism","It focuses light; deficient in the myopic","It detects color; deficient in the color-blind","It secretes aqueous humor; deficient in glaucoma"],"c":0,"cat":"Retina & Photoreceptors","r":["Correct. Maini says the pigmented layer's melanin absorbs stray light and is lacking in albinism, causing light sensitivity.","Focusing is a function of the refractive media, not melanin.","Color is detected by cones, not by the pigment epithelium.","Aqueous humor is secreted by ciliary processes, not the pigment layer."],"source":"L20 · Retinal pigmented layer","quote":"[Maini] 'The function of this layer is it absorbs stray lights... people with albinism have no melanin pigment.'","obj":"Retinal pigment epithelium","hint":"Melanin soaks up stray light; absent in albinism."},{"q":"Which photoreceptors provide dim-light (night) vision but cannot detect color?","o":["Rods","Cones","Ganglion cells","Bipolar cells"],"c":0,"cat":"Retina & Photoreceptors","r":["Correct. Maini says rods are stimulated by minimal light for night vision and cannot appreciate color.","Cones need bright light and provide color vision.","Ganglion cells form the optic nerve and are not photoreceptors.","Bipolar cells relay signals but are not photoreceptors."],"source":"L20 · Rods vs cones","quote":"[Maini] 'Rods — they help you look in dim light, night vision... they cannot appreciate colors.'","obj":"Rods","hint":"Rods = dim light, no color."},{"q":"Which photoreceptors, stimulated by bright light, are responsible for color vision?","o":["Rods","Horizontal cells","Cones","Amacrine cells"],"c":2,"cat":"Retina & Photoreceptors","r":["Rods handle dim light and lack color discrimination.","Horizontal cells are interneurons, not photoreceptors.","Correct. Maini says cones are stimulated by bright light and mediate color vision.","Amacrine cells are interneurons, not photoreceptors."],"source":"L20 · Rods vs cones","quote":"[Maini] 'Cones are stimulated by bright light and they are meant for color vision.'","obj":"Cones","hint":"Cones = color, bright light."},{"q":"The optic nerve (CN II) is formed by the axons of which retinal cells?","o":["Pigment epithelial cells","Rods and cones","Bipolar cells","Ganglion cells"],"c":3,"cat":"Retina & Photoreceptors","r":["Pigment epithelial cells absorb light and are not part of the conducting chain.","Rod and cone axons synapse on bipolar cells; they do not directly form the optic nerve.","Bipolar-cell axons synapse on ganglion cells, not forming the nerve themselves.","Correct. Maini traces the pathway rods/cones → bipolar cells → ganglion cells, and it is the ganglion-cell axons that form the optic nerve."],"source":"L20 · Retinal cell chain","quote":"[Maini] 'It is the axons of the ganglion cells that make the second nerve.'","obj":"Optic nerve origin","hint":"Ganglion-cell axons = optic nerve."},{"q":"Why is the optic disc a physiological 'blind spot'?","o":["It contains only cones","It is covered by excess melanin","It lacks photoreceptors (no rods or cones)","It overlies the macula lutea"],"c":2,"cat":"Retina & Photoreceptors","r":["It has no cones at all, not only cones.","Melanin excess is not the cause; the absence of receptors is.","Correct. Maini says the optic disc, where nerve fibers exit, has no rods or cones and is therefore the blind spot.","The macula is a separate structure, not overlying the disc."],"source":"L20 · Optic disc","quote":"[Maini] 'There are no rods and cones on the optic disc — this is called blind spot.'","obj":"Optic disc / blind spot","hint":"No photoreceptors at the disc."},{"q":"The point of maximum visual acuity, densely saturated with cones, is the:","o":["Ora serrata","Fovea centralis of the macula lutea","Optic disc","Lamina cribrosa"],"c":1,"cat":"Retina & Photoreceptors","r":["The ora serrata is the peripheral retinal margin.","Correct. Maini says cones are maximally concentrated at the fovea centralis of the macula lutea, giving the point of acute vision.","The optic disc is the blind spot with no receptors.","The lamina cribrosa is a scleral perforation, not a retinal receptor zone."],"source":"L20 · Macula & fovea","quote":"[Maini] 'Fovea centralis is where cones are maximally located... the point of acute vision.'","obj":"Fovea centralis","hint":"Cone-packed fovea = sharpest vision."},{"q":"Macular degeneration classically produces which visual pattern?","o":["Loss of central vision with preserved peripheral vision","Selective night blindness","Complete bilateral blindness","Loss of peripheral vision with preserved central vision"],"c":0,"cat":"Retina & Photoreceptors","r":["Correct. Maini says macular degeneration loses central vision while peripheral vision is retained.","Night blindness relates to rod dysfunction, not macular degeneration as she frames it.","It does not cause total blindness; the periphery is spared.","That reversed pattern (tunnel vision) is not what she describes for the macula."],"source":"L20 · Macular degeneration","quote":"[Maini] 'Central vision is lost, and peripheral vision is retained.'","obj":"Macular degeneration","hint":"Center out; periphery stays."},{"q":"The wavy, serrated anterior margin of the retina, located just behind the ciliary body, is the:","o":["Optic disc","Macula lutea","Ora serrata","Lamina cribrosa"],"c":2,"cat":"Retina & Photoreceptors","r":["The optic disc is the nerve-exit site, not the anterior margin.","The macula lutea is near the posterior pole, not the anterior margin.","Correct. Maini calls the serrated anterior retinal border the ora serrata, useful for gauging retinal detachment extent.","The lamina cribrosa is a posterior scleral perforation."],"source":"L20 · Ora serrata","quote":"[Maini] 'The serrated anterior margin... that is called ora serrata.'","obj":"Ora serrata","hint":"Serrated front edge of retina."},{"q":"Aqueous humor is secreted by which structure and into which chamber first?","o":["Ciliary muscle; into the anterior chamber","The lens; into the vitreous chamber","Ciliary processes; into the posterior chamber","The iris; into the anterior chamber"],"c":2,"cat":"Aqueous Humor & Chambers","r":["The ciliary muscle is for accommodation and does not secrete aqueous, and secretion begins in the posterior chamber.","The lens does not secrete aqueous humor.","Correct. Maini says the ciliary processes secrete aqueous humor into the posterior chamber.","The iris does not secrete aqueous humor into the anterior chamber."],"source":"L20 · Aqueous humor secretion","quote":"[Maini] 'Aqueous humor is secreted by ciliary processes into the posterior chamber.'","obj":"Aqueous secretion site","hint":"Processes → posterior chamber."},{"q":"Which sequence correctly describes normal aqueous humor circulation?","o":["Anterior chamber → pupil → posterior chamber → vitreous → optic nerve","Posterior chamber → lamina cribrosa → subarachnoid space → CSF","Posterior chamber → pupil → anterior chamber → sinus venosus sclerae (canal of Schlemm) → venous blood","Ciliary processes → vitreous chamber → retina → central retinal vein"],"c":2,"cat":"Aqueous Humor & Chambers","r":["The flow goes posterior-to-anterior through the pupil, not the reverse, and not into the vitreous.","Aqueous does not drain into CSF via the lamina cribrosa.","Correct. Maini's flow is posterior chamber, through the pupil into the anterior chamber, then drained via the sinus venosus sclerae (canal of Schlemm) into venous blood.","Aqueous does not circulate through the vitreous chamber into the central retinal vein."],"source":"L20 · Aqueous circulation","quote":"[Maini] 'It flows through the pupil into the anterior chamber... drains into sinus venosus sclerae.'","obj":"Aqueous circulation","hint":"Posterior → pupil → anterior → Schlemm."},{"q":"The canal of Schlemm (sinus venosus sclerae) is located at which site?","o":["The optic disc","The ora serrata","The apex of the ciliary body","The iridocorneal angle (between iris and cornea)"],"c":3,"cat":"Aqueous Humor & Chambers","r":["The optic disc is the nerve exit, unrelated to aqueous drainage.","The ora serrata is the peripheral retinal margin.","The ciliary body apex is not the drainage angle.","Correct. Maini locates the canal of Schlemm at the iridocorneal angle between iris and cornea."],"source":"L20 · Canal of Schlemm","quote":"[Maini] 'It is located at the iridocorneal angle, between the iris and cornea.'","obj":"Canal of Schlemm location","hint":"Iridocorneal angle."},{"q":"Blockage of the canal of Schlemm raises intraocular pressure and causes which condition, potentially leading to retinal degeneration and blindness?","o":["Macular degeneration","Papilledema","Glaucoma","Cataract"],"c":2,"cat":"Aqueous Humor & Chambers","r":["Macular degeneration is a retinal aging change, not a pressure problem.","Papilledema is optic-disc swelling from raised intracranial pressure.","Correct. Maini says obstructed aqueous drainage raises intraocular pressure, causing glaucoma, which can progress to retinal degeneration/blindness.","Cataract is lens opacity, not a drainage/pressure problem."],"source":"L20 · Glaucoma","quote":"[Maini] 'Accumulation of aqueous humor increases intraocular tension, leading to glaucoma.'","obj":"Glaucoma","hint":"Blocked Schlemm → high pressure → glaucoma."},{"q":"The vitreous chamber, between the lens and the retina, contains which substance?","o":["Melanin-rich pigment","Vitreous body — a transparent, gel-like substance that maintains eyeball shape","Lacrimal fluid","Aqueous humor — a watery fluid"],"c":1,"cat":"Aqueous Humor & Chambers","r":["Melanin is in the retinal pigment layer, not the vitreous.","Correct. Maini describes the vitreous body as a transparent, semisolid gel that maintains the eyeball's shape and lets light through.","Lacrimal fluid is on the eye's anterior surface.","Aqueous humor is watery and fills the anterior/posterior chambers, not the vitreous chamber."],"source":"L20 · Vitreous chamber","quote":"[Maini] 'Vitreous body... a gel-like body... maintains the shape of the eyeball.'","obj":"Vitreous body","hint":"Gel behind the lens = vitreous body."},{"q":"The anterior chamber of the eye lies between which two structures?","o":["The lens and the retina","The cornea and the iris","The ciliary body and the choroid","The iris and the lens"],"c":1,"cat":"Aqueous Humor & Chambers","r":["The space between lens and retina is the vitreous chamber.","Correct. Maini defines the anterior chamber as lying between the cornea and the iris.","The ciliary body–choroid region is part of the vascular coat, not a chamber.","The space between iris and lens is the posterior chamber."],"source":"L20 · Chambers of the eye","quote":"[Maini] 'The chamber between iris and cornea is called anterior chamber.'","obj":"Anterior chamber","hint":"Cornea in front, iris behind = anterior chamber."},{"q":"In the correct order, through which refractive media does light pass as it enters the eye?","o":["Cornea → aqueous humor → lens → vitreous humor","Vitreous humor → lens → aqueous humor → cornea","Aqueous humor → vitreous humor → lens → cornea","Lens → cornea → vitreous humor → aqueous humor"],"c":0,"cat":"Refraction & Refractive Errors","r":["Correct. Maini lists the refractive media in order as cornea, aqueous humor, lens, then vitreous humor.","This reverses the light path entirely.","Aqueous humor is second, not first; this order is reversed.","The cornea is first, not the lens; the order is wrong here."],"source":"L20 · Refractive media","quote":"[Maini] 'Cornea, followed by aqueous humor, followed by lens, followed by vitreous humor.'","obj":"Refractive media order","hint":"Cornea, aqueous, lens, vitreous."},{"q":"Which structure is largely responsible for refracting the light entering the eye?","o":["The cornea","The vitreous body","The sclera","The iris"],"c":0,"cat":"Refraction & Refractive Errors","r":["Correct. Maini says the cornea is largely responsible for refraction of entering light.","The vitreous transmits light but contributes least to refraction of the media she lists.","The sclera is opaque and does not transmit or refract image-forming light.","The iris controls light quantity, not refraction."],"source":"L20 · Refraction","quote":"[Maini] 'Cornea is largely responsible for refraction of the light that enters the eye.'","obj":"Cornea — main refractor","hint":"Cornea bends light the most."},{"q":"In hyperopia (farsightedness), where is the image focused and what lens corrects it?","o":["In front of the retina; corrected with concave lenses","On the fovea; no correction needed","Behind the retina; corrected with convex lenses","In front of the retina; corrected with cylindrical lenses"],"c":2,"cat":"Refraction & Refractive Errors","r":["Focusing in front of the retina with concave lenses describes myopia.","Hyperopia does require correction; it is not normal emmetropia.","Correct. Maini says in hyperopia (short eyeball) light focuses behind the retina and is corrected with convex glasses.","Cylindrical lenses correct astigmatism, not hyperopia."],"source":"L20 · Hyperopia","quote":"[Maini] 'Light rays are focused behind the retina... you wear convex glasses to correct hyperopia.'","obj":"Hyperopia","hint":"Far-sight: focus behind → convex lens."},{"q":"In myopia, where is the image focused and what lens corrects it?","o":["On the optic disc; corrected with cylindrical lenses","Behind the retina; corrected with convex lenses","In front of the retina; corrected with concave lenses","Behind the retina; corrected with concave lenses"],"c":2,"cat":"Refraction & Refractive Errors","r":["Myopia does not focus on the optic disc, and it is not corrected with cylindrical lenses.","Focusing behind the retina with convex lenses is hyperopia.","Correct. Maini says in myopia (larger eye) light focuses in front of the retina and is corrected with concave glasses.","Myopia focuses in front of, not behind, the retina."],"source":"L20 · Myopia","quote":"[Maini] 'Light rays are focused in front of the retina... to correct myopia you wear concave glasses.'","obj":"Myopia","hint":"Near-sight: focus in front → concave lens."},{"q":"Astigmatism results from which defect and is corrected with which type of glasses?","o":["A shortened eyeball; concave glasses","Opacity of the lens; convex glasses","Loss of ciliary muscle tone; bifocal glasses","Irregular curvature of the cornea; cylindrical glasses"],"c":3,"cat":"Refraction & Refractive Errors","r":["A shortened eyeball describes hyperopia, corrected with convex lenses.","Lens opacity is cataract, not astigmatism.","Astigmatism is a corneal shape problem, not a ciliary-tone problem.","Correct. Maini says astigmatism is an irregular corneal curvature corrected with cylindrical glasses."],"source":"L20 · Astigmatism","quote":"[Maini] 'Astigmatism is a condition where corneal curvature is lost... you wear cylindrical glasses.'","obj":"Astigmatism","hint":"Irregular cornea → cylindrical lens."},{"q":"Presbyopia is best defined as:","o":["Irregular corneal curvature","Age-related (after ~40 years) inability to focus on near objects","Opacity of the lens from aging","Night blindness from rod loss"],"c":1,"cat":"Refraction & Refractive Errors","r":["Irregular corneal curvature is astigmatism.","Correct. Maini defines presbyopia as the age-related (after about 40) inability to focus on near objects, needing reading glasses.","Lens opacity from aging is cataract.","Night blindness is a rod problem, not presbyopia."],"source":"L20 · Presbyopia","quote":"[Maini] 'Presbyopia is inability to focus especially on near objects... after age of 40 years.'","obj":"Presbyopia","hint":"Old-eye near-focus loss."},{"q":"Opacity of the lens due to aging is termed:","o":["Cataract","Asthenopia","Glaucoma","Astigmatism"],"c":0,"cat":"Refraction & Refractive Errors","r":["Correct. Maini defines cataract as opacity of the lens due to aging.","Asthenopia is eye strain.","Glaucoma is raised intraocular pressure, not lens opacity.","Astigmatism is irregular corneal curvature."],"source":"L20 · Cataract","quote":"[Maini] 'Cataracts, that is opacity of the lens due to aging.'","obj":"Cataract","hint":"Cloudy lens = cataract."},{"q":"The four recti of the eye share a common origin. From where do they arise?","o":["A common tendinous (fibrous) ring around the optic canal","The undersurface of the lesser wing of the sphenoid","The floor of the orbit near the maxilla","The trochlea on the medial orbital wall"],"c":0,"cat":"Extraocular Muscles","r":["Correct. Maini says all four recti originate from a common fibrous ring around the optic canal and then diverge to insert on the sclera.","The lesser-wing undersurface gives origin to LPS, not the recti as a group.","Only the inferior oblique arises from the floor of the orbit.","The trochlea is a pulley for the superior oblique, not a recti origin."],"source":"L20 · Recti origin","quote":"[Maini] 'All four of them make a common ring around the optic canal.'","obj":"Common tendinous ring","hint":"Recti = ring around optic canal."},{"q":"Using the mnemonic SO4, LR6, AO3, which nerve supplies the superior oblique?","o":["Abducent nerve (CN VI)","Oculomotor nerve (CN III)","Ophthalmic nerve (V1)","Trochlear nerve (CN IV)"],"c":3,"cat":"Extraocular Muscles","r":["CN VI (abducent) supplies the lateral rectus (LR6).","CN III supplies all the other muscles ('AO3'), not the superior oblique.","V1 is sensory and supplies no extraocular muscle.","Correct. SO4 means the superior oblique is supplied by the trochlear nerve (CN IV)."],"source":"L20/L21 · Extraocular innervation","quote":"[Maini] 'SO4, LR6, AO3... superior oblique is innervated by the fourth nerve.'","obj":"Superior oblique nerve","hint":"SO4 = superior oblique, CN IV."},{"q":"The lateral rectus is supplied by which cranial nerve?","o":["Nasociliary nerve","Trochlear nerve (CN IV)","Abducent nerve (CN VI)","Oculomotor nerve (CN III)"],"c":2,"cat":"Extraocular Muscles","r":["The nasociliary is a sensory branch of V1, not a motor nerve to muscles.","CN IV supplies only the superior oblique.","Correct. Maini's LR6 mnemonic assigns the lateral rectus to the abducent nerve (CN VI).","CN III supplies the other four muscles, not the lateral rectus."],"source":"L21 · Abducent nerve","quote":"[Maini] 'Lateral rectus, LR6.'","obj":"Lateral rectus nerve","hint":"LR6 = lateral rectus, CN VI."},{"q":"Which set of muscles is supplied by the oculomotor nerve (CN III)?","o":["All six extraocular muscles equally","Superior oblique, lateral rectus, and medial rectus","Superior rectus, inferior rectus, medial rectus, and inferior oblique (plus LPS)","Lateral rectus, inferior oblique, and superior oblique"],"c":2,"cat":"Extraocular Muscles","r":["CN III does not supply all six — the LR and SO are exceptions.","The superior oblique (CN IV) and lateral rectus (CN VI) are not CN III muscles.","Correct. Maini says CN III supplies SR, IR, MR, and IO (and also levator palpebrae superioris).","The lateral rectus and superior oblique are not CN III muscles."],"source":"L21 · Oculomotor distribution","quote":"[Maini] 'Superior rectus, inferior rectus, medial rectus, and inferior oblique... all others by third nerve.'","obj":"Oculomotor muscles","hint":"CN III = all but LR and SO."},{"q":"What is the action of the superior rectus?","o":["Elevation with adduction (up and in)","Elevation with abduction (up and out)","Depression with adduction (down and in)","Depression with abduction (down and out)"],"c":0,"cat":"Extraocular Muscles","r":["Correct. Maini says the superior rectus moves the eye up and medially (up and in).","Up and out is the inferior oblique.","Down and in is the inferior rectus.","Down and out is the superior oblique."],"source":"L20 · Muscle actions","quote":"[Maini] 'Superior rectus... rotates the eye up and medial, up and in.'","obj":"Superior rectus action","hint":"SR = up and in."},{"q":"What is the action of the inferior rectus?","o":["Depression with adduction (down and in)","Elevation with abduction (up and out)","Depression with abduction (down and out)","Elevation with adduction (up and in)"],"c":0,"cat":"Extraocular Muscles","r":["Correct. Maini says the inferior rectus moves the eye down and medially (down and in).","Up and out is the inferior oblique.","Down and out is the superior oblique.","Up and in is the superior rectus."],"source":"L20 · Muscle actions","quote":"[Maini] 'Inferior rectus — down and medially.'","obj":"Inferior rectus action","hint":"IR = down and in."},{"q":"What is the action of the superior oblique?","o":["Depression with abduction (down and out)","Depression with adduction (down and in)","Elevation with abduction (up and out)","Elevation with adduction (up and in)"],"c":0,"cat":"Extraocular Muscles","r":["Correct. Maini says the superior oblique moves the eye down and laterally (down and out) — 'O for oblique, O for out.'","Down and in is the inferior rectus.","Up and out is the inferior oblique.","Up and in is the superior rectus."],"source":"L20 · Muscle actions","quote":"[Maini] 'Superior oblique rotates the eyeball down and laterally — down and out.'","obj":"Superior oblique action","hint":"SO = down and out."},{"q":"What is the action of the inferior oblique?","o":["Elevation with adduction (up and in)","Depression with adduction (down and in)","Depression with abduction (down and out)","Elevation with abduction (up and out)"],"c":3,"cat":"Extraocular Muscles","r":["Up and in is the superior rectus.","Down and in is the inferior rectus.","Down and out is the superior oblique.","Correct. Maini says the inferior oblique moves the eye up and laterally (up and out)."],"source":"L20 · Muscle actions","quote":"[Maini] 'Inferior oblique... rotates the eyeball up and out.'","obj":"Inferior oblique action","hint":"IO = up and out."},{"q":"The tendon of the superior oblique is unique because it passes through which structure before inserting on the globe?","o":["The lamina cribrosa","The trochlea, a fibrocartilaginous pulley","The common tendinous ring","A lateral check ligament"],"c":1,"cat":"Extraocular Muscles","r":["The lamina cribrosa is a scleral perforation for the optic nerve.","Correct. Maini says the superior oblique tendon threads through the trochlea, a fibrocartilaginous pulley, then curves back and laterally to insert.","The common tendinous ring is the origin of the recti, not a pulley for the superior oblique.","Check ligaments are capsule extensions, not the superior oblique pulley."],"source":"L20 · Superior oblique / trochlea","quote":"[Maini] 'The tendon of superior oblique threads through a fibrocartilaginous pulley called trochlea.'","obj":"Trochlea","hint":"SO tendon loops through the trochlea."},{"q":"Which extraocular muscle is the ONLY one that originates from the floor of the orbit — a point Maini said appears on board exams?","o":["Medial rectus","Inferior rectus","Inferior oblique","Superior oblique"],"c":2,"cat":"Extraocular Muscles","r":["The medial rectus arises from the common tendinous ring.","The inferior rectus arises from the common tendinous ring (sphenoid), not the floor.","Correct. Maini stresses the inferior oblique is the only muscle arising from the floor of the orbit (anteromedial floor near the maxilla).","The superior oblique arises from the body of the sphenoid."],"source":"L20 · Inferior oblique origin","quote":"[Maini] 'This is the only muscle that originates from the floor of the orbit.'","obj":"Inferior oblique origin (board favorite)","hint":"Floor-of-orbit origin = inferior oblique."},{"q":"Intorsion of the eyeball ('both superiors') is produced by which pair of muscles?","o":["Medial rectus and lateral rectus","Inferior rectus and inferior oblique","Superior rectus and superior oblique","Superior rectus and inferior oblique"],"c":2,"cat":"Extraocular Muscles","r":["The horizontal recti abduct/adduct and do not torsion.","Both inferiors cause extortion, not intorsion.","Correct. Maini's rule is that both superior muscles (superior rectus and superior oblique) cause intorsion.","This mixes a superior with an inferior; the rule is 'both superiors.'"],"source":"L20 · Torsion mnemonic","quote":"[Maini] 'Both the superiors cause intorsion.'","obj":"Intorsion muscles","hint":"Both superiors = intorsion."},{"q":"Extortion of the eyeball is produced by which pair ('inferior people extort')?","o":["Superior rectus and superior oblique","Inferior rectus and inferior oblique","Superior oblique and inferior oblique","Medial rectus and inferior rectus"],"c":1,"cat":"Extraocular Muscles","r":["Both superiors cause intorsion, not extortion.","Correct. Maini's mnemonic 'inferior people extort' assigns extortion to inferior rectus and inferior oblique.","This pairs the two obliques, which is not the rule.","Medial rectus adducts and does not extort."],"source":"L20 · Torsion mnemonic","quote":"[Maini] 'Inferior people extort... both inferior rectus and inferior oblique cause extortion.'","obj":"Extortion muscles","hint":"Both inferiors = extortion."},{"q":"The extraocular muscles develop from which embryonic source, and therefore carry which functional fiber type?","o":["Occipital myotomes; GSE fibers","Surface ectoderm; SSA fibers","Neural crest; GVE fibers","Pharyngeal arches; SVE fibers"],"c":0,"cat":"Extraocular Muscles","r":["Correct. Maini says the extraocular muscles are myotomal (from occipital myotomes) and so are supplied by GSE fibers, like other skeletal muscles.","Surface ectoderm and SSA relate to special sensory organs, not these muscles.","Neural crest and GVE (autonomic) do not describe skeletal extraocular muscle innervation.","Pharyngeal-arch muscles carry SVE fibers, but the extraocular muscles are not pharyngeal-arch derivatives."],"source":"L20/L21 · Myotomal muscles","quote":"[Maini] 'They originate from occipital myotomes... innervated by GSE fibers.'","obj":"Extraocular embryology & fibers","hint":"Occipital myotomes → GSE."},{"q":"Besides the four extraocular muscles it moves, which additional skeletal (but not extraocular) muscle does CN III supply?","o":["Superior tarsal muscle","Orbicularis oculi","Ciliary muscle","Levator palpebrae superioris"],"c":3,"cat":"Extraocular Muscles","r":["The superior tarsal muscle is smooth and sympathetically supplied.","Orbicularis oculi is supplied by the facial nerve.","The ciliary muscle is intrinsic (parasympathetic), not a CN III skeletal muscle.","Correct. Maini notes CN III also supplies the levator palpebrae superioris (skeletal, eye-related, but not one of the six extraocular muscles)."],"source":"L21 · Oculomotor extras","quote":"[Maini] 'Levator palpebrae superioris is not part of extraocular muscles... innervated by oculomotor.'","obj":"CN III — LPS","hint":"CN III also raises the lid (LPS)."},{"q":"Which three intrinsic (smooth) muscles of the eye did Maini name?","o":["Superior oblique, inferior oblique, and lateral rectus","Superior rectus, inferior rectus, and medial rectus","Sphincter pupillae, dilator pupillae, and ciliary muscle","Levator palpebrae, superior tarsal, and orbicularis oculi"],"c":2,"cat":"Extraocular Muscles","r":["The obliques and lateral rectus are extrinsic skeletal muscles.","The recti are extrinsic skeletal muscles, not intrinsic.","Correct. Maini lists sphincter pupillae, dilator pupillae, and ciliary muscle as the three intrinsic smooth muscles.","These are lid/skeletal or smooth lid muscles, not the intrinsic trio of the globe."],"source":"L20 · Intrinsic muscles","quote":"[Maini] 'Sphincter pupillae... dilator pupillae... ciliary muscle — intrinsic muscles of the eye.'","obj":"Intrinsic eye muscles","hint":"Sphincter, dilator, ciliary."},{"q":"To isolate and test the superior rectus during the H-test, the patient is asked to:","o":["Abduct the eye (look laterally) and then look up","Adduct the eye (look medially) and then look up","Adduct the eye and then look down","Abduct the eye and then look down"],"c":0,"cat":"Clinical Testing of Eye Muscles","r":["Correct. Maini says to isolate the superior rectus the patient abducts (looks out) and looks up, aligning the optic axis with the muscle.","Adduct-and-up isolates the inferior oblique, not the superior rectus.","Adduct-and-down tests the superior oblique.","Abduct-and-down tests the inferior rectus."],"source":"L21 · Testing extraocular muscles","quote":"[Maini] 'You ask the patient to abduct, and look up — that is the testing of superior rectus.'","obj":"Testing superior rectus","hint":"SR test: out then up."},{"q":"To test the inferior rectus, the patient is asked to look:","o":["Medially (adduct) and up","Medially (adduct) and down","Laterally (abduct) and up","Laterally (abduct) and down"],"c":3,"cat":"Clinical Testing of Eye Muscles","r":["Adduct-and-up tests the inferior oblique.","Adduct-and-down tests the superior oblique.","Abduct-and-up tests the superior rectus.","Correct. Maini says to isolate the inferior rectus the patient abducts (looks out) and looks down."],"source":"L21 · Testing extraocular muscles","quote":"[Maini] 'For inferior rectus... look down and lateral.'","obj":"Testing inferior rectus","hint":"IR test: out then down."},{"q":"To test the superior oblique, the patient is asked to:","o":["Adduct the eye (look medially) and look down","Abduct the eye and look up","Abduct the eye (look laterally) and look down","Adduct the eye and look up"],"c":0,"cat":"Clinical Testing of Eye Muscles","r":["Correct. Maini says the obliques are tested in adduction; for the superior oblique the patient adducts (looks in) and looks down.","Abduct-and-up tests the superior rectus.","Abduction is used to test the recti, not the superior oblique.","Adduct-and-up tests the inferior oblique."],"sou
