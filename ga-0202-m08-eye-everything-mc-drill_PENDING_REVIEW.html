rce":"L21 · Testing obliques","quote":"[Maini] 'To test the obliques, ask the patient to adduct... superior oblique.'","obj":"Testing superior oblique","hint":"SO test: in then down."},{"q":"To test the inferior oblique, the patient is asked to:","o":["Abduct the eye (look laterally) and look up","Adduct the eye (look medially) and look up","Abduct the eye and look down","Adduct the eye and look down"],"c":1,"cat":"Clinical Testing of Eye Muscles","r":["Abduction is for testing the recti.","Correct. Maini says for inferior oblique testing the patient adducts (looks in) and looks up.","Abduct-and-down tests the inferior rectus.","Adduct-and-down tests the superior oblique."],"source":"L21 · Testing obliques","quote":"[Maini] 'Same goes for inferior oblique — ask the patient to look up and in.'","obj":"Testing inferior oblique","hint":"IO test: in then up."},{"q":"During clinical testing, the recti are isolated in which position, and the obliques in which position?","o":["Both recti and obliques in abduction","Recti in adduction; obliques in abduction","Both recti and obliques in adduction","Recti in abduction; obliques in adduction"],"c":3,"cat":"Clinical Testing of Eye Muscles","r":["The obliques are tested in adduction, not abduction.","This reverses her rule.","The recti are tested in abduction, not adduction.","Correct. Maini's rule is: test the recti with the eye abducted and the obliques with the eye adducted."],"source":"L21 · Testing rule","quote":"[Maini] 'To test the recti, ask the patient to abduct; to test the obliques, ask the patient to adduct.'","obj":"Testing positions","hint":"Recti = abduct; obliques = adduct."},{"q":"When the eye is abducted by the lateral rectus, which muscles then produce elevation and depression respectively?","o":["Superior oblique (elevation) and inferior oblique (depression)","Inferior oblique (elevation) and superior oblique (depression)","Superior rectus (elevation) and inferior rectus (depression)","Medial rectus (elevation) and lateral rectus (depression)"],"c":2,"cat":"Clinical Testing of Eye Muscles","r":["This is the adducted-position pair, and it is also reversed.","In adduction, the obliques (IO up, SO down) produce elevation/depression — not in abduction.","Correct. Maini says once the eye is abducted, the superior and inferior recti produce elevation and depression respectively.","The horizontal recti abduct/adduct and do not elevate/depress."],"source":"L21 · Testing logic","quote":"[Maini] 'When the eye is abducted... superior rectus and inferior rectus produce elevation and depression respectively.'","obj":"Abducted elevation/depression","hint":"Abducted: SR up, IR down."},{"q":"What functional fiber type does the optic nerve (CN II) carry, reflecting that the eye develops from ectoderm?","o":["SSA (special somatic afferent)","GSE (general somatic efferent)","SVA (special visceral afferent)","GSA (general somatic afferent)"],"c":0,"cat":"Cranial Nerves of the Orbit","r":["Correct. Maini says vision and hearing are SSA (special somatic afferent) because the eye and ear arise from ectoderm.","GSE is skeletal motor, not sensory vision.","SVA is taste and smell, not vision.","GSA is general sensation (e.g., V1 to the cornea), not vision."],"source":"L21 · Optic nerve fibers","quote":"[Maini] 'Vision and hearing is SSA... they came from ectoderm, special somatic afferents.'","obj":"Optic nerve fiber type","hint":"Vision/hearing = SSA."},{"q":"The oculomotor nerve enters the orbit through which opening and then divides into what?","o":["Superior orbital fissure; it does not divide","Optic canal; a single undivided trunk","Inferior orbital fissure; medial and lateral divisions","Superior orbital fissure; superior and inferior divisions"],"c":3,"cat":"Cranial Nerves of the Orbit","r":["It does divide, into superior and inferior divisions.","CN III does not use the optic canal (that is CN II and the ophthalmic artery).","It enters through the superior, not inferior, orbital fissure and its divisions are superior/inferior.","Correct. Maini says CN III enters via the superior orbital fissure and divides into superior and inferior divisions."],"source":"L21 · Oculomotor nerve","quote":"[Maini] 'Oculomotor nerve enters the orbit through superior orbital fissure, divides into superior and inferior division.'","obj":"Oculomotor course","hint":"CN III: SOF → superior + inferior divisions."},{"q":"The trochlear nerve (CN IV) supplies which single muscle?","o":["Levator palpebrae superioris","Inferior oblique","Lateral rectus","Superior oblique"],"c":3,"cat":"Cranial Nerves of the Orbit","r":["LPS is supplied by CN III (and its smooth part by sympathetics).","The inferior oblique is supplied by CN III.","The lateral rectus is supplied by CN VI.","Correct. Maini says CN IV runs medially to supply the superior oblique (SO4)."],"source":"L21 · Trochlear nerve","quote":"[Maini] 'Fourth nerve, trochlear nerve... runs medially towards superior oblique.'","obj":"Trochlear nerve","hint":"CN IV = superior oblique only."},{"q":"Using the mnemonic 'NFL,' the three branches of the ophthalmic nerve (V1) are:","o":["Nasociliary, facial, and lingual","Nasopalatine, frontal, and lacrimal","Nasociliary, frontal, and lesser petrosal","Nasociliary, frontal, and lacrimal"],"c":3,"cat":"Cranial Nerves of the Orbit","r":["'Facial' and 'lingual' are separate nerves, not V1 branches.","The nasopalatine is a V2 branch, not a V1 branch.","The lesser petrosal carries parasympathetics to the otic ganglion, not a V1 branch.","Correct. Maini's 'NFL' = nasociliary, frontal, lacrimal — the three branches of V1."],"source":"L21 · Ophthalmic nerve (V1)","quote":"[Maini] 'Frontal, lacrimal, nasociliary — NFL, National Football League.'","obj":"V1 branches","hint":"NFL = Nasociliary, Frontal, Lacrimal."},{"q":"The frontal branch of V1 gives which two named nerves?","o":["Long ciliary and infratrochlear nerves","Supraorbital and supratrochlear nerves","Lacrimal and nasociliary nerves","Anterior and posterior ethmoidal nerves"],"c":1,"cat":"Cranial Nerves of the Orbit","r":["Long ciliary and infratrochlear nerves are nasociliary branches.","Correct. Maini says the frontal nerve gives the supraorbital and supratrochlear nerves.","Lacrimal and nasociliary are separate V1 branches, not sub-branches of the frontal.","The anterior/posterior ethmoidal nerves are branches of the nasociliary, not the frontal."],"source":"L21 · Frontal nerve","quote":"[Maini] 'Frontal gives supraorbital and supratrochlear nerves, just two branches.'","obj":"Frontal nerve branches","hint":"Frontal → supraorbital + supratrochlear."},{"q":"Which of the following is a branch of the nasociliary nerve?","o":["Lacrimal nerve","Anterior ethmoidal nerve","Supraorbital nerve","Supratrochlear nerve"],"c":1,"cat":"Cranial Nerves of the Orbit","r":["The lacrimal nerve is a separate branch of V1, not of the nasociliary.","Correct. Maini lists the nasociliary branches as the sensory root to the ciliary ganglion, long ciliary nerves, infratrochlear, anterior ethmoidal, and posterior ethmoidal — the anterior ethmoidal is one of them.","The supraorbital nerve is a frontal-nerve branch.","The supratrochlear nerve is a frontal-nerve branch."],"source":"L21 · Nasociliary branches","quote":"[Maini] 'Branches of nasociliary — sensory root to ciliary ganglion, long ciliary, infratrochlear, anterior and posterior ethmoidal.'","obj":"Nasociliary branches","hint":"Ethmoidals & long ciliary = nasociliary."},{"q":"The long ciliary nerves (branches of the nasociliary) carry sympathetic fibers to which muscle?","o":["Superior rectus","Ciliary muscle","Sphincter pupillae","Dilator pupillae"],"c":3,"cat":"Cranial Nerves of the Orbit","r":["The superior rectus is skeletal, supplied by CN III, not by ciliary nerves.","The ciliary muscle is parasympathetic, reached via short ciliary nerves.","The sphincter pupillae is parasympathetic, reached via short ciliary nerves.","Correct. Maini says the long ciliary nerves carry sympathetic fibers to the pupillary dilator (dilator pupillae)."],"source":"L21 · Long ciliary nerves","quote":"[Maini] 'Long ciliary nerves carry sympathetic fibers to pupillary dilator muscle.'","obj":"Long ciliary nerves","hint":"Long ciliary = sympathetic to dilator."},{"q":"The trigeminal ganglion contains the cell bodies of which fibers?","o":["Postganglionic sympathetic fibers","Postganglionic parasympathetic fibers","GSE motor fibers to the extraocular muscles","GSA (sensory) fibers of V1, V2, and V3"],"c":3,"cat":"Cranial Nerves of the Orbit","r":["Sympathetic postganglionic cell bodies are in sympathetic chain ganglia (e.g., superior cervical).","Parasympathetic cell bodies sit in the ciliary/pterygopalatine/otic/submandibular ganglia, not here.","Motor GSE cell bodies are in brainstem nuclei, not the trigeminal ganglion.","Correct. Maini emphasises the trigeminal ganglion is a sensory ganglion holding GSA cell bodies of V1, V2, and V3."],"source":"L21 · Trigeminal ganglion","quote":"[Maini] 'This is a sensory ganglion... cell bodies of all the GSA fibers of V1, V2, V3.'","obj":"Trigeminal ganglion","hint":"Sensory GSA cell bodies of V1–V3."},{"q":"The deep petrosal nerve is a common exam trap. Which statement about it is correct?","o":["It carries sympathetic fibers from the internal carotid artery plexus and is NOT a branch of the facial nerve","It is a branch of the facial nerve carrying parasympathetic fibers to the lacrimal gland","It is a branch of the glossopharyngeal nerve to the otic ganglion","It is the motor nerve to the stapedius"],"c":0,"cat":"Cranial Nerves of the Orbit","r":["Correct. Maini stresses the deep petrosal nerve carries sympathetic fibers from the ICA plexus and is NOT a branch of CN VII (it joins the greater petrosal to form the nerve of the pterygoid canal).","The greater petrosal (not deep petrosal) carries the facial-nerve parasympathetics to the lacrimal gland.","The lesser petrosal (from CN IX) goes to the otic ganglion, not the deep petrosal.","The stapedius is supplied by the nerve to stapedius from CN VII, not the deep petrosal."],"source":"L20 · Deep petrosal (exam trap)","quote":"[Maini] 'The deep petrosal nerve is not a branch of 7th nerve — it carries sympathetic fibers from ICA plexus.'","obj":"Deep petrosal nerve","hint":"Deep petrosal = sympathetic, not CN VII."},{"q":"The ophthalmic artery is a branch of which vessel?","o":["External carotid artery","Middle cerebral artery","Internal carotid artery","Maxillary artery"],"c":2,"cat":"Arteries & Veins of the Orbit","r":["The external carotid gives the maxillary and facial arteries, not the ophthalmic.","The middle cerebral artery is a terminal branch of the ICA, a sibling of the ophthalmic, not its parent.","Correct. Maini says the ophthalmic artery arises from the internal carotid artery, which then divides into middle and anterior cerebral arteries.","The maxillary artery supplies deep face structures, not the ophthalmic branch."],"source":"L21 · Ophthalmic artery","quote":"[Maini] 'Ophthalmic artery is a branch of internal carotid artery.'","obj":"Ophthalmic artery origin","hint":"Ophthalmic from the ICA."},{"q":"The central artery of the retina travels within which structure and enters the eye where?","o":["Within the trochlea; entering at the posterior pole","Along the corneoscleral junction; entering at the limbus","Along the ciliary body; entering at the ora serrata","Within the substance of the optic nerve; entering at the center of the optic disc"],"c":3,"cat":"Arteries & Veins of the Orbit","r":["The trochlea is a superior-oblique pulley, unrelated to this artery.","The corneoscleral junction is where the anterior ciliary artery enters, not the central retinal artery.","The ciliary body/ora serrata is not the entry route of the central retinal artery.","Correct. Maini says the central retinal artery runs in the substance of the optic nerve and enters the eye at the center of the optic disc."],"source":"L21 · Central retinal artery","quote":"[Maini] 'Central retinal artery runs in the substance of optic nerve to enter the eye at the center of optic disc.'","obj":"Central retinal artery","hint":"Runs inside CN II → optic disc center."},{"q":"Which branch of the ophthalmic artery enters the eyeball at the corneoscleral junction?","o":["Short posterior ciliary artery","Anterior ciliary artery","Central retinal artery","Lacrimal artery"],"c":1,"cat":"Arteries & Veins of the Orbit","r":["The short posterior ciliary arteries pierce the sclera posteriorly around the optic nerve.","Correct. Maini says the anterior ciliary artery enters the eyeball at the corneoscleral junction.","The central retinal artery enters at the optic disc, inside the optic nerve.","The lacrimal artery supplies the lacrimal gland."],"source":"L21 · Anterior ciliary artery","quote":"[Maini] 'Anterior ciliary artery... enters the eyeball at the corneoscleral junction.'","obj":"Anterior ciliary artery","hint":"Corneoscleral junction = anterior ciliary."},{"q":"The two ophthalmic veins ultimately drain principally into which venous structure?","o":["The cavernous sinus","The maxillary artery","The internal jugular vein directly","The superior sagittal sinus"],"c":0,"cat":"Arteries & Veins of the Orbit","r":["Correct. Maini says the superior and inferior ophthalmic veins drain into the cavernous sinus (superior directly; inferior partly via the pterygoid plexus).","The maxillary artery is an artery, not a venous drainage site.","They do not drain directly into the internal jugular vein.","They do not drain into the superior sagittal sinus."],"source":"L21 · Ophthalmic veins","quote":"[Maini] 'Two ophthalmic veins, superior and inferior... they drain into the cavernous sinus.'","obj":"Ophthalmic vein drainage","hint":"Ophthalmic veins → cavernous sinus."},{"q":"Through the inferior orbital fissure, the inferior ophthalmic vein communicates with which venous plexus?","o":["Basilar venous plexus","Pterygoid venous plexus","Vertebral venous plexus","Sub-occipital venous plexus"],"c":1,"cat":"Arteries & Veins of the Orbit","r":["The basilar plexus is on the clivus, not connected via the inferior orbital fissure here.","Correct. Maini says the inferior ophthalmic vein communicates through the inferior orbital fissure with the pterygoid venous plexus.","The vertebral venous plexus surrounds the vertebral column, unrelated to this route.","The sub-occipital plexus is in the neck, not orbital."],"source":"L21 · Inferior ophthalmic vein","quote":"[Maini] 'Inferior ophthalmic communicates through inferior orbital fissure with pterygoid venous plexus.'","obj":"Inferior ophthalmic vein","hint":"IOF link = pterygoid plexus."},{"q":"Functionally, the ciliary ganglion is which type of ganglion, and where does it lie relative to the optic nerve?","o":["A parasympathetic ganglion, lying on the lateral side of the optic nerve","A sensory ganglion, lying within the optic nerve","A sympathetic ganglion, lying medial to the optic nerve","A parasympathetic ganglion, lying inferior to the eyeball outside the orbit"],"c":0,"cat":"Ciliary Ganglion & Eye Autonomics","r":["Correct. Maini says the ciliary ganglion is parasympathetic and sits on the lateral side of the optic nerve.","It is not a sensory ganglion; sensory fibers only pass through it.","It is parasympathetic, not sympathetic, and lies lateral to the optic nerve.","It lies within the orbit lateral to the optic nerve, not outside the orbit."],"source":"L21 · Ciliary ganglion","quote":"[Maini] 'Ciliary ganglion is located at the lateral side of the optic nerve... a parasympathetic ganglion.'","obj":"Ciliary ganglion type/location","hint":"Parasympathetic, lateral to CN II."},{"q":"The parasympathetic (motor) root of the ciliary ganglion carries preganglionic fibers from which nerve?","o":["Superior cervical ganglion","Oculomotor nerve (CN III)","Nasociliary nerve","Facial nerve (CN VII)"],"c":1,"cat":"Ciliary Ganglion & Eye Autonomics","r":["The superior cervical ganglion provides sympathetic fibers, which only pass through.","Correct. Maini says the oculomotor nerve delivers preganglionic parasympathetic fibers to the ciliary ganglion via a branch.","The nasociliary provides the sensory root, not the parasympathetic root.","The facial nerve's parasympathetics go to the pterygopalatine and submandibular ganglia, not the ciliary."],"source":"L21 · Ciliary ganglion roots","quote":"[Maini] 'Parasympathetic root carries preganglionic fibers from oculomotor nerve.'","obj":"Ciliary ganglion parasympathetic root","hint":"Preganglionic parasympathetics from CN III."},{"q":"Postganglionic parasympathetic fibers leave the ciliary ganglion via which nerves to supply which two muscles?","o":["Nasociliary nerve; the sphincter pupillae and the medial rectus","Short ciliary nerves; the dilator pupillae and the lateral rectus","Long ciliary nerves; the dilator pupillae and the superior tarsal muscle","Short ciliary nerves; the sphincter pupillae and the ciliary muscle"],"c":3,"cat":"Ciliary Ganglion & Eye Autonomics","r":["The nasociliary carries sensory fibers, not postganglionic parasympathetic motor fibers to muscles.","The short ciliary nerves supply the two parasympathetic 'C' muscles, not the dilator/lateral rectus.","Long ciliary nerves carry sympathetics to the dilator, not parasympathetics.","Correct. Maini says postganglionic parasympathetics exit via short ciliary nerves to the sphincter pupillae (constriction) and ciliary muscle (accommodation) — 'two C's.'"],"source":"L21 · Short ciliary nerves","quote":"[Maini] 'Postganglionic fibers leave through short ciliary nerves... constrictor pupillae and ciliary muscle.'","obj":"Short ciliary parasympathetics","hint":"Short ciliary → sphincter + ciliary muscle."},{"q":"How do sympathetic fibers behave at the ciliary ganglion?","o":["They arise within the ciliary ganglion itself","They pass straight through it without synapsing, having already synapsed in the superior cervical ganglion","They are the source of the short ciliary parasympathetic supply","They synapse in the ciliary ganglion on postganglionic neurons"],"c":1,"cat":"Ciliary Ganglion & Eye Autonomics","r":["They arise in the superior cervical ganglion, not the ciliary ganglion.","Correct. Maini says the sympathetic fibers (from the ICA plexus) pass through the ciliary ganglion uninterrupted because they already synapsed in the superior cervical ganglion.","The parasympathetic supply, not the sympathetic, is the ganglion's synaptic output.","They do not synapse in the ciliary ganglion; only parasympathetics do."],"source":"L21 · Sympathetic root","quote":"[Maini] 'Sympathetic fibers just pass through the ganglion uninterruptedly... already synapsed in superior cervical ganglia.'","obj":"Sympathetic root behavior","hint":"Sympathetics pass through, no synapse."},{"q":"The sensory root of the ciliary ganglion is derived from which nerve?","o":["Frontal nerve","Oculomotor nerve","Nasociliary nerve (from V1)","Lacrimal nerve"],"c":2,"cat":"Ciliary Ganglion & Eye Autonomics","r":["The frontal nerve supplies the forehead/scalp, not the ciliary ganglion sensory root.","The oculomotor supplies the parasympathetic (motor) root.","Correct. Maini says the sensory (GSA) root of the ciliary ganglion comes from the nasociliary nerve.","The lacrimal nerve supplies the lacrimal gland region, not the ciliary ganglion."],"source":"L21 · Sensory root","quote":"[Maini] 'Sensory root connects the ganglion to nasociliary nerve.'","obj":"Ciliary ganglion sensory root","hint":"Sensory root = nasociliary."},{"q":"The short ciliary nerves carry which combination of fibers into the eyeball?","o":["GSA, postganglionic sympathetic, and postganglionic parasympathetic fibers","GSE motor fibers to the recti","Preganglionic parasympathetic fibers only","Only postganglionic parasympathetic fibers"],"c":0,"cat":"Ciliary Ganglion & Eye Autonomics","r":["Correct. Maini says short ciliary nerves carry GSA, postganglionic sympathetic, and postganglionic parasympathetic fibers.","GSE motor to the recti travels in CN III/IV/VI, not the short ciliary nerves.","The parasympathetics in short ciliary nerves are postganglionic, not preganglionic.","They carry three fiber types, not parasympathetics alone."],"source":"L21 · Short ciliary fiber content","quote":"[Maini] 'In the short ciliary nerve we find GSA fibers, sympathetic, and parasympathetic postganglionic.'","obj":"Short ciliary fiber content","hint":"Short ciliary = 3 fiber types."},{"q":"When the ciliary muscle contracts, what happens to the lens, enabling near vision?","o":["The suspensory ligament tightens, flattening the lens","The lens moves forward through the pupil","The lens becomes opaque","Tension on the suspensory ligament is reduced, so the lens thickens and becomes more convex"],"c":3,"cat":"Ciliary Ganglion & Eye Autonomics","r":["Contraction relaxes, not tightens, the suspensory ligament; flattening occurs when the muscle relaxes (distant vision).","The lens does not move through the pupil; it changes shape in place.","Lens opacity is cataract, not a normal accommodation change.","Correct. Maini says ciliary-muscle contraction slackens the suspensory ligament, letting the lens thicken (more convex) for near focus."],"source":"L21 · Ciliary muscle / accommodation","quote":"[Maini] 'It reduces the tension on suspensory ligament of the lens, and then lens thickens.'","obj":"Ciliary muscle action","hint":"Contract → ligament slack → fat lens → near focus."},{"q":"Parasympathetic fibers to the intrinsic eye muscles are carried by which cranial nerve?","o":["Abducent nerve (CN VI)","Oculomotor nerve (CN III)","Facial nerve (CN VII)","Trochlear nerve (CN IV)"],"c":1,"cat":"Ciliary Ganglion & Eye Autonomics","r":["The abducent nerve is purely motor to the lateral rectus.","Correct. Maini repeatedly states the oculomotor nerve carries the (preganglionic) parasympathetic fibers for the eye's intrinsic muscles.","The facial nerve carries parasympathetics to the lacrimal and salivary glands, not the intrinsic eye muscles.","The trochlear nerve is purely motor to the superior oblique."],"source":"L20/L21 · Ocular parasympathetics","quote":"[Maini] 'Parasympathetic fibers for the structures of the eye are carried by third nerve.'","obj":"Ocular parasympathetic carrier","hint":"Eye parasympathetics ride CN III."},{"q":"Parasympathetic secretomotor supply to the lacrimal gland travels via which nerve and ganglion?","o":["Oculomotor nerve relaying in the ciliary ganglion","Facial nerve (greater petrosal) relaying in the pterygopalatine ganglion","Ophthalmic nerve relaying in the trigeminal ganglion","Glossopharyngeal nerve relaying in the otic ganglion"],"c":1,"cat":"Ciliary Ganglion & Eye Autonomics","r":["The oculomotor/ciliary ganglion pathway serves the intrinsic eye muscles, not the lacrimal gland.","Correct. Maini says the lacrimal gland gets parasympathetics from the facial nerve via the greater petrosal nerve, relaying in the pterygopalatine ganglion.","The trigeminal ganglion is sensory and does not relay parasympathetics.","The glossopharyngeal/otic ganglion pathway serves the parotid gland."],"source":"L20 · Lacrimal parasympathetics","quote":"[Maini] 'Lacrimal gland gets its parasympathetic innervation from 7th nerve through greater petrosal nerve... to pterygopalatine ganglion.'","obj":"Lacrimal parasympathetic pathway","hint":"CN VII → greater petrosal → pterygopalatine ganglion."},{"q":"In the pupillary light reflex, the afferent limb is which nerve and the reflex center is where?","o":["Optic nerve (CN II); the superior colliculus as sole center","Optic nerve (CN II); the pretectal nucleus of the midbrain","Ophthalmic nerve (V1); the spinal trigeminal nucleus","Oculomotor nerve (CN III); the Edinger-Westphal nucleus as center"],"c":1,"cat":"Reflexes — Light, Accommodation, Corneal","r":["The pretectal nucleus (not the superior colliculus) is the light-reflex center.","Correct. Maini says light is carried by the optic nerve to the pretectal region (pretectal nucleus) of the midbrain, which is the reflex center.","V1 and the spinal trigeminal nucleus belong to the corneal reflex, not the light reflex.","CN III with the Edinger-Westphal nucleus is the efferent limb, not the afferent/center."],"source":"L20 · Light reflex","quote":"[Maini] 'Optic nerve carries the signal to the light reflex center in the pretectal region of the midbrain.'","obj":"Light reflex afferent/center","hint":"CN II in; pretectal nucleus is the hub."},{"q":"The efferent limb of the pupillary light reflex runs from the Edinger-Westphal nucleus by which route to constrict the pupil?","o":["CN V1 → trigeminal ganglion → orbicularis oculi","Sympathetic chain → superior cervical ganglion → long ciliary nerves → dilator pupillae","CN VII → pterygopalatine ganglion → lacrimal gland","CN III → ciliary ganglion → short ciliary nerves → sphincter pupillae"],"c":3,"cat":"Reflexes — Light, Accommodation, Corneal","r":["The V1/orbicularis route is the corneal reflex, causing lid closure.","That sympathetic route causes dilation, the opposite of the light reflex.","The CN VII/lacrimal route is for tearing, not pupil constriction.","Correct. Maini traces the efferent limb from the Edinger-Westphal nucleus via CN III, the ciliary ganglion, and short ciliary nerves to the sphincter pupillae."],"source":"L20 · Light reflex efferent","quote":"[Maini] 'From Edinger-Westphal nucleus, through oculomotor nerve, ciliary ganglion, short ciliary nerve, pupilloconstrictor muscle.'","obj":"Light reflex efferent","hint":"EW → CN III → ciliary ganglion → sphincter."},{"q":"Shining light in the right eye produces constriction of the left pupil. This response is called the:","o":["Corneal reflex","Direct light reflex","Accommodation reflex","Consensual (indirect) light reflex"],"c":3,"cat":"Reflexes — Light, Accommodation, Corneal","r":["The corneal reflex is triggered by touching the cornea, not by light.","The direct reflex is constriction of the same eye being illuminated.","The accommodation reflex responds to near focus, not to light in the other eye.","Correct. Maini calls constriction of the opposite (unstimulated) pupil the consensual or indirect light reflex, due to crossing at the pretectal level to both EW nuclei."],"source":"L20 · Consensual reflex","quote":"[Maini] 'Consensual light reflex, where there is pupillary constriction in the opposite eye.'","obj":"Consensual light reflex","hint":"Opposite eye constricts = consensual."},{"q":"Light is shone into the RIGHT eye, but the RIGHT optic nerve (CN II) is non-functional. What is the result?","o":["Neither pupil constricts","Only the left pupil constricts","Both pupils constrict normally","Only the right pupil constricts"],"c":0,"cat":"Reflexes — Light, Accommodation, Corneal","r":["Correct. Maini reasons that if the tested (right) optic nerve cannot carry the afferent signal, neither pupil constricts.","The left pupil also cannot constrict, since the afferent limb never reaches the center.","Both pupils fail because the sensory input is absent.","The right pupil cannot constrict because the afferent signal is blocked at CN II."],"source":"L20 · Light reflex lesions","quote":"[Maini] 'Optic nerve of the right eye is not functioning... not in both the eyes.'","obj":"Light reflex — afferent lesion","hint":"Dead afferent (CN II) → no constriction either side."},{"q":"Light is shone into the RIGHT eye. The LEFT optic nerve is non-functional, but the right CN II and both oculomotor nerves are intact. What happens?","o":["Only the left pupil constricts","Only the right pupil constricts, with a fixed left pupil","Both pupils constrict","Neither pupil constricts"],"c":2,"cat":"Reflexes — Light, Accommodation, Corneal","r":["Both pupils constrict, not just the left.","The left pupil still constricts because its CN III efferent is intact.","Correct. Maini reasons that testing the intact right optic nerve still drives both EW nuclei, so both pupils constrict (the left optic nerve is irrelevant here).","The afferent (right CN II) is intact, so constriction does occur."],"source":"L20 · Light reflex lesions","quote":"[Maini] 'Only optic nerve is gone, third nerve is intact... pupillary constriction in both the eyes.'","obj":"Light reflex — contralateral afferent lesion","hint":"Test the good eye → both still constrict."},{"q":"Light is shone into the LEFT eye and the LEFT oculomotor nerve (CN III) is damaged. What is the result?","o":["Both pupils constrict normally","Neither pupil constricts","Only the left pupil constricts","The right pupil constricts, but the left pupil does not"],"c":3,"cat":"Reflexes — Light, Accommodation, Corneal","r":["Both cannot constrict because the left efferent (CN III) is out.","The right pupil still constricts via the intact right CN III, so it is not 'neither.'","The left pupil is the one that fails, not the one that constricts.","Correct. Maini reasons the afferent left CN II is intact, so the consensual right pupil constricts, but the damaged left CN III cannot drive left-pupil constriction."],"source":"L20 · Light reflex lesions","quote":"[Maini] 'If third nerve of the left eye is gone... constriction in the right eye, but no constriction in the left eye.'","obj":"Light reflex — efferent lesion","hint":"Dead efferent (CN III) → that pupil stays fixed."},{"q":"The reflex center for the sympathetic pupillary dilatation reflex is located where?","o":["The Edinger-Westphal nucleus","The pretectal nucleus","The superior colliculus","The ciliospinal center at T1"],"c":3,"cat":"Reflexes — Light, Accommodation, Corneal","r":["The Edinger-Westphal nucleus is the parasympathetic (constriction) center.","The pretectal nucleus is the light-reflex center for constriction.","The superior colliculus is involved in accommodation, not pupillary dilation.","Correct. Maini identifies the ciliospinal center at T1 as the center of the pupillary dilatation reflex."],"source":"L20 · Dilatation reflex","quote":"[Maini] 'Ciliospinal center at T1 is the center... pupillary dilation.'","obj":"Dilatation reflex center","hint":"Dilate = ciliospinal center T1."},{"q":"Which set describes the three changes ('3 C's') of the accommodation reflex when shifting gaze to a near object?","o":["Divergence, pupillary constriction, and increased lens convexity","Convergence, pupillary dilation, and lens flattening","Convergence, pupillary constriction, and increased lens convexity","Divergence, pupillary dilation, and lens flattening"],"c":2,"cat":"Reflexes — Light, Accommodation, Corneal","r":["The eyes converge (not diverge) for near targets.","Pupils constrict (not dilate) and the lens thickens for near vision.","Correct. Maini lists convergence of the eyes, pupillary constriction, and increased lens convexity as the three accommodation changes.","Near focus needs convergence, constriction, and a fatter lens — not divergence/dilation/flattening."],"source":"L20 · Accommodation reflex","quote":"[Maini] 'Convergence of the eyeball, pupillary constriction, and increased convexity of the lens.'","obj":"Accommodation 3 C's","hint":"Converge, constrict, convex."},{"q":"The accommodation reflex is mediated mainly by which autonomic division, via which cranial nerve?","o":["Somatic only; abducent nerve (CN VI)","Parasympathetic; oculomotor nerve (CN III)","Parasympathetic; facial nerve (CN VII)","Sympathetic; via the superior cervical ganglion"],"c":1,"cat":"Reflexes — Light, Accommodation, Corneal","r":["Convergence uses somatic fibers, but the reflex overall is parasympathetic via CN III, not the abducent nerve.","Correct. Maini says accommodation is essentially a parasympathetic reflex — both the ciliary muscle and sphincter pupillae are parasympathetic via CN III (plus somatic input for convergence).","The parasympathetics are carried by CN III, not CN VII, for the eye's intrinsic muscles.","It is parasympathetic, not sympathetic."],"source":"L20 · Accommodation reflex","quote":"[Maini] 'Accommodation reflex, more or less, is a parasympathetic reflex.'","obj":"Accommodation autonomic control","hint":"Accommodation = parasympathetic, CN III."},{"q":"During accommodation, convergence of the eyes requires contraction of which muscle, driven by which part of the oculomotor complex?","o":["Sphincter pupillae; the ciliospinal center","Medial rectus; the somatic (oculomotor) nuclei","Superior oblique; the trochlear nucleus","Lateral rectus; the Edinger-Westphal nucleus"],"c":1,"cat":"Reflexes — Light, Accommodation, Corneal","r":["The sphincter pupillae constricts the pupil; it does not move the globe to converge.","Correct. Maini says convergence requires medial rectus contraction, driven by the somatic nuclei of the oculomotor complex.","The superior oblique does not produce convergence.","The lateral rectus abducts (diverges) the eye and is not the convergence muscle; the EW nucleus is autonomic."],"source":"L20 · Accommodation — convergence","quote":"[Maini] 'To converge... contract medial recti... somatic nuclei of the oculomotor complex.'","obj":"Accommodation convergence","hint":"Converge = medial rectus (somatic nuclei)."},{"q":"When the eye views a DISTANT object, the ciliary muscle and lens are in what state?","o":["The ciliary muscle is contracted and the lens is thick","The ciliary muscle is relaxed and the lens is thin/flat, with the suspensory ligament taut","The ciliary muscle is relaxed and the lens is thick","The ciliary muscle is contracted and the suspensory ligament is slack"],"c":1,"cat":"Reflexes — Light, Accommodation, Corneal","r":["A contracted ciliary muscle with a thick lens is the near-vision state.","Correct. Maini says for distant vision the ciliary muscle is relaxed, keeping the suspensory ligament taut and the lens thin/flat.","A relaxed muscle keeps the lens thin, not thick.","A slack ligament with a fat lens is the near-vision state, not distant."],"source":"L21 · Distant vision","quote":"[Maini] 'When ciliary muscle is relaxed, suspensory ligaments are taut and lens is less thin, focused for distant vision.'","obj":"Distant vision lens state","hint":"Far: muscle relaxed, ligament taut, lens thin."},{"q":"Argyll Robertson pupil — where the light reflex is lost but the accommodation reflex is preserved — is classically associated with which disease?","o":["Syphilis","Horner syndrome","Diabetes mellitus","Multiple sclerosis"],"c":0,"cat":"Reflexes — Light, Accommodation, Corneal","r":["Correct. Maini says Argyll Robertson pupil (light reflex lost, accommodation preserved) is classically seen in syphilis.","Horner syndrome is a sympathetic-failure triad, not the Argyll Robertson pupil.","Diabetes causes various neuropathies but is not the classic Argyll Robertson association Maini gives.","Multiple sclerosis causes optic neuritis and other findings, not the Argyll Robertson pattern she names."],"source":"L20 · Argyll Robertson pupil","quote":"[Maini] 'Argyll Robertson pupil is commonly seen in syphilis.'","obj":"Argyll Robertson pupil","hint":"Light out, near intact → syphilis."},{"q":"In the corneal reflex, which nerves form the sensory (afferent) and motor (efferent) limbs?","o":["Sensory: facial (CN VII); motor: trigeminal (V1)","Sensory: ophthalmic (V1); motor: facial nerve (CN VII)","Sensory: optic (CN II); motor: facial (CN VII)","Sensory: maxillary (V2); motor: oculomotor (CN III)"],"c":1,"cat":"Reflexes — Light, Accommodation, Corneal","r":["This reverses the sensory/motor assignment.","Correct. Maini says touching the cornea is sensed by the ophthalmic division (V1), and the motor response (lid closure by orbicularis oculi) is via the facial nerve.","The optic nerve is for vision, not corneal touch sensation.","The sensory limb is V1, not V2, and the motor is CN VII, not CN III."],"source":"L20 · Corneal reflex","quote":"[Maini] 'Sensory division is 5th nerve, motor division is 7th nerve.'","obj":"Corneal reflex limbs","hint":"Feel with V1, blink with VII."},{"q":"The reflex center for the corneal reflex is the:","o":["Edinger-Westphal nucleus","Pretectal nucleus","Spinal trigeminal nucleus","Facial motor nucleus alone"],"c":2,"cat":"Reflexes — Light, Accommodation, Corneal","r":["The Edinger-Westphal nucleus mediates constriction/accommodation.","The pretectal nucleus is the light-reflex center.","Correct. Maini says the corneal reflex center is the spinal trigeminal nucleus, which then relays via the facial motor nucleus to close the lids.","The facial motor nucleus is part of the efferent relay, not the sensory reflex center itself."],"source":"L20 · Corneal reflex center","quote":"[Maini] 'Center is spinal trigeminal nucleus.'","obj":"Corneal reflex center","hint":"Corneal reflex hub = spinal trigeminal nucleus."},{"q":"An abnormal red reflex — white or asymmetric on ophthalmoscopy of a child — should raise suspicion of which conditions?","o":["Congenital cataract or retinoblastoma","Astigmatism or presbyopia","Papilledema or macular degeneration","Glaucoma or Horner syndrome"],"c":0,"cat":"Reflexes — Light, Accommodation, Corneal","r":["Correct. Maini says a white or asymmetric red reflex suggests congenital cataract or a tumor such as retinoblastoma, warranting further work-up.","Astigmatism and presbyopia are refractive issues, not red-reflex abnormalities.","Papilledema and macular degeneration are seen on fundus exam differently, not as an abnormal red reflex here.","Glaucoma and Horner syndrome are not detected by an abnormal red reflex in this way."],"source":"L20 · Red reflex","quote":"[Maini] 'White reflection... either congenital cataract, or tumors, retinoblastoma in children.'","obj":"Abnormal red reflex","hint":"White reflex → cataract or retinoblastoma."},{"q":"Papilledema (edema of the optic disc) most importantly indicates which underlying problem?","o":["Decreased intracranial pressure","Primary open-angle glaucoma","Retinal detachment at the ora serrata","Increased intracranial tension/pressure (e.g., tumor, hemorrhage, cerebral edema)"],"c":3,"cat":"Reflexes — Light, Accommodation, Corneal","r":["It indicates increased, not decreased, intracranial pressure.","Glaucoma raises intraocular (not intracranial) pressure and is a separate entity.","Retinal detachment relates to the ora serrata but is not what papilledema signifies.","Correct. Maini says papilledema reflects raised intracranial tension from space-occupying lesions such as tumor, hemorrhage, or cerebral edema."],"source":"L20 · Papilledema","quote":"[Maini] 'Papilledema... it indicates increased intracranial tension.'","obj":"Papilledema significance","hint":"Swollen disc → raised ICP."}];

const CAT_NAMES=["Orbit — Bones & Walls","Fissures, Canals & Foramina","Eyelids & Lacrimal Apparatus","Levator Palpebrae & Horner Syndrome","Eyeball — Coats & Fascia","Retina & Photoreceptors","Aqueous Humor & Chambers","Refraction & Refractive Errors","Extraocular Muscles","Clinical Testing of Eye Muscles","Cranial Nerves of the Orbit","Arteries & Veins of the Orbit","Ciliary Ganglion & Eye Autonomics","Reflexes — Light, Accommodation, Corneal"];
const LS_KEY="ga0202_m08_eye_mc_drill";
BANK.forEach(function(q,i){q._bankId=i;});
let idx=0,score=0,attempts=0,reaskQueue=[];
let catStats={};CAT_NAMES.forEach(function(c){catStats[c]={c:0,t:0};});
let questions=[];let answerMap={};let answerHistory=[];let browseIdx=-1;let navOpen=false;let jumpOpen=false;let instrOpen=false;let reviewList=null;
function shuffle(a){for(let i=a.length-1;i>0;i--){let j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}
function saveState(){try{localStorage.setItem(LS_KEY,JSON.stringify({idx,score,attempts,reaskQueue:reaskQueue.map(function(q){return q._bankId;}),questions:questions.map(function(q){return{_bankId:q._bankId,_isReask:q._isReask||false};}),answerMap,answerHistory,navOpen,jumpOpen}));}catch(e){}}
function loadState(){try{let s=JSON.parse(localStorage.getItem(LS_KEY));if(!s||!s.questions)return false;idx=s.idx||0;score=s.score||0;attempts=s.attempts||0;answerMap=s.answerMap||{};answerHistory=s.answerHistory||[];navOpen=false;jumpOpen=false;questions=s.questions.map(function(ref){let q=Object.assign({},BANK[ref._bankId]);if(ref._isReask)q._isReask=true;return q;});reaskQueue=(s.reaskQueue||[]).map(function(id){return Object.assign({},BANK[id],{_isReask:true});});CAT_NAMES.forEach(function(c){catStats[c]={c:0,t:0};});for(let k in answerMap){let m=answerMap[k];let q=BANK[k];if(!catStats[q.cat])catStats[q.cat]={c:0,t:0};catStats[q.cat].t++;if(m.isCorrect)catStats[q.cat].c++;}return true;}catch(e){return false;}}
function init(){if(!loadState()){questions=shuffle(BANK.slice());idx=0;score=0;attempts=0;reaskQueue=[];answerMap={};answerHistory=[];}render();}
function renderNav(){if(!navOpen)return'';let html='<div class="nav-grid">';for(let i=0;i<BANK.length;i++){let cls='nav-cell';let activeList=reviewList||answerHistory;if(browseIdx>=0&&activeList[browseIdx]===i)cls+=' nc-review';else if(browseIdx===-1&&idx<questions.length&&questions[idx]._bankId===i)cls+=' nc-current';else if(i in answerMap)cls+=answerMap[i].isCorrect?' nc-correct':' nc-wrong';html+='<div class="'+cls+'" onclick="navJump('+i+')">'+(i+1)+'</div>';}return html+'</div>';}
function renderJumpBar(){if(!jumpOpen)return'';let step=BANK.length>=40?10:BANK.length>=20?5:3;let html='<div class="jump-bar">';for(let m=1;m<=BANK.length;m+=step){let bankId=m-1;let cls='jump-btn';if(bankId in answerMap)cls+=answerMap[bankId].isCorrect?' jb-correct':' jb-wrong';html+='<div class="'+cls+'" onclick="navJump('+bankId+')">Q'+m+'</div>';}return html+'</div>';}
function navJump(bankId){if(bankId in answerMap){let activeList=reviewList||answerHistory;let pos=activeList.indexOf(bankId);if(pos!==-1){browseIdx=pos;renderHistoryItem();}else if(!reviewList){let p2=answerHistory.indexOf(bankId);if(p2!==-1){browseIdx=p2;reviewList=null;renderHistoryItem();}}}else{browseIdx=-1;reviewList=null;for(let i=0;i<questions.length;i++){if(questions[i]._bankId===bankId&&!questions[i]._isReask){idx=i;render();return;}}}}
function toggleNav(){navOpen=!navOpen;if(browseIdx>=0)renderHistoryItem();else render();}
function toggleJump(){jumpOpen=!jumpOpen;if(browseIdx>=0)renderHistoryItem();else render();}
function renderHistoryItem(){let activeList=reviewList||answerHistory;let bankId=activeList[browseIdx];let info=answerMap[bankId];let q=BANK[bankId];let uniqueAnswered=Object.keys(answerMap).length;let optHTML='';q.o.forEach(function(opt,i){let cls='opt-btn disabled';if(i===info.correct)cls+=' show-correct';if(i===info.picked&&!info.isCorrect)cls+=' picked-wrong';else if(i===info.picked&&info.isCorrect)cls+=' picked-correct';let letter=String.fromCharCode(65+i);optHTML+='<button class="'+cls+'"><span class="letter">'+letter+'.</span> '+opt+'<div class="rationale" style="display:block">'+q.r[i]+'</div></button>';});let prevDisabled=browseIdx<=0?' disabled':'';let nextDisabled=browseIdx>=activeList.length-1?' disabled':'';document.getElementById('app').innerHTML='<h1>👁️ GA 0202 · The Eye & Orbit · Everything-MC (138 Q)</h1><p class="subtitle">Dr. Seema Maini — The Eye & Orbit — 138 Q with topic filter</p><div class="stats"><div class="stat"><div class="stat-val">'+attempts+'</div><div class="stat-label">Attempts</div></div><div class="stat"><div class="stat-val">'+score+'</div><div class="stat-label">Correct</div></div><div class="stat"><div class="stat-val">'+(attempts?Math.round(score/attempts*100):0)+'%</div><div class="stat-label">Accuracy</div></div><div class="stat"><div class="stat-val">'+reaskQueue.length+'</div><div class="stat-label">Re-ask</div></div><button onclick="confirmRestart()" class="restart-sm">&#8635; Restart</button></div><button class="btn-nav-toggle" onclick="toggleNav()">'+(navOpen?'\u25bc Hide Navigator':'\u25b6 Question Navigator ('+uniqueAnswered+'/'+BANK.length+')')+'</button>'+renderNav()+'<button class="btn-nav-toggle" onclick="toggleJump()">'+(jumpOpen?'\u25bc Hide Jump Bar':'\u25b6 Jump to Question')+'</button>'+renderJumpBar()+'<div class="browse-banner">\ud83d\udcdd Reviewing '+(reviewList?'missed ':'')+'answer '+(browseIdx+1)+' of '+activeList.length+'</div><div class="card"><span class="cat-badge">'+q.cat+'</span><div class="q-text">Q'+(BANK.indexOf(q)+1)+': '+q.q+'</div>'+optHTML+'<div class="source-line" style="display:block"><span>Source:</span> '+q.source+'</div>'+(q.quote?'<div class="quote-line" style="display:block">'+q.quote+'</div>':'')+(q.profTip?'<div class="prof-tip" style="display:block"><span class="tip-label">Professor:</span> '+q.profTip+'</div>':'')+(q.obj?'<div class="obj-tag" style="display:block">'+q.obj+'</div>':'')+'<div class="btn-group"><button class="btn-prev" onclick="prevBrowse()"'+prevDisabled+'>\u2190 Previous</button><button class="btn-next" onclick="returnToQuiz()" style="display:inline-block">Return to Quiz</button><button class="btn-prev" onclick="nextBrowse()"'+nextDisabled+'>Next \u2192</button></div></div>';}
function prevBrowse(){if(browseIdx>0){browseIdx--;renderHistoryItem();}}
function nextBrowse(){let activeList=reviewList||answerHistory;if(browseIdx<activeList.length-1){browseIdx++;renderHistoryItem();}}
function returnToQuiz(){browseIdx=-1;reviewList=null;render();}
function render(){let app=document.getElementById('app');while(idx<questions.length&&!questions[idx]._isReask&&questions[idx]._bankId in answerMap){idx++;}if(idx>=questions.length&&reaskQueue.length===0)return showSummary();if(reaskQueue.length>0&&(idx>=questions.length||(idx>0&&idx%3===0))){questions.splice(idx,0,reaskQueue.shift());}if(idx>=questions.length)return showSummary();let q=questions[idx];let uniqueAnswered=Object.keys(answerMap).length;let pct=Math.min(100,Math.round((uniqueAnswered/BANK.length)*100));let optHTML='';q.o.forEach(function(opt,i){let letter=String.fromCharCode(65+i);optHTML+='<button class="opt-btn" id="ob'+i+'" onclick="pick('+i+')"><span class="letter">'+letter+'.</span> '+opt+'<div class="rationale" id="rat'+i+'">'+q.r[i]+'</div></button>';});app.innerHTML='<h1>GA 0202 · The Eye & Orbit · Everything-MC (138 Q)</h1><p class="subtitle">Dr. Seema Maini — The Eye & Orbit — 138 Q with topic filter</p><div class="stats"><div class="stat"><div class="stat-val">'+attempts+'</div><div class="stat-label">Attempts</div></div><div class="stat"><div class="stat-val">'+score+'</div><div class="stat-label">Correct</div></div><div class="stat"><div class="stat-val">'+(attempts?Math.round(score/attempts*100):0)+'%</div><div class="stat-label">Accuracy</div></div><div class="stat"><div class="stat-val">'+reaskQueue.length+'</div><div class="stat-label">Re-ask</div></div><button onclick="confirmRestart()" class="restart-sm">&#8635; Restart</button></div><button class="btn-nav-toggle" onclick="toggleNav()">'+(navOpen?'\u25bc Hide Navigator':'\u25b6 Question Navigator ('+uniqueAnswered+'/'+BANK.length+')')+'</button>'+renderNav()+'<button class="btn-nav-toggle" onclick="toggleJump()">'+(jumpOpen?'\u25bc Hide Jump Bar':'\u25b6 Jump to Question')+'</button>'+renderJumpBar()+'<button class="btn-nav-toggle" onclick="toggleInstr()" style="border-color:#334155">'+(instrOpen?'\u25bc Hide Instructions':'\u25b6 How This Drill Works')+'</button>'+(instrOpen?'<div class="instructions" style="display:block"><h3>How This Drill Works</h3><ul><li>Answer each question by clicking A/B/C/D</li><li><span class="key">Re-ask system</span>: Missed questions come back later so you must <strong>get it right twice</strong></li><li><span class="key">Question Navigator</span>: Click any cell to jump to or review that question</li><li><span class="key">Jump to Question</span>: Quick milestone markers</li><li><span class="key">Previous button</span>: Browse back through answered questions</li><li>Every answer reveals: rationale, source, Dr. Maini quote, professor tip, and <strong>study guide item</strong></li><li>Progress is <strong>auto-saved</strong></li><li>At the end: category breakdown + <strong>Review Only Missed</strong></li></ul></div>':'')+'<div class="progress-track"><div class="progress-fill" style="width:'+pct+'%"></div></div><div class="card"><span class="cat-badge">'+q.cat+(q._isReask?' \ud83d\udd01 RE-ASK':'')+'</span><div class="q-text">Q'+(idx+1)+' of '+questions.length+': '+q.q+'</div>'+(q.hint?'<button class="btn-hint" onclick="this.nextElementSibling.style.display=\'block\';this.style.display=\'none\'">\ud83d\udca1 Show Hint</button><div class="hint-text" style="display:none">\ud83d\udca1 '+q.hint+'</div>':'')+optHTML+'<div class="source-line" id="srcLine"><span>Source:</span> '+q.source+'</div>'+(q.quote?'<div class="quote-line" id="quoteLine">'+q.quote+'</div>':'')+(q.profTip?'<div class="prof-tip" id="tipLine"><span class="tip-label">Professor:</span> '+q.profTip+'</div>':'')+(q.obj?'<div class="obj-tag" id="objTag">'+q.obj+'</div>':'')+'<div class="btn-group" id="btnGroup"><button class="btn-prev" onclick="prevAnswer()"'+(answerHistory.length===0?' disabled':'')+'>\u2190 Previous</button><button class="btn-next" id="btnNext" onclick="nextQ()">Next Question \u2192</button></div></div>';}
function pick(i){let q=questions[idx];let opts=document.querySelectorAll('.opt-btn');if(opts[0]&&opts[0].classList.contains('disabled'))return;opts.forEach(function(o){o.classList.add('disabled');o.onclick=null;});let correct=q.c;let isCorrect=i===correct;opts[i].classList.add(isCorrect?'picked-correct':'picked-wrong');if(!isCorrect)opts[correct].classList.add('show-correct');attempts++;if(!catStats[q.cat])catStats[q.cat]={c:0,t:0};catStats[q.cat].t++;if(isCorrect){score++;catStats[q.cat].c++;}else{reaskQueue.push(Object.assign({},q,{_isReask:true}));}if(q._bankId!==undefined){if(!(q._bankId in answerMap)){answerMap[q._bankId]={picked:i,correct:correct,isCorrect:isCorrect,attempts:1,everWrong:!isCorrect};}else{let m=answerMap[q._bankId];m.picked=i;m.isCorrect=isCorrect;m.attempts++;if(!isCorrect)m.everWrong=true;}}if(!answerHistory.includes(q._bankId))answerHistory.push(q._bankId);for(let j=0;j<q.o.length;j++){let r=document.getElementById('rat'+j);if(r)r.style.display='block';}let sl=document.getElementById('srcLine');if(sl)sl.style.display='block';let ql=document.getElementById('quoteLine');if(ql)ql.style.display='block';let tl=document.getElementById('tipLine');if(tl)tl.style.display='block';let ot=document.getElementById('objTag');if(ot)ot.style.display='block';let nb=document.getElementById('btnNext');if(nb)nb.style.display='inline-block';saveState();}
function nextQ(){idx++;render();saveState();}
function prevAnswer(){if(answerHistory.length===0)return;browseIdx=answerHistory.length-1;renderHistoryItem();}
function showSummary(){let app=document.getElementById('app');let uniqueAnswered=Object.keys(answerMap).length;let mastered=0;let everWrongCount=0;for(let k in answerMap){if(answerMap[k].isCorrect)mastered++;if(answerMap[k].everWrong)everWrongCount++;}let pct=uniqueAnswered>0?Math.round(mastered/uniqueAnswered*100):0;let cls=pct>=85?'great':pct>=65?'ok':'rough';let catHTML='<table class="cat-table"><tr><th>Study Guide Item</th><th>Score</th></tr>';for(let cat of CAT_NAMES){if(catStats[cat]&&catStats[cat].t>0)catHTML+='<tr><td>'+cat+'</td><td>'+catStats[cat].c+'/'+catStats[cat].t+'</td></tr>';}catHTML+='</table>';app.innerHTML='<h1>GA 0202 · The Eye & Orbit · Everything-MC (138 Q)</h1><p class="subtitle">Dr. Seema Maini — The Eye & Orbit — 138 Q with topic filter</p><div class="summary" style="display:block"><h2>Quiz Complete!</h2><div class="pct '+cls+'">'+pct+'%</div><p style="color:#94a3b8">'+mastered+' of '+uniqueAnswered+' mastered on latest attempt</p><p class="detail">Attempts: '+attempts+' | Ever missed: '+everWrongCount+' | Re-asked: '+(attempts-uniqueAnswered)+'</p>'+catHTML+(everWrongCount>0?'<button class="review-btn" onclick="reviewMissed()">Review Only Missed ('+everWrongCount+')</button>':'')+'<br><button class="restart-btn" onclick="restart()">Restart Drill</button></div>';}
function reviewMissed(){let missed=answerHistory.filter(function(id){return answerMap[id]&&answerMap[id].everWrong;});if(missed.length===0)return;reviewList=missed;browseIdx=0;renderHistoryItem();}
function restart(){questions=shuffle(BANK.slice());idx=0;score=0;attempts=0;reaskQueue=[];answerMap={};answerHistory=[];browseIdx=-1;reviewList=null;CAT_NAMES.forEach(function(c){catStats[c]={c:0,t:0};});render();saveState();}
function confirmRestart(){if(confirm('Restart the drill? All progress will be lost.'))restart();}
function toggleInstr(){instrOpen=!instrOpen;if(browseIdx>=0)renderHistoryItem();else render();}
init();
</script>

<script>
const TIMESTAMPS=[];
var audioAutoPlay=true;

// Follow-along mode
var _origShuffle=shuffle;
var followMode=false;
var reaskMode=true;
shuffle=function(a){return followMode?a:_origShuffle(a);};

// ── Persistent audio bar: survives every render() + renderHistoryItem() call ──
var _audioBar=null;
function _buildAudioBar(){
  var ab=document.createElement('div');
  ab.id='audio-bar';
  ab.className='audio-bar';
  ab.innerHTML='<audio id="mk-audio" controls preload="none">Audio not found. Place MP3 in same folder.</audio>'
    +'<div class="audio-info">'
    +'<span class="timestamp-badge" id="ts-badge">⏱ --:--</span>'
    +'<div class="skip-btns">'
    +'<button class="btn-skip" onclick="skipAudio(-30)" title="Back 30s">⏪ 30</button>'
    +'<button class="btn-skip" onclick="skipAudio(-10)" title="Back 10s">⏪ 10</button>'
    +'<button class="btn-play-here" onclick="playFromHere()">▶ Play From Here</button>'
    +'<button class="btn-skip" onclick="skipAudio(10)" title="Forward 10s">10 ⏩</button>'
    +'<button class="btn-skip" onclick="skipAudio(30)" title="Forward 30s">30 ⏩</button>'
    +'</div>'
    +'<div class="audio-modes">'
    +'<label class="audio-auto-label"><input type="radio" name="amode" value="seek" onchange="setAudioMode(\'seek\')"> Seek per Q</label>'
    +'<label class="audio-auto-label"><input type="radio" name="amode" value="continuous" checked onchange="setAudioMode(\'continuous\')"> Continuous play</label>'
    +'<label class="audio-auto-label"><input type="radio" name="amode" value="off" onchange="setAudioMode(\'off\')"> Audio off</label>'
    +'</div>'
      +'<div class=\"speed-block\"><div class=\"speed-top\"><span class=\"speed-label\">Speed</span><button class=\"btn-speed-pm\" onclick=\"fabSetSpeed(fabCurrentSpeed - 0.05)\">&minus;.05</button><span class=\"speed-val\" id=\"speed-display\">1.00x</span><button class=\"btn-speed-pm\" onclick=\"fabSetSpeed(fabCurrentSpeed + 0.05)\">+.05</button></div><div class=\"speed-presets\"><button class=\"btn-speed-preset\" onclick=\"fabSetSpeed(0.5)\">0.5x</button><button class=\"btn-speed-preset\" onclick=\"fabSetSpeed(0.75)\">0.75x</button><button class=\"btn-speed-preset\" onclick=\"fabSetSpeed(0.9)\">0.9x</button><button class=\"btn-speed-preset active\" onclick=\"fabSetSpeed(1.0)\">1x</button><button class=\"btn-speed-preset\" onclick=\"fabSetSpeed(1.1)\">1.1x</button><button class=\"btn-speed-preset\" onclick=\"fabSetSpeed(1.25)\">1.25x</button><button class=\"btn-speed-preset\" onclick=\"fabSetSpeed(1.5)\">1.5x</button><button class=\"btn-speed-preset\" onclick=\"fabSetSpeed(2.0)\">2x</button></div></div><div class=\"transcript-toggle\"><button class=\"btn-transcript\" id=\"btn-transcript\" onclick=\"fabToggleTranscript()\">\ud83d\udcdc Transcript</button></div><div class=\"transcript-box\" id=\"transcript-box\"></div>'
    +'</div>';
  return ab;
}

function _ensureAudioAttached(){
  var app=document.getElementById('app');
  if(!app)return;
  if(!_audioBar)_audioBar=_buildAudioBar();
  var card=app.querySelector('.card');
  if(card&&_audioBar.parentNode!==card.parentNode){
    card.parentNode.insertBefore(_audioBar,card);
  } else if(!card&&_audioBar.parentNode!==app){
    // Summary screen — attach at top so audio keeps playing
    app.insertBefore(_audioBar,app.firstChild);
  }
  updateTimestampBadge();
}

// Override render to preserve audio across wipes
var _origRender=render;
render=function(){
  if(_audioBar&&_audioBar.parentNode){_audioBar.parentNode.removeChild(_audioBar);}
  _origRender();
  _ensureAudioAttached();

  // Toggle bar + re-ask banner (stateful — rebuild if missing)
  var app=document.getElementById('app');
  if(!document.getElementById('mk-toggle-bar')){
    var bar=document.createElement('div');
    bar.id='mk-toggle-bar';
    bar.className='follow-toggle';
    bar.innerHTML='<button class="follow-btn'+(followMode?' active':'')+'" onclick="setFollowMode(true)">📖 Lecture Order</button>'
      +'<button class="follow-btn'+(!followMode?' active':'')+'" onclick="setFollowMode(false)">🔀 Shuffle Mode</button>'
      +'<button class="reask-btn'+(reaskMode?' active':'')+'" onclick="toggleReask()">🚨 Re-Ask Missed</button>';
    var banner=document.createElement('div');
    banner.id='reask-banner';
    banner.className='reask-banner';
    var firstChild=app.firstChild;
    if(firstChild&&firstChild.nextSibling){
      app.insertBefore(banner,firstChild.nextSibling);
      app.insertBefore(bar,firstChild.nextSibling);
    }
  }
  buildReaskBar();

  // Re-ask card glow
  var card=document.querySelector('.card');
  if(card){
    var isReask=idx<questions.length&&questions[idx]&&questions[idx]._isReask;
    if(isReask){
      card.classList.add('reask-glow');
      if(!card.querySelector('.reask-card-badge')){
        var badge=document.createElement('div');
        badge.className='reask-card-badge';
        badge.textContent='🔁 RE-ASK — You missed this one. Get it right!';
        card.insertBefore(badge,card.firstChild);
      }
    } else {
      card.classList.remove('reask-glow');
    }
  }
};

// Override renderHistoryItem so Previous still shows the audio panel
var _origRenderHistory=renderHistoryItem;
renderHistoryItem=function(){
  if(_audioBar&&_audioBar.parentNode){_audioBar.parentNode.removeChild(_audioBar);}
  _origRenderHistory();
  _ensureAudioAttached();
};

// Override showSummary so audio panel survives end-of-drill screen too
var _origShowSummary=showSummary;
showSummary=function(){
  if(_audioBar&&_audioBar.parentNode){_audioBar.parentNode.removeChild(_audioBar);}
  _origShowSummary();
  _ensureAudioAttached();
};

function updateTimestampBadge(){
  var badge=document.getElementById('ts-badge');
  if(!badge)return;
  if(idx<questions.length&&questions[idx]){
    var bankId=questions[idx]._bankId;
    if(bankId!==undefined&&TIMESTAMPS[bankId]!==undefined){
      var ts=TIMESTAMPS[bankId];
      var m=Math.floor(ts/60);
      var s=Math.floor(ts%60);
      badge.textContent='⏱ '+m+':'+(s<10?'0':'')+s;
    } else {
      badge.textContent='⏱ --:--';
    }
  }
}

var audioMode='continuous';

function playFromHere(){
  var audio=document.getElementById('mk-audio');
  if(!audio||idx>=questions.length)return;
  var bankId=questions[idx]._bankId;
  if(bankId===undefined||TIMESTAMPS[bankId]===undefined)return;
  var seekTo;if(TIMESTAMPS[bankId]===undefined||TIMESTAMPS[bankId]<=0){var f=null;for(var di=1;di<TIMESTAMPS.length;di++){var hi=bankId+di,lo=bankId-di;if(TIMESTAMPS[hi]>0){f=TIMESTAMPS[hi];break;}if(TIMESTAMPS[lo]>0){f=TIMESTAMPS[lo];break;}}if(f===null)return;seekTo=Math.max(0,f-2);}else{seekTo=Math.max(0,TIMESTAMPS[bankId]-2);}
  // FAB M01 lectures.mp3 split: L01 (0-4800s, 80min) / L02 (4800-10817s, 100min) / L03 (10817-18943s, 135min).
  // Swap audio source if needed BEFORE seeking, since each lecture file is its own duration.
  var L01='https://dgsc23.github.io/dc-study-audio/fab-201-m02-shoulder-forearm-L04.mp3';
  var L02='https://dgsc23.github.io/dc-study-audio/fab-201-m02-shoulder-forearm-L05.mp3';
  var L03='https://dgsc23.github.io/dc-study-audio/fab-201-m02-shoulder-forearm-L06.mp3';
  var s=audio.querySelector('source');
  var part=seekTo<4800?'L01':(seekTo<10817?'L02':'L03');
  var targetURL=part==='L01'?L01:(part==='L02'?L02:L03);
  var targetSec=part==='L01'?seekTo:(part==='L02'?(seekTo-4800):(seekTo-10817));
  var hasL01=s&&/-L01\.mp3/.test(s.src);
  var hasL02=s&&/-L02\.mp3/.test(s.src);
  var hasL03=s&&/-L03\.mp3/.test(s.src);
  var currentMatches=(part==='L01'&&hasL01)||(part==='L02'&&hasL02)||(part==='L03'&&hasL03);
  if(s&&!currentMatches){
    s.src=targetURL;audio.load();
    audio.addEventListener('loadedmetadata',function once(){
      audio.currentTime=targetSec;audio.play();
      audio.removeEventListener('loadedmetadata',once);
    });
    return;
  }
  audio.currentTime=targetSec;audio.play();
}

function skipAudio(sec){
  var audio=document.getElementById('mk-audio');
  if(!audio)return;
  audio.currentTime=Math.max(0,audio.currentTime+sec);
  if(audio.paused)audio.play();
}

function setAudioMode(mode){
  audioMode=mode;
  audioAutoPlay=(mode==='seek');
}

// Override nextQ to respect audio mode (continuous = don't touch audio)
var _origNextQ=nextQ;
nextQ=function(){
  _origNextQ();
  if(audioMode==='seek'){
    setTimeout(function(){playFromHere();},300);
  }
  // continuous = let audio keep playing
  // off = do nothing
};

function setFollowMode(on){
  followMode=on;
  document.querySelectorAll('.follow-btn').forEach(function(b,i){b.classList.toggle('active',i===0?on:!on);});
  if(Object.keys(answerMap).length===0){
    questions=BANK.slice();idx=0;render();saveState();
  }
}

function toggleReask(){
  reaskMode=!reaskMode;
  document.querySelectorAll('.reask-btn').forEach(function(b){b.classList.toggle('active',reaskMode);});
  buildReaskBar();
}

function buildReaskBar(){
  var bar=document.getElementById('reask-banner');
  if(!bar)return;
  var missed=[];
  if(typeof answerMap!=='undefined'){
    for(var k in answerMap){if(answerMap.hasOwnProperty(k)&&!answerMap[k].isCorrect)missed.push(k);}
  }
  if(reaskMode&&missed.length>0){
    bar.style.display='block';
    bar.innerHTML='⚠️ '+missed.length+' MISSED — <button onclick="drillMissed()">DRILL MISSED NOW</button>';
  } else {
    bar.style.display='none';
  }
}

function drillMissed(){
  var missed=[];
  for(var k in answerMap){if(answerMap.hasOwnProperty(k)&&!answerMap[k].isCorrect)missed.push(parseInt(k));}
  if(missed.length===0)return;
  questions=missed.map(function(id){return BANK[id];});
  for(var i=questions.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1));var t=questions[i];questions[i]=questions[j];questions[j]=t;}
  idx=0;score=0;attempts=0;answerMap={};answerHistory=[];
  render();
}

// Initial boot — run once to attach audio bar
questions=BANK.slice();idx=0;render();

// ── FAB unified speed control ──
var fabCurrentSpeed = 1.0;
function fabSetSpeed(val) {
  val = Math.round(val * 100) / 100;
  if (val < 0.25) val = 0.25;
  if (val > 3.0) val = 3.0;
  fabCurrentSpeed = val;
  document.querySelectorAll('audio').forEach(function(a){ a.playbackRate = val; });
  var d = document.getElementById('speed-display');
  if (d) d.textContent = val.toFixed(2) + 'x';
  document.querySelectorAll('.btn-speed-preset').forEach(function(b){
    var pv = parseFloat(b.textContent);
    b.classList.toggle('active', Math.abs(pv - val) < 0.001);
  });
}
// Re-apply rate whenever any audio element plays
(function(){
  var _origPlay = HTMLMediaElement.prototype.play;
  HTMLMediaElement.prototype.play = function(){
    if (this.tagName === 'AUDIO') this.playbackRate = fabCurrentSpeed;
    return _origPlay.apply(this, arguments);
  };
})();


var fabTranscriptOn = false;
function fabToggleTranscript() {
  fabTranscriptOn = !fabTranscriptOn;
  var box = document.getElementById('transcript-box');
  var btn = document.getElementById('btn-transcript');
  if (box) box.classList.toggle('show', fabTranscriptOn);
  if (btn) btn.classList.toggle('active', fabTranscriptOn);
  if (fabTranscriptOn) fabUpdateTranscript();
}
function fabUpdateTranscript() {
  if (!fabTranscriptOn) return;
  var box = document.getElementById('transcript-box');
  if (!box) return;
  if (typeof idx !== 'number' || typeof questions === 'undefined' || idx >= questions.length) {
    box.innerHTML = '<em>Drill complete.</em>';
    return;
  }
  var q = questions[idx];
  var cat = q.cat || '';
  var lines = fabTranscript[cat] || [];
  if (!lines.length) {
    box.innerHTML = '<em>No transcript lines for ' + cat + '.</em>';
    return;
  }
  var quote = (q.quote || '').toLowerCase().replace(/[^a-z0-9 ]/g, '');
  var quoteWords = quote.split(' ').filter(function(w){ return w.length > 3; });
  var html = '<strong>' + cat + '</strong><br>';
  for (var i = 0; i < lines.length; i++) {
    var lineLow = lines[i].toLowerCase().replace(/[^a-z0-9 ]/g, '');
    var hits = 0;
    for (var w = 0; w < quoteWords.length; w++) {
      if (lineLow.indexOf(quoteWords[w]) !== -1) hits++;
    }
    var match = quoteWords.length > 0 && hits >= Math.ceil(quoteWords.length * 0.4);
    if (match) html += '<span class="t-highlight">\u25b6 ' + lines[i] + '</span><br>';
    else html += lines[i] + '<br>';
  }
  box.innerHTML = html;
}
// Hook transcript update into render + renderHistoryItem

(function(){

    var collapsed = localStorage.getItem(LS_KEY_MIN) === '1';

  }

    if (ab.querySelector('.btn-minimize-audio')) return;
    var btn = document.createElement('button');
    btn.className = 'btn-minimize-audio';
    btn.type = 'button';
    btn.onclick = function(){
      var now = ab.classList.toggle('collapsed');
      localStorage.setItem(LS_KEY_MIN, now ? '1' : '0');
      btn.textContent = now ? '▸' : '▾';
      btn.title = now ? 'Expand audio bar' : 'Minimize audio bar';
    };
    ab.appendChild(btn);
    applyState(ab);
  }
  // Poll until audio-bar appears, attach, then keep watching in case it gets re-rendered
  var tries = 0;
  var iv = setInterval(function(){

      attachButton(ab);
      applyState(ab);

})();

<script id="ga0202-m01-transcript-loader">
var fabTranscriptLines = ``.split(/\r?\n/).filter(function(l){ return l.trim().length > 0; });
window.fabTranscriptOn = false;
function fabFetchTranscript(cb){ cb(); }
function fabParseTimestamp(line){
    var m = line.match(/^\[(\d+):(\d+)\]/);
    if (!m) return null;
    return parseInt(m[1],10) * 60 + parseInt(m[2],10);
}
function fabUpdateTranscript(){
    if (!window.fabTranscriptOn) return;
    var box = document.getElementById('transcript-box');
    if (!box) return;
    fabFetchTranscript(function(){
        if (!fabTranscriptLines || !fabTranscriptLines.length){
            box.innerHTML = '<em style="color:#f87171">Transcript file not found.</em>';
            return;
        }
        if (typeof idx !== 'number' || typeof BANK === 'undefined' || idx >= BANK.length){
            box.innerHTML = '<em>Drill complete.</em>';
            return;
        }
        var q = BANK[idx];
        var srcMatch = (q.source || '').match(/(\d+):(\d+)/);
        var targetSec = srcMatch ? parseInt(srcMatch[1],10)*60 + parseInt(srcMatch[2],10) : 0;
        // Use TIMESTAMPS array if available (more accurate)
        if (typeof TIMESTAMPS !== 'undefined' && TIMESTAMPS[idx] !== undefined) {
            targetSec = Math.round(TIMESTAMPS[idx]);
        }
        var bestIdx = 0;
        for (var i = 0; i < fabTranscriptLines.length; i++){
            var ts = fabParseTimestamp(fabTranscriptLines[i]);
            if (ts === null) continue;
            if (ts <= targetSec) bestIdx = i; else break;
        }
        var startIdx = Math.max(0, bestIdx - 2);
        var endIdx = Math.min(fabTranscriptLines.length, bestIdx + 6);
        var srcLabel = (q.source || '').split('@').pop().trim();
        var html = '<strong>Audio @ ' + srcLabel + ' &middot; ' + (q.cat||'') + '</strong><br>';
        for (var j = startIdx; j < endIdx; j++){
            var line = fabTranscriptLines[j];
            var safe = line.replace(/</g,'&lt;').replace(/>/g,'&gt;');
            if (j === bestIdx) html += '<span class="t-highlight">&#9654; ' + safe + '</span><br>';
            else html += safe + '<br>';
        }
        box.innerHTML = html;
    });
}
function fabToggleTranscript(){
    var box = document.getElementById('transcript-box');
    var btn = document.getElementById('btn-transcript');
    if (!box) return;
    window.fabTranscriptOn = !window.fabTranscriptOn;
    if (window.fabTranscriptOn){
        box.classList.add('show');
        if (btn) btn.classList.add('active');
        fabUpdateTranscript();
    } else {
        box.classList.remove('show');
        if (btn) btn.classList.remove('active');
    }
}
</script>

<script id="fab-ai-companion-js">
(function(){
  const ENDPOINT = "https://fab-ai.dgync1.workers.dev";
  const CLASS_NAME = "GA0202"; // e.g., "CP1" / "FAB101" / "GA0102" — empty = generic chiropractic tutor
  let panel = null;
  let history = []; // [{role:'user'|'model', content}]
  let currentQKey = null; // to detect Q navigation

  function readCurrentQ() {
    const qText = (document.querySelector('.q-text')?.innerText || '').replace(/^Q\d+(\s+of\s+\d+)?:\s*/, '');
    const optBtns = Array.from(document.querySelectorAll('.opt-btn'));
    const options = optBtns.map(b => {
      const clone = b.cloneNode(true);
      clone.querySelectorAll('.rationale').forEach(r => r.remove());
      clone.querySelectorAll('.letter').forEach(r => r.remove());
      return clone.innerText.trim();
    });
    let picked = null, correct = null;
    optBtns.forEach((b, i) => {
      if (b.classList.contains('picked-correct') || b.classList.contains('picked-wrong')) picked = i;
      if (b.classList.contains('picked-correct') || b.classList.contains('show-correct')) correct = i;
    });
    const profTip = document.querySelector('.prof-tip')?.innerText?.replace(/^Professor:\s*/i, '').trim() || '';
    const source = document.querySelector('.source-line')?.innerText?.replace(/^Source:\s*/i, '').trim() || '';
    const quote = document.querySelector('.quote-line')?.innerText?.trim() || '';
    return { question: qText, options, picked, correct, profTip, source, quote };
  }

  function qKey(ctx){ return (ctx.question || '') + '|' + (ctx.options || []).join('|'); }

  function mdToHtml(md){
    let html = md
      .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
      .replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>')
      .replace(/(^|\n)### (.+)/g, '$1<h3>$2</h3>')
      .replace(/`([^`]+)`/g, '<code>$1</code>')
      .replace(/^\s*[-*]\s+(.+)$/gm, '<li>$1</li>')
      .replace(/(<li>.*?<\/li>(\s*<li>.*?<\/li>)*)/gs, '<ul>$1</ul>');
    html = html.split(/\n{2,}/).map(p => {
      if (p.trim().startsWith('<ul') || p.trim().startsWith('<h3')) return p;
      if (p.trim() === '') return '';
      return '<p>' + p.replace(/\n/g, '<br>') + '</p>';
    }).join('');
    return html;
  }

  function stripForTts(text){
    // Remove markdown markers so TTS doesn't read them aloud
    return text
      .replace(/\*\*/g, '')
      .replace(/`([^`]+)`/g, '$1')
      .replace(/^\s*[-*]\s+/gm, '')
      .replace(/^#+\s+/gm, '')
      .replace(/\n{2,}/g, '. ')
      .replace(/\s+/g, ' ')
      .trim();
  }

  let currentUtter = null;
  function speakToggle(btn, rawText){
    if (!window.speechSynthesis) {
      alert('Your browser does not support text-to-speech.');
      return;
    }
    if (window.speechSynthesis.speaking && currentUtter && btn.classList.contains('playing')) {
      window.speechSynthesis.cancel();
      document.querySelectorAll('.fab-ai-tts-btn.playing').forEach(b => {
        b.classList.remove('playing');
        b.innerHTML = '🔊 Read';
      });
      currentUtter = null;
      return;
    }
    window.speechSynthesis.cancel();
    document.querySelectorAll('.fab-ai-tts-btn.playing').forEach(b => {
      b.classList.remove('playing');
      b.innerHTML = '🔊 Read';
    });
    const u = new SpeechSynthesisUtterance(stripForTts(rawText));
    const rateSel = btn.parentElement.querySelector('.fab-ai-tts-rate');
    u.rate = parseFloat(rateSel && rateSel.value || '1.0');
    /*ava-tts*/try{var _vs=(window.speechSynthesis&&window.speechSynthesis.getVoices())||[];var _av=_vs.find(function(v){return /microsoft.*ava.*natural/i.test(v.name);})||_vs.find(function(v){return /microsoft.*emma.*natural/i.test(v.name);})||_vs.find(function(v){return /google us english female/i.test(v.name);});if(_av){u.voice=_av;u.lang=_av.lang||'en-US';}}catch(e){}
    u.onend = () => {
      btn.classList.remove('playing');
      btn.innerHTML = '🔊 Read';
      currentUtter = null;
    };
    u.onerror = () => {
      btn.classList.remove('playing');
      btn.innerHTML = '🔊 Read';
      currentUtter = null;
    };
    currentUtter = u;
    btn.classList.add('playing');
    btn.innerHTML = '⏹ Stop';
    window.speechSynthesis.speak(u);
  }

  function appendMsg(role, text) {
    const body = document.getElementById('fabAiBody');

  function renderSuggestions(ctx){
    const body = document.getElementById('fabAiBody');

    if (ctx.question) {

    } else if (ctx.picked !== ctx.correct && ctx.picked !== null) {
      chips.push({ label: '❌ Why did I miss this?', q: 'I picked the wrong answer. Walk me through why my pick is wrong and why the correct answer is right.' });

    } else if (ctx.picked === ctx.correct) {
      chips.push({ label: '✅ Why is this right?', q: 'Confirm why the correct answer is right and flag any trap distractors to watch for.' });
      chips.push({ label: '🎯 Give me a mnemonic', q: 'Give me a memorable mnemonic for this topic.' });

    const el = document.createElement('div');

  async function callWorker(payload) {

    const letter = (i) => String.fromCharCode(65 + i);
    let prompt = "I'm studying GA 0202 (Gross Anatomy, head & neck) with Dr. Seema Maini at SCUHS. Drill question:\n\n";
    prompt += 'Q: ' + ctx.question + '\n\n';
    if (ctx.options && ctx.options.length) {
      ctx.options.forEach((o, i) => {
        const m = [];
        if (i === ctx.picked) m.push('PICKED');
        if (i === ctx.correct) m.push('CORRECT');
        prompt += letter(i) + '. ' + o + (m.length ? ' ('+m.join(', ')+')' : '') + '\n';
      });
      prompt += '\n';
    }
    if (ctx.profTip) prompt += 'DRILL TIP: ' + ctx.profTip + '\n\n';
    if (userQ) prompt += 'MY QUESTION: ' + userQ + '\n\n';
    prompt += 'Explain using a dumbed-down analogy + mnemonic.';
    navigator.clipboard.writeText(prompt).then(() => {
      appendStatus('✓ Prompt copied to clipboard. Backend not configured yet — paste into your AI chat.');
    }).catch(() => {
      appendStatus('Could not copy. Please select manually.', true);
    });
  }

  async function sendMessage(userText) {
    const ctx = readCurrentQ();
    currentQKey = qKey(ctx);
    appendMsg('user', userText);
    history.push({ role: 'user', content: userText });
    appendLoading();

    const payload = Object.assign({}, ctx, {
      userQuestion: userText,
      history: history.slice(-10), // last 10 turns for context
      className: CLASS_NAME, // worker uses this to load class-specific knowledge
    });
    const result = await callWorker(payload);
    removeLoading();
    if (result.clipboardFallback) {
      clipboardFallback(ctx, userText);
      return;
    }
    if (result.error) {
      appendStatus('Error: ' + result.error, true);
      return;
    }
    appendMsg('ai', result.reply);
    history.push({ role: 'model', content: result.reply });
  }

  window.fabAiFollowupSend = function() {
    const ta = document.getElementById('fabAiFollowup');
    const q = (ta && ta.value || '').trim();
    if (!q) return;
    ta.value = '';
    sendMessage(q);
  };

  // Button install — opens panel, does NOT auto-call AI
  function install() {
    if (document.getElementById('fabAiBtn')) return;
    const btn = document.createElement('button');
    btn.className = 'fab-ai-btn';
    btn.id = 'fabAiBtn';
    btn.textContent = '🩺';
    btn.title = 'Open AI Study Tutor';
    btn.onclick = () => openPanel();
    document.body.appendChild(btn);
  }
  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', install);
  } else {
    install();
  }
})();
</script>
