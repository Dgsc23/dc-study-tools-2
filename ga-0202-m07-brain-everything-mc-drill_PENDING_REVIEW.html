la oblongata"], "c": 3, "cat": "Brain Overview & Organization", "r": ["Wrong order - the midbrain is superior to the pons.", "Wrong order - the medulla is the lowest, not the middle.", "The diencephalon is not part of the brainstem.", "Correct. Maini gives the order midbrain, then pons, then medulla oblongata (continuous with the spinal cord)."], "source": "L16 - Brainstem - ~04:27", "obj": "Brainstem order: midbrain > pons > medulla", "hint": "Top to bottom, medulla meets the cord."}, {"q": "Maini calls the cerebellum the 'small brain.' What is its remarkable chief function?", "o": ["Relay of ascending sensation", "Seat of judgment and personality", "Coordination of movements", "Secretion of cerebrospinal fluid"], "c": 2, "cat": "Brain Overview & Organization", "r": ["Sensory relay is the job of the thalamus, not the cerebellum.", "Those higher functions belong to the frontal lobe of the cerebrum.", "Correct. The cerebellum is the seat of coordination - it fine-tunes and balances the movements planned by the motor cortex.", "CSF is secreted by the choroid plexus, not the cerebellum."], "source": "L16 - Cerebellum - ~03:41", "obj": "Cerebellum coordinates movement", "quote": "[Maini] 'Cerebellum ... is the seat of coordination of your movements.'", "hint": "It refines the plan the motor cortex lays down."}, {"q": "The medulla oblongata is directly continuous with which structure below the foramen magnum?", "o": ["Spinal cord", "Pons", "Cerebellum", "Midbrain"], "c": 0, "cat": "Brain Overview & Organization", "r": ["Correct. Maini notes medulla is the last brainstem part and is continuous with the spinal cord past the foramen magnum.", "The pons lies above the medulla, not below it.", "The cerebellum sits posterior to the pons and medulla, not continuous below the medulla.", "The midbrain is the most superior brainstem part."], "source": "L16 - Medulla/foramen magnum - ~01:00:42", "obj": "Medulla continuous with spinal cord", "hint": "Past the foramen magnum."}, {"q": "What is the name of the deep fissure that divides the left cerebral hemisphere from the right?", "o": ["Lateral fissure", "Central sulcus", "Calcarine sulcus", "Longitudinal fissure"], "c": 3, "cat": "Cerebral Cortex - Gray/White Matter", "r": ["The lateral fissure separates the temporal lobe from the frontal and parietal lobes.", "The central sulcus separates the frontal from the parietal lobe.", "The calcarine sulcus is on the medial surface near the visual cortex.", "Correct. Maini asks this directly - the longitudinal fissure separates the two cerebral hemispheres."], "source": "L16 - Hemispheres - ~05:42", "obj": "Longitudinal fissure divides hemispheres", "hint": "Runs front-to-back between the hemispheres."}, {"q": "Which dural fold is lodged within the longitudinal fissure between the two cerebral hemispheres?", "o": ["Corpus callosum", "Tentorium cerebelli", "Falx cerebri", "Falx cerebelli"], "c": 2, "cat": "Cerebral Cortex - Gray/White Matter", "r": ["The corpus callosum is the fiber band connecting the hemispheres, not the dural fold in the fissure.", "The tentorium separates the cerebrum from the cerebellum, not the two hemispheres.", "Correct. Maini identifies the falx cerebri as the structure located within the longitudinal fissure.", "The falx cerebelli is the narrow fold between the two cerebellar hemispheres."], "source": "L16 - Longitudinal fissure - ~06:01", "obj": "Falx cerebri sits in longitudinal fissure", "hint": "A sickle-shaped dural sheet between the hemispheres."}, {"q": "On her Mentimeter, Maini asks: the band of fibers connecting the two cerebral hemispheres is called?", "o": ["Optic chiasma", "Corpus callosum", "Fornix", "Internal capsule"], "c": 1, "cat": "Cerebral Cortex - Gray/White Matter", "r": ["The optic chiasma is where the optic nerves cross - it does not connect the hemispheres.", "Correct. The corpus callosum is the C-shaped fiber band that runs between the two hemispheres.", "The fornix is a C-shaped tract of the limbic system, not the interhemispheric commissure.", "The internal capsule is white matter between the basal nuclei and thalamus."], "source": "L17 - Menti - ~01:31:18", "obj": "Corpus callosum connects hemispheres", "hint": "The great commissure exchanging information side to side."}, {"q": "In the cerebrum, where are the neuronal cell bodies (gray matter) concentrated, and what fills the interior?", "o": ["White matter in the cortex; gray matter inside", "Gray matter throughout, no white matter", "White matter throughout, no gray matter", "Gray matter in the peripheral cortex; white matter (myelinated fibers) inside"], "c": 3, "cat": "Cerebral Cortex - Gray/White Matter", "r": ["Reversed - the cortex is gray, the interior is white.", "The interior is predominantly white matter fibers.", "The peripheral cortex is gray matter of cell bodies.", "Correct. Cell bodies sit peripherally in the cerebral cortex; the interior is white matter - myelinated fibers that look white."], "source": "L16 - Gray/white matter - ~07:36", "obj": "Cortex = gray; interior = white", "hint": "Myelin makes the inside look white."}, {"q": "Maini insists on the correct term for the islands of gray matter buried inside the cerebral white matter. Which term does she say is correct?", "o": ["Basal ganglia", "Basal cortex", "Basal nuclei", "Basal commissures"], "c": 2, "cat": "Cerebral Cortex - Gray/White Matter", "r": ["Maini calls this the clinician's term but technically incorrect - a ganglion is outside the CNS.", "Not a term she uses; these are deep nuclei, not cortex.", "Correct. Maini says 'basal nuclei' is the right term; 'basal ganglia' is technically wrong because a ganglion lies outside the CNS.", "Commissures are connecting fiber bands, not the deep gray masses."], "source": "L16 - Basal nuclei - ~08:50", "obj": "Basal nuclei (not ganglia) is correct", "quote": "[Maini] 'Nuclei is the best terminology, basal ganglia is not the right terminology.'", "hint": "A ganglion is a group of cell bodies OUTSIDE the CNS."}, {"q": "Why does Maini say 'basal ganglia' is technically an incorrect name for these deep gray masses?", "o": ["A ganglion contains only white matter", "A ganglion is a group of cell bodies located OUTSIDE the central nervous system", "A ganglion is always in the spinal cord", "A ganglion has no cell bodies"], "c": 1, "cat": "Cerebral Cortex - Gray/White Matter", "r": ["A ganglion is a collection of cell bodies (gray), not white matter.", "Correct. Because these masses are inside the CNS, 'nuclei' is proper; 'ganglion' implies cell bodies outside the CNS.", "Ganglia are peripheral collections, not confined to the cord.", "A ganglion is defined by its cell bodies."], "source": "L16 - Ganglion vs nucleus - ~09:04", "obj": "Ganglion = cell bodies outside CNS", "hint": "Location relative to the CNS is the key."}, {"q": "Which three structures does Maini name as the basal nuclei of the cerebrum?", "o": ["Caudate nucleus, putamen, and globus pallidus", "Thalamus, hypothalamus, and pineal gland", "Caudate nucleus, thalamus, and claustrum", "Putamen, red nucleus, and substantia nigra"], "c": 0, "cat": "Cerebral Cortex - Gray/White Matter", "r": ["Correct. Maini lists caudate nucleus, putamen, and globus pallidus (putamen + globus pallidus = lentiform; all three = corpus striatum).", "These are diencephalon structures, not basal nuclei.", "The thalamus is diencephalon; the classic trio is caudate, putamen, globus pallidus.", "Red nucleus and substantia nigra are midbrain structures."], "source": "L16 - Basal nuclei list - ~10:04", "obj": "Caudate + putamen + globus pallidus", "hint": "Two of these together form the lentiform nucleus."}, {"q": "Maini defines the lentiform nucleus as the combination of which two structures?", "o": ["Caudate nucleus and putamen", "Caudate nucleus and globus pallidus", "Claustrum and putamen", "Putamen and globus pallidus"], "c": 3, "cat": "Cerebral Cortex - Gray/White Matter", "r": ["This pairing is not the lentiform nucleus; the lentiform is putamen + globus pallidus.", "The lentiform is putamen + globus pallidus, not caudate + globus pallidus.", "The claustrum is a separate thin strip, not part of the lentiform nucleus.", "Correct. Putamen + globus pallidus = lentiform nucleus; adding the caudate makes the corpus striatum."], "source": "L16 - Lentiform/corpus striatum - ~10:12", "obj": "Lentiform = putamen + globus pallidus", "hint": "Lens-shaped pair; add caudate for the striatum."}, {"q": "Maini gives Parkinsonism as the classic disorder of which structures, marked by slowness, sluggish movement, and resting tremor?", "o": ["Basal nuclei", "Cerebellum", "Thalamus", "Primary motor cortex"], "c": 0, "cat": "Cerebral Cortex - Gray/White Matter", "r": ["Correct. She says Parkinsonism affects the basal nuclei, which normally make movement fine, timed, and coordinated.", "Cerebellar disease gives intention tremor and incoordination, not the resting tremor of Parkinsonism.", "Thalamic damage causes sensory loss, not Parkinsonian resting tremor.", "Motor cortex lesions cause paralysis, not the resting tremor pattern."], "source": "L16 - Basal nuclei function - ~09:39", "obj": "Parkinsonism = basal nuclei disorder", "hint": "Resting tremor is the basal-nuclei signature."}, {"q": "How does Maini distinguish a sulcus (fissure) from a gyrus?", "o": ["A sulcus is a ridge; a gyrus is a groove", "A sulcus/fissure is a groove; a gyrus is a raised ridge", "Both are grooves of different depth only", "A sulcus is gray matter; a gyrus is white matter"], "c": 1, "cat": "Cerebral Cortex - Gray/White Matter", "r": ["Reversed - the gyrus is the ridge and the sulcus is the groove.", "Correct. Sulci/fissures are grooves; gyri are the raised ridges. (A groove deeper than ~1 inch is often called a fissure.)", "A gyrus is a ridge, not a groove.", "Both are surface folds; the distinction is groove vs ridge, not tissue type."], "source": "L16 - Sulci and gyri - ~06:46", "obj": "Sulcus = groove, gyrus = ridge", "hint": "Valleys versus hills on the cortex."}, {"q": "Maini says each cerebral hemisphere is divided into how many lobes, and which lobe is the hidden deep one?", "o": ["Four lobes; there is no deep lobe", "Six lobes; the limbic lobe is deepest", "Five lobes; the insula is the deep 5th lobe", "Five lobes; the cingulate is the deep 5th"], "c": 2, "cat": "Lobes & Boundaries", "r": ["There are five - the fifth (insula) is deep to the lateral fissure.", "Maini teaches five lobes with the insula as the deep fifth.", "Correct. Four lobes are on the surface (frontal, parietal, temporal, occipital); the 5th, the insula, lies deep to the lateral fissure.", "The deep 5th lobe is the insula, not the cingulate gyrus."], "source": "L16 - Five lobes - ~10:41", "obj": "5 lobes; insula is the deep 5th", "hint": "Retract the lateral fissure to find the hidden one."}, {"q": "On her Mentimeter, Maini asks which sulcus separates the frontal from the parietal lobe. What is the answer?", "o": ["Lateral sulcus", "Superior frontal sulcus", "Central sulcus", "Cingulate sulcus"], "c": 2, "cat": "Lobes & Boundaries", "r": ["The lateral sulcus separates the temporal lobe from the frontal and parietal lobes.", "That sulcus subdivides the frontal lobe into gyri; it is not the frontal-parietal border.", "Correct. The central sulcus - deeper than neighboring sulci - separates the frontal lobe from the parietal lobe.", "The cingulate sulcus is on the medial surface above the cingulate gyrus."], "source": "L17 - Menti - ~01:26:00", "obj": "Central sulcus = frontal/parietal border", "hint": "Precentral gyrus in front, postcentral behind it."}, {"q": "The lateral sulcus (lateral fissure) forms the boundary between which lobes?", "o": ["Frontal from parietal lobe", "Occipital from parietal lobe", "Temporal from occipital lobe", "Temporal lobe (inferiorly) from the frontal and parietal lobes (superiorly)"], "c": 3, "cat": "Lobes & Boundaries", "r": ["That boundary is the central sulcus, not the lateral sulcus.", "The occipital boundary uses the preoccipital notch and parieto-occipital sulcus.", "The lateral sulcus separates temporal from frontal/parietal, not from occipital.", "Correct. The lateral sulcus demarcates the temporal lobe below from the frontal and parietal lobes above."], "source": "L16 - Lateral sulcus - ~12:38", "obj": "Lateral sulcus: temporal below, frontal/parietal above", "hint": "The insula hides deep to it."}, {"q": "Because there is no deep sulcus on the lateral surface, how does Maini say you demarcate the occipital lobe?", "o": ["Follow the central sulcus posteriorly", "Draw a hypothetical line from the preoccipital notch to the superior end of the parieto-occipital sulcus", "Follow the calcarine sulcus around the pole", "Draw a line along the lateral sulcus"], "c": 1, "cat": "Lobes & Boundaries", "r": ["The central sulcus is the frontal-parietal border, not the occipital boundary.", "Correct. She joins two landmarks - the preoccipital notch (inferior border) and the superior end of the parieto-occipital sulcus - to mark off the occipital lobe.", "The calcarine sulcus lies within the occipital lobe (visual cortex), not its lateral border.", "The lateral sulcus marks the temporal boundary, not the occipital one."], "source": "L16 - Occipital boundary - ~15:26", "obj": "Occipital line: preoccipital notch to parieto-occipital sulcus", "hint": "Two landmarks, one imaginary line."}, {"q": "On her Mentimeter, Maini asks in which lobe the primary motor cortex is located. What is the answer?", "o": ["Frontal lobe", "Parietal lobe", "Temporal lobe", "Occipital lobe"], "c": 0, "cat": "Lobes & Boundaries", "r": ["Correct. The primary motor cortex (precentral gyrus) is in the frontal lobe.", "The parietal lobe holds the primary sensory cortex, not the motor cortex.", "The temporal lobe holds the primary auditory cortex.", "The occipital lobe holds the primary visual cortex."], "source": "L17 - Menti - ~01:27:15", "obj": "Primary motor cortex = frontal lobe", "hint": "Precentral gyrus lives here."}, {"q": "Maini's Mentimeter asks in which lobe the primary sensory (somesthetic) cortex is located. What is the answer?", "o": ["Frontal lobe", "Temporal lobe", "Occipital lobe", "Parietal lobe"], "c": 3, "cat": "Lobes & Boundaries", "r": ["The frontal lobe holds the motor cortex, not the sensory cortex.", "The temporal lobe holds the auditory cortex.", "The occipital lobe holds the visual cortex.", "Correct. The primary somatosensory cortex (postcentral gyrus) is in the parietal lobe."], "source": "L17 - Menti - ~01:28:25", "obj": "Primary sensory cortex = parietal lobe", "hint": "Postcentral gyrus - 'somesthetic' is the other name."}, {"q": "In which lobe is the primary visual cortex located?", "o": ["Occipital lobe", "Parietal lobe", "Temporal lobe", "Frontal lobe"], "c": 0, "cat": "Lobes & Boundaries", "r": ["Correct. The occipital lobe houses the primary visual cortex.", "The parietal lobe is sensory (somatic), not visual.", "The temporal lobe is auditory (and olfactory), not visual.", "The frontal lobe is motor and executive, not visual."], "source": "L17 - Menti - ~01:29:29", "obj": "Primary visual cortex = occipital lobe", "hint": "Back of the brain, near the calcarine sulcus."}, {"q": "The primary auditory cortex - and the primary olfactory cortex - are located in which lobe?", "o": ["Parietal lobe", "Temporal lobe", "Occipital lobe", "Insula"], "c": 1, "cat": "Lobes & Boundaries", "r": ["The parietal lobe is somatosensory, not auditory.", "Correct. Maini places the primary auditory cortex in the temporal lobe, and notes the sense of smell also ends in the temporal lobe.", "The occipital lobe is visual, not auditory.", "The insula holds gustatory (taste) cortex, not the primary auditory cortex."], "source": "L17 - Menti - ~01:30:14", "obj": "Auditory (and olfactory) cortex = temporal lobe", "hint": "Hearing and smell both land here."}, {"q": "Maini's Mentimeter asks where the primary gustatory (taste) cortex is located. What is the answer?", "o": ["Temporal lobe", "Parietal lobe", "Insula", "Frontal lobe"], "c": 2, "cat": "Lobes & Boundaries", "r": ["The temporal lobe is auditory/olfactory; taste is in the insula.", "The parietal lobe is somatosensory, not gustatory.", "Correct. The insula (the deep 5th lobe) is the seat of the primary gustatory cortex.", "The frontal lobe is motor/executive, not gustatory."], "source": "L17 - Menti - ~01:30:56", "obj": "Gustatory cortex = insula", "hint": "Hidden lobe under the lateral fissure."}, {"q": "Maini says the prefrontal cortex is the area for reasoning and judgment. What does she note about its development?", "o": ["It is not developed until about 16-17 years and keeps developing until about 25 years", "It is fully developed at birth", "It stops developing at age 10", "It never fully develops in anyone"], "c": 0, "cat": "Lobes & Boundaries", "r": ["Correct. She explains the prefrontal area (reasoning/judgment) matures late - beginning ~16-17 and continuing to ~25 years.", "No - Maini stresses it develops late, into the mid-20s.", "She says it begins developing around 16-17, not before 10.", "She says it typically finishes around age 25."], "source": "L16 - Prefrontal cortex - ~15:57", "obj": "Prefrontal (reasoning/judgment) matures ~25", "hint": "Why teenagers lack full judgment."}, {"q": "How is the insula (5th lobe) exposed, and what special functions does Maini assign to it?", "o": ["Cut the corpus callosum; it houses the motor cortex", "Remove the cerebellum; it houses the visual cortex", "Retract the lateral fissure; it houses gustatory (taste) cortex plus emotion and visceral sensation", "Split the longitudinal fissure; it houses the auditory cortex"], "c": 2, "cat": "Lobes & Boundaries", "r": ["The motor cortex is in the frontal lobe, not the insula, and the insula is under the lateral fissure.", "Visual cortex is occipital; the insula is not exposed by removing the cerebellum.", "Correct. Pulling apart the lateral fissure with retractors reveals the insula, seat of taste, emotion, and visceral sensation, with short and long insular gyri.", "Auditory cortex is temporal; the insula is deep to the lateral fissure."], "source": "L16 - Insula - ~34:43", "obj": "Insula = taste, emotion, visceral sensation", "hint": "Gustation lives in the hidden lobe."}, {"q": "The precentral gyrus, lying immediately anterior to the central sulcus, corresponds to which functional cortex?", "o": ["Primary sensory cortex", "Primary visual cortex", "Broca's motor speech area", "Primary motor cortex"], "c": 3, "cat": "Motor & Sensory Cortex", "r": ["That is the postcentral gyrus, posterior to the central sulcus.", "Visual cortex is in the occipital lobe, not the precentral gyrus.", "Broca's area is in the inferior frontal gyrus, not the precentral gyrus.", "Correct. The precentral gyrus is the primary motor cortex - every skeletal muscle takes command from a neuron here."], "source": "L16 - Precentral gyrus - ~19:14", "obj": "Precentral gyrus = primary motor cortex", "hint": "'Pre' = in front of the central sulcus."}, {"q": "The postcentral gyrus, immediately posterior to the central sulcus, is which functional cortex?", "o": ["Primary motor cortex", "Primary sensory (somesthetic) cortex", "Primary auditory cortex", "Prefrontal association cortex"], "c": 1, "cat": "Motor & Sensory Cortex", "r": ["That is the precentral gyrus, anterior to the central sulcus.", "Correct. The postcentral gyrus is the primary somatosensory (somesthetic) area for general sensations.", "Auditory cortex is in the temporal lobe.", "Prefrontal cortex is the anterior frontal lobe, not the postcentral gyrus."], "source": "L16 - Postcentral gyrus - ~24:04", "obj": "Postcentral gyrus = primary sensory cortex", "hint": "'Post' = behind the central sulcus; somesthetic."}, {"q": "Maini describes the motor system as a two-neuron pathway. Where are the two neurons located for a limb muscle?", "o": ["Both neurons in the precentral gyrus", "First in the thalamus; second in the cortex", "First in the posterior horn; second in the cortex", "Upper motor neuron in the precentral gyrus; lower (alpha) motor neuron in the anterior/ventral horn of the spinal cord"], "c": 3, "cat": "Motor & Sensory Cortex", "r": ["Only the upper motor neuron is in the precentral gyrus; the lower is in the cord.", "That is the sensory pathway pattern, not motor.", "The lower motor neuron is in the anterior (ventral) horn, and the upper is in the cortex.", "Correct. The first (upper) motor neuron sits in the primary motor cortex; the corticospinal tract descends to the second (lower/alpha) motor neuron in the anterior horn."], "source": "L16 - Motor pathway - ~20:47", "obj": "Motor = 2 neurons (cortex to anterior horn)", "hint": "Anterior/ventral horn is motor."}, {"q": "Per Maini's Lecture 17, the sensory pathway is a four-neuron pathway. Where are the four neurons located, in order?", "o": ["Ganglion (dorsal root), medulla, thalamus, postcentral gyrus", "Cortex, midbrain, pons, spinal cord", "Thalamus, medulla, ganglion, cortex", "Ganglion, thalamus, medulla, cortex"], "c": 0, "cat": "Motor & Sensory Cortex", "r": ["Correct. Maini lists first neuron in the ganglion, second in the medulla, third in the thalamus, fourth in the postcentral gyrus.", "That descending order is not the ascending sensory relay she describes.", "Wrong order - the first neuron is the ganglion, then medulla, then thalamus, then cortex.", "The medulla neuron precedes the thalamic one, not the reverse."], "source": "L17 - Sensory pathway - ~09:39", "obj": "Sensory = 4 neurons (ganglion>medulla>thalamus>cortex)", "hint": "Thalamus is the 3rd relay before cortex."}, {"q": "On the motor and sensory homunculus, which body regions receive the largest cortical representation?", "o": ["The back and trunk muscles", "The proximal limb muscles only", "Regions needing fine coordination or with dense receptors (face, hands, tongue)", "All body parts equally"], "c": 2, "cat": "Motor & Sensory Cortex", "r": ["These large but uncoordinated muscles get SMALL representation.", "Distal fine-movement regions (hands) dominate, not proximal limb muscles.", "Correct. Maini says muscles needing fine coordination (and skin with dense receptors) - face, hands, tongue - get the largest representation; large uncoordinated muscles like the back get little.", "Representation is disproportionate, weighted to fine-control and dense-receptor areas."], "source": "L16 - Homunculus - ~22:42", "obj": "Homunculus favors fine-control / dense-receptor areas", "hint": "Think huge hands and face, tiny back."}, {"q": "Maini emphasizes the postcentral gyrus perceives which category of sensation?", "o": ["Special senses such as taste and hearing", "General sensations - pain, touch, and temperature", "Only the sense of smell", "Motor commands to the muscles"], "c": 1, "cat": "Motor & Sensory Cortex", "r": ["Special senses have separate designated areas, not the postcentral gyrus.", "Correct. The postcentral gyrus handles general sensations (pain, touch, temperature); special senses have their own designated cortical areas.", "Smell has its own olfactory cortex and bypasses the thalamus entirely.", "Motor output is the precentral gyrus, not the postcentral gyrus."], "source": "L16 - Somesthetic area - ~24:36", "obj": "Postcentral gyrus = general sensations", "hint": "Pain, touch, temperature - not special senses."}, {"q": "Just anterior to the precentral motor cortex, Maini points out an area responsible for what function?", "o": ["Comprehension of speech", "General somatic sensation", "Eye movements (the frontal eye field)", "Regulation of body temperature"], "c": 2, "cat": "Motor & Sensory Cortex", "r": ["Speech comprehension is Wernicke's area in the posterior temporal lobe.", "General sensation is the postcentral gyrus in the parietal lobe.", "Correct. She identifies the area for eye movements lying anterior to the motor cortex (the frontal eye field).", "Temperature regulation is a hypothalamic function."], "source": "L16 - Frontal eye field - ~26:55", "obj": "Area anterior to motor cortex = eye movements", "hint": "Conjugate gaze control in the frontal lobe."}, {"q": "Maini divides the inferior frontal gyrus into three named parts. Which three?", "o": ["Pars superior, pars media, pars inferior", "Pars centralis, pars lateralis, pars medialis", "Superior, middle, and inferior frontal gyri", "Pars orbitalis, pars triangularis, and pars opercularis"], "c": 3, "cat": "Frontal/Temporal/Parietal Gyri", "r": ["Not the anatomical names - the parts are orbitalis, triangularis, and opercularis.", "These are not the parts of the inferior frontal gyrus.", "Those are the three frontal GYRI, not the parts of the inferior frontal gyrus.", "Correct. The inferior frontal gyrus has three parts: pars orbitalis, pars triangularis, and pars opercularis ('pars' = part)."], "source": "L16 - Inferior frontal gyrus - ~28:52", "obj": "IFG parts: orbitalis, triangularis, opercularis", "hint": "Broca's area sits in the triangular and opercular parts."}, {"q": "The two temporal sulci divide the temporal lobe into which three gyri?", "o": ["Superior, middle, and inferior temporal gyri", "Orbital, triangular, and opercular gyri", "Precentral and postcentral gyri", "Supramarginal and angular gyri"], "c": 0, "cat": "Frontal/Temporal/Parietal Gyri", "r": ["Correct. The superior and inferior temporal sulci divide the temporal lobe into superior, middle, and inferior temporal gyri.", "Those are parts of the inferior FRONTAL gyrus, not the temporal lobe.", "Those flank the central sulcus, not in the temporal lobe.", "Those are inferior parietal lobule gyri, not temporal gyri."], "source": "L16 - Temporal gyri - ~30:42", "obj": "Temporal lobe: superior/middle/inferior gyri", "hint": "Same superior/middle/inferior scheme as the frontal lobe."}, {"q": "Which sulcus divides the parietal lobe (behind the postcentral gyrus) into the superior and inferior parietal lobules?", "o": ["Central sulcus", "Intraparietal sulcus", "Parieto-occipital sulcus", "Postcentral sulcus"], "c": 1, "cat": "Frontal/Temporal/Parietal Gyri", "r": ["The central sulcus is the frontal-parietal border, not the lobule divider.", "Correct. The intraparietal sulcus splits the parietal lobe into the superior and inferior parietal lobules.", "That sulcus helps mark off the occipital lobe on the medial surface.", "Maini names the intraparietal sulcus as the divider of the lobules."], "source": "L16 - Parietal lobules - ~31:47", "obj": "Intraparietal sulcus divides parietal lobules", "hint": "'Intra-parietal' - within the parietal lobe."}, {"q": "Maini describes a gyrus that wraps around the distal (posterior) end of the lateral fissure. Which gyrus is it?", "o": ["Angular gyrus", "Supramarginal gyrus", "Cingulate gyrus", "Precentral gyrus"], "c": 1, "cat": "Frontal/Temporal/Parietal Gyri", "r": ["The angular gyrus wraps the end of the superior temporal sulcus, not the lateral fissure.", "Correct. The supramarginal gyrus (inferior parietal lobule) curls around the upturned end of the lateral fissure.", "The cingulate gyrus is on the medial surface arching over the corpus callosum.", "The precentral gyrus is the motor strip anterior to the central sulcus."], "source": "L16 - Supramarginal gyrus - ~32:50", "obj": "Supramarginal gyrus surrounds end of lateral fissure", "hint": "Inferior parietal lobule, a language association area."}, {"q": "The frontal lobe anterior to the motor cortex is divided by two sulci into how many gyri, and which are they?", "o": ["Three gyri - superior, middle, and inferior frontal gyri", "Two gyri - precentral and postcentral", "Four gyri - orbital, straight, cingulate, and paracentral", "Three gyri - orbitalis, triangularis, opercularis"], "c": 0, "cat": "Frontal/Temporal/Parietal Gyri", "r": ["Correct. The superior and inferior frontal sulci divide this region into superior, middle, and inferior frontal gyri.", "Those flank the central sulcus; they are not the anterior frontal gyri.", "Those are medial/inferior surface gyri, not this three-gyrus division.", "Those are the parts of only the inferior frontal gyrus."], "source": "L16 - Frontal gyri - ~27:32", "obj": "Anterior frontal lobe: 3 gyri by 2 sulci", "hint": "Superior/middle/inferior, then prefrontal at the tip."}, {"q": "Where is Broca's area located, and what is its function?", "o": ["Posterior temporal lobe; sensory speech area", "Occipital lobe; visual word area", "Parietal lobe; general sensory area", "Frontal lobe; it is the motor (expressive) speech area"], "c": 3, "cat": "Speech - Broca & Wernicke", "r": ["That describes Wernicke's area, not Broca's.", "Broca's area is frontal and motor, not occipital.", "Broca's area is frontal and speech-motor, not parietal sensory.", "Correct. Broca's area lies in the frontal lobe and is the motor speech area - it finds the appropriate words to express."], "source": "L16 - Broca's area - ~36:49", "obj": "Broca's = frontal, motor (expressive) speech", "hint": "Motor = making the words come out."}, {"q": "Where is Wernicke's area located, and what is its function?", "o": ["Frontal lobe; motor speech area", "Insula; gustatory speech area", "Posterior temporal lobe; it is the sensory speech area for comprehension", "Occipital lobe; visual speech output"], "c": 2, "cat": "Speech - Broca & Wernicke", "r": ["That describes Broca's area, not Wernicke's.", "The insula is for taste; Wernicke's is temporal and for comprehension.", "Correct. Wernicke's area sits posteriorly in the temporal lobe and is the sensory speech area - it lets you comprehend spoken or read language.", "Wernicke's is temporal and sensory (comprehension), not occipital output."], "source": "L16 - Wernicke's area - ~37:09", "obj": "Wernicke's = posterior temporal, comprehension", "hint": "Sensory = understanding the words."}, {"q": "A patient understands everything said to them but is short of words and cannot produce fluent speech. Which lesion does Maini describe?", "o": ["Wernicke's aphasia (sensory aphasia)", "Cerebellar dysarthria", "Broca's aphasia (motor aphasia)", "Global aphasia"], "c": 2, "cat": "Speech - Broca & Wernicke", "r": ["Wernicke's patients speak fluently but nonsensically and cannot comprehend.", "Dysarthria is slurred articulation from cerebellar incoordination, not word-finding loss with intact comprehension.", "Correct. In Broca's (motor) aphasia the patient comprehends but is short of words - non-fluent, effortful speech.", "Global aphasia impairs both comprehension and production; here comprehension is intact."], "source": "L16 - Broca's aphasia - ~40:00", "obj": "Broca's aphasia: short of words, comprehension intact", "hint": "Non-fluent but understands you."}, {"q": "A patient speaks fluently but in meaningless 'word salad' and cannot comprehend what is said to them. Which lesion is this?", "o": ["Broca's aphasia (motor aphasia)", "Wernicke's aphasia (sensory aphasia)", "Cerebellar dysarthria", "Conduction aphasia"], "c": 1, "cat": "Speech - Broca & Wernicke", "r": ["Broca's patients are short of words with intact comprehension - the opposite picture.", "Correct. Wernicke's (sensory) aphasia gives fluent but senseless 'word salad' with poor comprehension.", "Dysarthria is a motor articulation problem, not fluent nonsensical language with lost comprehension.", "Maini's described picture - fluent word salad with lost comprehension - is Wernicke's aphasia."], "source": "L16 - Wernicke's aphasia - ~39:34", "obj": "Wernicke's aphasia: fluent word salad, no comprehension", "hint": "Talks a lot, none of it makes sense."}, {"q": "Maini's Mentimeter asks which of the following is NOT a part of the basal nuclei: caudate nucleus, globus pallidus, putamen, thalamus. Which is NOT?", "o": ["Thalamus", "Caudate nucleus", "Globus pallidus", "Putamen"], "c": 0, "cat": "Basal Nuclei & Capsules", "r": ["Correct. The thalamus is part of the diencephalon, not a basal nucleus.", "The caudate nucleus IS one of the basal nuclei.", "The globus pallidus IS one of the basal nuclei.", "The putamen IS one of the basal nuclei."], "source": "L17 - Menti - ~01:36:34", "obj": "Thalamus is diencephalon, not a basal nucleus", "hint": "Three are deep gray nuclei; one is the sensory relay."}, {"q": "Maini's Mentimeter asks: the internal capsule is located between which two structures?", "o": ["The putamen and the claustrum", "The claustrum and the insular gray matter", "The two cerebral hemispheres", "The caudate nucleus and the globus pallidus (medially, next to the thalamus)"], "c": 3, "cat": "Basal Nuclei & Capsules", "r": ["That location is the external capsule, not the internal capsule.", "That location is the extreme capsule.", "That fiber band is the corpus callosum, not the internal capsule.", "Correct. The L-shaped internal capsule lies between the caudate nucleus/globus pallidus and the thalamus."], "source": "L17 - Menti - ~01:35:40", "obj": "Internal capsule: caudate/globus pallidus (L-shaped)", "hint": "The corticospinal tract funnels through it."}, {"q": "Maini calls the internal capsule clinically very important. Which tract passes through it, and what results from a lesion there?", "o": ["The optic tract passes through; a lesion causes blindness", "The spinothalamic tract passes through; a lesion causes deafness", "The corticospinal (motor) tract passes through; a lesion causes contralateral paralysis", "No important tract passes through; lesions are silent"], "c": 2, "cat": "Basal Nuclei & Capsules", "r": ["The optic tract is not in the internal capsule; corticospinal fibers are.", "The internal capsule's clinical tract is corticospinal (motor), and lesions cause paralysis, not deafness.", "Correct. The corticospinal tract funnels through the internal capsule; ischemia there (a common stroke site) causes paralysis on the opposite side, since fibers cross in the medulla.", "Maini stresses the corticospinal tract runs through it and lesions cause paralysis."], "source": "L16 - Internal capsule - ~01:24:04", "obj": "Corticospinal tract through internal capsule; lesion = contralateral paralysis", "hint": "A very common cause of stroke paralysis."}, {"q": "On her Mentimeter, Maini indicates the external capsule lies between which two structures?", "o": ["The putamen (lentiform nucleus) and the claustrum", "The caudate nucleus and the globus pallidus", "The claustrum and the insular gray matter", "The thalamus and the globus pallidus"], "c": 0, "cat": "Basal Nuclei & Capsules", "r": ["Correct. The external capsule is the white-matter band between the putamen and the claustrum.", "That location is the internal capsule.", "That location is the extreme capsule.", "That is part of the internal capsule region, not the external capsule."], "source": "L17 - Menti - ~01:35:46", "obj": "External capsule: putamen and claustrum", "hint": "Just lateral to the lentiform nucleus."}, {"q": "The extreme capsule is the band of fibers located between which two structures?", "o": ["The putamen and the claustrum", "The claustrum and the insular gray matter", "The caudate nucleus and the globus pallidus", "The thalamus and the caudate nucleus"], "c": 1, "cat": "Basal Nuclei & Capsules", "r": ["That location is the external capsule, not the extreme capsule.", "Correct. The extreme capsule lies between the claustrum and the insular gray matter (the outermost of the three capsules).", "That location is the internal capsule.", "That is within the internal capsule region, not the extreme capsule."], "source": "L16 - Extreme capsule - ~01:26:32", "obj": "Extreme capsule: claustrum and insular gray", "hint": "The most lateral of internal/external/extreme."}, {"q": "Maini identifies a narrow strip of gray matter lying between the external and extreme capsules. What is it called?", "o": ["Globus pallidus", "Putamen", "Caudate nucleus", "Claustrum"], "c": 3, "cat": "Basal Nuclei & Capsules", "r": ["The globus pallidus is medial, part of the lentiform nucleus, not the thin strip by the insula.", "The putamen is the large lentiform component medial to the external capsule, not the thin strip.", "The caudate is medial near the lateral ventricle, not between the external and extreme capsules.", "Correct. The claustrum is the thin sheet of gray matter sandwiched between the external capsule and the extreme capsule."], "source": "L16 - Claustrum - ~01:20:07", "obj": "Claustrum = thin strip between external/extreme capsules", "hint": "A thin veil just deep to the insula."}, {"q": "Maini teaches that a resting tremor is the hallmark of dysfunction in which structures?", "o": ["The basal nuclei", "The cerebellum", "The thalamus", "The primary motor cortex"], "c": 0, "cat": "Basal Nuclei & Capsules", "r": ["Correct. A resting tremor points to basal-nuclear dysfunction; an intention tremor points to the cerebellum.", "The cerebellum causes an INTENTION tremor, not a resting tremor.", "Thalamic lesions cause sensory loss, not a resting tremor.", "Motor cortex lesions cause paralysis, not a resting tremor."], "source": "L16 - Tremor types - ~01:34:46", "obj": "Resting tremor = basal-nuclear dysfunction", "hint": "Contrast with the cerebellar intention tremor."}, {"q": "What does Maini call the posterior end of the corpus callosum?", "o": ["Rostrum", "Genu", "Body", "Splenium"], "c": 3, "cat": "Medial Surface & Sulci/Gyri", "r": ["The rostrum is the ANTERIOR end of the corpus callosum.", "The genu is the anterior bend, not the posterior end.", "The body is the middle of the corpus callosum, not its posterior end.", "Correct. Maini names the anterior end the rostrum and the posterior end the splenium."], "source": "L16 - Corpus callosum parts - ~52:34", "obj": "Splenium = posterior end of corpus callosum", "hint": "Rostrum in front, splenium behind."}, {"q": "Just inferior to the corpus callosum is a thin membrane; scraping it opens into the lateral ventricle. What is it?", "o": ["Fornix", "Septum pellucidum", "Corpus callosum", "Choroid plexus"], "c": 1, "cat": "Medial Surface & Sulci/Gyri", "r": ["The fornix is a fiber tract of the limbic system beneath the septum pellucidum, not the thin membrane opening into the ventricle.", "Correct. The septum pellucidum is the thin membranous partition; puncturing it enters the lateral ventricle.", "The corpus callosum is the thick fiber band above the septum pellucidum.", "The choroid plexus is the CSF-secreting tuft inside the ventricle, not the partition membrane."], "source": "L16 - Septum pellucidum - ~48:46", "obj": "Septum pellucidum overlies the lateral ventricle", "hint": "A see-through partition between the ventricles."}, {"q": "On the medial/occipital surface, Maini names a gyrus for its shape (not for any tongue function). Which gyrus?", "o": ["Cuneus", "Cingulate gyrus", "Lingual gyrus", "Straight gyrus"], "c": 2, "cat": "Medial Surface & Sulci/Gyri", "r": ["The cuneus is the wedge between the calcarine and parieto-occipital sulci, not the tongue-shaped gyrus.", "The cingulate gyrus arches over the corpus callosum; it is not the lingual gyrus.", "Correct. The lingual gyrus is named for its shape and has nothing to do with tongue control or sensation.", "The straight gyrus (gyrus rectus) is on the inferior frontal surface, not the occipital lingual gyrus."], "source": "L16 - Lingual gyrus - ~44:19", "obj": "Lingual gyrus named for shape, not tongue", "hint": "Occipital lobe, below the calcarine sulcus."}, {"q": "Which gyrus lies between the calcarine sulcus and the parieto-occipital sulcus on the medial surface?", "o": ["Precuneus", "Cuneus", "Lingual gyrus", "Paracentral lobule"], "c": 1, "cat": "Medial Surface & Sulci/Gyri", "r": ["The precuneus lies ANTERIOR to the parieto-occipital sulcus, not between it and the calcarine.", "Correct. The cuneus (wedge) sits between the calcarine sulcus and the parieto-occipital sulcus.", "The lingual gyrus lies below the calcarine sulcus, not above it between the two sulci.", "The paracentral lobule surrounds the central sulcus superiorly, not near the calcarine."], "source": "L16 - Cuneus - ~44:43", "obj": "Cuneus between calcarine and parieto-occipital sulci", "hint": "Latin for 'wedge'."}, {"q": "Maini says the fornix is a part of which system?", "o": ["The visual pathway", "The corticospinal (motor) pathway", "The limbic system", "The ventricular system"], "c": 2, "cat": "Medial Surface & Sulci/Gyri", "r": ["The fornix is limbic; the visual pathway involves the optic tracts and occipital cortex.", "The corticospinal tract is motor; the fornix is a limbic tract.", "Correct. The fornix is a component of the limbic system (limbic cortex).", "The fornix is a fiber tract, not a CSF-filled cavity of the ventricular system."], "source": "L16 - Fornix - ~49:42", "obj": "Fornix = limbic system", "hint": "Emotion and memory circuitry."}, {"q": "On the inferior surface, which four structures does Maini group together as the limbic cortex/system?", "o": ["Cuneus, precuneus, lingual gyrus, and straight gyrus", "Precentral, postcentral, supramarginal, and angular gyri", "Superior, middle, and inferior temporal gyri plus insula", "Uncus, parahippocampal gyrus, isthmus, and cingulate gyrus"], "c": 3, "cat": "Medial Surface & Sulci/Gyri", "r": ["Those are medial/occipital gyri, not the limbic grouping she names.", "Those are motor/sensory/parietal gyri, not the limbic system.", "Those are lateral temporal gyri and the insula, not the limbic grouping.", "Correct. She lists uncus, parahippocampal gyrus, the isthmus, and the cingulate gyrus as the limbic cortex - dealing with reward/punishment, aggression, pleasure, emotion, and memory."], "source": "L16 - Limbic system - ~01:18:01", "obj": "Limbic: uncus, parahippocampal, isthmus, cingulate", "hint": "Reward, punishment, aggression, pleasure."}, {"q": "Maini describes a band of fibers, the isthmus, that connects which two gyri?", "o": ["The parahippocampal gyrus and the cingulate gyrus", "The precentral and postcentral gyri", "The superior and inferior frontal gyri", "The supramarginal and angular gyri"], "c": 0, "cat": "Medial Surface & Sulci/Gyri", "r": ["Correct. The isthmus is the fiber connection between the parahippocampal gyrus and the cingulate gyrus.", "Those flank the central sulcus and are not linked by the isthmus.", "The frontal gyri are separated by frontal sulci, not joined by the limbic isthmus.", "Those parietal gyri are not the pair connected by the isthmus."], "source": "L16 - Isthmus - ~01:17:08", "obj": "Isthmus links parahippocampal and cingulate gyri", "hint": "A limbic bridge on the medial surface."}, {"q": "What is the chief function of the thalamus, per Maini's 'London Heathrow' analogy?", "o": ["It coordinates skilled movement", "It is the relay center for essentially all ascending sensations on their way to the cortex", "It secretes melatonin", "It regulates body temperature"], "c": 1, "cat": "Diencephalon", "r": ["Movement coordination is the cerebellum's role, not the thalamus.", "Correct. The thalamus is the great sensory relay - like a layover hub - for almost every sensation ascending to the cortex.", "Melatonin is secreted by the pineal gland, not the thalamus.", "Temperature regulation is a hypothalamic function."], "source": "L16 - Thalamus - ~50:03", "obj": "Thalamus = sensory relay center", "quote": "[Maini] 'Thalamus is a relay center for all your sensations, which are ascending.'", "hint": "The layover before the cortex."}, {"q": "Which single sensation does Maini say bypasses the thalamus entirely?", "o": ["Vision", "Hearing", "Taste", "Smell (olfaction)"], "c": 3, "cat": "Diencephalon", "r": ["Vision relays through the thalamus (lateral geniculate) on its way to the cortex.", "Hearing relays through the thalamus (medial geniculate).", "Taste passes through the thalamus; only smell is the exception.", "Correct. All special and general sensations relay through the thalamus except olfaction - smell bypasses it."], "source": "L16 - Thalamus exception - ~51:08", "obj": "Only smell bypasses the thalamus", "hint": "The nose has a direct line to the cortex."}, {"q": "Maini gives three names for the button-like structure connecting the two thalami across the third ventricle. Which set is correct?", "o": ["Interthalamic adhesion, massa intermedia, and intermediate mass", "Anterior commissure, posterior commissure, and habenula", "Corpus callosum, fornix, and septum pellucidum", "Genu, rostrum, and splenium"], "c": 0, "cat": "Diencephalon", "r": ["Correct. All three names refer to the same midline connection between the two thalami.", "Those are separate structures, not the interthalamic connection.", "Those are other midline structures, not the interthalamic adhesion.", "Those are parts of the corpus callosum, not the thalamic connection."], "source": "L16 - Interthalamic adhesion - ~51:46", "obj": "Interthalamic adhesion = massa intermedia = intermediate mass", "hint": "It bridges the two thalami across the 3rd ventricle."}, {"q": "Which of the following is a function Maini attributes to the hypothalamus?", "o": ["Coordination of skilled voluntary movement", "Relay of ascending general sensation", "Body temperature regulation (the body's thermostat)", "Comprehension of spoken language"], "c": 2, "cat": "Diencephalon", "r": ["That is a cerebellar function, not hypothalamic.", "That is the thalamus, not the hypothalamus.", "Correct. The hypothalamus is the thermostat and also controls thirst, hunger, endocrine output, the sleep-wake cycle, and the autonomic nervous system.", "That is Wernicke's area in the temporal lobe."], "source": "L17 - Hypothalamus - ~11:00", "obj": "Hypothalamus = autonomic/endocrine/thermostat", "hint": "Thirst, hunger, temperature, hormones, sleep-wake."}, {"q": "The pineal gland secretes which hormone, and what does it regulate?", "o": ["Cortisol, which regulates stress", "Thyroxine, which regulates metabolism", "Melatonin, which regulates the sleep-wakefulness cycle", "Oxytocin, which regulates labor"], "c": 2, "cat": "Diencephalon", "r": ["Cortisol is adrenal; the pineal secretes melatonin.", "Thyroxine is from the thyroid, not the pineal gland.", "Correct. Maini identifies melatonin - the 'sleep hormone' - secreted by the pineal gland to regulate the sleep-wake cycle.", "Oxytocin is from the posterior pituitary, not the pineal gland."], "source": "L16 - Pineal gland - ~57:17", "obj": "Pineal secretes melatonin (sleep-wake)", "hint": "The 'sleep hormone'."}, {"q": "Maini stresses the close proximity of the optic chiasma to the pituitary gland. What is the optic chiasma, and why is the relationship clinically important?", "o": ["It is the crossing point of the two optic nerves; a pituitary adenoma can compress it and cause visual disturbance (bitemporal hemianopsia)", "It is the crossing of the trochlear nerves; a lesion causes deafness", "It is the pituitary stalk; damage causes diabetes insipidus", "It is a venous sinus; thrombosis causes headache only"], "c": 0, "cat": "Diencephalon", "r": ["Correct. The optic chiasma is where the optic nerves cross; an enlarging pituitary adenoma compresses it, so visual loss is often an early sign.", "The chiasma is where the OPTIC nerves cross, and lesions cause visual, not hearing, loss.", "The stalk is the infundibulum; the chiasma is the optic nerve crossing.", "The chiasma is a nerve crossing, not a venous sinus."], "source": "L16 - Optic chiasma/pituitary - ~54:37", "obj": "Optic chiasma crossing; pituitary tumor compresses it", "hint": "Tumor from below squeezes the crossing fibers."}, {"q": "Maini mentions 'corpora arenacea' seen in the pineal gland after about age 40. What is it?", "o": ["A malignant pineal tumor", "A normal calcareous (calcium) accumulation in the pineal gland", "A pocket of cerebrospinal fluid", "A vascular malformation of the pineal"], "c": 1, "cat": "Diencephalon", "r": ["Corpora arenacea is a normal calcification, not a tumor.", "Correct. Corpora arenacea is normal calcification of the pineal gland appearing after ~40, which can show as an opacity on imaging.", "It is calcium deposition, not CSF.", "It is benign calcification, not a vascular malformation."], "source": "L17 - Corpora arenacea - ~13:08", "obj": "Corpora arenacea = normal pineal calcification after 40", "hint": "A benign imaging opacity in older adults."}, {"q": "The posterior part of the midbrain shows four bulges. What is this region called, and what are the four bulges?", "o": ["Cerebral peduncles - two crura on each side", "Mammillary bodies - two paired nuclei", "Pyramids - two anterior columns", "Corpora quadrigemina - two superior and two inferior colliculi"], "c": 3, "cat": "Brainstem & Midbrain", "r": ["The peduncles are the anterior stalks, not the four posterior colliculi.", "Mammillary bodies are diencephalic, not the four midbrain colliculi.", "The pyramids are on the anterior medulla, not the dorsal midbrain.", "Correct. Corpora quadrigemina ('four bodies') are the two superior and two inferior colliculi of the dorsal midbrain."], "source": "L16 - Corpora quadrigemina - ~58:27", "obj": "Corpora quadrigemina = 2 superior + 2 inferior colliculi", "hint": "'Quadri' = four bodies on the back of the midbrain."}, {"q": "Maini assigns the superior and inferior colliculi to which pathways?", "o": ["Superior colliculi = visual pathway; inferior colliculi = auditory pathway", "Superior = auditory; inferior = visual", "Superior = motor; inferior = sensory", "Superior = olfactory; inferior = gustatory"], "c": 0, "cat": "Brainstem & Midbrain", "r": ["Correct. The superior colliculi are part of the visual pathway; the inferior colliculi are an important part of the auditory pathway.", "Reversed - superior is visual and inferior is auditory.", "Both colliculi serve special-sense pathways (vision and hearing), not general motor/sensory.", "Neither colliculus serves smell or taste; they are visual and auditory."], "source": "L17 - Colliculi - ~34:39", "obj": "Superior colliculi visual; inferior colliculi auditory", "hint": "See with the top, hear with the bottom."}, {"q": "Maini's Mentimeter asks which structure passes through the midbrain. What is the answer?", "o": ["Lateral ventricle", "Cerebral aqueduct", "Third ventricle", "Fourth ventricle"], "c": 1, "cat": "Brainstem & Midbrain", "r": ["The lateral ventricles sit within the cerebral hemispheres, not through the midbrain.", "Correct. The cerebral aqueduct is the canal that passes through the midbrain, connecting the 3rd and 4th ventricles.", "The third ventricle is between the thalami, above the midbrain.", "The fourth ventricle is between the pons/medulla and cerebellum, below the aqueduct."], "source": "L17 - Menti - ~01:33:48", "obj": "Cerebral aqueduct runs through the midbrain", "hint": "It links the 3rd to the 4th ventricle."}, {"q": "On her Mentimeter, Maini asks in which part of the brain the red nucleus is located. What is the answer?", "o": ["Cerebellum", "Cerebrum", "Pons", "Midbrain"], "c": 3, "cat": "Brainstem & Midbrain", "r": ["The red nucleus is in the midbrain, not the cerebellum.", "The red nucleus is a midbrain structure, not cerebral.", "The red nucleus lies in the midbrain, superior to the pons.", "Correct. The red nucleus (part of the motor system via the rubrospinal tract) is in the midbrain - the 'angry man' with red-nucleus eyes and substantia-nigra eyebrows."], "source": "L17 - Menti - ~01:33:23", "obj": "Red nucleus = midbrain", "hint": "Remember the 'angry man' cross-section."}, {"q": "In Maini's midbrain cross-section, what is the position of the substantia nigra relative to the red nucleus?", "o": ["It lies inferior to the medulla", "It surrounds the cerebral aqueduct", "It lies on top of the red nucleus (like the 'eyebrows' above the 'eyes')", "It replaces the red nucleus"], "c": 2, "cat": "Brainstem & Midbrain", "r": ["The substantia nigra is a midbrain structure, not below the medulla.", "The gray surrounding the aqueduct is the periaqueductal gray, not the substantia nigra.", "Correct. In her 'angry man' picture, substantia nigra sits atop the red nucleus - eyebrows above the eyes.", "They are separate structures; substantia nigra lies on top of the red nucleus."], "source": "L16 - Substantia nigra - ~01:12:31", "obj": "Substantia nigra sits atop the red nucleus", "hint": "Eyebrows over the eyes."}, {"q": "What is the periaqueductal gray?", "o": ["The gray matter of the postcentral gyrus", "The gray band between the external and extreme capsules", "The gray matter surrounding the cerebral aqueduct in the midbrain", "The gray tufts secreting CSF in the ventricles"], "c": 2, "cat": "Brainstem & Midbrain", "r": ["That is cortex, not the midbrain periaqueductal gray.", "That is the claustrum, not periaqueductal gray.", "Correct. Maini identifies the periaqueductal gray as the gray matter encircling the cerebral aqueduct.", "That describes the choroid plexus, not periaqueductal gray."], "source": "L16 - Periaqueductal gray - ~01:11:50", "obj": "Periaqueductal gray surrounds the cerebral aqueduct", "hint": "'Peri-aqueductal' = around the aqueduct."}, {"q": "Maini says the pyramids on the anterior medulla are formed by which pathway - the reason it is called the pyramidal tract?", "o": ["The corticospinal pathway", "The spinothalamic pathway", "The spinocerebellar pathway", "The rubrospinal pathway"], "c": 0, "cat": "Brainstem & Midbrain", "r": ["Correct. The corticospinal tract creates the anterior medullary bulges (pyramids), which is why it is also called the pyramidal tract.", "The spinothalamic tract is a sensory pathway and does not form the pyramids.", "The spinocerebellar tract carries feedback to the cerebellum, not the pyramids.", "The rubrospinal tract arises from the red nucleus and does not form the pyramids."], "source": "L17 - Pyramids - ~17:35", "obj": "Pyramids = corticospinal (pyramidal) tract", "quote": "[Maini] 'This is actually your corticospinal pathway ... that is why corticospinal pathway is also called as pyramidal tract.'", "hint": "Motor fibers descending on the front of the medulla."}, {"q": "What is the clinical significance of the pyramidal decussation in the lower medulla?", "o": ["The optic nerves cross, causing bitemporal hemianopsia", "The corticospinal fibers cross to the opposite side, so a lesion on one side causes paralysis on the other", "The sensory fibers of smell cross to relay in the thalamus", "The two cerebellar hemispheres exchange fibers"], "c": 1, "cat": "Brainstem & Midbrain", "r": ["That crossing is the optic chiasma, not the pyramidal decussation.", "Correct. At the pyramidal decussation the corticospinal tract switches sides; hence a left-sided lesion causes right-sided paralysis.", "Smell does not decussate here, and it bypasses the thalamus.", "That is not the pyramidal decussation, which is a corticospinal crossing."], "source": "L17 - Pyramidal decussation - ~19:04", "obj": "Pyramidal decussation: corticospinal crosses > contralateral paralysis", "hint": "Left brain, right body."}, {"q": "Lateral to the pyramids, Maini points out a rounded bulge on the medulla. What is it called?", "o": ["The pyramid", "The cerebral peduncle", "The colliculus", "The olive"], "c": 3, "cat": "Brainstem & Midbrain", "r": ["The pyramid is the anterior midline column, not the lateral bulge.", "The peduncles are midbrain stalks, not medullary bulges.", "Colliculi are on the dorsal midbrain, not the lateral medulla.", "Correct. The olive is the lateral rounded bulge of the medulla, with a pre-olivary and post-olivary sulcus on either side."], "source": "L17 - Olive - ~20:00", "obj": "Olive = lateral bulge of the medulla", "hint": "Named for its shape; sulci sit pre- and post- to it."}, {"q": "Maini describes the reticular formation (reticular activating system). Where is it, and what does it do?", "o": ["A cortical band that comprehends speech", "A cerebellar network that coordinates movement", "A network of gray and white matter in the medulla and pons that keeps you awake and alert", "A thalamic nucleus that relays vision"], "c": 2, "cat": "Brainstem & Midbrain", "r": ["Speech comprehension is Wernicke's area, not the reticular formation.", "Coordination is cerebellar; the reticular formation governs arousal.", "Correct. The reticular formation/activating system lies in the medulla and pons; sensory input through it keeps the brain alert and awake.", "The reticular formation is a brainstem arousal network, not a visual relay."], "source": "L17 - Reticular formation - ~37:45", "obj": "Reticular formation (medulla+pons) = arousal/alertness", "hint": "It wakes you when the alarm rings."}, {"q": "Which two nuclei does Maini point out on the posterior aspect of the medulla, associated with sensory pathways?", "o": ["Red nucleus and substantia nigra", "Nucleus gracilis and nucleus cuneatus", "Caudate nucleus and putamen", "Dentate nucleus and fastigial nucleus"], "c": 1, "cat": "Brainstem & Midbrain", "r": ["Those are midbrain nuclei, not posterior medullary sensory nuclei.", "Correct. On the posterior medulla she identifies nucleus gracilis and nucleus cuneatus, relay nuclei for sensory pathways.", "Those are basal nuclei of the cerebrum, not medullary.", "Those are cerebellar nuclei, not posterior medullary sensory nuclei."], "source": "L17 - Gracilis/cuneatus - ~36:06", "obj": "Posterior medulla: nucleus gracilis and cuneatus", "hint": "Dorsal column relay nuclei."}, {"q": "Maini lists the components that make up the midbrain. Which set is correct?", "o": ["Cerebral peduncles, corpora quadrigemina, red nucleus, and substantia nigra", "Pyramids, olives, gracilis, and cuneatus", "Pons, cerebellum, and fourth ventricle", "Thalamus, hypothalamus, and pineal gland"], "c": 0, "cat": "Brainstem & Midbrain", "r": ["Correct. She names cerebral peduncles, corpora quadrigemina, red nucleus, and substantia nigra as the midbrain's parts.", "Those are medullary structures, not midbrain.", "Those are hindbrain structures, not the midbrain.", "Those are diencephalon, not midbrain."], "source": "L17 - Midbrain parts - ~41:25", "obj": "Midbrain: peduncles, corpora quadrigemina, red nucleus, substantia nigra", "hint": "Include the 'angry man' pair."}, {"q": "The depression between the two cerebral peduncles, from which the oculomotor nerve emerges, is called the?", "o": ["Pontomedullary sulcus", "Pre-olivary sulcus", "Interthalamic adhesion", "Interpeduncular fossa"], "c": 3, "cat": "Brainstem & Midbrain", "r": ["That sulcus lies between the pons and medulla, where the sixth nerve emerges.", "That sulcus lies on the medulla, where the twelfth nerve emerges.", "That is the connection between the two thalami, not a brainstem fossa.", "Correct. The interpeduncular fossa is the midline depression between the cerebral peduncles; the third nerve emerges from it."], "source": "L17 - Interpeduncular fossa - ~15:02", "obj": "Interpeduncular fossa between the peduncles (CN III)", "hint": "Between the two stalks of the midbrain."}, {"q": "Maini says: if a quiz asks where the third (oculomotor) nerve emerges, the answer is which part of the brainstem?", "o": ["The interpeduncular fossa of the midbrain", "The side of the pons", "The pre-olivary sulcus", "The dorsal midbrain below the inferior colliculus"], "c": 0, "cat": "Cranial Nerve Attachments", "r": ["Correct. The oculomotor nerve (CN III) emerges from the interpeduncular fossa.", "That is where the trigeminal nerve (CN V) emerges.", "That is where the hypoglossal nerve (CN XII) emerges.", "That is where the trochlear nerve (CN IV) emerges."], "source": "L17 - CN III - ~24:53", "obj": "CN III emerges from the interpeduncular fossa", "hint": "Oculomotor from between the peduncles."}, {"q": "What makes the trochlear nerve (CN IV) unique among the cranial nerves in its site of emergence?", "o": ["It is the only nerve emerging from the pons", "It is the only cranial nerve that emerges from the dorsal (posterior) aspect of the brainstem, just below the inferior colliculus", "It is the only purely sensory cranial nerve", "It is the only nerve exiting the jugular foramen"], "c": 1, "cat": "Cranial Nerve Attachments", "r": ["Several nerves relate to the pons; CN IV's uniqueness is its dorsal midbrain origin.", "Correct. CN IV is the sole cranial nerve arising dorsally, emerging from the midbrain below the inferior colliculus and then curving anteriorly.", "CN IV is motor to an eye muscle; its uniqueness is the dorsal emergence.", "CN IX, X, XI exit the jugular foramen; CN IV's distinction is dorsal emergence."], "source": "L17 - CN IV - ~25:27", "obj": "CN IV: only nerve from the dorsal brainstem", "hint": "Trochlear sneaks around from the back."}, {"q": "The trigeminal nerve (CN V) is seen as a very thick nerve emerging from which part of the brainstem?", "o": ["The interpeduncular fossa", "The middle of the pontomedullary sulcus", "The side of the pons", "The post-olivary sulcus"], "c": 2, "cat": "Cranial Nerve Attachments", "r": ["That is the oculomotor (CN III) exit, not the trigeminal.", "That is the abducens (CN VI) exit, not the trigeminal.", "Correct. Maini shows the thick trigeminal nerve coming out of the lateral aspect of the pons.", "That is the exit for CN IX, X, XI, not the trigeminal."], "source": "L17 - CN V - ~27:59", "obj": "CN V emerges from the side of the pons", "hint": "Thickest cranial nerve, off the pons."}, {"q": "Maini notes the trigeminal has a thick sensory division and a thin motor division. The thin (motor) division supplies which muscles?", "o": ["The muscles of facial expression", "The intrinsic muscles of the tongue", "The lateral rectus of the eye", "The muscles of mastication plus tensor tympani, tensor veli palatini, mylohyoid, and anterior belly of digastric"], "c": 3, "cat": "Cranial Nerve Attachments", "r": ["Those are supplied by the facial nerve (CN VII), not trigeminal.", "Those are supplied by the hypoglossal nerve (CN XII).", "That is supplied by the abducens nerve (CN VI).", "Correct. The small (motor) root of CN V supplies the muscles of mastication and tensor tympani, tensor veli palatini, mylohyoid, and the anterior belly of digastric."], "source": "L17 - CN V motor - ~27:33", "obj": "CN V motor: mastication + tensor tympani/veli palatini, mylohyoid, ant. digastric", "hint": "Eight muscles; the thin root is motor."}, {"q": "The abducens nerve (CN VI) emerges from where, and which eye muscle does it supply?", "o": ["From the interpeduncular fossa; it supplies the medial rectus", "From the dorsal midbrain; it supplies the superior oblique", "From the pre-olivary sulcus; it supplies the tongue", "From the middle of the pontomedullary sulcus; it supplies the lateral rectus (abductor of the eye)"], "c": 3, "cat": "Cranial Nerve Attachments", "r": ["CN VI emerges from the pontomedullary sulcus, and it supplies the lateral (not medial) rectus.", "That describes the trochlear nerve (CN IV), not abducens.", "That describes the hypoglossal nerve (CN XII), not abducens.", "Correct. CN VI emerges from the middle of the pontomedullary sulcus and innervates the lateral rectus, which abducts the eye - hence 'abducens'."], "source": "L17 - CN VI - ~29:03", "obj": "CN VI: pontomedullary sulcus; lateral rectus", "hint": "Abducens abducts the eye."}, {"q": "Maini calls CN IX, X, and XI 'three close friends.' From which sulcus do they emerge, and through which foramen do they exit the skull?", "o": ["From the pre-olivary sulcus; through the hypoglossal canal", "They emerge from the post-olivary sulcus and exit through the jugular foramen", "From the interpeduncular fossa; through the superior orbital fissure", "From the side of the pons; through the internal acoustic meatus"], "c": 1, "cat": "Cranial Nerve Attachments", "r": ["That is the route of CN XII, not IX-X-XI.", "Correct. The glossopharyngeal, vagus, and accessory nerves emerge from the post-olivary sulcus and leave together via the jugular foramen.", "That does not describe CN IX-X-XI, which use the post-olivary sulcus and jugular foramen.", "That is not the IX-X-XI route; the internal acoustic meatus transmits CN VII and VIII."], "source": "L17 - CN IX-X-XI - ~31:10", "obj": "CN IX/X/XI: post-olivary sulcus, jugular foramen", "hint": "Three friends leaving by the same door."}, {"q": "The hypoglossal nerve (CN XII) emerges from which sulcus, and what is its function?", "o": ["From the post-olivary sulcus; sensory to the pharynx", "From the pontomedullary sulcus; motor to the eye", "From the pre-olivary sulcus; it is motor to the tongue muscles", "From the interpeduncular fossa; parasympathetic to the pupil"], "c": 2, "cat": "Cranial Nerve Attachments", "r": ["That sulcus is the exit for CN IX-X-XI; CN XII is from the pre-olivary sulcus and is motor to the tongue.", "That is the abducens exit, not the hypoglossal.", "Correct. CN XII emerges from the pre-olivary sulcus and supplies motor innervation to the tongue.", "That is the oculomotor exit, not the hypoglossal."], "source": "L17 - CN XII - ~31:57", "obj": "CN XII: pre-olivary sulcus, motor to tongue", "hint": "Hypoglossal = under the tongue."}, {"q": "Which three structures pass together through the internal acoustic meatus, per Maini?", "o": ["Facial nerve (VII), vestibulocochlear nerve (VIII), and the labyrinthine artery", "Optic nerve, ophthalmic artery, and CN III", "CN IX, X, XI and the internal jugular vein", "CN V, the middle meningeal artery, and CN VI"], "c": 0, "cat": "Cranial Nerve Attachments", "r": ["Correct. The internal acoustic meatus transmits CN VII, CN VIII, and the labyrinthine artery.", "Those pass through the optic canal/orbital fissure, not the internal acoustic meatus.", "Those pass through the jugular foramen, not the internal acoustic meatus.", "Those do not travel through the internal acoustic meatus."], "source": "L17 - Internal acoustic meatus - ~01:09:07", "obj": "IAM: CN VII, CN VIII, labyrinthine artery", "hint": "Two nerves and one small artery to the ear."}, {"q": "Maini notes there is no discrete olfactory nerve; on the base of the brain the olfactory tract and bulb represent which cranial nerve?", "o": ["Cranial nerve I (olfactory)", "Cranial nerve II (optic)", "Cranial nerve V (trigeminal)", "Cranial nerve VII (facial)"], "c": 0, "cat": "Cranial Nerve Attachments", "r": ["Correct. The olfactory tract (ending in the olfactory bulb over the cribriform plate) represents CN I.", "CN II is represented by the optic nerve/chiasma, not the olfactory tract.", "CN V emerges from the pons; it is not the olfactory tract.", "CN VII emerges near the pontomedullary junction, not as the olfactory tract."], "source": "L17 - CN I - ~22:11", "obj": "Olfactory tract/bulb = CN I", "hint": "It rests on the cribriform plate."}, {"q": "What does Maini call the branching tree-like arrangement of gray and white matter seen in a sagittal section of the cerebellum?", "o": ["Corpus striatum", "Corpora quadrigemina", "Arbor vitae", "Falx cerebelli"], "c": 2, "cat": "Cerebellum", "r": ["The corpus striatum is the caudate + lentiform nucleus of the cerebrum, not the cerebellar pattern.", "Those are the four midbrain colliculi, not the cerebellar tree pattern.", "Correct. The arbor vitae ('tree of life') is the branching pattern of cerebellar white matter within the gray cortex.", "The falx cerebelli is a dural fold between the cerebellar hemispheres, not the tree pattern."], "source": "L16 - Arbor vitae - ~59:42", "obj": "Arbor vitae = cerebellar branching tree pattern", "hint": "Latin for 'tree of life'."}, {"q": "What is the vermis of the cerebellum?", "o": ["The C-shaped band connecting the two cerebral hemispheres", "The gray matter tuft that secretes CSF", "The stalk attaching the cerebellum to the brainstem", "A worm-like band of tissue connecting the two cerebellar hemispheres"], "c": 3, "cat": "Cerebellum", "r": ["That is the corpus callosum, not the vermis.", "That is the choroid plexus, not the vermis.", "That is a cerebellar peduncle, not the vermis.", "Correct. Maini describes the vermis as the caterpillar/worm-shaped band that connects the two cerebellar hemispheres."], "source": "L16 - Vermis - ~01:29:03", "obj": "Vermis connects the cerebellar hemispheres", "hint": "'Vermis' = worm."}, {"q": "Maini notes the numerous folds of the cerebellar surface are given a special name instead of sulci and gyri. What are they called?", "o": ["Colliculi", "Folia", "Peduncles", "Lobules"], "c": 1, "cat": "Cerebellum", "r": ["Colliculi are the midbrain bumps, not cerebellar folds.", "Correct. Cerebellar folds are called folia ('leaves') rather than gyri.", "Peduncles are stalks connecting the cerebellum to the brainstem, not the surface folds.", "Folia is the term Maini gives for the leaf-like folds of the cerebellar surface."], "source": "L16 - Folia - ~01:30:52", "obj": "Cerebellar folds = folia (leaves)", "hint": "Leaf-like folds."}, {"q": "Maini says the hallmark finding of cerebellar dysfunction is which type of tremor?", "o": ["Resting tremor", "No tremor at all", "Intention tremor", "Tremor only during sleep"], "c": 2, "cat": "Cerebellum", "r": ["A resting tremor is the hallmark of BASAL-NUCLEAR dysfunction, not cerebellar.", "Cerebellar disease characteristically produces an intention tremor.", "Correct. An intention tremor (worse as the hand approaches a target) is the hallmark of cerebellar dysfunction; a resting tremor points to the basal nuclei.", "Cerebellar intention tremor appears with purposeful movement, not during sleep."], "source": "L16 - Cerebellar signs - ~01:34:36", "obj": "Intention tremor = cerebellar hallmark", "hint": "Worse as you reach the target."}, {"q": "A patient overshoots on the finger-to-nose test, has slurred (dysarthric) speech, and reduced muscle tone. Which structure is dysfunctional?", "o": ["The basal nuclei", "The cerebellum", "The thalamus", "The primary motor cortex"], "c": 1, "cat": "Cerebellum", "r": ["Basal-nuclear disease gives resting tremor and rigidity, not finger-nose overshoot with hypotonia.", "Correct. Overshoot on finger-nose testing, dysarthria, hypotonia, and intention tremor are classic cerebellar signs.", "Thalamic lesions cause sensory loss, not these coordination signs.", "Motor cortex lesions cause paralysis, not incoordination with hypotonia."], "source": "L16 - Cerebellar dysfunction - ~01:33:32", "obj": "Finger-nose overshoot, dysarthria, hypotonia = cerebellar", "hint": "It cannot judge where to stop the movement."}, {"q": "How does Maini say the cerebellum refines a movement over time?", "o": ["It compares the planned movement (a copy from the motor cortex) with the performed movement (feedback via the spinocerebellar tract) and corrects it", "It sends the only motor command directly to muscles", "It relays all sensation to the cortex", "It secretes hormones that improve muscle tone"], "c": 0, "cat": "Cerebellum", "r": ["Correct. The cerebellum receives a copy of the motor plan and peripheral feedback through the spinocerebellar tract, compares them, and makes each movement more precise.", "The primary command comes from the motor cortex; the cerebellum coordinates, it does not issue the sole command.", "Sensory relay is the thalamus's job, not the cerebellum's.", "The cerebellum coordinates via neural comparison, not hormone secretion."], "source": "L16 - Cerebellar function - ~01:32:03", "obj": "Cerebellum compares planned vs performed (spinocerebellar feedback)", "hint": "A copy of the plan plus feedback from the periphery."}, {"q": "The extensive lateral ventricle has which three horns, and in which lobes do they lie?", "o": ["Superior, middle, and inferior horns", "Only an anterior and a posterior horn", "Anterior (temporal), posterior (frontal), inferior (occipital)", "Anterior horn (frontal), posterior horn (occipital), and inferior horn (temporal)"], "c": 3, "cat": "Ventricles & CSF", "r": ["The lateral ventricle horns are anterior, posterior, and inferior, not superior/middle/inferior.", "Maini also names an inferior horn in the temporal lobe.", "The lobe assignments are reversed - anterior is frontal, posterior is occipital, inferior is temporal.", "Correct. The C-shaped lateral ventricle has an anterior horn in the frontal lobe, a posterior horn in the occipital lobe, and an inferior horn in the temporal lobe."], "source": "L17 - Lateral ventricle - ~43:24", "obj": "Lateral ventricle: anterior(frontal), posterior(occipital), inferior(temporal)", "hint": "One horn reaches into each of three lobes."}, {"q": "Maini describes the third ventricle as a slit-like cavity located where?", "o": ["Within each cerebral hemisphere", "Between the pons/medulla and the cerebellum", "Between the two thalami", "Within the midbrain"], "c": 2, "cat": "Ventricles & CSF", "r": ["Those are the lateral ventricles, not the third ventricle.", "That is the fourth ventricle.", "Correct. The third ventricle is the narrow slit between the two thalami, interrupted by the interthalamic adhesion.", "The midbrain contains the cerebral aqueduct, not the third ventricle."], "source": "L16 - Third ventricle - ~01:21:39", "obj": "Third ventricle = slit between the thalami", "hint": "The thalamus shapes it."}, {"q": "Which foramen connects each lateral ventricle to the third ventricle?", "o": ["The cerebral aqueduct", "The foramen of Magendie", "The foramen of Luschka", "The interventricular foramen"], "c": 3, "cat": "Ventricles & CSF", "r": ["The cerebral aqueduct connects the third to the fourth ventricle, not lateral to third.", "That median aperture connects the fourth ventricle to the subarachnoid space.", "Those lateral apertures connect the fourth ventricle to the subarachnoid space.", "Correct. The interventricular foramen (of Monro) connects the lateral ventricles to the third ventricle."], "source": "L17 - Interventricular foramen - ~44:10", "obj": "Interventricular foramen: lateral ventricle to 3rd ventricle", "hint": "Between the ventricles, hence 'inter-ventricular'."}, {"q": "The cerebral aqueduct connects which two ventricles, and it passes through which part of the brain?", "o": ["The two lateral ventricles, passing through the corpus callosum", "It connects the third and fourth ventricles and passes through the midbrain", "The fourth ventricle and central canal, passing through the pons", "The lateral ventricle and third ventricle, passing through the thalamus"], "c": 1, "cat": "Ventricles & CSF", "r": ["The lateral ventricles connect to the 3rd via interventricular foramina; the aqueduct links 3rd and 4th.", "Correct. The cerebral aqueduct runs through the midbrain, connecting the third ventricle to the fourth ventricle.", "That continuation is direct; the aqueduct specifically links the 3rd and 4th ventricles through the midbrain.", "That connection is the interventricular foramen, not the aqueduct."], "source": "L17 - Cerebral aqueduct - ~44:54", "obj": "Cerebral aqueduct links 3rd and 4th ventricles via midbrain", "hint": "It tunnels through the midbrain."}, {"q": "Maini describes the fourth ventricle as a diamond-shaped cavity. What forms its anterior and posterior boundaries?", "o": ["Anteriorly the pons and medulla; posteriorly the cerebellum", "Anteriorly the cerebellum; posteriorly the pons", "Anteriorly the thalami; posteriorly the midbrain", "Anteriorly the corpus callosum; posteriorly the fornix"], "c": 0, "cat": "Ventricles & CSF", "r": ["Correct. The diamond-shaped fourth ventricle sits between the pons/medulla in front and the cerebellum behind.", "Reversed - the pons/medulla are anterior and the cerebellum is posterior.", "Those bound the third ventricle region, not the fourth ventricle.", "Those relate to the lateral/third ventricle roof, not the fourth ventricle."], "source": "L17 - Fourth ventricle - ~02:08", "obj": "4th ventricle: pons/medulla anterior, cerebellum posterior", "hint": "Diamond between brainstem and cerebellum."}, {"q": "Cerebrospinal fluid escapes the fourth ventricle into the subarachnoid space through which foramina?", "o": ["A single interventricular foramen", "The cerebral aqueduct only", "Two foramina of Magendie and one of Luschka", "Two lateral foramina of Luschka and one median foramen of Magendie"], "c": 3, "cat": "Ventricles & CSF", "r": ["That foramen connects the lateral and third ventricles, not the fourth ventricle to the subarachnoid space.", "The aqueduct connects the third and fourth ventricles; it does not open into the subarachnoid space.", "Reversed counts - there are two of Luschka (lateral) and one of Magendie (median).", "Correct. CSF exits the fourth ventricle via the two foramina of Luschka (lateral) and the single foramen of Magendie (median)."], "source": "L17 - CSF apertures - ~46:08", "obj": "4th ventricle exits: 2 Luschka (lateral) + 1 Magendie (median)", "hint": "Two on the sides, one in the midline."}, {"q": "What is the function of the choroid plexus, found in each ventricle?", "o": ["Absorption of cerebrospinal fluid", "Secretion of cerebrospinal fluid", "Relay of ascending sensation", "Production of melatonin"], "c": 1, "cat": "Ventricles & CSF", "r": ["Absorption is by the arachnoid granulations, not the choroid plexus.", "Correct. The red choroid plexus tufts secrete CSF; Maini notes it is present in every ventricle.", "That is the thalamus, not the choroid plexus.", "Melatonin is from the pineal gland, not the choroid plexus."], "source": "L17 - Choroid plexus - ~02:48", "obj": "Choroid plexus secretes CSF", "hint": "Red tufts in each ventricle."}, {"q": "According to Maini, cerebrospinal fluid is absorbed by which structures, and into which sinus?", "o": ["Arachnoid granulations, into the superior sagittal sinus", "The choroid plexus, into the straight sinus", "The pineal gland, into the cavernous sinus", "The pituitary gland, into the sigmoid sinus"], "c": 0, "cat": "Ventricles & CSF", "r": ["Correct. Arachnoid granulations absorb CSF from the subarachnoid space into the superior sagittal sinus.", "The choroid plexus secretes CSF; it does not absorb it, and absorption is into the superior sagittal sinus.", "The pineal gland secretes melatonin and is unrelated to CSF absorption.", "The pituitary is an endocrine gland, not a CSF-absorbing structure."], "source": "L17 - Arachnoid granulations - ~50:00", "obj": "Arachnoid granulations absorb CSF into superior sagittal sinus", "hint": "Only into the superior sagittal sinus."}, {"q": "Which sequence correctly traces cerebrospinal fluid circulation, per Maini's flowchart?", "o": ["Third ventricle > lateral ventricles > cerebral aqueduct > fourth ventricle > superior sagittal sinus", "Fourth ventricle > cerebral aqueduct > third ventricle > lateral ventricles > subarachnoid space", "Lateral ventricles > interventricular foramina > third ventricle > cerebral aqueduct > fourth ventricle > subarachnoid space > arachnoid granulations > superior sagittal sinus", "Lateral ventricles > cerebral aqueduct > third ventricle > fourth ventricle > arachnoid granulations"], "c": 2, "cat": "Ventricles & CSF", "r": ["Wrong order - flow begins in the lateral ventricles and reaches the third via the interventricular foramina.", "This reverses the flow; CSF moves from lateral to fourth ventricle, not the reverse.", "Correct. This is exactly the pathway Maini dictated for CSF circulation and reabsorption.", "The aqueduct connects the 3rd and 4th ventricles, not the lateral and third."], "source": "L17 - CSF pathway - ~55:37", "obj": "CSF path: lateral > IVF > 3rd > aqueduct > 4th > subarachnoid > granulations > SSS", "hint": "Follow the ventricles in numeric order."}, {"q": "Maini explains hydrocephalus/raised intracranial pressure can result when meningitis blocks which structures?", "o": ["The arachnoid granulations, so CSF is secreted but not absorbed", "The choroid plexus, so CSF is not secreted", "The optic chiasma, causing visual loss", "The pyramidal decussation, causing paralysis"], "c": 0, "cat": "Ventricles & CSF", "r": ["Correct. If infection
