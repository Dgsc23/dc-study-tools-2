blocks the arachnoid granulations, CSF keeps being secreted but is not absorbed, raising intracranial pressure.", "Blocking secretion would lower CSF, not cause hydrocephalus; the block is at absorption.", "The chiasma is unrelated to CSF absorption and hydrocephalus.", "The decussation is a motor crossing, unrelated to CSF absorption."], "source": "L17 - Hydrocephalus - ~51:57", "obj": "Blocked arachnoid granulations > raised ICP", "hint": "Secretion continues but drainage stops."}, {"q": "Maini says the brain has a dual arterial supply. Which two arterial systems supply the brain?", "o": ["The external carotid and facial arteries", "The middle meningeal and ophthalmic arteries", "The internal carotid arteries and the vertebral arteries", "The superior and inferior sagittal sinuses"], "c": 2, "cat": "Circle of Willis & Blood Supply", "r": ["Those supply the face and scalp, not the brain parenchyma.", "Those are branches supplying dura and orbit, not the two main brain systems.", "Correct. The brain is supplied by the internal carotid arteries and the vertebral arteries (vertebro-basilar system).", "Those are venous sinuses, not arterial supply."], "source": "L17 - Dual blood supply - ~58:06", "obj": "Brain supply: internal carotid + vertebral arteries", "hint": "One in front (carotid), one behind (vertebral)."}, {"q": "Maini cites striking numbers: the brain is what fraction of body weight yet receives what fraction of cardiac output?", "o": ["About 15% of body weight and 2% of cardiac output", "About 2% of body weight, but receives about 15% of cardiac output", "About 10% of body weight and 10% of cardiac output", "About 25% of body weight and 25% of cardiac output"], "c": 1, "cat": "Circle of Willis & Blood Supply", "r": ["Reversed - it is ~2% of weight and ~15% of output.", "Correct. The brain is ~2% of body weight yet takes ~15% of cardiac output, reflecting its high oxygen demand.", "Maini's figures are ~2% weight and ~15% output.", "Far too high - the brain is only ~2% of body weight."], "source": "L17 - Brain blood demand - ~58:29", "obj": "Brain: ~2% weight, ~15% cardiac output", "hint": "Tiny mass, huge blood share."}, {"q": "Maini lists the four parts of the internal carotid artery in order. Which set is correct?", "o": ["Cervical, thoracic, abdominal, and pelvic", "Ophthalmic, anterior, middle, and posterior", "Cavernous, sigmoid, transverse, and straight", "Cervical, petrous, cavernous, and cerebral"], "c": 3, "cat": "Circle of Willis & Blood Supply", "r": ["Those are body regions, not parts of the internal carotid artery.", "Those are branches/territories, not the four named ICA segments.", "Those mix in venous sinus names, not ICA parts.", "Correct. The internal carotid artery has cervical, petrous, cavernous, and cerebral parts."], "source": "L17 - ICA parts - ~00:59:00", "obj": "ICA parts: cervical, petrous, cavernous, cerebral", "hint": "Neck, bone, sinus, brain."}, {"q": "After giving off the ophthalmic artery, the internal carotid artery ends by dividing into which two terminal branches?", "o": ["The anterior and posterior cerebral arteries", "The basilar and vertebral arteries", "The anterior cerebral and middle cerebral arteries", "The superior and inferior cerebellar arteries"], "c": 2, "cat": "Circle of Willis & Blood Supply", "r": ["The posterior cerebral arteries come from the basilar artery, not the ICA.", "Those form the posterior (vertebro-basilar) system, not ICA branches.", "Correct. The ICA gives the ophthalmic artery and then terminates as the anterior cerebral and middle cerebral arteries.", "Those are branches of the vertebro-basilar system, not the ICA."], "source": "L17 - ICA terminal branches - ~01:01:55", "obj": "ICA ends as anterior + middle cerebral arteries", "hint": "One goes anterior, one goes to the side."}, {"q": "Which surface of the brain does the anterior cerebral artery mainly supply?", "o": ["The lateral surface of the temporal lobe and insula", "The occipital lobe and inferomedial temporal lobe", "The cerebellum and brainstem", "The medial surface of the frontal and parietal lobes (plus the anterior corpus callosum)"], "c": 3, "cat": "Circle of Willis & Blood Supply", "r": ["That territory belongs to the middle cerebral artery.", "That territory belongs to the posterior cerebral artery.", "Those are supplied by the vertebro-basilar system, not the anterior cerebral artery.", "Correct. The anterior cerebral artery supplies the medial surface of the frontal and parietal lobes and the anterior four-fifths of the corpus callosum."], "source": "L17 - ACA territory - ~01:03:07", "obj": "ACA = medial surface of frontal & parietal lobes", "hint": "Anterior = medial surface up top."}, {"q": "The middle cerebral artery supplies which regions, and why is it clinically important?", "o": ["The insula and lateral surface of the frontal, parietal, and temporal lobes (and posterior internal capsule); it is the artery most often obstructed in atherosclerotic stroke", "The medial surface of the frontal lobe; it is rarely involved in stroke", "The occipital lobe; obstruction causes deafness", "The cerebellum; obstruction causes intention tremor only"], "c": 0, "cat": "Circle of Willis & Blood Supply", "r": ["Correct. The MCA supplies the insula and lateral cortex plus the posterior limb of the internal capsule; it is the most frequently obstructed artery in stroke, causing contralateral paralysis.", "That is the ACA territory, and the MCA is the MOST common stroke artery.", "That is the PCA territory, and MCA obstruction causes paralysis, not deafness.", "The MCA supplies cerebral lateral cortex, not the cerebellum."], "source": "L17 - MCA territory - ~01:04:39", "obj": "MCA = lateral cortex + insula; commonest stroke artery", "hint": "Lateral surface; posterior limb of internal capsule."}, {"q": "The two vertebral arteries unite to form which single artery?", "o": ["The internal carotid artery", "The basilar artery", "The anterior cerebral artery", "The rior cerebral arteries at the top of the pons."], "source": "L17 - Basilar termination - ~01:07:59", "obj": "Basilar ends as two posterior cerebral arteries", "hint": "One artery splits back into two, posteriorly."}, {"q": "The labyrinthine artery, a branch of the basilar system, supplies what, and travels through which passage?", "o": ["The occipital cortex; through the optic canal", "The tongue; through the hypoglossal canal", "The internal ear (labyrinth); it passes through the internal acoustic meatus with CN VII and VIII", "The dura of the temporal fossa; through the foramen spinosum"], "c": 2, "cat": "Circle of Willis & Blood Supply", "r": ["The labyrinthine artery supplies the inner ear via the internal acoustic meatus, not the optic canal.", "The labyrinthine artery serves the ear, not the tongue.", "Correct. The labyrinthine artery supplies the internal ear and runs through the internal acoustic meatus alongside the facial and vestibulocochlear nerves.", "That describes the middle meningeal artery, not the labyrinthine artery."], "source": "L17 - Labyrinthine artery - ~01:09:00", "obj": "Labyrinthine artery: inner ear via internal acoustic meatus", "hint": "It joins CN VII and VIII to the ear."}, {"q": "A board question notes the occipital lobe's blood supply. Which artery ultimately (originally) delivers blood to the occipital lobe?", "o": ["The internal carotid arteries", "The vertebral arteries (via the basilar and posterior cerebral arteries)", "The external carotid arteries", "The middle cerebral arteries"], "c": 1, "cat": "Circle of Willis & Blood Supply", "r": ["The occipital lobe is posterior circulation (vertebro-basilar), not internal carotid.", "Correct. Maini stresses that although the posterior cerebral artery directly supplies the occipital lobe, the blood originally comes through the vertebral arteries.", "The external carotid supplies the face/scalp, not the occipital cortex.", "The MCA supplies the lateral cortex, not the occipital pole."], "source": "L17 - Occipital supply - ~01:11:05", "obj": "Occipital lobe blood originates from vertebral arteries", "hint": "Trace it all the way back to the vertebrals."}, {"q": "Which arteries form the Circle of Willis?", "o": ["Only the two vertebral and the basilar arteries", "The middle cerebral, ophthalmic, and labyrinthine arteries", "The posterior cerebral, posterior communicating, internal carotid, anterior cerebral, and anterior communicating arteries", "The superior sagittal, straight, and sigmoid sinuses"], "c": 2, "cat": "Circle of Willis & Blood Supply", "r": ["Those feed the circle but do not by themselves complete the anastomotic ring.", "Those are not the components of the Circle of Willis.", "Correct. Maini lists the posterior cerebral, posterior communicating, internal carotid, anterior cerebral, and anterior communicating arteries as completing the circle.", "Those are venous sinuses, not the arterial Circle of Willis."], "source": "L17 - Circle of Willis - ~01:12:56", "obj": "Circle: PCA, P-comm, ICA, ACA, A-comm", "hint": "Posterior and anterior communicating arteries close the ring."}, {"q": "Where is the Circle of Willis located?", "o": ["Within the fourth ventricle around the choroid plexus", "At the base of the brain, encircling the optic chiasma, infundibulum, and mammillary bodies", "Along the superior sagittal sinus at the vertex", "Inside the internal acoustic meatus"], "c": 1, "cat": "Circle of Willis & Blood Supply", "r": ["The circle is at the brain base around midline structures, not in the fourth ventricle.", "Correct. The Circle of Willis sits at the base of the brain, surrounding the optic chiasma, pituitary infundibulum, and mammillary bodies.", "That is a venous location; the circle is an arterial ring at the brain base.", "That passage transmits CN VII, VIII, and the labyrinthine artery, not the whole circle."], "source": "L17 - Circle location - ~01:12:31", "obj": "Circle of Willis surrounds optic chiasma/infundibulum/mammillary bodies", "hint": "At the base, around the midline diencephalic structures."}, {"q": "What is the functional purpose of the anastomosis formed by the Circle of Willis?", "o": ["If one feeding artery is blocked, the circle provides an alternate route of blood to the ischemic region", "It speeds venous drainage from the brain", "It secretes cerebrospinal fluid", "It filters the blood before it reaches the cortex"], "c": 0, "cat": "Circle of Willis & Blood Supply", "r": ["Correct. The anastomotic ring allows collateral flow, so if one artery is occluded, other vessels can partly perfuse the threatened area and limit permanent damage.", "The circle is arterial and provides collateral inflow, not venous drainage.", "CSF secretion is the choroid plexus's role, not the arterial circle's.", "The circle is a distributing anastomosis, not a filter."], "source": "L17 - Circle purpose - ~01:13:18", "obj": "Circle of Willis = collateral/alternate supply if one artery blocks", "hint": "A safety detour for blood flow."}, {"q": "Maini describes an epidural (extradural) hematoma. What is its typical cause and nature?", "o": ["A venous bleed from bridging veins, common in the elderly", "An arterial bleed from a ruptured aneurysm into the subarachnoid space", "A slow venous ooze that takes months to appear", "An arterial bleed from a torn middle meningeal artery, often after a blow to the pterion in the temporal region"], "c": 3, "cat": "Clinical & Hemorrhages", "r": ["That describes a SUBDURAL hematoma, not an epidural one.", "That describes a subarachnoid hemorrhage, not an epidural hematoma.", "Epidural (arterial) bleeds develop fast, not slowly over months.", "Correct. Epidural hematoma is an arterial bleed, classically from the middle meningeal artery after a blow to the pterion; symptoms develop rapidly."], "source": "L17 - Epidural hematoma - ~01:17:31", "obj": "Epidural = arterial, middle meningeal, pterion, fast", "hint": "Pterion + middle meningeal artery."}, {"q": "How does Maini characterize a subdural hematoma, and in whom is it common?", "o": ["A venous bleed from bridging veins, common in the elderly (from brain atrophy), that develops slowly over days to weeks or months", "An arterial bleed from the middle meningeal artery that develops fast", "An arterial aneurysm rupture into the subarachnoid space", "A bleed into the ventricles from the choroid plexus"], "c": 0, "cat": "Clinical & Hemorrhages", "r": ["Correct. Subdural hematoma is a venous bleed from stretched bridging veins, common in elderly brains that have atrophied; it develops slowly.", "That describes an epidural hematoma, not subdural.", "That is a subarachnoid hemorrhage, not subdural.", "That is not the subdural bridging-vein mechanism Maini describes."], "source": "L17 - Subdural hematoma - ~01:18:07", "obj": "Subdural = venous bridging veins, elderly, slow", "hint": "Slow venous bleed in an atrophied brain."}, {"q": "What is the typical nature of a subarachnoid hemorrhage, per Maini?", "o": ["Venous, from bridging veins, common in the elderly", "Arterial, from the middle meningeal artery at the pterion", "Always trivial with no rise in intracranial pressure", "Mostly arterial, commonly from rupture of an aneurysm, and it may block arachnoid granulations to raise intracranial pressure"], "c": 3, "cat": "Clinical & Hemorrhages", "r": ["That describes a subdural hematoma, not subarachnoid hemorrhage.", "That describes an epidural hematoma, not subarachnoid hemorrhage.", "Subarachnoid hemorrhage can be serious and can raise intracranial pressure.", "Correct. Subarachnoid hemorrhage is usually arterial, often from a ruptured aneurysm, and can obstruct arachnoid granulations, raising intracranial pressure."], "source": "L17 - Subarachnoid hemorrhage - ~01:19:40", "obj": "Subarachnoid = arterial, aneurysm rupture", "hint": "Aneurysm bleeding around the brain."}, {"q": "Maini traces venous drainage of the brain to its endpoint. The sigmoid sinus becomes which vessel, exi lay:block"><h3>How This Drill Works</h3><ul><li>Answer each question by clicking A/B/C/D</li><li><span class="key">Re-ask system</span>: Missed questions come back later so you must <strong>get it right twice</strong></li><li><span class="key">Question Navigator</span>: Click any cell to jump to or review that question</li><li><span class="key">Jump to Question</span>: Quick milestone markers</li><li><span class="key">Previous button</span>: Browse back through answered questions</li><li>Every answer reveals: rationale, source, Dr. Maini quote, professor tip, and <strong>study guide item</strong></li><li>Progress is <strong>auto-saved</strong></li><li>At the end: category breakdown + <strong>Review Only Missed</strong></li></ul></div>':'')+'<div class="progress-track"><div class="progress-fill" style="width:'+pct+'%"></div></div><div class="card"><span class="cat-badge">'+q.cat+(q._isReask?' \ud83d\udd01 RE-ASK':'')+'</span><div class="q-text">Q'+(idx+1)+' of '+questions.length+': '+q.q+'</div>'+(q.hint?'<button class="btn-hint" onclick="this.nextElementSibling.style.display=\'block\';this.style.display=\'none\'">\ud83d\udca1 Show Hint</button><div class="hint-text" style="display:none">\ud83d\udca1 '+q.hint+'</div>':'')+optHTML+'<div class="source-line" id="srcLine"><span>Source:</span> '+q.source+'</div>'+(q.quote?'<div class="quote-line" id="quoteLine">'+q.quote+'</div>':'')+(q.profTip?'<div class="prof-tip" id="tipLine"><span class="tip-label">Professor:</span> '+q.profTip+'</div>':'')+(q.obj?'<div class="obj-tag" id="objTag">'+q.obj+'</div>':'')+'<div class="btn-group" id="btnGroup"><button class="btn-prev" onclick="prevAnswer()"'+(answerHistory.length===0?' disabled':'')+'>\u2190 Previous</button><button class="btn-next" id="btnNext" onclick="nextQ()">Next Question \u2192</button></div></div>';}
function pick(i){let q=questions[idx];let opts=document.querySelectorAll('.opt-btn');if(opts[0]&&opts[0].classList.contains('disabled'))return;opts.forEach(function(o){o.classList.add('disabled');o.onclick=null;});let correct=q.c;let isCorrect=i===correct;opts[i].classList.add(isCorrect?'picked-correct':'picked-wrong');if(!isCorrect)opts[correct].classList.add('show-correct');attempts++;if(!catStats[q.cat])catStats[q.cat]={c:0,t:0};catStats[q.cat].t++;if(isCorrect){score++;catStats[q.cat].c++;}else{reaskQueue.push(Object.assign({},q,{_isReask:true}));}if(q._bankId!==undefined){if(!(q._bankId in answerMap)){answerMap[q._bankId]={picked:i,correct:correct,isCorrect:isCorrect,attempts:1,everWrong:!isCorrect};}else{let m=answerMap[q._bankId];m.picked=i;m.isCorrect=isCorrect;m.attempts++;if(!isCorrect)m.everWrong=true;}}if(!answerHistory.includes(q._bankId))answerHistory.push(q._bankId);for(let j=0;j<q.o.length;j++){let r=document.getElementById('rat'+j);if(r)r.style.display='block';}let sl=document.getElementById('srcLine');if(sl)sl.style.display='block';let ql=document.getElementById('quoteLine');if(ql)ql.style.display='block';let tl=document.getElementById('tipLine');if(tl)tl.style.display='block';let ot=document.getElementById('objTag');if(ot)ot.style.display='block';let nb=document.getElementById('btnNext');if(nb)nb.style.display='inline-block';saveState();}

function enhanceCard(isHistory){
  var card = document.querySelector('.card'); if(!card) return;
  var reask = !isHistory && typeof questions!=='undefined' && idx<questions.length && questions[idx] && questions[idx]._isReask;

    var btn=document.createElement('button'); btn.className='coach-read-btn'; btn.type='button';
    btn.innerHTML='\uD83D\uDD0A Read'; btn.onclick=function(){ coachToggle(btn); };
    qt.parentNode.insertBefore(btn, qt.nextSibling);
  }
}
var _coachUtter=null;
function coachCurrentQ(){
  if(typeof browseIdx==='number' && browseIdx>=0){ var list=(reviewList||answerHistory); return BANK[list[browseIdx]]; }

    window.speechSynthesis.cancel(); btn.classList.remove('playing'); btn.innerHTML='\uD83D\uDD0A Read'; _coachUtter=null; return;
  }

  document.querySelectorAll('.coach-read-btn.playing').forEach(function(b){ b.classList.remove('playing'); b.innerHTML='\uD83D\uDD0A Read'; });
  var q=coachCurrentQ(); if(!q) return;

  var u=new SpeechSynthesisUtterance(txt); u.rate=1.0;
