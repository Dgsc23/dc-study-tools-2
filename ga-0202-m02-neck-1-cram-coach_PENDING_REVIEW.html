  { id: 10, topic: "Ant. triangle", src: "Maini · L03", q: "The anterior triangle is subdivided into four smaller triangles using the bellies of which two muscles?", opts: ["Stylohyoid and thyrohyoid", "Sternohyoid and sternothyroid", "Mylohyoid and geniohyoid", "Digastric and omohyoid"], a: 3, h1: "Digastric (2 bellies) + omohyoid do the carving.", h2: "Zero in on: Digastric and omohyoid", exp: "The two bellies of digastric plus the superior belly of omohyoid carve the anterior triangle into four." },
  { id: 11, topic: "Ant. triangle", src: "Maini · L03", q: "Which of the following is one of the four subdivisions of the anterior triangle?", opts: ["Suboccipital triangle", "Supraclavicular triangle", "Carotid triangle", "Occipital triangle"], a: 2, h1: "Submental, digastric, carotid, muscular.", h2: "Zero in on: Carotid triangle", exp: "The four subdivisions are submental, digastric (submandibular), carotid, and muscular." },
  { id: 12, topic: "Ant. triangle", src: "Maini · L03", q: "The carotid triangle is named for the presence of which structure?", opts: ["The internal jugular vein only", "The external jugular vein", "The common carotid artery and its bifurcation", "The carotid canal"], a: 2, h1: "Named for the carotid that forks inside it.", h2: "Zero in on: The common carotid artery and its bifurcation", exp: "Maini: it is named for the common carotid artery and its bifurcation lying within it." },
  { id: 13, topic: "Ant. triangle", src: "Maini · L03", q: "Which of the following is a content of the muscular triangle?", opts: ["Submandibular gland and facial artery", "Common carotid bifurcation and CN IX", "Thyroid gland, larynx, trachea, and esophagus", "Submental lymph nodes and anterior jugular vein origin"], a: 2, h1: "Straps + midline viscera (thyroid, larynx, trachea, esophagus).", h2: "Zero in on: Thyroid gland", exp: "Maini lists the thyroid gland, larynx, trachea, esophagus and recurrent laryngeal nerve here, plus sternohyoid/sternothyroid." },
  { id: 14, topic: "Common bounds", src: "Maini · L03", q: "Which muscle forms the common boundary between the submental and digastric triangles?", opts: ["Stylohyoid", "Posterior belly of digastric", "Superior belly of omohyoid", "Anterior belly of digastric"], a: 3, h1: "Anterior belly = wall between submental and digastric.", h2: "Zero in on: Anterior belly of digastric", exp: "The anterior belly of digastric is shared between the submental (lateral border) and digastric (medial border) triangles." },
  { id: 15, topic: "Common bounds", src: "Maini · L03", q: "Which muscle forms the common boundary between the carotid and digastric triangles?", opts: ["Superior belly of omohyoid", "Inferior belly of omohyoid", "Anterior belly of digastric", "Posterior belly of digastric"], a: 3, h1: "Posterior belly = wall between carotid and digastric.", h2: "Zero in on: Posterior belly of digastric", exp: "The posterior belly of digastric is the shared border between the carotid and digastric triangles." },
  { id: 16, topic: "Carotid sheath", src: "Maini · L03/L05", q: "Which three structures - the 'three musketeers' - travel together inside the carotid sheath?", opts: ["Common carotid artery, internal jugular vein, and spinal accessory nerve", "Internal carotid artery, subclavian vein, and hypoglossal nerve", "Common carotid artery, internal jugular vein, and vagus nerve", "Common carotid artery, external jugular vein, and phrenic nerve"], a: 2, h1: "Artery + vein + vagus = the sheath trio.", h2: "Zero in on: Common carotid artery", exp: "Maini's 'three musketeers': the carotid artery, IJV, and vagus nerve wrapped in the carotid sheath." },
  { id: 17, topic: "Suprahyoid", src: "Maini · L03", q: "The posterior belly of the digastric originates from which bony landmark?", opts: ["Mastoid notch (medial surface of the mastoid process) of the temporal bone", "Styloid process of the temporal bone", "Digastric fossa of the mandible", "Mylohyoid line of the mandible"], a: 0, h1: "Posterior belly grabs the mastoid (temporal bone).", h2: "Zero in on: Mastoid notch", exp: "Maini: the posterior belly arises from the mastoid/digastric notch on the temporal bone." },
  { id: 18, topic: "Suprahyoid", src: "Maini · L03", q: "The digastric is a 'composite' muscle with two nerves. Which nerve supplies its POSTERIOR belly?", opts: ["Hypoglossal nerve (CN XII)", "Facial nerve (CN VII)", "Nerve to mylohyoid (from V3)", "Glossopharyngeal nerve (CN IX)"], a: 1, h1: "Posterior belly + stylohyoid share the Facial nerve ('F').", h2: "Zero in on: Facial nerve", exp: "The posterior belly of digastric is supplied by the facial nerve." },
  { id: 19, topic: "Suprahyoid", src: "Maini · L03", q: "Which nerve supplies the ANTERIOR belly of the digastric?", opts: ["Nerve to mylohyoid (a branch of the inferior alveolar, from V3)", "Hypoglossal nerve (CN XII)", "Facial nerve (CN VII)", "Vagus nerve (CN X)"], a: 0, h1: "Anterior belly rides the trigeminal (V3 to inferior alveolar to nerve to mylohyoid).", h2: "Zero in on: Nerve to mylohyoid", exp: "The anterior belly is supplied by the nerve to mylohyoid, from the inferior alveolar branch of V3." },
  { id: 20, topic: "Suprahyoid", src: "Maini · L03", q: "The stylohyoid muscle originates from which bony landmark?", opts: ["Styloid process of the temporal bone", "Mastoid notch of the temporal bone", "Oblique line of the thyroid cartilage", "Genial tubercle of the mandible"], a: 0, h1: "STYLO-hyoid from the STYLOID process.", h2: "Zero in on: Styloid process of the temporal bone", exp: "The name says it: stylohyoid arises from the styloid process." },
  { id: 21, topic: "Suprahyoid", src: "Maini · L03", q: "Which nerve supplies the geniohyoid muscle?", opts: ["Facial nerve (CN VII)", "C1 fibers carried by the hypoglossal nerve (CN XII)", "Ansa cervicalis", "Nerve to mylohyoid (V3)"], a: 1, h1: "Geniohyoid (and thyrohyoid) = C1 hitchhiking on CN XII.", h2: "Zero in on: C1 fibers carried by the hypoglossal nerve", exp: "Geniohyoid is supplied by C1 fibers travelling with the hypoglossal nerve." },
  { id: 22, topic: "Suprahyoid", src: "Maini · L03", q: "The nerves to the digastric develop with the muscle from the pharyngeal arches, so they carry which functional fiber type?", opts: ["GSE (general somatic efferent) fibers", "GVA (general visceral afferent) fibers", "SVE (special visceral efferent) fibers", "GVE (general visceral efferent) fibers"], a: 2, h1: "Pharyngeal-arch muscles use Special Visceral Efferent.", h2: "Zero in on: SVE", exp: "Muscles from the pharyngeal arches are innervated by SVE fibers, as Maini emphasized." },
  { id: 23, topic: "Infrahyoid", src: "Maini · L03", q: "Which infrahyoid muscle uniquely has an attachment to the scapula?", opts: ["Sternohyoid", "Omohyoid (inferior belly, from the superior border of the scapula)", "Thyrohyoid", "Sternothyroid"], a: 1, h1: "OMO = shoulder; omohyoid reaches the scapula.", h2: "Zero in on: Omohyoid", exp: "Omohyoid is the only infrahyoid attaching to the scapula ('omo' = shoulder)." },
  { id: 24, topic: "Infrahyoid", src: "Maini · L03", q: "What is the action of the sternothyroid muscle?", opts: ["It depresses the larynx", "It tenses the vocal folds", "It elevates the larynx", "It elevates the hyoid"], a: 0, h1: "Anchored to the thyroid cartilage, so it pulls the larynx down.", h2: "Zero in on: It depresses the larynx", exp: "Because it attaches to the thyroid cartilage, sternothyroid depresses the larynx." },
  { id: 25, topic: "Infrahyoid", src: "Maini · L03", q: "Which infrahyoid muscle has a unique nerve supply (NOT the ansa cervicalis)?", opts: ["Thyrohyoid - supplied by C1 fibers carried by the hypoglossal nerve (CN XII)", "Sternohyoid - supplied by V3", "Omohyoid - supplied by CN VII", "Sternothyroid - supplied by CN X"], a: 0, h1: "Remember 'TH' = thyrohyoid = the exception (C1/XII).", h2: "Zero in on: Thyrohyoid", exp: "Thyrohyoid ('TH') is the exception, supplied by C1 via CN XII like geniohyoid." },
  { id: 26, topic: "Carotid arteries", src: "Maini · L03", q: "The RIGHT common carotid artery arises from which vessel?", opts: ["The aortic arch directly", "The external carotid artery", "The brachiocephalic trunk", "The right subclavian artery"], a: 2, h1: "Right = off the brachiocephalic trunk.", h2: "Zero in on: The brachiocephalic trunk", exp: "The right common carotid is a branch of the brachiocephalic trunk." },
  { id: 27, topic: "Carotid arteries", src: "Maini · L03", q: "At what level does the common carotid artery bifurcate into external and internal carotid arteries?", opts: ["At the level of the hyoid bone", "At the superior border of the thyroid cartilage", "At the cricoid cartilage", "At the jugular foramen"], a: 1, h1: "Fork at the top edge of the thyroid CARTILAGE.", h2: "Zero in on: At the superior border of the thyroid cartilage", exp: "Both common carotids divide at the superior border of the thyroid cartilage." },
  { id: 28, topic: "Carotid arteries", src: "Maini · L03", q: "How can you distinguish the internal carotid artery (ICA) from the external carotid artery (ECA) in the neck?", opts: ["The ECA gives off branches in the neck; the ICA gives no branches in the neck", "The ICA is always medial; the ECA is always deep to the mandible", "Both give equal branches, so they cannot be told apart", "The ICA gives many neck branches; the ECA gives none"], a: 0, h1: "Branches in the neck = external; no branches = internal.", h2: "Zero in on: The ECA gives off branches in the neck", exp: "The branch-giver is the ECA; the branchless one is the ICA." },
  { id: 29, topic: "Sinus & body", src: "Maini · L03", q: "The carotid sinus contains which type of receptor?", opts: ["Thermoreceptors", "Chemoreceptors", "Photoreceptors", "Baroreceptors (pressure/stretch receptors)"], a: 3, h1: "BARO = pressure; the sinus is the pressure sensor.", h2: "Zero in on: Baroreceptors", exp: "The carotid sinus houses baroreceptors that sense blood pressure via arterial stretch." },
  { id: 30, topic: "Sinus & body", src: "Maini · L03", q: "Which cranial nerve carries impulses from the carotid sinus and carotid body?", opts: ["Glossopharyngeal nerve (CN IX)", "Facial nerve (CN VII)", "Vagus nerve (CN X)", "Hypoglossal nerve (CN XII)"], a: 0, h1: "Carotid sinus + body = the 9th nerve's job.", h2: "Zero in on: Glossopharyngeal nerve", exp: "Both the carotid sinus and carotid body are innervated by the glossopharyngeal (9th) nerve." },
  { id: 31, topic: "Sinus & body", src: "Maini · L03", q: "The carotid body contains chemoreceptors that primarily sense which changes in the blood?", opts: ["Increased O2 and decreased CO2", "Changes in blood glucose only", "Increased CO2, increased H+, and decreased O2", "Changes in blood pressure"], a: 2, h1: "Body = chemistry: CO2 up, H+ up, O2 down.", h2: "Zero in on: Increased CO2", exp: "The carotid body chemoreceptors detect a rise in CO2/H+ and a fall in O2." },
  { id: 32, topic: "ECA branches", src: "Maini · L03", q: "How many branches does the external carotid artery have, and how are they grouped?", opts: ["Ten total: 4 anterior, 4 posterior, 2 terminal", "Six total: 3 anterior and 3 posterior", "Four total: 2 anterior and 2 terminal", "Eight total: 3 anterior, 3 posterior, and 2 terminal"], a: 3, h1: "3 + 3 + 2 = 8.", h2: "Zero in on: Eight total: 3 anterior", exp: "The ECA has 8 branches - three anterior, three posterior, two terminal." },
  { id: 33, topic: "ECA branches", src: "Maini · L03", q: "Which of the following are the three ANTERIOR branches of the external carotid artery?", opts: ["Ascending pharyngeal, occipital, and posterior auricular", "Superficial temporal and maxillary", "Vertebral, internal thoracic, and thyrocervical", "Superior thyroid, lingual, and facial"], a: 3, h1: "Front three: Superior thyroid, Lingual, Facial.", h2: "Zero in on: Superior thyroid", exp: "The anterior branches are superior thyroid, lingual, and facial." },
  { id: 34, topic: "ECA branches", src: "Maini · L03", q: "What are the two TERMINAL branches of the external carotid artery?", opts: ["Superficial temporal and maxillary", "Occipital and posterior auricular", "Superior thyroid and ascending pharyngeal", "Facial and lingual"], a: 0, h1: "The ECA ends as superficial temporal + maxillary.", h2: "Zero in on: Superficial temporal and maxillary", exp: "The ECA ends by dividing into the superficial temporal and maxillary arteries." },
  { id: 35, topic: "ECA branches", src: "Maini · L03", q: "The transverse facial artery is a branch of which artery (a classic point of confusion)?", opts: ["Superficial temporal artery", "Lingual artery", "Maxillary artery", "Facial artery"], a: 0, h1: "Name says 'facial,' but it's a superficial TEMPORAL branch.", h2: "Zero in on: Superficial temporal artery", exp: "Maini flags the trap: transverse facial is a branch of the superficial temporal, NOT the facial artery." },
  { id: 36, topic: "Subclavian", src: "Maini · L03", q: "The RIGHT subclavian artery arises from which vessel?", opts: ["The right common carotid artery", "The brachiocephalic trunk", "The axillary artery", "The aortic arch directly"], a: 1, h1: "Right subclavian = off the brachiocephalic trunk.", h2: "Zero in on: The brachiocephalic trunk", exp: "The right subclavian arises from the brachiocephalic trunk (the left arises from the aortic arch)." },
  { id: 37, topic: "Subclavian", src: "Maini · L03", q: "The anterior scalene muscle divides the subclavian artery into how many parts, and how are they positioned?", opts: ["Two parts: proximal and distal to the muscle", "Three parts, all lateral to the muscle", "Three parts: part 1 medial, part 2 posterior/deep, part 3 lateral to the muscle", "Four parts, one for each branch"], a: 2, h1: "Medial (1), deep/behind (2), lateral (3) to the anterior scalene.", h2: "Zero in on: Three parts: part 1 medial", exp: "Part 1 is medial, part 2 lies behind (deep to) the muscle, part 3 is lateral." },
  { id: 38, topic: "Subclavian", src: "Maini · L03", q: "Which three branches arise from the FIRST part of the subclavian artery?", opts: ["Costocervical trunk, deep cervical, and superior intercostal", "Superior thyroid, lingual, and facial", "Dorsal scapular and suprascapular only", "Vertebral artery, internal thoracic artery, and thyrocervical trunk"], a: 3, h1: "VIT: Vertebral, Internal thoracic, Thyrocervical trunk.", h2: "Zero in on: Vertebral artery", exp: "Part 1 gives the vertebral, internal thoracic, and thyrocervical trunk." },
  { id: 39, topic: "Subclavian", src: "Maini · L03", q: "In thoracic outlet (scalene) syndrome, which structures may be compressed together?", opts: ["The common carotid artery and the recurrent laryngeal nerve", "The subclavian vein and the phrenic nerve", "The subclavian artery and the brachial plexus", "The internal jugular vein and the vagus nerve"], a: 2, h1: "Both hide behind the anterior scalene, so both get squeezed.", h2: "Zero in on: The subclavian artery and the brachial plexus", exp: "Because both lie posterior to the anterior scalene, they can be compressed together." },
  { id: 40, topic: "Neck veins", src: "Maini · L05", q: "What is the relationship of the subclavian VEIN to the anterior scalene muscle?", opts: ["It pierces the anterior scalene", "It passes POSTERIOR to the anterior scalene", "It passes posterior to the middle scalene", "It passes ANTERIOR to the anterior scalene"], a: 3, h1: "Vein in FRONT, artery BEHIND the anterior scalene.", h2: "Zero in on: It passes ANTERIOR to the anterior scalene", exp: "The subclavian vein runs in front of the anterior scalene (opposite the artery)." },
  { id: 41, topic: "Neck veins", src: "Maini · L05", q: "The subclavian vein unites with which vein to form the brachiocephalic vein?", opts: ["The vertebral vein", "The external jugular vein", "The internal jugular vein", "The anterior jugular vein"], a: 2, h1: "Subclavian + IJV = brachiocephalic (then the SVC).", h2: "Zero in on: The internal jugular vein", exp: "Subclavian + internal jugular veins unite to form the brachiocephalic vein." },
  { id: 42, topic: "Neck veins", src: "Maini · L05", q: "The internal jugular vein begins at the jugular foramen as a continuation of which dural venous sinus?", opts: ["The cavernous sinus", "The superior sagittal sinus", "The straight sinus", "The sigmoid sinus"], a: 3, h1: "Sigmoid sinus exits the jugular foramen as the IJV.", h2: "Zero in on: The sigmoid sinus", exp: "The IJV is the continuation of the sigmoid sinus at the jugular foramen." },
  { id: 43, topic: "Neck veins", src: "Maini · L05", q: "Into which vein does the INFERIOR thyroid vein drain (unlike the superior and middle thyroid veins)?", opts: ["The internal jugular vein", "The external jugular vein", "The vertebral vein", "The brachiocephalic vein"], a: 3, h1: "Inferior thyroid vein is the odd one, going to the brachiocephalic.", h2: "Zero in on: The brachiocephalic vein", exp: "The inferior thyroid vein drains into the brachiocephalic vein on each side." },
  { id: 44, topic: "Lymphatics", src: "Maini · L05", q: "On palpation, which lymph node finding is MORE worrisome (e.g., for cancer or lymphoma)?", opts: ["A painless, firm-to-hard, fixed, matted node", "A soft node that fluctuates with swallowing", "A warm, red, acutely tender node", "A painful, tender, mobile node"], a: 0, h1: "Painless + hard + fixed + matted = red flag.", h2: "Zero in on: A painless", exp: "Maini: painless, firm, fixed, matted nodes are more concerning for malignancy/lymphoma." },
];

/* =============================================================== STYLES ==== */
const css = `
:root{
  --accent:#7c3aed; --accent-deep:#6d28d9; --accent-mid:#8b5cf6; --accent-soft:#c4b5fd;
  --accent-tint:#ede9fe; --accent-wash:#f5f3ff; --ink:#2e1065; --ink-soft:#5b4a8a;
  --paper:#faf9ff; --card:#ffffff; --line:#ddd0f5;
  --good:#0e7a52; --good-bg:#e7f8ef; --good-line:#bfe6d2;
  --bad:#b42318; --bad-bg:#fdeceb; --bad-line:#f3c6c2;
  --gold:#9a6a2b; --gold-bg:#fffaf0; --gold-line:#ecd6a8;
}
*{box-sizing:border-box}
.fb-root{font-family:'Outfit','SF Pro Text',system-ui,-apple-system,Segoe UI,sans-serif;color:var(--ink);
  background:radial-gradient(880px 420px at 100% -8%, var(--accent-tint), transparent 60%),radial-gradient(680px 360px at -10% 110%, #e4ddf8, transparent 55%),var(--paper);
  min-height:100vh;line-height:1.55;padding:0 0 64px}
.fb-wrap{max-width:900px;margin:0 auto;padding:0 18px}
.serif{font-family:'Fraunces','Iowan Old Style',Georgia,serif}
.hero{padding:30px 0 12px}
.kicker{display:inline-flex;gap:8px;align-items:center;font-size:12px;font-weight:600;letter-spacing:.13em;text-transform:uppercase;color:var(--accent-deep);background:var(--accent-wash);border:1px solid var(--line);padding:6px 12px;border-radius:999px}
.dot{width:7px;height:7px;border-radius:50%;background:var(--accent);box-shadow:0 0 0 3px var(--accent-tint)}
h1.title{font-size:clamp(27px,5vw,43px);line-height:1.05;margin:14px 0 6px;font-weight:600;letter-spacing:-.02em}
h1.title em{font-style:italic;color:var(--accent-mid)}
.subtitle{color:var(--ink-soft);max-width:720px;font-size:15.5px}
.edge-note{font-size:12.5px;color:var(--ink-soft);background:var(--accent-wash);border:1px solid var(--line);border-radius:9px;padding:8px 12px;margin-top:12px}
.pill-row{display:flex;flex-wrap:wrap;gap:8px;align-items:center;margin-top:12px}
.pill-date{display:inline-block;font-size:12.5px;font-weight:600;color:var(--accent-deep);background:var(--accent-wash);border:1px solid var(--line);padding:7px 12px;border-radius:999px}
.pill-review{display:inline-block;font-size:11.5px;font-weight:700;letter-spacing:.04em;color:#8a4b00;background:#fff6e6;border:1px solid #f0d49a;padding:7px 12px;border-radius:999px}
.hublink{display:inline-flex;align-items:center;gap:6px;font-size:12.5px;font-weight:600;color:#fff;background:var(--accent);border:none;text-decoration:none;padding:7px 13px;border-radius:999px;box-shadow:0 6px 16px -8px var(--accent)}
.hublink:hover{background:var(--accent-mid)}
.tabbar{position:sticky;top:0;z-index:20;background:rgba(250,249,255,.92);backdrop-filter:blur(10px);border-bottom:1px solid var(--line);margin-top:16px}
.tabs{display:flex;gap:4px;max-width:900px;margin:0 auto;padding:8px 14px;overflow-x:auto}
.tab{flex:0 0 auto;border:none;background:none;font:inherit;font-weight:600;font-size:14.5px;color:var(--ink-soft);padding:9px 15px;border-radius:10px;cursor:pointer;transition:.15s;white-space:nowrap}
.tab:hover{color:var(--accent-deep);background:var(--accent-wash)}
.tab.active{color:#fff;background:var(--accent);box-shadow:0 4px 14px -4px var(--accent)}
.section{padding:24px 0 8px;animation:fade .35s ease}
@keyframes fade{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
.banner{background:linear-gradient(180deg,var(--accent-deep),var(--accent-mid));color:#fff;border-radius:16px;padding:18px 20px;margin:8px 0 16px;box-shadow:0 18px 40px -24px var(--accent-deep)}
.banner .bt{font-family:'Fraunces',Georgia,serif;font-weight:600;font-size:19px;margin-bottom:6px}
.banner p{font-size:13.5px;opacity:.93;margin:4px 0 0}
.player{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:14px 16px;margin:0 0 16px;box-shadow:0 12px 28px -22px rgba(124,58,237,.35)}
.player-row{display:flex;flex-wrap:wrap;gap:10px;align-items:center}
.pbtn{border:none;background:var(--accent);color:#fff;font:inherit;font-weight:700;font-size:14px;padding:9px 15px;border-radius:10px;cursor:pointer;transition:.14s;display:inline-flex;align-items:center;gap:6px}
.pbtn:hover{background:var(--accent-mid)}
.pbtn.sec{background:#fff;color:var(--accent-deep);border:1px solid var(--line)}
.pbtn.sec:hover{background:var(--accent-wash)}
.pbtn:disabled{opacity:.4;cursor:default}
.pctl{display:flex;align-items:center;gap:8px;font-size:12.5px;color:var(--ink-soft);font-weight:600}
.pctl input[type=range]{accent-color:var(--accent);width:120px}
.pctl select{font:inherit;font-size:12.5px;border:1px solid var(--line);border-radius:8px;padding:6px 8px;background:#fff;color:var(--ink);max-width:190px}
.pnow{font-size:12.5px;color:var(--accent-deep);background:var(--accent-wash);border:1px solid var(--line);border-radius:9px;padding:9px 12px;margin-top:11px}
.pnow b{color:var(--accent-deep)}
.pnote{font-size:11.5px;color:var(--ink-soft);margin-top:8px}
.obj{background:var(--card);border:1px solid var(--line);border-left:4px solid var(--accent);border-radius:14px;padding:16px 18px;margin:14px 0;box-shadow:0 12px 28px -24px rgba(124,58,237,.3);transition:box-shadow .2s,border-color .2s}
.obj.reading{border-left-color:var(--accent-mid);box-shadow:0 0 0 2px var(--accent-soft),0 14px 30px -22px rgba(124,58,237,.45)}
.obj-head{display:flex;align-items:baseline;gap:10px;margin-bottom:4px;flex-wrap:wrap}
.obj-num{font-family:'Fraunces',Georgia,serif;font-weight:600;font-size:20px;color:var(--accent-soft)}
.obj-title{font-weight:700;font-size:15.5px;color:var(--ink);flex:1;min-width:200px}
.src{font-size:10.5px;font-weight:700;color:var(--accent-deep);background:var(--accent-wash);border:1px solid var(--line);padding:2px 8px;border-radius:6px;white-space:nowrap}
.readbtn{border:1px solid var(--accent-soft);background:#fff;color:var(--accent-deep);font:inherit;font-weight:600;font-size:11px;padding:4px 10px;border-radius:8px;cursor:pointer;white-space:nowrap}
.readbtn:hover{background:var(--accent-wash)}
.obj-facts{margin:8px 0 0;padding-left:18px}
.obj-facts li{margin:5px 0;font-size:13.5px;color:var(--ink-soft)}
.obj-facts li.reading{color:var(--ink);font-weight:600;background:var(--accent-wash);border-radius:6px;padding:2px 6px;margin-left:-6px}
.objflag{margin-top:10px;font-size:12.5px;color:#6b4a14;background:var(--gold-bg);border:1px dashed var(--gold-line);border-radius:9px;padding:8px 12px}
.objflag.reading{outline:2px solid var(--accent-soft)}

/* ============================================= SPEECH (Web Speech API) ===== */
const SPEAK_MAP = [
  [/\bCN XII\b/g, "cranial nerve twelve"], [/\bCN XI\b/g, "cranial nerve eleven"],
  [/\bCN X\b/g, "cranial nerve ten"], [/\bCN IX\b/g, "cranial nerve nine"],
  [/\bCN VIII\b/g, "cranial nerve eight"], [/\bCN VII\b/g, "cranial nerve seven"],
  [/\bCN VI\b/g, "cranial nerve six"], [/\bCN V\b/g, "cranial nerve five"],
  [/\bCN IV\b/g, "cranial nerve four"], [/\bCN III\b/g, "cranial nerve three"],
  [/\bCN II\b/g, "cranial nerve two"], [/\bCN I\b/g, "cranial nerve one"],
  [/\bV3\b/g, "V three"], [/\bV2\b/g, "V two"], [/\bV1\b/g, "V one"],
  [/\bC1\b/g, "C one"], [/\bC2\b/g, "C two"], [/\bC3\b/g, "C three"],
  [/\bC4\b/g, "C four"], [/\bC5\b/g, "C five"], [/\bC6\b/g, "C six"],
  [/\bC7\b/g, "C seven"], [/\bC8\b/g, "C eight"], [/\bT1\b/g, "T one"],
  [/\bIJV\b/g, "internal jugular vein"], [/\bECA\b/g, "external carotid artery"],
  [/\bICA\b/g, "internal carotid artery"], [/\bCCA\b/g, "common carotid artery"],
  [/\bSCM\b/g, "sternocleidomastoid"], [/\bSVE\b/g, "S V E"], [/\bGSE\b/g, "G S E"],
  [/\bGVE\b/g, "G V E"], [/\bGVA\b/g, "G V A"], [/\bSVC\b/g, "superior vena cava"],
];
function speechify(t) {
  let s = t;
  SPEAK_MAP.forEach(([re, rep]) => { s = s.replace(re, rep); });
  return s;
}

function useVoices() {
  const [voices, setVoices] = useState([]);
  useEffect(() => {
    const synth = window.speechSynthesis;
    if (!synth) return;
    const load = () => { const v = synth.getVoices() || []; if (v.length) setVoices(v); };
    load();
    synth.addEventListener("voiceschanged", load);
    return () => { try { synth.removeEventListener("voiceschanged", load); } catch (e) {} };
  }, []);
  return voices;
}

// Prefer the natural Edge voices (Ava / Emma / Andrew / any "Natural"/"Online" en-US)
function pickDefaultVoice(voices) {
  if (!voices || !voices.length) return "";
  const byName = (needle) => voices.find(v => v.name.toLowerCase().includes(needle));
  const en = voices.filter(v => (v.lang || "").toLowerCase().startsWith("en"));
  const pool = en.length ? en : voices;
  const pref = ["ava", "emma", "andrew", "natural", "online", "aria", "jenny"];
  for (const p of pref) {
    const hit = pool.find(v => v.name.toLowerCase().includes(p));
    if (hit) return hit.voiceURI;
  }
  return pool[0].voiceURI;
}

/* --------------------------------------------------------------- Cram ----- */
function Cram() {
  const voices = useVoices();
  const [voiceURI, setVoiceURI] = useState("");
  const [rate, setRate] = useState(1.1);
  const [playing, setPlaying] = useState(false);
  const [paused, setPaused] = useState(false);
  const [cur, setCur] = useState(-1);
  const [supported] = useState(() => typeof window !== "undefined" && "speechSynthesis" in window);

  // flat list of spoken segments
  const segments = useMemo(() => {
    const segs = [];
    cram.forEach((c, ci) => {
      segs.push({ ci, kind: "title", fi: -1, text: `Topic ${c.n}. ${c.title}.` });
      c.facts.forEach((f, fi) => segs.push({ ci, kind: "fact", fi, text: f }));
      if (c.flag) segs.push({ ci, kind: "flag", fi: -1, text: `Maini flag. ${c.flag}` });
    });
    return segs;
  }, []);

  const rateRef = useRef(rate); useEffect(() => { rateRef.current = rate; }, [rate]);
  const voiceRef = useRef(voiceURI); useEffect(() => { voiceRef.current = voiceURI; }, [voiceURI]);
  const voicesRef = useRef(voices); useEffect(() => { voicesRef.current = voices; }, [voices]);
  const activeRef = useRef(false);
  const tokenRef = useRef(0);

  // default voice once list arrives
  useEffect(() => {
    if (!voiceURI && voices.length) setVoiceURI(pickDefaultVoice(voices));
  }, [voices, voiceURI]);

  const speakIdx = (i) => {
    const synth = window.speechSynthesis;
    if (!synth) return;
    if (i < 0 || i >= segments.length) { activeRef.current = false; setPlaying(false); setPaused(false); setCur(-1); return; }
    const token = ++tokenRef.current;
    setCur(i);
    const u = new SpeechSynthesisUtterance(speechify(segments[i].text));
    u.rate = rateRef.current;
    const v = (voicesRef.current || []).find(x => x.voiceURI === voiceRef.current);
    if (v) { u.voice = v; u.lang = v.lang; }
    u.onend = () => { if (activeRef.current && tokenRef.current === token) speakIdx(i + 1); };
    u.onerror = () => { /* swallow; user can press play again */ };
    synth.speak(u);
  };

  const play = () => {
    if (!supported) return;
    window.speechSynthesis.cancel();
    activeRef.current = true; setPlaying(true); setPaused(false);
    speakIdx(cur >= 0 ? cur : 0);
  };
  const pause = () => { if (!supported) return; window.speechSynthesis.pause(); setPaused(true); };
  const resume = () => { if (!supported) return; window.speechSynthesis.resume(); setPaused(false); };
  const stop = () => {
    if (!supported) return;
    activeRef.current = false; tokenRef.current++;
    window.speechSynthesis.cancel();
    setPlaying(false); setPaused(false); setCur(-1);
  };
  const jumpToTopic = (ci) => {
    const start = segments.findIndex(s => s.ci === ci && s.kind === "title");
    if (start < 0) return;
    activeRef.current = true; setPlaying(true); setPaused(false);
    window.speechSynthesis.cancel();
    speakIdx(start);
  };
  const stepTopic = (dir) => {
    const curCi = cur >= 0 ? segments[cur].ci : 0;
    const next = Math.min(cram.length - 1, Math.max(0, curCi + dir));
    jumpToTopic(next);
  };

  // stop speech when leaving the tab / unmounting
  useEffect(() => () => {
    activeRef.current = false;
    try { window.speechSynthesis.cancel(); } catch (e) {}
  }, []);

  const curSeg = cur >= 0 ? segments[cur] : null;
  const readingCi = curSeg ? curSeg.ci : -1;
  const readingFi = curSeg && curSeg.kind === "fact" ? curSeg.fi : -2;
  const readingFlag = curSeg && curSeg.kind === "flag";
  const nowLabel = curSeg ? `Topic ${cram[curSeg.ci].n} — ${cram[curSeg.ci].title}` : "";

  return (
    <section className="section">
      <div className="banner">
        <div className="bt">⚡ Cram — Maini&apos;s neck essentials, in her order</div>
        <p>The map of the neck → posterior triangle &amp; the scalene gateway → cervical plexus &amp; ansa → the anterior triangle &amp; its four subdivisions → suprahyoid &amp; infrahyoid muscles → carotid, external carotid, sinus/body → subclavian &amp; carotid sheath → neck veins &amp; lymphatics. The ⚑ flags are the high-yield hooks. Press play to have it read aloud, hands-free.</p>
      </div>

      <div className="player">
        <div className="player-row">
          {!playing && <button className="pbtn" onClick={play} disabled={!supported}>▶ {cur >= 0 ? "Resume from here" : "Play walkthrough"}</button>}
          {playing && !paused && <button className="pbtn" onClick={pause}>⏸ Pause</button>}
          {playing && paused && <button className="pbtn" onClick={resume}>▶ Resume</button>}
          <button className="pbtn sec" onClick={stop} disabled={!playing && cur < 0}>⏹ Stop</button>
          <button className="pbtn sec" onClick={() => stepTopic(-1)} disabled={!supported}>⏮ Prev</button>
          <button className="pbtn sec" onClick={() => stepTopic(1)} disabled={!supported}>⏭ Next</button>
          <div className="pctl">
            <label htmlFor="rate">Speed</label>
            <input id="rate" type="range" min="0.5" max="3" step="0.1" value={rate} onChange={(e) => setRate(parseFloat(e.target.value))} />
            <span>{rate.toFixed(1)}x</span>
          </div>
          <div className="pctl">
            <label htmlFor="voice">Voice</label>
            <select id="voice" value={voiceURI} onChange={(e) => setVoiceURI(e.target.value)}>
              {!voices.length && <option value="">(loading…)</option>}
              {voices.map((v) => <option key={v.voiceURI} value={v.voiceURI}>{v.name}{v.lang ? ` (${v.lang})` : ""}</option>)}
            </select>
          </div>
        </div>
        {curSeg && <div className="pnow">🔊 Now reading: <b>{nowLabel}</b></div>}
        {!supported && <div className="pnow">This browser does not support the Web Speech API. Try Microsoft Edge or Chrome to hear it read aloud — the text below still works on its own.</div>}
        <div className="pnote">Speed and voice changes take effect as it moves to the next line. Tap any topic&apos;s <b>▶ Read</b> button to start there.</div>
      </div>

      {cram.map((c, ci) => (
        <div className={`obj ${readingCi === ci ? "reading" : ""}`} key={c.n}>
          <div className="obj-head">
            <span className="obj-num serif">{c.n}</span>
            <span className="obj-title">{c.title}</span>
            <button className="readbtn" onClick={() => jumpToTopic(ci)} disabled={!supported}>▶ Read</button>
            <span className="src">{c.src}</span>
          </div>
          <ul className="obj-facts">
            {c.facts.map((f, j) => <li key={j} className={readingCi === ci && readingFi === j ? "reading" : ""}>{f}</li>)}
          </ul>
          {c.flag && <div className={`objflag ${readingCi === ci && readingFlag ? "reading" : ""}`}>{c.flag}</div>}
        </div>
      ))}
    </section>
  );
}

function Drill({ bank }) {
  const [idx, setIdx] = useState(0);
  const [answers, setAnswers] = useState({});
  const [hintLevel, setHintLevel] = useState({});
  const [mode, setMode] = useState("study");

  const safeIdx = Math.min(idx, Math.max(0, bank.length - 1));
  const q = bank[safeIdx];

  const score = useMemo(
    () => Object.entries(answers).reduce((n, [id, v]) => {
      const qq = bank.find((x) => x.id === Number(id));
      return n + (qq && v === qq.a ? 1 : 0);
    }, 0),
    [answers, bank]
  );

  if (!bank.length) return <section className="section"><div className="banner"><div className="bt">Drill</div></div></section>;

  const keyMode = mode === "key";
  const sel = answers[q.id];
  const answered = sel !== undefined;
  const hl = hintLevel[q.id] || 0;
  const done = Object.keys(answers).length;

  const select = (i) => {
    if (keyMode) return;
    if (answers[q.id] !== undefined) return;
    setAnswers((p) => ({ ...p, [q.id]: i }));
  };
  const bumpHint = () => setHintLevel((p) => ({ ...p, [q.id]: Math.min((p[q.id] || 0) + 1, 2) }));
  const optClass = (i) => {
    if (keyMode) return i === q.a ? "opt opt-correct" : "opt opt-locked";
    if (!answered) return "opt";
    if (i === q.a) return "opt opt-correct";
    if (i === sel) return "opt opt-wrong";
    return "opt opt-locked";
  };

  return (
    <section className="section">
      <div className="banner">
        <div className="bt">🎯 Drill — {bank.length} questions across the neck</div>
        <p>Four options, two progressive hints, an explanation, and a lecture source per question. Tap to self-test, or flip to the Answer Key to review.</p>
      </div>

      <div className="drillbar">
        <div className="progress">Question <b>{safeIdx + 1}</b> / {bank.length}{!keyMode && <> · answered <b>{done}</b></>}</div>
        <div className="modetog">
          <button className={mode === "study" ? "on" : ""} onClick={() => setMode("study")}>Study (tap)</button>
          <button className={mode === "key" ? "on" : ""} onClick={() => setMode("key")}>Answer key</button>
        </div>
        {!keyMode && <div className="scorepill">Score {score}/{done || 0}</div>}
      </div>

      <div className="navgrid">
        {bank.map((qq, i) => {
          let cls = "";
          if (keyMode) cls = "ok";
          else { const a = answers[qq.id]; cls = a === undefined ? "" : a === qq.a ? "ok" : "no"; }
          return <button key={qq.id} className={`navbtn ${cls} ${i === safeIdx ? "cur" : ""}`} onClick={() => setIdx(i)}>{i + 1}</button>;
        })}
      </div>

      <div className="qcard">
        <div className="badges"><span className="qtopic">{q.topic}</span><span className="qsrc">{q.src}</span></div>
        <div className="qtext">{q.q}</div>

        {q.opts.map((o, i) => (
          <button key={i} className={optClass(i)} onClick={() => select(i)}>
            <span className="key">{String.fromCharCode(65 + i)}</span><span>{o}</span>
          </button>
        ))}

        {!keyMode && !answered && (
          <>
            <div className="hintrow">
              <button className="ghost" onClick={bumpHint} disabled={hl >= 2}>{hl === 0 ? "Need a hint?" : "Bigger hint"}</button>
            </div>
            {hl >= 1 && <div className="hintbox">💡 {q.h1}</div>}
            {hl >= 2 && <div className="hintbox">🔎 {q.h2}</div>}
          </>
        )}

        {keyMode && <div className="exp keyed"><div className="tag">✦ Answer · {q.src}</div><p>{q.exp}</p></div>}
        {!keyMode && answered && (
          <div className={`exp ${sel === q.a ? "correct" : "incorrect"}`}>
            <div className="tag">{sel === q.a ? "✓ Correct" : "✗ Not quite"} · {q.src}</div>
            <p>{q.exp}</p>
          </div>
        )}

        <div className="navfoot">
          <button className="btn btn-ghost" onClick={() => setIdx(Math.max(0, safeIdx - 1))} disabled={safeIdx === 0}>← Prev</button>
          <button className="btn btn-primary" onClick={() => setIdx(Math.min(bank.length - 1, safeIdx + 1))} disabled={safeIdx >= bank.length - 1}>Next →</button>
        </div>
      </div>
    </section>
  );
}

/* --------------------------------------------------------------- Coach ---- */
const COACH_SYSTEM = `You are Dr. Seema Maini, teaching GA 0202 Gross Anatomy, running a review of THE NECK (part 1) - the cervical triangles and their contents, the hyoid muscles, and the blood vessels of the neck (Lectures 3 and 5). Teach ONLY from this content; do not invent boundaries, contents, nerve supplies, branches, or root values. Warm and encouraging; you call students "guys," say "right?", "okay?", and "are we clear?", and you constantly tell students to DRAW the triangles and label them. Keep answers tight (3-6 sentences) and quiz the student.

THE MAP: SCM splits the neck into an ANTERIOR triangle (in front of SCM) and a POSTERIOR triangle (behind SCM). POSTERIOR borders: SCM, trapezius, clavicle; the inferior belly of omohyoid splits it into occipital (larger) + supraclavicular/subclavian (smaller). ANTERIOR borders: midline, anterior border of SCM, lower margin of mandible.

SCALENE GATEWAY: between anterior and middle scalene the brachial plexus trunks (C5-T1) emerge. POSTERIOR to the anterior scalene: brachial plexus + subclavian ARTERY (compressed together in thoracic outlet syndrome). ANTERIOR to the anterior scalene: subclavian VEIN + transverse cervical + suprascapular arteries. Spinal accessory nerve (CN XI) runs in the posterior triangle (CN IX, X, XII are in the carotid triangle).

CERVICAL PLEXUS: ventral rami C1-C4. Four cutaneous branches emerge at the nerve point of the neck (Erb's point), mid-posterior border of SCM: lesser occipital, greater auricular (to the ear), transverse cervical, supraclavicular (medial/intermediate/lateral). Muscular branches: phrenic (C3,4,5 - "keep you alive"), prevertebral muscles, and C2-C4 fibers that ride CN XI to SCM/trapezius. ANSA CERVICALIS: superior root = C1 via hypoglossal (CN XII), inferior root = C2-C3 (some C4); supplies the strap muscles EXCEPT thyrohyoid (thyrohyoid = C1 via CN XII, like geniohyoid). Hypoglossal exits the hypoglossal canal.

ANTERIOR TRIANGLE SUBDIVISIONS (carved by the two bellies of digastric + superior belly of omohyoid): submental, digastric (submandibular), carotid, muscular. Submental = midline + anterior belly of digastric + hyoid body (submental nodes, start of anterior jugular vein). Digastric = both digastric bellies + mandible (submandibular gland, facial vessels, CN XII). Carotid = posterior belly of digastric + SCM + superior belly of omohyoid (common carotid + bifurcation; CN IX, X, XII). Muscular = midline + superior belly of omohyoid + SCM (straps, thyroid gland, larynx, trachea, esophagus). COMMON BOUNDARIES you love to test: anterior belly of digastric (submental/digastric), posterior belly of digastric (carotid/digastric), superior belly of omohyoid (muscular/carotid).

SUPRAHYOID (elevate the hyoid; matter in swallowing): digastric, stylohyoid, mylohyoid, geniohyoid. Digastric is COMPOSITE: posterior belly (origin mastoid notch, temporal bone) = facial nerve (CN VII); anterior belly (insertion digastric fossa) = nerve to mylohyoid (inferior alveolar -> V3 -> trigeminal). Stylohyoid (from styloid process) = facial nerve; "F for facial" pairs it with the posterior belly of digastric; it is pierced by the digastric intermediate tendon. Mylohyoid (mylohyoid line; forms floor of mouth) = nerve to mylohyoid (V3). Geniohyoid (genial tubercle; sits on top of mylohyoid) = C1 via CN XII. Pharyngeal-arch muscles = SVE fibers, not GSE.

INFRAHYOID/straps (depress the hyoid/larynx; mostly in the muscular triangle): omohyoid, sternohyoid, sternothyroid, thyrohyoid. Omohyoid = only strap on the scapula, intermediate tendon slung to clavicle + first rib. Sternothyroid stops at the oblique line of the thyroid cartilage -> depresses the larynx. Ansa supplies all EXCEPT thyrohyoid (C1 via CN XII).

CAROTID SYSTEM: right common carotid off the brachiocephalic trunk; left off the aortic arch. Each bifurcates at the superior border of the thyroid cartilage. External carotid gives branches in the neck; internal carotid gives NO neck branches and enters via the carotid canal. External carotid = 8 branches: anterior (superior thyroid, lingual, facial), posterior (ascending pharyngeal, occipital, posterior auricular), terminal (superficial temporal, maxillary). TRAP: transverse facial is a branch of the superficial temporal, NOT the facial artery. Carotid SINUS = baroreceptors (pressure) at the start of the internal carotid; carotid BODY = chemoreceptors (CO2 up, H+ up, O2 down); BOTH supplied by glossopharyngeal (CN IX).

SUBCLAVIAN: right off the brachiocephalic, left off the arch; anterior scalene divides it into 3 parts (medial, deep, lateral). Part 1 = vertebral (up transverse foramina to foramen magnum), internal thoracic, thyrocervical trunk (inferior thyroid + transverse cervical + suprascapular). Part 2 = costocervical trunk (deep cervical + superior intercostal). Part 3 usually no branch. CAROTID SHEATH = three musketeers: common carotid, internal jugular vein, vagus; the external carotid leaves the sheath after the bifurcation.

NECK VEINS/LYMPH: subclavian vein is ANTERIOR to the anterior scalene, continuation of the axillary vein at the first rib; subclavian vein + IJV = brachiocephalic vein. IJV is the continuation of the sigmoid sinus (jugular foramen), drains brain/face/neck, rides the carotid sheath. Superior + middle thyroid veins -> IJV; inferior thyroid vein -> brachiocephalic. Head/neck lymph forms right + left jugular trunks (right -> right lymphatic duct, left -> thoracic duct). Painless, firm, fixed, matted node = more worrisome (cancer/lymphoma).

Open by offering to drill: the triangles and their common boundaries, anterior/posterior-to-anterior-scalene relations, the cervical plexus and ansa cervicalis, the suprahyoid/infrahyoid muscles and their nerves, the carotid and subclavian arteries, or the neck veins. When a student is wrong, tell them to draw the triangle and reason it out step by step.`;

function Coach() {
  const [log, setLog] = useState([
    { role: "assistant", content: "Okay guys - the neck, part one. Two things I promise to ask: which structures are anterior versus posterior to the anterior scalene (remember, subclavian VEIN in front; brachial plexus and subclavian ARTERY behind), and the common boundaries between the four anterior-triangle subdivisions. Want me to drill the triangles and their boundaries, the cervical plexus and ansa cervicalis, the suprahyoid and infrahyoid muscles and their nerves, the carotid and subclavian arteries, or the neck veins? And please, have a paper handy - we draw it out. Where do you want to start?" },
  ]);
  const [input, setInput] = useState("");
  const [busy, setBusy] = useState(false);
  const [err, setErr] = useState("");
  const logRef = useRef(null);

  useEffect(() => { if (logRef.current) logRef.current.scrollTop = logRef.current.scrollHeight; }, [log, busy]);

  const send = async (text) => {
    const msg = (text ?? input).trim();
    if (!msg || busy) return;
    setErr("");
    const next = [...log, { role: "user", content: msg }];
    setLog(next);
    setInput("");
    setBusy(true);
    try {
      const res = await fetch("https://fab-ai.dgync1.workers.dev/", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          model: "claude-sonnet-4-20250514",
          max_tokens: 1000,
          system: COACH_SYSTEM,
          messages: next.map((m) => ({ role: m.role, content: m.content })),
        }),
      });
      const data = await res.json();
      const reply = (data.reply || (data.content || []).filter((b) => b.type === "text").map((b) => b.text).join("\n") || "").trim();
      setLog((p) => [...p, { role: "assistant", content: reply || "Say that again for me?" }]);
    } catch (e) {
      setErr("Could not reach the tutor. If you're running this outside the wrapped app, the API call needs a valid endpoint/key.");
      setLog((p) => p.slice(0, -1).concat({ role: "user", content: msg }));
    } finally {
      setBusy(false);
    }
  };

  const prompts = [
    "Drill me on the triangles and their common boundaries",
    "Quiz anterior vs posterior to the anterior scalene",
    "The cervical plexus and ansa cervicalis",
    "Suprahyoid & infrahyoid muscles and their nerves",
    "The carotid arteries, sinus, and body",
    "Subclavian branches and the carotid sheath",
  ];

  return (
    <section className="section">
      <div className="banner">
        <div className="bt">🧑‍⚕️ AI Coach — Dr. Maini&apos;s voice</div>
        <p>Grounded in her neck lectures. It quizzes you and makes you draw it out and reason step by step instead of guessing.</p>
      </div>

      <div className="coach-pills">
        {prompts.map((p, i) => <button key={i} className="cpill" onClick={() => send(p)}>{p}</button>)}
      </div>

      <div className="chatlog" ref={logRef}>
        {log.map((m, i) => (
          <div key={i} className={`msg ${m.role === "user" ? "user" : "bot"}`}>
            {m.role === "assistant" && <div className="who">Dr. Maini</div>}
            {m.content}
          </div>
        ))}
        {busy && <div className="typing">Dr. Maini is typing…</div>}
      </div>

      <div className="composer">
        <textarea
          value={input}
          placeholder="Ask Dr. Maini… (Enter to send, Shift+Enter for a new line)"
          onChange={(e) => setInput(e.target.value)}
          onKeyDown={(e) => { if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); send(); } }}
        />
        <button className="btn btn-primary" onClick={() => send()} disabled={busy || !input.trim()}>Send</button>
      </div>
      {err && <div className="tinynote" style={{ color: "var(--bad)" }}>{err}</div>}
      <div className="tinynote">Tutor answers are AI-generated in a teaching persona — trust the lecture/slides first if anything ever conflicts.</div>
    </section>
  );
}
