const questions = [
  { id: 1, topic: "Overview", src: "Maini · L16", q: "A brain is lifted intact out of the skull. Which single part covers and masks essentially all the underlying structures except the brainstem?", opts: ["Cerebrum","Cerebellum","Diencephalon","Brainstem"], a: 0, h1: "Largest, executive, seat of higher functions.", h2: "Cerebrum is the largest, masking part", exp: "Maini stresses the cerebrum is the largest part and is so large it masks all underlying structures except the brainstem. [Maini] 'Cerebrum is so large that it covers almost all the parts of the brain except for brain stem.'" },
  { id: 2, topic: "Overview", src: "Maini · L16", q: "Maini calls the cerebellum the 'small brain.' What is its remarkable chief function?", opts: ["Relay of ascending sensation","Coordination of movements","Seat of judgment and personality","Secretion of cerebrospinal fluid"], a: 1, h1: "It refines the plan the motor cortex lays down.", h2: "Cerebellum coordinates movement", exp: "The cerebellum is the seat of coordination - it fine-tunes and balances the movements planned by the motor cortex. [Maini] 'Cerebellum ... is the seat of coordination of your movements.'" },
  { id: 3, topic: "Overview", src: "Maini · L16", q: "According to Maini, the brainstem is composed of which three parts, listed from superior to inferior?", opts: ["Pons, midbrain, medulla oblongata","Midbrain, medulla oblongata, pons","Midbrain, pons, medulla oblongata","Diencephalon, pons, medulla oblongata"], a: 2, h1: "Top to bottom, medulla meets the cord.", h2: "Brainstem order: midbrain > pons > medulla", exp: "Maini gives the order midbrain, then pons, then medulla oblongata (continuous with the spinal cord)." },
  { id: 4, topic: "Cortex & basal nuclei", src: "Maini · L16", q: "In the cerebrum, where are the neuronal cell bodies (gray matter) concentrated, and what fills the interior?", opts: ["White matter in the cortex; gray matter inside","Gray matter throughout, no white matter","White matter throughout, no gray matter","Gray matter in the peripheral cortex; white matter (myelinated fibers) inside"], a: 3, h1: "Myelin makes the inside look white.", h2: "Cortex = gray; interior = white", exp: "Cell bodies sit peripherally in the cerebral cortex; the interior is white matter - myelinated fibers that look white." },
  { id: 5, topic: "Cortex & basal nuclei", src: "Maini · L16", q: "Maini insists on the correct term for the islands of gray matter buried inside the cerebral white matter. Which term does she say is correct?", opts: ["Basal nuclei","Basal ganglia","Basal cortex","Basal commissures"], a: 0, h1: "A ganglion is a group of cell bodies OUTSIDE the CNS.", h2: "Basal nuclei (not ganglia) is correct", exp: "Maini says 'basal nuclei' is the right term; 'basal ganglia' is technically wrong because a ganglion lies outside the CNS. [Maini] 'Nuclei is the best terminology, basal ganglia is not the right terminology.'" },
  { id: 6, topic: "Cortex & basal nuclei", src: "Maini · L16", q: "Which three structures does Maini name as the basal nuclei of the cerebrum?", opts: ["Thalamus, hypothalamus, and pineal gland","Caudate nucleus, putamen, and globus pallidus","Caudate nucleus, thalamus, and claustrum","Putamen, red nucleus, and substantia nigra"], a: 1, h1: "Two of these together form the lentiform nucleus.", h2: "Caudate + putamen + globus pallidus", exp: "Maini lists caudate nucleus, putamen, and globus pallidus (putamen + globus pallidus = lentiform; all three = corpus striatum)." },
  { id: 7, topic: "Cortex & basal nuclei", src: "Maini · L16", q: "Maini defines the lentiform nucleus as the combination of which two structures?", opts: ["Caudate nucleus and putamen","Caudate nucleus and globus pallidus","Putamen and globus pallidus","Claustrum and putamen"], a: 2, h1: "Lens-shaped pair; add caudate for the striatum.", h2: "Lentiform = putamen + globus pallidus", exp: "Putamen + globus pallidus = lentiform nucleus; adding the caudate makes the corpus striatum." },
  { id: 8, topic: "Cortex & basal nuclei", src: "Maini · L16", q: "How does Maini distinguish a sulcus (fissure) from a gyrus?", opts: ["A sulcus is a ridge; a gyrus is a groove","Both are grooves of different depth only","A sulcus is gray matter; a gyrus is white matter","A sulcus/fissure is a groove; a gyrus is a raised ridge"], a: 3, h1: "Valleys versus hills on the cortex.", h2: "Sulcus = groove, gyrus = ridge", exp: "Sulci/fissures are grooves; gyri are the raised ridges. (A groove deeper than ~1 inch is often called a fissure.)" },
  { id: 9, topic: "Lobes & areas", src: "Maini · L16", q: "Maini says each cerebral hemisphere is divided into how many lobes, and which lobe is the hidden deep one?", opts: ["Five lobes; the insula is the deep 5th lobe","Four lobes; there is no deep lobe","Six lobes; the limbic lobe is deepest","Five lobes; the cingulate is the deep 5th"], a: 0, h1: "Retract the lateral fissure to find the hidden one.", h2: "5 lobes; insula is the deep 5th", exp: "Four lobes are on the surface (frontal, parietal, temporal, occipital); the 5th, the insula, lies deep to the lateral fissure." },
  { id: 10, topic: "Lobes & areas", src: "Maini · L16", q: "The lateral sulcus (lateral fissure) forms the boundary between which lobes?", opts: ["Frontal from parietal lobe","Temporal lobe (inferiorly) from the frontal and parietal lobes (superiorly)","Occipital from parietal lobe","Temporal from occipital lobe"], a: 1, h1: "The insula hides deep to it.", h2: "Lateral sulcus: temporal below, frontal/parietal above", exp: "The lateral sulcus demarcates the temporal lobe below from the frontal and parietal lobes above." },
  { id: 11, topic: "Lobes & areas", src: "Maini · L16", q: "Because there is no deep sulcus on the lateral surface, how does Maini say you demarcate the occipital lobe?", opts: ["Follow the central sulcus posteriorly","Follow the calcarine sulcus around the pole","Draw a hypothetical line from the preoccipital notch to the superior end of the parieto-occipital sulcus","Draw a line along the lateral sulcus"], a: 2, h1: "Two landmarks, one imaginary line.", h2: "Occipital line: preoccipital notch to parieto-occipital sulcus", exp: "She joins two landmarks - the preoccipital notch (inferior border) and the superior end of the parieto-occipital sulcus - to mark off the occipital lobe." },
  { id: 12, topic: "Lobes & areas", src: "Maini · L17", q: "On her Mentimeter, Maini asks in which lobe the primary motor cortex is located. What is the answer?", opts: ["Parietal lobe","Temporal lobe","Occipital lobe","Frontal lobe"], a: 3, h1: "Precentral gyrus lives here.", h2: "Primary motor cortex = frontal lobe", exp: "The primary motor cortex (precentral gyrus) is in the frontal lobe." },
  { id: 13, topic: "Lobes & areas", src: "Maini · L17", q: "Maini's Mentimeter asks in which lobe the primary sensory (somesthetic) cortex is located. What is the answer?", opts: ["Parietal lobe","Frontal lobe","Temporal lobe","Occipital lobe"], a: 0, h1: "Postcentral gyrus - 'somesthetic' is the other name.", h2: "Primary sensory cortex = parietal lobe", exp: "The primary somatosensory cortex (postcentral gyrus) is in the parietal lobe." },
  { id: 14, topic: "Lobes & areas", src: "Maini · L17", q: "In which lobe is the primary visual cortex located?", opts: ["Parietal lobe","Occipital lobe","Temporal lobe","Frontal lobe"], a: 1, h1: "Back of the brain, near the calcarine sulcus.", h2: "Primary visual cortex = occipital lobe", exp: "The occipital lobe houses the primary visual cortex." },
  { id: 15, topic: "Lobes & areas", src: "Maini · L17", q: "The primary auditory cortex - and the primary olfactory cortex - are located in which lobe?", opts: ["Parietal lobe","Occipital lobe","Temporal lobe","Insula"], a: 2, h1: "Hearing and smell both land here.", h2: "Auditory (and olfactory) cortex = temporal lobe", exp: "Maini places the primary auditory cortex in the temporal lobe, and notes the sense of smell also ends in the temporal lobe." },
  { id: 16, topic: "Lobes & areas", src: "Maini · L17", q: "Maini's Mentimeter asks where the primary gustatory (taste) cortex is located. What is the answer?", opts: ["Temporal lobe","Parietal lobe","Frontal lobe","Insula"], a: 3, h1: "Hidden lobe under the lateral fissure.", h2: "Gustatory cortex = insula", exp: "The insula (the deep 5th lobe) is the seat of the primary gustatory cortex." },
  { id: 17, topic: "Lobes & areas", src: "Maini · L16", q: "Maini says the prefrontal cortex is the area for reasoning and judgment. What does she note about its development?", opts: ["It is not developed until about 16-17 years and keeps developing until about 25 years","It is fully developed at birth","It stops developing at age 10","It never fully develops in anyone"], a: 0, h1: "Why teenagers lack full judgment.", h2: "Prefrontal (reasoning/judgment) matures ~25", exp: "She explains the prefrontal area (reasoning/judgment) matures late - beginning ~16-17 and continuing to ~25 years." },
  { id: 18, topic: "Motor/sensory cortex", src: "Maini · L16", q: "The precentral gyrus, lying immediately anterior to the central sulcus, corresponds to which functional cortex?", opts: ["Primary sensory cortex","Primary motor cortex","Primary visual cortex","Broca's motor speech area"], a: 1, h1: "'Pre' = in front of the central sulcus.", h2: "Precentral gyrus = primary motor cortex", exp: "The precentral gyrus is the primary motor cortex - every skeletal muscle takes command from a neuron here." },
  { id: 19, topic: "Motor/sensory cortex", src: "Maini · L16", q: "The postcentral gyrus, immediately posterior to the central sulcus, is which functional cortex?", opts: ["Primary motor cortex","Primary auditory cortex","Primary sensory (somesthetic) cortex","Prefrontal association cortex"], a: 2, h1: "'Post' = behind the central sulcus; somesthetic.", h2: "Postcentral gyrus = primary sensory cortex", exp: "The postcentral gyrus is the primary somatosensory (somesthetic) area for general sensations." },
  { id: 20, topic: "Motor/sensory cortex", src: "Maini · L16", q: "Maini describes the motor system as a two-neuron pathway. Where are the two neurons located for a limb muscle?", opts: ["Both neurons in the precentral gyrus","First in the thalamus; second in the cortex","First in the posterior horn; second in the cortex","Upper motor neuron in the precentral gyrus; lower (alpha) motor neuron in the anterior/ventral horn of the spinal cord"], a: 3, h1: "Anterior/ventral horn is motor.", h2: "Motor = 2 neurons (cortex to anterior horn)", exp: "The first (upper) motor neuron sits in the primary motor cortex; the corticospinal tract descends to the second (lower/alpha) motor neuron in the anterior horn." },
  { id: 21, topic: "Motor/sensory cortex", src: "Maini · L17", q: "Per Maini's Lecture 17, the sensory pathway is a four-neuron pathway. Where are the four neurons located, in order?", opts: ["Ganglion (dorsal root), medulla, thalamus, postcentral gyrus","Cortex, midbrain, pons, spinal cord","Thalamus, medulla, ganglion, cortex","Ganglion, thalamus, medulla, cortex"], a: 0, h1: "Thalamus is the 3rd relay before cortex.", h2: "Sensory = 4 neurons (ganglion>medulla>thalamus>cortex)", exp: "Maini lists first neuron in the ganglion, second in the medulla, third in the thalamus, fourth in the postcentral gyrus." },
  { id: 22, topic: "Motor/sensory cortex", src: "Maini · L16", q: "On the motor and sensory homunculus, which body regions receive the largest cortical representation?", opts: ["The back and trunk muscles","Regions needing fine coordination or with dense receptors (face, hands, tongue)","The proximal limb muscles only","All body parts equally"], a: 1, h1: "Think huge hands and face, tiny back.", h2: "Homunculus favors fine-control / dense-receptor areas", exp: "Maini says muscles needing fine coordination (and skin with dense receptors) - face, hands, tongue - get the largest representation; large uncoordinated muscles like the back get little." },
  { id: 23, topic: "Gyri", src: "Maini · L16", q: "Maini divides the inferior frontal gyrus into three named parts. Which three?", opts: ["Pars superior, pars media, pars inferior","Pars centralis, pars lateralis, pars medialis","Pars orbitalis, pars triangularis, and pars opercularis","Superior, middle, and inferior frontal gyri"], a: 2, h1: "Broca's area sits in the triangular and opercular parts.", h2: "IFG parts: orbitalis, triangularis, opercularis", exp: "The inferior frontal gyrus has three parts: pars orbitalis, pars triangularis, and pars opercularis ('pars' = part)." },
  { id: 24, topic: "Speech areas", src: "Maini · L16", q: "Where is Broca's area located, and what is its function?", opts: ["Posterior temporal lobe; sensory speech area","Occipital lobe; visual word area","Parietal lobe; general sensory area","Frontal lobe; it is the motor (expressive) speech area"], a: 3, h1: "Motor = making the words come out.", h2: "Broca's = frontal, motor (expressive) speech", exp: "Broca's area lies in the frontal lobe and is the motor speech area - it finds the appropriate words to express." },
  { id: 25, topic: "Speech areas", src: "Maini · L16", q: "Where is Wernicke's area located, and what is its function?", opts: ["Posterior temporal lobe; it is the sensory speech area for comprehension","Frontal lobe; motor speech area","Insula; gustatory speech area","Occipital lobe; visual speech output"], a: 0, h1: "Sensory = understanding the words.", h2: "Wernicke's = posterior temporal, comprehension", exp: "Wernicke's area sits posteriorly in the temporal lobe and is the sensory speech area - it lets you comprehend spoken or read language." },
  { id: 26, topic: "Speech areas", src: "Maini · L16", q: "A patient understands everything said to them but is short of words and cannot produce fluent speech. Which lesion does Maini describe?", opts: ["Wernicke's aphasia (sensory aphasia)","Broca's aphasia (motor aphasia)","Cerebellar dysarthria","Global aphasia"], a: 1, h1: "Non-fluent but understands you.", h2: "Broca's aphasia: short of words, comprehension intact", exp: "In Broca's (motor) aphasia the patient comprehends but is short of words - non-fluent, effortful speech." },
  { id: 27, topic: "Speech areas", src: "Maini · L16", q: "A patient speaks fluently but in meaningless 'word salad' and cannot comprehend what is said to them. Which lesion is this?", opts: ["Broca's aphasia (motor aphasia)","Cerebellar dysarthria","Wernicke's aphasia (sensory aphasia)","Conduction aphasia"], a: 2, h1: "Talks a lot, none of it makes sense.", h2: "Wernicke's aphasia: fluent word salad, no comprehension", exp: "Wernicke's (sensory) aphasia gives fluent but senseless 'word salad' with poor comprehension." },
  { id: 28, topic: "Capsules", src: "Maini · L17", q: "Maini's Mentimeter asks: the internal capsule is located between which two structures?", opts: ["The putamen and the claustrum","The claustrum and the insular gray matter","The two cerebral hemispheres","The caudate nucleus and the globus pallidus (medially, next to the thalamus)"], a: 3, h1: "The corticospinal tract funnels through it.", h2: "Internal capsule: caudate/globus pallidus (L-shaped)", exp: "The L-shaped internal capsule lies between the caudate nucleus/globus pallidus and the thalamus." },
  { id: 29, topic: "Capsules", src: "Maini · L16", q: "Maini calls the internal capsule clinically very important. Which tract passes through it, and what results from a lesion there?", opts: ["The corticospinal (motor) tract passes through; a lesion causes contralateral paralysis","The optic tract passes through; a lesion causes blindness","The spinothalamic tract passes through; a lesion causes deafness","No important tract passes through; lesions are silent"], a: 0, h1: "A very common cause of stroke paralysis.", h2: "Corticospinal tract through internal capsule; lesion = contralateral paralysis", exp: "The corticospinal tract funnels through the internal capsule; ischemia there (a common stroke site) causes paralysis on the opposite side, since fibers cross in the medulla." },
  { id: 30, topic: "Capsules", src: "Maini · L16", q: "Maini teaches that a resting tremor is the hallmark of dysfunction in which structures?", opts: ["The cerebellum","The basal nuclei","The thalamus","The primary motor cortex"], a: 1, h1: "Contrast with the cerebellar intention tremor.", h2: "Resting tremor = basal-nuclear dysfunction", exp: "A resting tremor points to basal-nuclear dysfunction; an intention tremor points to the cerebellum." },
  { id: 31, topic: "Medial surface & limbic", src: "Maini · L16", q: "Maini says the fornix is a part of which system?", opts: ["The visual pathway","The corticospinal (motor) pathway","The limbic system","The ventricular system"], a: 2, h1: "Emotion and memory circuitry.", h2: "Fornix = limbic system", exp: "The fornix is a component of the limbic system (limbic cortex)." },
  { id: 32, topic: "Medial surface & limbic", src: "Maini · L16", q: "On the inferior surface, which four structures does Maini group together as the limbic cortex/system?", opts: ["Cuneus, precuneus, lingual gyrus, and straight gyrus","Precentral, postcentral, supramarginal, and angular gyri","Superior, middle, and inferior temporal gyri plus insula","Uncus, parahippocampal gyrus, isthmus, and cingulate gyrus"], a: 3, h1: "Reward, punishment, aggression, pleasure.", h2: "Limbic: uncus, parahippocampal, isthmus, cingulate", exp: "She lists uncus, parahippocampal gyrus, the isthmus, and the cingulate gyrus as the limbic cortex - dealing with reward/punishment, aggression, pleasure, emotion, and memory." },
  { id: 33, topic: "Diencephalon", src: "Maini · L16", q: "What is the chief function of the thalamus, per Maini?", opts: ["It is the relay center for essentially all ascending sensations on their way to the cortex","It coordinates skilled movement","It secretes melatonin","It regulates body temperature"], a: 0, h1: "The layover before the cortex.", h2: "Thalamus = sensory relay center", exp: "The thalamus is the great sensory relay for almost every sensation ascending to the cortex. [Maini] 'Thalamus is a relay center for all your sensations, which are ascending.'" },
  { id: 34, topic: "Diencephalon", src: "Maini · L16", q: "Which single sensation does Maini say bypasses the thalamus entirely?", opts: ["Vision","Smell (olfaction)","Hearing","Taste"], a: 1, h1: "The nose has a direct line to the cortex.", h2: "Only smell bypasses the thalamus", exp: "All special and general sensations relay through the thalamus except olfaction - smell bypasses it." },
  { id: 35, topic: "Diencephalon", src: "Maini · L17", q: "Which of the following is a function Maini attributes to the hypothalamus?", opts: ["Coordination of skilled voluntary movement","Relay of ascending general sensation","Body temperature regulation (the body's thermostat)","Comprehension of spoken language"], a: 2, h1: "Thirst, hunger, temperature, hormones, sleep-wake.", h2: "Hypothalamus = autonomic/endocrine/thermostat", exp: "The hypothalamus is the thermostat and also controls thirst, hunger, endocrine output, the sleep-wake cycle, and the autonomic nervous system." },
  { id: 36, topic: "Diencephalon", src: "Maini · L16", q: "The pineal gland secretes which hormone, and what does it regulate?", opts: ["Cortisol, which regulates stress","Thyroxine, which regulates metabolism","Oxytocin, which regulates labor","Melatonin, which regulates the sleep-wakefulness cycle"], a: 3, h1: "The 'sleep hormone'.", h2: "Pineal secretes melatonin (sleep-wake)", exp: "Maini identifies melatonin - the 'sleep hormone' - secreted by the pineal gland to regulate the sleep-wake cycle." },
  { id: 37, topic: "Diencephalon", src: "Maini · L16", q: "Maini stresses the close proximity of the optic chiasma to the pituitary gland. What is the optic chiasma, and why is the relationship clinically important?", opts: ["It is the crossing point of the two optic nerves; a pituitary adenoma can compress it and cause visual disturbance (bitemporal hemianopsia)","It is the crossing of the trochlear nerves; a lesion causes deafness","It is the pituitary stalk; damage causes diabetes insipidus","It is a venous sinus; thrombosis causes headache only"], a: 0, h1: "Tumor from below squeezes the crossing fibers.", h2: "Optic chiasma crossing; pituitary tumor compresses it", exp: "The optic chiasma is where the optic nerves cross; an enlarging pituitary adenoma compresses it, so visual loss is often an early sign." },
  { id: 38, topic: "Brainstem & midbrain", src: "Maini · L16", q: "The posterior part of the midbrain shows four bulges. What is this region called, and what are the four bulges?", opts: ["Cerebral peduncles - two crura on each side","Corpora quadrigemina - two superior and two inferior colliculi","Mammillary bodies - two paired nuclei","Pyramids - two anterior columns"], a: 1, h1: "'Quadri' = four bodies on the back of the midbrain.", h2: "Corpora quadrigemina = 2 superior + 2 inferior colliculi", exp: "Corpora quadrigemina ('four bodies') are the two superior and two inferior colliculi of the dorsal midbrain." },
  { id: 39, topic: "Brainstem & midbrain", src: "Maini · L17", q: "Maini assigns the superior and inferior colliculi to which pathways?", opts: ["Superior = auditory; inferior = visual","Superior = motor; inferior = sensory","Superior colliculi = visual pathway; inferior colliculi = auditory pathway","Superior = olfactory; inferior = gustatory"], a: 2, h1: "See with the top, hear with the bottom.", h2: "Superior colliculi visual; inferior colliculi auditory", exp: "The superior colliculi are part of the visual pathway; the inferior colliculi are an important part of the auditory pathway." },
  { id: 40, topic: "Brainstem & midbrain", src: "Maini · L16", q: "In Maini's midbrain cross-section, what is the position of the substantia nigra relative to the red nucleus?", opts: ["It lies inferior to the medulla","It surrounds the cerebral aqueduct","It replaces the red nucleus","It lies on top of the red nucleus (like the 'eyebrows' above the 'eyes')"], a: 3, h1: "Eyebrows over the eyes.", h2: "Substantia nigra sits atop the red nucleus", exp: "In her 'angry man' picture, substantia nigra sits atop the red nucleus - eyebrows above the eyes." },
  { id: 41, topic: "Brainstem & midbrain", src: "Maini · L17", q: "What is the clinical significance of the pyramidal decussation in the lower medulla?", opts: ["The corticospinal fibers cross to the opposite side, so a lesion on one side causes paralysis on the other","The optic nerves cross, causing bitemporal hemianopsia","The sensory fibers of smell cross to relay in the thalamus","The two cerebellar hemispheres exchange fibers"], a: 0, h1: "Left brain, right body.", h2: "Pyramidal decussation: corticospinal crosses > contralateral paralysis", exp: "At the pyramidal decussation the corticospinal tract switches sides; hence a left-sided lesion causes right-sided paralysis." },
  { id: 42, topic: "Brainstem & midbrain", src: "Maini · L17", q: "Maini describes the reticular formation (reticular activating system). Where is it, and what does it do?", opts: ["A cortical band that comprehends speech","A network of gray and white matter in the medulla and pons that keeps you awake and alert","A cerebellar network that coordinates movement","A thalamic nucleus that relays vision"], a: 1, h1: "It wakes you when the alarm rings.", h2: "Reticular formation (medulla+pons) = arousal/alertness", exp: "The reticular formation/activating system lies in the medulla and pons; sensory input through it keeps the brain alert and awake." },
  { id: 43, topic: "Cranial nerves", src: "Maini · L17", q: "What makes the trochlear nerve (CN IV) unique among the cranial nerves in its site of emergence?", opts: ["It is the only nerve emerging from the pons","It is the only purely sensory cranial nerve","It is the only cranial nerve that emerges from the dorsal (posterior) aspect of the brainstem, just below the inferior colliculus","It is the only nerve exiting the jugular foramen"], a: 2, h1: "Trochlear sneaks around from the back.", h2: "CN IV: only nerve from the dorsal brainstem", exp: "CN IV is the sole cranial nerve arising dorsally, emerging from the midbrain below the inferior colliculus and then curving anteriorly." },
  { id: 44, topic: "Cranial nerves", src: "Maini · L17", q: "The trigeminal nerve (CN V) is seen as a very thick nerve emerging from which part of the brainstem?", opts: ["The interpeduncular fossa","The middle of the pontomedullary sulcus","The post-olivary sulcus","The side of the pons"], a: 3, h1: "Thickest cranial nerve, off the pons.", h2: "CN V emerges from the side of the pons", exp: "Maini shows the thick trigeminal nerve coming out of the lateral aspect of the pons." },
  { id: 45, topic: "Cranial nerves", src: "Maini · L17", q: "Maini calls CN IX, X, and XI 'three close friends.' From which sulcus do they emerge, and through which foramen do they exit the skull?", opts: ["They emerge from the post-olivary sulcus and exit through the jugular foramen","From the pre-olivary sulcus; through the hypoglossal canal","From the interpeduncular fossa; through the superior orbital fissure","From the side of the pons; through the internal acoustic meatus"], a: 0, h1: "Three friends leaving by the same door.", h2: "CN IX/X/XI: post-olivary sulcus, jugular foramen", exp: "The glossopharyngeal, vagus, and accessory nerves emerge from the post-olivary sulcus and leave together via the jugular foramen." },
  { id: 46, topic: "Cranial nerves", src: "Maini · L17", q: "Which three structures pass together through the internal acoustic meatus, per Maini?", opts: ["Optic nerve, ophthalmic artery, and CN III","Facial nerve (VII), vestibulocochlear nerve (VIII), and the labyrinthine artery","CN IX, X, XI and the internal jugular vein","CN V, the middle meningeal artery, and CN VI"], a: 1, h1: "Two nerves and one small artery to the ear.", h2: "IAM: CN VII, CN VIII, labyrinthine artery", exp: "The internal acoustic meatus transmits CN VII, CN VIII, and the labyrinthine artery." },
  { id: 47, topic: "Cerebellum", src: "Maini · L16", q: "What does Maini call the branching tree-like arrangement of gray and white matter seen in a sagittal section of the cerebellum?", opts: ["Corpus striatum","Corpora quadrigemina","Arbor vitae","Falx cerebelli"], a: 2, h1: "Latin for 'tree of life'.", h2: "Arbor vitae = cerebellar branching tree pattern", exp: "The arbor vitae ('tree of life') is the branching pattern of cerebellar white matter within the gray cortex." },
  { id: 48, topic: "Cerebellum", src: "Maini · L16", q: "What is the vermis of the cerebellum?", opts: ["The C-shaped band connecting the two cerebral hemispheres","The gray matter tuft that secretes CSF","The stalk attaching the cerebellum to the brainstem","A worm-like band of tissue connecting the two cerebellar hemispheres"], a: 3, h1: "'Vermis' = worm.", h2: "Vermis connects the cerebellar hemispheres", exp: "Maini describes the vermis as the caterpillar/worm-shaped band that connects the two cerebellar hemispheres." },
  { id: 49, topic: "Cerebellum", src: "Maini · L16", q: "How does Maini say the cerebellum refines a movement over time?", opts: ["It compares the planned movement (a copy from the motor cortex) with the performed movement (feedback via the spinocerebellar tract) and corrects it","It sends the only motor command directly to muscles","It relays all sensation to the cortex","It secretes hormones that improve muscle tone"], a: 0, h1: "A copy of the plan plus feedback from the periphery.", h2: "Cerebellum compares planned vs performed (spinocerebellar feedback)", exp: "The cerebellum receives a copy of the motor plan and peripheral feedback through the spinocerebellar tract, compares them, and makes each movement more precise." },
  { id: 50, topic: "Ventricles & CSF", src: "Maini · L17", q: "Cerebrospinal fluid escapes the fourth ventricle into the subarachnoid space through which foramina?", opts: ["A single interventricular foramen","Two lateral foramina of Luschka and one median foramen of Magendie","The cerebral aqueduct only","Two foramina of Magendie and one of Luschka"], a: 1, h1: "Two on the sides, one in the midline.", h2: "4th ventricle exits: 2 Luschka (lateral) + 1 Magendie (median)", exp: "CSF exits the fourth ventricle via the two foramina of Luschka (lateral) and the single foramen of Magendie (median)." },
  { id: 51, topic: "Ventricles & CSF", src: "Maini · L17", q: "Which sequence correctly traces cerebrospinal fluid circulation, per Maini's flowchart?", opts: ["Third ventricle > lateral ventricles > cerebral aqueduct > fourth ventricle > superior sagittal sinus","Fourth ventricle > cerebral aqueduct > third ventricle > lateral ventricles > subarachnoid space","Lateral ventricles > interventricular foramina > third ventricle > cerebral aqueduct > fourth ventricle > subarachnoid space > arachnoid granulations > superior sagittal sinus","Lateral ventricles > cerebral aqueduct > third ventricle > fourth ventricle > arachnoid granulations"], a: 2, h1: "Follow the ventricles in numeric order.", h2: "CSF path: lateral > IVF > 3rd > aqueduct > 4th > subarachnoid > granulations > SSS", exp: "This is exactly the pathway Maini dictated for CSF circulation and reabsorption." },

function useVoice() {
  const ref = useRef(null);
  useEffect(() => {
    if (typeof window === "undefined" || !("speechSynthesis" in window)) return;
    const pick = () => {
      const vs = window.speechSynthesis.getVoices() || [];
      const find = (re) => vs.find((v) => re.test(v.name));
      ref.current =
        find(/microsoft.*ava.*natural/i) ||
        find(/microsoft.*emma.*natural/i) ||
        find(/microsoft.*andrew.*natural/i) ||
        find(/google us english/i) ||
        find(/en[-_]us/i) ||
        vs[0] || null;
    };
    pick();
    window.speechSynthesis.onvoiceschanged = pick;
    return () => { try { window.speechSynthesis.onvoiceschanged = null; } catch (e) {} };
  }, []);
  return ref;
}

}

/* --------------------------------------------------------------- Cram ----- */
function Cram() {
  const supported = typeof window !== "undefined" && "speechSynthesis" in window;
  const voiceRef = useVoice();
  const [rate, setRate] = useState(1);
  const [cur, setCur] = useState(-1);
  const [playing, setPlaying] = useState(false);
  const [paused, setPaused] = useState(false);
  const rateRef = useRef(rate); useEffect(() => { rateRef.current = rate; }, [rate]);
  const curRef = useRef(cur); useEffect(() => { curRef.current = cur; }, [cur]);
  const stopRef = useRef(false);

  const clean = (s) => s.replace(/→/g, " leads to ").replace(/[·•]/g, ", ").replace(/[—–]/g, " - ").replace(/[★⚑]/g, "").replace(/\s+/g, " ").trim();
  const blockText = (c) => clean("Topic " + c.n + ". " + c.title + ". " + c.facts.join(" ") + " Key point: " + c.flag);

  const speakIdx = (i) => {
    if (!supported) return;
    if (i >= cram.length) { stopRef.current = true; window.speechSynthesis.cancel(); setPlaying(false); setPaused(false); setCur(-1); return; }
    setCur(i);
    const el = document.getElementById("cram-" + cram[i].n);
    if (el) el.scrollIntoView({ behavior: "smooth", block: "center" });
    const u = new SpeechSynthesisUtterance(blockText(cram[i]));
    u.rate = Math.min(3, Math.max(0.5, rateRef.current));
    if (voiceRef.current) { u.voice = voiceRef.current; u.lang = voiceRef.current.lang || "en-US"; }
    u.onend = () => { if (stopRef.current) return; speakIdx(i + 1); };
    window.speechSynthesis.speak(u);
  };

  const startAt = (i) => {
    if (!supported) return;
    stopRef.current = true;
    window.speechSynthesis.cancel();
    setTimeout(() => { stopRef.current = false; setPlaying(true); setPaused(false); speakIdx(i); }, 70);
  };
  const playAll = () => startAt(curRef.current >= 0 && curRef.current < cram.length ? curRef.current : 0);
  const pause = () => { if (supported) window.speechSynthesis.pause(); setPaused(true); };
  const resume = () => { if (supported) window.speechSynthesis.resume(); setPaused(false); };
  const stopAll = () => { stopRef.current = true; if (supported) window.speechSynthesis.cancel(); setPlaying(false); setPaused(false); setCur(-1); };
  const jump = (d) => { const base = curRef.current < 0 ? 0 : curRef.current; let t = base + d; if (t < 0) t = 0; if (t >= cram.length) t = cram.length - 1; startAt(t); };

  useEffect(() => () => { try { if (supported) { stopRef.current = true; window.speechSynthesis.cancel(); } } catch (e) {} }, []);

  const nowText = !supported
    ? "Text-to-speech is not available in this browser — the cram below still works to read."
    : cur >= 0
      ? `Reading ${cur + 1} / ${cram.length}: ${cram[cur].title}`
      : "Press play for a hands-free walkthrough of all 15 topics.";

  return (
    <section className="section">
      <div className="banner">
        <div className="bt">⚡ Cram — Maini&apos;s brain essentials, in her order</div>
        <p>Four parts → cortex &amp; basal nuclei → lobes &amp; functional map → motor/sensory pathways → speech → limbic → diencephalon → brainstem &amp; cranial nerves → cerebellum → ventricles &amp; CSF → blood supply → hemorrhages. The ⚑ flags are the high-yield hooks.</p>
      </div>

      <div className="coachbar">
        {(!playing || (playing && paused)) && (
          <button className="cbtn play" onClick={paused ? resume : playAll} disabled={!supported}>{paused ? "▶ Resume" : "▶ Play walkthrough"}</button>
        )}
        {playing && !paused && <button className="cbtn" onClick={pause} disabled={!supported}>⏸ Pause</button>}
        <button className="cbtn" onClick={() => jump(-1)} disabled={!supported}>⏮ Prev</button>
        <button className="cbtn" onClick={() => jump(1)} disabled={!supported}>⏭ Next</button>
        <button className="cbtn" onClick={stopAll} disabled={!supported || (!playing && cur < 0)}>⏹ Stop</button>
        <div className="spd">
          <span>Speed</span>
          <input type="range" min="0.5" max="3" step="0.25" value={rate} onChange={(e) => setRate(parseFloat(e.target.value))} />
          <span className="spdval">{rate.toFixed(2)}x</span>
        </div>
        <div className="now">{nowText}</div>
      </div>

      {cram.map((c, i) => (
        <div className={`obj ${cur === i ? "speaking" : ""}`} id={`cram-${c.n}`} key={c.n}>
          <div className="obj-head">
            <span className="obj-num serif">{c.n}</span>
            <span className="obj-title">{c.title}</span>
            <span className="src">{c.src}</span>
          </div>
          <ul className="obj-facts">{c.facts.map((f, j) => <li key={j}>{f}</li>)}</ul>
          {c.flag && <div className="objflag">{c.flag}</div>}
          {supported && <button className="readbtn" onClick={() => startAt(i)}>🔊 Read this topic</button>}
        </div>
      ))}
    </section>
  );
}

/* --------------------------------------------------------------- Drill ---- */
function Drill({ bank }) {
  const [idx, setIdx] = useState(0);
  const [answers, setAnswers] = useState({});
  const [hintLevel, setHintLevel] = useState({});
  const [mode, setMode] = useState("study");

  const safeIdx = Math.min(idx, Math.max(0, bank.length - 1));
  const q = bank[safeIdx];

  const score = useMemo(
    () => Object.entries(answers).reduce((n, [id, v]) => {
      const qq = bank.find((x) => x.id === Number(id));
      return n + (qq && v === qq.a ? 1 : 0);
    }, 0),
    [answers, bank]
  );

  if (!bank.length) return <section className="section"><div className="banner"><div className="bt">Drill</div></div></section>;

  const keyMode = mode === "key";
  const sel = answers[q.id];
  const answered = sel !== undefined;
  const hl = hintLevel[q.id] || 0;
  const done = Object.keys(answers).length;

  const select = (i) => {
    if (keyMode) return;
    if (answers[q.id] !== undefined) return;
    setAnswers((p) => ({ ...p, [q.id]: i }));
  };
  const bumpHint = () => setHintLevel((p) => ({ ...p, [q.id]: Math.min((p[q.id] || 0) + 1, 2) }));
  const optClass = (i) => {
    if (keyMode) return i === q.a ? "opt opt-correct" : "opt opt-locked";
    if (!answered) return "opt";
    if (i === q.a) return "opt opt-correct";
    if (i === sel) return "opt opt-wrong";
    return "opt opt-locked";
  };

  return (
    <section className="section">
      <div className="banner">
        <div className="bt">🎯 Drill — {bank.length} questions across the brain</div>
        <p>Four options, two progressive hints, an explanation, and a lecture source per question. Tap to self-test, or flip to the Answer Key to review.</p>
      </div>

      <div className="drillbar">
        <div className="progress">Question <b>{safeIdx + 1}</b> / {bank.length}{!keyMode && <> · answered <b>{done}</b></>}</div>
        <div className="modetog">
          <button className={mode === "study" ? "on" : ""} onClick={() => setMode("study")}>Study (tap)</button>
          <button className={mode === "key" ? "on" : ""} onClick={() => setMode("key")}>Answer key</button>
        </div>
        {!keyMode && <div className="scorepill">Score {score}/{done || 0}</div>}
      </div>

      <div className="navgrid">
        {bank.map((qq, i) => {
          let cls = "";
          if (keyMode) cls = "ok";
          else { const a = answers[qq.id]; cls = a === undefined ? "" : a === qq.a ? "ok" : "no"; }
          return <button key={qq.id} className={`navbtn ${cls} ${i === safeIdx ? "cur" : ""}`} onClick={() => setIdx(i)}>{i + 1}</button>;
        })}
      </div>

      <div className="qcard">
        <div className="badges"><span className="qtopic">{q.topic}</span><span className="qsrc">{q.src}</span></div>
        <div className="qtext">{q.q}</div>

        {q.opts.map((o, i) => (
          <button key={i} className={optClass(i)} onClick={() => select(i)}>
            <span className="key">{String.fromCharCode(65 + i)}</span><span>{o}</span>
          </button>
        ))}

        {!keyMode && !answered && (
          <>
            <div className="hintrow">
              <button className="ghost" onClick={bumpHint} disabled={hl >= 2}>{hl === 0 ? "Need a hint?" : "Bigger hint"}</button>
            </div>
            {hl >= 1 && <div className="hintbox">💡 {q.h1}</div>}
            {hl >= 2 && <div className="hintbox">🔎 {q.h2}</div>}
          </>
        )}

        {keyMode && <div className="exp keyed"><div className="tag">✦ Answer · {q.src}</div><p>{q.exp}</p></div>}
        {!keyMode && answered && (
          <div className={`exp ${sel === q.a ? "correct" : "incorrect"}`}>
            <div className="tag">{sel === q.a ? "✓ Correct" : "✗ Not quite"} · {q.src}</div>
            <p>{q.exp}</p>
          </div>
        )}

        <div className="navfoot">
          <button className="btn btn-ghost" onClick={() => setIdx(Math.max(0, safeIdx - 1))} disabled={safeIdx === 0}>← Prev</button>
          <button className="btn btn-primary" onClick={() => setIdx(Math.min(bank.length - 1, safeIdx + 1))} disabled={safeIdx >= bank.length - 1}>Next →</button>
        </div>
      </div>
    </section>
  );
}

/* --------------------------------------------------------------- Coach ---- */
const COACH_SYSTEM = `You are Dr. Maini, teaching GA 0202 Gross Anatomy, running a review of THE BRAIN (Lectures 16 & 17). Teach ONLY from this content; do not invent terms, structures, functions, arteries, foramina, or pathways. Warm and encouraging; you ask "right?", "okay?", "you guys remember?" and push students to reason step by step instead of guessing. Keep answers tight (3-6 sentences) and quiz the student back.

FOUR PARTS: cerebrum (largest; so large it covers/masks all underlying parts EXCEPT the brainstem; peripheral gray cortex, white matter inside; higher functions). Diencephalon (the connecting part, mostly ascending/descending pathways; houses thalamus + hypothalamus). Cerebellum (the "small brain"; seat of COORDINATION). Brainstem, superior to inferior = midbrain, pons, medulla oblongata (medulla is continuous with the spinal cord past the foramen magnum).

CORTEX & BASAL NUCLEI: longitudinal fissure splits the hemispheres, falx cerebri dips in, corpus callosum connects them. Gray = peripheral cortex (cell bodies); white = interior (myelin). Insist BASAL NUCLEI, not "basal ganglia" (a ganglion is cell bodies OUTSIDE the CNS). The three basal nuclei = caudate, putamen, globus pallidus; putamen + globus pallidus = lentiform; all three = corpus striatum. Sulcus/fissure = groove, gyrus = ridge. Internal capsule (L-shaped, between caudate/globus pallidus and the thalamus) carries the corticospinal tract -> a lesion causes CONTRALATERAL paralysis. External capsule = putamen to claustrum; extreme capsule = claustrum to insular gray; claustrum = thin strip between them. Basal-nuclei disease = Parkinsonism + RESTING tremor (cerebellum = INTENTION tremor).

LOBES & FUNCTIONAL MAP: 5 lobes - frontal, parietal, temporal, occipital + the INSULA (deep 5th, under the lateral fissure). Central sulcus = frontal/parietal border; lateral sulcus = temporal below vs frontal/parietal above; occipital demarcated by a line from the preoccipital notch to the top of the parieto-occipital sulcus. Functional areas: MOTOR = frontal (precentral gyrus), SENSORY/somesthetic = parietal (postcentral gyrus), VISUAL = occipital, AUDITORY (and smell) = temporal, TASTE = insula. Prefrontal (judgment) matures ~16-17 to ~25. Motor = 2-neuron pathway (upper in precentral gyrus -> lower in the anterior/ventral horn). Sensory = 4-neuron pathway (ganglion -> medulla -> thalamus -> postcentral gyrus). Homunculus favors fine-control/dense-receptor parts (face, hands, tongue). Frontal eye field is just anterior to the motor cortex.

GYRI & SPEECH: inferior frontal gyrus = pars orbitalis, triangularis, opercularis; temporal = superior/middle/inferior gyri; supramarginal gyrus caps the end of the lateral fissure. BROCA = frontal, MOTOR/expressive speech (finds the words); Broca's aphasia = comprehends but is "short of words," non-fluent. WERNICKE = posterior temporal, SENSORY speech (comprehension); Wernicke's aphasia = fluent but meaningless "word salad," no comprehension.

MEDIAL SURFACE & LIMBIC: corpus callosum (posterior end = splenium); septum pellucidum overlies the lateral ventricle; cuneus between calcarine and parieto-occipital sulci; lingual gyrus below the calcarine (named for shape); fornix is part of the limbic system; limbic cortex = uncus, parahippocampal gyrus, isthmus, cingulate gyrus (reward/punishment, emotion, memory).

DIENCEPHALON: thalamus = relay center for ALL ascending sensation EXCEPT smell (interthalamic adhesion = massa intermedia = intermediate mass). Hypothalamus = autonomic + endocrine master control + thermostat (thirst, hunger, sleep-wake). Pineal = melatonin (sleep-wake); corpora arenacea = normal pineal calcification after ~40. Optic chiasma = crossing of the optic nerves, over the pituitary; a pituitary tumor compresses it (bitemporal hemianopsia).

BRAINSTEM & MIDBRAIN: corpora quadrigemina = 2 superior colliculi (visual) + 2 inferior colliculi (auditory); cerebral aqueduct through the midbrain, periaqueductal gray around it; substantia nigra sits ON TOP of the red nucleus ("eyebrows over the eyes"). Cerebral peduncles + interpeduncular fossa (CN III). Medulla: pyramids = corticospinal tract; pyramidal decussation -> fibers cross -> contralateral paralysis; olive = lateral bulge; nucleus gracilis + cuneatus posteriorly. Reticular formation (medulla + pons) = arousal/alertness.

CRANIAL NERVE ATTACHMENTS: I = olfactory bulb/tract; III = interpeduncular fossa; IV = only DORSAL nerve (below the inferior colliculus); V = side of the pons (thickest; motor to mastication + tensor tympani/veli palatini, mylohyoid, anterior digastric); VI = pontomedullary sulcus (lateral rectus); VII + VIII + labyrinthine artery = internal acoustic meatus; IX/X/XI = post-olivary sulcus -> jugular foramen; XII = pre-olivary sulcus (tongue).

CEREBELLUM: arbor vitae ("tree of life") = branching white matter; folia = the folds; vermis = worm-like band connecting the two hemispheres. It compares the planned movement (copy from the motor cortex) with the performed movement (spinocerebellar feedback) and corrects it. Cerebellar signs = intention tremor, finger-nose overshoot, dysarthria, hypotonia.

VENTRICLES & CSF: lateral ventricle horns = anterior (frontal), posterior (occipital), inferior (temporal). 3rd ventricle = slit between the thalami; interventricular foramen (Monro) connects lateral to 3rd; cerebral aqueduct connects 3rd to 4th (through the midbrain); 4th ventricle = pons/medulla in front, cerebellum behind; exits = 2 foramina of Luschka (lateral) + 1 of Magendie (median). Choroid plexus SECRETES CSF; arachnoid granulations ABSORB it into the superior sagittal sinus. Path: lateral -> IVF -> 3rd -> aqueduct -> 4th -> subarachnoid -> arachnoid granulations -> superior sagittal sinus. Blocked granulations = raised ICP/hydrocephalus.

BLOOD SUPPLY: internal carotids (anterior) + vertebrals (posterior); brain = ~2% weight, ~15% cardiac output. ICA parts = cervical, petrous, cavernous, cerebral; ICA -> ACA (medial frontal/parietal) + MCA (lateral cortex + insula + posterior internal capsule; commonest stroke artery). 2 vertebrals (from the subclavians) -> basilar -> 2 posterior cerebral arteries (occipital). Labyrinthine artery to the inner ear via the internal acoustic meatus. Circle of Willis = PCA, posterior communicating, ICA, ACA, anterior communicating, around the optic chiasma/infundibulum/mammillary bodies; purpose = collateral (alternate) supply.

HEMORRHAGES & DEVELOPMENT: epidural = arterial (middle meningeal artery, pterion, fast); subdural = venous (bridging veins, elderly, slow); subarachnoid = arterial aneurysm rupture (can block granulations, raise ICP). Sigmoid sinus -> internal jugular vein (jugular foramen); cerebral veins are valveless (low/negative venous pressure). Cavernous ICA rupture -> pulsatile exophthalmos. Neural tube from ectoderm; telencephalon -> cerebral hemispheres; diencephalon -> thalami/hypothalamus/infundibulum/pineal/mammillary bodies; metencephalon -> pons + cerebellum; myelencephalon -> medulla.

Open by offering to drill the four parts, the functional cortex map, the basal nuclei/capsules and the contralateral rule, the diencephalon (thalamus/hypothalamus/pineal), the brainstem & cranial-nerve attachments, the CSF pathway, or the Circle of Willis & the hemorrhages. When the student is wrong, name the structure or rule and have them re-derive step by step.`;

function Coach() {
  const [log, setLog] = useState([
    { role: "assistant", content: "Okay guys - the brain. A few big things to nail: the cerebrum masks everything except the brainstem; the thalamus relays ALL ascending sensation except smell; the corticospinal tract crosses (internal capsule and the pyramidal decussation) so a lesion gives CONTRALATERAL paralysis; and the CSF pathway plus the Circle of Willis. Where do you want to start - the four parts, the functional cortex map, the basal nuclei and the capsules, the diencephalon, the brainstem and cranial-nerve attachments, the CSF flow, or the blood supply and hemorrhages?" },
  ]);
  const [input, setInput] = useState("");
  const [busy, setBusy] = useState(false);
  const [err, setErr] = useState("");
  const logRef = useRef(null);

  useEffect(() => { if (logRef.current) logRef.current.scrollTop = logRef.current.scrollHeight; }, [log, busy]);

  const send = async (text) => {
    const msg = (text ?? input).trim();
    if (!msg || busy) return;
    setErr("");
    const next = [...log, { role: "user", content: msg }];
    setLog(next);
    setInput("");
    setBusy(true);
    try {
      const res = await fetch("https://fab-ai.dgync1.workers.dev/", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          model: "claude-sonnet-4-20250514",
          max_tokens: 1000,
          system: COACH_SYSTEM,
          messages: next.map((m) => ({ role: m.role, content: m.content })),
        }),
      });
      const data = await res.json();
      const reply = (data.reply || (data.content || []).filter((b) => b.type === "text").map((b) => b.text).join("\n") || "").trim();
      setLog((p) => [...p, { role: "assistant", content: reply || "Say that again for me?" }]);
    } catch (e) {
      setErr("Could not reach the tutor. If you're running this outside the wrapped app, the API call needs a valid endpoint/key.");
      setLog((p) => p.slice(0, -1).concat({ role: "user", content: msg }));
    } finally {
      setBusy(false);
    }
  };

  const prompts = [
    "Drill me on the four parts of the brain",
    "Quiz the functional cortex map (motor, sensory, visual, auditory, taste)",
    "Basal nuclei, the capsules, and the contralateral rule",
    "The diencephalon - thalamus, hypothalamus, and pineal",
    "Cranial-nerve attachments on the brainstem",
    "Walk me through the CSF pathway and the Circle of Willis",
  ];

  return (
    <section className="section">
      <div className="banner">
        <div className="bt">🧑‍⚕️ AI Coach — Dr. Maini&apos;s voice</div>
        <p>Grounded in her brain lectures. It quizzes you and makes you reason step by step instead of guessing.</p>
      </div>

      <div className="coach-pills">
        {prompts.map((p, i) => <button key={i} className="cpill" onClick={() => send(p)}>{p}</button>)}
      </div>

      <div className="chatlog" ref={logRef}>
        {log.map((m, i) => (
          <div key={i} className={`msg ${m.role === "user" ? "user" : "bot"}`}>
            {m.role === "assistant" && <div className="who">Dr. Maini</div>}
            {m.content}
          </div>
        ))}
        {busy && <div className="typing">Dr. Maini is typing…</div>}
      </div>

      <div className="composer">
        <textarea
          value={input}
          placeholder="Ask Dr. Maini… (Enter to send, Shift+Enter for a new line)"
          onChange={(e) => setInput(e.target.value)}
          onKeyDown={(e) => { if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); send(); } }}
        />
        <button className="btn btn-primary" onClick={() => send()} disabled={busy || !input.trim()}>Send</button>
      </div>
      {err && <div className="tinynote" style={{ color: "var(--bad)" }}>{err}</div>}
      <div className="tinynote">Tutor answers are AI-generated in a teaching persona — trust the lecture/slides first if anything ever conflicts.</div>
    </section>
  );
}
